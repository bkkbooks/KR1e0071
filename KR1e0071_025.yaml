body:
  text: 春秋胡傳附録纂疏卷二十三元汪克寬撰襄公下乙靈王二卯十六年二十有七年晉平十二齊景二衛獻二十一蔡景四十六鄭簡二十曹武九陳哀二十三把文四宋平三十秦景三十一楚康十四吳餘祭二春齊侯景使慶封來聘杜氏曰景公即位通嗣君也愚按自齊人媵伯姬僑如逆婦姜二國不通好者二十年今景公不事侵伐先遣貴卿聘于魯亦云賢矣高氏曰夫鄭不仇楚而齊魯釋怨此宋之盟所以輯也夏叔孫豹㑹晉平趙武楚康屈建蔡景公孫歸生衛獻石惡陳哀孔奐鄭簡良霄許悼人曹武人于宋平屈居勿反奐公作瑗後同晉楚始同主盟左傳宋向戌善于趙文子又善于令尹子木欲弭諸侯之兵以為名如晉告趙孟趙孟謀于諸大夫韓宣子曰兵民之殘也財用之蠧小國之大菑也將或弭之雖曰不可必將許之弗許楚將許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之如齊齊人難之陳文子曰晉楚許之我焉得已齊人許之告于秦秦亦許之皆告于小國為㑹于宋晉趙武叔孫豹齊慶封陳須無衛石惡鄭良霄邾悼公滕成公至楚公子黑肱先至成言于晉宋向戌如陳從子木成言于楚子木謂向戌請晉楚之從交相見也向戌復于趙孟趙孟曰晉楚齊秦匹也晉之不能于齊猶楚之不能于秦也楚君若能使秦君辱于敝邑寡君敢不固請于齊左師復言于子木子木使馹謁諸王王曰釋齊秦他國請相見也子木至自陳陳孔奐蔡公孫歸生曹許之大夫皆至以藩為軍晉楚各處其偏杜氏曰齊秦不交相見邾滕為私屬皆不與盟宋為主人地于宋則與盟可知故經唯序九國大夫昭元年𫝊春秋不貴修盟晉人以信為本故每書必先趙武孫氏曰隱桓之際天子失道諸侯擅權宣成之間諸侯僣命大夫專國至宋之㑹諸侯日微天下之政中國之事皆大夫専持之故二十九年城把三十年㑹澶淵昭元年㑹虢諸侯莫有見者髙氏曰此㑹楚意也楚人患吳而結諸夏也諸侯之大夫不詳其故始狥其弭兵之名遂㑹于宋而與之盟自是內外淆然莫辨而諸國俯首兩事晉楚桓文數十年之功業一朝而壞之百姓雖暫免于兵革之苦而天下之大勢遂大潰而不可收拾矣彼向戌者又豈足知天下之大勢哉陳氏曰此晉楚初同主諸夏盟也晉楚嘗盟矣㑹于瑣澤之嵗宋華元克合晉楚之成士燮㑹公子罷盟于宋西門之外不書猶曰特相盟也兩國之好而非天下之大變也以諸侯分為晉楚之從而交相見也于是始則是南北二伯也天下之大變也于溴梁而無君臣之分于宋而無夷夏之辨昭定哀之春秋將以終于吳越焉爾矣愚按楚先㰱而春秋書晉者尊中國而抑狂楚也荆楚之同主夏盟皆宋為之也宋襄圖霸始進楚人于鹿上之盟既而盂之㑹楚書爵而與宋公並序于諸侯之上二霸之端兆于此矣故遂有盂之執泓之敗而宋不能霸華元合晉楚之成盟于宋西門之外爭霸之業復啓于此故鄢陵楚子敗績而鄭終從楚今也向戌為成使晉楚之從交相見而兩霸之勢遂成于此故于申之㑹晉遂退縮不復主諸侯而宋向戌且獻禮于楚子由是知荆楚之爭雄于中國皆宋為之也衛獻殺其大夫寧喜穀梁傳稱國以殺罪纍上也寧喜弒君其以纍上之辭言之何也嘗為大夫與之涉公事矣寧喜由君弒君而不以弒君之罪罪之者惡獻公也寧喜既坐弒君之罪矣不以討賊之詞何也初衛侯使與喜言苟反政由寧氏祭則寡人寧氏納之衛侯復國患寧喜之専也公孫免餘請殺之曰微寧子不及此吾與之言矣對曰臣殺之君勿與音預知乃攻寧氏殺喜尸諸朝子鮮曰逐我者出納我者死賞罰無章何以勸沮君失其信背約殺喜而國無刑不能誅孫林父不亦難乎並據左傳故稱國以殺而不去起吕反其官范氏曰不言喜之非罪而死則獻公之惡不彰孫氏曰寧喜不以討賊辭書者獻公殺之不以其罪也髙郵孫氏曰喜弒剽而納衎衎反國而復用之既而以其私殺之喜雖有罪而衛侯殺之不以其罪矣昔里克弒奚齊而立夷吾夷吾殺之二君之殺其大夫皆以其私里克寧喜之見殺皆不以其罪故春秋皆曰殺其大夫家氏曰剽篡君者也他人可殺而寧喜嘗事之以為君不得殺也故書弒以正其罪喜弒君者也他人可殺而衛獻因之以入不得殺也故稱國以殺不削其官衛侯獻之弟鱄出奔晉鱄市戀反又音専榖作専公羊傳曷為出奔為殺寧喜出奔也初寧喜使人謂獻公曰黜公者非寧氏也孫氏為之吾欲納公何如獻公曰子苟欲納我吾請與子盟喜曰無所用盟請使公子鱄約之獻公使公子鱄鱄辭獻公怒曰黜我者非寧氏與孫氏凡在爾鱄不得已而與之約已歸至殺寧喜公子鱄挈其妻子而去之將濟河擕其妻子而盟曰苟冇履衛地食衛粟者昧雉彼視榖梁傳専其曰弟何也専有是信者君賂不入乎喜而殺喜是君不直乎喜也故出奔晉織絇邯鄲終身不言衛専之去合乎春秋衛侯之入使鱄與寧喜約言既殺寧喜鱄病失言遂出奔晉託於木門不鄉許亮反衛國而坐木門晉邑大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也吾不可以立於人之朝矣終身不仕並據左傳其稱弟罪衛侯也家氏曰鱄始御其君兄之命以與寧喜約固許之以專衛國之政今以其專而弒之在衛獻為食言鱄自以失信于死者逃其兄而去之夫鱄衛獻之母弟也獻非鱄不得返國今甫奠于位而不能安鱄之身獻之不友甚矣書衛侯之弟譏不友也榖梁子曰鱄之去合乎春秋范氏曰喜雖弒君本與専約納獻公公由喜得入已與喜以君臣從事矣春秋撥亂重盟約今獻公背之而殺忠于已者是獻公惡而難親也専懼禍將及君子見幾而作不俟終日専之去衛其心合于春秋劉氏曰衛侯忌小忿以誅有功捐大信以疑至親使鱄至于去國逃死者無人君之道故也當此之時鱄以全身不離于惡名為智以毋使其兄有誅弟之惡為義以不翹世以自潔為志以不仕而能矯國之失為亷可謂重已乎是乃君子之所貴也秋七月辛巳豹及諸侯之大夫盟于宋左傳辛巳將盟于宋西門之外楚人𠂻甲伯州犂曰合諸侯之師以為不信無乃不可乎夫諸侯望信于楚是以來服若不信是棄其所以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已苟得志焉焉用有信趙孟患楚𠂻甲以告叔向叔向曰何害也匹夫一為不信猶不可若合諸侯之卿以為不信必不捷矣夫以信召人而以僣濟之必莫之與也安能害我又不及是曰弭兵以召諸侯而稱兵害我吾庸多矣非所患也乃盟晉楚爭先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣豈専在晉叔向謂趙孟曰諸侯歸晉之德只非歸其尸盟也子務德毋爭先乃先楚人書先晉晉有信也宋公及諸侯之大夫盟于蒙門之外晉荀寅遂如楚涖盟楚薳罷如晉涖盟此一地也曷為再言宋據雞澤盟袁僑溴梁大夫盟不再書地書之重直龍反詞之復其中必有大美惡焉宋之盟合左師欲弭諸侯之兵以為名而楚屈建請晉楚之從交相見音現吕氏曰晉楚之從交相見內外之分自此不復辨矣自是中國諸侯南向而朝楚二十八年公及宋公陳侯鄭伯許男如楚永嘉吕氏曰魯自僖公以來雖二于楚而未嘗一迹其國自盟宋之後明年如楚逾年乃至春秋備書之以見中國諸侯事楚猶事晉矣向也不過陳蔡鄭從楚無他近楚之國也今也魯宋皆均事楚矣及申之㑹昭四蠻荒之君篡弒之賊大合十有一國之衆而用齊桓召音邵陵之禮宋左師鄭子産皆獻禮焉宋世子佐以後至遂辭而不見伐吳滅賴無敢違者聖人至是哀人倫之滅傷中國之衰而其事自宋之盟始也陳氏曰自宋以來晉不専主盟矣虢之盟讀舊書加于牲上而已至鄟陵則齊主諸侯至臯鼬則魯及諸侯晉之不足以主夏盟自宋始宋之盟趙武之偷也孔子曰庭燎之百由齊桓公始也大夫之奏肆夏由趙文子始也是王霸之所以興衰也于是晉楚爭先乃先楚人則其書先晉何春秋不以夷狄先中國也故㑹盟同地而再言宋者貶之也事之美者屢言之以著其美事之惡者亦屢言之以著其惡是故美惡不嫌同辭或者乃以宋之盟中國不出楚人不入玉帛之使疏吏反交乎天下以尊周室為晉趙武楚屈建之力而善此盟也三十年榖梁傳劉氏意林宋之㑹弭諸侯之兵百姓免兵革之患十冇餘年趙武屈建之力可以當齊桓其說誤矣孫氏曰溴梁之㑹諸侯㑹而曰大夫盟者大夫無諸侯也此盟諸侯不在而曰豹及諸侯之大夫盟于宋者不與大夫無諸侯也豹不氏前見也愚按說者稱于宋弭兵蓋是時晉楚皆怠於出師是以偶有六七年之安靖然楚人𠂻甲苟非伯州犂之言則趙孟為宋襄之執矣况魯帥師而取鄆晉帥師而敗狄兵亦未嘗戢也楚圍既讀舊書未幾篡國大合諸侯伐吳滅賴安在其能弭兵也哉家氏曰盟㑹者衰世之事已非春秋之所貴然伯者行之猶存名義今諸侯來集楚人遽求為長趙武畏其盛兵𠂻甲苟求無事遂長楚人春秋為中國惜故先晉况㑹盟於中國之境而夷狄長之無內外之分亂冠屨之常啓戎心而召後患趙武叔向無以辭其責也劉氏曰公羊云再言豹殆諸侯也曷為殆諸侯衛石惡在是也曰惡人之徒在是矣非也此乃一事再見者前目而後凡耳何謂殆諸侯乎且石惡名惡爾行未必惡也榖梁云豹云者恭也諸侯不在而曰諸侯之大夫大夫臣也非也稱諸侯者常文耳不稱諸侯者變文也又豹不氏乃二事再見卒名之例不以是為恭也左氏云不書其族言違命也尤非也蔡許失位左氏貶之今魯欲自同人之私失位甚矣且命出季氏而曰不可違何哉冬十有二月乙亥朔日有食之左傳辰在申司厯過也再失閏矣啖氏曰按經言十二月𫝊言十一月依經當言三失閏進退不同不可得而考劉氏曰厯家之術求閏餘易求交朔難今司厯能正交朔反不能正閏乎丙靈王二十辰七年崩二十有八年晉平十三齊景三衛獻三十二蔡景四十七鄭簡二十一曹武十陳哀二十四把文五宋平三十一秦景三十二楚康十五卒吳餘祭三春無冰孫氏曰時燠也桓十四年傳燠而無冰此政治縱弛不明之所致也愚按是時襄公昏庸三家専政明年季武子取卞而襄公幾不得入其紀綱縱弛可知矣夏衛獻石惡出奔晉左傳衛人討寧氏之黨故石惡出奔晉衛人立其從子圃以守石氏之祀邾子悼來朝髙氏曰邾自晉執其君魯取其田益微弱矣至是悼公來朝秋八月大雩左傳旱也髙氏曰春無冰秋旱此皆人事所召而僣用大禮以祈之不亦悖乎仲孫羯如晉平左傳告將為宋之盟故如楚也冬齊景慶封來奔左傳齊崔杼生成及彊而寡娶東郭姜生明東郭姜以孤入曰棠無咎與東郭偃相崔氏崔成有疾廢之而立明成請老于崔偃與無咎弗子成與彊怒將殺之告慶封封曰苟利夫子必去之難吾助女崔成崔彊弒東郭偃棠無咎于崔氏之朝崔子怒而出遂見慶封慶封使盧蒲嫳帥甲以攻崔氏殺成與彊而盡俘其家其妻縊嫳復命于崔子且御而歸之至則無歸矣乃縊慶封當國封好田而嗜酒與慶舍政則以其內實遷于盧蒲嫳氏易內而飲酒數日國遷朝焉使諸亡人得賊者以告而反之故反盧蒲癸癸臣子之有寵言王何而反之二人皆嬖慶封田于萊嘗于大公之廟慶舍蒞事盧蒲癸自後刺子之王何以戈擊之死慶封歸遇告亂者伐西門弗克遂伐北門克之入伐內宫弗克反陳于嶽請戰弗許遂來奔既而齊人來讓奔吳吳句餘與之朱方富于其舊齊人遷莊公殯于大寢尸崔杼于市家氏曰盧蒲癸王何莊公之幸臣也殺慶舍逐慶封而戮崔杼莊之弒也幸臣與之俱死者十人今為之討賊亦幸臣也身為國君以幸臣為羽翼莊固可鄙矣而卿大夫無能為君討賊復仇者而幸臣乃能之亦卿大夫之耻也愚按齊殺崔杼不書蓋非以賊討也宋人以賂請萬于陳而醢之且不書殺况杼以家亂而自斃乎十有一月公如楚諸夏之君始旅見于楚左傳為宋之盟故公及宋公陳侯鄭伯許男如楚及漢楚康王卒公欲反叔仲昭伯曰我楚國之為豈為一人行也公遂行宋向戌曰我一人之為非為楚也宋公遂反孫氏曰桓文既沒蠻荆日熾中國日微故公逺朝强楚也陳氏曰諸夏之君旅見于楚始于此舉魯以見其餘也是故書公朝王所見王業之衰書公如楚見霸業之衰凡舉魯以見其餘者則天下之辭也臨川吳氏曰齊晉霸國也以魯朝之猶云可也楚蠻國也初亦小弱後以吞滅小國憑陵中夏而浸强大晉霸既衰不能與伉魯之朝楚非得已也屈禮義之望國朝崛起之强夷儻書曰朝辱莫甚焉止書曰如猶為諱其恥也愚按僖十八年鄭文公始朝于楚二十二年鄭伯又如楚二十四年宋成公亦如楚自是而後鄭伯屢朝于楚而陳許諸君朝楚傳亦間見蓋至于今年而中國之諸侯旅朝于楚以事天子之禮事之矣逮昭九年而諸侯之大夫亦旅見于楚矣迄哀之四年而晉亦京師楚矣世變至是聖人蓋傷之甚矣十有二月甲寅天王崩靈王也在位二十七年子貴嗣位是為景王不書葬諸侯不㑹也乙未楚子昭卒康王也在位十五年子麇嗣是為郟敖甲寅天王崩乙未楚子昭卒相距四十二日則閏月之驗也何氏注然不以閏書見音現喪服之不數爽主反閏也齊景公葬書閏月哀五明殺所賣反恩之非禮也吕氏曰此明閏月之驗然不書閏者承前月而受其餘日故書閏月之日繫前月之下史策常體又有定例故不必每月發𫝊此范寧之說也杜預以十二月無乙未日誤孔頴逹以為甲寅乙未不得同月是皆不知閏月之日繫前月之下耳丁景王已元年二十有九年晉平十四齊景四衛獻三十三卒蔡景四十八鄭簡二十二曹武十一陳哀二十五杞文六宋平三十二秦景三十三楚郟敖麇元年吳餘祭四弒春王正月公在楚公羊傳何言乎公在楚正月以存君也榖梁傳閔公也嵗之首月公在他國者有矣莊二十二年冬公如齊二十三年春至自齊文三年冬公如晉四年春至自晉十三年冬公如晉十四年正月至自晉成十年七月公如晉十一年三月至自晉襄四年冬公如晉五年春至自晉十二年冬公如晉十三年春至自晉昭十五年冬公如晉十六年夏至自晉此獨書公在楚者外為強楚所制以俟其葬而不得歸唐陳氏曰如晉而不朝正者常也故不書楚外夷也如楚不朝正者非常也故書孫氏曰公在中國猶可在蠻荆則甚矣公留于楚者七月故詳而録之薛氏曰在楚之書也危其在中國之外也內為强臣所逼欲擅其國而不敢入劉氏曰昭公去國以乾侯寄季氏居君之位攝君之祭魯之一民非公之有聖人嫌于國無公公無國也故因正月書公在以正之今襄公亦去其國季孫亦叛于內居君之位攝君之祭其與乾侯也同同則其文等矣故有公則無所復存存公則失國可知矣坤之剝曰龍戰于野夫嫌于無陽而後稱龍猶嫌于無君而後存公安可不察耶故特書所在以存君也何氏曰襄公久在夷狄危録之范氏曰憫公為楚所制故存録按左氏楚人使公親禭音遂檀弓襄公朝于荆康王卒荆人曰必請襲魯人曰非禮也荆人强之巫先拂柩荆人悔之夏四月送楚子葬至于西門之外還音旋及方城杜氏曰方城山在南陽葉縣南季武子取卞魯邑杜氏曰魯國卞縣以自封使公冶告曰聞守卞者將叛臣帥師徒以討既得之矣公曰欲而言叛祗音支見疏也吾不可以入矣將適諸侯有賦式微者乃歸並左傳故特於嵗首朝正之時而書曰公在楚使後世臣子戴天履地視君父之危且困者必有天威不違顔咫尺僖九齊桓公云云食坐見於羮墻之意後李固傳昔堯殂之後舜仰慕三年坐則見堯于墻食則睹堯于羮而不以頃刻忘也董子繁露公在楚臣子思君無一日無君之意此義一行豈敢有顧其身與妻子與其家而不恤國朋附權臣以圖富貴而背音佩其君者乎髙氏曰公在齊晉多矣闕朝正之禮亦不少矣但書公如齊如晉而義自見也今書公在楚則聖人之㫖深矣三十八年十一月公如楚十二月甲寅天王崩乙未楚子昭卒公不篤君臣之義以奔天王之喪而狥蠻荆之强以俟楚子之葬久留于楚待夏乃歸故聖人特於朝正之時書公所在與昭公失國在乾侯同且以責季氏之無君也家氏曰公在乾侯以內外言也公在楚幾有播越之患也向戌售其邪說屈列國而伸蠻荆俾天下諸侯相率而朝于楚公復為楚人所侮辱久乃得歸春秋憫中國諸侯之為楚人屈故于嵗首書公在楚外楚也夫外域朝中國理之常也中國旅朝于楚反常也春秋于事之反常者每變例而特書此類是也啖氏曰左傳云釋不朝正于廟也按前後正月公不在例不書何獨于此釋不朝正乎趙氏曰凡君在外不應都廢告朔之禮當是大臣攝行矣夏五月公至自楚榖梁傳喜之也致君者殆其往而喜其反此致君之意義也范氏曰逺之蠻國喜得全歸庚午衛侯衎卒獻公也在位并出奔三十三年子惡嗣是為襄公閽弒吳子餘祭閽音昏祭側界反公羊傳閽者何門人也刑人也刑人則曷為謂之閽刑人非其人也君子不近刑人近刑人則輕死之道也愚按餘祭在位三年弟夷末立榖梁子曰閽門者寺如字又音侍人也不稱名姓閽不得齊於人不稱其君閽不得君其君也沙隨程氏曰謂之弒蓋其君也不曰其君閽賤也盜殺蔡侯申書殺閽書弒何也以閽食庶人在官者之祿也禮君不使無恥不近刑人曲禮刑人不在君側祭統古者不使刑人守門不狎敵不邇怨賤人非所貴也貴人非所刑也刑人非所近也舉至賤而加之吳子吳子近刑人也閽弒吳子餘祭仇之也並榖梁左氏以為伐越獲俘焉以為閽使守舟吳子觀舟閽以刀弒之亦邇怨之失也家氏曰春秋所以書言禍生于所忽也吳之諸君往往輕以蹈禍遏卒于巢餘祭死于閽僚死于専諸春秋之書之良以垂戒示後焉耳仲孫羯㑹晉平荀盈齊景髙止宋平華定衛襄世叔儀鄭簡公孫段曹武人莒犂比人滕成人薛人小邾穆人城把儀公作齊莒人下公榖有邾人左傳晉平公把出也故知悼子合諸侯之大夫以城把鄭子太叔見太叔文子曰晉國不恤周宗之闕而夏肄是屏其棄諸姬亦可知也已諸姬是棄其誰歸之吉也聞之棄同即異是謂離德詩曰協比其鄰婚姻孔云晉不鄰矣其誰云之榖梁傳古者天子封諸侯其地足以容其民其民足以備城自守也把危而不能自守故諸侯之大夫相帥城之晉平公把出也杜氏曰平公母悼夫人乃杞孝公姊妹爾雅姊妹之子為出故合諸侯之大夫以城把古之建國立家者必親九族堯典以親九族歐陽氏曰父族四謂父之姓一族也父女昆弟適人有子二族也已女昆弟適人有子三族也已女子適人有子四族也母族三謂母之父一族也母之母二族也母之昆弟三族也妻族二謂妻之父為一族妻之母為一族然有父族而後及母族有母族而後及妻族此葛藟之詩所為次也葛藟王族刺平王也周室道衰棄其九族焉一章曰謂他人父二章曰謂他人母三章曰謂他人昆晉主夏盟令行中國平公不能修文襄悼公之業尊奬王室恤宗周之闕而夏肄以二反餘也陸氏釋文斬而復生曰肄方言云枿餘也是屏必井反輕棄諸姬可謂知本乎平王惟不撫其民而逺屯戍于母家周人怨思焉見揚之水小序詩曰彼其之子不與我戍申申國平王之母家也揚之水所以降為國風不得列于雅也朱子曰平王不能行其威令于天下無以保其母家乃勞天子之民逺為諸侯戍守故周人之戍申者以非其職而怨思焉則其衰懦微弱得罪于民可見矣嗚呼詩亡而後春秋作其不以此也哉城把之役亦不待貶絶而可見矣襄陵許氏曰齊桓城杞而諸侯歸心者桓公之志公天下也晉平城把而人疾其役其志私也動又不時能無擕乎愚按齊桓恤把而城緣陵雖僣天子封國之權而得方伯救患之義事雖専而心則公也故春秋書曰諸侯城緣陵略諸侯而不序且不曰城把而曰城緣陵所以隱其專也晉平治把而城之以大夫合天下之衆而修其私親之城郭初非救災恤患之舉心既私而事亦悖矣故春秋列序十有一國之大夫而曰城杞所以著其失也陳氏曰合十一國諸侯之大夫而書城把合十三國諸侯之大夫于澶淵而書宋災故屬辭比事而功過分矣衛寧喜弒其君孫林父以邑叛蔡世子般弒其父吳楚之大夫交聘于中國天下亦多故矣晉為盟主而區區于宋把是晉之已細也晉之已細而後有執齊慶封放陳招殺蔡侯般假討賊之義以盟諸夏如楚靈王者矣晉侯平使士鞅來聘左傳拜城把也髙氏曰謝城把且使我歸把田也把子來盟左傳晉侯使司馬女叔侯來治把田弗盡歸也晉悼夫人愠曰齊也取貨先君若有知也不尚取之公告叔侯叔侯曰武獻以下兼國多矣誰得治之杞夏餘也而即東夷魯周公之後也而睦于晉職貢不之公卿大夫相繼于朝史不絶書府無虛月如是可矣何必瘠魯以肥把祀文公來盟書曰子賤之也杜氏曰賤其用夷禮陳氏曰凡來盟皆大夫也把伯親之故賤之也把雖稱子矣前乎此夷儀之㑹稱伯後乎此卒復稱伯來盟特稱子見春秋之貶諸侯也春秋之褒貶君大夫莫備于隱桓莊之世寓王法也成襄而下舍把子無削其爵者舍楚子虔無生名之者經之變文也愚按把自莊二十七年稱伯至僖二十年二十七年兩稱子自此後並稱伯惟此年來盟稱子厥後終春秋稱伯義見桓二年髙氏曰晉使魯歸前所侵把田故書把子來盟于士鞅來聘之下吳子使札來聘吳始聘吳始君臣並見左傳通嗣君也請觀于周樂使工為之歌風雅頌曰至矣哉公羊傳吳無君大夫此何以有君有大夫賢季子也何賢乎季子讓國也其讓國奈何謁也餘祭也夷昧也與季子同母者四季子弱而才兄弟皆愛之同欲立之以為君謁曰今若是迮而與季子國季子猶不受也請無與子而與弟弟兄迭為君而致國乎季子皆曰諾故諸為君者皆輕死為勇飲食必祝曰天苟有吳國尚速有悔于豫身故謁死餘祭立餘祭死夷昧立夷昧死則國宜之季子者也季子使而亡焉僚者長庶也即之季子使而反至而君之爾闔廬曰先君之所以不與子國而與弟者凡為季子故也將從先君之命與則國宜之季子者也如不從先君之命與則我宜立者也僚惡得為君乎于是使専諸刺僚而致國乎季子季子不受曰爾弒吾君吾受爾國是吾與爾為篡也爾殺吾兄吾又殺爾是父子兄弟相殺終身無已也去之延陵終身不入吳國故君子賢季子札者何吳季子之名也春秋賢者不名許夷狄不一而足也榖梁傳吳其稱子何也善使延陵季子故進之也杜氏曰餘祭既遣札聘上國而後弒札以六月到魯未聞喪也札者吳之公子何以不稱公子貶也辭國而生亂者朱子語問季札胡文定公言其辭國以生亂溫公又言其明君臣之大分曰可以受可以無受札為之也故因其來聘而貶之示法焉常山劉氏曰札何以不稱公子辭國而生亂者札為之也吳子夀夢有四子季則札也夀夢欲立札札辭而去遏緣先君之志約以次必致國于札夷昧之卒札宜受命以安社稷而狥匹夫之節辭位以逃夷昧之豫僚于是代立遏之子光乃弒僚而代之是以吳之亂札實為之也故春秋因札來聘去其公子以示貶焉按吳子夀夢有子四人長展兩反下同曰諸樊又名遏次曰餘祭側界反次曰夷末札其季子也夀夢賢季札欲立以為嗣札辭不可然後立諸樊諸樊既除喪則致國于季子季子又辭而去之諸樊乃捨音舍下同其子而立弟約以次傳必及季子故諸樊卒而餘祭立餘祭卒而夷末立夷末卒則季子宜受命以安社稷成父兄之志矣乃徇匹夫之介節辭位以逃夷末之子僚僚既立史吳世家夀夢子四人諸樊餘祭餘昧季札季札賢夀夢欲立之札讓不可乃立諸樊諸樊已除喪讓位季札季札棄其室而耕乃舍之諸樊卒有命授弟餘祭欲以次必致國于季札餘祭卒弟餘昧立餘昧卒欲授弟季札季札讓逃去于是立餘昧之子僚諸樊之子光曰先君所以不與子國而與弟者凡為于僞反季子爾將從先君之命歟則季子宜有國也如不從先君之命則我宜立僚烏得為君於是使専諸刺僚而致國乎季子季子不受去之延陵終身不入吳國本公羊故曰季子辭國以生亂因其來聘而貶之示法焉或謂子貢問於孔子曰伯夷叔齊何人也曰古之賢人也怨乎曰求仁而得仁又何怨子貢以先聖賢夷齊知其惡烏故反衛輒之爭而不為于僞反也季子辭位獨不為賢而奚貶乎曰叔齊之德不越伯夷孤竹舍長而立幼私意也諸樊兄弟父子無及季札之賢者其父兄所為眷眷而欲立札公心也以其私意故夷齊讓國為得仁而先聖之所賢以其公心故季子辭位為生亂而春秋之所貶苟比毗志反而同之過矣或曰世衰道微暴行下孟反交作臣篡其君者有之子篡其父者有之季子於是焉而辭位則將使聞其風者貪夫亷爭夫讓而篡弒奪攘之禍損矣其於名教豈不有補何貶之深也曰春秋逹節而不守者也成十五子臧曰聖逹節次守節注聖人應天命不拘常禮昔太伯奔吳而不反季歷嗣位而不辭史周本紀太王三子長太伯次虞仲少子季歷季歷生昌有聖瑞太伯知太王欲立季歷以傳昌乃與虞仲亡如荆蠻以讓季歷鄭子美曰太伯讓而王季立此季札之家法也札當成其諸兄效始祖之讓而已自附于季歷以受國則吳亂弭矣武王繼統受命作周亦不以配天之業讓伯邑考官天下也檀弓文王舍伯邑考而立武王彼王僚無季歷之賢武王之聖而季子為太伯之讓豈至德乎使爭弒禍與覆音腹師喪息浪反國其誰階之也若季子之辭位守節立名全身自牧則可矣槩諸聖王之道則過矣中庸曰道之不明不行也我知之矣季子所謂賢且知過而不得其中者也使由於季歷武王之義其肯附子臧之節而不受乎襄十四諸樊將立季札札辭曰曹宣公之卒將立子臧子臧去之君子曰能守節有國非吾節也札雖不才願附于子臧以無失節惜其擇乎中庸失時措之宜爾此仲尼所以因其辭國生亂而貶之也或曰吳子使札與楚子使椒秦伯使術一例爾吳楚蠻方之國秦介西戎之間其禮未同于中夏故使疏吏反人之來皆略之而札何以獨為貶乎曰春秋多變例聖筆有特書荆楚無大夫而屈完書族僖四王朝下士以人通而子突書字莊六諸侯公子以名著而季友書子閎元母弟之無列者不登其姓名而叔肸書氏宣十七皆賢而特書者也季札讓國天下賢之若仲尼亦賢季札必依此例或以字或以氏或以公子特書之矣今乃略以名紀比於楚椒秦術之流無異稱焉是知仲尼不以其讓國為賢而貶之也噫世之君子盛稱季札之賢於讓國之際以為禮之大節不可亂也公子喜時春秋猶賢其後世昭二十年公羊傳曹公孫㑹自鄭出奔宋不言其畔為公子喜時之後諱也何賢乎喜時讓國也善善及子孫賢者子孫故為之諱也愚按喜時即子臧於季札則何獨貶之深也曰仲尼於季子望之深矣責之備矣惟與天地同德而逹乎時中然後能與音預於此非聖人莫能修之豈不信夫通㫖問先儒謂札讓位以召亂貶不稱公子然秦伯使術楚子使椒亦略之說者以三者皆蠻夷其禮未同於中夏是以于其使人之來略其官與族此說當否曰春秋有變例有特書謂三者皆蠻夷故略之是以死法觀春秋而不見聖人之用者也春秋史外傳心之書當以活法觀之默識心通㑹于言意之表斯得之矣或問太伯讓位失吳聖人以至德稱之季子辭位守節春秋以名責之何也曰太伯時中季子過中自衆人觀之過者為賢自道觀之過猶不及故褒貶如此或曰季子之節而見貶後之權廢立者將有奸名犯分託于賢否之說以濟其私欲而天下亂矣季子之處心積慮其在天下後世非計宗國之私一時之事也曰後之權廢立者如有夀夢之命諸樊餘祭夷末之勤勤于致國公子僚之不肖而季札之賢則非奸名犯分合于天下一國之公心矣不然苟欲濟其私欲是特篡弒攘奪之倫春秋之所誅而不以聼者也奚有賢否之說而可託哉張氏曰辭讓之心人皆有之至于義之所當受分之所當處而不得辭雖聖人不敢狥小節而以退讓為安舜禹之受天下季歷武王之受國皆擇乎時中當其可而居之者也季子者其父命之其凡讓之受之則父兄之意慊而國家安榮不受則父兄之命塞而適以長亂君子于此將何處而可哉况身為貴戚古之聖賢未有視社稷之安危若是恝者微子箕子比干之在商反覆詔告自靖自獻以求無愧于先王孔子曰殷有二仁焉蓋必若是而後心德始全而吾可以有辭于永世矣季子為其父之所立其兄之所屬違父兄之命而徒以潔身而去為髙觀宗國之危難僚與光之相殘賊若秦人視越人之肥瘠正夫子所謂果哉末之難矣者其復位而待之言曰非我生亂君子殆未之信也劉質夫之言得聖人之㫖矣愚按公榖謂春秋賢季札然書法無異于鬪越椒西乞術則非賢之之辭劉氏胡氏張氏謂春秋貶之非以聖人待之不如椒術也特以稱名而不稱族不稱氏不稱字曽不殊于椒術比于賢者之異稱則為貶爾聖人之意若曰季子有讓國之賢而未合于中庸春秋苟特筆而褒之則人將爭為過髙之行而不能與于時中之權也或者謂季子辭國于三十年之後春秋不當貶之于三十年之前今考夀夢已欲立季子諸樊之除喪又致國乎季子則季子之讓不待三十年之後使札為季歷則吳亂弭矣襄二十五年諸樊卒而餘祭立是年餘祭弒而夷末立則季札衛命來聘之時三兄皆讓國不從而迭立矣僚光之亂雖在三十年之後而致亂之由則在三十年之前也責備賢者之法安得不于其來聘而示意哉秋七月葬衛獻公齊景髙止出奔北燕燕于賢反北燕始見經左傳齊公孫蠆公孫竈放其大夫髙止于北燕髙止好以事自為功且専故難及之榖梁傳其曰北燕從史文也襄陵許氏曰君放大夫可也臣放大夫是無君也不可以訓故以出奔書也杜氏曰止髙厚之子北燕燕國薊縣張氏曰北燕嫗姓召公奭之後愚按國在今大都路大興縣古燕城冬仲孫羯如晉平左傳報范叔也戊景王午二年三十年晉平十五齊景五衛襄公惡元年蔡景四十九弒鄭簡二十三曹武十二陳哀二十六杞文七宋平三十三秦景三十四楚郟敖二吳夷末元年春王正月楚子郟敖使薳罷來聘薳干委反罷音皮公作頗後同左傳通嗣君也余氏曰且報朝也張氏曰魯以君行而楚以大夫聘此齊桓晉文所以行乎列國者故自宋之盟夷夏不辨楚人行霸主之禮于中國非晉平趙武之責而何哉王氏曰楚至此君臣之嗣與中國無異者夷狄盛强中國諸侯服役不暇矣夏四月蔡世子般弒其君固般音班左傳蔡景侯為太子般娶于楚通焉太子弒景侯家氏曰般之惡景之禍其積習有自來矣人莫不有義理之心貴華賤夷者所謂義理之心夫人所同也蔡與陳鄭本皆中夏之與國中間為楚所迫叛華即夷去來無常惟蔡自厥貉之㑹甘于從楚去而不復者七十有餘年染于商臣之俗積習蓋有自來趙主父為胡服而終有子禍去中國即入于夷狄入夷狄即胥為禽獸此理之必然也劉氏曰榖梁云其不日子奪父政是謂夷之非也向若書日者可遂云非奪父政乎又可云非夷之乎五月甲午宋災宋伯姬卒公榖伯姬上元宋字左傳或呌于宋太廟曰嘻嘻出出鳥鳴于亳社如曰嘻嘻甲午宋大災宋伯姬卒待姆也榖梁子曰取卒之日加之災上者見音現下同以災卒也伯姬之舍失火左右曰夫人少避火乎曰婦人之義傅姆音戊女師也不在宵不下堂遂逮乎火而死婦人以貞為行下孟反後同者也伯姬之婦道盡矣詳其事賢伯姬也易曰恆六五恆其德貞婦人吉夫子凶程子傳以順從為恆者婦人之道在婦人則為貞故吉若丈夫而以順從于人為恆則失其剛陽之正乃凶也而或以為共音恭下同姬女而不婦左傳非也世衰道微暴行交作女德不貞婦道不明能全其節守死不回見于春秋者宋伯姬耳聖人冠古玩反以夫諡據文姜敬嬴皆别為諡書于春秋曰葬宋共姬以著其賢行勵天下之婦道也安定胡氏曰伯姬乃婦人中之伯夷也襄陵許氏曰王化始于正家春秋撥亂謹禮以宋共姬為婦道之表故詳録焉劉氏曰使共姬避火而全生未足以害其貞也然而不以已之可以全其生之故而違天下之常義此安乎性命者乃能之故審乎死生之度辨乎榮辱之境知禮之重重于生辱之甚甚于死伯夷叔齊餓于首陽之下求仁得仁何以過乎左氏曰共姬女而不婦女待人婦義事也非也如共姬之守禮死義不求生以害仁亦可免矣反謂之不婦乎易曰恆其德貞婦人吉共姬恆之矣所謂婦也臨川吳氏曰蓋亦罪宋之子與臣不能救其君母使之逮乎火而死也愚按伯姬以成九年歸于宋共公成十五年共公卒嫠居三十有四年其年蓋六十矣火延其宫必待傳姆而後避固守婦節以及于死或者云傅姆宵出必有常處伯姬守常而不知變必逮于火以是為賢則嫂溺援之以手者非耶竊謂援溺之權乃丈夫變禮以救他人之死婦人越禮以貪生而免已之死則非義矣伯姬年邁六十雖曰避火全生未害其貞然君子之道過乎厚小人之道過乎薄春秋賢伯姬所以著其秉節不渝庶幾風厲千古使夫不當避而避以失節于造次顛沛之際者知所警也豈曰小補之哉天王景殺其弟佞夫公作年夫左傳初王儋季卒其子括將見王而歎單公子愆期為靈王御士聞其歎而言曰烏乎必有此夫入以告王且曰必殺之不戚而願大視躁而足髙心在他矣王曰童子何知及靈王崩儋括欲立王子佞夫佞夫弗知儋括圍蒍逐成愆成愆奔平畤尹言多劉毅單蔑甘過鞏成殺佞夫括瑕廖奔晉書曰天王殺其弟佞夫罪在王也榖梁傳諸侯且不首惡况于天子乎君無忍親之義天子諸侯所親者唯長子母弟耳天王殺其弟佞夫甚之也孫氏曰春秋之義天子得専殺故二百四十年無天王殺大夫文此言殺其弟佞夫者景王不能容一母弟不可不見也吕氏曰言殺其弟無親親之恩也張氏曰王者之道親親而及天下則治有序别嫌疑以明賞罰則政有經周景王初立儋括謀亂而免佞夫不知而死所厚者薄本心亡矣所以終欲出嫡立庶而致子朝之亂也臨川吳氏曰象欲殺舜而舜封之為諸侯仁人之于弟蓋如此儋括為亂佞夫實不知謀而尹劉諸人乃殺佞夫書王殺者罪王不能免其弟也陳氏曰凡王殺不書雖王子不書甚者母弟亦不書必殺無罪也而後書王子瑕奔晉臨川吳氏曰瑕天王之子蓋亦與聞乎儋括之謀括事敗而佞夫見殺瑕懼及禍而奔晉瑕不能明為子事父之孝而自比于逆亂之黨蓋逆子也奔以逃死而自絶于父有罪而奔不可復入與王子朝奔楚同故不言出愚按瑕朝皆為逆亂無所容身避罪逃竄非居祿位而出奔如國滅之君與在外之臣故不言出而止言奔秋七月叔弓如宋平葬宋共姬共姬上公榖無宋字公羊傳外夫人不書葬此何以書隱之也宋災伯姬卒焉其稱諡何賢也宋災伯姬存焉有司復曰火至矣請出伯姬曰不可吾聞之也婦人夜出不見傅母不下堂傅至矣母未至也逮乎火而死榖梁傳外夫人不書葬此其言葬何也吾女也卒災故隱而葬之也杜氏曰共姬從夫諡也叔弓叔老之子卿共葬事禮過厚陸氏曰為災而死髙其志行使卿往㑹所以書之薛氏曰古者夫人無諡從夫之諡東遷之後其制隳矣共姬執禮而死宋人不敢加非禮之諡一人守正知天下莫之違矣鄭簡良霄出奔許自許入於鄭鄭人殺良霄左傳二十九年鄭伯有使公孫黑如楚辭曰楚鄭方惡而使余往是殺余也伯有曰世行也子晳曰可則往難則已何世之有伯有將强使之子晳怒將伐伯有氏大夫和之鄭大夫盟于伯有氏三十年鄭伯有耆酒為窟室而夜飲酒擊鐘焉朝至未巳朝者曰公焉在其人曰吾公在壑谷皆自朝布路而罷既而朝則又將使子晳如楚歸而飲酒子晳以駟氏之甲伐而焚之伯有奔雍梁醒而後知之遂奔許鄭伯及其大夫盟于大宫盟國人于師之梁之外伯有聞鄭人之盟已也怒聞子皮之甲不與攻已也喜曰子皮與我矣晨自墓門之瀆入因馬師頡介于襄庫以伐舊北門駟帶帥國人以伐之伯有死于羊肆書曰鄭人殺良霄不稱大夫言自外入也榖梁傳不言大夫惡之也按左氏良霄汰侈嗜酒諸大夫皆惡烏故反之而與公孫黑爭黑因其醉伐之良霄奔許自許襲鄭以伐公門弗勝死於羊肆不言復入者其位未絶也若宋魚石成十八晉欒盈襄二十三去國三年其稱復入位已絶矣不言叛者將以滅國非直叛也若華户化反亥之入南里昭二十一宋辰之入蕭定十一其書叛者皆據土背音佩君以自保未有滅國之謀也不言殺其大夫者非其大夫矣討賊之詞也張氏曰良霄之出公孫黑蓋有罪焉春秋舍黑専伐之罪而罪良霄何也伯有之所為有喪家亡身之道焉雖微公孫黑其能免于死乎既亡而不自省又入伐君而大亂其國此春秋所以正名以討賊之辭也春秋于喪國失家者皆不書所逐之人以明其身之有罪使有國有家者兢兢自謹而求所以反身自修之道則奔亡之禍逺矣冬十月葬祭景公劉氏曰榖梁云不日卒而月葬不葬者也卒而葬之不忍使父失民于子也非也凡不書葬者豈失民之謂乎愚按公羊云賊未討何以書葬君子辭也說者以為弒父恥重為中國諱夫既明書世子弒君又曰諱之可乎晉平人齊景人宋平人衛襄人鄭簡人曹武人莒犂比人邾悼人滕成人薛人把文人小邾穆人㑹于澶淵宋災故左傳為宋災故諸侯之大夫㑹以謀歸宋財叔孫豹㑹晉趙武齊公孫蠆宋向戌衛北宫他鄭罕虎及小邾之大夫㑹于澶淵書曰某人某人㑹于澶淵宋災故尤之也不書魯大夫諱之也程子傳左氏傳叔孫豹㑹晉趙武而下諸國之卿既貶魯卿諱而不書春秋大法君弒而賊不討則不書葬公榖隱十一年況世子之於君父乎蔡景公何以獨書葬遍刺七賜反譏也下同天下之諸侯也葬送之禮在春秋時視人情之疏密而為之者也有嘗同盟卒而不赴者蔡莊公甲午于齊于薄踐土翟泉四同盟文十五年卒不書有雖同姓赴而不㑹者莊二十五年衛惠公卒宣九年衛成公卒僖九年晉獻公卒二十四年晉惠公卒十四年蔡穆公卒三十二年鄭文公卒成六年鄭悼公卒襄二年鄭成公卒隱七宣九成十六年三書滕君卒皆不葬則以哀死而致襚音遂為輕弔生而歸賻音附為重必矣今蔡世子般弒其君藏在諸侯之策而往㑹其葬是恩義情禮之篤於世子般不以為賊而討之也人之所以異於禽獸者以其天理之常存耳以其有父子之親君臣之義耳世子弒君是誠為禽獸之不若也而不知討豈不廢人倫滅天理乎故春秋大法君弒賊不討則不書葬而蔡景公特書葬者聖人深痛其所為遍刺天下之諸侯也魯隱宋殤之賊不討則不書葬蔡景公賊亦不討而特書葬猶閔僖二公不承國於先君則不書即位桓宣篡弒以立而反書之也春秋君弒賊不討而書葬者惟蔡景公許悼公皆世子殺君然許止但不嘗藥非真弒君者故特書葬以減其罪蔡般罪大惡極而諸侯不討故春秋書葬且貶㑹澶淵之大夫而書宋災故所以深著其不能討賊也何以知聖人罪諸侯之意如此乎以下文書㑹于澶淵宋災故而貶其大夫則知之矣朱子語程子所謂春秋大義數十如成宋亂宋災故之類乃是聖人直著誅貶李氏集義書宋災故起大夫為㑹之意亦猶桓二年書以成宋亂二百四十二年之間列㑹亦衆而未有言其所為者本公榖此獨言其所為何遍刺天下之大夫也劉氏曰㑹未有言其所為者此其言所為何晉人與諸侯十二國之大夫㑹于澶淵凡為宋災故謀之也曰更宋之所喪雖死者不可復生其財復矣非務也何言乎非務蔡侯弒其君而不謀宋災而謀之微矣夫災雖諸侯所當救然而一時之變一國之禍也財足以周其乏粟足以濟其用則已矣非所以為天下之憂也彼天下之憂者臣弒君子弒父如是則夷狄矣雖有粟吾得而食諸故孔子論天下之信則曰寧去食論陳恆之變則曰請討之其察于道之輕重緩急大小先後也審矣豈以姑息愛人哉大夫以智帥人者也智者無不知當務之為急不能三年之喪而緦小功之察放飯扶晚反流啜昌恱反而問無齒决是之謂不知務蔡世子般弒其君天下之大變人理所不容也則㑹其葬而不討宋國有災小事也則合十二國之大夫更音庚下同宋之所喪息浪反下同而歸其財則可謂知務乎陳恆弒簡公哀十四孔子沐浴而朝告于哀公請討之公曰告夫三子者子曰以吾從大夫之後不敢不告也之三子告不可子曰以吾從大夫之後不敢不告也叔孫豹晉趙武而下皆諸侯上卿執國之政者也三綱國政之本至於淪絶無父與君是禽獸也禽獸逼人雖得天下弗能一朝處矣昔者伯禹過門而不入放龍蛇也周公坐而俟旦驅猛獸也今世子弒君三綱淪絶禽獸逼人則與之同羣而不恤有國者不戒於火自亡其財苟其來告弔之可也則合十二國之大夫駐于澶淵而謀更其所喪尚為知類也乎夫蔡之亂其猶人身有腹心之疾而宋之災譬諸桐梓與雞犬也謀宋災而不恤蔡之亂奚啻於養桐梓求雞犬不顧其身有腹心危疾而不知療者哉以為未之察也可謂不智苟察此而不謀則亦不仁矣是故諸國之大夫貶而稱人魯卿諱而不書又特言㑹之所為以垂戒後世其欲人之自别筆列反於禽獸之害也可謂深切著明矣或曰夫穆叔趙孟向舒亮反戌音恤子皮皆諸侯之良也而所謀若是何也世衰道微邪說交作以利害謀國家而不知本於仁義也久矣是以至此極孔子所為于僞反懼春秋所以作乎文集澶淵之㑹書宋災故此乃春秋誅亂臣討賊子例中之變例其尤大者也蔡景公賊不討郤書葬與正卒者同正如桓宣與聞乎故特書即位與承國者等也其義則內貶魯君遍刺天下諸侯誅其黨附惡逆之罪也世子弒君在楚商臣自是夷狄五别作一等待之若蔡般之弒左氏所載其事甚明正所謂禽獸逼人人將相食諸侯既不討而又往㑹其葬乃與禽獸同羣而不避其吞噬也火之為災亦常變耳為是故㑹十一國大夫謀歸其財而不謀蔡人弒父與君之大變以弒逆則不恤以火災則恤之是治無名之指而失其肩背可謂知乎書宋災故而諸國之卿皆貶魯卿諱而不書遍刺天下之大夫理極分曉無可疑者只為後人不知書葬之義便以為般寶非弒而以弒罪加之如許止之例豈不掩晦仲尼討賊條法劉質夫只據左氏信固是緊要然施于此卻無意味程子見得便别只云諸國之卿既貶魯卿諱而不書使人自看取其㫖妙矣王氏曰葬蔡景公當時之事也聖人則存而不削書災故春秋之文也聖人則表而出之張氏曰父子君臣之變自文元年楚以商臣書此猶蠻荒之事也及是年蔡以中國之臣子為之而魯㑹其葬晉合諸侯而所恤者宋之火災而已故于此章三致意焉既變例書蔡景之葬又人諸侯之大夫而諱魯卿又特書曰宋災故而憫中國之胥為亂賊此比事屬辭之所以為春秋也盟㑹之書其故者有二以稷考之則澶淵之所貶非為宋財之無歸明矣家氏曰或謂蔡屬于楚非中國諸侯之責曰蔡諸姬也安可與荒逺小國從夷狄者同日語乎晉人苟能仗大義而討蔡則足以愧楚而服中國諸侯之心舍此不為乃致楚䖍特為異日滅蔡之兵端晉君臣愚亦甚矣劉氏曰左氏云謀歸宋財既而無歸故不書其人非也失信者如清丘之盟直貶其人而已矣今獨舉其事又貶其人非特惡失信而已也公羊云録伯姬也此大事曷為使微者卿也其稱人卿不得憂諸侯也亦非也諸侯相聚而更宋之所喪何大事之有大夫受君命以出是諸侯耳何必其非諸侯之命乎榖梁云此善之也不言災故則無以見其善也其曰人何也救災以衆亦非也一國失火自焚其財小事耳諸侯何至羣聚而謀之乎以此為善是春秋貴小惠而不貴道也且宋以五月失火諸侯以冬㑹澶淵是可謂救災乎已景王未三年三十有一年晉平十六齊景六衛襄二蔡靈公般元年鄭簡二十四曹武十三陳哀二十七把文八宋平三十四秦景三十五楚郟敖三吳夷末二春王正月夏六月辛巳公薨于楚宫左傳公作楚宫穆叔曰太誓云民之所欲天必從之君欲楚也夫故作其宫若不復適楚必死是宫矣公薨于楚宫榖梁傳楚宫非正也杜氏曰公適楚好其宫歸而作之不居先君之路寢而安所樂失其所也薛氏曰楚宫别宫也小寢猶非正也况别宫乎襄陵許氏曰公還自楚不能增修德政而反勤民傷財務作楚宫公之志亦荒矣其何振之有又况變夏從夷亂國經常所以為不祥之道也秋九月癸巳子野卒左傳立胡女敬歸之子子野次于季氏九月癸巳卒毁也立敬歸之娣齊歸之子公子稠穆叔不欲曰太子死有母弟則立之無則立長年鈞擇賢義鈞以卜古之道也非適嗣何必娣之子且是人也居喪而不哀在戚而有嘉容是為不度不度之人鮮不為患若果立之必為季氏憂武子不聼卒立之比及葬三易衰於是昭公十九年矣猶有童心君子是以知其不能終也榖梁傳子卒日正也子般音班子赤弒而書卒子野過毁亦書卒何以别筆列反乎曰閔公內無所承不書即位則子般之弒可知莊三十二下書夫人姜氏歸于齊上書公子遂叔孫得臣如齊赤之卒也隱而不日則子赤之弒可知文十八與子野異矣子野有命立昭公故穆叔雖不欲而不能止也孫氏曰子野襄公太子未逾年之君也名未葬也不薨不地降成君也杜氏曰不書葬未成君愚按居喪毁瘠不形者先王之禮也毁不滅性者先王之教也故不勝喪者比于不慈不孝子野過哀毁瘠以致滅性亦不子矣己亥仲孫羯卒羯居竭反孟孝伯也子貜嗣為大夫是為僖子冬十月滕子成來㑹葬諸侯始親來㑹葬杜氏曰諸侯㑹葬非禮襄陵許氏曰先王之制諸侯之喪士弔大夫送葬滕子㑹葬非禮也陳氏曰改葬惠公也衛侯來㑹葬隱公不見春秋之初魯猶秉禮也晉景公之喪成公弔焉亦已卑矣晉于是止公使送葬諸侯莫在魯人辱之雖霸主未有君㑹葬者也葬楚康王也公及陳侯鄭伯許男送于西門之外則天下諸侯有㑹葬于楚者矣於是滕子㑹葬于魯是春秋之季也㑹葬猶可奔喪甚矣家氏曰魯君未嘗㑹天王之葬而滕君來㑹魯葬滕之來魯之受皆貶也癸酉葬我君襄公十有一月莒人弒其君密州程子傳莒子虐國人弒之而立展輿展輿非親弒也故書國人經以傳秫戀反為案傳有乖繆則信經而棄傳可也程子傳春秋傳為案經為斷以傳考經之事迹以經别傳之真僞若密州之事是矣左氏稱莒子犂比公生去起吕反疾及展輿既立展輿又廢之莒子虐國人患之展輿因國人以攻莒子弒之乃立去疾奔齊信斯言則子弒其父也而春秋有不書乎故趙匡纂例謂其文當曰展輿因國人之攻莒子弒之乃立而後來傳寫誤為以字爾左氏博通諸史叙事尤詳能令力呈反後人得見本末因以求意經文可知而門弟子轉相傳受日月既久浸失本真如書晉趙盾許世子止等事詳考傳之所載以求經之大義可也而傳不可疑如莒人弒其君密州獨依經之所言以證傳之謬誤可也而傳不可信或問左氏可信否程子曰不可全信信其可信者耳盡以為可疑而廢傳則無以知其事之本末盡以為可信而任傳則經之𢎞意大㫖或泥乃計反而不通矣要一遙反在學者詳考而精擇之可也家氏曰左氏云書莒人之弒其君言罪之在也置其子之大惡歸過于其父春秋必不然蓋犂比公虐國人作亂而弒之展輿既廢于父而見立于國人使展輿能討賊于既立之後庶乎可免矣文十六年傳稱國人以弒者國人之所欲弒也春秋胡傳附録纂疏卷二十三
