body:
  text: 春秋胡傳附録纂疏卷首上元汪克寬撰序古者列國各有史官晉董狐齊大史楚倚相之類朱子語薛士龍曰魯隱初僣史殊不知周官所謂外史合四方之志便是四方諸侯皆有史諸侯若無史外史何所稽考而為史如古人生子則閭中書之且二十五家為閭閭尚有史况一國乎掌記時事春秋魯史爾杜氏曰春秋者魯史記之名也史之所記必表年以首事年有四時故錯舉以為所記之名也仲尼就加筆削周禮築氏為削注即書刀未有紙筆以刀削之因名刀曰削愚按左傳襄二十七年宋左師請賞公與之邑子罕削而投之蓋古用竹簡有所刪定則削其書也乃史外傳心之要典也啖氏曰雖因舊史酌以聖心愚按文定傳心之説發先儒所未發朱子謂心者人之神明所以具衆理而宰萬物春秋一經於禮文則或因或革於事實則或豫或奪皆出乎聖心之權制讀是經者可以窮理可以斷事豈非傳心之要典也哉不然則春秋不過一國之史而夫人皆可為春秋矣而孟氏發明宗旨目為天子之事者周道衰微乾綱解紐亂臣賊子接迹當世人欲肆而天理滅矣仲尼天理之所在不以為己任而誰可五典弗惇己所當敘五禮弗庸己所當秩五服弗章巳所當命五刑弗用已所當討愚按矢者理之所自出唯聖人則稟夫天理之全故天敘有典唯聖人能敘之天秩有禮唯聖人能秩之天命有德唯聖人能命之天討有罪唯聖人能討之孔子雖不得位然假春秋以寓王法實行天子之事也故曰文王既沒文不在茲乎天之將喪去聲斯文也後死者不得與音預於斯文也天之未喪斯文也匡人其如豫何聖人以天自處敞呂反陵放此茅堂胡氏通旨或疑聖人以天自處之言曰昔明道先生嘗粟此事云於天之未喪斯文之卞便言匡人其如豫何分明是以天自處蓋聖人德盛發此等語自不覺爾此言甚有味也仲尼語子貢云豫欲無言直説破了何疑之有斯文之興喪在已而由人乎哉故曰我欲載之空言不如見賢遍反諸行事之深切著陟慮反後放此明也見春秋緯空言獨能載其理行事然後見其用是故假魯史以寓王法史儒林傳作春秋以當王法撥治也亂世反之正本公羊傳敘先後之倫而典自此可惇愚按春秋書王正月書夭王書公即位書公在之類所以敘君臣之倫書王世子子同生書列國世子之類所以敘父子之倫書王后王姬魯夫人魯女之類所以敘夫婦之倫書弟佞夫弟叔肸弔年兄縶之類所以敘兄弟之倫書列國邦交紀諸侯大夫屢盟之失信所以敘朋友之倫秩上下之分扶問反而禮自此可庸愚按上下之分尊卑貴賤等級隆殺也春秋書郊禘雲社之類所以明吉禮之分書崩薨卒葬含賵禭賻所以明凶禮之分書朝聘會盟遇至所以明賔禮之分書侵伐戰克搜狩城築軍賦之類所以明軍禮之分書納幣逆送媵致之類所以明嘉禮之分有德者必褒而善自此可勸如字子突季子之類嘉有罪者必貶而惡自此可懲如名宰咺削翬氏之類文定文集春秋之法治姦惡者不以存殁必施其身所以懲惡奬忠善者及其子孫逺而不泯所以勸善其志存乎經世本莊子其功配於抑洪水膺戎狄放龍蛇驅虎豹本孟子其大要則皆天子之事也文集仲尼筆削春秋見諸行事以示聖人之用蓋人君南面之術人臣謀王體斷國論之凖繩也故曰知我者其惟春秋乎罪我者其惟春秋乎知孔子者謂此書遏人欲於橫流橫去聲存天理於既滅為去聲後世慮至深逺也罪孔子者謂無其位而託二百四十二年南面之權使亂臣賊子禁其欲而不得肆則戚矣説文戚憂也書戚我先王即懼字之意是故春秋見諸行事非空言比也公好惡並去聲則發乎詩之情文集以詩考之將仲子言大叔失道而公弗制叔于田言多才好勇不義而得衆疑若罪在段也及至春秋書曰鄭伯克段于鄢然後知莊公志殺其弟無親親之道其罪乃不可掩矣清人之序言髙克好利而不顧其君其詩言左旋右抽中軍作好疑若罪在克也及至春秋書曰鄭棄其師然後知文公之不君二三執政之不臣危國亡師之本責乃有所歸矣觀文薑孫于齊則河廣之詩可讀恩義之輕重可權矣觀戎伐凡伯于楚丘以歸則式微旄丘之篇可信衛為戎狄所滅之由可考矣凡此類皆所謂發乎詩之情者也酌古今則貫乎書之事文集唐虞禪夏后殷周繼此古書所紀帝王之大節也春秋兼帝王之道賢可與則以天下為公而不必於繼出之禮故季札來聘不稱公子貶辭國之非也子可與則以天下為家而不必於禪國之義故文薑始入即書于䇿明立嫡之重也堯典稱有鰥在下曰虞舜則堯舜者其名耳曰頑曰嚚曰傲又其父母昆弟也然虞氏史官直書其君之名而不避載其父母昆弟之惡而不隱也周人以諱事神於是乎有諡法及至末流忌諱煩而名實亂矣春秋協文質之中於莊公名同而書同盟僖父名申而書戊申襄公名午而書甲午故薨不死滅國稱取出奔書孫不隱其實既以從虞史之質致婉其詞又以倣周道之文凡此類皆所謂貫乎書之事者也興常典則體乎禮之經趙氏曰春秋之指大要二端而已興常典也著權制也文集莫尊於君非人臣之可召書天王狩于河陽以嚴君臣之分莫重於世子非三公冢宰之可班書會王世子于首止以示儲副之崇莫正於嫡夫人非衆妾之可僣書歸賵書考宮皆稱仲子以著嫡妾之别莫親於冢嗣非嬖孽之可匹書晉人納捷災于邾弗克納以明長糿之序凡此類皆所謂興常典以體乎禮之經者也本忠恕則導乎樂之和文集紀兵則以救人為善書戰則以受伐者為主齊桓退師禮楚則書盟于召陵以序其績晉悼納斥候禁侵掠則書會于蕭魚以美其信凡此類皆所謂本忠恕則導乎樂之和者也著權制則盡乎易之變文集建子周人之正朔而書春王正月以行夏之時司盟玉府周官之司屬而悉惡會盟以善胥命之正大道為公外户不閉也而書滅下陽城虎牢戒王公設險之不可忽君先臣從人道之大倫也書晉人執虞公齊侯取鄆昭公圍成以明社稷之無常奉凡此類皆所謂著權制以盡乎易之變者也百王之法度萬世之凖繩皆在此書故君子程子以謂五經之有春秋猶法律之有斷都亂反例也學是經者信窮理之要矣愚按春秋紀事大而天地日星人倫邦國小而宮室器幣草木禽蟲凡天下萬物之理無不具焉能通是經則理無不窮矣故揚子曰説理者莫辨乎春秋不學是經而處大事決大疑能不惑者鮮上聲矣自先聖門人以文學名科如遊夏户雅反凡非春夏之夏放此尚不能贊一辭史世家孔子聽訟文詞有可與人共者弗獨有也至於為春秋筆則筆削則削遊夏之徒不能贊一詞蓋立義之精如此去聖既逺欲因遺經窺測聖人之用豈易能乎然世有先後人心之所同然一爾愚按天理之在人心窮天地亘古今而不滅好善而惡惡天下之同情非可以私變是亦非可以私惡非茍得其所同然者雖越宇宙若見聖人親炙之也而春秋之權度在我矣愚按權然後知輕重度然後知長短二百四十餘年之事紛錯乎前惟在吾心之權度有以處其是非當否且善惡之顯然者人人知之其間嫌疑近似及意之始萌幾之未著者茍非灼見聖人之心則亦安能讀聖人之經而測聖人之用哉文定此語非真見夫子之心不能及此近世推隆王氏新説按為國是王安石有國是論以春秋為斷爛朝報獨於春秋貢舉不以取士宋鑑熙寧四年中書定科舉法舉人各占治詩書易周禮禮記一經庠序不以設官同上熙寧六年馬敦禮乞立春秋學官不許上謂安石曰卿嘗以春秋自魯史亡其義不可考故未置學官敦禮好學不􅌒第未知此意耳經筵不以進讀斷國論者無所折衷陟仲反天下不知所適人欲日長展兩反天理日消其效使禍亂相仍莫之遏也噫至此極矣仲尼親手筆削撥亂反正之書亦可以行矣天縱聖學崇信是經乃於斯時奉承詔旨輒不自揆謹述所聞為之説以獻雖微辭奧義或未貫通然尊君父討亂賊闢邪説正人心用夏變夷大法略具庶幾音機聖王經世之志小有輔云愚按文定作傳當宋髙宗南渡之初是時徽宗欽宗及二后被幽於金國遭戮辱不可勝紀而髙宗信任秦檜之姦偷安江左一隅忘君父大讎不敢興兵致討反與之議和講好下拜稱藩既無外攘之計又乏內修之備君臣父子上下內外大義之不明莫此為甚是以此傳専以尊君父討亂賊為要旨而春秋之大法實以斯為重也是書以紹興六年投進髙宗覽之曰安國明於春秋之學凡諸儒所得尤邃越二年文定卒賜詔曰安國所進春秋解義著一王之大法朕朝夕省覽以考治道方欲擢用遽聞淪亡可撥賜銀帛三百兩匹令湖南監司應副葬事賜田十頃以給其孤竊謂髙宗既知嘉獎文定所著春秋傳而不能少用其言進君子退小人討賊復讎以雪君父母兄之恥得非説而不繹從而不改者歟論名諱劄子臣昨列職經筵專以春秋進讀緣春秋正文有淵聖御名欽宗名桓方具奏劄未及進稟得罪去國後聞禮官建議以他字易之定讀為威其經傳本字即不改易事已施行臣今奉旨纂修於經傳本字既有詔令可遵即未委臣所纂修出於已見援引他經子史有犯淵聖御名者亦許依本字書寫或當遷避有此疑惑臣聞古者不以名為諱堯典稱有鰥在下曰虞舜則堯舜者固二帝之名而堯典乃虞氏史官所作直載其君之名而不避也舜典咨九官以君命臣而皆稱名則禹亦夏王之名夏書禹貢稱禹敷土禹錫玄圭亦無諱避周人以諡易名於是有諱禮然臨文不諱周書武成稱周王發康王之誥稱一人釗大誥稱大歷服洪範稱邦其昌冏命稱發號施令皆國史稱先王之名而不諱惟金縢稱元孫某乃周公為祝詞告廟之文周人諱名昉見於此夫子父名紇春秋書臧孫紇嫌名不諱武王名發詩人言黃髮兒齒康王釗之孫諡昭王君牙言昭乃辟二名不偏諱平王名宜臼春秋書楚宜申宋杵臼僖王名胡齊春秋書胡子書齊侯頃王名壬臣春秋書楚壬夫宋王臣靈王名泄心春秋書泄冶樂大心魯隱公名息姑而書晉荀息曹射姑閔公名啓方而書城啓陽星孛東方夫子母名徴在論語記夫子言杞宋不足徴告師冕某在斯載在禮律上三句見曲禮其義明白孔子作春秋凡書周魯事雖婉其文至於名諱並依本字若襄王名鄭而書衛侯鄭正王名班而書曹伯班簡王名夷而書晉侯夷恭王名丐而書晉士丐桓王名林而書陳侯林莊王名他而書陳他悼王名猛而直書曰猛文定以匡王為正王敬王為恭王避宋太祖及翼祖諱莊公名同而書同盟于幽僖公名申而書戊申朔襄公名午而書陳侯午定公名宋而書宋仲幾是也成公名黑肱而書黑肱以濫來奔按春秋書成當恭王之朝哀公之世丐乃恭王之名也夷即三世之穆也宋即哀公之考也午即皇考曾祖之廟諱也而筆削之際並無回避春秋為尊君父而作仲尼豈不恭者書法如此義亦可知自漢以來此義不行臣子習為諂諛而不知恭順之實則有易人之名以徹為通者漢武帝名徹故漢書改蒯徹為蒯通易人之姓以莊為嚴者漢明帝名莊故漢書改莊助為嚴助莊光為嚴光易甲乙之紀以丙為景者唐髙祖父元帝名眪故唐史紀甲子皆以丙為景韓文羅池廟碑稱景辰廟成易郡縣之號以還淳為青溪者唐憲宗名淳故嚴州淳安縣改名青溪又其甚則有父名晉肅而子不敢應進士舉者韓文諱辨李賀父名晉肅賀不得舉進士忌諱既繁名實愈亂本朝沿襲漢唐故事未暇盡革恭惟陛下天縱聰明既尊春秋之書以新聖德宜用春秋之法以斷政事凡所施設動以春秋從事即有撥亂反正之功臣所纂修繕寫進本援引他經子史之類欲乞應犯聖朝廟諱不可遷避者依太常博士王晢所進春秋解例並依監本空缺點畫於淵聖御名亦不改易本字覆以黃紙庶幾名實不亂上遵春秋之法亦以消臣子諂諛之端向孟軻氏欽王之義孟子本云敬王亦避宋諱作欽明恭順之實取進止進表伏觀春秋二百四十二年其行事備矣仲尼因事屬詞深切著明非五經比也本夫周室東遷禮樂征伐自諸侯出及平王未年王迹既熄故春秋作於隱公之初逮莊僖而下五霸迭興愚按五霸之稱不同趙歧注孟子曰齊桓晉文宋襄秦穆楚莊杜預注左傳曰夏昆吾商大彭豕韋周齊桓晉文而趙説附見荀子王伯篇曰齊桓晉文楚莊吳闔閭越勾踐史記周本紀平王之時周室衰微諸侯強并弱齊楚秦晉始大政由方伯十二諸侯表政由五伯晉阻三河齊負東海楚介江淮秦因雍州之固四國迭興更為霸主司馬貞注五伯興趙歧同漢書異姓諸侯王表適戍強於五伯師古曰五伯謂昆吾大彭豕韋齊桓晉文諸侯王表衰則五伯扶其弱師古注此五伯謂齊桓宋襄晉文秦穆吳夫差地理志春秋時五伯迭興師古曰此五伯齊桓宋襄晉文秦穆楚莊今考史記楚世家昆吾夏之時嘗為侯伯桀之時湯滅之彭祖氏殷之時嘗為侯伯殷之未世滅彭祖氏左傳范宣子曰昔丐之祖在商為豕韋氏在周為唐杜氏杜注殷末豕韋國於唐周成王滅唐遷於杜為杜伯輔漢卿謂齊桓必非創始為之然則論三代時五伯杜説似有所據然賔媚人言四王之王五伯之伯孟子言五伯三王之罪人又曰五伯桓公為盛則五伯當出於三王之後據趙岐之説則宋襄圖霸未成盂之會楚人執之如戲嬰孩泓之戰兵敗身傷不可謂之伯史記稱秦穆公益國十二開地千里天子使召公過賀穆公以金鼓而春秋狄於殽人於焚舟之役未見成伯之迹楚莊僣王猾夏尤不可以伯稱之據荀卿稱闔閭句踐顔師古紀夫差則國佐不當言五伯朱子注孟子亦存趙岐杜預二説今文定謂莊僖而下五伯迭興會北杏傳謂齊桓而後宋襄晉文楚莊秦穆交主夏盟則亦據趙説而傳中未嘗許宋襄秦楚之伯則又非如諸儒拘拘於趙説也要之孔孟止稱桓文孟子雖言五伯未詳其目榖梁但稱二伯説春秋者只當論齊晉之伯耳假仁義而行以推戴宗周為天下之共主愚按論假仁義則五伯皆然論尊周則惟齊桓定襄王晉文納襄王又致王于踐土以諸侯見若宋襄秦穆來見其有尊周之迹楚莊觀兵問鼎僣悖尤甚考乎晉之嗣伯則襄公朝王厲公以諸侯朝京師三假王命以伐鄭定公城成周會諸侯于召陵侵楚以討其納子朝之罪此言五伯皆尊周非指宋襄秦穆楚莊蓋亦大略言之耳下文推本孟子其文則史其義則竊取之矣得非專指桓文而言乎號令征伐莫敢不從其文則史官稱述無制作之法其義則以尊周為名而仲尼固曰丘竊取之矣霸德既衰諸侯放恣政在大夫専權自用桓文伯業既衰文元年公孫敖會晉侯于戚二年公孫敖及晉士縠會諸侯盟垂隴三年叔孫得臣會諸侯之師伐沈自是而後成二年魯四卿會晉衛曹大夫敗齊于鞍十五年叔孫僑如會諸侯大夫會吳于鍾離襄元年圍彭城二年城虎牢凡會盟征伐之大役皆大夫為之至襄十六年溴梁之役諸侯皆在而大夫自盟是後十三國伐秦及城杞城成周與于宋虢之大會莫非大夫矣官及失德寵賂益章楊楯私獻而樂祈見執衛貢不歸而趙鞅首叛荀寅求貨弗得則辭蔡人而失諸侯意如納賂於范鞅則昭公客死而莫返此皆大夫專政賄賂公行之故也然後陪臣執國命南蒯以郈叛陽虎専魯國囚季桓子取寶玉大弓於公宫晉佛肸以中牟叛此皆家臣擅權者也吳楚制諸夏昭定哀之間楚靈王弒君而立大會十三國之君于申而用齊桓召陵之禮諸侯之賢如向戌子産皆獻禮焉執徐子戮慶封伐吳滅賴懷強有天下之志靈王既殞平王嗣位封陳蔡而専興滅繼絶之功及楚勢既衰吳闔閭為蔡伐楚三戰及郢幾滅楚國夫差橫行中夏徴魯百牢伐魯為城下之盟伐齊戰于艾陵會黃池主中國之會盟與晉爭長此皆中國無伯而吳楚盛強之迹也皆馴致其道是以至此極耳仲尼德配天地明並日月家語所謂聖者德合於天地明並日月自以無位與時道不行於天下也制春秋之義見音現諸行事垂訓方來雖祖述憲章上循堯舜文武之道如紀元年用周正之類而改法創制不襲虞夏商周之迹如正次王王次春及有年紀異之類蓋洪水滔天下民昏墊與簫韶九成百獸率舞並載於虞書堯典帝曰湯湯洪水方割浩浩滔天下民其咨舜典夔曰於豫擊石拊石百獸率舞益稷禹曰洪水滔天下民昏墊夔曰簫韶九成鳯凰來儀云云百獸率舞大木斯拔與嘉禾合穎金縢天大雷電以風禾盡偃大木斯拔小序唐叔得禾異畝同穎獻諸天子鄙我周邦與六服承德大誥殷小腆誕敢紀其敘天降威知我國有疵民不康曰豫復反鄙我周邦周官惟周王撫萬邦六服羣辟罔不承德同垂乎周史此上世帝王紀事之例至於春秋則凡慶瑞之符禮文常事皆削而不書而災異之變政事闕失則悉書之以示後世通旨削去禎祥獨書災異此仲尼創立前古所無也使天下後世杜諂諛之端而上畏天變常有恐懼修省之意也夫易驕而難降易縱而難止易亡而難存者心也觀慶祥之符則人心所恱樂而縱之所由起也故春秋皆削之愚按二百四十二年他公豈無有年而不書惟桓宣有年紀異則書之僖公修泮宮復閟宫皆不書而日星雨電霜雪氷雹山地水火之變禽獸螽螟草木之異悉書于策於魯書公孫于齊於周書王室亂皆存而弗削使鑒觀天人之理有恐懼祗肅之意若事斯語論語顔淵仲弓請事斯語若書諸紳同上子張書諸紳若列諸座右若几杖盤盂之有銘有戒大戴禮武王受師尚父丹書之戒曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶退而為戒書於席之四端及鑑盤楹几杖帶履屨觴豆户牖劒弓矛皆為銘焉乃史外傳心之要典於以反身日加修省及其既久積善成德上下與天地同流自家刑國措之天下則麟鳯在郊龜龍遊沼其道亦可馴致之也故始於隱公止於獲麟而以天道終焉本文仲子比於關雎之應而能事畢矣范氏曰詩終於麟趾春秋終於獲麟書火於秦賴諸儒口相傳授隋經籍志遭秦滅學口説尚存及漢初興張子房為韓滅秦前張良傳其先五世相韓秦滅韓良以家財求客刺秦王為韓報仇得力士為鈇椎重百二十斤始皇東遊至博浪沙中良與客擊秦皇誤中副車後以兵法説漢高帝遂滅秦以明春秋復讎之義三老董公請漢為義帝發喪以暴項羽弒君之惡前初髙帝與項梁共立楚懷王孫心為義帝項羽使殺義帝於彬漢王至雒陽三老董公遮説曰項羽無道放殺其君天下之賊也夫仁不以勇義不以力三軍之衆為之素服以告諸侯為此東伐此三王之舉也王曰善發使告諸侯曰天下共立義帝北面事之今羽放殺義帝寡人親為發喪兵皆縞素悉發關中兵收三河士願從諸侯王擊楚之殺義帝者下逮武宣之世時君信重其書學士大夫誦説如張蒼賈誼董仲舒申公張敞貢禹疏廣蔡千秋翟方進張禹劉向之流用以斷獄決事如雋不疑引衛蒯聵事斷偽戾太子之類雖萬目未張而大綱克正愚按髙祖尊大公為太上皇五日一朝則父子之綱正矣討羽殺義帝斬丁公以戒為臣不忠則君臣之綱正矣因四皓從太子遊不廢惠帝不立趙王則夫婦嫡庶之綱正矣過於春秋之時其效亦可見矣粵自熙寧崇尚釋老蒙莊之學以虛無為宗而不要義理之實宋神宗用王安石變亂祖宗法制是時姦佞並進尊尚異端信神仙虛誕之言納祥瑞符讖之奏而伊洛諸儒之學擯不用矣殆及崇寧曲加防禁徽宗崇寧間奏災異天變者嚴加貶黜如任伯雨之類貶竄言臣李清臣張舜民等禁上書等邪人不許擅到闕下禁程頥著書籍元祐黨人司馬光等由是用事者以災異之變政事闕失則默不敢言而慶瑞之符與禮文常事則詠歌贊誦洋洋乎盈耳是與春秋正相反也侈心益縱至四邉紛擾莫之能遏豈不痛哉陛下天錫勇智聖德日新嗣承寶位於三綱九法淪斁音妬之後發於獨斷崇信是經將以撥亂世反之正聖王之志既自得之又命臣下有能誦習其書者使訓明其義而臣以荒蕪末學榮奉詔旨輒不自揆罄竭所聞修成春秋傳三十卷十萬餘言上之御府恭惟肅將天討之餘萬幾之暇特留宸念時賜省覽取自聖裁監天人休咎之符核賞罰是非之實懋檢身之盛德恢至治之逺圖式敘邦經永康國步春秋胡傳附録纂疏卷首上
