body:
  text: 春秋胡傳附録纂疏卷四元汪克寬撰桓公上公名軌史記名允惠公之子隱公之弟母仲子夫人文姜在位十有八年庚桓王午九年元年齊僖二十年晋哀七年衛宣八年蔡桓四年鄭莊三十三年曹桓四十六年陳桓三十四年杞武四十年宋殤九年秦寧五年楚武三十年元年即位之始年也自是纍數雖久而不易此前古人君記事之例春秋祖述為編年法及漢文帝惑方士之言改後元年始亂古制夫在位十有六載矣復扶又反稱元年可乎前郊祀志文帝十六年趙人新垣平言闕下有寶玉氣來者詐令人持玉杯獻之刻曰人主延夀又言候日再中居頃之日郤復中詔更以十七年為元年愚按史記秦紀惠文君十四年更為元年索隱云魏惠王三十六年改稱一年則改元不自漢文始矣孝武又因事别建年號孝武即位改元建元年號昉見於此劉氏攽曰封禪書稱後三年有司言元宜以天瑞命不宜以一二數推所謂後三年蓋元狩六年至元鼎三年也元鼎四年方得寶鼎無緣先三年而稱之以此言之自元鼎以前之元皆有司追命故元封改元始有詔書愚按元光因長星見元狩因獲白麟元封因封禪太初因改歷天漢因祈雨各因事而改也歷代因之或五六年或四三年或一嵗再更平聲使記注繁蕪莫之勝平聲載夫歷世無窮而美名有盡豈記久明遠可行之法也必欲傳久當以春秋編年為正春王正月公即位公羊傳繼弒君不言即位此其言即位何如其意也榖梁傳桓無王其曰王何也謹始也桓弟弒兄臣弒君天子不能定諸侯不能救百姓不能去以為無王之道遂可以至焉爾元年有王所以治桓也繼故不言即位正也繼故而言即位則是與聞乎弒也程子傳桓公弒君而立不天無王之極也而書春王正月公即位以天道王法正其罪也桓宣與聞乎弒故聖人如其意而書即位與僖文等同辭則其惡自見乃所以深責之也桓公與音豫聞乎故而書即位著其弒立之罪深絶之也髙氏曰隱公被弒經但書薨而賊不見主名嗣君實與其故而無以為别則後之觀者安知賊之為誰乎故著其篡立之罪特書其自即位者以不弒自居也髙郵孫氏曰繼弒書即位是例之變也美惡不嫌同辭或問桓非惠公之嫡子乎適音嫡后同子當立而未能自立是故隱公攝焉以俟其長展兩反后同而授之位久攝而不歸疑其遂有之也是以至於見弒而惡亦有所分矣春秋曷為深絶桓也劉氏曰傳謂隱公攝是非其位而据之則桓之弒隱春秋不宜深絶之今以其深絶之知隱乃讓也非攝也曰古者諸侯不再娶公羊於禮無二適杜氏注惠公元妃既卒繼室以聲子則是攝行內主之事矣雜記妾攝女君啖氏曰諸侯一娶九女元妃卒則次妃攝行內事無再娶之文通㫖夫人亡則次妃攝治內事重男女之配也仲子安得為夫人母非夫人則桓乃隱之庶弟安得為適子謂當立乎桓不當立則國乃隱公之國其欲授桓據左傳公曰吾將授之矣乃實讓之非攝也歐陽氏曰隱公之稱號無異於正君㑹盟征伐賞刑祭祀皆出於己舉魯之人皆聼命於己其不為正君者幾何攝讓異乎曰非其有而居之者攝也本劉氏故周公即政而謂之攝詩狼跋小序周公攝政推已所有以與人者讓也本劉氏故堯舜禪授而謂之讓書堯典小序讓于虞舜惠無適嗣隱公繼室之子於次居長禮當嗣世杜氏曰繼室子當嗣世其欲授桓所謂推已所有以與人者也豈曰攝之云乎以其實讓而桓乃弒之春秋所以惡去聲桓深絶之也然則公羊所謂桓幼而貴隱長而卑子以母貴者其說非歟趙氏曰妾母不得為夫人桓何以得貴若然是禮可得而越分可得而踰也若母得以子貴即成風之賵葬不應有譏而公羊經外妄生此文遂令漢朝引以為證首亂大法良可惜哉曰此徇惠公失禮而為之詞非春秋法也仲子有寵惠公欲以為夫人母愛者子抱前張良傳四皓云云惠公欲以桓為適嗣禮之所不得為也家氏曰或問桓公非受命於惠公乎曰否惠公暮年溺於私愛或有立桓之意而未見於事故惠卒而隱遂立左氏謂生桓公而惠公薨是以隱公立而奉之奉之者隱也非惠公嘗有治命也穀梁謂既勝其邪心以與隱者事之實也隱欲讓桓所謂成父之惡也使惠公確有立桓之志則隱將有蒲屈之難國可得乎禮不得為而惠公縱其邪心而為之隱公又探吐南反其邪志而成之公羊又肆其邪說而傳柱戀反之漢朝又引為邪議而用之前哀帝紀詔曰春秋之義母以子貴尊定陶傅太后及丁姬並為帝太后後光武紀廢皇后郭氏立貴人隂氏為皇后越二年立東海王陽為皇太子廢太子彊為東海王詔曰春秋之義立子以貴夫婦之大倫亂矣春秋明著桓罪深加貶絶備書終始討賊之義以示王法正人倫存天理訓後世不可以邪汨工忽反之也張氏曰桓公弒君而立在九伐之法當伏賊殺其親之罪今書公見周王之無政刑書即位見魯之臣子忘不共戴天之讎而推戴弒君之賊辨冕南面立乎其位故桓公之編其書法大率異之羣公此聖人修理三綱敕正民彛之大指也家氏曰桓以臣弒君以弟篡兄罪大惡極而魯之先君也夫子修春秋雖以誅討亂賊為事而於魯之先君不容直正其罪故特立法以垂示萬世書王書正書即位皆所以討也三年以後不書王著桓無王與王不能以王法正天下也誅魯也亦責王也或者以不書王為簡編之脫誤春秋無深意不亦鹵乎三月公㑹鄭伯于垂穀梁傳㑹者外為主焉爾杜氏曰垂犬丘衛地髙氏曰鄭伯知公之篡逆不自安特為好㑹將以求賂焉度魯急於㑹諸侯必從所欲故也夫鄭莊與隱公同盟和好今見其賊不能討反有所激求欲以定其位是誠何必哉鄭伯以璧假許田左傳公即位修好於鄭鄭人情復祀周公卒易祊田公許之鄭伯以璧假許田為周公祊故也公羊傳以璧假之何易之也易之則其言假之何為恭也有天子存則諸侯不得專地也榖梁傳假不言以言以非假也非假而曰假諱易地也禮天子在上諸侯不得以地相與也許田魯朝宿之邑邴者鄭伯所受命而祭泰山之邑也用見魯之不朝於周而鄭之不祭泰山也程子傳隱公八年鄭伯使宛來歸祊蓋欲易許田魯受祊而未與許及桓弒立故為㑹以求之復加以璧朝宿之邑先祖受之於先王豈可相易也故諱之曰假諱國惡禮也愚按許田在王畿內今汴梁路通許縣許田所以易祊必彭反也鄭既歸祊矣又加璧者祊薄於許故也蘇氏曰許田所以易祊以祊為未足而益之以璧耳魯山東之國與祊為鄰鄭畿內之邦許田近地也以此易彼各利以國而聖人乃以為惡而隱之獨何歟曰利者人欲之私放上聲於利必至奪攘而後厭去聲義者天理之公正其義則推之天下國家而可行春秋惡去聲易許田孟子極陳利國之害皆拔本塞源杜篡弒之漸也湯沐之邑朝宿之地先王所錫先祖所受私相貿音茂易而莫之顧是有無君之心而廢朝覲之禮矣是有無親之心而棄先祖之地矣故聖人以是為國惡而隱之也其不曰以璧易田而謂之假者夫易則已矣言假則有歸道焉何氏曰使若暫假借之辭杜氏曰隱其實不言易祊稱璧假若進璧以假田非久易也又以見音現許人改過遷善自新之意非止隱國惡而己也其垂訓之義大矣資中黃氏曰歸祊後復書我入祊重取地假許後不書以許歸鄭重失禮為內諱也張氏曰公篡立而歸諸侯之討已欲外結好以自固因鄭伯嘗歸祊以易許田而未遂乃求好於鄭鄭亦欲乘此機遂求許田故與桓公㑹于垂篡弒之人人人所同惡而鄭莊首與為㑹故書公㑹鄭伯言出於鄭志所以深罪鄭伯也桓公受璧以棄朝宿之邑故諱易言假內以諱為貶蓋大惡然後諱也家氏曰書鄭伯以璧假田著鄭莊乘魯有惡要許田然後與之盟也劉氏曰公羊謂繫之許也非也詩云居常與許復周公之宇然則周公受封本有許邑非春秋故繫之許也且地邑名自有名据實而書豈敢擅易哉夏四月丁未公及鄭伯盟于越左傳結祊成也榖梁傳及者內為志焉爾程子傳桓公欲結鄭好以自安故既與許田又為盟也弒君之人凡民罔弗懟而鄭與之盟以定之其罪大矣杜氏曰越近垂地名愚按今屬東昌路曹州濟隂縣垂之㑹鄭為主也故稱㑹越之盟魯志也故稱及鄭人欲得許田以自廣是以為垂之㑹桓公欲結鄭好去聲以自安是以為越之盟王氏箋義上書㑹所以惡鄭此書及所以惡魯張氏曰交貶之以見其惡髙氏曰㑹垂之時固欲結鄭援以垂㑹未可保其必信也故又盟越而位乃定焉鄭既得許田始與公為此盟也夫弒逆之人凡民罔弗憝徒對反書康誥凡民自得罪殺越人于貨罔不憝愚按書本謂殺人而取貨財者凡民無不怨惡况弒逆之賊覆載所不容安得不人人惡之哉即孟子所謂不待教命人得而誅之者也孟子無命字愚按孟子本謂不待教戒而誅戮之此借引之謂不必待上之人教命而可即誅之也而鄭與之盟以定其位左傳宣元㑹于平州以定公位注篡立者諸侯既與之㑹則不得復討是肆人欲滅天理等倫紀于辨髦化人類為禽獸聖人所為去聲懼春秋所以作無俟於貶絶而惡自見音現矣王氏曰垂越皆衛地其地於鄭為近於魯為逺譏桓公篡立逺㑹鄭莊以求王朝卿士之援也家氏曰衛州吁之弒其君魯隱宋殤為之出師㑹伐鄭以定其位今魯隱見弒於其弟鄭莊逼弒賊取其田而與之盟宋殤見弒於其臣魯桓率三國受弒賊之賂而成其亂出爾反爾後先一轍又其後魯桓斃於齊襄其子事讎終身不敢報鄭莊雖僅克自全而嗣子忽終殞於賊臣之手國大亂幾亡黨賊為利者亦知所懲矣秋大水書水災之始左傳凡平原出水為大水公羊傳記災也穀梁傳髙下有水災曰大水程子傳君德修則和氣應而雨晹若桓行逆德而致隂沴乃其宜也大水者隂逆而與怨氣并之所致也本何氏注髙郵孫氏曰大者非常之辭水非常而為災或害民禾稼敗民廬舍為災則書也桓行逆德而致隂沴音戾妖氣也宜矣或問堯之時豈有致之者而曰洚水警豫何也書大禹謨作警豫愚按警戒也非堯舜致水而曰警豫者見聖人憂民之切不敢以為非己之責而自寬也曰堯之水非有以致之開闢已來水之行未得其所歸故堯有憂焉使禹治之然後人得平土而居爾孟子當堯之時天下猶未平洪水橫流泛濫於天下集注洪荒之世生民之害多矣聖人迭興漸次除治至堯時尚未盡平也若曰洪水者積雨之所成時晹而熄矣奚待乎九年十有三載之治也堯典命鯀治水九載績用弗成禹貢作十有三載史禹治水居外十三年過家門不敢入山谷之所泄歟自禹功既施疏鑿決排以至于今而其流不减何也是知天非為去聲堯有洪水之災至禹而後水由地中行爾後世有人為不善感動天變召水溢之災者必引堯為解誤矣宋鑑神宗熙寧六年上以久旱憂見容色王安石曰水旱常事堯湯所不免愚按書時不書月則水之泛溢為害蓋歷時而未平也經書內大水者入後此十三年書夏此年莊七年二十五年宣十年成五年皆書秋莊十一年宋大水亦書秋惟莊二十四年紀於八月姜氏入之後襄二十四年紀於七月日食之後書月者未至歷時之久然非非常為灾則不志也孫氏曰水不潤下也聖王在上五事修而彛倫叙則休徵應之聖王不作五事廢而彜倫攸斁則咎徵應之春秋之出多灾異聖王不作故也然自隱迄哀悉書之不可勝書惟內灾則詳而録之外災或志或不志則天下之灾異從可見矣冬十月穀梁傳無事焉何以書不遺時也春秋編年四時具而後為年詳見隱六辛桓王未十年二年齊僖二十一晋哀八衛宣九蔡桓五鄭莊三十四曹桓四十七陳桓三十五杞武四十一宋殤十弒秦寧六楚武三十一春王正月戊申宋督弒其君與夷左傳宋督攻孔氏殺孔父而取其妻公怒督懼遂弒殤公君子以督為有無君之心而後動於惡故先書弒其君程子傳桓公無王而書王正月正宋督之罪也弒逆之罪不以王法正之天理滅矣督雖無王而天理未嘗亡也桓無王而元年書春王正月以天道王法正桓公之罪也桓無王而二年書春王正月以天道王法正宋督之罪也督不稱氏義見衛州吁注程氏曰弒逆者不以王法正之天理滅矣督雖無王而天理未嘗亡也其說是矣穀梁子以二年書王正與夷之卒其義一爾以為諸侯之卒天子所隱痛故書王以正之范氏注誤矣通㫖桓無王而元年書王所以治桓弒隱公而自立也桓無王而二年書王所以治桓㑹于稷以成宋亂也自是而後不書王者見天王之不王故桓亦不之王也十年復書王者天道人事十年一變而篡殺之惡則不可滌故復書王者所以治桓罪垂世法也十八年桓已死矣復書王者明弒君之罪雖其身已沒而王法不得赦也家氏曰春秋初年聖人猶望天王以討賊之事故元年書王所以正魯桓之罪二年書王以魯賊未討而宋亂又作于稷之㑹特書成宋亂篡弒之賊與預㑹之諸侯咸在所討或曰周自東遷已不能號召方國今春秋以討賊責之其如諸侯之不稟命者何曰五年桓王伐鄭以師從者猶有蔡衛陳使是時桓王能以誅討二篡號召天下名正言順諸侯大國必皆來㑹允馮督翬可坐而翦也惟其無志於此王綱日壞凶彚日繁曲沃以支宗篡晋陳他以庶孽干嫡鄭突挾強臣之援而逼逐其君兄衛朔挾五國之助而拒違王命無知弒襄渠彌弒昭傅瑕弒子儀宋萬弒捷文姜弒桓慶父弒般及閔綱常掃地君父兄岌岌乎不能以自保春秋所為作為是故爾孫氏曰穀梁以二年書王為正與夷之卒則莊閔僖文宣襄定哀之二年書王正何人之卒也愚按許止楚比陳夏徵舒齊崔杼陳乞之弒皆不書王以正其罪豈以督之弒在正月不可書曰春正月宋督弒其君而其他弒逆不在春正月者不拘書王之例歟及其大夫孔父公羊傳及者何纍也弒君多矣舍此無纍者乎曰有仇牧荀息皆纍也何以書賢也孔父可謂義形於色矣其義形於色奈何督將弒殤公孔父生而存則殤公不可得而弒也故於是先攻孔父之家殤公知孔父死已必死趍而救之皆死焉孔父正色而立於朝則人莫敢過而致難於其君孔父可謂義形於色矣穀梁傳孔父先死其曰及何也書尊及卑春秋之義也孔父之先死何也督欲弒君而恐不立於是乎先殺孔父孔父間也程子傳人臣死君難書及以著其節父名也稱大夫不失其官也按左氏宋殤舒羊反公立十年十一戰民不堪命孔父為司馬無能改於其德非所謂格君心之非者然君弒死於其難乃旦反處命不渝亦可以無愧矣父者名也著其節而書及趙氏曰忠義見殺與君而死故言及以連之美其能死節也陳氏折𠂻牧息書及以尊及卑也督先殺孔父而後弒君斯及則并也左氏得之不失其官而書大夫李氏正義與夷是督之君言弒其君可也孔父非督之大夫而曰其大夫者與君俱死據君為文也是春秋之所賢也賢而名之何也故侍讀劉敞字原父號公是先生清江人宋治平中為侍讀著春秋傳一十五卷權衡十七卷意林二卷以謂既名其君於上則不得字其臣於下此君前臣名禮曲禮之大節也劉氏權衡云云杜氏謂孔父貶稱名如杜意乃當名君字大夫顛倒人倫乎孫氏曰孔父字者天子命大夫也如祭仲單伯女叔之類髙氏曰祭仲亦書字於鄭伯寤生卒之下齊氏曰人名不當獨稱曰父若考父林父行父是也公穀以父為字近之督將弒殤公孔父生而存則不可得而弒於是乎先攻孔父而後及其君張氏曰穆公舍馮而立與夷使馮出居鄭與夷既立宋鄭屢相侵伐華督蓋馮之黨也將弒與夷而憚孔父故先攻孔父殤公怒則弒之遂召馮而立書與夷之弒而後及孔父明孔父之死為君故能為有無亦庶幾平聲焉凡亂臣賊子畜敕六反無君之心者必先剪其所忌而後動於惡不能剪其所忌則有終其身而不敢動也華户化反督欲弒君而憚孔父劉安欲叛漢而憚汲直曹操去聲欲禪位而憚孔融前汲黯傳淮南王謀反憚黯曰黯好直諫守節死義至說𢎞等如發䝉耳後孔融傳融見操雄詐漸著頻書爭之多侮慢之辭操以融名重天下外相容忍而潜忌之又嘗奏宜凖古王畿之制千里寰內不以封建諸侯操疑其所論建漸廣益憚之郗慮承操風㫖令路粹枉奏融不軌書奏棄市范曄論曰山有猛獸藜藿為之不採是以孔父正色不容弒虐之謀文舉之髙志直情足以動義概而忤雄心此數君子者義形於色皆足以衛宗社而忤邪心姦臣之所以憚也不有君子其能國乎春秋賢孔父示後世人主崇奬節義之臣乃天下之大間本穀梁有國之急務也通㫖聖人取三大夫蓋君已弒力不能討至此止有死爾常人之情於此轉易者多故聖人取其死節也如宋萬弒閔公殺太宰督督嘗弒君矣雖有大節不可贖也襄仲弒子赤惠伯被殺亦不書者非君命可以無死故也晏子曰人有君而弒之吾焉得死之而焉得亡之者齊莊不為社稷死晏子非其私昵之臣也陳氏曰死節人臣之極致也春秋貴死節雖衛􅑔喜殺太子角楚比殺太子祿皆不書必大臣也然後書大臣誼與其君存亡者也雖大臣也苟不能與其君存亡則亦不書是故晋欒書中行偃先殺胥童而後弒君不言及死節人臣之極致春秋重以與人也永嘉吕氏曰孔父乃穆公所屬殤公者也荀息乃獻公之屬其子者也孔父荀息存則殤公卓子與之俱存孔父荀息亡則殤公卓子與之俱亡殤公卓子已弒而孔父荀息尚存則督克不得而全矣仇牧雖非屬受於先君然聞君弒趍而至遇于門手劔而叱之是仇牧生而存則萬不可以生仇牧死然後萬得以奔陳耳非能與君存亡何以如此愚按或謂孔父大夫不當蒙弒大夫苟書曰宋督弒其君與夷遂殺其大夫孔父則不見孔父為君而死而大臣扞君之節不著矣故特書及以褒其死君難此聖筆之精意也朱子綱目書宋太子邵弒其君義隆及其左衛率袁淑等蓋切取春秋之義也不然袁淑乃宋劭東宫小臣又何以不言殺乎啖氏曰左氏云華督見孔父之妻于路遂弒殤公按古者大夫皆乘車其妻固當乘車不可在路而見其貌蓋以舊言孔父義形於色而作傳者以為女色之色遂妄為此說耳趙氏曰穀梁云臣既死君不忍稱其名按孔父之事自是史開載之非殤公自書也何關君不忍乎又曰蓋為祖諱按春秋魯史非孔子家傳安得諱乎滕子來朝程子傳滕本侯爵後服屬于楚故降稱子夷狄之也首朝桓公之罪自見矣隱公末年滕稱侯爵距此三嵗爾乃降而稱子者先儒杜預范寧謂為時王所黜也薛氏曰嘗黜爵于周使時王能黜諸侯春秋豈復扶又反作乎朱子語是時時王已不能行黜陟之典就使能黜陟諸侯當時亦不止一滕之可黜家氏曰王綱巳頽陟者有之未聞其能黜也愚按蜀之盟齊在鄭下范氏亦謂時王所黜然齊鄭之爵未有所改烏見其時王黜之乎又有言其在喪者趙氏曰滕侯爵自齊桓霸後與把薛皆降號以從㑹位此時未有霸者故知在喪也朱子語前不見滕侯卒乃不通之論終春秋之世不復扶又反稱侯無說矣然則云何春秋為于僞反誅亂臣討賊子而作其法尤嚴於亂賊之黨使人人知亂臣賊子之為大惡而莫之與則無以立於世無以立於世則莫敢勸於為惡而篡弒之禍止矣今桓公弟弒兄臣弒君天下之大惡凡民罔弗憝也已不能討又先去聲鄰國而朝之是反天理肆人欲忍為黨惡之徒春秋之所深惡去聲也故降而稱子以正其罪四夷雖大皆曰子其降而稱子外之也曲禮東夷北狄西戎南蠻雖大曰子髙氏曰滕侯始與隱公同好今隱為桓所弒反率先朝之此不仁不義之甚故春秋以夷狄待之或曰非天子不制度不議禮不考文中庸仲尼豈以匹夫專進退諸侯亂名實哉劉氏曰仲尼作春秋雖以文褒貶猶不擅進退諸侯蓋不以匹夫侵天子之事豈若是專之以亂名實哉則將應之曰仲尼固不以匹夫專進退諸侯亂名實矣不曰春秋天子之事乎知我罪我者其惟春秋乎通㫖滕本侯爵降而稱子者首朝桓公黜之也然則居周之世食周之祿擅易其爵豈所謂非天子不議禮者乎曰春秋固天子之事也世衰道微暴行去聲交作仲尼有聖德無其位不得如黃帝舜禹周公之伐蚩充之反尤誅四凶戮防風殺管蔡史本紀蚩尤為暴黃帝徴師諸侯與蚩尤戰于涿鹿之野遂擒殺蚩尤左傳文十八年舜臣堯流四凶族投諸四裔以禦魑魅家語王言解禹致羣臣於㑹稽防風氏後至禹戮之書蔡仲之命周公位冡宰正百工羣叔流言乃致辟管叔于啇囚蔡叔于郭鄰行天子之法於當年也故假魯史用五刑奉天討誅亂賊垂天子之法於後世其事雖殊其理一耳何疑於不敢專進退諸侯以為亂名實哉夫奉天討舉王法以黜諸侯之滅天理廢人倫者此名實所由定也故曰春秋成而亂臣賊子懼張氏曰春秋於諸侯之爵不輕貶絶惟有僭王肆亂崇奬逆賊瀆亂三綱之罪者則黜之故吳楚僣稱王把莒廢禮則黜號降爵而尤於亂臣賊子嚴其黨惡之法此滕之始朝桓公所以特黜而從後日之稱子也沙隨程氏曰春秋時小國事大國其朝聘貢賦之多寡隨其爵之崇卑滕子之事魯以侯禮見則所供者多以子禮見則所供者少滕國土小不足以附諸侯之大國故甘心自降為子子孫一向微弱故終春秋之世常稱子聖人因其實而書之耳故鄭子産嘗爭承貢賦之次曰昔天子班貢輕重以列鄭伯男也而使從公侯之貢懼弗給也敢以為請即其事也孫氏曰把公爵也滕薛皆侯也今春秋把或稱侯或稱伯或稱子皆降也滕或稱侯或稱子稱侯正也稱子降也薛或稱侯或稱伯稱侯正也稱伯降也此蓋聖王不作朝㑹不常彼三國者力既不足禮多不備或以侯禮而朝或以伯子而㑹孔子從而稱之以見其亂也滕子朝弒逆之人其罪可知朱子語把國最小春秋所書初稱侯已而稱伯已而稱子蓋其朝覲貢賦之屬率以子男之禮從事聖人因其實而書之非貶之也滕國亦小初書侯已而書子解者以為桓公弒君之賊不合朝之故貶稱子然自此以後一向書子使聖人實惡其黨惡則當止貶其一身其子孫何罪一例貶之豈所謂惡惡止其身耶春秋之世朝覲往來其禮極繁大國務吞并猶可以辦小國侵削之餘何從而辦之其自降為子而一切從省亦何足怪若謂聖人貶之則當時大國滅典禮叛君父務吞并者常書公書侯不貶而此獨責備於不能自存之小國何聖人畏強凌弱尊大抑小不公之甚程沙隨說春秋見得此意却頗有理臨川吳氏曰朱子之意與孫氏意同諸家或以為貶或以為文誤俱未安愚按滕把薛之君或卒而不赴或赴而不名不葬則其國之削弱而自貶損或有是理戰國之時衛初貶號曰侯又貶號曰君即降爵之例三月公㑹齊僖侯陳桓侯鄭莊伯于稷以成宋亂公羊傳內大惡諱此其目言之何逺也穀梁傳以者內為志焉爾公為志乎成是亂也此成矣取不成事之辭而加之焉於內之惡君子無遺焉爾程子傳宋弒其君而四國共成定之天下之大惡也杜氏曰稷宋地按左氏為去聲賂故以郜大鼎賂公齊陳鄭皆有賂立華户化反氏也杜氏曰督戴公孫未死而賜族邾定公時有弒父者公瞿紀具反然失席曰是寡人之罪也嘗學斷丁亂反斯獄矣臣弒君凡在官者殺無赦子弒父凡在宫者殺無赦殺其人壞音怪其室汙音烏其宫而瀦焉蓋君踰月而後舉爵見檀弓疏臣之弒君凡在官之人無問貴賤皆得殺此弒君之人無得縱赦之子之弒父凡在宫者無問尊卑皆得殺此弒父之人不得縱赦之華督弒君之賊凡民罔不憝徒對反也而桓與諸侯㑹而受賂以立華氏使相去聲宋公甚矣故特書其所為而曰成宋亂徐邈曰宋雖已亂若諸侯討之則有撥亂之功不討則受成亂之責趙氏曰言宋之惡逆自此成以病內也安定胡氏曰成就也讀如三年有成之成夫臣為于僞反下同君隱子為父隱禮也據論語此其目言之何桓惡極矣臣子欲盡隱之而不可以欺後世其曰成宋亂而不書立華氏猶為有隱乎爾孫氏曰弒君之賊諸侯皆得討之桓弒隱亦懼諸侯討已故翻然與督比周同惡相濟以成其亂陳氏曰㑹未有言其所為者其曰成宋亂弒君之禍接迹於天下於是焉始也向也合五國之君大夫以安州吁而州吁訖於討今也合四國之君以立華督督遂相宋莊弒君之禍接迹於天下四君為之也春秋之褒貶至於變文嚴矣向也五國之君大夫書之復書之終春秋僅一再見焉以變文為猶未也而直言其所為舍此無復見者矣雖然有孔父焉則東遷之初國猶有臣子也張氏曰㑹未有言其所為者蓋事關世變特書以著之也宋先代之後統承先王修其禮物今有華督弒君之亂若四國之君有奉天討誅亂臣之舉則宋亂不得成矣魯桓弒隱方以類合三國黨惡謀以賄行相與定馮立督然後其亂始成遂使反易天常者得以肆其志於天下此聖人所深懼而春秋所為作也家氏曰魯桓負弒君之大惡王誅不加乃復因宋之有亂同惡相濟以為此㑹故魯桓之罪視三國為重夫宋之亂已成而春秋書㑹于稷以成宋亂者蓋督雖弒君而馮之位未定也今三國為此㑹將以謀宋而徼利而馮之位始定督之罪始得無討故成宋亂者三國也所以使三國之成此亂者魯也春秋列㑹未有言其所為者獨此與襄公末年㑹于澶市然反下同淵各書其事者桓弒隱督弒殤般弒景皆天下大惡聖人所為去聲懼春秋所以作也一則受宋賂而立華氏一則謀宋災而不能討故特書其事以示貶焉永嘉吕氏曰不書以成宋亂則稷之㑹疑於謀討督不書宋災故則澶淵之㑹疑於謀討蔡直書其所為而後是非善惡之實著矣然澶淵之㑹既不書魯卿又貶諸國之大夫而稱人此則書公又序諸侯之爵何也澶淵之㑹欲謀宋災而不討弒君之賊雖書曰宋災故而未能表其誅責之意也必深諱魯卿而重去聲貶諸國之大夫然後足以啓問者見音現下同是非也稷之㑹前有宋督弒君後有取宋鼎之事書曰成宋亂則其責已明不必諱公與貶諸侯爵次然後見其罪矣朱子語大義數十如成宋亂宋災故之類乃是聖人直著誅貶自是分明通㫖問盟㑹或言其事者其義云何曰㑹未有指言其所事㑹而指言其事特書之也成宋亂宋災故是也盟未有指言其所事盟而指言其事特書之也釋宋公是也皆春秋大義宜深思之侵伐則多不言其所事者愚按于稷澶淵之㑹縱臣子之弒君父薄之盟縱荆蠻之凌中國皆關於君臣父子之大變故特言其事以貶在㑹之諸侯及大夫也杜氏云成平也然齊桓㑹于北杏以平宋亂而經不書則此非平亂明矣趙氏曰公羊云內大惡諱其目言之何逺也按逆祀僖公昭公出遜皆書之若以年逺不諱則桓公為齊所殺何不明書乎可諱則諱可譏可譏不以逺近為異也夏四月取郜大鼎于宋莊戊申納于大廟郜古報反大廟音泰左傳取郜大鼎于宋納于大廟非禮也臧哀伯諌曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫百官於是乎戒懼而不敢易紀律今滅德立違而置其賂器於大廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章孰甚焉公羊傳器從名故謂之郜鼎何以書譏遂亂受賂納于大廟非禮也穀梁傳桓內弒其君外成人之亂受賂而退以事其祖非禮也其道以周公為弗受也郜鼎者郜之所為也曰宋取之宋也以是為討之鼎也程子傳四國既成宋亂而宋以鼎賂魯齊陳鄭皆有賂魯以為功而受之故書取以成亂之賂器置于周公之廟周公其享之乎故書納納者弗受而強致之也杜氏曰郜鼎郜國所造器濟隂城武縣東南有北郜城大廟魯周公廟愚按城武縣今屬東昌路曹州取者得非其有之稱孟子非其有而取之者盜也陳氏曰宋以郜鼎賂公其書取何蔽罪於魯也春秋嚴義利之辨茍以為利一以取書之故郜鼎賂魯濟西田賂齊書取而已矣髙氏曰不曰宋人來歸而曰取于宋專罪公也納者不受而強上聲致之謂不謂之獻而曰納謂不當納若先祖之弗受也弒逆之賊不得致討而受其賂器置於大廟以明示百官是教之習為去順效逆之行也公子牙慶父仲遂意如之惡又何誅焉牙謀弒子般慶父弒般弒閔公仲遂殺赤意如逐昭公聖人為于僞反此懼而作春秋故直載其事謹書其日埀訓後世使知寵賂之行保邪廢正能敗人之國家也亦或知戒矣蜀杜氏曰桓以弒逆而受弒逆之賂不可也况受而納之廟乎桓公以為無周公則可若以為有周公而納之則庸暗之不若爾家氏曰前書成宋亂兼責四國也此書取郜鼎納于大廟專責魯也魯取鼎于宋而春秋目之曰郜鼎言宋始以不義取之故正其名而係其器於郜今魯復以不義取之故原其器之所從來而係之於宋魯桓身弒其君大惡未討乃成人之亂取賂而退復陳其賂於大廟大廟者祖宗神靈之所宅周公典章法制於是乎在郜之鼎宋之賂胡為乎至哉聖人秉筆誅姦曰成宋亂曰取郜鼎曰納于大廟所以明刑書示後世皆特筆也愚按𦙍之舞衣兊之戈和之弓埀之竹矢先王以之傳世夏后氏之璜封父之繁弱密須之鼓闕鞏之甲諸侯所受於先王此之謂重器所以昭先祖之德而藏之大廟者也宋之郜鼎蓋若甲父之鼎莒之方鼎吳夀夢之鼎之類耳况乃亂賊之賂而何以納于大廟為哉蓋不待再貶而惡已見矣又按公穀皆云周公稱大廟而左傳既稱周公之廟又稱周廟謂之宗廟杜預以為文王廟夫王制諸侯之廟二昭二穆與太祖之廟而五鄭氏云太祖始封之君如齊之太公衛之康叔是也成王封伯禽於魯以奉周公故周公為魯之始祖而祀之於大廟伯禽為始封之君而祀之於世室也太者大而無上之名豈以太廟之上又有文王廟乎春秋四書大廟未嘗書宗廟也郊特牲云諸侯不得祖天子豈以文王之廟而立之於魯乎禮稱以禘禮祀周公於太廟蓋由魯有禘禮祭文王為所自出之帝故遂謂魯有文王廟若魯頌稱姜嫄而說禮者亦云魯有姜嫄廟耳秋七月杞侯來朝杞公榖作紀程子傳凡杞稱侯者皆當為紀杞爵非侯文誤也及紀侯大去其國之後杞不復稱侯矣公榖程氏皆以杞為紀桓弟弒兄臣弒君天下之大惡王與諸侯不奉天討反行朝聘之禮則皆有貶焉所以存天理正人倫也紀侯來朝何獨無貶乎當是時齊欲滅紀紀侯求魯為之主非為于僞反桓立而朝之也臨川吳氏曰齊謀并紀而鄭助之紀國小弱為齊鄭所謀度不能自存以魯與齊鄭睦故來朝魯將求庇焉劉氏曰左氏云杞侯不敬歸乃謀伐之九月入杞竊謂春秋雖亂世兵革之事亦慎用之來朝有少不敬未宜便入其國也左氏誤紀為杞遂生不敬之說穀梁謂桓內弒其君外成人之亂而朝之惡之故謹而月之非也六年冬紀侯來朝桓惡不差减而紀侯過而不改其責宜深深則宜日反書時何哉愚按成七年曹伯朝六年十八年定十五年邾子朝皆書月不可以書月為貶或以紀侯不貶從滕子之同同然穀鄧邾牟葛不從同同之例蓋聖人閔紀之小弱傷其無所赴訴而求援於姻國故原情以恕其罪也何休范寧以紀為進爵則未知隱二年紀子之為闕文耳蔡桓侯鄭莊伯㑹于鄧此懼楚之始程子傳始懼楚也杜氏曰潁川召陵縣西南有鄧地愚按今河南府路鄧州按左氏曰始懼楚也其地以國鄧亦與音預焉楚自西周已為中國之患宣王蓋嘗命將去聲南征矣詩采芑宣王南征也蠢爾蠻荆大邦為讎顯允方叔蠻荆來威愚按啇頌稱撻彼殷武奮伐荆楚罙入其阻易稱髙宗伐鬼方三年克之則楚在殷武丁時已負險以叛而致中國之討矣然史記謂楚自熊繹事周文王始受子男之封豈武丁用兵深入其國盡平其地至周而復封之歟及周東遷僣號去聲稱王史周夷王時王室微熊渠甚得江漢間民和遂立為王立其長子康為句亶王中子紅為鄂王少子執疵為越章王厲王暴虐畏其伐復去王號至熊逹伐隨令請王室尊為王王室不聼乃怒自立為武王愚按此言東遷始僣號指武王而言也憑陵江漢此三國者地與之鄰是以懼也其後卒滅鄧左傳莊六年楚子伐鄭十六年楚復伐鄧滅之虜蔡侯莊十年荆敗蔡師于莘以蔡侯獻舞歸而鄭以王室懿親為之服役終春秋之世聖人蓋傷之也夫天下莫大於理莫強於信義循天理惇信義以自守其國家荆楚雖大何懼焉張氏曰小國間於大國而自立之道孟子告滕文公之三章詳矣徒懼而不能自強於為善所以不振也不知本此事醜類也德齊莫能相尚則以地之大小力之強弱分勝負矣觀春秋㑹盟離合之迹而天下盛衰之由可考也觀春秋進退與奪抑揚之㫖則知安中夏御四逺之道矣家氏曰鄧侯者熊實之舅而首滅之其虐不亦甚乎是㑹也春秋著蠻荆謀夏之始故書愚按于鄧乃外諸侯相㑹之始而實楚患之萌蘖北杏乃外諸侯列㑹之始而實霸者之濫觴其關於天下之故不小矣三國同㑹以懼楚鄧首被滅蔡則逼於侵凌桓文而後服屬於楚同於鄙邑熊䖍滅之熊君封之僅存一線之緒至春秋之終遂不得已而遷州來以求芘于吳鄭則數遭侵伐疲於奔命曽無寧日滎陽成臯之地殆為爭戰之墟幾不能國肉袒請命願為囚俘觀諸後日之變則㑹鄧之舉豈非中國陵夷之端乎劉氏曰公羊云離不言㑹而言㑹者蓋鄧與㑹也非也三國相㑹不可言蔡侯鄭伯及于鄧且實行㑹禮非㑹而何据齊侯鄭伯如紀為比例彼自妄說爾九月入杞穀梁傳我入之也杜氏曰不稱主帥微者也程子傳將卑師少外則稱人內則止云入某伐某陳氏曰內恆言大夫帥師但曰入杞何唯桓師非君將皆不言大夫桓師非君將則曷為皆不言大夫桓以大夫弒隱而後立故桓師非君將則其大夫專也髙氏曰桓弒君莫入莫伐乃反入杞伐邾是使天下共蒙其耻也愚按或以為蔡鄭入杞然滅逼陽滅賴皆稱遂此不稱遂則入者魯也左氏謂討其來朝之不敬蓋因僖二十七年春杞子來朝秋公子遂帥帥入杞而傅㑹其說耳公及戎盟于唐左傳修舊好也杜氏曰惠隱之好臨川吳氏曰隱公因戎之請盟至再而後與盟今戎不請盟而桓及之盟蓋與及鄭盟越之意同以己之負大惡而結好以自固無間於內外也冬公至自唐此書至之始左傳告于廟也凡公行告于宗廟反行飲至舍爵䇿勳焉禮也特相㑹往來稱地讓事也自參以上則往稱地來稱㑹成事也穀梁傳桓無㑹而其致何也逺之也程子傳君出而書至者有三告廟也過時也危之也桓公弒立嘗與鄭齊陳㑹矣皆同為不義及逺與戎盟故危之而書至戎若不如三國之黨惡則討之矣故聖人為之危之其望討亂之意微矣凡為人子者出必告古毒反請也反必面曲禮事亡如事存故君行必告廟反必奠而後入禮也曽子問諸侯相見必告于襧命祝史告于五廟反必親告于祖襧乃命祝史告至于前所告者出必告行反而告至常事爾何以書通㫖公如不書至者常事也書至者或危或久或為不義或䇿勳而書或志其去國踰時之久也莊五年冬㑹伐衛六年秋公至僖四年正月㑹侵蔡八月公至六年夏㑹伐鄭冬公至十五年三月㑹牡丘九月公至十六年十二月㑹淮十七年九月公至二十八年五月㑹踐土二十九年春公至成十年七月如晋十一年三月公至十三年三月如京師七月公至襄二十八年十一月如楚二十九年五月公至昭五年春如晋七月公至七年三月如楚九月公至十五年冬如晋十六年夏公至定四年三月㑹召陵七月公至或録其㑹盟侵伐之危也宣公㑹黑壤成公㑹沙隨昭公㑹平丘皆見責於晋僖公㑹伐鄭遂圍許㑹侵蔡遂伐楚成襄之㑹伐鄭伐秦伐齊定之㑹侵楚哀之㑹吳伐齊皆大戰伐之事無不可危定之圍成雖曰以君伐臣而強邑未可遽服觀之昭公伐季氏其危可知若宣之朝齊以篡弒求援惟恐獲戾襄之朝楚幾不得反莫非可危者矣或著其黨惡附姦之罪也桓公納鄭突莊公納衛朔皆書至伐襄公釋崔杼不討而盟重丘書至㑹桓公弒君而立嘗列於中國諸侯之㑹而不書至同惡也今逺與戎盟而書至者危之也范氏曰危其逺㑹戎狄喜其得反何氏曰凡致者臣子喜其君父脫危而至桓與戎盟雖信猶可危也程氏所謂居夷浮海之意是矣蓋聖人不得已之思其望討亂者亦隱而微矣張氏曰春秋上魯何乃欲戎之討魯君乎蓋聖人初未嘗以主魯而廢拯救三綱之心也程子之傳精矣家氏曰陳夏徴舒蔡般之弒其君中國無能訃之者楚人則討之今魯桓弒君天王微弱中國諸侯皆預於亂無有能討賊者矣桓㑹戎于唐戎若有人猶將討之今而得歸幸也故特為之致啖氏曰凡公行揔一百七十有六書至者八十有二不書至者九十有四左傳謂告廟則書于䇿夫子隨其所至以示功過且志其去國逺邇遲速也其有一出而涉兩事者或致前事或致後事擇其重者志之也又有不致本事者本事非功也孫氏曰春秋亂世諸侯出入無度至者危之也陳氏曰凡至危之也隱行不至桓至盟戎而已莊之適齊皆至之桓文有諸侯之事苟不得意則書至如牡丘于淮圍許迄于斷道而後不至者鮮矣成之瑣澤襄之鄬之戲之役僅不至焉爾昭定之世無不至者哀或不至至㑹吳伐齊至黃池之㑹皆危之也是故夫人不至至出姜大夫不至至季孫意如叔孫婼臨川吳氏曰歸而告廟常事爾春秋何為書之穀梁傳曰書至危之也似得經意糾合諸侯自齊桓始幽柳首止寧毋洮葵丘鹹八大㑹魯君皆與並不書至穀梁謂桓㑹不致安之也得經意矣末年牡丘淮二㑹書至范寧注曰桓㑹不至齊桓德衰故危而致之得傳意矣淮之㑹僖公為齊所止聲姜出㑹始得釋則知書至危之也伐楚伐鄭二役書至者兵凶戰危不比衣裳之㑹故至也齊桓既殁僖公朝齊非所宜朝故致也由是推之桓莊文宣成襄昭定哀之行其書至大率危之也危之若何或事之難或動之非或地之逺或時之久皆是危道幸其禮成事畢而得至故書也穀梁於襄公朝楚之傳曰至自楚喜之也殆其往而喜其反也魯夫人惟文九年出姜如齊歸寧為德禮故特書其至其餘夫人之行皆非美事故不書至然則出姜之至亦危之乎婦人無外事禮合歸寧不得已而出亦以得還至國為喜也未至以前詎敢以為安乎彼非禮而行者固不足道又奚恤其危哉魯大夫之書至者三皆為齊晋所執幸得解脫故書其至以此見經之書至非美事也愚按湯誥稱王歸自克夏至于亳武成稱王來自商至于豐則君行書至舊矣然告廟而書至者常禮也不告廟而書至者春秋之變也昭公失國居于鄆書至者五豈以播越在外復能遣其臣告于祖襧乎此聖人之微意雖曰危之亦以著臣子不忘君之義也或曰春秋美蕭魚之㑹而定公㑹夾谷孔子相齊人章章來歸侵疆其書至豈亦危之乎竊謂晋悼九合諸侯三駕伐鄭非惟諸侯罷於奔命而悼公之勤勞亦甚矣其書至者蓋危中國之戰爭而幸其休息爾若夫夾谷則齊人懷詐諼之謀將有萊兵之劫使不得吾聖人秉禮義以却之魯其危哉壬桓王十申一年三年齊僖二十二晋哀九衛宣十蔡桓六鄭莊三十五曹桓四十八陳桓三十六杞武四十二宋莊公馮元年秦寧七楚武三十二春正月程子傳桓公弒君而立元年書王以王法正其罪也二年宋督弒其君以王法正其罪也三年不書王見桓之無王也何氏曰無王者見桓公無王而行也二年有王者見始也十年有王者數之終也十八年有王者桓公之終也明終始有王桓公無之爾不就元年見始者未無王也桓公三年而後經不書王有以為周不班厯者劉氏曰杜注不書王者時王不頒厯非也十七年十月朔日食傳云不書日官失之也謂日官推厯不得其正非謂不班厯也何為其年亦不書王乎若謂官失之即不班厯矣莊十八年春王三月日食亦不書朔亦當不書王而反書王是知不書王者不為厯也資中黃氏曰班厯則告朔今無王之年有朔日又有正月則非王不班厯也昭公末年王室有子朝如字之亂豈暇班厯而經皆書王非不班厯明矣本劉氏規過又有以為此闕文也安得一公之內凡十四年皆不書王其非闕文亦明矣本李氏指掌永嘉吕氏曰春秋授諸弟子其傳之也豈無脫文故桓公之春秋多闕愚按缺文則不成文義如紀子伯甲戌己丑夏五郭公之類若桓不書王四年七年無秋冬皆聖人削之也通諸二百四十二年惟桓公之簡十四年不書王又豈紀録者他無脫漏而獨脫王字乎皆當從程子為正然則云何桓公弒君而立至于今三年而諸侯之喪事畢矣是入見音現受命於天子之時也髙氏曰桓無王者桓篡其兄外託於繼世而立是以免諸侯之討至其喪終宜以士禮見天子而受命又不能爾尚當因使者而請命以臨其民今桓公一不受命遂終其身則享國雖久徒屬雖衆盜賊之末誅耳王氏曰諸侯除喪以士服見天子天子賜之爵命而歸治其國桓公服除猶不朝王請命則無王之迹彰矣而王朝之司馬不施殘執之刑周禮大司馬九伐之法賊殺其親則正之放弒其君則殘之注正之者執而治其罪殘殺也鄰國之大夫不聞有沐浴之請見論語魯之臣子義不戴天反面事讎曽莫之耻使亂臣賊子肆其凶逆無所忌憚人之大倫滅矣故自是而後不書王者見音現桓公無王趙氏曰王者人倫之所繫桓無王惡桓之滅人倫也故去其王字以見其罪與天王之失政而不王也家氏曰或云周衰天王失政不王不自桓王始矣以是責王無乃非所可責乎曰王室微弱不能誅討亂賊春秋望之而未責也元年二年猶書王望之也今喪事既終逆桓未能入見天子而明年宰糾銜命下聘自是再三聘當誅而奬王網盡壞天下不復知有王矣桓公無王而行歸罪於天子可乎齊景公問政子曰君君臣臣父父子子見論語君不君則臣不臣父不父則子不子源清則流清表正則景正張氏曰春秋書王所以統諸侯正天下也桓公弒君自立故三年以後不書王若正朔不自王出也愚按或云宣亦篡立而不誅其無王何哉竊考經之所書於桓世再削秋冬王之冡宰來聘則書名諸侯來朝必加貶而宣世書法全異豈以春秋初年猶以討賊之事望之天子方伯諸侯及中葉而弒逆者相踵討賊者無復可望故變例而從同同歟程子曰春秋時前已立例到從來書得全别謂此類爾公㑹齊侯于嬴嬴音盈程子傳成昏于齊也杜氏曰公不由媒介自與齊侯㑹而成昏非禮也家氏曰桓以篡弒得國懼方伯之有討而乞昏於齊以為此㑹夫婚姻之有媒妁所以别嫌明微重大昏之始今魯桓親為此㑹以締好於強齊匪媒而昏合不以正也越竟而㑹㑹不以正也使其私人往逆逆不以正也為齊侯而親迎迎不以正也是以春秋於嬴之㑹謹而書之以見禍敗之所從始求逭弒君之討而終殞於齊天也非人所能為也其後莊公躬納幣於齊以盛飾而尸女恣為淫行無復羞惡造端實始此父之行子之效以致敗倫亂國歷數傳而未巳可不謹哉杜氏曰嬴齊邑今泰山嬴縣張氏曰所謂嬴博之間蓋齊之東南邑愚按今河問路滄州故城夏齊侯衛侯胥命于蒲左傳不盟也榖梁傳胥之為言相也相命而信諭謹言而退以是為近古也程子傳二國為㑹約言相命而不為盟詛近於理也故善之杜氏曰蒲衛地在陳留長垣縣西南愚按陳留今屬汴梁路公羊曰胥命者相命也相命近正也古者不盟結言而退何氏曰盟不歃血但以命相誓善其不盟近正似於古而不相背故書以撥亂范氏曰申約言以相逹不歃血而誓盟杜氏曰申約言以相命而不歃血也人愛其情私相疑二以成傾危之俗其所由來漸矣有虞之時已有征苖之誓至周而有司盟之官幽王時大夫作詩云君子屢盟亂是用長則盟詛之瀆不待春秋而後見矣有能相命而信諭豈不獨為近正乎故特起胥命之文於此有取焉當時已有是名但夫子作經特筆書之書之所以取之也聖人以信易食答子貢之問論語子曰去食自古皆有死民無信不立集注民無食必死然死者人之所必不免無信則雖生而無以自立君子以信易生重桓王之失詩兔爰小序桓王失信諸侯背叛君子不樂其生焉信去則民不立矣故荀卿言春秋善胥命荀子大略篇春秋善胥命而詩非屢盟其心一也通㫖信者國家之大寶胥命不盟一節可取劉氏曰古者方伯州牧命於天子諸侯自相命非正也齊太公之後東州之侯衛康叔之後北州之侯以事相命也髙氏曰胥命者相推為牧伯也春秋之變始於齊衛胥命而終於吳晋爭盟自爭盟觀胥命所謂彼善於此也故荀卿言善胥命朱子語洽問胥命齊衛勢敵故齊僖自以為小伯而黎人亦責衛以方伯之事當時王不能命伯而欲自為伯故彼此相命以成其僣及其久也則力之能為者專之矣戰國諸侯齊魏㑹于濁澤以相王其後秦人致帝于齊約共稱帝此其明證也曰說亦有理愚按朱子意與程子傳稍異姑兩存之竊考莊二十一年鄭虢胥命于弭同謀納王不可云相命以伯况齊衛胥命之後不聞有㑹盟侵伐之事僅能一戰于郎一盟惡曹皆以鄭忽之故則非相推為伯矣蓋胥命者相結以言而不盟而相結之善惡則存乎其事耳六月公㑹杞侯于郕杞公作紀郕公作盛程子傳自桓公篡立無嵗不與諸侯盟㑹結外援以自固也髙氏曰紀侯懼齊欲親魯郕亦然張氏曰紀與魯親而求援於魯以抗齊鄭故桓公因其來朝與之㑹也愚按程子云杞稱侯皆當為紀左傳云杞求成豈因入杞而傅㑹其說歟秋七月壬辰朔日有食之既公羊傳既者何盡也程子傳既盡也食盡為異大也榖梁曰既盡也杜氏曰歷家云日月交㑹月掩日故日食食既者正相當而相掩也范氏曰盡而復生謂之既言日言朔凡二十六此年莊二十五二十六三十僖五文十五成十六十七襄十四二十二十一再二十三二十四再二十七昭七十五十七二十一二十二二十四三十一定五十二十五食正朔也言朔不言日桓十七食既朔也朔之明日言日不言朔凡七隱三僖十二文元宣八十十七襄十五食晦日也並本公羊不言日不言朔凡二莊十八僖十五夜食也何以知其夜食曰王者朝直遙反下同日穀梁莊十八年傳前賈誼傳三代之禮春朝朝日王者朝日則何以知其夜食乎日始出而有虧傷之處昌慮反未之復也則知其食於夜矣范氏曰王制天子𤣥冕朝日於東門之外故日始出而有虧傷之處是以知其夜食日者衆陽之宗人君之象而有食之既則其為變大矣家氏曰隂盛于陽太陽為之失光晝晦為異大矣先儒董仲舒劉向以為荆楚僣號去聲鄭拒王師之應日食三十六食既者三此年而後荆楚僣王鄭敗王師射王中肩宣八年而後楚莊圍宋析骸易子伐鄭鄭伯肉袒晋大敗于邲屈服荆楚襄二十四年而後齊崔抒衛寧喜弒君吳楚橫行中國皆臣子僣逆外寇暴橫之應變既大則其應亦僣矣公子翬如齊逆女穀梁傳逆女親者也使大夫非正也程子傳翬於隱世不稱公子隱之賊也於桓世稱公子桓之黨也娶妻必親迎去聲下同禮之正也若夫邦君以爵則有尊卑以國則有小大以道途則有遠邇或迎之於其國或迎之於境上或迎之於所館禮之節也紀侯於魯以小大言則親之者也而使履緰音須來魯侯於齊以遠邇言則親之者也而使公子翬往啖氏曰以公子尤不可也薛氏曰逆女而使同姓之卿非所以厚别也是不重大昏之禮失其節矣故書王氏曰書公子翬逆女而公不親迎與寵任賊臣之罪皆著矣陳氏曰翬何以得稱公子如他大夫翬弒隱而相桓臣子無討焉則固書翬如他大夫也桓立而相翬是德翬也德翬則是桓弒隱桓罪著矣家氏曰翬者桓所與其為篡弒之人為桓謀所以固其位者乞婚於齊今而逆女豈無他人而使翬逆焉使之重自結也春秋於隱世去翬族以正其弒君之罪於桓世復稱公子明其與桓共為逆也若曰翬者國之大賊而桓之私人也所謂不誅之誅也愚按翬為桓弒隱復為桓逆女以結齊好遂為宣弒赤復為宣納賂逆婦以結齊援皆不待貶絶而罪惡見者也劉氏曰左氏云修先君之好故曰公子非也春秋非修先君之好而稱公子者多矣九月齊侯送姜氏于歡歡音歡左傳非禮也凡公女嫁于敵國姊妹則上卿送之公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之公羊傳何以書譏諸侯越竟送女非禮也此入國矣何以不稱夫人自我言齊父母之於子雖為鄰國夫人猶曰吾姜氏榖梁傳禮送女父不下堂母不出祭門諸母兄弟不出闕門父戒之曰謹慎從爾舅之言母戒之曰謹慎從爾姑之言諸母般申戒之曰謹慎從爾父母之言送女踰竟非禮也杜氏曰歡魯地濟北蛇丘縣有下歡亭愚按今東昌路丘縣公會齊侯于歡程子傳齊侯出疆送女公遠㑹之皆非義矣夫人姜氏至自齊公羊傳翬何以不致得見乎公矣榖梁傳其不言翬之以來何也公親受之于齊侯也程子傳告于廟也古者昏禮必親迎去聲則授受明昏義昏禮親迎主人筵几於廟而拜迎于門外壻執鴈入揖讓升堂再拜奠鴈蓋親受之於父母也降出御婦車而壻授綏後世親迎之禮廢於是有父母兄弟越境而送其女者列女傳齊孝公夫人孟姬華氏長女也齊國稱其貞孝公聞之修禮親迎于華氏之室父母送之不下堂母醮之房中父誡之東階之上諸母誡之兩階之間姑姊妹戒之門內可謂能行禮矣以公子翬往逆則既輕矣蜀杜氏曰魯逆失之輕而齊送之失之過其貶固鈞者也翬不奪公子齊侯稱爵斥言其人以見不正為去聲齊侯來乃逆而㑹之于歡是公之行其重在齊侯而不在姜氏豈禮也哉薛氏曰齊侯送女于外公以㑹禮接之非親迎且兩失之也夫婦人倫也不正之於其始桓之夫婦是不為夫婦矣張氏曰齊僖愛其女之過至於越竟而送之遂使魯桓之出不為親迎而為齊侯在歡特往㑹之僖之送桓之㑹皆非也春秋謹而書之所以重大昏而正人倫之始也家氏曰或謂公㑹齊侯于歡不曰古親迎之遺意乎曰翬之往逆公固無親迎之意及聞齊侯親送姜氏乃遽往㑹于歡則公之出為齊侯而出非為親迎而出於禮則似是而用禮之意則非也蜀杜氏曰再言歡者所以甚之也不言以至者據遂及僑如以夫人至既得見乎公也孫氏曰此齊侯送姜氏公受之于歡也受之于歡不以歡至者不與公受于歡也故書至自齊以正其義薛氏曰書至不與公俱至也桓公夫婦之道終始乎不正也不能防間於是乎在敝笱之刺七賜反兆矣詩齊風敝笱小序刺文姜也齊人惡魯桓公微弱不能防間文姜使至淫亂禮者所以别筆列反嫌明微制治于未亂不可不謹也娶夫人國之大事故詳臨川吳氏曰昏禮之大節有三納幣一也親迎二也夫人至三也得禮則皆不書魯桓㑹嬴書譏不由媒介而自求昏于齊也逆女書譏不親迎而使公子翬也送姜氏書譏齊侯親送也㑹歡書譏不親迎而親㑹齊侯也夫人至不書翬以譏魯桓初使翬逆而中自受姜氏于歡也愚按文定此年傳謂娶夫人國之大事莊二十四年傳謂婚姻常事不書蓋婚姻合禮而不志者書法之常也故僖公之娶夫人納幣逆女夫人至皆不書也桓公之娶文姜不合於禮故以為大事而悉志之者所以垂戒而書法之變也昭公之娶同姓則又以國惡而隱之迎聖人作經如化工生物洪纎髙下因物賦形安可執一而論之哉冬齊侯使其弟年來聘程子傳致夫人也稱弟義見隱七年杜氏曰女出嫁又使大夫隨加聘問在魯而出則曰致女在他國而來則揔曰聘臨川吳氏曰齊僖親送女至魯竟歸未幾又使貴介弟致之見其愛女之至情之私非禮之正也髙氏曰隱七年弟年嘗聘今桓篡隱而結昏復使來聘齊侯於魯視篡弒易君恬不為意如市道之交歡耳有年公羊傳僅有年也榖梁傳五榖皆熟為有年程子傳書有年紀異也人事順於下則天氣和於上桓弒君而立逆天理亂人倫天地之氣為之謬戾水旱凶災乃其宜也今乃有年故書其異宣公為弒君者所立其惡有間故大有年則書之楊士勛疏凡書有年於冬下五穀畢入計用豐足然後書之舊史災異與慶祥並記故有年大有年得見音現于經若舊史不記聖人亦不能附益之也然十二公多歷年所有務農重榖閔雨而書雨者詩魯頌駉小序僖公儉以足用寬以愛民務農重穀榖梁傳僖三年閔雨者有志乎民也豈無豐年而不見於經是仲尼於他公皆削之矣鄱陽萬氏曰諸公之不書有年不勝其書也髙郵孫氏曰春秋二百四十二年而書有年大有年各一而巳桓宣大惡何道而冇年乎獨桓有年宣大有年則存而不削者緣此二公獲罪於天宜得水旱凶災之譴今乃有年則是反常也故以為異特存耳髙氏曰凡人力之所不能及者必推之天以天理之有常不若人事之錯亂也今反常理故書其異左傳秦針曰國無道而年榖和熟天贊之也然則天道亦僣乎桓宣享國十有八年獨此二年書有年他年之歉可知也而天理不差信矣張氏曰桓公行惡其所感召如元年大水五年旱雩螽八年十月雨雪十三年大水十四年無冰御廪災等事十八年間獨今年五穀僅熟故以為異特書于䇿著桓公之罪憫魯國之民也此一事也在不修春秋則為慶祥君子修之公羊莊七不修春秋云云君子修之云云則為變異是聖人因魯史舊文能立興王之新法也故史文如畫筆經文如化工嘗以是觀非聖人莫能修之審矣左傳成十四非聖人誰能修之有年大有年自先儒說經者多列於慶瑞之門啖趙氏亦與獲麟並列至程氏發明奧㫖然後以為記異此得於言意之表者也賈逵曰桓惡而有年豐異之也言有非其所宜有薛氏曰災異之書正也有年之書幸也政之足以得災而天與之年亦變也通㫖孫明復曰桓十八年惟此一年有收以著桓世之多凶饉也伊川曰記異也異反同者也天常為同水變為異每嵗凶饉此有年則為異矣愚按公羊云以喜書故說者以為慶祥茍以為慶祥則不獨書于桓宣矣癸桓王十酉二年四年齊僖二十三晉小子侯元衛宣十一蔡桓七鄭莊三十六曹桓四十九陳桓三十七杞武四十三宋莊二秦寧八楚武三十三春正月公狩于郎此搜狩之始左傳書時禮也公羊傳常事不書譏何譏爾逺也穀梁傳四時之田皆為宗廟之事也春曰田夏曰苖秋曰搜冬曰狩四時之田用三焉唯其所先得一為乾豆二為賔客三為充君之庖程子傳公出動衆皆當書于郎遠也杜氏曰周之春夏之冬也田狩從夏時郎非國內之狩也故書地何以書譏遠也何氏曰諸侯田狩不過郊張氏曰狩因夏時仲冬周正月乃其時也然國之搜狩自有處今不於常所而逺涉郎地所以譏也永嘉吕氏曰此狩于郎與觀魚于棠之類皆譏逺地也戎祀國之大事左傳成十三國之大事在祀與戎狩所以講大事也隱五四時之田皆於農隙以講大事用民以訓軍旅所以示之武而威天下取物以祭宗廟所以示之孝而順天下髙郵孫氏曰天子諸侯無事則嵗田焉田者用民以訓軍旅者也取物以祭宗廟者也然而用民不以制則民傷乎農取物不以禮則物害乎性四時之田不傷農不害物以示天下之孝與武也故中音仲下同春教振旅遂以搜中夏教茇蒲末反舍遂以苖中秋教治兵遂以獮息淺反中冬教大閲遂以狩見周禮大司馬注凡師出曰治兵入曰振旅皆習戰也茇舍草止之也軍有草止之法大閲簡軍實搜索擇取不孕者苖為苖除害稱殺也狩言守取之無所擇也然不時則傷農不地則害物啖氏曰搜狩常事不書非時及越禮則書田狩之地如鄭有原圃秦有具囿僖三十三年鄭皇武子曰鄭之有原圃猶秦之有具囿也皆常所也違其常所犯害民物而百姓苦之則將聞車馬之音見羽旄之美舉疾首蹙頞而相告孟子云云吾王之好田獵夫何使我至於此極也可不謹乎以非其地而必書是春秋謹於微之意也每謹於微然後王德全矣本劉氏意林髙氏曰桓始昏于齊而有年奉之凡侈心生於中則逸德見于外郎魯疆埸也遠狩于疆埸危之也公有篡弒之惡人得而討之曽不是念而遠狩於是知其安於弒逆恬不懷懼也先王之世安不忘危治不忘亂春秋之時習於田獵謂之賢間於馳逐謂之好非因田狩以講兵又或非其地或非其時此聖人不得不詳著以埀戒焉愚按人君恤民宜無所不至故田狩雖不違時而不於常所亦春秋所譏蓋田狩固有常制而淫於遊田乃聖人之所戒也賈山諌文帝謂秦始皇以千八百國之民自飬馳騁弋獵之娛天下弗能供也人與之為怨家與之為讎猶且東巡狩刻石著功自以為過堯舜身居滅絶之中而不自知也流弊之禍可勝言哉此書公狩于郎後此昭九年築郎囿蓋即其地垣而囿之矣然魯有郎囿又有鹿囿蛇淵囿而搜于紅大搜于此蒲昌間又不即囿以搜田而馳騖於稼穯場圃之中豈非犯害民物不恤國本而若是乎劉氏曰公羊謂春曰苖秋曰搜冬曰狩非也周禮春搜夏苖秋獮冬狩得其正矣何休以謂春秋制王制承謬亦復闕夏鄭康成乃云夏時制度避其號不亦妄乎說穀梁者曰春而曰狩蓋用冬狩之禮夫周之正月夏之十一月云狩是也穀梁自顛倒之耳夏天王使宰渠伯糾來聘程子傳桓公弒其君而立天子不能治天下莫能討而王使其宰聘之示加尊寵天理滅矣人道亡矣書天王言當奉天也而其為如此名糾尊卑貴賤之義亡也人理既滅天運乖矣隂陽失序嵗功不能成矣故不具四時宰冡宰也渠氏伯爵糾其名也本劉氏張氏曰渠采地王朝公卿書爵三公稱公如周公祭公之類六卿書爵如祭伯凡伯毛伯召伯單子劉子大夫書字上士中士書名下士書人例也糾位六卿之長上聲降從中士之例而書名貶也陵氏曰天子六卿為冢宰者皆加宰字兼為三公則曰公渠伯書名貶之也陳氏曰周大夫不名名宰渠伯聘桓也王臣未有書官者於是特書宰有聘桓者矣必宰自為使而後貶貶其甚者也髙郵孫氏曰春秋之志王臣者三十其處可責可善之地者有二焉宰渠伯糾之志名王人子突之志字其義也於糾何貶乎在周制大司馬九伐之法諸侯而有賊殺其親則正之放弒其君則殘之周禮注正之者執而治其罪王霸記曰正殺之也殘殺也殘滅其為惡桓公之行去聲當此二者舍上聲曰不討而又聘焉失天職矣操刑賞之柄以馭下者王也論刑賞之法以詔王者宰也以經邦國則有治典以安邦國則有教典以平邦國則有政典以詰邦國則有刑典治教政刑而謂之典明此天下之大常也大音泰下同宰所掌而獨謂之建周禮大宰之職掌建邦之六典愚按此不言禮典事典舉其重者也以此典大宰之所定也乃為亂首承命以聘弒君之賊乎故特貶而書名以見音現下同宰之非宰也有冢宰之貴而不足以居其位失其所以貴矣王制大夫廢其事終身不仕死以士禮葬之春秋天子之事名宰以正王法劉氏曰春秋於大夫莫書其官至冢宰獨書之以此見任之最重也宰天下者莫名至糾獨名之以此見責之最備也周公作周禮冡宰之職固賞善誅惡進賢退不肖今銜命下聘弒逆之人故書名貶之聘于弒君之賊而名其宰則桓公沒王使榮叔來錫命矣榮叔何以書字而不名也始而來聘冡宰書名以見貶終而追錫王不稱天以示譏其義備矣愚按桓以不義得國始則天王以冡宰聘之終則天王使大夫追命之終始施非常之恩故春秋於終始致非常之貶冡宰稱名王不稱天貶莫重於此矣前後各貶互文見義夫咺賵仲子糾聘桓公其事皆三綱之所繫也明仲子之為妾所以正夫婦之綱明桓公之為篡所以正君臣之綱茍不知仲子之為妾則不知桓公之為篡矣家氏曰或謂隱元年之責咺春秋欲起天王之義故於王無責今復責糾而不及王何也曰春秋之義君有過先責其宰咺與糾居大臣之位既不能正諌又將命以出重有責也乃若錫命王不稱天以榮叔非宰故不與咺糾同責然咺獨書官糾兼稱爵何也如咺者豈初得政猶未受封而糾則或以諸侯入相去聲下同如衛武公或既相而已封者乎如周公召公漢初命相必擇列侯為之惠帝以平陽侯曹參代鄼侯蕭何為相國繼又以安國侯王陵曲逆侯陳平為左右丞相文帝以絳侯周勃與陳平為左右丞相後用公孫因相而得封武帝元朔五年以公孫𢎞為丞相封平津侯丞相封侯自𢎞始闕後石慶為丞相封牧丘侯公孫賀為丞相封葛繹侯蓋欲倣古重其任也任之重則責益深矣嫡妾之分扶問反君臣之義天下之大倫無所輕重糾以既封故兼稱爵見春秋責相之意也張氏曰天子之冡宰不能詔王以八柄馭羣臣乃親奉命來聘魯桓是寵篡弒以瀆三綱故貶而名之也春秋奉天道以正王法故君天下者必敕典庸禮命德討罪以當天心然後輔相裁成之職盡而天地以位萬物以育二百四十二年必具天時王月以見天之所以成一嵗之運由人之賞罰政刑成位乎其中則天地之功全也今魯桓有弒君之罪王不能討而反使冡宰聘之王者之職虧闕人類將變為禽獸故闕秋冬於冡宰聘桓之後以見天地之失其收藏萬物之失其生遂由王誅之不加於魯桓而寵秩之也何氏曰去二時者桓公無王而行天子不能誅反下聘之故為貶見其罪髙氏曰桓弒君以立天王不討反以冡宰聘之天理亡矣桓自是益無顧忌在洪範為狂為豫是為咎徴此有春夏而無秋冬之時蓋天理既滅而嵗功不成也故不具秋冬趙氏曰若其代父攝行卿事當依仍叔之子為文何得加名故知為貶通㫖好生者舜而誅四凶克寬者湯而誅葛伯懷保小民者文王而侵阮共奸惡之不可縱尚矣大司馬九伐之法云云正者正其罪惡殘者殘其形體桓公當此二法而刑不加焉則是不奉天討而縱有罪可乎特去秋冬二時明天王之無刑政也天子者受天命以正享國必承天意以正行事必彰有德象春夏以正賞必討有罪法秋冬以正刑是謂能若天道合春秋大居正之法劉氏曰左氏曰父在故名非也武氏子求􅉠言世武氏也仍叔之子來聘言幼明也褒貶不既明矣乎若糾擅攝父位自取冡宰者其貶猶應甚彼不得但以父在名之而巳捨大責小非春秋也公羊謂下太夫也繫官氏名且字亦非也理不可書名而又書字仲尼之筆一何繁且迂哉春秋胡傳附録纂疏卷四
