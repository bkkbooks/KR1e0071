body:
  text: 春秋胡傳附録纂疏卷五元汪克寛撰桓公中甲桓王十戊三年五年齊僖二十四晉小子二衛宣十二蔡桓八鄭莊三十七曹桓五十陳桓三十八卒杞武四十四宋莊三奉寧九楚武三十四春正月甲戌穀梁傳春秋之義信以傳信疑以傳疑程子傳下文缺傳見隱二年己丑陳侯鮑卒桓公也在位三十八年庶弟佗立明年蔡人殺佗立厲公左傳於是陳亂文公子佗殺大子免而代之故再赴趙氏曰豈有正當禍亂之時而暇競使人赴告哉假令實再赴夫子亦當詳定其實日何乃總載之乎且傳云公疾而難作此文亦據陳國史而記之驗此則經文甲戌下當記陳佗作亂之事全簡脫之耳啖氏曰公穀皆云甲戌之日出而亡己丑之日死而得按人君雖狂而去亦當有臣子從之豈有人君走出臣下不追逐昧其死日乎夏齊侯僖鄭伯莊如紀程子傳齊侯鄭伯朝於紀欲以襲之紀人知之齊為諸侯而欲為賊於鄰國不道之甚鄭伯助之其罪均矣按左氏齊鄭朝紀欲以襲之紀人知之夫如者朝詞也趙氏曰如者朝聘之名外相如皆譏薛氏曰無相朝之志也假相朝之禮也家氏曰書爵目其人而貶之也尊不朝乎卑大不朝乎小紀之為紀微乎微者也齊在東州尊則方伯僖四召康公命大公曰五侯九伯汝實征之鄭亦大國也春秋初年鄭最强並驅而朝紀乃懷詐諼况元反之謀欲以襲之而不虞紀人之覺也其志憯音慘說文痛也矣臨川吳氏曰諸侯相朝雖有其禮然春秋之時小役大弱役强强大之國必不往朝小弱之國雖敵體之國亦不相朝惟小弱必須往朝于强大蓋畏之也齊鄭以强大而朝於紀之小弱蓋借朝之名以往紀而實欲以兵襲取其國紀素知齊鄭之圖己故覺其謀而齊鄭之詐不得以行也此外相如爾何以書紀人主魯故來告其事魯史承告故備書于策杜氏白齊欲滅紀紀人懼而來告故書夫子修經存而不削者以小國恃大國之安靖已而乃包藏禍心以圖之左傳昭元亦異於興滅國繼絶世之義矣故存而弗削以著齊人滅紀之罪明紀侯去國之由劉敞意林所謂聖人誅意之効是也劉氏曰春秋惡其懐不義之心雖卒不能害而疾之與襲侵人之國無異云云故兵莫㦧於志鏌鎁為下通㫖兵莫憯於志鄭伯克叚齊侯如紀其憯甚於鏌鎁人君明此義可以正其志人臣明此義可以格君心之非使之不遠而復也張氏曰春秋惡其懷盜賊之心而行朝事之禮書之若實朝於紀然所以抑强暴惡譎詐也春秋之初齊僖鄭莊皆小人之雄合謀同心以吞噬小國為事自隱三年石門之盟至桓十三年惡曹之盟二十年之間二國為一伐宋取郜防入郕入許今又相與謀紀自二君如紀之後紀侯多爲計以謀自免於難而卒不能止齊鄭貪噬之心至莊五年使紀季以􅈶入於齊紀侯去國然後快於心小國困於强暴者二君之罪居多臨川吳氏曰許近於鄭紀近於齊鄭欲得許與齊同謀之而卒得許齊欲得紀與鄭同謀之而卒得紀愚按外相如惟齊鄭如紀與州公如曹春秋惡齊鄭之不能恤小國而假朝禮以濟凌人之謀惡州公不能保其國而假朝禮以為依人之具皆非眞能行朝禮者也夫不能保小寡而思啓疆以利巳不能自强於為善而依人以求托其身皆春秋之所不予也比事以觀考齊人滅紀之本末及州寔之來魯而聖人之意見矣劉氏曰公羊以謂離不言㑹故言如也非也春秋之記盟㑹者所以刺譏諸侯非善羣聚而惡離㑹也離㑹何為不可書而改㑹為如以亂名實哉天王桓使仍叔之子來聘仍榖作任左傳仍叔之子弱也公羊傳仍叔之子天子之大夫也其稱仍叔之子譏父老子代從政也榖梁傳錄父以使子也故微其君臣而著其父子不正父在子代仕之辭也程子傳古之授任稱其才德故士無世官周衰官人以世故卿大夫之子代其父任事仍叔受命來聘而使其子代行也仍叔之子云者何氏曰言氏起父在加之者起子愚按詩雲漢序云仍叔美宣王則仍叔世大夫可知譏世官非公選也帝王不以私愛害公選故仕者世禄而不世官孟子文王治岐仕者世祿王制大夫不世爵使以德爵以功任之不以其賢也使之不以其能也卿大夫子弟以父兄故而見使公穀皆云父老子代從政程子則云父受命而使子代行愚按非有天子之命則亦不敢使子代聘也則非公選而政由是敗矣上世有自耕野釣渭擢居輔相去聲孟子伊尹耕於有莘之野相湯以王於天下史記呂尚以漁釣奸周西伯西伯將出獵果遇太公於渭之陽載與俱歸立為師而人莫不以為宜伊陟象賢復扶又反相太戊書小序伊陟相太戊注伊陟伊尹子微子之命象賢蔡傳謂其後嗣子孫有象先聖王之賢者丁公世美入掌兵權顧命齊侯吕伋以二干戈虎賁百人逆子釗注伋大公子丁公也左傳世濟其美不以世故疑之也崇伯殛死禹作司空國語鯀為崇伯史記鯀治水九年而功用不成舜巡狩視鯀之治水無狀乃殛之於羽山以死於是舉禹使續鯀之業舜典伯禹作司空蔡叔既囚仲為卿士蔡仲之命周公位冢宰羣叔流言囚蔡叔于郭鄰蔡仲克庸祇徳周公以為卿士亦不以其父故廢之也惟其公而已矣及周之衰小人得政視朝廷官爵為已私援引親黨分據要途施以豉反及童稚賢者退處於蓽門左傳襄十瑕禽曰吾能無蓽門圭竇乎老身而不用公道不行然後外㓂侵凌國家傾覆雖有智者不能善其後矣春秋書武氏仍叔之子云者武氏子隱三年戒後世人主狥大臣私意而用其子弟之弱者杜氏曰本於父字幼弱之辭也居公選之地以敗亂其國家欲其深省之也范氏曰君闇劣於上臣苟進於下蓋參譏之家氏曰大臣耽寵固位惟恐失之欲及其尚存而見子孫之貴書仍叔之子譏其以父及子也去年宰糾聘名之所以貶也今仍叔子聘不名亦所以貶也貴者以名為貶少且賤者以不名爲貶桓負大惡王不能討以一聘爲未足復再聘焉故春秋於貴者則名之於賤者則微之以深致其意高氏曰桓王失信諸侯背叛欲謀婚而諸侯莫從桓以簒立懼諸侯討己欲自結於王故因紀之故而為王謀焉故桓王三遣使來聘也春秋書之見桓公以紀之婚姻結好于王以掩大惡其曰使仍叔之子者見王綱不舉以大夫之子參預國事不稱氏者世權不重於尹武也愚按漢以曹操子丕為五官中郎將丞相副魏以司馬昭子炎爲中撫軍副相國而遂移國祚宋用王安石蔡京父子而遂致國亡是皆徇大臣私意而用其子弟之禍也可不懼哉八年傳下聘弑逆之人而不加貶者既名冢宰於前其餘無責焉乃同則書重之義葬陳桓公臨川吳氏曰不書月史失之蓋陳佗簒立而葬之也城祝丘杜氏曰齊鄭將襲紀故陸氏曰譏不時高氏曰據文姜享齊侯于祝丘則祝丘齊魯兩境上邑齊將襲紀公欲助紀而畏齊故非時城此以備之王氏曰祝丘魯地漢之即丘縣今沂州臨沂東南與紀相鄰愚按沂州今屬益都路秋蔡人衞人陳人從王伐鄭從如字公羊傳其言從王伐鄭何從王正也穀梁傳鄭同姓之國在乎冀州於是不服為天子病矣程子傳王奪鄭伯政鄭伯不朝王以諸侯伐鄭鄭伯禦之戰于繻葛王卒大敗王師於諸侯不書敗諸侯不可敵王也於外域不書戰外域不能抗王也此理也其敵其抗王道之失也按左氏王奪鄭伯政鄭伯不朝王以諸侯伐鄭鄭伯禦之戰于繻葛王卒大敗祝聃射王中肩春秋書王必稱天者所章則天命也所用則天討也王奪鄭伯政而怒其不朝以諸侯伐焉非天討也通㫖天子討而不伐桓王伐鄭非天子事故不言討故不稱天同上錫桓伐鄭賵葬成風皆三綱所由滅也故書王而巳此亦不王矣不書則無自而見故去天以示貶其書王則存名號耳鄱陽萬氏曰桓王伐鄭非天討莊王錫桓公命襄王賵葬成風非天命故皆不書天或曰鄭伯不朝惡平聲得為無罪曰桓公弑君而自立宋督弑君而得政天下大惡人理所不容也則遣使去聲來聘而莫之討前年宰糾聘今年仍叔之子聘鄭伯不朝貶其爵可也孟子一不朝則貶其爵何爲憤怒自將平聲以攻之也薛氏曰九伐之法無親征諸侯之制王親戎事危道也其不書王師何王為重也移此師以加宋魯誰曰非天討乎張氏曰自入春秋以來王室未嘗興兵伐諸侯今一旦天子帥元戎啓行而諸侯從之若天討加於宋督魯桓則所謂仁不以勇義不以力而眞足以大服天下之心矣今桓王以小忿奪鄭伯之政又帥諸侯伐之而巨姦大惡反易天常之亂臣賊子乃屢聘焉其失天下共主之義非小過也遂致鄭伯敢於抗拒祝聃逆節加於王身而王靈至此竭矣春秋天子之事述天理而時措之也既譏天王以端本矣三國以兵㑹伐則言從王者又以明君臣之義也君行而臣從正也啖氏曰不言㑹及臣從君之辭也孫氏曰不言以蔡人衞人陳人伐鄭者不使天子首兵也桓王親伐下國惡之大者曷為不使首兵天子無敵非鄭可得抗也故曰蔡人衞人陳人從王伐鄭以尊之陸氏曰陳陀殺太子而立王不能討又許其以師從王之失政亦可知也戰于繻音須葛而不書戰王卒大敗而不書敗者又以存天下之防也陳氏曰嘗戰矣而不言戰嘗敗績矣而不言敗績諱之也其曰蔡人衞人陳人從王伐鄭尊王也春秋之法有天子在則其諸侯稱人王自將討鄭討鄭而克是仲康之師也春秋可以無作而戰焉王卒大敗是故伐鄭不服而後王命不行於天下安定胡氏曰不書王師敗績于鄭王者無敵於天下書戰則王者可敵書敗則諸侯得禦故言伐而不言敗茅戎書敗者既非聲教所及王者不討也王師非王親兵致討故敗而書之三綱軍政之本聖人寓軍政於春秋而書法若此皆裁自聖心非國史所能與音預也蜀杜氏曰苗民不服舜命禹徂征之蓋用兵之事天子不親為之以其至尊不可屈也鄭雖不朝桓王以三國之兵伐鄭失正也永嘉呂氏曰王伐鄭而從之者僅三國何哉蔡衛陳之仇鄭乆矣隱二年鄭伐衛四年宋陳蔡衛伐鄭十年宋衛入鄭又與蔡人伐楚而鄭復伐取三國之師桓二年陳與鄭雖㑹于稷蔡與鄭雖㑹于鄧未有成也衛之隙未解也王計有討於鄭而三國從之托公義以濟私忿耳愚按傳稱王以諸侯伐鄭而經書三國從王實變文以著君臣之大分然成十三年傳云公及諸侯遂從劉康公成肅公㑹伐秦而經不書諸侯從劉子成子者王臣非至尊之比猶尹子單子之伐鄭止以列㑹為文也襄十四年傳云諸侯之大夫從晉侯伐秦而經不書大夫從晉侯者諸侯非王命不當擅興列國之師蓋齊桓晉文之侵伐止以列㑹為文也文定謂桓王伐鄭非天討乃端木澄源之意董子所謂正心以正朝廷正朝廷以正四方而遠近莫不壹於正非謂鄭莊為無罪也特以諸侯之罪有甚於鄭莊者桓王舍其大而問其細循其私意而不出於公理是以不得為天討而鄭亦不服耳或者乃謂祭足帥師取畿甸之麥禾是稱兵以犯王略王之伐之有不容已者抑不知王貳於虢祭足取麥與禾乃隱之三年越三年而鄭伯朝王桓王不禮焉是取麥禾之罪固當問然不當待其朝而不禮也又二年桓王遂以虢公忌父為卿士是時鄭公子忽在王所鄭伯以齊人朝王又三年而鄭伯以虢師伐宋非惟鄭未叛王亦未怨虢之深也及王取鄔劉蔿䢴之田于鄭而與鄭人蘇忿生之田於是鄭始怨王至是王復絶之而鄭莊遂不朝跡其所由鄭莊雖小人之雄苟桓王處之有其道則不至此也取麥與禾之罪當其時則不之討今之不朝毋乃己德猶有所缺而不忍一朝之忿屈萬乘之尊以犯積怨之强臣寧不自取辱耶春秋深明其用自貴者始王不稱天以正其本三國書從以明人臣從君之義戰敗不書以存大君無敵之體書三國從王伐鄭以人臣而致天子之親伐則鄭之罪亦不司揜矣從王伐鄭為一經之特筆輕重之權衡君臣之名分莫不畢見豈不深切著明矣哉劉氏曰穀梁謂舉從者之辭也其舉從者之辭何也為天王諱伐鄭也非也直言從王伐鄭文順事明又妄云舉從者之辭何哉且安見諱伐鄭之義哉大雩此書雩之始左傳凡祀啓蟄而郊龍見而雩始殺而嘗閉蟄而烝公羊傳大雩旱祭也何以不言旱言雩則旱見言旱則雩不見何以書記災也榖梁定元年傳雩得雨曰雩不得雨曰旱雩月雩之正也秋大雩非正也冬大雩非正也秋大雩之為非正何也毛澤未盡人力未竭未可以雩也月之爲雩之正何也其時窮人力盡然後雩雩之正也何以謂其時窮人力盡是月不雨則無及矣是年不艾則無食矣是謂其時窮人力盡也雩之必待其時窮人力盡何也雩者為旱求者也求者請也古之人重請焉請哉請乎應上公古之神人有應上公者通乎隂陽君親帥諸大夫道之而以請焉夫請者非可詒託而往也必親之者也是以重之程子傳成王尊周公故賜魯重祭得郊禘大雩大雩雩于上帝用盛樂也諸侯雩于境内之山川耳成王之賜魯公之受皆失道也故夫子曰魯之郊禘非禮也周公其衰矣大雩歲之常祀不能皆書也故因其非時則書之遇旱災則非時而雩書之所以見其非禮且志旱也郊禘亦因事而書大雩者雩于上帝用盛樂也月令仲夏之月命有司為民祈祀山川百源大雩帝用盛樂注雩吁嗟求雨之祭也雩帝為壇於南郊之旁雩五方上帝配以先帝自鞀鞞至柷敔皆作曰盛樂他雩用歌舞而已正雩在四月為五月不雨修雩故記之於五月也程子曰古者一年之閒祭天甚多春則因播種而祈穀夏則恐旱暵而大雩張氏曰建巳之月常祀不書至非常祀之月或遇旱暵則因旱而舉春秋書之以見災異臨川吳氏曰魯之雩祀僭王禮特書曰大雩以表其為天子祀上帝之雩而非諸侯祭山川之雩也左氏謂龍見而雩過則書龍見者孟夏建巳之月經無書六月雩者蓋得禮則不書七月八月九月則皆過時故書書冬則建酉之月穀已成熟尤為非時也魯有舞雩壇蓋祀帝于壇如郊焉而用盛樂歌舞於壇上故名其壇為舞雩而日亦如郊之用辛也諸侯雩于境内之山川爾山川百源能興雲雨者也月令注諸侯雩上公魯諸侯而郊禘大雩欲悉書於策則有不勝平聲書故雩祭則因旱以書而特謂之大孫氏曰謂之大者惡其僭用天子之雩也不謂之大則魯僭天子之惡無以見矣家氏曰郊禘亦僭而不書大郊禘一而已矣若雩則天子與諸侯為禮各異故書大以斥其僭郊禘亦因事以書而義自見音現書郊則或以瀆卜或以牛災或以過時書禘則或以紊䘮制或以尊妾母皆失禮之中又失禮者也此皆國史所不能與音預君子以為性命之文是也卲子曰人言春秋非性命之書非也云云豈非由性命而發言也故曰聖人盡性之書也諸侯不得祭天地大夫不得祭山川士庶人不敢以他人祖禰祭於己之寢禮也曲禮天子祭天地祭四方祭山川祭五祀歲徧諸侯方祀祭山川祭五祀歲徧大夫祭五祀歲徧士祭其先王制諸侯祭名山大川之在其地者故季氏旅於泰山子曰嗚呼曾謂泰山不如林放乎朱子語天子祭天地諸侯祭國内山川只縁是他屬我故祭得他若不屬我氣便不與之交感如何祭得程允夫問孔子謂八佾舞於庭至季氏旅泰山五章皆聖人救天理於將滅故其哀痛與春秋同意曰是愚按魯諸侯而祭天地及境外山川猶季氏以大夫而祭泰山也明乎春秋所書郊禘大雩之義則知聖人治國如指諸掌之說矣朱子語天地隂陽晝夜鬼神只是一理若明祭祀鬼神之理則治天下之理豈有外乎此愚按禮也者天理之節文也故郊禘大雩惟天子得用之而諸侯不得用之者蓋天理之當然也天下國家萬物萬事莫不各有當然之則幽明一理顯微無閒苟知聖人所書郊禘大雩之義則其他事物之理又何所難知哉劉氏曰左傳書不時也非也龍見而雩常事爾遇旱而雩非常也非常當書書為旱發非為過時發也愚按經書雩二十一左氏於此年云書不時襄五年八年二十八年昭三年六年十六年二十四年皆曰旱也昭二十五年再雩則日旱甚餘年無傳首言不時而後皆言旱其意以互文見義皆以旱而皆不時也然春秋書雩實以旱書而併著其僭耳劉氏曰說者皆謂成王賜魯天子禮樂非也魯惠公使宰讓請郊廟之禮於天子天子使史角往其後在魯實始為墨翟之學臨川吴氏曰劉氏此說蓋欲為成王解脫過舉之非實則不然當從程子之說所引惠公使宰讓事今載外紀其言厖誕無稽倘使天子之禮諸侯可以請則春秋時强僭之國挾勢援例請之者多矣何魯惠能請而他國不敢請乎陵陽李氏曰外紀所據乃姓氏雜書其出又在戴記之後不足為證螽公作􅏑後同公羊傳記災也穀梁傳蟲災也杜氏曰蚣蝑之屬為災故書劉氏曰上書雩螽之為物常因旱而生程子曰螽蝗也既旱又蝗饑不在書也朱子曰螽蝗屬長而青長角長股一生九十九子愚按春秋書螽者十桓僖文襄之世各一見惟宣哀之世各三見何氏曰煩擾之應劉歆曰貪虐取民則螽冬州公如曹公羊穀梁傳外相如不書過我也程子傳州公嘗爲王三公故稱公不能保其國去如曹遂不復杜氏曰曹國今濟隂定陶縣張氏曰唐為曹州今興仁府濟隂縣愚按今屬東昌路曹州定陶縣按左氏淳于公如曹度待洛反其國危遂不復張氏曰州稱公與祭公同則州必畿内之地河内州縣也左氏乃云淳于公杜注城陽淳于縣州國所都昭元年傳云城淳于至云因州公不反國為杞所幷遂以淳于為都未詳孰是天子三公稱公如周公召公之類王者之後稱公如宋公之類州公諸侯而稱公者昔畢高以父師而保釐理也東土畢命命畢公保釐東郊王若曰嗚呼父師注畢公名高衞武以列國而入相于周詩淇澳小序美武公之德也云云故能入相于周蓋與後世出入均勞之意同唐𤣥宗開元二年定内外官使出入常均永為恒式此其所以稱公也外相如不書此何以書將有其末故先錄其本本范氏注臨川吳氏曰此人君之失國者與紀侯大去其國同但州公之去國有所如紀侯之去國無所如爾凡國君如他國皆朝也蓋其國危亡將寄託於曹假朝禮以行實則奔也乙桓王十亥四年六年齊僖二十五晉小子三衛宣十三蔡桓九鄭莊三十八曹桓五十一陳厲公躍元年杞武四十五宋莊四秦寧十楚武三十五春正月寔來寔時力反公羊傳猶曰是人來也謂州公也榖梁傳是來也何謂是來謂州公也程子傳五年冬如曹尚為君也故以諸侯書之今不能反國則匹夫也故名之來來魯也忽稱鄭忽明其正也寔不稱州亡其國也按左氏自曹來朝書曰寔來不復其國也杜氏曰不言州公承上五年冬經如曹間無異事省文從可知言奔則來行朝禮言朝則遂留不去故言寔來陳氏曰但曰州公來則疑於祭伯故書曰州公如曹春正月寔來是不復其國之辭也寔者州公名也永嘉吕氏曰寔即州公名春秋之法諸侯不生名失地滅同姓則名正名經世之本名正而天下定矣或曰諸侯失國而後託於諸侯孟子以為禮也陳氏曰古者諸侯去其國大宰取羣廟之主以從而託於諸侯曰寓公郊特牲諸侯不臣寓公今州公來朝將以諸侯之禮接之乎則春秋乃書其名將以匹夫之賤畜許六反之乎孟子乃以託國為禮將何處而可曰世衰道微諸侯放恣强凌弱衆暴寡天子不能正方伯不能治其有壤地褊小迫乎大國之間而失國是不幸焉非其罪也則以諸侯之禮接之可也若譚子在莒弦子在黄溫子在衞雖失國出奔而春秋不名義可見矣見莊十年滅譚𫝊若夫不能修道以正其國或棄賢保佞如曹陽用公孫彊潞嬰兒用酆舒之類或驕奢淫縱如邾益無道蔡獻舞止息嬀而不禮之類或用兵暴亂如胡豹盡俘楚邑之類自底音指致也滅亡如蔡獻舞邾益曹陽州寔之徒許斯胡豹頓牂沈嘉潞嬰兒皆書名皆其自取焉耳則待之以初公羊貴者無後待之以初乃禮之過也觀春秋名與不名則知所以處寓公之禮與强上聲為善自暴棄者之勸戒矣家氏曰夫以外諸侯入備王室之大臣外侮侵凌不能自存當請于王思所以為圖存之計勢窮理極死之可也今奔曹適魯去其封守託身於諸侯之國春秋書公書如曹書寔來皆所以責州公也劉氏曰公羊云謂之寔來慢之也非也君子躬自厚而薄責於人人雖無禮我可不為禮乎張氏曰記禮者曰天子曰非他伯父寔來成二年傳曰鞏伯寔來書州公曰寔來略之也夏四月公㑹紀侯于郕郕公左作成程子傳謀齊難也杜氏曰齊欲滅紀故來謀之成魯地在泰山鉅平縣東南愚按今屬濟寜路鉅野縣路氏曰此與二年書來朝三年㑹郕同旨家氏曰前年齊鄭以盜竊之兵襲紀而弗遂因是啓釁且將大加兵於其國紀睦於魯越境而謀公往㑹之義之不容已者春秋無譏也至冬而復來則不能無譏矣高氏曰以紀之微而捍齊之强者十有七年亦紀侯憂畏諮謀之功也歟秋八月壬午大閱公羊傳簡車徒也榖梁傳閲兵車也平而修戎事非正也其日以為崇武故謹而日之左傳北戎伐齊鄭太子忽帥師救齊大敗戎師於是諸侯之大夫戍齊齊人饋之餼使魯為其班後鄭鄭忽以其有功也怒秋大閱簡車馬也程子傳爲國之道武備不可廢必於農隙講肄保民安國之道也無事而爲之妄動也有警而為之則教之不素豈所以保其國乎盛夏大閲妨民害人失政之甚其不言公蓋懼鄭畏齊爲國講武非公之私欲也大閱簡車馬也范氏曰閲為簡練杜氏曰簡選練周制大司馬中音仲冬大閱教衆庶修戰法獨詳於三時者周禮大司馬中春教振旅司馬以旗致民平列陳如戰之陳辨鼓鐸鐲鐃之用以教坐作進退疾徐疏數之節中夏教茇舍中秋教治兵皆如振旅之陳中冬教大閱前期羣吏戒衆庶修戰法虞人萊所田之野為表百步則一為三表又五十步為一表田之日司馬建旗于後表之中羣吏以旗物鼔鐸鐃各帥其民而致質明弊旗誅後至者乃陳車徒如戰之陳皆坐羣吏聽誓于陳前斬牲以左右徇陳曰不用命者斬之中軍以鼙令鼓鼓人皆三鼓司馬振鐸羣吏作旗車旗皆作鼔行鳴鐲車徒皆行及表乃止三鼓振鐸羣吏弊旗車徒皆坐又三鼔振鐸作旗車徒皆作鼓進鳴鐲車驟徒趍及表乃止坐作如初乃鼔車馳徒走及表乃止鼓戒三闋車三發徒三刺乃鼔退鳴鐃且郤及表乃止坐作如初爲去聲農隙故也書八月不時矣本孫氏愚按夏之仲冬乃建子之月周之八月乃建未之月盛夏煩暑三農耘耔之時而驅南畝之民以簡車蒐徒為事有人心者豈為是哉以鼔則王執路鼔諸侯執賁扶云反鼔以旗則王載大常諸侯載旂見大司馬以殺則王下大綏諸侯下小綏見王制注綏當為緌旌旗也其禮固亦不同也書大閱非禮矣孫氏曰大雩大閱大蒐之類皆譏其僭天子夫子修春秋不斥言故因事而見意先王寓軍政於四時之田訓民禦暴其備豫也懼鄭忽畏齊人不因田狩而閱兵車范氏曰禮因四時田獵以習用戎事存不忘亡安不忘危之道今不因田獵無事而修之杜氏曰鄭忽訴齊魯人懼之故以非時簡車馬厲農失政甚矣何以保其國乎春秋非特以不時非禮書也乃天未隂雨徹彼桑土音杜綢繆牖户之意何氏曰孔子曰以不教民戰是謂棄之故比年簡徒謂之蒐三年簡車謂之大閱五年大簡車徒謂之大蒐存不忘亡安不忘危臨川吳氏曰先王之時兵可不用然不忘武備四時之田皆於農隙以習武事四時所教其法皆略惟仲冬教大閱其坐作進退擊刺眞如戰陣乃天子之禮非諸侯之所得行為其僭禮故因失時而書之以著其僭王氏曰僭制妨民故聖人謹而日之古者外事用剛日内事用柔日兵戎外事故大閱以壬午治兵以甲午猶吉日美宣王田而曰吉日維戊吉日庚午也陸氏曰公羊蓋以罕書也按以其非常故書爾非為少也穀梁蓋以觀婦人也按經無異文傳自穿鑿劉氏曰所謂罕者謂自入春秋今始一閱耶抑謂桓公今始一閱耶文之不通難以强合蔡人殺陳佗佗大阿反公羊穀梁傳陳佗者何陳君也其不地於蔡也左傳莊二十二年陳厲公蔡出也故蔡人殺五父而立之程子傳佗弑太子免而竊位不能有其國故書曰陳佗佗天下之大惡人皆得而誅之蔡侯殺之實以私也而書蔡人同於討賊之例見討賊者衆人之公也佗弑大音泰子而代其位朱子語佗之弑君不見於經亦是魯史無之耳至是踰年不成之為君者以賊討也啖氏曰佗踰年之君不曰陳侯以賊誅也書蔡人以善蔡書陳佗以善陳善蔡者以蔡人知佗之為賊張氏曰春秋之初先王之澤未泯人心之正理猶存故蔡人因人心之不君佗而殺之善陳者以陳國不以佗為君詩墓門刺陳佗也其詩曰夫也不良國人知之則陳人不以佗為君可知知其為賊故稱人稱人討賊之詞也陸氏曰臣弑君凡在官者殺無赦蔡雖他國以義殺之亦變之正也故書曰蔡人不以爲君故稱名稱名當討之賊也臨川吳氏曰陳不能討而蔡能討之故以討賊之義歸之蔡簒弑之賊人人得而殺之也陳佗簒立既葬桓公君陳亦已逾年矣然簒賊非可稱君故名而不爵凡簒賊而稱君者見本國之臣子與鄰國之君臣皆不能討而成之為君也苟有一人能明討賊之義而殺之則春秋以討賊之義歸之矣衞人殺州吁齊人殺無知蔡人殺陳佗是也家氏曰前此陳人爲衞討州吁今蔡人爲陳殺佗此鄰國之二討春秋所深與也治鄰賊者有褒則黨鄰賊也在所誅矣魯桓弑君而鄭伯與之盟宋督弑君而四國納其賂則不知其為賊矣齊商人弑君者及其見殺則稱位蔡般音班弑父者及其見殺則稱爵是齊蔡國人皆以為君矣聖人於此抑揚與奪遏人欲於横去聲流存天理於既滅見諸行事可謂深切著明矣簒弑之賊外則異國皆欲致討而不赦内則國人不以為君而莫之與誰敢勸於為惡故曰孔子成春秋而亂臣賊子懼先師曰王政不網天子不能討賊而聖人明春秋之義以討之謂非天子之事而何耶其討之也柰何曰如殺賊書人是也噫討賊天子事也聖人不唯自任而又寄之人人僭耶不得已耶故曰知我罪我其惟春秋乎愚按弑君而見殺者十有三惟四人以討賊書州吁無知衞人齊人能自討賊陳佗夏徴舒待蔡人楚人討之臣子之不能討其罪著矣晋惠因里克弑君而得國衞獻因甯喜弑君而復國利其所為使復為大夫既又忌而殺之非討賊也故以國殺大夫為文楚棄疾誘比以為君之利而俾當大惡之名既而殺之意在代其位非討賊也故以公子相殺爲文陳人雖殺宋萬然與賊為黨待宋人之賂而後殺之齊慶封誘崔杼而致之死皆非天討故不以討賊書也宋督死於南宮萬書之則為扞君難故不見於經齊商人蔡般既為國人所君曠歲歴年假手於盜賊蠻夷而討之春秋雖欲奪其爵位同之於賊有不可得矣趙氏曰佗殺太子之賊公穀不達此意妄云淫于蔡淫獵于蔡不近人情九月丁卯子同生左傳以大子生之禮舉之接以大牢卜土負之士妻食之公與文姜宗婦命之問名於申繻命之曰同公羊傳喜有正也程子傳書子同生聖人所以正大本而防僭亂也子同者桓之嫡長子也於其始生即書之其位固已定矣嫡冢之生國之大事故書適音嫡冢始生即書于策與子之法也啖氏曰君嫡子生以太子生之禮接之則史書之趙氏曰禮備於嫡是重宗廟記其是以著其非也蜀杜氏曰書同生正魯國之傳嗣而遏簒逆也張氏曰蓋嫡夫人之長子備用太子之禮故史書於䇿春秋於此明與子之法在於正始明分則私愛之所不能行嬖孽之所不能干所以定國本息亂源也唐虞禪夏后殷周繼春秋兼帝王之道賢可禪則以天下為公而不拘於世及之禮子可繼則以天下為家而不必於讓國之義禮運大道之行天下為公選賢與能大道既隱天下為家大人世及以爲禮萬世之通道也與賢者貴於得人與子者定於立嫡傳子以嫡天下之達禮也故有君薨而世子未生之禮曽子問君薨而世子生如之何孔子曰卿大夫從攝主北面於西階南大祝禆冕執束帛升自西階盡等不升堂命母哭祝聲三告曰某之子生敢告大宰命祝史以名徧告于五祀山川植音値置也遺腹朝委裘而天下不亂者前賈誼傳孟康注委裘若容衣太子㓜未坐朝事先帝裘衣也以名分素明而民志定也易君子以辨上下定民志經書子同生所以明與子之法正國家之本防後世配嫡奪正之事垂訓之義大矣通㫖適冢生大事也春秋書此以正國本晉獻公殺申生立奚齊而國亂數世漢高祖定惠帝黜趙王而延祚四百傳世三十一其效可見矣或問出姜之子不書其生何也曰記子同生明與子之法也春秋兼帝王之道或以天下為公而與賢或以世及為禮而與子與賢貴於得人故季札亂國仲尼不取與子定於立嫡故文姜始入春秋書之按左氏云云即太子之禮也載于史策名分一定則自始生至于受誓為世子其物采等衰固殊絶矣配適奪正之事無所從起此春秋與子之法也文公不知此義故子赤見殺出姜歸齊其生不見于經蓋仲尼削之耳鄭忽衞蒯聵出奔宋痤晉申生見殺王猛兄弟之以于劉單皆其君父丕知此義是以蒙首惡之名不亦悲乎此世子也其不曰世子何也杜氏曰不稱太子者書始生也天下無生而貴者見儀禮士冠禮篇誓於天子然後為世子周禮典命諸侯之世子誓於天子劉氏曰公羊以謂感隱桓之禍故以喜書不亦淺近乎穀梁曰疑故志之若聖人疑之誰復不疑之乎齊詩云展我甥兮展者信也詩人信魯莊公為齊侯之甥何有仲尼反疑其先君為齊侯之子乎朱子曰桓公三年夫人姜氏至自齊六年子同生十八年桓公乃與夫人如齊則莊公誠非齊侯之子矣永嘉呂氏曰二百四十二年惟此書子同生說者求其說而不得或謂惠無適子遂啓簒弑故以喜書或謂莊文成襄皆嫡嗣此獨書以正周公之後决後世之疑或謂為荘公如齊納幣張本要之皆不然國之主器莫重於嫡嗣嫡嗣不正則禍亂生焉故古者嫡子生必以禮舉之所以正國本係人望而絶庶孽覬覦之心也若君受制於文姜必齊女而後娶以至於失時越禮則亦可以因是而考之矣冬紀侯來朝程子曰紀畏齊而來朝以求助也不能上訴於天子近赴於諸侯和輯其民人效死以守而欲求援於魯桓是豈為國之道哉其不能保有終至於大去其國宜也按左氏㑹于郕咨謀齊難去聲也冬來朝請王命以求成于齊也公告不能杜氏曰紀微弱不能自通於天子欲因公以請王命公無寵於王故告不能孟子曰觀近臣以其所為主觀遠臣以其所主朱子注君子小人各從其類故觀其所為主與其所主者而其人可知主者成敗之機榮辱之本也昭公棄晉主齊至於客死昭公二十五年孫齊齊不能納二十八年如晉晉人曰天禍魯國君淹恤在外亦不使一介辱在寡人而即安於甥舅三十二年薨於乾侯鄭伯逃齊主楚終以乞盟僖五年㑹于首止㑹王太子鄭謀寧周也鄭伯逃歸不盟孔叔曰國君不可以輕輕則失親失親患必至病而乞盟所䘮多矣八年盟于洮鄭伯乞盟請服也觀其所主而榮辱成敗見音現矣魯桓者弑君之賊人人之所同惡夫人得而討之也而主之以求援于眷反其能國乎然則何以免於貶志不在於朝桓也蜀杜氏曰桓之簒王法所不容諸侯不能討而朝之聘之春秋不與是義不可以朝桓矣今紀之來復存其正爵以其懼於齊難與其所親謀之故恕之也沙隨程氏曰溺人近死何暇論援者之賢否乎愚按桓公簒立得罪於君父兄惴惴焉不能自保而結大國以自安即位之始年求盟於鄭三年求婚於齊未幾次班後鄭而取怒於齊則非時大閱以備不虞是其憂榆信縮固係於齊人嚬笑之頃又安足與謀紀難哉易曰比之匪人不亦傷乎紀侯之謂矣然春秋所以怒紀侯而不之貶者如人遇强禦於國門之外苟有過者亟執其裾而愬之不暇問其人之善惡也夫紀以蕞爾之國介居大國之間欲上告於天子則不能欲下告於方伯連率則無非齊之與國其所以僕僕朝魯㑹魯亦曰紀之與魯暨魯之與齊皆比鄰婚姻之國或可資其助耳聖人其以是而恕之乎比事以觀紀不能自强於政治苟焉依人以圖存魯桓不能憂人之憂急人之急坐受朝禮而莫之或拯齊以强大肆意於吞噬小弱其罪皆不待貶而自見矣丙桓王十子五年七年齊僖二十六晉小子四衛宣十四蔡桓十鄭莊三十九曹桓五十二陳厲二杞武四十六宋莊五秦寧十一楚武三十六春二月己亥焚咸丘程子傳古者昆蟲蟄而後火田去莽翳以逐禽獸非竭山林而焚之也咸丘地名焚咸丘如盡焚其地見其廣之甚也杜氏曰焚火田也咸丘魯地髙平鉅野縣南有咸亭高氏曰咸丘乃魯地近齊者故孟子以咸丘蒙為齊東野人愚按鉅野今屬濟寧路咸丘地名也易稱王用三驅比九五爻辭程子傳如天子不合圍合其三面前開一路使之可去不忍盡物好生之仁也在禮天子不合圍諸侯不掩羣王制田不以禮曰暴天物云云昆蟲未蟄不以火田注合圍掩羣為盡物也夫子釣而不綱弋不射食亦反宿朱子注盡物取之出其不意聖人不為也皆愛物之意也推此心以及物至於鳥獸若草木裕舜典疇若予上下草木鳥獸湯誥賁若草木伊訓鳥獸魚鼈咸若無淫獵之過矣劉氏曰焚咸丘淫獵之過也古者誅不逐奔追不越防書焚咸丘所謂焚林而田也定元魏獻子田於大陸焚焉李氏瑾曰火田直焚一叢一聚豈容焚一澤也譏盡物故書之臨川吳氏曰周之二月夏之十二月昆蟲未出故可用火此不當田狩之月而火田又咸丘非狩也故譏劉氏曰公羊以謂咸丘者邾婁之邑其君在焉故不繫國焚之者樵之也以火攻也按公羊凡内取邑不繫國悉歸之邾婁若誠火攻人君應書曰伐咸丘焚之今但曰焚咸丘而無兵戈之意安知不以火田乎穀梁口不言邾咸丘疾其以火攻與公羊說相近夏穀伯綏來朝鄧侯吾離來朝程子傳臣而弑君天理滅矣宜天下之所不容也而天子累聘之諸侯相繼而朝之逆亂天道歳功不能成故不書秋冬與四年同或曰然則十五年邾人牟人葛人來朝何以書秋冬曰四年與此明其義矣三國之朝别立義也杜氏曰穀國在南鄉宜陽縣北張氏曰今襄陽府穀城縣鄧今鄧州皆去魯絶遠愚按襄陽即今襄陽路范氏曰别言朝同時來不俱至春秋之法諸侯不生名見曲禮穀伯鄧侯何以名桓天下之大惡也執之者無禁殺之者無罪榖伯鄧侯越國踰境相繼而來朝即大惡之黨也故特貶而書名與失地滅同姓者比焉經於朝桓者或貶爵二年滕子或書名此年穀鄧或稱人十五年邾牟葛以深絶其黨撥亂之法嚴矣誅止其身而黨之者無罪則人之類不相賊殺為禽獸也幾希服䖍曰穀鄧宻邇於楚不親仁善鄰以自固遠朝弑君之賊故賤而名之孫氏曰桓大惡之人諸侯皆得殺之二君反交臂而來朝故生名之陳氏曰古者鄰國世相朝魯在泰山之下穀鄧在方城之外兩君之好不相及也而亟朝桓有朝桓者矣必若穀鄧而後名名其甚者也張氏曰桓弑逆之人而榖鄧遠來朝之故特名二國之君與反面事讐㓕同姓以滅本根之罪無以異是年不書秋冬以諸侯相繼朝桓逆亂天道歲功不能成故不具四時四時具然後成歲故雖無事必書首時今此獨於秋冬闕焉何也立天之道曰隂陽陽居春夏以養育為事所以生物也王者繼天而為之子則有賞月令孟春之月天子賞公卿大夫於朝命相布德和令行慶施惠下及兆民慶賜遂行毋有不當孟夏之月天子行賞封諸侯慶賜遂行無不欣說隂居秋冬以肅殺為事所以成物也王者繼天而為之子則有刑月令孟秋之月天子命將帥選士厲兵詰誅暴慢以明好惡命有司修法制繕囹圄禁止姦慎罪邪務搏執戮有罪嚴斷刑孟冬之月是察阿黨則罪無有掩蔽功有不當必行其罪以窮其情賞以勸善非私與也故五服五章謂之天命刑以懲惡非私怒也故五刑五用謂之天討古者賞以春夏刑以秋冬襄二十六蔡聲子云云象天道也周子曰天以陽生萬物以隂成萬物生仁也成義也故聖人在上以仁育萬物以義正萬民桓弟弑兄臣弑君而天討不加焉是陽而無隂歲功不能成矣故特去上聲下同秋冬二時以志當世之失刑也獨於四年七年闕焉何也按周制大司馬諸侯而有賊殺其親則正之放弑其君則殘之桓弑隱公而立大司馬九伐之法雖未之舉猶有望也及使冢宰下聘恩禮加焉則天下之望絶矣故四年宰糾書名而去秋冬二時以見音現下同天王之不復扶又反下同能用刑也陳恒弑其君孔子請討之以從大夫之後不敢不告也桓弑隱公而立雖方伯連帥去聲環視而未之恤方伯連帥見王制猶有望也及榖鄧二國自遠來朝則天下諸侯莫有可望者矣故七年榖伯鄧侯各書其名而去秋冬二時以見諸侯之不復能修其職也然則見之行事不亦深切著明矣乎故曰春秋成而亂臣賊子懼通㫖問桓四年七年因天王使宰渠伯糾來聘穀伯鄧侯來朝故不書秋冬然則二年膝子來朝紀侯來朝五年天王使仍叔之子來聘以至六年九年十五年皆有諸侯來朝何以書秋冬曰桓弑君而立滕侯首朝貶爵為子不齒列國矣天王刑罰所自出也既不能討又以其立而聘之故不書秋冬弑君之賊人人所得討豈天下之大諸侯之衆莫有能舉義者乎及穀鄧無故相率自遠來朝然後知天下諸侯莫有可望人欲橫流莫有禁之者矣故不書秋冬若紀侯來朝自為謀其國事爾非為桓立也天王使仍叔之子來聘失刑之義已立於前矣此又别有義也大抵聖人筆端造化神明莫測豈拘定一義而已趙氏曰左傳云穀侯鄧伯名賤之也此說不明故不取公穀並云失國之君假令實奔魯而公待以朝禮即當書云穀伯鄧侯來奔某日朝公不當越例書名而没其來奔也陳氏折衷失地之君不曰來朝苟有出者如衞侯朔奔齊譚子奔莒是也苟有來者如郕伯來奔州公寔來是也陳氏曰按左傳不見失國事迹莊十六年楚始滅鄧愚按或以無秋冬為史闕文然昭公十年無冬有月而闕時定公十四年無冬有事而闕時月此可以言闕文也豈有二年秋冬與事而兩時並不書首月乎况公羊傳桓十七年闕夏然猶書五月莊二十六年闕春然猶書事於年下惟成十年闕冬不書事而左氏榖梁皆書冬十月苟曰桓公四年七年非聖人所削不容三傳皆闕蓋三傳傳授各異而經文皆削秋冬必有深意程子之說疑得聖人之㫖丁桓王十北六年八年齊僖二十七晉侯緡元年衛宣十五蔡桓十一鄭莊四十曹桓五十三陳厲三杞武四十七宋莊六秦寧十二楚武三十七春正月己卯烝公羊傳烝冬祭也春曰祠夏曰礿秋曰嘗冬曰烝常事不書此何以書譏亟也亟則黷黷則不敬君子之祭也敬而不黷程子傳冬烝非過也書之以見五月又烝為非禮之甚也按周官大司馬烝以中音仲冬何氏曰烝衆也氣盛貌冬萬事畢成所薦衆多芬芳備具故曰烝今魯烝以春正月其不同何也周書逸周書有周月以紀政而其言曰夏數得天百王所同其在商周革命改正示不相沿至於敬授民時巡狩烝享猶自夏焉愚按文定據逸周書維十一月既南至日短極謂周以子月為歲首不改月數竊考逸周書文體全似呂令其言八枳之類與古書殊異或後人假託之書况六經惟詩以寅月起數乃民俗歌謡之詞故隨舊俗稱之書云王在新邑烝祭歲在十二月則用亥月孟冬烝祭亦未為非禮若汲冢紀年用夏正而言舜放堯文王殺王季則不可信蓋劉炫偽魯史之類也然則司馬中冬教大閱獻禽以享烝周禮注獻所獲禽以祭宗廟所謂自夏而魯之烝祭在春正月見春秋用周正紀魯事也趙氏曰四時之祭皆用夏時從物宜也周雖以建子為正至於祭祀則用夏時本月以行四時之祭此正月烝則夏之仲冬也而榖梁子乃曰烝冬事也春興之志不時也是以閉蟄而烝為是杜氏曰建亥之月昆蟲閉户烝祭宗廟與周制異矣春秋非以不時志也為于偽反再烝見音現瀆書也杜氏曰此夏之仲冬非為過而書者為下五月復烝見瀆也啖氏曰此書以彰下文耳非譏也趙氏曰周禮記四時祭名云春祠夏礿秋嘗冬烝詩云礿祠烝嘗于公先王而春秋無礿祠者蓋春秋中再書烝一書嘗兩書禘皆為失禮及有變故乃書耳於祠礿二祭無他故所以不書也愚按四時常祀惟桓公之經書烝書嘗蓋再烝之瀆與未易災之餘而嘗之慢皆失禮之大者况冬烝而以夏五月行之酉月嘗而以未月行之或太過或不及皆失時之甚者故筆之於經以示貶焉或者謂桓有大惡不可以祀先君故聖人因其失禮而特書以重其惡其言失之鑿矣閔僖之禘文公之大祫亦可謂有大惡而不可以祀先君乎趙氏曰榖梁曰烝冬事也春興之志不時也按正月之烝不失時也公羊曰譏亟也經為五月又烝故書此以明一歲再烝若不書即似春有故不烝夏乃烝耳劉氏曰猶將書壬午猶繹不得不先書有事于大廟也天王桓使家父來聘程子曰桓公弑立未嘗朝覲天王不討而屢使聘之失道之甚也杜氏曰家父天子大夫家氏父字下聘弑逆之人而不加貶何也既名冢宰於前其餘無責焉乃同則書重之義穀梁宣二年志同則書重公羊莊四年擇其重者而譏焉其餘從同同以此見春秋任宰相去聲下同之專而責之備也虞史以人主大臣為一體春秋以天王宰相為一心以為一體故帝庸作歌則曰股肱喜哉元首起哉百工熈哉臯陶音謡賡歌則曰元首明哉股肱良哉庶事康哉舜先言臣而後言君臯陶先言君而後言臣可見其君臣交相尊榮而互相責勉之意而垂益九官之徒不與音預下同也以為一心故歸賵仲子隠元㑹葬成風文五則宰咺書名於前而王不稱天於後來聘桓公桓四錫桓公命莊元則宰糾書名以正其始王不稱天以正其終而榮叔家父之徒不與也故人主之職在論相而已矣荀子王霸篇若夫論一相以兼率之使臣下百吏莫不宿道鄉方而務是人主之職也愚按家父乃周之世臣詩紀家父刺幽王之昏亂與尹氏之不平而不憚激怒於君相蓋竭忠於王室者也桓公之經兩書家父亦家氏之子若孫耳一則聘所不當聘一則求所不當求皆徇於王命而依阿苟且以從於非義其視節南山之誦能無愧乎比事以觀不待貶絶而惡自見矣夏五月丁丑烝公羊傳譏亟也榖梁傳黷祀也志不敬也程子傳正月既烝矣而非時復烝者必以前烝為不備也其黷亂甚矣春秋之文有一句而包數義者有再書而一貶者戎伐凡伯于楚丘以歸之類隠七年一句而包數義春正月己卯烝夏五月丁丑烝再書而一貶臨川吳氏曰建子之月己烝矣建辰之月又再烝焉於春季而行冬祭非其時非其禮也宋氏曰武氏子來求賻一責天王求賻二責魯之不共一貶而起二事此兩書烝二事而一貶愚按僖二年三年書冬不雨春不雨夏不雨屢書而一褒義與此同秋伐邾儀父陳氏曰但曰伐邾何桓師非君將皆不言大夫孫氏曰桓大惡諸侯宜討之而獲安其位反以兵伐人之國故直稱伐邾高氏曰紀也滕也鄧也榖也郕也杞也或朝或㑹邾不修舊好故伐之其曰伐必有辭焉邾不能奉辭以討桓宜乎其反見伐也冬十月雨雪雨于付反公羊傳記異也何異爾不時也杜氏曰今八月書時失程子傳建酉之月未霜而雪書異也王氏曰隂陽方中而寒氣先至此積隂侵陽之象祭公來遂逆王后于紀祭側界反書遂始此公羊傳祭公者何天子之三公也大夫無遂事此其言遂何成使乎我也其成使乎我何使我為媒可則因用是往逆矣女在其國稱女此稱王后何王者無外其辭成矣穀梁傳遂繼事之辭也其曰遂逆王后略之也程子傳祭公受命逆后而至魯先行私禮故書來以逆后為遂事責其不䖍王命而輕天下之母也劉敞曰祭公王之三公也曷為不稱使不與王之使祭公也師傅之官坐而論道其任重矣今其來魯乃命魯侯以婚姻之事者也若是則大夫可矣何必三公任之重使之輕故祭公縁此義得專命不報遂行如紀而王以輕使為夫祭公以遂行為罪矣此說是也為之節者宜使卿往逆公監之則於禮得矣劉氏曰為之節者王當使大夫命魯侯曰予一人不能獨任天地宗廟之事未有内主予一人將卜于紀姜氏委諸伯父伯父其以予敬若先王之禮魯侯稽首對曰天子有命敢有弗恭使者以是言也復于王魯使大夫請於紀曰天子使某來命我寡君曰予一人不能獨任天地宗廟之事未有内主予一人將卜于紀姜氏使某也以告主人宜固辭固辭不獲命主人曰某也固辭不獲命敢不敬從先守某公之遺女若而人夫婦所生若而人然後天子命以其吉使上大夫用王后之禮逆以歸也此豈人臣之所當遂於竟外哉使祭公命魯主婚姻之事則曰不可卿往而公監之何以可乎命魯輕矣卿往公監之重矣官師從單音善靖公逆王后于齊襄十五年杜氏曰官師劉夏非卿禮記官師中士下士劉夏非卿而書靖公合禮則不書故先儒以爲使卿逆公監之禮也杜氏曰天子不親昏使上卿逆而公監之通㫖或曰天子必親迎信乎大上無敵於天下雖諸父昆弟莫不臣適四方諸侯莫敢有其室若屈萬乗之尊而遠行親迎之禮即何無敵於天下之有或曰王后所與共事天地宗廟繼萬世之重者其禮當如之何使同姓諸侯主其辭命卿往逆公監之父母之國諸卿皆送至於京師舍而止然後天子親迎以入其納王后之禮乎趙氏曰遂逆者譏不躬白於王孫氏曰桓王娶后于紀命魯主之故祭公來謀逆后之期既謀之則當復命天子天子命之逆則逆之不可專也祭公不復命于王專逆后于紀故曰遂張氏曰天子雖無親迎之禮然祭公謀于魯則當復命於王然後遣於宗廟以明逆后之重今使魯為媒而用是往逆輕褻王配如此何以示正始之義哉故書若祭公之私行而以逆后為遂事以深譏之陳氏曰書遂始於此凡遂譏也莫甚于逆后后妃母儀天下而以遂專之罪祭公自罪魯也宋氏曰萬乗之君使弑逆之人主婚行禮可乎愚按僖三十年傳云大夫出疆有以二事出者有以一事出而専繼事者其書皆曰遂祭公自魯逆王后所謂以二事出者也由是論之祭公蓋受王命謀婚於魯并逆后於紀爾逆后大事也安有無王命而敢專之哉但天子婚禮當使大夫謀昏於同姓之諸侯待其復命然後使上卿往逆而公監之故王遣三公謀昏則以輕使為失祭公不復命於王而即如紀逆后則以遂行為罪而交責之也按遂有二義榖梁所謂繼事是以二事出者也公羊所謂生事是以一事出而專繼事者也春秋書遂一十九若公子遂如京師遂如晉亦以二事出者也公子結媵陳人遂及齊宋盟季孫宿救台遂入鄆皆專繼事者也若成公以伐秦出而因如京師乃書自京師遂㑹伐秦則聖人尊君抑臣之意使若繼事以㑹伐爾考其事而是非得失瞭然矣趙氏曰左傳曰禮也若合禮則常事不書言來言遂足明譏矣榖梁曰其不言使不正其以宗廟之大事即謀於我若實譏天王言使不更昭著乎今不言使即罪全歸祭公戊桓王十寅七年九年齊僖二十八晉緡二衛宣十六蔡桓十二鄭莊四十一曹桓五十四陳厲四杞靖公元年宋莊七秦出子元楚武三十八春紀季姜歸于京師公羊傳其稱紀季姜何自我言紀父母之於子雖為天王后猶曰吾季姜京師者何天子之居也京者何大也師者何衆也天子之居必以衆大言之榖梁傳為之中者歸之也程子傳書王國之事不可用無王之月故書時而巳或曰借如正月日食則如何書之曰書春日食則其義尤明也王后之歸天下當有其禮諸侯莫至是不能母天下也故書紀女歸而已杜氏曰季姜桓王后季字姜紀姓往逆則稱王后既歸何以書季姜自逆者而言則當尊崇其匹内主六宫之政昏義天子后立六宫使妃妾不得以上僭故從天王所命而稱王后示天下之母儀也唐來濟傳王者立后以承宗廟母天下張氏曰季姜在國稱王后者王命之則成所以别於列國用見王命之重而存母儀天下之體於始也自歸者而言則當樛屈逮下詩小序樛木后妃逮下也言能逮下而無疾妬之心焉注木下曲曰樛言后妃之心如木之下曲也使夫人嬪婦皆得進御於君周禮九嬪注凡羣妃御見之法九嬪以下九九而御於王所卑者宜先尊者宜後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕十五日而徧而無嫉妬之心故從父母所子杜氏曰書字伸父母之尊而稱季姜化天下以婦道也詩葛覃小序其詞之抑揚上上聲下去聲進退先後並去聲各有所當去聲而不相悖劉氏曰逆也稱王后歸也稱季姜此言禮之上下取予進退先後各有所宜而不相悖也公卿謀之諸侯主之龜筮諏之天子命之是王后矣然而未見宗廟也未覯君子也未覿羣臣也則不敢居其位其詞順以聽此正始之道王化之本也臨川吳氏曰逆稱王后主王朝而言也歸稱季姜主紀而言也陳氏曰諸侯逆稱女至稱夫人尊夫人也天子逆稱后歸稱季姜尊王也皆正始之道王化之基詩關雎小序春秋之所謹也京師者衆大之稱詩公劉京師之野董氏曰所謂京師者起於此後世因以所都為京師也高氏曰古者后夫人必娶嫡女故天子求后於諸侯諸侯對曰夫婦所生若而人若姑姊妹則曰先君之遺女若而人於諸侯則曰不腆先君之嫡是以伯姬婦紀則叔姬為婦今曰季姜則非嫡矣不可以母天下故春秋嚴其名陳氏曰后歸不書此何以書詳紀事也后妃母儀天下以為天地社稷宗廟之主俄而宗國亡焉是不可以不詳也通㫖王后歸京師過我則書來告則書永嘉呂氏曰經書逆王后者二惟紀季姜書歸于京師而劉夏之逆不書歸蓋祭公之逆以魯為之主故書歸劉夏之逆以其過魯而魯不為之主則不書歸矣孫氏曰左傳云諸侯之女行唯王后書則劉夏逆王后而不書齊姜歸于京師何哉夏四月秋七月冬曹桓伯使其世子射姑來朝射音亦左傳曹大子來朝賔之以上卿禮也公羊傳諸侯來曰朝此世子也其言朝何春秋有譏父老子代從政者則未知其在齊與曹與穀梁傳朝不言使言使非正也使世子伉諸侯之禮而來朝曹伯失正矣諸侯相見曰朝以待人父之道待人之子以内為失正矣内失正曹伯失正世子可以已矣則是放命也尸子曰夫已多乎道程子曰曹伯有疾不能親行故使其世子來朝春秋之時君疾而使世子出取危亂之道也按周官典命凡諸侯之嫡子誓於天子而攝其君則下其君之禮一等未誓則以皮帛繼子男周禮注誓猶命也言誓者明天子既命以為之嗣樹子不易也春秋曹伯使其世子來朝行國君之禮是也公之子如侯伯而執圭侯伯之子如子男而執璧子男之子與未誓者皆次小國之君執皮帛而朝㑹焉蜀杜氏曰此諸侯朝㑹于天子之時所行之禮鄭康成以此為注蓋未明春秋之義世子固有出㑹朝聘之儀矣然攝其君繼子男者謂諸侯朝於天子有時而不敢後故老疾者使世子攝己事以見音現天子急述職也楊士勛曰世子攝其君謂㑹同急趍王命今曹伯有疾雖闕朝魯未是急事薛氏曰攝事而朝京師禮也朝于諸侯非禮也諸侯閒音閑於王事則相朝其禮本無時左傳成十二世之治也諸侯閒於天子之事則相朝也杜氏曰王事閒缺則修私好曹伯既有疾何急於朝桓而使世子攝哉已上並據劉氏權衡臨川吳氏曰大朝覲大㑹同諸侯皆往而已獨有疾則不得已而命世子攝行今曹之朝魯非甚急之務不可缺之禮也大位姦之窺也危病邪之伺音笥也本趙氏世子君之貳也君疾而儲副出啓窺伺之心危道也當享而射姑歎左傳享曹太子初獻樂奏而歎施父曰曹太子其有憂乎非歎所也踰月而終生卒明年正月其有疾明矣而使世子來終生之過也世子將欲已乎則方命矣曰孝子盡道以事其親者也不盡道而苟焉以從命為孝又焉音煙得為孝荀子從義不從父故尸子名佼晉人曰夫已多乎道范氏曰已止也止曹伯使朝之命則曹伯不陷不義之愆世子無苟從之咎魯無失正之譏三者正則合道多矣張氏曰春秋於桓方以誅亂賊之事望諸侯今曹伯之使世子世子從父之命揆之於義無一可者春秋所以直書而深貶之蓋經有從同同之例射姑之朝當以滕子穀綏鄧吾離之例推之而知其父子之悖人倫且忘國家之大計也愚按滕榖鄧邾牟葛之朝桓皆貶而射姑不貶者蓋世子不當攝君朝諸侯没其名則罪不著此程子所謂别立義也經書世子朝㑹者十有二曹射姑來朝鄫巫如晉宋成同盟戚齊先盟雞澤㑹戚㑹柤救陳四伐鄭宋佐㑹申是也夫世子秦冢祀社稷之粢盛以朝夕視君膳君行則守有守則從而代君行朝禮於諸侯及與諸侯㑹盟救伐皆非世子之所宜也宋成序侯伯之下大夫之上宋佐序子男之下淮夷之上庶幾不失位矣齊光漸進而序於薛伯杞伯之上則其僭已極鄫巫亞於魯大夫則屈辱尤甚焉比事考之而義自見己桓王十卯八年十年齊僖二十九晉緡三衛宣十七蔡桓十三鄭莊四十二曹桓五十五卒陳厲五杞靖二宋莊八秦出子二楚武三十九春王正月桓無王據三年以後不書王今復扶又反書王何也十者盈數也左傳莊十六使以十月入就盈數焉注數滿於十天道十年則亦周矣通㫖甲乙紀厯而數窮於十周語十年數之紀也注數起一終十十則更人事十年則亦變矣通㫖禮稱其生至於老耄十年而一易語載其學自而立至於從心十年而一進左傳僖十三王怒未怠其十年乎不十年王弗召也襄二十八楚不幾十年未能恤諸侯也故易稱守貞者十年而必反屯六二女子貞不字十年乃字象曰十年乃字反常也傳論遠如字惡者十年而必棄左傳昭四不十年侈其惡不遠遠惡而後棄桓公至是其數已盈宜見誅於天人矣十年書王紀常理也何氏曰十年有王者數之終也劉氏曰桓公簒立天子莫討諸侯莫非也故於其甚極詭而書王若謂桓公曰君之不能事天子若是其甚矣如又不改將不可救矣君如改諸則此其時矣有習於榖梁子而不得其傳者穀梁傳有穀梁子曰則非穀梁自為矣見二年書王以為正與夷之卒此年書王而曹伯適薨遂附益之以為正終生之卒誤矣啖氏曰三傳本皆不謬後人不曉而以濫說附益其中果正諸侯之卒不緣簒弑者范氏曰與夷見弑恐正卒不明故復明之陳侯鮑在五年之正月曷不書王以正其卒乎本孫氏總論趙氏曰十一月鄭伯卒十三年衞侯晉卒何不正之乎庚申曹伯終生卒桓公也在位五十五年世子射姑嗣是為莊公夏五月葬曹桓公秋公㑹衞侯宣于桃丘弗遇杜氏曰桃丘衞地濟北東阿縣東南有桃城愚按東阿今屬東平路弗者遷詞韵書弗者違也惡烏故反下同失信也衛初約魯㑹于桃丘㑹者外為主至是中變而從齊鄭杜氏曰衛侯與公為㑹期中背公更與齊鄭故公獨往而不相遇也於是乎有郎之師其戰于郎直書曰來盟于惡曹俱奪其爵則桃丘之弗遇也蓋惡衛侯之失信矣桃丘衛地趙氏曰書弗遇者見諸侯之失信張氏曰下書三國來戰衛亦與焉則背信在衛直不告魯誤桓公至桃丘耳愚按此年㑹桃丘弗遇成十六年㑹沙隨不見公昭十三年同盟平丘公不與盟皆非魯之罪故聖人皆直書不諱惟文十六年季孫行父㑹齊侯于陽穀齊侯弗及盟魯不當以大夫㑹諸侯然齊侯責賂卒與仲遂盟郪丘則罪之在齊又可見矣趙氏曰榖梁曰不遇者志不相得按經意直譏其無信爾豈論其相得不相得乎劉氏曰公羊以謂公不見要也非也公羊本解遇為一君出一君要之故謂此為公要衛侯推其文而不可為說要曰遇者相遇云爾何用紛紛乎冬十有二月丙午齊侯僖衛侯宣鄭伯莊來戰于郎左傳我有辭也初北戎病齊諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之魯以周班後鄭鄭人怒請師於齊齊人以衞師助之故不稱侵伐公羊傳郎者何吾近邑也何以不言師敗績内不言戰言戰乃敗矣穀梁傳内不言戰言戰則敗也不言其人以吾敗也不言及者為内諱也程子傳左氏載其事曰我有辭也我則有禮彼悖道縱慾而以興戎故特曰來戰以三國為主甚其惡也春秋加兵于魯衆矣未有書來戰者此獨不稱侵伐而以來戰為文何也常山劉氏曰春秋之中諸侯加兵于魯者不為少矣而未有書來戰者此不言侵伐而以來戰為文則彼曲我直其義坦然兵凶器戰危事前鼂錯傳云云聖人之所重也誅暴禁亂敵加於已蓋有不得已而應去聲之者矣未有悖道縱欲得已不已而先之者也劉氏曰戰者仁人之所惡也有不得已而應者矣未甞有得已而先之者也魯桓弑立天下大惡人人之所得討也鄭伯則首盟于越以定其位齊侯則繼㑹于稷以濟其姦曾不能修方伯之職駐師境上聲罪致討伸天下之大義也今特以私忿小怨親帥其師三國稱爵所謂目其人而責之也戰于魯境尚為知類也哉知類本孟子言不知輕重之等此春秋之所必誅而不以聽也本王制謂其為害大决然殺之不復審錄也故以三國為主而書來戰于郎趙氏曰不書及罪專於外也劉氏曰來戰者外為志乎戰也李氏瑾曰春秋善魯不使三國伐之若三國自來戰也高氏曰地以魯則魯與戰可知張氏曰春秋以主客之辭辨用兵之曲直殘民之重輕其罪魯而書公及諸侯戰者多矣若今年郎之戰直以三國來戰言之蓋魯桓有大罪極惡三國既不能奉天討而與之㑹盟今反徇私欲爭小故以無辭而伐有辭則罪在三國不容不反常例以明之故今年之書其文異其辭嚴專罪三國特書其來戰以示外有罪則為主之例此聖經之特筆也鄭人主兵而首齊猶衞州吁主兵而先宋州吁非宋殤則不能舉伐鄭之師鄭人非齊僖則不能舉戰魯之師故雖主兵在衛鄭而春秋必序宋齊為首也趙氏曰穀梁云來戰者前定之戰也非也言來者責三國不當來爾劉氏曰公羊以謂稱來戰者近乎圍也非也近乎圍豈實圍哉春秋惡戰耳不分别遠近也春秋胡傳附錄纂疏卷五
