body:
  text: 春秋胡傳附録纂疏卷二十五元汪克寬撰昭公中壬景王十申六年十有三年晉昭三齊景十九衛靈六蔡平公廬元年鄭定公寧元年曹武二十六陳惠公吳元年把乎七宋元三秦哀八楚靈十二弒吳夷末十五春叔弓帥師圍費費音祕左傳叔弓圍費弗克敗焉平子怒令見費人執之以為囚俘冶區夫曰非也若見費人寒者衣之飢者食之為之令主而共其乏困費來如歸南氏亡矣民將叛之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏將焉入矣平子從之費人叛南氏十四年南蒯奔齊司徒老祁慮癸來歸費齊鮑文子致之費內邑也命正卿為主將去聲舉大衆圍其城若敵國然者家臣強大夫弱也語不云乎有一言而可以終身行之者其恕矣夫已所不欲勿施於人所惡烏故反下同於下者無以事上也所惡於上者無以使下也然後家齊而國治去聲矣季孫意如以所惡於下者事其上而不忠於其君以所惡於上者使其下而不禮於其臣出乎爾者反乎爾宜南蒯苦怪反南遺子之及此也春秋之法不書內叛反求諸已而已矣其書圍費欲著其實不沒之也陸氏曰凡家臣以邑叛悉不書叛但書大夫圍之則邑叛可知矣且罪大夫無政而使家臣得專邑以叛也克之不書本非他國之邑也髙氏曰費季氏邑也叔弓帥師圍之見家臣之強季氏之無君也家臣以邑叛不以君命而使大夫討之如是則大夫非魯之大夫也季氏之大夫也師非魯之師也季氏之師也如是而欲討蒯不思之甚也劉氏曰使周之王必無廢文武之法無過天之道諸侯雖大國孰敢慢諸侯必無僣天子其大夫孰陵大夫必無脅其君其陪臣孰叛故南蒯雖以費入齊而春秋未以叛誅蒯非寬蒯弗誅也事有本末法有原省季氏未得以叛名蒯其不正相乘非一日之積正已而物正此之謂王者之衛愚按經書帥師圍內邑者五圍棘者復汶陽田而棘不服也圍費圍鄆兩圍郈者家臣強而以邑叛也復本國之邑而書之如致他國之邑者譏不能修德以服其民也討本邑之叛而書之如復舊邑者譏不能正已以馭其臣也故曰治人不治反其智其身正而天下歸之夏四月楚公子比自晉歸于楚弒其君虔于乾溪比如字溪苦兮反穀作溪左傳楚薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也因羣喪職之族啓越大夫常壽過作亂圍固城克息舟城而居之觀起之死也其子從在蔡事朝吳曰今不封蔡蔡不封矣我請試之以蔡公之命召子干子晳及郊而告之情強與之盟入襲蔡蔡公將食見之而逃觀從使子干食坎用牲加書而速行已徇於蔡曰蔡公召二子將納之與之盟而遣之矣將師而從之蔡人聚將執之辭曰失賊成軍而殺余何益乃釋之朝吳曰二三子若能死亡則如違之以待所濟若求安定則如與之以濟所欲且違上何適而可衆曰與之乃奉蔡公召二子而盟于鄧依陳蔡人以國楚公子比公子黑肱公子棄疾蔓成然蔡朝吳帥陳蔡不羮許葉之師因四族之徒以入楚及郊蔡公使須務牟與史猈先入因正僕人殺大子祿及公子罷敵公子比為王公子黑肱為令尹次于魚陂公子棄疾為司馬先除王宫使觀從從師于乾溪而遂告之且曰先歸復所後者劓師及訾梁而潰王聞羣公子之死也自投於車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠於溝壑矣王曰余殺人子多矣能無及此乎右尹子革曰請待於郊以聽國人王曰衆怒不可犯也曰若入於大都而乞師於諸侯王曰皆叛矣曰若亡於諸侯以聽大國之圖君也王曰大福不再秪取辱焉然丹乃歸於楚王沿夏將欲入鄢芋尹無宇之子申亥求王遇諸棘圍以歸王縊于芋尹申亥氏申亥以其二女殉而葬之棄疾即位殺囚衣之王衣而流諸漢乃取而葬之以靖國人他年申亥以王柩告乃改葬之公羊傳靈王為無道作乾溪之臺三年不成百姓苦之諸侯怨之楚公子棄疾主方城之外以君陳蔡脅比而立之然後令于乾溪之役曰比已立矣後歸者不得復其田里衆罷而去之靈王經而死杜氏曰乾溪在譙國城父縣南愚按唐宋屬亳州今在汝寧府之南楚師伐徐楚子虔次于乾溪為之援于眷反公子棄疾君陳蔡主方城之外有觀從者率羣失職以棄疾命召比于晉既至脅比而立之令于乾溪曰先至者復其田里師潰戶內反而歸楚子經縊也而死或曰昭元年楚虔弒立比出奔晉十三年比歸而虔縊于棘圍當作闈棘里名關門也則比未嘗一日北靣事虔為之臣虔又弒立固非比之君矣而書曰比弒其君虔何也曰凡去國出奔而君不以為臣則晉於欒盈是也襄二十一年欒盈出奔楚晉會諸侯于商任于沙隨以禁錮之使諸國不得受臣不以為君則公子鱄於衛是也襄二十七年鱄奔晉託於木門不鄉衛國而坐若去國雖久而爵祿有列於朝出入有詔於國見曲禮注君不絶其祖祀復立其族卿大夫吉凶往來相赴告不掃其墳墓不收其田里不繫纍力追反其宗族即君臣之分扶問反猶在也比雖奔晉而晉人以羈待比以國底音旨祿元年子干奔晉叔向使與秦公子同食趙文子曰秦公子富叔向曰底祿以德德鈞以年年同以尊公子以國不聞以富使后子與子干齒辭曰臣與羈齒無乃不可乎固楚之亡公子也楚又未嘗錮音固之如晉之於欒盈比又未嘗不向楚而坐如子鮮之於衛安得以為比非楚臣而虔非比之君乎春秋書比弒其君虔明於君臣之義也資中黃氏曰比立時靈王未死使靈王若得復國則比自是首惡無疑或曰虔弒郟敖以立比之獲罪豈其無討賊之心而徒貪夫位歟曰春秋罪比不眀乎君臣之義不責其無討賊之心夫比雖當次及之序而棄疾亦居楚國之常以取國言之比具五難而棄疾有五利此事之變也左傳子干歸韓宣子問叔向曰子干其濟乎對曰取國有五難有寵而無人一也有人而無主二也有主而無謀三也有謀而無民四也有民而無德五也子干在晉十三年矣晉楚之從不聞達者可謂無人族盡親叛可謂無主無釁而動可謂無謀為羈終世可謂無民亡無愛徴可謂無德涉五難以弒舊君誰能濟之有楚國者其棄疾乎君陳蔡城外屬焉苛慝不作盜賊伏隱私欲不違民無怨心先神命之國民信之芊姓有亂必季實立楚之常也獲神一也有民二也令德三也寵貴四也居常五也有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又逺之其貴亡矣其寵棄矣無施於民無援於外去晉而不送歸楚而不逆何以兾國為比者宜乎效死不立本公羊若國有所歸為曹子臧成十五魯叔肸宣十七不亦善乎不然身居令尹都居也貴戚之卿為于偽反社稷鎮亂不自己亦可也今乃脅肸業反於勢而忘其守怵雪律反於利而忘其義被皮寄反之大惡欲辭而不可得矣為人臣而不知春秋守經事而不知其宜遭變事而不知其權者本董子若此類是也悲夫聖人垂戒之意明矣蘇氏曰比將為君不曰楚比而曰公子比何也比之歸非其謀也亂始於觀從而成於棄疾以比為名而已比迫於觀從而以身許之以致虔死則比雖不弒而弒君之名比尸之矣比之歸也虔猶在楚其不曰入何也觀從召之蔡人與之楚人不拒則比之歸無難矣孫氏曰先言歸者明比不與謀也後言弒者正比之罪也髙氏曰先書比歸者明在外本無弒君之心也及其以棄疾之請遂有得位之心故復言弒者正比之首惡也既曰歸于楚又曰弒于乾溪者非比親弒之也加之罪爾比奔晉十三年矣其能一旦自外歸而弒其君乎然棄疾脅比而立虔自縊而死若比不從棄疾之脅則虔未必死棄疾不得比則無以濟其亂比見利而動遽欲為君則成虔之縊者比也比效死不立則可矣既立又焉得避是名哉若使人之受其名也已享其利則後世姦人苟有藉口以濟其私者莫不皆置力焉故聖人正名比之弒君所以絶後世姦人之禍也家氏曰虔雖篡弒之賊然賊可討而不可代也代之則與之俱為篡弒之人春秋之義必有所不容矣始虔之篡有能仗大義而殺之求郟敖之後而立之則殺者為義篡者為賊從討州吁無知之例可也及今而後殺之又代居其位不得謂之討賊矣比雖未嘗事虔然虔兄也比弟也虔君楚國比自外歸為君而虔死不曰弒君可乎愚按公羊云歸無惡於弒立夫弒逆大惡聖人不以妄加於人豈以無惡而稱弒乎穀梁亦云言歸非弒也弒君者日不日比不弒也然里克商人陳乞之弒皆不日豈皆不弒乎榖梁於許買之弒則曰日弒正卒也正卒則止不弒也或日或不日皆曰不弒若何而明之哉今考之經齊連稱管至父弒諸兒而立無知為君則書曰無知弒君晉夷臯州蒲既弒而後公子黑臀公孫周歸于晉以為君則不書黑臀與周為弒君也春秋以弒虔之罪歸獄於比者蓋楚共之子長則康王次虔次比次黑肱次棄疾棄疾因虔無道而謀代其位以已次居幼不足以服國人故脅比而君之而虔之殞實在比立之後叔向謂比涉五難以弒舊君當時蓋亦以比為首惡矣隋煬無道其臣司馬德戡裴虔通等與宇文智及弒帝推智及之兄化及而立之雖化及聞謀變色流汗迎入朝堂戰栗不能言而邵子經世書朱子綱目皆書化及弒君且不以煬帝為弒君父之賊而末減也其得春秋書楚比之義矣楚公子棄疾殺公子比殺公作弒左傳觀從謂子干曰不殺棄疾雖得國猶受禍也子干曰余不忍也子玉曰人將忍子吾不忍俟也乃行國每夜駭曰王入矣棄疾使周走而呼曰王至矣國人大驚使蔓成然走告子干子晳曰王至矣國人殺君司馬將來矣君若早自圗也可以無辱衆怒如水火焉不可為謀又有呼而走至者曰衆至矣二子皆自殺棄疾即位名曰熊居葬子干于訾實訾敖公羊傳比已立矣其稱公子何其意不當也其意不當則曷為加弒焉爾比之義宜乎效死不立大夫相殺稱人此其稱名氏以弒何言將自是為君也穀梁傳公子棄疾殺公子比當上之辭也棄疾立比為王而已為司馬固君比矣而又殺之則宜書曰棄疾弒其君比而曰殺公子比何也初子干歸自晉觀從假棄疾命而召之來則來坎牲加書而強其文反之盟則盟帥四族衆而使之入楚則入殺太子祿而立之為王則王周走而呼好故反於國中謂衆怒如水火而逼之自殺則自殺其行止遲速去就死生皆觀從與國人所為而比未嘗可否之也安得為棄疾之君乎比未能君楚故不為棄疾之君也然比兄也黑肱弟也棄疾其季弟也立比為王肱為令尹疾為司馬蓋國人以長展兩反幼之序立之也則宜書曰楚人殺比而春秋變文歸獄棄疾者誅其本意在於代比而非討之也比篡立為君而棄疾不以賊討比則是殺比而奪之位雖微傳其事著矣所謂輕重之權衡曲直之繩墨而懷惡者亦無所隱其情矣通旨問棄疾殺比何以皆稱公子曰比殺兄棄疾亦殺兄無骨肉之愛也趙氏曰棄疾假立為君國人心亦未服比雖立亦未如君故以兩下相殺之辭言之也不言棄疾之殺其兄比亦殺兄俱無骨肉之愛也張氏曰公子比已為王棄疾為司馬則君臣若已定矣及棄疾殺比乃不以弒君書者君臣之分未定而棄疾譎殺之也比貪為君之利不能效死不立不得不伏首惡之罪若夫分未正而以譎殺之於曖昧之中目之以兩下相殺可矣未可稱弒君也髙氏曰比復稱公子而不以討賊之辭加之者非討賊也殺而代之也憫比墮棄疾之謀以深罪棄疾也棄疾本圖位而脅立比比既立遂殺而篡之改名曰居蓋弒君之人名在諸侯之䇿故公子圍改名虔公子棄疾改名居陳氏曰比蒙首惡之名則殺之宜稱人其曰楚公子棄疾殺公子比何靈王之弒棄疾為之也則是以公子殺公子耳非討賊也書弒其君比則比疑於齊舍書楚人殺比則棄疾疑於石碏雍廩不然是兩下之獄勿書可也春秋之修辭謹矣愚按公羊作弒公子比夫弒者下殺上之辭故雖里克弒君之子猶書曰殺安有書公子某弒公子某之文哉秋公會劉子獻晉侯昭齊侯景宋公元衛侯靈鄭伯定曹伯武莒子著丘邾子莊滕子悼薛伯獻把伯平小邾子穆于平丘杜氏曰劉子獻公王卿士平丘在陳留長垣縣南張氏曰今開封府封丘縣在東漢志尚為平丘縣愚按王季子食采於劉子爵卒諡康公獻公名摯蓋康公孫也封丘縣今屬汴梁路按左氏晉成虒音斯祁諸侯朝而歸者皆有二心齊侯往朝于晉燕而投壺曰寡人中陟仲反此與君代興十二年晉人知其亦將二也叔向許丈反曰諸侯不可以不示威乃並徵會治兵于邾南甲車四千乘繩證反遂合諸侯于平丘方是時楚人暴橫去聲陵蔑中華在宋之盟襄二十七爭晉先歃色洽反及虢之會昭元仍讀舊書遂召諸侯為申之舉遷賴於鄢縣陳滅蔡此乃敵國外患臨深履薄恐懼省戒之時其君當倚於法家拂音弼士以德修國政其臣當急於責難陳善以禮格君心內結夏盟外攘冦亂復悼公之業若弗暇也今乃施如字施然安於不競無憤恥自強之志惟宫室臺榭是崇是飾及諸侯皆二顧欲示威徵會而以兵甲耀之不亦末乎春秋之法制治去聲于未亂保邦于未危貴事之預恥以苟成而不要於遙反諸道者也是以深惡烏故反此會如下文所貶云據書同盟詞繁不殺惡之大者也明其義者然後知仲尼作經於一臺囿之築一宫室門觀工喚反之作必謹而書以重民力其弭亂持危固結人心之慮逺矣張氏曰晉平主盟內惑於寵嬖以女色蠱其心外崇建宫室以侈麗夸諸侯故楚虔盡召諸侯而肆為宗王吞滅親姻坐視不救及平公卒昭公立而楚虔斃乃幸楚亂欲立威以服諸侯而不知大勢已去徒治親昵本末倒置內外離心諸侯益二此平丘之會所以益隳霸業也陳氏曰晉之不自強於主盟自重丘而後皆大夫爾於是復合諸侯叔向請之劉子臨之諸夏猶有屬焉而齊人不可鄭人爭承魯不預盟列國之君大夫旅見於楚晉之合諸侯由是止鄟陵之後參盟復作晉非盟主矣愚按晉主夏盟不競於楚久矣以諸侯皆二而會平丘然不能修德以感人心而徒示甲兵之威不能辨分以服人心而乃盟天子之老是以雖大合十三國之君而臨之以劉獻公文悼之會盟未有如斯之盛而卒失霸業者無其本而專事其末故也晉昭在位僅六年始會八國之大夫而不能救蔡繼會十三國之諸侯而不能振霸業其亦不足稱矣八月甲戌同盟于平丘左傳齊服也榖梁傳同者有同也同外楚也程子傳楚棄疾立諸侯懼之故同盟按左氏晉將尋盟齊人不可晉侯使叔向告劉獻公曰抑齊人不盟若之何對曰盟以底信君苟有信諸侯不二何患焉告之以文辭董之以武師雖齊不許君庸多矣天子之老請帥王賦元戎十乘以先啓行遲速唯君叔向告于齊曰諸侯求盟已在此矣今君弗利寡君以為請對曰諸侯討二則有尋盟若皆用命何盟之尋叔向曰明王之制使諸侯嵗聘以志業間朝以講禮再朝而會以示威再會而盟以顯昭明志業於好講禮於等示威於衆昭明於神自古以來未之或失也晉禮主盟懼有不治奉承齊犧而布諸君求終事也君曰余必廢之何齊之有惟君圗之齊人懼對曰小國言之大國制之敢不聽從叔向曰諸侯有間居晏反隙也下同矣不可以不示衆辛未治兵建而不斾建立旌旗不曳其斾斾遊也壬申復扶又反下同斾諸侯畏之軍將戰則斾故曳斾以恐之辭諸魯曰寡君有甲車四千乘在雖以無道行之猶必可畏牛雖瘠在亦反僨方問反仆也於豚上其畏不死南蒯若怪反子仲之憂去年南蒯以費叛子仲奔齊庸可棄乎若奉晉之衆間其二憂何求而弗克請君無勤魯人聽命甲戌同盟于平丘其書同盟者劉子與音預盟同懼楚也愚按首止葵丘王世子宰周公不與盟故書諸侯盟此不書諸侯而但言同盟則劉子亦與是盟也楚棄疾立復封陳蔡而中國恐諸侯同有懼楚之心故書同盟會與盟同地再書平丘者書之重直龍反詞之復其中必有美惡焉見音現行事之深切著明故詞繁而不殺所賣反也是盟蓋或善之而以為惡何哉愚按劉氏意林謂平丘興滅繼絶推其美殆與葵丘明王禁無以異故皆會盟同地而再言之今考陳蔡之復國實由於楚而晉昭未嘗有懿德美行超絶卓異非常之迹也謂春秋美平丘過矣盟雖衰世之事然有定人道之大倫者矣僖五首止有備天子之明禁者矣僖九葵丘有束牲不歃色洽反相命而信自喻者矣同上有納斥候禁侵掠誠格而不復叛者矣襄十一會蕭魚其次猶以載書詞命相爭約於大神而不敢越者則未聞主盟中國奉承齊犧而矜其威力恐迫諸侯又信蠻夷之訴絶兄弟之歡求逞私憤間其憂疑如此盟者流及戰國強衆相誇恫徒弄反疑恐喝許曷反戰國策蘇秦云云恣行陵暴死者十九積習所致有自來矣春秋禮義之大宗也曽是以為善乎詞繁而不殺則惡烏故反其競力不道為後世鑒也家氏曰自晉楚為成晉之君臣自謂天下無事偷墮苟安無復自強之志楚由是劫霸權虎視中夏晉君臣鼠伏而不敢出幾二十年今楚虔罪盈惡稔自底覆亡晉昭乃復為會于平丘號召諸夏如病痱沉痼之人強自支拄人之見之者知其無能有為是會也齊不肯受盟晉人治兵邾南大陳戎馬脅而與之盟晉亦可鄙甚矣書同盟譏王臣不當下同列國之盟且譏晉人不當以兵脅諸侯而與之同盟是所謂一書再譏也髙氏曰晉若果能與劉子大合諸侯以討楚平弒逆之罪亦足以強中國之威矣今但同盟于此何所為哉公不與盟與音預左傳邾人莒人訴於晉曰魯朝夕伐我幾亡矣我之不共魯故之以晉侯不見公使叔向來辭曰諸侯將以甲戌盟寡君知不得事君矣請君無勤子服惠伯對曰君信蠻夷之訴以絶兄弟之國棄周公之後亦唯君寡君聞命矣公羊傳公不見與盟也君子不恥不與焉程子傳晉罪公不使與盟雖欲辱公然得不與同盟之罪實為幸也臣子之於君父隱諱其恥禮也十二國會于平丘公獨見辭不得與盟斯亦可恥矣曷為直書其事而不隱也杜氏曰非國惡故不諱晉主此盟德則不競而矜兵甲之威肆脅持之術以諸侯上要於遙反天子之老而歃血劉獻公自稱天子之老曲禮五官之長曰伯自稱於諸侯曰天子之老以中國同惴之瑞反夷狄篡立之主而結盟無禮義忠信誠慤若角反之心而以威詐涖之具此五不韙韋鬼反者得不與焉幸也聖人筆削春秋凡魯君可恥者必為于偽反之隱諱至會于沙隨而公不得見成十六盟于平丘而公不得與自衆人常情必深沮在吕反喪息浪反以為辱矣仲尼推明其故自反而縮雖晉國之嚴不可及也彼以其威我以其理彼以其勢我以其義夫何慊苦簟反乎哉直書其事示後世立身行已之道也其垂訓之用大矣通旨叔向之言北宫黝也魯人之言曽子守約者也魯人能言而不能信故恐而不敢與盟聖人信其義以訓後世故直書其事而不以為諱也髙氏曰此晉侯聼邾莒之訴而辱公使不得與盟也夫晉侯與公同體當同心同力以攘夷狄而諸侯咸會乃聽邾莒之妄訴與衆棄公不以比數孫氏曰與公同事而不同盟非所以宗諸侯也天下孰不解體故自是訖會召陵諸侯復不出者二十四年如鄟陵之會晉自不出其不足以宗諸侯矣劉氏曰穀梁云可以與而不與譏在公也非也公於晉唯令之從豈其獨能違衆不盟乎推穀梁之意以與為相與之與推春秋之意以與為與及之與愚按或謂春秋揭公於不與盟之上則是不與盟之意主於魯非也沙隨之不見公不可言公不見而平丘之不與盟不可言諸侯不盟公此屬辭之體也苟曰魯昭不肯與盟則其會諸侯于平丘果何為乎晉昭人執季孫意如以歸左傳晉人執季孫意如以幕蒙之使狄人守之司鐸射懷錦奉壺飲氷以蒲伏焉守者御之乃與之錦而入晉人以平子歸子服湫從稱人以執非霸討也公羊僖四自文以來公室微弱三家專魯而季氏罪之首也宿及意如尤為強逼元年伐莒疆鄆十年伐莒取郠古杏反左傳為取郠故晉將以諸侯來討乃並徴會中分魯國以自封殖而使其君民食於家其不臣甚矣何以為非霸討乎晉人若按邾莒所訴有無之狀究南蒯子仲奔叛之因告於諸侯以其罪執之請於天子以大義廢之選於魯卿更音庚意如之位收斂私邑為公室之民使政令在君三家臣順則方伯之職修矣今魯與邾通好呼報反亦不朝夕十一年貜會邾子盟祲祥伐莒而鄆郠之故又非昭公意也徒以邾莒之言曰我之不共音恭謂不供晉貢魯故之以遂辭魯君而執意如則是意在貨財而不責其無君臣之義也何得為霸討乎稱人以執罪晉之偷也愚按沙隨不見公則執行父平丘公不得與盟則執意如晉人固知季氏之專魯政矣惜乎汨於私欲但知以霸令威魯而不能以霸政治季氏是以徒能辱魯君而季孫得逭其討由晉之諸卿專權而芘強家故也公至自會公羊傳公不見與盟大夫執何以致會不恥也臨川吳氏曰公雖不與同盟然已與平丘之會矣故以會致蔡侯平廬歸于蔡陳侯惠吳歸于陳公羊傳此皆滅國也其言歸何不與諸侯專封也穀梁傳此未嘗有國也使如失國辭然者不與楚滅也楚虔遷六小國許胡沈道房申於荆山又滅陳蔡而縣之及棄疾即位復諸遷國封蔡及陳隱太子有之子廬歸于蔡悼太子偃師之子吳歸于陳據左傳曰歸者順詞也陳蔡昔皆滅矣不稱復歸者不與楚虔之得滅也其稱歸于者國其所宜歸也何氏曰使若有國自歸者也廬與吳皆亡世子之子也而棄疾封之可謂有奉矣不言自楚者不與楚子之得封也蜀杜氏曰不言自楚不使夷狄得專之其稱侯者位其所固有也常山劉氏曰陳蔡者先王之封國非楚可滅非楚可復也故書爵書歸言二國之嗣位其所固有國其所宜歸也二君名者素非諸侯至此始立也髙氏曰楚靈不道暴滅陳蔡而平王始依陳蔡之國藉以發難今既得位遂復陳蔡以報其功暴靈之惡而歸恩於已以説中國春秋不言歸自楚者見二國之復乃自當復非夷狄得滅而復之也陳列聖之後蔡王室之親見滅於楚虔而諸侯不能救復扶又反封於棄疾而諸侯不能與音預是以蠻荆制諸夏也聖人至是懼之甚蓋有不得已焉制春秋為後法大要皆天子之事也其義則以公天下為心興滅國繼絶世異於自私其身欲擅而有之者也據秦始分天下為郡縣不封建故書法如此為天下國家而不封建欲望先王之治去聲難矣孫氏曰聖王不作諸侯不振二國之命制在夷狄孔子以陳蔡二君自歸為文所以抑強夷而存中國也臨川吳氏曰楚虔滅陳蔡而并其土地廬蔡靈之孫吳陳哀之孫當有其國而為君者也故其復國也書國書爵書名如失國之君歸其國然突赤歸而國篡國者也不當有國故不係國愚按齊桓之存亡春秋雖不豫以專封之權猶不沒其救患之美故書城楚丘城緣陵而不書城衛把也楚虔滅陳蔡而棄疾復其國春秋既不豫以擅權而專封亦不豫其悔過而繼絶故止書蔡平陳惠之歸其國而不言自楚歸若二國之自能興復焉爾公穀以為二國之復出於平丘之諸侯夫厥憗之大夫欲救蔡而不能救豈以陳蔡之地既入于楚中國諸侯不興兵伐楚而遽能復之耶資中黃氏曰二君歸國是已入國來告之詞則楚之復二君在盟以前矣若以二君歸為晉盟之功則其歸當在九月十月今盟後便書歸未聞盟之功如此神速也冬十月葬蔡靈公陸氏曰國復乃葬凡三十有一月劉氏曰穀梁云不與楚滅且成諸侯之事非也楚本不當滅蔡則蔡雖滅非滅也不為諸侯而成之也通旨夫不與楚滅使蔡侯得以禮葬其祖信矣葬自內録我有往則書而靈公者即世子般也前葬其父今葬其身於此見恩意之施於般厚矣不以其有罪明矣乃以此為成諸侯之事殆非春秋之意乎公如晉昭至河乃復左傳公如晉荀吳謂韓宣子曰諸侯相朝講舊好也執其卿而朝其君有不好焉不如辭之乃使士景伯辭公于河愚按公之如晉蓋以請季孫也既不得與平丘之同盟而猶欲託躬朝之禮以請其臣其失進退之義亦甚矣宜其見辭於晉而不得入也吳夷末滅州來左傳吳滅州來令尹子期請伐吳王弗許曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可悔州來在吳猶在楚也子姑待之髙氏曰成六年吳入州來蓋本楚屬也至是取之春秋詳楚伐吳略吳伐楚而志其甚者滅州來是也吳人以州來封季子之後又以遷蔡焉王氏曰州來本近楚小國楚嘗取以為附庸及兹楚亂吳遂出其不意而滅之不書帥師不書侵伐以見其滅之之易也癸景王十酉七年十有四年晉昭四齊景二十衛靈七蔡平二鄭定二曹武二十七卒陳惠二把平八宋元四秦哀九楚平王居元年吳夷末十六春意如至自晉穀梁傳大夫執則致致則名意如惡然而致見君臣之禮也按左氏季孫猶在晉子服惠伯私於中行户剛反穆子曰魯事晉何以不如夷之小國土地猶大所命能具若為于偽反下同夷棄之使事齊楚何瘳敕留反於晉乃歸季孫其始執之為乏邾莒之供音恭而非有扶弱擊強之義也其終歸之為土地猶大所命能具而非有不能救蔡為夷執親之悔也穆子告韓宣子曰楚滅陳蔡不能救而為夷執親將焉用之然則晉人喜怒皆以利發其勸沮在吕反皆以利行違道甚矣故平丘之會深加貶斥自是而後諸侯不合二十餘年至于召陵又以賄敗定四荀寅求貨於蔡侯弗得乃辭蔡侯十有八國之諸侯而書侵楚以譏之於是晉日益衰外攜離也齊鄭魯衛內叛趙鞅荀寅士吉射不復扶又反振矣利之能敗人國家乃如此春秋之深戒也陳氏曰大夫不致必見執也而后致亦危之也孫氏曰至名不稱氏前見也劉氏曰左氏以舍族為尊晉罪已非也一事再見卒名耳魯本無罪何罪已之有三月曹伯滕卒武公也在位二十七年子須嗣是為平公夏四月秋葬曹武公八月莒子去疾卒去起吕反著丘公在位十四年子郊公嗣卒自外録者也莒人來赴故魯史書其卒葬自內録者也魯人不往是以闕其葬自昭公以來雖薛把微國無不會其葬者六年葬把文公二十四年葬把平公三十一年葬薛獻公何獨於莒則不往乎方是時意如專政而莒嘗訴其疆鄆取郠古杏反之罪於方伯而見執矣為于偽反是怒莒故獨不會其葬也夫怨不棄義惡去聲不忘親怒不廢禮在桓公時雖與衛戰而宣公卒則往葬之襄十八年同圍齊十九年猶葬靈公不以私故絶吉凶慶弔往來施式智反報之常禮也以此見意如之專恣矣若意如者其傲狠修怨敢施於昭公與莒子及其在晉聞除館西河則恐懼逃歸左傳子服惠伯曰合諸侯而執其老若猶有罪死命可也若曰無罪而惠免之請從君惠於會韓宣子患之謂叔向曰子能歸季孫乎曰鮒也能乃使叔魚叔魚見季孫曰昔鮒也得罪於晉君自歸於魯君微武子之賜不至於今敢不盡情歸子而不歸鮒也聞諸吏將為子除館於西河其若之何且泣平子懼先歸惠伯待禮如一匹夫何也小人無禮喜怒勇怯不中陟仲反節皆若是耳苟不遠于萬反之其能國乎冬莒殺其公子意恢恢苦回反左傳著丘公卒郊公不戚國人弗順欲立著丘公之弟庚輿蒲餘侯惡公子意恢而善庚輿郊公惡公子鐸而善於意恢公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚輿許之蒲餘侯兹夫殺公子意恢郊公奔齊公子鐸逆庚輿於齊齊隰黨公子鉏送之有賂田穀梁傳莒無大夫而曰公子意恢意恢賢也髙郵孫氏曰公榖皆以為曹莒無大夫蓋曹莒小國其大夫之位才當大國之士春秋諸侯之士皆不書名故曹莒大夫之名不見於經其有事繫懲勸法當書者則雖賤而名之邾庶其黑肱莒牟夷意恢是也陳氏曰書殺意恢以非其罪也工氏曰意恢之死罪纍上也故以國殺為文而不去其族襄陵許氏曰公子鐸首亂而無見焉者韓愈曰春秋書王法不誅其人身此類皆所以表見王道若鐸不書者多矣甲景王十戌八年十有五年晉昭五齊景二十一衛靈八蔡平三鄭定三曹平公須元年陳惠三把平九宋元五秦哀十楚平二吳夷末十七卒春王正月吳子夷末卒公作夷昧在位十七年子僚嗣二月癸酉有事于武宫籥入叔弓卒去樂卒事籥羊略反去起吕反左傳將禘于武公戒百官梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氛也其在涖事乎癸酉禘叔弓涖事籥入而卒去樂卒事禮也左氏曰禘于武宫杜氏曰武宫魯武公廟成六年復立叔弓涖音利事籥入而卒去樂卒事有事於宗廟聞大夫之喪則去樂而祭可乎按曽子問君在祭不得成禮者夫子語魚據反之詳矣曽子問諸侯祭社稷俎豆既成聞天子崩后之喪君薨夫人之喪孔子曰廢而無有及大臣者是知祭而去樂不可也有事於宗廟遭大夫之變則以聞可乎按禮衛有大音泰史柳莊寢疾君曰若疾革居力反急也雖當祭必告見檀弓是知祭而以聞不可也禮莫重於當祭大夫有變而不以聞則內得盡其誠敬之心於宗廟外全隱恤之意於大臣是兩得之也然則有事於宗廟大臣涖事籥入而卒於其所則如之何禮雖未之有可以義起也禮運禮雖先王未之有可以義起有事於宗廟大臣涖事籥入而卒於其所去樂卒事其可也緣先祖之心見大臣之卒必聞樂不樂音洛緣孝子之心視已設之饌必不忍輕徹直列反故去樂而卒事其可也宗廟合禮者常事不書苟以為可則春秋何書乎此記禮之變而書之者也家氏曰祭者主於誠慤不二事者也故當祭雖大夫之喪不得以聞衛臣柳莊疾革其君必使以告為之變其常也叔弓預於祭猝有疾而死則君為之撤樂卒事可也若叔弓自殁於其家如栁莊之比則當待祭畢而後告不當以卑而廢尊春秋書之記禮之變其常耳此與襄仲之卒去籥其禮不同不可引以為證也髙氏曰成六年立武宮非禮也此有事于武宫則知自立宫之後祭之如親廟方其祭也而叔弓涖事籥入而卒此豈雉鼎之變而已哉啖氏曰穀梁言大夫之卒雖當祭禮皆告於君按宗廟大事大夫卒小事以理言之應待祭畢又禮記稱衛侯曰栁莊者非寡人之臣也社稷之臣也如其卒雖當祭必告據此足明常禮不告劉氏曰公羊云君有事于廟聞大夫之喪去樂卒事非也曽子問君在祭不得成禮者幾仲尼語之詳矣而不及此此所以知其非也趙氏曰左氏云禘于武宫僖宫襄宫蓋見經中禘於莊公以為諸廟合行之故妄云爾愚按有事武宫乃春祠之祭而不書祭名者以叔弓之卒去樂卒事變禮而書之非時祭之失故止曰有事而不曰祠也左氏以禘為四時之祭遂誤以為禘耳夏蔡平朝吳出奔鄭朝如字公作昭無出字左傳楚費無極害朝吳之在蔡也欲去之乃謂之曰王唯信子故處子於蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信吳故置諸蔡二三子莫之如也而在其上不亦難乎弗圖必及於難蔡人逐朝吳吳出奔鄭王怒曰余唯信吳故置諸蔡且微吳吾不及此女何故去之無極對曰吳在蔡蔡必速飛去吳所以翦其翼也杜氏曰朝吳故蔡大夫公孫聲子歸生之子朝吳蔡之忠臣雖不能存蔡而能復蔡其從於棄疾者謂蔡滅而棄疾必能封之也棄疾以其忠於舊君而信之使居舊國可謂知所信矣則曷為出奔費扶味反無極害其寵也無極楚之讒人去起吕反下同朝吳出蔡侯朱昭二十一年喪息浪反太子建殺連尹奢並昭二十年屛必井反王耳目使不聰明昭二十七沈尹戌云云平王之溫惠共儉有過成莊無不及焉所以不獲諸侯邇無極也卒使吳師入郢辱及宗廟讒人為亂可不畏乎為國有九經而尊賢為上勸賢有四事而去讒為首本中庸志朝吳出奔而入郢之師兆矣然朝吳身居舊國處危疑之地苟有譛之者則王不能無動也能以忠信自任而杜讒諂之謀則善矣而費無極乃語魚據反之曰子亦長展兩反矣而在下位辱也欲為于偽反之請以名利纍劣偽反其心而莫之覺不智亦甚矣故特書其出奔以罪吳為後戒也六月丁巳朔日有食之秋晉昭荀吳帥師伐鮮虞左傳荀吳帥師伐鮮虞圍鼓鼓人或請以城叛穆子弗許曰或以吾城叛吾所甚惡也人以城來吾獨何好焉欲城而邇姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人告食竭力盡而後取之克鼓而反以鼓子鳶鞮歸晉滅潞氏甲氏及再伐鮮虞皆用大夫為主將去聲而或稱人或稱國或稱其名氏何也宣十五荀林父滅潞稱晉師宣十六士會滅甲氏留吁稱晉人昭十二荀吳伐鮮虞至于此年及定四年五年士鞅伐圍鮮虞哀六年趙鞅伐鮮虞皆稱將稱帥師以殄滅為期而無矜惻之意則稱人見利忘義而以詭計欺詐行之則稱國以正兵加敵而不納其叛臣則稱名氏夫稱其名氏非褒之也才免於貶爾而春秋用兵禦侮之略咸見音現矣蜀杜氏曰前既狄之今不復貶者春秋擇其重者而為之辭陳氏曰嘗狄晉矣則荀吳何以無貶於初伐貶餘實録而已爾冬公如晉昭左傳平丘之會故也臨川吳氏曰平丘之會公不與盟大夫被執公既往朝而不見納辱亦甚矣至此又往朝焉蓋畏大國不敢以辱為恥也乙景王十亥九年十有六年晉昭六卒齊景二十二衛靈九蔡平四鄭定四曹平二陳惠四杞平十宋元六秦哀十一楚平三吳僚元年春齊侯景伐徐左傳齊侯伐徐師至于蒲隧徐人行成徐子及郯人莒人會齊侯盟于蒲隧賂以甲父之鼎叔孫昭子曰諸侯之無伯害哉齊君之無道也興師而伐逺方會之有成而還莫之亢也無伯也夫襄陵許氏曰景公之時吳楚方爭晉既不能逺略以齊之強務德修政以通天下之志糾合諸侯復霸可也而區區務爭徐伐莒之利志亦卑矣家氏曰徐之封在齊南鄙桓公之霸楚成伐徐桓公躬率諸侯盟于牡丘次于匡以救之又出偏師伐厲以攻其所必救非但為徐計亦自為齊計也今齊景睥睨晉霸而不能志其逺者乃伐徐以為左右望之計視桓公之保徐有愧多矣愚按楚虔之立徐屢從楚伐吳昭十二年楚以為二於吳而圍之蓋徐實楚之與國也此年盟蒲隧而遂與齊踰十五年吳卒滅徐則甲父之鼎固不足以保徐之社稷也楚子平誘戎蠻子殺之公作戎曼音蠻後同左傳楚子聞蠻氏之亂也與蠻子之無質也使然丹誘戎蠻子嘉殺之遂取蠻氏公羊傳楚子何以不名夷狄相誘君子不疾也若不疾乃疾之也杜氏曰河南新城縣東南有蠻城張氏曰今伊闕縣即新城愚按今河南府新安縣楚子之誘一也或名十一年楚子虔誘殺蔡侯書名或不名者虔欲滅中國而棄疾討蠻氏謹中外之辨也范氏曰楚子不名戎蠻子非中國故蔡侯與蠻子之見殺一也或名不名者蔡般音班弒父與君蠻氏亂而無質信也其罪之輕重亦差楚宜反矣蘇氏曰楚子誘蔡侯殺之書月書日書名書地以蠻荆害中國疾之也誘殺戎蠻皆不書同類相殘略之也家氏曰楚大蠻小皆以子稱以見四夷雖有大小強弱之不同而於周班皆為子不得擅相侵陵况誘而殺之乎夏公至自晉左氏曰公如晉平丘之會故也至是始歸者晉人止公其不書諱之也昭公數色角反朝于晉三至于河而不得入十二年莒人訴取郠十三年平丘不與盟執意如士文伯辭公二十一年辭將伐鮮虞惟二十三年有疾乃復又二年辭弔少薑非朝兩得見晉侯又欲討其罪而止旃之然反五年如晉莒人訴受牟夷欲止公范獻子諌乃歸公其困辱亦甚矣在易之困曰困亨者因困窮而致亨也朱子本義困者窮而不能自振之義身雖困而道則亨也夫困於心衡與橫同於慮而後得徵知陵反於色發於聲而後喻此正憤房粉反悱芳匪反自強之時而夏少詩照反康哀元少康逃奔有虞有田一成有衆一旅能布其德以收夏衆復禹之績衛文公閔二衛文公大布之衣大帛之冠季年革車三百乘越句踐史句踐保棲於會稽嘗膽報吳燕於賢反昭王史昭王於破燕之後卑身厚幣以招賢者用樂毅敗齊四君子者由此其選息轉反謂在倫等最上也今昭公安於危辱無激昻勉勵之志即所謂自暴自棄不可與有為而人亦莫之告矣不亦悲乎諱而不書深貶之也愚按公行一百七十有六惟僖公十七年十二月會淮明年九月書至襄公二十八年十一月如楚明年五月書至昭公去年冬如晉今夏書至皆受制於大國踰三時而始返雖不書晉人止公考其時則微傳而事著矣秋八月己亥晉侯夷卒昭公也在位六年子去疾嗣是為頃公九月大雩左傳旱也季孫意如如晉臨川吳氏曰卿共葬事畏晉也冬十月葬晉昭公杜氏曰三月而葬速丙景王二子十年十有七年晉頃公去疾元年齊景二十三衛靈十蔡平五鄭定五曹平三陳惠五把平十一宋元七秦哀十二楚平四吳僚二春小邾子穆來朝左傳小邾穆公來朝公與之燕愚按三年小邾穆公來朝至是十有五年再朝于昭公也夏六月甲戌朔日有食之左傳祝史請所用幣叔孫昭子曰日有食之天子不舉伐鼓於社諸侯用幣于社伐鼓於朝禮也平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣其餘則否大史曰在此月也平子弗從昭子退曰夫子將有異志不君君矣杜氏曰正月建已正陽之月於周為六月於夏為四月秋郯子來朝左傳公與之宴昭子問焉曰少皥氏以鳥名官何故也郯子曰吾祖也我知之昔者黃帝氏以雲紀故為雲師而雲名炎帝氏以火紀故為火師而火名共工氏以水紀故為水師而水名大皥氏以龍紀故為龍師而龍名我髙祖少皥摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也仲尼聞之見於郯子而學之曰天子失官學在四夷猶信家氏曰周魯俱衰典章闕壞而逺方小國之君乃知前古官名之沿革蓋録之也王氏曰世亂禮廢而博學多識之士猶有存者有王者作皆可用為政故仲尼嘆中國寡陋禮失而求之于野也八月晉頃荀吳帥師滅陸渾之戎渾戶門反左傳晉侯使屠蒯如周請有事於雒與三塗萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其備之乃警戒備晉荀吳帥師涉自棘津使祭史先用牲于雒陸渾人弗知帥從之遂滅陸渾數之以其二於楚也陸渾子奔楚其衆奔甘鹿周大獲宣子夢文公携荀吳而授之陸渾故使穆子帥師獻俘於文宫林父之於潞氏宣十五士會之於甲氏宣十六荀吳之於陸渾戎皆滅之也而林父士會稱師稱人荀吳舉其名氏何哉畿輔宜肅陸渾之戎密邇王室而縱之雜處則非尊王朝别筆列反內外之義也與闢土服逺以圖強霸則異矣然舉其名氏非褒詞也才得無貶耳則窮兵於逺虛內事外者可知矣髙氏曰宣三年楚子伐陸渾之戎自是陸渾睦於楚而為內地之害至是荀吳滅之愚按戎居諸夏之區固中國之大害也晉武不能徙戎卒至於神州陸沉則中行穆子之滅陸渾疑可褒矣然陸渾之戎本居秦晉之西北在荒服之外自僖之二十二年晉乃與秦遷之於伊川侵逼王畿則是晉人始謀不臧之過也今也與楚爭強掩其不備而滅之蓋不足以贖前過矣奚可褒之有哉冬有星孛于大辰孛音佩又音勃左傳有星孛于大辰西及漢申須曰彗所以除舊布新也天事恆象今除於火火出必布焉諸侯其有火災乎梓慎曰火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之虛也陳大皥之虛也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之牡也其以丙子若壬午作乎不過其見之月公羊傳孛者何彗星也大辰者大火也何以書記異也穀梁傳濫于大辰也大辰心也左傳襄九心為大火爾雅大火謂之大辰孔氏正義大火蒼龍宿心以候四時故曰辰心為明堂天子之象其前星太子後星庶子春秋元命包心三星五度有天子明堂布政之宫史天官書心為明堂大星天王前後星子屬前五行志心天子之象也天文志心三星天王正位也中星曰明堂天子位為大辰前星為太子後星為庶子孛星加心象天子適丁歷反庶將分爭也何氏曰心者天子明堂孛彗者邪亂之氣掃故置新之象是後周分為二天下兩主後五年景王崩王室亂劉子單音善子立王猛尹氏召音邵伯立子朝歷數所具反載而後定昭二十二年王室亂二十六年敬王入成周王子朝奔楚三十二年城成周王室始寧至哀十三年有星孛于東方不言宿夙又反名者不加宿也當是時吳人僣亂憑陵上國日敝於兵暴蒲卜反骨如莽芒黨反哀元陳逢滑云云其戾氣所感固將壅吳而降之罰也故氛祲子鴆反所指在於東方假手越人吳國遂滅天之示人顯矣史之有占明矣宋氏曰大辰大火周木德火將出木將焚掃舊布新之象天人之際此其見乎楚平人及吳僚戰于長岸左傳吳伐楚陽丐為令尹卜戰不吉司馬子魚曰我得上流何故不吉我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰于長岸子魚先死楚師繼之大敗吳師獲其乘舟餘皇使隨人與後至者守之吳公子光請於其衆曰喪先王之乘舟豈惟光之罪衆亦有焉請藉取之以救死使長鬛者三人濳伏於舟側曰我呼餘皇則對師夜從之三呼皆迭對楚人從而殺之楚師亂吳人大敗之取餘皇以歸公羊傳詐戰不言戰其言戰何敵也杜氏曰長岸楚地張氏曰水戰也言戰不言敗勝負敵也楚先勝吳吳後復勝楚楚地五千里帶甲數所具反十萬戰勝諸侯威服天下本非吳敵也惟不能去起吕反下同讒賤貨使費扶味反無極以讒勝囊瓦以貨行而䇿士竒才為敵國用如屈巫伍貟之類故日以侵削至雞父之師七國皆敗昭二十三柏舉之戰國破君奔定四幾於亡滅吳日益強而楚削矣是故為國必以得賢為本勸賢必以去讒賤貨為先不然雖廣土衆民不足恃也考其所書本末強弱之由其為後世戒明矣陳氏曰此楚令尹陽丐世書人吳公子光也書國略之也楚之君大夫不見於春秋者十八年而吳入郢矣五年吳嘗敗楚于鵲岸不書六年敗楚于房鍾不書書伐吳而已於是始書戰則以吳楚敵言之也劉氏曰榖梁云進楚子故曰戰非也戰則云戰敗則云敗豈擇於吳楚哉且楚與中國並久矣豈至此而進之哉丁景王二丑十一年十有八年晉頃二齊景二十四衛靈十一蔡平六鄭定六曹平四卒陳惠六把平十二宋元八秦哀十三楚平五吳僚三春王三月曹伯須卒平公也在位四年子午嗣是為悼公夏五月壬午宋元衛靈陳惠鄭定災左傳五月火始昏見丙子風梓慎曰是謂融風火之始也七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火數日皆來告火公羊傳記異也異其同日而災也外異不書此為天下記異也穀梁傳其志以同日也其日亦以同日也按左氏鄭災子産臨事而備至于書焚室而寬其征記所焚之户數而寬其賦稅與之材三日哭國不市使行人告於諸侯宋衛皆如是陳不救火許不弔災君子以是知陳許之先亡也初禆婢支反竈言於子産宋衛陳鄭將同日火若我用瓘古亂反斚古雅反玉瓚才旦反杜氏曰瓘圭也斝玉爵也瓚勺也欲以禳火鄭必不火子産弗與及鄭既災竈曰不用吾言鄭又將火鄭人請用之子産不可曰天道逺人道邇非所及也何以知之穀梁子産曰天者神子惡知之是人也亦不復扶又反下同火禆竈所言蓋以象推非妄也而鄭不復火者子産當國方有令政此以德消變之驗矣是知吉凶禍福固有可移之理古人所以必先人事而後言命也劉氏曰四國同日而災非人所能為也其序宋衛陳鄭春秋之正也同德則尚爵同爵則尚親六月邾莊人入鄅鄅音禹左傳鄅人藉稻邾人襲鄅鄅人將閉門邾人羊羅攝其首焉遂入之盡俘以歸鄅子曰余無歸矣從帑于邾邾莊公反鄅夫人而舍其女杜氏曰鄅妘姓國在琅琊開陽縣張氏曰今沂州臨沂縣愚按沂州今屬益都路書以惡邾且為宋公伐邾起也義見明年宋伐邾秋葬曹平公冬許悼遷于白羽左傳楚左尹王子勝言於楚子曰許於鄭仇敵也而居楚地以不禮於鄭晉鄭方睦鄭若伐許而晉助之楚喪地矣君盍遷許許不專於楚葉在楚國方城外之蔽也楚子説使王子勝遷許於析實白羽張氏曰白羽一名析楚邑今鄧州內鄉縣杜氏曰自葉遷也畏鄭而樂遷故以自遷為文通旨本所以存許非強之也髙氏曰許至是三遷矣愚按昭九年許遷於夷十三年楚平立復封陳蔡而許亦遷葉故今自葉而遷爾鄧州今屬汴梁路戊景王二寅十二年十有九年晉頃三齊景二十五衛靈十二蔡平七鄭定七曹悼公午元年陳惠七杞平十三宋元九秦哀十四楚平六吳僚四春宋公元伐邾莊按左氏宋公伐邾圍蟲取之而經不書圍與取何也初鄅人藉稻邾人襲鄅盡俘之鄅子曰余無歸矣從帑音奴於邾邾子反其夫人而舍如字其女夫人宋向舒亮反下同戌音恤之女也故向寧向戌子請師圍蟲取之盡歸鄅俘邾人郳人徐人會宋公同盟于蟲此所謂聲罪執言之兵歸鄅之俘其善意也故書伐邾而釋其取邑之罪此亦善去聲善長惡烏故反惡短之義公羊君子之善善也長惡惡也短髙氏曰天下無霸而宋元於此一正入鄅之亂是以春秋録而進之家氏曰凡書爵而書侵伐者多貶此繼邾人入鄅而書宋公伐邾則與宋公之討有罪也王氏曰因其臣之私請而興師伐國當時列國之政大夫專之故也夏五月戊辰許世子止弒其君買公羊傳止進藥而藥殺也曷為加弒譏子道之不盡也樂正子春之視疾也復加一飯則脫然愈復損一飯則脫然愈復加一衣則脫然愈復損一衣則脫然愈止進藥而藥殺是以君子加弒焉爾榖梁傳口弒正卒也正卒則止不弒也不弒而曰弒責止也止曰我與夫弒者不立乎其位以與其弟虺哭泣啜飦粥嗌不容粒未踰年而死故君子即止自責而責之也愚按悼公在位二十四年世子止之弟斯立是為元公按左氏許悼公瘧魚略反戊辰飲世子止之藥卒世子奔晉書曰弒其君者止不嘗藥也文王世子疾之藥必親嘗之古者醫不三世不服其藥見曲禮夫子之所慎者三疾居其一朱子注疾吾身之所以死生存亡者不可以不謹也季康子饋藥曰丘未達不敢嘗楊氏曰謹疾也敬慎其身如此也而於君父可忽乎君有疾飲藥臣先嘗之父有疾飲藥子先嘗之曲禮蓋言慎也止不擇醫而輕用其藥藥不先嘗而誤進於君是有忽君父之心而不慎矣通旨悼公不起是飲非其藥而致卒也止不嘗藥是冇忽君父之心而不敬也樂正子下堂傷足而有憂色跬步之間猶不敢忘父母况父母之疾而可輕之乎自小人之情度待洛反之世子弒君欲速得其位襄公二十六年宋伊戾譛太子將為亂公曰為我子是何求對曰欲速而止無此心故曰我與音預夫弒者不立乎其位哭泣啜昌悅反飦之然反粥嗌音益咽喉也不容粒未逾年而卒無此心故被皮寄反以大惡而不受自君子聽治也之止不嘗藥是忽君父之尊而不慎也而止有此心忽君父之尊而不慎此篡弒之萌堅氷之漸而春秋之所謹也有此心故加以大惡而不得辭書許世子止弒君乃除惡於微之意也而或者顧以操刃而殺與不躬進藥及進藥而不嘗三者罪當殊科疑於三傳之説則誤矣歐陽公辨三傳論止為真弒必若此言夫人而能為春秋奚待於聖筆乎墨翟兼愛豈其無父楊朱為于偽反我豈其無君孟軻氏辭而闢之以為禽獸逼人人將相食後世推明其功不在禹下韓文未有譏其過者知此説則知止不嘗藥春秋以為弒君之意矣陸氏曰世子君之二也許其進藥則亂臣賊子得容其姦矣故聖人罪止一人以絶萬世之禍也張氏曰藥劑所以致人之死者非一端姑以瘧言之今之治瘧以砒煆而餌之多愈然煆不得法而反殺人者多矣悼公之死必此類也然止以弒書何也孟子曰殺人以挺與刃有以異乎曰無以異也以刃與政有以異乎曰無以異也進藥而藥殺可不謂之弒哉其所以異於商臣蔡般者過與故不同耳心雖不同而春秋之文一施之者以臣子之於君父不可過也蘇氏曰今律和御藥誤不如法者死蓋春秋之遺意也鄱陽萬氏曰許止之事雖若可恕萬一後世臣子幸君父之疾進藥以斃之而自附於不知嘗藥之義是啓之為亂原也陳氏曰哀薑慶父弒問公書曰公薨夫人薑氏孫于邾公子慶父出奔莒則罪人斯得矣許悼公飲世子止之藥而卒世子奔晉世子止誠不嘗藥爾春秋將為後人戒書曰世子止弒其君不言奔督可也劉氏曰穀梁云日弒正卒也非也州吁無知萬商臣趙盾歸生夏徴舒崔杼寧喜弒君皆書日可云皆正卒乎春秋褒貶豈不明恃日月而後見之此泥而不通也己卯地震愚按經書地震者五昭公之世再見此年及二十三年是也夫地道安靜以震動為反常之異臣道恭順以悖逆為犯上之惡是時季孫強僣已甚天之示變欲人君之有所警而以德銷之也昭公漫不知省遄及於難悲夫秋齊景髙發帥師伐莒共左傳齊髙發伐莒莒子奔紀鄣使孫書伐之初莒有婦人莒子殺其夫已為嫠婦及老託於紀鄣紡焉以度而去之及師至則投諸外或獻諸子占子占使師夜縋而登登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啓西門而出齊師入紀髙氏曰莒不事齊故愚按齊景爭伯之心不下於僖桓而徒計近功汲汲焉有事於徐莒以晏子之賢為之輔佐而亦不能有所匡正則所謂以其君顯者何足稱哉冬葬許悼公公羊傳賊未討何以書葬不成乎弒也曰許世子止弒其君買是君子之聽止也葬許悼公是君子之赦止也赦止者免止之罪辭也程子傳蔡般許止疑同故書葬何以書葬穀梁子曰不使止為弒父也其説曰子既生不免乎水火母之罪也羈貫成童范氏曰羈貫謂交午剪髮以為飾成童八嵗以上內則三月之末剪髮為鬌男角女羈不就師傅父之罪也就師學問無方心志不通身之罪也心志既通而名譽不聞友之罪也名譽既聞有司不舉有司之罪也有司舉之王者不用王者之過也許世子止不知嘗藥纍劣偽反及許君也范氏曰許君不授子以師傅使不識嘗藥之義故纍及之觀止自責可謂有過人之質矣乃至以弒君獲罪此為人臣子而不知春秋之義者也本董子古者太子自其初生固舉以禮桓六以太子生之禮舉之接以太牢卜士負之士妻食之有司端冕見音現之南郊過闕則下過廟則趨前賈誼策為赤子而其教已有齊側皆反肅敬慎之端矣此春秋訓臣子除惡於微積善於早之意也家氏曰或問蔡般之弒景許止之弒悼皆書葬同乎否乎曰其弒異其葬烏得而同已景王二卯十三年二十年晉頃四齊景二十六衛靈十三蔡平八卒鄭定八曹悼二陳惠八把平十四宋元十秦哀十五楚平七吳僚五春王正月夏曹悼公孫會自鄸出奔宋鄸莫公反穀作夢公羊傳奔未有言自者此其言自何為公子喜時之後諱也春秋為賢者諱何賢乎喜時讓國也賢喜時則曷為為會諱君子之善善也長惡惡也短惡惡止其身善善及子孫賢者子孫故君子為之諱也穀梁傳自夢專乎夢也曹無大夫其曰公孫何也言其以貴取之而不以叛也杜氏曰鄸曹邑髙氏曰會子臧之子鄸子臧之采邑也張氏曰今興仁府縣乘氏縣有大饗城古老云古鄸城愚按今屬曹州濟隂奔未有言自者此其言自何劉氏曰大夫之奔未有言其自者獨此言自鄸是變例也劉敞曰待放也公羊宣元古者大夫已去三年待放古者大夫有罪待放於其境三年君賜之環則復賜之玦古冗反則去荀子大略篇絶人以玦反絶以環注肉好如一謂之環玦如環而缺古者臣有罪待放於境三年不敢去與之環則還與之玦則絶逾境則為位向國而哭素衣裳冠不説人以無罪此去國之禮並劉氏傳曹無大夫其曰公孫賢之也劉氏曰春秋之時臣能専其邑無不叛其國者能使其衆無不要其君者臧武仲之智猶據防以求為後於魯是以孔子譏之公孫會之自鄸奔宋也其賢於臧武仲逺矣待放而後出奔臣子常禮免於貶足矣而何以賢之為于偽反公子喜時之後賢之也喜時者曹之社稷鎮公子能以國讓不取乎為諸侯事見左傳成十五所謂子臧是也春秋之義善去聲下同善也長惡烏故反下同惡也短善善及子孫惡惡止其身以其賢者之後苟可善焉斯進之矣此舜典罰弗及嗣賞延于世之意也大禹謨蔡氏傳父子罪不相及而賞則逺延于世其善善長而惡惡短如此後世議者有乞録用賢者之類功臣之世如漢武帝封姬嘉成帝封孔吉宣帝求髙祖功臣子孫失侯者封蕭何子孫之類蓋得春秋之旨矣孫氏曰鄸公孫會之邑也言自鄸出奔宋以别從國都而去也劉氏曰公羊云不言其畔為公子喜時之後諱也非也所以諱賢者之過者謂小不足以妨大短不足以毁長而可以成人之美者也若乃大惡至叛君専地反臣子之義亂人倫之常矣而猶為之諱乎愚按春秋書大夫自其叛邑出奔者皆先書叛故宋華亥向寧華定自南里出奔楚先書入南里以叛宋公弟辰自蕭來奔先書入蕭以叛此書自鄸出奔而先不書叛則非叛也蓋鄸乃公孫會繼其父之食邑而得専制之者如穀梁之説爾得罪待放君無赦命是以自其所食之邑而奔他國也秋盜殺衛侯靈之兄縶縶張立反公穀作輒左傳衛公孟縶狎齊豹奪之司冦與鄄有役則反之無則取之公孟惡北宫喜禇師圃欲去之公子朝通于襄夫人宣薑懼而欲以作亂故齊豹北宫喜禇師圃公子朝作亂初齊豹見宗魯於公孟為驂乘焉將作亂而謂之曰公孟之不善子所知也勿與乘吾將殺之對曰吾由子事公孟子假吾名焉故不吾逺也雖其不善吾亦知之抑亦利故不能去是吾過也今聞難而逃是僣子也子行事乎吾將死之以周事子而歸死于公孟其可也衛侯在平夀公孟有事於蓋獲之門外齊子氏帷於門外而伏甲焉使祝蛙置戈於車薪以當門使一乘從公孟以出使華齊御公孟宗魯驂乘及閎中齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之公聞亂乘驅自閲門人慶比御公公南楚驂乘使華寅乘二車及公宫鴻駠魋駟乘于公公載寶以出禇師子申遇公于馬路之衢遂從過齊氏使華寅肉袒執蓋以當其闕齊氏射公中南楚之背公遂出寅閉郭門踰而從公公如死鳥析朱鉏宵從竇出徒行從公齊氏之宰渠子召北宫子北宫氏之宰不與聞謀殺渠子遂伐齊氏滅之公入與北宫喜盟于彭水之上遂盟國人公子朝禇師國子玉霄子髙魴出奔晉公羊傳母兄稱兄兄何以不立惡疾也穀梁傳盜賤也其曰兄母兄也目衛侯衛侯纍也然則何為不為君有天疾者不得入乎宗廟輒者兩足不能相過齊謂之綦楚謂之踙衛謂之輒左氏以為齊豹齊惡子殺之也齊豹為衛司寇守嗣大夫其書為盜所謂求名而不得者也若艱難其身以險危大人而有名章徹攻難乃旦反之士將奔走之昭三十一臣竊以為仲尼書斷都玩反此獄罪在宗魯宗魯孟縶之驂乘繩證反也於法應書曰盜非求名而不得者也天下豈有欲求險危大人之惡名而聖入又靳居焮反此名而不與者哉然則齊豹首謀作亂宗魯雖預聞行事又以身死之矣今乃釋豹不誅而歸獄於宗魯不亦頗普多反乎曰豹之不義夫人皆知之也若宗魯欲周事豹而死於公孟蓋未有知其罪者故琴張聞其死將往弔之仲尼曰齊豹之盜孟縶之賊汝何弔焉君子不食姦不受亂不為利疚於回不以回待人不蓋不義不犯非禮非聖人發其食姦受亂蓋不義犯非禮之罪書於春秋則齊豹所畜許六反養之盜孟縶所見殺之賊其大惡隱矣家氏曰宗魯始因齊豹而事公孟豹將作亂語宗魯使之先去宗魯不能去亦不以告其主既而乃與公孟俱死於齊豹之難彼自謂忠於縶信於豹而於二者皆失之知公孟之惡而事之不能早去耽祿也聞齊豹將作亂不以告其主不忠也雖與公孟俱死而死不足録所謂求名而不得者也文定之説有得於聖人之意陸氏曰稱盜者目罪人之賤者也臨川吳氏曰凡稱盜蓋皆賤者但當稱人以其所作不義故不稱人而稱盜范氏曰諸侯之尊弟兄不得以屬通經不書衛公子而斥言衛侯之兄者惡其不能保護其兄乃為盜所殺故稱至賤殺至貴孫氏曰以衛侯之母兄盜得殺之衛侯之無刑政也若此故書以著其惡張氏曰縶以有疾不得列於宗而廢是以靈公得立則所以事其兄使全其身者必無所不用其至親愛之而使不得有為於其國此舜所以盡其恩於兄弟也靈公受國於有疾之兄乃聽其無禮於大夫且俾之預於政而又不能防間其母以預制其禍亂使盜賊竊發兄死身危幾亡其國故書盜殺衛侯之兄縶以深罪之也陳氏曰盜賤者也以賤者而殺其君兄衛之失政甚矣劉氏曰左氏云齊豹殺之求名而亡非也豹挾怨儲憤發泄為亂耳本無不畏強禦之名不畏強禦之名亦非豹所求也意豹作亂不能不心愧此正欲蓋非求名者又云險危大人而有名章徹攻難之士將奔走之設春秋書齊豹殺衛侯之兄縶其貶甚於稱盜矣人亦未肯奔走其名也冬十月宋元華亥向寧華定出奔陳華戶化反向舒亮反寧公作寧後同左傳宋元公無信多私而惡華向華定華亥與向寧謀曰亡愈於死先諸華亥偽有疾以誘羣公子殺公子寅公子御戎公子朱公子固公孫援公孫丁公如華氏請焉弗許遂劫之取大子欒母弟辰公子地以為質公亦取華亥之子無戚向寧之子羅華定之子啓與華氏盟以為質公子城公孫忌樂舍司馬疆向宜向鄭楚建郳申出奔鄭其徒與華氏戰于鬼閻公請于華費遂將攻華氏曰子死亡有命余不忍其詬殺華向之質而攻之華向奔陳華登奔吳向寧欲殺大子華亥曰干君而出又殺其子其誰納我且歸之有庸使少司冦牼以歸孫氏曰三卿並出危之家氏曰春秋書三卿同日而奔不惟誅華向其君亦有責焉爾陳氏曰於是公子城公孫忌八子奔鄭華亥向寧華定奔陳其但書三子何凡奔罪也衆不可勝罪則罪其甚者入南里以叛乞師于楚為宋患之日久是以甚三子也十有一月辛卯蔡侯廬卒廬左作盧平公也子朱嗣平公之弟東國逐朱而自立是為悼公左傳蔡太子朱失位位在卑叔孫昭子曰蔡侯其亡乎今始即位而適卑身將從之庚景王二辰十四年二十有一年晉頃五齊景二十七衛靈十四蔡悼公東國元年鄭定九曹悼三陳惠九把平十五宋元十一秦哀十六楚平八吳僚六春王三月葬蔡平公夏晉侯頃使士鞅來聘書聘止此左傳叔孫為政季孫欲惡諸晉使有司以齊鮑國歸費之禮為士鞅鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢杜氏曰晉頃公即位通嗣君襄陵許氏曰禮好不結而財求無度則聘義亡矣蓋自是聘不復志愚按二十三年晉執舍蓋原於士鞅之怒也晉之聘魯者十有一始於荀庚而終於士鞅始則伉而要盟終則怒而責禮霸者之臣所以修聘於望國之魯其非邦交之舊亦甚矣宋元華亥向寧華定自陳入于宋南里以叛華户化反向舒亮反叛公作畔左傳宋華費遂生華貙華多僚華登貙為少司馬多僚為御士與貙相惡乃譛諸公曰貙將納亡人公懼使告司馬司馬嘆曰必多僚也吾有讒子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙張丐欲殺多僚子皮曰司馬老矣登之謂甚而又重之不如亡也將見司馬而行則遇多僚御司馬而朝張丐不勝其怒遂與子皮殺多僚劫司馬以叛而召亡人華向入樂大心豐愆華牼禦諸橫華氏居盧門以南里叛宋城舊鄘入桑林之門而守之華登以吳師救華氏齊師宋師敗吳師于鴻口華登帥其餘以敗宋師公欲出厨人濮請待之齊烏枝鳴曰用少莫如齊致死請皆用劒從之華氏北復即之遂敗華氏于新里公子城以晉師至曹翰胡會晉荀吳齊苑何忌衛公子朝救宋與華氏戰于赭丘大敗華氏圍諸南里華亥搏膺而呼見華貙曰吾為欒氏矣華登如楚乞師楚薳越帥師逆華氏穀梁傳自陳陳有奉焉爾入者內弗受也以者不以者也杜氏曰南里宋城內里名按左氏初宋元公無信多私而惡烏故反華向三大夫謀曰亡愈於死先諸乃誘羣公子殺之公如華氏請焉弗許遂劫公取太子及其母弟以為質音致公怒攻之華向奔陳至是入于南里以叛凡書叛有入于戚者而不言衛襄二十六年孫林父有入于朝如字歌者而不言晉定十三年荀寅士吉射有入于蕭者而不言宋定十一年宋公弟辰仲他石彄公子地此獨稱宋南里何也戚與朝歌及蕭皆其所食私邑也若南里則宋國城內之里名也傳稱華氏居盧門宋東城南門南里以叛而宋城舊鄘音容故城也及桑林門宋城門名以守是華氏與宋分國而居矣故其入其出皆以南里繫之宋此深罪叛臣逼脅其君已甚之詞也孫氏曰前年出奔當絶復見者以入宋南里叛犯君當誅劉氏曰公羊云南里者何若曰因諸者然非也入宋而居南里也愚按榖梁云南里宋之南鄙非也凡書叛不言四鄙必書其邑此不言邑而繫之宋則為宋城內之里名無疑矣又曰叛直叛也謂直叛而不作亂夫外挾吳楚之援將以覆其宗國其君幾不能自保猶曰不作亂耶其書自陳陳亦冇罪矣以奔亡之臣而能入國以為亂非陳助之兵力則未見其可也晉荀吳會齊衛曹之師以救宋而不書圍宋南里者悼公圍彭城則以五大夫歸苟吳救宋而逸賊使華向得逭不臣之誅故不以討叛豫之也秋七月壬午朔日有食之左傳公問於梓慎曰是何物也禍福何為對曰二分二至日有食之不為災日月之行也分同道至相過也其他月則為災愚按日食三十六昭公之世凡七見比之他公災異最數自即位至是年四書日有食之矣梓慎不能因公之問告以遇災而懼之意乃云不為災使公怠於修政遂致失國蓋黨於季氏而姑為諂諛以恱君也八月乙亥叔輒卒輒公作廙才何反杜氏曰叔弓之子伯張冬蔡侯朱出奔楚朱穀作東左傳蔡大子朱失位位在卑大夫送葬者歸見昭子昭子曰是君也必不終費無極取貨於東國而謂蔡人曰朱不用命於楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱訴于楚穀梁傳王父誘而殺焉父執而用焉奔而又奔之貶之也劉氏曰穀梁云東者東國也曰東惡而貶之非也如貶之書東國不亦足乎即貶其半名為法者使蔡侯止名東當復貶去其上下而云蔡侯田乎愚按或疑此書朱出奔楚後書東國卒于楚朱無歸入葬之文東國無出奔之事疑只是一事東即東國而誤為朱也然左傳昭二十七年記沈尹戌之言亦曰出蔡侯朱而史記蔡世家亦曰隱太子東國攻平侯子而代立則朱東國固兩人也豈穀梁經文因後書東國而誤也歟公如晉頃至河乃復左傳公如晉及河鼓叛晉晉將伐鮮虞故辭公襄陵許氏曰公失其重久矣故晉得輕進退之愚按晉之伐鮮虞豈妨於邦交之禮如文三年晉將伐楚以救江而公如晉城三年晉將伐牆咎如而公亦如晉未聞辭公也况光晉實未嘗有事於鮮虞蓋托辭以拒公耳髙氏曰魯哀而朝於齊晉晉愈強則其往也愈數及魯之益衰也則往而辭焉春秋蓋傷魯之削也滋甚而不能以義自強耳春秋胡傳附録纂疏卷二十五
