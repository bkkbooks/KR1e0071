body:
  text: 春秋胡傳附録纂疏卷九元汪克寬撰莊公下丁惠王未三年二十年齊桓十二晉獻三衛惠二十六蔡穆侯肸元年鄭厲二十七曹莊二十八陳宣十九杞共七宋桓八秦宣二楚堵敖熊囏元年春王二月夫人姜氏如莒穀梁傳婦人既嫁不踰竟踰竟非正也十有五年夫人姜氏如齊至是再如莒范氏曰夫人比年如莒過而不改無禮尤甚而春秋書者禮義天下之大防也其禁亂之所由生猶坊音房止水之所自來也經解夫禮禁亂之所由生猶坊止水之所自來也疏禮禁亂之所從生亂生之處則豫禁之若深宫固門閽寺守之諸侯夫人父母沒不得歸寧之類坊謂堤坊又作防古字通用衛女嫁於諸侯父母終思歸寧而不得故泉水賦許穆夫人閔衛之亡思歸唁其兄而阻於義故載馳作並見詩小序聖人録於國風以訓後世朱子傳衛有婦人之詩自共姜至宋襄公之母六人焉皆止乎禮義而不敢過也夫以衛之政教淫僻風俗傷敗然而女子乃有知禮而畏義如此者則以先王之化猶有存焉者故也使知男女之别筆列反自逺於禽獸也曲禮使人以有禮知自别於禽獸今夫人如齊以寧其父母而父母已終以寧其兄弟又義不得杜氏曰夫人父母在則禮有歸寧沒則使卿寧宗國猶爾而况如莒乎婦人從人者也夫死從子見大戴記而莊公失子之道不能防間其母禁亂之所由生故初㑹於禚諸若反二年次享於祝丘四年又次如齊師五年又次㑹於防於榖七年又次如齊又再如莒此以舊坊為無所用而廢之者也經解以舊坊為無所用而壞之者必有水敗以舊禮為無所用而去之者必有亂患是以至此極觀春秋所書之法則知防間之道矣臨川吳氏曰比年書夫人往它國以姦而魯莊若罔聞知昔年猶可諉曰年未長也今年既長矣而如此其不子也甚矣張氏曰春秋詳書蓋與詩之變風相應當是時一反關雎麟趾之化而中國之俗於是大亂夫一國之事係一人之本此聖人所以詳書文姜之行歟髙氏曰春秋迹其淫亂不可勝書故於將薨復三見之要其由惡以終為萬世婦人之戒愚按文姜以桓三年至自齊至是蓋年六十矣淫姣之行老而彌甚比歲如莒備書不削雖國惡不容諱也唐武后年且八十多選美少年為奉宸內供奉醜惡無耻不可勝紀朱子綱目於武曌將殂之際屢書周以張易之為奉宸令周賜張昌宗爵鄴國公其亦春秋志姜氏如莒之遺㫖歟夏齊大災杜氏曰來告故書天火曰災張氏曰齊人來告而魯往弔之也劉氏曰凡弔之者哀其禍而救其乏啖氏曰公羊云大災者何大瘠也若以大災為大瘠新宫災亦是新宫瘠乎災天火也大之者其災大也愚按榖梁云其志以甚也謂災及人似公羊解宋大水之說辨疑權衡既言之矣秋七月冬齊人伐戎戎穀作我張氏曰齊桓於是舉攘戎狄之兵戎在徐州之域最近齊魯故先治之家氏曰周有子頽之亂齊桓為盟主若罔聞知鄭伯虢公胥命於弭以兵討亂殺子頽王入於王城齊不能預也去年伐魯今年伐戎大率逐利以自私於王室何有愚按榖梁傳作伐我蓋誤也經書外伐我十有九皆書四鄙惟哀八年吳兵至城下十一年齊師伐我戰於郊兩書伐我此言齊人則將卑師少安能深入乎當從二傳作伐戎戊惠王申四年二十有一年齊桓十三晉獻四衛惠二十七蔡穆二鄭厲二十八卒曹莊二十九陳宣二十杞共八宋桓九秦宣三楚堵敖二春王正月夏五月辛酉鄭伯突卒左傳初王姚嬖於莊王生子頽有寵故蒍國邊伯石速詹父子禽祝跪作亂以衛師燕師伐周立子頽二十年鄭伯和王室不克遂以王歸王處於櫟秋王及鄭伯入於塢遂入成周取其寶器而還鄭伯見虢叔曰盍納王乎虢公曰寡人之願也二十一年春胥命於弭夏同伐王城鄭伯將王自圉門入殺子頽鄭伯享王於闕西辟樂備王與之武公之略自虎牢以東原伯曰鄭伯效尤其亦將有咎五月鄭厲公卒愚按厲公有位二十八年子捷嗣是為文公杜預稱莊公四年鄭伯遇於垂者乃子儀也十四年杜氏注鄭子莊四年稱伯㑹諸侯而以為厲公者按春秋突歸於鄭桓十一之後其出奔蔡入於櫟桓十五皆以名書猶繫去聲於爵雖篡而實君雖君而實篡不沒其實也忽雖世子其出奔猶不得稱子其復歸猶不得稱伯以其實不能君也而况子儀雖乘間去聲得立其為君微矣豈敢輕去國都與諸侯㑹於外乎故知遇於垂者乃厲公也其始終書爵不沒其實也亦可以為居正而不能保者之戒矣髙氏曰髙渠彌弒昭公立子亹齊人殺亹祭仲立子儀春秋皆沒而不書以突為鄭伯故也永嘉吕氏曰入於櫟書鄭伯卒書鄭伯始終書爵明其能君故箸其實耳張氏曰突莊公之孽子莊公既沒奪忽之位中間雖為祭仲所逐旋入於櫟卒取鄭國故不復著忽亹儀之在位以其不能君也論者以為突始終能君夫篡弒竊國之人而春秋終始君之且復記其卒於位所以著小人肆志亂賊得終王法不行而世之所由亂也秋七月戊戌夫人姜氏薨穀梁傳婦人弗目也范氏曰婦人無外事居有常所故不書地張氏曰文姜之行惡矣而卒以國君之母寵榮終身一用小君之禮此魯之禍所以未艾必至於莊公之終兩君弒哀姜慶父誅而後魯亂始息也冬十有二月葬鄭厲公杜氏曰八月乃葬緩王氏曰據左氏鄭伯有納惠王之功勳在王室然不免諡為厲者其始以賂而篡立中以虐而出奔周室雖衰公議尚在臣子私諡不敢妄加美名古意猶可考也已惠王酉五年二十有二年齊桓十四晉獻五衛惠二十八蔡穆三鄭文公捷元年曹莊三十陳宣二十一祀惠公元年宋桓十秦宣四楚堵敖三春王正月肆大眚所景反公作省公羊傳大省者何災省也榖梁傳肆失也眚災也災紀也失故也肆眚者蕩滌瑕垢之稱也杜氏曰赦有罪也放赦罪人蕩滌衆故以新其心有時而用之非制所常故書舜典曰眚災肆赦蔡氏傳眚謂過誤災謂不幸肆縱也若人如此而入於刑則不待流宥金贖而直赦之易於解下買反卦曰君子以赦過宥罪程子傳赦釋之宥寬之過失則赦之可也罪惡而赦之非義也故寬之而已吕刑曰五刑之疑有赦五罰之疑有赦蔡氏傳刑疑有赦則質於罰而聽其贖罰疑有赦則質於過而宥免之也周官司刺掌赦宥之法一宥曰不識再宥曰過失三宥曰遺忘音妄鄭氏注不識謂愚民無所識若今仇讎當報甲見乙誠以為甲而殺之過失若舉刀欲斫伐而軼中人者今律過失殺人不坐遺忘若間帷薄忘有在焉而以兵矢投射之一赦曰幼弱再赦曰老耄莫報反三赦曰憃勑江反愚注憃愚生而癡騃童昏者幼弱老耄若今律年未滿八歲八十以上非手殺人他皆不坐未聞肆大眚也大眚皆肆則廢天討虧國典縱有罪虐無辜惡人幸以免矣通㫖罪在五刑上天所討大眚皆肆春秋譏之孫氏曰肆大眚非正也亂法異常者也臨川吳氏曰眚固可赦而不言大聖人雖至仁然赦人之罪亦必有所劑量於其間不一槩也書肆大眚則罪之大而不當赦者亦赦之譏其惠奸佚罰也後世有姑息為政數色角反下同行恩宥惠奸軌賊良民而其弊益滋蓋流於此故諸葛孔明曰治世以大德不以小惠其為政於蜀軍旅數興而赦不妄下通鑑初丞相亮時有言公惜赦者亮答曰云云亮卒後延熙九年大赦孟光責費禕曰赦者偏枯之物非明世所宜有蜀人久而歌思猶周人之思召音邵公也蜀諸葛亮傳贊曰至梁益之民咨述亮者言猶在耳雖甘棠之詠召公鄭人之歌子産無以逺譬也斯得春秋之㫖矣肆眚而曰大眚譏失刑也張氏曰宥過無大刑故無小此堯舜三代之法不可偏廢者後世兩失之偏慘刻者不復察其情舉過失而盡刑誅之及姑息之過如莊公者反取大罪極惡而例之於眚災以從肆赦之例怙終得志良善瘖啞書曰肆大眚以譏其務小惠而失大德也啖氏曰肆者放也眚者過也如今之赦爾公羊云忌眚有何義乎趙氏曰榖梁云為嫌天子不許之葬按當時天子微弱魯肯畏之乎若實有畏王之心則自赦以除母罪豈為得禮且魯莊未嘗有怨齊之心葬母肯有所忌赦自赦葬自葬爾癸丑葬我小君文姜公羊傳文姜者莊公之母也榖梁傳小君非君也其曰君何也以其為公配可以言小君也何氏曰文者諡也夫人以姓配諡文姜之行去聲甚矣而用小君之禮其無譏乎見陸氏微㫖以書夫人孫音遜於齊莊元不稱姜氏及書哀姜薨於夷齊人以歸僖元考之則譏小君典禮當謹之於始而後可正也文姜已歸為國君母臣子致送終之禮雖欲貶之不可得矣陸氏曰母有罪子不可得而貶葬生者之事也臣子之禮其可虧乎婦當從夫諡後代訛謬無别有諡非正也夫人稱小君言位比君而小耳髙氏曰婦人無爵何諡之有先王之制但取夫之諡冠於姓之上以明所屬詩所謂莊姜宣姜共姜經所謂宋共姬是也豈有不係其夫而别自為諡者哉夫人姜氏弒逆淫亂之人得罪於宗廟國人之所不容今也云亡雖以子母之故不忍棄絶則葬之足矣又别為之諡曰文而不復繫於桓公自是魯國從而效尤凡夫人之死皆為之别立諡後世因循不改大失春秋之㫖矣臨川吳氏曰夫人之尊與君同故薨葬一如君禮陳人殺其公子御寇御音禦公榖作禦此書專殺之始榖梁傳言公子而不言大夫公子未命為大夫也公子之重視大夫范氏曰禦寇宣公之子公子之重視大夫劉氏曰以為大夫則非大夫也以為世子則非世子也然而書者知其為君之嫡也君之嫡雖未為世子未可稱世子而已有可以為世子之端矣故不可不重也殺而或稱君或稱國或稱人何也稱君者獨出於其君之意而大夫國人有不與音預下同焉如晉侯殺其世子申生宋公殺世子痤之類是也稱國者國君大夫與聞其事而不請於天子如鄭殺其大夫申侯之類是也稱公子者一莒意恢稱大夫稱名氏者三十四鄭申侯公子嘉公子黑晉丕鄭父陽處父先縠趙同趙括郤錡郤犨郤至胥童齊國佐髙厚宋山衛元咺公子瑕孔逹蔡公子燮公子駟公孫姓公孫霍陳泄冶慶虎慶寅楚得臣宜申公子側公子申公子壬夫公子追舒屈申成熊郤宛不稱名宋曹各一稱人者有二義其一國亂無政衆人擅殺而不出於其君則稱人如陳人殺其公子御寇之類是也稱公子者一陳御寇稱大夫稱名氏者四晉先都士縠箕鄭父陳公子過宋大夫不稱名者一不稱名而稱官者一其一弒君之賊人人所得討背音佩叛之臣國人之所同惡去聲則稱人如衛人殺州吁鄭人殺良霄齊殺無知晉殺欒盈之類是也陳氏曰茍殺有罪則稱人稱人者討辭也非殺有罪也而亦稱人猶曰衆人殺之焉耳愚按殺弒君之賊而不以其罪則亦稱國以殺而不去其官如晉里克衛寧喜是也考於傳去聲之所載以觀經之所斷丁亂反則罪之輕重見音現矣孫氏曰春秋之義非天子不得専殺是故二百四十二年無天王殺大夫文書諸侯殺大夫者四十七古者諸侯之大夫皆命於天子諸侯不得専命也大夫有罪則請於天子諸侯不得専殺也犬夫猶不得専殺况世子母弟乎春秋之世國無大小其卿大夫士皆専命之有罪無罪皆專殺之無王甚矣陳人殺其公子御寇譏専殺也稱君稱國稱人雖有輕重其専弒之罪則一也永嘉吕氏曰殺之或稱公子或稱大夫或稱大夫公子稱公子者公子而非大夫也稱大夫者大夫而非公子也稱大夫公子者公子而為大夫也又有以官舉者以官之重而著之也觀聖人所書而褒貶寓乎其中矣劉氏曰左氏稱殺其太子杜云陳人惡其殺太子之名故以國討公子告非也茍殺其太子而赴以公子則仲尼安得不改而正之邪夏五月孫氏曰春秋未有以五月首時者此蓋下文有脫事爾臨川吳氏曰書時之首月而四訛為五也家氏曰何休云譏莊公娶讎女不可奉先祖四時祭祀猶五月不宜首時此穿鑿之說也秋七月丙申及齊髙傒盟於防傒音奚公羊傳髙傒貴大夫也曷為就吾微者盟公也曷為不言公諱與大夫盟也榖梁傳不言公髙傒伉也程子傳髙傒上卿魯無使微者與盟之理蓋諱公盟始與仇為昏惡之大也冬公如齊納幣公羊傳納幣不書此何以書譏何譏爾親納幣非禮也穀梁傳納幣大夫之事也禮有納采有問名有納徴有告期四者備而後娶禮也公之親納幣非禮也故譏之程子傳齊疑昏議故公自行納幣後二年方逆齊難之也杜氏曰母喪未再期而圖昏三𫝊不見所譏失禮明故范氏曰喪婚不待貶絶而罪惡見微者名姓不登於史册髙傒齊之貴大夫也曷為就吾之微者盟蓋公也其不言公諱與髙傒盟也趙氏曰凡盟不目內皆指公也明書髙傒見其伉敵之罪也髙氏曰髙傒不去族異乎晉之處父也家氏曰及處父盟彼時公身在晉晉君不與公盟使其臣盟公故春秋深貴晉人之無禮去處父族以示貶此則齊魯均責焉耳蓋諱之中有權度存焉愚按防盟出公意故髙傒不去氏來議結昏娶仇人女大惡也張氏曰敵大夫以自卑輕君體以自弱去國都而汲汲於小信與及向戍盟於劉一也而此復以婚姻而結盟不顧禰廟不共戴天之仇而議娶齊女比事以觀此為惡之大者也家氏曰或謂魯與齊既為㑹盟春秋無責通婚不亦可乎夫主夏盟者齊桓也請昏而納幣者齊襄之女也盟仇人之弟猶曰為其霸也諸侯皆在不得不與於盟娶妻豈無他族必仇女而後娶其何以奉粢盛入先君之廟乎娶者其為吉下主乎已上主乎宗廟以為有人之心者宜於此焉變矣公羊文二其為吉者主乎己以為有人心焉者則冝於此焉變矣公親如齊納幣則不待貶也臨川吳氏曰莊公受制於母年長而不得娶母既死急於娶故於喪制中屈己與齊大夫盟而求昏焉齊之許未堅而公自如齊納幣納幣非公所當自行也吕氏曰莊公失禮者三娶仇女一也喪未畢二也親往納幣三也啖氏曰納幣常事不書凡書者皆譏也蜀杜氏曰春秋內適外曰如茍書其事蓋非常也動涉非禮明書之以示貶趙氏曰昏禮有六一納采二問名三納吉四納徵納徵即納幣也五請期六親迎親迎即逆女也春秋獨書其二以納幣方契成逆女為事終舉重之義也庚惠王戍六年二十有三年齊桓十五晉獻六衛惠二十九蔡穆四鄭文二曹莊三十一卒陳宣二十二杞惠二宋桓十一秦宣五楚成王頵元年春公至自齊公羊傳桓之盟不日其㑹不致信之也此之桓國何以致危之也張氏曰書至告於廟也春秋書至蓋原於書巡狩而歸格於藝祖用特之意聖人以舉動之公往返之節質之幽明而無愧也今莊公忘父讎而娶其女冒母喪而往納幣以此告廟其心將何如哉此與他日書至不可同日語比事屬辭示人之意顯矣王氏曰公行二十有三書至者五而已公親往納幣既忘桓公之世讎復廢文姜之喪禮自是而下觀社逆女皆致焉聖人之意豈不深切著明哉愚按說公羊者以謂公如齊淫此未必然夫莊公議昏於齊至再至三盟防遇榖盟扈屢為好㑹納幣觀社逆女屢造於齊莊公求之如是其急齊桓許之如此其緩又安背容其縱淫於其國而不耻耶祭叔來聘祭側界反榖梁子曰其不言使天子之內臣也不正其私交榖梁本作外交故不與使也范氏曰祭叔天子寰內諸侯南季渠伯糾家父宰周公來聘皆稱使獨此奪之諸稱使者是奉王命其人無自來之意今祭叔不一心於王而欲外交不得王命來故去使以見之啖氏曰私行假言聘故不言王使以譏之陸氏曰不言使者原其來意非天子之命爾孫氏曰非天子命也故不言使其曰來聘惡外交也祭伯來朝而不言朝隱元祭叔來聘而不言使尹氏隱二王子虎文三劉卷音權定四來訃音赴而不書其爵秩皆所以正人臣之義也人君而明此不容下比毗至反之臣人臣而明此不為交私之計黨錮之禍息矣陳氏曰聘不稱使私相為好也自桓之中年王室無聘魯者王命不行於天下莊僖崩葬蓋不見於經矣是故春秋之初亟書王人於是祭叔私相為好君子蓋有感於此而非徒以為譏也王氏曰祭采地叔字天子之大夫也儻不以王命來則當以祭伯來之例書儻以王命來則當以天王使凡伯來聘之例書今但曰來聘見其假王命而私交也臨川吳氏曰祭圻內之國自入春秋伯之來公之來叔之來聘凡三交魯矣王臣私交之非禮或朝或聘其罪一也永嘉吕氏曰王臣聘魯者八列國聘魯者三十一他皆言使此獨不言使或謂祭叔以私來而自以聘禮行也然祭伯來私來也言來則不當言聘聘非自來也或謂祭叔使人來聘其不稱使不與祭叔之使亦非也此與武氏子來求賻毛伯來求金一例爾蓋武氏毛伯之來非王命故皆不言使祭叔非王命而來聘故亦不言使也愚按春秋書使人來聘未有止稱其君而不著其臣者荆楚無君臣之詞然曰荆人來聘亦指荆之微者爾何嘗言荆子來聘哉或云祭叔乃祭公之臣或以為祭公之弟果其臣若弟而不言使則是隱私交之迹矣或云祭叔請王命而來聘茍請命於王則王命之矣舊史必書曰天王使祭叔來聘聖人何以知其擅命而削不稱使邪夏公如齊觀社左傳非禮也曹劌諫曰夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義帥長幼之序征伐以討其不然諸侯有王王有巡狩以大習之非是君不舉矣公羊傳何以書譏諸侯越竟觀社非禮也榖梁傳常事曰視非常曰觀觀無事之辭也以是為尸女也無事不出竟程子傳昏議尚疑故公以觀社為名再往請議後一年方逆蓋齊難之莊公將如齊觀社曹劌古衛反諫曰齊棄太公之法而觀民於社君為去聲是舉而往觀之非故業也天子祀上帝諸侯㑹之受命焉諸侯祀先公卿大夫佐之受事焉不聞諸侯之相㑹祀也君舉必書書而不法後嗣何觀並見魯語陳氏曰諸侯非享覲不踰竟如齊觀社非禮也臨川吳氏曰社者諸侯祭其土示之常事未聞鄰國之君往觀之者如齊而曰觀社此何禮哉按襄二十四年齊社搜軍實使客觀之蓋齊俗每因祭社則搜軍以夸示威衆而聚人觀之故莊公得托此為名以如齊也家氏曰榖梁以是行為尸女尸之云者盛其車華其服炫惑婦人而蠱其心要其從已是之謂無别故書以責之納幣未幾而以觀社再出此誨淫也劉氏曰觀社與觀魚一也觀社稱如觀魚不稱如內外之辨也諸侯於其竟外可以言如於其竟內不可以言如通㫖公行悉書皆是非所在治亂係焉如齊納幣則見其結昏仇讎如齊觀社即見其非王事民事而妄動輕舉也公至自齊王氏曰宗廟社禝諸侯所同有也其社有常度其祭有常日公廢魯社而觀齊社何以守土而治民哉况公之意以觀社為名而實窺齊女其誨淫召亂必矣所以危而書至也荆人來聘楚交中國始此公羊傳荆何以稱人始能聘也榖梁傳善纍而後進之其曰人何也舉道不待再荆自莊公十年始見音現於經十四年入蔡十六年伐鄭皆以州舉者惡去聲其僭亂不恭故外之也至是來聘遂稱人者嘉其慕義自通故進之也何氏曰蠻荆能慕王化修聘禮當進之故使稱人也孫氏曰以其慕中國修禮來聘少進之也朝聘者中國諸侯之事雖蠻荆而能修中國諸侯之事則不念其僭亂不恭而遂進焉范氏曰明聘問之禮非蠻荆之所能故一舉而進之見聖人之心樂音洛與人為善矣後世之君能以聖人之心為心則與天地相似凡在荒逺者叛則懲其不恪而威之以刑來則嘉其慕義而接之以禮邇人安逺者服矣通鑑唐德宗曰吐蕃犯塞則擊之服則歸之撀以示威歸以示信命歸吐蕃之俘吐蕃大悅遣入貢春秋謹中外之辨而荆吳徐越諸夏之在僻陋者劉氏曰吳楚徐越上世皆有元德顯功通乎周室徐始稱王楚後稱王吳越因遂稱王王非諸侯所當稱也是以外之雖然稱人稱國稱子不使與鄋瞞陸渾比推之可達引之可來也故書法如此陳氏曰荆楚稱人於是始蓋進之也隱桓之春秋舍王室若姻鄰無聘魯者矣而荆人先諸夏修聘於上國進之也者憂之也張氏曰楚自四五年來先加兵於鄭蔡而聘使至魯用逺交近攻之術愚按公穀皆謂稱人所以進之或謂春秋著其漸盛今考楚之交中國始書荆人繼書楚屈完然後書楚子使椒楚子使薳罷蓋始而來聘則嘉其慕義而稱人既而來盟豫其服義則進而稱名氏及其寖慕中國薦講聘好則稱君稱臣矣吳之始見也亦秪舉號及其來㑹諸侯則進而稱人使季札聘則嘉其慕義而稱君稱臣雖曰進之而吳楚漸盛之勢已見於言意之表矣然楚之初聘止曰荆人而不著君臣雖曰進之而實則略之也蓋不可言荆來聘故謂之荆人特比於舉號則為進之耳或以謂君臣同辭夫君臣同辭則止稱國既曰荆人則是荆之卑者特比於君使臣則其辭未詳焉耳曷可謂君臣同辭哉公及齊侯遇於榖榖梁傳及者內為志焉耳愚按莊公急於得偶數相㑹盟故簡禮而為此㑹也傳義見盟扈蕭叔朝公公羊傳其言朝公何公在外也穀梁傳微國之君未爵命者其不言來於外也朝於廟正也於外非正也杜氏曰蕭附庸國張氏曰今徐州蕭縣愚按徐州今屬河南府路何氏曰言朝公惡公不受於廟榖齊地蕭叔附庸之君也中國附庸之君例書字愚按左傳成二年稱蕭同叔蓋當時蕭君常稱字為禮必當其物與其所而後可以言禮大夫宗婦覿而用幣則非其物也蕭叔朝公在齊之榖則非其所也啖氏曰人君相見曰朝皆受之於廟以重禮也嘉禮不野合而朝公於外是委之於野矣杜氏曰就榖朝公故不言來凡在外朝則禮不得具嘉禮不野合故禮非其所君子有不受必反之於正而後止此亦春秋撥亂之意也孫氏曰諸侯相朝非禮也朝於內猶曰不可况朝於外乎故曰蕭叔朝公以交譏之也劉氏曰為禮非其時猶非其禮也為禮非其處猶非其禮也為禮非其義猶非其禮也九月郊五月蒸此之謂非其時蕭叔朝公此之謂非其處祭叔來聘齊侯來獻捷此之謂非其義雖有肅敬之心繁飾之容而君子不受也故禮非其禮而猶不受必歸之正而止又况乎未始有正者乎張氏曰蕭之朝魯之受皆非禮也愚按齊莊公弔杞梁之妻於郊辭曰君之臣不免於罪則將肆諸市朝而妻妾執若免於罪則有先人之敝廬在下妾不得與郊弔齊侯弔諸其室使魯莊能如梁妻之知禮而辭蕭叔之朝則為不悖於禮矣今莊公訹於私欲而受非禮之禮故聖人特書曰朝公而不曰來朝所以交貶之也髙氏曰公納幣而還則祭叔聘之觀社而還則荆人聘之遇穀則蕭叔朝之此其志所以自得而不復忌憚也秋丹桓宫楹公羊傳何以書譏何譏爾丹桓宫楹非禮也榖梁傳禮天子諸侯黝堊大夫倉士黈丹楹非禮也何氏曰楹柱也丹之者為將娶齊女欲以夸大示之冬十有一月曹伯射姑卒射音亦莊公也在位三十一年蓋世子羈嗣踰年而庶子赤篡立是為僖公史記世家赤作夷十有二月甲寅公㑹齊侯盟於扈音户公羊傳桓之盟不日此何以日危之也杜氏曰扈鄭地在滎陽卷縣西北愚按今汴梁路鄭州之西北孫泰山謂扈齊地未詳孰是程氏曰遇於榖盟於扈皆為要於遙反結姻好去聲也𫝊去聲穀梁文十二稱男子二十而冠去聲下同冠而列丈夫三十而不娶則非禮矣然天子諸侯十五而冠者以娶必先冠左傳襄九國君十五而生子冠而生子禮也昏義疏三十而娶庶人禮也文王十五而生武王知人君之昏娶不可以年三十重昏嗣也而國不可久無儲二欲人君早有繼體故因以為節也鰥古頑反者老而無妻之稱舜方三十未娶而師錫帝堯已曰有鰥在下矣據舜典言舜生三十徵庸以上並本穀梁傳注譙周說妻去聲下同帝之二女則不告於父母以為告則不得娶而廢人之大倫堯亦不告而妻焉其欲及時而無過如此也今莊公生於桓之六年至是三十有六載矣以世嫡之正諸侯之貴尚無內主同任社禝之事何也蓋為文姜所制使必娶于母家孫氏曰桓六年九月丁卯子同生公十四歲即位又二十四年如齊逆女年三十七始昏者文姜制之不得以時而昏耳故母喪未終如齊納幣圖昏之速也陳氏曰莊公制於其母必齊女也而後娶愚按漢惠帝制於吕后立姊魯元公主女為后雖娶甥女而不顧與莊公事頗相類而齊女待年未及故莊公越禮不顧如此其急齊人有疑如此其緩而遇于榖盟于扈要結之也娶夫人奉祭祀為宗廟之主而母言是聽不以大義裁之至於失時不孝甚矣春秋詳書于䇿為後戒也王氏曰越禮要盟逺至鄭地而不耻者促昏期也臨川吳氏曰遇穀以請而齊猶難之故盟以要其信而後許也夫求昏者可求則求不可則已許昏者可許則許不可則郤魯欲求齊昏不以媒妁往覘其可不可公乃自與齊髙傒盟以求之未得齊諾而公遽親納幣是與彊委禽者同也躬納幣而猶未諾則又往觀社以請觀社以請而猶未諾則又遇于榖以請遇榖之後宜若可矣又必盟于扈而後可焉何其難之之甚也二國之昏姻不以禮不以義如此哀姜之不終也宜哉劉氏曰公羊以謂何危爾我二也我二者非彼然我然也妄說耳愚按諸𫝊皆謂莊公受制於母俾娶仇女今考莊公以文姜葬後求昏於齊自盟防而㑹遇者三自納幣而如齊者三汲汲奔走不憚煩勞而且盛飾禰宫以夸示其配使莊公果以文姜遺命而娶齊女亦縱欲而不能自克耳非迫於義而不敢違也辛惠王亥七年二十有四年齊桓十六晋獻七衛惠三十蔡穆五鄭文三曹僖公赤元年陳宣二十三杞惠三宋桓十二秦宣六楚成二春王三月刻桓宫桷左傳丹桓宫之楹刻其桷皆非禮也公羊傳何以書譏何譏爾刻桓宫桷非禮也穀梁傳禮天子之桷斫之礱之加密石焉諸侯之桷斫之礱之大夫斫之士斫本刻桷非正也夫人所以崇宗廟也取非禮與非正而加之於宗廟以飾夫人非正也刻桓宫桷丹桓宫楹斥言桓宫以惡莊也公將逆姜氏丹桓宫之楹刻其桷杜氏曰刻鏤也桷椽也張氏曰於礱斫之外又加刻􅍢之工為盛飾以誇示之范氏曰將親迎欲為夫人飾此非特有童心而已左傳昭公十九年矣猶有童心御音禦孫諌曰儉德之共音恭下同也侈惡之大也先君有共德而君納諸大惡無乃不可乎自常情觀之丹楹刻桷宜若小失而春秋詳書于策御孫以為大惡何也桓公見殺于齊則不能復而盛飾其宫誇示仇人之女乃有亂心廢人倫悖天道而不知正者也御孫知為大惡而不敢盡子忍反言春秋謹禮於微正後世人主之心術者也故詳書于䇿斥言桓宫以惡去聲莊為後鍳也王氏曰楹以黝堊桷以斫礱皆天子之制丹楹刻桷則僣侈甚矣魯用天子禮樂而莊公又過之以夸示仇女聖人備書而惡自見矣家氏曰鳥獸知有母而不知有父人知有父而復泝其父之從出而知有祖焉有曽祖焉有髙祖焉又泝其曾髙之所從出而有始祖焉皆為之廟以祀之聖人因為之制宗廟祀享之禮自天子至公侯卿大夫士隆殺有等然後盡於禮不以踰禮為榮也不以僭禮為孝也今莊公忘父之仇徇母之欲娶仇女為夫人知有母而不知有父既又丹桓宫之楹而刻其捅以蓋其無父之耻不思廟有常制獨於桓宫而丹楹刻桷是悖禮也以悖禮施之親廟不足以榮其親適足以悖其祖知有母而不知有父無父也隆於其父而薄於其祖無祖也無父無祖禽獸之道也春秋書丹桓宫楹刻桓宫桷以見五廟並列而桓廟獨踰制而盛飾深著莊公之罪也永嘉吕氏曰或謂成三年新宫災親廟切近不忍稱故稱新宫桓宫乃親廟切近也不言新宫以惡莊也是不然宣宫神主未入廟而遇灾故書新宫若桓宫則固已久矣宜其不稱新宫也葬曹莊公王氏箋義世子羈嗣立既葬為戎所逐夏公如齊逆女秋公至自齊榖梁傳迎者行見諸舍見諸先至非正也榖梁子曰親迎魚敬反下同常事也穀梁本作恆事文定避宋諱不志此其志何也不正其親迎於齊也陳氏曰親逆女不書唯莊公特書之則以娶齊女也或曰常事不志歲事之常也親迎可以常乎則其說誤矣所謂常者其事非一有月事之常則視朔是也有時事之常則搜狩是也有歲事之常則郊祀雩祭之類是也有合禮之常則婚姻納幣逆女至歸之類是也凡此類合禮之常則不志矣其志則於禮不合將以為戒者也啖氏曰凡婚姻合禮者皆不書如魯往他國親迎皆常事不書他國來亦如之凡書者皆譏也趙氏曰凡男女之禮人倫之本也風教之始也是以先王敬之故紀其闕耳若夫崩薨卒葬即位之類不以禮之合否而皆書此人道始終之大變也其於親迎異矣臨川吳氏曰親迎常事不書公納幣越三年而後得親迎以非常而書故致之以示譏也張氏曰王哀讀蓼莪之詩而哀痛終其身莊公思妃偶之合兩年之間三至齊廷而念不及其父春秋所以詳書而誅其心也歟愚按魯十二公娶夫人惟莊公書納幣則譏其親納幣而娶仇女也文公書納幣則譏其喪未畢而圖昏也桓文宣成書逆皆譏不親迎莊公親迎於讎國則亦譏也僖公之納幣逆女合禮則不書矣陸氏曰公羊曰親迎禮也按合禮則常事不書故知榖梁譏逆於齊是也蜀杜氏曰公羊杜元凱皆以為禮不明春秋常事不書之㫖耳八月丁丑夫人姜氏入左傳秋哀姜至榖梁傳入者內弗受也日入惡入者也何用不受也以宗廟弗受也其以宗廟弗受何也娶仇人子弟以薦舍於前其義不可受也何以不致愚按據文姜穆姜齊姜皆書至不可見音現乎宗廟也劉氏曰言入非致廟之文也姜氏齊襄公之女范氏曰讎女臨川吳氏曰若以為齊僖女則僖卒巳二十八年豈有未嫁之女且未應娶母妹為夫人若以為齊桓女則計齊桓之年蓋下於魯莊應未有可嫁之女可壻魯莊也其齊襄之遺女耳入者不順之詞以宗廟為弗受也昏義以正始為先而公不與夫人皆至姜氏不從公而入公以七月至而姜氏八月乃入已失夫婦之正弒閔孫音遜邾之亂兆矣孫氏曰公親迎于齊不俟夫人而至失夫之道也婦人從夫者也夫人不從公而入失婦之道也夫不夫婦不婦何以為國不亂何待故曰入以惡之臨川吳氏曰凡卿為君逆夫人本非禮也猶且以夫人同至公親往逆而不與同至失禮甚矣莊公不勝音升其母越禮踰時俟仇人之女薦舍於宗廟范氏曰薦進舍置也以成好去聲合卒使宗嗣不立弒逆相仍幾至亡國故春秋詳書其事以著莊公不孝之罪為後戒也陸氏曰夫人至書月以娶仇女之故特變文書入而又書日張氏曰妻者齊也書八月丁丑入見後公而至之日多也陳氏曰制於其母必俟齊女而後娶齊人重要之為之親納幣而觀社遇榖盟扈一歲而三見于齊丹楹刻桷以飾夫人夫人猶踰時然後入是故書逆書至而後書入夫人未有書入者入逆辭也書逆以病莊公書入以惡哀姜也亦以譏齊桓也春秋之書夫人未有詳於此者也家氏曰不書至或謂其娶仇女不敢以見于廟彼丹楹刻桷崇奢麗以夸示之何以能知愧而不使見于廟乎榖梁所謂宗廟有弗受焉耳髙氏曰夫婦人倫之本所以成孝敬也孝敬備然後夫人之職舉桓公見殺於齊而莊公乃以齊女為夫人欲責其孝則彼嘗賊我臣子之所疾也欲責其敬則我方讎彼鬼神之所棄也是不可以奉祭祀不可以當夫人之職矣啖氏曰公羊云其言入何難也以義不當入故言入爾有何難乎戊寅大夫宗婦覿用幣左傳公使宗婦覿用幣非禮也御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗修以告䖍也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎公羊傳宗婦大夫之妻也覿者何見也用者不宜用也見用幣非禮也然則曷用棗栗云乎腵修云乎榖梁傳覿見也不言及不正其行婦道故列數之也男子之贄羔鴈雉腒婦人之贄棗栗腵修用幣非禮也用者不宜用者也大夫國體也而行婦道惡之故謹而日之也禮夫人至大夫郊迎去聲明日執贄音致以見音現下同何氏曰日者禮夫人至大夫郊迎明日大夫宗婦皆見故著其明日也杜氏曰禮小君至大夫執贄以見明臣子之道宗婦大夫之妻也杜氏曰宗婦同宗大夫之婦左傳襄二齊使諸姜宗婦來送葬髙氏曰特牲饋食則宗婦統於主婦此曰宗婦則凡宗族之婦蓋主婦在其中矣公事曰見私事曰覿徒歷反聘禮私覿朱子曰以私禮見也見夫人禮也曷為以私言之夫人不可見乎宗廟則不可以臨羣臣故以私言之也覿用幣何以書男贄大者玉帛小者禽鳥以章物也杜氏曰公侯伯子男執玉諸侯世子附庸孤卿執帛卿執羔大夫執鴈士執雉章所執之物别貴賤女贄不過榛側巾反栗棗修以告䖍也曲禮婦人之贄椇榛脯修棗栗杜氏曰取其名以示敬何氏曰婦人見舅姑以棗栗見女姑以腵修為贄見夫人至尊兼而用之棗栗取其棗自謹敬腵修取其斷斷自修今男女同贄是無别筆列反也杜氏曰莊公欲奢夸夫人故使大夫宗婦同贄俱見通㫖大夫宗婦覿譏同見也故不稱及用幣譏同贄故特書用若大夫不覿只書宗婦覿足矣以丹楹刻桷等事考之其使大夫覿宜有之矣張氏曰夫人至大夫見於宗廟婦見於內禮也並覿同贄是失男女之别公子牙慶父之亂兆矣春秋詳書正始之道也薛氏曰莊公婚禮書之詳者志大惡也桓公惟不謹于文姜之際身殺而莊公為纍不懲其事則又甚焉納讎人之女以供祭祀懼無以恱乎夫人丹楹刻桷于桓之廟又使大夫宗婦覿而用幣往往加乎先王之禮而重之以奢僣其所欲厚于夫人者無所不至夫婦之際先王正始之道豈有始不正而終克正者乎臨川吳氏曰楚懷王客死于秦其子頃襄王迎婦于秦司馬氏痛之曰忍其父而昏其讎彼父但為秦所拘留而已未嘗被殺也司馬氏猶痛之况魯莊之父為齊所殺而又娶其女則忍父昏讎之罪奚啻數十倍於楚頃襄也哉方且飾桓宫用覿幣以夸富盛於齊女莊之庸愚一至此極異日淫縱弒逆之禍殆勢之所必至也愚按男女有别人倫之本也莊公以大夫宗婦同贄俱覿而致哀姜通共仲弒嗣君之禍唐髙宗以百官命婦同宴於麟德殿而致武后淫毒遂移唐祚嫌疑之際可不慎夫春秋書娶夫人惟哀姜最詳自盟防納幣于始至宗婦覿用幣于終見於經書其事十有四以其禮之非常故辭繁而不殺也劉氏曰榖梁謂禮大夫不見夫人非也君祭於廟大夫夫人俱在其中可得勿見乎殆不常見耳今夫人始至而大夫見之是禮然矣何謂非禮乎大水何氏曰隂盛所致愚按莊公娶仇女又奢僣以夸示之故有隂沴之應唐髙宗立太宗才人武氏為昭儀而萬年宫夜大雨水幾溺其身天人相感之際焉可誣也冬戎侵曹曹羈出奔陳赤歸于曹杜預謂羈蓋曹世子也曹伯已葬猶不稱爵者以微弱不能君故為戎所逐爾杜氏曰微弱不能自定臨川吳氏曰上年十一月曹莊公卒今年三月葬則羈以世子嗣位葬其先君至是冬在位期年矣為戎所逐而出赤者曹之庶公子杜氏曰赤曹僖公也賈逵曰赤戎之外孫歸易去聲詞也為戎所納故易宋人執鄭祭側界反仲而忽出突歸權在宋也戎侵曹而羈出赤歸制在戎也使鄭忽曹羈明而能斷丁亂反雖有宋戎之衆突赤之孽何緣而起以國儲君副不能自定其位於誰責而可故雖以國氏皆不書爵為居正者之戒趙氏曰羈未踰年之君出奔不書爵言不能嗣先君也陳氏曰君在喪稱子其曰曹羈不能為子也侵淺事也以千乘之國不能守不可以言子矣然奔君未有言故者言故猶愈於自奔也劉氏曰突因宋赤因戎皆奪其君然而春秋一貶之無上下之異春秋治治不治亂也使鄭忽曹羈事親而孝為上而禮在喪而哀臨事而恭大夫順之國人信之雖有宋戎之衆突赤之孽何緣而起然而君臣交爭兄弟為仇者上有失故下得也薛氏曰羈者曹之嗣赤者子之非正者戎間曹之兄弟爭國侵其疆埸而羈奔赤反亦曹羈無立之罪也張氏曰羈係於曹與鄭忽同明其正也赤不係國庶孽也赤以庶逐嫡戎以裔謀夏天子方伯不能正髙氏曰戎而敢専制諸夏廢置人君亦以病齊桓也愚按突歸于鄭鄭忽出奔衛莒去疾入于莒莒展輿出奔吳與此書法相似皆一君出而一君歸也然去疾以國氏而突赤不氏國去疾正而突赤不正也忽展輿皆以突去疾入而後出今羈聞赤入而先奔則弱不能立又甚矣陸氏曰曹羈者義同鄭忽公羊云是曹大夫非也劉氏曰公羊云曹無大夫非也曹伯伯也鄭伯亦伯也若以小國無大夫鄭亦宜無大夫豈獨曹哉似見曹之大夫著於經者少耳陳氏嶽曰戎既侵曹而羈出奔是曹懼戎而出其君明矣羈既出赤乃入是戎出羈而納赤亦明矣詎可謂羈大夫歟郭公公羊傳郭公者何失地之君也杜氏曰蓋經闕誤此郭公也義不可曉而先儒或以為郭亡者劉氏曰郭亡亡國之亡也郭之所以亡者與他國異他國之亡者所善不善所惡不惡也於𫝊管子有之齊桓公之郭問父老曰郭何故亡曰以其善去聲下同善而惡去聲下同惡也公曰若子之言乃賢君也何至於亡父老曰郭君善善不能用惡惡不能去上聲下同所以亡也考其時與事謂之郭亡理或然也夫善善而不能用則無貴於知其善惡惡而不能去則無貴於知其惡並本意林未之或知者猶有所覬音冀也夫既或知之矣不能行其所知不能用之蔽至於怨不能去之蔽至於亂君子所以髙舉逺引小人所以肆行而無忌憚也家語尊賢而不能用賤不肖而不能去雖欲無亡豈可得乎然則非有能亡郭者郭自亡爾通㫖天行健君子以自强不息未有不勤而能存者詩云有朝廷不能灑掃四鄰謀取其國家而不知諸葛孔明稱海岱之間論安言計動引聖人今歲不戰明年不征自取滅亡者不可勝數汲汲以興復為事恐蜀之坐亡也趙氏曰公榖皆云赤者蓋郭公也按郭公自是闕文赤者曹公子也文義都不相關傳誤甚矣劉氏曰榖梁謂赤者郭公之名然春秋不曰郭公赤歸于曹豈顛倒迷錯如此哉梁亡鄭棄其師紀侯大去其國雖㫖意卓佹然文義自明未有改易首尾如此者也愚按說文亡字從人從隱與公字相似故傳誤壬惠王子八年二十有五年齊桓十七晉獻八衛惠三十一卒蔡穆六鄭文四曹僖二陳宣二十四杞惠四宋桓十三秦宣七楚成三春陳侯使女叔來聘女音汝此諸侯交聘之始左傳始結陳好也榖梁傳其不名天子之命大夫也杜氏曰女氏叔字季友相魯原仲相陳二人有舊故女叔來聘季友冬亦報聘髙郵孫氏曰諸侯之大夫天子賜之邑使之歸國則書氏書字鄭祭仲魯單伯陳女叔是也陳氏曰前乎此非王室若姻鄰無聘者矣於是交聘自女叔之後諸侯之㑹數而朝聘皆之乎盟主矣啖氏曰左氏云嘉之故不名按聘者常事爾有何可嘉故知榖梁云天子之命大夫是也愚按齊晉大國無命大夫蓋强大而専命耳夏五月癸丑衛侯朔卒惠公也在位三十一年子赤嗣是為懿公何氏曰朔犯逆天子命故去葬愚按朔之入國魯莊與有力焉未必不㑹其葬所謂治其罪而不葬者也六月辛未朔日有食之鼓用牲于社左文十五年傳非禮也日有食之天子不舉伐鼓于社諸侯用幣于社伐鼓于朝榖梁傳言日言朔食正朔也鼓禮也用牲非禮也天子救日置五麾陳五兵五鼓諸侯置三麾陳三鼓三兵大夫擊門士擊柝言充其陽也杜氏曰鼓伐鼓也用牲以祭社按禮諸侯旅見音現天子入門不得終禮者四而日食與音預焉曽子問諸侯旅見天子入門不得終禮廢者幾孔子曰四太廟火日食后之喪與霑服失容則廢如諸侯皆在而日食則從天子救日古者固以是為大變人君所當恐懼修省以答天意而不敢忽也故夏書曰𦙍征乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走蔡氏傳集輯通用言日月㑹次不相和輯而掩蝕於房宿也日蝕之變天子恐懼於上嗇夫庶人奔走于下周官鼓人救日月則詔王鼓注救日月食王必親擊鼓大音泰僕凡軍旅田役贊王鼓救日月亦如之注贊佐擊其餘面范氏曰鼓有聲舉陽事以壓隂氣諸侯用幣于社伐鼓于朝退而自責杜氏曰諸侯用幣于社伐鼓于朝退而自責以明隂不宜侵陽臣不宜掩君以示大義皆恐懼修省以答天意而不敢忽也然則鼓用牲于社何以書譏不鼓于朝而鼓于社又用牲則非禮矣永嘉吕氏曰天子伐鼓于社社隂之神也日食則隂勝陽也天子尊故責神諸侯卑自責而已諸侯鼓于社非正也復用牲非禮也牲者祭祀之事牛必在滌三月三月之後方成牲日食而用牲取具於臨時耳張氏曰日食隂盛陽微之徵事闋天下固不止為一魯而諸侯亦有臣民則因天變以自省如洪範五事敬謹於視聽言動思之間一失其正則咎必應之古人應天以實而不以文故髙宗肜日洪範之言乃古人之所先務如𦙍征周禮所載乃禮文之末耳一時遭變禮文固不可廢然正其本而後末可理也今莊公於充陽之本蓋藐然矣鼓何益乎又用牲而欲以物求免書此以見本末之皆失也孫氏曰凡救日食皆鼓不書者常事也鼓于社而用牲者三變常也變常故書愚按莊公之世日食者四而鼓用牲者三大水者三而鼓用牲者一鼓於所不當鼓則踰制用其所不冝用則非常僣天子之制失諸侯之常以是而答天變其過不既甚乎魏明帝太和初太史奏日當食請於靈星祈禳帝詔曰天之於人猶父之於子未有父欲責子而可獻饌求免也今具祈禳於古未聞羣臣其勉修厥職輔朕不逮其賢於魯莊逺矣臨川吳氏曰社者祭地示也其祭有常禮其日有常日其事為常事故皆不書經所書社凡四非為社書也以遭日食大水之變而乃用牲于社為非禮故書爾趙氏曰郊禘天子之禮社與嘗諸侯所自有祭統云成王賜魯重祭郊社禘嘗蓋撰禮者見春秋書嘗社以為郊禘同遂妄言耳公羊云鼓用牲于社求乎隂之道凡此皆失禮乃書若言求隂之道乃為得禮又云以朱絲營社據書禮無此文劉氏曰左氏云非常也唯正月之朔慝未作於是用幣于社伐鼓于朝非也夏書記季秋月朔亦有伐鼓之事豈必正陽之月哉所以書者譏其不鼓于廟朝乃鼓于社又用牲耳伯姬歸于杞榖梁傳其不言逆逆之道微無足道焉爾其不言逆何也逆者非卿其名姓不登於史䇿則書歸以志禮之失也孫氏曰逆者非大夫故不言逆大夫來逆名姓已登於史䇿足以志其失矣猶書歸者以别筆列反於大夫之自逆者也猶書歸者紀伯姬是也杞叔姬郯伯姬不書歸自逆者莒慶齊髙固是也僖二十五年蕩伯姬姑自逆杜氏曰伯姬莊公女愚按或以為桓公女謂時君之女則加子字然莊二十七年書叔姬若皆桓公之女則伯姫蓋三十餘矣未應二女皆失時若是且伯姬以僖三十一年求婦則年踰七十而猶至魯似未可必其為桓女也秋大水鼓用牲于社于門左傳凡天災有幣無牲非日月之眚不鼓榖梁傳髙下有水災曰大水既戒鼓而駭衆用牲可以已矣救日以鼓兵救水以鼓衆杜氏曰門國門也張氏曰比年大水隂盛陽微之變極矣莊公若思先王正厥事之意謹內外之防嚴夫婦之别使隂沴無浸長之漸則後日之禍猶可及止也徇其文而無實徒以牲牷求免不恐懼修省以正其本而禮文亦且繆戾此魯之所以亂也髙氏曰古人遇水旱雖有雩禜祈禳之禮然靡神不舉靡愛斯牲宣王必以側身修行為之本况于社于門非所以致水災者也自古豈有伐鼓用牲救水災之禮乎陸氏曰按左氏例近劉氏曰公羊云于社禮也于門非禮也非也若于社為得禮春秋亦當不書矣冬公子友如陳此內臣出聘之始杜氏曰報女叔之聘諸魯出朝聘皆書如友莊公之母弟愚按此季友私行之階也啖氏曰凡公及內卿往他國朝聘皆書曰如趙氏曰凡內朝聘稱如以異外也王氏曰春秋書內臣出聘凡六十有一如京師者五著諸侯之慢王室也如齊者十九如晉者二十五如宋者五如楚者一著諸侯之畏大國也如陳者二如衛如邾如莒如牟者各一著諸侯之交相聘也內臣以事出者凡十九納幣逆女者三致女者一涖盟者四㑹葬者十乞師者一比事以考之而是非善惡著矣癸惠王丑九年二十有六年齊桓十八晉獻九衛懿公赤元年蔡穆十鄭文五曹僖三陳宣二十五杞惠五宋桓十四秦宣八楚成四春公伐戎公無春字張氏曰為追于濟西之耻報怨也襄陵許氏曰隱桓世有戎盟至於莊公戎姑變渝是以有濟西之役於此伐戎義已勝矣齊魯伐戎而中國崇也夏公至自伐戎蜀杜氏曰伐戎無譏其致者公出師於外踰時而返故書至以危之曹殺其大夫此専殺大夫之始稱國以殺者國君大夫與音預下同謀其事不請於天子而擅殺之也義繫於殺則止書其官曹殺其大夫宋人殺其大夫文七是也杜氏曰不稱名非其罪啖氏曰但稱大夫者無罪而死也劉氏曰稱國以殺而不名者大夫無罪而君殺之也陳氏曰殺大夫不名惡君也赤篡曹而殺大夫則必不義其君者也義繫於人則兼書其名氏楚殺其大夫得臣僖二十八陳殺其大夫泄息列反冶宣九之類也愚按楚成少與之師而棄其將陳靈昏淫而殺諫臣二君固有罪矣然得臣剛而無禮泄冶盡言不隱其過雖有重輕而皆有致殺之由故兼書其名氏然殺大夫而曰大夫與謀其事何也與謀其事者用事之大夫也如公孫寧儀行父用事於陳而與謀殺泄冶之類見殺者不得於君之大夫也所謂儀繫於殺者罪在於専殺而見殺者之是非有不足紀也故止書其官而不録其名氏也古者諸侯之卿大夫士命于天子而諸侯不敢専命也周禮典命公之孤四命其卿三命大夫再命士一命侯伯之卿大夫士亦如之子男之卿再命大夫一命其有罪則請于天子而諸侯不敢専殺也同上大司冦凡諸侯之獄訟以邦典定之凡卿大夫之獄訟以邦法斷之及春秋時國無大小卿大夫士皆専命之而不以告于王朝有罪無罪皆専殺之而不以歸於司寇無王甚矣五伯三王之罪人而葵丘之㑹猶曰無専殺大夫愚按齊桓晉文晉悼皆無専殺大夫之過視當時諸侯可謂彼善於此矣故春秋明書于䇿備天子之禁也凡諸侯之大夫方其交政中華㑹盟征伐雖齊晉上卿止録其名氏至於見殺雖曹莒小國亦書其官莒殺意恢稱公子或抑或揚或奪或豫上聲聖人之大用也明此然後可以司賞罰之權矣張氏曰曹殺大夫曹伯赤殺之也豈於羈赤出入之際或不附戎而殺之若鄭厲殺傅瑕原繁與髙氏曰除羈之黨恐其內應也入春秋來未有專殺大夫者而曹以小國首惡故春秋不顯其名氏唯著其擅命專殺之罪為萬世之大戒凡殺大夫稱國者疚在上也稱人者亂在下也其書名氏者或以其有罪足為世戒或無罪而昭其節或矜其不幸也劉氏曰公羊云不名衆也然則殺三郤何故名乎又云不死于曹君者也宋殺其大夫又何以辨哉榖梁云大夫而不稱名姓無命大夫也非也諸侯大國三卿皆命于天子次國三卿二卿命于天子小國三卿一卿命于天子說者不知王者諸侯之制度班爵云爾秋公㑹宋人齊人伐徐杜氏曰徐國在下邳􅥧縣張氏曰嬴姓國近齊魯今泗州臨淮縣愚按臨淮縣徐舊國後北遷在今汴梁路徐州按書伯禽嘗征徐戎見費誓則戎在徐州之域為魯患舊矣臨川吳氏曰穆王之時徐僣稱王帥九夷以伐宗周徐國雖小但春秋之前已嘗僣王竊號是年春公伐戎秋又伐徐者必戎與徐合兵表裏為魯國之患也故雖齊宋將去聲卑師少而公獨親行其不致者役不淹時而齊人同㑹則無危殆之憂矣杜氏曰宋主兵故序齊上十五年𫝊桓師何以序宋下猶未成乎伯也二十七年同盟于幽天下與之然後成乎伯矣愚按宋先於齊而公書㑹則宋主兵明矣蓋桓公伯業未盛亦若伐郳伐鄭之先宋也明年盟幽於是而後授之諸侯則齊桓伯業盛矣故二十八年救鄭宋序齊下冬十有二月癸亥朔日有食之甲惠王寅十年二十有七年齊桓十九晉獻十衛懿二蔡穆八鄭文六曹僖四陳宣二十六杞惠六宋桓十五秦宣九楚成五春公㑹杞伯姬于洮徒刀反杜氏曰魯地張氏曰洮溝在濟州今濟南府左氏曰㑹于洮非事也天子非展義不巡守手炙反杜氏曰巡守所以宣布德義諸侯非民事不舉卿非君命不越境伯姬莊公之女非事而特㑹于洮愛其女之過而不能節之以禮此春秋之所禁也陸氏曰參譏之公及杞侯伯姬皆失正也惟不節之以禮然後有使自擇配如僖公之於季姬而典訓亡矣家氏曰于洮非歸寧之地安有女子來寧父母疾驅於通道大都略無所禁忌者乎髙氏曰伯姬既歸于祀復來與公㑹是與文姜齊襄無異也陳氏曰內女為夫人七見于經未有書公㑹者而㑹自伯姬始由是來朝其子由是來求婦伯姬之為皆未之前聞也愚按公㑹杞伯姬于洮猶之可也季姬及鄫子遇于防則惡又甚矣婦人㑹遇固皆非禮而其罪有輕重焉夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽左傳陳鄭服也穀梁傳同者有同也同尊周也於是而後授之諸侯也其授之諸侯何也齊侯得衆也桓㑹不致安之也桓盟不日信之也信其信仁其仁衣裳之㑹十有一未嘗有歃血之盟也信厚也兵車之㑹四未嘗有大戰也愛民也程子傳同志而盟非率之也同盟之例有惡烏路反其反覆音福而書同盟有諸侯同欲而書同盟此盟鄭伯之所欲而書同盟者也凡盟皆小國受命於大國不得已而從焉者也如鄫子㑹盟于邾之類其有小國願與音預下同之盟非出於勉强上聲者則書同盟所以志同欲也前此鄭伯嘗二於齊矣杜氏曰二十五年鄭文公四年為齊侵蔡獲成於楚二十二年陳亂而齊納敬仲皆有二心於齊今始服也至是齊桓强盛有伯中國攘僭亂之勢諸侯皆歸之鄭伯於是焉有畏服之心其得與於盟所欲也故特書同榖梁子所謂於是而後授之諸侯是也其授之諸侯齊侯得衆也視他盟為愈矣蜀杜氏曰諸侯同志而盟共戴天子齊桓主之家氏曰或謂前此㑹者九國而書同盟宜也今㑹者才五國而亦書同盟何哉大齊桓合諸侯不以兵革小大畢至而聖人與其同盟不然異時有合十有八國之君以甲車四十乘夸示諸侯而伯業遂衰者烏在其為衆也愚按齊桓前盟于幽而鄭復不朝至於執詹魯又受鄭詹之逃則既同而及覆矣此盟于幽魯與盟而書公陳鄭心服而不叛同以尊周為心不復携二蓋齊桓霸業之始盛也故春秋書同盟以美之秋公子友如陳葬原仲左傳非禮也原仲季友之舊也公羊傳原仲者何陳大夫也大夫不書葬此何以書通乎季子之私行也杜氏曰原氏仲字禮大夫既卒不名公子友如陳葬原仲私行也啖氏曰書原仲之葬見季友私事出境人臣之禮無私交大夫非君命不越境注見隱元何以通季子之私行而無貶乎曰春秋端本之書也京師諸夏之表也祭側界反下同伯以寰音縣內諸侯而來朝隱元祭叔以王朝大夫而來聘莊二十三尹氏以天子三公來告其喪隱三誣上行私表不正矣是故季子違王制委國事越境而㑹葬杜氏曰季友違禮㑹外大夫葬具見其事亦所以知譏齊髙固莒慶以大夫即魯而圖婚宣五莊二十七其後陳莊子死赴喪於魯魯人欲勿哭繆公召縣音𤣥子而問焉曰古者大夫束修之問不出境雖欲哭焉音煙下同得而哭諸見檀弓鄭氏注以其不外交今之大夫交政於中國雖欲勿哭焉得而勿哭同上注時君弱臣强政在大夫専盟㑹以交接愚按陳莊子齊大夫名白乃成子恆之孫襄子盤之子莊子之子和并齊國是為太公末流可知矣春秋深貶王臣以明始亂祭伯不書朝祭叔不稱使尹氏不書爵備書諸國大夫而無譏焉則以著其效也凡此皆正其本之意陸氏曰臣無境外之交况以私事而出境乎此不待貶絶而惡見者也蜀杜氏曰外大夫未有書葬者原仲所以書者季子與原仲有舊已為大夫不由君命而以私舊之故特往葬之大夫非君命不越境况適他國而葬大夫乎髙氏曰公子遂如晉葬晉襄公叔弓如宋葬宋共公皆再舉國此不言葬陳原仲明非國事也臨川吳氏曰無㑹葬鄰國大夫之禮季友與原仲有舊欲往㑹其葬以大夫不可私行出境請於公而公命之行故書大夫無私交公之遣行友之㑹葬原氏之受皆非禮也參譏之愚按僖五年公孫兹如牟娶焉文六年季孫行父如陳聘且娶文七年公孫敖如莒涖盟且逆女成入年公孫嬰齊如莒自為逆昭二十五年叔孫婼如宋為季平子逆經皆不書逆此書如陳葬原仲無異於葬諸侯之使是季友請於公矣文定但言私行而不云莊公使之者以其非禮雖請於公是亦私行耳按曲禮大夫私行出疆必請反必有獻此盛世之事春秋大夫私行而遂交政於他國聖人特書公子友葬原仲以示戒者防微杜漸之意也陸氏曰榖梁云言葬不言卒不葬者也不葬而曰葬諱出奔也按春秋前後無有虛設其事以為義者且書葬之意直譏季友之行爾陳國大夫安得書卒乎劉氏曰公羊云何通乎季子之私行避內難也非也是時內難未作何避之有若季子見幾逺舉是忘宗國之亂也况去莊公沒尚數年而遂云避內難出奔乎冬杞伯姬來左傳歸寧也凡諸侯之女歸寧曰來出曰來歸夫人歸寧曰如某出曰歸于某公羊傳直來曰來大歸曰來歸左氏曰歸寧也禮父母在歲一歸寧本何氏注若歸而合禮則常事不書其曰杞伯姬來者不當來也趙氏曰凡內女稱來不宜來也合禮者常事不書蓋非禮而來故書爾豈二百四十二年內女唯兩度歸寧乎女子有行逺于萬反父母兄弟邶風泉水篇春㑹于洮矣冬又歸魯故知其不當來也來而必書春秋於男女往來之際嚴矣髙氏曰伯姬春方出與公㑹而冬又來何其不安于杞也杞伯不能制其妻如其國何張氏曰志其來往之數非歲一歸寧之義所以厚男女之别也愚按春秋內女之適諸侯惟杞伯姬四書來一書㑹則伯姬之越禮可知矣伯姬之後惟書齊髙固及子叔姬來亦非禮也莒慶來逆叔姬公羊傳莒慶莒大夫也莒無大夫何以書譏大夫越竟逆女非禮也穀梁傳諸侯之嫁子於大夫主大夫以與之來者接內也莒慶莒大夫也叔姬莊公女也何以稱字大夫自逆則稱字杜氏曰卿自為逆則稱字左宣五年𫝊書曰逆叔姬卿自逆也為去聲其君逆則稱女如紀裂繻來逆女尊卑之别筆列反也范氏曰君不敵臣陳氏嶽曰內女適大夫則稱字不書歸如齊髙固來逆叔姬不書歸于齊何以書諸侯嫁女於大夫而公自主之非禮也董子曰大夫無束修之餽無諸侯之交越竟逆女紀罪之劉氏曰莒慶非有君命也叔姬非適諸侯也何以得書乎以公之自主之公之自主之則敵敵則書矣陳氏曰諸侯嫁女乎大夫必使大夫同姓者主之曷為公親焉則莒慶伉也莒無大夫於是書莒慶隱桓莊之際莒嘗為強國入向取杞牟婁納公子慶父吾君特㑹外大夫自浮來之盟始以是知慶之敢伉也愚按宣公以篡得國倚齊為援而齊人止公為髙固求婚魯人以為大辱莒慶微國之大夫而莊公以女妻之又自為之主其不君亦甚矣劉氏曰榖梁云不正其接內故不與夫婦之稱也非也不曰逆女亂於君夫人者也書叔姬自其理然杞伯來朝髙氏曰致伯姬也杞伯不能制其內縱伯姬之數出又來朝而致之其卑弱可知矣何氏本㫖杞先代子孫也方東樓公始封與微子啓無異得郊祭用天子禮樂入春秋已失公爵降而曰侯後或稱伯或稱子都無定限足知其微弱僻陋張氏曰杞國小力微故降爵以自儕於小國杞之自侯而伯自伯而子蓋浸以微弱也愚按桓公之經三書杞侯公榖皆作紀此書杞伯以後並書伯惟僖二十三年書杞子卒二十七年書杞子來朝襄二十九年書杞子來盟文定據左𫝊謂杞用夷禮故貶稱子朱子又謂杞國最小所以文獻不足徴初稱侯已而稱伯已而稱子蓋其朝覲貢賦之屬率以子男之禮從事聖人因其實而書之然春秋未嘗書杞公亦不可考姑闕疑以俟知者公㑹齊侯于城濮杜氏曰城濮衛地將討衛也張氏曰齊欲討衛而㑹魯于此定其交而後加兵於人所以見其謀之審也愚按相㑹于衛地而後伐衛則為謀伐衛明矣然魯兵不與伐衛者亦猶魯濟謀伐戎而魯不與伐戎也城濮今東昌路濮州乙惠王十卯一年二十有八年齊桓二十晉獻十一衛懿三蔡穆九鄭文七曹僖五陳宣二十七杞惠七宋桓十六秦宣十楚成六春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績左傳齊侯伐衛戰敗衛師數之以王命取賂而還公羊傳伐不日此何以日至之日也戰不言伐此其言伐何至之日也春秋紀兵及者為主齊人舉兵而伐衛衛人見伐而受兵則其以衛及之何也按左氏衛嘗伐周立子頽十九年至是王使召音邵伯廖力雕反賜齊侯命且請伐衛在前年則齊人舉兵乃奉王命聲衛立子頽之罪以討之也為衛計者誠有是罪則當請歸司寇服刑可也周禮大司寇刑亂國用重典注篡弒叛逆之國用重典者以其化惡伐滅之若惠徼康叔不泯其社禝使得自新亦唯命左傳宣十二鄭伯曰其翦以賜諸侯使臣妾之亦唯命若惠顧前好徼福於厲宣桓武不泯其社禝使改事君君之惠也則可以免矣今不徵知陵反詞請罪左傳隱十一不徴辭不察有罪而上逆王命下拒方伯之師直與交戰則是衛人為志乎此戰故以衛主之也戰不言伐伐不言日而書日者戰之日也見音現下同齊人奉辭伐罪方以是日至而衛人不請其故直以是日與之戰所以深疾之也而聖人之情見矣齊稱人將去聲卑師少也五峯胡氏曰春秋之時天下無號令甚矣衛惠既死王命討之雖為後時然猶勝終不討也齊桓承王命而不動大衆亦得輕重之宜矣為衛侯者即日因齊桓之京師請歸死於司寇以忠孝蓋前人之愆可也齊師以是日至直以是日與之戰甚矣故義繫於衛而非繫於齊也趙氏曰敗稱人罪衛之不服王命故異其文髙氏曰初衛興兵助子頽篡王而齊為霸主不能奔救及鄭伯既納王王乃錫齊侯命使討之於是乎伐衛曰伐者討得其罪也然既敗衛乃取賂而還嗟夫齊桓以能尊王室霸諸侯而所為乃若是張氏曰衛嘗受盟于幽前年同盟不至伐不服罪乃以齊來伐之日而急擊之不能敵齊節制之師而敗以衛為主罪之也不地於衛都也臨川吳氏曰前年冬齊侯出㑹魯于衛地矣今年伐衛稱人者蓋齊師待于城濮但遣微者往伐意欲以不戰屈之也而衛不服罪敢與齊戰輕躁寡謀不量其力自取敗衄也王氏曰戰不言伐而書伐伐不言日而書日被伐不言及而書及敗績不言人而書人皆罪衛也愚按衛立子頽其罪固不容誅然已越十年而衛君又易世矣當其時不能治後之人何罪且受賂而不能伸天討雖曰齊以將卑師少稱人非貶而比事觀之齊桓亦不可以無責矣又按經書及戰者二十文定於此戰與紀齊之戰于韓于甗升陘于泓城濮彭衙令狐于邲新築于鞍皆謂書及以貶之乾時鄢陵長岸雖貶主是戰者而不以及為貶于奚于鐵無𫝊唯於柏舉與吳子而不以及為褒若大棘則鄭伐宋而經不書伐是與于韓例同艾陵書伐書及則兩俱有罪也然及之為言不過為志乎是戰而非褒貶所係故救患之兵則為美辭而貪憤之兵皆為貶辭也善戰者服上刑而春秋無義戰故凡書戰皆譏而惟於排難解紛頗有取焉耳趙氏曰公羊云春秋伐者為客伐者為主注云伐人者為客見伐者為主夫文字本以記分别今同其文誰能了之又曰敗者稱師衛何以不稱師未得乎師也按經文成列而戰矣何名未得師乎榖梁云戰則是師也其曰人何微之按衛稱人者罪逆王拒大國以取敗微之有何義乎劉氏曰穀梁謂衛小齊大其以衛及之以其微之可以言及也亦非也衛欲戰則衛及齊齊欲戰則齊及衛不為國大小也又曰其稱人以敗何也不以師敗於人也亦非也設令齊將尊師衆而敗衛將卑師少而勝豈得不書師敗於人哉夏四月丁未邾子瑣卒瑣素果反瑣在位十二年子蘧蒢嗣是為文公秋荆伐鄭穀梁傳其曰荆州舉之也公㑹齊人宋人救鄭宋人下公有邾婁人穀梁傳善救鄭也程子傳齊桓伯主魯望國宋王者之後此救鄭制楚之始蓋天下大勢所在按左氏楚令尹子元公子元文王弟無故以車六百乘繩證反伐鄭入自純門鄭外郭門是陵弱暴寡之師也故以州舉狄之也孫氏曰來聘稱人此不稱人者以其創艾中國復外之也鄭人將奔桐丘杜氏曰許昌縣東北有桐丘城諸侯救之楚師夜遁是得救急恤鄰之義也故書救鄭善之也齊宋稱人將去聲卑師少桓公主兵恤同惡安中國之事見音現矣朱子語齊桓晉文所以有功於王室者蓋當時楚最强大時復加兵於鄭鄭則在王畿之內楚在春秋時他國皆不及其强向非桓文有以遏之則周室為其所并矣張氏曰是時楚文王卒成王幼子元伐鄭師出無名聞諸侯之救而遂遁愚按楚自十六年伐鄭至是又伐而中國救之三十二年齊宋又遇梁丘以謀之僖元年楚復伐鄭而諸侯㑹柳以圖之二年三年荆楚洊致侵伐於鄭齊桓於是大舉次陘之師以聲罪於楚自是荆蠻帖服矣然首止之盟鄭伯諉於撫女之命又懷二而逃歸明年諸侯伐鄭圍新城又明年齊人伐鄭而鄭伯乞盟請服矣自是鄭服中國終桓公之世桓公甫沒而鄭伯即朝于楚然則齊桓取威定霸之功豈可少哉孔子曰微管仲吾其被髮左祍矣實豫其却楚而救鄭也經書救者二十有三而齊桓居其五桓公視他伯者為愈矣冬築郿郿芒悲反公榖作微杜氏曰郿魯下邑王氏曰帝乙子封於微今東平夀張縣西北有微子鄉郿邑也凡用功大曰城小曰築鄱陽萬氏曰工役之多者書之以城工役之小者書之以築故館則書築莊元築王姬之館臺則書築見三十一年囿則書築成十八築鹿囿昭九築郎囿定十三築蛇淵囿郿邑而書築者創作邑也隱七年𫝊凡書築者創始也其志不視歲之豐凶而輕用民力於其所不必為也則非君人之心矣張氏曰冬雖用民力之時而下書大無麥禾則築郿之不時可知矣吕氏曰十二公興力役莫甚於莊公築館者一築邑者一築臺者三城邑者一新延廄者一比事以考之而莊公之罪著矣其不城一邑不築一囿愛民力而重農事者惟僖公耳啖氏曰榖梁云山林川澤之利所以與民共也虞之非正也此當施於築囿之下不宜濫在此劉氏曰左氏云邑曰築都曰城非也築者作邑耳邑與都相較無幾而殊築城之名則國亦當殊京師又當殊而通以成名之何耶大無麥禾麥熟於夏禾成在秋而書於冬者莊公惟宫室臺榭是崇是飾費用浸廣調徒弔反度不充有司㑹古外反周禮注歲計曰㑹計歲入之多寡虗實然後知倉廩之竭也故於歲杪而書曰大無麥禾杜氏曰書於冬者五穀畢入計食不足而後書愚按王制冡宰制國用必於歲之杪五榖皆入然後制國用故桓宣有年大有年皆書於冬大無者倉廪皆竭之詞也言大無見舉國皆無也古者三年耕餘一年之食九年耕餘三年之食今莊公享國二十八年當有九年之積子賜反而虛竭如此所謂寄生之君也本何氏意林民事古人所急食者飬民之本不敦其本而肆侈心何以為國故下書臧孫告糴以病公而戒來世為國之不知務也劉氏曰經無水旱之變忽無麥禾推驗事實由魯不務畜積日損月削以至於麥禾大盡而後覺之非今歲之事也是以不言水旱亦不言饑或云實秋水傷稼諱之不言或云土不稼穡二物不成或云不勸農事故無灾而餓皆失也愚按二穀不升謂之饑五穀不升為大饑今大無麥禾則黍稷秫稻二麥俱無蓋禾者穀之總名故凡穀字皆從禾是不止二榖不升而已然不書饑者以著人事之變而非天時之災也僖公之時大旱而𫝊言饑而不害宣襄書饑則由大水螽蝝之所致莊公無水旱螽螟之災而書大無麥禾所以著費出之無經蓄積之不素救荒之不預至於未如之何而乞糴於鄰國則莊公不君與國之無賢皆可見矣啖氏曰公羊云曷為先言築微而後言無麥禾諱以凶年造邑也按築微冬之初也無麥禾歲終諸榖皆入而無此二榖乃書依先後記事爾何闋諱乎榖梁云大者有顧之辭也按大者言其甚也稱有顧如何為義也臧孫辰告糴于齊公羊傳告糴者何請糴也君子之為國也必有三年之委一年不熟告糴譏也榖梁傳國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也一年不升告糴諸侯故舉臧孫辰以為私行也古者稅什一豐年補敗不外求而上下皆足也雖纍凶年民弗病也一年不艾而百姓饑君子非之不言如為內諱也杜氏曰臧孫辰魯大夫臧文仲劉敞曰不言如齊告糴而曰告糴于齊者言如齊則其辭緩告糴于齊則其情急所以譏大臣任國事治名而不治實之蔽也魯人恱其名而以急病讓夷平也為功君子責其實而以不能務農重榖節用愛人為罪本意林魯語魯饑臧文仲言於公曰國病矣盍以名器請糴于齊公曰誰使對曰國有饑饉卿出告糴古之制也辰也備卿請如齊公使往從者曰君不命而請之其為選事乎文仲曰賢者急病而讓夷居官當事不避難我不如齊非急病也在上不恤下居官而惰非事君也文仲以鬯主與玉磬如齊齊人歸其玉而與之糴張氏曰魯不遇齊桓則其民必至轉於溝壑矣趙氏曰譏臧孫為政無蓄也故以自行為文愚按經書王臣來求金則有求於我也書如楚乞師則有求於彼也今外傳紀如齊告糴而春秋變文書曰告糴于齊與歸粟于蔡同一書法所以著魯人請糴之急且沒公命以罪莊公之不君也然不書齊人歸粟于我者蓋春秋記約而志詳復書歸粟則辭費苟齊人不豫之糴必不書臧孫之告糴矣葵丘五禁曰毋遏糴齊桓救災恤患之心其亦霸者之賢歟趙氏曰左氏云禮也據諱是譏非善之也榖梁云諸侯無粟諸侯相歸粟正也告然後與之言內之無外交也此若不告彼何由知之丙惠王十辰二年二十有九年齊桓二十一晉獻十二衛懿四蔡穆十鄭文八曹僖六陳宣二十八把惠八宋桓十七秦宣十一楚成七春新延廄公羊傳修舊也修舊不書此何以書譏何譏爾凶年不修榖梁傳延廄法廄也其言新有故也言新者有故也杜氏曰言新者皆舊物不可用更造之辭何以書昔韓昭侯作髙門屈居勿反宜臼曰楚大夫時在魏不時所謂時者非時日也人固有利不利時前年秦拔宜陽今年旱君不以此時恤民之急而顧反也益奢此所謂時詘曲勿反舉贏者也見史韓世家徐廣日時衰耗而作奢侈故榖梁子曰古之君人者必時視民之所勤民勤於力則功築罕民勤於財則貢賦少民勤於食則百事廢矣大無麥禾告糴于齊冬築郿春新延廄以其用民力為已悉矣家氏曰延廄馬間之名或曰新其舊而又延廣之義周禮天子十二間諸侯六間孔氏正義每廄為一間間有二百一十六匹劉氏曰春秋二百四十二年所興作修舊多矣不必書也延廄南門蓋微耳何獨書哉新宫災太室屋壞不能不修而經不書雉門兩觀災記新作焉以此參之修舊不足書其書者皆非禮之制延廄者天子之廄非諸侯之廄也南門者天子之門非諸侯之門也延廄之僣非莊公也過在可革而不革故曰新通㫖書新延廄者為大無麥禾民勤於食則仍舊可也王氏曰飬馬欲其富故馬廄謂之延延長也猶庫藏欲其有餘而謂之長府也禮凶年歲不登馬不食穀馳道不修去冬大無麥禾而今春新延廄廄有肥馬民有饑色可謂不恤國矣孫氏曰惡不愛民也愚按興工作以聚失業之人亦荒政之一事也而春秋書築郿新延廄以譏莊公何哉夫國有儲蓄倉廩實府庫充則興工作以聚窮民使無轉徙之患亦云可也今大無麥禾倉廩虛竭乞糴於鄰邦以救朝夕之急而猶興不急之役何莊公之不知務乃至此極耶趙氏曰左傳云新作延廄若新作但當云作延廄不當云新啖氏曰又傳云書不時也凡馬日中而入此說亦非馬雖出入有時廄何妨農隙作之夏鄭人侵許張氏曰許鄭世讎也然許自盟幽之後不與齊桓之㑹鄭人侵之或齊之命與自後許始從中國秋有蜚蜚扶味反左傳為災也公羊傳記異也穀梁傳一有一亡曰有杜氏曰蜚負蠜也劉歆曰負蠜性不食穀食榖為災介蟲之孽劉向曰蜚色青非中國所有南越盛暑男女同川淫風所生為蟲臭惡公取齊淫女故蜚至天戒以為將生臭惡聞於四方也新安羅氏曰負蠜今謂之蜚盤蟲好以清旦集稻上食稻花田家率以蚤作掇拾置他所日出則散去既食稻花又其氣臭惡能熯稻使不蕃春秋書之當由此爾劉氏曰蜚狀若牛而白首一目虬尾行水則竭行草則死見則其國大疫曰有者所以明其無也鸜鵒不逾濟而蜚非中國之物暫而一至故不可言多而言有麋中國所有也有之不足異而多則為異故不言有而言多螽螟中國所多也多不足怪而為災則害故不言多而言災愚按爾雅通志本草皆以蜚為蟲獨山海經以蜚為獸但負盤常有當如書螽書螟不當書有姑并識以俟參考啖氏曰左氏云凡物不為災不書春秋紀異多矣何必為灾乃書冬十有二月紀叔姬卒紀已滅矣其卒之何見音現紀侯去國終不能自立異於古公亶父之去故特書叔姬卒而不卒紀侯以明其不爭而去則可能使其民從而不釋則微矣杜氏曰紀國雖滅叔姬執節守義故繫之紀賢而録之臨川吳氏曰叔姬娣也魯紀之待叔姬與叔姬之自待其身皆與伯姬同春秋備書之此蓋莊公以為姑而為服大功之服也與叔姬莊十二年歸􅈶此卒于􅈶也紀滅而猶繫之紀蓋國亡無所依托雖寄寓於􅈶以待死其為紀國夫人之娣則如初也家氏曰春秋以叔姬不為國亡變其所守特録之以勸後世以此坊民猶有儷體宸居國亡不能死委身於元海如晉之惠后者可為慟哭流涕者矣城諸及防左傳書時也凡土功龍見而畢務火見而致用水昏正而栽日至而畢杜氏曰諸防皆魯邑諸城陽諸縣張氏曰諸今密州諸城縣縣又有故防城及者别二邑也臨川吳氏曰凡書土功雖時非善之也愈於非時者爾其間亟興土功而亟書之不繫乎時與不時皆貶也若此前年冬築郿大饑而告糴此年春新延廄於是又城諸防豈不為亟而譏之乎啖氏曰榖梁云以大及小也此但依先後次第何必小大乎劉氏曰若言諸防則似一城故從所先城記爾愚按左氏以謂書時也穀梁以為可城特拘於常例農隙之時而不知莊公之城非其時也諸城今屬益都路密州丁惠王十巳三年三十年齊桓二十二晉獻十三衛懿五蔡穆十一鄭文九曹僖七陳宣二十九把惠九宋桓十八秦宣十二楚成八春王正月夏師次于成左無師字榖梁傳次止也有畏也欲救鄣而不能也不言公耻不能救鄣也陳氏曰次于滑也書公于郎貶師之此其但書次何以是為不足書也甚矣莊之不競於齊也君父死焉不能討謀紀而齊滅紀及齊圍郕而郕降于齊於是次成齊人降鄣雖罪齊桓也訖莊公之身不可以不貶也愚按趙氏謂魯欲㑹齊圍鄣至成待命夫欲救患而不能謀凌弱而為援皆罪也然鄣乃紀之附庸觀魯之加恩禮於紀叔姬則未必合兵以滅鄣蓋魯莊有姑息之愛婦人之仁而畏齊强盛不敢援鄣故佯為救鄣之虛名猶次滑之意耳秋七月齊人降鄣降户江反鄣音章榖梁傳降猶下也杜氏曰鄣紀附庸國東平無鹽縣東北有鄣城張氏曰今東平府須城縣降者脅服之詞杜氏曰小國孤危不能自固蓋齊遙以兵威脅使降附趙氏曰凡服從內附曰降不言鄣降降由於齊前書郕降于齊師意責魯也二國同圍郕郕不降於魯而降於齊見魯不能服郕此言齊人降鄣専罪齊也不書鄣降於齊則見齊以威力逆脅而强使降服非郕降之比鄣者紀之附庸左傳昭十九莒子奔紀鄣愚按鄣蓋須句顓臾之類耳微乎微者也齊人不道肆其强力脅使降附不書鄣降而曰降鄣者以齊之强故罪之深以鄣之微故責之薄本常山劉氏春秋之法扶弱抑强明道義也霸者之政以强臨弱急事功也故曰五伯三王之罪人仲尼之徒無道桓文之事者鄱陽萬氏曰以齊桓之賢嘗有存亡繼絶之功得鄣之地不足以為廣并鄣之衆不足以為强乃必降而有之使紀之上地人民無復子遺聖人所以書降鄣而深致其誅貶也家氏曰齊魯圍郕郕降于齊師降於力既屈之後齊人降鄣畏威而降降於兵未加之前郕雖降而猶存鄣則不復見矣啖氏曰公榖云鄣紀之遺邑按鄣自是小國爾紀之全國猶不敢敵齊豈一邑之民而能二十餘年獨拒齊乎劉氏曰公羊云降之者取之也不言取之為桓公諱也亦非也取之固曰取之降之固曰降之遷之固曰遷之非可假借為避諱也八月癸亥葬紀叔姬公羊傳何以書隱之也何隱爾其國亡矣徒葬乎叔爾穀梁傳不日卒而日葬閔紀之亡也滅國不葬此何以葬賢叔姬也杜氏曰以賢録也紀侯既卒不歸宗國而歸于􅈶音携所謂秉節守義本杜氏注不以亡故而睽苦圭反婦道者也故繫去聲之於紀而録其卒葬髙氏曰復繫之紀不以􅈶易紀也先儒蘇氏謂賢而得書是也賢而得書所以為後世勸也家氏曰娣媵不葬此以賢叔姬故與伯姬俱得葬劉氏曰非叔姬之賢則不足葬髙郵孫氏曰叔姬之卒又録其葬以為於喪滅之中能以義節自守故嘉之也張氏曰紀叔姬從一而終不以存亡二其心故詳録其生死又紀魯之往葬皆以夫人之禮書之所以明婦行以示後法也愚按春秋國滅而書葬者三書齊侯葬紀伯姬以見齊侯迫滅紀國夫人在殯而不及葬也書葬陳哀公以見楚雖滅陳而陳人尚能葬其君也惟紀叔姬則以其賢故因魯人往葬而特書之然國滅而葬其君夫人若娣媵皆閔其亡滅而存之之意也故朱子綱目書魏葬漢獻帝晉葬魏元帝宋葬晉恭帝亦聖人存亡繼絶之遺㫖也九月庚午朔日有食之鼓用牲于社𫝊義見二十五年冬公及齊侯遇于魯濟濟子禮反左傳謀山戎也以其病燕故也杜氏曰濟水歷齊魯界在齊界為齊濟在魯界為魯濟蓋魯地張氏曰簡禮以議軍旅之事愚按齊侯入魯境則齊侯之意也襄陵許氏曰齊桓伐郳伐鄭伐徐皆以宋人主兵與公㑹城濮而後伐衛與公過魯濟而後伐戎以是知齊桓之伯不自恃也用兵行師每資武於宋桓取策於魯莊其治國也一則仲父二則仲父用人之能以為能集人之功以為功遂能力正天下澤潤生民劉氏曰穀梁云及者內為志焉爾非也設若外為志便云公㑹齊侯遇于魯濟乎齊人伐山戎公羊傳此齊侯也其稱人何貶曷為貶子司馬子曰蓋已操之為已蹙矣穀梁傳齊人者齊侯也其曰人何也桓內無因國外無從諸侯而越千里之險北伐山戎危之也杜氏曰山戎北狄鄭氏曰其地在薊州漁陽愚按薊州今大都路大興縣齊人者齊侯也其稱人譏伐戎也自管仲得政至是二十年未嘗命大夫為主將去聲下同亦未嘗興大衆出侵伐故魯莊十一年而後凡用兵皆稱人者以將卑師少爾今此安知其非將卑師少而獨以為齊侯何也以來獻戎捷稱齊侯則知之矣何氏曰據下言齊侯來獻戎捷愚按上遇魯濟謀山戎下獻捷皆以齊侯書則知伐山戎非微者矣夫北戎病燕音烟職貢不至桓公內無因國外無從才用反諸侯越千里之險為于僞反燕闢地史齊世家山戎伐燕桓公救燕遂伐山戎至于孤竹命燕君納貢于周諸侯聞皆從之可謂能修方伯連帥去聲之職何以譏之乎桓不務德勤兵逺伐不正王法以譏其罪則將開後世之君勞中國而事外域捨近政而貴逺略困吾民之力爭不毛之地本楊氏辨要其患有不勝音升言者故特貶而稱人以為好去聲武功而不修文德者之戒也劉氏曰桓公之威行乎天下其重過於萬乘又越竟以伐山戎諸侯震恐乃沛然自得矜功而語受命此君子所惡故貶而人之然則伐楚之役何以美之其謂退師召音邵陵責以大義不務交兵而强楚自服乎本杜氏㑹義觀此可以見聖人强本治內柔服逺人之意矣通㫖楚頻侵鄭鄭乃內地故齊桓伐楚聖人取之山戎遠地也齊桓為燕而伐戎聖人則貶之於此可見帝王用兵之意矣如漢武之窮兵其不敗幸耳文帝則不然胸奴候騎至上林烽火通甘泉便作細栁等軍正與伯禽征徐夷宣王伐玁狁無異志在愛民非黷武也三代用兵意全在是才差之毫釐便是齊侯伐山戎不可也張氏曰中國之聲教未治近有荆楚為中國患尚未正罪而勤兵于逺其治之先後兵之次弟皆失之矣故齊侯自出而書人以譏之王氏曰荆內也患近而不可緩戎外也勢逺而不足恤近者飬之而不討逺者伐之以為勞蓋楚患未已則諸侯可要伐戎有功則諸侯皆服此桓公之志也故貶之劉氏曰穀梁云其曰人何也愛齊侯乎山戎也又曰則非之乎善之也非也春秋以人貶之云爾戊惠王十午四年三十有一年齊桓二十三晉獻十四衛懿六蔡穆十二鄭文十曹僖八陳宣三十把惠十宋桓十九秦成公元年楚成九春築臺于郎公羊𫝊何以書譏何以書厲民也劉氏曰譏厲民也去國而築臺是樂而己矣天子有靈臺以候天地諸侯有時臺以候四時本何氏注詩靈臺注天子有靈臺以觀天文有時臺以觀四時施化左傳僖五日南至遂登觀臺以望而書凡分至啓閉必書雲物去國築臺于逺而不緣占候是為游觀之所厲民以自樂音洛下同也何氏曰四方而髙曰臺登髙逺望人情所樂動而無益於民雖樂不為也厲民自樂而不與民同樂則民欲與之偕亡雖有臺豈能獨樂乎杜氏曰書築臺刺奢且非土功之時董子繁露譏驕溢不恤下也孫氏曰莊比年興作今又一歲而三築臺妨農害民莫甚於此家氏曰凡築臺與囿不以時不時皆譏也是歲三築臺皆書重譏之也莊公暮年驕恣尤甚天災見於上嵗比不登而土功無虛歲其違禮敗度可以想見魯之衰實由莊公始愚按楚靈為章華之臺伍舉極諌以為先君為臺髙不過望國氛大不過容宴豆其所不奪穡地其為不匱財用瘠磽之地於是乎為之四特之隙於是乎成之非聚民利以自封而瘠民也使魯臣有如伍舉者言於莊公則三臺之築或少省矣啖氏曰公羊云築臺各有說一云譏臨民之所潄浣一云譏逺也一云譏臨國按一歲三築臺假如皆得其所豈無妨於人乎何用三譏其處也夏四月薛伯卒張氏曰薛始稱伯蓋降班而告終也築臺于薛公羊傳何以書譏杜氏曰薛魯地愚按今東平路秦時為薛郡六月齊侯來獻戎捷左傳非禮也公羊傳齊大國也曷為親來獻戎捷威我也穀梁傳軍得曰捷軍獲曰捷何氏曰戰所獲曰捷凡諸侯有四方之功則獻于王王以警于逺中國則否諸侯不相遺去聲俘本左傳獻者下奉上之辭本杜氏注齊伐山戎以其所得躬來誇示書來獻者抑之也常山劉氏曰齊侯伐山戎得其捷躬來誇示以威我書曰來獻抑之也張氏曰齊桓恃功而不知禮魯不當納而輕受之皆罪也後世宰臣有不賞邊功以沮外徼吉弔反境也塞也生事之人得春秋抑戎捷之意前陳湯傳胸奴郅支單于殺漢使者西走康居湯為西域副校尉矯制發兵與都護甘延夀襲擊胸奴郅支單于於康居斬之得漢使莭凡斬閼氏太子名王以下千五百一十八級生虜百四十五人降千餘人軍既至論功丞相匡衡以為湯延夀擅興師矯制幸得不誅如復加爵土則後奉使者爭欲乘危徼幸生事於蠻夷為國招難漸不可開詔欲封湯等千户衡復爭乃封延夀義成侯湯關內侯王氏曰伐山戎則稱人獻捷則稱爵齊桓未能鎮緩中國而徒勤逺略有恃勝危師之道故抑而稱人今以方伯而躬獻戎捷于侯國有矜功失莭之耻故愧之而稱爵聖人抑揚之道不可一端求也愚按春秋書來獻捷者二齊桓獻捷而書齊侯所以著其夸服戎之功而譏之也楚成獻捷而書楚人所以微其挾猾夏之威而抑之也然於齊書戎捷而於楚不書宋捷則所以尊中國而賤荆蠻也昭昭矣劉氏曰榖梁云內齊侯也不言使內與同不言使也非也去年伐山戎知其當為齊侯者正以獻捷乃齊侯也今此何以見其是使人乎魯雖欲內齊豈可便不殊齊侯之使今既稱齊又曰來獻安見內乎又云戎菽也不近事理疑菽者北狄字也北字類草狄字類叔傳寫訛謬并為一字耳秋築臺于秦公羊傳何以書譏穀梁傳不正罷民三時且財盡則怨力盡則懟君子危之故謹而志之也一年罷民三時惡內也范氏曰秦魯地杜氏曰東平范縣西北有秦亭張氏曰范縣今屬濮州亭尚存莊公一嵗三築臺所謂及是時般樂怠敖者則治國治家之當務荒廢多矣此所以踰年身死而蕭墻之禍至奕世而不能定也可不鍳哉啖氏曰穀梁云虞山林藪澤之利此當施於築囿下又曰倚齊桓公外無諸侯之變故築臺此說無益於為教冬不雨公羊傳何以書記異也程子傳一歲三築臺明年春城小穀故冬書不雨閔之深也張氏曰莊公無閔雨之志獨酉戌亥之月不雨故不得歷時而言也家氏曰是歲三築臺而冬不雨明年春又城小穀與大無麥禾告糴而築郿新延廄書法相類王氏曰春秋書不雨者常𤾉之徵然及月者書月及時者書時再歷時者書纍月今日冬不雨則一時無雨矣周之冬夏之八九十月也當是時穀已成實閲時不雨雖未甚害亦見隂陽不調為嗣歲之災也故特書之吕氏曰僖文之不雨或歷三時或歷四時此年才一時不雨爾二百四十二年一時不雨者豈止一年而已而此特書之者莊公亟興土功屢見災異故詳志之也已惠王十未五年三十有二年齊桓二十四晉獻十五衛懿七蔡穆十三鄭文十一曹僖九陳宣三十一把惠十一宋桓二十秦成二楚成十春城小榖范氏曰小穀魯地孫氏曰曲阜西北有小穀城通㫖孫魯人也而終身學春秋其考此詳矣薛氏曰莊公六年後無麥苗大無麥禾螟麋􅈮蜚相繼而有大水者三中君尚當少警而公之軍旅盟㑹未嘗休息至於侈心一起因娶而觀社丹楹刻桷告糴之時築郿次年新廄城諸防去年三築臺而不雨今又城小穀平歲猶不可况洊饑而輕用民力乎髙氏曰杜預以小榖為齊邑左傳云為管仲城之若然聖人亦當異其文而係之齊且公雖感齊桓之私豈肯為管仲城邑昭十一年傳云齊桓城榖而置管仲焉齊自有榖如文十一年盟穀宣十四年㑹穀此齊穀也非魯之小穀沙隨程氏曰齊地别有榖在濟北有管仲並非小穀也公及齊侯盟穀歸父㑹穀乃濟北之穀夏宋公齊侯遇于梁丘左傳齊侯為楚伐鄭之故請㑹于諸侯宋公請先見于齊侯夏遇于梁丘穀梁傳梁丘在曹邾之間去齊八百里非不能從諸侯而往也辭所遇遇所不遇大齊桓也杜氏曰梁丘在髙平昌邑縣西南張氏曰在濟州齊不以霸主自居以梁丘近宋而先之也隱四年傳志外之遇者三而皆以爵若曰以尊及卑然也其意以為莫適主者愚按濟南路巨野縣有古昌邑城何休謂遇禮近者為主逺者為賔然隱八年莊四年兩遇于垂垂衛地而衛序齊宋下蓋盟㑹則序主㑹者居上若遇則以簡禮相見比於不期而邂逅莫適為主故以爵之尊卑為序爵同則以國大小為序耳秋七月癸巳公子牙卒左傳公疾問後於叔牙對曰慶父材問於季友對曰臣以死奉般公曰鄉者牙曰慶父材成季使以君命命僖叔待于針巫氏使針季鴆之曰飲此則有後於魯國不然死且無後飲之歸及逵泉而卒立叔孫氏公羊傳曷為不言刺之為季子諱殺也曷為為季子諱殺季子之遏惡也不以為國獄緣季子之心而為之諱也公子慶父公子牙公子友皆莊公母弟也慶父牙通乎夫人以脅公季子起而洽之則不得與國政坐而視之則親親因不忍見故請至于陳莊公病將死召季子季子至而授之以國政曰寡人即不起吾將焉致乎魯國季子曰般也存公曰庸得若是乎牙謂我曰魯一生一及君已知之矣慶父也存季子曰是將為亂乎俄而牙弒械成季子和藥而飲之曰公子從吾言而飲此則必有後乎魯國不從吾言而不飲此則必為天下戮笑於是從其言而飲之至乎王堤而死公子牙今將爾辭曷為與親弒者同君親無將將而誅焉然則善之與曰然殺世子母弟直稱君者甚之也季子殺母兄何善爾誅不得辟兄君臣之義也然則曷為不直誅而鴆之行誅乎兄隱而逃之使託若以疾死然親親之道也杜氏曰牙慶父同母弟牙有今將之心而季子殺之其不言刺者陳氏曰雖鴆之而立叔孫氏喪以大夫之禮也公羊以為善之也季子殺母兄何善爾誅不得避兄君臣之義也陳氏曰季友以君命鴆牙緣君臣之義不得私其親曷為不直誅而鴆之使託若以疾死然親親之道也周禮小司寇同族有罪不即市注刑于甸師氏禮記文王世子刑于隱者不與國人慮兄弟也陸淳曰季子恩義俱立變而得中夫子書其自卒以示無譏也本微㫖得之矣劉氏曰公子牙殺也而卒之殺之當其罪故遂其隱之之意也當是時魯人知牙之罪而莫知季友之謀也聞牙之死而莫謂季友之誅也使季子謀不緣君誅不當罪則春秋猶將探其専誅之惡以示後世矣聖人原情議獄以季子之為忠於國而適於權內得親親之理外得尊尊之義故平其文使若自死然通㫖季子誅牙不曰刺者事適於權故以諱為善或曰周公誅管蔡而正其罪何也曰二叔之罪彰矣故不得而掩也石氏曰兄弟之親君臣之義皆不可廢也一之於愛則義有所不立一之於義則愛有所不行於此之際非聖賢不能處也武王終管蔡導武庚以叛周公顧兄弟之愛則國必敗君必危周公不以天下徇一人之私不以私愛廢君臣之義仗大義而誅之後世不以為不仁叔牙欲立慶父季友顧兄弟之愛則慶父必立魯國必亂季子不以私恩害天下之公不以一人易一國之利奮大公而鴆之後世必有以察之周公誅管蔡則暴其罪季友鴆叔牙則微其跡二叔之罪已彰僖叔之罪尚隱而不可知也故以自卒為文也張氏曰或謂雖殺叔牙無補於後日子般閔公之禍是不然文姜以來胎飬亂本至此已成使牙不誅則莊公之薨慶父叔牙强盛雖有季子之忠秉禮之俗亦無所措其手矣故牙之誅乃魯國存亡之幾慶父成敗之决也春秋所以原其心而為之諱也陸氏曰公羊云不稱弟殺也按書公子常例也叔肸書弟自特書爾不得引以為義劉氏曰穀梁云日卒正也不日故也有所見則日非也若有所見又不日豈不益明乎何苦日之與正卒相亂哉愚按或謂牙乃叔孫氏之祖其卒距公薨時尚一月茍以是誅牙則慶父何為尚執國柄且書法全不寓微意牙實自卒夫季友非不欲誅慶父以其握兵權而莫如之何也茍謂經不寓意則當時季友隱其跡聖人因之而書卒以示季友之殺兄無罪若疑叔孫之有後則共仲以罪自經亦有後也况春秋之亂賊如齊殺無知而其後有仲孫湫宋殺督而其後有華耦華喜陳殺徵舒而其後有夏齧夏區夫安得謂為惡之臣而不為祖耶八月癸亥公薨于路寢公羊傳路寢者何正寢也穀梁傳寢疾居正寢正也男子不絶于婦人之手以齊終也趙匡曰君終必於正寢就公卿也大位姦之窺也危病邪之伺音笥也若蔽於隱是女子小人得行其志矣本纂例又曰莊公正終而嗣禍分位不明而閨闈不修也故宗嗣素定之兵權散主之閨闈嚴飾之女子小人不尸重任賢良受託鼎足交輔則篡弒之禍曷由至哉然則莊公以世適音嫡承國不為不貴周公之後奄有龜蒙不為不强即位三十有二年不為不久薨于路寢不為不正而嗣子受禍幾至亡國何也大倫不明而宗嗣不定兵柄不分而主威不立得免其身幸矣啖氏曰凡公薨必書其所詳內事重凶變也若遇弒則不地張氏曰書月書日謹之冬十月己未子般卒己未公榖作乙未般音班公羊傳其稱子般卒何君存稱世子君薨稱子某既葬稱子踰年稱公子般何以不書葬未踰年之君也有子則廟廟則書葬無子不廟不廟則不書葬子般弒也孰弒子般慶父也莊公存之時鄧扈樂淫于宫中子般執而鞭之莊公死慶父謂樂曰般之辱爾國人莫不知盍弒之矣使弒子般然後誅鄧扈樂而歸獄焉杜氏曰子般莊公大子初公築臺臨黨音掌氏見孟任音壬生子般焉般嘗鞭圉人犖音洛公薨般即位次于黨氏慶父使犖賊般成季奔陳立閔公據左傳昔舜不告而娶恐廢人之大倫以懟直類反父母君子以為猶告也莊公過時越禮謬於易基乾坤詩始關睢大舜不告而娶之義甚矣而子般乃孟任之所出也胡能有定乎雖享國日久獲終路寢而嗣子見弒幾至亡國有國者可不以為戒哉啖氏曰未踰年曰卒未成君也未葬則名之既葬不名雜記君薨太子號稱子待猶君也張氏曰子般見弒而書卒者諱之也莊公主魯之社禝而君道不立上不能正其母使出入淫縱配耦不早致冢嗣之位不足以自定內失間家之道而使圍人犖得以戲公子觀其告子般之言非不知犖之可誅而欲以誅殺之權委其子亦終不能殺而貽身後之患春秋自夫人孫齊以來三十年間備載莊公內治之失而終之以此所以罪其為風教之本而不免於首惡也通㫖問子般子赤被弒而書卒子野過毁亦書卒不覩𫝊文何以知之曰閔公內無所承不書即位則子般之殺可知下書夫人姜氏歸于齊上書公子遂叔孫得臣如齊赤之卒也不日則子赤之弒可知與子野異矣愚按或謂般之卒書日書名非遇弒今以經考之莊公之薨十一月始葬季友之出隱而不書閔立二年而即見弒則莊死之時內亂可知矣屬辭比事論之般非令終𫝊必有據茍謂子般自卒而慶父請于齊以立閔公則慶父曷為又弒之耶茍以子般之卒與子野同則昭公以娣之子穆叔不欲而卒立之國以無事昭公又書即位與閔公異何耶公子慶父如齊子般之卒慶父弒也宜書出奔其曰如齊見音現慶父主兵自恣國人不能制也杜氏曰慶父既殺子般季友出奔國人不與故權而適齊欲以求援昔成王將終命大臣相去聲康王方是時掌親兵者太公望之子伋也宰臣召音邵公奭音釋命仲桓南宫毛取二干戈虎賁音奔百人于伋以逆嗣子見書顧命伋雖掌兵非有宰臣之命不敢發也召公雖制命非二諸侯將命以往伋亦不承也兵權散主不偏屬於一人可知矣東萊吕氏曰發命者冢宰傳命者兩朝臣承命者勳戚顯諸侯體統尊嚴樞機周密防危慮患之意深矣今莊公幼年即位専以兵權授之慶父歲月既久威行中外其流至此故於餘丘見二年法不當書而聖人特書慶父帥師以志得兵之始而卒書公薨子般卒慶父如齊以見音現其出入自如無敢討之者以示後世其垂戒之義明且逺矣王氏曰內大夫以君命適他國皆書如慶父弒子般而出春秋書之無異辭者既書子般卒則知其無君命矣慶父専兵日久上下畏之宜其出入自如而莫敢誰何也張氏曰慶父自莊公即位已専兵柄而莊公昏庸耽樂不恤國事致慶父肆行姦宄隂為他日取國之計顴莊公與叔牙問答之辭使非季子應時誅之則般不復得立矣今般雖弒而尚未能取國非特季子之黨未順亦見魯俗秉禮人心未盡從也故因閔公之立告於霸主以為自託之計齊桓以方伯自任與魯為鄰且親豈不知慶父為弒君之賊容其來使使之復歸以遺魯國之後禍即此已見其無討賊之實意而有取魯之私心春秋書慶父如齊著莊公不君飬成其惡使得以出入自如而齊桓失方伯連率之職也陸氏曰齊為伯主而不能討又許其來惡可知也永嘉吕氏曰先書公子牙卒繼書公薨繼書子般卒下書公子慶父如齊未二年又書公薨夫人姜氏孫于邾公子慶父奔莒則慶父之罪亦不可掩矣其書曰孫曰奔者蓋其罪已著內不容於國人而懼罪以出是魯猶有臣子也其直書曰如者蓋其専權恣橫出入自如而莫之制是魯無有討賊之人也然則微而顯矣劉氏曰穀梁云奔也其曰如何也諱莫如深深則隱茍有所見莫如深也非也閔公不書即位足以起子般之弒爾不足以見慶父之賊也慶父弒君此魯人之讎奈何反掩匿蔽覆使其罪不見乎文十八年子卒下季孫行父如齊則行父亦弒子赤者耶狄伐邢此狄入伐之始杜氏曰邢姬姓周公之𦙍國在廣平襄國縣張氏曰今邢州龍岡縣狄北狄春秋胡傳附録纂疏卷九
