body:
  text: 春秋胡傳附録纂疏卷十六元汪克寬撰宣公癸匡王丑五年元年晉靈十三年齊惠公元元年衛成二十七年蔡文四年鄭穆二十年曹文十年陳靈六年杞桓二十九年宋文三年秦共公稻元年楚莊六年春王正月公即位公羊傳繼弒君不言即位此其言即位何其意也榖梁傳繼故而言即位與聞乎故也宣公為弒君者所立受之而不討賊是亦聞乎弒也故如其意焉而書即位以著其自立之罪而不嫌於同辭美一也有小大則褒辭異惡一也有小大則貶辭異一美一惡無嫌於同公羊美惡不嫌同辭張氏曰宣公受弒賊之立而居其位其罪同於桓公而十八年之間皆書王與桓公不同者法已舉於前矣天理不可以常亡王法不可以久廢故存王以舉大法亦所以正宣公之罪也髙郵孫氏曰桓弒隱而立春秋月而不王以罪天王之不能誅之宣弒子赤而立春秋書月書王不罪天王之不討者非赦之也天王不王自平王而下桓公之時王道之不行未久有王者興則桓公在可誅之域不於在位當於其將終竟桓公之死王不能誅聖人不忍周道之衰而弒君者得志也十八年間書王者四終始反覆欲其見討而竟不能於是月而不王以為法於萬世至於宣公則王道之不行百餘年矣亂賊接迹而起而王者未嘗誅之非天下無王何至是也宣弒子赤自立晏然無所忌憚春秋於即位之月書王以明王道之行不容一日息也惟其無王是以書王爾桓公之時王猶可望則待王之誅宣公之時王不足望故書王以討也公子遂如齊惠逆女魯秉周禮喪未期年遣卿逆女何氏曰譏喪娶復書不親迎何亟乎太子赤齊出也仲遂殺子赤及其母弟而立宣公懼於見討髙氏曰不待喪畢而遽如齊逆女者恐姻好久不通而齊人來討也故結昏於齊為自安計越典禮以逆之如此其亟而不顧者必敬嬴仲遂請齊立接之始謀也家氏曰宣公繼世之初斬焉在疚而首遣大夫如齊逆女所遣見又同惡之大夫春秋書之所以著敬嬴襄仲弒君篡國之本謀亦以見齊元無道黨其臣而使之弒君也蓋請昏割地魯所以自結於齊者皆在遂與得臣如齊之時故即位未幾而襄仲遂有逆女之行無何又以割地而出春秋書即位書逆女書遂以夫人婦薑至自齊書齊人取濟西田著魯人結齊之援以弒其君著齊人輔魯之篡俾弒其君蓋明王法以治齊魯之罪二國皆有討也王氏曰赤齊之甥也憂齊之有所黨故欲急昏於齊也公榖謂譏喪娶不知喪娶之不足罪也可罪者喪娶之故也其後滕文公定為三年喪父兄百官皆不欲曰吾宗國魯先君莫之行也孟子朱子注謂魯不行三年之喪者乃其後世之失非周公之法本然也喪紀浸廢夫豈一朝一夕之故自文宣莫之行矣據文公亦三年之內圖昏此所謂不待貶絶而罪惡見音現者也杜氏曰不譏喪娶者不待貶責而自明也薛氏曰公薨夫人出大夫逆女亂倫而娶齊人不創夫人之出而違禮婚媾皆罪也臨川吳氏曰文公使公子遂納幣已非禮况宣公逆夫人而可遣僖祖之弟乎然負篡弒之罪而急於結齊昏以定其位者乃惡之大喪娶卿逆之非禮則其惡之小者爾愚按文公未終禫制而圖昏春秋深加貶黜不書逆者姓名不書如齊不稱夫人不稱氏以著其罪宣公未及期年而亟於喪娶春秋書使卿逆女書夫人至僅去夫人之氏此非特從同同之例蓋以宣公之惡有大於喪娶者故詳録之以見其縱私欲而紊典禮實欲結大援而逭天討也石氏曰翬弒隱公遂殺子赤桓公之立逆女使翬宣公之立逆女使遂斯二人者在國以為賊而桓宣以為忠也故終桓宣之世翬遂皆稱公子無異辭三月遂以夫人婦薑至自齊公羊傳遂何以不稱公子一事而再見者卒名也夫人何以不稱薑氏貶曷為貶譏喪娶也喪娶者公也則曷為貶夫人內無貶于公之道也夫人與公一體也其稱婦有姑之辭也榖梁傳其不言氏喪未畢故略之也其曰婦緣始言之之辭也程子傳脫氏字有不待貶絶而罪惡見音現下並同者不貶絶以見惡本公羊夫人與音預有罪焉則待貶而後見故不稱氏何氏曰去氏輕於去薑范氏曰夫人不能以禮自固故與有貶劉氏曰婦人不專行在家制於父母夫人有貶則父母與有罪矣髙氏曰古者一禮不備女不肯行故詩曰雖速我訟亦不女從雖速我獄室家不足夫人其如何知惡無禮如野有死麕音囷詩小序野有死麕惡無禮也能以禮自防如草蟲同上草蟲大夫妻能以禮自防也愆期有待如歸妹之九四易象傳愆期之志有待而行也程子傳所以愆期者由已而不由彼女子居貴髙之地有賢明之資人情所碩娶其過時未歸蓋自有待非不售也則可免矣凡稱婦者其詞雖同立義則異逆婦薑於齊病文公也不稱女而稱婦著文公之亟於成昏也以婦薑至自齊責敬嬴也有姑則以婦禮至無姑則專以夫人禮至不稱薑氏而稱婦薑著敬嬴之欲速以姑自居也張氏曰公子遂宣公之為亂臣賊子明矣不待貶絶也書婦著敬嬴之罪也敬嬴嬖妾私事襄仲以其子屬章欲反之殺世適音嫡兄弟出主君夫人援如字成風故事即以子貴為國君母公羊母以子貴斬焉在衰音崔服之中昭十叔向云云又見檀弓請昏納婦而其罪隱而未見也故因夫人至特稱婦薑以顯之此乃春秋推見至隱著妾母當國用事為後世鑒者也槩指為有姑之詞而不察其旨則精義隱矣趙氏曰書以者不當以也髙氏曰不直書夫人婦薑至自齊而稱遂以者明公子遂不當以夫人歸也婚禮莫重於親迎豈容他人得以之歸哉遂蓋公族之尊者尤不可也家氏曰夫人非大夫所得以也遂挾齊以弒其君娶齊女為篡君之婦魯之家國實制於遂書以者著其罪也公榖言婦有姑之辭婦薑之嫡姑則出薑也經於子卒之後書夫人薑氏歸於齊於宣公始立書遂以婦薑至自齊所以責齊受人之出母而與之婦所以責魯棄母於齊而娶齊女事悖妾以為姑也絶滅天理甚矣劉氏曰左傳稱族尊君命舍族尊夫人非也一事而再見卒名耳必若云然公子結遂及齊宋盟非受命亦稱族歸父豹意如其往也氏其至也不氏無有夫人居間也何以舍族耶夏季孫行父如齊惠左傳納賂以請會經書行父如齊而不言其故謂納賂以請會者傳去聲下同也經有不待傳而著者比毗至反事以觀斯得矣下書公會齊侯于平州則知此會行父請之也又書齊人取濟西田則知其請蓋以賂也雖微傳其事著矣諸侯立卿為公室輔閔二猶屋之有楹也而謀國如此亦不待貶絶而惡自見音現者也髙氏曰春秋時國君不以其道立茍得一預諸侯之會他國不得復討其罪所以季文子不憚自行者欲假大國之權以定宣公之位也宣公之位定則一時臣子黨亂誤國之罪皆可以逃矣不然以行父之勤勞恭儉相去聲三君而無私積子賜反襄五季文子卒無衣帛之妾無食粟之馬君子是以知季文子之忠於公室也相三君而無私積必能以其君顯名與晏嬰等矣朱子曰季文子三思而後行可謂慮事詳審而宜無過舉矣而宣公篡立文子乃不能討反為之使齊而納賂焉豈非私意起而反惑與吕氏曰君母不正孽子篡立而國之大臣恃大國以免施施肆肆無所忌憚行父名大夫也而猶若是先王之澤泯矣張氏曰文公世子之死在官當誅者公子遂其首行父次之家氏曰季友受托孤之寄鴆叔牙戮慶父立僖公魯之宗社賴以再安行父其孫也乃為賊使齊而歸先君之母今又為之再使納賂請會有忝厥祖多矣晉靈放其大夫胥甲父于衛成左傳晉人討不用命者放胥甲父于衛而立胥克公羊傳放之者何猶曰無去是云爾古者大夫已去三年待放君放之非也大夫待放正也古者臣有大喪則君三年不呼其門已練可以辨冕服金革之事君使之非也臣行之禮也榖梁傳放猶屏也杜氏曰胥甲下軍佐胥臣之子放猶羈置毋去其所杜氏曰放者受罪黜免宥之以逺孫氏曰放逐也比於專殺者其罪薄乎云爾李氏堯俞曰稱國以放與稱國殺大夫同或以為近正公羊非矣大夫當官既不請於天子而自命以為有罪又不告於司寇而擅刑猶不逺於正乎蜀杜氏曰周衰諸侯擅恣法度而有屏放其臣者春秋不得不譏之薛氏曰諸侯不專放大夫其書者僣天子之事也永嘉吕氏曰書放大夫惡專放也稱國以放君與大夫咸與焉晉放胥甲是也稱人稱人以放國亂無政而衆人擅放之蔡人放公孫獵是也秦晉戰于河曲撓女教反臾駢之謀者趙穿也若討其不用命則當以穿為首止治軍門之呼去聲文十二晉人禦秦師于河曲臾駢曰秦不能久請深壘固軍以待之士會謂秦伯曰臾駢必實為此謀將以老我師也趙有側室曰穿好勇而狂若使輕者肆焉其可秦軍掩晉上軍趙穿追之不及反怒曰裹糧坐甲固敵是求將獨出乃以其屬出宣子懼秦獲穿乃皆出戰秦師遁臾駢曰薄諸河必敗之胥甲趙穿當軍門呼曰不待期而薄人於險無勇也乃止偕貶可也而獨放胥甲父則以趙盾當國穿其族子而盾庇之也蘇氏曰胥甲趙穿其罪一也放胥甲而捨趙穿穿盾之族子也張氏曰穿以盾之側室而獨免刑之偏頗如此非所以治有罪主諸侯也桃園之罪明年穿弒靈公于桃圜其志固形於此矣故稱國以放見音現晉政之在私門而成上侵僣也為後戒也臨川吳氏曰河曲之戰及今八年豈有不用命之罪八年而後討哉必胥甲以他事取惡於趙盾而逐之也愚按放胥甲者弒夷臯之兆也殺胥童者弒州蒲之兆也髙氏曰諸侯之大夫有罪當請于天子或殺或放今晉專放其大夫可乎况舜討歡兜之罪而放之崇山者投之逺方也崇山猶在封疆之內非蠻夷外國也晉人於衛同為列國而放其有罪之臣於衛是鄙衛也衛人受晉之逐臣而不辭豈亦迫於大國之勢歟劉氏曰秦穆公悔不用百里奚之言以亡三帥自狀其過而作秦誓晉靈公耻不得志於秦而追咎善謀放胥甲於衛人之度量相越豈不逺哉使晉之君臣因胥甲之言推而廣之修已而不責人鄰國將來服奚患秦哉春秋書放胥甲以其無罪而譏晉之濫也啖氏曰公羊云近正也此傳是三年待放之義乃三諫不從以禮而去者今放名雖同而實殊傳不見事迹故云爾髙郵孫氏曰榖梁云稱國以放放無罪也案稱人自為與其下為别也安得以稱國而見其無罪乎公會齊惠侯于平州杜氏曰平州齊地在泰山牟縣西張氏曰後漢志琅琊國陽都故地有牟臺注平州在縣西今屬沂州沂水縣愚按沂州今屬益都路按左氏曰會于平州以定公位魯宣篡立踰年舉國臣子既從之矣若之何位猶未定而有待於平州之會也春秋以來弒君篡國者已列於諸侯則不復扶又反下同致討隱四杜氏曰諸篡立者諸侯既與之會則不復討故曹人以此請負芻于晉成十三曹宣公卒公子負芻殺太子自立十五年會戚晉執負芻歸京師十六年曹人請曰若有罪則君列諸會矣夫篡弒之罪毁滅天理無所容於天地之間身無存沒時無古今其罪不得赦也以列於會而不復討是率天下為亂賊等倫紀于辨髦此仲尼所為去聲懼春秋所以作也然欲定其位者魯宣宜稱及我所欲曰及齊而曰會者討賊之法也凡討亂臣賊子必深絶其黨而後為惡者孤也張氏曰凡亂臣賊子之所以不敢縱其欲音以有霸主大國能討之也齊乃魯之鄰其力足以正魯而惠公不明於義利邪正之辨始許仲遂以亂魯之適庶終會平州以定賊子之位則亂賊復何畏而不逞哉會者外為志魯宣欲求寵以定位而書齊惠之志以治黨惡之罪與桓公鄭莊垂之會一也晉為盟主諸侯所取正而齊宋弒君威弗能加魯亂不治見晉之無能為也愚按齊惠因歜職之逆得立乎其位故魯宣納賂求會歡然而從蓋同惡相濟耳特齊之強大足以芘魯故宣公君臣殫意以固結之也公子遂如齊惠左傳襄仲如齊拜成宣公篡立之罪仲遂主謀為首惡初請于齊遂為上客而並書介使去聲者罪叔孫得臣不能為有無亦從之也論語焉能為有焉能為無季子然問仲由冉求然則從之者與子曰弒父與君亦不從也大夫有以死爭去聲者矣然削而不書者以叔仲惠伯死非君命失其所也愚按孔父仇牧荀息非以君命而死皆特書於䇿竊疑忠義之臣扞君之難固不可待召命而後致死也杜然氏謂史謂襄仲不敢書殺惠伯其理或遂及行父則一再見音現下同于經矣如齊拜成雖削之可也又再書于䇿者於以著其始終成就弒立之謀愚按遂得臣同如齊見公子接而請立之逆謀之始也今既定宣公而拜成于齊逆謀之終也以戒後世人臣或內交宫禁以固其寵或外結藩鎮以為之援去聲至於殺生廢置皆出其手而人主不悟者唐武三思李輔國通韋后張后而擅殺五王遷上皇於西內崔胤崔昭緯結王行瑜李荗貞朱全忠而脅帝殺杜讓能王搏蘇檢貶陸扆王溥其慮深矣凡此皆直書于策而義自見者也六月齊惠人取濟西田左傳為立公故以賂齊也公羊傳外取邑不書此何以書所以賂齊也曷為賂齊為弒子赤之賂也榖梁傳內不言取言取受之也以是為賂齊也程氏傳宣公不義得國賂齊以求助齊受之以助不義故書取不義不能保其土故不云我非為強取故不諱不能有而失者皆諱張氏曰濟西魯故地僖三十年取之曹者魯人致賂以免討而書齊人取田者所以著齊罪髙郵孫氏曰齊侯之罪隱而難見故明書取田以著其罪春秋取田邑皆貶之曰人罪其擅取也惟齊景為昭公取鄆以其取不為己得特書其爵春秋討賊尤嚴於利其為惡而助之者所以孤其黨夫齊魯鄰國盟主之餘業也子惡弒出薑歸而宣公立不能聲罪致討務寧魯亂閔元齊仲孫曰君其務寧魯難而親之首與之會是利其為惡而助之也弒君篡國人道所不容而貨賂公行免於諸侯之討則天下胥為亂賊倫紀等于辨髦其禍乃自不知以義為利而以利之可以為利而為之也孟子為去聲梁王極言利國者必至於弒奪而後饜於艷反蓋得經書取田之意舉法如此然後人知保義棄利亂臣賊子孤立無徒而亂少弭矣張氏曰桓公篡立求援於鄭而誘以許田宣公奪嫡主齊以自立而賂以濟田以利自固前後一轍使鄭莊齊惠不貪其利則桓宣必不能以自立矣曰假曰取蔽罪鄭齊誅其貪利而成亂也大學論治國平天下深戒以利為利孟子論先利後義不奪不饜皆拔本塞源知春秋之微意也歟家氏曰魯桓之弒君鄭不預也魯畏其討以是為賂故書假諱之也魯宣之弒君謀出於襄仲事實成於齊惠故直書其事以兩討之蓋田者先祖受之於王魯國之封疆也宣公既篡人之國又割先祖所受之土疆以為齊賂齊惠既輔人之篡又受其賂田以為已有此所謂盜竊之取其罪有大於侵伐之取矣陳氏曰外取邑不書襄二十六年齊取我髙魚不書必有歸之者然後書是故濟西田書取歡闈書取秋邾定子來朝通旨凡經於朝聘皆不徒書未有書而無義者也宣公為弒君者所立邾子來朝而無貶文者既於朝桓貶矣公羊曰其餘從同同張氏曰邾子朝當討之人不貶者桓公之經已舉法從同同也楚莊子鄭穆人侵陳靈遂侵宋文左傳宋人之弒昭公也晉以諸侯之師伐宋宋及晉平宋文公受盟于晉又會諸侯于扈將討齊皆取賂而還鄭穆公曰晉不足與也遂受盟于楚陳共公之卒楚人不禮焉陳靈公受盟于晉楚子侵陳遂侵宋穀梁傳遂繼事也楚書爵而人鄭者貶之也鄭伯本以宋人弒君晉不能討受賂而還以此罪晉為不足與也遂受盟于楚今乃附楚以亟去聲病中國何義乎張氏曰不討有罪固晉之無義而亦未至如僣王肆亂之罪大也鄭舍晉從楚附旡王之狂楚以為中國患故人之書侵陳遂侵宋者以見潛師掠境肆為侵暴非能聲宋罪而討之也家氏曰使鄭穆公從楚之後能以楚師討宋聲於境上問昭公之故宋人必能以鮑為戮更議立君則不失其棄晉之初志今乃與楚子俱侵陳遂侵宋此侵暴無名之師凌駕中夏非討亂之舉也既正此師為不義然後中國之師可舉矣永嘉吕氏曰盟會而書楚子自盂始征代而書楚子自侵陳始次厥貉嘗書楚子矣未加兵於中國也伐麇書楚子矣不過加兵於其與國也是故侵蔡伐楚侵曹伐衛書齊侯晉侯喜中國之有伯也侵陳遂侵宋書楚子傷中國之無伯而楚人得以執伯權也陳氏曰書遂代楚言志不在蔡也書遂侵宋言志不在陳也南北之勢於是始也後十五年而宋楚平後五十年晉趙武楚屈建同盟于宋諸夏之君分為晉楚之從矣自是訖春秋師再有事無言遂者言遂者非與國伐盟主則盟主伐與國也晉靈趙盾帥師救陳靈左傳晉趙盾帥師救陳宋榖梁傳善救陳也鄭在王畿之內而附僭亂陳先代帝王之後而見侵逼此門庭之寇利用禦之者也門庭門內之庭寇盜至此則不得不擊伐之王者以諸夏為庭户四夷為藩籬晉能救陳則存諸夏恤與國之師故特褒而書救凡書救者未有不善之也啖氏曰救者救其患難凡救患皆為美也如解倒懸孟子民之悅之猶解倒懸也如拯民於塗炭之中塗炭猶言水火如孟子言民以為拯已於水火之中知此義則知春秋用兵之意矣傳去聲稱師救陳宋經不書宋此非闕文乃聖人削之也前方以不能討宋上卿貶而稱人文十七四國伐宋諸侯會而不序同上會扈今若書救宋則典刑紊矣家氏曰書救與其能救陳也不書救宋不與其救宋也宋負弒君大惡晉人受賂不能討而楚伐之雖楚之存心未必誠於為義然弒逆之賊夫人得而討之也楚討之晉救之故春秋不與其救與宋公文陳侯靈衛侯成曹伯文會晉靈師于棐林伐鄭穆公作裴林左傳會于棐林以伐鄭也楚蒍賈救鄭遇于北林囚晉解揚晉人乃還公羊傳此晉趙盾之師也曷為不言趙盾之師君不會大夫之辭也榖梁傳地而後伐鄭疑辭也此其地何則著其美也杜氏曰晉師救陳宋四國君往會之共伐鄭也棐林鄭地滎陽宛林縣東南有林鄉愚按在今汴梁路均州新鄭縣即棐也列數上聲下同諸侯而會晉趙盾榖梁子以為大趙盾之事以其大之也故曰師此説非也劉氏曰卿大夫不得會公侯今晉侯不行趙盾專國亦無貶則善矣曷為大之耶春秋立法君為重而大夫與師其體敵據君不書帥師大夫必書帥師君獲君傷皆不書師敗績大夫獲仍書師敗績列數諸侯於帥師之下而又書大夫之名氏則臣疑於君而不可以為訓其曰會晉師此乃謹禮於微之意也其立義精矣陳氏曰此晉趙盾以諸侯之師伐鄭大夫初用諸侯也靈公之世兵車之會自參以上貶人之於是出趙盾以其用諸侯也春秋不以大夫用諸侯故止書趙盾帥師救陳下書諸侯會晉師於棐林伐鄭則不以大夫用諸侯之辭也棐林鄭地也前者地而後伐以為疑詞此其地則以著其美者范氏曰歎美趙盾救災恤患之功故詳録其會地薛氏曰晉師先在棐林故言會又言伐一美一惡無嫌於同愚按桓十五年公會宋公衛侯陳侯于袲伐鄭先講會禮而後往伐始疑於助忽而討突終乃伐忽而助突故春秋責其疑此言宋公陳侯衛侯曹伯會晉師于棐林伐鄭四國之君翕然而從晉師討罪以救患故春秋著其美前者講會禮而後伐此乃會師以同伐文似而實異也書突出奔蔡忽歸于鄭突入于櫟而繼書公會諸侯于袲伐鄭則為黨突而伐忽可知矣書楚子鄭人侵陳遂侵宋晉趙盾帥師救陳而繼書諸侯會晉師于棐林則為討鄭而救中國可知矣屬辭觀之是非瞭然冬晉靈趙穿帥師侵崇崇公作栁左本亦作崇侵書趙穿而後凡役書大夫左傳晉欲求成於秦趙穿曰我侵崇秦急崇必救之吾以求成焉趙穿侵崇秦弗與成杜氏曰崇秦之與國任公輔曰地譜商有崇國在京兆鄠縣日亭愚按今奉元路鄠縣之東啖氏曰崇小國也公羊誤為栁崇在西土秦所與也晉欲求成于秦不以大義動之而伐其與國則為諼許元反已甚比諸伐楚以救江異矣而傳去聲謂設此謀者趙穿也意者趙穿己有逆心欲得兵權托於伐國以用其衆乎不然何謀之迂音于而當國者亦不裁正而從之也穿之名姓自登史䇿弒君于桃園而上卿以志同受惡其端又見音現下同於此書侵以見所以求成者非其道矣高氏曰晉欲得秦而反加兵於他人之國適足以衆晉之敵爾此謬計也家氏曰晉欲求成於秦發一乘之使述先君之好而秦成合矣今伐崇以求之秦愈怒而兵愈不可解矣蓋穿者志於作難託伐崇以專兵不然何拙謀之若是而執政者且無所可否於其間乎劉氏曰公羊云栁者天子之邑也不繫乎周者不與伐天子也非也趙穿伐天子之邑罪大矣無文以貶之何哉晉靈人宋人人伐鄭穆左傳晉人伐鄭以報北林之役於是晉侯侈趙宣子為政驟諫而不入故不競於楚榖梁傳伐鄭所以救宋也宋人弒君既列於會在春秋衰世已免諸侯之討矣論去聲春秋王法則其罪固在法所不赦也而晉人與之合兵伐鄭是謂以燕音煙伐燕本孟子言晉無道與鄭無異庸愈乎其書晉人宋人非將去聲卑師少蓋貶而人之也以貶書伐者若曰聲罪致討而已有瑕則何以伐人矣昭四無瑕者可以戮人髙氏曰宋怨鄭與楚之侵也復請晉伐鄭晉亦以前救之無功也遂連兵伐之夫晉以貪賂致諸侯之叛不能退而自責乃謀動干戈於外以遂宋之復怨况宋人弒君豈可與之合兵乎家氏曰此一事而前後褒貶不同者鄭背晉而即楚諸侯會晉而討之公也晉受宋賂而輔之以篡今復偕宋伐鄭私也蓋鄭可伐也為宋而伐鄭則不可也甲匡王六寅年崩二年晉靈十四弒齊惠二衛成二十八蔡文五鄭穆二十一曹文十一陳靈七杞桓三十宋文四秦共二楚莊七春王二月壬子宋文華元帥師及鄭穆公子歸生帥師戰于大棘宋師敗績獲宋華元華尸化反戰皆書大夫帥師自此始左傳鄭公子歸生受命于楚伐宋宋華元樂吕御之戰于大棘宋師敗績囚華元獲樂吕及甲車四百六十來俘二百五十人馘百人宋人以兵車百乘文馬百駟以贖華元于鄭半入華元逃歸杜氏曰大棘在陳留襄邑縣南張氏曰今屬拱州愚按襄邑縣今屬汴梁路睢州兩軍接刃主將去聲下同見獲其負明矣又書師敗績詞不贅乎此明大夫雖貴與師等也永吕嘉氏曰此年戰大棘與晉趙鞅鄭罕達戰于鐵皆兩稱帥師其衆敵也春秋書戰言大夫帥師自此始自是而後若晉荀林父衛孫良夫魯季孫行父臧孫許叔孫僑如公孫嬰齊齊國書皆書大夫帥師春秋書獲者七唯齊國書及此年宋華元書敗績者身見獲而師又敗也大夫生死皆書曰獲鄭獲宋華元生也吳獲陳夏齧齊國書死也故將尊師少稱將不稱師師衆將卑稱師不稱將將尊師衆並書于䇿者示人君不可輕役大衆又重將帥之選其義深矣前朝鍇傳卒不可用以其將與敵也君不擇將以其國與敵也或曰元帥三軍之司命而輕重若是班乎孟子若是班乎朱子曰班齊等之貌自行師而言則以元帥為司命孫子將者人之司命國家安危之主也自有國而言則以得衆為邦本書五子之歌民惟邦本鄭使髙克將兵禦狄于境欲逺去聲克也而不恤其師見閔二楚以六卒實從得臣恐喪去聲師也而不恤其將見僖二十八故經以棄師罪鄭以殺其大夫責楚明此義然後知王者之道輕重之權衡矣髙氏曰元年秋鄭人與楚子侵宋宋人既為棐林之役以報之是冬又與晉人伐鄭一役而兩報之遂起此役今鄭師之來宋當明大義以諭之否則慎固封守使鄭不得而犯焉華元乃遽帥師出與之戰於是三軍大敗以至見獲不能效死徒殄民辱國而已以見中國因夷狄之故而自相殘如此張氏曰宋以弒君致寇而不服罪故書宋及猶曰華元為志乎是戰也愚按文定於韓之戰云書伐書及者兩俱有罪經不書伐專罪晉也今考此亦不書歸生伐宋則春秋責宋之意重於責鄭矣趙氏曰榖梁云盡其衆以救其將以三軍敵華元華元雖獲不病矣按兵敗身獲而云不病非也但緣師先敗績身乃見獲依次第書之有何褒貶乎若欲褒貶乃足見其不身先士卒爾何得云善矣秦共師伐晉靈按左氏以報崇也遂圍焦杜氏曰焦晉河外邑晉用大夫於崇乃趙穿私意而無名也故書侵秦人為去聲是興師而報晉則問其無名之罪也故書伐世豈有欲求成於強國而侵其所與可以得成者乎穿之情見音現下同矣宣子當國算無遺策獨懵模揔反閽也於此哉其從之也而盾之情亦見矣春秋書事筆削因革必有以也一侵一伐而不書圍焦所以著晉卿上侵之意其所由來者漸矣永嘉吕氏曰晉文之欲與楚爭也必得秦而後敢戰殽函之役晉襄度淺而先軫諸人見利乘便自是更相報復無有窮已楚方有凌駕中國之心鄭復背晉從楚以侵陳晉將與楚爭則通秦以軋楚可也否則置秦而勿問可也而盾之族子興侵崇之謀盾非病狂何故聽之是啓秦之爭也宋方敗於鄭而晉復病於秦非自致之而誰耶張氏曰欲求成而反召兵所以深著趙穿之妄動干戈而欲竊兵權誅其意也夏晉靈人宋文人衛成人陳靈人侵鄭穆左傳晉趙盾救焦遂自隂地及諸侯之師侵鄭以報大棘之役楚鬪椒救鄭曰能欲諸侯而惡其難乎遂次于鄭以待晉師趙盾曰彼宗競于楚殆將斃矣姑益其疾乃去之按左氏晉趙盾及諸侯之師侵鄭以報大棘之役初鄭歸生受命于楚以伐宋經不書伐而以宋華元主大棘之戰者蓋楚人有詞于宋矣師之老壯在曲直僖二十八晉主夏盟盾既當國合諸侯之師何畏乎楚何避乎鬪椒然力非不足而去之者以理曲也故卿不氏而稱人杜氏曰鄭為楚伐宋獲其大夫晉趙盾興諸侯之師將為宋報耻畏楚而還失伯者之義故貶稱人師書侵而不言伐易於訟卦之象曰君子作事謀始程子傳人情有爭訟之道凡所作事必謀其始若慎交結之類絶釁端於事之始則爭訟無由生矣始而不謀將至於興師動衆文王卦序師次於訟有不能定者矣晉惟取賂釋宋而不討至以中國之大不能服鄭不競於楚可不慎乎春秋行事必正其本為去聲末流之若此也其垂戒明矣永嘉吕氏曰諸侯之從晉也謂晉之可依也率諸侯以討宋乃立公子鮑而還是立賊也鄭由是謂晉為不足與而從楚以侵宋晉乃芘宋以伐鄭鄭復使歸生伐宋蓋有辭於宋也晉復黨宋以侵鄭一動之非義而與國叛之敵國侮之彼得以奉辭而我罷於奔命至一再而未已也伯主之舉動詎可輕哉家氏曰鄭叛華侵之可也以報大棘之役則不可也鄭惡晉之釋宋不討而從楚晉不知自愧猶為宋報鄭是以貶四國之大夫皆書人是時晉之趙盾欲據兵權託於伐國實無鬪心故棐林之役楚囚解揚晉師即還是役也與鬪椒遇即謬為之辭曰彼宗競於楚殆將斃矣復去之盾本無欲戰之心也左氏乃曰晉侯侈趙盾驟諫不入是以不競於楚何失實之甚耶髙氏曰自是楚與晉爭晉不能競反有弒逆之禍於是楚益自肆明年遂有問鼎之事秋九月乙丑晉趙盾弒其君夷臯臯公作嗥左傳晉靈公不君厚斂以雕牆從臺上彈人宣子驟諫公患之使鉏麑賊之不果觸槐而死晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明搏而殺之鬪且出提彌明死之靈輒與為公介倒戟以禦公徒而免之趙穿攻靈公于桃園宣子未出山而復太史書曰趙盾弒其君以示於朝宣子曰不然對曰子為正卿亡不越竟反不討賊非子而誰孔子曰董孤古之良史也書法不隱宣子使趙穿逆公子黑臀于周而立之公羊傳親弒君者趙穿也曷為加之趙盾不討賊也靈公為無道使諸大夫皆內朝處乎臺上引彈而彈之膳宰熊蹯不熟公怒殺之使荷畚棄之盾就視之趍而入諌靈公心怍焉欲殺之伏甲于宫中召盾食之己食公謂盾曰吾聞子之劒蓋利劒也示我吾將觀焉盾將進劒祁彌明呼之盾躇階而走公呼獒而屬之彌明踆之絶其頷宫中甲鼓而起有起于甲中者抱盾而乘之驅而出趙穿緣民衆不説起弒靈公然後迎趙盾而入與之立于朝晉史書曰晉趙盾弒其君盾曰天乎無牽吾不弒君誰謂吾弒君者乎史曰爾為仁為義人弒爾君而復國不討賊非弒君如何榖梁傳穿弒也盾不弒而曰盾弒何也以罪盾也靈公朝諸大夫而暴彈之觀其辟丸也趙盾入諌不聽出亡至於郊趙穿弒公而後反趙盾史狐書賊曰趙盾弒公盾曰天乎豫無罪孰為盾而忍弒其君者乎史狐曰子為正卿入諫不聽出亡不逺君弒反不討賊則志同志同則書重非子而誰故書之曰晉趙盾弒其君夷臯者過在下也程子曰趙穿弒君人誰不知若盾之罪非春秋書之更無人知也趙穿手弒其君董狐歸獄於盾其斷都亂反下同盾之獄詞曰子為正卿亡不越竟反不討賊以書是斷而盾也受其惡而不敢辭仲尼因其法而不之革其義云何曰正卿當國任事之臣也國事莫酷於君見弒不於其身而誰責乎薛氏曰君將殺盾而穿行弒君之事則主弒者盾也穿受命而加刃者也在律家人共犯止坐尊長威力使令被使為從此春秋之義也亡而越境謂去國而不還也然後君臣之義絶杜氏曰越境則君臣義絶愚按君子違不適讎國未臣而有伐之奔命焉死之可也去國不返必如宋子哀潔身去亂然後君臣之義絶反而討賊謂復讎而不釋也然後臣子之事終愚按反而討賊苟如羽父討於寪氏不足以逭大惡之誅必如衛石碏之誅不避親無一毫阿私之意而竭力為君復讎然後臣子之事終不然是盾偽出而實聞乎故也假令不與音預聞者而縱賊不討是有今將之心本公羊何氏曰今將欲弒而意欲穿之成乎弒矣惡莫慘乎意今以此罪盾乃間臣子之邪心而謹其漸也盾雖欲辭而不受可乎蜀杜氏曰盾知靈公欲殺之而心欲弒之是不止同謀而實將弒也春秋不可並書穿盾而擇首罪者以書之亦義之所宜也臨川吳氏曰趙盾專晉國之政幾二十年境內境外知有盾而不知有公靈公既長不堪其專遂欲殺盾鉏麑受命不肯殺盾而死提彌明救盾而鬪死靈輒內叛倒戟免盾於死則盾之私屬與公徒敵無復有臣禮矣君臣既為仇敵非盾弒公則公殺盾勢固不兩立也穿盾之族子平日所愛信之人也弒公而盾乃復穿之弒為盾弒也盾為首惡穿特承意行事者爾盾陽為不知謀以求自免弒君之罪將誰欺乎夫子書曰趙盾弒其君誺首惡也自三傳以來説者多方為盾分釋則是亂賊不可以欺聖人而乃可以欺後儒也髙郵孫氏曰盾隂弒其君而陽逃其迹實行其計而穿受其名者也故孔子以弒賊誅之必待親弒然後罪之則姦臣賊子得以計免而庸愚無知者常當其實矣以髙貴鄉公之事觀焉抽戈者成濟唱謀者賈充而當國者司馬昭也為天吏者將原司馬昭之心而誅之乎亦將致辟成濟而足也故陳泰曰惟斬賈充可以少謝天下耳昭問其次意在濟也泰欲進此直指昭也魏髙貴鄉公紀帝見威權日去不勝其忿曰司馬昭之心路人所知也吾不能坐受廢辱遂率殿中宿衛官僮數百鼓噪而出中護軍賈充逆戰南闕下太子舍人成濟問充曰當如何充曰司馬公蓄養汝等正為今日濟抽戈刺帝刃出於背昭聞之大驚自投於地入殿中召羣臣會議尚書左僕射陳泰曰獨有斬賈充可以少謝天下耳昭久之曰更思其次曰泰意惟有進此不知其次昭乃不復言以太后令追廢帝為庶人昭言成濟大逆不道夷三族然則趙穿弒君而盾為首惡春秋之大義明矣微夫子推見至隱垂法後世亂臣賊子皆以詭計獲免而至愚無知如史太鄧扈樂音洛之徒皆蒙歸獄而受戮焉公羊閔元莊公存之時僕人鄧扈樂曽淫于宫中子般執而鞭之莊公死慶父謂樂曰般之辱爾國人莫不知盍弒之矣使弒子般然後誅樂而歸獄焉唐昭宗紀上至洛陽朱全忠以帝有英氣恐變生於中乃遣李振與蔣玄暉及朱友恭氏叔琮等圖之玄暉選牙官史太等百人夜叩宫門殺宫人裴貞一帝在椒殿遽起繞柱走太追弒之昭儀李漸榮以身蔽帝太亦殺之玄暉矯詔稱貞一漸榮弒逆全忠聞之陽驚哭自投于地曰奴輩負我令我受惡名於萬代至東都慟哭殺朱友恭氏叔琮愚按趙盾之專晉猶司馬昭朱全忠之專政於魏唐也靈公之欲殺盾猶髙貴鄉公之欲殺司馬昭唐昭宗之謀朱全忠也趙穿弒靈公猶成濟師太之殺髙貴鄉公與昭宗也盾未出山而復猶昭全忠之陽驚自投於地也魏唐舊史及通鑑皆書成濟史太弒帝而邵子經世書及朱子綱目則筆之曰魏司馬昭弒其主髦朱全忠弒帝蓋取法春秋誅趙盾之義也司馬昭族誅成濟朱全忠盡殺友恭叔琮等尚不免君子直筆之討况盾使穿逆成公于周以固新君之寵則元惡之誅不於盾而誰任乎君臣父子不相夷以至於禽獸也幾希故曰春秋成而亂臣賊子懼通旨夷臯雖無道未為獨夫君臣之分猶在也知此則明文王事紂之道異姓之卿君有大過則諫反覆之而不聼則去趙盾亡而不反可也反而討賊亦可也盾能討穿司馬昭能討賈充則可免弒君之罪矣故曰春秋誅意二人之不討罪意在於弒君也家氏曰晉襄託其孤於趙盾曰此子也才吾受子之賜不才吾惟子之怨其屬於盾者為何如盾乃與諸大夫謀外求君及畏逼不得已而後立靈公則靈公之立非盾意也竊疑盾所以謀其君者非一朝夕之故矣齊商宋鮑弒君篡國晉為盟主所當治也盾合諸侯將有討於齊宋已而受賂不惟不討又為之定篡竊之位無君之心久已萌矣堂上之覺方興桃園之攻隨至靈公固在趙氏罝綱之內欲無及得乎趙氏曰左氏云仲尼曰惜也越境乃免按董狐云亡不越竟言行未逺而君被弒反又不討賊狀涉同謀爾非謂越竟即無罪也作傳者不達此意遂傅會為此言若然者姦臣令人弒君身越竟而還即為無罪乎朱子語左氏見識甚卑云孔子曰惜哉越竟乃免如此則專是回避占便宜者得計聖人作春秋而亂臣賊子懼豈反為之解免耶冬十月乙亥天王崩匡王也文十五年即位在位六年弟瑜立是為定王乙定王卯元年三年晉成公黑臀元年齊惠三衛成二十九蔡文六鄭穆二十二卒曹文十一陳靈八杞桓三十一宋文五秦共三楚莊八春王正月郊牛之口傷改卜牛牛死乃不郊公羊傳其言之何緩也曷為不復卜養牲養二卜帝牲不吉則扳稷牲而卜之帝牲在於滌三月於稷者唯具是視郊則曷為必祭稷王者必以其祖配榖梁傳之口緩辭也傷自牛作也改卜牛牛死乃不郊事之變也乃者亡乎人之辭也乃不郊為去聲下為天同牛之口傷榖梁全曰牲傷曰牛未牲曰牛改卜牛而牛又死也家氏曰此魯宣除喪始郊而天示之譴也一書十有六言辭煩而不厭著其變異異乎常郊之卜不吉者矣宣公篡弒逆理亂常持是饗帝故天譴之也不然郊矣范氏曰牛無故其口自傷易牛改卜復死乃廢郊禮禮為天王服斬衰周禮司服凡喪為天王斬衰周人告喪于魯史䇿已書而未葬也祀帝于郊夫豈其時而或謂不以王事廢天事杜氏注禮乎張氏曰此因事之變以明魯郊之非禮蓋僣禮之中復有忘哀從吉之罪三年之喪乃臣子斬衰奔赴之時豈可僣天子越紼行事之禮春秋所以特書之春秋已來喪紀浸廢有不奔王喪而逺適他國桓公不奔桓王喪而會于齊之艾文公成公不奔頃王定王之喪而同盟于鄭之新城蟲牢襄公不奔靈王之喪而如楚且送楚子昭之葬于西門之外有不修弔禮而自相聘問簡王之喪襄公不弔而邾子來朝衛剽晉荀罃來聘固將以是為可舉而不廢也卒至漢文以日易月前文帝紀遺詔曰死者天地之理物之自然奚可甚哀當今之世咸重服以傷生吾甚不取朕幸以天年得供養于髙廟其奚哀念之有其令天下吏民令到出臨三日皆釋服毋禁嫁娶祠祀殿中當臨者皆以旦夕各十五舉聲已下服大紅十五日小紅十四日纎七日釋服服虔云皆當言大功小功布也纎細布也應劭曰紅者中祥大祥以紅為領緣纎者禫也凡三十六月為釋服此以日易月也顔師古曰紅與功同此文帝自率已意創而為之非有取於周禮何為以日易月乎三年之喪其實二十七月豈有三十六月之文禫又無七月也應氏既失之於前而近代因循謬説未之思也荀悅曰三年之喪天下之通喪由來者尚矣今而廢之以虧大化非禮也後世不能復其所由來漸矣春秋備書其義自見音現髙氏曰魯僣郊禮久矣隱桓莊閔不書者聖人不敢無故斥言君父之過故因變異而書也愚按天王崩三月天下服王崩至是已三月海內諸侯皆當斬衰苴絰杖絞帶冠繩纓菅屨魯為同姓之宗國而不服其服則無王也郊之祭也喪者不敢哭凶服不敢入國門苟釋凶服而從事於大禮是慢天也且天子嘗禘郊社簠簋既陳諸侯祭社稷爼豆既陳聞天子崩后之喪皆廢其禮况可聞喪而猶治祭事乎王制所紀祭天地社稷越紼而行事亦以已卜時日而忽有喪則大臣越紼而攝祭耳春秋書郊牛災而改卜者四此年改卜之牛又死成七年鼷鼠又傷改卜之牛故皆廢郊定十五年哀元年鼷鼠傷郊牛改卜牛而不復變異皆行郊禮故知不郊者非悔非禮而不郊實以郊牛之臶有災傷不得已而不郊特書乃不郊猶言乃還乃復乃克葬乃者繼事之辭所以著不郊之由係於郊牛之變異也經書不郊者四成十年襄十一年皆以卜不吉而廢郊則魯君之誠意不足以格天此年成七年牛災廢郊而皆猶三望則天示譴告之意而不知止也猶三望左傳不郊而望皆非禮也望郊之屬也不郊亦無望可也三望者公羊曰祭泰山河海夫天子有天下凡宇宙之內名山大川皆其所主也故得祭天而有方望無所不通諸侯有一國則境外之山川他人所主者而可以望乎季氏旅於泰山周禮大宗伯旅四望注旅陳也陳其祭事冉求不能救而夫子責之者為去聲泰山魯侯所主也大夫何與音預焉季氏不得旅泰山則河海非魯之封內其不得祭亦明矣朱子語天子祭天地諸侯祭其國之山川只緣是他屬我故我祭得他若不屬我則氣便不與之相感如何祭得他猶者可已不當為之詞詳見僖三十一年臨川吳氏曰天子郊祀上帝必望祭山川望祭在郊祀之後因郊而望也魯諸侯也以成王之賜許用王禮四望闕其一殺於天子然郊社既廢則望禮可以不舉魯既不郊而猶三望故書以譏其非禮愚按襄七年三卜不吉而免牲十一年成十年四卜五卜不吉而不郊雖曰不郊非其本意然因是而止猶庶幾焉僖公末年免牲猶三望此年成七年不郊猶三望可已不已不當為而為其過益甚矣葬匡王四月而葬王室不君其禮略也髙氏曰前期而葬者簡也且著王室之微罪諸侯之不王也家氏曰桓王七年而後葬譏緩也匡王四月而亟葬譏速也微者往會魯侯不臣其情慢也或曰宣王親之者也而常事不書劉氏意林非矣崩葬始終之大變豈以是為常事而不書也永嘉吕氏曰經書王崩而葬者四葬桓王葬匡王則不書其人葬襄王則叔孫得臣也葬景王則叔鞅也或謂桓王匡王之葬皆公親往然以他文考之葬諸侯而使卿者則備而書之其他不書其人者皆為公親往可乎楚子莊伐陸渾之戎渾户門反公作賁渾戎後同榖無之字左傳楚子伐陸渾之戎遂至於雒觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在德不在鼎周德雖衰天命未改鼎之輕重未可問也杜氏曰允姓之戎居陸渾在秦晉西北僖二十二年秦晉遷之于伊川遂從戎號今為陸渾縣張氏曰唐為河南陸渾縣地今河南府伊陽縣北二十里有陸渾縣故城愚按今河南府路洛陽縣外國相攻不志據文十六戎伐楚哀四楚克夷虎圍蠻氏之類經皆不書此其志何也為去聲陸渾在王都之側逼處畿甸族類之不分也楚又至洛觀兵于周疆問鼎之大小輕重焉故特書于䇿以謹中外之辨禁啓亂之階陳氏曰楚伐陸渾窺周室也夏楚莊人侵鄭穆左傳晉侯伐鄭及郔鄭及晉平士會入盟楚人侵鄭鄭即晉故也按左氏晉侯伐鄭鄭及晉平而經不書者仲尼削之也愚按後此七年鄭及晉平八年陳及晉平經皆不書惟十五年宋及楚平則書之不與中國之服於夷狄也鄭本以晉靈不君取賂釋賊為不足與似也本孟子言所為近似有理而往從楚非矣今晉成公初立背音佩僣竊偽邦而歸諸夏則是反之正也春秋大改過許遷善書楚人侵鄭者與鄭伯之能反正也故獨著楚人侵掠諸夏之罪爾鄭既見侵於楚則及晉平可知矣家氏曰晉靈惟貨是徇是以失鄭成公繼世雖未有大過人而鄭遽棄異即同蓋貴華賤夷人心義理之同然非威驅勢迫所能得也不然趙盾合諸侯之師以伐鄭略無成功今息兵踰年鄭何為而自至乎春秋繼伐陸渾而書楚人侵鄭惡楚莊圖霸之急也秋赤狄侵齊惠赤狄始見經張氏曰赤狄狄之譜洺謂之赤狄白狄俗尚赤衣白衣也地州春秋赤狄之地愚按在今廣平路髙氏曰見狄之種類已分矣襄陵許氏曰楚侵其南狄侵其北此中國棟撓之時也宋文師圍曹文左傳宋師圍曹報武氏之亂也按左氏宋文公即位盡逐武穆之族二族以曹師伐宋文十八武氏之族道昭公子將奉司城須以作亂公殺母弟須及昭公子使戴莊桓之族攻武氏遂出武穆之族然不書于經者二族以見逐而舉兵非討罪也及宋師圍曹報武氏之亂而經書之者端本清源之意也武穆二族與曹之師奚為至於宋哉不能反躬自治恃衆強以報之兵革何時而息也宋惟有不赦之罪檀弓臣弒君凡在官者殺無赦莫之治也故書法如此髙氏曰武氏之亂非曹人所致也宋不能內睦九族而興兵以圍人之國不亦左乎冬十月丙戌鄭伯蘭卒穆公也在位二十二年子夷嗣是為靈公葬鄭穆公穆公作繆臨川吳氏曰葬速禮不備也丙定王辰二年四年晉成二齊惠四衛成三十蔡文七鄭靈公夷元年弒曹文十三陳靈九杞桓三十二宋文六秦共四卒楚莊九春王正月公及齊侯惠平莒季他及郯莒人不肯公伐莒取向向舒亮反左傳非禮也平國以禮不以亂伐而不治亂也以亂平亂何治之有無治何以行禮榖梁傳及者內為志焉爾平者成也公伐莒取向伐猶可取向甚矣莒人辭不受治也伐莒義兵也取向非也乘義而為利也杜氏曰向莒邑張軍氏曰郯已姓國秦有郯郡漢屬東海郡故城在今淮陽邳縣北愚按今淮安路海寧州心不偏黨之謂平愚按偏則不中黨則不公無一毫私欲而後可以稱物平施也以此心平物者物必順以此心平怨者怨必釋惟小人不能宅心之若是也雖以勢力強上聲下能強同之而有不獲成者矣夫以齊魯大國平郯莒小邦宜其降心聼命不待文告之及也然而莒人不肯則以宣公心有所私係失平怨之本耳故書取以著其罪髙氏曰莒郯相怨而郯乃魯婚姻之國公欲為郯平莒而挾齊以為重公之義不足以服莒之心不知自反而取邑於人亦已甚矣公既無以得莒後書郯伯姬來歸則郯亦不能固其好也及所欲也王氏曰及有二義及齊公之志也及郯以大及小也平者成也取者盜也不肯者心弗允從莫能強之者也以利心圖成雖強大不能行之於弱小春秋書此戒後世之不知治其本者故行有不得者反求諸已斯可矣劉氏曰兩怨相仇能辨其曲直使人信之者唯己有道也小邾射以邑歸魯魯使大夫盟之辭曰使子路約從無所用盟千乘之國不信其盟而信子路之一言子路可謂能以言信矣推子路之心居郯莒之間安有不聽者哉使子路動而違義言而廢信不可以決鄉黨之平况千乘之國乎家氏曰事有大而書之略事有小而書之詳此書公及齊侯平莒及郯莒人不肯公伐莒取向辭繁而不厭示後人以持平救偏正義辨利之要夫莒郯所以爭為不平故耳齊魯求其平髙者抑之下者舉之以我之平而平彼之不平庶乎其可也而魯之於莒積不相下徒狹齊人之威力而要莒以必從其不肯者宜哉宣公遽以兵加莒而取其一邑以巳之不平求人之平况又因以為利無道甚矣以濟西賂齊而責償於莒春秋首書公及而終之以取向深責之也通旨凡書侵伐多不言其所事愚按晉陽處父伐楚先言伐而後言以救江宣公伐莒先言平莒不肯而後言伐皆指言其事然救江雖非其道而其名則善平莒之名雖善以不肯而至於伐取則又甚焉屬辭比事春秋之權衡見矣啖氏曰公羊云其言不肯何辭取向也聖人設教豈為魯欲取向而妄加莒事乎趙氏曰榖梁云弗肯者可以肯也按書不肯者明莒非以他事見伐且譏公又曰伐莒義兵也按非王命又非侯伯安得稱義乎秦伯稻卒共公也在位四年子榮嗣是為桓公夏六月乙酉鄭公子歸生弒其君夷左傳楚人獻龜於鄭靈公公子宋與子家如將見子公之食指動以示子家曰他日我此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫龜召子公而弗與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先子家曰畜老猶憚殺之而况君乎反譛子家子家懼而從之弒靈公書曰鄭公子歸生弒其君夷權不足也君子曰仁而不武無能逹也首謀弒逆者公子宋也懼譛而從之者歸生也而以歸生為首惡何也夫亂臣賊子欲動其惡而不從者未有能全其身而不死也故季子然問仲由冉求其從之者歟子曰弒父與君亦不從也是以死節許二子矣南軒張氏曰弒君父不從何必由求而能之曽不知順從之臣始也惟利害之徇履霜堅氷之不戒馴致蹉跌以至從人弒逆者多矣歸生懼譛而從公子宋特無求路不可奪之死節耳書為首惡不亦過乎曰歸生與宋並為大夫乃貴戚之卿同執國政可以不從一也嘗統大師與宋戰獲其元帥二年戰夭棘獲華元已得兵權可以不從二也聞宋逆謀登時而覺先事誅之猶反手耳夫據殺生之柄仗大義以制人使人聽已猶犬羊之伏於虎也何畏於人懼其見殺而從之也哉計不出此顧以畜老憚殺比方君父歸生之心悖矣故春秋捨公子宋而以弒君之罪歸之為後世鑒若司馬亮沈慶之等苟知此義則能討罪人不至於失身為賊所制矣晉惠帝紀賈后專恣殺太傅楊駿廢太后楊氏徴汝南王亮為太宰亮欲恱衆論誅楊駿功侯者千八十一人亮權勢日盛賈后欲奪其權使楚王瑋夜圍亮府殺之南沈慶之傳慶之既發顔師伯栁元景之謀遂昵子業蔡興宗勸慶之弒子業不從及子業誅何邁量慶之必入諫閉諸橋絶之慶之果往不得進而還乃使沈攸之賜藥酒殺之陸氏曰子公弒君之賊也其惡易知子家縱其為逆罪莫大焉書之以為首惡所以教天下之為人臣者也春秋之作聖人本以明微蓋謂此也與書趙盾之弒義同髙氏曰春秋之作常施於可疑而不施於所不疑宋之罪無疑也歸生或疑於可免故以治歸生則宋罪自見非重歸生而輕宋也陳氏曰歸生為正卿而宋有無君之心非歸生孰禁之於歸生乎謀先然而弗禁則賊由歸生而已矣故歸生之弒公子宋啓之不以罪宋而罪歸生張氏曰歸生位為上卿久執大權國事由己乃不能鎮服姦邪遏絶萌蘖又脅於邪謀撓而從之位尊責重故春秋定為戎首以戒大臣不能持正而阿附惡人者所以示國討之法而明事君之義也永嘉吕氏曰宋欲弒而不敢發先以語歸生則歸生必有以制其可否之勢勢在歸生而輕以徇人其為首惡宜矣臨川吳氏曰左傳所載事迹猥陋疑不可信蓋歸生貴戚之卿秉國重權嗣君新立必有所不獲於其君者因宋之有邪謀陽為畜老憚殺之言隂實假手於宋以除其君此亂臣之首而宋特其從也愚按十年傳載鄭人討幽公之亂斫歸生之棺而逐其族則鄭人當時已以歸生為首罪矣赤狄侵齊惠髙氏曰以齊之強而連年為狄所侵則惠公之無政可知矣秋公如齊惠公至自齊君行告至常事不書宣公比毗志反下同年如齊而皆致者危之也此年明年九年十年四朝齊十年又弔齊惠公之喪皆書至張氏曰危之者與桓二年公至自唐同意夫以篡弒謀於齊而取國遂得臣如齊以土地賂齊而請會齊取濟西田會平州以卑屈事齊而求安髙氏曰公始即位公子遂季孫行父一嵗而三聘齊至是亟朝於齊謹事大國以自固也上不知有天王下不知有方伯惟利交是奉而可保乎髙固之事亦殆矣故比年如齊而皆致以戒後世之欲利有攸往者惟義之與比為可安耳愚按宣公以篡得國上不畏司馬九伐之誅下不畏鄰國大夫沐浴之請固以始謀於齊繼薦賄焉而惠公援之甚力為足恃也而不知彼能制吾死生之命安危榮辱係於齊君大夫嚬笑之頃明年髙固使齊侯止公宣公得不甚懼矣乎盟會之書至始於桓公之盟唐朝大國而屢書至始於宣公之如齊春秋蓋危桓公之不得返而又嘆其不見討也冬楚子莊伐鄭襄左傳鄭未服也杜氏曰前年楚侵鄭不獲成故曰未服髙氏曰中國諸侯不問鄭國弒君之罪而楚子興兵以討之所以病中國也張氏曰楚自去年至十年侵伐鄭者凡五至十一年盟鄭辰陵而鄭又徼事晉於是明年圍鄭入之遂敗晉於邲而後鄭復楚晉之不振有自來矣王氏曰三年楚侵鄭稱人此年伐鄭復稱爵何也三年所伐者穆公也此年所伐者襄公也穆公捨楚歸晉則討之為無名襄公為弒君者所立不討賊盟主不能問而楚莊伐之是中國之君不若蠻荆之知類矣故曰進楚子所以傷中國也丁定王巳三年五年晉成三齊惠五衛成三十一蔡文八鄭襄公堅元年曹文十四陳靈十杞桓三十二宋文七秦桓公榮元年楚莊十春公如齊惠夏公至自齊左傳書過也杜氏曰往朝見止厭尊毁列辱其先君而於廟行飲至之禮故書以示過愚按宣公五如齊唯此年踰時始返經雖諱止公之迹而比事觀之其實亦不可掩矣然則宣公之朝齊皆有危殆之憂而此行尤甚也秋九月齊惠髙固來逆子叔姬左無子字左傳齊髙固來逆女自為也故書曰逆叔姬卿自逆也榖梁傳諸侯之嫁子於大夫主大夫以與之來者接內也杜氏曰適諸侯稱女適大夫稱字所以别尊卑也不書女歸降於諸侯按左氏公如齊髙固使齊侯止公請叔姬焉杜氏曰留公強成婚書夏公至自齊秋齊髙固來逆子叔姬莊二十七年傳大夫非君命不越境齊髙固莒慶以大夫即魯而圖昏備書以示譏罪宣公也其曰來者以公自為之主范氏曰來者謂髙固固齊之大夫而與君接婚姻之禮稱子者或謂别筆列反於先公之女也趙氏曰時君之女故加子字以别姑姊妹愚按春秋書子叔姬者三餘不書子恐非皆姑姊妹諸侯嫁女於大夫主大夫以與之者為去聲體敵也范氏曰婚禮主人設几筵于廟以待迎者諸侯大夫尊卑不敵故使大夫為之主而公自為之主壓於涉反或作厭損也尊毁列卑朝廷慢宗廟矣夫以鄭國褊小楚公子圍之貴驕強大來娶于鄭子産辭而卻與却同之使館于外欲野賜之幾不得撫有其室昭元楚公子圍聘于鄭且娶于公孫假氏將入館鄭人惡之使子羽與之言乃館于外既聘將以衆逆子産使辭曰以敝邑褊小不足以容從者請墠聽命令尹使對曰君辱貺寡大夫圍謂圍將使豐氏撫有而室若野賜之是委君貺於草莾也而宣公以魯國周公之後逼於髙固請婚其女強上聲委禽焉昭元公孫黑強委禽焉注禽鴈也納采用鴈而不能止惟不知以禮為守身之幹是以得此辱也春秋詳書為後世鑒欲人之必謹於禮以定其位不然卑巽妄説音恱曲禮禮不妄恱人不近於禮奚足逺去聲恥辱哉論語恭近於禮逺恥辱也髙氏曰髙固之娶叔姬之嫁齊許之來魯與之婚皆非禮也家氏曰閭巷之人為強有力者脅之而昏且猶不受况於堂堂之侯國乎脅而求昏已為不可而又以大夫伉禮於國君所以陵暴魯國者甚矣宣公用齊之力篡弒得國固不以是為辱魯之宗社重為之辱矣嗚呼以千乘之國涕出而女於吳且猶羞之而况於女鄰國之大夫者乎春秋書之責魯也責齊也正髙固陵犯之罪也臨川吳氏曰宣公負篡國之罪倚齊以安數朝數聘卑身事齊猶以為未甚至齊之臣強娶其女甘心與之而不敢違自為之主如敵體然蓋身為不義故忍恥忍辱而屈於人下如此曹子臧吳季札強與之國義不肯受不降其志而常伸於人上者果何人哉劉氏曰穀梁云不正其接內故不與夫婦之稱非也不曰逆女别於逆君夫人者也叔孫得臣卒莊叔也子僑如嗣是為宣伯內大夫卒無有不日者以春秋魯史也其或不日則見音現恩數之略爾仲遂如齊謀弒子赤叔孫得臣與之偕行文十八在宣公固有援如字立之私其恩數豈略而不書日是聖人削之也君臣父子妃妾適音嫡庶人道之大倫也方仲遂以殺適立庶往謀於齊而與得臣並使去聲下同也若懵模揔反然不知其謀或知之而不能救則將焉音煙用彼相去聲矣春秋治子赤之事專在仲遂以其內交宫禁外結強鄰大惡無所分也而叔孫得臣有同使于齊之罪故特不書日以貶之若曰大夫而不能為有無者不足加以恩數云爾何氏曰不日者知公子遂欲弒君為人臣知賊而不言明當誅程子隱元傳大夫卒或日或不日因舊史也冬齊惠髙固及子叔姬來榖梁傳及者及吾子叔姬也為使來者不使得歸之意也左氏曰反馬也禮嫁女留其送馬不敢自安及廟見音現成婦遣使去聲反馬本杜氏注孔氏正義天子諸侯嫁女留其乘車髙固反馬則大夫亦留其車留車妻之道也反馬壻之義也婦至質明見於舅姑若舅姑既沒則婦入三月乃祭因以三月為反馬之節舅姑存者亦當以三月反馬也法當遣使不合親行故經傳具見其事以示譏則髙固親來非禮也又禮女子有行逺去聲父母者嵗一歸寧何氏曰大夫妻嵗一歸寧今見逆逾時未易嵗也而叔姬亟來亦非禮也啖氏曰時叔姬初嫁未合歸寧故書及書來以著齊罪也大夫適他國必有君命與公事否則禮法之所禁而可犯乎啖氏曰大夫非公事與妻出境非禮也薛氏曰舍君事而從婦歸寧且非度髙固之無忌憚也惠公許其臣越禮恣行而莫遏髙固委其君踰境自如而不忌則人欲已肆矣凡婚姻常事不書髙氏曰歸寧常事不書反馬亦常事不書而書此者則以為非常為後世戒也髙氏曰子叔姬不冠夫氏者承上髙固及之也家氏曰反馬不躬至歸寧無並行髙固列國之卿而挾婦俱來前日以臣抗君猶以為未足更挾婦以要魯宣館甥之禮宣固無所慊魯之宗廟朝廷實重為之辱矣陸氏曰公羊曰言叔姬之來而不言髙固之來則不可其諸為其雙雙而俱至者按經文直書其事以見非禮爾何用曲為義乎楚莊人伐鄭襄左傳楚子伐鄭陳及楚平晉荀林父救鄭伐陳髙氏曰去冬之伐稱楚子所以譏鄭也今稱人又罪其數犯中國也家氏曰經書楚伐而不書晉救者歸生弒君晉當出師討賊今既更嵗因楚師之來而以兵救鄭是當討而不當救也晉人茍能為鄭討賊即所以存鄭楚師將不禦而自去何勞救乎張氏曰屢失機會大義不立營營救鄭以致楚人益陵諸侯携二兹晉之所以失道歟戊定王午四年六年普成四齊惠六衛成三十二蔡文九鄭襄二曹文十五陳靈十一杞桓三十四宋文八秦桓二楚莊十一春晉成趙盾衛成孫免侵陳靈左傳晉衛侵陳陳即楚故也按傳去聲稱陳及楚平荀林父伐陳經書不書者以下書晉衛加兵于陳即陳及楚平可知矣以趙盾孫免書侵即林父無詞可稱亦可知矣愛人不親反其仁治人不治去聲反其智晉嘗命上將去聲帥師救陳又再與之連兵伐鄭並元年今而即楚無乃於已有闕盍亦自反可也不內省德遽以兵加之則非義矣故林父不書伐而盾免書侵以正晉人所以主盟非其道也髙氏曰趙盾前會衛侯救陳今更與衛孫免加兵于其國故書侵以正主盟者之罪雖以陳背晉即楚亦以晉救之無功故也家氏曰陳之叛晉即楚以鄭故耳鄭穆暮年棄楚弗事而託身於中國亦望晉人有以大拯其危急曽未期年鄭有歸生之亂晉坐視莫之顧陳叛而與楚良以是耳晉成孱君政在趙氏豈能為鄭討賊然陳鄭每相視以為向背鄭賊之不討無以服陳人之心陳雖受伐而終不為晉屈也陳氏曰趙盾之罪嘗著于春秋其再見曷為無貶自宋萬而下無討賊者則凡人而已矣劉氏曰公羊自趙盾弒君何以復見弒君者趙穿也非也弒君復見者寧止盾乎榖梁云不言帥師不正其敗前事亦非也將尊師少爾夏四月秋八月螽傳去聲謂螽為穀災程子曰螽蝗也虛取於民之效也劉歆曰螽為榖災貪虞取民則螽先是公伐莒取向後再如齊伐萊軍旅數色角反下同起賦斂去聲既繁戾氣應去聲下同之矣何氏曰公伐莒取向公比如齊煩擾之所致夫善惡之感萌於心而災祥之應見音現下同於事宣公不知舍上聲惡遷善以補前行去聲之愆而用兵不息災異數見年榖不豐國用空乏卒至於改助法而稅民十五年初稅畝蓋自此始矣經於螽螟一物之變必書于䇿示後世天人感應之理不可誣當慎其所感也髙氏曰書八月者唯八月有之非歷時也螽為農災王道所重今以月書則為災不久異於以時書者矣愚按春秋書螽災者十有六而宣公之世有四焉蓋身為不義而貪暴於民是以致天災之亟數也冬十月春秋胡傳附録纂疏卷十六
