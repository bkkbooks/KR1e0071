body:
  text: 春秋胡傳附録纂疏卷十元汪克寬撰閔公名啓方莊公子年九歲即位在位二年史記名開蓋為漢景帝諱左傳閔公哀薑之姊叔薑之子也故齊人立之庚惠王十申六年元年齊桓二十五晉獻十六衛懿八蔡穆十四鄭文十二曹昭公班元年陳宣三十二把惠十二宋桓二十一秦成三楚成十一春王正月公羊傳繼弒君不言即位孰繼繼子般也榖梁傳繼弒不言即位正也不書即位內無所承上不請命也莊公薨子般卒慶父夫人利閔公之幼而得立焉是內不承國於先君也按周制王哭諸侯則大宗伯為上相去聲周禮大宗伯朝覲會同則為上相王哭諸侯亦如之注謂薨於國為位而哭之未有諸侯之薨而不告于王者也如昭七年衛襄公卒齊惡告喪於周職喪掌諸侯之喪以國之喪禮涖其禁令序其事凡國有司以王命有事焉則詔贊主人注凡國謂諸侯國有司謂王有司有事謂含襚贈賵之屬詔贊者以告主人佐其受之未有諸侯之子主喪而王不遣使去聲下同者也如文元年王使叔服來會葬昭七年王使成簡公如衛弔今魯有大故不告于周閔既主喪而王不遣使是上不請命於天子也內無所承上不請命故不書即位正人道之大倫也家氏曰子般者莊之大子雖非嫡子而受命於其父般而見弒魯之大臣當以莊公諸子之長者聞於王朝請所以立今也驟扳幼子而投之以國以其為齊之甥奉桓公意而立之其立非正故春秋不書即位張氏曰閔公以幼為慶父所立初不知子般不終之故齊桓若能仗義請于天子誅哀薑慶父為之置君則君臣父子之倫定而大義明矣乃緃慶父歸其國以致閔公為弒逆者所立故不書即位亦所以纍齊桓也劉氏曰左氏云不書即位亂故也非也去年十月子般卒今已三月亂亦定矣必若亂不成禮何以能朝廟乎朝廟豈非即位乎齊人救邢左傳狄人伐邢管敬仲言於齊侯曰戎狄豺狼不可厭也諸夏親昵不可棄也宴安鴆毒不可懷也詩云豈不懷歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書齊人救邢榖梁傳善救邢也凡書救者未有不善之也據穀梁善救衛善救鄭善救許善救徐善救齊善救陳之類救在京師則罪列國子突救衛莊六是也救在外域則罪諸侯狄救齊僖十八吳救陳哀十是也救在逺國則罪四鄰晉陽處父帥師伐楚以救江文三是也救而不速救者則書所救以罪其慢叔孫豹救晉次于雍於用反榆襄二十三是也救而不敢救者則書所至以罪其怯齊侯伐我北鄙圍成公救成至遇襄十五是也愚按周禮大司馬大合軍以行禁令以救無辜伐有罪故列國有相救之義方伯有救患之權救者是則不救者非王師出救而諸侯不救外域來救而中國不救逺國往救而四鄰不救皆臯也救而譏其次則著其怠於解紛也救而譏其至則著其不及於敵也孟子曰今有同室之人鬪者救之須被髮纓冠而往救之可也同列諸侯之有兵是不異同室之人鬪也安得不投袂而起整兵赴難邪兵者春秋之所甚重衛靈公問陳孔子對曰爼豆之事則嘗聞之矣軍旅之事未之學也獨至於救兵而書法若此聖人之情見音現矣其稱人將去聲卑師少也張氏曰桓公從管仲之請而興救邢之師論語以免民左衽之功歸於管仲蓋救諸夏恤同惡皆管仲發其端也王氏曰説者謂邢被伐踰年齊方往救罪其緩也按經莊三十二年冬書狄伐邢此年正月書救邢則桓公之救未為緩矣救邢之初齊獨出兵將卑師少既而狄又入衛其勢益張齊恐其乘勝遂滅邢也於是帥諸侯之兵共救之邢幾亡而復存者小白之功也夏六月辛酉葬我君莊公左傳亂故是以緩穀梁傳莊公葬而後舉諡諡所以成德也於卒事乎加之矣愚按魯君之葬皆不過五月之期惟桓公見戕於齊九月而後葬昭公客死于外八月而後葬莊公之薨至是十有一月而始克葬蓋以國亂子弒嗣君幼弱危不得葬也説者謂子般非弒誤矣秋八月公及齊侯盟于落姑落公榖作洛左傳請復季友也齊侯許之使召諸陳公次于郎以待之榖梁傳盟納季子也杜氏曰落姑齊地季子來歸左傳嘉之也公羊傳其稱季子何賢也其言來歸何喜之也榖梁傳其曰季子貴之也其曰來歸喜之也程子傳莊公既薨子般被弒國人方危而慶父未討公子友賢而在外國人思得以安社稷故公為落姑之盟以請復之來歸書曰季子而不名異其文以嘉之也按左氏盟于落姑請復季友也其曰季子賢之也杜氏曰季子公子友之字季子忠於社稷為國人所思故賢而字之范氏曰子男子之美稱其曰來歸喜之也范氏曰大夫出使歸不書執然後致國內之人不曰來今言來者明欲遂去同他國之人也言歸者明實魯人也國人懼其遂去今得其還故皆喜曰季子來歸啖氏曰不言歸自陳齊命也自外至者為歸是嘗出奔矣據左傳奔陳何以不書莊公薨子般弒慶父主兵勢傾公室季子力不能支避難乃旦反而出奔耻也魯國方危內賊未討國人思得季子以安社稷而公為落姑之盟以請於齊則是賢也春秋欲沒其耻故不書奔欲旌其賢故特稱季子聖人之情見音現矣陳氏曰其稱季子何賢之斯不名之不名之斯以美稱稱之也季友鴆牙以立般也而慶父卒賊般於是奔陳閔公立尚幼盟齊侯于落姑請復季友未知孰為之也慶父為之則閔公不弒以閔之見弒則非慶父之意而國人為之也國人之欲歸季子以已亂也而季子雖歸俄而慶父弒閔公於是以僖適邾則國人何賢于季子微季子則慶父之篡成而莊公之統絶慶父之篡不成莊公之統不絶者季子在也是故奔陳不書如邾不書全季子也陸氏曰季友之出不書者慶父之難季子力不能正違而去之權也君立見召而來義也故聖人善其歸不譏其去以明變而得中進退不違道也臨川吳氏曰子般卒後慶父哀薑專國故季友出以避禍此時慶父秉外權哀薑為內主蓋唯恐季友之歸閔公九歲爾孰能奉之出會霸主而為國計者必魯之世臣有不當權而忠於國能如衛之石碏深謀祕計告于霸主請復季友故桓公以霸令召閔公至齊地而與之盟使若復季友之意出於齊而不出於魯故盟以要其信而使魯復之既盟之後桓公使召諸陳而閔公次于郎以待之若不敢背霸主之盟而使季友得以歸魯者季友以霸主之重則慶父不敢去之矣張氏曰邦之杌陧有親且賢孰不賴之季友遏惡於初萌子般之亂力不能討而遂去之非其罪也故魯人思之齊侯從閔公之請而召之歸魯春秋從諸侯昆弟之例特字之而書來歸所以著季子足以為國之輕重而敘魯人喜其來歸之情也隱惡而揚善舜也樂五教反道人之善惡去聲稱人之惡孔子也為于偽反下同尊者諱為親者諱為賢者諱春秋也本公羊明此可以蓄納汙音之德左宣十五川澤納汙樂與人為善矣其不稱公子見音現季友自以賢德為國人所與不緣宗親之故也堯敦九族而急親賢退嚚訟周厚本枝而庸旦仲黜蔡鮮音仙義皆在此而親親之殺所賣反尊賢之等著矣此義行則內無貴戚任事之私外無棄親用羈之失左傳昭七年單獻公棄親用羈十一年親不在外霸不在內而國不治去聲者未之有也此春秋待來世之意愚按朱子謂夫子書季子恐只是如取管仲之意但以其後來有功於社稷故取之又謂成風聞季友之繇乃事之自是大惡春秋不貶之而反褒之其書季子或是聖人因史舊文竊疑左氏所載占筮之辭多不可信茍謂季子非美之之辭然二百四十二年列國大夫惟季子髙子以子稱聖人必有深意也冬齊仲孫來左傳齊仲孫湫來省難書曰仲孫嘉之也仲孫歸曰不去慶父魯難未已公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不棄周禮未可動也君其務寧魯難而親之親有禮因重固間携二覆昏亂霸王之器也仲孫齊大夫也沙隨程氏曰書仲孫與文十五年宋華孫同愚按左傳昭四年云齊有仲孫之難而獲桓公蓋仲孫乃無知之後尊王發微以為天子之命大夫未詳是否其不稱使而曰來者略其君臣之常詞以見音現桓公使臣不以禮仲孫事君不以忠也按左氏齊侯憂魯使仲孫來省難乃旦反下同何以言使臣不以禮也鄰有弒逆則當聲罪戒嚴修方伯之職以奉天討而更居孟反使計謀之士窺覘癡亷反虛實有乘亂取國之心則使臣非以禮矣仲孫歸曰不去起吕反慶父魯難未已君其務寧魯難而親之何以言事君不以忠也陳恆弒簡公孔子沐浴而朝告於哀公請討焉豈曰齊人方強姑少待之也不勸其君急於討賊而俟其自斃則事君非以忠矣使慶父稔惡閔公再弒則桓公與仲孫始謀不臧之所致耳劉氏曰桓公不務修霸主之義討有罪扶弱國而更使智計之士覘伺虛實令慶父極惡魯君再弒此由桓公仲孫謀不臧之蔽也故奪其君臣之常辭以見君使臣不以禮臣事君不以忠聖人法之所禁也故陳恆弒其君孔子沐浴而朝告於哀公請討之豈嘗沮其君以齊人尚強待其自斃哉直書曰齊仲孫來交譏之也通旨不稱齊侯使仲孫又書曰來譏之也問魯可取者齊侯之心俟其自斃者仲孫之䇿故兩譏之以其猶曰務寧魯難而親之是以書字春秋筆法有輕重若又不書字則當時假有勸齊侯因亂以取其國者則無以貶之矣趙氏曰病桓公而嘉仲孫也陳氏曰書來譏也仲孫之來覘魯也莊公薨子般弒閔公幼落姑之盟嘗請於齊僅能復季子而已而慶父夫人之志未可知也桓公不能正􅍀然使人以覘魯曰是可取乎桓公伯諸侯將因人之難以為利書來不書事所以病桓也張氏曰仲孫歸言魯秉周禮於此見周公之澤入人者深足以維持其國於政亂俗壞之日仲孫之智善於覘國而不能輔君速行方伯之義春秋雖貶仲孫而不名以為猶有以異於傾險乘釁者之可誅也永嘉吕氏曰仲孫雖不書名直言來而罪自見矣啖氏曰公穀云是公子慶父疏之故言齊仲孫按齊之仲孫謂是魯之公子謬亦甚矣辛惠王十酉七年二年齊桓二十六晉獻十七衛懿九蔡穆十五鄭文十三曹昭二陳宣三十三把惠十三宋桓二十二秦成四楚成十二春王正月齊人遷陽杜氏曰陽國名齊人逼徙之張氏曰漢志東海郡陽都縣是其國也蓋桓公之強力施於可取者如此家氏曰齊桓遷邢義也為其有狄難輔而遷之别擇善地以為之國都霸者之所得為也遷陽事不見於傳以書法而觀亦宋人遷宿之類蓋遷小國以為附庸并兼之異名春秋所惡書以貶之曰降曰遷強其所不欲之辭也愚按陽國在今保定路唐縣齊人遷陽以力逼而遷之也不地者自是不復見也邢遷夷儀非齊遷之乃邢人自欲遷也滅談滅遂桓公初年之事也降鄣遷陽則不絶其祭祀矣存邢存衛存把則興滅繼絶之意也伯者功過不相掩此之謂也夏五月乙酉吉禘于莊公禘徒帝反左傳速世公羊傳言吉者未可以吉也曷為未可以吉未三年也三年矣曷為謂之未三年三年之喪實以二十五月其言于莊公未可以稱宫廟也吉禘于莊公何以書譏何譏爾譏始不三年也穀梁傳吉禘者不吉者也喪事未畢而舉吉祭故非之也程氏曰天子曰禘諸侯曰祫其禮皆合祭也禘者禘其所自出之帝為東向之尊其餘皆合食於前此之謂禘禮記大傳禮不王不禘王者禘其祖之所自出以其祖配之諸侯及其太祖大夫士有大事省於其君于祫及其髙祖喪服小記王者禘其祖之所自出以其祖配之禮不王不禘儀禮喪服傳諸侯及其太祖天子及其祖之所自出趙氏曰據大傳喪服小記則諸侯不得行禘禮明矣禘者帝王立始祖之廟猶謂未盡其追逺尊先之義故又追尊始祖所出之帝而追祀之以其祖配之者謂於始祖廟祭之而便以始祖配祭也此祭不兼羣廟之主為其踈逺不敢褻狎也陳氏曰詩頌長發大禘而歌玄王桓撥相士烈烈與夫武王之湯中葉之太甲雍禘太祖而歌皇考之武王烈考之文王則不兼羣廟之説其足信哉朱子曰禘是祭之甚大甚逺者若時祭及祫祭止於太祖禘又祭祖之所自出如祭后稷又推稷上一代祭之周人禘嚳是也成王賜魯重祭故得禘於周公之廟以文王為所出之帝而周公配之諸侯無所出之帝則止於太祖之廟合羣廟之主以食此之謂祫公羊文二祫祭毁廟之主陳于太祖未毁廟之主皆升合食于太祖曽子問祫祭於祖則祝迎四廟之主王制注天子諸侯之喪畢合先君之主於祖廟而祭之謂之祫後因以為常愚按公羊言大祫之禮曽子問乃時祫之禮天子禘諸侯祫大夫享庶人薦上下之殺所賣反也劉氏曰不王不禘禘之為王禮明矣王者禘其祖之所自出以其祖配之虞之所自出黃帝也而祖顓頊夏之所自出黃帝也而祖則禹商之所自出嚳也而祖契周之所自出嚳也而祖文王今魯既用天子禮樂而祖周公故其禘也則主文王矣禘者帝也帝者天子之號也諸侯不得祖天子故禘不及諸侯也天子禘諸侯祫大夫享庶人薦上下之殺也通旨諸侯有祫無禘然尊而天子卑而大夫亦間有言祫之名皆為合食於其祖而言爾非别有祫祭之禮魯諸侯爾何以有禘成王追念周公有大勳勞於天下賜魯公以天子禮樂使用諸太廟以上祀周公魯於是乎有禘祭春秋之中所以言禘郊不言祫也以上並程子語明堂位成王以周公為有勳勞於天下命魯公世世祀周公以天子之禮樂季夏六月以禘禮祀周公於太廟祭統周公旦有勳勞於天下周公既沒成王追念周公之所以勳勞者而欲尊魯故賜之以重祭大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯也然則可乎孔子曰魯之郊禘非禮也周公其衰矣見禮運朱子語春秋書郊禘大意不過見魯僣禮耳五峯胡氏曰周公立為經制辨名分於毫釐問將行之萬世而身沒犯之將行之天下而子孫違之豈非周公之衰乎通旨宗廟之禮所以祀乎其先也言天子諸侯有先也七世之廟天子之先則有天子祀先之禮五世之廟諸侯之先則有諸侯祀先之禮魯侯國而以王禮祀周公之廟則非所以事乎其先也故夫子傷之曰禘自既灌而往者吾不欲觀之或者疑之而問其説則曰不知者禘國之大事也夫子居是邦而不私議其國事於禮然也其作春秋則因事而書以志郊禘之失知其説者則知聖人之志矣禘言吉者喪未三年行之太早也何氏曰莊公薨至是適二十二月杜氏曰三年喪畢致新死者之主於廟廟之逺主當遷入祧因是大祭以審昭穆謂之禘莊公喪制未闋而吉祭又不於太廟故詳書以示譏髙氏曰初魯之喪莊公也既葬而絰不入庫門士大夫既卒哭而麻不入則當時君臣雖未終喪蓋皆吉服矣豈獨禘為然哉于莊公者方祀于寢非宫廟也左傳凡君薨卒哭而祔祔而作主特祀於主杜氏曰新主既立特祀於寢趙氏曰魯之用禘蓋於周公廟而上及文王文王即周公之所出也故此祭唯得於周公廟為之閔公僣於莊公廟行之以其不追配故直言莊公而不言莊宫明用其禮物耳不追配文王也愚按檀弓虞祭之明日祔于祖父曽子問卒哭成事而後主各反其廟注云先祔之祭名然則莊公葬已踰年主當祔廟但不當吉祭今曰禘于莊公蓋以吉禮特祀于寢耳一舉而三失禮焉春秋之所謹也永嘉吕氏曰魯禘非禮春秋書之則不勝書於其失禮之中又失禮焉則書之陳氏曰以其不勝譏譏其甚者耳家氏曰禘禮當行於太廟今禘于莊公將屈太祖羣廟之主而就莊公以行禮乎則為屈尊從卑悖於禮者也若特於莊公而不及太祖羣廟之主烏在其為審諦昭穆乎此失禮中之失禮若夫以諸侯而用天子之禮魯國行之已久不足譏矣張氏曰魯禘非禮蓋雖先王所賜而止可用於周公之廟趙氏程氏言之詳矣今喪未三年主未遷祔嗣君幼弱而以吉禮盛樂用於神主忘哀僣上反易人心何秉禮之有此蓋出於哀薑慶父樂哀謀篡而為之又非他日僣禮之所得比矣臨川吳氏曰莊公薨喪未二十七月而遽吉祭僣用禘禮之盛樂非别有所追享而降莊公為配食也其時閔公幼事出亂臣淫妻之所為無知不孝非禮非義而其名非實一舉而五惡具書法五字諸罪畢見真聖筆也秦溪楊氏曰閔公喪未畢竊禘之盛禮以行吉祭又不於周公之廟而禘之禮始紊僖公八年用禘禮合先祖敘昭穆用致夫人於廟而禘禮始與祫混淆而無别春秋常事不書特書閔公僖公兩禘者記失禮之始也魯之有禘行於周公之廟已非禮矣况僣用之於莊公又禘于太廟以致妾母可以謂之禮乎四時之祭有禘之名蓋禮文交錯之失趙氏曰周禮記四時祭名云春祠夏礿秋嘗冬蒸公羊亦同毛詩云礿祠蒸嘗于公先王協韻故云爾其實祠礿嘗蒸禘非時祭之名王制祭統春礿夏禘祭義春禘秋嘗鄭玄注皆云夏殷禮周以禘為殷祭故更名春祭曰祠郊特牲春禘而秋嘗鄭注禘當為禴夫禮記諸篇或孔氏之後末流弟子所撰或是漢初諸儒私撰之以求購金皆約春秋為之見春秋禘于莊公遂以為時祭之名見春秋唯兩度書禘一春一夏所以或謂之春或謂之夏各自著書不相符會鄭玄不達其意故主異説且祭統篇末云成王追念周公賜之重祭郊社嘗禘是也何得云夏殷禮哉左傳云蒸嘗禘于廟又云禘于武宫僖宫襄宫又晉人云以寡君之未禘祀蓋見經書禘于莊公以為諸廟合行之皆妄引禘文但據經文不識經意所以云爾愚按閔公禘以五月乃夏之春三月僖公禘以七月乃夏之夏五月故記禮者或云春禘或云夏禘以禘之時交互不同遂誤為時祭且魯祭非禮其祭祀之時皆未可據以為當也如桓公五月蒸乃夏之三月八月嘗乃夏之六月亦可謂春蒸夏嘗乎然先儒所論禘禮程子與文定父子以為合祭宗廟之主而朱子師友從趙氏以謂不兼羣廟之主矣朱子謂程先生云禘是禘其祖之所自出併羣廟之主皆祭之恐未然顧古禮盡亡不可詳老趙氏據記之大傳小記程子因漢儒之説而分禘祫其謂禘為合祭與不合祭雖不同然皆推其始祖所自出而非諸侯所得祭也若纂例譏左氏妄引禘名以經證之所云禘于武宫經止書有事云禘子僖公而經書從祀則不可信明矣其曰晉人禘祀而又録晉人之言曰魯有禘樂茍諸國皆有禘則曷為唯魯一國有禘樂耶劉氏曰公羊公未可以稱宫廟非也此直就莊公主耳秋八月辛丑公薨公羊傳不地隱之也何隱爾弒也孰弒之慶父也穀梁傳不地故也按左氏初公傅奪卜齮魚綺反田公不禁慶父使卜齮賊公子武闈音韋魯史舊文必以實書據晉董狐書趙盾弒君齊太史書崔杼弒君其曰公薨不地者仲尼親筆也陳氏曰魯之春秋固書曰公子慶父弒公于武闈聖人修之曰公薨諱之也遇弒君父之大哀也則何忍言之是故書薨而不地且不葬薨十二公所同也不地不葬隱閔所獨也然則雖諱而亂臣賊子之獄具矣觀於刪詩在諸國則變風皆取在魯則獨編史克之頌魯頌小序季孫行父請命于周而史克作是頌愚按朱子謂魯無變風非夫子所削故左傳所記當時列國賦詩及吳季札觀周樂皆無曰魯風者今考圃生之杞臧之狐裘皆諷刺之詩或魯人不陳其詩或夫子所刪耳或問吾黨有直躬者其父攘羊而子證之則曰吾黨之直者異於是父為去聲下為父同子隱子為父隱直在其中矣朱子注父子相隱天理人情之至也後世緣此制為五服相容隱之條以綴骨肉之恩前地節四年詔曰自今子首匿父母妻匿夫孫匿大父母皆勿坐邢氏曰今律大功以上得相客隱告言祖父者入十惡春秋有諱義蓋如此禮記明堂位稱魯之君臣未嘗相弒者蓋習於經文而不知聖人書薨不地之旨故云爾然則諱而不言弒也何以傳信於將來曰書薨以示臣子之情不地以存見弒之實何為無以傳信也凡君終必書其所如路寢小寢髙寢臺下楚宫之類獨至於見弒則沒而無所其情厚矣其事亦白矣非聖人能修之乎後世記言之士欲諱國惡則必失其實如漢平帝紀稱帝崩不言莽弒直書無隱又非臣子所當施之於君父也如魏髙貴鄉公紀稱成濟前刺帝刃出於背而春秋之法不傳矣張氏曰凡人於其父祖之罪惡尚不忍肆言之聖人書父母國之惡豈可同於他國而不隱乎然諱國惡者臣子之禮存事實者傳信之法聖人之經兩存禮法以垂訓萬世故不徒隱諱而已而不書地以變其常又比事屬辭以見其實將使後人因例啓疑考究始末以知莊公不能正身齊家致後嗣再弒國幾滅亡雖欲諱之而實不可掩矣愚按或謂不地固見其弒終無以著亂賊之罪夫君薨必書地使後世習其讀而問其傳察隱閔所以不地之由則亂賊之罪無所逃矣况羽父再不氏於隱薨之前夫人孫慶父奔比書於閔薨之後鈇鉞之誅顯然于筆削之間矣或又謂慶父已殺何以不書葬今考慶父諡共而公孫敖為卿則慶父之誅不以賊討是以不書葬如宋閔公之例耳劉氏曰公羊云殺公子牙今將爾季友不免慶父弒二君何以不誅將而不免遏惡也既而不可及緩追逸賊親親之道也非也季子力不能誅故遁逃他國爾設令季子力能誅之則慶父誅死矣榖梁云不書葬不以討母葬子也亦非也所謂君弒賊不討不書葬言比其葬時向賊未討則不書葬也葬在討賊之後則葬得書此陳靈公是已不以討母葬子何足為義乎九月夫人薑氏孫于邾孫音遜左傳共仲通於哀薑哀薑欲立之閔公之死也哀薑與知之故孫于邾榖梁傳孫之為言猶孫也諱奔也夫人稱孫聞乎故也不去起吕反姓氏降文薑也范氏曰文薑有殺夫之罪重哀薑有殺子之罪輕此輕重之差陳氏曰文薑無妻道哀薑無母道故文薑一見貶絶之哀薑再見而後貶絶也莊公忘親釋怨無志於復讎春秋深加貶絶一書再書又再書屢書而不諱者以謂三綱人道所由立也忘父子之恩絶君臣之義國人習而不察將以是為常事則亦不知有君之尊有父之親矣莊公行之而不疑大臣順之而不諫百姓安之而無憤疾之心也則人欲必肆天理必滅故叔牙之弒械成於前慶父之無君動於後圉人犖卜齮之刃交發于黨音掌氏武闈之間哀薑以國君母與音預聞乎故而不忌也愚按莊公之娶哀薑納幣觀社逆女屢往以致其勤丹楹刻桷用幣以示其侈而哀薑不與公偕至悍然驕狠之態已見於薦舍之時矣蓋哀薑習聞文薑淫姣禍賊之行而莊公不能防間則於莊公乎何有是以通乎共仲而無羞惡之心與弒閔公而無惻隱之心實莊公不知防微謹始有以致之也然哀薑孫邾不去薑氏者文薑孫于宗國不削姓氏不足以見其罪哀薑孫于邾雖不去姓氏而絶之之意已著矣當是時魯君再弒幾至亡國其應去聲不亦􅉃七感反痛也乎春秋以復讎為重而書法如此所謂治之於未亂保之於未危不可不察也臨川吳氏曰哀薑不奔齊而奔邾者蓋有淫行與弒謀身負二惡自歉於心而畏齊桓故不敢歸齊也公子慶父出奔莒左傳成季以僖公適邾共仲奔莒乃入立之以賂求共仲于莒莒人歸之及密使公子魚請不許哭而往共仲曰奚斯之聲也乃縊公子出奔譏失賊也陳氏曰宋萬奔陳雖殺之不書慶父奔莒雖殺之亦不書所以嚴佚賊之責也閔公立而季子歸何以見弒慶父主兵日久其權未可遽奪也季子執政日淺其謀未得盡行也趙氏曰慶父弒子般季子不誅之者季子威令未著力不能爾非不討也設以聖人處之期音基月而已可矣季子賢人而當此能必克乎及閔公再弒慶父罪惡貫盈而疾之者愈衆季子忠誠顯著而附之者益多外固強齊之援去聲內協國人之情正邪消長展兩反之勢判矣然後夫人不敢安其位慶父不得肆其姦此明為國者不知圖難於其易去聲下同為大於其細雖有智者亦不能善其後矣世儒孫氏發微或言用魯之衆因齊之力以戮慶父其勢甚易而季子不能故書夫人孫邾慶父奔莒所以深惡去聲其緩不討賊則非也以絳侯勃之果陳平之無誤見揚子將相並去聲交歡而內有朱虛外連齊楚以制諸吕庸人宜易於反手然太尉已入北軍士皆左袒猶恐不勝未敢訟言誅之也史吕后紀后崩諸吕欲為亂朱虛侯以吕祿女為婦知其謀隂告其兄齊王襄令發兵已為內應諸吕使灌嬰擊齊嬰與齊楚連和以待吕氏變共誅之平勃令紀通持節矯內勃北軍復劫酈商令其子寄説吕祿解印以兵授勃勃入軍門令曰為吕氏右禮為劉氏左袒軍皆左袒吕産欲入宫為亂至殿門弗得入徘徊往來勃尚恐不勝未敢訟言誅之注訟音公云誦説也况於慶父巨姦七百之侯國革車千乘明堂位成王封周公於曲阜地方七百里革車千乘而三十年執其兵柄自莊二年帥師其植根深矣其耳目廣矣其用物𢎞矣昭七蕞爾國而三世執其政柄其用物也𢎞矣而以為戮之其勢甚易此未察乎難易遲速之幾者也經書莊公忘親無復讎之志使百官則而象之亦不知有君父也而又使慶父主兵失馭臣之道是以至此極故書孫邾奔莒為後世之永鑒也通旨問慶父弒二君何以不貶其公子與翬同曰翬不稱公子者為戒貴戚之卿主兵擅權之漸慶父書出奔罪自見矣髙氏曰先書公薨而繼書孫邾奔莒則知夫人薑氏公子慶父實弒公也張氏曰慶父與哀薑謀弒閔公欲自立而不遂此魯國秉禮之驗也方季友適邾之時使魯國無人安能逐薑氏慶父哉季友既立僖則當正慶父之罪致辟于甸人以致兩弒其君之討乃以賂求于莒不許其入而已又立孟氏與叔牙同無輕重之别豈非邦憲之失歟愚按慶父繼弒兩君勢傾魯國顧不能置君以自託而避罪出奔者蓋人人黨惡以為利則亂賊肆行而無忌憚人人知大惡之當討則亂賊無所容其身使無圉人犖卜齮之釁則子般閔公之禍未若是之亟也使季友適邾而龜蒙曲阜之衆無石碏雍廪之謀則共仲之奔亦未若是之速也然則慶父之奔蓋自知罪大惡極有所畏於魯人之討與伯國之誅而不得不奔耳然魯人求慶父于莒既至而縊當書刺慶父以正討賊之法今但書奔而不志其死則見魯人之不能以賦討矣慶父之立後不異於叔牙而公孫敖為卿無以異於公孫兹則魯人必納慶父之喪矣不書喪歸與穆伯異者豈非聖人以共仲弒逆罪非敖比而削其喪歸以絶之歟陸氏曰穀梁云其曰出絶之也按例大夫奔皆言出不可别為義冬齊髙子來盟公羊傳髙子齊大夫也何以不名喜之也何喜爾正我也莊公死子般卒閔公弒曠年無君設以齊取魯曾不興師徒以言而已矣桓公使髙子將南陽之甲立僖公而城魯或曰自鹿門至于爭門者是也或曰自爭門至于吏門者是也魯人至今以為美談曰猶望髙子也穀梁傳其曰來喜之也其曰髙子貴之也盟立僖公也不言使不以齊侯使髙子也程子傳髙子來省難然後盟盟未前定也稱髙子善其能恤魯髙子齊大夫也子者男子之美稱其稱子賢之也杜氏曰蓋髙傒也齊侯使來平魯亂僖公新立因遂結盟故不稱使魯人貴之故不書名子男子之美稱何賢乎髙子莊公薨子般卒閔公弒慶父夫人亂乎內魯於是曠年無君齊桓公使將去聲南陽之甲至魯而謀其國其命髙子必曰魯可取則兼其國以廣地魯可存則平其亂以善鄰非有安危繼絶一定不可易之計也髙子至則平魯難乃旦反定僖公魯人賴焉以為美談至于久而不絶曰猶望髙子也何氏曰久闊思相見者引此為喻美談至今不絶聖人美其明人臣之義得奉使去聲之宜特稱髙子以著其善其不曰齊侯使之者權在髙子也劉氏曰魯君弒國亂上下莫相安齊桓公驁然有取魯之心使髙子將南陽之甲而至者非伐之也非正之也非聘弔之也髙子能深執忠臣之義勉其君於霸因事制宜立僖公而盟之魯國遂安以此見權在髙子髙子之為人臣忠也從義不從命矣常山劉氏曰不稱使者齊侯使髙子來視魯而未定盟髙子至而後結盟也陳氏曰不言使其誼有君之所不及也王氏曰魯危而復安者內則季子外則髙子其功一也春秋內外大夫之美者莫過於二子故皆以子稱也陸氏曰不書使髙子奉使合宜受命不受辭義與楚屈完來盟不書使同愚按仲孫髙子之來皆所以窺魯經皆不稱使皆不稱名而傳有豫奪之異者蓋仲孫但言來則見其徒來覘魯國之虛實不能弭其亂也髙子言來盟則見其不貪魯國之土地而遂能定其難也况比事觀之則仲孫來之後而閔公弒夫人孫慶父奔紛紛靡寧髙子盟之後則僖公立哀薑誅而魯國無事矣雖然仲孫字而不名則亦未足深責特無善之可録未若髙子之安危繼絶有庸於魯耳又按來盟不稱使者三皆非前定然髙子定難而存魯國屈完服義而從中國皆美之也華孫私交而無君命則貶之也事同而褒貶不同者宋魯無事而華孫私來結盟則罪也春秋屬辭之義以考上下文而觀之劉氏曰公羊云不稱使我無君也非也齊髙子楚屈完文義一也且慶父出奔則僖公已立髙子稱來盟則僖公之盟也何謂我無君乎盟于蔇齊無君文不沒公即魯無君何故沒齊侯哉十有二月狄入衛懿左傳狄人伐衛衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰及狄人戰于熒澤衛師敗績遂滅衛文公為衛之多患也先適齊及敗宋桓公逆諸河衛之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬于曹齊侯使公子無虧帥車三百乘甲士三千人以戍曹歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三百兩衛康叔之後蓋北州大國狄何以能入乎臣昔嘗謂河南劉奕曰史氏記繁而志寡文中子史之失自遷固始記繁而志寡如班固書載諸王淫亂等事東平思王通姦梁王立與姑姦之類盡削之可也奕曰必若此言仲尼刪詩如牆有茨鶉音純之奔奔桑中諸篇鄘風牆有茨刺公子頑蒸於宣薑桑中言淫奔之事鶉之奔奔亦刺宣薑何以録於國風而不削乎臣不能答後以問延平楊時時曰此載衛為狄所滅之因也故在定丁佞反之方中之前龜山楊氏曰衛之淫恣醜惡乃禍亂之所從始肇於晉而成於朔其禮先亡而國隨之矣因以是説考於歷代凡淫亂者未有不至於殺身敗家而亡其國者也如齊莊陳靈蔡景之殺身秦吕不韋漢梁冀之敗家晉賈后淫亂隋煬蒸陳夫人之亡其國唐髙宗武后中宗韋后玄宗楊貴妃皆幾至滅亡然後知古詩垂戒之大而近世有獻議王安石乞於經筵不以國風進讀者殊失聖經之旨矣張氏曰衛之滅非特懿公好鶴失人心自惠公即位宣薑淫恣耽樂忘政習實為常公又重之亡形已具故狄人一至而渙然離散國隨以亡非齊桓救而封之則康叔之後無噍類矣桓公迎其遺民立文公而為之建國家社稷此所以止書入也以衛為春秋初之大國才五十年淪於亡滅故治國必先齊家而淫亂之禍不篡則滅可不戒哉愚按衛書入而不言滅或以桓公不能攘戎狄故為之諱或以為美桓公能存之故不書滅不以纍桓公蓋桓公始雖不能却戎狄於衛未滅之先而猶能存衛於狄既滅之後其於興滅繼絶亦庶幾焉然此乃言外之意比事考之春秋凡滅而書入者或不有其地或雖有其地而不絶其祭祀也狄入衛秦人入滑楚子入陳吳入郢皆不有其地者也公及齊鄭入許雖有其地而不絶其祀也宋滅曹而書入則惡曹陽之自取滅亡而不豫之以亡國之善詞又春秋之變例也鄭棄其師左傳鄭人惡髙克使帥師次于河上久而弗召師潰而歸髙克奔陳鄭人為之賦清人公羊傳棄其師者何惡其將也鄭伯惡髙克使之將逐而不納棄師之道也榖梁傳惡其長也兼不反其衆則是棄其師也按鄭詩清人刺文公也髙克好呼報反利而不顧其君文公惡烏路反下同之而不能逺于萬反下同使克將去聲兵禦狄於境愚按左氏不言禦狄蓋鄭之君臣以禦狄使克而實無却狄之志也陳其師旅翺翔河上久而不召衆散而歸髙克奔陳公子素惡髙克進之不以禮文公退之不以道危國亡師之本故作是詩見小序朱子曰孔氏以是詩為公子素所作然則進之當作之進觀此則鄭棄其師可知矣髙氏曰鄭伯以百姓之命授匪其人非棄而何蓋人君之使臣也知其賢而使之則功必成不知其不賢而使之則事必敗夫不知其不賢而過使之至於敗事君子猶曰君不知之當自罪耳况已知其不賢而強使之不獨陷其身又棄其民乎張氏曰舜授禹之辭曰后非衆罔與守邦夫宗廟社稷主之於君守之以人君與一國之人蓋一體也今以欲逺所惡之人而舉一國之衆付之度外存亡死生舉不關其心當時如楚如狄方有狡焉啓疆之心一旦乘罅搗虛則鄭必束手就亡矣臨川吳氏曰子曰以不教民戰是謂棄之古人視民如赤子故平日教之習戰一旦不得已而用之於軍旅欲其完師而歸一無所損也今鄭無戰鬪之事乃使其臣將兵于外久而弗得歸致其衆潰散非棄其民而何哉或曰髙克進不以禮曷不書其出奔以貶克為人臣之戒而獨咎鄭伯何也曰人君擅一國之名寵殺生豫奪惟我所制爾使克不臣之罪已著按而誅之可也情狀未明黜而逺之可也愛惜其才以禮馭之可也烏有假以兵權委諸境上坐視其失伍離散而莫之恤乎然則棄師者鄭伯乃以國稱何也二三執政股肱心膂本書君牙休戚之所同也不能進謀於君協志同力黜逐小人而國事至此是謂危而不持顛而不扶則將焉音煙用彼相去聲下同矣晉出帝時景延廣專權諸藩擅命及桑維翰為相出延廣於外一制書所敕者十有五鎮無敢不從者五代桑維翰傳出帝即位延廣用事與契丹絶盟維翰言不入隂使人説帝曰制契丹而安天下非維翰不可乃出延廣於河南拜維翰中書令樞密使魏國公事無巨細一以委之數月之間百度寖理一制書指揮節度使十五人無敢違者以五季之末維翰能之而鄭國二三執政畏一髙克不能退之以道何政之為書曰鄭棄其師君臣同責也家氏曰不責髙克而責鄭君與其用事之臣以髙克不足責也陸氏曰夫人臣之義可則竭節而進否則奉身而退髙克進退違義見惡於君罪亦大矣不書其奔其意何也曰髙克見惡於君其罪易知也鄭伯惡其卿而不能退之以禮兼棄其人失君之道也故聖人異其文而深譏之也陳氏曰髙克奔陳不書不足書也是故以鄭伯克假為義則太叔不書奔以天王出居手鄭為義則王子帶不書奔愚按齊人殱于遂自殱也鄭棄其師自棄也梁亡自亡也胡子髠沈子逞滅自滅也若曰非有能殱其衆非有能敗其師非有能亡其國滅其身者耳比事以觀而知春秋示人自責之意深矣春秋胡傳附録纂疏卷十
