body:
  text: 春秋胡傳附録纂疏春秋類提要臣等謹案春秋胡傳附録纂疏三十卷元汪克寬撰克寬字德輔一字仲裕祁門人泰定丙寅嘗中浙江鄉試次年㑹試見黜遂不再出是書前有克寬自序稱詳注諸國紀年諡號可究事實之悉備列經文同異可求聖筆之真益以諸家之說而禆胡氏之闕遺附以辨疑權衡而知三傳之得失然其大旨終以胡傳為宗考元史選舉志延祐二年定經義經疑取士條格春秋用三傳及胡安國傳虞集序中亦及其事蓋兼為科舉而設陳霆譏其以魯之郊祀為夏正復以魯之蒸嘗為周正是亦遷就胡傳不免騎牆之一證然能於胡傳之說一一考其援引所自出如注有疏於一家之學亦可云詳盡矣明永樂中胡廣等修春秋大全其凡例云紀年依汪氏纂疏地名依李氏㑹通經文以胡氏為據例依林氏其實乃全勦克寬此書原本具在可以一一互勘也乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋胡傳附録纂疏原序仲尼假魯史寓王法春秋之義立矣然聖人之志有非賢者所能盡知是以三家之傳有時而戾夫二百四十二年行事亦多矣非聖人從而筆削之則綱常之道或幾乎熄託之空言可乎遊夏深知夫子之志而未嘗措一辭孟氏發明宗㫖辭簡而要左氏考事精暗於大義公榖疏於考事義則甚精胡氏托三家之長而斷之以理漢唐諸儒奧論蓋深有取間若有未底於盡善者豈猶俟於後之人歟吾宗德輔年妙而志强學優而識敏濳心經傳嘗名薦書於是遍取諸說之可以發明胡氏者疏以成編觀其取舍之嚴根究之極亦精於治經者歟豫嘗病世之學者勦塵腐矜新竒竊附作者之列奚可哉德輔學有原委而纂集之志思欲羽翼乎經傳可尚也峕至元再元之四年嵗在戊寅春三月一日新安汪澤民序昔之𫝊春秋者有五家而鄒夾先亡學春秋者據左氏以記事以觀聖筆之所斷而或議其浮華與經意逺者多矣是以公榖據經以立義專門之學尚焉唐啖趙氏師友之間始知求聖人之意於聖人手筆之書宋之大儒以為可與三傳兼治者明其能専求於經也然傳亡存者惟纂例等書意其傳之所發明無出於所存之書者清江劉氏權衡三傳得之為多而其所為傳用意奧深非博洽於典禮舊文者不足以盡明之是以知者鮮矣蓋嘗竊求於先儒之言以為直書其事而義自見斯言也學春秋者始有以求聖人之意而無附㑹糾纒之失矣程叔子所謂時措之宜為難知者可以求其端焉胡文定公之學實本於程氏然其生也當宋人南渡之時姦佞用事大義不立苟存偏安忠義憤怨內修之未備外攘之無䇿君臣父子之間君子思有以正其本焉胡氏作傳之意大抵本法於此蓋其學問之有原是以義理貫穿而辭㫖無不通類例無不合想其發憤忘食知天下之事必可以有為聖人之道必可以有立上以感發人君天職之所當行下以啓天下人心之所久蔽區區之志庶幾夫子處定哀之間者乎東南之人賴有此書雖不能盡如其志誦其言而凛然猶百十年至其國亡志士仁人之可書未必不出於此也然其為學博極羣書文義之所引不察者多矣國家設進士科以取人治春秋者三傳之外獨以胡氏為說豈非以三綱九法赫然具見於其書者乎而治舉子業者掇拾緒餘以應有司之格既無以得據事直書之㫖又無以得命德討罪之嚴無以畣聖朝取士明經之意新安汪德輔以是經舉于浙省其歸養也能取胡氏之說考其援引之所自出原類例之始發而盡究其終謂之春秋纂疏其同郡同氏前進士叔志父詳序之夫讀一家之書則必盡一家之意所以為善學也推傳以達乎經因賢者之言以盡聖人之志則吾於德輔尤有取也至正元年辛巳七月十有八日雍虞集序先儒格言周子曰春秋正王道明大法也孔子為後世王者而修也亂臣賊子誅死者於前所以懼生者於後也程伯子曰春秋謹華夷之辨程叔子曰春秋經不通求之傳傳不通求之經又曰由堯舜至於周文質損益其變極矣其法詳矣仲尼參酌其宜為萬世王制之所折衷此作春秋之本意也觀其告顔子為邦之道可見又曰春秋已前既已立例到近後來書得全别一般事便書得别有意思若依前例觀之殊失之也或問左氏可信否曰不可全信信其可信者耳問公榖如何曰又次於左氏問左氏即是丘明否曰傳中無丘明字不可考朱子曰春秋皆亂世之事聖人一切裁之以天理又曰春秋以形而下者說上那形而上者去又曰春秋大指其可見者誅亂臣討賊子內中國外夷狄貴王賤霸而已又曰周衰王者之賞罰不行於天下諸侯强凌弱衆暴寡是非善惡由是不明人欲肆而天理滅矣夫子因魯史而修春秋代王者之賞罰是是而非非善善而惡惡誅奸諛於既死發濳德之幽光是故春秋成而亂臣賊子懼又曰春秋明王法而不廢五伯之功又曰觀其豫五伯其中便有一箇奪底意思又曰春秋十二公時各不同如隱桓之時王室新東遷號令不行天下星散無主莊僖之時桓文迭伯政自諸侯出天下始有統一宣公之時楚莊盛强主盟中國諸侯服齊服晉者亦皆朝楚及襄公之世晉悼出來整頓楚始退去繼而吳越又强入來爭伯定哀之世政皆自大夫出魯有三家晉有六卿齊有田氏宋有華向被他肆意又曰春秋初時天王尚略有戰伐之屬到後來都無了只是諸侯抗衡諸侯才不奈何又被大夫出來做大夫才不奈何又被陪臣出來做又曰春秋之作蓋以當時人欲橫流遂以二百四十二年行事寓其褒貶恰如今之事送在法司相似極是嚴謹一字不輕易問讀春秋之法曰只是據經所書之事迹而凖折以先王之道某是某非某人是底猶有未是處不是底又有彼善於此處自將道理折衷便見只是聖人言語細密要人子細斟量考索耳又曰看春秋固當以類例相通然亦先須隨事觀理反復涵泳令胸次開闊義理通貫方有意味又曰春秋一事各是發明一例如觀山水徙步而形𫝑不同又曰看春秋且須看左氏首尾意思通貫方能略見聖人筆削與當時事之大意又曰左氏說得春秋事有七八分又曰左氏曾見國史考事頗精只是不知大義公榖考事甚踈義理却精二人是經生不曾見國史又曰孔子作春秋當時亦須與門人講說所以公榖左氏得一箇源流只是漸漸訛舛當初若全無傳授如何鑿空摸得又曰公榖想得皆是齊魯間儒其所著之書恐有所傳授但皆雜以已意所以有差舛其有合道理者疑是聖人之舊又曰公榖二傳所以異者類多人名地名而非大義之所繫又曰安國春秋明天理正人心扶三綱叙九法體用該貫有剛大正直之氣又曰胡文定春秋傳大義正議論有開闔精神又曰胡文定義理正當記延平先生曰春秋且將諸家熟看以胡文定解為凖的玩味久必有㑹心卒看不得也又曰某平生不敢說春秋若說時只是將胡文定說扶持說去畢竟去聖人千百年後如何知聖人之心或云文定說得理太多盡堆在裏面曰他是恁地不是如此底也押從這理上來又曰春秋今來大綱是從胡文定說但中間也自有難穩處問文定公據孟子春秋天子之事一句作骨如此則是聖人有意誅賞曰文定是如此說道理也是恁地但聖人只是書放那裏使後世因此去考見道理如何便為是如何便為不是問於二禮書春秋未有說何也曰春秋是當時實事孔子書之後世諸儒學未至而各立已意正橫渠所謂非理明義精而治之故其說多鑿是也惟伊川程子以為經世之大法得其㫖矣然其間極有無定當難處置處今不若且存取胡氏本子與後世看縱未能盡得之然不中不逺矣又曰春秋書正據伊川說則是周正建子但非春而書春則夫子有行夏時之意而假天時以立義爾文定引商書十二月漢史冬十月為證以明周不改月此固然矣然以孟子考之則七八月乃建午建未之月暑雨苗長之時而十一月十二月乃建戌建亥之月將寒成梁之侯又自并改月號或是當時二者並行惟人所用愚按當時必有兩等語一等以周正紀之一等從當時之便故當時詩人之辭多用夏正而豳風一之日二之日乃周正又十月下云曰為改歲亦周正也如左傳僖五年卜偃曰丙之晨龍尾伏辰鶉之賁賁天䇿焞焞虢公其奔其九月十月之交乎冬十二月丙子朔晉滅虢虢公奔京師卜偃言夏正左氏紀周正秦人月令純用夏正又於季秋云為來歲受朔日乃秦正如後世度量權衡朝廷所頒雖葉舊從新然官府所用則從時君之制民間私用習俗所便或從舊或從新不能一其制度亦此類也但春秋既是國史則必用時王之正其比商書不同者後世之彌文而秦漢直書十月者則其制度之闊略耳又曰文定春秋說夫子以夏時冠月以周正紀事謂如公即位依舊是十一月只是孔子改正作春正月按今周禮有正月有正歲則周實是元改作春正月夫子所謂行夏之時只是為他不順欲改從建寅如孟子說七八月之間旱這斷然是五六月十一月徒杠成十二月輿梁成這分明是九月十月若真是十一月十二月時寒自過了何用更造橋梁臨川吳氏曰月者時王所改之月也故歲首正月或二月或三月月數之上更加王字以見此月乃周王所頒之厯按周改月數而詩之小雅四篇所稱六月十月四月二月雖是周時之詩而用夏正之月蓋夏正得天時之正行於民間者久故作詩者從舊俗稱之爾豳風七月公劉之詩也乃夏之時所作若書之周書禮之周官戴記所載左氏公榖三傳所述及孟子所言則皆周所改之月也凡例一紀年略如朱子通鑑綱目例注甲子於行上分注周王紀年始終於行下齊晉霸國衛蔡鄭曹同姓陳杞宋先代之後秦楚吳强國凡紀年始終亦分注每年之下一三傳經文互有同異陸氏釋文略見而未詳啖趙陸氏稍詳而未盡亦有與今本不合者故今所編經文以胡氏為據而詳注各傳同異增損於經文之下一近代諸儒惟胡氏發明程子之意最詳朱子稱其義理正當是以國家設科專用三𫝊及胡𫝊然三𫝊自有注疏全文故今纂疏以胡氏為主而於經下分注附録三𫝊要語或胡氏已引用則不復重出其引而不詳者或附注其間及程子𫝊并采止齊陳氏後𫝊事變始終附之經文之下諸侯見於經者皆旁注諡號以備參考地名人名則引杜氏張氏等注或諸家注義於經有所發明而不可附於𫝊者亦附於下一凡胡傳於經所書事有於首卷已發例者有見於他公而不必解者有可以推類而通者並采茅堂胡氏寧所録通㫖及諸家𫝊注有相𥙷益者附之一凡胡傳引本經前後事證及諸經子史並注本末於各傳之下一凡諸先儒之說但順經意編次不以時之先後為序一三傳或與經意不侔則摘其最著者引啖趙辨疑劉氏權衡附於後一通經類例書法精微間附管見或近世新說有過求者頗推廣先儒之說以辨同異並以愚按别之一經文音反多本陸氏釋文其係類隔者僭更之𫝊文各隨本義音注如應字本平聲處字本上聲覆字本去聲之類始見音之而曰後放此字義之稍難見者亦間釋之蓋為初學者設爾凡音釋各注本字下不俟句絶省文也一近年書肆刋本多有漏誤並以胡傳舊本考定改正如隱三年外盟㑹作宋盟㑹成六年民著於君臣之義作明著之類克寬謹按春秋傳注無慮數十百家至子程子始求天理於遺經作傳以明聖人之志俾大義炳如日星微辭奧㫖瞭然若視諸掌胡文定公又推廣程子之說著書十餘萬言然後聖人存天理遏人欲之本意遂昭焯於後世愚嘗佩服過庭之訓自幼誦習至治壬戌從先師可堂吳先生受業於浮梁之學官朝夕玩繹若有得焉顧每自病謏見寡聞而於類例之始終證據之本末莫能融貫而旁通之乃元統甲戌教導郡齊講劘之暇因閲諸家傳注采托精語疏于其下日積月羡㑹崒成編非敢以示同志蓋以私備遺忘云爾竊嘗伏讀聖人之經一事之筆削一言之增損一字之同異無非聖心精微之攸寓而酌乎義理之至當如殊㑹一也而㑹王世子則書及以㑹以卑㑹尊之辭也所以尊儲君也㑹吳則書㑹以㑹以此㑹彼之辭也所以外裔夷也同盟一也而新城雞澤獨於公㑹諸侯之下書某日同盟蓋新城乃趙盾主盟而雞澤單子與盟故皆書日以繫同盟之上所以謹其瀆君臣之分而異之也楚成使宜申獻捷戰泓圍宋皆貶書人所以賤僣竊而㑹盂書爵于陳蔡鄭許曹君之上以著其爭霸之實蓋不書爵則疑非楚君昭公失國㑹鄟陵如齊如乾侯其返雖不告廟皆書公至所以存君而必繫居于鄆蓋不言居鄆則疑于復國通諸二百四十二年於例中見法例外通類諸如此者遽數之不能終區區一得之愚不逭僭躐而輒附焉至元丁丑嘗求訂定於宗公叔志先生以為足以羽翼乎經傳畀之序引明年值鬱攸之變斷簡煨燼漫不復存越三年辛巳搜輯舊聞往正是于邵菴虞先生頗加獎勵并題卷端克寬自揆淺陋奚敢管窺聖經賢傳之萬一然詳注諸國紀年諡號而可究事實之悉備列經文同異而可求聖筆之真益以諸家之說而禆胡傳之闕遺附以辨疑權衡而知三傳之得失庶幾初學者得之不待遍考羣書而辭義粲然亦不為無助也至正六年倉龍丙戌二月甲寅後學新安汪克寬謹書于富川任氏書孰引用姓氏左氏傳外傳公羊傳榖梁傳董子仲舒漢廣川春秋繁露賢良䇿劉氏向左傳注五行傳賈氏逵左傳注服氏䖍左傳注鄭氏𤣥成康三傳異同論徐氏邈榖梁傳注江氏熙榖梁傳注何氏休公邵任城公羊傳注許氏慎重叔說文杜氏預凱元晉左傳注范氏寧子武順陽榖梁傳注郭氏象莊子注孔氏頴達唐左傳正義楊氏士勛榖梁傳疏徐氏彥公羊傳疏啖氏助佐叔春秋纂例微㫖辨疑趙氏匡循伯同前陸氏淳同前陳氏嶽春秋折衷論李氏瑾春秋指掌義何氏濟川春秋本㫖齊氏春秋㫖要劉氏炫春秋規過盧氏同玉川春秋摘微王氏春秋箋義程子頥叔正伊川河南春秋傳易傳遺書張子載厚子橫渠大梁正蒙邵子雍夫堯康節河南皇極經世書朱子熹晦元晦菴新安四書集注通鑑綱目語録義文集傳易本詩集安定胡氏瑗之翼安定海陵春秋論孫氏復復明泰山春秋傳尊王發微劉氏敞父原公是清江春秋傳意林三傳權衡髙郵孫氏覺老莘春秋傳經社要義常山劉氏絢夫質春秋傳蘇氏轍由子潁濵眉山春秋傳尹氏焞語孟集義宋氏春秋新義襄陵許氏翰春秋解蜀孫氏抃春秋吳郡朱氏長文春秋通志黎氏釙春秋經解劉氏本春秋中論任氏公輔春秋明辨鄭氏樵仲漁春秋地名譜髙氏閲崇抑息齊四明春秋集注陳氏傅良君舉止齊永嘉春秋後傳陵陽李氏闕沙隨程氏逈久可春秋解吕氏本中居仁春秋解東萊吕氏祖謙伯恭春秋集解王氏葆光彥春秋集傳南軒張氏栻夫敬廣漢語孟注薛氏季宣士龍永嘉春秋經解張氏洽德元主一清江春秋集注林氏堯叟唐翁左傳句解勉齊黃氏幹卿直三山續儀禮通解九峯蔡氏沉默仲書集傳信齊楊氏復秦溪續儀禮通解項氏安世平庵江陵春秋家說永嘉吕氏大圭朴鄉春秋或問輔氏廣卿漢潜庵四書吳興沈氏棐伯文春秋比事吳郡李氏琪竹湖春秋世紀家氏鉉翁則堂春秋傳文定公春秋通例文集吳先生仲迂可翁可堂番易春秋紀聞經傳發明新安羅氏願良存齊端爾雅翼臨川吳氏澄清草廬伯春秋纂言總例鼎峯趙氏良鈞春秋釋義新安俞氏皋逺心春秋集傳鄱陽萬氏孝恭春秋百問鄱陽馬氏端臨貴與竹村文獻通考五峯胡氏宏仲文定公子仁建安文集茅堂胡氏寧仲宏之弟和春秋通㫖資中黃氏澤望楚春秋補注雙峯饒氏魯輿伯廣信石洞紀聞建安葉氏采近思録注丹陽洪氏興祖慶善春秋本㫖
