body:
  text: 春秋胡傳附録纂疏卷十二元汪克寛撰僖公中癸襄王酉四年十有二年齊桓三十八晉惠三衛文十二蔡穆二十七鄭文二十五曹共五陳宣四十五卒把成七宋襄三秦穆十二楚成二十四春王三月庚午日有食之夏楚人滅黄左傳黄人恃諸侯之睦于齊也不共楚職曰卣郢及我九百里焉能害我楚滅黄春秋滅人之國其罪則一而見滅之君其例有三以歸者既無死難乃旦反之節又無克復之志貪生畏死甘就執辱其罪為重許斯頓牂作郎反之類是也出奔者雖不死於社稷有興復之望焉託於諸侯猶得寓禮郊特牲諸侯不臣寓公其罪為輕弦子温子之類是也若夫國滅死於其位是得正而斃毗祭反焉者矣於禮為合於時為不幸若江黄二國是也張氏曰書滅見楚人之强中國不救而其君死於其位其書滅者見音現荆蠻之強罪諸夏之弱責方伯連帥去聲之不修其職使小國賢君困於强暴不得其所公羊子所謂亡國之善詞上下之同力者也何氏曰言滅者臣子與君戮力一心共死之辭愚按江黄二國之滅皆不書以其君歸亦不書其君奔者葢君臣同力效死以守而待中國之救也故滅不書伐而黄則書伐江則書圍齊不救黄其罪可知晉雖救江而所以救之者非其道與不救無以異也秋七月冬十有二月丁丑陳侯杵臼卒杵公作處宣公也在位四十五年世子欵嗣是為穆公甲襄王戌五年十有三年齊桓三十九晉惠四衛文十三蔡穆二十八鄭文二十六曹共六陳穆公欵元年把成八宋襄四秦穆十三楚成二十五春狄侵衛左傳十二年春諸侯城衛楚丘之郛懼狄難也齊桓公為陽榖之㑹是肆于寵樂音洛其行去聲荒矣楚人伐黄而救兵不起是忽于簡書其業怠矣然後狄人窺伺斯義反中國今年侵衛明年侵鄭近在王都之側淮夷亦來病把而不忌也伯益戒于舜曰無怠無荒四夷來王見大禹謨蔡氏𫝊朝夕戒懼無怠於心無荒於事則治道益隆四夷之逺莫不歸往此至誠無息帝王之道春秋之法也齊桓晉文若此類者其事則直書于䇿其義則游聖門者黙識於言意之表矣故曰仲尼之徒無道桓文之事者張氏曰楚既滅黄而莫之恤狄侵衛之師所以肆行也臨川吳氏曰方狄之強桓公未嘗膺之管仲猶存伯業方盛狄人猶敢肆行伐邢入衛而滅温况今管仲已亡霸業浸衰則狄之無所顧憚固其宜也夏四月葬陳宣公公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹左傳㑹于鹹淮夷病把故且謀王室也秋為戎難故諸侯戍周齊仲孫湫致之穀梁傳兵車之㑹也杜氏曰鹹衛地東郡濮陽縣東南有鹹城愚按濮陽縣屬今大名路開州十一年楊拒泉臯伊雒之戎同伐京師入王城焚東門王子帶召之也十二年王以戎難討王子帶子帶奔齊此謀王室為戎難也秋九月大雩冬公子友如齊張氏曰陽穀寗毋及鹹之㑹其後公子友皆如齊葢伐楚服鄭城縁陵之事魯皆同之亦以見友之専魯政也乙襄王亥六年十有四年齊桓四十晉惠五衛文十四蔡穆二十九卒鄭文二十七曹共七陳穆二把成九宋襄五秦穆十四楚成二十六春諸侯城縁陵左傳諸侯城縁陵而遷把焉不書其人有闕也公羊傳孰城城把也曷為城把葢徐莒脅之然則孰城之桓公城之曷為不言桓公城之不與諸侯専封也穀梁傳其曰諸侯散辭也聚而曰散何也諸侯城有散辭也桓德衰矣杜氏曰縁陵把邑張氏曰漢書地理志北海營陵臣瓉曰春秋謂之縁陵今濰州昌樂縣愚按今屬益都路濰州昌邑縣齊桓公城三國而書詞不同城楚丘則没諸侯而不書城縁陵則書諸侯而不序城邢則再序三國之師何也邢以自遷為文故再列三師而書城邢者美其得救患分災之義無封國之嫌也淮夷病把諸侯㑹于鹹城縁陵而遷把焉杜氏曰把辟淮夷遷都於縁陵不言城把杞未遷也則其事専矣故前目後凡直書諸侯而不序也范氏曰直曰諸侯無大小之序孫氏曰諸侯不序者㑹鹹諸侯也陳氏曰但曰諸侯者不繋之伯者之辭也但曰大夫者不繫之君之辭也臨川呉氏曰元年齊以救邢之諸侯城邢同在一年諸侯猶且再叙今以㑹鹹之諸侯城縁陵各在一年而不重叙者齊桓伯業之衰矣衛為狄滅東徙渡河野處漕邑桓公使公子無虧戍以甲士歸其祭服乘繩證反馬凡為國之用其力尤勤其功尤大其事尤専而春秋責之尤重曰城楚丘而不書諸侯正王法也是故以功言之則楚丘為大以義言之則城邢為美春秋之法明其道不計其功正其義不謀其利者也詳著城邢之師而深没楚丘之迹貴王賤霸羞稱桓文以正待人之體也明此則知曽西不為管仲深畏仲由之說矣劉氏曰諸侯不専封専封而善僅可以贖過故平其文不使伯者獨享其功為人之迷於義而乃以専封為德也専封而不善是冒王法而又勤諸侯故異其文以見伯者之罪於専封而又有不善焉皆貴王賤霸羞稱桓文之意比縁陵於城楚丘之功則楚丘善而縁陵不善矣比楚丘於王者之義則桓公救過之不給奚暇稱賢哉春秋貴義不貴惠貴正不貴功略小善而優大節以正待人而已矣張氏曰城縁陵之事葢與楚丘同而當是時齊桓拯救諸夏之志怠矣故經書詳不如城邢略不如楚丘亦輕重之權衡也蜀杜氏曰書城邢以國言之者善其救患全人之國也楚丘縁陵以一邑言之者謂其専封而不與之也永嘉吕氏曰城縁陵不如城邢楚丘不如縁陵故以楚丘縁陵之例觀之當書曰城夷儀而乃曰城邢楚丘者衛之楚丘縁陵者把之縁陵也以城邢之例觀之當書曰城衛城把而乃曰城楚丘城縁陵葢邢遷于夷儀固邢之夷儀也諸侯城邢得救災恤鄰之道也故詳書而不殺予之也衛已滅而諸侯城楚丘以封衛故不曰城衛而曰城楚丘把未遷而諸侯城縁陵以存把故不曰城把而曰城縁陵以諸侯而封諸侯非王法也楚丘之城没諸侯而不書諱之也若縁陵之城則以淮夷病把之故而為之城以遷之獨未至如衛之已滅而後封之也故但曰諸侯而不序則其功亦有不足録者矣愚按存把之功器用不具城池未固不若城邢之美故不再序諸侯然把未滅特不待其自遷而城縁陵以遷之未如封衛之専故諸侯以凡舉而不削葢城縁陵之義不若城邢而功亦劣於楚丘也陸氏曰公羊云曷為城把滅也孰滅之葢徐莒脅之按明年楚伐徐諸侯救徐其謬可知家氏曰把未聞受兵而公羊以為既滅葢前此城衛城邢皆在於既亡既潰之後故亦以為已亡左氏所謂病把者得其實矣夏六月季姬及鄫子遇于防使鄫子來朝鄫似綾反穀作繒後同公羊傳鄫子曷為使乎季姬來朝内辭也非使來朝使來請已也穀梁傳遇者同謀也來朝者來請已也朝不言使言使非正也以病鄫子也張氏曰鄫國禹後姒姓漢屬東海郡晉屬琅琊今沂州承縣東北有鄫故城又有鄫山愚按沂州今屬汴梁路春秋内女適人者明有所從則繫去聲諸國若把伯姬是也紀伯姬紀叔姬把叔姬郯伯姬宋伯姬蕩伯姬皆已適人者也其未適人者欲有所别筆列反下同則書其字若子叔姬是也文十二年子叔姬卒及僖九年伯姬卒皆未適人而書字者也季姬書字而未繫諸國其女而非婦亦明矣及者内為志内女而外與諸侯遇譏魯也朝不言使言使非正何氏曰使者臣為君銜命文也鄫子國君而季姬使之朝病鄫也魯秉周禮男女之際豈其若是之甚乎葢魯公鍾愛其女使自擇配故得與鄫子遇於防而遂以季姬歸之爾有孟光之德有伯鸞之賢後漢梁鴻傳孟光擇對不嫁年三十父母問其故曰欲得賢如梁伯鸞者鴻聞而聘之及嫁以裝飾入門鴻不答光請曰竊聞夫子髙義簡斥數婦妾亦偃蹇數夫矣今而見擇敢不請罪鴻曰吾欲裘褐之人可與俱隱深山爾光更為椎髻著布衣共入山中以耕織為業肅宗聞之求鴻不得變而不失禮之正則猶可矣不然非所以為愛而厚其别也故稱及稱遇稱使罪魯與鄫以正男女之禮為後世戒也孫氏曰季姬上無歸鄫之文則是未嫁者此年適防明年九月歸鄫是季姬先與鄫子遇而後嫁也此季姬之行不正可知矣何氏曰禮男不親求女不親許魯不防正其女乃使要遮鄫子淫佚使來請已與禽獸無異故卑鄫子使乎季姬以賤之張氏曰僖公愛女而使自擇配鄫子聽其使而朝魯請之夫婦之始而不正如此書之所以譏僖公之不父鄫子之不夫季姬之不子且不婦也臨川吳氏曰未嫁之女而與鄫子私相邂逅是淫奔也姬既私遇之後使鄫子朝魯而請婚姬不足責也僖公不能正家如此何以居人上乎王氏曰鄭徐吾犯之妹美使之自擇所配至於兄弟相殘以亂鄭國之政魯秉周禮而季姬與鄫子道淫如此僖公正始之道亦可愧矣愚按春秋書及及者為主以季姬為主則其與鄫子遇而使來請已可知矣啖氏曰左氏謂季姬鄫子之夫人公怒鄫子不朝季姬使之朝按稱季姬明魯未嫁女也若是鄫夫人不當與鄫子遇又明年歸于鄫明此時鄫子請娶之若言魯之處女不當與諸侯㑹則文姜哀姜淫佚至甚劉氏曰若實來寧何故再書其歸乎把伯姬來何以不書歸乎永嘉吕氏曰范寗謂魯女無故逺㑹諸侯此亦事之不然然春秋之世閫闕不嚴男女之别亂如文姜比年出㑹里巷匹婦尚或恥之則季姬出遇恐有此事然女子許嫁笄而字書曰季姬則字也婦人書字許嫁之辭也豈其許嫁于鄫而未歸于鄫故遇之而使來請已乎何休謂季姬許嫁于邾而季姬及鄫子遇使來請己未知何據秋八月辛卯沙鹿崩公羊傳何以書記異也穀梁傳林屬於山為鹿沙山名也無崩道而崩故志之也其日重其變也杜氏曰沙鹿山名平陽元城縣東有沙鹿土山在晉地愚按在今平陽路霍州趙城縣沙鹿晉地也卜偃曰朞年必有大咎國㡬亡詩稱百川沸騰山冢崒崩十月之交朱子傳山頂曰冢崒崔嵬也山崩川溢災異之大者言西周之將亡也書沙鹿崩於前書獲晉侯於後雖不指其事應去聲而事應具存此春秋畏物之反常為異使人恐懼修省之意也其垂戒明矣董子曰國家將有失道之敗而天乃先出災異以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至此見天心仁愛人君而欲止其亂也李氏瑾曰服䖍曰沙山名鹿山足林屬山曰鹿漢書元后傳云后祖王翁孺自東平陵徙魏郡元城元城郭東有五鹿之墟即沙鹿也孫氏曰鹿山足也謂山連足而崩爾詩山冡崒崩猶以為異此異之甚也趙氏曰公羊云外異不書此何以書為天下記異也凡山崩不繋國者以其自有常處不比隕星退鷁也劉氏曰名山大澤不以封諸侯守之山不可以繋國也聖人庸能獨知沙鹿崩為天下異乎又曰沙鹿河上之邑亦非也此自山名之不須繋山者以可知故也如禹貢桐柏積石皆不繫山愚按文定以梁山崩言為天下記異則沙鹿之崩疑亦非止一國之異矣狄侵鄭張氏曰狄數犯畿内之諸侯而齊桓不能治自入衛伐邢滅温而至此霸圖弱而王室卑諸侯受禍著桓公之怠也冬蔡侯肸卒肸許乙反穆公也父獻舞見獲于莘莊十九年留卒於楚而立在位二十九年子甲午嗣是為莊公劉氏曰穀梁云諸侯時卒惡之也非也臣子慢則赴不具日月春秋不改者因文以見也若必以惡此君則鄭厲衛惠何不惡之哉丙襄王子七年十有五年齊桓四十一晉惠六衛文十五蔡莊公甲午元年鄭文二十八曹共八陳穆三杞成十宋襄六秦穆十五楚成二十七春王正月公如齊張氏曰公十年朝齊此又朝齊純用五年一朝之制同於事天子之禮矣愚按杜預謂諸侯五年再相朝禮也何休謂合古五年一朝之義皆非是周制諸侯之邦交但曰世相朝安得以五年為合禮乎楚人伐徐左傳楚人伐徐徐即諸夏故也臨川吳氏曰徐夷也首僣王楚亦夷也次僣王徐楚同惡者也因齊桓之合諸侯匡天下徐亦革面而即諸夏以即諸夏而為楚所伐可悲也夫三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘左傳盟于牡丘尋葵丘之盟且救徐也穀梁傳兵車之㑹也鄭氏曰牡丘齊地與匡近齊語築五鹿中牟葢與牡丘以衛諸夏之地注四塞諸夏之關也遂次于匡榖梁傳遂繼事也次止也有畏也范氏曰畏楚杜氏曰匡衛地在陳留長垣縣西南愚按今屬汴梁路睢州襄邑縣公孫敖帥師及諸侯之大夫救徐帥公作率後同左傳孟穆伯帥師及諸侯之師救徐諸侯次于匡以待之穀梁傳善救徐也何氏曰大夫不序者起㑹上大夫君已目故臣凡也内獨出名氏者臣不得因君殊尊省文别尊卑也杜氏曰敖慶父之子楚都于郢距徐亦遠郢在江之南乃今之江陵徐在淮之北乃今之徐州楚之伐徐必越宋陳蔡諸國之境而舉兵伐徐暴横去聲憑陵之罪著矣徐在山東與齊宻邇以封境言之不可以不速救家氏曰齊之救徐非専為存徐計亦自為也徐近於齊楚人伐之所以震齊之鄰其為謀深矣楚人得志於徐則必乗勝造齊之南境以形勢言之非有餽糧越險之難也今書盟于牡丘見音現下同諸侯救患之不協矣張氏曰葵丘之盟諸侯既聽命矣此為楚人伐徐而合諸侯即驅之討楚救徐可也又從而盟之諸侯不一故也人心已一而復貳非伯主救災恤患之心怠而人始懈乎君子屢盟亂是用長此心之盛衰霸業之所從而盛衰也霸主諸侯之心皆疑不足以保徐斷可知矣書次于匡見霸主號令之不嚴矣何氏曰言次者譏諸侯緩于仁恩既約救徐而生事次止不自往遣大夫往卒不能觧也書大夫帥師而諸侯不行見桓德益衰而從簡書安中國之志怠矣桓公倡伯四十餘年未嘗命大夫為主將今諸侯不親將而大夫帥師則救徐之役特聊且應之而不冀其成功也凡兵而書救未有不善之也救而書次則尤罪其當速而故緩失用師之義矣中庸曰至誠無息不息則久春秋謹始卒欲有國者敦不息之誠也始勤而終怠則不能久而無以固其國矣啖氏曰凡救當奔命而往救次失救道也孫氏曰言次言救者惡諸侯緩於救患也諸侯既約救徐而遣大夫往此緩于救患可知也陳氏曰救不言次言次無志於救也桓公合八國之衆以救徐而僅使大夫將則桓志荒矣卒不競於楚救而言次甚譏之也有諸侯在而使大夫將始於牡丘桓公為之也有諸侯在而使大夫盟始於雞澤悼公為之也愚按霸者之事假借仁義之名以濟其利欲之私故欲之未遂則汲汲焉謀度而經營之欲之既遂則懈惰苟且而不復能有為矣由其心偽而不誠是以始終勤怠之殊而前後盛衰之異也孟子言以力假仁者霸又曰五霸假之也假之一字得春秋誅心之法矣四年公孫兹帥師及諸侯之師侵陳列序諸國則書㑹此不言㑹而言及既㑹而後及也非主魯之辭也與襄三年書叔孫豹及諸侯之大夫及袁僑盟之意同不獨言大夫若曰受命其君故書諸侯以統之葢當時諸侯雖以其權畀之大夫而春秋之法必欲其權繋於諸侯也夏五月日有食之左傳不書朔與日官失之也秋七月齊師曹師伐厲左傳伐厲以救徐也杜氏曰厲楚與國義陽隨縣北有厲鄉張氏曰兵法攻所必救厲在徐楚之間欲楚之必救以解徐也然繼此楚敗徐于婁林則厲在所不必救明年不克救徐而還况同盟不同心而宋已伐同役之曹矣髙氏曰諸侯大夫救徐而齊侯獨帥曹同伐厲厲雖可討然非所以救徐也見强楚之難禦而中國之威已頓矣愚按厲在今峽州路隨州此伐厲以救徐與伐楚救江正同然春秋不書以救者厲近徐而楚遠江則齊桓之用兵猶愈於陽處父也八月螽榖梁傳螽蟲災也九月公至自㑹公羊傳桓公之㑹不致此何以致久也范氏曰莊二十七年盟幽傳曰桓㑹不致安之也此致者齊桓德衰故危而致之髙氏曰以㑹致者始於此春秋致㑹凡二十有七公自正月如齊因而㑹盟暴師于外已踰三時而以㑹致見救徐之無功也季姬歸于鄫臨川呉氏曰鄫子請娶季姬僖公許之至是始歸也劉氏曰杜云來寧不書此書者明中絶非也傳云止之豈絶之哉魯人為國諱醜雕斵止之之說以求揜其迹仲尼作經推例以知義因文以盡情主人習其讀而不知學者原其事而知之此類是也己卯晦震夷伯之廟左傳震夷伯之廟罪之也於是展氏有隱慝焉公羊傳震之者何雷電撃夷伯之廟也何以書記異也穀梁傳震雷也夷伯魯大夫也震者雷電擊夷伯之廟也不曰夷伯之廟震而曰震夷伯之廟者天應去聲之也本程子天人相感之際微矣夷伯者魯大夫也大夫既卒不名杜氏曰夷伯魯大夫展氏之祖父夷諡伯字大夫既卒書字穀梁以為因此見音現天子至于士皆有廟天子七廟諸侯五大夫三士二祭法王立七廟曰考廟王考廟皇考廟顯考廟祖考廟有二祧諸侯立五廟曰考廟王考廟皇考廟顯考廟祖考廟大夫立三廟曰考廟王考廟皇考廟適士二廟曰考廟王考廟官師一廟曰考廟王考無廟故德厚者流光徳薄者流卑范氏曰德厚者位尊道隆者爵重故天子遠及七世士祭祖而已是以貴始德之本也始封必為祖范氏曰契為殷祖棄為周祖愚按大夫之祖如公子展為展氏之祖公子彄為臧孫氏之祖之類張氏曰正蒙曰凡隂氣凝聚陽在内者不得出則奮擊而為雷霆不善之積葢亦如此然天之怒擊毎在於惡稔而人不加誅之後春秋書震者惟此事爾詩云敬天之怒無敢戱豫敬天之渝無敢馳驅昊天曰明及爾出王昊天曰旦及爾游衍君子知天之日監而畏其威如此所以事天也夾漈鄭氏曰公子展之子曰公孫夷伯范氏曰夷伯之廟過制髙氏曰不曰公孫者大夫三廟宜毁而不毁故貶之也趙氏曰公穀竝云晦㝠也據十六年戊申朔隕石于宋五成十六年甲午晦晉楚戰于鄢陵竝書晦朔則知晦者晦朔之晦耳古史之體應合書日而遇晦朔必書之以為厯數之證穀梁成十六年傳云事遇晦書晦何得於此獨名晦㝠乎公羊又云夷伯季氏之孚微者稱夷伯大之也天戒之故大之按褒貶當以義類豈有為天所罰翻乃書字反於理甚矣大夫既死加諡之後不更稱名爾原仲亦是也冬宋人伐曹左傳討舊怨也襄陵許氏曰同盟始自相攻桓不能已矣張氏曰莊十四年曹從齊桓伐宋宋至今憾之今諸侯始貳曹方伐厲救徐而襄公乗虛伐之尚可繼桓而圖霸乎於此見桓德之衰而襄志之私也家氏曰宋襄於桓之方存已有圖霸之心其後執滕圍曹張本於此春秋所譏也楚人敗徐于婁林敗必邁反左傳楚敗徐于婁林徐恃救也杜氏曰婁林徐地下邳僮縣東南有婁亭張氏曰今在泗州臨淮縣書以見楚之獨勝而救徐之威不立伐厲之謀無補也陳氏曰何以書病齊也齊帥天下之諸侯以遏冦亂存中國也楚伐徐桓公合八國之衆盟于牡丘次于匡以救徐為之伐厲而徐卒敗於楚人不數年宋楚爭盟執宋公以是為盟主病矣髙氏曰齊桓大合諸侯以救徐固有餘力而師出三時無功而返故書楚人敗徐于婁林以罪之劉氏曰徐伯益之後其上世為元德顯功通於周室與中國冠帶之君無以異徐始稱王王非諸侯所當名也故貶其稱愚按徐自莊二十六年見經僖三年取舒十七年伐英氏昭五年伐吳皆稱人昭四年㑹申楚人執之三十年奔楚皆稱子獨此年與文七年伐莒竝舉號内不使與中國同外不使與荒裔等也陸氏曰穀梁云夷狄相敗志也按有赴告則書無他義家氏曰為公羊學者以徐滅把故外之然把未嘗滅也十有一月壬戌晉侯及秦伯戰于韓獲晉侯秦始見經左傳晉侯之入也秦穆姬屬賈君焉且曰盡納羣公子晉侯烝於賈君又不納羣公子是以穆姬怨之晉侯許賂中大夫既而皆背之賂秦伯以河外列城五東盡虢畧南及華山内及解梁城既而不與晉飢秦輸之粟秦飢晉閉之糴故秦伯伐晉九月晉侯逆秦師使韓簡視師復曰師少於我鬬士倍我公曰何故對曰出因其資入用其寵飢食其粟三施而不報是以來也今又撃之我怠秦奮倍猶未也公曰一夫不可狃况國乎遂使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也苟列定矣敢不承命韓簡退曰吾幸而得囚壬戌戰于韓原晉戎馬還濘而止秦獲晉侯以歸舍諸靈臺乃許晉乎十月晉隂飴甥㑹秦伯盟于王城十一月晉侯歸公羊傳此偏戰也何以不言師敗績君獲不言師敗績也趙氏曰凡戰而死者書滅生禽曰獲張氏曰韓今同州韓城縣愚按同州今屬奉元路秦伯伐晉而經不書伐専罪晉也據桓十二年戰于宋僖十八年戰于甗皆書伐獲晉侯以歸而經不書歸免秦伯也據蔡侯獻舞書以歸陳氏曰不曰以歸罪晉侯也是故獲外域不書外域交相獲不書必大國也若宋華元齊國書斯可以言獲矣將尊師衆獲之若匹夫然猶曰宋齊之恥晉甸侯也而言獲是夷晉侯於大夫也書伐書及者兩俱有罪而以及為主書伐著伐者之罪書及著被伐而及戰者之罪書獲書歸者兩俱有罪而以歸為甚書獲者罪其不能效死禦敵甘就執辱書以歸者罪其専執國君恃强不釋今此専罪晉侯之背音佩施去聲幸災貪愛怒鄰慶鄭曰背施無親幸災不仁貪愛不祥怒隣不義而恕秦伯也然則秦戰義乎春秋無義戰彼善於此則有之矣其不言師敗績何也君獲不言師敗績君重於師也何氏曰舉君獲為重也劉氏曰君將不言帥師君重於師也君傷不言師敗績君獲不言師敗績亦君重於師也三者異文同義大夫戰而見獲必書師敗績如戰于大棘書宋師敗績獲宋華元戰于艾陵書齊師敗績獲齊國書師與大夫敵也君為重師次之大夫敵春秋之法也與孟子之言何以異孟子為于偽反時君牛羊用人莫之恤也故以民為貴君為輕潜庵輔氏曰戰國時為君者不知其職視民如草芥而不知恤也故曰民為貴春秋正名定分扶問反為萬世法故以君為重師次之泰誓云元后作民父母禮記民以君為心君以民為體父母之於子心之於四體尊卑輕重之分天冠地履之不可紊故春秋以君為重堯以天下命舜舜亦以命禹必稱元后為先大禹謨舜命禹曰衆非元后何戴此經世大常而仲尼葢祖述之也惟此義不行然後叛逆之黨有託以為民輕棄君親而不顧者矣通㫖近世賊臣僣位有忍死為民之語其黨唱言偽楚能全都城百姓之命是悖春秋之法恣為暴行而不顧也愚按隋宇文化及弑煬帝唐朱玫立襄王煴皆託以為民而濟其大逆者也劉氏曰穀梁云晉侯失民矣以其民未敗而君獲也非也凡為君而見獲茍不失民將焉取之顧春秋所以不書師敗績者舉君獲為重耳丁襄王丑八年十有六年齊桓四十二晉惠七衛文十六蔡莊二鄭文二十九曹共九陳穆四杞成十一宋襄七秦穆十六楚成二十八春王正月戊申朔隕石于宋五左傳隕石于宋五隕星也公羊傳曷為先言霣而後言石霣石記聞聞其磌然視之則石察之則五穀梁傳先隕而後石何也隕而後石也于宋四境之内曰宋後數散辭也耳治也杜氏曰隕落也聞其隕視之石數之五隨其聞見先後而記之星隕如雨見星之隕於四逺而不見其在地之驗此則見在地而不見始隕之星是月六鷁退飛過宋都鷁五厯切穀作鶂過五禾切左傳六鷁退飛過宋都風也周内史叔興聘于宋宋襄公問焉曰是何祥也吉凶焉在對曰今兹魯多大䘮明年齊有亂君將得諸侯而不終公羊傳曷為先言六而後言鷁六鷁退飛記見也視之則六察之則鷁徐而察之則退飛五石六鷁何以書記異也穀梁傳六鶂退飛過宋都先數聚辭也目治也程子曰隕石于宋自空凝結而隕六鷁退飛倒逆飛也倒逆飛必有氣驅之也春秋所書災異皆天人響應有致之之道故石隕于宋而言隕石夷伯之廟震而言震夷伯之廟此天應之也人以淺狹之見以為無應其實皆應之然漢儒言災異皆牽合不足信儒者見此因盡廢之杜氏曰是月隕石之月重言是月嫌同日鷁水鳥髙飛遇迅風而退隕石自空凝結而隕也愚按卲子曰星在地則為石石在天則為星此言隕石葢星墜於天半空凝結至地而成石也退飛有氣逆驅而飛也石隕鷁飛而得其數與名在春秋時凡有國者察於物象之變亦審矣此宋異也何以書于魯史亦見音現當時諸國有非所當告而告者矣杜氏曰宋人以為災告於諸侯故書劉氏曰人君遇怪異非常之變當内自省而已非所以告同盟也同盟有救患分災之義故水火兵戎之為敗則告告則弔之此所待於外也奇物祅變之至則天之所以警人君雖有堯湯之智反而責其躬此無待於外者也何赴告之有春秋因而書之以見人君之莫能畏天命乃反以責於己者望於人也何以不削乎聖人因災異以明天人感應去聲下同之理而著之於經垂戒後世如石隕于宋而書曰隕石此天應之也和氣致祥乖氣致異人事感於下則天變應於上茍知其故恐懼修省變可消矣宋襄公以亡國之餘欲圖伯業五石隕六鷁退飛不自省其德也後五年有盂之執又明年有泓之敗何氏曰後五年見執六年終敗如五石六鷁之數天之與人昭昭著明甚可畏也天之示人顯矣聖人所書之義明矣可不察哉張氏曰星隕為石不祥也鷁退飛不順也宋襄欲圖伯而無其德故天出怪異以警畏之通志問洪範配合庶徵有理否曰但不可泥如漢儒牽合附㑹爾春秋隕石于宋五六鷁退飛過宋都而襄公被執癸酉大雨震電庚辰大雨雪而隱公被弑雨木冰而成公季孫被執鸜鵒來巢而昭公出奔豈不是應驗是以人君須克謹天戒劉氏曰公羊謂是月者僅逮是月也不日者晦也春秋不言晦非也晦朔天之所有取朔棄晦乖偽之深者榖梁云石為無知之物故日之鷁微有知之物故月之亦非也言是月者宋不告日嫌與五石為一日故分别之耳鄱陽萬氏曰梁山沙鹿亦無知之物胡為而不日麋與􅈮亦微有知胡為而不月也陸氏曰榖梁云是月者决不日而月也按此𫝊以日月為例故云爾又曰民所聚曰都都者直謂國城爾不獨以民聚為義三月壬申公子季友卒季者其字也友者其名也大夫卒而書名則曷為稱字聞諸師因靳裁之受伊川學曰春秋時魯卿有生而賜氏者季友仲遂是也愚按劉質夫𫝊亦謂季友仲遂生而賜氏命之世為卿葢其說同出於程子也生而賜氏者何命之為世卿也季子忠賢在僖公有翼戴之勤朱子語季子賜族亦只是時君恩意襄仲弑逆在宣公有援立之力此二君者不勝音升私情欲以異賞報之也故皆生而賜氏俾世其官劉氏曰春秋譏世卿莫甚於魯魯之大夫皆世卿莫强季氏仲氏季氏出昭公仲氏弑子赤皆世卿能成其禍者也春秋異而書之主人習其讀則未知已之有罪固曰賢之爾臨川呉氏曰季友仲遂二公報其立己之恩故以其將卒賜之以氏命其子孫世世為卿經於其卒各以氏書者誌變法亂紀之端貽權臣竊命之禍其垂戒遠矣愚按宋立華氏魯立叔孫氏當時賜族率以為常春秋諸侯以殊禮異數寵遇其臣至有生而賜諡如衛靈之於北宫喜析朱鉏不特生而賜族矣永嘉吕氏曰春秋之初公之子為大夫則稱公子公子之子為大夫則稱公孫非公子公孫而為大夫則但書名自僖公以後則皆書族且使之世世為卿矣是故魯有仲孫叔孫季孫臧孫齊有髙氏國氏崔氏陳氏衛有孫氏寗氏晉有郤氏欒氏韓氏趙氏魏氏鄭有罕氏駟氏游氏皆世卿也先王之禮制蕩然矣劉氏曰公榖皆云稱季友賢也非也言季友之賢不過書季子來歸足矣死何乃復賢之乎且書季友云賢則書仲遂亦可謂賢乎夏四月丙申鄫季姬卒内女嫁於諸侯則尊同尊同則記其卒本榖梁記其卒則必記其葬然而有不記者此筆削之㫖非可以例求者也愚按内女為諸侯夫人者七惟紀伯姬宋共姬書卒葬把叔姬以出不書葬郯伯姬齊子叔姬亦出并不書卒把伯姬歸把四十餘年不書卒葬疑必有故鄫季姬違禮故卒而不葬紀叔姬非夫人以賢而卒葬之宋伯姬在家為淑女既嫁為賢婦死於義而不囘此行去聲之超絶卓異者既書其葬又載其諡僖公鍾愛季姬使自擇配季姬不能自克以禮恃愛而行雖書其卒因奪其葬所以謹夫婦之道正人倫之統明王教之始也以此防民猶有嫁殤立廟舉朝素衣親臨力尋反祖載如魏明帝之厚其女者魏志明帝紀太和六年幼女淑卒上痛之甚追諡立廟葬于南陵取甄后從孫黄合葬欲自送葬陳羣諫曰下殤禮所不備况未朞月而為制服舉朝素衣朝夕哭臨古未有此况欲親臨祖載乎上不聽秋七月甲子公孫兹卒杜氏曰兹叔牙子叔孫戴伯冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮左傳㑹于淮謀鄫且東略也城鄫役人病有夜登丘而呼曰齊有亂不果城而還榖梁傳兵車之會也杜氏曰鄫為淮夷所病淮臨淮郡左右張氏曰後漢下邳國今泗州師氏曰淮夷嘗病把而齊侯城縁陵以復把今㑹諸侯于淮豈非謀淮夷以杜其後來耶髙氏曰邢侯始與㑹而在鄭許之下者此齊次之也鄱陽萬氏曰許以男而先於邢曹邢以侯而後於鄭許聖人之作春秋從主㑹者之所為而無所改正所以著其罪也愚按淮今泗州臨淮縣桓公安攘之志至㑹淮而愈怠矣却淮夷而不力城鄫而不果況魯之僖公在㑹遽以其臣滅項而止之既不能為鄰國討强家又遷怒於其君待聲姜㑹卞而獲釋悖君臣之分紊男女之别霸事之傎莫此為甚葢㑹淮之前楚伐黄滅黄而不能恤狄侵衛侵鄭而不能遏簡於存把不若存邢之功緩於救徐不若救許之速宜淮夷之微亦肆其暴抑有所窺而動也桓㑹不至而惟牡丘于淮書至聖人之意實可見矣或謂桓公以諸侯伐淮夷魯預有功故魯頌稱既克淮夷在泮獻馘而春秋不紀其事葢削之也夫詩人之言特以此頌禱其君而願其有是功如曰居常與許復周公之宇云耳使果有伐淮夷之功安得不以伐山戎伐北戎之例而特書于經耶戊襄王寅九年十有七年齊桓四十三卒晉惠八衛文十七蔡莊三鄭文三十曹共十陳穆五把成十二宋襄八秦穆十七楚成二十九春齊人徐人伐英氏左傳齊人為徐伐英氏以報婁林之役杜氏曰英氏楚與國張氏曰臯陶後之封也桓公之興師未矣王氏曰不能病楚而徒伐其與國之小者桓之霸業微矣愚按今廬州六安州英山縣疑即英氏國桓公舍楚不討而加兵於厲與英氏虐區區之小國是縱豺狼而搏狐鼠也夏滅項左傳師滅項程子傳滅人之國罪惡大矣在君則當諱故魯滅國書取滅項君在㑹季孫所為也故不諱杜氏曰項國今汝隂項縣張氏曰項國子爵今陳州項城縣愚按今汴梁路陳州商水縣按左氏淮之㑹公有諸侯之事未歸而取項齊人以為討而止公杜氏曰諸侯之事㑹同講禮之事然則滅項者魯也二傳以為桓公滅之孰信乎考於經未有書外滅而不言國者如齊師滅譚莊十是也亦未有書内取而直言魯者如取鄟音專成六取邿音詩襄十三取鄫昭四是也陳氏岳曰凡書外事各言其國内事不言我外事如齊師滅譚齊人滅遂之類是也内事則取汶陽田取鄟取邿之類是也未有書外事不言其國未有書内事而言魯者葢言國以别内也愚按晉悼公以諸侯滅偪陽楚以諸侯滅頼因㑹柤伐吳而繼事以滅之則皆書遂由此知項為魯滅無疑矣然聖人於魯事有君臣之義凡大惡必隱避其辭而為于偽反之諱今此滅項其惡大矣曷不諱乎曰事有隱諱臣子施之於君父者也故成公取鄟襄公取邿昭公取鄫皆不言滅而書取程氏以為在君則當諱是也若夫滅項則僖公在㑹季孫所為耳執政之臣擅權為惡而不與之諱此春秋尊君抑臣不為朋黨比毗志反周之意也詳見成六年張氏曰於此見聖人文理宻察亦所以示人五刑五用必審其人然後當罪也陳氏曰公猶在齊滅項非公命也向也費伯帥師城郎非公命不書此何以書城郎常事滅項非常也是故常事譏不及公則不書茍非常則謹書之書滅項失兵權之漸也襄公在晉書邾庶其來奔昭公在晉書莒牟夷來奔雖非公命皆非常也春秋必謹而志之家氏曰僖公徳季氏擁佑之私假之以權待之不疑其後遂至不可制襄在楚而宿取卞昭在晉而意如納邾莒叛人毎乗公出而肆其無忌由此年滅項有以啟之耳啖氏曰公榖皆云齊滅之為齊桓諱也按其文義乃是魯滅豈可為齊諱而魯自取惡乎齊桓雖賢滅項非合義何得為之諱乎劉氏曰桓公與山戎戰春秋貶之降侯為人夫戰山戎孰與滅中國滅中國反可諱而戰山戎反不得諱乎秋夫人姜氏㑹齊侯于卞卞皮彦反左傳聲姜以公故㑹齊侯于卞杜氏曰卞魯國卞縣張氏曰在今襲慶府泗水縣大臣滅項而止僖公刑已偏頗又遠㑹婦人于魯地此管仲既亡桓公志荒之政也愚按泗水縣今屬濟南路兖州臨川吳氏曰此葢㑹淮之後齊獨止公將執之以歸夫人齊女也聞公見止要齊侯于路而㑹之非齊侯已歸而再出㑹姜氏也婦人無外事魯之諸夫人聲姜頗為賢婦詩人以令妻頌之而猶有此失葢稔於見聞之非盲於禮義之正是以好成人之美者惜焉髙氏曰論其情則可矣而禮則不可也小白入魯地而㑹聲姜能無嫌乎趙氏曰參譏之九月公至自會左傳九月公至書曰至自㑹猶有諸侯之事焉且諱之也杜氏曰恥見執託㑹以告廟范氏曰桓㑹不致而今致桓公德衰威信不著張氏曰公㑹諸侯而大臣滅人之國得罪於伯主反國不討無政刑矣故謹之臨川吳氏曰以夫人㑹齊侯故公於中路得釋而歸公未至齊故云至自㑹冬十有二月乙亥齊侯小白卒桓公也在位四十三年長子無虧被殺宋納公子昭立之是為孝公左傳齊侯之夫人三王姬徐嬴蔡姬皆無子内嬖如夫人者六人長衛姬生武孟少衛姬生惠公鄭姬生孝公葛嬴生昭公宻姬生懿公宋華子生公子雍公與管仲屬孝公於宋襄公以為大子雍巫有寵於衛共姬因寺人貂以薦羞於公亦有寵公許之立武孟管仲卒五公子皆求立十月乙亥齊桓公卒易牙入與寺人貂因内寵以殺羣吏而立公子無虧孝公奔宋十二月乙亥赴辛已夜殯東萊吕氏曰桓公雖能用管仲攘夷狄伯諸侯有一匡天下之功然仲無正心誠意格君之學徒急於一時之功利卒致五子之亂其所以有始無終者家法不正也管仲且有三歸之失豈能正其君哉永嘉吕氏曰伯者之興小白為盛王禁明而王臣不下聘者六十年盟㑹同而諸侯無私爭者三十年序績召陵而荆帖陳旅聶北而狄退獻捷于魯而戎難弭陳兵車于淮而淮夷畏安攘之烈前此未有也然小白一身盛衰三變伐郳侵宋侯度未一入蔡侵鄭戎疾未殄滅遂降鄣設施多舛遇榖盟扈檢防易肆此圖伯之初也貫澤而下葵丘以前衣裳不歃血兵車無大戰此定伯之日也九國叛而萌震矜管仲死而廢繩墨城把貶於城邢救徐怠於救許此成伯之後也功不掩過先儒論之當矣己襄王卯十年十有八年宋襄九齊孝公昭元年晉惠九衛文十八蔡莊四鄭文三十一曹共十一陳穆六把成十三秦穆十八楚成三十春王正月宋公曹伯衛人邾人伐齊宋公下公有㑹字左傳宋襄公以諸侯伐齊杜氏曰納孝公榖梁傳非伐䘮也夏師救齊榖梁傳善救齊也五月戊寅宋師及齊師戰于甗魚免反齊師敗績左傳齊人殺無虧將立孝公不勝四公子之徒遂與宋人戰宋敗齊師于甗立孝公而還榖梁傳戰不言伐客不言及言及惡宋也程子傳書宋及曲在宋也奉少以奪長其罪大矣齊師敗績書敗績齊臣也杜氏曰甗齊地無虧既死曹衛邾先去故宋師獨與齊戰狄救齊穀梁傳善救齊也伐齊之䘮奉少去聲奪長上聲下同其罪大故其責詳書師救齊者善魯也救者善則伐者惡矣本李氏集義髙氏曰以魯與狄之救為善則宋伐齊䘮為不正矣凡書救者未有不善之也書狄救齊者許狄也許狄人則罪諸夏矣許之曷為不稱人深著中國諸侯之罪也常山劉氏曰諸侯伐䘮不道如此狄乃能行義以兵救之聖人哀中國無王諸侯滅義以為當時惜也薛氏曰聖人與狄之救猶賢乎宋也臨川呉氏曰書師救齊於伐齊之後則救者救無虧也書狄救齊於齊師敗績之後時無虧已死齊無君矣故杜氏云救四公子之徒雖緩不及事然亦書救終美之也凡伐者為客受伐者為主公羊春秋伐者為客伐者為主何氏曰伐人者為客見伐者為主今齊人受伐以宋為主者曲在宋也何氏曰戰言及所以别主客直不直也孫氏曰宋襄伐人之喪擅易人之主故以宋主齊不與宋襄伐齊也凡師直為壯曲為老僖二十八子犯云云書齊師敗績者責齊臣也或曰桓公管仲嘗屬章欲反孝公於襄公以為世子矣則何以不可立乎曰不能制命雖天王欲撫鄭伯以從楚春秋猶以大義裁之而不與也五年桓公定王太子鄭㑹于首止王使周公召鄭伯曰吾撫汝以從楚鄭伯逃其師而歸春秋貶鄭伯書逃歸不盟桓公君臣乃欲以私愛亂長幼之節其可哉獨不見宣王與仲山甫爭魯侯戲括之事其後如之何也周語魯武公以括與戲見王王立戲仲山甫諌曰不可王卒立之武公卒魯人殺懿公而立伯御宣王伐魯立孝公諸侯從是不睦春秋深罪宋公大義明矣通㫖問宋師及齊師戰是宋公也何以書師既貶之何以不書人曰稱師見其用大衆也而貶在其中矣是以師為重以襄公為輕矣又問宋公伐齊為納公子昭也何以不書納公子昭于齊乎曰不與納也納昭非正也公伐齊納糾亦非正則何以書書納糾所以著莊公之罪也止書伐齊而不書納糾則莊公得復讎之義矣或書或不書其義自異不可不察也劉氏曰宋襄有憂中國之心伯天下之意而道不足也故合諸侯舉大衆不務率義而先為不正以矜其力此所以無功也諸侯失國諸侯納之正也不曰納公子昭于齊不與納也曷為不與納公子昭非正也王氏箋義無虧既立踰年之君也而宋人脅齊殺之將立孝公復與齊人戰四公子之徒爭國宋伐䘮皆不義也張氏曰長幼有定分桓公管仲不能自制其尊卑正否之辨而輕屬幼少以為亂階君臣既失制命之義矣今桓公未葬長子既立宋襄不能從宜因勢順其少長以撫定之使得以終桓公之䘮乃成桓之私意帥諸侯奉少奪長大亂齊國春秋書宋公以為戎首深罪之也水嘉吕氏曰桓公舍當立而屬公子昭于宋不可謂之正又蔽於雍巫之言而許立無虧不可謂之明身死之後竪貂易牙立公子無虧其名則立長也宋襄伐䘮而納公子昭其名則桓公之所屬也彼此交爭國内大亂凡皆桓公之為也春秋不書昭之當立與否而但書其戰伐敗救之事其義深矣然則昭與無虧之事孰正曰以義則無虧正桓公屬公子昭於宋以為太子則桓公之罪也劉氏曰戰于甗公羊云曷為不使齊主之與襄公之征齊也非也晉卻克及齊侯戰于鞌寧可亦曰與晉卻克之征齊乎所異於晉者何哉秋八月丁亥葬齊桓公杜氏曰孝公立而後得葬桓公九合諸侯不以兵車朱子曰九當作糾左傳展禽曰桓公是以糾合諸侯劉氏曰㑹于幽為九合之始始于幽終于淮合者九也而皆不以兵車鄱陽萬氏曰穀梁稱衣裳之㑹十有一而左氏於鄄之再㑹曰齊始霸也是北杏之㑹鄄之初㑹皆在未霸之前則桓公既霸衣裳之㑹止於九合而已或者以北杏陽穀非管仲之欲或又以鄄幽再㑹以地而言則止於九皆未免臆度之說也威令加乎四海㡬於改物昭九注改正朔易服色雖名方伯實行天子之事然而不能慎終如始付託非人柩方在殯四鄰謀動其國家而莫之恤至於九月而後葬前年十二月卒以此見功利之在人淺矣春秋明道正義不急近功不規小利於齊桓晉文之事有所貶而無過褒以此張氏曰桓公自入國以來急於功利志於富疆其處已待人皆不以正心正家為務肉不及寒而庶孽爭國宋伐其䘮冢子見殺國㡬於亡足以見伯者之不足貴而聖門不道之實矣冬邢人狄人伐衛狄始書人左傳邢人狄人伐衛圍菟圃衛侯以國讓其父兄子弟及朝衆曰茍能治之燬請從焉衆不可而後師于訾婁狄師還穀梁傳狄其稱人何也善累而後進之伐衛所以救齊也功近而徳逺矣狄稱人進之也何氏曰狄稱人善能救齊有憂中國之心故進之慕義而來進之可也逞兵威伐衛而進之可乎伐衛所以救齊也孫氏曰狄稱人善救齊衛嘗亡滅東徙渡河無所控告齊桓公攘戎狄而封之使衛國忘亡誰之賜也事在二年桓公方没不念舊德欲厚報之遽伐其䘮亦太甚矣以直報怨聖人之公也朱子註於其所怨者愛憎取舍一以至公而無私所謂直也以怨報怨天下之私也懐怨抱憤必報復而不忘乃一己之私意非聖人至公之心矣以德報怨寛身之仁也表記疏以直報怨是禮之常今以德報怨是寛愛己身之民欲茍息禍患非禮之正以怨報德刑戮之民也同上疏禮當以德報德今以怨報德其人凶惡是合刑戮至是人理亡矣桓公攘外冦安中國免民於左衽而審反諸侯不念其賜而於衛為尤先書狄救齊以著中國諸侯之罪再書狄人伐衛所以見音現救齊之善功近而德遠矣范氏曰伐衛功近耳逺人而憂中國其德遠也髙郵孫氏曰衛嘗見滅於狄而齊桓封之桓死未踰年而衛與諸侯伐之邢自以復存者桓公也於是不忍齊之見伐而衛之無恩也與狄人伐之張氏曰邢黨狄以伐衛然論其曲直則衛之忘恩背霸以伐䘮奪長直得聲罪致討之師故人狄以進之見罪衛之深也臨川呉氏曰衛伐齊䘮固有罪然非主兵首惡也邢小國黨異類伐同姓或者逼於狄之命不得已與其後衛竟滅邢其怨讎未必不基於此也髙氏曰伐衛以邢為首者衛雖有罪而邢不當與狄連兵以伐兄弟之國且不可以邢而後乎狄也庚襄王十辰一年十有九年宋襄十齊孝二晉惠十衛文十九蔡莊五鄭文三十二曹共十二陳穆七把成十四秦穆十九楚成三十一春王三月宋人執滕子嬰齊左傳宋人執滕宣公執之是非決於稱人與稱爵公羊稱侯而執伯討也稱人而執非伯討也劉氏曰執之是非决於稱人與稱侯而不繫名與不名者也而見執者則以名與不名知其罪之在也經書見執於人者悉皆不名而滕子獨名是亦有罪焉爾夫以齊桓之盛九合諸侯不以兵車雖江黄逺國猶相繼來盟而滕介側畔也齊宋之間不與音預衣裳之㑹者三十有七年及宋襄繼起又不尊事大國其見執則有由矣書名著其罪也茍為有罪其見執固宜宋何以稱人不得為伯討乎執雖以罪不歸于京師則稱人惡去聲下同其専也如成九年鄭貳於楚晉執鄭伯既不以王命又不歸京師故稱晉人孫氏曰五等之國皆諸侯也其或有罪方伯請于天子天子命之執則執之不得専執也執得其罪其罰輕執不得其罪其罰重歸于京師而執非其罪則稱人惡其濫也僖二十八晉文執衛侯歸京師為臣執君執不以正故亦書晉人髙郵孫氏曰齊桓之盛江黄之逺猶斂衽聽命而滕自幽盟之後未嘗列於衣裳之會今又不能尊事大國以取執辱故書名罪之宋襄藉齊桓之後非有德義以服諸侯肆己之强一㑹虐二君以陵轢諸夏故書人以貶之春秋不以不正治不正所以人宋而名滕子也薛氏曰宋襄執滕子以威求伯也臨川吳氏曰宋襄志左繼齊桓之伯然去春首伐齊䘮奉少以簒長今春首執滕子恃强而凌弱如此欲霸得乎葢以滕子久不與齊盟故執之以威諸侯然非有德義以服人心肆己之暴所以終於無成也愚按經書執國君者十有三惟成十五年晉侯執曹伯執得其罪又歸諸京師故以伯討與之餘皆書人悉非伯討也然見執者皆不名惟此年滕子嬰齊哀四年晉執戎蠻子赤書名葢嬰齊自外於齊盟蠻氏亂而無質故名以貶之也孫氏發微謂嬰齊名者遂失國也於義亦通夏六月宋公曹人邾人盟于曹南公作宋人范氏曰曹南曹之南鄙通旨問宋大國君在是而曹邾敢以微者來何也曰宋方求合諸侯非諸侯歸之也故君往而微者來盟陳氏曰邾文公在焉其稱人何人曹邾以貶宋也屬辭疑於北杏曷為謂之貶以明年鹿上之盟亦人宋則未嘗予宋以伯也蜀杜氏曰公羊宋稱人誤鄫子㑹盟于邾公羊傳其言㑹盟何後㑹也杜氏曰不及曹南之盟諸侯既罷鄫子乃㑹之于邾故不言如㑹臨川吳氏曰葢鄫子如㑹適遇宋公歸國及邾之境故言㑹盟于邾已酉邾人執鄫子用之左傳宋公使邾文公用鄫子于次睢之社欲以屬東夷司馬子魚曰古者六畜不相為用小事不用大牲而况敢用人乎祭祀以為人也民神之主也用人其誰饗之齊桓公存三亡國以屬諸侯義士猶曰薄德今一㑹而虐二國之君又用諸淫昏之鬼將以求霸不亦難乎得死為幸昭十一申无宇曰五性不相為用况用諸侯乎公羊傳惡乎用之用之社也其用之社奈何葢叩其鼻以血社也穀梁傳微國之君因邾以求與之盟人因已以求與之盟己迎而執之惡之故謹而日之也用之者叩其鼻以衈社也杜氏曰葢殺人而致祭臨川吳氏曰用之者殺之而用其尸為牲以祭神張氏曰葢鄫子㑹曹南之盟而後期宋公使邾執之邾鄫世仇因附勢而肆虐用之惡也觀後日戕鄫子亦出於邾則邾之虐鄫必自用鄫子而天子不誅所以復出為惡與髙氏曰宋公之盟曹南怒鄫子不至故欲用之而子魚諫焉邾人修鄫舊怨遂承其意執而用之也不然則宋修霸業邾從宋盟安敢輙戮鄫而不懼討乎宋既不討則意從可知矣宋襄圖霸而縱容同盟暴虐與國何以求諸侯乎經書鄫子與蔡世子有皆曰用之而不書所用之迹葢聖人所不忍言但曰用之則知其以人為用也惡之故謹而日之諸侯終則名鄫子不名史佚之愚按邾子稱人貶也上言㑹盟于邾則非微者明矣秋宋人圍曹左傳宋人圍曹討不服也子魚言於宋公曰文王聞崇德亂而伐之軍三旬而不降退修教而復伐之因壘而降今君徳無乃猶有所闕而以伐人若之何盍姑内省徳乎無闕而後動杜氏曰曹雖與盟而猶不服盟于曹南口血未乾音干今復扶又反圍曹者討不服也臨川吳氏曰宋襄以威迫曹而與之盟故曹不心服愛人不親反其仁治人不治去聲反其智襄公不能内自省徳而急於合諸侯執嬰齊非伯討不足以示威盟曹南非同志不足以示信卒於兵敗身傷不知反求諸己欲速見小利之過也漢景削七國而吳楚叛前鼂錯𫝊景帝即位遷御史大夫錯請諸侯之過削其支郡後十餘日吳楚七國俱反以誅錯為名上乃斬錯東市東都疾横去聲議而黨錮興後黨錮𫝊桓靈間主荒政謬國命委於閽寺故匹夫抗憤處士横議危言深論不隱豪强於是天子震怒逮捕黨人自是正直放廢邪枉熾結其死徙廢錮六七百人士類殱滅國隨以亡唐文宗切於除姦而訓注用唐書文宗始因李徳裕牛僧孺以朋黨相軋歎曰去河北賊易去朝廷朋黨難乃用李訓鄭注専執朝政不附者指為黨人而逐之上深惡宦官遂信訓注欲以詐謀除累世之姦至於血流禁署禍及忠良訓注誅上亦憤崩故子夏為莒父宰問政子曰無欲速無見小利欲速則不逹見小利則大事不成朱子註欲事之速成則急遽無序而反不逹見小者之為利則所就者小所失者大矣愚按襄公志在近小非特不能成大功雖小利亦未嘗遂僅一盟曹南而曹不服再盟鹿上㑹盂而束手就擒於荆蠻矣經書襄公不越數端而知其操心之若此者仲尼筆削推見至隱如化工賦象并其情不得遯焉非特畫筆之肖其形耳故春秋者化工也非畫筆也張氏曰齊桓之伯屈己去忿盟魯平宋以致諸侯先近故也今襄公欲圖諸侯近於宋者莫如曹滕滕既執矣曹方與盟已而復叛不從子魚内省徳之言而亟事干戈宜其不遂霸也陳氏曰此宋公圍曹也其稱人貶也宋公欲合諸侯而亟修怨於曹諸夏之圍國自是始愚按經書列國之加兵於曹者十有三而宋居其七焉葢自僖十五年間曹之以兵佐齊桓而伐之至此憤其貳乃環其國都而攻之宣三年復圍之哀之三年六年樂髠向巢再伐七年又圍之八年遂入而郛其君終滅其國比事攷之不貶而罪自見矣衛人伐邢左傳以報菟圃之役張氏曰衛不自省其從宋伐䘮之罪而以報復為事罪之也髙氏曰衛不伐狄而伐邢是以人之啖氏曰左氏寗莊子之言皆飾妄之辭也冬㑹陳人蔡人楚人鄭人盟于齊公作公㑹楚始與齊盟左傳陳穆公請修好於諸侯以無忘齊桓之德盟于齊修桓公之好也杜氏曰地以齊齊亦與盟盟㑹皆君之禮也微者盟㑹不志于春秋凡所志者必有君與貴大夫居其間也然則為此盟者乃公與陳蔡楚鄭之君或其大夫矣據左傳稱陳穆公曷為内則没公外則人諸侯與其大夫諱是盟也楚人之得與音預下得與同中國㑹盟自此始也莊公十年荆敗蔡師始見音現于經其後入蔡伐鄭皆以號舉葢外之也僖公元年改而稱楚經亦書人於是乎浸强矣然終桓公世皆止書人而不得與中國盟㑹者以齊修伯業能制其强故也桓公既没中國無霸鄭伯首朝于楚十八年鄭文公始朝于楚楚子賜之金二十二年鄭伯又如楚二十四年宋成公亦如楚其後遂為此盟故春秋没公人陳蔡諸侯而以鄭列其下葢深罪之也薛氏曰後鄭者鄭為之下也愚按陳自晉文之後服屬荆蠻雖或暫從中國而輒貳中國亦以有陳非吾事蔡自㑹狄泉以往甘心南向不與中國盟㑹鄭亦數同數異犠牲玉帛待於二竟陳蔡則屢滅於楚而僅存鄭亦困逼於楚終春秋之世又二年復扶又反盟于鹿上至㑹于盂遂執宋公以伐宋而楚於是乎大張列位於陳蔡之上而書爵矣聖人書此豈與之乎所以著楚人之强傷中國之衰莫能抗也故深諱此盟一以外楚人二以惡去聲諸侯之失道三以謹盟㑹之始也陳氏曰楚初與諸夏盟也内不言公諱之也以其人楚不可不人陳蔡以其人陳蔡不可以不没公也家氏曰序陳人為首陳倡盟也序鄭于下鄭首叛也此楚人始㑹故諱公略齊侯書法特為謹嚴不與楚人之盟中國也張氏曰㑹不書公當從左穀楚欲得志於中國久矣齊桓討而攘之其後桓志稍衰滅黄敗徐駸駸抗衡然尚有所懼也桓公既没宋襄欲圖伯而諸侯不服故楚假不忘桓德之說求參預中國之盟㑹陳蔡及鄭皆近楚而素服之者故先受其謀齊孝公親見其父極力攘楚聽其甘言納之國都而與盟僖公亦忘是懲之志偕之同歃不知非我族類其心必異楚因是以行其志於中國春秋諱公而人諸侯所以謹其始也愚按于齊之盟魯及諸侯盟楚之始也鹿上之盟外諸侯盟楚之始也故皆以微者書而深貶之㑹盂盟薄盟宋直書不諱又所以著其凌駕中國之暴而諸侯皆俛焉從之也幸而晉文城濮之㨗得以却其方張之勢晉伯不振而楚莊竊討賊之義盟于辰陵遂主諸侯于蜀之盟十有一國之大夫皆貶書人魯不諱公視盟齊雖若末減然人諸國大夫乃所以人公也厥後于宋于虢晉楚狎主齊盟而于申十有三國且用齊桓召陵之禮春秋欲諱之而有不勝諱矣是知春秋貶于齊之盟所以謹禮於微慮患於早也梁亡左傳梁伯益其國而不能實也命曰新里秦取之遂城而居之梁亡不書其主自取之也初梁伯好土功亟城而弗處民罷而弗堪則曰某㓂將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁公羊傳此未有伐者其言梁亡何自亡也其自亡奈何魚爛而亡也穀梁𫝊自亡也湎於酒淫於色心昏耳目塞上無正長之治大臣背叛民為宼盜如加力役焉湎不足道也梁亡出惡正也鄭棄其帥惡其長也杜氏曰以自亡為文非取者之罪所以惡梁梁國今馮翊夏陽縣張氏曰梁嬴姓伯爵伯翳之後梁地今同州彭城縣愚按同州今屬奉元路陸淳曰秦肆其暴取人之國没而不書其義安在曰乗人之危惡易去聲下同見也滅人之國罪易知也自取亡滅者其事微矣春秋之作聖人所以明微也本徽㫖梁本侯國魚爛而亡何哉何氏曰魚爛從内發百姓一旦相率俱去狀若魚爛易曰天行健君子以自强不息朱子本義天一日一周明日又一周非至健不能君子法之不以人欲害其天德之剛則自强而不息矣古者諸侯朝修其禁令晝攷其國職夕修其典刑夜儆百工無使慆音韜慢也淫而後即安魯語故克勤于邦大禹謨荒度待洛反土功者益稷注荒大也以大相度平治水土之功也禹也慄慄危懼湯誥檢身若不及者伊訓湯也自朝至于日中昃不遑暇食用咸和萬民者無逸文王也凡有國家者土地雖廣人民雖衆兵甲雖多城郭雖固而不能自强於政治則日危月削如火消膏以至滅亡而莫覺也而况好去聲土功輕民力本左氏湎於酒淫於色心昏而出惡政者乎本穀梁何氏曰梁君隆刑峻法一家犯罪四家坐之一國之中無不被刑其亡可立而待矣臨川吳氏曰梁伯不能君國子民以致民逃其上秦因得以取其地故不書秦滅梁而以自亡為文張氏曰梁國之亡禍由於内如魚之爛外未見而内先潰矣春秋變法以書諸侯自取滅亡者有二晉人執虞公猶言兵已加於頸而不自知也梁亡言國自亡而不之覺也李氏瑾曰書梁亡所以深惡梁非言秦得滅人國也愚按漢帝禪末年委權閹寺國無政令玩戎黷武民勞卒敝鄧艾兵至皇子諶謂當父子君臣背城一戰同死社稷而帝不聽率羣臣面縛以降朱子於網目特書漢亡亦春秋之意歟辛襄王十巳二年二十年宋襄十一齊孝三晉惠十一衛文二十蔡莊六鄭文三十三曹共十三陳穆八把成十五秦穆二十楚成三十二春新作南門左傳新作南門書不時也公羊傳何以書譏何譏爾門有古常也穀梁傳作為也有加其度也言新有故也非作也南門者法門也言新者有故也言作者創始也杜氏曰言新以易舊言作以興事皆更造之文也孫氏曰新延廐不言作此言作改舊可知其曰南門者南非一門也庫門天子臯門雉門天子應門見明堂位注天子五門臯庫雉應路魯有庫雉路疏魯之庫門制似天子臯門雉門制似天子應門檀弓魯莊公之䘮既葬而絰不入庫門書新作南門譏用民力於所不當為也髙郵孫氏曰譏其侈泰妨農功改舊制魯人為長府閔子騫曰仍舊貫如之何何必改作孔子曰夫人不言言必有中去聲臨川王氏曰改作勞民傷財在於得己則不如仍舊貫之善春秋凡用民力得其時制者猶書于䇿以見音現勞民為重事而况輕用於所不當為者乎然僖公嘗修泮宫復閟宫矣奚斯公子魚董督也其役史克頌其事詩小序季孫行父請命于周而史克作頌泮水頌僖公能修泮宫也閟宫頌僖公能復周公之宇也閟宫卒章云奚斯所作朱子傳泮水燕飲落成之詩閟宫則為僖公修廟之詩泮宫諸侯之學其東西南方有水形如半璧故曰冸宫閟深閟也宫廟也而經不書者宫廟以事其祖考學校以教國之子弟二者為國之先務雖用民力不可廢也其垂教之意深矣劉氏曰南非一門庫門天子臯門雉門天子應門南門者天子之門非諸侯之門也天子諸侯皆南面而聽政門必嚮南其來舊矣新其舊而書新作是必有僣制焉南門之僣自僖公始罪其不可為而為故曰新作二百四十二年所興作多矣不必書也僖公修泮宫詩人頌之而春秋不書泮宫諸侯之學僖公修之得其時制故不書新宫災太室屋壊災與壞不能不修而經無修之文雉門及兩觀災記新作焉吾以此數者參之修舊不足書其書者皆非禮之制也髙氏曰改舊制而増大之罪不止於勞民而已玉藻曰天子聽朔於南門之外書曰逆子釗于南門之外此天子之門也魯之舊制豈可改乎王氏曰顧命孔氏傳南門路寢門則知魯南門乃路門也魯庫雉二門既用天子之制惟路門仍舊故僖公因其弊而斥大之愚按僖公之經竝無城築上功之事則庶㡬其能愛民矣而猶有南門之役且不免於過制而僣上春秋特書新作以譏之抑責備賢者之意歟夏郜子來朝左氏二十四年傳富辰曰郜雍曹滕文之昭也杜氏曰郜姬姓國張氏曰後漢志濟隂成武北有郜城夾漈鄭氏曰郜有二桓二年取郜大鼎北郜也在今單州成武郜子來朝南郜也今單州有二郜城王氏曰郜分為南北皆附庸於宋陸氏曰公羊云失地之君也按經無異文無所據也劉氏曰若失地之君何得言朝又公羊以郜滅在春秋前按春秋以來且九十年郜子失地殆三世矣猶能自歸同姓躬行朝禮無乃不近人情乎五月乙已西宫災公羊傳西宫小寢也有西宫則有東宫矣魯子曰以有西宫知諸侯之有三宫也西宫災記異也杜氏曰公别宫何氏曰禮夫人居中宫少在前右媵居西宫左媵居東宫少在後家氏曰小寢人君燕私之地災見於是警戒深矣人君之過不在朝路臨􅊩之時而常在深宫燕處之際天之示譴豈徒然哉陸氏曰穀梁云閔宫也按謂之西宫直是僖公之西宫爾劉氏曰穀梁以僖公受國閔公繼之如君父何為不可謂之新宫以新宫近禰宫而更謂之西宫比稱謚不亦愈疏乎鄭人入滑左傳滑人叛鄭而服於衛鄭公子士洩堵冦帥師入滑髙氏曰鄭伯與滑伯同等諸侯滑服於衛遽興師而入其國必欲滑為已屬葢强之凌弱如此王氏曰滑與鄭為鄰齊桓時常與鄭同盟幽今中國無伯鄭首從楚遣二卿長驅而入滑無忌憚甚矣故略而人之張氏曰此記天王出居于鄭之始釁也秋齊人狄人盟于邢左傳齊狄盟于邢為邢謀衛難也於是衛方病邢穀梁傳邢為主焉爾何氏曰狄稱人能常與中國張氏曰書狄例以國稱而同之於齊稱人之列者昔宋伐齊喪而能救之今衛欲滅邢而狄謀存之從中國以救災恤患此君子之道故人以進之人狄則罪衛之意明矣此見聖人仁天下之公心也家氏曰甚哉齊孝之無知也桓公征楚而服之已乃與之盟于國桓公攘狄而却之已乃與之盟于邢書曰厥父菑厥子乃弗肯播厥父基厥子乃弗肯堂其齊孝之謂乎平庵項氏曰邢人狄人伐衛見邢之亂征伐也齊人狄人盟于邢見齊之亂盟㑹也愚按伐衛盟邢春秋皆以狄稱人於齊邢之下而不殊序所以深惡中國之衰也冬楚人伐隨左傳隨以漢東諸侯叛楚楚鬭穀於菟帥師伐隨取成而還穀梁傳隨國也杜氏曰隨國今義陽隨縣愚按今陜州路隨州張氏曰楚力方强隨欲復漢東諸侯于中國而徳不足以勝之此所以召兵而自屈也左氏罪其不量力不若孟子師文王之論髙氏曰隨自是服屬於楚至哀元年㑹楚子圍蔡襄陵許氏曰楚既服隨則將爭衡于上國而宋欲盟之其能詘乎壬襄王十午三年二十有一年宋襄十二齊孝四晉惠十二衛文二十一蔡莊七鄭文三十四曹共十四陳穆九杞成十六秦穆二十一楚成三十三春狄侵衛杜氏曰為邢故臨川吳氏曰中國無伯而狄得假名義以侵列國因宋曹衛邾伐齊喪則仗義興師以救齊又聲衛伐喪之罪而與邢協力以伐衛衛因邢之黨狄伐已而伐邢以報怨且憾邢未已則狄又援齊而盟以為邢謀至此遂為邢而侵衛前之伐以衛伐喪之惡有罪可數故稱伐今之侵以衛有滅邢之心無事可指故稱侵侵者言其師之無名也愚按前伐衛盟邢以狄有救患之善故稱人此復侵衛惡其浸以内侵故舉其本號也宋人齊人楚人盟于鹿上左傳宋人為鹿上之盟以求諸侯於楚楚人許之公子目夷曰小國爭盟禍也宋其亡乎幸而後敗杜氏曰鹿上宋地汝隂有原鹿縣宋為盟主故在齊楚上愚按鹿上今河南府路亳州鹿邑縣通志鹿上之盟是宋公也何以稱人齊桓攘楚以安中國宋公盟楚以求諸侯陳氏曰襄公欲合諸侯而執滕宣公使邾文公用鄫子一㑹而虐二國之君而亟與楚盟是䘮師亡身之道也臨川吳氏曰宋襄欲圖霸合諸侯而德義不足以感人曹南之盟僅能脅服至近之曹至小之邾而曹復懐貳楚之勢力足以威人盟齊而魯陳蔡鄭皆從之此宋襄所願欲而不可得者故求之於楚欲借楚之令使諸侯從已曽不思楚强夷也齊桓之霸如此其盛猶敢時出猾夏宋襄既無齊桓之德義又無楚頵之勢力乃倚楚為重欲得其所從之諸侯是求肉於虎其遭執辱也宜哉楚君既稱人則齊宋二君亦降稱人若宋齊稱爵則疑楚人為大夫矣張氏曰霸中國者宋之欲也亂中國者楚之欲也欲霸中國而求之於夷狄亂常之楚與之同盟此春秋所以列序而人之以著襄公之自取敗辱也夏大旱左傳大旱公欲焚巫尫臧文仲曰非旱備也修城郭貶食省用務穡勸分此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之是歲也飢而不害公羊傳記災也杜氏曰雩不獲雨故書旱髙氏曰言大者久且甚之辭春秋書大旱者二此夏與宣七年秋也愚按春秋歴時不雨則書不雨但一時不雨而為災則書旱莊三十一年冬不雨不曰旱者五榖既登則害於民者淺故不書旱耳秋宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂盂公作霍榖作雩或為宇楚始稱子執宋公以伐宋左傳諸侯㑹宋公于盂子魚曰禍其在此乎君欲已甚其何以堪之於是楚執宋公以伐宋公羊傳宋公與楚子期以乗車之㑹公子目夷曰楚夷國也强而無義請君以兵車之㑹往公曰吾與之約以乗車之㑹自我為之自我堕之不可終以乗車之㑹徃楚人果伏兵車執宋公以伐宋穀梁傳以重辭也程子傳宋率諸侯為㑹而蠻夷執㑹主諸侯莫違故以同執書之杜氏曰盂宋地鄭氏曰鄭地今懷孟路孟州執宋公者楚子也臨川吳氏曰楚以子爵叙侯伯之上故宋公之執不待言楚而知其為楚矣前盟鹿上後使宜申楚皆稱人此獨稱子者葢執宋公不可言執宋人宋公既爵則陳蔡鄭許曹皆須爵否則疑若君與大夫㑹五國稱爵則楚不得不稱爵何以不言楚子執之據溴梁㑹下執莒子邾子復出晉人分惡於諸侯也諸侯皆在㑹而荆蠻執其㑹主拱手以聽而莫之敢違其不勇於為義亦甚矣故特列楚子於陳蔡之上而以同執為文孫氏曰不與楚子執宋公故以諸侯共執為文所以抑强夷而存中國也陳氏曰執非伯討恒稱人齊執陳轅濤塗伐稱君執稱人晉執衛侯㑹稱君執稱人韓不信執宋仲㡬㑹稱大夫執稱人此楚子執宋公曷為不再稱楚人不以荆楚執諸夏之辭也是故執宋公不申言楚人執齊慶封亦不申言楚人猶曰諸侯執之云爾夫以楚之强豈能勝秦五國之衆何弱於趙然澠音緬池之㑹藺相如一奮其氣威信音伸敵國秦雖虎狼猶不敢動史藺相如傳秦王告趙王㑹澠池相如從及㑹飲酒秦王請趙王鼔瑟趙王鼓之相如請秦王撃缻秦王不肯相如曰五步之内相如請得以頸血濺大王矣左右欲刃之相如叱之皆靡秦王乃一撃缻秦終不能加勝於趙趙亦盛設兵以待秦秦不敢動况以五國之君而不能得志於荆楚乎宋以乘繩證切車之㑹往而楚伏兵車以執之則宋直楚曲其義已明雖以匹夫自反而縮猶不可恥矧南面之君也哉趙氏曰此楚執耳其以諸侯執之之辭何也譏諸侯也南面之君兵馬非不多也力非不足也而聽蠻夷之君執辱盟主故譏之宋公德不足懷慮不及遠而求諸侯以及於難故罪之張氏曰孔子相定公㑹齊侯此㑹中國也猶以文事不可無武備請司馬以行以楚之夷而可信其詐偽之約乎徒出約之是輕以其身溷於虎狼之羣也陳蔡鄭許曹皆中國包蠻夷執㑹主而無一人伸義以正曲直之分豈非自同於狂僭之類乎故以諸侯同執為文以罪襄公非但不識楚人譎詐之心且無以知五國之不同心而輕為是㑹也愎諌求欲以及於禍所謂愚而好自用者歟然春秋為去聲賢者諱宋公見執不少隱之何也夫盟主者所以合天下之諸侯安中夏尊王室者也宋公欲繼齊桓之烈而與楚盟㑹豈安中夏尊王室之義乎故人宋公於鹿上之盟而盂之㑹直書其事而不隱所以深貶之也髙氏曰楚自是稱子而序於諸侯之上於此見中國衰而荆楚盛也愚按執宋公以伐宋蠻荆爭伯也執衛行人北宫結以侵衛諸侯無伯也以上公之尊同於匹夫之微俛就執辱宋襄之圖伯末矣齊之盟楚序陳蔡之下鹿上之盟楚序齊下葢荆楚雖强初與中國之㑹盟猶未敢偃然自肆也至是列陳蔡之上葢有主㑹之志矣而宋襄德寡國弱欲尸盟主之權故楚頵設詐禽之而攻其國以懼中國之諸侯而取威攘伯也春秋尊中國而賤蠻荆故雖宋襄不能霸而掲宋公於㑹盟之首所以辨内外之大分也于齊鹿上楚皆書人此㑹書楚人則疑非楚君故昉書楚子四夷雖大皆曰子荆楚僣王而書之以子雖曰稱爵而抑之之意實在其中然以子爵亞於宋公而位中國諸侯之上則兩伯之伉不待春秋之終而已見矣故止齋陳氏曰宋楚初争長也楚稱子而序陳蔡鄭許曹之上不知諸侯之從楚與從宋與冬公伐邾杜氏曰為邾滅須句故王氏曰大旱經時不知貶食省用而用兵伐人非其道也楚人使宜申來獻捷公羊傳此楚子也其稱人何貶曷為貶為執宋公貶也穀梁傳捷軍得也其不曰宋捷何也不與楚捷於宋也王氏箋義宜申鬬氏子西也不書族與椒聘同不曰來獻宋捷為于偽反魯諱也陳氏岳曰不曰宋捷隱之也張氏曰僖公不與盂之㑹楚方求駕中國以魯為諸侯之望故假宋捷以威魯逞其詐力誇示於我僖公不能拒絶而受其使命待以賓禮特書來獻而不言宋為内諱也諸侯從楚伐宋而魯獨不與音預故楚來獻捷以脅魯為魯計者拒其使去聲下同而不受可也蜀杜氏曰魯不當受其來獻請於天王而討之可也宋公先代之後作賓王家見微子之命注以客禮待之也左傳宋先代之後天子有事膰焉有䘮拜焉方修盟㑹而㐲兵車執之於壇坫丁念反爾雅垝謂之坫注在堂隅之上又以軍獲遺惟季反獻諸侯其橫去聲逆甚矣髙氏曰中國於夷狄則有捷諸侯於天子則有獻捷拒其使而不受聲其罪而致討不患無詞魯於是時曽不能申大義以攘荆楚尊中國故不曰宋捷特為魯諱之也范氏曰楚稱人貶劉氏曰楚暴犯中國欺詐宋公執而伐之威動天下既貶其君又隱其捷乎宋以伸有道之弱而沮無道之勝陳氏曰君使大夫何以特稱人貶之也盂㑹不稱子無以見宋楚之爭長獻捷不人之則是遂予楚也自是至椒之聘始有君大夫臨川吳氏曰楚人者楚子也稱使則知為楚子矣自屈完盟召陵楚臣之見經自此始愚按獻者下奉上之詞不書楚執不書楚子使宜申獻捷不與蠻荆之凌中國也執宋公以諸侯同執為文不書宋捷諱魯受捷之惡責中國諸侯之從蠻荆也經書獻捷者二齊侯獻戎捷書爵書戎捷楚頵獻宋捷書人不書宋捷存中國而抑蠻荆之義著矣晉景公使鞏朔獻齊捷于周天子猶責其奸先王之禮况以蠻夷暴虐中國而可受其捷乎十有二月癸丑公㑹諸侯盟于薄釋宋公左傳㑹于薄以釋之子魚曰禍猶未也未足以懲君穀梁傳㑹者外為主焉爾外釋不志此其志何也以公之與之盟目之也不言楚不與楚専釋也何氏曰言諸侯者起霍之㑹諸侯也任氏曰薄史記作亳漢山陽薄縣即湯都張氏曰拱州杜注漢薄縣愚按考城縣屬今汴梁路睢州㑹不書其所為獨㑹于稷書成宋亂者為干偽反下為葬為魯同受郜鼎立華户化反督也桓二年㑹于澶淵言宋災故者為葬蔡侯不討般音班也襄三十年盟不書所為而盟于薄言釋宋公者宋方主㑹而楚人執而伐之以其俘獲來遺惟季反是僭亂之勢曰益張禽獸將逼人而食之矣此正天下大變春秋之所謹也愚按亂臣賊子弑君父蠻荆凌中國皆天下大變故㑹于稷于澶淵盟于薄皆書其所為然于稷于薄不人諸侯而澶淵人諸侯之大夫者世子弑君尤天下大變之不忍言者故尤謹之也魯既不能申大義以抑其强暴使宋公見釋出自天王與中國而顧反也與歃血要於遥反言求楚子以釋之是操縱大權自南蠻出其事已傎都田反甚矣故書㑹書盟書釋皆不言楚子為魯諱以深貶之也張氏曰諸侯若能使宋人征繕而修文告之詞明宋之直正楚之罪則楚人當情愧理屈而歸宋公之不暇矣今僖公脅於獻捷之威與五國為㑹求盟於楚以請宋公而後得釋正中楚人之詭計春秋不書㑹楚子而曰㑹諸侯亦不書宋公歸自楚而曰釋宋公葢其執其釋皆制於夷而聖人全中國之體故諱之罪魯與諸侯之無能為也蘇氏曰凡諸侯見執而不失國書曰某侯某歸于某此不書名而言釋以為執之釋之皆在諸侯若是而尚可以求諸侯乎穀梁謂不與楚専釋是已陳氏曰楚初與盟不書公於是書公不予楚以専釋之辭也或以為嘉我公之救患陸氏微㫖誤矣愚按春秋書公㑹諸侯盟者二盟于薄為宋請平於楚以釋其執盟于宋為宋請服于楚以釋其圍楚雖主盟而春秋皆書公㑹諸侯不以霸權予楚而憫中國之失霸也癸襄王十未四年二十有二年宋襄十三齊孝五晉恵十三衛文二十二蔡莊八鄭文三十五曹共十五陳穆十杞成十七秦穆二十二楚成三十四春公伐邾取須句句其俱反公作昫杜氏曰須句在東平須昌縣西北張氏曰今東平府須城縣按左氏須句風姓實司大音泰皥胡老反與有濟子禮反之祀杜氏曰大皥伏義任宿須句顓臾皆伏羲之後封近於濟故世祀之邾人滅之須句子來奔因成風也杜氏曰須句成風家公伐邾取須句而反其君焉杜氏曰須句雖别國而削弱為魯私屬若顓臾之比故滅奔及反其君皆畧不書審如是固得崇明祀保小寡之禮何以書取乎不請於王命而專為于偽反母家報怨謀動干戈於邦内擅取人國而反其君是以亂易亂本穀梁非所以為禮也與収奪者趙氏曰取者収奪之名無以異矣髙氏曰歸其君使為我附庸也為我附庸則是我取之也張氏曰僖公非有崇明祀保小寡之公心而徒徇母之私意故無以服邾而致升陘之宼春秋書之亦不異於他日之伐取也陳氏曰春秋嚴義利之辨茍以為利一以取書之是故雖邾人滅須句須句子來奔伐邾取須句反其君焉書取須句雖莒著丘公立而不撫鄫鄫叛而來書取鄫愚按文七年再書取須句而𫝊謂寘邾文公子焉比事而觀則魯之取須句非以存其祀實貪其土耳使果有興滅繼絶之功則春秋必書公伐邾歸須句子于須句以著其善矣夏宋公衛侯許男滕子伐鄭左傳鄭伯如楚宋公伐鄭子魚曰所謂禍在此矣杜氏曰怒鄭至楚故伐之張氏曰襄公嘗困於楚矣疢疾雖甚而德慧術知未有以増益其所不能穀梁氏所謂過而不改而又甚之者也臨川吳氏曰宋襄求於楚一㑹諸侯于盂而遭執伐之辱再盟于薄魯與諸侯同致請於楚而後得釋鄭知宋霸不可成其力不可恃遂朝于楚宋公不自反以修己之德義乃遽怒鄭而興師以伐之所以挑楚釁而取泓之敗也秋八月丁未及邾人戰于升陘陘音刑穀梁傳内諱敗舉其可道者也不言及之者為内諱也程子曰公戰也杜氏曰升陘魯地邾人以須句故出師公卑邾不設備臧文仲曰國無小不可易也無備雖衆不可恃也君其無謂邾小蠭蠆有毒而況國乎弗聴戰于升陘我師敗績邾人獲公胄縣音𤣥諸魚門見左傳注魚門邾城門記稱邾婁力俱反復之以矢葢自戰於升陘始也見檀弓注邾師雖勝死傷亦甚無衣可以招魂魯既敗績邾亦㡬亡輕用師徒害及兩國亦異於誅暴禁亂之兵矣故諱不言公而書及内以諱為貶公穀内不言戰言戰則敗也髙氏曰升陘我地邾來伐我而公遽及邾人戰也不言公者葢公有以取之故諱公以深罪之也張氏曰書及公戰也不言敗諱恥也觀此則知春取須句非有存亡繼絶之公心審矣愚按經書内及戰者三乾時以納讎人之子而致敗此則因取妄母之家而激怨皆無義之戰故皆諱公以貶之于奚雖疆事之撓然内兵書及是亦貶耳内戰常諱敗而乾時直書敗績以與讎戰猶為彼善於此故不諱敗也冬十有一月己巳朔宋公及楚人戰于泓宋師敗績左傳楚人伐宋以救鄭宋公將戰大司馬固諌曰天之棄商久矣君將與之弗可赦也已弗聴戰于泓宋人既成列楚人未既濟司馬曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殲焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列子魚曰君未知戰勍敵之人隘而不列天賛我也阻而鼓之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耇獲則取之何有於二毛明恥教戰求殺敵也傷未及死如何勿重若愛重傷則如勿傷愛其二毛則如服焉穀梁傳日事遇朔曰朔春秋三十有四戰未有以尊敗乎卑以師敗乎人者也襄公以師敗乎人責之也泓之戰以為復雩之恥也宋襄公伐齊之䘮執滕子圍曹為雩之㑹不顧其力之不足而致楚成王成王怒而執之故曰禮人不答反其敬愛人不親反其仁治人不治反其智過而不改又之是謂之過襄公之謂也古者被甲嬰胄非以興國也則以征無道也豈曰以報其恥哉杜氏曰泓水名泓之戰宋襄公不阨人於險不鼓不成列先儒以為至仁大義太史公曰襄公修仁行義雖文王之戰不能過也公羊傳而春秋不與何哉物有本末事有終始見大學順事恕施者王政之本也劉氏曰順事恕施王事之始宋襄秦穆所以不遂伯也襄公伐齊之䘮奉少去聲奪長展兩反使齊人有殺無虧之惡有敗績之傷此晉獻公之所以亂其國者罪一也桓公存三亡國以屬諸侯義士猶曰薄德而一㑹虐二國之君左傳子魚云云罪二也曹人不服盍姑省德無闕然後動而興師圍之罪三也凡此三者不仁非義襄公敢行而獨愛重直用反傷與二毛則亦何異盜跖之以分均出後為仁義莊子胠篋篇跖之徒問於跖曰盗亦有道乎跖曰何適而無有道邪妄意室中之藏聖也入先勇也出後義也知可否知也分均仁也陳仲子以避兄離母居於音烏陵為㢘乎見孟子朱子曰飾小行而妨大倫先王所誅而不以聴者也夫計末遺本飾小名妨大德者春秋之所惡去聲也劉氏曰宋襄公好戰而不務本飾小名而妨大徳此無異盜跖以分均為仁出後為義也彼君子不然正其義不謀其利修其道不急其功孔子語子夏曰無欲速無見小利欲速者遺本者也見小利者計末者也故詞繁不殺所戒反而宋公書及以深貶之也蘇氏曰宋襄被執見釋而猶爭諸侯楚以予張而干中夏故泓之戰雖曲在宋而春秋詞無所氏曰春秋以襄公主是戰則知聖人罪其愎諫求欲昧大義而徇小節以取敗國殄民自及其身之禍楚子救鄭而不言救又貶稱人惡楚子也王氏箋義楚子稱人惡蠻荆之敗中國也故微之微楚子亦所以譏宋公也以千乘之宋不能勝楚之微者宋公病之矣愚按宋以衛侯許男滕子伐鄭而泓戰止書宋公者葢夏首伐鄭之師既歸及秋楚救鄭不及因遂伐宋宋公帥師往逆之而與戰欲雪盂之恥而不度其力之不能也宋公身傷而不言宋公敗績猶為中國諱辱耳若楚君敗績則直書之矣啖氏曰公羊美宋襄之守信云文王之戰亦不過此夫文王以仁義行師不應似宋襄徒守匹夫之信不知事機也劉氏曰文王德不加焉則不以力爭義不過焉則不以威制漸之以道摩之以仁而四方自服爾今襄公不務修文王之業而亟大功以殘百姓徒守咫尺之信乃比之文王其不知聖人亦甚矣永嘉吕氏曰說者稱宋襄仁義而不知伐䘮以立威仁悖之大者也致夷以圖伯義隳之甚者也甲襄王十申五年二十有三年宋襄十四卒齊孝六晉恵十四衛文二十三蔡莊九鄭文三十六曹共十六陳穆十一把成十八卒秦穆二十三楚成三十五春齊侯伐宋圍緡緡忙巾反穀作閔後同左傳討其不與盟于齊也公羊傳邑不言圍此其言圍何疾重故也穀梁傳伐國不言圍邑此其言圍何也不正其以惡報惡也杜氏曰緡宋邑髙平昌邑縣東南有東緡城張氏曰漢志山陽郡東緡縣今濟州金鄉縣愚按濟州今屬濟寧路齊霸國之餘業也見樂毅傳宋襄公既敗於泓荆楚之勢益張矣齊侯既無尊中國攘外冦恤災患畏簡書之意又乗其約而伐之此亦義之所不得為者也故書伐國而言圍邑以著其罪何氏曰襄公欲行霸為楚所敗諸夏之君宜雜然助之反因其困而伐之不仁也臨川吳氏曰楚與諸侯盟于齊乘間以干中夏爾齊侯不悟而受其盟宋之不與盟于齊不愆義也齊反借此為名以責宋伐之於敗傷之後悖理甚矣家氏曰齊孝非宋襄之力則不能有國顧忘納己之德乗其敗而圍其邑所謂以怨報德刑戮之民也齊侯書爵以其背大惠而忍於為不義故目其人而誅之書伐書圍皆所以貶也孫氏曰楚人敗宋于泓齊侯視之不救而又加之以兵故伐圍竝書以誅其惡然則桓公伐鄭圍新城六年何以不為貶乎鄭與楚合憑陵中國桓公伐之除黨惡也宋與楚戰兵敗身傷齊侯伐之殘中夏也其事異矣美惡不嫌同詞見公羊愚按春秋無義戰彼善於此則有之經書伐國圍邑者四齊桓伐鄭圍新城以其棄夏從夷之罪予之也宋殤忌公子馮而遷怒伐鄭圍長葛楚頵虐中國而圖伯伐宋圍緡與此年齊孝之忘大徳而修小怨皆貶之也葢討得其罪則諸侯遂圍許圍宋彭城同圍齊春秋不以為譏不能修徳而徒恃兵力則雖攻内邑之背叛如圍棘圍費圍鄆圍郈而春秋未嘗與之也夏五月庚寅宋公茲父卒兹公作慈襄公在位十四年子王臣嗣是為成公左傳宋襄公卒傷於泓故也穀梁傳兹父之不葬失民也以其不教民戰則是棄其師也通旨宋襄公不書葬治其罪也秋楚人伐陳左傳楚成得臣帥師伐陳討其貳於宋也遂取焦夷城頓而還子文以為之功使為令尹臨川吳氏曰曹南之盟陳不從宋伐鄭之役陳亦不從宋盟齊則陳從楚㑹盂執宋公伐宋則陳從楚考之經惟見陳之服於楚不見陳之貳於宋今楚討陳之貳葢以伐宋之後鄭畏而朝楚而陳未朝楚即誣以貳宋之罪伐之而取其二邑積其勢不至於滅陳不已也張氏曰成得臣敢於稱亂而鬭穀於菟賞以貴仕春秋人之意可見矣冬十有一月把子卒成公也在位十八年弟姑容立是為桓公程子傳把二王後而伯爵疑前世黜之也中間從夷故子之後復稱伯髙氏曰不名者史佚之乙襄王十酉六年二十有四年齊孝七晉惠十五卒衞文二十四蔡莊十鄭文三十七曹共十七陳穆十二把桓公姑容元年宋成公王臣元年秦穆二十四楚成三十六春王正月夏狄伐鄭左傳鄭之入滑也滑人聽命師還又即衛鄭公子士洩堵俞彌帥師伐滑王使伯服游孫伯如鄭請滑鄭伯怨惠王之入而不與厲公爵也又怨襄王之與衛滑也故不聽王命而執二子王怒將以狄伐鄭富辰諌曰不可王弗聽使頽叔桃子出狄師夏狄伐鄭取櫟秋七月冬天王出居于鄭左傳王使來告難曰不穀不德得罪於母弟之寵子帶鄙在鄭地汜敢告叔父使簡師父告于晉使左鄢父告于秦天子無出書曰天王出居于鄭辟母弟之難也天子凶服降名禮也晉侯夷吾卒惠公也在位十五年子圉嗣是為懷公明年秦納公子重耳是為文公左傳二十二年晉太子圉為質於秦逃歸二十三年九月晉惠公卒懷公命無從亡人初晉公子重耳之及於難也晉人伐諸蒲城遂奔狄從者狐偃趙衰顛頡魏武子司空季子處狄十二年而行過衛衛文公不禮焉及齊齊桓公妻之有馬二十乘及曹曹共公亦不禮焉及宋宋襄公贈之馬二十乘及鄭鄭文公亦不禮焉及楚楚子饗之乃送諸秦秦伯納女五人二十四年秦伯納之不書不告入也二月辛丑狐偃及秦晉之大夫盟于郇丙午入于曲沃丁未朝于武宫戊申使殺懐公于髙梁不書亦不告也永嘉吕氏曰左氏紀惠公卒在去年九月葢春秋所據者魯史也左氏所據者他國之史也其年月不同不可得而考矣傳義見三十二年丙襄王十戌七年二十有五年晉文公重耳元年齊孝八衞文二十五卒蔡莊十一鄭文三十八曹共十八陳穆十三把桓二宋成二秦穆二十五楚成三十七春王正月丙午衛侯燬滅邢左傳衛將伐邢禮至曰不得其守國不可得也我請昆弟仕焉乃往得仕春衞人伐邢二禮從國子巡城掖以赴外殺之衛侯燬滅邢同姓也故名公羊傳衛侯燬何以名絶曷為絶之滅同姓也穀梁傳燬之名何也不正其伐本而滅同姓也衛侯何以名滅同姓也春秋之法諸侯不生名滅同姓則名者曲禮謂其絶先祖之裔蔑骨肉之恩故生而書名示王法不容誅也杜氏曰惡其親親相滅故稱名罪之孫氏曰邢衛皆齊桓所存衛侯不念桓公之大德以絶先祖之支體甚矣故生而名之鄱陽萬氏曰興師以滅同姓其惡已甚况當是時天子蒙塵于外鄙在鄭地汜衛鄭之鄰方伯連率之舊也衛侯既不能奔問官守帥師勤王乃間王室之多故懐詐諼之謀以肆虐於宗親之國其無王之心聖人得不深誅之聖人與天地合德滅人邦國而絶其祀同姓與異姓奚别筆列反焉而或名或否何也正道理一而分扶問反下同殊異端二本而無分分殊之弊私勝而失仁無分之罪兼愛而失義程叔子答楊中立語愚按公而無私者理之一也親疎有等差者分之殊也以至公之心施之有等級而不紊則仁義之道盡矣故先王制五服之節母黨不得同本族為人後者為其私親皆降一等同姓之國其初一人之身豈可與異姓之國一視之哉春秋之法由仁義行而人道立者也可以無差楚宜反等乎然則晉滅虞五年楚滅夔明年亦同姓也曷為不名曰諸侯滅同姓則名其常也有名有不名例之變也邢雖與狄伐衛而經無譏文者為于偽反能救齊也衛人曽不反思而遷怒於邢又遣禮至昆弟往仕焉誘其守謂邢政卿而殺之于外劉氏曰滅國春秋之所惡於所惡之中又有甚焉秦穆公衛侯燬是也夫諸侯強暴舉干戈以覆人之國并人之地雖有罪人猶得而備之今兩君皆出詭計險謀使臣反其君下畔其上以快已兼并之欲雖有道之國不知所備甚可惡也豈得與他滅國者等哉故秦穆狄之而衛侯燬名張氏曰衛侯燬殘虐不仁至於同所自出不知相保而肆強以絶滅之又使其臣為詭詐之事行盜賊傾覆之計人理所不容故名之同於楚子䖍之誘殺也與虞公貪璧馬以易鄰國及其身者其情異矣春秋原情定罪而衛燬獨名葢輕重之權衡也若荆楚則僣號稱王聖人之所深絶於滅䕫乎何誅朱子語諸侯滅國未嘗書名衞侯燬滅邢說者以為滅同姓之故今經文只隔夏四月癸酉一句便書衛侯燬卒恐是因而傳寫之誤亦未可知夏四月癸酉衛侯燬卒文公世在位二十五年子鄭嗣是為成公宋蕩伯姬來逆婦公羊傳宋蕩伯姬者何蕩氏之母也其稱婦何有姑之辭也穀梁傳宋蕩伯姬來逆婦非正也其曰婦何也縁姑言之之辭也杜氏曰伯姬魯女為宋大夫蕩氏妻自為其子來逆稱婦姑存之辭婦人越境逆婦非禮故書伯姬公女也而配蕩氏其往嫁不見音現下同於經者國君不與大夫敵也常事合禮則不書今來逆婦而史䇿書之見公失禮下主大夫之昏是慢宗廟卑朝廷姑自逆婦其失明矣劉氏曰伯姬嫁不見經葢内女雖親體不敵不書於䇿所以尊君也今君失其禮以愛易典主大夫之昏是卑朝廷而慢宗廟非安上治民之節也臨川吳氏曰伯姬納内女為其子之婦姑自來逆婦而書於經者譏公降尊而自主其昏也况昏禮當夫自來親迎豈有姑來逆婦之禮乎家氏曰禮有親迎婦從夫也今屈尊者以逆卑者而亦謂之逆亂婦姑之分故特書以譏之張氏曰姑自逆婦公不使大夫主之皆非禮也兩譏之愚按大夫自逆則稱字姑來逆故稱婦把伯姬來求婦亦主姑而言之之詞陸氏曰公羊云其言來逆婦何兄弟辭也按經文直書其事以明非禮爾兄弟辭有何義乎宋殺其大夫義繫於殺則止書其官見莊二十六年曹殺大夫𫝊愚按宋殺大夫者四惟蕩山書名公子卬則書官此及文七年不紀名氏葢因魯史舊文而不能益非義所繋也劉氏曰公羊云不名者宋三世無大夫三世内娶也非也文稱大夫是有大夫矣且君娶一卿而一國之内何得悉無大夫哉詭僻不經可笑也穀梁云以其在祖位尊之也亦非也春秋非孔子家牒當為後世書法耳何得擅諱其祖名哉秋楚人圍陳納頓子于頓左傳楚令尹子玉追秦師不及遂圍陳納頓子于頓穀梁𫝊納者内不受也杜氏曰頓迫於陳而出奔楚故楚為頓圍陳以納頓子不言遂一事也頓國汝隂南頓縣張氏曰今屬陳州姬姓國也愚按今汴梁路陳州商水縣圍陳納頓子也納云者不與納也諸侯失國諸侯納之正也愚按諸侯納失國之君合於義則不書書楚納頓子不與蠻夷之納也書齊髙偃納北燕伯不與大夫之納也何以不與乎夫陳先代之後不能以禮安靖鄰國保恤寡小中國諸侯又不能修方伯連率去聲之職而使楚人納之是蠻荒仗義正諸夏也故書曰楚人圍陳納頓子于頓其責中國深矣此亦正本自治之意也張氏曰中國諸侯不能恤小國而定其位反使夷狄行其義閔中國之無霸也陳氏曰齊桓卒楚始與諸夏盟于齊盟鹿上執宋公納頓子侈然欲廢置諸侯春秋之所懼也愚按楚圍陳納頓子于頓書法如楚伐吳執齊慶封殺之葢一事耳夫頓國小弱而介於陳楚之間陳欲迫而兼并之故前年楚伐陳城頓而還此年納頓子保全微國以示恩責義於陳以示威其意皆預為圖伯之地也厥後頓子㑹申從楚而伐吳戰雞父陳衰而服屬於楚也僅一從十國㑹召陵侵楚而諸夏終不能保恤遂為楚結陳佗人所滅是時陳亦屢滅於楚而僅存非能剖分其地特助楚為虐耳比事以觀而知中國之衰矣王氏曰失地出奔則名他國納之不名以諸侯不得相名也故頓子北燕伯皆不名陸氏曰穀梁云納頓子者陳也按經文楚自納之何關陳事劉氏曰公羊以謂何以不言遂兩之也非也頓子之奔由陳攻之故楚必圍陳乃得納頓子其文與事詳矣豈得言遂哉葬衛文公冬十有二月癸亥公㑹衛子莒慶盟于洮左傳衛人平莒于我十二月盟于洮修衛文公之好且及莒平也穀梁傳莒無大夫其曰莒慶何也以公之㑹目之也杜氏曰莒以元年酈之役怨魯衛文公將平之未及而卒成公追成父志洮魯地張氏曰衛成公稱子䘮未踰年也愚按莒慶者魯之壻之故因衛成公為平於二國遂來㑹盟君盟大夫自浮來而已然矣此不貶者從同同趙氏曰穀梁云其曰莒慶以公之㑹目之也按事接於魯雖非命卿皆書名𫝊不逹此例遂穿鑿爾丁襄王十亥八年二十有六年晉文二齊孝九衛成公鄭元年蔡莊十二鄭文三十九曹共十九陳穆十四把桓三宋成三秦穆二十六楚成三十八春王正月己未公㑹莒子衛􅑔速盟于向速公作遫後同向舒亮反左傳公㑹莒兹㔻公寗莊子盟于向尋洮之盟也杜氏曰向莒地臨川吳氏曰衛本欲平魯莒之怨洮盟莒子不親至僖公必欲與莒子盟故復為此㑹也張氏曰十二月已盟今又屢盟所以致齊之討也劉氏曰穀梁云公不㑹大夫其曰寗速何也以其隨莒子可以言㑹也春秋此例亦多矣何為獨發於此齊孝人侵我西鄙公追齊師至􅈶弗及酅户圭反公作嶲穀作巂弗左作不左傳齊師侵我西鄙討是二盟也穀梁傳人微者也侵淺事也公之追之非正也至嶲急辭也弗及者可以及而不敢及也杜氏曰公逐齊師逺至齊地故書之濟北穀城縣西有地名酅下張氏曰今屬東平府東阿書人書侵書師罪齊也蜀杜氏曰倘下文不復言齊師則無以見稱人為貶矣臨川吳氏曰齊師無名故書侵書追書至酅弗及罪魯也趙氏曰宼至不知追而不及言内之無警戒潜師入境曰侵少則稱人衆則稱師前書齊人是見音現其弱以誘魯也後書齊師是伏其衆以邀魯也其為諼許元反明矣凡書追者在境内則譏其不預追戎于濟西是也在境外則譏其深入徐氏曰至􅈶深入也追齊師至􅈶是也􅈶者齊地莊三紀季以􅈶入齊至者言遠也愚按書至者二至􅈶譏其深入􅈶齊境也公救成至遇譏其怯而不進遇魯地也弗者遷辭也有畏而弗敢及之也劉氏曰所謂弗及非弗能及也弗敢及也弗敢及者畏也善養氣者匹夫不為千乗屈孔子夾谷之㑹齊師四陳揖讓指麾而景公服計齊人之衆不足以當景公僖公之勢足以勝定公之末年宼至不能禦去又不敢及是舉百姓而棄之也乃乞師于楚以自防其持國之術所失者多矣齊魯皆私憤之兵而非正也故交譏之趙氏曰公羊云其言至􅈶弗及何侈也穀梁云大之也弗及内辭也按直書之以譏内之無武備爾何用曲為義劉氏曰以公追人就令勝之尚何可侈哉且是後齊復伐我明不畏魯甚矣數見卑侮猶以為大乎夏齊人伐我北鄙左傳夏齊孝公伐我北鄙公使展喜犒師使受命于展禽齊侯未入境展喜從之曰寡君使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰何恃而不恐對曰恃先王之命昔周公大公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也桓公是以糾合諸侯而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職恃此以不恐齊侯乃還通旨孝公有服展喜之善何以不褒而書人曰内以諱為惡外以諱為善此齊侯也其稱人為之諱也衛人伐齊左傳衛人伐齊洮之盟故也張氏曰二盟乃衛人平莒于我故為魯伐之臨川吳氏曰衛平莒魯齊何與焉洮向之二盟雖瀆其過在魯非齊人之所當問也齊孝公乃連興侵伐之師非義甚矣其致衛之伐與魯之伐自取之也公子遂如楚乞師書乞師始此左傳東門襄仲臧文仲如楚乞師臧孫見子玉而道之伐齊宋以其不臣也公羊傳乞師者何卑辭也曷為内外同若辭重師也曷為重師師出不正反戰不正勝也穀梁傳乞重辭也何重焉重人之死也非所乞也師出不必反戰不必勝故重之也杜氏曰乞不保得之辭衛人報德以怨伐齊之䘮助少去聲凌長展兩反又遷怒於邢而滅其國不義甚矣公既與其君盟于洮又與其臣盟于向是黨衛也髙氏曰齊侯本以洮向二盟為衛莒背己且以魯嘗助四公子於是興師而來伐故齊人既侵其西又伐其北齊師固亦非義矣而僖公不能省徳自反深思逺慮計安社稷乃乞楚師與齊為敵是以蠻荆殘中國也於義可乎髙氏曰楚僣王矣而諸侯更推為盟主魯見侵伐於齊乃乞師於楚以伐之導荆楚以伐中國是禽獸將逼人天下之大變也書曰乞師深罪之也魯頌稱公車千乗公徒三萬戎狄是膺荆舒是懲今乃乞師于楚寧無愧乎張氏曰僖公初年頗有意於治國務農閔兩國以殷富中年漸肆荒怠浸失政於大臣滅項取執於桓公迨齊霸不紹不及閒暇修明政刑民事既荒國備不立齊人再伐已不能支而遠乞師于蠻荆以刷其恥夫子罪臧文仲竊位從公子遂借兵強夷為國之無謀也使其立展禽以為政所以輔僖公者必有道矣何至乞楚師以伐齊哉其書公子遂如楚乞師而惡自見音現矣孫氏曰國之大小師之衆寡皆有王制不可乞也書乞師惡魯不能内修戎備而外乞師於夷狄陳氏曰臧宣叔如晉乞師不書乞諸外域然後書外乞師亦不書必盟主也而後書乞卑辭也乞師於楚人志中國之詘於蠻荆也趙氏曰天子在上而諸侯自相請師非禮也乞師例見成十三年秋楚人滅夔以夔子歸夔求龜反公作隗左傳楚成得臣鬬宜申帥師滅夔以夔子歸穀梁傳夔國也不日微國也以歸猶愈乎執也杜氏曰夔楚同姓國今建平秭歸縣張氏曰今歸州秭歸縣及興平縣皆有夔子城愚按歸州屬今辰州路春秋滅國以其君歸無有不名者據潞嬰兒沈嘉許斯頓牂胡豹皆名而夔何以獨不名按左氏夔子不祀祝融與鬻晉肓熊杜氏曰祝融髙辛氏之火正楚之逺祖也鬻熊祝融十二世孫楚人讓之對曰我先君熊摯音至有疾熊摯乃夔始封之祖鬼神弗赦自竄七亂反于夔是以失楚又何祀焉諸侯之祀無過其祖者劉氏曰魯祖周公不敢祀公劉衛祖康叔不敢祀后稷祝融猶后稷鬻熊猶公劉矣而夔祖熊摯是不得祀祝融與鬻熊也而楚反以是滅之非其罪矣故特存其爵而不名也劉氏曰國滅而虜無不名者國滅罪也虜服辱也夔子獨不名所以取滅者乃非其罪故假之也楚讓夔不祀祝融鬻熊夔曰云云楚祖鬻熊夔祖熊摰是不得祀者也諸侯之祀無過其祖夔子可謂若於義矣而楚反以是滅之春秋以謂非其罪也故黜楚而伸夔有王者作興滅繼絶則夔庶㡬矣薛氏曰夔子之不名無滅道也然則楚滅同姓何以不名人而不名春秋待僭亂之體也孫氏曰不名者略蠻荆陳氏曰滅同姓名此楚子頵也則其不名何楚子之名未登於春秋也楚自武王始見於傳文王始見於經猶以州舉也至成王而後書楚人盂之㑹嘗書楚子矣而復人之頵之名非遇弑未登於春秋則滅夔固不名也滅夔名之則疑於衛侯燬冬楚人伐宋圍緡左傳宋以其善於晉侯也叛楚即晉楚令尹子玉司馬子西帥師伐宋圍緡臨川吳氏曰前年宋成公忘父之讎與楚平而往朝之今而即晉可謂能速於徙義者矣楚伐其國而圍其邑書以著楚人之肆横也家氏曰宋成既朝楚又即晉而為楚所伐無益於自免而有忘讎之恥使晉文不興則宋之為宋豈不殆哉公以楚師伐齊取穀左傳凡師能左右之曰以寘桓公子雍於穀易牙奉之以為魯援楚申公叔侯戌之穀梁傳以者不以者也民者君之本也使民以其死非其正也公至自伐齊公羊傳此何以致曰患之起必自此始也穀梁傳惡事不致此其致之何也危之也楚强魯弱而能用其師進退在己杜氏曰左右謂進退在己何氏曰言以者行公意故特書曰以以者不以者也本穀梁注謂本非所得制今得以之也夫背音佩盟即楚取人之邑為己有失正甚矣臨川吳氏曰公不用魯師而用楚師雖能取齊之邑而借援强楚辱國莫大焉將以刷西鄙北鄙之恥而適所以甚其恥也患之起必自此始其致危之也范氏曰以蠻荆之師伐鄰近大國招禍深怨危亡之道髙氏曰釁深惡重此臣子所以殆其往而録其至張氏曰楚師而魯君以之楚以其衆付魯使自用之以伐齊也伐霸主之後用蠻荆之兵僖公之免可謂幸矣故特書至以危之愚按書公至自伐齊者三襄十九年合十二國之師同圍齊從霸主討齊靈之暴横圍齊而書至伐者予之也此年以楚師伐齊哀十年㑹吳伐齊皆用蠻夷報怨於大國其致危之也或曰春秋貶公之以楚伐齊然柏舉之戰蔡以吳報楚春秋予蔡而爵吳何歟吁召陵之㑹中國不能救蔡蔡不得已而借援於吳吳能扶弱抑强助蔡勝楚葢資其力以攻強楚非啟其兵以凌中國也故春秋予奪不同也劉氏曰公穀皆言伐國不言圍邑譏道用師也非也圍緡者乃楚人伐齊則楚師何以強配合之乎公羊又云此已取榖矣何以致伐原公羊之意謂得意致㑹不得意致伐則今得意不當致伐而不致㑹然伐齊取穀獨公以楚師往無諸侯之㑹則不得致㑹此理之適然耳春秋胡傳附録纂疏卷十二
