body:
  text: 春秋胡傳附録纂疏卷一元汪克寛撰隠公上公名息姑在位十一年左傳惠公元妃孟子孟子卒繼室以聲子生隠公宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸於我生桓公惠公薨隠公立而奉之程子傳夫子之道既不行於天下於是因魯春秋立百王之大法平王東遷在位五十一年卒不能興復先王之業王道絶矣孟子曰王者之迹熄而詩亡詩亡然後春秋作適當隠公之初故始於隠公孟子曰王者之迹熄朱子注謂平王東遷而政教號令不及於天下也而詩亡詩亡然後春秋作今按邶鄘而下多春秋時詩也愚按詩小序邶風撃鼓怨州吁雄雉匏有苦葉新臺二子乘舟鶉之奔奔衛風氓皆宣公時詩鄘定之方中蝃蝀相䑕干旄載馳衛木𤓰皆文公時詩鄭風將仲子以下皆莊公以後詩齊風南山以下皆襄公時詩唐無衣有杕之社晉武公詩葛生采苓獻公詩秦黄鳥以下皆穆公以後詩陳風墓門防有鵲巢乃陳陀及宣公詩株林澤陂靈公詩曹風蜉蝣昭公詩候人下泉共公詩而謂詩亡然後春秋作何也自黍離降為國風天下無復扶又反有雅而王者之詩亡矣春秋作於隠公適當雅亡之後又按小雅正月刺幽王詩也而曰赫赫宗周褒姒烕胡悅反滅也之史幽王娶于申生太子宜臼後嬖褒姒生伯服褒姒不好笑幽王為舉烽火諸侯悉至而無冦褒姒大笑又黜申后廢宜臼申侯怒與犬戎攻王王舉烽火徴兵不至遂殺王驪山下虜褒姒而去諸侯乃即申侯立太子宜臼是為平王逮魯孝公之末幽王已為犬戎所斃惠公初年周既東矣春秋不作於孝公惠公者東遷之始流風遺俗猶有存者鄭武公入為司徒善於其職則猶用賢也據詩鄭緇衣小序晉侯捍王于艱錫之秬鬯則猶有誥命也王曰其歸視爾師則諸侯猶來朝直遥反後凡朝廷朝聘並同也書文侯之命汝多修扞我于艱王曰父義和其歸視爾師寧爾邦用賚爾秬鬯一卣覲禮諸侯辭于天子王曰伯父無事歸寜乃邦義和之薨諡為文侯則列國猶有請也愚按春秋五等諸侯死而加諡臣子皆稱公惟請諡于王則從其本爵如蔡桓侯之類及平王在位日久不能自強於政治去聲棄其九族葛藟力軌反有終逺去聲兄弟之刺詩小序葛藟王族刺平王也周室道衰棄其九族焉三章皆言終逺兄弟不撫其民周人有束薪蒲楚之譏小序揚之水刺平王也不撫其民而逺屯戍於母家周人怨思焉一章曰揚之水不流束薪彼其之子不與我戍申二章曰揚之水不流束楚彼其之子不與我戍甫三章曰揚之水不流束蒲彼其之子不與我戍許朱子傳申侯與犬戎弑幽王王法必誅不赦之賊而平王與臣庶不共戴天之讎也今平王知有母而不知有父知其立已為有徳而不知其弑父為可怨至使復讎討賊之師反為報施酬恩之舉則其忘親逆理而得罪於天已甚矣况先王之制諸侯有故則方伯連率以諸侯之師討之王室有故則方伯連率以諸侯之師救之天子鄉遂之民供貢賦衛王室而已今平王不能行威令於天下無以保其母家乃勞天子之民逺為諸侯戍守故周人之戍申者以非其職而怨思焉則其衰懦微弱而得罪於民又可見矣嗚呼詩亡而後春秋作其不以此也哉至其晚年失道滋甚乃以天王之尊下賵諸侯之妾於是三綱淪愚按天子之尊下賵列國寵妾則君不能為臣綱妃妾既紊則夫不能為婦綱嫡庶無辨則父不能為子綱九法斁音姤愚按惠公以妾為妻而平王反加恩寵是不知彛倫攸叙而九疇斁天下之大法皆敗壊矣人望絶矣永嘉呂氏曰使平王有興衰撥亂之志則遷洛之周尚可望其返而為豐鎬之周今至於四十九年而不克自立則亦無可望矣夫婦人倫之本何氏曰失婦人倫之始夫婦正則父子親父子親則君臣和朝廷風化之原董子曰正朝廷以正百官正百官以正萬民正萬民以正四方平王子母適冢正后親遭褒姒之難乃旦反廢黜播遷而宗國顚覆亦可省息并反後放此矣又不是懲至賵人寵妾是㧞本塞原自滅之也春秋於此葢有不得已焉耳矣託始乎隠不亦深切著明也哉范氏曰平王東遷周室微弱天下蕩蕩王道盡矣孔子列黍離於國風所以明其不能復雅於時則接乎隠公故因兹託始而修春秋明黜陟著勸戒成天下之事業定天下之邪正信不易之宏軌百王之通典也啖氏曰始於隠公者以為幽厲雖衰雅未為風平王之初人習餘化苟有過惡當以王法正之及代變風移陵遲乆矣若格以太平之政則比屋可誅無復善惡故斷自平王之末而以隠公為始所以拯薄俗勉善行革禮之失為後王法也孫氏曰春秋之始於隠公者非他以平王之所終也平既不王東遷之後周室微弱諸侯強大朝覲不修貢賦不舉號令無所束賞罰無所加壊法易紀變禮亂樂弑君戕父攘國竊號在在有之征伐四出蕩然不禁天下之正中國之事皆諸侯分裂之平王庸暗歴孝踰惠莫能中興播蕩陵夷逮隠而死雅誥不復作天下無復有王矣故詩至黍離而降書至文侯之命而絶春秋乃作自隠公始也愚按文定言春秋始於平王逺宗孟氏近本程子其説為有據依而諸儒正大之論悉與之合或者乃以春秋不始於平王而始於桓王且謂繻葛之敗春秋所以始若是則春秋當始於桓公而不始於隠公矣巳同平王四未十九年元年公羊傳元年者君之始年也程子傳元年隠公之始年齊僖公禄父九年晉鄂侯郄二年曲沃莊伯鮮十一年衛桓公完十三年蔡宣公考父二十八年鄭莊公寤生二十二年曹桓公終生三十五年陳桓公鮑二十三年杞武公二十九年宋穆公和七年秦文公四十四年楚武王熊通十九年即位之一年必稱元年者明人君之用也大哉乾元萬物資始易乾彖傳朱子本義元大也始也乾元天德之大始故萬物之生皆資之以為始也天之用也至哉坤元萬物資生易坤彖傳朱子曰始者氣之始生者形之始萬物資乾以始而有氣資坤以生而有形地之用也成位乎其中則與天地參故體元者人君之職易釋元字謂體仁足以長人董子云體元居正而調元者宰相息亮反后放此之事後班固傳調元氣文集人君先正其心知行仁政然後能體元矣人臣知格君心之非則一正君而國定此調元之效也元即仁也本易文言仁人心也本孟子春秋深明其用當自貴者始故治平聲後放此國先正其心以正朝廷與百官而逺近莫不壹於正矣董子曰春秋謂一為元之意一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也春秋深探其本而反自貴者始故為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫不壹於正而亡有邪氣奸其間者是以隂陽調而風雨時羣生和而萬民殖五榖熟而草木茂諸福之物莫不畢至而王道終矣春秋立文兼述作按舜典紀元日書月正元日舜格於文祖商訓稱元祀伊訓惟元祀十有二月此經書元年所謂祖二帝中庸祖述堯舜明三王董子曰春秋上明三王之道啖氏曰春秋參用二帝三王之道述而不作者也正次王王次春董子語乃立法創制裁自聖心無所述於人者非史䇿之舊文矣前此虞夏商周之書書時不繋月書月不冠時惟春秋書春王正月春王正月公羊傳春者嵗之始也先言王而後言正月王正月也何言乎王正月大一統也榖梁傳雖無事必舉正月謹始也程子傳春天時正月王正書春王正月示人君當上奉天時下承王正云爾董仲舒所謂道之大原出於天求端於天是也堯之大政所先者欽若昊天兹可見矣王者所行必本於天以正天下而下之奉王政者乃所以事天也明此義則知王與天同大而人道立矣周正月非春也假天時以立義耳平王之時王道絶矣春秋假周以正王法故書曰春王正月然後是非褒貶二百四十二年之事皆天理也隠不書即位明大法於始也諸侯之立必由王命隠公自立故不書即位不與其為君也法既立矣諸公或書或不書義各不同既不受命於天子以先君之命而繼世者則正其始文成襄昭哀是也繼世者既非王命又非先君之命不書即位不正其始也莊閔僖是也桓宣定之書即位桓弑君而立宣受弑賊之立定為逐君者所立皆無王無君何命之受故書其自即位也定之比宣則又有間焉矣杜氏曰不言一年一月欲人君體元以居正也何氏曰元者氣之始春者四時之始王者受命之始正月者正教之始即位者一國之始春秋以元之治正天之端以天之端正王之政以王之政正諸侯之即位以諸侯之即位正竞内之治諸侯不上奉王之政則不得即位故先言正月而後言即位政不由王出則不得為政故先言王而後言正月王者不承天以制號令則無法故先言春而後言王天不深正其元則不能成其化故先言元而後言春五者天人之大本也按左氏曰王周正月杜氏曰言周以别夏殷周人以建子為嵗首詩豳風一之日二之日皆以子月起數十月蟋蟀下繼以曰為改嵗唐風蟋蟀在堂乃九月之候而曰嵗聿云莫是以子月為嵗首周禮凡言正月指子月嵗終指丑月正嵗指寅月州長正月屬民讀法正嵗讀法如初言初則正月居先可知矣若以寅為正月不當又有正嵗也左傳僖五年正月日南至禮記正月日至皆以子月為正則冬十有一月是也前乎周者以丑為正其書始即位曰惟元祀十有二月則知月不易也通㫖按商書惟元祀十有二月伊尹奉嗣王祇見厥祖此即位而朝廟也惟三祀十有二月朔伊尹奉嗣王歸於亳此自桐而復辟也其在歳首明矣而曰十二月是商人雖以建丑為正而不改夏之月也後乎周者以亥為正其書始建國曰元年冬十月則知時不易也通㫖按史記秦始皇三干一年十二月改臘曰嘉平漢初承秦未改正朔每嵗之首必書某年冬十月是秦漢雖以建亥為正而不改夏之月也建子非春亦明矣乃以夏時冠去聲周月何哉聖人語去聲顔回以為邦則曰行夏之時作春秋以經世則曰春王正月此見諸行事之驗也通㫖春秋記事用周月建子冠月書夏時時可易乎曰四時之運於天而為春夏秋冬與四方之列於地而為東西南北一也指冬為春是指糠眯目而四方易位矣然則何以冠月書夏時顔回問為邦此聖人見諸行事踐言之效也或曰非天子不議禮據中庸仲尼有聖徳無其位而改正朔可乎曰有是言也不曰春秋天子之事乎以夏時冠月垂法後世以周正紀事朱子語春秋紀春無氷為異則固以周正紀事示無其位不敢自専也其㫖微矣通㫖或曰以匹夫而改正朔即賤而好自專矣其可乎曰有是言也不曰春秋天子之事乎知我罪我者其惟春秋乎加王於正者公羊言大一統是也何氏曰統者總繋之辭王者受命改制布政施教於天下自公侯至於庶人自山川至於草木昆蟲莫不一繋於正月宋氏曰周室雖衰天命未改普天率土一草一木皆周也春秋之作率天下以尊周室正月繫王示周家天命未改孫氏曰欲其其末者必端其本嚴其終者必正其始元年書王所以端本也正月所以正始也其本既端其始既正然後以大中之法從而誅賞之先師曰春秋之時天下不知有周故聖人因魯史修春秋書王於正月之上以明君臣之義君臣之義既明然後亂臣賊子始可得而討内夏外夷貴王賤覇之法始可得而用劉氏曰公羊言王者孰謂謂文王也非也春秋者王政之本故假王以正萬事置之春正之間明天子受命於天諸侯受命於君也國君逾年改元必行告廟之禮公羊始終之義一年不二君人臣之義不可曠年無君國史主記時政必書即位之事而隠公闕焉是仲尼削之也通㫖即位大事也國史必書之隠莊閔僖四公不書即位此聖人削而不書正父子君臣之大倫也或曰隠公攝政莊公母出閔公以亂僖公出而復入皆不行即位之禮故史不書之於策恐其說之誤也非巳所有而權之者攝也隠公果攝而不即位經以諸侯目之則是名不正矣春秋以道名分豈肯首亂哉古者諸侯繼世襲封則内必有所承爵位土田受之天子則上必有所禀内不承國於先君惠公之存也未立為世子將没又無遺命上不禀命於天子惠公之薨未嘗遣使告於京師隠公喪畢又未嘗朝於天子諸大夫扳普顔反引也已以立而遂立焉公羊傳隠長又賢諸大夫扳隠而立之是與爭亂造端與猶為也而簒弑所由起也春秋首絀與黜同王制君絀以爵隠公以明大法父子君臣之倫正矣通㫖誓於天子然後為世子命於天王然後為諸侯不受命而立者大司馬之所治也文成襄昭哀五公之書即位特别於隠莊閔僖之内外並無所承者爾非春秋與其不禀命於王而得即位也潁達曰魯十二公國史盡書即位仲尼修天乃有所不書其說是也明王在上天下諸侯無不敬君父之命而立者假若有之大司馬必施九伐之法矣唐自中葉以後藩鎮有不請命自立者遇憲宗裴度則皆討平之况先王之世耶或問王者一統春秋之時諸侯各稱元年而不用王之年則何以為一統也曰古者諸侯之國各有史官以數紀年而不立號則史官各紀其君之始年為元年於義無嫌然不謂之一年特稱元年者乃昔帝王之法春秋因此法以明人君之用所謂述而不作者也正朔則王之所建居周之世必以建子為正居商之世必以建丑為正而列國不可以自建故加王於正公羊以為大一統董子謂天地之常經古今之通誼是也不必指諸侯各稱元年非一統也諸侯繼立若必用王之年月紀其即位則隠公當書曰四十九年正月聖人經世之意漫不見矣春秋始隠不書元年則不見體元之意去王字又不見改正大一統之意書即位則隱公法不當書不書即位又無以見隠公之初立也張氏曰諸侯之有國必受天子與先君之命則其有是國而治民也其身正而可以正國人矣苟或不然守天子之土而無天王之命守宗廟之典籍而不出於先君之傳付是二者一或闕焉君子有所不居今隠公兩皆無之春秋假魯史以立法而先君之罪有難顯言者故不書即位謹嚴以示貶先師曰春王正月說者不同諸儒疑子月非春故不勝異論夏承唐虞皆以寅月為嵗首而謂之正月始春終冬四時具為一年商革夏命以丑月為嵗首仍謂之十二月而未嘗改月周革殷命以子月為嵗首不特改月而又改時以齊其年泰誓云惟十有三年春大㑹孟津武成云惟一月壬辰旁死魄戊午師逾孟津春即一月一月即子月也春秋所書之春即夏之仲冬正月即夏之十一月也或曰以冬為春可乎曰此孔子所以欲行夏時也春秋書春於王上者尊天時也若曰天時非時王之所得改也書正月於王下者著周厯也天下一於周則聖人經世之大法可以行於筆削之間矣記事者以事繫日以日繫月以月繫時以時繫年年有四時故錯舉以為名則春秋二字乃史舊文時王之厯國史據以記事孔子安得而改之哉孔子作春秋以繩天下而筆削之始擅改周厯豈特無王又失事實何足以為聖人之經哉愚按文定以謂魯史本書十一月孔子改作春正月朱子云某不敢信竊疑魯史名以春秋則似元書曰春正月是周厯已改子丑月為春也禮記稱季夏六月以禘禮祀周公又引孟獻子言七月日至可以有事於祖而曰七月之禘獻子為之據此則是以建巳之月為季夏矣前漢書律厯志武王伐紂之嵗周正月辛卯朔合辰在斗前一度戊午渡孟津明日巳未冬至是嵗大寒中在周二月己丑晦外傳伶州鳩言武王伐殷之日嵗在鶉火月在天駟日在析木之津辰在斗柄星在天黿以唐厯遡而上之日月星宿無一不合則泰誓之春即武成之一月明矣後漢陳寵傳謂周以子月為春商以丑月為春葢因周厯以建子為春而遂言商亦改時也朱子嘗云周禮有正月有正歳則周實是元改作春正月夫子行夏之時只是為他不順欲改從建寅又曰劉質夫以春字為夫子所加但魯史本謂之春秋則似元有此字今考春秋於文九年書春毛伯求金二月叔孫如京師三月夫人至僖十八年書夏師救齊五月戰甗宣九年書秋取根牟八月滕子卒九月㑹扈成十七年書冬公㑹伐鄭十一月公至十二月日食而又書冬大雨雪春無氷以紀異則經所書之春夏秋冬皆周正四時之首月也文定引商秦為證謂周不改月然新莽以十二月朔為嵗始不改月魏明帝以丑月為正改三月為四月唐武后改十一月為正月十二月為臘月夏正月為一月肅宗以子月為嵗首又以十二辰紀月則厯代時月或改或不改豈可引彼以喻此乎孔氏正義以為月改春自移春非王所改似亦臆度之辭近世之論有主建寅而未改月者考之春秋所書災異及日食交限則不合又有謂周雖改月數而不改夏時春秋四時之序皆魯厯所更然夫子之時猶存告朔之餼羊則魯實承周之正朔未甞改厯後世所稱魯厯又謂之春秋厯特因春秋而逆推之耳或又謂周以子月為嵗首而春秋以寅月為正月每年截子丑月事移在前一年如此則真事與月差兩月矣先儒以此為千百年不决之論姑記此以俟來哲三月公及邾儀父盟于蔑父音甫凡人名地名放此蔑莫結反凡書邾公並作邾婁蔑公榖作昧此凡盟之始左傳公攝位而欲求好於邾故為蔑之盟儀父邾子克也未王命故不書爵公羊傳及者何與也㑹及暨皆與也㑹猶最也及猶汲汲也暨猶暨暨也及我欲之暨不得已也儀父邾婁之君也何以名字也榖梁傳及者内為志焉爾儀字也父猶傅也男子之美稱也其不言邾子邾之上古微未爵命於周也程子傳盟誓以結信出於人情先王所不禁也後世屢盟而不信則罪也諸侯交相盟誓亂世之事也凡盟内為主稱及外為主稱㑹在魯地雖外為主亦稱及彼來而及之也兩國以上則稱㑹彼盟而往㑹之也邾附庸國邾子克字儀父附庸之君稱字同王臣也外域則稱名降中國也杜氏曰邾今魯國鄒縣蔑姑蔑魯國下縣南有姑城夾漈鄭氏曰今兖州瑕丘縣有姑蔑城愚按鄒縣屬今滕州瑕丘在今大名路開州濮陽縣魯侯爵而其君稱公此臣子之詞何氏曰魯稱公者臣子之心所欲尊號其君父公者五等之爵最尊者也陸氏曰公者臣子之敬詞也張氏曰夫子魯人也書他國諸侯侵伐盟㑹則從其本爵而魯獨書公葢父母之邦先祖之所逮事從臣子所稱之爵所以崇敬也春秋從周之文而不革者也愚按䀻禮大射儀燕禮五等諸侯皆稱公而公食大夫禮又以名篇則謂君為公周之制也通㫖凡稱公者有定名有虛位天子三公稱公王者之後稱公此定名也魯侯稱公其子稱公子其孫稱公孫諸伯子男亦皆稱公此虛位也定名辨等列之實虚位逹臣下之情定名禮之質虚位禮之文憲問宋本公爵自餘僣稱公者皆貶從本爵而魯獨不降稱何也貶其僣稱當也其死則又降而稱卒從大夫之禮惟魯仍稱薨至於其間有書葬者則又稱公何也曰春秋魯史也仲尼於魯事有君臣之義故内外異辭邦君之薨雖齊晉大國皆書卒以其不命於天王而私自立正其名也及其既葬雖邾薛小邦皆稱公以其不請於天王而私自諡著其僣也魯侯皆稱公卒事而繋諡亦稱公者乃臣子之敬辭春秋從周之文而不革者也然卒事而繋諡特稱菲我君以别之其書法亦謹矣據此内辭則周公追王之禮雖古無有而春秋葢取之也據此外辭則仲尼不使門人為臣是謂以身為度而曽子易簀必以正終者乃傳春秋之法矣我所欲曰及邾者魯之附庸范氏曰邾附庸之國儀父其君之字也孫氏曰附庸之君未得列於諸侯故書字以别之董子曰附庸字者方三十里名者方二十里愚按黎氏以儀父為名且謂字必取於名儀父無取於克然周有王子克楚有鬬克皆以子儀為字則儀父為字可知何以稱字中國之附庸也邾儀父蕭叔皆稱字王朝大夫例稱字南季仍叔家父榮叔之類列國之命大夫例稱字魯單伯陳女叔鄭祭仲諸侯之兄弟例稱字公弟叔肸許叔蔡叔蔡季紀季之類中國之附庸例稱字其常也聖人按是非定褒貶則有例當稱字或黜而書名秦鍼宋辰之類例當稱人或進而書字王人子突之類其變也常者道之正變者道之中通㫖春秋王朝公卿與外諸侯則稱爵王朝大夫與諸侯大夫之命于天子者及中國之附庸諸侯之兄弟則稱字上士中士與諸侯自命之大大及外域之附庸諸侯兄弟以屬通者則稱名下士與小國之大大則稱人文集春秋大夫非三命為正卿者姓氏不登於史册春秋大義公天下以講信修睦為事禮運大道之行天下為公選賢與能講信修睦而刑牲歃色泠反歠也血要於遥反約也質與劕同劵也鬼神孔氏曰盟者殺牲歃血告誓於神若有背違令神加殃如此牲也先鑿地為方坎殺牲於坎上割牲左耳盛以珠槃又取血盛以玉敦用血為盟書成乃歃血讀書鄭氏曰盟辭書于䇿讀其書以告神坎其牲加書於上而埋之則非所貴也故盟有弗獲已者諸侯相仇怨不得已而為盟以釋之而汲汲欲焉書及則非不得已而盟實隠公欲之有汲汲之意惡烏故反隠公之私也朱子語如蔑之書而私盟之罪自見髙氏曰隠自謂為桓而立内慮國人之不己恱外懼屬國之不已從而邾以附庸未通和好故與邾首結私盟夫盟者嘉禮也非在䘮者所可行也或言公羊傳褒其首與公盟而書字失之矣劉氏曰凡記盟㑹於王法所不得為皆貶也若以初入春秋結信於魯故得貴之則桓十七年盟趡又何為乎永嘉吕氏曰榖梁云不日其盟渝也謂七年伐邾也然則所書日盟者皆不渝乎家氏曰春秋之盟有二有公天下而為之盟者有私一國而為之盟者齊桓晉文合諸侯奬王室是雖衰世之事聖人猶或與之為其近於公也若春秋初年諸侯自相為盟各為其私計則春秋之所惡於蔑以後于蔇以前皆盟之私者甚而黨簒朋兇怙惡濟虐復要鬼神以為之盟誓是謂天地神明而可以邪辭干也此盟之尤無忌憚者也公及邾儀父盟于蔑譏也不惟譏盟譏其始即位而為此盟也國君繼世之初上而尊天子下而交四鄰撫百姓豈無他事而隠公即位未幾惟此為先務春秋之書之示非所宜先也凡諸侯自相為盟各去其國者兩相下之義也迨桓文之興其權力足以號召諸侯亦不敢盟於國都而必以其地者懼其擬於王耳愚按書盟一百九于蔑為春秋之始句繹為春秋之終隠公屈禮而求好三桓取地而要言皆魯人汲汲非邾之意也後七年隠公興伐邾之師哀公有入邾之役盟豈足信哉始則盟出於魯君終則盟出於三家世變又可見矣夏五月鄭伯克段于鄢鄢音偃左傳段不弟故不言弟如二君故曰克稱鄭伯譏失教也謂之鄭志不言出奔難之也公羊傳克者殺之也曷為謂之克大鄭伯之惡也母欲立之已殺之如勿與而已矣榖梁傳殺世子母弟目君段弟也而弗謂弟公子也而弗謂公子貶也段夫子弟之道矣賤段而甚鄭伯也何甚乎鄭伯甚鄭伯之處心積慮成於殺也于鄢逺也猶曰取之其母之懐中而殺之云爾甚之也為鄭伯者宜奈何緩追逸賊親親之道也程子傳鄭武公娶于申曰武姜生莊公及共叔段愛段欲立之亟請於武公公弗許及莊公即位請京使居之謂之京城太叔段失道而公弗制祭仲諌而公弗聽故詩人譏其小不忍以致大亂也段完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期命子封伐京京叛段段入于鄢公伐諸鄢太叔出奔共書曰鄭伯克段于鄢鄭伯失為君之道無兄弟之義故稱鄭伯而不言弟克勝也言勝見段之強使之強所以致其惡也不書奔義不繫於奔也杜子曰鄭在滎陽宛陵縣南鄢今潁川鄢陵縣張氏曰鄭今鄭州新鄭縣鄢今開封府鄢陵縣愚按新鄭縣今屬汴梁路鈞州鄢陵縣今亦屬汴梁路髙氏以為鄢妘姓之國為鄭武所滅未知是否用兵大事也必君臣合謀而後動則當稱國命公子吕為主帥去聲則當稱將去聲出車二百乘去聲則當稱師據成六年晉欒書帥師救鄭襄十九年衛孫林父帥師伐齊皆稱國稱大夫稱師今莊公命子封出車二百乘以伐京當書曰鄭公子子吕帥師三者咸無稱焉而專目鄭伯目猶稱也是罪之在伯也陸氏曰凡君討其臣但稱國鄭伯養成其惡故特稱鄭伯陳氏曰譏不在其臣子也張氏曰春秋於諸侯之國事則稱國言君與大臣共圖之也於其君之父子兄弟出入誅殺之事則稱君著其君之志也猶以為未足又書曰克段于鄢克者力勝之詞本孫氏趙氏曰克者能勝之名陳氏曰克之為言勝也以千乘之國勝其弟云爾不稱弟路人也陸氏曰並無骨内之心通㫖段惡不待書而著陳氏曰先君之子稱公子有謂稱弟若簒若爭國也而后但名之如衞州吁陳佗之類于鄢操倉刀反把待也之為已蹙矣操迫也公羊莊三十盖以操之為己蹙矣夫音扶後凡語端語已之辭並同君親無將公羊莊三十二君親無將將而誅焉段將以弟簒兄以臣伐君必誅之罪也據將襲鄭而莊公特不勝音升其母焉爾據詩小序不勝其母以害其弟曷為縱釋叔段移於莊公舉法若是失輕重哉曰姜氏當武公存之時常欲立段矣及公既没姜以國君嫡母主乎内段以寵弟多才居乎外國人又恱而歸之據詩小序叔多才而好勇不義而得衆也又曰叔處于京繕甲治兵以出于田國人恱而歸之愚按詩序先儒多所不取而文定引之者葢斷章取義借其辭以明己意耳後放此恐其終將軋乙㸃反勢相傾也荀子秦恐天下之一合而軋已已為後患也故授之大邑而不為之所縱使失道以至於亂左傳祭仲曰都城過百雉國之害也先王之制大都不過參國之一中五之一小九之一今京不度非制也君將不堪公曰姜氏欲之焉辟害對曰姜氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎公曰多行不義必自斃子姑待之既而太叔命西鄙北鄙貳於己公子吕曰國不堪貳君將若之何欲與太叔臣請事之若弗與則請除之無生民心公曰無庸將自及太叔又收貳以為巳邑至于廪延子封曰可矣厚將得衆公曰不義不暱厚將崩然後以叛逆討之則國人不敢從姜氏不敢主而太叔屬籍當絶不可復扶又反居父母之邦此鄭伯之志也本左傳鄭志王政以善養人本孟子推其所為使百姓興於仁而不偷也本論語况以惡養天倫使陷於罪因以剪之乎張氏曰仁人之於弟不藏怒宿怨其或不中不才亦必正之以義使不格奸厚之以恩使不離富貴今莊公之於叔段無念鞠子哀之心而懐其母偏愛欲奪己位之恨授之大都而不為之所縱使失道以至於亂方其居京收邑之時可制而不制如鷙鳥將擊而匿形於未發之先稔其惡以待其成及其逆跡已露然後以冦讎之法討之以力勝為事必誅為志至於伐京伐鄢之日雖段之死於兵有所不恤矣經不言弟段固罪其不弟然莊公非特以段之不才棄之乃其心實欲養其惡待其冦賊無復天倫之念故書曰克段于鄢然後莊公忮忍之心施於同氣者舉形於筆削之間矣春秋推見至隠史司馬相如傳首誅其意以正人心示天下為公不可以私亂也垂訓之義大矣愚按晉人克欒盈不書克而稱人以殺者盈有罪當殺故也苟非鄭伯之罪則當如宋辰之例書段入于鄢以叛而又書段出奔矣啖氏曰不言段奔乃夫子譏其志在於殺若言奔則鄭伯但有逐弟之惡無殺弟之罪也趙氏曰公榖以克為殺春秋前後未有以克為殺者鄱陽萬氏曰殺則不言克克則未嘗殺愚按莊公曰寡人有弟不能和恊使糊其口於四方則未殺明矣秋七月天王使宰咺來歸惠公仲子之賵咺吁阮反賵撫鳯反此王室下文諸侯之始公羊傳宰者何官也咺者何名也惠公隠之考也仲子桓之母也不稱夫人桓未君也賵者何䘮事有賵賵者盖以馬以乘馬束帛車馬曰賵貨財曰賻衣被曰禭榖梁傳禮賵人之母則可賵人之妾則不可程子傳王者奉若天道故稱天王其命曰天命其討曰天討盡此道者王道也後世以智力把持天下者覇道也春秋因王命以正王法稱天王以奉天命夫婦人倫之本最當先正春秋之時嫡妾僣亂聖人猶謹其名分男女之配終身不變者也故無再娶之禮大夫而下内無主則家道不立故不得已有再娶之禮天子諸侯内職其備后夫人已可以攝治無再娶之禮春秋之始尚有疑焉故仲子羽數特異僖公而後無復辨矣春秋用其竊號而書之以志僣亂仲子繋惠公而言故正其名不曰夫人曰惠公仲子謂惠公之仲子妾稱也以夫人禮賵人之妾不天亂倫之甚也然春秋之始天王之義未見故不可去天而名咺以見其不王王臣雖微不名况於宰乎上古應去聲時稱號故其名三變皇帝王春秋以天自處創制立名稱天王獨見於周官然國火未嘗稱天王繫王於天為萬世法其義備矣啖氏曰稱天王表無二尊臨川吳氏曰禮云臣之所天者君也周王為衆侯國之君侯國以王為天也愚按春秋之時徐楚吳越皆僭王號故稱天王以表至尊之義而春秋之末越人號稱夫差為天王晉世五胡多號天王謬妄滋甚亦猶春秋之初除楚之僣王也冢宰稱宰愚按說公羊者以宰為士或引小宰宰夫為證然周官三百六十他官未嘗見經何獨於小宰而書之乎或以宰為氏引宰子為證然宰周公宰渠伯糾豈可亦以為氏乎惟劉氏意林謂春秋於大夫莫書其官至冡宰則書之此見任之最重宰者専稱非中士所當冒最得經意且左傳僖九年稱宰孔使經不書宰周公而書其名則論者亦疑為士與氏矣咺者名也王朝公卿書官愚按王朝公卿惟宰咺止書宰自餘有封邑者皆以爵繫封邑葢天子公卿書官有封邑繋爵故桓四年傳曰王朝公卿書爵大夫書字如南季仍叔上士中士書名劉夏石尚下士書人如㑹洮稱王人是也子突救衞褒稱字王子虎盟翟泉貶稱人咺位六卿之長展兩反而名之何也仲子恵公之妾爾以天王之尊下賵諸侯之妾周禮職喪掌諸侯之䘮凡國有司以王命有事焉則詔賛主人注有事謂含禭贈賵之屬是加冠於屨人道之大經拂矣趙氏曰天子而賵妾母是啓僣也朱子語來賵仲子便自見得以天王之尊下賵諸侯之妾愚按在禮君不撫僕妾以其賤也外臣之妾而天王賵之何以示法則於天下乎天王紀法之宗也六卿紀法之守也議紀法而修諸朝廷之上則與音預聞其謀頒紀法而行諸邦國之間則專掌其事太宰建邦六典以佐王治邦國而承命以賵諸侯之妾是壊音怪法亂紀本禮運自王朝始也春秋重嫡妾之分扶問反故特貶而書名以見音現宰之非宰也通㫖冢宰同體之臣建典禮操賞刑至公不黨以共天位代天王治天職也宰咺黜而書名者來賵仲子悖典禮也宰糾黜而書名者來聘桓公紊賞刑也施於公卿者如此訓後世人臣不可失天職也或曰僖公之母成風亦莊公妾也其卒也王使榮叔歸含户暗反且賵其葬也王使召音卲伯來㑹葬下賵諸侯之妾而名其宰榮召何以書字而不名也於前賵仲子則名冢宰於後葬成風王不稱天其法嚴矣前後互貶君臣同罪陳氏曰有賵妾母者矣必宰自為使而後貶貶其甚者也家氏曰春秋之義君有過先責其宰名咺所以責也責宰所以責王也使而非宰則其責在王矣張氏曰惠公以去年薨仲子卒之年月不可知或亦去年也天子於諸侯有賵禮所以褒有功徳而厚其終也諸侯無再娶之禮恵公牽於私愛寵庻妾而立為夫人正犯以妾為妻之戒瀆亂夫婦之綱乃天討之所當加九伐之法所謂犯令陵政葢此類也平王不能正恵公之罪反厚其送終之禮遣冡宰而來賵冢宰不能以紀法詔王乃奉命以賵上僣之妾仲尼以春秋之初方書天王以立法於是貶冢宰於上士中士之例深罪其以百揆之尊瘝官失職一至於此貶其臣則君可知矣凡春秋之書以尊者而貶從卑者之例必有大罪極惡而後加焉不可以常事觀也髙氏曰隠自以為桓立故以桓母之䘮告于天王又受天王之賵陷天王於非禮罪可知矣啖氏曰左氏云豫凶事夫仲子而在天子寜有歸其賵乎不辨菽麥者猶不當爾文集仲子猶存生而來賵周徳雖衰不應至此極劉氏曰公羊云言來不及事也榮叔含賵實不及事何以不言來乎愚按穀梁以仲子為恵公之母葢泥於文九年書僖公成風故爾朱子語惠公仲子恐是惠公之妾僖公成風却是僖公之母不可一例看九月及宋人盟于宿此參盟之端公羊傳敦及之内之微者也穀梁傳及者何内卑者也宋人外卑者也程子傳恵公之季年敗宋師于黄公立而求成焉盟于宿魯志也稱及稱人皆非卿也杜氏曰宋今梁國睢陽縣宿國東平無鹽縣張氏曰宋今應天府宋城縣愚按宋國在今歸徳府無鹽故城今東平路須城縣髙氏曰桓宋出也隠公懼宋故與宋合内稱及孫氏曰不可言魯人外稱人皆微者其地以國宿亦與音預焉杜氏曰客主無名皆㣲者也凡盟以國地者國主亦與焉㣲者盟㑹不志于春秋據公子豫及邾人鄭人盟于翼經不書此其志者有宿國之君也陳氏曰憂參盟故録其所從始凡書盟者惡烏故反之本何氏注通㫖盟非春秋所善然髙子知權以定魯貫澤服江黄以制楚召陵修禮義以服楚首止尊世子以定大倫葵丘發五命以申天子之禁皆美其事也非善其盟也或曰周官有司盟掌盟載之法司盟凡邦國有疑㑹同則掌其盟約之載及其禮儀北面詔明神注載盟辭也為辭而載之於䇿詛側慮反祝之又反作其詞詛祝作盟詛之載辭以叙國之信用以質邦國之劑信玉府共音㳟其器玉府若合諸侯則共珠槃玉敦注合諸侯必割牛耳取其血歃之以盟珠槃以盛牛耳尸盟者執之玉敦歃血玉器戎右役其事戎古㑹同充革車則盟以玉敦辟盟遂役之賛牛耳桃茢大音泰史藏其約於妙反大史凡邦國都鄙及萬民之有約劑者藏焉蘇公亦曰出此三物以詛爾斯詩何人斯蘇公刺暴公也注三物犬豕雞刺其血以詛盟之夫盟以結信出於人情先王猶不禁也而謂凡書盟者惡之可乎曰盟以結信非先王所欲而不禁逮徳下衰欲禁之而不克也趙氏曰記禮所言亦據二代之衰時耳張氏曰司盟之設聖人葢為諸侯之仇怨不釋者設爾殆衰世之意聖人立法常關盛衰故不得已而建此官以待之也屢盟之長亂自幽厲以来惡之矣春秋之時㑹而歃血其載果掌於司盟猶不以為善也定四年子魚曰踐土之盟其載書云王若曰晉重魯申衛武蔡甲午鄭㨗齊潘宋王臣莒期藏在周府可覆視也又况私相要誓載書不掌於司盟慢鬼神既盟復背犯刑政以成傾危之習哉今魯既及儀父宋人盟矣尋俄也自叛之七年伐邾十年伐宋信安在乎故知凡書盟者惡之也趙氏曰盟者刑牲而徴嚴於神明者也王綱壞則諸侯恣而仇黨行故干戈以敵仇盟誓以固黨天下行之遂為常焉若王政舉則諸侯莫敢相害盟何為焉賢君立則信著而義逹盟可息焉觀春秋之盟有以見王政不行而天下無賢侯也朱子語問胡氏傳春秋盟誓處以為皆惡之楊龜山亦嘗議之矣今民泯泯棼棼罔中于信以覆盟詛之時而遽責以未施信而民信之事恐非化俗以漸之意也曰不然盟詛必竟非君子之所為故曰君子屢盟亂是用長將欲變之非去盟崇信俗不可得而變也愚按内及盟而不書君大夫者有九文定於此盟以為内之微者及蘇子盟女栗無傳齊髙傒晉處父及晉荀庚等之来聘而盟皆以為公與之盟而諱之據榖梁卑者之盟不日則女栗不日亦内之卑者據趙氏云凡盟不日内皆指公以示耻則于宿亦是公及盟竊疑宿之盟外稱人而内止書及則内亦㣲者也苟謂諱公則浮来及莒人何以不諱乎女栗之盟盟天子之大夫不書内卿則是公同歃安敢以㣲者莅之乎苟謂㣲者盟不日則僖十九年盟齊二十九年盟翟泉皆稱人皆不書日未必皆㣲者也况鄟陵臯鼬皆所見之世公與諸侯盟何以皆不日乎冬十有二月祭伯來祭側界反此王臣私交之始公羊傳祭伯天子之大夫也榖梁傳来者来朝也弗謂朝何也寰内諸侯非有天子之命不得出㑹諸侯不正其外交故弗與朝也聘弓鍭矢不出竟埸束脩之肉不行竟中有至尊者不貳之也程子傳祭伯畿内諸侯為王卿士来朝魯不言朝不與其朝也當時諸侯不修朝覲之禮失人臣之義王所當治也祭伯為王臣不能輔王正典刑而反與之交又來朝之故不與其朝以明其罪先儒有王臣無外交之說甚非也若天下有道諸侯順軌豈有内外之限其相交好乃常禮也然委官守而逺相朝無是道也周禮所謂世相朝謂鄰國耳愚按祭伯采邑在今汴梁路鄭州管城縣故祭城按左氏曰非王命也據不言天王使祭伯畿内諸侯為王卿士祭畿内邑伯爵天子之卿稱邑爵來朝于魯而直書曰來不與其朝也劉氏曰有不可朝而不與朝祭伯來是也有不能朝而不與朝介葛盧是也愚按王臣出使侯國必有其事但書來不言為何事比之外域與亡國之君所以深貶之人臣義無私交大夫非君命不越竟音境郊特牲為人臣者無外交不敢貳君也檀弓古之大夫束脩之問不出竟所以然者杜朋黨之原為後世事君而有貳心者之明戒也惟此義不行然後有藉外權如繆音穆留之語去聲韓宣恵者史韓世家宣惠王兩用公仲公叔繆留曰多力者内樹黨寡力者藉外權交私議論如莊助之結淮南者前嚴助傳武帝令助諭南越王還又諭淮南王與之相結而還後淮南王來朝厚為遺助交私論議及淮南反事與助相連張湯曰腹心之臣而外與諸侯交私助竟棄市倚強藩為援於眷反以脅制朝廷如唐盧擕之於髙駢唐書盧擕𫝊擕初為相嘗薦髙駢駢將屢破黄巢復以擕為相擕奏以駢為諸道行營都統擕病風不能行外倚駢寵遇甚厚巢將度淮表求天平節度擕素厚髙駢屬以立功乃固不可巢請及巢入僮關擕仰藥死崔𦙍之於宣武同上崔𦙍傳朱全忠為宣武節度使時王室不競南北司各植黨結藩鎮内相陵脅𦙍屢為相素厚全忠委心結之有急則宻求援全忠表言𦙍有功不宜處外故復相而貶陸扆𦙍恃全忠專權自恣天子動靜皆禀之刑賞係其愛憎中外畏之全忠謀脅帝遷洛懼𦙍異議宻表𦙍專國亂權𦙍罷死昭緯之於邠岐者矣通鑑王行瑜斬朱玫授邠寜節度李茂貞平李昌符以為鳯翔節度楊復恭楊守亮反行瑜等請發兵討之既破賊恃功驕横上表不遜朝廷以杜讓能為太尉出兵討行瑜茂貞時崔昭緯為相隂結邠岐為之耳目讓能朝發一言二鎮夕必知之行瑜等合兵拒官軍乃貶讓能與二鎮約和李克用討行瑜昭緯貶死經於内臣朝聘告赴皆貶而不與三年尹氏卒莊二十三祭叔來聘文三王子虎卒定四劉卷卒正其本也豈有誣上行私本樂記自植其黨之患哉通㫖問王之卿士固不應朝諸侯矣然當時諸侯朝魯聖人盡書其朝者與其朝耶又於蕭叔特書朝公杞伯姫來朝其子何也曰聖人作春秋其筆端隨事造化變動不居難以一例言也畿内諸侯與畿外諸侯自有等差聖人既於祭伯來朝直書曰來不與其朝以明王臣無外交之義矣外諸侯本有朝聘之禮聖人盡書其朝隨事觀之其義不一蕭叔獨書朝公者以榖非其所也杞伯姬來朝其子婦人而以其子來聖人大意戒婦人不可與國事也啖氏曰公羊曰不稱使奔也按例周大夫無不言奔之義公子益師卒程子傳諸侯之卿必受命於天子當時不復請命故諸侯之卿皆不書官不與其為卿也稱公子以公子故使為卿也惟宋王者後得命官故獨宋卿書官卿者佐君以治國其卒國之大事故書於此見君臣之義矣或日或不日因舊史也古之史記事簡略日月或不備春秋因舊史有可損而不能益也凡公子公孫登名於史冊貴戚之卿也不書官者故侍講程頥本注後皆稱氏愚按此傳經進君前臣名以謂不與其以公子故而自為卿也古者諸侯大夫皆命於天子通㫖大國三卿命於天子次國三卿二卿命於天子小國三卿一卿命於天子此禮之常也東周以來列國之卿多不請而自命故皆削其官所以正王法也張氏曰東遷以來王命不行諸侯不以天子之命為重故三命再命之制不復請於王而其強大者亦不守列國三卿之制如晉至於命六卿魯至鞌之戰亦有四卿間雖有請於王如士㑹以黻冕命將中軍亦非復先王之制矣此春秋所以於列國之大夫自宋統承先王得自命官者或有司馬司城之書而此外一切削之也卿卒必書此春秋貴大臣之意昭九屠蒯曰君之卿佐是謂股肱股肱或虧何痛如之安定胡氏曰故問其疾弔其䘮賵其葬必厚其送終之恩此春秋書大夫卒之㫖也趙氏曰不書葬降於君也朱子語内大夫卒而略外大夫是别内外之辭其不日公羊以為逺然公子彄苦侯反逺矣而書日則非逺也叔孫得臣卒近而不書日榖梁以為惡然公子牙季孫意如惡矣牙弑子般意如逐昭公而書日則非惡也公孫敖仲遂亦惡而書日左氏以為公不與音預小斂力驗反下同然公孫敖卒于外而公在内叔孫舍卒于内而公在外不與小斂明矣而書日左氏之說亦非也公孫嬰齊卒于貍脤叔詣卒而公在乾侯皆不與小斂亦書日其見音現恩數之有厚薄歟齊氏曰日卒之例但繫恩之厚薄通㫖問杜注春秋不以日月為例惟卿佐之䘮獨託日以見義書日不書日示薄厚也春秋書大夫卒三千惟益師無駭挾得臣不書日若謂三人在隠公之世恩禮疎薄故不書日則得臣嘗與仲遂同如齊歸而子赤見弑何氏謂得臣知遂逆謀蔽賊而不言則得臣乃仲遂之黨也仲遂有寵於宣公則得臣卒於宣五年不應見薄矣婼叔詣皆欲納昭公不克昭公在外意如在内又安得厚之乎且自公子彄公子牙以後無有不日者獨四人不日伊川先生謂春秋因舊史有可損而不能益恐此義為正曰魯史記本國卿佐之卒宜詳而有不日者以公子彄事尤久逺而書日疑其見恩禮之有厚薄也得臣不能為有無故略而不書若意如之加厚於二卿一則喜其卒二則欲掩其逐君之罪爾愚按或日或不日文定謂恩數厚薄似據左傳公子彄葬之加一等故云爾然文公而工一百一十四年書日百有七十宣公而下一百二十八年書日二百二十年數略同而日數近倍則程子謂因舊史理或然也内大夫見經者四十有七卒者三十一不書卒十有六慶父歸父僑如臧紇公子愸出奔公子買公子偃刺何忌州仇叔還卒於獲麟之後餘六人文定以翬弑隠公彭生不發襄仲之謀貶不書卒柔溺結之不卒非正大夫故正其分啖氏以單伯淫叔姬黜其卿位且引孫濟百嵗更娶為證今考無駭挾與柔溺書法無異結書族未必非大夫單伯書字無貶辭似未嘗黜况莊元年逆王姬至文十五年至自齊八十餘年必非一人或父子同稱如晉欒書欒黶同稱欒伯也竊疑大夫或卒或不卒亦因史舊文耳庚平王五申十年二年齊僖十晉鄂三衛桓十四蔡宣二十九鄭莊二十三曹桓三十六陳桓二十四杞武三十宋穆八秦文四十五楚武二十春榖梁傳隠十年無正隠不自正也元年有正所以正隠也陸氏曰十年無正譏隠合居其位而不正以貽其禍也髙氏曰不自正者非隠當時不自有之乃聖人罪其當正而不正也王之正月而公不自正何也天子頒厯于諸侯諸侯告朔于廟而後布政公欲讓桓若政不自已出者也王氏曰隠十年無正書春而無月者六非皆事不必月而月所不能該也所以正隠也隠元年有正月二年以後無正月定元年無正月二年以後有正月隠不有其位欲授國于桓以召亂定得國於季孫意如故或正其始而不正其終或不正其始而終正之各因其事以見法焉公㑹戎于潛此書㑹之始亦㑹夷狄之始左傳修恵公之好也戎請盟公辭榖梁傳㑹者外為主焉爾知者慮義者行仁者守有此三者然後可以出㑹㑹戎危公也程子傳周室既衰蠻夷猾夏有號居中國者方伯大國明大義而攘斥之義也其餘列國慎固封守可也若與之和好以免侵暴非所謂夷狄是膺所以容其亂華也故春秋華夷之辨尤謹居其地而親中國與盟㑹者則與之公之㑹戎非義也杜氏曰陳留濟陽縣東南有戎城潛魯地愚按濟陽屬今濟南路鄭氏以廬州府治元名潜山然廬州非魯地也戎人舉號外之也啖氏曰凡外域不書爵號君臣同詞劉氏曰戎者戎之君也不以君稱之外之也王者内京師而外諸夏内諸夏而外蕃服正朔不加禮樂不及朝聘不與其國雖大皆曰子有故也然後著其名爵外之也宣十一年傳春秋正法不與外域㑹同分類也書㑹戎㑹狄㑹吳皆外詞也天無所不覆敷救反後放此地無所不載天子與天地參者也經解三王之徳參於天地天無私覆地無私載春秋天子之事獨于戎乎外之何也盖内之有外猶君子之有小人内君子外小人為泰泰卦内乾純陽外坤純隂陽為君子隂為小人杜欽策夷狄者中國之隂内小人外君子為否音痞否卦内坤外乾春秋聖人傾否之書内中國而外四逺使之各安其所也無不覆載者王徳之體内所當内外所當外王道之用愚按聖人之道理一而分殊若孟子言仁者無不愛又曰於物也愛之而弗仁於民也仁之而弗親與此意同是故以諸夏而親外域致金繒之奉首顧反也居下其䇿不可施也前賈誼𫝊天子天下之首蠻夷天下之足匈奴侮嫚侵掠至不敬也而漢嵗致金絮采繒以奉之夷狄徴令是主上之操也天子供貢是臣下之禮也足反居上首顧居下以外域而朝諸夏位侯王之上亂常失序其禮不可行也前宣帝紀匈奴呼韓邪單于來朝詔有司議其儀蕭望之以為單于非正朔所加故稱敵國宜待以不臣之禮位在諸侯王上荀恱曰春秋之義王者無外欲一于天下也外域遒里遼逺故正朔不及禮教不加非敵國之謂也望之之議僣度失序以亂天常非禮也以羌戎而居塞内無出入之防非我族類其心必異成四史佚云云萌猾亂也夏之階其禍不可長上聲也晉江統傳徙戎論曰漢馬援討叛羌徙其餘種於關中武帝徙武都氐於秦川夫關中帝王所居未聞𦍑氐宜居此土非我族類其心必異而居封域之中故能為禍滋蔓宜徙還塞外使戎晉不雜並得其所縱有猾夏之心所害不廣矣為此說者其知内外之㫖而明於馭逺之道通㫖賈誼謂首顧居下荀恱謂亂常失序江統謂非我族類皆明於馭逺人者後世如漢以南單于欵五原塞賜姓為藩臣其後劉淵劉聰大為中國患如石勒慕容氏苻堅姚萇乃見鮮卑羯氐羌之居塞内者浸淫不制遂迭起亂華至如唐以安禄山守范陽以范陽叛至於明皇幸蜀肅宗即位史思明繼起用兵不休唐室之禍不解直至於亡聖人謹華夷之辨其㫖逺矣正朔所不加也奚㑹同之有書㑹戎譏之也何氏曰書㑹者惡其虚内務恃外好也孫氏曰諸侯非有天子之事不得出㑹諸侯况㑹戎哉張氏曰惠公與之有好既失之矣隠公復不能明内外之辨登戎夷於堂陛書㑹戎所以譏其降諸侯之尊失中國之重不修政事以攘夷狄以啓猾夏之階觀夾谷之㑹所謂裔不謀夏夷不亂華之言則知書㑹戎之㫖矣家氏曰國君即位之次年不聞朝京請命受服兄弟甥舅之國亦未得交相見而以㑹戎為首務尤春秋所譏也陳氏曰㑹戎于潜春秋之始㑹吳黄池春秋之終此春秋之所以始終也夏五月莒人入向向舒亮反此入國之始公羊傳入者得而不居也程子傳莒子娶于向向姜不安莒而歸莒人入向以姜氏還天下有道禮樂征伐自天子出春秋之時諸侯擅相侵伐興兵以侵伐人其罪著矣春秋直書其事而責常在被侵伐者葢彼加兵於已則當引咎或自辨諭之以禮義不得免焉則固其封疆告于天子方伯若忿而與之戰則以與戰者為主處已絶亂之道也書莒人㣲者也凡將尊師衆曰某帥師將尊師少曰某伐某將卑師衆曰某師將卑師少曰某人不知衆寡將帥名氏亦曰某人書入入其國也侵人之境且為暴况入人之國乎杜氏曰莒國今城陽莒縣向小國譙國龍亢縣東南有向城張氏曰莒巳姓今宻州莒縣向姜姓炎帝之後漢志向屬沛郡寰宇記屬應天府榖熟縣愚按莒縣今屬益都路莒州向城在今益都路沂州無駭帥師入極駭榖作侅後同帥朔律反後放此此大夫專兵之始左傳司空無駭入極費庈父勝之榖梁傳極國也程子傳古者卿皆受命于天子春秋之時諸侯自命已賜族者則書族不書族者未賜也賜族者皆命之世為卿也杜氏曰極附庸小國賈逵云戎邑左氏曰莒子娶于向向姜不安莒而歸莒人入向以姜氏還此所謂按也春秋書曰莒人入向此所謂斷音鍜也程子曰傳為按經為斷以事言之入者造七到反其國都以兵破其城郭蹂踐朝市謂之入以義言之入者逆而不順榖梁入者逆詞莒稱人小國也孫氏曰春秋小國卿大夫皆略稱人無駭不氏未賜族也左傳無駭卒羽父請諡與族張氏曰無駭挾皆内大夫之未賜族者左氏稱司空無駭不書官夫子削之也其書帥師用大衆也臨川吳氏曰師者兵衆之稱周禮萬二千五百人為軍二千五百人為師五百人為旅軍師旅三名師在其中故舉中以該上下而總名其軍旅之衆曰師非王命而入人國邑逞其私意見諸侯之不臣也孫氏曰隠桓之際國無大小用師皆專行擅興而征討不加焉見天王之不君也張氏曰當時征伐不自天子出陵弱暴寡紛然無制莒魯擅興師徒入人國邑皆王法所當誅據事直書義自見音現矣杜氏曰直書其事具文見意公羊昭元不待貶絶而罪惡見愚按直書而義自見乃聖人作經之大㫖故曰文則史義則竊取之葢聖人筆削魯史之舊文取其義以為後世法直書其事而褒貶瞭然矣春秋之初大夫猶稱名而不氏僖公以後大率書氏見世卿之盛也經書帥師者百有三十僖公以前書帥師者僅九皆内大夫文宣以後外大夫多書帥師定哀之間尤數數書之大夫之強又可見矣又按榖梁以向為我邑然不書伐我則非我邑也據後書公伐莒取向則向為小國而莒㓕之耳二傳以為㓕極然滅鄟滅邿書取而極不書取則非滅也趙氏曰公榖皆云無駭不氏貶滅同姓之國若實滅同姓則當直書滅極以示譏且無駭卒亦不氏何關滅同姓哉劉氏曰榖梁云入者内弗受也有入人之國而可以受之者乎所言者歸入之例也秋八月庚辰公及戎盟于唐此與戎盟之始左傳戎請盟復脩戎好也程子傳戎猾夏而與之盟非義也杜氏曰唐魯地髙平方與縣北有武唐亭張氏曰今單州魚臺縣愚按今屬濟寜路濟州按費音秘誓稱淮夷徐戎此葢徐州之戎久居中國在魯之東郊者也費誓篇首言徂兹淮夷徐戎並興篇終獨言征徐戎則夷戎並為患而戎尤甚也漢孔氏曰此戎葢帝王所覊縻居九州之内韓愈氏言春秋謹嚴進學解君子以為深得其㫖程叔子所謂謹嚴者何謹乎莫謹於中外之辨矣中國而自外則外之文十年外秦成三年外鄭昭十二年外晉戎狄肆暴則膺之詩閟宫戎狄是膺膺擊也此春秋之㫖也而與戎歃血以約盟非義矣事合宜之謂義先君征戎而已乃與之歃血約盟可謂宜乎是故成於日者必以事繫音繼日蘇氏白事成於日者日成於月者月成於時者時故崩薨卒葬日食山崩地震火災郊雩烝嘗盟戰滅入弑殺之類皆以日成朝聘㑹同侵伐圍救之類皆以月成城築蒐狩之類皆以時成而前此盟于蔑則不日盟于宿則不日後此盟于宻則不曰盟于石門則不日獨盟于唐而書日者謹之也隠公昉與戎盟故謹而日之後此桓公二年及戎盟不書日後世乃有結和親以許婚而骨肉棄於逺如西漢之於匈奴前髙帝八年取家人子名公主妻單于惠帝三年文帝六年景帝五年皆以公主嫁單于乞外兵以求援而畿輔被去聲其逼如肅宗之於回紇通鑑至徳元載安禄山䧟長安上欲借兵於外蕃以張軍勢遣使回紇以請兵乾元初上以寜國公主下嫁是後回紇數背約舉兵向塞殺掠甚衆信甘言以與盟而臣主蒙其恥如徳宗之於尚結贊同上貞元三年吐蕃尚結賛屢遣使求和且請修盟而歸侵地馬燧信其言為之請於朝渾瑊為㑹盟使使將二萬餘人赴盟所將盟吐蕃伏精騎數萬於壇西瑊等皆不知虜伐鼔三聲大譟而至唐將卒皆東走虜縱兵追擊或殺或擒之韓遊環表言虜刼盟上大驚雖悔於終亦將奚及春秋謹唐之盟垂戒逺矣張氏曰中國諸侯與戎相詛尤不可之大者葢盟者刑牲以相示謂神之殛背約者當如此牲同類為之尚以長亂輕信外蕃而與之詛一有問隙惟利是視則求小疵而責大信必肆其豺狼之暴為中國之大禍故春秋於唐之盟不特謹其日又特書及戎盟深罪隠公之失道而以啟亂萌也薛氏曰盟逮于戎世變之甚者髙氏曰書及者聖人深責中國而不罪乎戎也其不罪戎者乃所以外之也家氏曰魯望國之君諸夏所視儀而聽倡者也春而㑹戎秋而盟戎既為特㑹又為特盟春秋一嵗再書所以貶也書公及戎盟是之謂非所當及而及此春秋書魯事之凡也及戎之及又與及儀父莒人之及異矣此一及字要當隨事而觀以求春秋之意九月紀履緰來逆女冬十月伯姬歸于紀緰音須履緰左作裂繻左傳卿為君逆也公羊傳履緰紀大夫也何以不稱使婚禮不稱主入外逆女不書此何以書譏始不親迎也始不親迎昉於此乎前此矣前此則曷為始乎此春秋之始也曷為或稱女或稱婦或稱夫人女在其國稱女在塗稱婦入國稱夫人榖梁傳禮婦人謂嫁曰歸反曰來歸程子傳非命卿皆書名以君命來逆夫人也在魯故稱女内女嫁為諸侯夫人則書逆書歸明重事也來逆非卿則書歸而已見其禮之薄也先儒皆謂諸侯當親迎親迎者迎於其所館故有親御授綏之禮豈有委宗廟社稷逺適他國以逆婦者乎非惟諸侯卿大夫而下皆然詩稱文王親迎于渭未嘗出疆也送之者雖公子公孫非卿則不書杜氏曰紀國在東莞劇縣張氏曰漢屬北海郡今青州壽光縣愚按今屬益都路按榖梁子逆女親者也使大夫非正也何氏曰紀無大夫書履緰者重婚禮也魯哀公問冕而親迎去聲不已重乎孔子對曰合二姓之好呼報反以為宗廟社稷主君何謂已重乎見禮記哀公問文定厥祥親迎于渭造舟為梁不顯其光詩大雅大明篇文王娶于莘國在渭水濵則世子而親迎也詩言文王初載書無逸文王享國五十年注四十七即位大戴禮文王十三嵗生伯邑考十五嵗生武王則其娶太姒乃為世子時也韓侯娶妻蹶音鱖父之子韓侯迎止于蹶之里詩韓奕篇則諸侯而親迎也有夫婦然後有父子有父子然後有君臣本易序卦夫婦人倫之本也逆女必親使大夫非正也入春秋之始名宰咺歸賵以譏亂法咺賵諸侯之妾是亂天子之法書履緰逆女以志變常諸侯親迎乃常禮爾使大夫逆則變常矣故特志其始王氏曰伯姬之歸紀始也見逆於裂繻終也見葬於齊侯實事之非常故志之以見婚姻之道闕衆妾之分扶問反定矣譏賵寵妾則嫡妾之分自見大昬之禮嚴矣桓三年傳爵有尊卑國有大小或迎之於其國或近之於境上或迎之於所館禮之節也紀侯於魯以大小言則親之者也而使履緰來是不重大昬之禮矣張氏曰劉夏祭公及凡諸逆女者皆不書使葢雖天子諸侯亦不自主昬所以養亷逺恥也通㫖内女出嫁多不書常事故也書者皆記禮之失伯姬歸于紀為不親迎而使履緰逆又為叔姬待年而書也不書則必疑以叔姬為夫人伯姬歸于杞為莊公過愛其女後二年即㑹于洮故書耳伯姬歸于宋為致女三國來媵之過又見其賢而書之也愚按春秋一經魯女嫁為諸侯夫人者七為大夫内子者四唯紀伯姬使履緰逆莒慶齊髙固自逆宋蕩伯姬為子逆他皆不書逆者或逆之者㣲或親迎得禮而不書也劉氏曰歸於諸侯則尊同尊同則志榖梁云履緰以國氏為其來接於我故進之且履緰國氏何異鄭詹而曰進之乎紀子伯莒子盟于密伯左作帛此外相盟之始公羊傳紀子伯者何無聞焉爾程子傳闕文也當云紀侯某伯莒子盟于密左氏附㑹作帛杜預以為裂繻之字春秋無大夫在諸侯上者公羊榖梁皆作伯杜氏曰密莒邑城陽淳于縣東北有宻鄉愚按今益都路宻州凡闕文有斷音鍜下同以大義削之而非闕者有本據舊史因之而不能益者亦有先儒傳授承誤而不敢增者如隠不書即位桓不書王賵葬成風王不書天吳楚之君卒不書葬之類皆斷以大義削之而非闕也愚按桓公四年七年無秋冬隠公閔公薨不地君弑賊不討不書葬之類皆斷以大義而削之也甲戌己丑桓五夏五桓十四紀子伯莒子盟于密之類或曰本據舊史因之而不能益者也或曰先儒傳授承誤而不敢增者也莊二十二年夏五月不係事二十四年郭公不書事僖二十八年壬申不係月文十四年叔彭生昭十年十有二月不書冬三十一年黒肱不係邾定六年仲孫忌十四年無冬皆闕文也闕疑而慎言其餘可矣必曲為之說則鑿矣孫氏曰紀本侯爵此稱子伯闕文也臨川吳氏曰子伯二字或是侯字之誤啖氏曰榖梁云紀子伯莒子而與之盟此闕文耳云伯之穿鑿甚矣左氏云魯故也以子帛為履緰字故附㑹耳劉氏曰子帛不當稱字若比之内大夫當曰紀子帛及莒子盟不當去及也十有二月乙卯夫人子氏薨榖梁傳夫人薨不地范氏曰夫人無出竟之事薨有常處程子傳隠公夫人也薨上墜之聲諸侯國内稱之小君同婦人從夫者也公在故不書葬於此見夫婦之義矣曲禮註薨顚壊之聲按榖梁子曰夫人子氏者隠之妻也卒而不書葬夫人之義從君者也張氏曰書内之夫人卒葬異於外尊尊也子氏不書葬婦人從君故君存則葬禮未備待君薨而合祔也宋朝皇后先崩必俟合葬於山陵葢古之遺制歟邦君之妻國人稱之曰小君卒則書薨以明齊也說文妻與已齊者也先卒則不書葬以明順也昏義明婦順也有夫婦然後有父子有父子然後有君臣夫婦人倫之本也入春秋之始於子氏書薨不書葬明示大倫苟知其義則夫夫婦婦而家道正矣陳氏曰隠桓之母俱不得為夫人則嫡庶之義明隠妻得為夫人則君臣之分定愚按左傳以子氏為仲子謂元年歸賵豫凶事安有其人未死而歸賵雖五尺童子固知其不可也杜預謂隠讓桓為太子成其母䘮以赴于諸侯審如此則考宫當加諡號矣公羊又以為隠之母然孟子既為夫人則聲子仲子均非正嫡聲子安可僣小君之號成風敬嬴所以稱夫人以僖宣二公越禮以尊其妾母隠公若果尊其母為夫人則當葬以小君之禮而書於經矣今考魯夫人見經者八文姜哀姜聲姜穆姜齊姜書薨書葬子氏以隠公在不書葬出姜歸齊亦不書薨孟子以同姓諱而畧之妾母見經者六仲子之卒在春秋之前成風敬嬴定姒齊歸皆書薨書葬稱夫人稱小君與正嫡無異仲子不稱夫人不稱小君猶未至如中葉以後失禮之甚也唯定十五年姒氏卒以哀公未即位故不成小君之禮爾鄭人伐衛此諸侯專征之始程子傳聲其罪曰伐衛服故不戰衛服可免矣鄭之擅興戎王法所不容也杜氏曰衛國在汲郡朝歌縣張氏曰今濬州黎陽縣愚按今屬衛輝路汲縣按左氏鄭共音恭叔之亂公孫滑出奔衛滑共叔子衛人為于偽反之伐鄭取廪延至是鄭人伐衛討滑之亂也愚按鄭莊志於殺段又欲絶其後嗣而夷之去年鄭人以王師虢師伐衛南鄙又請師於邾邾為之請於魯用師不已今再伐衛窮兵黷武遷怒復怨不貶絶而罪自見矣朱子語書伐國惡諸侯之擅興陸氏曰成公以前侵伐書人者逺事難詳不必皆微者也陳氏曰大夫將則書大夫自晉陽處父始凡兵聲罪致討曰伐此言討滑之亂則聲其納滑之罪如齊桓伐楚則聲其不貢包茅之罪潜師掠境曰侵掠者刼奪財物左傳鄭伯侵陳大獲宋向戌侵鄭大獲趙氏曰凡書侵伐不書勝敗殺掠而還也詳見莊十五年兩兵相接曰戰戰鬬也左傳皆陳曰戰繯其城邑曰圍繯于善反環也孟子環而攻之造其國都曰入造七到反至也凡書入或入其國都而不居如宋衛入鄭齊鄭入郕之類或入其國都而遂滅其宗廟社稷如秦入滑宋入曹之類徙其朝市曰遷毁其宗廟社稷曰滅詭道而勝之曰敗兩兵未陳以詐取勝悉虜而俘之曰取趙氏曰凡悉俘之曰取某師輕行而掩之曰襲左傳輕曰襲趙氏曰掩其不備曰襲已去而躡之曰追啖氏曰追者冦已去而躡之也聚兵而守之曰戌啖氏曰戌者以兵守之也以弱假強而能左右並如字之曰以皆誌其事實以明輕重内兵書敗曰戰僖公二十二年戰于升陘我師敗績獲公胄懸諸魚門諱不書敗惟莊九年戰于乾時書我師敗繢以與讎戰雖敗不諱也書滅曰取成公滅鄟襄公滅邿昭公滅鄫皆諱滅而書取惟僖公滅項乃公在㑹而季孫滅之故直書不諱特婉其辭為于偽反君隠也征伐天子之大權孟子征者上伐下也敵國不相征也今鄭無王命雖有言可執亦王法所禁况於修怨乎不書戰者程氏以為衛已服也衛服則可免矣此義施於伐而不書戰皆可通矣此伐而不言戰皆受伐之國自服而不待戰也故受伐者可免於罪辛平王五十酉一年崩三年齊僖十一晉鄂四衞桓十五蔡宣三十鄭莊二十四曹桓三十七陳桓二十五杞武三十一宋穆九卒秦文四十六楚武二十一春王二月程子傳月王月也事在二月則書王二月在三月則書王三月無事則書時書首月葢有事則道在事無事則存天時王朔天時備則嵗功成王道存則人理立春秋之大義也愚按春秋書王正月者九十三書王二月者二十三書王三月者十九皆於嵗首係王著周王之正朔以明大一統之義或嵗首所書事舊史止書時或例當書時則二月三月皆不書王如隠八年書遇垂三月歸祊襄十五年書春向戌聘二月盟文九年書春毛伯求金二月得臣如京三月夫人至之類是也何休乃謂二月殷之正月三月夏之正月王者存二王之後使統其正朔其說謬甚當周之世而存夏殷之正朔豈所謂大一統耶天無二日民無二王之義安在邪已已日有食之公羊傳記異也曰某月某日朔食正朔世其或日或不日或失之前或失之後失之前者朔在前也失之後者朔在後也榖梁傳言日不言朔食晦日也不言食之者知其不可知知也程子傳日有食之有食之者也更不推求何者也太陽君也而被侵食君道所忌然有常度災而非異也星辰陵歴亦然何氏曰不言月食之者其形不可得而覩也經書日食三十六去之千有餘嵗而精厯筭者所能考也其行有常度矣然每食必書示後世治厯明時之法也朱子詩傳厯法周天三百六千五度四分度之一左旋於地一晝一夜則其行一周而又過一度日月皆右行於天一晝一夜則日行一度月行十三度十九分度之七故日一嵗而一周天月二十七日有竒而一周天又二日半逐及於日而與之㑹一嵗凡十二㑹方㑹則月光都盡而為晦已㑹則月光復蘇而為朔晦朔而日月之合東西同度南北同道則月揜日而日為之食是皆有常度矣然王者修徳行政用賢去奸能使陽盛足以勝隂隂衰不能侵陽則日月之行雖或當食而月常避日故其遲速髙下必有參差而不正相合者所以當食而不食也若國無政則當食必食雖日行有常度而實為非常之變矣故春秋日食必書杜氏曰日月動物雖行度有大量不能不小有盈縮故有雖交㑹而不食者或有頻交而食者家氏曰日月行天各自有道雖云或相遇而道有表裏若月光在裏依限而食者多若月光在表雖依限而食者少自漢以來厯家每以百七十有三日為一交㑹未有頻月交㑹者而襄二十一年九月十月二十四年七月八月頻月頻食漢髙祖即位之三年十月十一月頻食以後至今千有餘年未有頻月食者故知天度有時而變其常兹所以為異也張氏曰於厯應食而春秋不書者尚多則日食必在交限其入限者不必盡食若過至未分月或變行以避之或五星潜在日下禦侮以救之或渉交數淺或在陽厯陽盛隂微則不食或徳之休明而有小眚焉則天為之隠雖交而不食此四者徳之所生也則災之所生乃徳之不修也明矣有常度則災而非異矣然每食必書示後世遇災而懼之意也日者衆陽之宗人君之表而有食之前孔光日食對災咎象也克謹天戒則雖有其象而無其應去聲弗克畏天災咎之来必矣凡經所書者或妾婦乘陵也其夫何氏曰桓十七年日食有夫人譛公使齊侯誘而殺之之應莊十八年日食有夫人如莒淫佚不制之應三十年日食有夫人淫亂通于二叔殺二嗣子之應或臣子背音佩君父是年日食有衛州吁弑君公子翬専兵權之應桓三年日食既有鄭拒王師之應莊二十五年二十六年日食有慶父叔牙專權淫恣將謀簒弑之應僖五年日食有晉里克弑二君之應文元年日食有楚世子商臣弑君之應十五年日食有宋弑杵臼齊弑商人宣公弑赤莒弑庶其之應成十七年日食有晉弑州蒲之應襄十四年日食有衛孫寗逐君之應二十四年日食既有齊崔杼衛寗喜弑君之應二十七年日食有閽弑呉子蔡般弑父莒人弑君之應昭七年日食有楚弑君䖍之應十五年十七年日食有意如專恣許弑君買之應二十一年二十二年日食有子朝簒奪周分為二天下兩主之應二十四年日食有意如逐君吳弑僚之應定十二年日食有薛弑君比晉荀寅士吉射叛之應十五年日食有盗殺蔡侯齊陳乞弑君之應或政權在臣下宣十七年日食有四國大夫敗齊于鞌君道微臣道強之應襄十五年日食有溴梁之盟信在大夫之應二十一年二十三年再日食自溴梁來臣恣日甚凡大盟㑹征伐皆大夫為之二慶専陳欒盈叛晉之應昭三十一年日食有昭公客死晉大夫専執人于京帥之應定五年日食有陪臣強横魯失國寳宋大夫叛之應或外域侵中國桓三年日食既有楚滅榖鄧上僣稱王之應莊十八年日食有戎侵上國之應三十年日食有狄滅邢衛之應僖五年日食有狄伐晉滅温之應十二年日食有楚滅黄狄侵衛之應十五年日食有秦獲晉侯楚執宋公中國微弱之應文元年日食有楚滅江六狄比侵中國之應宣八年十年日食有楚莊圍宋析骸易子伐鄭勝晉鄭伯肉袒晉大敗于邲之應成十六年日食有楚滅舒庸之應襄二十三年日食有楚滅舒鳩之應昭七年日食有楚滅陳之應二十四年日食有吳滅巢滅徐之應皆陽微隂盛之證也以上並本杜欽䇿是故十月之交詩人以刺詩小序大夫刺幽王也日有食之春秋必書以戒人君不可忽天象也通㫖春秋正人主心術之大法也故不書祥瑞而災異則書譬諸疾疫天時之戾氣也知其可畏而加慎焉則免夫掊擊之患矣肆行陵犯無所忌憚適足以速殺其身矣君子見物之有失常者必恐懼修省而不敢忽况日者衆陽之宗至尊之象乎日有食之春秋所以存而弗削也然災與異不同日有食之常度也故程氏以為災而先儒以為異春秋日食三十六精厯筭者得之幾盡其有常度審矣謂之異非也雖有常度則數不可免然或食於朔或食於夜或食於前或食於後或當食而有隂雲之祥此則人為所感之不同者也故春秋或書日或書朔或書日不書朔或書朔不書日或日朔皆不書或書日有食之既者於以見雖常度不可免而人為所感之不同如此則其應亦随之不可専歸之數而無恐懼修省以答天災矣又况地震山崩水旱虫螟物怪之變本非有常度者乎隠公九年大震電繼以大雨雪而有鐘巫之難晉惠公時河上沙鹿崩而有韓之獲宋襄公時五石隕六鷁退飛而有盂之執成公十六年雨木氷是秋君拘而季孫有苕丘之舍昭公二十五年鸜鵒來巢未幾昭孫于齊公子宋得國其應如影響不可誣也三月庚戌天王崩平王也在位五十一年世子洩父早卒洩父之子林嗣位是為桓王榖梁傳髙曰崩厚曰崩尊曰崩天子之崩以尊也其不名何也大上故不名也程子傳崩者上墜之形四海之内皆當奔赴魯君不往惡極罪大不可勝誅不書而自見也崩者上墜之形曲禮注自上顚壊曰崩春秋歴十有二王愚按春秋歴十有四王悼王立未踰年敬王崩在春秋後故止曰十二王桓襄匡簡景志崩志葬者赴告及魯往㑹之也叔孫得臣葬襄王叔鞅葬景王桓匡簡之葬非卿㑹不書其人亦見禮意之厚薄平惠定靈志崩不志葬者赴告雖及魯不㑹也趙氏曰不會則不書志不臣也記是以著非也莊僖頃崩葬皆不志者王室不告魯亦不往也趙氏曰王室不告魯不赴也哀王室之無人著諸侯之不臣也諸侯為于偽反天王服斬衰音崔儀禮諸侯為天子斬衰傳曰天子至尊也檀弓天子崩三月天下服禮當以所聞先後而奔䘮今平王崩周人來訃而隠公不往是無君也其罪應於陵反後放此誅不書而自見音現矣張氏曰天子崩不書名至尊異於諸侯也喪服斬衰裳苴絰杖絞帶冠繩緌菅屨三年諸侯為天子之禮也天王之䘮同軌畢至為臣子者以所聞先後奔䘮禮也隠公聞䘮而不奔春秋以來送終之禮薄矣聖經詳志以見罪惡之淺深今此平王之崩但書來訃而魯人不往且志武氏子之求賻則隠公之蔑視五十一年天下之共主闕其弔葬無復臣子哀戚之情邈然不以動其心而自同於禽獸則其惡極罪大不可勝誅不待貶絶而自見矣愚按秦昭襄王薨韓桓惠王衰經入弔祠春秋諸侯之事天子不若戰國之君事大國之禮也或曰萬國至衆也封疆至重也天王之䘮不得越境以奔而修服於國卿供弔送之禮訖葬卒哭而除䘮禮乎按周書康王之誥太保率西方諸侯入應應當也禮紀䟽謂南嚮當朝正門門左畢公率東方諸侯入應門右再拜趨出王反䘮服此奔成王之䘮者安得以為修服於國而可乎愚按或謂康王之誥所稱諸侯指畿内諸侯而言今考書文曰敢執壤奠則各執壤地所出之物以為奠贄而非常禮執贄之謂也曰庶邦侯甸男衛則為五服諸侯而非王臣食采於畿内者也是時成王始崩同軌諸侯雖不能盡至葢召公畢公但率諸侯之已至者以受顧命耳故周人有䘮魯人有䘮周人往弔謂使人可也魯人不徃謂當親之者而不可使人代也榖梁定元諸侯嵗時或朝覲於京師成十三年三月公如京師七月公至莊二十二年公如齊二十三年春公至文三年公如晉四年春公至十三年公如晉十四年正月公至成十年七月公如晉葬景公十一年三月公至襄四年公如晉五年春公至十二年公如晉十三年春公至二十八年十一月公如楚二十九年葬楚康王五月公至昭十五年冬公如晉十六年夏公至愚按此傳當有或交好於大國一句恐誤漏也或㑹同於方嶽僖十六年㑹淮十七年九月公至宣七年㑹黒壤八年春公至成五年同盟蟲牢六年正月公至襄二十一年㑹商任二十二年正月公至或從兵革征討之事莊五年冬㑹伐衛六年秋公至二十八年㑹圍許二十九年春公至襄十八年十月㑹圍齊十九年正月公至越境踰時不以為難何獨難於奔䘮而薄君臣始終存殁之義哉大非先王之禮失春秋之義矣通㫖崩薨卒大變也不可以為常或崩或不崩或地或不地或卒或不卒或葬或不葬或赴而往或赴而不往或往而書或往而不書於以見誅亂臣賊子撥亂世反之正之意其義大矣如隠三年書天王崩即見公不奔䘮不㑹葬之罪王臣求賻之事他皆放此而觀之可也王氏曰天王崩不名不地非略之天下皆王土故不地以示無外四海皆王臣故不名以示獨尊劉氏曰左氏曰壬戌平王崩赴以庚戌故書之王崩實赴以庚戌則聖人雖欲遷正亦不可得且於春秋何以見平王非庚戌崩乎公羊云記崩不記葬必其時也非也凡書者皆為我有往者耳其名氏著者命卿也不著者微者也夏四月辛卯尹氏卒尹左作君公羊傳尹氏天子之大夫也其稱氏譏世卿世卿非禮也榖梁傳尹氏天子之大夫也外大夫不卒於天子崩為魯主故隠而卒之程子傳尹氏王之世卿古者使以徳爵以功世禄而不世官是以俊傑在位庶績咸熈及周之衰士皆世官政由是敗尹氏世為王官故於其卒書曰尹氏見其世繼也尹氏天子大夫世執朝權為周階亂家父所刺秉國之均不平謂何者是也詩節南山朱子傳尹氏葢吉甫之後春秩書尹氏卒公羊以為譏世卿者即此也愚按詩常武王謂尹氏指吉甫也家父云尹氏大師又云赫赫師尹則尹氏當幽王時為三公矣此書尹氏卒則來訃于魯也五年傳稱王使尹氏助曲沃伐晉僖二十八年王命尹氏策命晉侯為侯伯文十四年王使尹氏訟周公于晉成十六年十七年尹武公㑹諸侯伐鄭昭二十三年尹氏立王子朝二十六年以子朝奔楚乃尹文公圉而傳稱尹卒尹固皆其族也詩刺尹氏不弔昊天亂靡有定傳紀尹言多等殺天王之弟佞夫春秋譏尹氏輔子朝簒逆則尹氏始終秉權為亂因其告䘮與立子朝以朝奔楚皆以氏書者志世卿非禮為後鑒也宣王時吉甫已稱氏春秋惟尹武公兩伐鄭書子其餘經傳所紀悉曰尹氏疑若漢大將軍霍氏専權秉政特寵異之而不名也春秋因其稱氏而筆之於經使後人考之見其累世稱氏檀權為害則為鍳可知矣或曰世卿非禮裳裳者華何以作乎裳裳者華小序古之仕者世祿小人在位則讒謟並進棄賢者之類絶功臣之世焉曰功臣之世世其祿孟子文王治岐仕者世祿世卿之官嗣其位書泰誓商王受敢行暴虐官人以世祿以報功也故其世可延書大禹謨賞延於世位以尊賢也故其官當擇官不擇人世授之柄黨與既衆威福下移大姦根據而莫除人主孤立而無助國不亡幸爾春秋於周書尹氏武氏仍叔之子於魯書季友仲遂皆志其非禮也公羊子此說必有所受矣薛氏曰先王之制内諸侯禄也外諸侯嗣也有世祿而無世官尹氏則世官矣前王賜之不名所以尊其徳也世卿之不名也隳先王之禮而非尊賢之道也王臣不卒尹氏之卒固其交魯之赴而志周之過且紀王官之世也張氏曰平王繼幽厲之後不能擇畀忠賢以修其政而因用致亂之族使之深根固柢而不可㧞故春秋即使告終變例書氏以見平王不能中興周室之由而尹氏數百年相繼禍敗所以著世卿不擇賢之弊為後世之深戒也啖氏曰左氏云君氏卒聲子也不書姓為公故曰君氏按例無有改字以為義者豈有改其本姓乎如此時隠公之母實卒不行夫人禮亦當如定十五年姒氏卒書姓也劉氏曰昭公娶吳故諱其姓謂之孟子今聲子非魯同姓諱姓非義也特書君氏又不足效其為君母若曰君母氏乃可矣龜山楊氏曰聲子而曰君氏是何理須當以尹氏為正莊二十三年傳尹氏王子虎劉卷來訃而不書其爵秩所以正人臣之義趙氏曰王臣赴告非禮也臨川吳氏曰天子之公卿大夫士其生也不外交於諸侯故其死也亦不赴告二百四十二年間惟劉卷王子虎以嘗同㑹盟而來赴尹氏以王崩為諸侯之主而來赴皆非禮也秋武氏子來求賻賻音附此來求之始左傳王未葬也公羊傳天子之大夫其稱武氏子譏父卒子未命也不稱使當喪未君也求賻何以書譏喪事無求求賻非禮也榖梁傳天子之大夫其稱武氏子未畢䘮孤未爵未爵使之非正也其不言使無君也歸死者曰賵歸生者曰賻曰歸之者正也求之非正也周雖不求魯不可以不歸魯雖不歸周不可以求之求之為言得不得未可知也交譏之程子傳武氏王之卿士稱武氏見其世官天王崩諸侯不供其䘮故武氏遣其子徴求於四國書之以見天子之失道諸侯不臣之甚也武氏天子之大夫桓五年傳武氏仍叔之子云者卿大夫子弟以父兄故而見使也家氏曰武氏子仍叔子衘命而出必皆有位於朝今乃以某氏子書公榖於仍叔之子曰父老子代從政世其祿位者也於武氏子乃曰父卒子未命葢以仍叔為尚存之人武氏為已卒之大夫諦觀經㫖皆父在而子世其官者也不然王朝公卿大夫莫非世官世祿之家何獨於此二子而書法異乎曰某氏子云者有父在焉故也臨川吴氏曰稱氏義與尹氏同子者父老而以子攝行卿之事愚按隠五年王使尹氏武氏助曲沃伐晉則武氏之子亦命為卿而尹武皆為世卿可見矣春秋書武氏之子則嫌武氏之子自來求賻仍叔子不加之字又不見其父在何以不稱使據桓十五年家父求車稱天王使當䘮未君非王命也文九年毛伯求金以王居喪亦不稱使王氏箋義王在䘮而使大夫求賻罪在冢宰嗣子定位於初䘮其曰未君何也古者君薨諒隂百官總已以聽於冢宰三年本劉氏𫝊漢孔氏曰諒信也隂黙也信黙而不言也夫百官總已以聽則是攝行軍國之事也以非王命而不稱使春秋之㫖㣲矣於以謹天下之通喪愚按位有貴賤而生於父母無以異者故三年之䘮自天子逹於庻人當䘮不稱王使以見天子居䘮不發命令則三年之䘮無貴賤之殊矣而嚴君臣之名分扶問反也稱王使則同於至尊稱冢宰使則疑於無王故特不稱使夫賻以貨財則生者所須索也君取於臣不言求而曰求賻求車求金皆著天王之失道也上失其道則下不臣矣杜氏曰魯不共王䘮致令有求經直文以示不敬張氏曰惠公之薨宰咺歸賵而平王之䘮隠公不奔罪不勝誅為政於王室者不能輔王以舉政刑而遣使下求於列國春秋直書以見其隳體失政取輕天下文武之澤斬然矣入隠公三年問經書周室止四事耳而人亡政息王道之不能復興葢已具見此春秋所以為簡明也髙郵孫氏曰春秋之法為上者無求求之失上也失上者卑之卑之者正其上不與有求也為下者無見求見求失下也失下者誅之誅之者正其下不與見求也曰賻曰金因喪而有求者也車無事而有求者也喪事有贈無求而天子有求於下以是為亟也車服上所以賜下而天子有求於下以是為失制矣八月庚辰宋公和卒穆公也在位九年初宣公舍其子與夷而立其弟穆公至是秋公使其子馮出居於鄭而立與夷是為殤公程子傳吉凶慶弔講信修睦鄰國之常禮人情所當然諸侯之卒與國之大故來告則書外諸侯卒國史承告而後書聖人皆存而弗削曷為弗削春秋天子之事也古者諸侯之邦交間去聲問殷聘而世相朝周禮大行人凡諸侯之邦交嵗相問也殷相聘也世相朝也葢王事相從則有和好呼報反之情及告終易代則有弔恤之禮是諸侯所以睦鄰國也周制王哭諸侯則大宗伯為上相息亮反周禮大宗伯朝覲㑹同則為上相王哭諸侯亦如之司服為王制緦麻司服王為諸侯緦衰檀弓天子之哭諸侯也爵弁絰䊷衣宰夫掌邦之弔事戒令與其幣器財用宰夫凡邦之弔事掌其戒令與幣器財用凡所共者凡諸侯大夫之喪使其旅帥有司而治之是王者所以懐諸侯也凡諸侯卒皆存弗削而交鄰國待諸侯之義見音現矣卒而或日或不日者何謹則書日慢則書時其大致然也宣十七年傳君卒書名赴而得禮記之詳也劉氏曰君薨赴以日月禮之常也臣子少慢則赴不具日月大慢則都不赴愚按赴告以日史書其日則經弗削以見列國臣子之謹終赴告略史不書日則經無自而書日以見臣子之慢先君而忽其死生之大變也卒而或名或不名者何㑹盟則名於載書聘問則名於簡牘趙氏曰凡諸侯同盟名於載書朝㑹名於要約聘告名於簡牘故於卒赴可知而紀也左氏云同盟則赴以名豈有臣子當創巨痛深之日乃忍稱君之名禮篇所録云寡君不禄而已葢曽同盟知其名故於死時書之以紀易代陸氏曰載書者載盟誓之辭於策具標同盟諸侯之名以告神而每國執一也簡牘者使使來聘及有言命之事皆有簡書也未嘗㑹盟聘問而無所證者雖使去聲至告喪其名亦不可得而知矣凡此類因舊史而不革者也劉氏曰左氏云凡同盟赴以名非也王廵狩四岳則四方諸侯各隨其方伯州牧朝于天子死則相哀患則相恤朝聘通焉赴告及焉苟異方殊州生不共事患不共憂則朝聘不相通赴告不相及言同盟則赴以名非也同盟則相赴是也通㫖天子崩而不名諸侯薨而名所以别於天子也諸侯不生名大夫生而名所以别於諸侯也大夫書名氏㣲者名氏不登於史册所以别於大夫也此春秋正名分之法也家氏曰臣子赴君父以名夏殷以前或然周人諱名其赴必不以名春秋卒諸侯以名示諸侯之卒不得與天子等耳王一而已可不名諸侯衆也烏得不名其不名者史失之或微國之君不以名通非例也愚按晉獻公惠公未嘗同㑹盟通聘問而卒書名宿男同盟滕子杞子來朝而卒不書名是皆據史舊文也諸侯曰薨大夫曰卒五等邦君何以書卒夫子作春秋則有革而不因者周室東遷諸侯放恣專享其國而上不請命聖人奉天討以正王法則有貶黜之刑矣因其告喪特書曰卒不與其為諸侯也故曰知我者其惟春秋乎罪我者其惟春秋乎通㫖禮天子曰崩諸侯曰薨大夫曰卒士曰不禄宋公諸侯也何以書卒或曰聖人畧外以别内夫葬皆稱公曽不畧外以别内何也奚獨至於卒而别之乎或曰史官在國承赴為時君惡其薨名書曰卒夫惡其薨名而改書卒猶非良史也春秋以道名分經世之書天子之事聖人之筆削也天時王正猶刋舊史而正之君名直書而不諱豈有避時君嫌惡之名而變亂名實以書之乎然則云何不受命不與其為諸侯也其在生者或在喪而出㑹或墨纕而即戎或以吉禮從征伐之役皆因此以著諸侯失禮不臣之狀撥亂之意廣矣蜀杜氏曰春秋諸侯專恣不可不黜而降之於魯獨稱薨者非私魯也若於魯一槩而書之則後世無以見正禮之稱也劉氏曰穀梁云日卒正也今正者日篡者亦日曹伯使其世子射姑來朝則曹伯之嫡也射姑卒有月無日何耶冬十有二月齊侯鄭伯盟于石門此外諸侯特相盟之始左傳尋盧之盟也程子傳天下無王諸侯不守信義數相盟誓所以長亂也故外諸侯盟來告者則書之張氏曰齊國今青州臨淄縣石門齊地在濟南府臨邑縣愚按濟南今濟南路臨淄縣今屬益都路外盟㑹常事也何以書據外諸侯朝聘交好之類皆不書在春秋之亂世常事也於聖人之王法則非常也有虞氏未施信於民而民信夏后氏未施敬於民而民敬殷人作誓而民始畔周人作㑹而民始疑見檀弓注㑹謂盟也盟誓所以結衆以信其後外恃衆而信不由中則民畔疑之愚按虞書紀禹征苗誓師之辭哀七年稱禹㑹諸侯于塗山則誓非始於殷㑹非始於周矣申盟之對哀公葢以誓之而畔㑹之而疑始於殷周耳子曰大道之行與三代之英丘未之逮也而有志焉見禮運注大道謂五帝時也英謂英異謂夏殷周英異之主愚按夫子於五帝三代盛時雖未及見而猶有志於行五帝三王之道諸侯㑹盟來告則書而弗削者其諸以是為非常典而有志於天下為公之世乎故凡書盟者惡烏故反之也本何氏注詳見元年陳氏曰外特相盟不書必關於天下之故而後書莒紀無足道也齊鄭合天下始多故矣天下之無王鄭為之也天下之無伯齊為之也是故書齊鄭盟石門以志諸侯之合書齊鄭盟于鹹以志諸侯之散是春秋之終始也春秋於隠桓莊之際惟鄭多特筆於襄昭定哀之際惟齊多特筆焉張氏曰隠公十一年之間盟而不食言者惟此石門之盟二君終身未嘗相伐葢齊方盛強而鄭莊奸猾鄭仇專在於宋故鄭莊恃齊以敵之雖齊間與宋盟好而左右離間必使惟已之從是以石門之盟雖不寒而宋與許紀諸國交受人伐春秋詳書于策使人考其本末而知鄭莊多詐齊僖不義而強二國相與之固列國並被其禍也臨川吳氏曰盟非盛世事也不得已而有葢為衰世之亂邦罷民設春秋時王政不行諸侯放恣欲以戰伐而敵仇則不得不以盟㑹而固黨㑹不足恃而重之以盟人不自信而要之於神故凡書盟者春秋所惡也齊鄭盟石門繼以宋齊衛瓦屋之盟諸侯之黨合而無王近已胚胎齊覇之糾合矣齊鄭盟鹹繼以齊衛鄭沙曲僕之盟諸侯之黨散而無伯逺已醖釀秦雄之并吞矣閱世變者傷之愚按左傳尋盧之盟則春秋之前齊鄭已有盟陳氏以石門之盟為諸侯之合特據春秋所書以立義耳元年盟蔑已特相盟然僅與附庸同歃非關於天下之故惟石門乃肇伯之端故特言之癸未葬宋穆公穆公穀作繆後同程子傳諸侯告喪魯徃㑹葬則書春秋之時皆不請而私諡稱私諡所以罪其臣子外諸侯葬其事則因魯㑹而書啖氏曰凡諸侯葬魯往㑹則書之徐邈曰凡書葬皆據我而言葬彼所以不稱宋葬穆公而言葬宋穆公其義則聖人或存或削曷為或存或削春秋天子之事也傳去聲稱諸侯五月而葬同盟至左傳天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至同盟謂同方嶽之盟者其生講㑹同之好去聲其没有葬送之禮是諸侯所以睦鄰國也按周制有職喪掌諸侯之喪禮莅其禁令序其事周官職喪掌諸侯之喪及卿大夫士凡有爵者之喪以國之喪禮莅其禁令序其事凡諸侯及諸臣葬於墓者則冢人授之兆域也為之蹕禁人不令入而均其禁禁所為塋限見周禮冢人是王者所以懐諸侯也外諸侯葬或存或削而交鄰國待諸侯之義見音現矣葬而或日或不日者何備則書日略則書時其大致然也宣十七年傳葬而不月其略在内劉氏曰公羊云不及時而日渇葬也渇急也不及時而不日慢葬也過時而日隠之也過時不日謂之不能葬也當日而不日正也當時而日危而不得葬也非也愚考此葬宋穆公合五月之節而書日穆公非弑其國無亂雖使公子馮出居於鄭馮已去則無謀亂者矣不可謂危不得葬蔡桓侯三月而葬書日蔡季賢而請諡不可謂渇葬齊惠公三月而葬魯君奔喪卿往送葬齊國無難晉悼公三月而葬晉伯方盛平公嗣業諸卿和睦不可謂慢葬而皆不日衛穆公六月而葬宋文公七月而葬並書日二國皆無亂而傳謂宋文公始厚葬不可謂痛之衛桓公十五月而葬陳靈公二十有一月而葬皆不日非不能葬葢二君被弑故待討賊而後葬也今考或日或時葢由魯㑹葬之禮備國史詳而書日經亦書之魯㑹葬之禮畧國史正書時經亦畧之若夫葬之遲速則據文考事而義自見若國無亂而葬速葬緩皆以著臣子之失禮國有亂而葬不以其時則以著人君不能防微杜漸於其始俾身没弗蔵而繼世者不得循送終之節且責臣子及天子諸侯方伯連率之緩於討賊也卒而或葬或不葬者何有怠於禮而不葬者有弱其君而不葬者有討其賊而不葬者有諱其辱而不葬者有治其罪而不葬者有避其號而不葬者宋殤齊昭告亂書弑矣宋殤公與夷為督所弑齊昭公子舍為商人所弑而經不書葬是討其賊而不葬者也如衛桓公齊襄公賊既討則書葬按舊史必皆書葬如魯翬弑隠公立桓公而討寪氏有死者羽父既自匿其弑君之迹安得不葬隠公晉欒書中行偃弑厲公葬之於翼東門之外齊崔杼弑莊公葬諸士孫之里魯與齊姻親而晉則盟主也以往㑹葬舊史本皆書葬而春秋削之所以責其臣子之不能討賊也或謂君弑國亂禮不備故不書葬然昭八年楚滅陳陳嬖人𡊮克葬哀公豈能備禮而春秋書之邪晉主夏盟在景公時告喪書日矣而經不書葬是諱其辱而不葬者也成十年公如晉晉人止公使送葬諸侯莫在魯人辱之故不書諱之也魯宋盟㑹未嘗不同而三世不葬是治其罪而不葬者也通㫖宋桓公襄公成公三世不書葬者治其罪也吳楚之君書卒者十亦有親送於西門之外者矣襄二十八年公如楚及漢楚康王卒二十九年正月公在楚楚人使公親襚四月葬楚康王公及陳侯鄭伯許男送葬至於西門之外而經不書葬是避其號而不葬者也坊記春秋不稱楚越之王喪公羊吳楚之君不書葬辟其號也杜氏曰吳楚之葬僣而不典故絶而不書同之夷蠻以懲求名之偽怠於禮而不往弱其君而不㑹愚按滕邾屢朝魯而滕七君書卒三世不書葬邾亦七君書卒五世不葬莒宿書卒皆不葬是皆怠於弔送欺其㣲弱非惟不使卿往亦不使㣲者往㑹通㫖葬非為死者而葬之也亦所以䘏生者而助其所不及也無其事闕其文魯史之舊也本徐邈討其賊而不葬諱其辱而不葬治其罪而不葬避其號而不葬聖人所削春秋之法也故曰知我者其惟春秋乎罪我者其惟春秋乎經書諸侯卒者一百二十有四而書葬者八十有六其間弑而書葬者七卒而書葬七十有九耳張氏曰宋公爵也其稱公與齊衛異矣穆諡也諸侯合請諡於王然春秋自蔡桓侯之外皆不請於王而私自諡者也家氏曰賤不誄貴少不誄長天子崩誄於郊諸侯薨誄於王春秋諸侯臣子之諡其君者不請於王而私為之諡春秋不削著臣子之罪愚按暴秦以諡法為子譏父臣譏君而除之春秋譏私諡者非謂其臣子譏君父也特以不請於王而罪之耳後世諸侯王宰相百官死而加諡必請於太常其得春秋之㫖歟春秋胡傳附録纂疏卷一
