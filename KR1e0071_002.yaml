body:
  text: 春秋胡傳附録纂疏卷首下元汪克寬撰述綱領學春秋者必知綱領然後衆目有條而不紊自孟子氏而下發明綱領者凡七家今載七家精要之詞于卷首智者即詞以觀義則思過半矣孟子氏曰春秋天子之事也昔者禹抑洪水而天下平周公膺戎狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼潜室陳氏曰聖人以王法繩諸侯所褒所貶皆是奉行王法既空言以寓行事與天子無異此聖人大用非孟子不能知胡氏發明備矣輔氏曰夫子作春秋以討亂賊垂致治之法於萬世之下其功又大於禹周公矣先師可堂吳先生曰春秋為討賊而作也始也聖人懼亂賊終也亂賊懼聖人然則春秋之義無他亦求之兩懼之間而已矣又曰王者之迹熄而詩亡詩亡然後春秋作詳隱元年晉之乘楚之檮杌魯之春秋一也朱子注乘義未詳趙氏以為興於田賦乘馬之事或曰取記載當時行事而名之檮杌惡獸名古者因以為凶人之號取記惡垂戒之義也春秋者記事者必表年以首事年有四時故錯舉以為所記之名也古者列國皆有史官掌記時事此三者皆其所記册書之名也其事則齊桓晉文其文則史其義則丘竊取之矣尹氏曰孔子作春秋以史之文載當時之事而其義則定天下之邪正為百王之大法先師曰春秋已自有義夫子從而取之者益多又曰春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也朱子注春秋每書諸侯戰伐之事必加譏貶以著其擅興之罪無有以為合於義而許之者但就中彼善於此者則有之召陵之師之類是也莊周曰春秋經世先王之志也聖人議而不辨齊物論注順其成迹而擬乎至當之極不執其所是以非衆人也又曰春秋以道音導名分見天下篇漢董仲舒記夫子之言曰我欲載之空言不如見音現之於行事之深切著明也誦其師說曰撥亂世反之正莫近春秋董氏治公羊學其自言曰有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權為人君父而不通春秋之義者必蒙首惡之名為人臣子而不通春秋之義者必陷篡弒之罪故春秋禮義之大宗也並見史記太史公自序又曰春秋上明三王之道下辨人事之紀别嫌疑明是非定猶豫善善惡惡賢賢賤不肖存亡國繼絶世補弊起廢王道之大者也隋王通曰春秋之於王道是輕重之權衡通㫖春秋者王道之權衡也權衡者天下之公器也學者以私意觀焉或利其寡而視權如贏或利其多而視權如縮天下之公器亂矣孰能以聖人之心為心於以審輕重隨低昻豈不曉焉易見哉曲直之繩墨也舍音捨則無所取衷如字矣通又曰春秋其以天道終乎故止於獲麟中說事君篇子謂叔恬曰春秋元經於王道云云失則無所取衷矣述史篇子曰春秋其以天道終乎云云元經其以人事終乎故止於陳亡於是乎天人備矣愚按文中子論春秋則當矣然皆以春秋與元經並論元經其所自作也妄擬聖人僣躐之甚文定取之蓋不以彼而棄此也宋西都邵雍曰春秋孔子之刑書也功過不相掩五伯者功之首罪之魁也先定五伯之功過而學春秋則大意立矣春秋之間有功者未有大於四國者也四國齊晉秦楚有過者亦未有大於四國者也不先治四國之功過則事無統理不得聖人之心矣見經世書觀物外篇又云秦穆公有功於周能遷善改過為伯者之最晉文侯世世勤王遷平王於洛次之齊桓公九合諸侯不以兵車又次之楚莊强大又次之宋襄公雖伯而力微㑹諸侯而為楚所執不足論也橫渠張載曰春秋之書在古無有乃仲尼所自作雙峯饒氏曰春秋雖因魯史而修之然實却是作蓋賞罰天子之事時王不能正其賞罰故春秋為之褒善貶惡以誅亂賊是以匹夫而代天子行賞罰也此事前古所無孔子始創為之惟孟子為能知之非理明義精殆未可學先儒未及此而治之故其說多鑿又曰春秋大要天子之事也故曰知我者其惟春秋乎罪我者其惟春秋乎又曰不知繫辭而求易正猶不知禮而學春秋也河南程頥曰五經載道之文春秋聖人之用五經之有春秋猶法律之有斷音鍛例也又曰律令惟言其法至於斷例始見其法之用又曰五經如藥方春秋猶用藥治病聖人之用全在此書又曰春秋一句即一事是非便見於此乃窮理之要又曰他經非不可以窮理也但論其義耳春秋因其行事是非較著故窮理為要春秋以何為凖無如中庸欲知中庸無如權何物為權義也時也學者只觀春秋亦可以盡道矣又曰春秋傳為按經為斷又云某年二十時看春秋黃聲偶問某如何看某答曰以傳考經之事迹以經别傳之真僞又曰春秋之文一一意在示人如土功之事無大小莫不書之其意止欲人君重民力也又曰春秋之法極謹嚴中國而用夷禮則夷之韓子之言深得其㫖又曰夫子作春秋為百王不易之大法後世以史視春秋謂褒善貶惡而已經之大法則不知也春秋大義數十炳如日星乃易音異見也惟微辭隱義時措從宜者為難知耳或抑或縱或與或奪或進或退或微或顯而得乎義理之安文質之中寬猛之宜是非之公乃制事之權衡揆道之模範也建安葉氏曰春秋大義如尊君而卑臣貴仁義而賤詐力內中國而外夷狄之類其義雖大非難見也其難見者蓋在於微辭奧義各適乎時措之宜者非深明乎時中未易窺也或有功而抑或有罪而宥或功未就而與或罪未著而奪或尊而退之或卑而進之或婉其辭或章其實要皆得乎義理之安而各當其則文質之中而不華不俚寬猛之宜而無過不及是非之公而無有作好作惡夫觀百物而後識化工之神聚衆材而後知作室之用於一事一義而欲窺聖人之用非上智不能也故學春秋者必優游涵泳默識心通然後能造七到反後同其微矣見程子春秋傳序明類例春秋之文有事同則詞同者後人因謂之例然有事同而詞異則其例變矣是故正例非聖人莫能立變例非聖人莫能裁正例天地之常經變例古今之通誼惟窮理精義於例中見法例外通類者斯得之矣程子曰春秋大率所書事同則辭同後人因謂之例然有事同辭異者蓋各有義非可例拘也又曰有重疊言者如征伐盟㑹之類蓋欲成書勢須如此不可事事各求巽義但一字有異或上下文異則義須别通㫖經文如化工隨事立義其變無窮若槩以例觀則畫筆擬化工不相干涉矣能以心通觸類而長取證於本例之外則無所書而不為例也丹陽洪氏曰春秋本無例學者因行事之迹以為例猶天本無度治厯者即周天之數以為度然獨求於例則其失拘而淺獨求於義則其失迂而鑿謹始例人若嗣立逾年必改元此重事也當國大臣冢宰必以其事告于廟秉筆史官必以其事書于䇿緣始終之義一年不二君見公羊文九故不改於柩前定位之初緣民臣之心不可曠年無君同上故不待於三年畢喪之後逾年春正月乃謹始之時得理之中者也杜氏曰嗣子定位於初喪而改元必須踰年者繼父之業承父之志不忍有變於中年也於是改元著新君即位之始宜矣即位而謹始本不可以不正為子受之父為諸侯受之王此大本也咸無焉則不書即位隱莊閔僖四公是也聖人恐此義未明又於衛侯晉發之書曰衛人立晉以見音現內無所承上不請命者雖國人欲立之其立之非也在春秋時諸侯皆不請王命矣然承國於先君者則得書即位以别筆列切下同於內復去聲無所承者文成襄昭哀五公是也聖人恐此義未明又於齊孺子荼發之荼幼固不當立然既有先君景公之命矣陳乞雖流涕欲立長展兩反君其如景公之命何以乞君荼不死先君之命也命雖不敢死以别於內復無所承者可也然亂倫失正則天王所當治聖人恐此義未明又於衛侯朔發之朔殺伋壽受其父宣公之命嘗有國矣然四國納之則貶王人拒之則褒於以見雖有父命而亂倫失正者王法所宜絶也由此推之王命重矣雖重天王之命若非制命以義亦將壅而不行故魯武公以括與戲見宣王王欲立戲仲山甫不可王卒立之魯人殺戲立括之子諸侯由是不睦事見周語戲即懿公括弟伯御括之子後立為孝公聖人以此義非盡倫者不能斷音鍛也又特於首止之盟發之夫以王世子而出㑹諸侯以列國諸侯而上與王世子㑹此例之變也而春秋許之鄭伯奉承王命不與音預下同是盟此禮之常也而春秋逃之所以然者王將以愛易儲二桓公糾合諸侯仗正道以翼世子使國本不搖而天下之為父子者定所謂一匡天下民到于今受其賜者也至是變而之正以大義為主而崇髙之𫝑不與焉然後即位謹始之義終矣萬世之大倫正矣故曰春秋之法大居正公羊隱三非聖人莫能修之左傳成十四謂此類爾叙傳授傳柱戀反後放此春秋者三家左氏叙事見本末公羊榖梁辭辨而義精文集榖梁意精公羊詞辨通㫖事莫備於左氏例莫明於公羊義莫精於榖梁學經以傳為按則當閲左氏玩辭以義為主則當習公榖如載惠公元妃繼室及仲子之歸于魯即隱公兄弟嫡庶之辨攝讓之實可按而知也當閲左氏謂此類也若夫來賵仲子以為豫凶事則誣矣王正月之為大一統及我欲之暨不得已也當習公羊氏謂此類也若夫母以子貴媵妾許稱夫人則亂矣段弟也弗謂弟公子也弗謂公子賤段而甚鄭伯之處心積慮成於殺也當習榖梁氏謂此類也若夫曲生條例以大夫日卒為正則鑿矣萬物紛錯懸諸天衆言淆亂折諸聖本揚子要平聲下同在反求於心斷音鍛之以理精擇而慎取之則美玉之與武砆必有能辨之者通㫖左氏釋經雖簡而博通諸史叙事尤詳能令百代之下頗見本末其有功於春秋為多公榖釋經其義皆密如衛州吁以稱人為討賊之辭也公薨不地故也不書葬賊不討以罪下也若此之類深得聖人誅亂臣討賊子之意考其源流必有端緒非曲說所能及也啖趙謂三傳所記本皆不謬義則口傳末形竹帛後代學者妄加損益轉相傅授侵失本真故事多迂誕理或舛駁其言信矣然則學者於三傳忽然而不習則無以知經習焉而不察擇焉而不精則春秋之𢎞意大㫖簡易明白者汨於僻說愈晦而不顯矣愚按三傳源流說者不同何休但稱公羊氏及弟子胡母生戴宏傳序云子夏𫝊之公羊髙髙傅其子平平傳其子地地傳其子敢敢傳其子壽夀與弟子胡母生著以竹帛應劭風俗通云公羊名髙榖梁名赤皆子夏弟子糜信云榖梁乃秦孝公同時人阮孝緒世録又云榖梁名俶字元始啖趙則曰公榖必孔子後之門人但不知師資幾世耳西漢諸儒猶不能定其時代名字故知後世皆强說也今考公羊載樂正子之視疾必出於樂正子之後載沈子魯子司馬子子女子子北宫子之言有所謂公羊子曰又似非公羊自為而弟子録其師之言榖梁雜載尸子沈子公子啓之說又引榖梁子曰亦似非榖梁自為或者謂公榖皆漢初時人其書出於焚書之後故皆推說而失事之本末然胡毋生瑕丘江公皆列於傳而公榖無傳則公榖乃戰國時人也太史公謂孔子作春秋丘明為之傳劉歆謂左丘明好惡與聖人同親見夫子而公羊在七十子之後班固謂丘明與孔子觀魯史而作春秋杜預云丘明受經於仲尼皆以左氏為丘明至啖趙始云丘明乃史佚遲任之類孔子以前賢人左氏集諸國史以釋春秋非丘明也陸氏釋文云丘明以授魯曽申疑無所據今考左傳終記韓魏智伯之事又録趙襄子之說叙吕相絶秦聲子說屈建皆類游說之詞秦至惠王十二年初臘而左氏稱虞不臘矣則左氏亦戰國時人而名不可考且紀子伯莒子盟于密甲戌己丑陳侯鮑卒之類三傳各異而不知闕文之所在則左氏决非受經於仲尼而公榖决非子夏弟子矣自晉杜預范寧唐啖助趙匡此數子者用力甚勤時有所取雖造宫墻之側幾得其門而入矣要皆未見宗廟之美百官之富者也故不預七家之列文集杜預自謂専守丘明之傳理有不通者必曲為之說或曰因舊史也或曰從赴告也或曰經闕文也立此三說而聖人垂訓之大意不亦鮮乎何休黜周而王魯已失本宗范寧歷舉三家傷教害義之事詳著始隱終麟之㫖於理為優然錫桓公命王不稱天以為非義所存迷於經意唐啖助盛言春秋兼用二帝三王之法似也而曰救周之弊革禮之薄以夏為本則駁矣趙伯循意有得處或出諸儒之長而謂述作之大槩有三而區分有十淺之為言也陸淳宗師二子而不契於心宋伯姬之逮乎火與曽子易簀何異而以為非可繼可傳之道父子至恩不可有間而曰世子不許進藥故罪止一人以絶萬世之禍何其悖也七家所造固自有淺深獨程氏嘗為之傳然其說甚略於意則引而不發欲使後學慎思明辨自得於耳目見聞之外者也故今所傳事按左氏義採公羊榖梁之精者大綱本孟子而微辭多以程氏之說為證云春秋胡傳附録纂疏卷首下
