body:
  text: 春秋胡傳附録纂疏卷二十元汪克寬撰成公下戊簡王寅三年八年晉景十七齊頃十六衛定六蔡景九鄭成二曹宣十二陳成十六把桓五十四宋共六秦桓二十二楚共八吳壽夢三春晉侯景使韓穿來言汶陽之田歸之于齊左傳季文子私於韓穿曰大國制義以為盟主是以諸侯懷德畏討無有二心謂汶陽之田敝邑之舊也而用師於齊使歸諸敝邑今有二命曰歸諸齊信以行義義以成命小國所望而懷也信不可知義無所立四方諸侯其誰不解體詩曰女也不爽士二其行士也罔極二三其德七年之中一與一奪二三孰甚焉士之二三猶喪妃耦而况霸主霸主將德是以而二三之其何以長有諸侯乎詩曰猶之未逺是用大簡行父懼晉之不逺猶而失諸侯也是以敢私言之公羊傳脅我使我歸之也榖梁傳于齊緩辭也杜氏曰齊服事晉故晉來語魯使還之汶陽之田本魯田也注見二年魯人恃大國之威以兵力脅齊得其故地而不正疆理於天王則取之不以其道也郤克戰勝令於齊曰反魯衛之侵地齊既從之今復扶又反有命俾歸諸齊則歸之不以其道也孫氏曰汶陽之田齊所侵魯地也故二年用師于齊而歸之今又使穿言歸于齊非正也魯之土地天子所封非晉侯所可得而制也晉侯使歸之于齊是魯國之命制在晉也故詞繁而不殺以惡之而齊人貪得晉有二命穿也列卿無所諌止皆罪矣陸氏曰參譏齊魯晉也髙氏曰夫魯國之分地晉不當為齊請於魯齊不當求之於晉韓穿為晉卿不當為齊言於魯魯不當以晉令遂以與齊來言者緩詞也張氏曰前此取濟西田及汶陽田出於晉命矣不曰使來言後此晉使司馬侯命歸杞田又為把取成矣亦不曰使來言蓋取所當得反所當歸皆義也制命以義霸主之常事也諸侯之所以宗晉以為盟主亦曰以義制其豫奪而已今汶陽之歸徇私而匪公比強而陵弱易已成之制命而自亂之故書來言以著其不得為制命歸之于者易以豉反辭也常山劉氏曰歸之于者歸不以道與執衛侯歸之于京師同義為國以禮者無憚於強而魯侯微弱遂以歸齊而不能保罪亦見音現矣髙氏曰曰來言則晉非必令魯歸之也言之而已曰歸之于者強歸之詞蓋以明晉之失言也夫汶陽魯田自齊歸魯曰歸可也自魯歸齊安得謂之歸愚按曰來言則見晉命之緩蓋自知其言之不順而未能必魯之從否也曰歸之于則見取魯田之易晉卿之一言重於三軍而不敢固拒也晉韓宣子有環其一在鄭商請於子産子産弗與宣子買諸賈人而請之又弗與曰大國之人而令於小國皆獲其求將何以給之今季文子知晉人豫奪之非義而不能不以汶陽之田歸齊也制命非正而唯命是聽詎不為晉之縣鄙乎夫商人一環而子産不從於強令况先君所受於王之分地乎使是時季文子復於韓穿曰昔武王克商成王定之周公相成王以尹天下有大勳勞於王室成王封我先君魯公於少皥之虛錫之山川土田附庸以昭周公之明德顧敝邑褊小密邇仇讎惟是先王之封畛疆域莫克有之大國為侯伯而長諸侯矜哀敝邑以不腆之田而翦於仇讎是用痛心疾首悉師輿賦以為鞍之役天誘其衷齊人悔罪請盟袁婁以汶陽之田歸諸敝邑則大國之命也義無二信信無二命今大夫命敝邑曰復歸諸齊棄信失義以蔑先王之制或者難以霸乎大國制義以服諸侯若徼惠於周公魯公施榮賜於汶陽使敝邑世世守之以勿失墜則寡君之願也諸侯之望也其何有二志背𡊮婁之盟而失諸侯必不為也敢盡布之執事惟執事實圖利之如是則韓穿將恐懼悔謝之不暇復諸晉侯不復有歸齊之命矣韓宣子不能行之於鄭豈以韓穿獨能行之於魯乎惜也季文子為魯之賢大夫而有愧於子産多矣雖然行父之相魯不能有立罪固不可掩然晉於是時欒武子范文子知武子中行獻子皆名卿也不能引其君以當道而出令之不信發命之不𠂻徒知蟲牢馬陵之盟齊既從晉俾魯歸田所以堅齊也曾不思失信於魯是失信於諸侯一齊聽命而四方解體悔而尋盟惡足以要人心之強同乎春秋書戰于鞍取汶陽田韓穿來言汶陽之田歸之于齊傷晉霸之益偷也或謂季文子陳義拒穿而田卒不與誤矣茍不以田歸齊則春秋當但書晉侯使韓穿來而不言汶陽之田歸之于齊矣劉氏曰公羊云來言者何內辭也非也此直言其事耳亦何內辭哉榖梁云不使盡我也亦非也直書以刺晉耳不使盡我了無所用也晉景欒書帥師侵蔡景左傳晉欒書侵蔡遂侵楚獲申驪楚師之還也晉侵沈獲沈子揖初從知范韓也襄陵許氏曰侵蔡報伐鄭也大國爭衡而小國受敗春秋矜焉髙氏曰晉得齊之後冀盡得諸侯也蔡則畏楚終不與晉自翟泉以來不與中國盟會者四十有八年文十五年郤缺入蔡至是欒書復加兵然非執辭討罪之舉故書侵公孫嬰齊如莒渠丘左傳聲伯如莒逆也杜氏曰因聘而逆髙氏曰因馬陵之盟始復與莒通臨川吳氏曰大夫託聘之名而自逆婦者多矣非禮也愚按行父如陳公孫茲如牟嬰齊如莒皆因遣聘而請昏納婦春秋止書曰如不與其託於公以遂其私也宋公共使華元來聘左傳聘共姬也髙氏曰凡諸侯相聘必有事焉非專行聘禮也華元之來蓋圖昏爾夏宋公共使公孫壽來納幣公羊傳納幣不書此何以書録伯姬也杜氏曰無主昏者自命之故稱使納幣不書此何以書公孫壽卿也納幣使卿非禮也趙氏曰昏禮而使公孫非也蜀杜氏曰納幣使大夫可也且公子公孫為君納幣非所以逺嫌也家氏曰華元來聘乃宋公始使請婚俾通其意此媒氏之事而遣命卿魯既許之公孫壽繼至納幣再以卿行兩書宋使譏也禮不可略亦不可過惟其稱尺證反而已矣禮者理之節文節其過而文其不及略則輕大倫過則溺私愛宋公之請伯姬魯侯之嫁其女愚按九年季文子致女復命穆薑再拜則知伯姬乃宣公女穆薑之所出而成公之妹也十四年成公始娶于齊使成公有女可妻宋公宋公亦未應娶庶女為夫人也皆致其厚者也而不知越禮逾制豈所以重大婚之禮哉經悉書之為後法也愚按春秋書納幣者三莊公如齊納幣譏其親納幣娶仇女也文公使公子遂納幣傳不言譏使卿以貶喪娶故舉重而言也此書公孫壽納幣但譏使卿耳趙氏曰左氏云禮也何其謬歟若合禮則常事不書晉景殺其大夫趙同趙括按左氏趙莊姬為于偽反趙嬰之亡五年趙嬰通于趙莊姬原屛放諸齊嬰曰我在故欒氏不作我亡吾二昆其憂哉杜氏曰嬰盾弟莊姬朔妻朔盾之子莊姬成公女譖于晉侯曰原屏步丁反將為亂杜氏曰原屏同括之邑欒郤為徴知陵反晉討趙同趙括宣十二括為中軍大夫同為下軍大夫以其田與祁奚韓厥言於君曰成季之勳宣孟之忠而無後為善者懼矣乃立武而反其田武朔之子韓厥言必在他年傳終言之然則同括無罪為莊姬所譖而欒郤害之也故稱國以殺而不去起吕反其官以見音現晉之失政刑矣張氏曰晉侯聽讒殺二大夫故以國殺大夫為文同括為大夫不能間有家以致生亂又不能愼動逺謗使莊姬之譛得行以殺身喪家失以智御人之道故書名劉氏曰同括內不能正其親外專戮以干其君足以殺其身而已矣愚按或謂晉景因莊姬之譛追論趙盾弒君之罪而殺同括觀鄭人斫歸生之棺而滅其族則其事容或有之然史記稱屠岸賈誅趙氏殺趙朔趙同趙括趙嬰齊皆滅其族而春秋止書殺同括不書殺朔及嬰則不惟與傳抵牾亦且與經相戻蓋不足信也秋七月天子簡使召伯來賜公命召音邵賜公榖作錫錫命止此左傳召桓公來賜公命公羊傳其稱天子何元年春王正月正也其餘皆通矣榖梁傳禮有受命無來錫命錫命非正也曰天子何也曰見一稱也諸侯嗣立而入見音現下同則有賜已修聘禮而來朝則有賜能敵王所愾苦愛反而獻功則有賜並見文元注成公即位服喪已畢而不入見既更音庚五服一朝之歲矣三年則諒暗已終今即位八年是喪畢而又過六年一朝之期也而不如京師定王之喪又不弔葬又未嘗敵王所愾而有功也何為來賜命乎召伯者縣內諸侯為王卿士者也杜氏曰召桓公周卿士來賜公命罪邦君之不王譏天子之僣賞也通旨先王之時諸侯嗣子誓於天子然後為世子三年喪畢以士服入朝於王王乃錫命使為諸侯也春秋時為子多不受命於父為臣皆不請命於王而王使來錫命此何禮也劉氏曰諸侯喪畢以士服見王乃受命於廟耳不親受命諸侯之汰也賜以命圭天子之弱也成公未有大功明德而賜命非沮賞之典也吳興沈氏曰成公未嘗朝覲於天子又無功德之可褒而王遣使就國錫之命是長其驕傲之心也春秋書王臣來求止於文公書來聘止於宣公書錫命止於成公蓋文宣以後周益微弱而禮文不足以結諸侯爵命不足以寵諸侯也髙氏曰周之所以王者以其秉天子之權而行天下之義也賞在我罰在我是天子之權也賞可賞罰可罰是天下之義也及其衰也有其權而無其義故賞罰俱濫而天子之權猶在也逮其衰之甚也天子之權去矣其位與諸侯夷矣其待諸侯有賞而無罰矣觀春秋所書天王加恩於諸侯者甚衆而懲御諸侯者無見焉權去而威不行也不能致罰則吾之賞也不足以為諸侯之榮亦不足以勸諸侯之功又不足以服諸侯之心徒致悅於人耳此天子來賜命所以譏也臨諸侯曰天王君天下曰天子劉氏曰天子者臨天下之言也天王者臨諸侯之言也曲禮君天下曰天子臨諸侯畛於鬼神曰有天王某甫注天下謂外及四海也漢於蠻夷稱天子於王侯稱皇帝蓋一人之通稱杜氏曰天子天王王者之通稱陸氏曰書天子或依䇿命之文或傳寫誤也永嘉吕氏曰春秋錫命者三或書王或書天王或書天子或謂天王者制治天下而主乎法也天子者養天下而主乎恩也在詩賞善罰惡之事多稱王恩賜燕好之事多稱天子桓公篡弒而來錫命則不能行王法故王去天成公之立八年矣未嘗有勤王之績而來賜命則失於行私恩故稱天子夫錫桓公命固不能行王法文公不朝而錫命獨為得禮乎賜成公命固為失恩錫文公命獨不為失恩乎愚按天子作民父母以為天下王故周公稱成王曰告嗣天子王矣以王與天子兼言之初非以天子為卑而王為尊也説者以天子為貶辭春秋於天子之事可貶者非一何獨於賜成公命而貶之乎今考宰孔賜齊侯胙富辛請城成周皆稱天子而答者亦云覲禮篇則以王與天子更互言之則杜氏之説不謬矣春秋三書錫命獨此年左氏經作賜命蓋錫賜皆上子下之名義無以異故韻書賜字或作錫或謂錫之爵命世世相襲則謂之錫服過其爵有加而賜則謂之賜今考內史過賜晉惠公命則始即位而賜之者也召伯寥賜齊桓公命則有功而賜之者也劉定公賜齊靈公命則以私恩而賜之者也王命尹氏等䇿命晉文公賜之大輅戎輅則朝王獻俘而賜之者也事雖不同而皆言賜也詩稱王錫申伯則始封而錫之也王錫韓侯則嗣位來見而錫之也王命召虎用錫爾祉圭瓉秬鬯則有功而錫之也事各異而亦皆言錫也由是知賜錫義同不必穿鑿立説抑或左氏字誤耳冬十月癸卯把叔姬卒孫氏曰出而書卒者為明年逆喪起陸氏曰凡內女為諸侯夫人則書卒以公為之服也嫁為諸侯夫人而不書卒時魯君非其兄弟及兄弟之子也諸侯無大功以下之服故把叔姬雖出猶書者為喪歸杞故也愚按或謂為把所出不當係之把魯人未許其絶故不以吾女卒之非也苟不書把則同於未嫁之女矣不卒可也書卒而不係把不可也晉侯景使士燮來聘叔孫僑如會晉士燮齊頃人邾定人伐郯按左氏士燮來聘言伐郯也以其事吳故七年吳伐郯郯成公請緩師不可公賂之文子曰君命無二失信不立禮無加貨事無二成君後諸侯是寡君不得事君也季孫懼使宣伯會伐郯吳初伐郯季孫固曰中國不振旅蠻夷入伐而莫之或恤亡無日矣當其時既不能救及其既成豈獲已也而又率諸國伐之何義乎前書來聘下書會伐晉侯之為盟主可見矣魯既知其不可從大國之令而不敢違其不能立亦可知矣愚按季孫謂中國不能相愍恤藹然仁人之心然不能輔君為善逼於強令而從之以困小弱亦何取焉家氏曰不能治楚而徒欲服鄭不能制吳而反欲責郯晉之君臣無能甚矣先書吳伐郯此書四國會伐郯不能救之又伐之著晉之罪所以貶也髙氏曰內討如殺趙同趙括外討如伐郯則何以為政於天下哉衛定人來媵媵以證反程子傳媵小事不書伯姬之嫁諸侯皆來媵之故書以見其一女子之賢尚聞於諸侯况君子乎或曰魯女之賢豈能聞於逺乎曰古者庶女與非敵者則求為媵固為之擇賢小君則諸侯國之賢女當自聞也媵者何諸侯有三歸嫡夫人行則姪娣從二國來媵亦以姪娣從凡一娶九女見公羊莊十九所以廣繼嗣杜氏曰諸侯娶適夫人及左右媵各有姪娣二人凡九女所以廣繼續也三國來媵非禮也夫以禮制欲則治去聲以欲敗禮則亂而諸侯一娶十有二女白虎通天子娶十二女法天有十二月通旨問左傳諸侯嫁女同姓媵之異姓則否啖子非之云直譏三國來媵非禮豈為異姓乎曰諸侯一娶九女而三國來媵則是十二女也媵同時故經備書之以著其失禮不為異姓與同姓則是以欲敗禮矣備書三國以明逾制為後戒也髙氏曰書衛人來媵為下齊晉來媵起劉氏曰春秋所急者禮也所制者欲也以禮制欲則治以欲敗禮則亂而諸侯娶十二女則是以欲敗禮矣故春秋備書之所以戒也家氏曰自入春秋內女適他國者有矣諸國之來媵者皆不書至是伯姬將歸于宋衛人晉人齊人皆來媵蓋伯姬有賢行諸國慕之雖齊晉之大忘其勢而樂以其女為媵聖人備書抑亦譏其過制也陸氏曰公羊云録伯姬也榖梁云以伯姬不得其所故盡其事也按書媵譏其數爾非為伯姬也劉氏曰左氏云禮也凡諸侯嫁女同姓媵之異姓則否非也諸侯三歸以各一族自同姓耳若嬴曹媯弋之君嫁女者必同姓媵之則或不能備矣天子之妃百二十又可一姓乎已簡王卯四年九年晉景十八齊頃十七卒衛定七蔡景十鄭成三曹宣十三陳成十七把桓五十五宋共七秦桓二十三楚共九吳壽夢四春王正月把伯桓來逆叔姬之喪以歸左傳杞桓公來逆叔姬之喪請之也把叔姬卒為把故也逆叔姬為我也公羊傳脅而歸之也榖梁傳夫無逆出妻之喪而為之也杜氏曰魯強請把使還取葬凡筆於經者皆經邦大訓也把叔姬一女子爾而四書于策僖三十一年杞伯姬來求婦成五年叔姬來歸八年叔姬卒此年喪歸何也有男女然後有夫婦有夫婦然後有父子本易序卦昏義男女有别而後夫婦有義夫婦有義而後父子有親故春秋愼男女之配重大昏之禮以是為人倫之本也事有大於此者乎男而賢也得淑女以為配則自家刑國可以移風俗女而賢也得君子以為歸則承宗廟奉祭祀能化天下以婦道豈曰小補之哉夷考把叔姬之行下孟反雖賢不若宋共音恭姬亦不至如鄫季姬之越禮也把伯初來朝魯然後出之卒而復扶又反下同逆其喪以歸者豈非叔姬本不應出故魯人得以義責之使復歸葬乎臨川吳氏曰叔姬為把桓公夫人四十四年夫婦年皆已老乃出而歸莫考其由或止是以無子而出也胡氏言姬本不應出故魯得以義責之其説蓋是家氏曰夫婦天倫以義而合者也有過而出事之必不獲已者也叔姬之歸傳不言其故而自始歸至逆喪皆繫之把春秋與之歸而為之書也愚按宋襄公母出歸于衛襄公即位其母思之義不可往賦河廣之詩而聖人取之則出妻固與廟絶不可復反是以啖氏謂出婦未反而逆其喪非禮也然春秋書叔姬卒與杞伯逆喪以歸悉無貶辭則知叔姬蓋無悖德反義之行故把桓公猶逆其喪夫在而逆喪歸葬自應袝廟與宋襄母不同矣魯在春秋時內女之歸不得其所者有矣內女出而來歸者三郯伯姬齊子叔姬皆不書卒聖人詳録其始卒欲為後鑒使得有終而無弊也其經世之慮逺矣啖氏曰文十二年左傳云把伯請絶叔姬而無絶婚二月叔姬卒不言把絶也書叔姬言非女也此傳大誤彼文十二年子叔姬自是魯女未嫁者若不言把叔姬復是何國出乎公會晉侯景齊侯頃宋公共衛侯定鄭伯成曹伯宣莒子渠丘把伯桓同盟于蒲程子傳諸侯患楚之強同盟以相保鄭既盟復叛深罪其反覆杜氏曰蒲衛地注見桓三年按左氏為于偽反歸汶陽之田故歸田在去年諸侯二於晉晉人懼會于蒲以尋馬陵之盟在七年夫盟非固結之本也衛獻公言於寧喜求復國喜曰必子鮮如字在不然必敗見襄二十六杜氏曰子鮮賢國人信之小邾射音亦以句古侯反繹來奔曰使季路要於妙反下同我吾無盟見哀十四杜氏曰子路信誠故欲得與相要誓夫信在言前者不言而自喻誠在令外者不令而自行晉初下令於齊反魯衛之侵地而齊不敢違者以其順也齊既從之魯君親往拜其賜矣三年公如晉拜汶陽田復扶又反有二命俾歸諸齊一與一奪信不可知無或與惑同乎諸侯之解體也解體猶言離心晉人不知反求諸己惇信明義以補前行去聲之愆而又欲刑牲歃血要質去聲鬼神以御魚吕反之左傳季文子謂范文子曰德則不競尋盟何為范文子曰勤以撫之寬以待之堅強以御之明神以要之柔服而伐二德之次也勉齋黃氏曰人惟忠信也不惟可以通天下之務而又可以釋天下之疑茍無忠信誠慤之心以涖之則吾以詐御彼彼亦以詐應之矣是從事於末而不知本矣信者盟之本也盟者信之末也信不由中雖交質子猶有背之者况盟乎特書同盟以罪晉也失信而尋盟惡其反覆而書同也髙氏曰晉不足以宗諸侯既為此盟而諸侯皆二於是鄭叛不服莒潰莫救故書同盟以著其惡張氏曰晉因諸侯之二不自反其失信反汶陽之非而復會諸侯同盟以威制約束之然自此鄭魯俱有叛晉之心執鄭盟魯紛紛甚矣治人不治反其智同盟豈所以一諸侯哉愚按程子以是盟患楚之強同盟以相保則是同懼楚也蓋晉人懼諸侯之二者懼其二於楚耳然魯既失信於奪汶陽已則無信而要人以信慮人之異而強其同安能保之不異哉于蒲與平丘皆同病楚皆晉人懼諸侯之二而同盟春秋皆書同憂其反覆而不能終同也蜀杜氏曰齊桓晉文之後晉齊序於宋上者以強弱為大小也宋於齊晉不可為強矣如把之削弱而當序於諸國之下也夫子也因實而書之悼其不以爵次為序而以強弱為先後公至自會髙氏曰伯姬將以二月歸宋而公以正月出會而遽歸者晉以汶陽之田故諸侯皆有二心焉亦足以見蒲盟之不信也二月伯姬歸于宋共劉氏曰諸侯逆女而不書者君自逆也自逆則常事不書矣王姬歸于齊齊侯實來而不見於經此其明驗也愚按把郯鄫皆小國必君親迎春秋皆不書逆則以為常事而不志明矣夏季孫行父如宋致女左傳季文子如宋致女復命公享之穆薑出于房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人先君猶有望也敢拜大夫之重勤公羊傳未有言致女者此其言致女何録伯姬也榖梁傳詳其事賢伯姬也程子傳女既嫁父母使人安之謂之致女古者三月而朝見始成婦也伯姬賢魯國重之故使卿致也晉景人來媵左傳禮也致女者何女既嫁三月而廟見音現下並同士昏禮婦人三月乃奠菜則成婦矣而後父母使人安之故謂之致也何氏曰古者婦人三月而後廟見稱婦擇日而祭於禰成婦之義也父母使大夫操禮而致之必三月者取一時足以别貞信貞信著然後成婦禮言女者謙不敢自成婦禮杜氏曰謂之致女所以致成婦禮篤婚姻之好常事爾何以書致女使卿非禮也趙氏曰不當使卿致經有因褒以見貶者初獻六羽之類是也因諸侯六佾之復正而見仲子立宫之非亦有因貶以見褒者致女來媵之類是也因納幣致女使卿三國來媵之過禮而見伯姬之賢永嘉吕氏曰意者魯人以為賢而備書於册故仲尼得以從而述之因其記録之詳而得以著其失禮爾伯姬賢行下孟反下同著於家故致女使卿特厚其嫁遣之禮張氏曰納幣致女皆過乎厚觀左傳載穆薑之辭則前後越禮皆穆薑之意歟賢名聞於逺故諸國爭媵何氏曰伯姬以至賢為三國所爭媵信其無妬忌之行小星詩序夫人無妬忌之行程氏以為一女子之賢尚聞於諸侯况君子哉或曰魯女雖賢豈能聞於逺乎曰古者庶女與非敵者則求為媵固為干偽反之擇賢小君則諸侯之賢女自當聞矣齊孝公夫人孟姬齊國稱其貞孝公修禮親迎之劉氏曰榖梁云是以我盡之也不正故不與內稱也非也內稱謂稱使內大夫受命而出無稱使者假令與內稱則曰公使季孫行父如宋致女乎秋七月丙子齊侯無野卒頃公也在位十七年子環嗣是為靈公晉景人執鄭伯成晉欒書帥師伐鄭按左氏楚人以重賂求鄭鄭伯會公子成于鄧秋鄭伯如晉晉人討其二於楚執諸銅鞮欒書伐鄭鄭使伯蠲行成晉人殺之楚子重侵陳以救鄭稱人而執者既不以王命又不歸諸京師則非伯討也髙氏曰鄭伯雖與楚會旋即悔過而躬朝于晉是已知前日之失而自服其罪矣晉人當捨其前失而待之以禮可也乃因其來朝而執之豈有以禮來朝而反蒙執辱者哉又况鄭使伯蠲行成而殺之耶春秋所以深罪晉而人之也襄陵許氏曰向使晉能制楚使之不能危鄭討鄭可也今楚潰莒入鄆晉不能救而禁鄭之二於楚鄭獨能無懲於肉袒牽羊之禍乎故晉景之執鄭伯愧於漢武之遣樓蘭也殺伯蠲不書者既執其君矣則行人為輕亦不足紀也楚子重侵陳與處父救江文三何異削而不書者鄭亦有罪焉耳夫背楚即晉正也今以重賂故又與楚會則是惟利之從而不要一遙反諸義也故鄭無可救之善楚不得有能救之名愚按晉不能招攜以禮懷逺以德怒鄭之二於楚拘其君伐其國戮其行成之使暴矣然春秋書欒書帥師書伐不加貶辭楚人侵陳以救鄭則削而不録者存中國而抑強楚也劉氏曰榖梁云不言戰以鄭伯也非也春秋伐而不戰多矣豈伐則必戰乎且晉實不執鄭伯以伐鄭何以能必其以鄭伯乎冬十有一月葬齊頃公頃音傾楚共公子嬰齊帥師伐莒渠丘庚申莒潰楚人入鄆杜氏曰鄆莒别邑任公輔曰東鄆也按左氏楚子重自陳伐莒圍渠丘城惡衆潰莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡庚申莒潰楚遂入鄆八年晉侯使申公巫臣如吳假道于莒與渠丘公立於池上曰城已惡莒子曰辟陋在夷其孰以我為虞對曰夫狡焉思啓封疆以利社稷者何國蔑有唯然故多大國矣唯或思或縱也勇夫重閉况國乎孟子曰鑿斯池也築斯城也與民守之效死而民不去是則可為也夫鑿池築城者為國之備所謂事也效死而民不去為國之本所謂政也莒恃其陋不修城郭浹子協反辰之間戊申至庚申十二日也楚克其三都信無備矣左傳君子曰恃陋而不備罪之大者也備豫不虞善之大者也莒恃其陋而不修城郭浹辰之間而楚克其三都無備也夫然兵至而民逃其上左傳民逃其上曰潰劉氏曰潰者取其如水之決爾不能使民效死而不去則昧於為國之本也雖隆莒之城何益乎故經於莒潰特書日以謹之者以明城郭溝池重直龍反門擊柝音託見易大傳皆守邦之末務必以固本安民為政之急耳陳氏曰此嬰齊也向也於會蜀稱嬰齊於盟稱人今也於伐莒稱嬰齊於入鄆稱人一人之身俄而進退焉春秋於楚無所不盡其辭也是以於柏舉戰稱人奔稱囊瓦何氏曰責中國無信同盟不能相救髙氏曰晉人不恤同盟之急是又自背蒲之盟也家氏曰楚之伐莒以救鄭也莒同盟馬陵及蒲晉坐視其危亡而莫之恤春秋所惡也鄭會楚則執其君以伐之莒敝於兵則置不問盟主之道固如是乎劉氏曰榖梁云其日莒雖夷狄猶中國也然則蔡亦中國蔡潰何故不日乎又曰大夫潰莒而之楚亦非也經但云潰不云之楚且潰者非大夫何故專以大夫解之乎秦桓人白狄伐晉景左傳諸侯二故也經所謹者中外之辨也程伯子曰春秋謹中外之辨晉嘗與白狄伐秦秦亦與白狄伐晉族類不復扶又反下同分矣其稱人貶詞也王氏箋義也不言及外之武王伐商誓師牧野庸蜀羌髳微盧彭濮皆與音預焉見書牧誓豈亦不謹乎除天下之殘賊而出民於水火之中也豈秦之伐晉晉之伐秦所可同日而語者哉夫佳兵不祥中國友邦自相侵伐已為不義又與非我族類者共焉不亦甚乎晉既失信復聽婦人讒説殺其世臣據殺同括而諸侯皆二秦狄交伐比毗志反事以觀可謂深切著明矣髙氏曰晉為盟主既執鄭伯又不救莒故諸侯㩗二而秦人連白狄伐之見景公不能霸矣家氏曰宣八年書晉師白狄伐秦譏在晉也然晉猶書師也今書秦人白狄伐晉儕秦於狄貶秦也奚貶乎以其黨楚而為之出師也前日秦晉交兵自為其私曲直猶有所在今也楚人爭鄭正急出師潰莒以撓晉而乃率白狄戰其東欲使晉人置鄭以去其為楚謀善矣然捨中國而甘為狄人之役秦之所以自處者卑陋甚矣鄭成人圍許靈左傳鄭人圍許示晉不急君也是則公孫申謀之曰我出師以圍許為將改立君者而紓晉使晉必歸君髙氏曰鄭以晉人執其君故追咎於許而圍之張氏曰君在外而興師復怨大臣之罪也愚按環其國而攻之非將卑師少所能鄭稱人貶也城中城左傳書時也榖梁傳非外民也經世安民視道之得失不倚城郭溝池以為固也榖梁子謂凡城之志皆譏見隱七其説是矣唐陳氏曰凡書土功者重民力也故得時書以示之不時書以戒之僣奢則書以懲之莒雖恃陋不設備至使楚人入鄆茍有令政使民效死而不潰寇亦豈能入也城非春秋所貴而書城中城其為警守益微矣王公設險以守其國易坎卦彖傳非歟曰百雉之城左傳七里之郭孟子設險之大端也謹於禮以為國辨尊卑分貴賤明等威異物采凡所以杜絶陵僣限隔上下者乃體險之大用也獨城郭溝池之足恃乎髙氏曰蓋以莒無備而潰楚人入鄆懼而城之也薛氏曰中城者郛之內而宫之外也不能自治而夾城重險故榖梁氏謂之外民也范氏曰譏公恃城自固不能衛其人民家氏曰榖梁於定六年城中城云三家張也以是觀之中城者國中之城耳非杜氏所謂廪丘者矣愚按襄十九年書城西郛西郛者國都外城之西郭則兩書中城為國都之內城明矣文定於此年著傳特詳且引莒渠丘公不備城郭為喻則亦以為國中之城耳夫諸侯有道守在四鄰諸侯卑守在四境不務修政撫民而僅完國中之城以自守其能保乎庚簡王辰五年十年晉景十九卒齊靈公環元年衛定八蔡景十一鄭成四曹宣十四陳成十八把桓五十六宋共八秦桓二十四楚共十吳壽夢五春衛侯定之弟黑背帥師侵鄭按左氏衛子叔黑背侵鄭晉命也髙氏曰受大國之命而輕用其師者皆書侵與六年侵宋同臨川吳氏曰晉既執鄭伯矣又命欒書伐鄭矣今又使衛侵之伯國之所為如此其何以服鄭之心乎其曰衛侯之弟者子叔黑背生公孫剽匹妙反孫林父寧殖市力反出衛侯衎苦旦反而立剽襄十四亦以其父有寵愛之私故得立耳此與齊之夷仲年無異其特書弟以為後戒可謂深切著明矣永嘉吕氏曰或謂不書爵命氏族者未命也未命則一匹夫爾來聘來盟匹夫而代大夫之事也帥師匹夫而代諸侯之權也師者人之司命而治亂安危所係寄之匹夫亦已輕矣吁此説非也夫既命之盟聘帥師矣焉有非大夫而可以任國事哉其書弟者蓋以見其私爾仁人之於兄弟固親愛之而已矣待之過厚亦非所以為中齊年之子無知黑背之子剽皆致篡立春秋以弟書者豈非以寵愛之私聞於鄰國而史册書之孔子因以記之乎天王弟佞夫陳黃衛鱄秦針陳招衛縶宋辰或殺或奔或叛書之所以見其薄友愛之義也一則以厚一則以薄悉書于經而兄弟之義著矣夏四月五卜郊不從乃不郊公羊傳其言乃不郊何不免牲故言乃不郊也榖梁傳夏四月不時也五卜強也乃者亡乎人之辭也臨川吳氏曰二月下旬初卜三月上旬再卜三月下旬三卜不從則當止而不郊矣乃於三月下旬四卜又於四月上旬五卜五卜不從而後不郊瀆神甚矣髙氏曰魯不當郊也今之不郊非據禮也五卜不從乃不郊爾師氏曰卜至於五其瀆甚矣皇天饗道果可以僣而徼其吉耶五月公會晉侯景齊侯靈宋公共衛侯定曹伯宣伐鄭成左傳鄭公子班聞叔申之謀子如立公子繻鄭人殺繻立髠頑子如奔許欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉晉侯有疾立太子州蒲以為君而會諸侯伐鄭鄭子罕賂以襄鍾子然盟于修澤子駟為質鄭伯歸髙氏曰鄭已立君故晉會諸侯伐鄭而歸鄭伯因與之成焉晉既敗人之國使其君臣變亂而後伐之而歸其君春秋惡其首亂不以舍服與之也劉氏曰左氏謂晉人生立太子州蒲以為君按經但言晉侯也無以明其是州蒲若欲貶晉書其名乃可明爾此大事也仲尼豈忘之哉永嘉吕氏曰信經足矣家氏曰君在而立君者鄭也非晉也左傳所記傳聞之誤耳愚按廢立之際聖人所謹王猛已稱王而其卒書子昭公喪已至自乾侯而定公始書即位所謂一年不二君也豈以一國二君而聖筆無貶乎或謂春秋因其稱爵從而志之見其悖禮此亦惑於左傳而為是説也齊靈人來媵公羊傳三國來媵非禮也趙氏曰齊人來媵先書晉衛者九女既足而又來媵所以為失禮髙氏曰伯姬嫁已久諸侯以其賢猶來媵之然晉衛已備其數豈可復加乎詳見衛晉來媵丙午晉侯獳卒獳乃候反景公也在位十九年太子州蒲嗣是為厲公秋七月公如晉左傳公如晉晉人止公使送葬於是糴茷未反冬葬晉景公公送葬諸侯莫在魯人辱之故不書諱之也此葬晉侯也而不書諱之也隱三年傳晉景不書葬諱其辱而不葬也劉氏曰不言葬不與葬晉侯也天子之喪動天下屬諸侯諸侯之喪動通國屬大夫公之葬晉侯非禮也唯天子之事焉可也以上本劉氏傳傳秫戀反以晉人止公送葬諸侯莫在焉魯人辱之故諱而不書非矣假令力呈反諸侯皆在魯人不以為辱而可書乎髙氏曰公昔不奔天王之喪今乃奔晉侯之喪又為晉人所執使之送葬故聖人於景公之葬沒而不書也家氏曰州蒲傲惰無狀止望國之君使之送葬是以王禮自居也冬十月公無此三字辛簡王已六年十有一年晉厲公州蒲元年齊靈二衛定九蔡景十二鄭成五曹宣十五陳成十九把桓五十七宋共九秦桓二十五楚共十一吳壽夢六春王三月公至自晉左傳公至自晉晉人以公為二於楚故止公公請受盟而後使歸孫氏曰公留晉凡九月王氏曰襄公留於楚者七月書正月公在楚傳者謂存君也今成公在晉不書公在者晉雖恃強見止猶在中國襄公見止而在外夷則外矣書法不同蓋有華夷之别晉侯厲使郤犨來聘己丑及郤犨盟犨尺由反公作州後同左傳郤犨來聘且涖盟臨川吳氏曰晉景公卒成公旋往奔喪可謂謹於事大矣而晉不禮之止之使送葬已大辱矣送葬畢又不使歸公遂請受盟以明其非二故於三月而後得歸才及國而郤犨已至豈誠心行聘禮也哉直欲迫公使盟爾愚按貶郤犨稱及不繫之國與荀庚同夏季孫行父如晉左傳季文子如晉報聘且涖盟也張氏曰公之至自晉也既受盟矣及文子之聘也亦且涖盟焉春秋皆不書而獨書郤犨之涖盟何也蓋成公自汶陽之歸齊欲二晉而不果然嫌隙竟章無以自明晉因公之朝而止之數月公請受盟而後使歸又使郤犨來聘而涖盟魯使行父往則又從而盟之據強大之勢要君臣之盟皆魯之耻也惟犨聘而盟春秋以荀庚孫良夫例而書之若成公之受盟與行父之涖豈能得晉君而盟之乎亦大夫盟之耳不書而諱皆魯之恥也秋叔孫僑如如齊靈左傳宣伯聘於齊以修前好薛氏曰由齊之媵始交好于齊也張氏曰僑如之聘蓋謝戰鞍之師捐歸汶陽之忿而行之迫於晉之辱而不得已也襄陵許氏曰魯蓋激晉之德禮不施將二于齊而未能者歟冬十月壬簡王午七年十有二年晉厲二齊靈三衛定十蔡景十三鄭成六曹宣十六陳成二十把桓五十八宋共十秦桓二十六楚共十二吳壽夢七春周公出奔晉厲左傳王使以周公之難來告書曰周公出奔晉凡自周無出周公自出故也公羊傳周公者何天子之三公也杜氏曰天子無外故奔不言出周公為王所復而自絶於周故書出罪之按左氏周公楚惡烏故反惠襄惠王襄王之族之逼彼力反且與伯輿爭政不勝怒而出王使劉子復之盟于鄄音絹而入三日復扶又反出奔晉夫人主無誠慤苦角反之心而下要一遙反下同大臣盟是謂君不君人臣無忠信之實而上與人主盟是謂臣不臣既已要質鬼神以入矣又叛盟失信而出奔則是自絶於天也張氏曰盟誓衰世之事劉子奉王命以復周公而盟之於君臣之道兩失之矣周公復背盟而出奔故書出以絶之自周無出而書曰出者見音現周室衰微刑政號令不行於天下爾髙氏曰周無出也天下皆周也周公為天子三公而不能同寅協恭乃與伯輿爭政不勝而出王既復之又違命而奔于諸侯之國是自絶于周故書出以為萬世之戒是時王室衰微號令不行於天下故逋逃之臣諸侯敢受之書此而晉罪昭然矣髙郵孫氏曰春秋之義自周無出蓋曰天下一周也何往而非周乎天王居鄭周公奔晉特異之者孔子之意也王之所以為王以有其位而天下皆其有也王得言出是自絶其位而不能有天下也天下非其有則雖居鄭不可不言出也周公之所以為公以其左右天王而與王共治也為三公而自絶于王是不能有三公之位雖止奔晉猶若出于四海之外也天下一王而王有三公春秋書出用見天下無王而王無三公也愚按王子瑕王子朝之奔不言出蓋瑕朝皆為逆亂無所容其身逃竄他國以逭誅戮如國滅之君與在外之臣非居位祿而出奔也其不書出乃書法之常耳襄王御萬乘之尊周公都三公之貴皆當以天下為家其書出則為貶矣陸氏曰公羊云王者無外此其言出自其私土而出也按周是畿內之國不當以私土為義榖梁云周有入無出上下一見之也按二百四十二年適有此二事耳非故見上下也夏公會晉侯厲衛侯定于瑣澤公作沙澤左傳七年楚子重伐鄭諸侯救鄭鄭人囚鄖公鍾儀獻諸晉九年晉侯見鍾儀使稅之范文子曰楚囚君子也君盍歸之使合晉楚之成從之重為之禮使歸求成楚子使公子辰如晉請修好結成十年春晉侯使糴茷如楚報太宰子商之使也十一年宋華元善於令尹子重又善於欒武子聞楚人既許晉糴茷成而使歸復命矣冬華元如楚遂如晉合晉楚之成十二年夏五月晉士燮會楚公子罷許偃盟于宋西門之外曰凡晉楚無相加戎好惡同之同恤災危備救凶患若有害楚則晉伐之在晉楚亦如之交贄往來道路無壅謀其不協而討不庭有渝此盟明神殛之俾隊其師無克胙國鄭伯如晉聽成會于瑣澤成故也晉郤至如楚聘且涖盟楚公子罷如晉聘且涖盟晉侯及楚公子罷盟于赤棘梅溪林氏曰宋西門外之盟不書存中國也家氏曰晉楚為成關繫不細春秋略而不書豈無意乎蓋春秋所以待楚人者乃帝王御外之道來侮則禦之無王則伐之未有舉中國之大而求與之共為盟好者也齊桓之於楚討而服之晉文之於楚敗而却之而霸者之職舉矣晉自靈成君昏暗而臣惰偷以避楚為得計至是因俘纍以通意遂交聘而為成晉固苟求安佚而楚實怙其強大略無息肩之意後三年渝盟伐鄭無所恤也又其後宋向戌復持弭兵之説為盟而長楚遂使中國諸侯北面於夷楚之庭申之會冠屨倒置其禍端實兆於此故瑣澤之會書法如此不與晉為此會也愚按僖之三十二年楚鬬章請平於晉晉陽處父報之晉楚始通南北之交文公為之也趙氏曰此會楚不與焉何以證其成乎若實事則無不告諸侯之理經不應不書也劉氏曰瑣澤之會本以合楚鄭也今楚鄭不至魯衛是會何耶且合晉楚者宋也宋亦不與又何耶凡晉楚為平則應大合諸侯以申成好今三國會而已又何耶然則傳之言未足信也髙氏曰考傳事實與經不合夫晉厲之會實始於此略諸國而致魯衛則以見厲公之德不能謹始諸侯多解體矣秋晉厲人敗狄于文剛敗必邁反左傳狄人間宋之盟以侵晉而不設備晉人敗狄于交剛鄭氏曰交剛狄地劉氏曰春秋於外國未有言戰者蓋四裔春秋之所外也所外者將以力治之而已在中國之戰苟結日不偏陳雖有道猶惡之若夫外域恃其強暴其為冦能勝之而已矣雖不結日不偏陳無譏焉髙氏曰此狄蓋白狄也九年秦人白狄伐晉此先敗狄而後伐秦是知報九年之役也陳氏曰中國敗外域皆不書唯晉特書之病晉也楚方聘魯平宋會諸侯之大夫于蜀討陳夏徴舒觀兵于雒矣而晉區區爭地于羣狄是故宣成之春秋晉有事於秦楚或略不書而甚詳於滅敵蓋惜晉伯之已衰無復有志于中原也冬十月癸簡王未八年十有三年晉厲三齊靈四衛定十一蔡景十四鄭成七曹宣十七卒陳成二十一把桓五十九宋共十一秦桓二十七楚共十三吳壽夢八春晉侯厲使郤錡來乞師錡魚綺反左傳十一年秦晉為成將會于令狐晉侯先至焉秦伯不肯涉河使史顆盟晉侯于河東晉郤犨盟秦伯于河西秦伯歸而背晉成晉侯使來乞師榖梁傳乞重辭也古之人重師故以乞言之也程子傳不以王命興諸侯師故書乞晉主夏盟行使疏吏反諸侯徴會討二誰敢不從以霸主之尊而書曰乞師何也列國疏封雖有大小土地甲兵受之天子不相統屬魯兵非晉所得專也本陸氏微旨今晉不以王命興諸侯之師故特書曰乞常山劉氏曰雖晉之大命魯興師亦書曰乞所以正王法趙氏曰天子在上而諸侯自相請師非禮也以見音現下同其卑伏屈損無自反而縮之意矣張氏曰自齊桓以來召兵侵伐雖不出於王命然除暴討罪為中國舉猶足以令諸侯也今晉以私怨報秦則其義不足以令諸侯矣故懼其不從而卑辭以乞之聖人作春秋無不重內而輕外至於乞師則內外同辭者公羊傳乞卑辭也外內同若辭重師也劉氏曰公子遂如楚乞師此內接外之辭也晉郤錡來乞師此外接內之辭也聖人作春秋無不輕外而重內至於乞師則內外同之者以兵為重也故霸主之尊猶以乞師為文蓋皆有報怨復讎貪得之心髙氏曰非有天子之命以徴兵况又以報私讎乎是以如此若夫誅亂臣討賊子請於天王以大義驅之誰不拱手以聽命何至於乞哉噫此聖人所以垂戒後世見諸行事之深切著明者也王氏曰郤錡春乞師而夏方與諸侯會伐秦則晉之霸政亦衰矣通旨問春秋之世盟主興諸侯之師多矣曷為晉厲將伐秦楚獨言乞師曰秦楚皆大國也是時晉政多門秦楚強盛諸侯憚於興師晉來乞師以伐之愚按春秋書乞師者五其一則我乞兵於楚其三則晉郤錡欒黶荀罃皆厲公徴兵於魯悼公初立而士魴來或者循襲厲公之遺法歟三月公如京師夏五月公自京師遂會晉侯厲齊侯靈宋公共衛侯定鄭伯成曹伯宣邾定人滕成人伐秦桓左傳公如京師及諸侯朝王遂從劉康公成肅公會晉侯伐秦晉侯使吕相絶秦秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦於晉晉欒書將中軍荀庚佐之士燮將上軍郤錡佐之韓厥將下軍荀罃佐之趙旃將新軍郤至佐之郤毅御戎欒針為右晉侯以諸侯之師及秦師戰于麻隧秦師敗績獲秦成差及不更女父公羊傳其言自京師何公鑿行也公鑿行奈何不敢過天子也榖梁傳公如京師非如也非如而曰如不叛京師也自京師言受命不敢叛周也程子傳不書朝王因會伐而行也故不成其朝以伐秦為遂事明朝為重諸侯每歲侵伐四出未有能修朝覲之禮者今公欲會伐秦道自王都不可越天子而往也故皆朝王而不能成朝禮杜氏曰伐秦道過京師因朝王何氏曰時本欲直伐秦塗過京師不敢過天子而不朝復生事造意修朝禮而後行范氏曰實會晉伐秦過京師因其過朝故正其文使若本自往臨川吳氏曰魯號秉禮之國歷十二世二百四十二年之久僅有成公一如京師乃因會晉伐秦道自王都因而朝焉本意不在朝王也故書曰如而不曰朝書曰如京師見音現諸侯之慢也劉氏曰如京師固美志也而未知春秋以是譏之也公不伐秦豈能朝天子乎天子者天下之父也朝有年聘有時盡心竭力致其誠慤專一之意以將之則所謂子事親臣事君之道矣焉有挾二事以往哉重於伐人輕於事君雖有朝之名而無朝之誠春秋所惡也因會伐而行矣又書公自京師以伐秦為遂事者此仲尼親筆明朝王為重存人臣之禮也何氏曰書自京師使若故朝然後生事也范氏曰使若既朝王而王命已使伐秦古者諸侯即位服喪畢則朝小聘大聘終則朝巡狩于方嶽則朝王制諸侯之於天子也比年一小聘三年一大聘五年一朝天子五年一巡守覲諸侯觀春秋所載天王遣使疏吏反者屢矣來聘七錫命三賵葬四歸服一來求三十二公之述職蓋闕如也獨此年書公如京師又不能成朝禮不敬莫大焉君臣人道之大倫而至於此極故仲尼嘗喟然嘆曰夷狄之有君不如諸夏之亡與無同也為于偽反此懼作春秋或抑或縱或豫與與同或奪所以明君臣之義者至矣其義得行則臣必敬於君子必敬於父天理必存人欲必消大倫必正豈曰小補之哉此以伐秦為遂事之意也髙氏曰公如京師專行之辭也然本會晉伐秦道王畿不得不朝舉其可道者志敬也然上書晉來乞師下書公自京師遂會伐秦則是挾他事以往而非專行乃志其不敬也其辭若志敬而實志不敬此春秋微辭也夫諸侯擅興兵而大會于京師罪之大者故聖人詳言之以著其惡也髙郵孫氏曰成公之如京師法當罪之而君臣之大法不可以成公非禮而亂之也書曰如京師遂會諸侯則成公之罪無所可逃而君臣之法愈久愈正也晉侯實召天王而書狩河陽成公實會伐秦而書如京師惟其無禮故以禮正之張氏曰春秋以諸侯事周之禮久闕而因行於伐秦之役若沒而不書是盡廢其僅存之禮也若書以為朝于京師則是舉百年之墜典亦非其實也故書知京師而不言朝以見其行禮之不專書自京師會諸侯伐秦以見諸侯之行止為伐秦而不為朝京師也而劉子成子之在會亦削而不書則晉無請命之實意朝王之專禮而霸主違典禮以遂私意摟諸侯以輕王室之罪具見矣陳氏曰但書伐秦不言戰略之也自狄秦以來秦晉之相加兵皆略之故戰于麻隧秦師敗績但書伐秦戰于櫟晉師敗績但書伐晉以為不足詳焉爾愚按經書朝王之禮者三僖公朝王所為會晉而行成公如京師為伐秦而往皆非有尊周之本心也然僖二十八年書公會諸侯盟于踐土公朝于王所公會諸侯于溫天王狩于河陽公朝于王所使若諸侯先會而後朝王去其實以全名也此年書公如京師公自京師遂會伐秦使若請命而往伐正其名以統實也然書乞師于前書至伐于後則見朝京師實因行以見王而簡慢之罪視僖公不侔矣或曰一經之中魯君僅一如京師而貶之有如是者則朝者反得罪而不朝者無譏歟吁不朝之罪經不書而貶自著今也因過京師而朝王茍不示譏而豫之以朝則天下後世將謂尊君之禮可以簡慢而欺世盜名挾天子以令諸侯者又將借稟命伐秦之例以為口實矣其關係豈淺淺哉曹伯廬卒于師廬左作盧左傳曹宣公卒于師曹人使公子負芻守使公子欣時逆曹伯之喪負芻殺其大子而自立也諸侯乃請討之晉人以其役之勞請俟他年榖梁傳在師曰師在會曰會杜氏曰負芻欣時皆宣公庶子髙氏曰非戰死也死于行耳故不書地劉氏曰榖梁謂閔之也非也諸侯死於行則記其地例如此何閔之有秋七月公至自伐秦孫氏曰不以京師至者明本非朝京師張氏曰上書如京師而以伐秦為遂事春秋所以明朝王之當重也今以伐秦致明諸侯以伐秦為重也王氏曰此年書法抑揚豫奪例變無窮始書乞師知伐秦厲公意也次書如京師知成公之朝非專行也次書自京師伐秦使若繼事焉不可過天子也卒書至伐則著公之此行非為朝王名言其實也春秋之稱微而顯非聖人孰能修之冬葬曹宣公左傳宣公既葬子臧將亡國人皆將從之成公乃懼告罪且請焉乃反而致其邑甲簡王申九年十有四年晉厲四齊靈五衛定十二卒蔡景十五鄭成八曹成公負芻元年陳成二十二把桓六十宋共十二秦桓二十八楚共十四吳壽夢九春王正月莒子朱卒渠丘公即季他也在位三十二年子密州嗣是為黎比公何氏曰莒大於邾至此始卒徐邈曰葬稱諡莒行夷禮君終無諡故不書葬夏衛定孫林父自晉歸于衛左傳衛侯如晉晉侯強見孫林父焉定公不可衛侯既歸晉侯使郤犨送孫林父而見之衛侯欲辭定薑曰不可是先君宗卿之嗣也大國又以為請不許將亡雖惡之不猶愈於亡乎君其忍之安民而宥宗卿不亦可乎衛侯見而復之孫氏曰林父七年奔晉其言自晉歸于衛者由晉而得歸也衛大夫由晉而得歸衛國之事可知矣襄陵許氏曰人臣不唯義之為安而介恃大國使之反已此能為逐君之惡者也惟辨之不早是以衛獻至於出奔禍兆此矣歸易詞也自晉奉之故也髙氏曰晉受衛國逋逃罪戾之臣又強歸之故書自晉歸秋叔孫僑如如齊靈逆女髙氏曰公即位十有四年國家無事迄今始娶又不親迎而使同姓之卿逆之援公子遂之例也故書以為戒此春秋防微杜漸之旨鄭成公子喜帥師伐許靈左傳鄭子罕伐許敗焉鄭伯復伐許入其郛許人平以叔申之封襄陵許氏曰鄭逼許楚困鄭以國大小兵力強弱更相吞噬是禮義亡而人理盡矣髙氏曰此著許之所以遷亦見晉厲之不霸也夫許鄭之怨久矣三年再伐四年伐九年圍之今又伐焉使厲公而霸則鄭人怒鄰兼弱敢如是乎明年遷于葉辟鄭以依楚明晉不足恃也而襄三年晉荀罃伐許猶討其與楚也夫九月僑如以夫人婦薑氏至自齊榖梁傳僑如之挈由上致之也榖梁曰大夫不以夫人以夫人非正也刺不敬迎魚敬反也僑如之不氏一事而再見音現者卒名耳公羊宣元何氏曰卒竟也竟但舉名省文然則娶于他邦而道里或遠必親迎乎以封壤則有小大以爵次則有尊卑以道途則有逺邇或迎之於其國或迎之於境上或迎之於所館中陟仲反禮之節可也詳見隱二年張氏曰稱婦宣公夫人穆薑尚存劉氏曰左氏云稱族尊君命舍族尊夫人非也一事而再見卒名之春秋之常耳趙氏曰書氏傳寫誤增愚按或謂婦薑氏有姑之恆稱妾姑則不書氏然穆薑不氏固曰敬嬴妾姑也聲薑乃嫡姑而出薑不氏何耶冬十月庚寅衛侯臧卒左傳衛侯有疾立敬姒之子衎以為大子定公卒夫人薑氏既哭而息見大子之不哀不內酌飲歎曰是夫也將不惟衛國之敗其必始於未亡人嗚呼天禍衛國也夫吾不獲鱄也使主社稷大夫聞之無不聳懼孫文子自是不敢舍其重器於衛盡置諸戚而甚善晉大夫愚按定公在位十二年太子衎嗣是為獻公秦伯卒桓公也在位二十七年子景公嗣乙簡王酉十年十有五年晉厲五齊靈六衛獻公衎元年蔡景十六鄭成九曹成二陳成二十三杞桓六十一宋共十三卒秦景公元年楚共十五吳壽夢十春王二月葬衛定公三月乙巳仲嬰齊卒公羊傳仲嬰齊者何公孫嬰齊也公孫嬰齊則曷為謂之仲嬰齊為兄後也為兄後則曷為謂之仲嬰齊為人後者為之子也為人後者為其子則其稱仲何孫以王父字為氏也然則嬰齊孰後後歸父也歸父使于晉而未反宣公死成公幼臧宣叔者相也君死不哭聚諸大夫而問焉曰昔者叔仲惠伯之事孰為之諸大夫皆雜然曰仲氏也其然乎於是遣歸父之家然後哭君歸父使乎晉還自晉至柳聞君薨家遣墠惟哭君成踊反命于介自是走之齊魯人徐傷歸父之無後也於是使嬰齊後之也嬰齊者公子遂之子公孫歸父之弟也歸父出奔齊魯人徐傷其無後也於是使嬰齊後之故書曰仲嬰齊杜氏曰嬰齊襄仲子歸父弟宣十八年逐東門氏既而使嬰齊紹其後曰仲氏此可謂亂昭穆之序失父子之親者何氏曰弟無後兄之義為亂昭穆之序失父子之親故不書仲孫明不與子為父孫以後歸父則弟不可為兄嗣以後襄仲則以父字為氏亦非矣通旨問書仲嬰齊與叔老無異矣何以見譏其為兄後乎曰嬰齊乃公子遂之子當稱公孫今魯人以之後歸父書曰仲見其以父字為氏可謂亂昭穆之序矣何氏謂不言仲孫明不與子為父孫按魯自有仲孫蔑叔孫豹故叔彭生叔老不言叔孫則仲嬰齊宜亦不書孫矣劉氏曰榖梁謂子由父疏不得稱公孫則歸父何故稱公孫乎癸丑公會晉侯厲衛侯獻鄭伯成曹伯成宋共世子成齊靈國佐邾定人同盟于戚左傳會于戚討曹成公也程子傳十三年曹伯卒于師負芻殺太子自立既三年諸侯與之盟矣方執之稽天討也故書同盟見其既同矣髙氏曰戚之會將討曹伯也若欲討之勿與之盟可也假他事相會而與之盟既盟而執之故特書同盟以譏之愚按三月宋世子成會盟六月宋公卒蓋宋公有疾而世子出會也臨川吳氏曰諸侯世子代君會盟伐救皆非世子之所宜也晉侯執曹伯成歸于京師公作歸之于左傳諸侯將見子臧於王而立之子臧辭曰前志有之曰聖逹節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋稱侯以執伯討也公羊僖四注方伯所宜討何以為伯討晉合諸侯伐秦曹宣公卒于師曹人使公子負芻初俱反守手又反使公子欣時即子臧公羊作喜時逆曹伯之喪負芻殺其大音泰子而自立至是晉侯執之又不敢自治而歸于京師使即天刑夫是之謂伯討春秋執諸侯者衆矣晉執虞公衛成公鄭成公莒黎比公邾宣公悼公戎蠻子赤宋執滕宣公小邾子邾執鄫子楚執徐子皆稱人楚執宋襄公以衆執為文晉執曹共公雖蒙上文晉侯入曹之文非伯討也未有執得其罪如此者故獨書其爵陸氏曰二百四十二年諸侯相執多矣此獨稱晉侯以其執既當其罪又歸京師得侯伯討罪之義故書爵以表其善蘇氏曰稱侯以執執有罪也歸于京師禮也春秋執諸侯惟是為得禮張氏曰春秋爵厲公而執曹伯與其討也然猶不掩曹伯之與盟者以為先執曹伯以令諸侯然後盟之乃盡善也觀曹人請君于晉曰若有罪則君列諸會矣由一舉措之不當遂開釋姦之門豈小失哉劉氏曰左氏云書晉侯執曹伯不及其民也凡君不道於民諸侯討而執之則曰某人執某侯不然則否非也負芻殺太子而篡之國人不義舉欲隨公子欣時而亡非不道而何夫負芻之惡未見於經晉侯執之然後可見其罪今以左氏例推之則晉侯妄執之爾豈其然耶榖梁謂以晉侯而斥執曹伯惡晉侯也亦非也若云晉人執曹伯得無又非之乎永嘉吕氏曰或疑負芻之殺太子經無明文設有之春秋何以不書疑未得其實然嘗以春秋書法考之則他執諸侯皆稱人其稱侯者獨此一事爾安得以為非伯討乎傳之所言與經意同益足以為證矣公至自會夏六月宋公固卒共公也在位十三年世子成嗣是為平公楚子共伐鄭成左傳楚將北師子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有申叔時老矣在申聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎楚子侵鄭及暴隧遂侵衛及首止鄭子罕侵楚取新石欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰家氏曰晉楚為成期以弭兵甫及三歲而楚伐鄭首禍也書楚子目其人而貶之非爵也秋八月庚辰葬宋共公共音恭三月而葬速劉氏曰榖梁謂月卒日葬不葬者也以其葬共姬不可不葬共公也夫人之義不逾君非也莊二十九年葬紀叔姬而不葬紀侯何哉宋平華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚共左傳書曰宋殺其大夫山言背其族也程子傳山去族害公族也宋六卿魚氏蕩氏向舒亮反氏鱗氏皆桓族也公子目夷自子魚公子蕩公子鱗皆桓公子魚石魚府皆目夷孫乃公孫友之子蕩澤乃公子蕩子公孫壽之孫向戌桓公曽孫向為人向𢃄皆戌族華氏戴族也華督戴公孫華元華御事子督曽孫華喜督玄孫華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司冦鱗朱為少司冦向𢃄為太宰魚府為少宰蕩氏汰而驕共公卒已葬蕩澤弱公室殺公子肥華元曰我司君臣之訓而不能正罪大矣不能治官敢賴寵乎乃出奔晉魚石將止之魚府曰元反必討是無桓氏也石曰彼多大勳國人所與不反懼桓氏之無祀於宋也遂自止元於河上元歸使國人攻桓氏殺蕩山出魚石國然後定並左傳魚石向為人鱗朱向𢃄魚府出舍於睢上華元使止之不可元自止之不可乃反魚府曰今不從不得入矣右師視速而言疾有異志焉若不我納今將馳矣登丘而望之則馳聘而從之則決睢澨閉門登陴矣左師二司寇二宰遂出奔楚元之出奔晉與歸于宋皆不省所景反文者著其正也何氏曰不省文復出華元者以憂國為大夫山所譛張氏曰鄭良霄之奔而歸也逆順與華元不同書法亦異良霄之入不再序而曰入逆也華元再序以與之又書曰歸則其出處之正從可知矣故例外通類而後例中之法可見也書之重直龍反詞之復必有美惡焉詞繁而不殺所賣反所以與之也以不賴寵而出奔以國人與晉杜氏曰華元欲挾晉以自重何氏曰晉人理其罪宋人反華元皆許之討而後入正可知矣蘇轍謂使元懷祿顧寵重於出奔則不能討此説是也蘇氏曰元將討山而力不能討故出奔奔而國人許之討然後歸故其討之也族人莫救書法如此言其出入之正是以能討山也使元懷祿顧寵重於出奔必不能討矣鄭子産為政豐卷將祭請田弗許卷退而徴役子産奔晉子皮止之歸而逐卷亦猶是也王氏箋義華元初欲奔晉至河而復是未至晉者也今以自晉歸宋為文何也蓋其奔也欲求晉討強臣以張公室今為魚石所止許討蕩氏則與晉討無異故周公為王所復既而復奔晉君子以為自絶於周書出以罪之華元為魚石所止遂反其位春秋善之故書自晉歸于宋以成其志也山不書氏背音佩其族也背其族者伐其本也人而無本人道絶矣葛藟力軌反猶能芘其本根况於人而忍伐其本乎杜氏曰蕩氏宋公族還害公室故去族以示罪通旨山背本也韓非為秦畫謀而首欲覆其宗國罪固不容於死矣愚按五大夫同奔亦同復入但書魚石華亥向寧華定宋公弟辰仲他石彄公子地出入悉列名氏蓋魚石首惡舉重而書之餘不足紀陳氏所謂罪其甚焉者是也亥寧定辰他彄地其罪皆同故備録之耳劉氏曰左氏云華元自止魚石五大夫此傳未可信也冬十有一月叔孫僑如會晉厲士燮齊靈髙無咎宋平華元衛定孫林父鄭成公子鰌邾定人會吳壽夢于鍾離咎其九反鰌音秋此會吳之始亦晉以諸侯之大夫為會之始左傳蒲之會將始會吳吳人不至會吳于鍾離始通吳也公羊傳曷為殊會吳外吳也曷為外也春秋內其國而外諸夏內諸夏而外夷狄王者欲一乎天下曷為以外內之辭言之言自近者始也榖梁傳會又會外之也程子傳吳益強大求會于諸侯諸侯之衆往而從之故書諸國往與之會以見夷狄盛而中國衰也時中國病楚故與吳親襄十年柤之會十四年向之會與此同杜氏曰鍾離楚邑淮南縣張氏曰今濠州城下縣故鍾離國嬴姓後為楚邊邑愚按今安豐路臨濠府鍾離縣吳以號舉外之也實吳子也比之淮夷薑戎白狄之類故不書爵會而殊會外之也殊會有二義會王世子于首止僖五意在尊王室不敢與世子抗也愚按會王世子以卑會尊故稱及以會會吳以中國會僭亂故稱會以會文相似而實不同會吳于鍾離于柤莊加反襄十于向舒亮反襄十四意在賤吳人而罪諸侯不敢與之敵也杜氏曰吳夷未嘗與中國會今始來通晉帥諸侯大夫而會之故殊會孫氏曰諸侯大夫不敢致吳子也吳子在鍾離故相與會吳子于鍾離爾襄五年傳諸侯往與之會而主吳夫以太伯至德是始有吳以族言之則周之伯父也本劉氏權衡至其後世遂以號舉者以其僣竊稱王不能居中國之爵號耳家氏曰吳固姬姓太伯之後而僣王稱用夷禮春秋雖欲同之中國有不可得也成襄之間中國無霸齊晉大國亦皆俯首東向而親吳聖人蓋傷之故特殊會可謂深切著明矣髙氏曰外會書卿蓋始於此永嘉吕氏曰向也為中國患者楚而已與中國盟會者亦楚而已未有吳也自成之七年吳伐郯始見於經於是吳為中國患矣此年會吳于鍾離於是吳與中國盟會矣然所與同會者猶曰諸侯之大夫也戚之會柤之會則諸侯實與為會矣馴致黃池之會遂與晉爭長而奄然主中國之會盟開門延盜以來斷髮文身之吳非晉之咎而誰哉王氏曰一會鍾離而合七國再會于柤而合十二國三會于向而合十三國天下諸侯無一不聽於吳幾何而不為胥溺乎春秋特殊會所以抑強吳而存中國也許靈遷于葉葉舒涉反左傳許靈公畏逼于鄭請遷于楚楚公子申遷許于葉榖梁傳遷者猶得其國家以往者也其地許復見也髙氏曰許微弱之國鄰於鄭鄭亟加兵今遂遷焉蓋畏鄭而南依楚故以自遷為文陳氏曰許從于楚雖遷之猶自遷也故遷于夷以公子棄疾遷于白羽以王子勝皆以自遷書之張氏曰葉今汝州葉縣葉近楚而楚遷許以自近中國盟主不能安小國而使之昵蠻荆以求安春秋深以著小國之失所也丙簡王十戌一年十有六年晉厲六齊靈七衛獻二蔡景十七鄭成十曹成三陳成二十四把桓六十二宋平公成元年秦景二楚共十六吳壽夢十一春王正月雨木氷公羊傳雨而木氷也何以書記異也榖梁傳雨而木氷也志異也傳曰根枝折雨木氷者雨而木氷也杜氏曰寒過節氷封著樹王氏曰隂陽和則雨雨者融隂陽之和氣以潤澤於草木者也今乃封著於木則隂勝而陽不足甚矣何休曰木者少詩照反陽幼君大臣之象冰者凝隂兵之類也冰脅肸業反木者君臣將執於兵之徴知陵反未幾而有沙隨苕丘之事天人之際休咎之應於證反焉於虔反可誣也髙氏曰雨著木而成氷上溫而下寒也與隕霜不殺菽相反劉向謂木者少陽貴臣卿大夫之象後世雨木氷多應在大臣天人之應或可推也漢儒之學豈無所受但不當每事求合爾而欲盡廢五行傳秫戀反亦過矣前劉向傳向見尚書洪範箕子為武王陳五行隂陽休咎之應乃集上古以來春秋六國至秦漢符瑞災異之記推迹行事比類相從各有條目號曰洪範五行傳王安石曰劉向明災異為蔽自著洪範傳以若訓如言人君之五事如天之雨㿩寒燠風夫天人不相干豈可強合也程子曰春秋所書災異皆天人響應但人以淺狹之見以為無應其實皆應之然漢儒言災異皆牽合不足信儒者見此因盡廢之夏四月辛未滕子卒文公在位十年成公原立髙氏曰滕入春秋至今三書卒皆不名至是日之矣鄭成公子喜帥師侵宋平左傳楚子自武城使公子成以汝隂之田求成於鄭鄭叛晉子駟從楚子盟于武城鄭子罕伐宋宋將鉏樂懼敗諸汋陂退舍於夫渠不警鄭人覆之敗諸汋陵獲將鉏樂懼宋恃勝也髙氏曰鄭服中國五年矣至是附楚為楚加兵于宋故書侵自是與楚同病中國諸侯之兵無寧歲矣六月丙寅朔日有食之晉侯厲使欒黶來乞師黶所斬反左傳晉侯將伐鄭郤犨如衛遂如齊皆乞師焉欒黶來乞帥孟獻子曰有勝矣程子傳時以穆薑叔孫僑如將作難故師出後時高氏曰晉失霸主之義不足以令諸侯恐諸侯厭惡伐鄭之役特使卿來乞師實欲公親行爾甲午晦晉侯厲及楚子共鄭伯成戰于鄢陵楚子鄭師敗績鄢音偃左傳晉師起鄭人聞有晉師使告于楚楚子救鄭晉師濟河聞楚師將至范文子欲反曰我偽逃楚可以紓憂夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可晉楚遇于鄢陵范文子不欲戰郤至曰韓之戰惠公不振旅箕之役先軫不反命邲之師荀伯不復從皆晉之恥也今我避楚又益耻也文子曰吾先君之亟戰也有故秦狄齊楚皆強不盡力子孫將弱今三強服矣敵楚而已唯聖人能外內無患自非聖人外寧必有內憂盍釋楚以為外懼乎甲午晦楚晨壓晉軍而陳欒書曰楚師輕窕固壘以待之三日必退退而擊之必獲勝焉郤至曰楚有六間不可失也其二卿相惡王卒以舊鄭陳而不整蠻軍而不陳陳不違晦在陳而囂我必克之苖賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗之及戰吕錡射共王中目王召養由基與之兩矢使射吕錡中項伏韜以一矢復命郤至三遇楚子之卒見楚子必下免胄而趨風楚子使工尹襄問之以弓郤至見客免胄承命楚師薄於險養由基射再發盡殪叔山冉搏人以投中車折軾晉師乃止囚楚公子茷旦而戰見星未巳子反命軍吏察夷傷補卒乘繕甲兵展車馬雞鳴而食唯命是聽晉人患之苖賁皇徇曰搜乘補卒秣馬利兵修陳固列蓐食申禱明日復戰乃逸楚囚王聞之乃宵遁晉入楚軍三日穀范文子立於戎馬之前曰君幼諸臣不佞何以及此君其戒之書曰惟命不于常有德之謂公羊傳敗者稱師楚何以不稱師王痍也王痍者何傷乎矢也然則何以不言師敗績末言爾榖梁傳日事遇晦曰晦四體偏斷曰敗此其敗則目也楚不言師君重於師也杜氏曰鄢陵鄭地今屬穎川郡張氏曰後漢郡國志潁川鄢陵晉敗楚之地今開封府鄢陵縣愚按鄢陵縣今屬汴梁路不書師敗績以其君親集矢於目而身傷為重也何氏曰凡舉師敗績為重衆今親傷人君當舉傷君為重髙郵孫氏曰韓之戰實獲晉侯不言晉師之敗君獲則師敗矣鄢陵之戰楚子傷焉不曰楚師君傷則師敗也當是時兩軍相抗未有勝負之形晉之捷也亦幸焉爾幸非持勝之道晉語范文子曰吾外刑乎大人而忍於小民將誰行武武不行而勝幸也幸以為政必有內憂范文子所以立於軍門有聖人能內外無患盍釋楚以為外懼之戒乎楚師雖敗其勢益張晉遂怠矣卒有欒氏之譛而誅三郤國內大亂聖人備書以見音現行事之深切著明也劉氏曰戰而言及者主是戰者也猶曰晉侯為志乎此戰也云爾愚按春秋二百四十二年中國勝楚者惟城濮鄢陵而已自宋襄泓之敗楚頵衡行諸夏至城濮而沮其志自荀林父邲之敗楚之凌駕尤甚嬰齊盟蜀諸侯之大夫從之者十有一國至鄢陵而挫其鋒前此未有中國諸侯助楚以戰中國者惟鄢陵之役鄭伯佐楚共以敵晉使無吕錡射月之勝則楚將倚鄭為援長驅中原其害可勝言耶所可惜者厲公始無制勝之大計不能堅忍持重從欒書固壘之謀以困楚終乏持勝之實德不能修政於內而徒務求逞於外是以三假王命以伐鄭而鄭終不服聽讒譛之言而刀鋸日弊卒及於難迹其所為去楚虔無幾耳由是論之鄢陵之戰固不可不勝而厲公無取勝之道所以不遂霸也楚共殺其大夫公子側左傳楚師還及瑕王使謂子反曰先大夫之覆師徒者君不在子無以為過不榖之罪也子反再拜稽首曰君賜臣死死且不朽臣之卒實奔臣之罪也子重使謂子反曰初隕師徒者而亦聞之矣盍圖之對曰雖微先大夫有之大夫命側側敢不義側亡君師敢忘其死王使止之弗及而卒愚按楚審躬臨戰陳以罷卒致敗而集矢於其目乃歸咎於司馬側而殺之亦異於秦穆之不替孟明者矣傳稱王使止之弗及而死亦猶頵之止得臣曰無死蓋亦偽耳嬰齊身為令尹以將左軍與側相惡使敵國謀臣知其莫有鬬心而委罪於側何耶春秋稱國以殺不去其官著楚君大臣之失也書法與殺得臣同秋公會晉侯厲齊侯靈衛侯獻宋平華元邾定人于沙隨不見公左傳會于沙隨謀伐鄭也宣伯使告郤犨曰魯侯待于壞隤以待勝者郤犨將新軍且為公族大夫以主東諸侯取貨于宣伯而訴公于晉侯晉侯不見公公羊傳不見公者何公不見見也公不見見大夫執何以致會不耻也榖梁傳不見公者可以見公也可以見公而不見公譏在諸侯也程子傳晉怒公之後期故不見公君子正已而無恤乎人魯之後期國難故也晉不見為非矣彼曲我直故不足耻也杜氏曰沙隨宋地梁國寧陵縣北有沙隨亭張氏曰屬拱州愚按寧陵縣今屬歸德府臣子之於君父揚其美不揚其惡榖梁孝子揚父之美不揚父之惡為于偽反尊者諱為親者諱本公羊禮也聖人假魯史以示王法其於魯事有君臣之義故君弒則書薨翬弒隱公慶父弒閔公皆書薨不地易地則書假桓公易許田書曰假滅國則書取成公滅鄟襄公滅邿昭公滅鄫皆書取出奔則書遜昭公及文薑奔齊哀薑奔邾皆書孫屈己而與強國之大夫盟則書及如及齊髙傒盟防及晉處父盟叛盟失信而莫適音嫡守則沒公而書會莊十六同盟于幽凡此類雖不沒其實示天下之公必隱避其辭以存臣子之禮然則沙隨之會晉不見公是魯侯之大辱深可耻焉者矣曷為直書其事而不諱乎曰春秋伸道不伸邪本榖梁榮義不榮勢正已而無恤乎人以仁禮存心而不憂橫去聲逆之至者也沙隨之會魯有內難乃旦反師出後期所當恤者晉人聽叔孫僑如之譛怒公而不見曲在晉矣魯侯自反非有背音佩仁棄禮不忠之咎也昔曾子嘗聞大勇於夫子曰自反而縮雖千萬人吾往矣孟子言浩然之氣至大至剛以直養而無害則塞乎天地之間沙隨之不見於公何歉乎直書而不諱者示天下後世使知大勇浩然之氣所以守身應於證反物如此其垂訓之義大矣唐陳氏曰公不及鄢陵之戰且誣於宣伯晉侯不察其實而信其誣是罪不在公故書以彰晉侯之信誣明我公之無罪常山劉氏曰夫子於魯事有可耻者必為之諱君臣之禮也若我無失道而橫逆所加則不諱今晉怙強而不見公我何罪故直書以罪諸侯也愚按聖人嘗言譛訴不行可謂明也已矣晉厲聽叔孫僑如之譛而不見公于沙隨晉昭聽邾莒之訴而不使昭公與盟于平丘自晉人觀之皆曰所以討魯之二也然沙隨之後又執季孫行父而從楚之鄭三伐不服平丘之後執季孫意如以歸魯昭如晉又止之而諸侯之二於晉者自若也蓋以晉之責魯非義故不足以令諸侯也晉厲之所以不克終而晉昭遂失霸業考諸沙隨平丘之事而見之矣劉氏曰公羊云曷為不耻公幼也非也公即位今十六年豈得云幼哉公至自會石氏曰公之此行內有僑如之患外不見於霸主故危而致之公會尹子武晉侯厲齊靈國佐邾定人伐鄭成王臣始會伐左傳公會尹武公及諸侯伐鄭諸侯之師次于鄭西我師次于督揚不敢過鄭子叔聲伯使叔孫豹請逆于晉師為食於鄭郊師逆以至聲伯四日不食以待之食使者而後食諸侯遷于制田知武子以諸侯之師侵陳至于鳴鹿遂侵蔡未反諸侯遷于潁上鄭子罕宵軍之宋齊衛皆失軍杜氏曰尹子王卿士子爵高氏曰楚師既敗而鄭猶不服見晉政之斁於人矣晉為曹伯請于天子因假王命以再伐鄭故以尹子主會也宋衛以後至不書是役也晉尚以僑如之譛不使公與其事王氏曰春秋於尹氏之卒與立子朝以朝奔楚皆書氏者著世卿之禍也於盟會侵伐稱尹子則指其人而正其爵也愚按前此未有以王臣與伐者桓文之大征伐雖不請命而專行然猶以尊周安夏為心未嘗瀆王臣以臨師旅比於假天子之命而威諸侯者尚為彼善於此也厲公嗣霸以私怨伐秦則挾劉康公成肅公以偕行以攜二而爭鄭則要尹武公單襄公而屢往於是王臣奔走道塗轍不及息而為霸者之用矣春秋於伐秦不書劉成者所以削其請王師而著因行朝王之慢也於伐鄭洊書尹單所以彰其瀆王臣之失也夫茍伐秦書劉成則為朝王請命而伐秦為善矣伐鄭不書尹單則無挾王臣之罪而討二抑楚不為過矣聖人筆削豈不深切著明也哉曹伯成歸自京師左傳曹人請于晉曰自我先君宣公即世國人曰若之何憂猶未弭而又討我寡君以亡曹國社稷之鎮公子是大泯曹也先君無乃有罪乎若有罪則君列諸會矣君唯不遺德刑以伯諸侯豈獨遺諸敝邑敢私布之復請於晉晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡致其邑與卿而不出公羊傳執而歸者名曹伯何以不名而不言復歸于曹何易也其易奈何公子喜時在內也公子喜時者仁人也內平其國而待之外治諸京師而免之其言自京師何言甚易也舍是無難矣程子傳曹伯不名不稱復歸王未嘗絶其位也自京師王命也曹伯不名其位未嘗絶也不絶其位所以纍劣偽反乎天王也其言自京師王命也言天王之釋有罪也善不蒙賞惡不即刑以堯為君舜為臣雖得天下不能一朝居也前宣帝紀詔曰蓋聞有功不賞有罪不誅雖唐虞不能以化天下負芻殺世子而自立不能因晉之執置諸刑典而使復國則無以為天下之共主矣陸氏曰曹伯之篡罪莫大焉晉侯討而執之其事當矣王不能定其罪失政刑也書曰歸自京師而不名曹伯以深譏王也啖氏曰諸侯在他國則是失地之君故反國則名之今曹伯在京師而王不黜之是不失國故不名也孫氏曰書歸自京師天子赦之之辭也唐陳氏曰不曰自京師歸于曹而曰歸自京師若平常之歸如書公至自某也髙氏曰不書復不與其復也篡逆之人殺君之嗣子而自立既列於諸侯之會又赦於天子之庭是率天下而入于亂耳愚按前書同盟于戚晉侯執曹伯歸于京師此書公會尹子晉侯伐鄭曹伯歸自京師而晉厲之操縱由已刑政無常其罪亦不可掩矣劉氏曰榖梁云不言所歸歸之善者也非也曹伯之惡學者知之榖梁子不知耳又云歸為善自某歸次之亦非也衛元咺衛侯鄭何善之有且自某者明其有奉焉爾本不為善不善設也九月晉厲人執季孫行父舍之于苕丘舍如字苕音條公作招章遙上饒二反榖梁傳執者不舍而舍公所也執者致而不致公在也杜氏曰苕丘晉地不稱行人非使人舍之于苕丘明不以歸程子傳置之于苕丘也劉氏曰稱人以執非伯討也此其為非伯討奈何晉侯用叔孫僑如之譛不見公執季孫行父執之者以歸也執而未至故不可言以歸而著舍之于苕丘焉此春秋别嫌明微慎用獄之意也張氏曰舍去聲或作捨非也下書行父盟郤犨則著其釋行父矣愚按晉人舍季孫行父于苕丘如秦穆公獲晉惠公舍諸靈臺劉氏曰公羊云代公執故仁之夫國有罪而執其正卿禮也春秋何故仁之乎冬十月乙亥叔孫僑如出奔齊髙氏曰季孫得釋將與公偕歸故僑知懼罪而出奔魯人立其弟豹以為叔孫後是謂穆叔十有二月乙丑季孫行父及晉厲郤犨盟于扈髙氏曰晉釋行父行父自苕丘與卻犨為此盟也髙郵孫氏曰不書釋而書晉大夫與之盟則釋之可知矣愚按晉不見公而盟季孫晉人下比之端兆於此矣公至自會鄭康成曰伐而致會於伐事不成啖氏曰有不致本事者蓋本事非功也髙氏曰大夫執則致行父不致者公待行父偕歸焉舉公為重也然公未嘗為會而曰至自會者有託焉爾夫沙隨之會既不見公伐鄭之會又不得與而國之宗卿於是見執公倣徨于外以求自明於晉僅能使僑如見逐季孫受盟而公免於難焉方秋而出盡冬而歸始以伐鄭出會而不得與乎其事君辱臣執亦國之深耻也及公之歸不可以伐鄭致故託曰至自會以見公之不與於伐鄭也張氏曰君臣同出以君致也伐鄭不致而致以會著公之危不在於伐而在於會也乙酉刺公子偃按左氏宣伯通於穆薑欲去起吕反下同季孟而取其室戰于鄢陵之日公將行穆薑送公而使逐二子公以晉難乃旦反告曰請反而聽命薑怒公子偃公子鉏趨過指之曰女音汝不可是皆君也公待於壞隤申宫警備設守手又反下申守同而後行是以後使孟獻子守于公宫宣伯使告郤犨曰魯侯待于壞隤以待勝者郤犨取貨于宣伯而訴公于晉侯晉侯不見公公會諸侯伐鄭將行薑又命公如初公又申守而行宣伯使告郤犨曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而已蔑從晉矣若欲得志於魯請止行父而殺之我斃蔑也不然歸必叛晉人執季文子于苕丘公還音旋待于鄆使子叔聲伯請季孫于晉郤犨曰茍去仲孫蔑而止季孫行父吾與子國親於公室對曰僑如之情子必聞之矣若去蔑與行父是大棄魯國而罪寡君也若猶不棄使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡范文子謂欒武子曰季孫於魯相息亮反二君矣妾不衣於既反帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何乃許魯乎赦季孫出叔孫僑如而盟之季孫及郤犨盟于扈歸刺公子偃杜氏曰偃鉏二公子公庶弟高氏曰公之將行穆薑指偃與鉏曰皆君也鉏尚幼則薑之意在偃也公以是歸而刺之然公子買戊衛不卒戊刺之明言其罪此直云刺者言其罪者著其事實以明非其罪也不言其罪者刺得其罪也是以謹而日之臨川吳氏曰象謀殺舜舜為天子則封之偃雖為穆薑所指成公不能制其母而怒其弟竟殺之其視舜之所以處象者何如也劉氏曰榖梁以謂殺無罪非也先刺後名是得其罪先名後刺是不得其罪丁簡王十亥二年十有七年晉厲七齊靈八衛獻三蔡景十八鄭成十一曹成四陳成二十五把桓六十三宋平二秦景三楚共十七吳壽夢十二春衛獻北宫括帥師侵鄭成括公作結左傳鄭子駟侵晉虛滑衛北宫括救晉侵鄭至于髙氏髙氏曰晉命也凡為他人興師者皆書侵以譏之夏公會尹子武單子襄晉侯厲齊侯靈宋公平衛侯獻曹伯成邾定人伐鄭左傳鄭大子髠頑侯獳為質於楚楚公子成公子寅戌鄭公會尹武公單襄公及諸侯伐鄭自戲童至于曲洧杜氏曰單襄公王卿士晉未能服鄭故假天子威周使二卿會之愚按成王少子臻食邑於單至襄公世為王卿士髙氏曰晉假王命討鄭重以王之二卿士晉主兵先尹單以王命為重也夫晉厲之失道而能數合諸侯力捍強楚者由假王靈扶義以令天下也陳氏曰王人未有書二卿者書二卿皆與伐也六月乙酉同盟于柯陵左傳同盟于柯陵尋戚之盟也榖梁傳柯陵之盟謀復伐鄭也程子曰諸侯同病楚也陸氏曰不重言諸侯譏尹單與盟蘇氏曰齊晉之盛天子之大夫會而不盟尊周也柯陵之會尹單始與諸侯之盟自是習以為常非禮也薛氏曰前此征伐未嘗出王官也未嘗盟卿士也去年王官出今年卿士盟三伐鄭而鄭不服無益於事徒以為亂而已陳氏曰狄泉之盟諱王子虎於是不諱曷為不諱會伐未有書王人者唯厲公特書之會盟不足諱焉爾秋公至自會左傳楚子重救鄭師于首止諸侯還榖梁傳不曰至自伐鄭者公不周乎伐鄭也何以知公之不周乎伐鄭以其以會致也臨川吳氏曰方欲聲鄭之罪以致伐而楚救己至諸侯畏楚而還未嘗得致伐也故不以伐致而以會致張氏曰公得罪於晉未久而晉侯自是益驕則公之危不在於伐而在於會則致必以會録也齊靈髙無咎出奔莒左傳齊慶克通于聲孟子與婦人蒙衣乘輦而入于閎鮑牽見之以告國武子武子召慶克而謂之慶克久不出而告夫人曰國子謫我夫人怒國子相靈公以會髙鮑處守及還將至閉門而索客孟子訴之曰髙鮑將不納君而立公子角國子知之刖鮑牽而逐髙無咎無咎奔莒髙弱以盧叛襄陵許氏曰靈公不公其聽自沈帷墻奔其世臣以長禍亂悲夫唯巧言能使閉門索客者為將不納君也王氏曰無咎身為卿佐而不能謀國正君以致疑間至於見逐亦不為無罪矣故書奔無異文九月辛丑用郊公羊傳用者不宜用也九月非所用郊也然則郊曷用郊用正月上辛榖梁傳夏之始可以承春以秋之末承春之始蓋不可矣九月用郊用者不宜用也郊之不時未有甚於此者也故特曰用郊用者不宜用也何氏曰九月郊為悖禮故言用范氏曰郊春事也高郵孫氏曰春秋卜牛於正月三月在滌則春秋之正月夏時之十一月也十一月而養牛二月可以郊矣春秋之九月夏時之七月瀆亂尤甚故特書用以譏之臨川吳氏曰九月乃夏時孟秋建申之月豈郊之時乎不卜日不卜牲而強用其禮焉故曰用非時之甚不敬之大也或曰蓋以人饗叩其鼻血以薦也古者六畜不相為用况敢用人乎僖十九宋司馬子魚曰云云昭十一申無宇曰五牲不相為用况用諸侯乎通旨問劉原父謂用人於郊按左氏昭公十年季平子伐莒取鄆獻俘始用人於亳社臧文仲曰周公其不饗魯祭乎周公饗義魯無義左氏言始用人於亳社者謂此年初以人祭社也竊疑成公以九月祭天所謂用者不宜用也若以此年用人於郊則昭十年不應言始用人於亳社矣又左氏素好誇誕若成公果用人於郊豈不張大其事而記之乎如邾文公用鄫子于次睢之社楚師執蔡世子有用之岡山當時子魚申無宇皆有言矣若成公果用人以祭豈舉魯國之人無一言乎按邾楚季氏皆是執獲仇敵之人快意於山川之禮成公之時未聞執獲仇敵之人又無背叛之賊豈至殺一無罪祭上帝哉於理有必不然矣但書九月用郊其失時失禮自顯然可見何必以為用人乎權衡曰公羊謂九月非所用郊也五月郊何以不加用乎五月豈所宜郊乎且如公羊之言但譏郊失時耳直曰九月郊理豈不明而加用乎按定十五年哀元年上文皆言鼷鼠食郊牛改卜牛事故下文直云五月辛亥郊此上下皆無連文直書九月辛丑郊則文勢不備故特書用字耳若以何必加用則禘于太廟用致夫人又何以加用乎曰郊之非時莫甚於此故特書用古者六畜不相為用况敢用人乎晉侯厲使荀罃來乞師罃乙耕反師氏曰請王命以討有罪冝糾合諸侯以尊王命奉辭以往無敢或後可也乃使大夫乞師於魯耶以盟主而乞師已為卑辱况以王之卿士主兵乃言乞師其卑王室以誤寵諸侯也甚矣夫欲仗天子之威以討叛伐二而乃先為此卑辱欲望鄭畏威得乎哉薛氏曰伐秦之役公如京師故以郤錡乞師起事之端伐鄭三出卿士而起之以欒黶荀罃之使明諸侯之不以王命會且書王師之重猶役於諸侯也冬公會單子襄晉侯厲宋公平衛侯獻曹伯成齊靈人邾定人伐鄭成左傳諸侯伐鄭十月庚午圍鄭榖梁傳言公不背柯陵之盟也孫氏曰鄭與楚比周晉厲三假王命合諸侯以伐之而不能服中國不振可知也十有一月公至自伐鄭左傳楚公子申救鄭師于汝上諸侯還杜氏曰不書圍畏楚救不成圍而還愚按王官下臨諸侯景從以却已敗之楚服懷二之鄭宜若振稿然夏伐鄭楚師至而諸侯還冬伐鄭楚師至而諸侯還望風却走何哉蓋厲公既勝鄢陵驕佚放恣黷於用武慢於尊王是以諸侯無同心戮力之誠鄭不畏而楚復肆非中國之力有不足蓋厲公之德有歉爾有嗣霸之資而以無道行之惜哉壬申公孫嬰齊卒于貍脤貍力之反脤市軫反公作軫榖作蜃左傳聲伯還自鄭至貍脤而卒蘇氏曰大夫卒不地其地在外也劉氏曰春秋故史也有所不革子曰其事則齊桓晉文其文則史其義則丘竊取之矣公羊謂待君命然後卒大夫非也公孫敖卒于齊彼不待公命何為卒之哉榖梁云壬申乃十月致公而後録臣子亦非也昭公在外叔孫婼卒則何不待致公而録之乎陸氏曰二傳不逹文有謬誤之理十有二月丁巳朔日有食之邾子貜且卒貜俱縛反且子餘反定公也在位四十年子牼嗣是為宣公晉厲殺其大夫郤錡郤犨郤至左傳晉厲公侈多外嬖反自鄢陵欲盡去羣大夫而立其左右胥童以胥克之廢也怨郤氏而嬖於厲公郤錡奪夷陽五田五亦嬖於厲公郤犨與長魚矯爭田執而梏之與其父母妻子同一轅既矯亦嬖於厲公欒書怨郤至以其不從已而敗楚師也欲廢之使楚公子茷告公曰此戰也郤至實召寡君以東師之未至也與軍帥之不具也曰此必敗吾因奉孫周以事君公告欒書書曰其有焉不然豈其死之不恤而受敵使乎君盍嘗使諸周而察之郤至聘于周欒書使孫周見之公使覘之信遂怨郤至厲公田與婦人先殺而飲酒後使大夫殺郤至奉豕寺人孟張奪之郤至射而殺之公曰季子欺豫厲公將作難胥童曰必先三郤族大多怨去大族不逼敵多怨有庸公曰然郤氏聞之郤錡欲攻公曰雖死君必危郤至曰人所以立信知勇也信不叛君知不害民勇不作亂失兹三者其誰與我死而多怨將安用之君實有臣而殺之其謂君何我之有罪吾死後矣若殺不辜將失其民欲安得乎待命而已受君之祿是以聚黨有黨而爭命罪孰大焉壬午胥童夷羊五帥甲八百將攻郤氏長魚矯請無用衆公使清沸魋助之抽戈結祍而偽訟者三郤將謀於榭矯以戈殺駒伯苦成叔於其位溫季曰逃威也遂趨及諸其車以戈殺之皆尸諸朝榖梁傳自禍於是起矣張氏曰郤氏雖多怨既為大夫則君之股肱也厲公不正其有罪無罪而用嬖幸胥童長魚矯之計一朝殺三卿又劫欒書中行偃能無及乎此春秋所以列書而深罪之也楚共人滅舒庸左傳舒庸人以楚師之敗也道吳人圍巢伐駕圍釐虺遂恃吳而不設備楚公子槖師襲舒庸滅之任公輔曰舒庸東夷偃姓之國地譜廬州城下舒城薛氏曰舒庸舒之别種也詩曰荆舒是懲則荆舒之國皆非一種也春秋之始荆舒皆以名見舒庸舒蓼舒鳩之滅荆舒一於楚矣髙氏曰楚既摧敗而其餘烈猶足以滅國於要荒使其得志於鄢陵則毒被華夏豈勝道哉晉敗于邲之後書楚子滅蕭是也此書滅舒庸者中國能折其鋒使不得為我患者晉厲之成勞也蓋厲公有宏才而無令德是以威震於外而亂生於內身雖不終功亦足録戊簡王十子三年十有八年晉厲八弒齊靈九衛獻四蔡景十九鄭成十二曹成五陳成二十六把桓六十四宋平三秦景四楚共十八吳壽夢十三春王正月晉殺其大夫胥童左傳胥童以甲劫欒書中行偃於朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也對曰人將忍君臣聞亂在外為姦在內為軌御姦以德御軌以刑不施而殺不可謂德臣逼而不討不可謂刑德刑不立姦軌並至臣請行遂出奔狄公使辭於二子曰寡人有討於郤氏郤氏既伏其罪矣大夫無辱其復職位皆再拜稽首曰君討有罪而免臣於死君之惠也二臣雖死敢忘君德乃皆歸公使胥童為卿公遊於匠麗氏欒書中行偃遂執公焉召士丐士丐辭召韓厥韓厥辭曰昔吾畜於趙氏孟姬之讒吾能違兵古人有言曰殺老牛莫之敢尸而况君乎二三子不能事君焉用厥也欒書中行偃殺胥童民不與郤氏胥童道君為亂故皆書曰晉殺其大夫家氏曰三郤之死晉厲殺之也胥童之死書偃殺之也春秋一以國殺為文著胥童導君作難而其君由是以殞童亦晉國之罪人也人臣與君俱死於難是之謂死節胥童與厲公先後死春秋繫之國殺為其有當誅之罪也使童大節可録則必用孔父牧息之例繼其君而書死矣髙氏曰宋督殺孔父而弒殤公春秋書及其大夫書偃殺胥童而弒厲公而書晉殺其大夫蓋孔父忠於殤公者也胥童嬖於厲公者也嬖臣導君為不道亡其身以及其君故春秋兩治之以為萬世戒庚申晉弒其君州蒲左傳欒書中行偃使程滑弒厲公葬之于翼東門之外以車一乘榖梁傳稱國以弒其君君惡甚矣愚按厲公在位八年晉人立襄公少子捷之孫周是為悼公弒君天下之大罪討賊天下之大刑春秋合於人心而定罪聖人順於天理而用刑固不以大霈釋當誅之賊亦不以大刑加不弒之人然趙盾以不越境而書弒宣二許世子止以不嘗藥而書弒昭十九鄭歸生以憚老懼讒而書弒宣四楚公子比如字以不能效死不立而書弒昭十三齊陳乞以廢長展兩反立幼而書弒哀六晉欒書身為元帥所類反親執厲公於匠麗氏使程滑弒公而以車一乘繩證反葬之於翼東門之外而春秋稱國以弒其君而不著欒書之名氏何哉仲尼無私與天為一奚獨於趙盾許止歸生楚比陳乞則責之甚備討之甚嚴而於欒武子闊略如此乎學者深求其旨知聖人之誅亂臣討賊子之大要也而後可與言春秋矣昭二十七年定十三年傳稱國以弒當國大臣之罪也朱子語胡氏傳意若許欒書之弒舊嘗疑之後問文定公之甥范伯逹伯逹曰公之意蓋以為欒書執國之政而厲公無道如此亦不得坐視為欒書之計厲公可廢而不可殺也又問其孫伯逄伯逄亦曰厲公無道但當廢之王氏曰經不罪欒書中行偃而稱國以弒者以厲公之惡有以取之孟子曰聞誅一夫紂矣未聞弒君也知此然後知聖人之於天道張氏曰聞之師曰稱國以弒者衆弒其君之辭也孟子論貴戚之卿曰君有大過則諫反覆之而不聽則易位厲公之過大矣昵用小人殺戮無辜舉朝諸卿不保首領書偃晉之世臣以社稷為心可以行易位之權而程滑遽弒之故稱國以弒而不言二臣分其惡於衆也悼公逐不臣者七人而不誅書偃非里克寧喜之比故也臨川吳氏曰春秋之作正為誅亂臣賊子也趙穿弒靈公傳不言盾使而經書趙盾弒君程滑弒厲公傳以為欒書中行偃使之而經止書國弒何也曰此春秋之所以别嫌明微也蓋靈公之不君其惡未加於一國欲殺趙盾而趙穿為盾殺之實盾之所欲弒也故春秋誅盾為首惡厲公之無道剛暴不仁遍得罪於一國欒書中行偃執公而殺其輔君為惡之嬖臣蓋將以匡晉國而未有弒君之心也程滑因國人之所共怒而弒公蓋非書偃之專謀也故書國弒若獨書書偃則罪歸於二卿而一國之人得免於弒君之惡矣曰二卿執公可乎曰孟子云諸侯危社稷則變置欒書當國之卿厲公既誅三卿矣不可諌也必將大亂晉國坐視社稷之隕則亦何以為國卿乎故將廢置而更立焉國人遽弒其君聖人不以首惡加二子非縱之也蓋辨是非定邪正以示萬世左氏使程滑之言非經意也陳氏曰弒不言故弒而言故有自來者矣晉殺其大夫郤錡郤犨郤至晉殺其大夫胥童晉弒其君州蒲蔡殺其大夫公子駟蔡放其大夫公孫獵盜殺蔡侯申春秋書弒未有詳於此者也齊靈殺其大夫國佐左傳齊侯使崔杼為大夫使慶克佐之帥師圍盧國佐從諸侯圍鄭以難請而歸遂如盧師殺慶克以榖叛齊侯與之盟于徐關而復之盧降使國勝告難于晉待命于清齊侯使士華免以戈殺國佐于內宫之朝師逃於夫人之宫書曰齊殺其大夫國佐棄命專殺以榖叛故也使清人殺國勝國弱來奔王湫奔萊慶封為大夫慶佐為司冦張氏曰無咎奔於去年之秋而鮑牽刖齊靈可以省母之言是非矣國佐叛而後復之意靈公非不知國佐之直與慶克之內亂宫闈也卒殺國佐則靈公之知又下魯成數等矣保姦如此因慶克以成慶封黨賊之禍慶封逐而政歸於陳氏皆靈公蔽塞聰明惟婦言是用所致也國佐不能見幾而去以邑叛君又仕危亂之朝身死宫闈非不幸矣公如晉悼左傳晉使荀罃士魴逆周子于京師而立之生十四年矣大夫逆于清原盟而入朝于武宫逐不臣者七人即位于朝公如晉朝嗣君也夏楚子共鄭伯成伐宋平宋魚石復入于彭城左傳鄭伯侵宋及曹門外遂會楚子伐宋取朝郟楚子辛鄭皇辰侵城郜取幽丘同伐彭城納宋魚石向為人鱗朱向𢃄魚府焉以三百乘戍之而還宋人患之西鉏吾曰若楚人與吾同惡以德於我吾固事之也不敢二矣大國無厭鄙我猶憾不然而收吾憎使贊其政以間吾釁亦吾患也今將崇諸侯之姦而披其地以塞夷庚逞姦而攜服毒諸侯而懼吳晉吾庸多矣非吾憂也且事晉何為晉必恤之杜氏曰彭城宋邑張氏曰今徐州彭城縣愚按徐州今屬汴梁路此伐宋以納魚石其不曰納宋魚石于彭城何也劉敞曰不與納也諸侯失國諸侯納之正也諸侯世也大夫失位諸侯納之非正也大夫不世也諸侯託於諸侯禮也大夫託於諸侯非禮也愚按諸侯失國而諸侯納之春秋皆不書惟書納頓子納北燕伯譏納者之非正也况納大夫乎楚莊納寧行父于陳使之復為大夫春秋猶譏之况納叛臣而據地以逼其君乎書伐書復入而不言納見魚石之復入由楚鄭之伐也其言復入者已絶而復入惡之甚者宋魚石晉欒盈是矣通旨孫林父宋辰趙鞅荀寅皆據外邑以自保故書叛魚石欒盈將以亂國故書復入孫氏曰此楚鄭間晉之變伐宋取彭城與魚石守之以逼宋也其曰宋魚石復入于彭城者不與楚鄭伐宋取邑以與宋叛臣也故以魚石自入犯君為文蘇氏曰魚石之書復入而先言楚鄭之伐以著其納亂臣也故不言自楚而曰復入不言叛將以亂國非直叛君而已故魚石欒盈之罪重於趙鞅宋辰也王氏曰彭城不係之宋者宋非魚石所可入故也陳氏曰奔大夫復不書莊閔以上有書歸若入者矣則皆不書奔者也奔而言歸自衛元咺始咺訟其君者也雖然歸猶言自也若宋魚石晉欒盈是賊而已矣故魚石不言自楚欒盈不言自齊劉氏曰左氏云凡去其國國逆之曰入復其位曰復歸諸侯納之曰歸以惡曰復入今按事與例合者少與例違者多注者或託之從赴不復可信也公至自晉晉侯悼使士丐來聘左傳拜朝也襄陵許氏曰公朝始至而聘使繼至晉悼之下諸侯肅矣此列國之所以睦而叛國之所以服也髙氏曰書晉侯與宣十年書齊侯同義秋把伯桓來朝左傳勞公且問晉故公以晉君語之把伯於是驟朝于晉而請為昏八月邾子宣來朝左傳即位而來見也愚按成公末年把邾相繼來朝蓋皆謀從晉耳築鹿囿左傳書不時也公羊傳何以書譏何譏爾有囿矣又為也榖梁傳山林藪澤之利所以與民共也虞之非正也杜氏曰築牆為鹿苑何氏曰刺奢泰妨民天子囿方百里公侯十里伯七里子男五里髙郵孫氏曰春秋興作皆書雖城池之固門廄之急無遺焉重民力也况耳目之玩一身之娛哉襄陵許氏曰大夫擅國而威福日去而公務自娛於鳥獸草木是謂冥豫在上何可長也髙氏曰前此未有書築囿者是後昭九年築郎囿定十三年築蛇淵囿人君之示子孫也可不謹哉愚按古之聖王臺池園囿與民同樂今築墻為囿為阱於國中以厲民此豈君人者之心乎己丑公薨于路寢榖梁傳路寢正也男子不絶婦人之手以齊終也冬楚共人鄭成人侵宋平左傳宋老佐華喜圍彭城老佐卒焉楚子重救彭城伐宋宋華元如晉告急韓獻子為政曰欲求得人必先勤之成霸安疆自宋始矣晉侯師于台谷以救宋遇楚師于靡角之谷楚師還愚按前書楚鄭伐宋魚石入彭城此書楚鄭侵宋而不曰救彭城彭城不可救也比事考之黨叛臣之迹見矣荆楚蠻夷不足責也鄭附夷而崇姦何至若是之甚乎故特貶而人之序鄭於楚下以著其惡然晉悼公一出師而楚師還異於楚師至而諸侯亟還者矣晉侯使士魴來乞師魴音房公作彭後同左傳季文子問師數于臧武仲對曰伐鄭之役知伯實來下軍之佐也今彘季亦佐下軍如伐鄭可也事大國無失班爵而加敬焉禮也從之襄陵許氏曰悼公復興霸業而乞師以救宋猶遵厲公故事元年而後遂無乞師則召兵而已矣十有二月仲孫蔑會晉侯悼宋公平衛侯獻邾子宣齊靈崔杼同盟于虛朾杼直吕反虛起居反朾他丁反左傳孟獻子會于虛朾謀救宋也宋人辭諸侯而請師以圍彭城杜氏曰虛朾宋地髙氏曰諸侯師至而楚鄭之師已退故宋人辭諸侯而請其師以圍彭城而先為此盟也愚按諸侯同心懼楚而謀救宋故書同盟陳氏曰崔杼嘗奔衛不言歸其再見何齊納以為大夫也向也曰崔氏今曰崔杼則已為大夫也前年逐髙無咎今年殺國佐而杼當國已而殺髙厚齊無世臣矣於是伐莒伐魯皆杼帥師焉而後弒齊之禍靈公為之也丁未葬我君成公左傳書順也杜氏曰薨于路寢五月而葬國家安靜世適承嗣故曰書順春秋胡傳附録纂疏卷二十
