body:
  text: 春秋胡傳附録纂疏卷十九元汪克寬撰成公上公名黑肱宣公子母穆姜在位一十八年夫人齊姜辛定王十未七年元年晉景十年齊頃九年衛穆十年蔡景二年鄭襄十五年曹宣五年陳成九年把桓四十七年宋文二十一年秦桓十五年楚共王審元年春王正月公即位張氏曰雖無王命而有父命故書即位傳例承國於先君則得書即位以别於內復無所承者二月辛酉葬我君宣公無冰寒極而無冰者常燠於六反也杜氏曰周二月今之十二月而無冰書冬溫京房易傳當寒而溫倒常也按洪範傳曰豫恆燠若此政事舒緩紀綱縱弛之象劉向五行傳成公幼弱政在三家公室不張其象已見音現何氏曰成公幼少季孫行父專權而委仕之所致故當固與涸同寒凝閉也陰沍户故反寒而常燠應於證反之古者日在北陸而藏冰獻羔而啓朝之祿位賔食喪祭冰皆與音預焉昭四申豐云云此亦燮調愆伏之一事也永嘉呂氏曰陽氣之在天地間譬猶火之著於物也故常有以解之十二月陽氣藴伏錮而未發其盛在下則納冰於地中二月四陽作蟄蟲起陽始用事則亦始啓冰而廟薦之四月陽氣畢達陰氣將絶則冰於是大發食肉之祿老病喪浴冰無不及故藏冰發冰所以節陽氣也今既寒而燠遂廢凌力證反人之職然䇿書所載皆經邦大訓人有微而不登其姓名微者但書人事有小而不記其本末內女嫁大夫不書歸大夫出不致卒不書葬雨雹冰雪何以悉書七書不雨三書雨雹及無氷再書隕霜亦三書雨雪天人一理也萬物一氣也觀於陰陽寒暑之變以察其消息盈虛此制治去聲於未亂愼於微之意也每愼於微然後王事備矣啖氏曰榖梁云終時無冰則志此未終時而言無冰何也終無冰矣加之寒之辭也按二月今之十二月舉此無冰則一時無冰可見矣若待終時乃書則今之正月豈可更言無冰乎三月作丘甲左傳為齊難故作丘甲杜氏曰譏重斂故書作丘甲益兵也古者九夫為井四井為邑四邑為丘四丘為甸甸地方八里旁加一里為成所取於民者出長轂一乘繩證反下同此司馬法一成之賦也前刑法志殷周因井田而制軍賦地方一里為井四井為邑四邑為丘丘十六井也四丘為甸甸六十四井戎馬四匹兵車一乘甲士三人卒七十二人一同百里提封萬井定出賦六千四百井兵車百乘一封三百一十六里提封十萬井定出賦六萬四千井兵車千乘周禮注司馬法曰井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乘士十人徒二十人為于僞反齊難乃旦反作丘甲益兵備敵重困農民非為國之道其曰作者不宜作也唐太宗問李靖楚廣古曠反兵車名與周制如何靖曰周制一乘步卒七十二人甲士三人以二十五人為一甲凡三甲共七十五人見李衛公問對然則一丘所出十有八人積四丘而具一乘耳今作丘甲者即丘出一甲是一甸之中共百人為兵矣孫氏曰謂丘出甲士一人古者九夫為井四井為邑四邑為丘出戎馬一匹牛三頭丘何甲士之有高郵孫氏曰是丘出一甲而甸出甲士四人也往者三人而今增其一丘出一人焉則未知其所作者三甸而增一乘乎每乘而增一甲乎魯至昭公時嘗搜于紅革車千乘昭八大搜于紅自根牟至于商衛革車千乘則計甸而增乘未可知也楚人二廣之法一乘至用百有五十人宣十二其君之戎分為二廣廣有一卒卒偏之兩注百人為卒二十五人為兩車十五乘為大偏今廣十五乘亦用舊偏法復以二十五人為乘副則魯每乘而增一甲亦未可知也賦雖不同其實皆為益兵其數皆增三之一耳通旨成公以前甸賦車一乘每乘七十二人甲士三人凡二十五人為一甲是四丘共出三甲爾今作丘甲即一丘出一甲其於賦增三分之一也杜征南最號知兵及釋此亦誤豫因看李衛公論車乘法方曉此先儒或言甲非人人之所能為穀梁又以為丘出甸賦加四倍者杜氏誤矣劉氏曰魯不務廣德而務廣力不務益義而務益兵以王者之制論之則作丘甲之罪大矣王者之制諸侯不得擅賦其民擅稅其民稅為足食也賦為足兵也然而不得擅者先王之稅既足以食矣先王之賦既足以用矣今不循先王而以意為凖必亂之道也是以聖人禁之張氏曰每甲士統二十四人必無增甲士而不增步卒之理故知李靖所謂二十五人為一甲者其考周制詳矣鄱陽萬氏曰四丘之甸共出甲士三人而成公使一丘出一甲士甲士之數既加則長轂牛馬步卒之賦率加其四之一聖人惡其紊亂先王軍賦之制故書以譏之愚按兵制之變始壞於齊之內政而家一人焉繼壞於晉之州兵而家五人焉長勺之戰桓公自謂帶甲十萬車五千乘楚薳啓疆謂晉十家九縣長轂九百其餘四十縣遺守四千叔向亦謂寡君有甲車四千乘則兵制之增益於古可知矣循襲效尤遂致魯以秉禮之國亦增丘甲而不以為嫌也春秋之終且用田賦軍旅之征而民力民財竭矣厥後楚之乘廣魏之武士秦之戌卒窮兵極詐以快貪殘而孫吳商白之徒皆身誅戮於前而國滅亡於後然兵農既分更歷千載雖有明君賢臣不能復古抑可嘆哉春秋作丘甲之書其垂戒後世意深切矣劉氏曰公羊云譏始丘使也何休云使丘民作甲非也榖梁云古者農工皆有職以事上甲非人人之所能為丘作甲非正也亦非也若惡使農夫為甲何不言井作甲邑作甲農作甲而必云丘作甲乎丘民作甲井民獨不作甲乎杜氏又云長轂一乘甲士步卒七十五人此甸所賦今魯使丘出之按丘者十六井爾甸乃六十四井使丘供甸賦是加四倍魯亦必不為也且云丘甲不云丘乘夏臧孫許及晉侯景盟于赤棘左傳聞齊將出楚師夏盟于赤棘杜氏曰赤棘晉地愚按今真定路趙州平棘縣初宣公謀以晉人去起吕反三桓歸父為于僞反下同是見逐而奔齊矣今季孫當國攝君事恨齊人之立宣公納歸父又懼晉侯之或見討也故往結此盟赤棘晉地也其稱及魯所欲也盟非春秋所貴而惡烏故反屢盟者非惟長展兩反亂亦國用民力所難給也成公即位之初方經大故未有施舍如字施恩惠舍勞役已責止逋責逮鰥寡惠及微救乏困之事也成十八晉悼公即位施舍已責逮鰥寡振廢滯匡乏困救災患薄賦斂宥罪戾為齊難乃旦反既作丘甲矣聞將出楚師杜氏曰與晉盟懼齊楚又逺與晉尋盟豈固本保邦之道乎書及晉侯盟于赤棘非特備齊懼晉蓋三桓懷忿懟直類反君父之心將有事于齊而汲汲欲之者罪可見矣高氏曰許曷為及晉侯盟齊怨成矣晉援不可緩也故汲汲焉求為此盟愚按自公孫敖會晉侯于戚而後季孫行父會齊侯于陽榖公子遂及齊侯盟于郪丘繼而公孫歸父會齊侯于榖會楚子于宋矣今也臧孫許及晉侯盟于赤棘以大夫盟霸主而不愧也昔也遂盟趙盾今也許盟晉侯益無忌憚矣春秋內大夫特盟外諸侯者五郪丘赤棘拔句繹皆書及唯祲祥書會夫盟齊盟晉魯之汲汲可知于拔則定公之位未定如晉見郤故修好于邾句繹則二卿取邾田又脅邾子以盟之也故四盟皆魯之志也祲祥外為志猶為彼善於此爾家氏曰中世以後諸侯之大夫多自結於霸國魯之季氏衛之孫氏宋之華氏皆結於晉者也不特外交其君又以賄結其大夫故君常見踈於霸國臣反挾霸國之援以脅制其君亂亡所從始也故春秋深著人臣外交之戒秋王定師敗績于茅戎公穀作貿戎左傳晉侯使瑕嘉平戎于王單襄公如晉拜成劉康公徼戎將遂伐之叔服曰背盟而欺大國此必敗背盟不祥欺大國不義神人弗助將何以勝不聽遂伐茅戎敗績于徐吾氏公羊傳孰敗之貿戎敗之然則曷為不言貿戎敗之王者無敵莫敢當也榖梁傳不言戰莫之敢敵也為尊者諱敵不諱敗為親者諱敗不諱敵尊尊親親之義也杜氏曰茅戎戎别種程氏曰王師於諸侯不言敗諸侯不可敵王也於外域不言戰外域不能抗王也杜氏曰不言戰王者至尊天下莫之得校故以自敗為文不書敗地而書茅戎明為茅戎所敗啖氏曰王師不書戰無敵也敗則但書敗而已人臣無敵君之義也不可敵不能抗者理也其敵其抗王道之失也並程子傳桓王伐鄭兵敗身傷而經不書敗存君臣之義立天下之防也劉康公邀戎邀左作徼杜氏曰欲要其無備康公王季子也伐之敗績於徐吾氏杜氏曰茅戎之别種也而經不書戰辨中外之分去聲立中國之防也孫氏曰定王庸暗無宣王之烈王師為茅戎所敗惡之大者故只書自敗所以存周也是皆聖人筆削非魯史之舊文也然筆於經者雖以尊君父外茅戎為義而君父所以尊僭竊所以服則有道矣桓王不以討賊興師而急於伐鄭康公不以惇信持國而輕於邀戎是失其所以君天下禦四外之道也書敗績于茅戎者言自敗也其自反亦至矣陸氏曰王者之於天下也蓋之如天容之如地其有不庭之臣則告諭之訓誨之如又不至則增修其德而問其罪故曰王者之師有征無戰今王師與夷狄為敵此取敗之道非戎所能敗也故以自敗為文所以深譏王也薛氏曰不言茅戎敗之亦王者無敵於天下也無敵而為戎敗故以自敗為文也劉氏曰不言戰而言敗此王術也以謂天下莫之敢抗故不可言戰而有天下者一失其道則人能奪之故不恥言敗是以王者修已而不責於人也常山劉氏曰王者不能以義征四夷乃徼戎以致敗豈不曰自取之乎聖人立法以垂後世一書王師敗績于茅戎而尊王之義與王自取敗之道及諸侯不勤王之義咸得而見矣陳氏曰戰然後言敗績此不戰何以書敗績言自敗也凡王有事譏不在諸侯諸侯有事譏不在臣子如天王出居于鄭鄭棄其師皆以自致之文書之雖有敵國亦自致也梁亡齊人殱于遂王師敗績于茅戎無敵國之辭也愚按桓王戰于繻葛諱不書敗而此不諱敗者茅戎正朔所不加可以言敗而天子於諸侯不可言敗此所以别中外之分也桓王不言敗而劉康公言敗又以正君臣之分也啖氏曰公榖云晉敗之若晉敗王師而改曰貿戎是掩惡也如何懲勸乎冬十月壬定王十申八年二年晉景十一齊頃十衛穆十一卒蔡景三鄭襄十六曹宣六陳成十把桓四十八宋文二十二卒秦桓十六楚共二春齊侯頃伐我北鄙左傳齊侯伐我北鄙圍龍三日取之遂南侵及巢丘初魯事齊謹甚雖易世而聘㑹不絶也及與晉侯盟于斷音短道宣十七而後怨隙成再盟于赤棘而後伐吾北鄙高氏曰魯絶齊而與晉盟齊遂即楚而伐我也齊侯之興是役非義矣魯人為鞍音安之戰豈義乎同曰憤兵漢書作忿兵務相報復而彼此皆無善者則亦不待貶而罪自見音現矣家氏曰此齊人爭魯於晉也前日魯宣專意事齊晉莫如之何也今魯人去齊而即晉赤棘朝盟齊師暮至書齊侯伐我所謂目其人而貶之也夫既辱晉使又以兵加於魯則其志在於與晉為敵好戰而不度力其頃公之謂矣夏四月丙戌衛穆孫良夫帥師及齊頃師戰于新築衛師敗績左傳衛侯使孫良夫石稷寧相向禽將侵齊與齊師遇石子欲還孫子不可戰于新築石成子曰師敗矣子不少須衆懼盡新築人仲叔于奚救孫桓子桓子是以免杜氏曰新築鄭地齊師侵虐而以衛主此戰何也衛侯初與晉同盟于斷道矣又使世子臧與晉同伐齊矣又使孫良夫石稷將侵齊矣及與齊師遇蓋齊伐魯取龍乘勝又欲伐衛石稷欲還音旋良夫不可曰以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也遂戰于新築故齊師雖侵虐而此戰以衛主之也春秋善解紛貴遠于萬反怨而惡烏故反以兵刃相接故書法如此張氏曰易曰師左次無咎凡戰而不能勝者聖人立全師愛民之法所以重民命而存國體也良夫不從石稷之言必進而戰致敗其師幾於喪身辱國此春秋所以罪良夫而以之主新築之戰也陳氏曰衛書大夫帥師於是始大夫强也良夫世為卿至林父出其君入于戚以叛是故孔逹不言帥師必良夫而後言帥師六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉景郤克衛穆孫良夫曹宣公子首及齊侯頃戰于鞍齊師敗績郤去逆反首公榖作手鞍音安左傳孫桓子還於新築不入遂如晉乞師臧宣叔亦如晉乞師皆主郤獻子晉侯許之七百乘郤子請八百乘許之郤克將中軍士燮佐上軍欒書將下軍韓厥為司馬以救魯衛臧宣叔逆晉師且道之季文子帥師㑹之師從齊師于莘至于靡筓之下齊侯使請戰對曰晉與魯衛兄弟也來告曰大國朝夕釋憾於敝邑之地寡君不忍使羣臣請於大國能進不能退君無所辱命齊侯曰大夫之許寡人之願也師陳于鞍齊侯曰余姑翦滅此而後朝食不介馬而馳之郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰師之耳目在吾旗鼓若之何其以病敗君之大事也擐甲執兵固即死也病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之齊師敗績逐之三周華不注韓厥從齊侯逢丑父與公易位將及華泉驂絓於木而止韓厥執縶馬前奉觴加璧以進曰寡君使羣臣為魯衛請曰無令輿師陷入君地下臣不幸屬當戎行無所逃隱且懼奔辟而忝兩君臣辱戎士敢告不敏丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免杜氏曰鞍齊地愚按今東平路平陰縣大國三軍次國二軍周禮大司馬凡制軍萬有二千五百人為一軍王六軍大國三軍次國二軍小國一軍魯雖大國而四卿並將去聲下同是四軍也當此時舊制猶存尺地皆公室之土也一民皆公室之兵也上卿行父與僑如嬰齊各帥一軍㑹戰而臧孫許如晉乞師又逆晉師為之道音導本不將兵特往來晉魯兩軍之間預謀議耳成公初立主幼國危為于僞反下為詳同季孫一怒掃境內興師而四卿並出肆其憤欲謂怒婦人之笑辱貪取汶陽之田雖無人乎成公之側有不恤也然後政自季氏出矣將稱元帥所類反略其副屬章欲反詞之體也而四卿皆書者豈特為詳內録哉堅冰之戒亦明矣何氏曰魯舉四大夫不舉重者惡內虛國家悉出用兵重録內也通㫖司馬懿曰春秋任大責重諸葛武侯曰春秋責帥臣職是當故使舉上客而不及其介將稱元帥而不列其副春秋之例也邲之戰三軍之主將皆在而獨書林父者責在林父也此戰並列四卿不以季孫主之何也見公室卑弱四卿擅命各得魯國之兵權乎家氏曰魯諸卿俱帥師又見昭十年伐莒哀二年伐邾三家專兵丘甸卒乘悉為所有其君孤立於上國益不可為而春秋終矣戰鞍乃魯卿擅兵之始也經之大例受伐者為主而此以四國及之者以一笑之微殘民毒衆幾獲其君而怒猶未怠焚雍於用反門之茨侵車東至海故以四國主之為憤兵之大戒見音現諸行事深切著明矣董子曰頃公齊桓之孫霸主之餘業即位九年未嘗一與㑹同之事有怒魯衛之志伐魯入其北郊伐衛敗之新築大國往聘慢而不敬晉魯俱怒合四國之衆大困之於鞍獲頃公斫丑父大辱身幾亡國為天下笑齊氏曰鞍之戰齊有必勝之氣晉有不敵之勢而齊以驕輕取敗晉以必死致勝也張氏曰兵法爭恨小故不忍忿怒者謂之忿兵今晉為盟主興師討齊非有救亂誅暴之名而起於郤克一怒之憤故春秋不以齊為主見晉魯衛曹之大夫為志乎是戰雖得一朝之勝不足道也陳氏曰凡帥非卿不書雖卿也非元帥亦不書書魯四卿是各自帥也自文季年而無使介至是而無將佐魯三家之勢成矣曹無大夫書公子首定賞鞍之功於是有六卿征伐在大夫不獨魯也以四國之臣戰齊君甚矣愚按齊桓伐衛與衛人戰則先書伐而後書戰此不書四國伐齊者以郤克志在釋已私忿非能聲齊頃凌弱犯寡之罪而討之也然齊自翟泉以來不與晉之會盟者踰四十年而袁婁以後逮於悼公之終厯三十餘載無㑹之不同無役之不與則亦以鞍之敗衄有以挫其氣而摧其强故耳晉氏世霸合諸侯以加兵於齊者三鞍之戰雖能勝齊然恃力而不能服之以義惟平陰之役合十有二國之君以討其暴橫慿陵之惡故春秋書曰圍齊以豫之至于夷儀之㑹雖曰討之以義而徇於利不能成討齊之功故春秋書同盟重立以貶之也啖氏曰左氏言齊侯免求逢丑父三出三入晉軍按時齊師大敗若三入晉必當見獲此近妄也趙氏曰公羊云曹無大夫書公子首憂內也榖梁云以吾四大夫在焉舉其貴也此尤近鄙春秋豈黨內而專輕重於外乎秋七月齊侯頃使國佐如師己酉及國佐盟于袁婁穀作爰婁左傳晉師從齊師入自丘輿擊馬陘齊侯使賔媚人賂以紀甗玉磬與地不可則聽客之所為賔媚人致賂晉人不可曰必以蕭同叔子為質而使齊之封內盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母是以不孝令也先王疆理天下物土之宜而布其利故詩曰我疆我理南東其畝今吾子疆理諸侯而曰盡東其畝唯吾子戎車是利其無乃非先王之命也乎吾子惠徼齊國之福不泯其社稷使繼舊好唯是先君之敝器土地不敢愛子又不許請收合餘燼背城借一敝邑之幸亦云從也况其不幸敢不唯命是聽魯衛諫曰齊疾我矣其死亡者皆親昵也子若不許讎我必甚唯子則又何求子得其國寶我亦得地而紓於難其榮多矣晉人許之對曰羣臣帥賦輿以為魯衛請茍有以藉口而復於寡君敢不唯命是聽晉師及齊國佐盟于袁婁公羊傳曷為不盟于師齊侯使國佐如師郤克曰與我紀侯之甗反魯衛之侵地使耕者東畝且以蕭同姪子為質則吾舍子矣國佐曰與我紀侯之甗請諾反魯衛之侵地請諾使耕者東畝是則土齊也蕭同姪子者齊君之母也齊君之母猶晉君之母也不可揖而去之郤克眣魯衛之使使以其辭而為之請然後許之逮于袁婁而與之盟榖梁傳鞍去國五百里爰婁去國五十里一戰綿地五百里焚雍門之茨侵車東至海君子聞之曰夫甚甚之辭焉張氏曰齊國治臨淄去洛陽東千八百里縣西有袁婁愚按今屬益都路臨淄縣之西齊國佐如師與楚屈居勿反完音桓來一也然陘之役則曰來盟于師盟于召音邵陵鞍之戰則曰及國佐盟于袁婁何也荆楚暴橫去聲慿陵諸夏齊桓公仗義聲罪致討威行江漢之上不待加兵而楚人帖服其書來盟于師者楚人自服而求盟也盟于召陵者桓公退舍禮與之盟也在春秋時斯為善矣若夫袁婁則異於是齊雖侵虐未若荆楚之暴也諸國大夫含憤積怒欲雪一笑之恥至於殺人盈野非有擊强扶弱之心國佐如師將以賂免非服之也高氏曰國佐受成命於君而可否在晉之大夫非服晉而往也直畏晉强賂晉而請盟爾故不曰來盟而曰齊侯使如師師在齊境故書如晉大夫又不以德命使齊人盡子忍反東其畝而以蕭同叔子為質音置夫蕭同叔子齊君之母也則亦悖矣由是國子不可請合如字又音閣餘燼似刃反背音佩城借一欲於城下復借一戰揖而去之郤克使魯衛之使所吏反以其詞為于僞反之請何氏曰郤克恥傷其威故使魯衛大夫以國佐辭為國佐請逮于袁婁而與之盟何氏曰逮及也追及國佐于袁婁也則汲汲欲盟者晉也故反以晉人及之求盟在楚故稱來欲盟在晉故稱及若此類見曲直之繩墨矣是故制敵莫如仗義天下莫大於理而强有力不與音預焉亦可謂深切著明矣劉氏曰郤克一戰勝齊反魯衛之侵地功大矣人皆多郤子之能伸其意而春秋絀之為其先力而後禮也張氏曰晉所以令齊者恃其戰勝强力而以非義令之故國佐得以正義直辭責之而晉人義不勝而辭屈故國佐之至與屈完之來初若不異然齊桓伸中國之大義而屈完情屈而不敢校故曰來盟于師盟于召陵見義在中國而彼自服以求盟也郤克挾主盟之勢以行其私憤一旦戰勝而以不義求多於齊反為國佐以理折之而氣遂餒書曰齊侯使國佐如師言齊非有誠服之心也曰及國佐盟于袁婁言汲汲在晉齊不得已而盟也臨川吳氏曰楚服齊桓之義故使屈完來受盟于師其盟已前定也故書來盟桓公又退舍而與之盟盟于召陵齊有禮矣齊師既敗于鞍使國佐來納幣以求成許不許在晉郤克其盟未前定也故書如師晉之義既不足以服齊之心故國佐徑去四國進師追及國佐近逼齊都而與盟袁婁此晉之無義又無禮也家氏曰召陵之師諸侯皆在兵力甚强而桓公乃能以不戰服楚退師而禮與之盟鞍之戰郤克既敗齊師極其兵力之所至逮於袁婁去國都五十里進師將及其城而强與之盟退而盟盟之以其禮也進而盟盟之以其力也春秋書來盟與及盟一字褒貶深切著明矣愚按齊桓末年公孫敖帥師及諸侯之大夫救徐征伐自大夫出矣而未嘗盟㑹也晉文末年翟泉之盟以諸侯之大夫上盟王子虎禮樂自大夫出矣而非征伐也今此魯以四卿帥師㑹霸國之上卿與衛曹之卿大夫敗齊侯于鞍又盟齊國佐于袁婁而禮樂征伐皆自大夫出矣厥後晉悼以復伯之賢首以諸侯之大夫圍彭城城虎牢盟陳袁僑征伐盟㑹悉付之大夫而蕭魚之後凡役皆以大夫矣翟泉之大夫貶稱人此不勝貶則從同同也劉氏曰公羊云君不行使乎大夫此其行使乎大夫何佚獲也非也夫兩國治戎將在軍君命有所不受其重且專可知矣行使何傷諸侯㑹晉師于棐林可言晉師不可言趙盾此言晉師足矣何以為不行使大夫乎八月壬午宋公鮑卒文公也在位二十二年子固嗣是為共公庚寅衛侯速卒速公作遫穆公也在位十一年子臧嗣是為定公取汶陽田汶音問左傳使齊人歸我汶陽之田公羊傳汶陽田者何鞍之賂也杜氏曰汶陽田汶水北地汶水出泰山萊蕪縣西入濟張氏曰漢志魯國汶鄉縣顔師古注即汶陽田今兖州泗水縣東南有汶陽故城愚按今屬濟寧路蓋非止一邑汶陽之田本魯田也僖元公賜季友汶陽之田成八季文子曰汶陽之田敝邑之舊也孫氏曰汶陽魯地也齊人侵之今復取之不言取之齊明本非齊地取者得非其有之稱不曰復而謂之取何也恃大國兵力一戰勝齊得其故壤而不請於天王以正疆理則取之不以其道與得非其有奚異乎詳見隱四年然則宜奈何考於建邦土地之圖若在封域之中則先王所錫先祖所受經界世守不可亂矣不然侵小得之侵小如滅項取根牟之類春秋固有興滅國繼絶世之義必有處也魯在戰國時地方五百里而孟氏語魚據反愼子曰如有王者作在所損乎在所益乎朱子注魯地之大皆并吞小國而得之有王者作則必在所損矣經於復其故田而書取所損益亦可知矣家氏曰取汶陽田與取濟西田其事同故書法不異蓋濟西本魯田為曹所侵晉人取以歸魯汶陽亦魯田為齊所侵晉人命以歸魯皆魯侵疆也今而得歸春秋不以為歸而以為取為其因霸國之力而得之也霸國復不稟命于王分正疆理而擅其豫奪所以書取若此田非魯之舊疆必繫之於齊不直書取汶陽田矣石氏曰內取外邑皆曰取如取邰取防取訾婁外歸魯地皆曰歸如濟西龜隂及歡闡汶陽田魯地也齊人以歸于我當曰歸今而曰取者蓋因晉之力而取之也歸者其意也取者我也非其志也于後齊復事晉故八年使韓穿來言歸之于齊然此年齊歸我田書曰取八年齊取我田乃曰歸者取之自晉歸之自晉以見魯國之命制於晉而已故雖我田也而不得偃然有之其猶寄爾故齊歸我田書曰取猶若取之於外也齊取我田書曰歸猶若齊之所有也愚按趙氏云凡力得之曰取齊歸汶陽而稱取言藉晉之力以復之而得之之難也榖梁云歸易辭也齊取汶陽而稱歸言奉晉之命以反之而失之之易也冬楚共師鄭襄師侵衛左傳宣公使如楚乞師欲以伐齊莊王卒楚師不出既而用晉師公即位受盟于晉會晉伐齊衛人不行使于楚亦受盟于晉故楚令尹子重為陽橋之役以救齊將起師子重曰君弱羣臣不如先大夫師衆而後可乃悉師王卒盡行楚師侵衛遂侵我師于蜀高氏曰鄭以中國從夷狄而首伐衛喪是授戈與冦而攻其親戚罪不勝誅矣列鄭于下所以深罪鄭也十有一月公㑹楚共公子嬰齊于蜀楚書公子自嬰齊始左傳楚侵及陽橋孟孫請往賂之以執斫執針織紝皆百人公衡為質以請盟楚人許平榖梁傳楚無大夫其曰公子何也嬰齊亢也杜氏曰蜀魯地泰山博縣西北有蜀亭愚按今東昌路博平縣按左氏魯衛受盟于晉從於伐齊故楚為陽橋之役令尹子重曰師衆而後可於是王卒盡行二國稱師著其衆也隱五入郕傳稱師紀其用衆而立義不同有著其暴而稱師者侵衛則書侵我師于蜀致賂納質音致沒而不書非諱也杜氏曰公賂之而退故不書侵書其重者見公羊莊十年則莫重乎其以中國諸侯降班失列下與荆楚之大夫會也家氏曰晉以魯衛大舉伐齊可謂有德轍未及息遽為此行書公㑹楚公子嬰齊著其從楚之罪以望國之君而屈於楚之公子魯之辱也春秋責之深不復為之諱自楚人僣王其公子亦僣而稱王子久矣今書楚公子春秋革之也愚按莊二十八年傳稱王孫游王孫喜文元年傳稱王子職則知嬰齊不書王子者乃夫子之所革矣季孫行父為國上卿當使其君尊榮其民免於侵陵之患而危辱至此特起於忿忮之䜴反肆其𥚹心而不知制之以禮也書仲虺之誥以禮制心書曰必有忍乃其有濟見君陳懲忿窒欲德之修也易損卦大象君子以懲忿窒欲大傳損德之修也不忮不求詩雄雉篇行下孟反之善也朱子曰若能不忮害不貪求則何為不善乎躬自厚而薄責於人遠于萬反怨之方也季孫忿忮弗能懲也而辱逮君父不亦􅉃七感反說文痛也乎故春秋史外傳心之要典也考其行事深切著明於以反求諸已則亦知戒矣臨川吳氏曰楚用子重之謀以救齊為名加兵於魯衛魯納賂請平又約諸國㑹盟公先往會嬰齊不沒嬰齊之氏名者欲見其挾衆威魯而以臣抗君也陳氏曰凡吾君㑹諸侯則有大夫得稱其大夫故洮書莒慶向書衛寧速茍無諸侯則不以大夫敵吾君故莒無大夫則曰莒人齊有大夫則曰齊大夫及髙傒盟及處父盟始以大夫敵吾君矣皆不書公以是為齊晉之譏則諱公焉耳此其曰公會楚公子嬰齊是公自與嬰齊夷也于楚之㑹盂公後諸侯至於楚之圍宋公亦後諸侯至魯猶重從楚也公與嬰齊夷楚何譏焉不足為公諱焉爾是故自屈完以來楚大夫無氏族也而書公子自嬰齊始愚按公與外臣特相㑹二百四十二年唯此一書故備録楚大夫之氏名以見貶焉齊之盟沒公不書而楚書之隱其從夷之失也蜀之會書公不諱而楚大夫書氏名著其從夷之辱也會不書公子嬰齊則疑於楚子貶稱人而不見望國之君下夷於楚大夫盟不書楚人將恐天下後世以荆蠻之臣可以主中國之會盟而無惡而中國諸侯之卿大夫又可以雲合景從以服屬於荆蠻之臣而無貶也齊之盟春秋猶不忍書也蜀之㑹春秋不勝諱則詳紀之而具文見意耳丙申公及楚共人秦桓人宋共人陳成人衛定人鄭襄人齊頃人曹宣人邾定人薛人鄫人盟于蜀左傳公及楚公子嬰齊蔡侯許男秦右大夫說宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫盟于蜀卿不書匱盟也於是乎畏晉而竊與楚盟故曰匱盟蔡侯許男不書乘楚車也謂之失位公羊傳此公子嬰齊也其稱人何得一貶焉爾程子傳楚為强盛陵轢中國諸侯茍能保固疆圉要結鄰好豈有不能自存之理乃懼而服從與之盟約故皆稱人以見其衰弱責諸侯則魯可知矣杜氏曰齊在鄭下非卿盟而魯與音預下與盟同必先書公尊內也次書主盟者衆所推也此書公及楚人則知主盟者楚也李氏集義前此楚與中國盟皆序諸國之下此序諸國之上欲見楚之主盟也愚按書及則內為志而非楚主盟也然魯之弱久矣豈能主諸國之盟哉前此僖公二十一年盟薄二十七年盟宋皆書公㑹諸侯不以楚主盟此書公及亦不以楚主盟之辭也序楚於十國之上而書及正其名而不沒其實也公子嬰齊秦右說音悅宋華户化反元陳公孫寧衛孫良夫鄭去起呂反疾皆國卿也何以稱人楚僣稱王春秋黜之不列中國晉雖不競猶主夏盟諸侯茍能任仁賢修政事保固疆圉要結鄰好同心擇義堅事晉室荆楚雖大何畏焉今乃西向服從而與之盟不亦恥乎召陵城濮之事故府可覆按也乃是之從亦為不善擇矣經於魯君盟㑹不信則諱公而不書莊十六同盟幽不臣則諱公而不書僖二十九盟翟泉棄中國從域外則諱公而不書盟齊蜀之盟棄晉從楚書公不諱何也事同而既貶則從同同公羊莊四不可勝譏故將一譏而已其餘從同同正始之義也從荆楚而與盟既諱公於僖十九年齊之盟矣是以於此不諱而人諸國之大夫以見音現意也愚按貶諸國之大夫而稱人亦所以人公也春秋盟㑹一書人者凡四盟齊盟蜀貶從夷也盟翟泉譏慢王也㑹澶淵刺不討賊也其所以貴內賤外尊君父討亂賊之意切矣臨川吳氏曰嬰齊於此盟降稱人而前㑹稱氏名者欲見楚人即公子嬰齊也蔡許之君不書者以其為楚之車左車右降在臣列同於楚臣劉氏曰盟于蜀是嬰齊也其以力為功薄於義而陋於禮與郤克一耳郤克不得稱諸侯之大夫故嬰齊亦不得以其名通也此文異而意等也項氏曰蜀之盟與棐林之師皆事之難言也棐林之師難以趙盾將諸侯也故先書趙盾之出師而後書諸侯之㑹晉師蜀之盟難以嬰齊主盟中國也故先書嬰齊之㑹而後書諸侯之微者盟蘇氏曰楚自城濮之敗不競於晉莊王雖入陳圍鄭及宋而未嘗合諸侯及蜀之盟諸侯從之者十一國晉不敢爭然其盟十一國也諸侯猶畏晉而竊與之盟其後四十三年晉趙武楚屈建合諸侯于宋然後晉楚之從得交相見又八年靈王求諸侯于晉晉人許之然後諸侯悉從楚實蜀之盟啓之也劉氏曰榖梁云㑹與盟同月則地㑹不地盟不同月則地㑹地盟此其地㑹地盟何以公之得其所申其事也非也㑹時一國盟時十一國此乃兩㑹也各自書地乃其理矣何申之有癸定王十酉九年三年晉景十二齊頃十一衛定公臧元年蔡景四鄭襄十七曹宣七陳成十一杞桓四十九宋共公固元年泰桓十七楚共三春王正月公㑹晉侯景宋公共衛侯定曹伯宣伐鄭襄按左氏諸侯伐鄭討邲音弼之役也遂東侵鄭公子偃帥師禦之覆伏兵也諸鄤芒袁反敗必邁反下同諸丘輿杜氏曰鄤丘輿皆鄭地晉偏軍為鄭所敗夫討邲之役則復怨𠞰子小反民非觀釁也宣十二用師觀釁而動遂東侵則潛師掠境非以律也易師出以律覆而敗諸則專用詐謀非正勝也李衛公問對兵法先正而後竒先仁義而後權譎度待洛反彼參此皆無善也略而不紀勝負微也晉侯稱爵而以伐書何也初為是役必以鄭之從楚也附南變擾中國據從楚侵衛則盟主有詞于伐耳高氏曰去冬之役鄭為楚導而宋魯衛曹雖盟于蜀猶不敢背晉故罷盟而遂㑹晉伐鄭焉鄭罪當討故春秋正諸國之爵以示義鄭敗晉游兵於丘輿使皇戌如楚獻捷終鄭襄公之身不復從晉矣家氏曰伐鄭所以弱楚之黨所以尊中國魯宋衛去强盛之楚而從衰弱之晉以伐有罪之國是春秋之所嘉也前之盟十有一國大夫一以人書抑狂楚也此四國僅從而書爵序晉為首存晉霸也見春秋權衡衮斧之嚴其輕重有不容少假者矣宋衛未葬曷為稱爵背音佩殯越境以吉禮從金革之事也杜氏曰宋衛未葬而稱爵以接鄰國非禮也范氏曰自同於正君故書公侯以譏之家氏曰春秋與宋衛之㑹晉伐鄭不與其純吉從戎也愚按左傳云鄭皇戍如楚獻捷則曰覆曰敗皆指鄭而言非諸侯之敗鄭也經書伐而不書敗所以尊中國耳辛亥葬衛穆公穆公作繆高氏曰此見衛侯背殯出師不臨先君之喪王氏曰六月乃葬非禮也二月公至自伐鄭臨川吳氏曰雖未逾時伐鄭無功亦危之而致也甲子新宮災三日哭公羊傳新宮者宣公之宮也何以書記灾也程子曰不曰宣宮主未遷也廟災而哭禮也得禮為常事則何以書緱音鈎氏劉絢呼縣反絢字質夫程子門人著春秋傳十二卷曰新宮者宣宮也不曰宣宮者神主未遷也知然者丹楹刻桷皆稱桓宮此不舉諡故知其未遷也宮成而主未入遇灾而哭何禮哉宣公薨至是二十有八月據宣公十八年十月薨緩於遷主可知矣言災則不恭之致亦自見音現矣此說據經為合或曰禮稱有焚其先人之室則三日哭檀弓云云故曰新宮火亦三日哭注人燒其宗廟哭者哀精神之有虧傷愚按文定傳意與鄭氏異新宮將以安神主也雖未遷而哭不亦可乎曰先人之室蓋嘗寢於斯食於斯㑹族屬於斯其居處笑語之所在皆可想也祭義思其居處思其笑語事死如事生故有焚其室則哭之禮也神主未遷而哭於人情何居音姬高氏曰君子於是乎知有天道也宣公弒君篡立生不能誅死方立廟遽遇火災春秋志此示有天道故謹而日之愚按公羊以謂不言宣宮不忍言也榖梁謂迫近不敢稱諡然則莊公之世何以稱桓宮乎乙亥葬宋文公按左氏文公卒始厚葬用蜃炭益車馬始用殉重器備槨有四阿棺有翰檜君子謂華元樂舉於是乎不臣考於經未有以驗其厚也數其葬之月則信然矣天子七月諸侯五月大夫三月士踰月以降殺所賣反遲速為禮之節不可亂也文公之卒國家安靖外無危難乃旦反曷為越禮踰時逮乎七月而後克襄事哉高氏曰七月而葬天子之禮也以葬月考之知其僣禮故知華元樂舉之棄君於惡而益其侈左傳死又益其侈是棄君於惡也無疑矣夫禮之厚薄稱尺證反人情而為之者也坊記禮者因人之情而為之節文荀子禮稱情而立文宋公在殯而離次出境從金革之事正月㑹伐鄭哀戚之情忘矣顧欲厚葬其君親此非有所不忍於死者特欲誇耀淫侈無知之人耳世衰道微禮法既壞無以制其侈心至於秦漢之間窮竭民力以事丘隴其禍有不可勝音升言者史秦始皇紀葬驪山以水銀為百川江河大海機相灌輸上具天文下具地理竒器珍怪徙藏滿之後宮無子者皆令從死令匠作機弩矢有穿近者輒射之工匠盡閉墓中春秋據事直書而其失自見音現此類是也豈不為永戒哉夏公如晉景左傳拜汶陽之田張氏曰汶陽之田特書曰取足以見疆埸之令不出於王矣今為取田而往拜賜于霸國晉偃然受之而八年復使韓穿來言汶陽之田歸之于齊足見私情之納侮于晉也愚按僖公取濟西田而使公子遂如晉拜賜已非正矣况以成公取汶陽而躬朝于晉乎濟西汶陽魯之故田也以為霸國之私惠而聘之朝之見魯之不振也鄭襄公子去疾帥師伐許靈去起呂反左傳許恃楚而不事鄭鄭子良伐許張氏曰晉方怒鄭之不服其為國憂未有底止也乃怒許之不事已而使大夫動大衆以伐之見其興兵之不度德量力也高氏曰疲命於晉楚而以伐之君子以是惡鄭也公至自晉宣公薨至是三年之喪畢矣宜入朝京師見音現天子受王命曲禮諸侯既葬見天子曰類見然後歸而即政可也嗣守社稷之重而不朝于周以拜汶陽田之故而往朝于晉其行事亦悖矣此春秋所為于僞反作也公行多不致其書公至自晉何其至也必有以因也意也也家氏曰諸侯既除喪而入見于王受黻冕之賜然後成其為君自東遷此禮廢然亦未有除喪而入見大國以事王之禮而事大國者也宣公挾强齊之援弒君篡國凡可以諂齊而求悅者無不為矣未除喪而㑹既除喪而朝今成公借援於晉率循宣公之舊其無王之罪大矣書如書至所以譏也愚按成公一經此年如晉明年再如晉十年又如晉十八年又如晉過於事天子之禮蓋當時諸侯知有霸者而不知有王不以為異耳春秋莫不書至比事以觀義自著矣秋叔孫僑如帥師圍棘公羊傳棘者何汶陽之不服邑也其言圍之何不聽也杜氏曰棘汶陽田之邑在濟北蛇丘縣張氏曰今兖州龔丘縣愚按今屬濟南路章丘縣按左氏取汶陽之田棘不服故圍之趙氏曰凡內自圍者皆叛邑復故地而民不聽至於命上將去聲用大師環其邑而攻之何也魯於是時初稅畝作丘甲稅役日益重矣棘雖復歸故國所以不願為之民也歟成公不知薄稅斂力驗反輕力役修德政以來之而肆其兵力雖得之亦必失之矣何氏曰不先以文德來之而便以兵圍之欲與圍外邑同罪劉氏曰不察已之所以失而疾人之不我服强國之行若五伯之事則有之非王道也大雩成公之世大雩者二義見桓五年晉景郤克衛定孫良夫伐牆咎如牆在良反公作將榖作牆咎音羔左傳晉郤克衛孫良夫伐牆咎如討赤狄之餘焉牆咎如潰上失民也杜氏曰牆咎如赤狄别種通旨經不書牆咎如潰者晉常滅赤狄潞氏甲氏及留吁矣其餘黨散入牆咎如又欲盡殄滅之非仁人之心也段紀明請滅羌種羌雖滅漢亦亡後世豈嘗絶羌患哉牆咎如潰削而不書聖人之情見矣惟不使之侵擾華夏斯止矣家氏曰克與良夫得志於鞍不知自戢更為此舉春秋書之誅善戰也楚方躪藉中原晉人不務修明霸業圖其遠者大者既滅潞氏又殄留吁以為未快復興此役此逐利之師春秋惡之屢書皆所以貶杜氏曰傳有牆咎如潰四字以為經闕非也春秋譏晉人用師之不戢豈以狄失民而譏乎冬十有一月晉侯景使荀庚來聘晉始聘衛侯定使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟聘而遂盟之於是始左傳晉侯使荀庚來聘且尋盟衛侯使孫良夫來聘且尋盟公問諸臧宣叔曰中行伯之於晉也其位在三孫子之於衛也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也衛在晉不得為次國晉為盟主其將先之丙午盟晉丁未盟衛公羊傳聘而言盟者尋舊盟也榖梁傳其日公也來聘而求盟不言及者以國與之也不言其人亦以國與之也不言求兩欲之也劉敞曰諸侯有聘無盟聘禮也盟非禮也庚與良夫不務引其君當道而生事專命公羊遂生事也注專事之辭為非禮不信以干先王之典故不繫於國以見音現下同其遂事之辱非人臣之操去聲本意林此說然也其言及者公與之盟而不言公見二卿之抗也盟者春秋所惡烏故反下如字於惡之中又有惡焉者此類是矣孫氏曰此公及庚良夫盟也不書公者二子抗也二子來聘不能以信相親反要公以盟非抗而何故言聘言盟以惡之愚按因聘而遂盟者有五此年庚良夫十一年晉郤犨襄七年衛孫林父十五年宋向戌是也夫書曰使來聘則是其君之所使者來聘而已以人臣而専制以要盟所以皆書日以貶之也鄭襄伐許甲定王二戌十年四年晉景十三齊頃十二衛定二蔡景五鄭襄十八卒曹宣八陳成十二杞桓五十宋共二秦桓十八楚共四春宋公共使華元來聘華戶化反左傳通嗣君也杜氏曰共公初即位故王氏曰宋入春秋未嘗聘魯文十一年公子遂雖往而宋不報也華元之來其為共公謀昏張本乎臨川吳氏曰晉衛三國相繼來聘以三年春同會伐鄭交結和好也三月壬申鄭伯堅卒堅公釋文作臤襄公也在位十八年子費嗣是為悼公把伯桓來朝左傳歸叔姬故也杜氏曰將出叔姬先修朝禮言其故夏四月甲寅臧孫許卒文仲之子宣叔也子紇嗣為大夫是為武仲公如晉景左傳晉侯見公不敬季文子曰晉侯必不免張氏曰晉景公勝齊而驕也高氏曰公連歲如晉者以嘗即楚故也愚按成公比年朝晉而取敖忽之辱豈非禮愈繁而身愈卑徒自屈而已耳葬鄭襄公喪未五月葬之速也太不懷也秋公至自晉左傳公至自晉欲求成于楚而叛晉季文子曰不可晉雖無道國大臣睦而邇於我諸侯聽焉未可以二史佚之志有之曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止家氏曰甚哉魯成中無所主逐變而屢遷也始與晉人連兵伐齊以有鞍之勝謂當與晉為睦曽未幾日率先諸侯受盟于楚猶幸晉人之無討也去年如晉今年又如晉正所以救前日匱盟之過一不為所禮又將叛而即夷春秋於魯成之從楚適晉備書以貶之也冬城鄆杜氏曰公欲叛晉故城而為備任公輔曰魯西邑東郡廪丘東有鄆城即西鄆張氏曰今濟南府鄆城縣家氏曰鄆有三莒之别邑亦曰鄆九年楚人入鄆是也魯自有二鄆文十二年城諸及鄆此東鄆莒魯所爭者也成十六年公待于鄆此西鄆今此所城也春秋譏魯人不務安靜而輕於用民力鄆雖城何益哉鄭伯悼伐許靈左傳鄭公孫申帥師疆許田許人敗諸展陂鄭伯伐許取鉏任泠敦之田程子傳稱鄭伯見其不復為喪以吉禮從戎前此鄭襄公伐許既狄之矣今悼公又伐許乃復扶又反稱爵何也喪未踰年以吉禮從金革之事則忘親矣稱爵非美詞所以著其惡也何氏曰未踰年君稱伯者樂成君位親自伐許故如其意以著其惡家氏曰父所為義已繼之為孝父挾夷楚之援陵暴小國歲再用師其子繼世而不能改是之謂濟惡庸得為孝乎不書子而書爵絶之於名教也乙定王二十亥一年崩五年晉景十四齊頃十三衛定三蔡景六鄭悼公費元年曹宣九陳成十三杞桓五十一宋共三秦桓十九楚共五春王正月杞叔姬來歸榖梁傳婦人之義嫁曰歸反曰來歸杜氏曰出也前書杞伯來朝左氏以為歸叔姬也叔姬始嫁不見於經與郯伯姬同婚姻得禮常事不書此書杞叔姬來歸則出也家氏曰此與他悖義之出者不同必叔姬自不安於杞或以疾而求歸非杞之絶之也故春秋書其逆喪歸葬無貶辭臨川吳氏曰僖三十一年杞伯姬為其子求婦而僖公以次女叔姬與之歸為杞桓公夫人至今四十四年夫婦年皆六十之上而姬始被出而歸疑是叔姬無子把桓别有妾子為太子叔姬心不自安而願歸魯故叔姬既卒而杞桓復來逆其喪以歸也春秋於內女其歸其出録之詳者男女居室人之大倫也男子生而願為于僞反下為之同之有室女子生而願為之有家父母之心人皆有之本孟子而不能為之擇家與室則夫婦之道苦淫僻之罪多矣本經解王法所重人倫之本録之詳也為世戒也愚按郯伯姬把叔姬皆出而來歸然叔姬書卒書杞伯逆喪以歸而郯伯姬來歸之後不復見於經則其善惡優劣不可以槩觀矣仲孫蔑如宋共左傳報華元也愚按蔑與華元交相聘問其情厚矣而明年蔑僑如逼於晉令遽興侵宋之師朝玉帛而暮干戈謹於邦交者固如是乎夏叔孫僑如㑹晉景荀首于榖首公作秀左傳晉荀首如齊逆女故宣伯餫諸榖杜氏曰榖齊地高氏曰荀首逆女而僑如往饋之此之謂非禮之禮故以大夫㑹大夫書之愚按自文十一年彭生㑹郤缺宣十五年蔑會高固自是大夫會大夫率以為常矣梁山崩左傳梁山崩晉侯以傳召伯宗伯宗辟重曰辟傳重人曰待我不如捷之速也問其所曰絳人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川故山崩川竭君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉其如此而已雖伯宗若之何伯宗請見之不可遂以告而從之公羊傳梁山者何河上之山也何以書記異也何異爾大也梁山崩壅河三日不流外異不書此何以書為天下記異也榖梁傳高者有崩道也杜氏曰梁山在馮翊夏陽縣北張氏曰同州韓城縣有禹貢梁山愚按同州今屬奉元路梁山韓國也詩韓奕曰奕奕梁山韓侯受命而謂之韓奕者言奕然高大為韓國之鎮也朱子傳奕奕大也梁山韓之鎮也後為晉所滅而大夫韓氏以為邑焉春秋之初晉滅韓曲沃莊伯之弟韓萬以為采邑書而不繫國者為于僞反天下記異是以不言晉也據不言晉梁山崩高氏曰先王之制名山大川不以封梁山雖屬於韓而非諸侯正受封之地故春秋書梁山崩而不繫之國者為天下記異也是以不書晉夫國主山川豈特晉當之哉左氏載絳人之語於禮文備矣而未記其實也夫降服損盛服乘縵車無文徹樂悉八音出次舍於郊祝幣陳玉帛史辭自罪責六者禮之文也古之遭變異而外為此文者必有恐懼修省之心主於內若成湯以六事檢身荀子大略篇湯旱而禱曰政不節與民失職與宮室崇與婦謁盛與苞苴行與讒夫昌與高宗克正厥事書高宗肜日祖已曰惟先格王正厥事注先格王之非心後正其所失之事宣王側身修行下孟反欲銷去起呂反之是也詩序雲漢美宣王也宣王遇災而懼側身修行欲銷去之天下喜於王化復行徒舉其文而無實以先之何足以弭灾變乎夫國主山川至於崩竭當時諸侯未聞有戒心而修德也故自是而後六十年間弒君十有四亡國三十二本何氏注愚按自此至昭十六年凡六十年經書弒君唯晉州蒲齊光衛剽吳餘祭蔡固莒密州楚䖍凡七滅國惟舒庸鄫萊逼陽舒鳩賴陳蔡州來凡九耳故徐彥疏云注誤今考文十一年敗狄于鹹何氏謂宣成以往弒君二十八亡國四十證諸經亦不合抑并春秋所不書者言之如榖梁三十四戰者歟其應於證反下同亦􅉃七感反矣春秋不明著其事應而事應具存其可忽諸范氏曰山者陽位君之象也象君權壞家氏曰榖梁具載伯尊所以告其君者以為伯尊掠路人之美以為已能孔子聞之曰伯尊其無績乎攘善也其實伯尊以道路鄙淺之言復之於君失懼灾之意夫子必無是言也春秋於沙鹿梁山二大異特筆而書之以見天下之治亂中國之合離自是而始從其文應變何足言哉是固天下之異而皆見於晉者周自東遷賴伯者以存齊既衰獨有晉在而比歲以來君庸臣貪坐墮霸業晉之削中國之憂也意舊史必書晉梁山崩春秋削之實為天下記異也劉氏曰榖梁云不日何也高者有崩道也何以書晉侯召伯尊云云傳意似云崩不當書以問伯尊故獨書也豈春秋意耶秋大水張氏曰山崩大水陰盛之徴冬十有一月己酉天王崩定王也在位二十一年子夷嗣位是為簡王高氏曰不書葬罪諸侯之不㑹也十有二月己丑公㑹晉侯景齊侯頃宋公共衛侯定鄭伯悼曹伯宣邾子定杞伯桓同盟于蟲牢程子傳天王崩而㑹盟不廢書同見其皆不臣杜氏曰蟲牢鄭地陳留封丘縣北有桐牢愚按封丘縣今屬汴梁路按左氏許靈公訴鄭伯于楚鄭伯如楚訟不勝歸而請成于晉鄭伯及晉趙同盟于垂棘盟于蟲牢鄭服也莊十六杜氏曰言同盟服異也何氏曰約備强楚愚按即榖梁所謂同外楚也鄭服則何以書同盟天王崩赴告已及在諸侯之䇿矣以所聞先後而奔喪禮也而九國諸侯會盟不廢故特書同盟以見音現其皆不臣春秋惡烏路反下如字盟誓於惡之中又有惡焉者此類是也孫氏曰天王崩晉合諸侯同蟲牢之盟不顧甚矣薛氏曰王崩而為盟㑹無王之甚也愚按是盟乃何休所謂同心為惡惡必成者也蓋諸侯之同盟實有同外楚之心而不知悖於尊王之義天子之喪人道始終之大變諸侯相見揖讓入門而聞訃則不得終禮况已聞而猶相與會盟不亦無人心乎春秋之諸侯不知有王故襄王方崩則晉魯之卿㑹盟王都之側而不奔喪簡王方崩而邾與晉衛修朝聘於魯而不修弔事蓋將以是為常而不知愧甚者靈王之訃音已逹於天下而諸侯旅朝於荆楚且俟致禭執紼越歲踰時而後返而曾不遣一介行李問國恤於京師也吁可嘆哉丙簡王子元年六年晉景十五齊頃十四衛定四蔡景七鄭悼二卒曹宣十陳成十四杞桓五十二宋共四秦桓二十楚共六吳子夀夢乘元年春王正月公至自㑹愚按二年會蜀盟蜀不書至者以望國之君屈於荆楚之大夫不可以告廟也此特書至者謂成公茍能自㑹如京師斬衰哭臨則亦庶幾亡於禮者之禮耳今也㑹同之後奄然歸國故書公至自會以著其無王不臣之罪也二月辛巳立武宮公羊傳武宮武公之宮也立者不宜立也立武宮非禮也榖梁傳立者不宜立也武宮武公之宮立武宮非禮也喪事即遠有進而無退檀弓飯於牖下云云葬於墓所以即逺也故喪事有進而無退宮廟即遠有毁而無立何氏曰過高祖不得復立廟大戴禮諸侯遷廟注親過高祖則毁廟而遞遷之故二昭二穆與太祖而五者諸侯之廟制也見王制朱子曰太祖始封之君昭之北廟二世之君居之穆之北廟三世之君居之昭之南廟四世之君居之穆之南廟五世之君居之太祖之廟百世不遷餘四廟每一易世而一遷曰考廟曰王考廟曰皇考廟皆有祭焉曰顯考廟曰祖考廟享嘗乃止去祖為壇去壇為墠音善壇墠有禱則祭無禱乃止去墠為鬼諸侯之祭法也見祭法疏考廟者父廟考成也謂父有成德之美也王考廟者祖廟王君也言祖有君成之德也祖尊於父故加君名也皇考廟者曾祖皇大也君也曾祖轉尊又加大君之稱也月祭之者月月祭之也顯考廟者高祖也顯明也高祖居四廟最上故以高祖言之祖考廟者祖始也是謂始祖廟也享嘗乃止享嘗四時祭祀不得月祭但四時祭而已封土曰壇除土曰墠去祖為壇者謂高祖之父也其廟既毁藏主於祖考之廟中不得四時祭之若有祈禱則出就壇受祭也去壇為墠者謂高祖之祖也其主亦藏祖考廟中若有祈禱則出就墠受祭不得在壇也高祖之父遷寄太祖而不得於太祖廟受時祭故曰去祖高祖之祖經在壇而今不得祭故云去壇去墠為鬼若又有從壇遷來墠者則此前在墠者為鬼雖有祈禱亦不得及武公至是歷世十一武公名敖乃伯禽之𤣥孫隱公之高祖傳懿孝惠隱桓莊閔僖文宣成凡十有一君其毁已久而輒立焉范氏曰武公之宫毁已久矣故傳曰不宜立非即遠有終之意孝經示民有終故特書曰立立者不宜立也常山劉氏曰王制曰云云祭法曰云云然則諸侯宗廟古有彛制過則毁之不可復立也武宮之毁已久而輒立之非禮明矣劉氏曰魯諸侯也僣天子之禮雖欲尊其祖鬼神不享也而學者習於魯之故更大而稱之曰魯公之廟文世室也武公之廟武世室也人之述固久矣夫其以僣為典也此春秋所由作也陳氏禮書曰武公之於魯徇宣王立庶之非以階魯國攻殺之禍而豐功懿德不著於世自武至桓其廟已在可遷之列成公立武宮昭公有事于武宮積世不毁故記禮得以大之欲以比周之文武也張氏曰觀春秋之書法與祭法之論廟制則武宮之立與煬宮同於失禮違制斷為可知明堂位之言其為俗儒之論明矣甚矣其亂聖制而誤後學也愚按立武宮僣王制故書日以謹之論者因明堂位遂以武宮為世室今考春秋所書太廟則周公之廟也所書世室則魯公之廟也羣公之廟則皆繫諡若武宮煬宮桓宮僖宮是也苟謂之世室則世世不毁矣奚待於成公而始立乎昭十五年有事于武宮不稱世室則其以武宮為世室者妄也况煬宮乃武公之六世祖至昭公已二十世而桓宮則哀公之十世祖僖宮則哀公之七世祖皆當言世室也煬宮在武宮之上武宮稱世室煬宮獨不稱世室乎是知明堂位乃後世俗儒因魯僣禮而為言春秋之時非有世室之名也然考成之十八年晉悼公朝于武宮昭之十七年當晉頃公之世而中行穆子獻俘于文宮晉武公至悼公文公至頃公皆已十世而其宮猶存則當時諸侯之廟親盡不毁者不特魯矣啖氏曰左氏云季武子以鞍之功立武宮非禮也聽於人以救其難不可以立武立武由已非由人也傳意以為武軍之宮如楚子所立者非也若以鞍戰之故不應經五年方立之劉氏曰左傳誤以武宮為武軍也取鄟鄟音專榖梁傳鄟國也鄟微國也杜氏曰附庸國孫氏曰根牟鄟邿皆微國也書取者滅之也滅而書取為于僞反君隱也僖十七年傳凡大惡必隱避其辭而為之諱項亦國也其書滅者以僖公在㑹季孫所為僖十七故直書其事而不隱此春秋尊君抑臣以辨上下謹於微之意也人倫之際差之毫釐繆眉救反以千里易大傳文故仲尼特立此義以示後世臣子使以道事君而無朋附權臣之惡於傳直戀反有之犯上干主其罪可救乖忤五故反貴臣禍在不測晉書王濬傳濬與王渾爭功表云云故臣子多不憚人主而畏權臣如漢谷永之徒直攻成帝不以為嫌至於王氏則周旋相比毗志反結為死黨而人主不之覺前谷永傳日食地震永對內寵太盛謁行於內勢行於外灾異者皇天所以譴君過失時成帝委政元舅王鳯議者多歸咎焉永知鳯方柄用陰欲自託鳯遂厚之鳯卒音輔政永復說音任周召之職又與談書勸辭城門兵委曲媚恱前後所上四十餘事專攻上身與後宮而黨於王氏此世世之公患也歸父家遣緣季氏也宣十八歸父欲去三桓及公薨季文子逐東門氏朝如字吳出奔因無極也昭十五楚費無極害朝吳之在蔡也譛之蔡人逐朝吳王章殺身忤王鳯也前王章傳成帝時王鳯輔政王章以選為京兆尹雖為鳯所舉非鳯專權日食章奏鳯不可任為鳯所陷下獄死鄴侯寄館避元載也通鑑唐代宗天厯五年元載專恣以李泌有寵於上忌之上畏戴㑹觀察魏少遊求參佐上謂泌曰載不容卿朕今匿卿於少遊俟除載當報卿來惟殺生在下而人主失其柄也是以黨與衆多知有權臣而不知有君父矣使春秋之義得行尊君抑臣以辨上下每謹於微豈有此患乎愚按公羊於根牟鄟邿皆曰邾邑然春秋未有取他國之地而不係國者苟以諱亟而不繫邾則僖公取須句訾婁可謂亟矣何以擊之邾耶劉氏辨之詳矣衛孫良夫帥師侵宋共左傳盟于蟲牢之歲諸侯謀復㑹宋公使向為人辭以子靈之難三月晉伯宗夏陽說衛孫良夫寧相鄭人伊雒之戎陸渾蠻氏侵宋以其辭㑹也家氏曰經惟書衛不與晉人率蠻夷而攻中國也去年冬宋實預蟲牢之盟今一辭㑹而遽加之以兵以為永快復命魯人繼之前日楚莊圍宋歷三時之久國幾斃而晉不能救但曰鞭長不及馬腹今宋人辭㑹而伐之至再晉景惛愚諸大夫狠肆事多類此春秋聮書魯衛二侵責晉深矣傳見蔑僑如侵宋夏六月邾子定來朝蓋成公即位而始朝也公孫嬰齊如晉景左傳子叔聲伯如晉命伐宋杜氏曰嬰齊叔肸子愚按二年三年公兩朝晉此年嬰齊行父又兩聘晉魯仇齊而倚晉為援故君臣亟行迭往事霸之勤而不知慢王之已甚也壬申鄭伯費卒費音祕悼公也在位二年弟㫻立是為成公秋仲孫蔑叔孫僑如帥師侵宋共左傳孟獻子叔孫宣伯侵宋晉命也魯遣二卿為主將去聲永嘉呂氏曰二卿並書與行父許僑如嬰齊四卿並書之意同當是時大夫專擅各自帥師而公室微矣侵宋之事小而專權之患大動大衆焉有事於宋而以侵書者潛師侵掠無名之意蓋陋之也於衛孫良夫亦然上三年嘗㑹宋衛同伐鄭矣次年宋使華元來聘通嗣君矣又次年魯使仲孫蔑報華元矣是年冬鄭伯背音佩楚求成于晉而魯衛與宋又同盟于蟲牢矣今而有事於宋上卿授鉞李衛公問對古者出師命將授之以鉞大衆就行而師出無名可乎故特書侵以罪之也左氏載此師晉命也後二年宋來納幣請伯姬焉則此師為于僞反晉而舉非魯志明矣兵戎有國之重事邦交人道之大倫聽命於人不得已焉將能立乎春秋所以罪之也高氏曰使魯伐宋者雖晉之命而魯不以大義諭之遽為興師則罪專在魯矣故書曰侵責與衛良夫同楚共公子嬰齊帥師伐鄭成楚始書大夫將左傳楚子重伐鄭鄭從晉故也襄陵許氏曰至是書楚卿帥師者霸統幾亡也冬季孫行父如晉景左傳晉人去故絳遷于新田季文子如晉賀遷也愚按經不書晉遷者凡書遷皆小國逼於强暴不得已而遷也晉人擇地利而徙都也非不得已故不書遷耳晉景欒書帥師救鄭成救公作侵左傳晉欒書救鄭與楚師遇於繞角楚師還晉師遂侵蔡楚公子申公子成以申息之師救蔡禦諸桑隧趙同趙括欲戰武子將許之知莊子范文子韓獻子諫曰不可吾來救鄭楚師去我吾遂至於此是遷戮也戮而不已又怒楚師戰必不克雖克不令成師以出而敗楚之二縣何榮之有焉乃遂還於是軍帥之欲戰者衆或曰聖人與衆同欲子之佐十一人其不欲戰者三人而已武子曰善鈞從衆夫善衆之主也三卿為主可謂衆矣荆楚僣號稱王聖人之所深惡而不赦者大一統以存周使民本誤作明著於君臣之義也文王世子衆著於君臣之義愚按外傳云諸侯無二君而周無二王故春秋貶楚為深所以使天下知一王之所以為尊也鄭能背音佩楚即晉是改過遷善出幽谷而遷喬木也嬰齊為于僞反是帥師又因其喪而伐之不義甚矣經所以深惡烏故反之也書卿帥師伐鄭於文無貶辭何以知其深惡楚也下書欒武子帥師救鄭則知之矣凡書救者未有不善之也而伐者之罪著矣按左氏晉楚遇于桑隧音遂軍帥所類反之欲戰者八人武子遂還音還下同則無功也亦何善之有曰此春秋之所以善欒書也兩軍相加兵刃既接折馘占獲反執俘計功受賞此非仁人之心王者之事故舞干而苗格者舜也書大禹謨舞干羽於兩階七旬有苗格因壘而崇降户江反者文也僖十九文王聞崇德亂而伐之軍三旬而不降退修教而復伐之因壘而降次于陘而屈居勿反完服者齊桓也僖四㑹于蕭魚而鄭不叛者晉悼也襄十一武子之能不遷戮而知還也亦庶幾哉愚按公羊作欒書侵鄭今考明年楚復伐鄭而中國又救鄭則非侵鄭明矣然此書欒書帥師救鄭不二年又書欒書帥師伐鄭書救以著其恤與國之善書伐以著其虐與國之惡使晉能修其德政以懷鄭使之不叛助之守禦以保鄭而使之不至於叛則為盡善矣丁簡王丑二年七年晉景十六齊頃十五衛定五蔡景八鄭成公㫻元年曹宣十一陳成十五把桓五十三宋共五秦桓二十一楚共七吳壽夢二春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛鼷音奚榖梁傳免牲者為之緇衣纁裳有司𤣥端奉送至于南郊免牛亦然免牲不曰不郊免牛亦然杜氏曰免放也榖梁子曰郊牛日展觓音球角而知傷展道盡矣其所以備災之道不盡也范氏曰有司展察牛而即知傷是展察之道盡不能防災禦患致使牛傷故不書日以顯有司之過觓球球然角貌改卜牛鼷鼠又食其角則亡與無同乎人矣非人之所能也所以免有司之過也范氏曰至此復食乃知國無賢君天災之爾非有司之過也何氏曰鼷鼠鼠中之微者祭天不愼鼷鼠食郊牛角書又食者重録魯不覺寤重有災也說文鼷小鼠也孫炎曰有螫毒如鼠狼新安羅氏曰牛有力之畜何至為鼷所食蓋將祭之犧皆繫於牢設楅衡以制其角故鼷得以制之有司免過即變異也宣三范氏曰非備灾之道不至此實天變之異其應於證反云何許翰曰小害大下賊上食而又食三桓子孫相繼之象也宣公有虞三桓之志至成始弗戒矣理或然也劉向曰鼠小蟲性盜竊鼷又其小者也牛大畜祭天尊物也角兵象在上君威也小小鼷鼠食至尊之牛角象季氏乃盜竊之人將執國命以傷君威而害周公之祀也改卜又食天重語之也家氏曰春秋於魯郊或譏失禮或以紀異宣三年成七年定十五年哀元年四書牛傷皆記異也吳夀夢伐郯吳始見經郯音談左傳吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫杜氏曰吳國在吳郡張氏曰吳郡今平江府稱國以伐外之也外域君臣同辭止録其號吳稱國而不繫君臣未同中夏也孫氏曰惡其僣號外之也吳本太伯之後以族屬言則周之伯父也哀十二吳人曰於周室我為長何以外之為于僞反其僣天子之大號也史吳世家太伯周太王之長子太王賢季歷欲立之太伯與弟仲雍奔荆蠻荆蠻義而歸之至壽夢始大稱王愚按此年乃壽夢即位之二年今考吳語越人稱夫差皆曰天王則吳之僣王又非徐楚之比矣按國語云命圭有命固曰吳伯不曰吳王吳語注命圭受錫之策命吳本稱伯故曰吳太伯然則吳本伯爵也後雖益熾浸與中國㑹盟進而書爵不過曰子亦不以本爵與之故紀於禮書曰四夷雖大皆曰子見曲禮此春秋之法仲尼之制也而以為不敢擅進退諸侯亂名實者劉氏誤矣襄陵許氏曰吳自壽夢得申公巫臣而為楚患夷狄相攻不志也伐郊之役兵連上國於是始見於春秋志入州來志十五國之所以㑹鍾離也家氏曰郯太皥之後國雖小尚有典刑昭十七年郯子來朝聖人訪之以官名尚有取焉春秋書吳伐郯憫之也項氏曰楚初主盟于蜀而吳已伐郯入州來異時入郢之禍已兆於此矣夏五月曹伯宣來朝蓋成公嗣位而始來朝也不郊范氏曰言免牲則不郊顯矣言免牛亦不郊而經復書不郊蓋為三望起杜氏曰間有事故書不郊猶三望吳郡朱長文宋紹興間人著春秋通志二十卷曰禮天子有四望周禮大宗伯旅上帝及四望小宗伯四望四類注四望謂五嶽四鎮四瀆諸侯則祭境內山川而已王制諸侯祭名山大川之在竟內者魯當祭泰山泰山魯之境也禮所得祭故不書三望僣天子禮是以書之其說是矣楚子軫昭王言三代命祀祭不越望而曰江漢沮漳杜氏曰四水在楚界楚之望非也見哀六楚始受封濵江之國漢水沮漳豈其境內哉此亦據後世并兼封略言之爾愚按周文王封熊繹於楚蠻以子男之田居丹陽今歸州有故丹陽城則楚本封濵江而土地甚狹漢水在今漢陽沮水亦出漢中漳水在今漳州皆距丹陽甚逺必非楚始封之境故齊桓問昭王南征涉漢不復楚以昭王時漢非楚境不肯服罪然屈完言漢水以為池欒枝言漢陽諸姬楚實盡之則春秋之初漢水已在楚境內矣經書猶三望者三僖三十一年書免牲而繫以猶三望不言不郊者免牲則知不復郊矣宣三年書牛死乃不郊而繫以猶三望不言免牲者牛死無牲可免故必言不郊此年既書免牛又書不郊因間有吳曹二事不可但言猶三望故以不郊起之也襄陵許氏曰用是知魯郊或以五月非特定公也秋楚共公子嬰齊帥師伐鄭成公㑹晉侯景齊侯頃宋公共衛侯定曹伯宣莒子渠丘邾子定杞伯桓救鄭成八月戊辰同盟于馬陵左傳鄭子良相成公以如晉見且拜師楚子重伐鄭師于汜諸侯救鄭鄭共仲侯羽軍楚師囚鄖公鍾儀獻諸晉同盟于馬陵尋蟲牢之盟且莒服故也程子傳諸侯同心病楚杜氏曰馬陵衛地陽平元成縣東南有地名馬陵莒本屬齊齊服故莒從之愚按元城縣今屬大名路楚人軍旅數色角反起頻年伐鄭以其背音佩下同已而從諸夏也高氏曰去冬欒書救鄭而楚師還未得志於鄭故復伐之與莊之欲討徴舒而入陳亦異矣書大夫之名氏書帥師書伐而無貶詞者所謂不待貶絶而罪自見音現者也晉合八國之君親往救鄭則恤同惡安中國之師也欲著其善故特書救鄭以美之啖氏曰救者救其患難凡救患皆為美也家氏曰晉前此救鄭皆以大夫帥遍師至是合九國之師自將以行春秋爵諸侯而書救鄭褒之也言救則楚罪益明而鄭能背楚從晉善亦著矣前此晉遣上將去聲諸國不與音預焉此則其君自行而㑹合諸國則楚人暴橫去聲慿陵諸夏之勢益張亦可見矣故盟于馬陵而書同盟者同病楚也本孫氏發微家氏曰此合諸侯救鄭因以同盟幸諸侯之猶同也愚按榖梁於新城斷道雞澤平丘皆曰同外楚疏謂傳省文舉上下以包其餘則知晉霸之同盟大抵皆同外楚也王氏曰齊桓之救徐先盟于牡丘所以盟者為救徐設也晉景之救鄭後盟于馬陵非特為救鄭也有宋莒在焉宋以五年辭㑹魯衛受晉命侵之莒自晉文之卒至是始與盟約故知其因馬陵之㑹以固結之耳公至自㑹高氏曰諸侯㑹而楚師退故不以救鄭至吳壽夢入州來左傳楚申公巫臣與子重子反有怨及共王即位使巫臣聘於齊及鄭遂奔晉晉人使為邢大夫子重子反殺巫臣之族巫臣自晉遺二子書曰爾以讒慝貪婪事君而多殺不辜余必使爾罷於奔命以死巫臣請使於吳晉侯許之吳子壽夢說之乃通吳于晉以兩之一卒適吳舍偏兩之一焉與其射御教吳乘車教之戰陳教之叛楚置其子狐庸焉使為行人於吳吳始伐楚伐巢伐徐子重奔命馬陵之㑹吳入州來子重自鄭奔命子重子反於是乎一歲七奔命蠻夷屬於楚者吳盡取之是以始大通吳於上國王氏曰州來楚與國也杜氏曰淮南下蔡縣愚按屬今安豐路霍丘縣高氏曰吳楚爭强始見於此州來屬楚吳以兵入之著楚雖恃强而吳敢與之敵也張氏曰吳之始大豈特楚之患哉僣王而病中國亦晉有以啓之也家氏曰吳伐郯春秋所憂也入州來又春秋所喜也州來楚之附庸要害之地吳得之可以制楚也陳氏曰吳楚交兵不書至是始書之始大通吳於上國晉人為之也盟於蒲景公將始會吳吳不至於鍾離而后至盟於雞澤悼公又逆吳子吳不至於戚而后至吳不敢自列於諸夏而晉求之急將以罷楚也楚罷晉亦不復伯矣入州來不可不録其始也劉氏曰左氏以謂州來楚邑非也州來小國世服於楚未嘗特與諸侯盟㑹謂州來真楚邑則背於經矣冬大雩高氏曰冬非旱時曰大雩者志其旱且僣也劉氏曰榖梁云冬無雩也非也周之十月今之八月若久不雨可不雩乎衛定孫林父出奔晉景左傳衛定公惡孫林父林父出奔晉衛侯如晉晉反戚焉杜氏曰林父良夫子戚林父邑林父出奔戚隨屬晉高氏曰衛定公惡孫林父故逐之林父亡七年而恃晉反衛復專衛政又十九年遂逐其君卒以邑叛則定公可謂知所惡矣家氏曰春秋中年諸侯之大夫外交强國以伉其君衛之孫氏魯之季氏其尤也林父自結於晉之權臣為衛國患幾四十年晉黨叛臣為之羽翼衛獻魯昭所以失國晉實為之也春秋胡傳附録纂疏卷十九
