body:
  text: 春秋胡傳附録纂疏卷十四元汪克寛撰文公上公名興僖公子母聲姜在位十八年夫人出姜乙襄王二未十六年元年晉襄二年齊昭七年衞成九年蔡莊二十年鄭穆二年曹共二十七年陳共六年杞桓十一年宋成十一年秦穆三十四年楚成四十六年弑春王正月公即位榖梁傳繼正即位正也文定總論春秋諸侯皆不請王命矣然承國於先君者則得書即位以别於内復無所承者文成襄昭哀是也即位者告廟臨羣臣也何氏曰即者就也先謁宗廟明繼祖也還之朝正君臣之位也事畢而反䘮服焉國君嗣世定於初䘮必逾年然後改元書即位者縁始終之義一年不二君縁民臣之心不可曠年無君見公羊文九年杜氏曰先君未葬而公即位不可曠年無君家氏曰即位必以歲首改元亦必以歲首若歲首不書即位而餘月書之則非元年正始之義然服皆如未葬之服未成其為君髙氏曰文成定即位於未葬之前皆稱公者既踰年也一年不可二君故終年稱子又不可曠年無君故踰年雖未葬稱公也按書載舜禹受終傳位之事在舜則曰舜典月正元日格於文祖格至也漢孔氏曰舜服堯䘮三年畢將即政故復至文祖廟告在禹則曰大禹謨正月朔旦受命于神宗率百官若帝之初蘇氏曰神宗堯廟也禹受攝帝之命于神宗之廟總率百官其禮一如帝舜受終之初事也夫于文祖神宗則告廟也率百官若帝之初則臨羣臣也自古通葬三年其以凶服則不可入宗廟其以吉服則斬焉在衰音崔絰之中不可既成而又易之也左傳昭十晉平公卒既葬諸侯之大夫欲因見新君叔向辭曰孤斬焉在衰絰之中其以嘉服見則䘮禮未畢其以䘮服見是重受弔也如之何而可子張問於孔子髙宗諒陰三年不言何謂也子曰何必髙宗古之人皆然君薨百官總已以聽於冢宰三年見隱三年傳則告廟臨羣臣固有攝行之禮矣按周書伊訓稱太甲元年伊尹祠于先王則攝而告廟之證也百官總已以聽冢宰則攝而臨羣臣之證也其曰祗見音現厥祖者言伊尹以奉嗣王之事祗見太甲之祖也蔡氏傳古者王宅憂祠祭則冢宰攝而告廟又攝而臨羣臣太甲服仲壬之䘮伊尹祠于先王奉太甲以即位改元之事祗見厥祖則攝而告廟也侯服甸服之羣臣咸在百官總已之職以聽冢宰則攝而臨羣臣也至三祀十有二月伊尹以冕服奉嗣王太甲則免䘮從吉之證也蔡氏曰䘮既除以衮冕吉服奉迎以歸也然顧命康誥記成王之崩其君臣皆冕服何也當是時成王方崩就殯猶未成服故用麻冕黼裳入受顧命己受命誥諸侯而後釋冕反䘮服者於是成服而宅憂也或以為康王釋服離次而即吉則誤矣朱子語問康王釋䘮服而被衮冕諸家皆以為禮之變獨蘇氏以為失禮未知當此際合如何區處曰天子諸侯之禮與士庶人不同故孟子有吾未之學之語謂此類耳如伊訓元祀十有二月朔亦是新䘮伊尹以奉祀王袛見厥祖固不可用凶服矣漢唐新主即位皆行冊禮君臣亦皆吉服追述先帝之命以告先君葢易世傳授國之大事當嚴其禮而王侯以國為家雖先君之䘮猶以為己私服也啖氏曰嗣子為君明年正月朔就位南面改元勉齋黄氏曰人君即位之别有四始死正嗣子之位既殯之後嗣君即繼體之位若踰年合正改元之位三年合正踐阼之位如春秋書元年即位則是踰年正改元之位也帝乃殂落三載四海遏密八音月正元日舜格于文祖伊尹以冕服奉嗣王歸于亳則是三年正踐阼之位也然崩薨之日或在歲終則葢有未殯而踰年者矣愚按文定及九峯蔡氏皆以即位之事冢宰攝告廟攝臨羣臣朱子則以他事可攝即位不可攝而又謂嗣君以先君之䘮為己私服其意葢欲權一時之宜如借吉之例以繼世正綂而三年之服不可廢也竊詳春秋以前必有攝告廟臨羣臣之禮故孔子言君薨百官總己以聽於冢宰三年而書有伊尹祠于先王之文苟太甲蒞政則伊尹不得祠先王矣然春秋諸侯皆踰年朝廟改元而命大夫聘問鄰國或以吉服躬蒞會盟侵伐之事漢以後則不待踰年而即位矣賈誼謂植遺腹朝委裘而天下不亂豈古者典禮素明紀綱素定而大臣之攝即位不致生變歟國君即位之禮後世雖無傳然昭公十年諸侯之大夫葬晉平公既葬諸大夫欲因見新君叔向辭之曰以嘉服見則䘮禮未畢以䘮服見是重受弔也襄三十一年子産相鄭伯如晉晉侯以魯襄公之䘮未之見則春秋諸侯䘮禮猶未盡廢也二月癸亥日有食之公日上有朔字天王使叔服來會葬公羊傳其言來會葬何㑹葬禮也穀梁傳葬曰㑹其志重天子之禮也杜氏曰叔氏服字諸侯䘮天子使大夫㑹葬禮也凡崩薨卒葬人道始終之大變也不以得禮為常事而不書周禮職䘮掌諸侯之䘮何氏曰書天子之厚以起諸侯之薄其或失禮而害於王法之甚者聖人則有削而不存以示義者矣失禮如成公親葬晉景公害於王法如見弑賊不討及吳楚僭稱王之類家氏曰天子所以厚諸侯是以無貶桓公之薨王使榮叔錫命王不稱天為追命篡賊而貶也成風之葬召伯來㑹王亦不稱天以其用夫人之禮於妾母而譏之也僖公魯之賢君書天王使叔服來會葬無貶也愚按諸侯五月而葬僖公薨至是三月而王臣來會葬者豈王室謹禮以懐諸侯唯恐失期而先至也歟僖公未嘗遣使會惠王之葬而襄王遣使會僖公之葬比事以觀得失見矣夏四月丁巳葬我君僖公穀梁傳薨稱公舉上也葬我君接上下也葬而後舉諡諡所以成德也於卒事乎加之矣劉氏曰左傳云葬僖公緩作主非禮也謂作主緩耳杜氏讀緩字上為一句僖公十二月薨今四月葬凡五月不得云緩杜本欲遷僖公薨在十一月則除䘮在二年十一月納幣為十二月則與僖合獨不顧作主非禮也之語無所繫是譏不當作主乎天王襄使毛伯來錫公命公羊傳錫者何賜也命者何加我服也杜氏曰毛國伯爵諸侯為王卿士者諸侯終䘮入見音現下同則有錫歲時來朝則有錫能敵王所愾音慨則有錫韍冕圭璧因其終䘮入見而錫之者也禮所謂䘮畢以士服見天子已見賜之黻冕圭璧然後歸是已杜氏曰諸侯即位天子賜以命圭合瑞為信僖十一年王賜晉侯命亦其比也詩瞻彼洛矣小序思古明王能爵命諸侯韎韐有奭注諸侯世子除三年之䘮服士服而來見韓奕韓侯受命王親命之朱子傳即位除䘮以士服入見天子而聽命也車馬衮黼因其歲時來朝而錫之者也詩采菽所謂君子來朝何錫予音與下同之雖無予之路車乗去聲馬又何予之𤣥衮及黼是已朱子傳天子燕諸侯而答諸侯頌美之詩也君子諸侯也路車金路以賜同姓象路以賜異姓𤣥衮𤣥衣而畫以卷龍也黼如斧形繡之於裳也言諸侯來朝則必有以賜予之今雖無以予之然已有路車乗馬𤣥衮及黼之賜矣文侯之命王曰其歸視爾師用賚爾秬鬯一卣云云馬四匹父往哉左傳僖二十八王享醴命晉侯宥賜之大路之服戎路之服彤弓玈音盧矢因其敵愾獻功而錫之者也詩彤弓所謂彤弓弨尺昭反兮受言藏之我有嘉賔中心貺之鐘鼓既設一朝享之是已朱子傳天子燕有功諸侯而錫以弓矢之詩東萊吕氏曰受言藏之言其重也弓人所獻藏之王府以待有功不敢輕予人也中心貺之言其誠也中心實欲貺之非由外也一朝享之言其速也以王府寶藏之弓一朝舉以畀人無遲留顧惜之意也左傳文四寗武子曰諸侯敵王所愾而獻其功於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴今文公繼世䘮制未畢僖公前年十二月薨至是始越五月非初見繼朝而獻功也何為來錫命乎故榖梁子曰禮有受命無來錫命來錫命非正也何氏曰文公新即位功未足施而錫之非禮也蜀杜氏曰諸侯即位當朝于王奉天子之命而為諸侯文公不朝于京師而王反錫之命故書天王以正其號録錫命以志其過通㫖問趙子謂直譏其賞無功爾安得云無錫命乎曰榖梁子言無來錫命不言無錫命也來錫命者如唐遣中官即藩鎮立節度之類劉氏曰錫命者命為諸侯也諸侯在䘮稱子踰年即位䘮畢以士服見於王王乃於廟命之䘮未畢而命之非禮也既䘮畢而不受命於天子亦非禮也愚按諸侯之嫡子必誓於王以為世子及其君薨必告于王王遣使省其終事遂命世子嗣為諸侯三年䘮畢乃以士服入京師見天子于廟而受命焉未受命不敢服其服已見天子錫之黻冕之服與命圭合瑞於是服之以歸設奠於祖廟然後臨其臣民焉春秋諸侯立世子既不誓於王及其嗣位又不請命于京師王不能罪因而命之兩失之矣公羊以錫命為加服劉氏辨其非或者謂命為諸侯非賜命服并文定之説為疑夫黻冕圭璧乃所以命為諸侯也葢天王之錫命有以始立而錫命者有以有功而錫命者有既没而追命之者此年毛伯錫命及虢公命曲沃武公為晉侯召武公賜晉惠公命皆始立而賜命者也召伯廖賜齊桓公命尹氏王子虎内史叔興父策命晉文公皆以其有功而錫命者也榮叔錫桓公命及成簡公追命衞襄公皆既死而追命之者也若召伯之賜成公命則始立未賜命厯八年而後命之耳劉定公之賜齊靈公命雖非有功王將娶於齊故以私恩命之也春秋之書錫命莫非譏耳苟謂諸侯不往拜命為貶而天王之錫命無責則曷為不待其來見而命之哉晉侯襄伐衞成左傳晉文公之季年諸侯朝晉衞成公不朝使孔達侵鄭伐緜訾及匡晉襄公既祥使告于諸侯而伐衞及南陽先且居曰效尤禍也請君朝王臣從師晉侯朝王于温先且居胥臣伐衞五月辛酉圍戚六月戊戌取之獲孫昭子王氏箋義衞成怨晉文執歸京師故季年不朝而且侵其鄰國示不從盟主也襄公嗣位欲修伯業先以衞侯之罪告于諸侯復聽且居之言朝于王所乃命大夫伐衞取其戚田諸侯於是畏威復歸於晉昔年齊桓公卒五公子爭立覇業遂廢今襄公克纘父功繼為盟主首能威服諸侯故春秋書曰晉侯伐衞貴之也陳氏曰春秋苟其君意雖卿帥不書故伐衞書晉侯不書先且居成十三年伐秦書晉侯不書欒書襄十年滅偪陽書晉侯不書荀偃士匄哀元年伐晉書衞侯不書孔圉所謂深探其本也愚按文宣以後大夫專政凡征伐會盟君雖在而大夫任其事故經書晉侯而傳言大夫也叔孫得臣如京師襄左傳毛伯衞來錫公命叔孫得臣如周拜杜氏曰謝賜命得臣叔牙之孫髙郵孫氏曰文公即位未嘗如周而周錫之命受命矣又不自朝而使臣往不臣之甚也蜀杜氏曰受王之寵命苟躬朝于京師猶曰緩也况不朝而使卿拜命乎故直書以示譏愚按文公之立天子既使大夫㑹僖公之葬又使寰内諸侯來錫命不親往拜而僅使得臣焉襄王猶不之罪且使榮叔歸成風含賵繼使召伯會成風葬而文公在位十有八年厯襄頃匡王三世終其身不朝於京師觀春秋所書比事以攷之其罪不可揜矣衞成人伐晉襄左傳衞侯使告于陳陳共公曰更伐之我辭之衞孔達帥師伐晉張氏曰覇主聲罪致討不自反其不仁無禮之罪乃稱兵報伐故書人辠孔達也愚按春秋不書晉之取戚而人孔達予晉而罪衞也秋公孫敖會晉侯襄于戚此大夫專㑹諸侯之始左傳晉侯疆戚田故公孫敖㑹之杜氏曰禮卿不得㑹公侯戚衞地在頓丘衞縣西愚按在今大名府開州之東薛氏曰卿始㑹諸侯也大夫而專㑹諸侯政不在公室矣臨川吳氏曰凡魯卿會外君直書不隱以見其非永嘉吕氏曰春秋之初葢有以大夫而㑹諸侯者矣未若公孫敖之專會也外大夫有㑹公者矣内没公而名大夫則及齊髙傒㑹于防是也内不没公而不名大夫則公及齊大夫盟于蔇是也或没公或不名大夫皆有所諱也内大夫有㑹盟諸侯者矣柔㑹宋公陳侯蔡叔盟于折則柔猶不氏也公子結遂及齊侯宋公盟猶為遂事非專㑹也若公孫敖㑹晉侯則專㑹矣以見禮樂之自大夫出也冬十月丁未楚世子商臣弑其君頵成頵俱倫反公榖作髠左傳初楚子將以商臣為太子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也楚國之舉恒在少者且是人也蠭目而豺聲忍人也不可立也弗聽既又欲立王子職商臣聞之而未察告其師潘崇曰若之何察之崇曰享江芉而勿敬也從之江芉曰呼役夫宜君王之欲殺汝而立職也告潘崇曰信矣崇曰能事諸乎曰不能曰能行乎曰不能能行大事乎曰能十月以宫甲圍成王王請食熊蹯而死弗聽丁未王縊書世子弑君者有父之親有君之尊文王世子君之於世子也親則父也尊則君也有父之親有君之尊何氏曰言世子者所以明有父之親言君者所以明有君之尊啖氏曰楚僭號已久世子必不誓於天子今以商臣之逆故特書世子以明其罪孫氏曰不言父而言君者言君以明其尊言世子以明其親也而至於弑逆此天理大變人情所深駭春秋詳書其事欲以起問者察所由示懲誡也唐世子𢎞受左氏春秋至此廢書嘆曰經籍聖人垂訓何書此耶郭瑜對曰春秋義存褒貶以善惡為勸戒故商臣千載而惡名不滅𢎞曰非惟口不可道故亦耳不忍聞願受他書瑜請讀禮世子從之見唐孝敬皇帝𢎞傳嗚呼聖人大訓不明於後世皆腐儒學經不知其義者之罪耳夫亂臣賊子雖陷穽才性反在前斧鉞加於頸而不避顧謂身後惡名足以係其邪志而懲於為惡豈不謬哉持此曉人可謂茅塞其心意矣若語去聲之曰為人君父而不通於春秋之義者必䝉首惡之名為人臣子而不通於春秋之義者必陷篡弑誅死之罪董子語見太史公自序聖人書此者使天下後世察於人倫知所以為君臣父子之道而免於首惡之名誅死之罪也則世子𢎞而聞此必將𢥠音聳悚同然畏懼知春秋之不可不學矣學於春秋必明臣子之義不至於奏請怫㫖而見酖矣𢎞本傳帝語侍臣𢎞仁孝賔禮大臣未嘗有過而武后將騁志𢎞奏請數咈㫖后酖殺之傳去聲下同者案也經者斷丁亂反也考於傳之所載可以見其所由致之漸豈隱乎嫡妾必正而楚子多愛立子必長上聲而楚國之舉常在少去聲者養世子不可不慎也文王世子云云而以潘崇為之師愚按使楚頵擇賢得如宋左衞率袁淑以傳世子則禍不作矣侍膳問安世子職也而多置宫中降而不憾憾而能聄之忍反者鮮上聲矣左傳隱三年石碏云云乃欲黜兄而立其弟謀及婦人宜其敗也左傳桓十五鄭厲公云云而使江芉音弭知其情是以不仁處其身而以不孝處其子也其及宜矣楚頵僭王憑陵中國戰勝諸侯毒被皮寄反天下楚頵以莊二十三年篡立在位四十六年召陵之前伐鄭侵鄭音四召陵之後圍許敗徐滅弦黄齊桓既没益肆憑陵執襄公伐宋而獻捷于魯戰泓而宋襄遂殞其身既而伐齊戊榖合諸侯圍宋天下之禍僭矣然昧於君臣父子之道禍𤼵蕭牆而不之覺也不善之積豈可揜哉王氏曰頵亦弑其兄熊囏而得位者終不免商臣之禍天道好還豈不昭然君不君則臣不臣父不父則子不子春秋書世子弑其君者推本所由而著其首惡為萬世之大戒也然則商臣無貶矣曰弑父與君之賊其惡猶待於貶而後著乎陳氏曰楚國未志其志頵何世子弑君不可以楚不志也張氏曰裔夷無道之極感應之理故至于此後世如匈奴頭曼魏拓㧞珪唐安禄山史思明朱全忠西夏曩霄皆以外夷盜賊毒被天下中國不能制而受禍於其子積不善之餘殃千載一律故商臣之惡特書之使為君父者知謹履霜之戒以此坊人猶有驟欲廢立以啟劭廣之禍者愚按商臣怨子上止王立己譖之致死楚成於此可以自省矣而猶有廢立之志狐疑不決是速其斃也今考世子弑君父實莫大之變經書世子弑君者三楚商臣蔡般皆其君有以致之許止不嘗藥亦悼公教之未至耳有國有家者視此可不知所儆乎劉氏曰榖梁云因髠之卒所以謹商臣之弑非也即不日者乃不謹其弑乎公孫敖如齊昭左傳穆伯如齊始聘焉何氏曰書者譏䘮娶劉氏曰左氏云禮也杜云明諸侯諒闇則國事皆用吉禮皆非也左氏見諸侯廢䘮而聘故推以為禮杜氏見左氏有得禮之言遂推以為當䘮而君皆反經越禮不可以教後世者也愚按左氏於凡諸侯朝聘悉以為禮既不察其不能謹天下之通䘮又不考其尊周交鄰之疏數劉氏辨之當矣僖公三十年宰周公來聘而公子遂報聘于京師且初聘于晉此年毛伯錫命則得臣往拜而敖亦初聘于齊比事以觀不貶而惡自見丙襄王二申十七年二年晉襄三齊昭八衞成十蔡莊二十一鄭穆三曹共二十八陳共十杞桓十二宋成十二秦穆三十五楚穆王商臣元年春王二月甲子晉侯襄及秦穆師戰于彭衙秦師敗績左傳殽之役晉人既歸秦帥秦大夫言於秦伯曰是敗也孟明之罪也必殺之秦伯曰是孤之罪也孤實貪以禍夫子夫子何罪復使為政春秦孟明視帥師伐晉以報殽之役晉侯禦之及秦師戰于彭衙秦師敗績晉人謂秦拜賜之師程子傳越國襲人秦罪也忘親背惠晉惡也秦經人之國以襲人雖忿無以為辭矣故其來不稱伐晉不諭秦而與戰故書晉及忿以取敗故書敗績杜氏曰彭衙秦地馮翊郃陽縣西北有彭衙城張氏曰在今同州白水縣愚按同州今屬奉元路戰而言及者主乎是戰者也據及者為志王氏曰彭城秦地而晉師在焉亦知晉之欲戰矣夫敵加於己不得已而起者謂之應去聲下同兵爭恨小故不忍忿怒者謂之忿兵本前魏相傳按左氏秦孟明帥師伐晉報殽之役此所謂忿兵疑罪之在秦也而以晉侯主之何哉處己息爭之道逺去聲怨之方也然則敵加於己縱其侵暴將不得應乎曰敵加於己而己有罪焉引咎責躬服其罪則可矣己則無罪而不義見加諭之以詞命猶不得免焉亦告於天子方伯可也若遽然興師而與戰是謂以桀攻桀何愈乎故以晉侯為主者處己息爭之道寡怨之方王者之事也家氏曰秦有大惠於晉不可忘也前日秦乗晉䘮而襲鄭襄公懼其凌軋逼弗獲己衰絰即戎幸而一勝亦云可矣今孟明再至而晉襄負氣好勝親將禦敵復敗秦師以怨報德故君子責之且文公退三舍避楚施之所必報乃義之所當然也秦之惠尤大而晉襄亟戰莫之恤豈惟背惠實忘親矣春秋以是貶愚按秦師伐晉而經不書伐罪晉而免秦也丁丑作僖公主左傳作主書不時也凡君薨卒哭而祔祔而作主特祀於主烝嘗禘於廟公羊傳虞主用桑練主用栗用栗者藏主也作主何以書譏何譏爾不時也穀梁傳立主䘮主于虞吉主於練作僖公主譏其後也作主壊廟有時日於練焉壞廟壊廟之道易檐可也改塗可也作主者造木主也范氏曰主葢神之所憑依其狀正方穿中央達四方天子長一尺二寸諸侯長一尺既葬而反虞虞主用桑何氏曰禮平明而葬日中而反虞以陽求陰謂之虞者親䘮以下壙皇皇無所親求而虞事之虞猶安神也用䘮者取其名所以副孝子之心期與朞同年而練祭喪服四制十三月而練愚按小祥易練冠故曰練祭練主用栗何氏曰期年練祭埋虞主於兩階之間易用栗也夏后氏以松殷人以栢周人以栗禮士虞記曰桑主不文吉主皆刻而諡之用栗者藏主也何氏曰藏于廟室中常所當奉事也何以書僖公薨至是十有五月杜氏曰過葬十月何氏曰禮作練主當以十三月然後作主慢而不敬甚矣夫慢而不敬積惡之原也以為無傷而不去上聲至於惡積而不可揜所以謹之也髙氏曰周人卒哭而祔祔而易主是謂虞主既朞而練練而易主是謂練主僖公薨十有五月非虞練之時而方作主猶未祔廟也猶未祔廟者欲躋之故也是以謹而日之蜀杜氏曰十二公作主祔廟未嘗書之今書作僖公主必有所譏也張氏曰事亡如事存故作主以象神而祭之禮既葬作主於墓不終日而虞祭不忍一日忘親也僖公元年四月葬今乃作主慢而違禮甚矣愚按左氏云卒哭而祔服氏云造木主立几筵焉特祀在寢三年䘮畢遭烝嘗乃於廟鄭氏又云唯祔與練祭在廟祭訖主反於寢其大祥與禫祭其主自然在寢祭之榖梁謂吉主於練於練焉壊廟則待練而始祔今考檀弓云殷既練而祔周卒哭而祔孔子善殷竊謂祔廟則當吉祭苟卒哭而遷廟遽用吉祭不近人情故文定取榖梁言練祭易栗主而後祔廟也劉氏曰左氏僖三十三年傳云葬僖公緩作主非禮也杜氏讀緩字以上為一句作字下為一句非也僖公以十二月薨文元年四月葬凡五月不得云緩傳言葬僖公而作主緩耳公羊云刺欲久䘮而後不能非也文公自惰緩不作主耳何以知其欲久䘮三月乙巳及晉襄處父盟因朝而盟始此左傳晉人以公不朝來討公如晉晉人使陽處父盟公以恥之書曰及晉處父盟以厭之也適晉不書諱之也公羊傳此陽處父也何以不氏諱與大夫盟也穀梁傳不言公處父抗也為公諱也何以知其與公盟以其日也何以不言公之如晉所恥也出不書反不致也及處父盟者公也杜氏曰處父為晉正卿不能匡君以禮而與公盟故貶其族范氏曰去處父氏使若與其君盟如邾儀父家氏曰處父去族貶處父所以貶晉侯也其不地於晉也杜氏曰盟晉都諱不書公者抑大夫之抗不使與公為敵正君臣之分扶問反也孫氏曰不言公者不與處父敵公也陸氏曰義同髙傒凡大夫與公盟若非彼强逼我而盟例但書人言非大夫之罪也今晉逼公令與大夫盟故特書其名以見其罪蜀杜氏曰髙傒之盟主在於公而此主在處父也愚按抑大夫之抗與及髙傒荀庚孫良夫卻犨孫林父向戌同晉時以處父辱公故又去氏適晉不書反國不致為去聲公諱恥存臣子之禮也凡此類筆削魯史之舊文衆矣髙氏曰凡盟必書地惟他國大夫來魯盟及魯大夫往他國盟不地葢各於國中故也今不書處父來魯魯亦無如晉者而書及處父盟然則孰與盟耶曰我公也公如晉不書者晉襄責魯不朝故公雖在䘮未朝天子而畏晉之威越禮朝晉晉侯乃使大夫盟公以辱之是以没不書公又去處父之族以著其罪也然此非專罪晉亦所以罪魯之臣子也夫公之如晉豈無卿大夫以從行乎不能明大義以正理折之遽自屈辱甘心受盟非主憂臣辱主辱臣死之義也張氏曰盟于晉之都而君不出恥甚矣故諱之陳氏曰朝而遂盟之於是始凡諱國惡恥在公則但書其事不書公者恒辭也諱在其事則但書公不書其事公㑹晉侯于黒壤為公不與盟故不書盟公如晉為止公送葬故不書葬甚諱之也夏六月公孫敖㑹宋公成陳侯共鄭伯穆晉襄士縠盟于垂隴縠戸木反榖作榖垂隴公穀作垂斂左傳公未至穆伯會諸侯及晉司空士縠盟于垂隴晉討衞故也陳侯為衞請成于晉執孔達以説杜氏曰垂隴鄭地滎陽縣東有隴城愚按滎陽縣今屬汴梁路鄭州薛氏曰垂隴之㑹士縠始專晉國之事也桓文没大夫擅專諸侯之會盟自公孫敖士縠始也其臣固有罪也使之者亦非也蜀杜氏曰春秋盟㑹未有外大夫别會於諸侯者垂隴之㑹譏政在於大夫也桓文之伯或盟王人或致天子是天子受制於諸侯也春秋不與之故書王人以先諸侯晉襄紹伯致諸侯而大夫會之是諸侯受制於大夫也春秋亦不與之故序諸侯以先士縠陳氏曰大夫而敵諸侯於是始晉遂以大夫主諸侯也然士縠主盟曷為序諸侯之下春秋不以大夫主盟也故訖于宋不以大夫主盟翟泉貶此何以不貶貶不於甚則於其事端餘實録而已矣自書士縠而後凡役書大夫桓文之伯會盟有大夫則但稱人㑹檉稱邾人㑹温稱秦人必世子也則得次小國之君自垂隴主士縠新城主趙盾而后大夫與諸侯序戚之盟書齊國佐沙隨之會書宋華元甚者无伯而安甫之㑹君與大夫並列矣臨川吳氏曰晉以士縠主盟魯以公孫敖抗三國之君皆非禮也襄陵許氏曰明年衞人㑹晉伐沈則知衞服於垂隴之會矣啖氏曰左氏曰書士縠堪其事也既命之卿例皆書名不論堪與不堪若不堪其事自當罪爾自十有二月不雨至于秋七月公羊傳記異也大旱以災書此亦旱也曷為以異書大旱之日短故以災書此不雨之日長故以異書也穀梁傳歴時而言不雨文不憂雨也不憂雨者無志乎民也書不雨至于秋七月而不曰至于秋七月不雨者葢後言不雨則是冀雨之詞非文公之意也夫書不雨至于秋七月而止即八月嘗雨矣據僖三年書六月雨然而不書八月雨者見音現文公之無意於雨不以民事繫憂樂音洛也范氏曰歴四時乃書是不勤雨無恤民志其怠於政事可知而魯衰自此始矣孫氏曰不雨歴四時而總書惡文公怠于國政不懼旱災之甚愚按禮稱至于八月不雨則君不舉今文公自十二月不雨至七月則陰陽之氣不和而恒陽為災者八越月矣文公漫不之省雖禫制未終而屢行朝聘㑹盟祭祀之事其無恤民之心若是豈可以居民上乎公羊謂不書旱不雨之日長而無災范注亦云未為災誤矣葢旱為災而不久則書旱旱為災而久則書某月不雨至某月綱目於漢獻之世書四月不雨至七月而分注人相食則為災可知矣八月丁卯大事于大廟躋僖公左傳逆祀也於是夏父弗忌為宗伯尊僖公且明見曰吾見新鬼大故鬼小先大後小順也躋聖賢明也明順禮也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎仲尼曰臧文仲不知者三作虛器縱逆祀祀爰居三不知也公羊傳大事者何大祫也大祫者何合祭也其合祭奈何毁廟之主陳于大祖未毁廟之主皆升合食于大祖五年而再殷祭躋者何升也何言乎升僖公譏何譏爾逆祀也逆祀奈何先禰而後祖也穀梁傳大事者何大是事也祫祭者毁廟之主陳于大祖未毁廟之主皆升合祭于大祖躋升也先親而後祖也逆禮也逆祀則是無昭穆也無昭穆則是無祖也無祖則是無天也君子不以親親害尊尊此春秋之義也有事者時祭祠礿嘗烝大事祫也劉氏曰春秋記烝記嘗記禘未有曰大事者其曰大事是乃諸侯之大事也諸侯之事無大於此者祫之謂也王者禘其祖之所自出以其祖配之諸侯祫毁廟之主陳于太祖時祭稱有事祫祭稱大事大之外無加者矣以是推之魯之郊禘非禮也趙氏曰凡祭而失禮則書祭名祭非失禮為下事張本則稱事合羣廟之主食於太廟何氏曰陳列毁廟主于太祖前太祖東鄉昭南鄉穆北鄉其餘孫從王父臨川吳氏曰四時之祭稱祭名而曰烝曰嘗者五廟各祭也曰有事于太廟者四廟之主遷于太廟而合祭也是為祫曰大事于太廟者毁廟之主亦與祭自伯禽以下禰廟以上之主皆合祭于太廟也是為大祫升僖於閔之上也列僖公之主於閔公之上通㫖君已逾年則不論子之有無自當立廟閔僖二公親則兄弟杜氏曰僖公閔公庶兄分扶問反則君臣閔公先立為君僖公嘗北面事之為臣以為逆祀者兄弟之不先去聲君臣禮也君子不以親親害尊尊喪服小記親親尊尊長長人道之大者也故左氏則曰祀國之大事而逆之可乎禮器臧文仲安知禮夏父弗綦逆祀而弗止也子雖齊聖不先父食久矣公羊則曰其逆祀先禰而後祖也何氏曰僖公以臣繼閔公猶子繼父故閔公於文公亦猶祖也榖梁則曰逆祀則是無昭穆也無昭穆則是無祖也閔僖非祖禰而謂之祖禰者何臣子一例也杜氏曰僖是閔兄不得為父子嘗為臣繼閔而立廟坐宜次閔下范氏曰僖公雖長已為臣矣閔公雖小已為君矣臣不可以先君猶子不可以先父故以昭穆父祖而喻臨川吳氏曰閔僖曾為君臣義同父子閔猶父也僖猶子也躋僖於閔之上是先子後父也劉氏曰僖公於閔非父子也然與親父子相襲無以異臣子一體也君之則我以臣事之父之則我以子奉之是故為人後者則為之子矣彼不以子繼父則必以臣繼君君臣猶父子則父子猶君臣也舜之有天下祖顓頊而宗堯堯非同姓也受國焉爾非同姓尚宗之况親親乎髙郵孫氏曰閔僖之為君臣較然於人一旦以臣而上君亂法之甚夫有天下者事七世諸侯五世見荀子王制天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五祭法王立七廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟逺廟為祧有二祧諸侯立五廟曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟説禮者曰世指父子非兄弟也蜀孫氏抃曰世與昭穆云者據父子之正而言也若兄弟則昭穆同不得以世數之矣然三傳去聲同以閔公為祖而臣子一例是以僖公父視閔公為祖而父死子繼兄亡弟及名號去聲雖不同其為世一矣孫氏曰文公二月作僖公主八月大事于太廟躋僖公瀆慢不恭也甚矣范氏曰時三年之䘮未終而吉祭于太廟則其譏自明張氏曰吉祭而不言吉者閔二年書已明此主為逆祀書也家氏曰此一書而再譏也大事于太廟未當祫而祫也躋僖公非所當躋而躋也髙氏曰父子相繼禮之常也至于傳之兄弟則亦不得已焉耳既授以國則所傳者雖非子亦猶子道也傳之者雖非其父亦猶父道也漢之惠文亦兄弟相繼而當時議者皆推文帝上繼髙祖而惠帝親受髙祖天下者反不得與昭穆之正至于光武當繼平帝又自以世次當為元帝後皆背經違禮而不可傳者也凡人君以兄弟為後者必非有子者也引而為嗣臣子一體矣而當嗣者反以兄弟之故不繼所受國者而繼先君則是所受國者竟莫之嗣生則以臣子事之死則以兄弟治之忘生倍死况已實受之後君今乃自繼先君不唯棄後君命己之意又廢先君傳授之命人民土地則歸之已而父子之禮則恥不為此皆不可者也豈所以重受國之意也愚按僖公之不可先閔公三傳辨析明矣但榖梁謂逆祀是無昭穆范寗曰以昭穆父祖為喻何休謂惠公與莊公當同南面西上隱桓與閔僖亦當同北面西上孔頴達正義曰父子異昭穆兄弟昭穆同閔僖不得為父子同為穆耳今升僖先閔此二公位次之逆非昭穆亂也若兄弟相代即異昭穆設令兄弟四人皆立則祖父之廟即已從毁禮必不然今考文定此傳用韋昭説父為昭子為穆僖為閔臣臣子一例而以閔僖各為一世襄公三年謂哀公以襄公為皇考亦以昭定各為一世則是異昭穆矣然于仲嬰齊後歸父則引何休以為亂昭穆之序朱子謂文王為昭武王為穆自其始祔而已然管蔡郕霍為文之昭邘晉應韓為武之穆子孫亦以為序而不易則昭穆不可易也但其論天子廟制謂周孝王時武王親盡始立武世室孝王乃共王之弟而各為一世又以宋太祖太宗哲徽欽髙皆兄為穆而弟為昭皆兄弟對列各為一室則又紊昭穆矣如何休頴達並立廟而同昭穆則齊之孝昭懿惠兄弟四人相繼衞之懿戴文公兄弟三人相繼立廟將無所容苟各為一世而異昭穆則齊頃不得祭其祖而衞成不得祭曾祖矣古制不存無復可考竊疑古者一君各為一廟則兄弟同昭穆共為一世祫祭大廟則魯當以僖公特設位於閔公之下後世同堂異室不可以二先君共室於一室必至於異昭穆而仍以兄弟共為一世數之也然曽子問云七廟五廟無虛主諸侯祫祭則祝逆四廟之主是諸侯之昭穆無過四廟天子之昭穆無過六廟考之春秋哀公之世桓宫猶在則是祭十君而八世定公立煬宫則是祭二十一傳之祖後世天子之廟有十餘世歴十四五君而其廟皆不毁説禮者反引春秋以為證而聖王經世之制不可復見矣又按大傳論禘祫而云諸侯及其太祖大夫士有大事省於其君則于祫及其髙祖夫大夫士有善於其君且得祫祭則諸侯大祫陳毁廟之主宜不得為非禮矣或者謂諸侯不當大祫成王賜魯重祭故有大祫疑其説之過也説榖梁者以大事為祫嘗左氏外傳又以為祫烝皆未知其為大祫耳苟以此為時祫則有事于太廟名為何祭耶冬晉襄人宋成人陳共人鄭穆人伐秦穆左傳晉先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役程子傳秦以忿取敗晉可以已矣而復伐秦報復無已殘民結怨故貶稱人按左氏四國伐秦報彭衙之役則皆國卿也杜氏曰四人皆卿其貶而稱人者晉人再勝秦師在常情亦可以已矣而復扶又反興此役結怨勤民是全不務德專欲力爭而報復之無已也以致濟河焚舟之師故特貶而稱人家氏曰魯莊忘父之讎及齊為好春秋深責之晉襄敵父之惠屢戰勝秦乃更率三國之師以為此役故四國皆書人以示貶也陳氏曰左傳云尊秦非經意公子遂如齊昭納幣公羊傳納幣不書此何以書譏䘮娶也娶在三年之外則何譏乎䘮娶三年之内不圖婚吉禘于莊公譏然則曷為不於祭焉譏三年之恩疾矣非虛加之也以人心為皆有之曷為獨於娶焉譏娶者大吉也非常吉也其為吉者主乎已以為有人心者則宜於此焉變矣婚姻常事不書據春秋十二公皆不書納幣惟此年及莊公親往則書之其書納幣者䘮未終而圖婚也范氏曰䘮制未畢而納幣書非禮何氏曰僖以十二月薨至此未滿二十五月又禮先納采問名納吉乃納幣四者皆在三年之内夫娶在三年之外矣何氏曰據逆在四年則何譏乎春秋論去聲事莫重乎志志敬而節具與之知禮志和而音雅與之知樂志哀而居約與之知䘮非虛加之也重志之謂也本董子繁露玉杯篇此皆使人私欲不行閑邪復禮之意臨川吳氏曰此年十二月始大祥而行納幣禮是在䘮而圖婚未祥而行嘉禮也非禮故書啖氏曰魯往他國納幣皆常事不書凡書皆譏也愚按䘮雖二十五月大祥然中月而禫必二十七月始為終制况春秋凡書四時皆指首月此書冬則納幣在十月是僖公之薨甫及也十三月殺哀而圖婚失禮甚矣宣公元年逆女其蔑禮視此尤甚然其篡立之罪已極於䘮娶乎何誅劉氏曰左傳云禮也則是以䘮娶為禮不亦悖乎杜預遷僖公薨月以就傳説然此年大事于太廟則已除䘮矣丁襄王二酉十八年三年晉襄四齊昭九衞成十一蔡莊二十二鄭穆四曹共二十九陳共八杞桓十三宋成十三秦穆三十六楚穆二春王正月叔孫得臣㑹晉襄人宋成人陳共人衞成人鄭穆人伐沈沈潰沈音審霸國大夫㑹諸大夫伐國自此始杜氏曰沈國名汝南平輿縣北有沈亭張氏曰沈姬姓國漢志汝南治平輿故沈子國今屬蔡州愚按今汴梁路汝寧府西平縣按左氏伐沈以其服於楚也沈潰民逃其上也杜氏曰潰衆散流移若積水之潰自壊之象也五國皆稱人將去聲非命卿也左傳臧叔㑹諸侯之師薛氏曰晉初有志於諸侯垂隴使士縠涖之伐沈命其㣲者怠也沈在汝南平輿縣北未嘗與音預中國㑹盟而南服於楚師入其境而民人逃散常山劉氏曰一被侵伐而民散君之不能可知矣蔡潰沈潰許潰是也雖非義舉比於報復私怨之兵則有間去聲矣故其辭無褒貶凡此類欲示後世用師者知權而本之以正也家氏曰霸者當伸大義於天下或當為而不為或不必為而為之失其道矣楚商臣負滔天之罪于今二年使晉襄仗義而前師壯辭直天下諸侯孰不鼓勇而從縱未能汙瀦其宫楚人必能以商臣為戮更立君而聽命于中國晉之霸業有光於前人矣乃視非己事使元兇得以樹其羽翼脅從諸小國以抗衡中夏懐貳者豈獨沈哉襄公舍其大而議其細以諸侯之兵伐沈而潰之避豺虎而獵狐兎雖潰百沈何益於成敗之數乎故春秋貶人之髙氏曰魯使卿往則諸國必非微者獨得臣書名氏者詳内且明諸國皆卿行書人以貶之也文公三年之間遂敖得臣累見於經則知魯政盡在諸臣矣漢五行志文公時大夫始專政信夫王氏曰霸國大夫㑹諸大夫伐國自伐沈始㑹諸大夫救患自救鄭始春秋皆貶人之不與大夫之專政也葢舉兵伐人使之畏服所謂威也率衆救人使免於難所謂福也威福人主之利器諸侯擅之則有害於天下大夫擅之則有害於國聖人見微知著故於此二役皆貶之所以戒威福之不可下移也夏五月王子虎卒左傳王叔文公卒來赴弔如同盟公羊傳王子虎天子之大夫也外大夫不卒此何以卒新使乎我也穀梁傳叔服也何以卒之以其來㑹葬我卒之也或曰以其嘗執重以守也王子虎不書爵譏之也天子内臣無外交詳見莊二十三趙氏曰臣無外交之禮今死而赴故書以譏孫氏曰外大夫來赴非禮也臨川吳氏曰王臣無外交以其嘗與魯同盟故來赴然非禮也或曰禮稱尺證反情而為之節文者也三年問禮也者稱人情而為之叔服新使去聲乎我則宜有恩禮矣仲尼脱驂音參於舊館事見檀弓雖卒叔服可也夫脫驂於舊館惡去聲夫涕之無從而為之者輔氏曰義之所可則脱驂於舊館而不吝滙澤陳氏曰惡夫涕之無從者從自也若不脱驂以賻之則是於死者無故舊之情而此涕為無自而出矣非理之經也天子内臣無外交而以新使乎我致恩禮焉是以私情害公義失輕重之權矣趙氏曰左氏云弔如同盟禮也按天子大夫無與諸侯盟之禮而曰禮也豈春秋之意乎啖氏曰穀梁云叔服也叔服若是王子則㑹葬之時何不書王子乎愚按經未有前書字而後書名者惟尹氏或書子則非一人劉卷前書子而後書名則子者爵也非字也左氏於王子虎稱王叔文公於叔服稱内史叔服則非一人明矣豈有甫越一年而名字異稱耶或者謂虎與卷皆夾輔天子於艱難危困之中故春秋賢而卒之然單穆公旗與劉文公翼贊敬王以安周室亦不書卒竊疑王子虎盟諸侯于王庭劉文公為王官伯尹氏世執朝權皆王室之秉政者故特赴於諸侯而魯史記其卒春秋存而弗削以示王臣不當赴䘮於列國耳秦穆人伐晉襄左傳秦伯猶用孟明孟明增修國政重施於民趙成子言於諸大夫曰秦師又至將必辟之懼而增德不可當也秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎程子傳搆怨連禍殘民以逞晉人畏之而不敢出秦人極其忿而後悔過聖人取其終能悔耳按左氏秦伯伐晉濟河焚舟封殽尸而還音旋其稱人何也聖人作易以懲忿窒慾為損卦之象易大象其辭曰損德之修也繫辭傳春秋諸侯之知德者鮮上聲矣穆公初聽杞子之請違蹇叔之言其名為貪兵左傳秦伯曰詩云大風有遂貪人敗類聽言則對誦言如醉匪用其良覆俾我悖是貪故也孤之謂矣是慾而不能窒也及敗於殽歸作秦誓庶幾能改將窒其慾矣復扶又反起彭衙之師報殽函之役其名為憤兵前魏相傳爭恨小故不忍憤怒者謂之憤兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破是忿而不能懲也張氏曰穆公既歸自殽而作秦誓矣然彭衙及此役猶以報復為事豈非悔過之心不能勝其恥敗之心而至此乎今又濟河取郊人之稱斯師也何義哉檀弓吳侵陳斬祀殺厲夫差曰師必有名人之稱斯師也者則謂之何太宰嚭曰古者不斬祀不殺厲今斯帥也其不謂之殺厲之師與晉人畏秦而不出穆公逞其忿而後悔自是見伐不報始能踐自誓之言矣是故於此貶而稱人備責之也通㫖濟河焚舟之師非義舉也自是而後不復報晉聖人取其終能悔而改爾仲尼以恕與人君子大改過陳氏曰此秦伯也曷為貶稱人殽之誓孔子有取焉而秦穆之連兵無虛歳故自韓原秦不以爵見於經愚按穆公自誓之言追咎既往之失而冀將來之善不貴勇夫而貴良士惡􅎱疾而思彦聖期以保邦為念諄諄懇惻誠可為有天下國家者之法則夫子取之以繼四代之書而門人引之以釋大學平天下章可謂善言矣胡乃不踐其言終用孟明報復至再必以勝晉而後已故書取其言而春秋責其事也説春秋者因左傳有霸西戎之一語而史記謬稱穆公益國十二開地千里天子使召公賀以金鼓然考傳之所記則踰二年而穆公卒其謂焚舟伐晉而遂霸者已非事實况證以經之書法自戰韓稱爵其後終穆公之身並以人書殽之役且以號舉反不若楚莊之見於經並紀其爵則許穆公以伯者妄矣秋楚穆人圍江左傳楚師圍江晉先僕伐楚以救江薛氏曰報沈之役也臨川吳氏曰自齊桓之霸江黄以近楚之國而從齊故楚憾之之深前既滅黄矣而未加兵於江者葢江猶能守其國也故至今年有圍江之師髙氏曰貫澤之盟江從中國楚自城濮之役亦不敢侵伐今晉文既没襄公不能討商臣弑逆之惡故楚人輕視中國復有窺諸侯之意而圍江以試之也雨螽于宋成雨于付反左傳隊而死也公羊傳死而隊也何以書記異也杜氏曰自上而墮有似於雨來告故書唐陳氏曰不曰宋雨螽如宋大水之例考其實如雨之多自天而墜到地之死明矣趙氏曰榖梁云著於上見於下謂之雨假如有一物著於上見於下豈得云雨哉螽自空而下下又多有似於雨爾歴代有雨血雨毛雨土皆是也愚按外異因來告而書公羊云為王者之後記異榖梁以為災甚非也冬公如晉襄十有二月己巳公及晉侯襄盟左傳晉人懼其無禮於公也請改盟公如晉及書侯盟晉侯享公張氏曰不書地盟于晉都也髙氏曰公之如晉葢朝也非為盟也晉人於是請改盟夫盟已定矣又何改為公宜固辭乃復與盟皆非禮也愚按前此未有因朝聘而盟于國都者諸侯有不協之故則期㑹于某地而牲歃以謀信已非盛世之事况因其朝聘而要之哉前年朝晉晉既以處父盟公于其國此年雖云改盟而猶要公之朝以約誓於國都甚矣文公之屈辱也晉襄苟懼其無禮曷不為㑹于晉魯之間以相盟乎厥後荀庚孫良夫卻犨孫林父向戌且因聘魯而要盟矣又其甚則杞子以三恪之君亦即魯而歃盟焉始也魯君盟於伯國繼也諸侯盟于魯世變可知矣晉襄陽處父帥師伐楚穆以救江公穀無以辱左傳晉以江故告于周王叔桓公晉陽處父伐楚以救江門于方城遇息公子朱而還公羊傳此伐楚也其言救江何為緩也其為緩奈何伐楚為救江也穀梁傳此伐楚其言救江何江逺楚近伐楚所以救江也以者不以者也孫氏曰先言伐楚而後言以救江者惡不能救也楚人圍江陽處父帥師不急赴之乃先伐楚欲其引兵自救而江圍解非救患之師也故明年楚人滅江救江善矣其書以何楚嘗伐鄭矣齊桓公逺結江黄合九國之師於召音邵陵然後伐鄭之謀罷又嘗圍宋矣晉文公許復曹衞㑹四國之師於城濮然後圍宋之役解今江國小而弱非能與宋鄭比楚人圍之必不待徹四境屯戍守禦之衆與宿衞盡行也當是時楚有覆載不容之罪據商臣弑頵晉主夏盟宜合諸侯聲罪致討命秦甲出武闗戰國策張儀云秦舉甲而出武闗齊以東兵畧陳蔡而南處父等兵方城之外楚必震恐而江圍自解矣范氏曰楚國有難則救圍自解計不出此乃獨遺一軍逺攻强國豈能濟乎故書伐楚以救江言救江雖善而所以救之者非其道矣此春秋紀用兵之法也陳氏曰晉大夫書帥師於是始大夫强也永嘉吕氏曰春秋之初有以大夫帥師者矣未有若陽處父之專伐也内大夫帥師而不氏者則無駭帥師入極溺㑹齊師伐衞是也内大夫帥師而氏者公子慶父帥師伐於餘丘公孫兹帥師㑹侵陳是也而外大夫則未有帥師而出主名者若陽處父則帥師而出主名矣以見征伐之自大夫出也張氏曰楚商臣無父無君乃致患於江是禽獸逼人之甚以中國諸侯為己任者豈得安居而以討罪之任付之大夫而已乎晉襄不能率諸侯乗此時誅之此春秋特書以正其不能奉天討之罪也臨川吳氏曰江以從中國而受楚之伐中國伯者所當救也處父畏楚兵之强不敢徑趨江之城下乃揚言伐楚以救江門于方城一見息公之來即避之而返既不能救江又不能伐楚其為畏怯也明矣愚按春秋書侵伐多不言所事而此書伐以救實為特筆考於傳之所録非惟楚侵陳以救鄭伐鄭以救齊不書雖齊桓伐厲以救徐亦止書伐厲而不書以救也豈非責處父既不能伐楚又不能救江而特起伐以救之文以罪之歟經書中國加兵於楚者三惟齊桓聲包茅不貢之罪而得屈完之服處父有伐楚之名而無討楚之實晉定公㑹十八國于召陵有伐楚之勢而僅為侵楚之陋春秋葢深惜之也劉氏曰何休云若兩之當先言救非也若實伐楚又往救江豈非兩之乎明此但脱以字爾戊襄王二戌十九年四年晉襄五齊昭十衞成十二蔡莊二十三鄭穆五曹共三十陳共九把桓十四宋成十四秦穆三十七楚穆三春公至自晉愚按自是公如皆致如晉者凡二十書至者十有三皆所以著其去國踰時之久或執或辱故危之也始也文公如晉則有處父要盟之恥而不書至迄其終也昭定六如晉而不見納書至河乃復焉又不若書至之為愈矣人君舉動之得失可不慎哉據事直書而義自見謂此類也夏逆婦姜于齊昭左傳卿不行非禮也君子是以知出姜之不允於魯也貴聘而賤逆之君而卑之公羊傳其謂之逆婦姜于齊何畧之也穀梁傳曰婦有姑之辭也其不言氏貶之也何為貶之也夫人與有貶也程子傳納幣在䘮中與䘮婚同也稱婦姜已成婦也不稱夫人不可為小君奉宗廟也不書逆者雖卿亦失其職也逆皆稱女以未成婦而女者在父母家之所稱也曾子問女未廟見未成婦往逆而稱婦入國不書至何哉此春秋誅意之効也禫徒感反除服祭名鄭氏曰澹澹然平安之意制未終思念娶事是不志哀而居約矣方逆也而已成為婦未至也而如在國中原其意而誅之也不稱夫人姜氏者亦與音預下同有貶焉婦人不專行何以與有貶父母與有罪也文公不知敬其伉儷違禮而行使國亂子弑齊人不能鑒微知著冐禮而往使其女不允於魯皆失於不正其始之過也夫婦之際人倫之首禮不可不謹也故交貶之以為後鑒劉氏曰夫婦之際人倫之首故鑒末以原本因微以知著文公闇弱惰慢不能率禮而行以謂苟若而可何禮之守故夫人不安其位終卒至於禍又非獨文公之罪雖夫人預有罪矣夫人不能早避䘮娶之辱冐大禮以往國人皆賤之遂無所據依以危其身而亡其子由本不正故也殆而呼天不亦晩乎文公之不能保其後嗣者由無以刑其妻夫人之不能安其位由無以謹於禮也張氏曰聖人嚴吉凶之辨葢人之所以異於禽獸者正以有父子之親而三年之䘮哀戚之至也國君為風教之首而納幣於䘮中春秋變逆女為逆婦姜不成其夫人之禮以見人倫之本已失何以正是國人為後嗣之基乎唐陳氏曰吉凶之禮苟公不自行大夫不涖事則第書其事不書其人則必㣲者斯春秋之規矩也文公使卿納幣而使微者逆是公以禮聘之而不以禮逆之宜其不終也愚按春秋一經書逆夫人惟此年最畧既不書逆者名氏又不書如齊不稱夫人不言氏不書至豈非聖人責文公首紊通䘮之禮而然歟宣公之娶尤亟而書法加詳事同而既貶則從同同也劉氏曰左氏云卿不行非禮也假令卿行獨可謂之禮乎公羊云娶乎大夫畧之也此雖無他證据然魯初納幣乃用上卿審娶大夫者禮豈如此崇乎穀梁云逆者誰也親逆而稱婦或者公與曰公也非也穀梁既云親迎而稱婦則稱婦宜也又何以見其非成禮於齊乎且令非成禮於齊云公如齊逆婦姜足矣文不當没公狄侵齊昭愚按狄自箕之敗至是始復侵齊以晉襄無攘却之謀而齊伯不紹故也王氏曰大國如齊狄侵者四則其他邢衞魯鄭不足怪也秋楚穆人滅江左傳楚人滅江秦伯為之降服出次不舉過數大夫諌公曰同盟滅雖不能救敢不矜乎吾自懼也臨川吳氏曰晉襄陽為救之之名而無救之之實江之受圍周一朞而其國竟滅晉霸不競而荆蠻得以肆其虐於小國可哀也夫愚按公羊云入不言圍書其重者江黄二國從中國而致滅黄書伐而江書圍皆著中國之不能救也滅者亡國之善辭上下之同力江黄之君不書奔不書以歸則能固守待援而死於其位又可知矣晉侯襄伐秦穆左傳晉侯伐秦圍邧新城以報王官之役程子傳秦逞忿以伐晉晉畏而避之其見報乃常情也秦至此能悔過矣故不復報晉聖人取其能遷善也稱晉侯不復加譏見秦宜得報而自悔不復修怨乃其善也晉人三敗必邁反下敗狄同秦師僖三十三敗殽文二年春戰彭衙冬伐秦取汪及彭衙見報乃常情耳而穆公濟河焚舟則貶而稱人秦取王官及郊未至結怨如晉師之甚也襄公又報之於常情過矣而得稱爵何也聖人以常情待晉襄而以王事責秦穆所以異乎朱子語謂書晉侯而以常情待晉襄書秦人而以王事責秦穆恐未必如此程子所謂微辭隱義未易言也襄公忘親背音佩惠大敗秦師敗狄伐許怒魯侯之不朝也而以無禮施之是專尚威力先事加人莫知省德而後動也今又報秦不足罪矣穆公初敗於殽悔過自誓增修德政宜若過而知悔悔而能改又有濟河之役則非誓言之意所以備責之也然晉襄見伐而報猶無譏焉秦穆至是見伐而不報善可知矣不譏晉侯所以深善秦伯春秋大改過嘉釋怨王者之事也故仲尼定書列秦誓於百篇之末以見悔過能改而不責人雖聖賢誥命不越此矣通㫖穆公悔過極晩取王官封殽尸之後晉侯來伐秦伯於是悔改不復往報聖人所以取之以此見與人為善之路廣矣張氏曰晉襄以王官之役不報為恥未若商臣得志於江為恥之大也報秦而不誅商臣使亂臣賊子得以夷滅小弱逞其凶毒晉襄之為盟主末矣此事書之深罪晉侯不以江亡為恥而敵秦怨也家氏曰春秋書楚人滅江晉侯伐秦責其當救而不救不當伐而伐罪晉深矣書晉侯非善之以其狥私報怨之過甚亟戰而不知戢故目其人而責之王氏曰隠公以來政在諸侯若大夫專政則例貶稱人文公以後政在大夫若諸侯有罪則出爵以貶此例之變也猶宣九年齊侯伐萊成四年鄭伯伐許皆貶之也衞侯成使甯俞來聘左傳衙甯武子來聘公與之宴為賦湛露及彤弓臨川吳氏曰自垂隴之㑹衞執孔達以説晉前年衞從晉伐沈遂服霸主今年春晉歸孔達夏衞侯朝晉至秋而來聘焉事大睦鄰以安社稷或者皆武子之謀也夫子稱其知可及者葢如此冬十有一月壬寅夫人風氏薨程子傳自成風以後妾母稱夫人嫡妾亂矣仲子始僭尚未敢同嫡也杜氏曰莊公妾僖公母風姓也赴同祔姑故稱夫人風氏僖公之母莊公妾也而稱夫人自是嫡妾亂矣語曰邦君之妻邦人稱之曰君夫人稱諸異邦曰寡小君馮氏曰是時嫡妾不正稱號不審夫子嘗言古禮如此故記之正其名所以責其實也葢敵體之稱也若夫妾媵以證反則非敵矣其生亦以夫人之名稱號去聲之據僖八年用致夫人乃成風也其没亦以夫人之禮卒葬之陳氏曰夫人某氏嫡稱也喪之以夫人之禮也隠公之喪桓母猶有疑焉是故别廟也祔姑稱諡伉然如夫人則自文公之喪成風始非所以正其分扶問反也以妾媵為夫人徒欲尊寵其所愛而不虞卑其身以妾母為夫人徒欲崇貴其所生而不虞賤其父卑其身則失位賤其父則無本越禮至是不亦悖乎夫禮庶子為君為去聲其母無服不敢貳尊者也儀禮喪服傳大夫以上為庶母無服服問君之母非夫人則羣臣無服春秋於成風記其卒葬各以實書不為異詞者謹禮之所由變也陸氏曰自成風之後妾母皆僭用夫人之禮故亦書薨著其非禮薛氏曰妾母為夫人僭也僭則何以取乎春秋不没其實也朱子語僖公成風與晉簡文帝鄭太后一也皆所以著妾母之義愚按嫡妾之分乃人君所當謹以妾母為夫人必致以妾為嫡以妾為嫡必致庶孽奪正之禍敬嬴之殺惡及視乃習視僖文之尊成風而動於為惡也後世妾母皆稱太后或妾死而加以皇后之號又其甚則唐髙宗立武昭儀為后而致移其宗社矣朱子於綱目書尊帝母貴人為太后又或書立貴嬪某氏為皇后或曰立婕妤某氏為皇后或曰立婢某氏為后葢取法春秋譏成風之例然春秋隠其辭而綱目直斥本稱者春秋乃本國之史而綱目則筆削前代之史故不同也已襄王三亥十年五年晉襄六齊昭十一衞成十三蔡莊二十四鄭穆六曹共三十一陳共十杞桓十五宋成十五秦穆三十八楚穆四春王正月王襄使榮叔歸含且賵含户暗反賵撫鳳反公羊傳含者何口實也其言歸含且賵何兼之榖梁傳含一事賵一事也其曰且志兼也程子傳天子成妾母為夫人亂倫之甚失天理矣不稱天義已明稱叔存禮也范氏曰榮叔天子之上大夫也榮采地叔字珠玉曰含何氏曰天子以珠諸侯以玉大夫以碧士以具春秋之例也車馬曰賵榖梁隠元乗馬曰賵具玉曰含歸含且賵者啖氏曰承上言成風薨不言來可知也厚禮妾母也據仲子止歸賵此兼含賵杜氏曰成風莊公之妾天子以夫人禮賵之趙氏曰譏天王厚禮妾母也不稱天王者弗克若天也泰誓夏桀弗克若天注不能順天春秋繫音繼王於天以定其名號去聲者所履則天位也所治則天職也本孟子所勅而惇之者則天之所叙也所自而庸之者則天之所秩也所賞所刑者則天之所命而天之所討也本書臯陶謨夫婦人倫之本王法所尤謹者今成風以妾僭嫡王不能正又使大夫歸含賵焉而成之為夫人陳氏曰賵常事不書惟賵仲子成風特書之則遂命為夫人也春秋之初猶以為非常事也宣之敬嬴襄之定姒昭之齊歸雖命為夫人不復書矣孟子卒不赴于京師孔子曰夫人之不命於天子自昭公始也則王法廢人倫亂矣是謂弗克若天而悖其道非小失耳故特不稱天以謹之也劉氏曰不知者乃謂天子賵人之妾小過耳而譏之深求車殺母弟大惡也而譏之畧是不及知春秋正人倫之意也君臣也父子也夫婦也治之三綱也道莫先焉桓以臣弑君而王命之成風以妾僭嫡而王成之於是三綱廢矣是去人之所以為人也王之無天不亦明乎愚按禮經天子諸侯於妾無服而周官職喪掌諸侯之喪及卿大夫士凡有爵者之喪亦不及邦國夫人之喪也今王臣含賵則是魯以成風之喪赴於京師矣夫人之喪猶不當赴于王况妾母乎王之賜以含賵其責已深而魯之往赴其罪亦不可揜矣春秋王禮之施於魯者惟桓文二公為數且盛而紊瀆三綱有如此者亦可悲夫趙氏曰公穀皆云兼之非禮也據禮含賵禭止一人兼行爾若每事須一人則罄王朝之臣不足以充喪禮之使也劉氏曰鄰國含賵禭猶共一大夫况王者於其臣妾乎穀梁又云其不言來不周事之用也亦非也宰咺言來豈周事之用者乎三月辛亥葬我小君成風公羊傳成風者僖公之母也仲子雖聘非惠公之嫡也正室曰嫡春秋之初尚以為疑故别為去聲立宫而羽數特異見隠五年此雖非禮之正然不祔音附于姑猶有辨焉至是成風書葬乃有二夫人祔廟而亂倫易紀無復辨矣故禮之失自成風始也啖氏曰自文公葬成風之後乃有二夫人祔廟非禮也蘇氏曰仲子非惠公之嫡故特為之立宫而不祔不書其葬葢禮之正也自成風以來妾母皆葬葢祔也魯禮之變自此始矣髙氏曰既以夫人之禮薨之復以小君之禮葬之又别為之諡焉書實以示譏也愚按後世以妾母為正嫡至于襄事乃黜正嫡而以嬖妾合葬焉如中宗之葬乾陵嚴善惡諌而弗止循襲而莫知其失矣孰有如漢之孝文自謂側室之子而不以為嫌者乎王襄使召伯來㑹葬召音邵榖作毛左傳榮叔來含且賵召昭公來㑹葬榖梁傳㑹葬之禮於鄙上程子傳天子以妾母同嫡亂天理也故不稱天聖人於此尤謹其戒杜氏曰召伯天子卿也召采地伯爵也王臣下聘桓公冢宰書名示貶據書渠伯糾而大夫再聘則無譏焉據仍叔家父書字不書名或以為從同同也或以為同則書重也公羊莊四不可勝譏擇其重者而譏焉其餘從同同注輕者從義與重者同榖梁宣二志同則書重成風薨王使榮叔歸含且賵既不稱天矣及使召伯來㑹葬又與音預貶焉何也歸含且賵施於妾母已稠疊矣又使卿來㑹葬恩數有加焉春秋君夫人葬惟僖公及成風王使大夫來㑹是將祔之於廟也而致禮於成風盡矣聘一也含賵而又葬則其事益隆亂人倫廢王法甚矣再不稱天者聖人於此尤謹其戒而不敢畧也髙氏曰再不言天深貶之也蜀杜氏曰薨而賵含尚曰不可况又使卿㑹葬乎故復去天以示義家氏曰天子之於諸侯有㑹葬之禮非所以施之妾母也元年書叔服此年書召伯五年之間後先兩㑹葬或稱天王或王不稱天比事而觀著義豈不甚明乎陳氏曰王不稱天於追錫桓公見之至是再見以夫人之禮喪成風也莊僖之際天下知有盟主而已而襄王之季年更有事於諸侯於是叔服㑹葬毛伯錫命尤汲汲於魯也尤汲汲於魯而何為乎成風一人賵含之一人葬之以是懐諸侯吾見周之益陵夷矣宰咺嘗以賵妾母貶則召伯何以不貶王公一體也宰書名則王不待貶而自見王不稱天則召伯不待貶而自見也桓以少篡長成風以庶亂嫡王道熄矣而莊襄不能正又從而褒賞之是以天命施之天討也故皆不稱天劉氏曰左氏曰禮也非也庶子為君為其母無服不敢貳尊者也妾母稱夫人王不能正又使公卿㑹葬何禮之有何休謂去天者不及事天子㑹葬諸侯而有早晚小失耳未可集以為過也何至遂貶去天乎夏公孫敖如晉襄髙氏曰王含且賵又來㑹葬矣捨天王而謹事晉不待貶而惡見也臨川吳氏曰三年之冬公朝晉今又使卿往聘焉魯之謹於事霸王也魯臣如晉聘者二十四致禭㑹葬者又四焉始於公子遂而終於季孫斯仲孫何忌或疎或數或無所為或有所為考其時與事而得失見矣秦穆人入鄀音若左傳初鄀叛楚即秦又貳於楚夏秦人入鄀杜氏曰鄀本在商密秦楚界上小國遷於南郡鄀縣張氏曰今襄陽宜城縣地有鄀故城愚按鄀本國今汴梁路鈞州密縣後遷襄陽路宜城縣髙氏曰鄀盖微國秦以其叛而入之後遂為楚所并楚昭王復國之後畏吳之强去郢而都鄀矣秋楚穆人滅六左傳六人叛楚即東夷秋楚成大心仲歸帥師滅六冬楚子燮滅蓼臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸德之不建民之無援哀哉杜氏曰六國今廬江六縣任公輔曰地譜壽州安豐縣有六國故城愚按今廬州路六安州臨川吳氏曰晉襄公死期將及故其志氣不能如初年之盛紹霸之業浸以衰㣲故西戍之秦南蠻之楚敢於肆行中國吞噬弱小而無所忌也冬十月甲申許男業卒僖公也在位三十三年子錫我嗣是為昭公庚襄王三子十一年六年晉襄七卒齊昭十二衞成十四蔡莊二十五鄭穆七曹共三十二陳共十一把桓十六宋成十六秦穆三十九楚穆五春葬許僖公夏季孫行父如陳共左傳臧文仲以陳衞之睦也欲求好於陳季文子聘于陳且娶焉杜氏曰臣非君命不越竟故因聘而自為娶范氏曰行父季友孫臨川吳氏曰此亦行父欲迎婦於陳而請於君借聘禮以行前此魯陳未嘗有邦交也愚按季友如陳者再今行父之往葢因其祖之舊好假公室之聘而圖昏耳春秋特書公子友葬原仲而行父之娶于陳公孫茲娶于牟嬰齊娶于莒皆止書如所以貶季友之私行而不予行父茲嬰齊因聘以濟其私欲也自逆猶可敖如莒涖盟而代弟逆婼聘宋而為意如逆則又甚矣秋季孫行父如晉襄左傳季文子將聘于晉使求遭喪之禮以行其人曰將焉用之文子曰求而無之實難過求何害朱子曰季文子三思而後行如使晉而求遭喪之禮以行亦其一事也愚按王制諸侯於天子比年一小聘三年一大聘五年一朝文公即位六年君朝於晉者再而貴卿比年往聘過於事天子之禮而京師之朝終其世不見於經葢諸侯知有霸主而不知有王也八月乙亥晉侯驩卒驩喚官反公作讙襄公也在位七年左傳晉襄公卒靈公少晉人以難故欲立長君趙孟曰立公子雍賈季曰不如立公子樂趙孟使士㑹如秦逆公子雍賈季亦使召公子樂于陳趙孟使殺諸郫穆嬴日抱大子以啼于朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君將焉寘此出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏偪乃背先蔑而立靈公冬十月公子遂如晉杜氏曰卿共葬事文襄之制愚按鄭子太叔曰先王之制諸侯之喪士弔大夫送葬稽之於經前此未有使卿送葬者雖桓文之霸止遣微者㑹葬葢晉文昉為霸令使大夫弔卿共葬事故叔孫婼葬平公季孫意如葬昭公馴致少姜以妾媵而諸侯使卿㑹葬矣葬晉襄公杜氏曰三月而葬速愚按趙盾患秦之送公子雍欲禦秦師故急於襄事也晉靈殺其大夫陽處父晉狐射姑出奔狄射音亦穀作夜左傳晉蒐于夷舍二軍使狐射姑將中軍趙盾佐之陽處父至自温改蒐于董易中軍陽子成季之屬也故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是始為國政賈季怨陽子之易其班也而知其無援於晉也使續鞠居殺陽處父晉殺續簡伯賈季奔狄公羊傳君將使射姑將陽處父諫曰射姑民衆不説不可使將於是廢將陽處父出射姑入君謂射姑曰陽處父言曰射姑民衆不説不可使將射姑怒出刺陽處父於朝而走榖梁傳稱國以殺罪累上也襄公已葬其以累上之辭言之何也君漏言也晉將與狄戰使狐夜姑為將軍趙盾佐之陽處父曰不可古者使仁者佐賢者今趙盾賢夜姑仁其不可乎襄公曰諾謂夜姑曰吾始使盾佐女今女佐盾矣夜姑曰敬諾襄公死處父主竟上之事夜姑使人殺之公羊子曰晉殺其大夫陽處父則狐射姑曷為出奔射姑殺也射姑殺則其稱國以殺何君漏言也何氏曰漏泄也自上言泄下曰漏易曰不出戸庭无咎節卦初九爻辭朱子本義節有限而止也程子傳戸庭戸外之庭當節之初戒之謹守至於不出戸庭則无咎也何謂也子曰亂之所生則言語以為階君不宻則失臣臣不密則失身幾事不密則害成是以君子慎宻而不出也朱子本義此夫子繫辭釋節卦初九爻義愚按人之所節唯言與行而言尤所當謹以防輕泄則招殃咎故夫子獨以言言之也凡書殺者在上則稱君如佞夫稱天王痤申生稱宋公晉侯在下則稱氏如楚棄疾殺比稱公子陳招殺偃師稱陳侯之弟在衆則稱人如禦寇先却稱陳人晉人州吁無知稱衞人齊人之類在微則稱盜如鄭公子騑陳夏區夫之類君與臣同殺則稱國如鄭申侯楚得臣之類今殺處父者射姑耳君獨以漏言故亦預殺焉所以為後世戒也范氏曰親殺者夜姑而歸罪於君明由君言而殺之罪在君也陸氏曰射姑專殺其惡易知晉侯漏言其責難見春秋之作明微也故以累上書之以戒天下之為人君者也王氏曰詩曰紹庭上下陟降厥家謂人君陞黜大臣當由直道也襄公儻以大公至正之道上下其臣雖予奪不盡當人亦退聽而無所歸咎今乃漏言於射姑嫁怨於處父則是處父之罪襄公致之矣或以處父為侵官左傳非歟曰人君用人失當去聲則其國必危凡立于朝者舉當諌君况身為晉國之太傅邪據左傳稱太傅陽子若以為侵官將相並去聲大臣非其人百官有司失其職在位者當拱黙自全隂聽人主之所為至於顛危而不救則將焉音煙用彼相乎劉氏曰改蒐易將凡出晉侯何謂處父侵官耶人君任賢不稱必將致敗苟食禄者舉當諌君况處父晉國太傅耶事有不便言之宜矣以為侵官是教大臣拱黙也愚按漢成哀之間張禹王舜輩坐視王氏專僭噤而不言乃所謂拱黙自全者也率天下臣子為持禄容身不忠之行去聲以誤朝迷國者必此侵官之説夫張氏曰據左氏則若晉國之事一聽於陽處父者及考穀梁所謂君漏言則是易中軍乃處父宻言於襄公公不能謹而輕漏之以致射姑之殺處父春秋所以分其殺於君與大夫也臨川吳氏曰是時襄公已卒而書國殺者若曰處父今日之死由襄公漏言之故實襄公殺之也陳氏曰兩下相殺其書國殺何春秋之法苟有賊而不知則其君之罪也是故書胥童殺三卻欒書中行偃殺胥童齊崔杼殺髙厚鄭子展子西殺公子嘉皆稱國而已矣家氏曰射姑以私怨殺一大夫其罪固當誅而處父以私意黨趙氏使盾由是為政於晉擅廢立專刑賞其末流遂有弑君之事然則處父固當言言而以私乃其罪也使處父謂賈季不可舉晉國之賢人使居執政之位則善矣髙氏曰先書晉殺處父繼書射姑出奔則實殺處父之罪自著矣閏月不告月猶朝于廟告音梏下同左傳閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時政也何以為民公羊穀梁傳不告月不告朔也不告月者不告朔也杜氏曰諸侯每月必告朔聽政文公怠慢政事以閏非常月故間不告朔何氏曰不言公者内事可知王氏曰不曰朔而曰月葢朔者月之初吉而月則積日而成也以閏月而不告則一月之政俱不舉聖人變文而書為怠政而設也不告朔則曷為不言朔也因月之虧盈而置閏是主乎月而有閏也愚按有朔而無中者為閏月月有晦朔則自然有閏無閏則失月行之數故曰主乎月而有閏也故不言朔而言月占天時則以星愚按日月所㑹是謂辰以厯言之則是積餘分而置閏以日月星辰觀之則閏月日月亦㑹於辰與他月無以異也授民事則以節候寒暑之至則以氣愚按閏雖無中而節氣在望厯置閏月則不失隂陽節氣之正也百官修其政於朝庶民服其事於野則主乎是焉耳矣閏不可廢乎曰迎日推䇿則有其數史黄帝紀迎日推策注䇿數也日月朔望未來而推之天官書黄帝考正星厯起消息以正閏餘轉璣觀衡則有其象舜典在璿璣玉衡以齊七政蔡氏傳以璿飾璣所以象天體之轉運以玉為管横而設之所以窺璣而齊日月五星之運行猶今之渾天儀歸竒音基於扐音力以象閏數也易大傳朱子本義竒蓍策所揲四數之餘也扐勒於左手中三指之兩閒象閏乃積月之餘日也斗指兩辰之間象也後律厯志閏月無中氣而北斗邪指兩辰之間所以異於他月也象數者天理也非人所能為也故以定時成歲者唐典也通㫖沈存中有去閏之論而堯舜以來以閏月定四時成歲若去閏則歲功熄矣以詔王居門終月者周制也周禮大史閏月詔王居門終月注十二月分在青陽明堂總章𤣥堂左右之位唯閏月無所居故居于門班告如字朔於邦國同上注班布也以十二月朔布告天下諸侯諸侯藏之祖廟至朔朝于廟告而受行之趙氏曰天子常以今年冬班明年正朔於諸侯諸侯受之每月奉月朔甲子以告于廟所謂稟正朔也故曰王正月言王之所以班也因以特牲薦謂之告月亦曰告朔文公以閏非正不行告朔之禮而以朔日但身至廟朝謁而已不以是為附月之餘而弗之數上聲也猶朝于廟者范氏曰受朔于廟者尊事先君不敢自專也幸其不已之詞蜀杜氏曰春秋志文公廢告朔而猶朝廟是幸其禮不盡廢聖人愛禮之深意也髙氏曰苟知朝廟之不可已則告月之禮曷為而可已哉子貢欲去上聲告朔之餼羊子曰爾愛其羊我愛其禮論語朱子注愛猶惜也諸侯月朔以特羊告廟魯自文公始不視朔而有司猶供此羊故子貢欲去之然告朔諸侯所以稟命於君親禮之大者羊存則告朔之名未泯而其實因可舉孔子所以惜之張氏曰閏者所以定四時成歲治厯明時之政必明于此天子以為月而頒之為諸侯而不奉以告是輕正朔而慢時令也孫氏曰春秋二百四十二年閏月多矣獨此書不告月者是當告也啖氏曰公榖言不告月為是非也按經文言不告月明當告也劉氏曰公羊以謂不告朔禮也猶朝于廟非禮也穀梁曰閏月者附月之餘日也天子不以告朔而喪事不數也皆非也閏雖無常而政有常何得勿告乎愚按周天三百六十五度四分度之一日一日一周在天為不及一度積三百六十五日四分日之一而與天㑹為一歲月一日不及天十三度十九分度之七積三百五十四日九百四十分日之二百四十八而與日㑹者十二為一年大率三百六十日為常數一歲多五日九百四十分日之二百三十五分為二十四氣是為氣盈而晝夜長短節氣寒暑於是定焉一年少五日九百四十分日之五百九十二分為十二月是為朔虛而晦朔弦朢於是定焉積歲之有餘就年之不足而後有閏三年一閏尚餘三日有竒五年再閏則少五日有竒積十九年閏在十二月則氣朔分齊大率三十二月則有閏閏前之月中氣在晦閏後之月中氣在朔若厯不置閏則弦朢晦朔皆非其正晝夜平分不在春秋之中而寒暑反易矣故書云以閏月定四時成歲周禮注中數曰歲朔數曰年中朔大小不齊正之以閏乃天地自然之理厯家因其自然而立積分之數以合之耳公羊謂閏月天無是月榖梁謂附月之餘日皆非是夫二十九日九百四十分日之四百九十九而晦朔交則為一月月非有閏之名特以日月行天疾徐之不同而歲年盈縮之有異遂謂之閏天與日月之行自然有閏豈可謂天無是月哉月非有餘也又豈可謂附月之餘哉月之有閏則由乎天而月之名閏乃由於人故於文王在門為閏禮稱天子閏月則聽朔于明堂闔門左扉立于其中王之謹乎閏月者如此而諸侯安可不告月哉考之經傳凡言閏月多在歲終葢是時厯法謬矣每置閏於歲終故左傳以閏三月為非禮則無中者不謂之閏而名曰閏者非閏月矣秦之後九月實倣于此是宜當時之卿大夫以天無是月指為厯家所置而導其君廢告朔之禮也説經者且曰天子不告朔尚何責昏庸之魯文也哉春秋書猶朝廟即聖人愛禮存羊之意謂朔雖不告而朝廟不廢則告朔之禮猶有存者公榖皆曰猶者可以己也杜預亦云可止之辭大失春秋之意葢聖人傷魯文之怠慢政事故特書不告月猶朝于廟若曰不如此而尚幸其如此將已而不遂已是知其不可已而自不能已也與猶三望猶繹之義不同辛襄王三丑十二年七年晉靈公夷臯元年齊昭十三衞成十五蔡莊二十六鄭穆八曹共三十三陳共十二把桓十七宋成十七卒秦康公罃元年楚穆六春公伐邾文左傳間晉難也杜氏曰公因霸國有難而侵小三月甲戌取須句句公作胊其俱反左傳寘文公子焉非禮也杜氏曰絶太皥之祀以與鄰國叛臣僖公反其君之後邾復滅之今邾文公子叛在魯故公使為守須句大夫王氏箋義僖公反其君故不日文公絶其祀故謹而日之愚按僖公雖曰私其母家猶有崇明祀保小寡之義文公乗霸國之喪貪土地而舍逋逃其罪益甚矣劉氏曰公羊云取邑不日此何以日内辭也使若他人然非也僖公嘗伐邾取須朐矣何以不為内辭哉榖梁云取邑不日此其日何也不正其再取故謹而日之亦非也設不日則聽其取乎遂城郚郚音吾榖梁傳遂繼事也杜氏曰因伐邾師以城郚備邾難郚魯邑卞縣南有郚城張氏曰今在襲慶府泗水縣愚按泗水縣今屬濟寧路兖州文公以邾叛臣守須句之地又重勞民力城内邑以防邾師之至心有慊焉故畏鄰國之伐而不知愈重其過也夏四月宋公王臣卒穀作壬臣成公也在位十七年其弟禦殺世子而自立國人殺禦而立其少子杵臼是為昭公髙氏曰以國亂故不日不葬凡治則禮詳亂則禮畧宋昭人殺其大夫左傳宋成公卒於是公子成為右師公孫友為左師樂豫為司馬鱗矔為司徒公子蕩為司城華御事為司寇昭公將去羣公子樂豫曰公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根故君子以為比况國君乎此諺所謂庇焉而縱尋斧焉者也必不可不聽穆襄之族率國人以攻公殺公孫固公孫鄭于公宫六卿和公室樂豫舍司馬以讓公子卬書曰宋人殺其大夫不稱名衆也杜氏曰不稱殺者及死者名殺者衆死者無罪書宋人者國亂無政非君命而衆人擅殺之也詳見莊二十五年傳杜氏曰二子在公宫為亂兵所殺髙氏曰貶責無所寄直志其衆亂無政而已大夫不名義繫於殺大夫而其名不足紀也陸氏曰非君意而殺之者衆不可書名特加人字以别之又明死者無罪臨川吳氏曰穆襄之族率國人人衆非一人也故稱宋人死者不幸而遭亂兵非有可殺之罪故不書名陳氏曰終昭公之世不名其大夫春秋有天下之辭有一國之辭有一人之辭於晉靈公凡㑹盟皆不序諸侯是天下之辭也於魯莊公凡㑹齊襄皆書人是一國之辭也於魯桓公凡大夫將皆不言大夫於宋昭公凡大夫不名是一人之辭也愚按宋昭方居諒隂而欲去羣公子以啟亂階致公族之悖逆而大夫受其咎明年復殺司馬而逐司城經書宋公王臣卒宋人殺其大夫明年又書宋人殺其大夫司馬宋司城來奔以見嗣君之無政先君在殯而國人作亂以戮其大夫踰年而掌兵之官見誅守國之官見逐皆書宋人而昭公之為君可知矣曽未十年而有帥甸之弑經以大惡係之宋人所以備責昭公不足為宋人之君也趙氏曰公羊云何以不名宋三世無大夫三世内娶也以三世内娶便云三世無大夫不近人理榖梁云稱人以殺誅有罪也若實殺有罪何以不書死者之名乎戊子晉靈人及秦康人戰于令狐晉先蔑奔秦令力呈反蔑公作昧奔上有以師字左傳秦康公送公子雍于晉曰文公之入也無衞故有吕卻之難乃多與之徒衞趙盾將中軍先克佐之荀林父佐上軍先蔑將下軍先都佐之以禦秦師及堇隂宣子曰我若受秦秦則賔也不受宼也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐宼如追逃軍之善政也訓卒利兵秣馬蓐食潛帥夜起敗秦師于令狐至于刳首先蔑奔秦士㑹從之公羊傳此偏戰也何以不言師敗績敵也其稱人何貶也先昧不言出在外也榖梁傳不言出在外也輟戰而奔秦以是為逃軍也程子傳晉始逆立公子雍既而悔之故秦興兵以納之晉不謝秦秦納不正皆罪也故稱人晉懼秦之不肯已而擊之故書晉及杜氏曰先蔑不言出在外奔令狐晉地在河東張氏曰河中府猗氏縣有令狐城愚按河中府今屬平陽路按左氏襄公卒太子幼晉人欲立長上聲君趙孟使先蔑如秦逆公子雍如字秦康公以師納之襄夫人日抱太子以啼于朝曰舍音捨適音嫡嗣不立而外求君將焉音煙寘此諸大夫畏逼乃背音佩先蔑立靈公趙盾將去聲中軍以禦秦潛師夜起敗必邁反秦師于令狐先蔑奔秦程氏以為晉不謝秦秦納不正皆罪也故稱人王氏箋義既貶宣子又貶秦伯罪各當誅陳氏曰宋襄公納齊孝公戰于甗貶稱師秦康公送晉公子雍戰于令狐貶稱人秦晉之交兵於是再世自令狐之後不悉書矣八年秦伐晉取武城不書十年晉伐秦取少梁不書晉懼秦之不肯已而擊之是晉人為志乎是戰者也故書及其貶之如此者使後世臣子慎於廢立之際不可忽也治去聲亂存亡繫國君之廢立事莫重於此矣而可以有誤乎奕者舉棊不定不勝其耦况置君而可以不定乎左傳襄二十五衞太叔文子曰甯子視君不如奕棊奕者舉棊不定不勝其耦况置君而弗定乎張氏曰如左氏説則當書晉人敗秦師于令狐今書晉及秦戰又不言敗者交貶之也然二國之兵晉曲尤甚故秦伯趙盾皆稱人而特以晉及且不書秦師之敗深罪晉人置君而不定也先蔑書奔使秦而逆公子雍罪之也髙氏曰先蔑以自令狐復如秦故不言出也愚按晉襄以前年八月卒十月葬矣秦人豈不知其已立君而至是始納公子雍耶葢趙盾始議求長君而中變其説秦人雖知其立靈公而欲以重兵强納公子雍以爭國也夫康公始為太子送舅氏而念母之不見故作渭陽之詩是固良心也今乃納庶孽而奪嫡甥之位自是兵爭不息豈非怨欲害乎良心而然歟不然春秋釋秦而專罪趙盾矣狄侵我西鄙左傳公使告于晉趙宣子使因賈季問酆舒且讓之張氏曰閒秦晉之平襄陵許氏曰狄懲箕之敗四年閒一侵齊而未敢肆至是復侵魯侵齊侵宋侵衞晉襄既没莫之忌矣髙氏曰魯間晉難而伐邾則狄亦間晉難而侵魯聖人書此罪魯之不自正也秋八月公㑹諸侯晉靈大夫盟于扈左傳齊侯宋公衞侯陳侯鄭伯許男曹伯㑹晉趙盾盟于扈晉侯立故也公後至故不書所㑹凡㑹諸侯不書所㑹後也後至不書其國辟不敏也公羊傳諸侯何以不序大夫何以不名公失序也榖梁傳其曰諸侯畧之也程子傳文公怠政事多廢緩既約晉盟而復後至故書往㑹而隠其不及不序諸侯以見其不在故明年公子遂再往與晉盟也杜氏曰扈鄭地滎陽卷縣西北有扈亭張氏曰今鄭州原武縣愚按原武縣今屬汴梁路諸侯㑹晉趙盾盟于扈為去聲晉侯立也趙盾内專廢置其君公羊傳不與大夫專廢置君外强上聲諸侯為此盟其不名者見音現大夫之强也劉氏曰趙盾既内專廢置其君而又外强諸侯盟王者之法所不當受也故斥而逺之若曰陪臣執國命漸不可長已此非其所得為也襄陵許氏曰諸侯何以不序大夫何以不名大夫而主盟諸侯自扈之㑹始也諸侯不序見音現公之不及於㑹也趙氏曰諸侯不序公不得與之盟也而曰公㑹諸侯盟者言公附於載書也載書不可從附與盟主之大夫敵焉也責公不早赴而自取其恥爾文公怠惰事多廢緩既約晉盟而復扶又反後至故隠其不及罪公之不能自强於政治魯自是日益衰矣劉氏曰左氏云公後至不書所㑹非也按經公與盟矣何謂後㑹乎杜云公後㑹而及其盟此飾非之言㑹盟同地㑹所以為盟也今及其盟不得云後㑹盟重㑹輕不當反責其輕又已稱公㑹諸侯矣豈不及其㑹者乎公羊云諸侯不可使與公盟昳晉大夫使與公盟亦非也諸侯既與公盟矣又何云昳晉大夫乎陳氏曰諸侯何以不序晉始失伯也凡稱諸侯必前目而後凡也前有王人後無王人書曰諸侯盟于某如首止葵丘則王人嘗不與也前无吾君後有吾君書曰公㑹諸侯盟于某如盟薄盟宋則吾君嘗不與也未始有不與者也而但曰諸侯一役而再有事遂圍許盟祝柯盟重丘是也非一役而再有事則非凡辭也非凡辭者散辭也愚按經書大夫之盟不書名氏者三莊公九年書及齊大夫盟時襄公已弑桓公未入齊無君當國大夫自為主而與莊公盟故大夫不書名氏此年趙盾初立靈公專執晉政强㑹八國之君而自主盟亦若晉無君然故趙盾亦不書名氏溴梁之㑹諸侯皆在而十一國之大夫自盟則諸國皆若無君矣故亦但書大夫盟扈之盟書晉大夫霸主失政也溴梁之盟書大夫諸侯皆失政矣冬徐伐莒紀愚按僖十五敗徐婁林此年伐莒徐皆舉號文定昭五年傳曰徐伯益之後始僭稱王王非諸侯所當稱故春秋比諸外域今考僖三年取舒十七年伐英氏皆稱人以其能附中國也㑹申稱子則在㑹諸侯皆非耳公孫敖如莒紀涖盟涖音利公榖作莅左傳穆伯娶于莒曰戴已生文伯其娣聲已生惠叔戴已卒又聘于莒莒人以聲已辭則為襄仲聘焉徐伐莒莒人來請盟穆伯如莒涖盟且為仲逆及鄢陸登城見之美自為娶之仲請攻之公將許之叔仲惠伯諌公止之惠伯成之使仲舍之公孫敖反之復為兄弟如初榖梁傳莅位也其曰位何也前定也其不日前定之盟不日也髙氏曰莒為徐所伐故故來求援而請修洮之盟敖娶于莒故許其盟而請往涖之臨川吳氏曰魯臣每欲娶婦必請於君行聘㑹之禮假公事以遂其私君之无政臣之無禮也况敖代弟逆名尤不正卒以淫奔禽獸之行也壬襄王三十寅三年崩八年晉靈二齊昭十四衞成十六蔡莊二十七鄭穆九曹共三十四陳共十三杞桓十八宋昭公杵臼元年秦康二楚穆七春王正月夏四月秋八月戊申天王崩襄王也在位三十三年世子王臣嗣位是為頃王冬十月壬午公子遂㑹晉靈趙盾盟于衡雍盾徒本反雍於用反左傳晉人以扈之盟來討襄仲㑹晉趙孟盟于衡雍報扈之盟也杜氏曰衡雍鄭地滎陽卷縣髙氏曰衡雍晉文公㑹諸侯朝王之處也夫天王崩諸侯不奔喪而盾遂皆國之正卿乃自相㑹盟于王畿之内惡莫大焉張氏曰後漢河南卷縣有垣􅮯城古衡雍也與扈相近自晉文翟泉之盟付之諸大夫文公復以國事付之公子遂而不知一國之禮樂征伐皆自公子遂出此敬嬴所以得窺伺間隙私事之以胚胎殺適立庶之禍也任氏曰晉魯之用事者㑹盟政在大夫矣愚按衡雍在今汴梁路原武縣之東大夫之專盟始於此前此盟翟泉猶有僖公在㑹也自是而有袁婁之盟雞澤溴梁諸侯皆在而大夫自盟矣于宋于虢則晉楚大夫狎主齊盟而諸侯不復在矣其事自衡雍之盟始也况當是時仲遂已有無君之心而晉討文公之盟扈必要仲遂歃血而後信亦猶成公之沙隨不得見而季孫行父㑹晉卻犨盟于扈昭公弔少姜不見納而季孫宿如晉馴致乾侯之次晉不能修方伯之職而意如㑹荀躒于適歴矣三桓專魯六卿分晉豈一朝一夕之故哉乙酉公子遂㑹雒戎盟于暴雒音洛雒戎左一作伊雒之戎作伊雒戎左傳遂㑹伊雒之戎公孫敖如京師頃不至而復公無而字丙戌奔莒紀左傳穆伯如周弔喪不至以弊奔莒從已氏焉公羊傳不至復者内辭也不可使往也不可使往其言如京師何遂公意也何以不可出遂在外也穀梁傳不言所至未如也未如而曰如不廢君命也未復而曰復不専君命也其如非如也其復非復也唯奔莒之為信故謹而日之也杜氏曰不言出受命而出自外行按左氏公孫敖奔莒從已氏也已氏前年所娶莒女男女人之大欲存焉見禮運寡欲者養心之要孟子養心莫善於寡欲欲而不行可以為難矣論語克伐怨欲不行焉可以為難矣然欲生於色而縱於淫色出於性朱子語文定云色出於性淫出於氣其説原於上蔡此殊分得不是大凡出於人身上道理固皆是性色固性也然不能節之以禮制之以義便是惡孟子云君子不謂性其語便無病目之所視有同美焉本孟子不可掩也淫出於氣不持其志則放僻趨蹶無不為矣敖如京師其書不至而復者言敖無入使去聲于周之意惟已氏之欲從也范氏曰受命而出義無私留書如京師以顯命行于下不書所至以表不去之罪若其已行當如公子遂書至黄乃復孫氏曰公子遂如齊至黄乃復以疾而還義猶不可况敖如京師不至而反乎文公不能誅使之自恣奔莒惡可見矣朱子語只不至而復便是大不恭魯亦不再使人往皆罪也文定只貶他從已氏之過經文元不及此事宋氏曰公不奔喪而卿行是諸侯不有天子也敖如京師不至復是大夫不有諸侯也曰奔者甚公也是公之誠信不及臣下陸氏曰還者事畢復者未畢師還公還自晉歸父還自晉士匃聞齊侯卒乃還事畢也公如晉至河乃復敖如京師不至而復仲遂至黄乃復皆事未畢而復也夫以志狥氣肆行淫欲而不能為之帥所類反至於棄其家國出奔而不顧此天下之大戒也融堂錢氏曰謹獨之不嚴以至縱情而不知檢傷風敗倫為禽獸行而不之恥者在乎不能忍慾愚按春秋書文姜如齊如莒季姬遇鄫子敖奔莒皆所以懲淫欲使人謹之於微漸也春秋謹書其事於敖與平聲何誅使後人為鑒必持其志修窒慾之方也張氏曰國君為天子斬衰敖受命以赴天王之喪廢君命而徒返已為不赦之罪况懐桑中之行而淫奔乎文公容其復而奔魯之無政刑也愚按敖以乙酉如京師而以丙戌奔則受命而不行可知矣豈惟無王實以無君文公既不加壅命之譴於敖又不遣他卿如京師况天王之喪赴告及魯已三越月仲遂盟戎近在王都之側若㒺聞知徐徐遣敖方共弔事文具於不至而亟還以喪考妣之慼而恝然忘情不翅秦越亦不思僖公母子之喪王臣將命者至再而至三也經書乙酉公子遂㑹雒戎公孫敖如京師不至而復丙戌奔莒非獨著敖之罪舉魯國君臣之罪皆不逃聖筆之誅矣螽杜氏曰為災故書宋昭人殺其大夫司馬宋司城來奔左傳宋襄夫人襄王之姊也昭公不禮焉夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公之黨也司城蕩意諸來奔公羊傳司馬司城者何皆以官舉也榖梁傳司馬司城官也來奔不言出舉其接我也程子曰宋王者後得自命官故獨宋卿書官張氏曰司城司空也宋以武公名司空諱之故曰司城初宋昭公將去去聲羣公子樂豫以為不可遂舍音捨司馬以讓公子卬五郎反則卬固昭公之黨欲專宋政而昭公固欲以其弟卬自衞也杜氏曰卬昭公弟夫司馬掌兵之官不選衆舉賢以素有威望為國人所畏服者使居其任乃欲寵其私昵尼質反鮮上聲有不亡者矣公子卬蕩意諸皆以官舉者通㫖列國大夫未有書官者宋卿何以書程氏曰宋王者之後得自命官故獨書爾不備書者省詞也因公子卬蕩意諸不任其官之職華孫以逆族而主兵權所謂因事之變而書之亦猶魯之郊禘云爾陳氏曰未有書官者於是官從其官司馬司城是也未有書字者於是字從其字子哀是也見音現主兵者不能其官至於見殺守土者不能其官至於出奔劉氏曰稱官者不能其官也家氏曰司馬司城皆國之柄臣穆襄之族連歲怙亂固昭公有以致之然為司馬司城者當思所以防患之計乃置之弗戒至於乗釁再作司馬死而司城奔由昭公信任非人以私昵寵臣而在列位既不能慮患於平日復不能制變於臨時也而其君不免失身見弑之禍宜矣通㫖宋人殺其大夫司馬非君命而衆人擅殺之也左氏謂襄夫人因戴氏之族殺卬襄夫人乃君祖母而書法若此者可以見婦人不當與政之意臨川吳氏曰宋人者戴氏之族非一人也見昭公無政而臣庶得以擅殺大夫也石氏曰古者謂君為元首臣為股肱言其一體相待以成未有股肱虧而其體胖也前書宋人殺其大夫葢言死者衆也此年書宋人殺其大夫司馬宋司城來奔葢言官者殆盡也卿佐大夫君之所倚以立者也司馬司城國之所恃以安者也大夫既殺司城又奔枝葉皆落爪牙盡去君孰與處哉啖氏曰左氏云司馬握節以死故書以官司城効節於府人以出公以其官逆之亦書以官皆貴之也葢舊説言此二人不失節故誤謂節義為符節也如孔父義形於色而誤為女色爾公羊云曷為以官舉宋三世無大夫三世内娶也按此見以官稱是有大夫曷云無乎劉氏曰榖梁云其以官稱無君之辭也鄭氏解云謂無人君之德非也晉殺其大夫卻錡卻犨卻至並尸三卿亦可謂無君德者曷為不以官稱之春秋胡傳附録纂疏卷十四
