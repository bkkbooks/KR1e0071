body:
  text: 春秋胡傳附錄纂疏卷八元汪克寛撰莊公中丙莊王申二年九年齊桓公小白元年晉緡二十衛惠十五蔡哀十鄭厲十六子儀九曹莊十七陳宣八杞靖十九宋閔七秦武十三楚文五春齊人殺無知左傳初公孫無知虐于雍廪雍廪殺無知殺無知者雍廪也而曰齊人者討賊之辭也劉氏曰雍廪殺之其稱人討賊之辭也弑君之賊人人之所惡去聲夫人之所得討故稱人人者衆辭也先師曰聖人以討賊寄之人人亂臣賊子無容足之地矣無知不稱君已不能君齊人亦莫之君也陳氏曰州吁之弑衛人為之變不踰年卒討之無知之弑齊人亦為之變踰年卒討之故無知不成君而雍廪得書人國猶有臣子也春秋之初王道猶未墜人心猶止於禮義也齊詩為㐮公作者六以齊㐮不道詩人屢致意焉冀幸一悟而長惡不已至於遇弑然猶不忘討賊之義也家氏曰齊商人楚䖍曠嵗歴年然後假手他人以迄天討既為臣民所君雖欲用州吁無知之例名之曰賊以匹夫討有不可得矣愚案春秋之例稱人以殺而但名之則討有罪也稱人以殺而不去其官則非討賊也經書殺弑賊者十州吁無知陳陀夏徴舒晉里克衛寗喜齊商人楚䖍公子比蔡般是也州吁無知國人能自討賊陳佗徴舒待蔡人楚人討之無臣子矣然皆以討賊書之也晉惠因里克弑君而得國衛獻因甯喜弑君而復國利其所為使復為大夫既又忌而殺之非討賊也故以國殺大夫為文楚棄疾誘比以為君之利而俾當弑君之名既而殺之意在代其位亦非討賊也故以兩下相殺為文齊商人楚䖍蔡般則國人君之諸侯㑹之不知其為賊矣故春秋亦不得用討賊之例也劉氏曰穀梁謂無知之挈失嫌也稱人以殺大夫殺有罪也非也無知弑君以代其位不可復氏公子上有齊人下有無知明無知者齊人之賊亦不煩再氏國又無知非大夫而以殺大夫例解之失指公及齊大夫盟于蔇蔇其器反公榖作暨左傳初㐮公立無常鮑叔牙曰亂將作矣奉公子小白奔莒亂作管夷吾召忽奉公子糾來奔公及齊大夫盟于蔇齊無君也公羊傳公曷為與大夫盟齊無君也何以不名為其謀與大夫盟也使若衆然榖梁傳公不及大夫大夫不名無君也盟納子糾也杜氏曰蔇魯地琅琊繒縣北有蔇亭張氏曰今沂州承縣愚按沂州今属益都路及者内為志髙氏曰此盟盖公意大夫不名者義繋於齊而不繋於大夫之名氏也張氏曰大夫齊之太宰稱大夫以其任一國之事而表異之故不名也與文七年趙盾書大夫同曰公及齊大夫盟者譏公之釋父怨親仇讎也趙氏曰納讐人之子損禮而盟大夫故盟書公及言大夫以明非大夫之罪也所以異於髙傒及處父也或曰以徳報怨寛身之仁見表記何以譏之也曰徳有輕重怨有深淺怨莫甚於父母之仇而徳莫重乎安定其國家而圖其後嗣也劉氏曰仲尼正天下之義明徳怨之處以謂徳不可以報怨設之詭其理則去王逺矣故怨莫甚乎父母之仇而徳莫重乎君國子民豈可相貿易哉有父之讎而不知怨乃欲以重徳報之也則人倫廢天理滅矣然則如之何以直報怨以徳報徳朱子或問以直報怨者不以私害公不以曲勝直當報則報不當報則止一觀夫理之當然聖人之心終不使人忘怨而沒其赧復之名者亦以見夫君父之讐有不得不報者而伸夫忠臣孝子之心也若於其所怨而反報之以徳誠若忠且厚矣而於君父之讐亦將有時而忘之豈不悖天理之甚也哉或曰君父之讐亦有當報不當報之别乎曰周禮有之殺人而義者令勿讐此不當報者也春秋傳曰父不受誅子復讐可也此當報者也當報而報不當報而止是即所謂直也愚按莊公素無報讐之念自以為出於齊倚齊為援故於襄之死要齊大夫至於魯地而謀立糾以為君為植黨市恩之計初非以徳報怨實欲以徳報徳也使莊公幡然悔悟思其父之所以沒因無知之亂伸大義而伐之斵其棺而暴其罪謀於齊衆擇僖公之賢子而立之豈不為桓公之孝子而為春秋之賢君也哉聖人於髙傒處父荀庚孫良夫郤犫孫林父向戌之盟皆不書公及獨於齊大夫盟蔇書曰公及者盖深疾其懵於理而又傷其不能勇於事也啖氏曰敷梁曰無君制在公矣當可納而不納故惡内也按讐人之子本不當納有何惡乎下伐齊納糾義同夏公伐齊納糾左作納子糾愚按孔氏正義今定本糾上有子字則左傳古本亦作納糾齊小白入于齊左傳公伐齊納子糾桓公自莒先入公羊傳伐而言納者猶不能納也小白曷為以國氏當國也程子傳桓公子糾㐮公之二子也桓公兄而子糾弟㐮公死則桓公當立春秋書桓公則曰齊小白言當有齊國也於子糾則止曰糾不言齊以不當有齊也不言子非君之嗣子也公榖并注四家皆書納糾左傳獨言子糾誤也然書齊人取子糾殺之者齊大夫甞與魯盟于蔇既納糾以為君又殺之故書子是二罪也左氏書子糾二傳曰伐齊納糾君子以公穀為正君子謂程子納者不受而强其丈反致之稱永嘉吕氏曰凡書納皆内不受而强致之公伐齊納糾欲納之而實未能納也故納而得入則書其國楚人納頓子于頓楚子納公孫寧儀行父于陳是也雖至其國而未得入則書弗克納晉人納㨗菑于邾是也未得國而入于邑則書邑齊髙偃納北燕伯于陽晉趙鞅納世子蒯瞆于戚是也莊公納子糾也以國則小白已君以邑則糾未能入故但書納以見其不能納也陳氏曰襄公吾讐也而納其亡公子以為徳是納不宜納也入者難詞愚按有當入而言入者難詞也有不當入而言入者逆詞也許叔之入小白之入當入者也鄭突之入衛朔之入不當入者也齊陽生入于齊與此書法雖同然下書陳乞弑荼則知陽生之入所以簒荼矣讀經當合上下文觀之糾不書子者明糾不當立也以小白繋去聲齊者明小白宜有齊也所以然者㐮公見殺糾與小白皆以庶子出奔而糾弟也又未嘗為世子按史稱周公誅管蔡以安周齊桓殺其弟以反國前淮南厲王傳王驕恣不法上令薄將軍昭與厲王書諫數之曰云云是糾㓜而小白長展兩反其有齊宜矣宜則何以不稱公子内無所承上不禀命故以王法絶之也桓公於王法雖可絶視子糾則當立故管仲相去聲桓為徙義而聖人稱之曰微管仲吾其被皮寄反髮左衽矣召音邵忽死於子糾為傷勇比諸匹夫匹婦之諒自經於溝瀆而莫之知也上蔡謝氏曰召忽死於子糾為傷勇管仲不死為徙義而夫子子之也朱子或問程子以薄昭之言證桓公之為兄而荀卿嘗謂桓公殺兄以争國其言固出於薄昭之前未可以此證其必然但以公榖春秋所書之文為據參以夫子答子路子貢之言斷之盖聖人之於人功罪不相掩今但稱管仲之功而不言其罪則可見不死子糾之難無害於義而桓公子糾之長少亦從以明矣愚按杜氏注小白僖公庶子子糾小白庶兄公羊謂小白稱入為簒辭穀梁謂小白不譲子糾太史公序小白次子糾皆以子糾為兄小白為弟且謂皆僖公子韓宣子亦謂齊桓衛姬之子有寵於僖而程子謂㐮公子似據左傳公子小白公子糾蒙㐮公立而言今考小白與糾其為僖公或㐮公之子則不可考然以經考之忽繫鄭而突不繫鄭羈繫曹而赤不繫曹則嫡庶之辨也㨗菑不繋邾而書弗克納則長㓜之辨也今小白繫齊則鄭忽曹羈之例也糾不稱子而稱納則㨗菑之例也是則小白當立而糾不當立明矣以經别傳之真偽則公榖杜氏不可信也况夫子盛稱管仲之功而不責其忘君事讎别其長㓜是非豈不灼然可見哉魯莊忘讎而納其公子奉少奪長興師以助不正卒至於敗書公伐書納而罪惡著矣通㫖莊公為齊納子糾既絶父子君臣之倫矣魯國臣子則而象之故子般閔公皆不得其死而魯不絶如綫仲尼為此懼一書再書屢書特書而每書必加貶絶以著其釋怨忘讐之罪也劉氏曰公羊云納者入辭也非也納者納辭耳得入不得入未可知也非入辭也又云糾不稱公子君前臣名亦非也糾失國在魯本非魯臣何故責以君前臣名乎秋七月丁酉葬齊襄公杜氏曰九月乃葬亂故張氏曰無知已誅可以葬矣八月庚申及齊師戰于乾時我師敗績乾音干左傳師及齊師戰于乾時我師敗績公䘮戎路傳乘而歸秦子梁子以公旗辟于下道是以皆止公羊傳内不言敗其言敗何伐敗也曷為伐敗復讎也此復讎乎大國曷為使微者公也曷為不言公不與公復讎也曷為不與復讎者在下也榖梁宣十二年傳績功也功事也程子傳及其師非卿也公戰諱敗凡言敗績大敗也小小勝負不書杜氏曰乾時齊地時水在樂安界歧流旱則竭涸故曰乾時愚按在今益都路樂安縣内不言敗此其言敗者為與讎戰雖敗亦榮也何氏曰復讎以死敗為榮劉氏曰以謂生而辱不如死而榮也按左氏戰于乾時公喪息浪反戎路傳直專反乗繩證反而歸則敗績者公也能與讎戰雖敗亦榮何以不言公貶之也公本忘親釋怨欲納讎人之子謀定其國家不為復讎與之戰也是故沒公以見音現貶何氏曰時實為不能納子糾伐齊諸大夫以為不如以復讎伐之於是以復讎伐之非誠心至意故不與也若以復讎舉事則此戰為義戰孟子春秋無義戰當書公冠去聲于敗績之上據鄢陵楚子書敗績與沙隨之不得見平丘之不與音預盟為比以示榮矣沙隨平丘皆非魯罪故不諱恥見成十六昭十三惟不以復讎戰也是故諱公以重貶其忘親釋怨之罪其義深切著明矣愚按書齊師書我師則非師少矣上文書公及齊大夫盟公伐齊則此戰乃公及之戰不待攷傳而知之也然不書公而以微者之辭及戰者所以著公志在於納糾而不在於敵讎也經書内戰者三書敗外師者八言敗者勝彼言戰者為彼所勝也内諱敗言戰乃敗矣故奚升陘皆不言敗績升陘諱公不書為公諱敗也獨此書敗績為與讎戰故雖敗績猶不以為辱耳抑揚詳略之際皆聖人之微意也九月齊人取子糾殺之左傳鮑叔帥師來言曰子糾親也請君討之管召讎也請受而甘心焉乃殺子糾于生竇召忽死之管仲請囚鮑叔受之歸而以告曰管夷吾治于髙傒使相可也公從之公羊傳其取之何脅我使我殺之也穀梁傳猶曰取其子糾而殺之云爾取者不義之詞愚按說文取捕取也謂義不可而强取之也前書納糾不稱子者明不當立也此書殺糾復扶又反稱子者明不當殺也雙峯饒氏曰春秋於糾上一無子字一有子字始以納之為非故去子以明其不當納終以殺之為非故又稱子以明其不當殺或奪或予上聲於義各安春秋精意也仁人之於兄弟不藏怒焉不宿怨焉親愛之而已本孟子糾雖爭立越在他國置而勿問可也必請于魯殺之然後快于心其不仁亦甚矣後世以傳讓為名而取國者必殺其主以為一人心防後患意與此同流毒豈不逺哉通鑑宋髙祖劉裕受晉禪殺晉恭帝齊太祖蕭道成受宋禪殺宋順帝盡滅其族梁武帝蕭衍受齊禪殺齊和帝陳武帝霸先受梁禪殺梁敬帝隋文帝楊堅受周禪殺周静帝後梁髙祖朱晃受唐禪殺唐昭宣帝故孟子曰五伯讀曰霸後同三王之罪人也仲尼之徒無道桓文之事者髙氏曰桓公殺子糾書齊人者并其國人罪之也書曰取殺之重之也張氏曰糾者齊桓之兄弟也以其不當爭而爭立則為罪以其骨肉之至親則不可殺為齊桓者當列其罪以告魯人且明示親親之義而全其生則恩義兩得矣夫殺兄弟當目君而稱齊人者廢立之際殺生予奪寄於當國大臣之手今齊大夫始以糾為先君之子而盟欲立之及桓公得國又不體其君天倫之恩從議親之辟以赦其罪而必殺之廢興生死輕率甚矣故加子於糾又書齊人書取書殺以責其舉國君臣忘親失義之罪也聖人以至公示後世異於私天下為已有欲絶亂本禍根而推刃於先君之遺體者矣愚按王者之道自修身正家以及於為國桓公殺子糾晉文殺懐公以取國夫子糾懐公論長㓜之序雖不當立而桓文之殺亦非也以是得國而霸諸侯其本固已不正矣此仲尼之門五尺童子所以羞稱五伯也殺懐公之事不見於經非削之也舊史不書耳趙氏曰左氏謂魯殺子糾按論語云桓公殺公子糾則知齊自殺之非魯殺也若實魯殺當云齊人使我殺子糾不應云取劉氏曰穀梁曰言取病内也非也言取病齊耳内何病乎冬浚洙洙音殊公羊傳浚者深之也曷為深之畏齊也穀梁傳深洙著力不足也杜氏曰洙水在魯城北下合泗浚深之為齊備固國以保民為本輕用民力妄興大作邦本一揺雖有長江巨川限帶封域洞庭彭蠡河漢之險猶不足憑而况洙乎書浚洙見音現勞民於守國之末務而不知本為後戒也張氏曰洙水在魯北齊伐魯之道也魯雖殺子糾猶有畏齊之心故浚而深之以備齊師之至書此以見其不能明政刑結人心使大國畏之而重勞民力務以深險自守不知困民於無益古人徹彼桑土綢繆牖户之意不如是之陋也王氏曰隋有季梁楚不敢伐鄭有子産晉不能屈不有君子其能國乎莊納子糾而不知義洙水近在城北而勞民末務特兒戲耳愚按城郭溝池有國者之所不可廢然有當守而不可不守者有不必徒恃於守者春秋書滅下陽書城虎牢責虢鄭之不能守也書浚洙書内築城邑者二十有四所以責魯之徒恃於守而重困民力也丁莊王十酉三年十年齊桓二晉緡二十一衛惠十六蔡哀十一鄭厲十七子儀十曹莊十八陳宣九杞靖二十宋閔八秦武十四楚文六春王正月公敗齊師于長勺敗必邁反後放此勺上酌反穀梁傳不日疑戰也疑戰而曰敗勝内也杜氏曰長勺魯地齊師伐魯經不書伐意責魯也詐戰曰敗左氏十一年傳云皆陣曰戰敵未陣曰敗某師范氏曰不尅日而戰以詐相襲敗之者為主啖氏曰凡魯勝則曰敗某師或曰長勺魯地而齊師至此所謂敵加於已不得已而後應去聲者也劉氏曰戰者仁人之所惡有不得已而應之者矣疑若無罪焉何以見責乎善為國者不師善師者不陣善陣者不戰穀梁莊八年故行使去聲則有文告之詞而疆埸音亦則有守禦之備至於善陣徳已衰矣而况兵刃相接又以詐謀取勝乎故書魯為主以責之皆已亂之道寡怨之方王者之事也張氏曰書敗而不書戰惡詐戰也用民力以戰爭古有司馬車戰之法定日刻期兩陳相向以决勝負雖敗而奔亦無多殺之禍若詐戰而出其不意或舉衆而覆之則不仁之甚者也莊公政刑不修制軍無法齊師之來以詐謀而僥倖一勝春秋深譏之愚案春秋書外敗者八非外域之敗中國則中國之敗外域夫外域之於中國不足責矣中國之於外域不可以常法制之而以詐勝之猶之可也至於中國之於中國而以詐取勝則其罪深矣經書内敗外域者一敗中國者七而莊公居其三何莊公習於詐勝若是耶或謂莊公與仇國為敵聖人幸其勝而志之也嗟夫使莊公於即位之初悉索敝賦以問罪於齊而有再戰再勝之功則為善矣今乃挾不能納糾之憤而逞其狙詐何有於敵讎苟以為敵讎則侵宋再敗宋師非敵讎也劉氏曰左氏曰齊師伐我曹劌請見公與之乗戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績杜氏注齊人雖成列魯以權譎稽之列成而不得用故以未陳為文非也傳本設皆陣曰戰未陳曰敗之例者見正不正也此既皆陳矣是正也要是𫝊所載者當時雜記妄出曹劌及戰事不足為據二月公侵宋此書侵之始左傳凡師有鐘鼓曰伐無曰侵輕曰襲公羊傳觕者曰侵精者曰伐戰不言伐圍不言戰入不言圍滅不言入穀梁傳深其怨於齊又退侵宋以衆其敵惡之苞人民毆牛馬曰侵斬樹木壊宫室曰伐王氏曰宋閔以莊二年即位二君未嘗有隙何為而侵宋耶以詐敗齊乗勝侵宋皆召兵之道非保國之謀也張氏曰莊公以僥倖得志於齊遂舉無名之師以掠宋境此所以致郎之師也蜀杜氏曰周官九伐之法負固不服則侵之此盖天子命諸侯使侵之非列國可得而專春秋之世侵伐戰圍者甚衆必詳録之以示譏也愚按趙氏纂例駁三傳侵伐之說而謂稱罪致討曰伐無名行師曰侵然齊桓侵蔡劉文公侵楚豈可謂無名行師乎文定改之曰潜師掠境曰侵其義當矣詳見十五年三月宋人遷宿此遷國之始公羊僖元年𫝊遷者其意也遷之者非其意也穀梁傳遷亡辭也其不地宿不復見也遷者猶未失其國家以往者也其曰遷宿者宿非欲遷為宋人之所遷也杜氏曰宋强遷之而取其地趙氏曰徙而臣之曰遷某陸氏曰移入封内以為附庸也懐土常物之大情遷國重事也雖違害就利去危即安猶或恐沈于衆不肯率從書盤庚注自祖乙都耿圯于河水盤庚欲遷于殷而大家世族安土重遷胥動以浮言恐動之以禍患沈陷之於罪惡乃話民之弗率而况廹於横去聲逆非其所欲棄乆宅之田里刈新徙之蓬藋昭十六艾殺此地斬之蓬蒿藜藋而共處之道途之勤營築之勞起怨諮傷和氣豈不惻然有隱痛也乎肆行莫之顧也其不仁亦甚矣凡書遷不再貶而惡已見音現矣髙氏曰宿介於宋魯之間属於宋而親魯宋人以為貳於魯而遷之王氏曰驅而屬之為附庸自是宿不復見則亦亡矣宋閔所為如此閱三載而見弑於賊臣豈不曰天道好還哉通㫖問聖人惡人遷國序書何以取盤庚曰有不利焉意欲自遷則何惡矣或介乎大國或廹於戍狄為人之所遷者春秋憫之襄陵許氏曰遷之使未失其國家以往其義猶有所難則是王澤之未竭也僖文以後有滅國無遷國矣愚按書遷國邑者三書自遷者七宋遷宿齊遷紀郱鄑郚遷陽皆強遷之而取其地者也邢遷夷儀衛遷帝丘許遷葉夷白羽容城蔡遷州來皆以自遷為文者也然惟邢衛乃迫於狄而自遷蔡許為吴楚所遷亦書自遷者盖雖為强暴所遷然遷而不滅則曰某國遷于某遷而遂滅則曰某人遷某國也邢遷如歸齊桓得興滅繼絶之羲春秋二百餘年之最善者後莫有繼之者矣趙氏曰公羊云以地還之也據此乃將已地繞之非遷彼之義夏六月齊師宋師次于郎公敗宋師于乗丘乗繩證反左傳齊師宋師次于郎公子偃曰宋師不整可敗也宋敗齊必還請擊之公弗許自雩門竊出蒙臯比而先犯之公從之大敗宋師于乗丘齊師乃還穀梁傳次止興也畏我也不日疑戰也杜氏曰乘丘魯地張氏曰今仁府乗氏縣愚按乗氏縣今属東昌路曹州齊宋輕舉大衆據二國稱師深入他境據郎乗丘皆魯地肆其報復之心齊報敗長勺宋報公侵誠有罪也魯人若能不用詐謀奉其辭令二國去矣偷得一時之㨗而積四鄰之忿此小人之道故次者不以其事據不書伐勝者不以其理據不書戰而止書敗交譏之劉氏曰齊宋輕用其衆揚兵整旅以徑人之國而不名所伐欲闚利乗便快其攻取之意使魯人恫疑憂恐出竒計詐謀以自救覆滅其軍百姓父子無辜䧟沒此人君貪利輕用其衆之罪也魯人誠能不用詐謀推忠信奉辭令以止齊宋之師齊宋去矣其所以弭患止亂安國便民不益堅且乆耶偷得一時之勝而忘長世之慮此小人釁於勇嗇於禍之咎故次者不以義勝者不以道交譏之也㐮陵許氏曰齊桓始入未撫其民而輕用之是以再不得志於魯晉文之入五年而後用其民盖監此也陳氏曰書次于郎見齊伯之難書次于厥貉見楚伯之難不苟于從齊是人心猶知有周也不苟於從楚是人心猶知有晉也愚按齊宋書師著兵力之強也書次見其師出之無名也魯書公書敗見其以千乗之君而勝人不以其道也記稱戰于乗丘馬驚敗績公隊佐車授綏則雖能勝宋魯亦殆矣此春秋所以目公而譏之也歟趙氏曰公羊云伐則其言次何齊與伐而不與戰故言伐也按經文實未伐而敗故不言伐爾又曰我能敗之故言次若然則但書敗義不明乎何假言次秋九月荆敗蔡師于莘以蔡侯獻舞歸莘所巾反舞榖作武此荆猾夏之始左傳蔡哀侯娶于陳息侯亦娶焉息媯将歸過蔡蔡侯止而見之弗賔息侯聞之怒使謂楚文王曰伐我吾求救于蔡而伐之九月楚敗蔡師於莘以蔡侯獻舞歸公羊傳荆者何州名也州不若國國不若氏氏不若人人不若名名不若字字不若子蔡侯何以名絶曷為絶之獲也曷為不言獲不與夷狄之獲中國也榖梁傳荆者楚也謂之荆狄之也聖人立必後至天子弱必先叛蔡侯何以名絶之也何為絶之獲也中國不言敗其言敗釋蔡侯之獲也杜氏曰莘蔡地楚國今南郡枝江縣張氏曰荆楚故號周成王封熊繹于丹陽今江陵之枝江縣愚按莘在今河南府路裕州莘縣蔡侯何以名絶之也凡書敗書滅書入而以其君歸皆名者為其服為臣虜故絶之也劉氏曰以歸盖就虜而不耻者薛氏曰以蔡侯獻舞歸何執之而不反也其不言執不與蠻夷之執中國也不言獲不忍諸侯之為蠻夷獲也臨川吳氏曰蔡侯為荆所獲而以之歸留於楚九年至莊十九年卒若蔡獻舞潞嬰兒沈嘉許斯頓牂胡豹曹陽邾益之類是矣宣十五晉滅潞以潞子嬰兒歸定四蔡滅沈以沈子嘉歸定六鄭滅許以許男斯歸定十四楚陳滅頓以頓子牂歸定十五楚滅胡以胡子豹歸哀八宋入曹以曹伯陽歸哀七入邾以邾子益来國君死社稷正也逃之雖罪猶有恥焉虜甚矣楚人滅夔以夔子歸僖二十六獨不名者夔子以無罪見討雖國滅身為臣虜其義直其辭初不服也夔子不祀祝融與鬻熊楚人讓之對曰我先王熊摯有疾鬼神弗赦而自竄于夔吾是以失楚又何祀焉是以獨假之爵而不名也春秋之法諸侯不生名失地則生而名之比於賤者欲使有國之君戰戰兢兢長守富貴無危溢之行也孝經满而不溢所以長守富也髙而不危所以長守貴也二十三年傳荆以州舉惡其猾夏不恭故狄之也劉氏曰楚祝融之後其上世有元徳顯功通於周室與中國冠帶之君無異僣稱王是以外之張氏曰外域之故不稱師與人略之也名獻舞而書以歸責其不死位生降强楚也諸侯不生名名之則位已絶矣王政不行外㓂侵陵中國楚自此得志中夏者二百餘年而周之子孫日以凌夷皆其有以自取之也髙氏曰王室衰㣲不能自救齊桓始入威令不行是以荆人强暴敢肆毒於中國也臨川吳氏曰荆為中國患宣王時已伐之入春秋其害彌甚其事不聞於魯故不書蔡與齊魯宋衛陳鄭皆中國之望蔡首受禍此經書荆蠻内侵之始陳氏曰荆敗蔡師于莘是猾夏之始也吳敗頓胡沈蔡陳許之師于雞父則諸夏之不亡者寡矣故書荆自此始而春秋以吴終焉自㑹于鄧諸侯懼楚矣而敗鄧不書敗隨不書敗鄖不書雖滅申滅鄧滅息亦不書也敗蔡師以獻舞歸於是始書之春秋之法滅國之君言以歸徒敗焉耳而言以歸則是蔡服楚也是夷夏之大變也愚按史記周文王封祝融之苖裔熊繹於楚蠻以子男之田夷王之時王室微熊渠甚得江漢間民和熊渠立為王厲王暴虐熊渠畏其伐去王號十一世至熊通伐随令請王室尊為王王不聴乃自立為武王子文王始强陵江漢間小國敗蔡即此時也公榖皆謂書荆以州舉杜預謂荆其本號後改為楚今考檀弓謂夫子将之荆晉語叔向謂荆敗我則荆或是楚故號然商頌稱荆楚則荆改號楚已乆或者如郳改號小邾而仍稱郳申稱滕薛郳盖春秋略之故舉其故號耳嘗攷近楚之國自申息諸國既亡惟陳蔡為宻邇故二國屢受侵伐且見滅而僅存蔡之君自獻舞已降死于楚者三焉春秋之書楚患始之以荆敗蔡而終之以楚公子申伐陳聖人盖傷之也冬十月齊師滅譚譚子奔莒此㓕國之始公羊𫝊何以不言出國滅無所出也杜氏曰譚國在濟南平陵縣西南張氏曰今濟南府歴城縣滅而書奔責不死位也范氏曰凡書奔責不死社稷不書出國亡無所出也國滅身奔而不能守其富貴何以書爵乎已無取滅之罪為横去聲逆所加而力不能勝至於出奔則亦不幸焉爾矣其義盖未絶也據公榖蔡獻舞書名絶之也按左氏齊侯之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至責其失事大之禮可矣坐此見滅可乎張氏曰齊桓方有志為政於天下非特不能興滅繼絶而以私憾覆滅小國其罪大矣齊師滅譚譚子奔莒楚子滅弦弦子奔黄僖五狄滅温温子奔衛僖十三國所以皆存其爵不比於失地之君而名之也范氏曰國滅不名盖無罪也孫氏曰奔莒不名者譚本無惡也然則吴滅徐徐子章羽奔楚昭三十何以獨名按左氏吴伐徐徐子斷丁緩反其髪携其夫人以逆吳子既已屈服而後奔豈有興復之志乎獨書名所以絶之也以上並據啖氏纂例家氏曰國滅而奔者義不事仇志存興復猶為春秋所予若甘於事仇不以為恥或為所執以歸則春秋之所賤惡者也以此示萬世猶有國亡不能死甘於為禪為皓為愍懐為叔寳者吁可歎哉春秋之義雖在於抑强扶弱又責弱者之不自强平聲於為善也故其書法如此通旨管仲相桓公伯諸侯只是詭遇如譚有恨便滅之鄣可取便降之若學聖人則行一不義殺一不辜而得天下不為也張氏曰此管仲攻瑕之計也薛氏曰五伯桓公為盛威陵諸侯以圖霸功首滅天子之建侯以肆威耳儒者之不道也宜哉陳氏曰曷為以首滅罪齊微桓公則滅國之禍不接迹於天下春秋滅國三十六五伯為之也愚按齊桓圖霸之初滅譚滅遂降鄣遷陽專以威力陵暴小弱以恐懼天下之諸侯其後雖能存三亡國而功不足以掩過矣或者乃引仲虺之誥謂兼弱攻昩取亂侮亡成湯仗義以正天下聖人予齊桓示威於楚是以書師夫以五伯三王之罪人乃以其虐小之事為惡惡之比不亦惑乎春秋書荆敗蔡師于莘以蔡侯獻舞歸齊師滅譚譚子奔莒則齊桓亦熊貲之為耳不待貶絶而惡自見矣戊莊王十戍四年十有一年齊桓三晉緡二十六衞惠十七蔡哀十二鄭厲十八子儀十一曹莊十九陳宣十杞靖二十一宋閔九秦武十五楚文七春王正月夏五月戊寅公敗宋師于鄑鄑子斯反左傳宋為乗丘之役故侵我公禦之宋師未陳而薄之敗諸鄑穀梁傳内事不言戰舉其大者杜氏曰鄑魯地張氏曰宋師再至再敗兵禍旋及其君魯雖再勝國亦困於兵矣王氏曰宋既敗而不知懲魯既勝而不知止其黷武甚矣書日者所以謹之也愚按𫝊言侵我經不書侵與長勺義同秋宋大水左傳宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱榖梁傳髙下有水災曰大水凡外災告則書本陸氏辨疑杜氏曰公使弔之故書所謂災者害及民物如水火兵戎之冦是也諸侯於四鄰有恤病救急之義則告為得禮而不可以不弔張氏曰比嵗交兵怨不廢禮盖古意之猶存而未泯者也故四國同災許人不弔君子以是知許之先亡也見左傳昭十八年凡志災見春秋有謹天戒恤民隠之心王者之事也劉氏曰異者天所以譴人君使修徳也故異至則内自省而已耳非所待於外也不當告告為失禮失禮則書災者害之及民物者也諸侯於四鄰固有恤病救急之義是所待於外也不可不弔弔為得禮得禮則書公羊云外災不書及我也按春秋内其國而外諸夏若水災及魯自可記魯災無為詳宋而略我也穀梁云外災不書此何以書王者之後也非也杞亦王者之後未嘗記其災何歟冬王姬歸于齊左傳齊侯來逆共姬按周制王姬嫁於諸侯車服不繫其夫下王后一等詩召南何彼穠矣小序朱子傳周王之女姬姓故曰王姬王姬雖嫁於諸侯然其車服制度與他國之夫人不同甚言其貴盛之極鄭氏曰下王后一等謂車乗厭翟勒面繢緫服則褕翟禮亦隆矣春秋之義尊君抑臣其書王姬下嫁曷為與列國之女同辭而不異乎曰陽倡而隂和去聲詩鄭風羊小序夫先而婦從士昏禮賔出婦從壻乗其車先天理也述天理訓後世則雖以王姬之貴其當執婦道與公侯大夫士庶人之女何以異哉故舜為匹夫妻去聲帝二女而其書曰嬪毗賔反于虞見堯典注嬪婦也使行婦道於虞氏西周王姬嫁於齊侯據詩稱齊侯之子亦執婦道成肅雍之徳同上召南小序其詩曰曷不肅雍王姬之車雍詩作雝朱子𫝊肅敬也雝和也言此何肅肅而敬雍雍而和乎乃王姬之車也盖王姬貴盛如此而不敢挾貴以驕其夫家故見其車者知其能敬且和以執婦道也自秦而後尤欲尊君抑臣為治而不得其道至謂列侯尚尊也公主初學記周末以天子嫁女於諸侯使諸侯同姓者主之始謂之公主秦因之漢制帝女為公主姊妹為長公主諸王女為翁主使男事女夫屈於婦逆隂陽之位故王陽條奏世務指此為失前王吉傳吉字子陽上䟽言漢家列侯尚公主諸侯則國人承翁主使男事女夫屈於婦逆隂陽之位故多女亂宣帝以其言迂濶不甚􅃂異而長樂王回亦以其弊至父母不敢畜許六反下同其子舅姑不敢畜其婦宋王回字深父福州長樂人舉進士不仕隠居著述原其意雖欲尊君抑臣為治而使人倫悖於上風俗壊於下又豈所以為治去聲也其流至此然後知春秋書王姬侯女同詞而不異垂訓之義大矣髙氏曰公不可主齊昏故重而重見之王氏曰主襄公之昏其罪大故書之詳主桓公之昏其罪小故書之略張氏曰王姬即齊侯之夫人王姬是也魯於齊為讎然已易世故齊侯之來逆不書止書王姬之歸而已王女下嫁無異於諸侯之女適人者盖夫婦之道乃三綱之所繋不可不早正故因其始嫁而一之於諸侯女歸之辭焉若曰往之女家必敬必戒常禮不可紊也愚按後世公主出嫁無王姬執婦道之風莫不庸奴其夫雖尚主者極有才名而勢屈於崇貴吞悲茹氣無所逃訴故晉人有無事取官府之說至六朝其失尤甚江斆尚臨海公主譲婚表有云制勒甚於僕𨽻則其敝可知矣春秋書王姬之歸與詩相表裏實萬世之法也陸氏曰公穀皆云志其過我也按書其歸為魯主婚爾穀梁他處即云為之中者歸之與此自相反矣巳莊王十亥五年崩十有二年齊桓四晉緡二十三衞惠十八蔡哀十三鄭厲十九子儀十二曹莊二十陳宣十一杞靖三十二宋閔十弑秦武十六楚文八春王三月紀叔姬歸于􅈶音􅂝公羊傳隠之也其國亡矣啖氏曰非嫁而歸故加紀字何氏曰􅈶不繋齊者時齊聽後五廟故國之莊公四年紀侯去國至此九年叔姬至此始歸于􅈶者紀侯方卒故叔姬至此然後歸爾歸者順詞以宗廟在􅈶歸奉其祀也叔姬雖伯姬之娣然諸侯夫人既卒則次妃攝治内事故叔姬雖媵妾當奉紀之祭祀魯為宗國婦人有來歸之義紀既亡矣不歸于魯家氏曰夫死無子而終於父母家者非正也終於夫家正也所謂全節守義不以亡故而虧婦道者也杜氏曰叔姬全守節義以終婦道故繋之紀賢之也魯人髙其節義恩禮有加焉愚按當時必有饋問弔葬之禮故史策録之是故其歸于􅈶其卒其葬史冊悉書夫子修經存而弗削使與衛之共音恭姜同垂不朽詩鄘柏舟小序共姜自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許為後世勸若夏侯令女曹爽之弟婦也寡居守志父母欲奪而嫁之誓而弗許而曰曹氏全盛之時尚欲保終况今衰亡何忍棄之魏志曹爽傳注夏侯文寜女名令女妻爽弟文叔文叔蚤死家欲嫁之以刀截兩耳居止常依爽爽誅曹氏盡死文寜以曹氏無遺類兾其意沮使人風之令女以刀斷鼻或曰夫家夷㓕已盡守此欲誰為哉令女曰仁者不以盛衰改節義者不以存亡易心云云禽獸之行吾豈為乎聞者為之感動其聞叔姬之風而興起者乎劉氏曰紀侯之殁不書叔姬何以得書春秋因叔姬之行以明紀季之以􅈶入齊非利之也凡欲存國耳試使紀季見宗國之危析地以求利此邾庶其莒牟夷何異春秋當絶之矣張氏曰叔姬伯姬之娣隠七年歸于紀者伯姬既死叔姬實攝内事而能不以國之存亡貳其事君子之心不以身之榮悴變其奉宗廟之志故必歸于􅈶以終其身易曰眇能視利幽人之貞於叔姬見之矣春秋可不録其本末以示婦道之正乎陳氏曰紀亡矣曷為謂之紀叔姬存紀也國滅而復見者善辭也是故紀亡書紀叔姬陳亡書陳災劉氏曰穀梁云國而曰歸此邑也其曰歸何也吾女也失國喜得其所故言歸爾非也邑何故不得言歸乎􅈶者紀之别也紀音叔姬之家也人歸其家可不曰歸乎以謂喜得其所乃言歸何哉家氏曰公羊謂歸于􅈶者歸于其叔叔其可歸乎盖紀之宗廟在焉義當歸也愚按或謂叔姬歸于叔非其所歸亂也夫叔姬歸于􅈶􅈶乃紀五廟之所在叔姬之歸以奉祭祀而非歸于紀季也夏侯令女之依爽與叔姬正同豈可亦責之依其伯乎春秋書内女惟紀叔姬宋伯姬録本末甚詳非賢而得若是乎夏四月秋八月甲午宋萬弑其君㨗及其大夫仇牧㨗公作接左傳乘丘之役公以金僕姑射南宮萬公右歂孫生摶之宋人請之宋公蘄之曰始吾敬子今子魯囚也吾弗敬子矣病之宋萬弑閔公于蒙澤遇仇牧于門批而殺之遇大宰督于東宮之西又殺之公羊傳及者何累也弑君多矣舍此無累者乎孔父荀息皆累也舍孔父荀息無累者乎曰有有則此何以書賢也何賢乎仇牧萬搏閔公絶其脰仇牧聞君弑趨而至遇之于門手劒而叱之萬臂摋仇牧碎其首齒著乎門闔仇牧可謂不畏强禦矣穀梁傳書及以尊及卑也仇牧閑也君弑而大夫死於其難乃旦反下同春秋書之者其所取也大夫死於弑君之難而有不書者徒人費石之紛如孟陽死於齊㐮之弑蕩意諸死於宋昭之弑賈舉州綽邴師公孫敖封具鐸父㐮伊婁堙死於齊荘之弑皆不書故知孔父牧息皆所取也夫仇牧可謂不畏强禦矣然徒殺其身不能執賊無益於事也亦足取乎食焉不避其難哀十五子路曰云云義也徒殺其身不能執賊亦足為求利焉而逃其難者之訓矣何名為無益哉夫審事物之重輕者權也權重輕而處之得其宜者義也大音泰宰督亦死於閔公之難削而不書者身有罪也桓二督弑殤公惠伯死於子惡之難亦削而不書者非君命也文十八襄仲殺子惡以君命召惠伯其宰止之曰入必死惠伯曰死君命可也宰曰若君命則死非君命何聴入殺而埋之通旨董卓召皇甫嵩往見執而亡漢與惠伯同死不得其所也使知春秋之義則不往可也召忽死於子糾之難孔子比於匹夫匹婦之諒自經於溝瀆而莫之知者所事不正也據子糾不當立崔杼弑君晏平仲曰人有君而人弑之吾焉於䖍反下同得死之而焉得亡之君子不以是罪晏子者齊莊公不為社稷死而晏子非其私昵之臣也見左傳㐮二十五年若仇牧荀息立乎人之本朝執國之政而君見弑不以其私也雖欲勿死焉得而勿死聖人書而弗削以為求利焉而逃其難者之勸也惟此義不行然後有視棄其君猶土梗莊子田子方篇真土梗耳注土梗土人也遭雨則壊弁髦左傳昭九豈如弁髦而因以敝之注童子垂髦始冠三加成禮而棄其始冠曾莫之省而三綱絶矣愚按春秋褒死節之臣所以為千萬世事君者之勸後世春秋之義不行是以亂賊簒弑而將相大臣皆黨惡朋兇恬不之恥如漢王舜等之事王莽魏王沈王業之事司馬昭晉傅亮謝晦等之事劉裕宋褚淵王儉之事蕭道成唐張文蔚楊渉等之事朱温甚至如馮道歴事五代皆任公師之貴不以為辱而反以為榮比明皇之象昭宗之猿而有愧矣豈非所謂棄其君如土梗弁髦而莫之省乎王氏曰據左氏宋公相蘄之後萬病其言而肆惡古者賢君待其臣以禮出入起居罔有不欽則戲謔之談意外之憂何由至哉閔公反此所以及禍也臨川吳氏曰公羊言莊公獲萬舍諸宫中数月然後歸之反為大夫於宋萬有力無徳戰敗免罪已幸矣又以之為大夫宋閔用人如此其遭弑自取之也冬十月宋萬出奔陳左傳立子㳺羣公子奔蕭公子御說奔亳南宫牛猛獲帥師圍亳蕭叔大心及戴武宣穆莊之族以曹師伐之殺南宫牛于師殺子游于宋立桓公猛獲奔衛南宫萬奔陳按左氏宋萬弑閔公于蒙澤杜氏曰宋地奔陳范氏曰宋乆不討賊致令得奔孫氏曰萬八月弑君十月方出奔是宋之臣子緩于討賊宋人請萬于陳以賂陳人使婦人飲於鴆反下同之酒而以犀革裹之宋人醢音海萬然則賊已討矣曷為不書陳人殺萬而葬閔公乎據州吁無知已殺則衛桓齊㐮皆書葬夫天下之惡一也左傳衛石祁子曰天下之惡一也惡於宋而保於我保之何補陳人不以萬為賊而納之又受宋人之賂而使婦人飲之酒是與賊為黨非政刑也特書萬出奔陳而閔公不葬以著陳人與賊為黨之罪而不能正天討其法嚴矣故曰春秋成而亂臣賊子懼陳氏曰向也合四國之君而後華督免於討今萬得奔陳自是無討賊者矣張氏曰陳容其奔罪已大矣受賂而後歸之與所謂殺其人汙其宫而瀦焉之意何其異哉臨川吳氏曰陳人當如昔年之執州吁者以執萬今乃受其奔是為逆賊之逋逃主也宋臣雖能逐賊而立君然賊既逸去後始得而誅之視石碏討州吁之義則有愧矣故不言宋人殺萬愚按春秋書逆賊出奔一以責國人之失賊一以責鄰國之不當受也陳人既受賊及貪賄而後以狙詐戮之則非天討矣慶父弑閔公奔莒莒人亦受賂而後歸之及境而縊事與此同盖亦不能正天討故閔公亦不書葬也里克甯喜皆已殺而卓剽不葬盖晉衛討亂臣不以其罪而又不以君禮葬卓剽也蔡般未討而蔡景書葬乃變例而責諸侯之不能討賊也考經之上下文與經之前後事而其義見矣属辭比事春秋教也此之謂也庚僖王子元年十有三年齊桓五晉緡二十四衞惠十九蔡哀十四鄭厲二十子儀十三曹莊二十一陳宣十二杞靖二十三卒宋桓公御說元年秦武十七楚文九春齊侯宋人陳人蔡人邾人㑹于北杏齊侯穀作齊人左傳㑹于北杏以平宋亂穀梁傳是齊侯宋公也其曰人何也始疑之何疑焉桓非受命之伯也將以事授之者也舉人衆之辭也杜氏曰北杏齊地桓何以及四國之微者㑹是宋公邾子也桓率諸侯以平宋亂宋公决不以微者㑹邾小國尤不敢以微者㑹公侯然則何以稱人春秋之世以諸侯而主天下㑹盟之政自北杏始其後宋襄晉文楚莊秦穆交主夏盟跡此而為之者也五伯注見首卷進表下桓非受命之伯孫氏曰周禮九命作伯得専征諸侯若五伯者皆非命伯召伯賜齊侯命尹氏策命晉侯春秋皆不録之故孟子曰三王之罪人諸侯自相推戴以為盟主是無君矣故四國稱人以誅始亂正王法也楊氏辨要春秋之世以諸侯而主天下㑹盟之政由北杏之㑹始以大夫而主天下㑹盟之政由文七年扈之盟始以諸侯主天下之政諸侯之無王也諸侯無天子之命而自相推戴桓公為盟主聖人苟不貶於其始則後世迹此而亂故獨書齊侯而宋陳蔡邾之君皆稱人則無王命而推齊侯為伯之罪著矣厥後宋㐮晉文楚莊交争天下之盟主而王道絶者襲桓之故也永嘉呂氏曰方伯圖之未興也列國諸侯更相吞噬間有若鄭莊齊僖之流雖能雄長于一時而終未能執伯主之柄天下紛紛莫之統一然心猶知有周也及伯圖既興則翕然唯伯主之為聽下以號令諸侯上以脅制天子一時氣勢聲熖赫奕中國頼以少事自是王命浸微矣是故有北杏之㑹則有幽之盟有幽之盟而後有葵丘之盟則宰周公在㑹矣然猶未也至温之㑹則天王實狩焉比事以觀而善惡自見矣齊侯稱爵其與之乎上無天子下無方伯有能㑹諸侯安中國而免民於左衽而審反則雖與之可也誅諸侯者正也與桓公者權也陳氏曰春秋非主兵皆序爵也於是序齊於宋之上而獨爵齊將子齊以伯也晉文之簡曰晉侯齊師宋師秦師皆始伯之辭也自是無特相㑹者矣髙氏曰齊桓始謀合諸侯皆人之而獨舉齊爵抑揚之辭也自此執鄭詹伐山戎執轅濤塗二十餘年不與齊桓以爵或曰桓公始平宋亂遂得諸侯故四國稱人言衆與之也家氏曰齊桓創伯以平宋亂春秋與之齊侯書爵褒之也諸侯書人著衆望之所同属也周衰王綱凌夷諸侯恣擅齊桓能以尊王室正諸夏攘僣竊為事故春秋予之也張氏曰王政不行亂賊得志强暴肆行天下思得賢伯之興齊桓一㑹而宋陳蔡邾並來受命可見天下歸之幾如水之就下然桓公苟能於宋萬初弑君之時舉兵討之則不勞告諭而天下翕然宗齊矣夏六月齊人滅遂左傳㑹于北杏遂人不至齊人滅遂而戍之穀梁傳不日微國也杜氏曰遂國在濟北蛇丘縣東北張氏曰蛇丘属漢泰山郡隧鄉故遂國也愚按今属濟寜路鉅野縣滅國之與見滅罪孰為重取國而書滅奪人土地使不得有其民人毁人宗廟使不得奉其祭祀非至不仁者莫之忍為見滅而書滅亡國之善詞上下之同力也公羊僖五其亦不幸焉爾語有之曰興滅國繼絶世天下之民歸心焉南軒張氏曰興滅國不欲忘其先之功徳也繼絶世不忍墜人之宗祀也今乃滅人之國而絶其世罪莫重矣齊人滅遂其稱人微者爾凡書滅者不待再貶而惡已見音現家氏曰遂人不㑹北杏固為有罪然未至於可滅也伯者假公義以濟私欲滅譚矣又滅遂不過為拓土開疆之計春秋於三年之間聫書二滅以著齊桓之罪功過不相掩也髙氏曰齊桓未見救中國之功而示威小國以滅之以脅大國聖人深責之秋七月冬公㑹齊侯盟于柯古何反左傳始及齊平也公羊傳桓之盟不日其㑹不致信之也其不日何以始乎此莊公將㑹乎桓謂曹子曰寡人之生則不若死矣曹子曰然則君請當其君臣請當其臣莊公曰諾於是㑹乎桓莊公升壇曹子手劒而從之管子進曰君何求乎曹子曰城壊壓竟君不圖與管子曰然則君將何求曹子曰願請汶陽之田管子顧曰君許諾桓公曰諾曹子請盟桓公下與之盟已盟曹子摽劒而去之要盟可犯而桓公不欺曹子可讎而桓公不怨桓公之信著乎天下自柯之盟始焉穀梁傳曹劌之盟也信齊侯也桓盟雖内與不日信也杜氏曰柯齊之阿邑張氏曰今東平府東阿縣始及齊平也孫氏曰公不及北杏之㑹桓公既滅遂懼其見討故盟于此王氏曰柯齊地而言公㑹則此㑹本齊侯之意也世讎而平可乎於傳有之敵惠敵怨不在後嗣左傳文六㬰駢曰前志有之云云宣十八臧宣叔曰當其時不能治也後之人何罪魯於襄公有不共戴天之讎當其身則釋怨不復而主王姬狩于禚㑹伐衛同圍郕納子糾故聖人詳加譏貶以著其忘親之罪今易世矣而桓公始合諸侯安中國攘僣亂尊天王乃欲修怨怒鄰而危其宗社可謂孝乎故長勺之役専以責魯而柯之盟公與齊侯皆書其爵則以為釋怨而平可也張氏曰魯莊自齊桓入國屢與之戰雖一再勝而齊方修軍政以圖伯魯有見伐之虞至此始及齊平公榖所載曹子之事齊桓捐小利以收魯容或有之皆霸術也但公羊言之過其實耳或稱齊襄公復九世之讎而春秋賢之信乎公羊莊四以仲尼所書柯之盟其辭無貶則復九世之讎而春秋賢之者妄矣其諸傳柱戀反者借襄公事以深罪魯莊當其身而釋怨耶朱子語問莊公與齊桓㑹盟春秋不譏曰凡事貴謀始莊公親見襄公殺其父既不能復讎反與之燕㑹又為之主婚豈特不能復而已既親與讎人如此到桓公時又自隔一重了如何更責他去報見讎在面前不曾報得更欲報之於其子若孫非惟事有所不可也自做得沒氣勢又况齊桓公率諸侯尊周室以義而舉莊公雖欲不赴其盟㑹豈可得哉事又當權个時勢義理輕重若桓公無事自來召諸侯莊公不赴可也今桓公名為尊王室若莊公不赴非是叛齊乃叛周也愚按公羊稱齊襄復九世之讎則失之過莊公當其身釋怨不復則失之不及今考桓公至定公才八世而夫子相定公㑹齊侯于夾谷安得謂九世猶可復讎乎春秋於禚之狩人齊侯以貶公於溺㑹伐衛貶不書公子於圍郕諱不書公屢加貶絶則復讎之責至矣故柯之盟不復致貶誠以齊桓倡伯尊王安夏顧不可以區區不能報之寡弱召其危辱以獲戾於先君也聖人輕重之權衡豈不深切著明也哉趙氏曰公羊云云按桓公未嘗侵魯地及盟後未嘗歸魯田莊公與齊襄猶歡好不絶不應至桓公却生讎怨辛僖王丑二年十有四年齊桓六晉緡二十五衛惠二十蔡哀十五鄭厲二十一子儀十四弑曹莊二十二陳宣十三杞共公元年宋桓二秦武十八楚文十春齊人陳人曹人伐宋左傳宋人背北杏之㑹諸侯伐宋取成而還程子傳春秋之法將尊師衆曰某帥師将卑師衆曰某師將卑師少曰某人將尊師少曰某伐某齊自管仲為政莊十一年而後未嘗興大衆也其賦於諸侯亦寡矣終管仲之身四十年息養天下厚矣惟救郉稱師譏其次也至於秦晉使之不競而已不强致也是以其功卑而易成宋人背音佩北杏之㑹臨川吳氏曰北杏之㑹齊侯本以定宋君之位而宋即背之盖假仁義非誠心故人心不孚也諸侯伐宋杜氏曰經書人傳言諸侯者緫衆國之稱張氏曰陳曹皆宋之隣不動逺國簡便之規模也其稱人者將去聲下同卑師少也齊自管仲得政滅譚之後二十年間未甞遣大夫為主將亦未甞動大衆出侵伐十三年滅遂十五年伐郳十六年伐鄭十九年伐我二十年伐戎二十六年伐徐二十八年伐衛救鄭三十年降鄣閔元年救邢二年遷陽僖四年伐陳侵陳七年伐鄭十七年伐英氏皆稱人惟次聶北城邢伐厲書師救徐書大夫其餘侵蔡伐楚伐鄭圍新城伐北戎皆書爵則君自行耳伐山戎書人獨非將卑師少者以遇魯濟獻㨗書齊侯故也蓋以制用兵而賦於民薄矣故能南摧强楚西抑秦晉天下莫能與之爭也或以為貶齊稱人髙郵孫氏曰滅遂至遷陽皆貶稱人誤矣通旨問桓公南征北伐不聞勞民而兵食足者何策曰以春秋考之管仲相桓公數十年未嘗動大衆出征伐亦未嘗命大夫為将帥此足食足兵之本也夏單伯㑹伐宋隠公四年諸侯伐鄭翬帥師㑹伐則再舉宋陳蔡衛四國之名今諸侯伐宋而單伯㑹伐不復扶又反再舉三國之名何也宋人背北杏之㑹合諸侯而伐之者齊桓公也㑹伐者無貶焉故其辭平主謀伐鄭而欲求寵於諸侯以定其位者州吁也㑹之者黨逆賊矣故其詞繁而不殺疾之也再舉而列書者甚疾四國之詞也言之不足故再言之而聖人之情見矣孫氏曰桓以諸侯伐宋本不期魯魯自畏桓故使單伯㑹伐髙氏曰非既約而後期與袁僑如㑹同張氏曰魯自盟柯已平于齊而未從其役故因齊討宋命上卿帥師往㑹示從伯之意齊桓方興理勢當從固異於翬㑹宋殤黨亂賊伐無罪矣故書㑹伐而不再叙諸國也劉氏曰公羊云後㑹也按伐宋之時魯本不預謀後聞乃遣大夫往㑹耳非後期也穀梁云㑹事之成也與公羊相似愚按左氏云齊請師于周單伯㑹之故治左氏者皆以單伯為周大夫今考成十六年十七年尹子單子三㑹伐鄭不書㑹伐又况定四年𫝊云劉文公合諸侯伐楚而經仍書公㑹劉子諸侯侵楚今既稱卑伯㑹伐則單伯為魯大夫明矣秋七月荆入蔡左傳蔡哀侯為莘故繩息媯以語楚子楚子如息以食入享遂滅息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縦弗能死其又奚言楚子以蔡侯滅息遂伐蔡七月楚入蔡穀梁傳其曰荆州舉之也州不如國國不如名名不如字張氏曰息之亡蔡之入皆哀侯致之蔡自㑹鄧懼楚之後非但不為桑土牖户之謀而以婦人之故再召楚師始則身虜繼以國破楚熊貲興兵以恱婦人是時齊桓伯業未成遂致其横行淮漢寖及中國也王氏曰荆虜獻舞歸今又入蔡四鄰不能救方伯不復問小國附盟主果何恃乎書以病齊桓也吕氏曰入春秋以來蔡嘗從王伐鄭則修勤王之職也㑹于鄧盟于折㑹于曹則猶交諸侯之玉帛也伐鄭伐戴伐衛則猶同諸侯兵車之㑹也自敗莘以來五年再被荆師哀侯蒙塵不返而蔡之臣子甘為楚向齊桓倡伯僅一從北杏之㑹自是折而從楚㑹伐㑹盟皆不與矣是故召陵加師僅足以得楚人之屈服而不能革蔡人從楚之心齊桓既沒楚成抗衡盟齊㑹盂圍宋則蔡莫不偕至至于晉文城濮之戰楚既大創蔡始改圖晉之三㑹黽勉周旋晉文既殁而中國之盟㑹蔡復不與厥貉之次遂挾楚穆為窺宋之謀郤缺欒書伐之侵之而不從也晉悼復伯列國悚然聽命而蔡安於楚之宇下鄭人侵蔡獲司馬燮而楚復為蔡仇鄭終悼公之世亦不能得蔡也厥後再從楚伐鄭宋虢之㑹公孫歸生實序于列國大夫之上楚䖍㑹申及再伐吳蔡靈皆從之是中國諸侯折而從楚者莫如蔡之先其堅於事楚者莫如蔡之甚也般之殺有之用廬之封蔡之存亡廢興皆宅命於楚蔡朱東國之廢置又制於楚之讒臣矣蔡昭受拘三年不勝其辱質愛子以請晉而召陵之役晉人求貨而辭蔡諸侯侵楚無功而楚人圍蔡益暴柏舉之戰假手于吳以釋憾而楚昭報復使疆于江汝之間蔡之傾覆是懼謀徙州來哭墓而遷君臣相殘以及公孫翩之禍迄春秋之後終為楚所并棄同即異之謬其害豈淺淺哉冬單伯㑹齊侯宋公衛侯鄭伯于鄄單音善鄄音絹左傳㑹于鄄宋服故也穀梁傳復同㑹也杜氏曰鄄衛地東郡鄄城張氏曰今濮州鄄城縣愚按鄄城縣今属東昌路薛氏曰齊之先乎諸侯長之也髙氏曰諸侯伐宋踰時不解至是宋公始服而為此㑹臨川吳氏曰春齊陳曹三國伐宋其夏魯單伯方往㑹伐時宋已成而三國還師故冬而單伯促㑹齊宋之君以結成而衛鄭之君亦來㑹也劉氏曰左氏見周有單子遂誤以單伯亦為周大夫凡王人出㑹諸侯無不序公侯之上者宰周公劉子之類是也杜氏為之飾說欲證單伯必為周人非解經之體壬僖王寅三年十有五年齊桓七晉緡二十六衞惠二十一蔡哀十六鄭厲二十二曹莊二十三陳宣十四杞共二宋桓三秦武十九楚文十一春齊侯宋公陳侯衛侯鄭伯㑹于鄄左傳復㑹焉齊始霸也穀梁傳復同㑹也張氏曰傳謂始霸指諸侯始定而言然魯未信服是後宋人猶或主兵衛鄭未免復叛盖齊霸駸駸向定諸侯之心猶未一也襄陵許氏曰十三年十四年㑹至是又㑹三合諸侯而不盟以示重慎是以盟則衆信莫敢渝也杜氏曰陳國小每盟㑹皆在衛下齊桓始伯楚亦始强陳介於二大國而為三恪故齊桓自此年進之以在衛上遂終於春秋愚按是後惟召陵侵楚序衛下盖陳在䘮稱子故也夏夫人姜氏如齊襄陵許氏曰鄄之再㑹魯尚未從桓公未能比近無以示逺務求合於魯是以受文姜以昭親親而齊魯之交卒合然而禮坊一失夫人復啓越竟之恣遂成如莒之姦張氏曰文姜播惡齊㐮之世不如齊八年矣至此復知齊桓公欲求魯好以定伯業而不之拒豈非未聞行一不義雖得天下不為之法乎此孔門所以不道霸者春秋特書以累桓也秋宋人齊人邾人伐郳郳公作兒音郳左傳諸侯為宋伐郳伯與霸同後倣此者之先諸侯専征也非伯者而先諸侯主兵也杜氏曰宋主兵故序齊上班序上下以國大小為次征伐則主兵為先春秋之常也張氏曰小邾宋之附庸不服宋桓公為宋伐之齊桓霸體未全正此役為宋而興宋序齊上亦猶伐宋之師邾人為道而序鄭之上也此齊桓之師何以序宋下猶未成乎伯也二十七年同盟于幽天下與之然後成乎伯矣劉氏曰當是時桓未成乎伯未成乎伯而伐人猶諸侯之相伐也諸侯之相伐則必推主兵者上之是以宋先序蜀杜氏曰齊桓内不能率諸侯以朝天子外不能攘暴亂以救中國為宋討一附庸以求其服從斯徳之小乎愚按石氏謂郳有二郳􅀺來乃小邾國三國伐郳乃宋之附庸今考伐郳而後經不書郳惟書小邾城成周之役經書小邾人而宋仲幾曰郳吾役也昭二十年傳稱郳申杜氏云小邾穆公子必有所據則郳為小邾明矣鄭人侵宋左傳鄭人間之而侵宋張氏曰間諸侯伐郳而侵宋不誠服齊以背二鄄之㑹鄭之反覆於齊楚之間盖始於此故書侵以惡之侵伐之義三傳不同公羊觕者曰侵精者曰伐穀梁苞人民毆牛馬曰侵斬樹木壊宫室曰伐左氏曰有鐘鼓曰伐無鐘鼓曰侵先儒或非其說以為聲罪致討曰伐無名行師曰侵陸氏曰凡師稱罪致討曰伐無名行師曰侵據左氏之說則齊侯侵蔡晉侯侵楚之類皆用大師而總數國若無鐘鼔何以行師又狄師亦有稱伐者豈是能有鐘鼓乎則左氏之例非矣公羊以謂深者為精淺者為觕前後有侵師至破其國伐師不深者殊多則公羊之例又非矣穀梁云云齊桓伐楚不戰而服無壊宫室伐樹木之事又豈二百四十二年行師悉皆如此暴亂乎則知穀梁亦非也未有以易之者也然考諸五經皆稱侵伐在易謙之六五曰利用侵伐征不服也書之泰誓曰我武惟揚侵于之疆詩之皇矣曰依其在京侵自阮疆周官大司馬以九伐之法正邦國而曰賊賢害民則伐之負固不服則侵之鄭氏注伐者兵入其境侵之者兵加其境而已而以為無名行師可乎愚按陸淳謂不言罪名但行殺掠非謂師出無名然語辭未明有以啓後人之疑也然則或曰侵或曰伐何也聲罪致討曰伐潛師掠境曰侵聲罪者鳴鐘擊鼓整衆而行兵法所謂正也潜師者衘枚卧鼓出人不意兵法所謂竒也國語備鐘鼔聲其罪也襲侵無聲為蹔事也愚按侵伐二字必皆當時行師之名故雖外域亦書伐而霸者之兵亦書侵其義之是非係乎其事之得失不以是為褒貶也然有當書伐而書侵當書侵而書伐者春秋之變例也冬十月癸僖王卯四年十有六年齊桓八晉武公稱三十八年衞恵二十二蔡哀十七鄭厲二十三曹莊二十四陳宣十五杞共三宋桓四秦武二十楚文十二春王正月夏宋人齊人衛人伐鄭南北争鄭於是始左傳諸侯伐鄭宋故也孫氏曰鄭背鄄之兩㑹侵宋故齊桓帥諸侯伐之齊序宋下與伐郳同張氏曰伐鄭不止為宋而已盖鄭不服則諸侯之心未一也襄陵許氏曰中國諸侯宋為大既為之服郳又為之報鄭宋盖自是與齊為一宋親而中國諸侯定矣家氏曰鄭突以庶簒嫡昭得返國突復據櫟以逼之昭以弑死突之為也齊桓始伯當聲突舊惡請于王以正其罪宣示逺近以警羣聽今為宋而伐鄭非名也愚按此伐鄭與二十六年伐徐皆以齊序宋下齊未成乎伯而宋猶主兵也秋荆伐鄭左傳鄭伯自櫟入緩告于楚楚伐鄭及櫟師氏曰自桓公之立而荆為中國患矣十年敗蔡師十四年又入蔡今復伐鄭而桓不能討聖人詳書之以累桓也王氏曰齊方圖伯楚亦寖强北侵不已陳蔡鄭許適當其衝鄭之要害尤在所先中國得鄭則可以拒楚楚得鄭則可以窺中國故鄭者齊楚必爭之地也自是鄭被兵於中國者三十有九於楚者二十春秋備書以見中外之盛衰焉冬十有二月㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽公作公㑹許男下公榖有曹伯左傳鄭成也公羊傳同盟者何同欲也穀梁傳同者有同也同尊周也程子傳齊桓始伯仗義以盟而魯首畔盟故諱不稱公上無明王下無方伯諸侯交爭齊桓始霸天下與之故書同杜氏曰滑國都費河南緱氏縣幽宋地張氏曰滑今滑州薛氏曰許男何以先乎曹滑大也非禮班之序也桓公倡伯而亂周班之序非長諸侯之道也㑹者公也不書公諱也陸氏曰㑹公㑹也不書公為公諱也陳氏岳曰凡空書㑹某侯是公自㑹也諸侯皆序非微者明矣其諱公何也程氏曰齊桓始霸仗義以盟而魯首叛盟故諱不稱公惡去聲失信也據十七年受鄭詹其曰同盟何也程氏曰上無明王下無方伯列國交爭桓公始霸天下與之故書同盟志同欲也何氏曰同心欲盟也同心為善善必成同心為惡惡必成故重而言同盟也愚按同盟之義論者不同然實皆不出於公羊之說杜預言服異盖以左氏於幽之盟一則曰鄭成一則曰陳鄭服於新城曰從於楚者服於蟲牢于戲曰鄭服也於馬陵曰且莒服故也於雞澤曰晋為鄭服故合諸侯於重丘平丘曰齊成曰齊服也推是論之則清丘斷道之討貳于蒲以諸侯之貳皆所以服異于戚則鄭伯聽成而鄭已服柯陵亳北伐鄭而同盟則鄭服可知虚朾則悼公初立而諸侯新服也是則因服異而言同盟也穀梁於二幽之盟皆曰同尊周於新城斷道雞澤平丘皆曰同外楚楊士勛䟽謂魯莊之世楚國未强齊桓初霸直取同尊周而已魯文之時楚人强盛而中國畏之新城書同傳云外楚則清丘亦是外楚傳省文也舉斷道以包上下則蟲牢馬陵蒲之與戚柯陵虗朾之類亦是省文雞澤復發傳者楚人轉盛中國外之彌甚則戲盟京城重丘亦其義也平丘又重發外楚之文是後中國微弱不復能外楚矣是則謂晉伯十有四盟皆為外楚新城發傳著其始平丘發𫝊著其終斷道雞澤舉上下以包其餘也文定以諸侯同欲而書同又以惡其反覆而書同二幽新城清丘斷道皆云同欲馬陵云同病楚柯陵雞澤平丘云同懼楚皆同欲也以例推之于戚同欲討曹虗朾同欲救宋也于蒲之盟罪其失信而尋盟亳北之盟惡其既同而又叛皆惡其反覆而書同者也以例推之于戲亦既同而又叛也惟蟲牢惡其皆不臣重丘惡其受賂而不討賊即何休所謂同心為惡惡必成者也穀梁云尊周外楚即所謂同心為善善必成者也惡其反覆而書同謂其既同而復異也杜預言服異謂其昔異而今同也愚故謂論者不同皆不出於公羊同欲之說也唐孔氏云載辭稱同啖趙謂盟辭同而無彼此之異盖惟其同欲是以載書同辭也薛氏又謂同力乎中國亦同心之意也若夫劉原父引殷見曰同謂設方明如方岳之盟故書同然㐮九年楚公子罷戎與鄭人同盟于中分十九年邾人郳人徐人㑹宋公同盟于蟲牢豈亦能設方明而用殷同之禮乎新城虚朾皆大夫與盟清丘則四國之大夫當時大夫雖僣然未必能備天子之禮也季姬及鄫子遇于防安得用天子冬見曰遇之禮乎止齊陳氏臨川吳氏皆謂同者衆辭列國相與盟而莫適為主然前此瓦屋惡曹後此鄟陵臯鼬皆莫適為主而不書同齊桓晉悼皆霸者之盛不可謂其不專主盟也或者又謂霸業未盛霸業既衰則書同盟然齊桓幽之再盟不可謂霸業未盛牡丘霸業已衰而不言同晉悼之盛終始書同盟而祝柯澶淵晉霸已衰皆不書同則霸業之盛衰固不係於書同盟與不書同盟也自古皆有死民無信不立故聖人以信易食答子貢之問論語朱子註民無食必死然無信則雖生亦無以自立不若死之為安君子以信易生重桓王之失詩兎爰小序桓王失信諸侯背叛君子不樂其生焉春秋之諱公與音預是盟也豈不以信之重於生與食乎先儒或以為不書公者諱與讎盟誤矣范氏曰諸侯同共推桓而魯與齊讎公可事齊不㑹不書公以著疑焉果以桓為讎而諱與盟者曷不於柯之盟諱之也愚按霸者合諸侯而同盟外示同欲而出於中心之誠者盖寡先儒謂惡其反覆而書同盖書同盟而反覆之惡自著故于幽為同盟之始而魯則失信於齊桓平丘為同盟之終而晉則辭魯昭使不與盟是皆反覆之易見者也說者皆疑鄭詹逃来在明年不當先諱公而貶之夫春秋為國諱惡苟不書鄭詹之來則失事實書詹来而盟幽不諱公則又彰莊公之失信故沒公不書使若㣲者同㰱則莊公之罪不甚顯而所以譏之者至矣况聖人筆削一經属辭比事以寓賞罰必詳上下文及前後事而後識其指歸安可謂不當先諱公乎公子翬未弑隠公而去其族齊無知未弑㐮公而弟年書名紀叔姬全莭守義以妾媵而特書歸于紀季子賢而不書出奔皆所以詳本末而垂法戒非可以常例而議之也朱子於綱目書魏荀攸書司空梁文惠公狄仁傑漢未為魏而言魏仁傑未贈司空而稱司空亦先事而致褒貶豈非取法春秋之遺意乎趙氏曰穀梁云不言公外内寮一疑之也按莊公與齊㐮往来未嘗有阻豈於桓公更有疑哉此直夫子定貶責之㫖何關内外寮也邾子克卒穀梁傳其曰子進之也范氏曰附齊而尊王室王命進其爵杜氏曰克儀父名稱子者盖齊桓請王命以為諸侯髙氏曰不能五十里為附庸若有功加地滿五十里則列為子男邾本附庸齊桓始伯從其征伐有功王室以是請王命而爵之為子聖人因其卒而著之陳氏曰向也曰儀父今曰邾子已賜之爵也春秋之初諸侯猶稟命於天子是年王使虢公命曲沃伯為晉侯詩人為之賦無衣則諸侯猶有黜陟也甲僖王五辰年崩十有七年齊桓九晉武三十九卒衛惠二十三蔡哀十八鄭厲二十四曹莊二十五陳宣十六杞共四宋桓五秦徳公元年楚文十三春齊人執鄭詹詹公作瞻下同左傳鄭不朝也書齊人執詹惡去聲齊之詞也孫氏曰稱人以執惡桓也劉氏曰執詹書人責齊之詞也不稱行人非使鄭既侵宋又不朝齊詹為執政盖用事之臣也杜氏曰齊桓始霸鄭既伐宋又不朝齊詹為鄭執政大臣詣齊見執孔氏正義傳曰鄭有叔詹堵叔師叔先言詹是詹最貴也齊以不朝責鄭鄭令詹詣齊謝罪齊人執之其見執宜矣而以惡齊何也以責人之心責己則盡道以愛己之心愛人則盡仁本張子黄氏曰即人之身而得治己之道治己之道初不難見觀其責於人者而已即己之身而得待人之道待人之道不必逺求觀其施於己者而已此春秋待齊之意也襄陵許氏曰宋大鄭小齊桓盖徳宋而威鄭文王之興大邦畏其力小邦懷其徳而桓反之是以為伯道也至於宋㐮執鄫之虐則桓不為矣張氏曰詹不氏與柔溺同桓執鄭詹討鄭不朝之罪當書齊侯而稱人以非伯討貶也諸侯不服不能修徳以来之而執其大夫則小國之從齊皆出於力不瞻而非有心恱誠服之意為可見矣趙氏曰公穀皆云詹鄭之㣲者書甚佞也言微者不當書特為佞書諸見執者豈無罪乎何獨特書此佞穀梁又云以其逃来志之若執猶不書奔何足書乎若為来魯但言自齊逃來足知見執何必先書之劉氏曰春秋未有微者而得書於經穀梁曰人者衆辭以人執與之辭也非也宋人執鄭祭仲邾人執鄫子亦可謂與之乎夏齊人殱于遂殱子亷反公作瀐左傳遂因氏頷氏工婁氏須遂氏饗齊戍醉而殺之齊人殱焉公羊傳瀐積也衆殺戍者也穀梁傳殱者盡也何為不言遂人盡齊人也無遂之辭也無遂則何為言遂其猶存遂也殱盡也啖氏曰殱者自滅之義齊滅遂使人戍之在十三年遂之餘民飲去聲戍者酒而殺之齊人殱焉杜氏曰齊人戍遂遂人討而盡殺之故以自盡為文何氏曰稱人衆辭臨川吳氏曰以無罪㓕遂固已失遂人之心矣而齊之戍者或又凌蔑其舊民故遂人憤怒而盡殺之春秋書此者見音現齊人滅遂恃强陵弱非伐罪弔民之師遂人書滅乃亡國之善辭上下之同力也本公羊夫以亡國餘民能殱强齊之戍則申胥一身可以存楚左傳定四伍貟與申包胥友曰我必復楚國包胥曰我必能興之及吳入郢昭王奔隨包胥如秦乞師立依於庭牆而哭日夜不絶聲勺飲不入口七日秦子蒲子虎帥車五百乗救楚吳師大敗楚子入于郢楚雖三戶可以亡秦史范增傳楚南公曰楚雖三户亡秦必楚卒之滅秦者皆楚人也韋昭曰三户楚三大姓昭屈景也左傳哀四三户杜氏曰丹陽縣北三户亭服䖍云三户漳水津也固有是理足為强而不義之戒而弱者亦可省身而自立矣劉氏曰齊滅人之國而又戍之以自取死亡故令其文如齊人自死于遂也陸氏曰不曰遂人殺之齊自取也張氏曰絶滅社稷以及其君慮其民之思舊主而以兵力强制之不知彼心不服吾力稍怠必有出於意料之外者不言遂人殱齊戍而書其自殱所以伸遂人復讎之志而著桓公不仁以至於自殱其衆也襄陵許氏曰齊師滅譚譚子奔莒著其君不詘也齊人滅遂齊人殱于遂著其民不歸也孟子謂霸者以力服人非心服也力不贍也荀子謂桓公詐邾襲莒并國三十五則所滅盖不盡書書滅譚滅遂上下一見之也愚按穀梁謂無遂而存遂乃春秋存亡繼絶之意亦猶紀已滅而書紀叔姬卒葬紀叔姬存紀也陳已滅而書葬陳哀公書陳災存陳也趙氏曰穀梁曰此謂狎敵也此說乃譏其不善用兵恐非教世秋鄭詹自齊逃來榖梁子曰逃義曰逃范氏曰執得其罪故曰義也今而逃之是逃義也陸氏曰凡言逃者皆謂義當留而竊去也逃者匹夫之事杜氏曰詹不能伏節守死以解國患而遁逃茍免書逃以賤之言與匹夫逃竄無異詹之見執若其有罪雖死可也儻曰無罪茍見免焉請從惠於㑹使諸侯聞之則不辱君命矣左傳昭十三子服惠伯曰若猶有罪死命可也若曰無罪而惠免之諸侯不聞是逃命也何免之為請從君惠于㑹不能以理自明也而反效匹夫之行去聲遁逃茍免越在他國不亦賤乎常山劉氏曰詹為正卿不能自辨以理取直而歸反如匹夫之逃越在他國斯可賤也特書曰逃以著其幸免而不知命之罪也劉氏曰書逃責詹之辭也詹自以為有罪邪雖死之可矣自以為無罪邪尚何逃之有詹恐其見殺因逃而茍免則是不知命也永嘉吕氏曰觀逃之一字則詹之有罪無罪皆可知矣齊桓始霸同盟于幽而魯首叛盟受其逋逃武城為天下逋逃主虧信義矣書自齊逃來又以罪魯也陳氏曰外逃不書齊髙固髙厚逃歸皆不書逃來則書之書逃來譏與之接也張氏曰執列國大夫踰歴三時不令其服罪而去防閑弛慢齊之罪也竊身逃竄同於茍免之匹夫無大夫之行失節辱國􅉟之罪也為逋逃主以取伐於伯主魯之罪也愚按左傳僖七年稱鄭有叔詹為政則詹雖逃奔魯盖不乆而歸鄭矣何休以鄭詹用事於魯非也王氏曰春秋書逃有三鄭伯陳侯言逃歸是為君而不知義者也鄭詹逃來是為臣而不知義者也冬多麋公羊傳記異也麋澤獸鹿之大者魯所有也多則為異何氏曰言多者以多為異也京房易𫝊廢正作淫為火不明則國多麋山隂陸佃曰隂盛所感惡氣之應以其又害稼也杜氏曰多則害五稼故書此亦禹放龍蛇周公逺去聲犀象之意也本孟子害稼則及人矣髙郵孫氏曰以有為災則書有有􅈮是也以無為異則書無無氷是也麋者常有之物惟其多則書之髙氏曰聖人於災之中各為之辨麋書多者以多為災也蜚􅈮書有者以有為災不繋多少也麋則常少以多為災不繫於有也螟螽之書不以其有不以其多但為災則書之乙惠王已元年十有八年齊桓十晉獻公佹諸元年衛恵二十四蔡哀十九鄭厲二十五曹莊二十六陳宣十七杞共五宋桓六秦徳二楚文十四春王三月日有食之榖梁傳不言日不言朔夜食也家氏曰夜食云者必在丑寅之間故晨興而猶見夏公追戎于濟西杜氏曰濟西濟水之西此未有言侵伐者而書追戎是不覺其來已去而追之也杜氏曰戎來侵魯魯人不知去乃追之孫氏曰齊人侵我西鄙公追齊師至􅈶先言侵而後言追此不言侵伐明不覺其來已去而追之也書者譏内無戎備為國無武備啓戎心而不知警危道也啖氏曰去社稷逺追戎危公春秋之意其必未雨而徹桑土閒暇而明政刑本孟子劉氏曰公追戎于濟西此無愛民之意而有不仁之心任詐謀而尚竒功勝固不足多也況又不勝乎凡君之於其民也猶父母之於子子陷水火父母不避焦溺而救之豈坐視之待其然且沒而施巧變哉髙氏曰敵勝而去則不可追追者敵之敗者也敵緩而云則不必追追者敵之奔者也先王之法從緩不及逐奔不逺逐奔不逺則難誘從緩不及則難䧟故敵知畏而遁斯止矣弗追也臨川吳氏曰戎即隱桓與之盟者戎入魯境魯將禦之而戎遄退故魯莊以兵逺追之愚按春秋書追者二追戎濟西譏其在境而不能豫備也追齊師至􅈶譏其出境而弗敢及之也夫既不克預修戎備遏於未來至於戎至境内又不克隨時應變命將出師以勝非類之敵及其已退乃輕千乗之貴躡其後而逐之何足取哉啖氏曰左氏云不言其來諱之也據書追明不覺其來已去而追爾直書事實有何諱乎劉氏曰公羊以謂大其未至而預禦之非也若未至而禦何得謂之追乎榖梁云其不言戎之伐我何也以公之追之不使戎邇於我也非也戎若不来公則無追若不言伐不使戎邇於我則言伐者皆使其邇於我乎又曰于濟西大之也亦非也但云公追戎未知追之於何所耶理所必書何大之之有秋有􅈮􅈮又作蜮音或左傳為災也公羊傳記異也榖梁傳一有一亡曰有􅈮射人者也􅈮魯所無也故以有書夫以含沙射人其為物至微矣杜氏曰􅈮短狐也含沙射人本革謂之射工孔氏正義洪範傳曰􅈮如鼈三足生於南越南越婦人多淫故其地多􅈮淫女惑亂之所生也陸璣詩䟽云一名射景在江淮水中人在岸上景見水中投人景則殺之或謂含沙射人入皮肌其瘡如疥徧身濩濩或或故為災魯人察之以聞於朝魯史異之以書於䇿何也山隂陸佃曰佃字農師宋建中靖國時人著春秋後傳二十卷􅈮隂物也麋亦隂物也是時莊公上不能防閑其母下不能正其身陽淑消而隂慝長上聲矣此惡氣之應去聲其說是也張氏曰漢書五行志劉向董仲舒已有是說盖麋者迷也􅈮者惑也是時文姜為亂於閨門之内其遺毒餘患至於哀姜卒再戉篡弑之禍物類之感天之示人顯矣然則簫韶作而鳯凰來儀春秋成而麟出於野何足怪乎麋􅈮乃物異之惡者也鳯麟乃物異之美者也春秋書物象之應去聲欲人主之慎所感也世衰道微邪說作正論去聲消小人長善類退天變動於上地變動於下禽獸將食人而不知懼也亦昩於仲尼之意矣愚按春秋書螟螽蝝生志蟲之害稼者也書多麋有􅈮有蜚有鸜鵒來巢志物之為異者也蟲之害稼茍有蓄積以賑飢民則不為災物之異常茍能修徳以消天變則不為異人為不善以致天變又不知警省而改過遷善以消悔怒則禍患之來弗能救矣或謂􅈮字以古𨽻較之作蟘即蠈也食苖葉者竊疑春秋書螽螟皆不言有此書有􅈮則為異而非蠈矣冬十月丙惠王午二年十有九年齊桓十一晉獻二衛惠二十五蔡哀二十鄭厲二十六曹莊二十七陳宣十八杞共六宋桓七秦宣公元年楚文十五卒春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公羊傳媵者何諸侯娶一國則二國往媵之以姪娣從姪者何兄之子也娣者何弟也諸侯一聘九女諸侯不再娶媵不書為其有遂事書大夫無遂事榖梁傳媵淺事不志其志何也媵亂之輕者也盟國之重也以輕事遂乎國重無說其曰陳人之婦略之也程子傳鄄之巨室嫁女於陳人結以其庶女媵之因與齊宋盟挈之以往結好大國所以安國息民乃以私事之小取怒大國故深罪之書其為媵而往盟為遂事媵淺事啖氏曰媵卑者之事也常事不書為遂事起本陳人微者愚按詩小序江沱之間有嫡不以其媵備數士昏禮媵布席于奥則卿大夫士皆有媵但不必備耳公子往焉是以所重臨乎禮之輕者也齊侯伯主宋公王者之後盟國之大事也大夫輒與音預焉是以所輕當乎禮之重者也薛氏曰正卿送媵禮之過也遂盟非其事也家氏曰媵女事之常而盟者國之重事况於盟伯主而可以遂事往乎禮者不失己亦不失人失己與人冦之招也是故結書公子而曰媵陳人之婦譏其重以失己也據衞人晉人齊人來媵皆微者齊宋書爵而曰遂譏其輕以失人也據公子遂㑹雒戎盟于暴不言遂趙氏曰大夫特盟公侯非禮也遂者専事之詞公羊遂生事也何氏曰生猶造也専事之詞孔氏正義遂擅成事也聘禮大夫受命不受辭出境有可以安社稷利國家則専之可也公羊謂本有此命去聲得以便宜從事特不受専對之辭爾愚按既曰受命則不可専命矣但曰不受辭則不過權其事宜而専制應對之辭而已若違命行私雖有利國家安社稷之功使去聲者當以矯制請罪有司當以擅命論去聲刑何者終不可以一時之利亂萬世之法是春秋之㫖也孫氏曰結矯命専盟故曰遂以惡之蜀杜氏曰諸侯専相為盟猶曰不可况以大夫不奉君命而専之乎故明書以示譏呂氏曰使結既盟而齊宋不來伐猶當以擅命之罪加之况無益而有害乎劉氏曰公羊以謂陳人者陳侯也非也云公子結以妾媵歸陳侯之婦則文理不成又無故貶損陳侯使從人稱非正名之義穀梁曰辟要盟也亦非也魯誠欲自託於大國豈敢以媵歸之名而遣使以取戾於伯主哉使者衘媵婦之命而遂要大國之盟是乃要盟矣何謂辟要盟乎愚按前漢馮奉世矯發兵撃破莎車議封奉世蕭望之曰矯制發兵雖有功効不可為後法陳湯矯制發兵與甘延夀襲斬郅支單于軍還論功匡衡等以延夀湯擅興師矯制幸得不誅不宜復加爵土先儒謂奉世延夀湯矯制以成功望之衡以為不可封者春秋譏遂事之法也今考朱子綱目凡此類悉以矯制書之豈非取法春秋譏公子結之遺意乎然考之傳註說穀梁者以謂公子結之媵與盟皆出君命左傳註䟽則謂魯使公子結往媵而盟非魯公意臨江張氏臨川吴氏又以盟出君命而媵乃結之私事據文定傳則二事皆非君命竊考經文不書如陳送媵而書媵陳人之婦則非奉君命而媵陳之微者矣微事不見於經書者譏其因専與齊宋盟耳若齊宋之盟出於公命當如公孫兹如牟因聘而娶經但書聘而不書娶此亦但書盟而不書媵矣夫人姜氏如莒傳見明年杜氏曰非父母國而往書姦張氏曰為國君之母非父母國而出入縱恣此行比於詩之所刺謂魯道有蕩齊子豈弟者抑又甚矣莊公既無復防閑之意而執國政者無人抑又可知安得不成淫風而致簒弑之禍也臨川吳氏曰夫人自齊襄弑後八年不出因十五年又一至齊盖假托國事以愚其昏懦之子莊公不能制故於今如莒也父母歿不得歸寜雖兄弟之國且不可往况往他國乎冬齊人宋人陳人伐我西鄙此見伐之始穀梁傳其曰鄙逺之也其逺之何不以難邇我國也程子傳齊桓始霸責魯不恭其事故來伐也何氏曰鄙者邉垂之辭奉詞曰伐其稱人將去聲卑師少也明非貶結方與二國盟則其來伐我何也齊桓始霸責魯不恭所謂失己與人以招冦也臨川吳氏曰魯之臣送己女為媵而遂與伯主大國盟不恭也是以聲其罪而伐之陳亦以結媵其國人之婦而輕慢伯主故與齊宋同興問罪之師結不知禮而為私為公兩失歡好禮之不可不謹也如是或以結能為去聲下同魯設免難去聲之䇿為齊宋畫講好去聲之計身在境外而權其國家為春秋予音與之故稱公子非矣啖氏曰結必非命卿嘉其能與齊宋盟以安社稷故特書公子劉氏曰王者之制諸侯不得擅相伐而有親親友賢善鄰之義此結所以得為魯設免難之䇿為齊宋畫講好之計具合於道其功甚美而身固在境外也與専命君側者異指是乃春秋與結也家氏曰是嵗周有子頺之亂衛師燕師禰兵伐周立子頺天子播遷于外桓公不能討乃以三國伐魯是春秋所責也愚按或謂齊討鄭詹之納夫詹之來已二年茍為鄭詹而討則不在斯時興兵矣春秋胡傳附錄纂疏卷八
