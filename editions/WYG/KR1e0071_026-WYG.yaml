body:
  text: 春秋胡傳附錄纂疏卷二十四元汪克寛撰昭公上公名稠襄公妾齊歸之子二十歲即位在位二十五年遜齊在外七年凡三十二年薨於乾侯夫人孟子庾景王申四年元年晉平十七齊景七年衞襄三年蔡靈二年鄭簡二十五年曹武十四年陳哀二十八年杞文九年宋平三十五年秦景三十六年楚郟敖四年卒吳夷末三年春王正月公即位穀梁傳繼正即位正也傳例承國於先君則得書即位以别於内復無所承者文成襄昭哀五公是也通㫖問子野毁而卒穆叔方言昭公有童心不可立然則昭公受誰之命乎何以書即位曰有子野之命矣故穆叔雖不欲而不能止也叔孫豹㑹晉平趙武楚郟敖公子圍齊景國弱宋平向戌衞襄齊惡陳哀公子招蔡靈公孫歸生鄭簡罕虎許悼人曹武人于虢國弱公作國酌後同向舒亮反戌音恤齊惡公作石惡招常遥反罕虎公作軒虎後同虢公作漷穀作郭左傳楚公子圍聘于鄭且娶于公孫段氏入逆而出遂㑹于虢尋宋之盟也祁午謂趙文子曰宋之盟楚人得志于晉今令尹之不信諸侯之所聞也子弗戒懼又如宋子木之信稱於諸侯猶詐晉而駕焉況不信之尤者乎楚重得志於晉晉之恥也文子曰宋之盟子木有禍人之心武有仁人之心是楚所以駕於晉也今武猶是心也楚又行僭非所害也武將信以為本吾聞之能信不為人下吾不能是難楚不為患楚令尹圍請用牲讀舊書加於牲上而已晉人許之三月甲辰盟楚公子圍設服離衛杜氏曰虢鄭地此陳侯之弟招也何以不稱弟諸侯之尊弟兄不得以屬通本穀梁曰公子者其本當稱者也曰弟者因事而特稱之也隱七年傳書盟書帥師而稱兄弟者罪其有寵愛之私書出奔書歸而稱兄弟者責其薄友恭之義所以然者諸侯非始封之君則臣諸父昆弟族人不得以屬戚親也君也本范氏注㑹于虢尋宋之盟而經何以不書在宋之盟楚人先歃邑洽反若曰狎戸甲反更也主諸侯則懼晉之先也故圍請讀舊書加於牲上而晉人許之杜氏曰舊書宋之盟書楚恐晉先歃故欲從舊書加於牲上不歃血經所以不書盟觀其事雖若楚重直用反得志祁午云云晉少懦乃亂反矣叔向云云然春秋不貴修盟晉人以信爲本故毎書必先趙武杜氏曰楚雖先晉而先書趙武者亦如宋盟貴武之信故尚之也王氏曰經先趙武所以抑蠻荆而存中國也張氏曰春秋正中外之分宋之盟楚争先而晉不與較今虢之役又以計讀書加牲上則是以蠻荒而争勝也中外之分不可亂故二役皆先趙武焉家氏曰夫中外有常分中國之尊不與外域對峙並存於宇宙之内也楚雖崛强而不得與晉齒中國諸侯有屈於楚者暫也非其常也向戌持弭兵之説趙武不明内外之分苟媮目前之安首紊常經倒植冠屨俾中國諸侯咸北面於荆楚之庭始曰弭兵而合晉楚之成旣而楚盛兵以臨諸侯滅陳滅蔡滅頼芟夷小國憑陵中夏人枹漢陽之憂蠶食之禍至是爲烈所謂讀舊書不歃血者楚再爲長而晉不敢與爭中國之恥也春秋爲中國惜不使外得以僣華是故長晉愚按宋虢之盟楚再先晉而春秋不以楚先者亦猶黄池之㑹呉子主㑹而春秋以晉居呉之上也辰陵蜀之盟申之㑹楚序諸侯之上皆主盟㑹也盂之㑹楚子亞於宋公而序諸侯之上宋虢兩役楚屈建公子圍亞於晉趙武而序於諸國大夫之上皆兩伯之辭也春秋抑外域而尊中國有中國霸主則必推而屬之中國中國無霸則實録而貶諸侯也劉氏曰公羊云招何以不稱弟貶也非也以母弟稱弟故云爾不知母弟可以稱弟而不可常稱常稱皆以重書也且招之罪在殺世子偃師不在㑹於漷也又云招之罪已重何爲復貶於此也著楚之託乎討招以滅陳也亦非也夫殺世子此招之罪也滅陳非招之罪也以楚討招滅陳而遂移罪於招豈春秋之理哉三月取鄆鄆公作運後同程子傳乘莒之亂而取之故隱避其辭按左氏季孫宿伐莒取鄆莒人訴於㑹楚告晉曰尋盟未退而魯伐莒瀆慢也齊盟齊之盟請戮其使疏吏反有欲求貨於叔孫豹而爲于僞反下爲内同之請者豹弗與曰諸侯之㑹衛社稷也我以貨免魯必受師是禍之也何衛之爲雖怨季孫魯國何罪趙孟聞之請於楚曰魯雖有罪其執事不辟音避難乃旦反子若免之以勸左右可也莒魯争鄆爲日久矣苟無大害於其社稷可無亢苦浪反禦也也乃免叔孫其不曰伐莒取鄆者乗莒亂而取邑故不悉書爲内諱也通㫖問伐莒取鄆何以不書莒或以爲鄆國也然否曰鄆莒邑也伐國而奪其地者王法所當誅魯乘莒亂奪其邑故隱避其辭特書取鄆爾與書外事詞固異也以鄆爲國者誤矣愚按文十二年城諸及鄆實莒魯争鄆之始劉氏曰公羊云運者内之邑也非也運常見於春秋皆與莒事相附此運本屬莒明矣夏秦景伯之弟鍼出奔晉鍼其亷反公羊傳有千乗之國而不能容其母弟穀梁傳諸侯之尊弟兄不得以屬通其弟云者親之也親而奔之惡也按左氏秦后子有寵於桓如二君於景杜氏曰后子鍼也桓公子景公母弟其權寵如兩君其母曰弗去懼選息轉反數也恐景公數其罪而加戮鍼遂出奔書此見音現下同人君寵愛其子不差楚宜反以禮是禍之也鍼之適晉其車千乗䋲證反司馬侯問焉曰子之車盡於此乎對曰此謂多矣若能少此吾何以得見叔齊曰秦公子必歸能知其過必有令圖令圖天所賛也後五年秦伯卒后子歸書曰弟者罪秦伯也隱七年傳書出奔而稱弟責其薄友于之義夫后子出奔其父禍之而罪秦伯何也春秋以均愛望人父以能友責人兄父母有愛妾猶没身敬之不衰見内則况兄弟乎兄弟翕而後父母順矣本中庸故不曰公子而特稱秦伯之弟云劉氏曰公羊云秦無大夫仕諸晉也千乗之國不能容母弟故謂之出奔非也如傳所說當書曰秦伯放其弟鍼於晉今經言奔何以見秦伯仕之於晉乎所謂秦無大夫者直虛言爾六月丁巳邾子華卒悼公也在位十五年子穿嗣是爲莊公晉平荀呉帥師敗狄於大鹵敗必邁反鹵音魯大鹵公穀作大原音泰左傳晉中行穆子敗無終及羣狄於大原崇卒也將戰魏舒曰彼徒我車所遇又阨以什共車必克困諸阨又克請皆卒自我始乃毁車以爲行五乗爲三伍爲五陳以相離兩於前伍於後專爲右角參爲左角偏爲前拒以誘之狄人笑之未陳而薄之大敗之公羊傳此大鹵也曷爲謂之大原物從中國名從主人穀梁傳中國曰大原夷狄曰大鹵杜氏曰大鹵大原晉陽縣愚按今太原路陽曲縣大鹵大原也按六月宣王北伐之詩其詞曰薄伐玁音險狁音允北狄也至于太原而詩人美之者謂不窮追遠討及封境而止也朱子傳至于太原言逐出之而已不窮追也先王治戎狄之法如此然則太原在禹服之内而狄人來侵攘斥宜矣其過在毁車崇卒以詐誘狄人而敗之非王者之師耳使後世車戰法亡崇尚歩卒如魏之武士秦之戎卒爭以變詐相髙日趨苟簡皆此等啓之矣書敗狄譏之也髙氏曰箕與交剛之役皆晉人至是卿帥師則晉益衰矣陳氏曰晉自悼公以來狄師不出敗狄至是而再見其再見何晉彌衰也悼公之霸也魏絳諫曰勞師於戎而楚伐陳必不能救是棄陳也諸華必叛戎禽獸也獲戎失華毋乃不可乎悼公卒復有事於戎狄至伐鮮虞春秋遂狄晉矣秋莒去疾自齊入於莒去起吕反左傳襄三十一年莒犂比公生去疾及展輿既立展輿又廢之展輿因國人以攻莒子弑之乃立去疾奔齊齊出也元年莒展輿立而奪羣公子秋公子召去疾於齊齊公子鉏納去疾展輿奔吳程子傳去疾假齊之力以入莒討展輿之罪正也故稱莒遂自立無所禀命故不稱公子自以爲公子可立也天下國家定於一呉楚僣號經不書葬土無二王也以忽繫之鄭則突不稱國桓十一以小白繫之齊則糾不書子莊九國無二君也展輿乃莒子而去疾曷爲又以國氏乎程氏曰去疾假齊之力以入莒討展輿之罪正也其以國氏與去疾之討有罪也此莒之公子曷爲不稱公子自謂先公之子可以有國不疑遂立乎其位而無所禀也其書入者難詞也陳氏曰前言齊無知弑其君後言小白入于齊前言莒人弑其君後言去疾入于莒則不與弑之辭也前言衛侯入于夷儀後言衛寗喜弑其君前言齊陽生入于齊後言齊陳乞弑其君與弑之辭也故曰屬辭比事春秋教也莒展輿出奔吳展下公穀無輿字程子傳為弑君者所立而以國氏者罪諸侯也虢之㑹雖國亂未預然諸侯與其立矣故執叔孫稱莒展輿見諸侯之與其立也展輿莒子也曷爲不稱爵爲弑君者所立既立乎其位而不能討賊則是與音預聞乎故也斯不可以有國矣趙氏曰鄭忽曹羈未踰年出奔不稱爵言不能嗣先君也莒展雖踰年不稱爵其罪大也劉氏曰莒展子也而不謂之子展失子之道也凡人之所以稱乎臣者以有君也所以稱乎子者以有父也君弑矣而臣不討賊父殺矣而子不復讎是固無臣子之理也展之見奪不亦宜乎魯叔孫氏之竪牛殺孟丙仲壬以主昭子昭子既立殺竪牛仲尼聞之曰叔孫昭子不賞私勞不可能也豈其掩義隱賊而忘君父哉不可以有國則曷爲以國氏程氏曰罪諸侯之與其立也虢之㑹展輿無列何以見諸侯之與其立乎莒雖以亂未能預㑹然訴魯取鄆而在㑹者欲執叔孫則知諸侯之與其立矣亦以國氏惡烏故反崇亂也髙氏曰莒人弑君諸侯不共討之是時楚人方聽莒人之訴而欲執魯大夫是不以莒人為可討也展不稱子聖人不予其為君也劉氏曰左氏云君子曰莒展之不立棄人也夫若是末哉君子之言也夫展輿弑君而不譏棄人而譏之是謂棄人重於弑父也藉使展輿但勿棄人以濟其不義之身則固以為賢矣不亦害天下之教乎叔弓帥師疆鄆田左傳因莒亂也公羊傳疆鄆田者何與莒為竟也穀梁傳疆之為言猶竟也杜氏曰春取鄆今正其封疆髙氏曰文十二年季孫行父嘗帥師而城之復為莒所取今乗莒之亂而取之又帥師以疆其田必帥師者以不義得之懼不服也疆之者溝封之以别乎莒也何以書譏其乗亂牟利也劉氏曰譏以亂為利也王氏曰取鄆不書帥師疆田書之者以見其因莒亂出不意而取得之為易今欲固其所得則莒人来争必矣故遣卿帥師而疆之然魯秉周禮旣因人之亂以取田又恃其師衆而疆之則先王封域不復守矣書者所以志亂也愚按春秋一經書假田者一譏予之之非義也書疆田者一譏取之之非義也凡此皆聖人之特筆所以垂訓戒也劉氏曰公羊云畏莒也非也鄆本属莒故魯取其邑未得其地故因莒亂帥師而往分明疆土此乃欺之非畏之也且魯强莒小魯安莒亂何為乃畏莒哉𦵏邾悼公髙氏曰入春秋来邾始書𦵏蓋邾滕薛小國也秦逺國也皆至昭公而書𦵏是魯衰甚矣小國如大國逺國如近國冬十有一月己酉楚子麇卒麇九倫反公穀作卷音權按左氏楚令尹圍將聘于鄭未出竟音境聞王有疾而還音旋入問王疾縊一䜴反絞也孫卿曰以冠纓絞之而弑之遂殺其二子幕及平夏右尹子干出奔晉宫廐尹子晳出奔鄭殺大宰伯州犁于郟𦵏王于郟謂之郟敖使赴于諸侯應為後之詞曰共音恭王之子圍為長展两反初圍之未動於惡入預夏盟㑹于虢緝七入反蒲為宫設服離衛杜氏曰緝蒲為王殿屋屏蔽以自殊異設君服二人執戈陳于前以自衛離陳也中國大夫莫不知其有無君之心矣叔孫穆子曰楚公子美矣君哉鄭子皮曰二執戈者前矣蔡子家曰蒲宫有前不亦可乎趙孟謂叔向曰令尹自以為王矣襄二十九年郟敖即位王子圍為令尹鄭行人子羽曰是謂不宜必代之昌三十年薳罷來聘穆叔問王子之為政何如不告穆叔曰令尹將有大事子蕩將與焉助之匿其情矣雖以疾赴曷為承偽藏在諸侯之策乎杜氏曰楚以瘧疾赴故不書弑當是時仲尼已生將志于學襄二十一年孔子生是年十二嵗乃所見之世非祖之所逮聞也又曷為因之而不革乎曰此春秋之所以為春秋非聖人莫能修之者也薨則書薨卒則書卒弑則書弑𦵏則書𦵏各紀其實載於簡策國史掌之此史官之所同而凡為史者皆可及也或薨或不薨魯君夫人殁則書薨外諸侯殁則書卒而不曰薨或卒或不卒内大夫書卒而公子翬不書卒或弑或不弑外諸侯見弑皆書惟鄭髠頑楚麇齊陽生不書弑魯君見弑者但書薨或𦵏或不𦵏外諸侯𦵏魯往㑹皆書而吳楚之君雖往㑹不書𦵏君弑賊不討者亦不𦵏筆削因革裁自聖心以達王事此仲尼之所獨而游夏亦不能與音預下同焉者也然則郟古洽反敖杜氏曰楚人謂未成君為敖實弑而書卒何歟令尹圍弑君以立中國力所不加而莫能致討則亦已矣至大合諸侯于申四年與㑹者凡十有三國其臣舉六王二公之事其君用齊桓召音邵陵之禮而宋向戌鄭子産皆諸侯之良也而皆有獻焉不亦傷乎若革其偽赴而正以弑君將恐天下後世以􅆲弑之賊非獨不必致討又可從之以主㑹盟而無惡烏故反又如字矣聖人至此憫之甚懼之甚憫之甚者憫中國之衰㣲而不能振也懼之甚者懼人欲之横去聲流而不能遏也是故察㣲顯權輕重而略其􅆲弑以扶中國制人欲存天理其義㣲矣通㫖問圍弑郟敖而立春秋書卒而不書弑申之㑹諸侯從弑君之賊而無貶黜之辭則為惡之人何所懲戒亂臣賊子又何懼焉曰見弑之君有書殺者弑君之人有書盗者有書人者有書國者有書其名氏者有略而不書者此聖人之精意也若槩以常法書之而不當于義則夫人而能為春秋矣圍弑郟敖而不書其以申之㑹乎明此義其可與權矣雖承其偽赴而下書公子比出奔晉又申之㑹不殊淮夷又書執齊慶封殺之楚䖍弑逆之罪亦著矣王氏箋義歸生憚老陳乞流涕而加弑君之罪今圍弑君而不稱弑何也良以圍弑麇之後數行無道暴滅中國其罪惡尤甚盖賊臣弑君一國之惡也蠻荆主上國天下之禍故㑹于申不殊淮夷外之也若先書圍弑其後誘蔡侯滅陳蔡之罪尤重故擇其重而誅絶之髙氏曰戰國策載不修春秋之言曰楚王子圍聘於鄭未出竟聞王病反問疾遂以冠纓絞王殺之因自立然則郟敖實弑也聖人書卒者盖春秋新意也張氏曰隱公弑而書薨爲魯諱也楚麇弑而書卒為中國諱也鄭僖齊悼弑而書卒為賢者諱也考是三者足以見聖人㣲顯志晦之法矣陳氏曰圍弑其君晏然赴于他國如恒辭猶鄭騑也而其臣子聽焉相與設應為後之詞甚矣無人紀也從而書卒所以誅楚之臣子聽賊之所為也圍之未弑也魯蔡鄭之大夫固知之矣㑹于申以齊慶封徇於諸侯曰無或如齊慶封弑其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弑其君兄之子麇而代之以盟諸侯軍人粲然皆笑史見其事春秋著其心則後世有考矣愚按楚䖍之戮慶封也其臣椒舉曰無瑕者可以戮人播於諸侯焉用之則䖍􅆲弑之跡不可掩矣家氏曰圍所弑者楚之嗣君麇之世子如子般子赤之類蓋麇病革圍聞其將卒自外急歸乗君之殞戕其子而􅆲其位是亦弑也而非弑麇當時諸國𫝊聞之誤有以為弑君者耳臨川吴氏曰圍之欲弑逆而篡立也乆矣郟敖有疾圍自外至入問其疾適值其卒因殺其君之二子而自立國人遂疑麇之卒為圍所弑也楚公子比出奔晉髙氏曰靈王既殺其君之子而自立比為右尹力不能制是以出奔春秋書之為十三年起也辛景王酉五年二年晉平十八齊景八衛襄四蔡靈三鄭簡二十六曹武十五陳哀二十九把文十宋平三十六秦景三十七楚靈王䖍元年吳夷末四春晉侯平使韓起來聘左傳韓宣子來聘且告為政而來見也觀書於太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王也愚按前此晉之聘魯者九未嘗以上卿執政者將命今韓起始以去年為政而是春即聘于魯盖晉霸漸衰而欲以佳好結魯也夏叔弓如晉平左傳報宣子也秋鄭簡殺其大夫公孫黒按左氏鄭駟黒子晳也公子騑子好呼報反在人上攻良霄而逐之襄三十又與公孫楚爭室元年鄭徐吾犯之妹美公孫楚聘之矣公孫黒又使強委禽焉犯懼告子産子産曰是國無政非子之患唯所欲與適子南氏子晳怒旣而櫜甲以見子南欲殺之而取其妻子南知之執戈逐之子晳傷而歸告大夫曰我好見之不知其有異志也故傷大夫皆謀之子産曰直鈞㓜賤有罪罪在楚也放游楚于呉鄭伯及其大夫盟于公孫段氏罕虎公孫僑公孫段印段游吉駟帶私盟于閨門之外實薰隧公孫黒强與於盟使大史書其名且曰七子子産弗討杜氏曰子晳強討之恐亂國又將作亂去起呂反游氏代其位傷疾作而不果子産使吏數責數其罪之曰爾有亂心無厭於鹽反國不女與汝反堪專伐伯有而罪一也兄弟争室而罪二也矯居表反君之位薫隧之盟而罪三也不速死大刑將至遂縊一跂反而尸之並據左傳黒自縊尸諸周氏之衢黑則有罪而鄭人初畏其强不之討也因其疾而幸勝之則亦云殆矣故稱國以殺累劣偽反乎上也劉氏曰稱國以殺大夫者罪累上也黒有罪其以累上言何惡鄭伯也何惡乎鄭伯言不能討有罪以放乎亂也其放乎亂奈何黒伐良霄而逐之君弗誅也以為大夫又與公孫楚争娶徐吾氏徐吾氏歸于楚君放楚也而盟諸大夫黒於是自以爲卿又將爲亂疾作而卧子産使吏數諸其家則幸而勝之耳夫君專殺大夫非王法所得為者也然而春秋或予之所以見君臣之禮扶上而抑下也聖王之罰不誅不教不誣無罪及其惡成而罪見誅之猶鷹鸇之逐也無留獄矣豈幸而勝之哉冬公如晉平至河乃復季孫宿如晉公羊傳其言至河乃復何不敢進也穀梁傳公如晉而不得入季孫宿如晉而得入惡季孫宿也按左氏晉少詩照反姜卒公如晉及河晉侯使士文伯士弱之子伯瑕來辭曰非伉苦浪反儷力計反也非適夫人請君無辱公還音旋季孫宿遂致服焉杜氏曰致少姜之襚服舉動人君之大節賢哲量之以行藏其道姦邪窺之以作止其惡四鄰視之以厚薄其情故有國者必謹於禮而後動此守身之本保國之基也禮雖自卑以尊人亦不妄恱人以自辱曲禮夫禮者自卑而尊人又曰禮不妄恱人昭公旣不能據經守正失禮而妄動又不能從權適變無故而輕復終復扶又反失國出奔客死他境蓋始諸此行矣常山劉氏曰凡人君動止有度豈可非禮而行無故而復哉蓋進退皆非禮義也劉氏曰千乗之國至重也而動不以禮雖為之卑伏曲從猶之無益也適得輕焉譬之鄭衛之處子蒙珠玉而過中山之盗也滋益恭而滋益侵耳以此觀之為國以禮者處勝人之地矣或曰禮者明微正於未動之前可也已至於河而見郤與却同雖欲勿返將得已乎曰以周公之胄直救反千乗繩證反之國輕身以修鄰好呼報反乃欲郤而不納夫何敢若曰敝邑褊必淺反小敬事大國惟恐獲戾聞陳無宇見執於中都左傳韓須如齊逆女齊陳無宇送女致少姜少姜有寵於晉侯謂之少齊謂陳無宇非卿執諸中都杜氏曰晉欲使齊以適夫人禮送少姜謂少姜之數所具反於守適丁歴反子太叔曰今嬖寵之喪不敢擇位而數於守適惟恐獲戾杜氏曰禮數如適夫人信也用是不遑寧處跋履山川來修弔事今若不獲進見剪為仇讎他國誰敢朝夕在廷修事大之禮乎夫小國之去就從違聽大國之令也若非伉儷齊人請陳無宇之罪何以令之也苟有二命又何以為盟主如此晉人其將謝過之不暇敢不納乎昭公習儀以亟紀力反五年晉女叔齊曰為國君難將及身不恤其所而屑屑焉習儀以亟而不明乎禮其及也宜及於難也經書公如晉至河乃復季孫宿如晉而昭公失國之因季氏逐君之漸晉人下比毗志反之迹不待貶絶而皆見音現矣通㫖問公如晉至河而晉郤之耻孰甚焉直書不諱何也曰如晉而見郤雖亦可恥而非惡之大也恥有甚於此者衆矣是以直書不諱舉動人君之大節書有疾乃復則勢當復者也其餘非譏晉則罪公髙氏曰公如晉而晉不納春秋以公至河乃復為文者臣子之心不欲其君見拒於人而以為公臨河而不濟懼涉難而自復也乃者有阻之辭盧氏曰君返臣往惡莫大矣項氏曰自是霸者之令抑君助臣而天下之為君者無以自立而晉之君亦無以自立矣孫氏曰公如晉而距之季孫如晉而納之是昭公季孫宿之不若也此晉侯之惡亦可見矣經書公如晉至河者六唯二十三年書有疾明有疾而反餘皆譏公數如晉見距不能以禮自重大取困辱也永嘉吕氏曰如晉而復者六而昭公居其五足以見昭公之自取屈辱由其舉動不能謹於禮也愚按昭公服喪已畢當類見於天子而受命之時也嗣守社稷之重不朝於周以少姜之喪而特如晉親修士弔之事是以妄恱人而取辱也晉平以閨闥之愛勤動天下之君大夫以為嬖妾之哀榮其為盟主抑末矣宣公如齊奔惠公之喪成公如晉奔景公之喪已為非禮而况於弔寵妾之喪乎積習之弊至於趙文子卒鄭簡公如晉弔晉人辭之及雍乃復則不唯弔其妾而且弔其臣矣春秋書昭公適晉不至而復所以譏昭公之取辱亦以傷世道之衰也劉氏曰穀梁云恥如晉故著有疾非也但云至河乃復安知有疾哉壬景王戌六年三年晉平十九齊景九衛襄五蔡靈四鄭簡二十七曹武十六陳哀三十把文十一宋平三十七秦景三十八楚靈二吳夷末五春王正月丁未滕子原卒原公作泉夏叔弓如滕五月葬滕成公滕始書葬杜氏曰卿共小國之葬禮過厚葬襄公滕子來㑹故魯厚報之髙氏曰與二十二年葬景王無辨矣秋小邾子穆來朝左傳小邾穆公來朝季武子欲卑之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其貳又卑一睦焉逆羣好也其如舊而加敬焉季孫從之髙氏曰公即位之初大國來聘小國來朝非不可為之國也而終之以流播詩曰靡不有初鮮克有終可不戒哉八月大雩左傳旱也愚按春秋書雩二十有一而昭公之世有十焉此年及六年八年十六年二十四年二十五年再雩是也左氏唯八年無傳餘皆云旱也於再雩則曰旱甚也亦可見災變之數見矣是年既遭旱暵未幾而連月雨雹昭公昏懦略無遇災而懼之意終及於難吁可嘆哉冬大雨雹雨于付反雹蒲學反杜氏曰記災北燕伯欵出奔齊燕於賢反按左氏燕簡公多嬖寵欲去起吕反下同諸大夫而立其寵人燕大夫比毗志反下同以殺公之外嬖公懼奔齊書曰北燕伯欵出奔齊罪之也杜氏曰不書大夫逐之而言奔罪之也啖氏曰出君之罪史氏知之也春秋舉王綱正君則治道興矣書名者罪其失地非復諸侯也君雖不君臣不可以不臣燕伯欲去諸大夫固不君矣而大夫相與比以殺其外嬖是威脅肸業反其主而出之也與鬻音育拳之以兵諫無異見左傳莊十九而獨罪燕伯何哉大夫國君之陪貳左傳昭三十二物生有兩有三有五有陪貳王有公諸侯有卿皆有貳也以公心選之而不可私也以誠意委之而不可疑也以隆禮待之而不可輕也以直道馭之而不可辱也否則是忽其陪貳以自危矣晉厲公殺三郤立胥童而弑於麗氏成十七漢隱帝殺楊史立郭允明而弑於蘇村五代史漢隱帝乾祐三年同平章事楊邠侍中史𢎞肇樞宻使郭威輔政專權上厭為大臣所制左右嬖倖浸用事郭允明聶文進閻晉卿䒭皆有寵因乘間言邠䒭終當為亂上信之遂與允明等謀誅之邠𢎞肇入朝伏甲士殺之於東廡遣使賫宻詔殺郭威威將兵入朝上出兵拒之至趙村為亂兵所弑允明等皆自殺衛獻公蔑冢卿而信其左右亦奔夷儀乆而後復也襄十四二十六故人主不尊陪貳而與賤臣圖柄臣者事成則失身而見弑事不成則失國而出奔此有國之大戒也春秋凡見逐於臣者皆以自奔為文正其本之意也而垂戒逺矣家氏曰所貴乎國君者選賢㧞能布在有位信之任之與之共圖國政嬖寵不得間也國有公卿大夫而以近習間之亂也癸景王亥七年四年晉平二十齊景十衛襄六蔡靈五鄭簡二十八曹武十七陳哀三十一杞文十二宋平三十八秦景三十九楚靈三呉夷末六春王正月大雨雹雨于付反雹公榖作雪或作雹左傳季武子問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏氷西陸朝覿而出之其藏氷也深山窮谷固隂沍寒於是乎取之其出之也朝之祿位賔食䘮祭於是乎用之其藏之也黒牡秬黍以享司寒其出之也桃弧棘矢以除其災祭寒而藏之獻羔而啓之公始用之自命夫命婦至於老疾無不受氷山人取之縣人傳之輿人納之𨽻人藏之夫氷以風壯而以風出其藏之也周其用之也徧則冬無愆陽夏無伏隂春無凄風秋無苦雨雷出不震無菑霜雹癘疾不降民不夭札今藏川池之氷棄而不用風不越而殺雷不發而震雹之為菑誰能禦之七月之卒章藏氷之道也隂陽之氣和而散則為霜雪雨露不和而散則為戾氣曀於計反霾芒皆反本張子正蒙雹戾氣也隂脅陽臣侵君之象本范氏注陽氣之在水雨則温熱隂氣薄而脅之不相入轉而成雹宋氏曰凡陽侵隂不入為霰隂侵陽不入為雹周之正月夏之十一月也是隂極陽㣲之時以極隂而侵㣲陽乃季氏争權脅公專制之象也當是時季孫宿襲位世卿將毁中軍專執兵權以弱公室故數所具反月之間再有大變去年冬大雨雹申豐者季氏之孚也見公羊僖十五何氏曰孚信也季氏所信任臣不肯端言其事故暴蒲卜反揚於朝歸咎藏氷之失劉氏曰夫豐言聖王在上無雹可也言雹之為災由藏氷故非也魯雖藏川池之氷未為不藏氷如五帝以前未有藏氷之時豈長雨雹乎且豐之為人姦佞人也黨於季氏不敢端言其罪故推雹災歸之藏氷欲以諂媚強臣抹摋災異此與張禹谷永何異哉所以使昭公死於外者未必非此人也夫山谷之氷藏之也周用之也徧亦古者本末備舉燮調之一事耳謂能使四時無愆伏凄苦之變雷出不震無菑音災霜雹則亦誣矣意者昭公遇災而懼以禮為國行其政令無失其民晉女叔齊云云雹之災也庶可禦也不然雖得藏氷之道合於豳風七月之詩其將能乎髙氏曰自去年冬至今年春正月連大雨雹故前以時紀此以月紀夫天道如此人事可知夏楚子靈蔡侯靈陳侯哀鄭伯簡許男悼徐子滕子悼頓子胡子沈子小邾子穆宋平世子佐淮夷㑹于申楚子專㑹諸侯始此左傳楚子使椒舉如晉求諸侯晉侯欲勿許司馬侯曰楚王方侈天其或者欲逞其心以厚其毒而降之罰未可知也晉楚唯天所相不可與爭君其許之乃許楚使楚子問於子産曰晉其許我諸侯乎對曰許君晉君少安不在諸侯其大夫多求莫匡其君在宋之盟又曰如一若不許君將焉用之王曰諸侯其來乎對曰必來不來者其魯衛曹邾乎曹畏宋邾畏魯魯衛偪於齊而親於晋唯是不來諸侯如楚魯衛曹邾不㑹楚子合諸侯于申椒舉言於楚子曰諸侯無歸禮以為歸今君始得諸侯其慎禮矣夏啓有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之蒐康有鄷宫之朝穆有塗山之㑹齊桓有召陵之師晋文有踐土之盟君其何用宋向戌鄭公孫僑在諸侯之良也君其選焉王曰吾用齊桓王使問禮於左師與子産左師獻公合諸侯之禮六子産獻伯子男㑹公之禮六宋太子佐後至辭而弗見楚子示諸侯侈椒舉曰夫六王二公之事皆所以示諸侯禮也今君以汰無乃不濟乎王弗聽程子傳晋平公不在諸侯楚於是強為覇者之事杜氏曰胡國汝隂縣西北有胡城申在南陽宛縣張氏曰淮夷淮浦之夷後漢志下邳國有淮浦縣申姜姓之國愚按胡國今屬汴梁路潁州淮夷地今邳州濰寕縣申國為楚所滅葢楚地今信陽州髙氏曰春秋以來蔡常在陳衛上荘十六年後以服屬於楚未嘗先陳衛今楚大合諸侯故復居陳上申之㑹楚子為主而不殊淮夷是在㑹之諸侯無别矣何氏曰不殊淮夷者楚子主㑹故君子不殊其類所以病中國王氏曰晋嘗與吴為㑹而殊㑹之者不使吳人得同夏盟也此申之㑹十二國諸侯在㑹而楚䖍實主之晋雖不在㑹亦許之㑹矣故淮夷與㑹累數而不殊之者徧刺天下之諸侯以中國之君而甘與荆蠻為伍也家氏曰宋之盟虢之㑹晋楚同之猶以紊列國内外之辨春秋譏焉今楚䖍新立逞其狂悖從晋人求諸侯晋之君臣不知為中國惜輕以許之楚遂合列國之君十有三國而為此㑹夷主夏盟㑹盟之一大變也是㑹也楚主之楚㑹之是之謂列姦中國諸侯預於是㑹者辱也其意也何楚䖍弑䴢以立而求諸侯於晉晉人許之中國從之執徐子圍朱方遷賴於鄢音偃城竟音境莫校杜氏曰請築城於外竟諸侯無與爭畏其強盛則曰晉楚唯天所相息亮反不可與爭滅陳不能救則曰陳亡而楚克有之天道也九年鄭禆竈云云滅蔡而又不能救則曰天將棄蔡以壅楚盈而降之罰也十一年晉叔向鄭子皮云云至使窮凶極惡師潰於訾子斯反梁身竄七亂反於棘里而縊一豉反於申亥十三年人不致討而天自討之是責命于天而以人事為無益而弗為也而可乎弑君之賊在春秋時有臣子討之則衞人殺州吁是也隠四有四鄰討之則蔡人殺陳佗徒何反是也桓六臣子不能討之於内四鄰不能討之於外有與之㑹以定其位則齊侯及魯宣公㑹于平州是也宣元有受其賂以免於討則晉侯及諸國㑹于扈是也文十五十七然至此極矣則未有不以為賊而又推為盟主相與朝事之以聽順其所為而不敢忤五故反逆也者也莊子使人乃以心服而不敢忤之故申之㑹不殊淮夷者以在㑹諸侯皆為荆蠻之屬下孟反皆王法之所當斥音尺黜也而不使楚執夏盟之意也或曰晉叔向許丈反鄭子産宋向戌皆諸侯之良也謀其國至甘属楚而不校何哉聖人以天自處賢者聽天所命春秋之法以人合天不任於天以義立命不委於命而宇宙在其手者也故楚麇書卒不革其偽赴於前諸侯㑹申與淮夷累數所主反於後此以恕待人而責備賢者之意其垂訓之義大矣通㫖問申之㑹諸侯從靈王者不貶豈以靈王為可從乎豈以楚國天下莫強焉從之者乃不得已其情可恕歟抑從之者衆誅之則不可勝誅歟不然聖人之深意安在曰申之㑹不殊淮夷者在㑹諸侯皆狄也其臣舉六王二公之事其君用齊桓召陵之禮於是天下之政中國之事制在蠻荆聖人哀人倫之滅傷中夏之衰故其詞變而楚麇書卒略其弑而不見此變者道之中惟可與權者其知之矣張氏曰春秋不書楚子䖍之弑君者為㑹於申而中國諸侯皆宗之故用魯君見弑之法而楚子麇書卒為中國諱也然淮夷不殊㑹以見其類之同則在㑹諸侯之從逆黨惡亦不可掩矣志而晦㣲而顯婉而成章其斯之謂歟陳氏曰楚初專合諸侯也齊桓卒楚宋嘗争長矣敗于城濮楚師不出者八年晋志不在諸侯而後楚荘盟于辰陵以荘王之賢從之者陳鄭焉耳申之㑹合十有二國楚之得志於中國未有盛於此時者也孫氏曰中國自宋之㑹政在大夫諸侯不見者十年楚子得大合諸侯于此者中國不振幅裂横潰自是天下之政中國之事皆楚人制之至於平丘召陵之㑹諸侯雖再出尋復叛去事無所救不足道也髙氏曰楚子始求合諸侯問於子産曰晋其許我乎又曰諸侯其來乎則固自以為不足服諸侯而懼其未必從矣使晋稍自強其誰敢與争晋強而諸侯從之則楚亦不能肆其志也而晋方且溺於嬖寵故楚偃然得專諸侯諸侯舍晋無所附亦不得已而從楚此書云云者楚人為主而合諸侯也雖然楚之㑹諸侯也非與國則小國耳魯齊衛曹薛邾杞不㑹也宋鄭滕小邾雖㑹而不終與也以是知蠻荆必不能主中國也愚按楚䖍弑君􅆲國僣王稱亂靡攸不為然大合諸侯不敢用六王之禮而用齊桓非有所畏也盖其羞惡之本心未敢遽擬古聖王之事猶盜賊之不敢比君子也楚人執徐子左傳徐子吴出也以為貳焉故執諸申髙氏曰執之非道也盖欲效桓文之舉以示威諸侯亦不言以歸者申楚地且因以伐吴故也陳氏曰以其類自相執如文十二年楚執舒子平昭三十年吴執鍾吾子皆不書書執徐子危㑹申之諸侯也自宋之盟中國無大㑹越九年而十二國之君皆受命於楚楚於是執徐子將以威中國也是故其類相執不志為中國危之故志之也僖十九年𫝊稱人不得為伯討秋七月楚子靈蔡侯靈陳侯哀許男悼頓子胡子沈子淮夷伐吴夷末左傳楚子以諸侯伐吴宋太子鄭伯先歸宋華費遂鄭大夫從徐氏曰諸侯復序有不與伐者也通㫖問伐吴之役諸侯從靈王者不貶曰欲見諸侯之善著楚䖍之惡也為討弑君之賊故曰欲見諸侯之善書執齊慶封殺之故曰著楚䖍之惡其㫖㣲矣執齊慶封殺之左傳使屈申圍朱方克之執齊慶封而盡滅其族將戮慶封椒舉曰無瑕者可以戮人慶封唯逆命是以在此其肯從於戮乎播於諸侯焉用之王弗聽負之斧鉞以狥於諸侯使言曰無或如齊慶封弑其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弑其君兄之子䴢而代之以盟諸侯王使速殺之公羊傳慶封走之吴吴封之於防不言伐防不與諸侯專封也榖梁傳慶封以齊氏為齊討也王以慶封令於軍中曰有若齊慶封弑其君者乎慶封曰子一息我亦且一言曰有若楚公子圍弑其兄之子而代之為君者乎軍人粲然皆笑慶封弑其君而不以弑君之罪罪之者慶封不為靈王服也不與楚討也春秋之義用貴治賤用賢治不肖不以亂治亂也孔子曰懐惡而討雖死不服其斯之謂與趙氏曰慶封時已非齊臣夫子以其與弑君之賊所當討故係之齊焉張氏曰春秋書殺他國大夫之法有二凡有罪而當誅者曰某人殺某若楚人殺陳夏徵舒是也無罪而不服者書執而殺之若執蔡世子有以歸用之楚人執陳行人干徵師殺之是也慶封有與弑其君之罪楚子殺之宜也不曰殺齊慶封而曰執齊慶封殺之者楚靈有諸已而非諸人是以慶封不服而春秋亦不得純以討賊之法書之也陳氏曰此執有罪曷為不再言楚子不予楚以討齊慶封之辭也猶曰諸侯執之焉耳申之㑹夷夏之大變也宋號之事猶曰二伯至是楚專合諸侯訖于厥憗諸夏無㑹同者十年而楚執齊慶封放陳招殺蔡般假討賊之義以號於天下由是而滅賴滅陳滅蔡矣愚按執宋公而不書楚執分其惡於諸侯也討齊慶封而不書楚討移其善於諸侯也若曰不使楚䖍得以竊討賊之名也遂滅賴賴公榖作厲左傳遂以諸侯滅賴遷賴於鄢使闘韋龜與公子棄疾城之而還申無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校王心不違民其居乎民之不處其誰堪之不堪王命乃禍亂也榖梁傳遂繼事也襄陵許氏曰惡其因義而為利以惡終也家氏曰遂滅賴著楚之暴也齊桓侵蔡遂伐楚為中國攘暴亂遂事之正也楚䖍怙其强横刼中國之諸侯而滅無罪之國書遂所以誅也遂之為義要當随事以求經意執一例則拘矣杜氏曰賴國義陽随縣愚按今峽州路隨州啖氏曰左氏云賴子面縛衘璧楚子焚櫬按經但言滅是死位也他年賴降而舍之故誤耳九月取鄫左傳莒亂著丘公立而不撫鄫鄫叛而來公羊傳其言取之何滅之也滅之則其言取之何内大惡諱也家氏曰前此莒人繼鄫鄫之廟社猶存今為魯所取而鄫於是始滅春秋書取鄫責魯也王氏曰鄫立莒公子為後今來歸魯魯能請於天子復立其社稷則為善因而兼之則惡矣故變文書取而從内諱之例隱二年傳内滅書取特婉其辭為君隱也冬十有二月乙卯叔孫豹卒左傳初穆子去叔孫氏及庚宗遇婦人使私為食而宿焉問其行告之故哭而送之適齊娶於國氏生孟丙仲壬及宣伯奔齊魯人召之歸既立所宿庚宗之婦人獻以雉問其姓對曰余子長矣能奉雉而從我矣召而見之名之曰牛遂使為竪有寵長使為政叔孫田於丘蕕遂遇疾焉竪牛欲亂其室殺孟逐仲疾急命召仲牛許而弗召杜洩見告之饑渴授之戈對曰求之而至又何去焉牛曰夫子疾病不欲見人使寘饋於今而退牛弗進則置虚命徹叔孫不食卒牛立昭子而相之五年仲至自齊竪牛攻之死昭子即位朝其家衆曰竪牛殺適立庶必速殺之牛懼奔齊孟仲之子殺諸塞闗之外襄陵許氏曰豹卒而毁中軍則公若寄矣以是知豹之有力於公室所謂剥之無咎者歟甲景王子八年五年晉平二十一齊景十一衛襄七蔡靈六鄭簡二十九曹武十八陳哀三十二杞文十三宋平三十九秦景四十卒楚靈四吳夷末七春王正月舍中軍舍音捨下同按左氏舍中軍卑公室也初作三軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公孔氏正義初作三軍季氏盡征之並不入公室也叔孫氏臣其子弟以一家之内有父子兄弟四品以父兄之稅入公子弟之稅入已大率半屬公半入已孟氏則於子弟中取其半或取子或取弟大率三分歸公一分入已十二分其國民三家得七公得五國民不盡屬公公室已卑矣今舍中軍四分公室三家自取其稅而隨時獻公公室彌卑矣初云作三軍今不云舍三軍者初作時三家各毁其乘足成三軍今此唯舍中軍之衆屬上下二軍季氏因叔孫家禍退之使同孟孫獨取其半為專已甚又擇取善者是專之極故傳言擇二以見之髙氏曰自是公室有貢而已無復有民矣然則三軍作舍皆自三家公不與音預焉公室益卑而魯國之兵權悉歸于季氏矣家氏曰前作三軍者非公作也三家之作也此言舍中軍者非公舍也三家舍也作之非公舍之又非公國人盡屬於三家公室其貧乎兵權有國之司命三綱兵政之本原書其作舍而公孫音遜于齊二十五薨于乾侯三十二定公無正必至之理也已則不臣三綱淪替南蒯苦怪反叛十二年季平子不禮於南蒯南蒯以費叛注蒯南遺之子季氏費邑宰陽虎專季斯囚定五陽虎囚季桓子而三桓之子孫㣲矣亦能免乎家氏曰當是時諸侯大夫狂恣犯上未有若季氏之甚者使非家臣内叛有以掣其纂弑之肘則田常所為不在齊而在魯禍不止於乾侯之出也書曰舍中軍㣲詞以著其罪也張氏曰季宿自承行父為政即城費以保障私家為竊兵權之計自作三軍之初叔孫豹已知其必改而以盟詛要之今叔孫死未期年而改更前制蔑公室以歸私家利昭公之猶有童心而穆叔既卒魯遂無人春秋舍中軍之書殆著堅氷之已成也蜀杜氏曰魯之軍法或作或舍皆出於季氏而洊亂舊制安可謂復古復正乎作與舍其實皆譏愚按襄二十九年享范獻子公臣不能具三耦則公室已無民矣今季孫復舍中軍以國民四分之而已取其半非獨欲弱公室亦欲乘叔孫婼之未定其位弱仲叔二家而強已也經書舍中軍而不言其故至十年伐莒列書三卿比事以觀而罪自見矣公羊以為復古榖梁以為復正非也苟曰後此不立三卿不設三軍則季孫意如叔弓仲孫貜帥師伐莒及哀二年季孫斯叔孫州仇仲孫何忌帥師伐邾何以三卿並将而三軍並出耶荀恱云春秋之義舍中軍則善之皆惑於公榖之説而未之考也楚殺其大夫屈申屈居勿反左傳楚子以屈申為貳於吴乃殺之劉氏曰稱國以殺大夫者罪累上也屈申之累上奈何楚人仇吴而疑屈申謂屈申貳於吴也而殺之然屈申之為人臣也君弑而不能討國亂而不能去北面而事冦讎足以殺其身而己矣公如晉平左傳公如晉自郊勞至於贈賄無失禮晋侯謂女叔齊曰魯侯不亦善於禮乎對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家不能取也有子家羈不能用也奸大國之盟陵虐小國利人之難不知其私公室四分民食於他思莫在公不圖其終為國君難將及身不恤其所禮之本末將於此乎在而屑屑焉習儀以亟言善於禮不亦逺乎愚按昭公如晋凡七至晋而見止者一及河而不至者五惟此年得善往返然以莒人之愬㡬不免於辱盖昭公習於威儀之節而不知禮之本是以晋平雖稱其善於禮猶欲止而討之也夏莒著丘牟夷以牟婁及防兹來奔左傳莒牟夷以年婁及防兹來奔牟夷非卿而書尊地也公羊傳牟夷莒大夫也莒無大夫此何以書重地也其言及不以私邑累公邑也榖梁傳以者不以者也莒無大夫其曰牟夷以其地來重地也及防茲以大及小也杜氏曰防兹城陽平昌縣西南有防亭姑幕縣東北有兹亭張氏曰地譜宻州安丘縣有平昌故城莒縣有姑幕故城愚按牟婁即隱四年莒人所取杞邑安丘縣今屬益都路宻州莒縣今屬益都路莒州邾莒之大夫名姓不登於史䇿㣲也據邾莒大夫盟㑹皆書人牟夷莒大夫曷為以姓氏通重地也以地叛雖賤必書地以名其人終為不義弗可滅矣見左傳昭三十二其書來奔是接我以利而我入其利兩譏之也書以書奔貶牟夷書來責魯為國以義不以利如以利則上下交征而國必危矣為已以義不以利如以利則患得患失亦無所不至矣春秋於三叛人雖賤特書其名以懲不義懼淫人左傳為後戒也邑而言及者公羊所謂不以私邑累公邑是也何氏曰公邑君邑也私邑臣邑也義不可使臣邑與君邑相次序故言及襄陵許氏曰卿㑹虢方盟而伐莒取鄆公如晋未返而受莒牟婁及防兹惡季氏之專也家氏曰庶其牟夷邾莒之盜也季孫宿魯之盜也襄二十一年公如晋庶其以地來奔季氏納之今公如晋在行年夷復以地來奔季氏又納之季氏乘魯君之出招納邾莒之叛人叛邑以為已之私有不曰魯之内盜可乎襄公如楚還及方城季孫宿取卞使人以告公懼不敢入㡬欲適諸侯今公在晋而宿所為復爾盖置其君於䧟穽罟擭之地將使晋人執之而已得以遂其竊國之計意如逐君之謀實兆於宿矣愚按三叛之受皆非魯君之意黒肱之來乃昭公已遜定公未立之時葢水流濕火就燥季孫有叛君之心是以納叛人也秋七月公至自晉左傳莒人愬于晋晋侯欲止公范獻子曰不可人朝而執之誘也討不以師而誘以成之惰也為盟至而犯此二者無乃不可乎請歸之間而以師討焉乃歸公愚按歴三時乃得歸書至危之也戊辰叔弓帥師敗莒著丘師于蚡泉敗必邁反蚡扶粉反公作濆穀作賁音同左傳莒人來討不設傋叔弓敗諸蚡泉莒未陳也杜氏曰蚡泉魯地張氏曰地譜魯東境晋人方欲止公而受牟夷敗莒人不顧伯討君辱比書而罪大夫之專可見矣髙氏曰書敗莒師幸魯之勝乃所以罪之也孫氏曰魯旣受莒叛人邑又敗莒師于蚡泉其惡可知也劉氏曰公羊云濆泉者直泉也非也此地名爾豈謂戰而泉涌乎秦伯卒景公立四十年子哀公嗣劉氏曰公羊云何以不名秦者狄也匿嫡之名也非也諸侯卒不名者多矣可以悉謂之外乎罃稻書卒又各有名非匿之也公羊又云嫡得之則秦未盡用俗禮安知彼不名者與中國諸侯不名同哉冬楚子靈蔡侯靈陳侯哀許男悼頓子沈子徐人越人伐吴夷末越始見經左傳四年冬吴伐楚入棘櫟麻以報朱方之役楚子以諸侯及東夷伐吴以報棘櫟麻之役薳射以繁揚之師㑹於夏汭越大夫常壽過帥師㑹楚子于𤨏聞吴師出薳啓疆帥師從之遽不設備吴人敗諸鵲岸楚子以馹至於羅汭吴子使其弟蹶由犒師楚人執之楚師濟於羅汭沈尹赤㑹楚子次於萊山逺射帥繁陽之師先入南懷楚師從之及汝清吴不可入楚子遂觀兵于坻箕之山是行也吴早設備楚無功而還以蹶由歸杜氏曰越國㑹稽山隂縣張氏曰越姒姓其先夏后少康之庶子無餘封於越愚按越國今紹興路府治越始見音現經而與徐皆得稱人何也吴以朱方處齊慶封而富於其舊崇惡也襄二十八楚圍朱方執齊慶封殺之討罪也去年吴不顧義入棘櫟麻以報朱方之役狄道也楚於是以諸侯伐吴則比吴為善而師亦有名其從之者進而稱人可也何氏曰越稱人俱助義兵或者以詞為主而謂不可云沈子徐越伐吴故特稱人誤矣以不可為文詞而進人於越一字褒貶義安在乎且吴楚徐越雖擯於蠻荒而劉敞以為其實不同吴大音泰伯之後也楚祝融之後也徐伯益之後也越大禹之後也其上世皆為元徳顯功通于周室與中國冠帶之君無以異徐始稱王史秦紀顓頊之苗裔曰大費與禹平水土是為栢翳舜賜姓嬴氏栢翳二子大廉後為秦若木為徐穆天子傳徐夷作亂伐宗周穆王畏其方熾乃分東方諸侯命徐子王之徐子處潢池東地方五百里行仁義通溝陳蔡之間欲舟行上國得朱弓赤矢以為天瑞乃稱偃王楚後稱王楚世家帝髙陽之曽孫吴回為火正祝融生陸終陸終少子季連之苗裔曰鬻熊封於楚夷王時熊渠甚得江漢間民和乃立三子為王吳越因遂稱王呉越世家太伯犇荆蠻荆蠻義而歸之立為吴太伯至壽夢立始大稱王夏少康之庶子封於越二十餘世至句踐稱王王非諸侯所當稱也故春秋不齒列侯雖然猶不欲絶其類是以列號則舉其本封書爵則黜其僭妄推吐雷反之可逺引之可來此聖人慎絶人亦春秋之意也並劉氏意林陳氏曰初書越而常夀過得稱人越驟強也愚按楚䖍乃蠻夷􅆲弑之賊其從之者有黨惡之罪春秋於徐越書人所以深責蔡陳許諸君之從夷也乙景王丑九年六年晉平二十二齊景十二衛㐮八蔡靈七鄭簡三十曹武十九陳哀三十三杞文十四卒宋平四十秦哀公元年楚靈五吳夷末八春王正月杞伯益姑卒文公也在位十四年弟郁釐立是為平公杜氏曰魯怨杞因晋取其田而不廢䘮紀禮也葬秦景公秦始書葬夏季孫宿如晉平左傳拜莒田也髙氏曰謝前年取莒牟夷叛邑盖莒既伐魯則魯有辭是以晋受季孫之聘而不見討也葬杞文公宋平華合比出奔衛華户化反比如字又毗志反左氏曰宋寺如字又音侍人柳有寵大音泰子佐惡烏故反之華合比請殺之柳聞坎用牲埋書而告公曰合比將納亡人之族亡人華臣也襄十七年奔陳既盟于北郭矣公使視之有焉遂逐合比於是華亥欲代為右師乃與柳比毗志反從為之徴知陵反公使代之宋公寵信閽音昏寺殺世適丁歴反痤才禾反而父子之恩絶襄二十六寺人伊戾為大子内師無寵譖於公曰大子將為亂公囚大子大子縊而死逐華合比而君臣之義暌苦圭反刑人之能敗國亡家亦可畏矣猶有任趙髙以亡秦史李斯傳始皇出遊㑹稽宦者趙髙為中車府令兼行符壐事始皇至沙丘病甚賜長子扶蘇書未授使者崩趙髙與丞相李斯及幸宦者五六人秘不發䘮髙謂公子胡亥曰天下之權存亡在子與髙及丞相耳胡亥曰廢兄而立弟是不義也髙與李斯謀斯不可強之乃相詐為詔立胡亥為二世皇帝髙為郎中令用事教二世嚴法峻刑誅罰日益刻深陳勝等作亂及沛公屠武闗髙懼弑二世於望夷宮立子嬰為王嬰刺殺髙遂降漢信恭顯十常侍以亡漢前石顯傳宣帝任宦官𢎞恭為中書令顯為僕射元帝時恭死顯代為中書令委以政事蕭望之以顯專權言罷中書宦官被譖自殺自是姦邪並進卒移漢祚後宦者傳明帝以後置中常侍十人和帝時竇憲專權帝用鄭衆謀誅憲遂超官卿之位其後孫程定立順之功曹騰參建桓之策騰養子嵩位至太尉嵩子操遂遷龜鼎寵王守澄田令孜音兹以亡唐唐宦者傳𤣥宗増宦官衣朱紫千餘人稱㫖者輙拜三品肅代庸弱倚為扞衛李輔國以尚父顯程元振以援立奮魚朝恩以軍容重其後陳𢎞志劉克明弑憲敬而穆文之立皆王守澄專之文宗欲誅宦官不克遂以憂殂武宣懿僖皆宦官所立僖宗童孺政事一委田令孜令孜畏藩鎮之誅刼帝奔竄極於天祐凶愎参㑹黨類殱滅而王室亡矣而不知鑒覆音腹車之轍者不亦悲夫凡此類直書而義自見音現矣襄陵許氏曰經書宋公殺其世子痤宋華合比出奔衛皆著寺人讒慝敗國以為世戒而秦漢以來庸君衰季溺心嬖習逺去忠良亂亡相屬若出一軌春秋之義惡可一日而不明哉家氏曰伊戾與柳所以譛太子與右師皆坎用牲理書以售其險謀後先如出一轍而華亥之比桞與向戌之比伊戾適以相似而平公不之悟也嗟夫閹官禍人國家必外廷臣與之合而其譛乃售伊柳戌亥之事後世往往有之可不戒哉秋九月大雩左傳旱也楚靈薳罷帥師伐吴夷末罷音皮左傳徐儀楚聘于楚楚子執之逃歸懼其叛也使薳洩伐徐吴人救之令尹子蕩帥師伐吴師于豫章而次于乾谿吴人敗其師于房鍾獲宫廐尹棄疾子蕩歸罪於薳洩而殺之襄陵許氏曰敗楚師者非薳洩也而洩伏其誅故書薳罷伐吴以正之楚再不競於吴乃移兵有事陳蔡至復伐徐而國亂矣冬叔弓如楚靈左傳聘且弔敗也張氏曰楚與吴仇敵之國而昭公婚吴逺楚故申之㑹魯不與焉今楚復伐吴其惡益逺昭公非能以中國自尊而逺強暴者今始通好于楚盖不待薳啓疆之召已服楚而將朝之矣王氏曰昭公内見迫於強臣外見絶於盟主區區求附於不信之蠻夷宜其終見逐也齊侯景伐北燕左傳齊侯如晋請伐北燕也晋侯許之齊侯遂伐北燕将納簡公晏子曰不入燕有君矣民不貳吾君賄左右謟諛作大事不以信未嘗可也七年春齊侯次于虢燕人行成曰敝邑知罪敢不聽命先君之敝器請以謝罪盟于濡上燕人歸燕姬賂以瑶罋玉櫝斚耳不克而還愚按晋人納㨗菑于邾則書弗克納此不書齊侯納北燕伯弗克納者諸侯失國諸侯納之正也非奉少奪長之比也但齊景受賂而退故止書伐北燕若以強陵弱而非納燕君耳丙景王寅十年七年晉平二十三齊景十三衛襄九卒蔡靈八鄭簡三十一曹武二十陳哀三十四杞平公郁釐元年宋平四十一秦哀二楚靈六吳夷宋九春王正月暨齊景平左傳暨齊平齊求之也榖梁傳平者成也暨猶暨暨也暨者不得已也以外及内曰暨我所欲曰及不得已曰暨公羊隠元及我欲之暨不得已也當是時昭公結昏強吴外附荆楚其與齊平無汲汲之意何氏曰時魯方結昏於吴外慕強楚故不汲汲於齊乃齊求於魯而許之平也故曰暨陸氏曰爾雅云暨不及也齊及魯平非魯欲之不可言㑹齊平又不可言齊及我平故書曰暨以明非魯志也至定公八年魯再侵齊結大國之怨見復必矣其與齊平非不得已乃魯求於齊而欲其平也故曰及平者聖人之所貴周禮調人掌司萬民之難而諧和之然或以賄賂而結平隱六鄭人來輸平或以臣下而擅平宣十五宋人及楚人平或以附強國而得平同上或以侵犯大國而急於平定十及齊平則皆罪也攷其事而輕重見音現矣何氏曰不出名者君相與平國中皆安故以舉國言之劉氏曰凡平者舉國而已故不稱其人於時昭公外娶於吴而朝聘於楚深得其威因此以強逼齊為平夫齊大魯小魯為齊弱乆矣不自計徳之厚薄勢之利害而借人之威以憑諸侯是以逺者不服近者不親昭公棄其國死於外諸侯莫之救也從此生矣襄陵許氏曰襄公之世齊數伐魯至齊景公一使慶封來聘而不書魯報至是乃暨齊平愚按書及者我汲汲而從他書暨者他人不得已從我而我遂暨之也若宋辰暨佗彄出奔是佗彄不得已也盖魯倚強夷之勢是以齊不敢軋魯而反求平於魯也或疑春秋於暨齊平及鄭平皆舉其國而不言君臣名號以見前後書法不異若狄之者吁是不然于㑹盟則目其人凡平但以國言之鄭人來輸平鄭使㣲者故書來魯及齊平及鄭平魯使㣲者納成於齊鄭故書及其國平若曰為平於某國耳下書叔孫婼叔還涖盟㑹于夾谷所以結成也苟以齊鄭舉號為貶則平莒及郯邢衛許蔡之遷于某諸稱國以殺大夫之類皆可謂狄之乎劉氏曰左氏云齊求之者指齊求與魯為平也杜云燕從齊求平然下云齊侯次虢燕人行成若齊已暨燕平無縁更進次于虢而燕乃行成也自昭公即位未嘗與齊通好此年三月叔孫婼如齊涖盟此則魯與齊平之驗矣亦猶定十一年及鄭平叔還如鄭涖盟章灼不疑三月公如楚靈左傳楚子成章華之臺願與諸侯落之大宰薳啓疆曰臣能得魯侯薳啓疆來召公其辭曰昔先君成公命我先大夫嬰齊曰吾不忘先君之好將使衡父昭臨楚國嬰齊受命于蜀我先君共王引領北望日月以冀傳序相授於今四王矣嘉惠未至唯襄公之辱臨我䘮今君若步玉趾辱見寡君寵臨楚國以信蜀之役是寡君既受貺矣何蜀之敢望君若不來使臣請問行期寡君將承質幣而見于蜀以請先君之貺公如楚楚子享公于新臺髙氏曰楚靈非強君也數㑹諸侯皆㣲國又且多叛而吴人之闚未艾也亦奚庸必朝哉盖晋平不能修文公之業使我不能自安而玉帛馹馳歳不遑暇以是知王室不綱而霸主猶有功於諸夏也愚按昭公屢朝于晋而不納又廹於強令而朝楚其卑辱亦甚矣義并見襄二十八年叔孫舍如齊景涖盟舍左穀作婼後同穀梁傳莅位也内之前定之辭謂之莅外之前定之辭謂之來襄陵許氏曰始暨齊平故盟以結好夏四月甲辰朔日有食之左傳晋侯問士文伯曰誰将當日食對曰魯衛惡之去衛地如魯地於是有災其大咎其衛君乎魯將上卿秋八月戊辰衛侯惡卒左傳衛齊惡告䘮于周且請命王使成簡公如衛弔且追命襄公哀公夫人姜氏元子嬖人婤姶生孟縶足不良于行孔成子夢康叔謂已立元乃立靈公穀梁傳郷曰衛齊惡今曰衛侯惡何為君臣同名也君子不奪人名不奪人親之所名重其所以來也王父名子也九月公至自楚自如楚今六越月危公之意可見矣冬十有一月癸未季孫宿卒此季文子之子武子也子紇嗣是為悼子十有二月癸亥葬衛襄公丁景王十卯一年八年晉平二十四齊景十四衛靈公元年蔡靈九鄭簡三十二曹武二十一陳哀三十五卒把平二宋平四十二秦哀三楚靈七吳夷末十春陳侯哀之弟招殺陳世子偃師招常遥反左傳陳哀公元妃鄭姬生悼太子偃師二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過哀公有廢疾公子招公子過殺悼大子偃師而立公子留書曰陳侯之弟招殺陳世子偃師罪在招也穀梁傳鄉曰陳公子招今曰陳侯之弟招何也盡其親所以惡招也兩下相殺不志世子君之貳也云可以重之存焉志之也諸侯之尊弟兄不得以屬通其弟云者親之也親而殺之惡也此公子招特以弟稱者著招憑寵稔惡而陳侯失親親之道也陸氏曰稱弟以殺世子既罪其逆且言骨肉相殘又譏陳侯失教也招以公子為司徒乃貴戚之卿親則介弟尊則叔父號令廢立自已而出莫敢干之者也不能援立嫡冢安靖國家而逢君之惡戕在良反殺偃師以致大冦宗社覆音腹没罪固大矣孫氏曰招以叔父之親不顧宗社之重殞冡嗣以立庶孽致楚滅陳招之由也其曰陳侯之弟親之者所以甚招之惡也陳侯信愛其弟何以為失親親乎尊賢者親親之本不能擇親之賢者厚加尊寵以表儀公族而徇其私愛施於不令之人以至亡國敗家豈不失親親之道乎隱七年傳書盟書帥師而稱弟者罪其有寵愛之私愚按此書殺世子亦罪其寵任之私也其曰陳侯之弟招殺陳世子偃師交貶之也陳氏曰哀有世子矣又屬其嬖子於二公子為是殺世子則譏不但其人也書曰云云斥君之辭也襄陵許氏曰陳哀寵其庶子資以強輔而濟之權以軋太子使之失職至於亂作躬受其禍惟其溺愛法不勝私也悲夫愚按經書殺世子者三晋獻嬖奚齊卓子而殺申生宋平嬖佐而殺痤陳哀嬖留而殺偃師皆嬖子匹嫡之禍也然申生痤之誅權在於晋宋之君故雖亂國而不至於亡陳哀基怨造禍勢不两全遂至寵弟戕其國本而且以憂殞其身而國隨以亡矣其罪得不又甚於晋獻宋平者歟故申生與痤皆目君以殺唯偃師之殺目陳侯之弟招夫以弟招繫之陳侯則陳哀之罪章章明矣不曰殺其世子而重舉國者偃師非招之世子也下書楚滅陳執招放之以見楚之滅陳託於討招而公子留之嬖實亡陳之本也歟夏四月辛丑陳侯溺卒溺乃歴反左傳哀公縊杜氏曰憂恚自殺髙氏曰楚觀從納公子比而靈王縊春秋謂比弑其君陳侯之弟招立公子留而哀公縊不書留弑君何也比之立無君者也靈雖不縊亦不與比並存是靈王之死由比也招之立留由君之廢也且君有命哀雖不縊亦不可以君國是哀之死不以留也君臣之間死生之際善惡之嫌賞罰之别大矣聖人所以正其名也叔弓如晉平左傳晋侯築虒祁之宫叔弓如晉賀虒祁也游吉相鄭伯以如晋亦賀虒祁也史趙見子大叔曰甚哉其相蒙也可弔也而又賀之襄陵許氏曰財費則國貧役煩則民叛締構雕琢輪奐之功盛則恭儉純茂之徳衰矣此之謂可弔而諸侯賀之是以人君安於危亡而不自知盖諛之者衆也當楚之隆勢專諸夏而晋弗慮圖唯宫室之崇以為安榮平公可謂卑矣髙氏曰前年楚成章華之臺召諸侯落之至是晋成虒祁之宫而諸侯皆往賀之晋之效尤如此覇業之不振宜哉楚靈人執陳行人干徴師殺之左傳干徵師赴于楚且告有立君公子勝愬之于楚楚人執而殺之公子留奔鄭書曰楚人執陳行人干徵師殺之罪不在行人也通㫖干徴師稱行人殺非其罪也劉氏曰稱人以執者非伯討也此其為非伯討何楚惡陳公子招而殺干徵師非其罪也古者兵交使在其間可也家氏曰楚靈因陳亂以為利賊殺不辜欲以震怖陳國而墟其宗社殺人以行其詐者也愚按榖梁云稱人以執大夫執有罪也非也書曰行人則非有罪矣苟曰有罪何為不以殺夏徴舒之例書之乎陳公子留出奔鄭杜氏曰留為招所立未成君而出奔通㫖留既為君矣而曰公子其意不當也蘇氏曰楚將討陳故留出奔留既為君不曰陳留何也留立於招爾未成為君也髙氏曰偃師曰世子留曰公子别嫡庶也秋蒐于紅蒐所求反書蒐始此左傳大蒐于紅自根牟至于商衛革車千乘公羊傳蒐者何簡車徒也榖梁傳因蒐狩以習用武事禮之大者也艾蘭以為防置旃以為轅門以葛覆質以為槷流旁握御轚者不得入車軌塵馬候蹄揜禽旅御者不失其馳然後射者能中過防弗逐不從奔之道也面傷不獻不成禽不獻禽雖多天子取三十焉其餘與士衆以習射於射宫射而中田不得禽則得禽田得禽而射不中則不得禽是以知古之貴仁義而賤勇力也杜氏曰紅魯地沛國蕭縣西有紅亭逺疑愚按蕭縣今屬汴梁路徐州蒐春事也秋興之則違天時有常所矣其于紅則易地利三家專行公不與音預焉而兵權在臣下則悖人理薛氏曰春田而夏行之于紅非常處也非時之狩不于其常地見三家之擅也舍中軍變蒐禮見兵權之移于下且奪民時也此亦直書其事不待貶絶而自見音現者也凡亂臣之欲竊國命必先為非禮以動民而後上及於君父昭公至是民食於他不恤其所昧於履霜之戒甚矣劉氏曰蒐春事也秋興之非正也蒐有常地矣于紅亦非正也曷為不言公公不得與於蒐爾三家專魯而分之政令出焉公寄食焉爾奸臣之将蔽其君而奪之也未嘗不先為非禮而動民也紅之蒐吾見其反天時矣吾見其易地利矣吾見其悖人倫矣而昭公猶未之悟也至於奔走失其社稷以死豈不哀哉通㫖昭定之蒐皆不言公權在三家也陳氏曰蒐狩不書必違禮而後書於是舍中軍四分公室季氏擇二二子各一皆盡征之而貢于公蒐于紅也革車千乘皆三家之師也自是而屢蒐三家所以耀武焉爾是故桓荘之狩必言公昭定之蒐不言公矣髙氏曰蒐非秋事也紅非蒐地也况當旱歲乎按傳紅亦大蒐而不曰大者以無君故微之首一見也王氏曰根牟魯東界商宋地魯西界與宋衛接境則其地亦廣矣四蒐皆書大而此獨不稱大者首著公不得與而歸惡於三家也劉氏曰公羊曰以罕書非也榖梁曰正也亦非也盖不學周禮者陳人殺其大夫公子過過古禾反左傳陳公子招歸罪於公子過而殺之通㫖稱人以殺而不去其官國亂無政衆人擅殺非討賊之詞也盖殺世子偃師招實主謀孔奐行之而非過之所欲為爾過不欲為招於是歸罪於過而殺之故稱人以殺而不去其官也春秋坐招殺偃師於前又書楚師殺陳孔奐於後而過稱大夫其不與殺世子明矣孫氏曰其言陳人殺其大夫不與公子招殺也故以陳人殺之為文大雩杜氏曰秋雩過也冬十月壬午楚靈師滅陳執陳公子招放之于越殺陳孔奐奐呼亂反左傳楚公子棄疾帥師奉孫吴圍陳宋戴惡㑹之滅陳使穿封戌為陳公榖梁傳惡楚子也杜氏曰孔奐招之黨通㫖楚師滅陳曷為不以號舉而稱師見挾衆恃強肆行暴虐莫之較也覆人邦國為至不仁宥人亂賊為至不義又討其逆黨而禮𦵏其君是猶斧鉞加人而以手撫之也而惡可掩乎其所執所葬皆繫於陳者深著其滅國之罪也公子招固有罪矣當荘王之殺徵舒也置其君而反焉今執招而遂滅陳聖人不與夷狄滅中國故雖招有罪而猶以公子書之見楚子懐惡而執招不與其執也故書公子招也孔奐嘗與楚子通謀以滅陳者旋以不忠見戮奐陳之賊臣也盖殺世子偃師招實主謀而孔奐行之故書曰殺陳孔奐不言大夫非陳之大夫也愚按楚棄疾奉世子偃師之子吴圍陳及棄疾立又封吴於陳則知放招殺奐盖討其殺偃師也陸氏曰招殺世子之賊也宥而放之奐招之黨也執而殺之楚子滅人之國又為滛刑此不待貶絶而惡見者也髙氏曰春秋書殺他國之大夫者四皆楚人殺之而中國未有書殺之者此見夷狄暴虐之甚葬陳哀公榖梁傳不與楚滅閔之也范氏曰書葬以存陳孫氏曰十月壬午楚師滅陳葬陳哀公如不滅之辭者楚子葬之也不言楚子葬之者不與楚子滅陳葬哀公故以陳人自葬為文所以存陳也黎氏曰書葬陳哀公非謂我往㑹而書時陳已滅矣國為楚師所㨿魯豈於其葬而使臣往㑹之盖楚入陳自以其君在殯因取而葬之與荘四年齊侯葬紀伯姬同彼目齊者盖上文無齊滅紀之文故下文云爾今已書楚師滅陳則下云執公子招殺孔奐葬哀公皆蒙上文云家氏曰自春徂冬凡九見皆陳事言之重辭之複閔陳而罪楚也責中國諸侯不能治陳之亂使夷得以行詐而墟人之國也趙氏曰左氏云袁克葬之按國已滅矣克又非大臣何能辦葬死君又何能告諸侯使㑹葬乎戊景王十辰二年九年晉平二十五齊景十五衛靈二蔡靈十鄭簡三十三曹武二十二陳滅杞平三宋平四十三秦哀四楚靈八吳夷末十一春叔弓㑹楚子靈于陳諸侯之大夫始旅見於楚左傳叔弓宋華亥鄭游吉衛趙黶㑹楚子于陳杜氏曰楚子在陳故四國大夫往不行㑹禮故不總書襄陵許氏曰楚既滅陳威震諸夏是以無所號召而諸國之大夫㑹之陳氏曰諸夏之大夫旅見於楚於是始舉魯以見其餘也髙氏曰中國諸侯為夷狄所滅中國既不能救亦宜同心疾之奈何反使大夫往聘問耶書㑹于陳與宣十五年㑹于宋同義觀去年叔弓如晋之事有以使天下之宗楚矣王氏箋義内朝聘皆言如今楚子在陳不可言如陳故以㑹為文春秋不與楚滅陳故上書葬哀公下書陳炎今書叔弓㑹楚子于陳皆以存陳也許悼遷于夷左傳楚公子棄疾遷許于夷實城父取州來淮北之田以益之杜氏曰譙國城父縣許畏鄭欲遷故以自遷為文通㫖問許四遷葉夷白羽皆楚遷之而以自遷書何也曰許遷于葉之後專意事楚襄十六年許男請遷于晉其大夫不可諸侯再伐許許男如楚請伐鄭遂卒于楚楚為之伐鄭而後葬靈公其仇怨深矣至是鄭子産為政四隣畏之而楚方滅陳故欲遷于夷以逺鄭而楚使棄疾遷之也髙氏曰陳滅許遷皆中國無伯之故也愚按夷一名城父本陳地楚滅陳遂遷許于此今亳州譙縣夏四月陳災災公榖作火左傳陳災鄭禆竈曰五年陳将復封封五十二年而遂亡公羊傳陳已滅矣其言陳火何存陳也曰存陳悕矣榖梁傳何以志閔陳而存之也凡外災告則書見莊十一年今楚已滅陳夷於屬縣使穿封戌音恤為公矣必不遣使疏吏反下同告於諸侯言亡國之有天災也何以書於魯國之策乎當是時叔弓與楚子㑹于陳則目擊其事矣雖彼不來告此不往弔叔弓使畢而歸語陳故也魯史遂書之耳或曰國史所書必承赴告豈有憑使人之言而載之於史者曰周景王崩有尹單音善猛朝如字之變固無赴告矣叔鞅至自京師言王室之亂也見左傳二十二年春秋承其言遂書於䇿亦此類爾仲尼作經存而弗革者蓋興滅國繼絶世以堯舜三代公天下之心為心異於孤秦罷侯置守欲私一人以自奉者所以歸民心合天德也穀梁以為存陳得其㫖矣髙氏曰陳雖為楚所滅而土地居民猶在焉聖人不與楚滅之也故還係之陳如邶鄘二國既為衛所并聖人還存邶國鄘國之風亦不與衛人并諸侯而存天子之建國也家氏曰陳已為楚所縣俾其臣僭爵以居之而猶書陳災者以盛德之後見翦於夷特著義存之耳不與楚得陳也朱子曰漢建安二十五年之初漢尚未亡通鑑便作魏黄初元年奪漢太速與魏太遽大非春秋存陳之意趙氏曰左氏作災公穀皆為火按前後未有書外火小事若一一書之不可勝記且諸侯亦不當告也災是天火事大故書之秋仲孫貜如齊景貜俱縛反左傳孟僖子如齊殷聘杜氏曰自叔老聘齊至今二十年禮意乆曠今修盛聘以無忘舊好髙氏曰此暨齊平之故也齊平而不來聘則著齊輕公非特居鄆時也其來乆矣冬築郎囿左傳季平子欲其速成也叔孫昭子曰詩曰經始勿亟庶民子來焉用速成其以勦民也無囿猶可無民其可乎襄陵許氏曰公内制於強臣外輕於大國亂亡危辱兆矣是之弗慮而築郎囿知公之志日以荒也張氏曰此見意如逄其君以耳目之娱而竊其權昭公安之而不悟也家氏曰桓四年公狩于郎荘三十一年築臺于郎今復築郎以為囿非以為講武之處特以為游觀之地耳是時三家用事魯君擁虚噐而猶興築囿之役其為李氏敺民乎已景王十已三年十年晉平二十六卒齊景十六衛靈三蔡靈十一鄭簡三十四曹武二十三陳滅把平四宋平四十四卒秦哀五楚靈九吳夷末十二春王正月夏齊景欒施來奔齊公作晉左傳齊惠欒髙氏皆耆酒信内多怨強於陳鮑氏而惡之有告陳桓子曰子期子良将攻陳鮑亦告鮑氏桓子授甲如鮑氏遭子良醉而聘遂見文子則亦授甲矣使視二子則皆将飲酒桓子曰彼雖不信聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏子良曰先得公陳鮑焉往遂伐虎門公卜使王黒以靈姑銔率吉請斷三尺焉而用之戰于稷欒髙敗又敗諸荘國人追之又敗諸鹿門欒施髙強來奔陳鮑分其室髙氏曰欒施與髙强以兵攻君宫欲伐君以伐陳鮑遂與君戰不勝而來奔此罪大矣不書強非卿故也魯方通聘而受其奔亡之臣非義也王氏曰公羊以為晉臣盖見晉有欒氏而誤爾秋七月季孫意如叔弓仲孫貜帥師伐莒著丘意公作隱後同左傳平子伐莒取郠獻俘始用人於亳社臧武仲在齊聞之曰周公其不享魯祭乎前已舍音捨下同中軍矣五年曷為猶以三卿並將支聲下同乎季氏毁中軍四分公室擇其二二家各有其一至是季孫身為主將二子各率一軍為之副王氏曰經書二卿而傳止書平子則季孫主兵而叔仲副之也家氏曰叔弓非叔孫氏乃臨事所置之帥項氏曰既舍中軍公室無兵毎有征役三家各將其兵以行經皆據實並書伐莒之役三家並將獨叔孫氏之兵使叔弓帥之此可見叔孫舍之賢雖曰家徒然猶使公臣帥之也則三軍固在其曰舍之者特欲中分魯國之衆為己私耳以為復古公穀則誤矣襄公以來既作三軍地皆三家之土民皆三家之兵每一軍出各將其所屬而公室無與音預焉是知雖舍中軍而三卿並將舊額固存矣王氏箋義三子伐莒皆書者惡其專國而公不得為政也髙氏曰是時魯間晉之衰故三卿帥師同伐莒欲一舉滅之而三卿擅以為已功也杜氏曰取郠不書公見討於平丘故諱之陳氏曰内取邑悉書於是取郠不書不足詳也由是定六年取鄭匡不書哀元年取晉棘蒲不書戊子晉侯彪卒彪彼虬反平公也在位二十六年子夷嗣是為昭公左傳晉平公卒鄭伯如晉及河晉人辭之游吉遂如晉九月叔孫舍如晉𦵏晉平公左傳叔孫婼齊國弱宋華定衛北宫喜鄭罕虎許人曹人莒人邾人滕人薛人把人小邾人如晉葬平公也十有二月甲子宋公成卒成公作戍平公也在位四十四年太子佐嗣是為元公杜氏曰無冬闕文愚按何休謂昭公取吴孟子之年故貶之非也桓公四年七年削秋冬而貶之則皆不書事與月此年書十二月宋公卒而脫冬一字則傳受承誤而漏之耳況經無取孟子之文安得妄說耶庚景王十午四年十有一年晉昭公夷元年齊景十七衛靈四蔡靈十二弑鄭簡三十五曹武二十四陳滅把平五宋元公佐元年秦哀六楚靈十吳夷末十三春王二月叔弓如宋葬宋平公二月公作正月髙氏曰卿共盟主之葬猶可言也卿共同列之葬非禮甚矣夏四月丁巳楚子靈䖍誘蔡侯靈般殺之于申䖍榖或作乾般音班公羊傳楚子䖍何以名絶曷為絶之為其誘討也此討賊也雖誘之曷為絶之懐惡而討不義君子不予也榖梁傳稱時稱月稱日稱地謹之也楚公子棄疾帥師圍蔡陳氏曰滅不言圍此言圍所以病晉也韓起合八國之大夫于厥憖以謀救蔡而蔡卒滅於楚言圍所以病晉也前年棄疾奉孫呉圍陳已而滅陳曷不於此焉病晉合八國于厥憗而不能師甚矣左氏曰楚子在申召蔡侯其大夫曰王貪而無信幣重直用反下同言甘誘我也不如無往蔡侯不可楚子伏甲饗般於申執而殺之刑其士七十人此討賊也雖誘殺之疑若無罪春秋深惡烏故反下同楚子貶而稱名何也世子般弑其君諸侯與通㑹盟十有三年矣襄三十年般弑景公而立昭元年使大夫㑹虢四年同楚子諸侯㑹申又㑹伐吳五年再㑹伐吳愚按曹人請負芻於晉曰若以為有罪則君列諸㑹矣雖大逆之罪萬世不貸然為䖍屢寵之以㑹禮今利其國顧用詭謀詐計醉以酒而戕之烏在其為討賊哉楚莊殺徴舒猶曰假討賊之義今此直誘殺蔡侯非討賊也是並忘其為亂賊而莫之覺也楚子若以大義唱天下奉詞致討執般於蔡討其弑父之罪而在宮者無赦焉討其弑君之罪而在官者無赦焉愚按謂討其與弑君父之人凡聞乎故者皆誅之而不赦非謂在官在宮者盡誅之也殘其身瀦音諸禮記作豬其宫室謀於蔡衆置君而去雖古之征暴亂者不越此矣又何惡乎今䖍本心欲圖其國不為于偽反討賊舉也而又挾欺毁信重幣甘言詐誘其君執而殺之肆行無道貪得一時流毒於後棄疾以是殺戎蠻昭十六商鞅以是紿徒亥反魏將去聲史商君傳秦孝公使鞅將兵伐魏魏公子卬將而禦之軍既相拒鞅遺卬書曰吾始與公子驩今俱為兩國將不忍相攻欲與公子面相見盟樂飲而罷兵卬以為然乃與㑹盟而飲鞅伏甲襲卬虜之大破魏師秦人以是刼懷王史楚世家秦昭王遺懷王書曰願與君王㑹武闗面相約結盟而去乃詐令將軍伏兵武闗號秦王楚王至則閉闗遂與西至咸陽傾危成俗天下大亂劉項之際死者十九聖人深惡楚䖍而名之也其慮逺矣後世誅討亂臣者或畏其強或幸其弱不以大義興師至用詭謀詐力徼倖勝之若事之捷反側皆懼苟其不捷適足長展两反亂如代宗之圖思明通鑑乾元元年史思明既降李光弼以其終當叛亂勸上以烏承恩為范陽節度副使令圖思明承恩至范陽謀泄思明殺承恩及其黨憲宗之紿王弁皮彦反同上元和十四年沂州役卒王弁作亂朝廷議興兵討之恐青鄆相扇繼變乃用曹華為沂海觀察使除弁開州刺史賜告身中使紿之弁即日發所在减其導從遂械繫斬東市華至詐圍沂卒于二百盡殺之司馬公曰楚子䖍誘殺蔡侯般彼列國也孔子猶深貶之惡其誘討也況為天子而誘匹夫乎昧於春秋垂戒之㫖矣陸氏曰般弑君父之賊也誘而殺之何為其不可乎楚子内利其國外託討罪故不許其誘而責其詐也夫以大國之力而討小國之逆當聲其罪而伐之倡大義於天下今乃誘而殺之雖曰討賊實取其國蔡侯之罪自不容誅楚子之惡亦已甚矣棄疾不能諫止又帥師圍蔡此不待貶絶而惡見者也髙氏曰蔡般弑逆之罪雖義當討而楚子亦弑逆之賊也以賊討賊何辨曲直況楚子非真治般志在滅蔡也故春秋書楚子䖍蔡侯般同斥其名以見其罪同陳氏曰諸侯之罪非滅同姓不名邾文公用鄫子未嘗名之楚䖍何以名以殺中國甚矣蔡般夫人之所得討也曷為謂之殺中國楚子假大義以號于天下放陳公子殺蔡侯於是滅陳蔡是之謂討賊歟殺中國之君大夫歟國君見殺者如鄫子戎蠻子恒不名蔡侯何以名自楚商臣而下弑父無討者必若蔡般殺以他故而後見焉爾故名之五月甲申夫人歸氏薨公羊傳昭公之母也杜氏曰胡女歸姓愚按襄三十一年左傳敬歸之娣齊歸則襄公之妾也妾毋稱夫人義見成風薨葬大蒐于比蒲比音毗左傳非禮也叔向曰魯公至其卑乎君有大䘮國不廢蒐有三年之喪而無一日之慼國不恤喪不忌君也君無慼容不顧親也國不忌君君不顧親能無卑乎殆其失國公羊傳簡車徒也鄭氏曰比蒲魯南鄙之地其曰大蒐越禮也髙氏曰大云者僣天子之制也八年書蒐此書大蒐見三家益強車徒日衆也夫蒐雖素定然公以夫人之喪不自臨也而大蒐不廢則是三家者以馳騁田獵間君喪也王氏箋義蒐于紅夫子黜三家之盛故不言大今君有大喪三家復大蒐于比蒲故書曰大蒐君有重喪國不廢蒐不忌君也劉氏曰何以書譏何譏爾夫人薨而大蒐非禮也三綱軍政之本君執此以馭與御同其下臣執此以事其上政之大本於是乎在君有三年之慼而國不廢一日之蒐家氏曰歸氏雖非嫡母魯君既尊以夫人之禮則當從大喪之制今也蒐不為輟是強家之不忌君故智者知公室之将卑乾侯之禍不旋踵而作春秋繼夫人薨而書大蒐以其同在此一月之内也則無本矣然則君有重喪喪不貳事見榖梁文十六以簡車徒為非禮也乃有身從金革而無避者曽子問子夏曰三年之䘮卒哭金革之事無辟也者非與子曰昔者魯公伯禽有為為之也今以三年之䘮從其利者吾弗知也獨何歟曰䘮不貳事大比毗志反而簡車徒則廢其常可也有門庭之冦而宗廟社禝之存亡繫焉必從權制而無避矣伯禽服䘮臨川吳氏曰服武王之䘮徐夷並興至于東郊出戰之師與築城之役同日並舉見費誓度待洛反緩急輕重蓋有不得已焉者矣晉王克用薨梁兵壓境而莊宗決勝於夾寨豺邁反五代唐紀天祐五年克用卒長子存朂即王位梁夾城兵聞晉有大䘮頗懈王乃出兵上黨直抵夾寨分兵為二道鼓譟而入梁軍大敗周太祖殂音徂契欺結反丹入冦而世宗接戰於髙平同上東漢世家顯德元年大祖崩世宗即位劉旻聞太祖晏駕請兵于契丹契丹以十萬助旻旻自將兵三萬趨潞州世宗親征與旻戰于髙平漢兵敗績若此者君行為顯親非不顧也臣行為愛君非不忌也惟審於緩急輕重之宜斯可矣愚按君有䘮既𦵏卒哭而服王事大夫士有䘮既𦵏卒哭弁絰帶從金革之事惡有小君之䘮未𦵏而不廢講武之常事乎仲孫貜㑹邾子莊盟于祲祥祲子鴆反又七林反祲祥公作侵羊左傳孟僖子㑹邾莊公盟于祲祥修好杜氏曰祲祥地闕王氏曰季孫當昭公有䘮而講蒐禮仲孫背齊歸之殯而從㑹盟魯之臣子於君親盡矣髙氏曰始也盟蔑盟趡是魯君親與之盟今公雖以夫人之䘮使貜㑹盟自是何忌盟㧞州仇何忌盟句繹是吾大夫與其君盟魯邾之強弱斷可知矣愚按自邾倚齊靈屢致兵於魯魯藉晉霸之力溴梁祝柯兩執邾子又取其田既而魯納庶其畀我之奔邾受臧紇之奔仇隙益深至同盟重丘齊晉既睦襄二十八年邾君來朝昭元年魯㑹悼公之𦵏是以此盟祲祥以修好也趙氏曰左氏云禮也按春秋盟㑹是常何獨於有䘮之時而稱得禮秋季孫意如㑹晉昭韓起齊景國弱宋元華亥衞靈北宫佗鄭簡罕虎曹武人杞平人于厥憖佗徒河反厥憖公作屈銀憖魚斳反杜氏曰厥憖地闕按左氏楚師在蔡晉荀吳曰不能救陳又不救蔡物以無親己為盟主而不恤亡國將焉於䖍反用之㑹于厥憖謀救蔡也使狐父請蔡于楚弗許杜氏曰不書救蔡不果救文十五年晉靈公帥八國之諸侯盟于扈春秋略而不序者謀伐齊而不克定其亂也商人弑舍襄公三十年叔孫豹㑹十二國之大夫于澶淵諸國之大夫皆稱人魯卿諱而不書者視蔡亂而不能討其賊也般弑固今楚將滅蔡請于楚而弗許晉之不能亦可知矣苟吳云云曷為諸國猶序而大夫無貶乎扈之盟晉侯受賂弗克而還音旋諸侯畧而不序亡失也義利之分扶問反下同也澶淵之㑹謀救宋災而不討蔡罪大夫貶而稱人魯卿諱而不書失重輕之别筆列反下同也亡義利之分為不仁失重輕之别為不智今晉與諸侯心欲救蔡而力弗加焉則無惡也凢此見春秋明義利審重輕以恕待人而不求其備矣襄陵許氏曰蔡能嬰城堅不下楚此易助也厥愸合天下之兵畏不敢救遣使請命示之不能使楚益驕有以量中國之力而卒取之此韓起之罪也愚按春秋書八國大夫㑹厥憗於楚師圍蔡之後滅蔡之前則中國失救患之義雖㣲傳其事著矣夫恃強并弱春秋之常也故厥憗之大夫不能救蔡不待貶絶而罪惡見臣弑君子弑父非常之變也故于扈之諸侯澶淵之大夫不能討賊必待貶絶以見罪惡九月己亥𦵏我小君齊歸左傳公不慼晉士之送𦵏者歸以語史趙史趙曰必為魯郊歸姓也不思親祖不歸也杜氏曰齊謚冬十有一月丁酉楚靈師滅蔡執蔡世子有以歸用之有榖作友左傳楚子滅蔡用隱大子于岡山申無宇曰不祥五牲不相為用況用諸侯乎王必悔之内入國而以其君來外滅國而以其君歸皆服而以之易以豉反詞也既書滅蔡矣又書執蔡世子有者世子無降胡江反下同服之狀強執以歸而虐用之也陳氏曰滅而以歸未有言執者言執弗臣之之辭也是故均之為滅國也嘗臣之矣書以沈子嘉歸殺之未嘗臣之也書曰執蔡世子有以歸用之或以為未踰年之君其稱世子者不君靈公故不成其子公羊傳非也楚䖍殺蔡般棄疾圍其國凢八月而見滅世子在窮廹危懼之中固未暇立乎其位孫氏曰言世子有者有未立也父殺國圍有窮廹危懼以至于死此未立可知也安得以為未踰年之君而稱子也假使立乎其位而般死於楚其䘮未至不歛力驗反不葬世子亦不成乎為君矣然世子繼世有國之稱必以此稱蔡有者父母之仇不與共天下與民守國效死不降至於力屈就擒虐用其身而不顧也則有之為世子之道得矣劉氏曰世子猶世世子也靈公弑其君其子非正也曷為與之繼世春秋之設辭也非其人之謂也蓋其道之謂也楚子䖍誘蔡侯般殺之世子友守國楚師圍之八月而克之不能服於是乎虐用之古者父母之仇不與共天下寢苫枕戈終身則友之為者盡於世子矣髙氏曰四月圍而十一月方滅者世子有之力也滅國而用世子者怒其拒師之乆也用之者以為牲也夫蔡本中國之諸侯乃背中國而即於楚必以楚人為可恃也今蔡侯既為楚子所誘而殺之又從而滅其國其世子又為所執而虐用之以絕其世然則從楚何補於蔡哉此萬世人君之戒也王氏箋義楚子滅陳蔡皆稱師者言其無道以兵力之衆強滅之也師氏曰者秋書滅國多矣未有如此其暴者聖人詳其始末而記之書誘書殺書圍書執書用盖以傷中國之㣲而深惡楚子之暴也愚按申無宇稱用諸侯則世子有已嗣君位矣特以其父誘死於外其國被圍於内狼狽憂虞未能備為君之禮且書世子者又以著世嫡之正也劉氏曰公羊云其稱世子何不君靈公不成其子也子謂不成其子而稱世子義與文反鄭忽亦稱世子豈復不成其子哉又曰用之築防此似兒戯非可信也辛景王十未五年十有二年晉昭二齊景十八衛靈五蔡滅鄭簡三十六卒曹武二十五陳滅把平六宋元二秦哀七楚靈十一吳夷末十四春齊景髙偃帥師納北燕伯于陽左傳齊髙偃納北燕伯欵于唐因其衆也榖梁傳納者内不受也燕伯不名不以髙偃挈燕伯也杜氏曰三年燕伯出奔齊今因唐衆欲納之故得先入唐不言于燕未得國都也偃髙傒𤣥孫陽即唐燕别邑中山有唐縣愚按唐縣今屬保定路通㫖諸侯失國諸侯納之正也大夫納之非也張氏曰燕伯出奔名而納之不名其罪未至如衛朔鄭突家氏曰燕伯入陽與衛獻入夷儀皆以亂臣廹逐而出因大國之力以入於其邑皆不名所以正君臣之分陳氏曰于陽内弗受也衛侯朔入衛不言納納頓子不言奔奔且言納者北燕伯欵衛世子蒯聵也是内弗受之辭也劉氏曰公羊云伯于陽者公子陽生也非也公羊謂孔子作春秋用百二十國寳書豈悉如此殘缺乎三月壬申鄭伯嘉卒簡公也在位三十六年子寕嗣是為定公髙氏曰鄭去中國即楚乆矣至於簡公乘晉悼之方興以國反正遂息諸侯之兵子産相之薫然慈仁民蒙其惠蔚為春秋之賢諸侯夏宋公元使華定來聘左傳通嗣君也髙氏曰公始以卿共平公之葬故宋元公嗣位而即使來聘也公如晉昭至河乃復左傳取郠之役莒人愬于晉晉有平公之喪未之治也故辭公公子慭遂如晉通㫖榖梁曰季孫氏不使遂乎晉也然公有夫人齊歸之喪未及練祥而出行朝禮已不立矣雖微季孫氏其能遂乎家氏曰魯受莒之叛臣叛邑敗其師伐其國又取其地然皆季氏之所為明年晉人執意如亦知罪之所在而公每至晉輙為所卻豈晉之諸臣曲為季氏之地公有辭而不能以自伸歟五月𦵏鄭簡公杜氏曰三月而葬速楚靈殺其大夫成熊熊公作然榖作虎左傳楚人謂成虎若敖之餘也遂殺之或譛成虎於楚子成虎知之而不能行書曰云云懐寵也家氏曰䖍以猜忌信讒殺無罪之大夫故以累上之辭書之秋七月冬十月公子憖出奔齊憖魚斳反公作整左傳季平子立而不禮於南蒯南蒯謂子仲吾出季氏而歸其室於公子更其位我以費為公臣子仲許之叔仲小南蒯公子憖謀季氏憖告公而遂從公如晉南蒯懼不克以費叛如齊子仲還及衛聞亂逃介而先及郊聞費叛遂奔齊陳氏曰奔辭有三公孫敖如京師不至而復丙戌奔莒未将命之辭也公孫歸父如晉還自晉至笙遂奔齊復命之辭也憖與南蒯謀季氏告公而遂從公如晉南蒯以費叛憗還及郊未復命聞亂遂奔齊季氏之出其君有以也則憖有奔焉耳楚子靈伐徐左傳楚子狩于州來次于潁尾使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼吴楚子次于乾谿以為之援髙氏曰徐吴之婣國也楚人疾吴故遷怒於徐既執其君又伐其國也晉昭伐鮮虞左傳晉荀呉偽㑹齊師者假道於鮮虞遂入晋陽八月壬午滅肥以肥子緜皋歸冬晉伐鮮虞因肥之役也十三年鮮虞人聞晉師之悉起也而不警邊且不修備晉苟呉自著雍以上軍侵鮮虞及中人驅衝競大獲而歸杜氏曰鮮虞在中山新市縣張氏曰在戰國為中山國愚按地在今真定路中山府新樂縣左氏曰晉荀呉偽㑹齊師者假道鮮虞遂入昔陽肥國都冬書晉伐鮮虞外之也獻公假道於虞以滅虢因執虞公則以師與人稱之今晉雖為諼許元反公羊文三固可罪也而狄之不亦過乎楚奉孫呉討陳因以滅陳誘蔡般音班殺之因以滅蔡晉人視其殘虐莫能救則亦已矣而效其所為以伐人國自春秋末世至於六國亡秦變詐並興傾危成俗河決魚爛不可壅而收之史秦始皇紀河決不可復壅魚爛不可復全皆失信棄義之明驗也春秋謹嚴於此制治去聲未亂拔本塞源之意豈曰過乎春秋胡傳附録纂疏卷二十四
