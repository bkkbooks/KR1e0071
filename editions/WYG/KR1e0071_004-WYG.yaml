body:
  text: 春秋胡傳附録纂疏卷二元汪克寛撰隱公中壬桓王戌元年四年齊僖十二晉鄂五衛桓十六弑蔡宣三十一鄭莊二十五曹桓三十八陳桓二十六杞武三十二宋殤公與夷元年秦文四十七楚武二十二春王二月莒人伐杞武取牟婁此伐國取邑之始公羊傳外取邑不書此何以書疾始取邑也穀梁傳言伐言取所惡也諸侯相伐取地於是始故謹而志之也程子傳諸侯土地有所受伐之其罪大矣而奪取其土惡又甚焉王法所當誅也杜氏曰杞國本都陳留雍丘縣桓六年淳于公亡國杞似并之遷都淳于僖十四年遷縁陵襄二十九年晉人城淳于杞又遷淳于牟婁杞邑城陽諸縣東北有婁郷張氏曰杞夏后氏之後周之三恪國在開封府雍丘縣愚按在今汴梁路杞縣鄭氏曰杞縣有婁郷取者收奪之名夲趙氏纂例謂不當取也牟婁杞邑也啖氏曰凡先言伐國下言取邑者明其國之邑也如取郜取防上言敗宋師則宋邑可知聲罪伐人而强奪其土故特書曰取以著其惡或曰諸侯土地上受之天王下傳之先祖所以守宗廟之典籍也聖王不作諸侯放恣强者多兼數圻音祈弱者曰以侵削左傳襄二十五年天子之地一圻列國一同自是以衰今大國多數圻矣若無侵小何以至焉當是時有取其故地者夫豈不可然僖公嘗取濟上聲西田矣三十一年成公嘗取汶音問陽田矣二年亦書曰取何也苟不請於天王以正疆理而擅兵爭奪雖取本邑與奪人之有者無以異陸氏曰不能申明直辭請於王以正疆理但專以兵爭奪不得正道故悉同辭言之春秋之義不以亂易亂榖梁昭四春秋之義用貴治賤用賢治不肖不以亂治亂左傳以亂平亂何治之有故亦書曰取正其本之意也上二年莒人擅興入向而天討不加焉至是伐國取邑其暴益肆矣本孫氏張氏曰征伐天子之權土地諸侯所受之封莒人擅興兵以伐人又取其地明伐不以罪志在貪利故兩書伐取見王法所當誅也薛氏曰諸侯曰天子之守臣地非其有也或取之或失之皆罪也陳氏曰春秋之初猶以取邑為重故外取邑自隱以前則書之桓十四年宋以諸侯伐鄭取牛首而後皆不書家氏曰伐而取者其罪加於伐一等然文三年秦人伐晉傳稱取王官及郊襄二十三年齊侯伐晉傳稱取朝歌皆書伐不書取盖杞二王之後至是與周俱衰不得自同於宋莒以蕞爾小國命居東夷伐而取其地有罪甚矣故書伐國取地以莒為首戮聖人於二王後書法尤拳拳也髙氏曰牟婁切鄰於魯魯無恤鄰救急之義至昭五年莒牟夷以牟婁叛而來奔魯遂受之其惡可知矣愚按春秋書外伐國者一百二十有八惟此書伐書取餘書圍邑者三書伐戰者一書伐救者一盖中葉以後爭地爭城殺人盈野諸侯城邑今日奪之於此明日并之于彼得失無常不足悉書故傳言取地而經不書取者甚多盖以擅興殘民為重而土地之攘奪不暇論矣是知此年伐杞取牟婁乃一經特筆聖人實深致意焉戊申衛州吁弑其君完完音丸州榖作祝後同此書弑之始桓公在位十六年是冬弟晉立是為宣公公羊傳􅂚為以國氏當國也程子傳衛莊公娶於齊曰莊姜無子陳女戴媯生桓公莊姜以為巳子公子州吁嬖人之子也有寵而好兵公弗禁石碏諫弗聽其子厚與州吁逰禁之不可桓公十六年州吁弑桓公而立自古簒弑多公族盖自謂先君子孫可以為君國人亦以為然而奉之春秋於此明大義以示萬世故春秋之初弑君者多不稱公子公孫盖身為大惡自絶於先君矣豈復得為先君子孫也古者公族刑死則無服况弑君乎大義既明於初矣其後弑立者則皆以属稱或見其以親而寵之太過任之太重以至於亂或見其天屬之親而反為冦讎立義各不同也春秋大率所書事同則辭同後人因謂之例然有事同而辭異者盖各有義非可以例拘也説文臣殺君曰弑何氏曰君父言弑積漸之名也此衛公子州吁也而削其屬籍特以國氏者罪莊公不待之以公子之道使預聞政事主兵權而當國也通㫖春秋絶州吁屬籍著公室宗族之有寵者不可與政當國主兵之意督萬無知亦公族大夫而絶其屬籍義與此同或曰必若此言春秋之法其非法矣周公康叔非懿親與政乎曰尊賢然後能親親急親賢為堯舜之道則親之賢者必先得於疎之賢者不偏於寵愛其親属而無尊賢之等也經書季子來歸不稱公子兼親賢之道其法可謂通矣以公子之道待州吁教以義方弗納於邪不以賤妨貴少陵長上聲則桓公之位定矣亂何由作州吁有寵好兵而公弗禁石碏盡于忍反言極諫而公弗從石碏諫曰臣聞愛子教之以義方弗納於邪驕奢􅁋佚所自邪也四者之來寵禄過也將立州吁乃定之矣若猶未也階之為禍夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣且夫賤妨貴少陵長逺間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也君人者將禍是務去而速之無乃不可乎是不待以公子之道使預聞政事主兵權而當國也春秋之㫖在於端本清源本正則末不偏源清則流不濁以衛詩緑衣諸篇考之所謂前有讒而不見後有賊而不知者董子語莊公是也詩朱子傳緑衣乃莊姜賢而失位刺莊公惑於嬖妾燕燕乃莊公妾桓公母戴媯大歸于陳莊姜送之而作日月乃莊姜不見荅於莊公故呼日月而訴之終風乃莊公暴慢無常莊姜正靜自守故忤其意而傷巳之詩張氏曰衛國之禍始於莊公之寵州吁縱其好兵而不之禁公存之時妾上僣夫人失位見於衛詩則亂根之萌乆矣殖之滋長終不能圖以致簒弑成於桓公既立之後春秋㨿事直書亦將使讀者原禍敗之所從起而嚴履霜之戒也夫君臣父子夫婦之分一失其正則亂之所從生衛莊溺愛而使内寵僣嫡嬖子害正石碏之諫足以悟矣愎而弗圖辨之弗早貽禍後嗣可謂慘矣其不稱公子而以國氏著後世為人君父者之戒爾故傳有之曰為人君父而不通春秋之義者必䝉首惡之名董子語見太史公自序陳氏曰隱桓莊之春秋凡弑君之賊皆名之愚按州吁不稱公子程子謂州吁身為大惡自絶於先君故不得為先君子孫文定謂莊公不待以公子之道使致大惡故以國氏今按二義互相發明州吁弑桓公而自立罪兼簒弑與閻職邴歜之徒懐忿挾怨而輕動於大惡者又霄壤不侔春秋首絶其族属書名以弑及其誅戮亦止書名舊史必皆稱公子聖人削之以示天討之刑也通諸一經弑君者二十有五稱世子弑者三楚商臣蔡般許止公族而削其屬與氏者四衛州吁齊無知宋督萬稱公子者三齊商人鄭歸生楚比大夫而稱氏稱名者六晉里克趙盾陳夏徴舒齊崔杼陳乞衛寗喜稱人者三稱國者四稱閽稱盗者各一夫世子有父之親有君之尊位其所固有國其所宜君而至推刃於君父窮凶極惡不待貶絶而自見然考其所由致之故則為之君父者必失其道以及於此則首惡之名寜不為天下萬世之大戒乎公族而不書其屬與氏者両致其貶或有以公子書者程子所謂見其以天属之親而反為冦讎而其君寵之太過任之太重以至於亂其罪亦不可掩矣其稱人以弑者謂多行無道肆於民上為國人之所欲弑故稱國稱人以明君雖無道通國之人皆欲弑之而三綱人道之大倫君臣之義不可廢也特蔽罪於國人則操刅為大惡者可末減爾稱國以弑不書其人則著當國執政大臣之罪而其所以為當國大臣之所弑則必有由矣稱閽以弑而不稱君則見閽寺之賤不得君其君而狎近刑人至於不克保身者君之過也稱盗則匹夫之㣲視如路人又非閽人之比故并不書弑夫弑逆之賊固無所容於天地之間歴千萬世而其罪不赦然其君之不早辨以䧟於大惡豈非古今之龜鑑哉劉氏曰榖梁謂以國氏者嫌也弑而代之也督萬豈可云弑而代之公子商人豈非弑而代之乎夏公及宋公遇于清此書遇之始左傳公與宋公為㑹将尋宿之盟未及期衛人來告亂夏遇于清公羊傳遇者何不期也穀梁八年傳不期而㑹曰遇程子傳諸侯相見而不行朝㑹之禮如道路之相遇故書曰遇非周禮冬見曰遇之遇也杜氏曰清衛邑濟北東阿縣有清亭愚按今東昌路濮州臨清縣遇者草次之期杜氏曰遇者草次之期二國各簡其禮若道路相逢遇也朱子語言草草不成禮也古有遇禮不期而㑹以明造七到反次亦有恭肅之心春秋書遇私為之約自比於不期而遇者直欲簡其禮爾趙氏曰簡禮而㑹曰遇啖氏曰遇禮忽有邂逅相遇簡略而行故與㑹禮不同時雖非相遇而從簡易以遇禮相見通㫖古者諸侯或相朝覲或從王命無期約而適值於途必有両君相見之儀近者為主逺者為賔稱先君以相接所以崇禮讓絶慢易也故謂之遇周衰諸侯放恣出入無度而私為邂逅之約有如適值於途者亦謂之遇非矣愚按通㫖本何氏註簡略慢易去聲無國君之禮則莫適丁厯反下同主矣故志内之遇者四而皆書及此年遇清莊二十三年遇穀三十年遇魯濟僖十四年遇防若曰以此及彼然也志外之遇者三而皆以爵八年宋衛遇垂莊四年齊陳鄭遇垂三十二年宋齊遇梁丘若曰以尊及卑然也其意以為莫適主者異於古之不期而㑹矣故凡書遇者皆惡去聲其無人君相見之禮也髙氏曰國君之出必有卿大夫車徒之從旌旗之識使人儼然望而畏之豈苟然哉各逞私欲奔走道塗之間若匹夫然非先王之法也張氏曰春秋因事而書以譏其非王事而出境無國君之禮襄陵許氏曰隱莊之間凡六書遇自閔以後有㑹無遇愚按遇者偶也偶然相㑹素無期約如伊尹遇汝鳩汝方孟子遇宋牼于石丘是也公榖釋名義皆謂不期為遇左氏此年傳與戴記之說則以未及期為遇左氏遇垂梁丘之傳則皆云先為之約大抵不期而㑹者古禮也未及期或私為之約而以簡禮相㑹者春秋諸侯之禮也觀昭公孫齊而公羊記其以遇禮相見則知非不期之遇矣然桓十年公㑹衛侯于桃丘弗遇則又期而不至者也古者諸侯因王事不期而遇倉卒之間且有禮儀春秋之時非王事而出預有期約以相㑹集乃行古者不期之禮是自欺耳怠惰慢易馴致於期而不至則欺詐尤甚矣世變愈下風俗之偷良可嘆夫啖氏曰穀梁云遇者志相得也為桓十年傳云不遇者志不相得遂云爾公羊又云一君出一君要之假如實然忽以㑹禮相見豈得書遇哉劉氏曰榖梁云及者内為志焉爾遇者志相得也若内為志又志相得非不期也宋公陳侯蔡人衛人伐鄭此諸侯㑹伐之始亦東諸侯分黨之始左傳宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立將修先君之怨於鄭而求寵於諸侯以和其民使告於宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從則衛國之願也宋人許之於是陳蔡方睦于衛故宋公陳侯蔡人衛人伐鄭圍其東門五日而還程子傳宋以公子馮在鄭故與諸侯伐之也搂諸侯以伐鄭固為罪矣而衛弑其君天下所當誅也乃與修好而同伐人其惡甚矣張氏曰陳在陳州宛丘縣蔡在蔡州上蔡縣愚按宛丘属今汴梁路上蔡属汴梁路汝寜州春秋之法誅首惡據僖二十七年諸侯圍宋楚人主兵序四國上興是役者首謀在衛而以宋主兵何也據宋序四國上前書州吁弑君其罪已極至是阻兵修怨勿論去聲可也左傳衆仲曰州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣而鄰境諸侯聞衛之有大變也可但巳乎陳恒弑簡公孔子沐浴而朝告於哀公請討之公曰告夫三子者子曰以吾從大夫之後不敢不告也之三子告不可子曰以吾從大夫之後不敢不告也事見左傳哀十四年朱子曰臣弑其君人倫之大變天理所不容人人得而誅之况鄰國乎故夫子雖已告老而猶請哀公討之先師曰孔子作春秋以討亂賊是年春秋巳絶筆而猶請討陳恒作春秋者莫如孔子用春秋者亦莫如孔子然則鄰有弑逆聲罪赴討雖先發而後聞可矣漢書先行後聞通㫖晉益州刺史皇甫晏為牙將張宏所殺廣漢主簿李毅言於太守王濬宜即赴討濬欲先請毅止之曰賊為惡尤大當不拘常制何請之有即𤼵兵追宏而晉朝不以擅興罪濬是得春秋之㫖矣宋殤不恤衛有弑君之難乃旦反欲定州吁而從其邪說是肆人欲滅天理非人之所為也故以宋公為首諸侯為從才用反通㫖問春秋所以誅亂臣賊子之方曰春秋有誅亂臣賊子之法凡數十條如伐鄭以宋公為首惡書衛人殺州吁之類學者知此義則能守死節當弑父與君之際而不從亂臣賊子見其義則懼及其身而不敢肆示誅亂臣討賊子必先治其黨與之法也此義行為惡者孤矣孤立無助故曰春秋成而亂臣賊子懼張氏曰宋自殤公立公子馮出居鄭之後馮以穆公不立巳為恨謀反取其國鄭莊從而而佐之於是宋鄭為仇及是衛州吁欲定其位而先求伐鄭以除子馮之害故宋率陳蔡以同伐鄭夫宋殤受國於穆公而馮有争位之心正當修徳和民外好鄰國則其位自定而馮無所伺其隙矣况州吁逆賊内懐見討之懼而欲納交殤公苟名其為賊告于王而討之則一舉而君臣父子之倫定今乃怵於邪說合陳蔡以助逆賊使宋國之人不復知君臣順逆之正理自是日從事於兵而弑逆之事卒及其身皆殤公不能早辨于此役也蜀杜氏曰隱桓之世諸侯用師多稱人此宋陳變文稱爵者盖為加貶於蔡衛而著爵若四國同稱人則不見蔡衛伐同姓之罪矣愚按􅆁風擊鼔詩序云衛州吁用兵暴亂使公孫文仲將而平陳與宋經書衛人於蔡人之下所以誅文仲黨惡而忘不共戴天之讐也朱子謂小序譏州吁勇而無禮極為淺陋今考魯衆仲不目其元􅇯大憝而但云阻兵安忍盖君臣之義不明於天下乆矣春秋其得不作乎秋翬帥師翬許歸反此大夫㑹伐之始左傳書曰翬帥師疾之也公羊傳翬不稱公子貶曷為貶與弑公也榖梁傳翬不稱公子貶之也何為貶之與于弑公故貶也程子傳翬不稱公子弑逆之人積其强惡非一朝一夕辨之宜早故去其公子隱公不能辨是以及禍按左氏諸侯謀伐鄭宋公使來乞師公辭之羽父請以師會之公弗許固請而行薛氏曰師興而後翬會之愚按元年鄭伐衛請師於邾邾子私於公子豫豫請徃弗許遂行然豫之專行不見貶者伐衛之事不見於經故爾易曰履霜堅冰至履霜隂始凝也馴致其道至堅冰也臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不早辨也文言程子傳天下之事未有不由積而成其大至於弑逆之禍皆因積累而至非朝夕所能成也明者則知漸不可長小積成大辨之於早故天下之惡無由而成愚按聖人作易常以陽為君子隂為小人大易言隂陽昉見於乾坤初爻故坤之初六其象為履霜盖霜者隂氣之始凝隂盛則水凍而為冰極盛而為堅冰陽主生隂主殺故弑君者不善之積自㣲至著亦猶㣲隂漸積而至於極盛也宋人來乞師而公辭之羽父請以師㑹而公弗許其辭而弗許義也宋助州吁故弗許為合義翬以不義强上聲其君固請而行杜氏曰不稱公子疾其固請强君以不義無君之心兆矣兆者幾之先見夫公子公孫升為貴戚之卿者其植根膠固難御於異姓之卿况翬巳使主兵而方命乎蔡氏曰方命者逆命而不行也王氏曰圎則行方則止隱公不能辨之於早罷其兵權猶使之帥師也是以及鍾巫之禍十一年春秋於此去上聲其公子以謹履霜之戒陳氏曰㑹伐未有言帥師者文三年叔孫得臣成八年叔孫僑如皆不言帥師此特言帥師翬弑隱者也諸侯專征而後千乘之國有弑其君者矣大夫專將而後百乘之家有弑其君者矣永嘉吕氏曰書帥師則翬專兵可知故單伯㑹伐宋不言帥師家氏曰不稱公子去族之誅也桓之弑翬為首惡故當隱世去其族以正其弑君之罪及桓世而仍其公子之號明其與桓同惡也此春秋誅討亂賊始見於魯事者也杜氏曰外大夫貶皆稱人内大夫貶皆去族愚按翬不稱公子劉氏謂左傳以翬溺為貶無駭未賜族如傳之説則翬溺可以無駭言之無駭可以翬溺言之或謂翬本再命大夫其後桓公立進為三命始書氏今考公子非氏若􅆇孫仲孫乃氏也若曰未賜族則公子不當賜族諸侯之子稱公子公子之子稱公孫公孫之子乃以王父字為氏桓三年稱公子翬則翬未賜族明矣傳稱去氏盖以不稱公子同於去族耳若曰翬非命卿據經則両帥師㑹伐據傳無駭卒而請諡與族滕薛争長而公使請於薛侯苟非命卿未必至若是親暱用事也曰未賜族非命卿義不可通况無駭為司空則亦為命卿矣特未賜族故止書名惟先公之子而不書公子乃為貶爾㑹宋公陳侯蔡人衛人伐鄭左傳凡師出與謀曰及不與謀曰㑹程子傳宋虐用其民衛當誅之賊而與之同伐人其罪大矣二國搆怨而他國與之同伐其罪均也再序四國重言其罪左氏以為再伐妄也春秋立義至精詞極簡嚴而不贅也若曰翬帥師㑹伐鄭豈不白乎據莊十四年春三國伐宋夏單伯㑹伐不再序三國再序四國何其詞費方味反不憚煩也曲禮不辭費孟子何許子不憚煩言之重平聲詞之複其中必有大美惡焉四國合黨翬復扶又反㑹師同伐無罪之邦欲定弑君之賊惡之極也言之不足而再言聖人之情見音現矣天地造物化工運其神春秋討賊聖筆冩其意再序四國而誅討亂臣之法嚴矣陳氏曰春秋之逹例三有同號者焉有同辭者焉有同文者焉號不足以盡意而後見於辭辭不足以盡意而後見於文以同文為猶未也而至於變文則特書也於是公子初弑君衛人為之變不踰年能討之衛猶有臣子也而五國之君大夫伐鄭以定州吁弑君天下之大惡也五國之君大夫有人心焉不若是甚矣書曰宋公陳侯蔡人衛人伐鄭秋翬帥師會宋公陳侯蔡人衛人伐鄭書之復書之春秋纔一再見焉特書之法嚴矣張氏曰再書四國者乃重言以見其罪惡之不可勝誅既叙之又重叙之所以反覆痛宋殤失計陳蔡無人黨亂賊以虐無辜視臣弑其君之大變是誠禽獸所不為者而以為可親魯翬又從而翼之遂使中國之人視為常事未幾魯宋淪胥􅁇亂學者於此當知聖人傷世變扶天理之深㫖愚按春秋一經書辭重複者有五僖五年㑹盟首止九年㑹盟葵丘美也此年伐鄭襄二十七年㑹盟于宋昭十三年㑹盟平丘惡也九月衛人殺州吁于濮濮音卜榖梁傳稱人以殺殺有罪也于濮者譏失賊也程子傳州吁未能和其民厚問定君于石子石子曰王覲為可曰何以得覲曰陳侯方有寵於王若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰此二人者實弑寡君敢即圖之陳人執之而請涖於衛衛人使右宰醜涖殺州吁於濮石碏使其宰獳羊肩涖殺石厚於陳稱衛人衆辭也舉國殺之也杜氏曰濮陳地水名張氏曰在曹衛之間受河汴二水東北至灕𣲖分為二俱東北至鉅野入濟伐鄭稱人責詞也殺州吁稱人衆詞也通㫖陸淳曰經中一字徧施於諸例而義不同者惟人字爾此説是也或衆而稱人或美而稱人或諱而稱人或貶而稱人或賤而稱人知然者伐鄭之役公孫文仲為主將去聲而變文稱人則是指國人聽州吁號去聲令從文仲而南行者也詩撃鼔篇踊躍用兵我獨南行從孫子仲平陳與宋故曰責詞其殺州吁則石碏七略反謀之而使右宰醜涖也變文稱人則是人皆有欲討賊之心亦夫人之所得討也夫人猶言凡人檀弓臣弑君凡在官者殺無赦子弑父凡在官者殺無赦注言諸臣子孫無尊卑皆得殺之其罪無赦朱子曰春秋之法亂臣賊子人人得而誅之不必士師也故曰衆詞公羊子曰稱人者何討賊之詞也何氏曰明國中人人得討之所以廣忠孝之路書者善之也范氏曰有弑君之罪者則舉國之人皆欲殺之趙氏曰凡作亂自立為君而國人殺之者皆稱人以殺言衆所共棄不君之也其義是矣于濮者憫衛國之人著諸侯之罪也范氏曰譏其不即討乃令至濮薛氏曰于濮何危失罪人也衛人失賊而曰著諸侯之罪何也夫州吁二月弑君而不能即討者縁四國連兵欲定其位故乆然後能殺之于濮耳非諸侯之罪而何夫以討賊許衆人而以失賊罪鄰國與賊者寡矣故曰春秋成而亂臣賊子懼桓六年傳不以為君故稱名稱名當討乏賊也通㫖竇建徳攻黎陽滑州刺史王軌奴殺軌以降建徳曰奴殺主大逆吾何為受之立命斬奴歸軌首于滑滑民即日請降州吁弑君與石厚如陳石蜡告于陳曰此二人者實弑寡君敢即圖之宋萬弑君其黨奔衛衛人欲匿之石祁子曰不可天下之惡一也惡於宋而保於我保之何補正是此意髙氏曰稱國稱人稱地所以廣忠臣孝子之義使人人皆得殺之而無間于尊卑又使亂臣賊子雖竊發於一時而天地之大四海之廣欲逃無所也陳氏曰討賊天下之大義也苟能討雖㣲者得書異邦人得書夷狄得書苟不能討雖以文十七年四國之大夫伐宋不書其大夫疑於討也而非討則雖以襄二十五年十二國之君伐齊不書伐矣家氏曰不書衛石碏殺州吁者討賊者公法也衆望之所同也書石碏則是一人之私討而不見其從衆望討有罪矣故惟書衛人言衛國猶有人能以討賊為事也愚按宋萬之弑宋人求賊於陳慶父之弑魯人求賊于莒皆責賂而後與今此陳人能執州吁而不匿賊取賂亦賢於後此陳莒之為矣然陳乃衛桓之母家而陳侯亦親率兵㑹伐鄭欲定其位則今日之善不足以贖前日之過故經不書陳人執州吁而止著衛人之殺之也杜預且謂州吁未列于會故不稱君據成十六年傳寡君若有罪則君列諸㑹而云然也夫簒弑之賊歴千萬世而其罪不赦石碏謂王覲為可實以元惡大憝王法所必誅而不可見王耳孰謂列於諸侯之㑹而可以貸其罪乎君臣之義不明巳乆春秋之時習為邪説貪賂黨惡肆無忌憚是以桓弑隱則棄許田而與鄭盟越宣弑赤則獻濟西而結齊㑹平州傳紀其事而不知經意誅貶之所在越千百年杜預反引之以釋經天理泯滅壹至此極噫可歎哉又見莊公九年注冬十有二月衛人立普左傳書曰衛人立普衆也公羊傳立者不宜立也其稱人衆立之之辭也孰立之石碏立之其稱人衆之所欲立也衆雖欲立之其立之非也穀梁傳人者衆辭立者不宜立也其稱人得衆也程子傳衛人逆公子普于邢而立之書曰衛人立普衛人立之也諸侯之立必受命于天子當時雖不請命於天子猶受命於先君衛人以普公子也可以立故立之春秋所不與也雖先君子孫不由天子先君之命不可立也故去其公子人衆辭殺州吁衆詞乃王法所當討而衛人皆欲討之故書人以善之立普衆詞乃無天王之命而衛人以私意欲立而擅立之故書人以罪之美惡不嫌同詞立者不宜立也何氏曰諸侯立不言立此獨言立明不宜立之辭范氏曰嗣子有常位故不言立立納入皆非正也普雖諸侯之子内不承國於先君桓公被弑故無先君之命上不禀命於天子衆謂宜立而遂自立焉可乎故春秋於衛人特書曰立昭二十三年尹氏立王子朝以庶孽奪正亦書曰立沙隨程氏曰衛人立普一國之公也尹氏立朝一族之私也臨川吳氏曰立者非前傳後承之正所立雖是亦非正禮也所以著擅置其君之罪於普絶其公子所以明專有其國之非以此垂法而父子君臣之義明矣未有為子而不受之父也未有為諸侯而不受之王也榖梁隠元為子受之父為諸侯受之君孫氏曰諸侯受國于天子非國人可得立也髙氏曰普乃桓公之弟莊公之子於次當立又國人之所同欲而謂之不宜立何也彼曰我君之子也國我之國我宜立國人亦曰彼吾君之子也國乃其國彼當立是諸侯之子不必命於天子特以公子之親衆人宜之而自立也如此則千乘之國皆可擅置其君而邦君之子皆可専有其國矣髙郵孫氏曰普以國人衆立宜有得立之理聖人特於疑似之間而明不當立之義陳氏曰争國不稱公子普􅂚為以争國之辭書之衛之臣子可以討賊不可以置君州吁為僇而普受之上無天子下無君父是亦争國而已矣繼故未有書立者賊不討君不葬譏不在立也是故宋殤之弑也馮立閔之弑也御説立普靈之弑也黒臀立厲之弑也周立皆不書必若衛人賊討君葬而後書立家氏曰衛人以普為賢而立之而普也志得而驕晩焉獸行新臺之刺作焉是以春秋于其始立而去其公子以見衛亂之所從始陸氏曰穀梁曰普之名惡也按普是其名有何惡乎癸桓王亥二年五年齊僖十三普鄂六奔衛宣公普元年蔡宣三十二鄭莊二十六曹桓三十九陳桓二十七杞武三十三宋殤二秦文四十八楚武二十三春公觀魚于棠觀左作矢左傳公將如棠觀魚者臧僖伯諫曰凡物不足以講大事其材不足以備器用則君不舉焉君將納民於軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也故春蒐夏苖秋獮冬狩皆於農隙以講事也鳥獸之肉不登於俎皮革齒牙骨角毛羽不登於器則公不射古之制也若夫山林川澤之實器用之資皁𨽻之事官司之守非君所及也公曰吾將略地焉遂徃陳魚而觀之書曰公矢魚於棠非禮也且言逺地也公羊傳何以書譏逺也公曷為逺而觀魚登來之也百金之魚公張之棠者何濟上之邑也穀梁傳常事曰視非常曰觀禮尊不親小事卑不尸大功魚卑者之事公觀之非正也程子傳諸侯非王事民事不逺出逺出觀魚非道也杜氏曰髙平方與縣北有武唐亭魯侯觀魚臺張氏曰在單州魚臺縣愚按魚臺縣属今濟寧路濟州齊景公問於晏子曰吾欲觀於轉附朝舞皆山名遵海而南放上聲於瑯琊齊東南境上邑名吾何修而可以比於先王觀也對曰天子適諸侯曰廵狩廵所守也諸侯朝於天子曰述職述所職也無非事者春省耕而補不足秋省歛而助不給書周官六年五服一朝又六年王乃時廵諸侯各朝于方岳朱子注廵所守廵行諸侯所守之土也述所職陳其所受之職也皆無有無事而空行者而又春秋循行郊野察民之所不足而補助之不敢無事慢遊以病其民也是故諸侯非王事則不出非民事則不出朝于京師于方岳王事也春省耕秋省歛民事也孫氏曰天子諸侯無非事者動必有為也隱公怠棄國政觀魚于棠可謂非事者矣今隱公慢棄國政逺事逸遊僖伯之忠言不見納亦已矣又從而為之辭杜氏曰孫辭以略地是縱欲而不能自克之以禮也昭十鄭子皮云云能無鍾巫之及乎及謂及於弑逆之禍特書觀魚譏之也不言如棠觀魚以棠在魯境張氏曰昔益戒舜曰儆戒無虞㒺失法度罔遊于佚罔淫于樂周公告成王曰毋淫于觀于逸于遊于田又曰無遑曰今日耽樂乃非民攸訓非天攸若盖兢兢業業非禮勿動然後足以正國而治人一或惟耽樂之從則將以逸豫而滅厥徳隱公忽僖伯之匡諫而逺從事於遊觀非所以為君國子民之道春秋特書所以示人君當循禮遵法以隱公為戒也臨川吳氏曰古者天子季冬之月命漁師始漁先薦寢廟隱公盖非為宗廟嘗魚而徃棠乃逺地漁師取魚而公徃觀之特為游觀之樂耳愚按月令季冬乃周之二月經書春觀魚則是周正月未當嘗魚之時况僖伯之言曰鳥獸之肉不登於俎則君不射又曰山林川澤之實非君所及則隱公决非為嘗魚而徃明矣苟隱公果為嘗魚薦廟則為常事得禮而不書矣且天王之喪未畢而驅馳於逺境肆意逸遊其罪何所逃哉夏四月葬衛桓公程子傳衛亂是以緩稱桓公見國人私諡也魯徃㑹故書送終大事也必就正寢不殁于婦人之手曽子易簀而殁豈苟然乎死而加之不正之諡知忠孝者肯為乎衛亂是以緩桓公被弑八月而後討賊十五月而後克葬魯徃㑹故書非魯人徃㑹則魯史無由紀其葬聖人存而弗削者弑逆之賊討矣弑逆人道之大變送終臣子之大事君弑而臣子能討其賊則送終之責始盡諡者行之迹程子曰諡者行之迹所以表徳周公制諡法大行受大名小行受小名所以勸善而懲惡所以紀實徳垂勸戒也名之曰幽厲雖孝子慈孫百世不能改失位而見弑何以為桓諡法辟土服逺曰桓列爵惟五皆王命也衛本侯爵何以稱公據桓十七年蔡桓稱侯見音現臣子不請於王而私自諡爾愚按先王之制諸侯初立喪畢則以士服見天子而賜之命及其殁則臣子請於王而賜之諡今衛桓公諡不當其行號不同其爵春秋據事直書而罪自見矣程氏曰正終大事也必於正寢而不殁於婦人之手喪大記君夫人卒於路寢男子不死於婦人之手婦人不死於男子之手豈苟然乎死而加之不正之諡知忠孝者不忍為也春秋於邦君薨正以王法而書卒見三年宋公卒至於葬則從其私諡而稱公或革或因前以貶不臣順之諸侯後以罪不忠孝之臣子詞顯而義㣲皆所以遏人欲存天理大居正也張氏曰春秋之時為臣子者皆無以正君父之終程子之言深足以發明一經書葬之㫖桓公名完而諡桓盖古不諱嫌名也愚按榖梁云月葬故也非也後此蔡宣曹桓鄭莊皆非弑何以月葬乎秋衛師入郕郕音成公作盛左傳衛之亂也郕人侵衛故衛師入郕公羊傳將尊師衆稱某率師將尊師少稱將將卑師衆稱師將卑師少稱人君將不言率師書其重者也穀梁傳將卑師衆曰師程子傳衛晉乘亂得立不思安國保民之道以尊王為先居喪為重乃興戎修怨入人之國書其失道也杜氏曰東平亢父縣西南有郕郷張氏曰今單州任城縣愚按單州任城縣属今濟寧路稱師者紀其用衆易本義師兵衆也而立義不同有矜其盛而稱師者如齊師宋師曹師城邢之類是也僖元年諸侯救邢邢遷夷儀諸侯城之經皆書師者美桓公救患之功故録其兵衆之盛也有著其暴而稱師者楚滅陳蔡公子棄疾主兵而曰楚師之類是也昭八年楚公子棄疾帥師奉孫吳圍陳冬十月壬午滅陳十一年楚公子棄疾帥師圍蔡十一月楚子滅蔡經皆書楚師所以著荆楚擅興大衆以滅中夏諸侯之國誅其暴横馮陵之甚也有惡其無名不義而稱師者次于郎以俟陳蔡及齊圍郕之類是也莊八年師及齊師圍郕郕降于齊師仲慶父請伐齊師公曰不可則同圍郕者公也經書師次而不言公次書師及而不言公及書師還而不言公至者所以責莊公無名黷武非義勤民諱不書公以貶之也衛宣繼州吁暴亂之後不施徳政固本恤民而毒衆臨戎入人之國失君道矣書衛師入郕著其暴也家氏曰衛宣繼亂而立不能懲艾革弊以息民保國為事而輕動大衆以入人國書以貶之耳此入郕入而弗有也十年齊鄭又入郕故知此入之弗有非其力之可以取而不取盖懼强國來討故雖入之而不敢遂有之耳臨川吳氏曰衛與郕皆文王之子所封郕乘亂侵衛已非禮衛又報復而入其國莒入向魯入極且不可况以師而入兄弟之國乎師者兵師之稱周制萬二千五百人為軍二千五百人為師五百人為旅軍師旅三名師在其中故舉中以該上下而總名其軍旅之衆曰師非以二千五百人而言也通㫖凡用兵將尊師衆稱某帥師者言將與師輕重敵也將尊師少稱將者其重在將也將卑師衆稱師者其重在師也君將不言帥師者則以君為重此属辭為例之體也然立例為法其義深矣主將三軍之命不可不謹擇也大衆有邦之本不可輕用也民之戴君其尊之如父母君之視民其親之如子弟子弟之不先父母審矣此立例為法之意也九月考仲子之宫公羊傳考猶入室也始祭仲子也穀梁傳禮庶子為君為其母築宫使公子主其祭於子祭於孫止程子傳諸侯無再娶仲子不得為夫人春秋之初尚以為疑故别宫以祀之考始成而祀也書以見非禮考者始成而祀也杜氏曰成宫安其主而祭之服䖍曰宫廟初成祭之名為考其稱仲子者仲字子氏惠公欲以愛妾為夫人隱公欲以庶弟為嫡子詳桓元聖人以為諸侯不再娶據公羊于禮無二適丁歴反與嫡同孟子入惠公之廟仲子無祭享之所為去聲别立宫以祀之非禮也杜氏曰諸侯無二嫡惠公欲以仲子為夫人隠公成父之志為别立宫也家氏曰隱欲讓國於桓故為其母立廟仲子之卒巳乆至是始立廟者隱欲以自明其讓國之志耳夫禮必庶子為君而後其母築宫以祭也又以公子主之君不親祭尊宗廟也今桓未為君而隱為之築宫以祭其母此召亂之道也宫廟有定制循其制之常不書非制之禮於是乎書若曰公子允之母非魯君所宜為之立廟也故因其來賵而正名之曰仲子之賵因其考宫而正名之曰仲子之宫而夫人衆妾之分扶問反定矣不稱諡不稱夫人不稱小君則其為妾明矣隱公攝讓之實辨矣左氏以隱為攝位榖梁以隱為讓國然桓母非夫人則隱桓皆庶子隱長當立非攝也隱欲與桓乃讓之也桓公簒弑之罪昭矣隱將讓桓而桓聽翬之譛以弑隱公非簒而何存則以氏繫音繼下同姓以姓繫號去聲下同没則以諡繫號以姓繫諡者夫人也據文姜至自齊如齊及薨皆稱夫人姜氏葬禰小君文姜存不稱號没不稱諡單舉姓字者妾也諸侯妾母祇當以氏繫字魯自成風而後妾母皆稱夫人稱小君稱諡惟定姒以哀未成君不稱夫人及小君然亦襲成風敬嬴齊歸之例而稱諡矣夫人且不當别有諡而况妾乎凡宫廟非志災失禮則不書啖氏曰凡祭祀常事不書失禮及非常乃書愚按穀梁云庶母築宫而君終則廢禮曰妾母不世祭乃庶子為君之禮也戴記稱妾袝於妾祖姑乃公子之為大夫士者之禮也若庶子未為君而祭其妾母則固無其禮也禮稱女君死則妾為女君之黨服攝女君則不為先女君之黨服所以防嫡妾之亂也孟子卒則聲子攝小君矣仲子先君之妾耳安可為之立宫乎隱公立宫以祭庶弟之母遂啓後世追尊妾母皆援春秋考宫之義聖人特書以著失禮之始厥後成風敬嬴定姒齊歸皆以妾母祔廟而不書矣凡經書宫廟若西宫新宫桓宫僖宫則以災而書作新宫合禮則不書世室屋壊則書新作世室合禮亦不書丹桓宫楹刻桓宫桷過侈非禮則書武宫煬宫親盡不當立則書取郜鼎納于太廟禘于太廟用致夫人大事于太廟躋僖公有事于太廟仲遂卒猶繹非禮皆書凡易世立先君之廟得禮皆不書劉氏曰穀梁曰考者成之也成之為夫人非也若成之為夫人當曰考夫人子氏之宫今但曰仲子非夫人明矣初獻六羽左傳公問羽数於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之於是初獻六羽始用六佾也祀公羊穀梁傳初始也程子傳成王賜魯用天子禮樂周公後世遂羣廟皆用仲子别宫故不敢同羣廟而用六羽也書初獻見前此用八之僣也仲尼以魯之郊禘為周公之道衰用天子之禮樂祀周公成王之過也初獻六羽者始用六佾也不謂之佾而曰羽者佾干羽之總稱也羽以象文徳干以象武功婦人無武事則獨奏文樂故謂之羽而不曰佾也范氏曰佾之言列八人為列羽翟雉之羽舞者所執人執一羽不言六佾言佾則干在其中婦人無武事獨奏文樂杜氏曰毎佾人数如其佾数愚按武舞執干干楯也所以扞難文舞執羽翟羽有文也書言舞干羽于兩階盖二者並用孔氏曰羽翳也山海經五采之鳥名翳盖或翟或翳惟取其文耳佾者舞列之名則干羽皆在其中但言羽則舞干不與矣春官樂師有羽舞有干舞籥師祭祀則鼔羽籥之舞司干祭祀舞者既陳則授舞器然則祭祀或文舞武舞並用或止用文舞而不用武舞也初者事之始卲子曰初者褒之也以其舊僣八佾也愚按洪範初一曰五行易卦第一爻曰初善者復其初惡者變其初作事者必慎其初故初者肇事之端不可不審也魯僣天子之禮樂舊矣是成王過賜而伯禽受之非也用於大音泰廟以祀周公已為非禮其後羣公皆僣用焉杜氏曰魯唯周公廟得用八而他公遂因仍僣而用之祭統成王追念周公所以勲勞者而欲尊魯故賜以重祭八佾以舞大夏此天子之樂也明堂位成王以周公為有勲勞於天下命魯公世世祀周公以天子之禮樂史成王命魯有天子禮樂者以褒周公之徳也愚按劉氏意林謂魯惠公之世禮壊樂崩請于周天子命史角徃自是魯始用天子禮樂夫齊桓晉文輔翼襄王其功甚大不過召伯賜命尹氏授策而已耳晉文請隧則曰王章也未有代徳而有二王亦叔父之所惡也豈以魯惠無功於王而遽以天子之禮樂賜之耶以為惠公自僣則當時諸侯强盛惟吴楚無知僣稱王號桓文威行天下幾於改物然終身不敢用天子禮孰謂惠公而敢僣之耶若曰惠公請于周平王亦未必從之也程子朱子皆信戴記遷史之説其必有所見矣仲子以别宫故不敢同羣廟而降用六羽書初獻者明前此用八之僣也王氏箋義言初獻六羽善其復正趙氏曰舍八佾用六佾猶謂之僣故曰獻張氏曰獻者不宜獻也書初以見八佾用於羣公之廟書獻以見六羽不當用於仲子之宫一言而盡魯僣禮之本末非聖人莫能修謂此類也沙隨程氏曰獻六羽是以妾僣夫人也諸侯僣於上大夫僣於下故其末流季氏八佾舞於庭而三家者以雍徹上下無復去聲辨矣諸侯之大夫而僣天子之禮豈復有上下之辨朱子語使魯不曽用天子之禮樂則三家雖欲僣無此様子亦無縁見此等禮樂而用之聖人因事而書所以正天下之大典愚按魯僣天子禮樂春秋因事書之以著其罪諸侯六佾而魯僣八佾隱公以仲子别立宫當下於羣公之廟疑於羽数乃從衆仲而改用六羽盖隱公之心若曰先公之廟可循舊用天子所賜之禮仲子别宫祗當用諸侯之禮而不知先君之妾不可與君同安可用諸侯之禮乎聖人書曰初獻一以嘉隱公復王制之舊一以著其崇寵妾之過也孔子之時季氏舞八佾則知隱公惟用六羽於仲子之宫而羣公仍僣八佾厥後成風敬嬴定姒齊歸皆以妾母用小君之禮則隱公為仲子立宫而獻六羽有以啓之也聖人書此固為隱公喜而亦深有遺憾云公穀皆云天子八佾諸公六佾諸侯四佾然樂舞之数自上而下降殺以兩諸侯既降於諸公則諸伯當降於諸侯而用二佾矣子男復何所用乎况禮經所記廟制堂制衮旒席数五等諸侯皆同豈以舞佾而獨異其制乎尸子又謂天子諸侯皆用八佾初獻六羽始厲樂矣夫春秋諸侯僣侈循習為常魯於郊禘門觀皆不貶損何獨羽数而貶損乎且妾廟降於諸侯乃其常也春秋亦不書矣邾人鄭人伐宋程子傳宋人取邾田邾人告于鄭曰請君釋憾於宋敝邑為道先邾人為主也按左氏宋人取邾田邾人告于鄭曰請君釋憾於宋敝邑為道則主兵者邾也故雖附庸小國即序乎鄭之上杜氏曰邾主兵故序鄭上家氏曰邾序鄭上著其為兵首所以貶也或曰宋實啓釁而邾應之邾其無罪乎曰邾見侵於宋當告之天王請之方伯聲其罪而治之不當間鄭宋之隙而偕鄭以伐宋因彼之憾復巳之私春秋所不與也是故邾為首鄭次之鄭以伯爵之國而序乎邾之下亦所以貶也凡班序上下以國之小大從禮之常也通㫖諸侯序列以爵之尊卑則名正而盟㑹征伐以主者先因事之變也㑹盟則先主㑹征伐則先主兵然則衛州吁告於宋以伐鄭事與此同而聖人以宋為主者何此春秋撥亂之大法也凡誅亂臣討賊子必深絶其黨通㫖兵者國之大事也春秋之所重故雖將卑師少亦書于策而曲直之辭具文可見愚按左傳云鄭人以王師㑹之伐宋入其郛而經序邾為首不書王臣盖鄭莊是時為王卿士故擅興天子鄉遂之兵非王室遣將故不書也螟音𡨕蟲災始此公羊傳記災也榖梁傳蟲災也程子傳書螟書螽皆為災也國之大事故書蟲食苖心曰螟食葉曰螣音特食節曰賊食根曰蟊莫侯反本爾雅國以民為夲書民為邦本民以食為天管子王者以民為天民以食為天詩去上聲螟螣害稼也小雅大田篇去其螟螣及其蟊賊無害我田稺春秋書螟記災也杜氏曰為災故書薛氏曰異天之變也災人之害也賢君睹災變而恐懼修省消災變之道也朱子語書山崩地震螽螟之類知災異有所自致也聖人以是為國之大事也故書家氏曰宇宙之内一事之違其常一物不得其所日星示異水旱螽螟告災皆人君責也故春秋變見於上必書災及於民亦必書示人君職分之當謹耳哀十二年冬螽註者歸過於司厯之失閏此諛臣所以蔽災而託於聖人之言豈春秋書水旱螽螟之㫖哉愚按春秋書蟲災者十四書螟者三而在隱公之世者二在莊公之世者一書螽者十而桓僖文襄四公之世各一宣公之世者三哀公之世者三書蝝生者一亦在宣公之世盖宣公以弑兄得國而又改法税畝重困農民故螽蝝水旱飢饉之災比歳相仍猶不知恐懼修省以消天變聖人備書為後鍳也而近世王安石乃稱為人牧者不必論去聲奏災傷之事亦獨何哉甚矣其不講於聖人之經以欺當年而誤天下與來世也宋鑑神宗熈寧五年御史張商英言刑部立法應蝗蝻為害須俟其撲除盡淨方許以聞則陛下欲於此時恐懼修省以上荅天戒而下恤民隠亦晩矣王安石曰條貫已令轉運司申奏安撫司有何限合經制事却須要管勾奏災傷狀作甚上笑冬十有二月辛巳公子彄卒彄苦侯反按左氏臧僖伯卒僖謚伯字愚按僖伯以先公子必未賜族盖左氏追稱氏如陳桓未卒而稱陳桓公有寵於王髙氏曰其子臧孫逹嗣是為哀伯自是終春秋臧氏世預魯國之政公曰叔父有憾胡暗反恨也於寡人寡人不敢忘葬之加一等杜氏旦葬者臣子之事非公家所及故不書葬以公羊三世考之則所傳聞之世也公羊所見異辭所聞異辭所傳聞異辭何氏曰所見之世謂昭定哀已與父時事也所聞之世謂文宣成襄王父時事也所傳聞之世謂隠桓莊閔僖髙祖曽祖時事也而書日見恩禮之厚明矣公將如棠觀魚者僖伯諫而不聼則稱疾不從可謂忠臣矣葬之加一等夫是之謂稱去聲冝也謂得賞賢旌直之權衡然隠公不敢忘其忠而不能聴其言與郭公善去聲善而不能用至於亡國莊二十四一也其及宜矣永嘉吕氏曰穀梁云隠不爵命大夫盖謂隠攝而非君也然其生也稱公其殁也稱薨魯之臣子皆以君待之矣非攝也豈有不爵命大夫乎彼見無駭之不稱公子求其説而不得故云爾宋人伐鄭圍長葛此書圍之始左傳以報入郛之役也公羊傳邑不言圍此其言圍何彊也穀梁傳伐國不言圍邑此其言圍何乆之也伐不踰時戰不逐奔誅不填服程子傳伐國而圍邑肆其暴也杜氏曰潁川長社縣北有長葛城張氏曰鄭邑今潁昌府長葛縣愚按長葛縣属今汴梁路許州圍者繯于善反其城邑絶其徃來之使去聲禁其樵采之途城守不下至於經年而不解明年冬書取長葛既不稱侵伐又不繋鄭故知圍經年也誅亂臣討賊子可也長葛鄭邑何罪乎書圍於此而書取於後宋人之惡彰矣髙氏曰圍人城邑者其兵必衆而稱人者貶之也張氏曰宋殤以邾鄭伐已之故報怨於鄭聲其罪而圍其邑踰年乃取著其暴虐阻兵之甚也臨川吳氏曰前書莒人伐杞取牟婁一加兵即取其邑取之易也宋雖加兵于鄭之邑而取之難故圍之經年乃能取陳氏曰伐國不言圍邑自僖以前則書之僖十八年邢狄伐衛圍菟圃不書至二十三年書齊侯伐宋圍緡二十六年書楚人伐宋圍緡之後皆不書矣春秋之初猶以圍邑為重也蜀杜氏曰春秋書圍四十四伐國而言圍者九此為之首書伐書圍書取惡之也甲桓王子三年六年齊僖十四晉哀侯光元年衛宣二蔡宣三十三鄭莊二十七曹桓四十陳桓二十八杞武三十四宋殤三秦文四十九楚武二十四春鄭人來輸平輸左作渝左傳更成也程子傳魯與鄭舊修好既而廹於宋衛遂與之同伐鄭故鄭來絶交渝平變其平也匹夫且不肯失信於人為國君而負約可羞之甚也輸者納也平者成也朱子語言輸則渝之義自在其中如秦詛楚文云變輸盟刺沙隨程氏曰輸如吕刑輸而孚之輸我無欲平之意而鄭輸其平於我臨川吳氏曰來者彼來求我非我徃求彼也輸謂輸冩其情平謂兩國昔有忿怨如地之不平今悉剗削而使之平也輸平猶曰納欵也杜氏曰和而不盟曰平鄭人曷為納成於魯以利相結解怨釋仇離宋魯之黨也公之未立與鄭人戰于狐壤止焉内諱獲故言止見左傳十一年元年及宋盟于宿四年遇于清其秋㑹師伐鄭即宋魯為黨與鄭有舊怨明矣孫氏曰鄭來輸誠於我平四年翬會諸侯伐鄭之怨也五年鄭人伐宋入其郛宋來告命魯欲救之使去聲者失詞公怒而止其冬宋人伐鄭圍長葛鄭伯知其適有用間去聲可乘之隙也是以來納成耳然則善之乎曰平者解怨釋仇固所善也輸平者以利相結則貶矣髙氏曰曰來輸必有挾也薛氏曰輸平者何來以賂于我也愚按經書平者凡六惟此言輸平輸之為言必有貨賂行乎其間而非虛言求平矣平乃鄭志而非魯志茍不以利啗魯則魯必不從也曷為知其相結之以利也後此鄭伯使宛來歸祊而魯入其地會鄭人伐宋得郜古報反及防而魯又取其二邑是知輸平者以利相結乃貶之也諸侯修睦以蕃王室所主者義爾茍為以利使為人臣者懐利以事其君為人子者懐利以事其父為人弟者懐利以事其兄諸侯必曰何以利吾國大夫必曰何以利吾家士庶人必曰何以利吾身上下交征利不至於簒弑奪攘則不厭平聲矣本孟子故特稱輸平以明有國者必正其義不謀其利杜絶塞也書杜乃擭亡國敗家之本也太史公曰利誠亂之始也夫子罕言利常防其源也張氏曰鄭莊之納平為合黨敵宋計是以不憚屈已請和於魯繼以納祊而未即求許所以為敗宋入許之權輿魯隠亦入其術中而不悟也永嘉吕氏曰言來輸則有自屈損之意鄭豈誠敬魯哉亦豈誠畏魯哉亦豈誠欲與魯釋其舊憾而為玉帛之好哉特以宋魯方合而幸其有可離之隙於是屈損以求成耳陳氏曰春秋之初魯宋衛陳蔡為一黨齊鄭為一黨今鄭先來與魯平就合齊魯之交自此以後魯合於齊鄭而離宋魯之交矣平不書必關於天下之故而後書明年宋陳及鄭平宣七年鄭及晉平文十六年及齊平襄二十年及莒平哀八年及齊平皆不書書鄭輸平以志諸侯之合書及鄭平以志諸侯之散是春秋之所終始也劉氏曰公羊謂敗吾成榖梁謂不果成皆非也平者兩國約不相背云爾四年伐鄭平絶可知安有鄭人又來請絶前平乎左氏作渝平盖字誤夏五月辛酉公會齊侯盟于艾艾五盖反此齊魯交好之始程子傳始平于齊也杜氏曰春秋前魯與齊不平今棄惡結好泰山牟縣東南有艾山張氏曰在襲慶府奉符縣愚按今益都路寧海州牟平縣臨川吳氏曰前此魯未嘗與齊交因鄭輸平之後而公始與齊盟盖皆鄭莊之謀也愚按宋殤既合五國之師伐鄭又出師圍邑經年而取之鄭之怨宋深矣去年與邾伐宋未足以釋其怨故特平齊魯以為他日伐宋之謀魯與齊盟而曰鄭莊合齊魯者以三年齊鄭盟石門知齊鄭合黨故也盟不書及而書㑹則非魯志而齊欲為盟也書盟于艾著齊僖小伯之始書盟于黄著齊景争伯之終前乎于艾雖盟石門然未與魯平則黨與未盛也後乎于黄雖次垂葭㑹牽㑹洮次渠蒢伐晉伐宋而無盟矣凡書盟皆春秋所惡比事以觀而世變可知也秋七月公羊傳此無事何以書春秋雖無事首時過則書春秋編年四時具然後為年程子傳無事書首月天時王月備而後成歳也四徳備而後為乾故易曰乾元亨利貞一徳不備則乾道熄矣四時具而後成歳故春秋雖無事首時過則書一時不具則歳功虧矣何氏曰歴一時無事則書其始月春以正月為始夏以四月為始秋以七月為始冬以十月為始明王者當奉順四時之正也有事不月者人道正則天道正矣杜氏曰雖無事而書首月具四時以成歳也孔氏正義年有四時交錯互舉以為史記之名言春足以兼夏言秋足以見冬愚按經無事書正月者二十三書夏四月者十一書秋七月者十七書冬十月者亦十有一既書時又書月者時天時也月王月也書時又書月見音現天人之理合也易不云乎君子行此四徳者故曰乾元亨利貞文言傳愚按乾健也天之徳也天以至健故能運四徳於四時君子以至健故能體四徳於一身聖人以至健故能行四徳於兩儀之間以參天地而賛化育元者物之始於時為春其在人則為仁其發則惻隠之情而得天地生物之心以為心者也月令天子賞公卿大夫於朝命相布徳和令行慶施惠下及兆民是體乾之元亨者物之通於時為夏其在人則為禮其發則辭讓之情而所以品節乎親親仁民愛物之等差者也月令天子賞封諸侯慶賜遂行無不欣悅命大尉賛傑俊遂賢良行爵出禄必當其位是體乾之亨利者物之遂於時為秋其在人則為義其發則羞惡之情而所以斷制事物各得其宜者也月令天子命將帥選士厲兵以征不義詰誅暴慢以明好惡命有司修法制戮有罪嚴㫁刑是體乾之利貞者物之成於時為冬其在人則為智其發則是非之情而所以分别事理以宰萬物者也月令天子察阿黨使罪無有掩蔽功有不當必行其罪以窮其情固封疆備邊境命將講武飭死事是體乾之貞春秋于毎年備四時明人君當奉若天道體乾之四徳首時必書月明人君當謹守王度奉天子之正朔與其法制禁令王者承天而禮樂征伐行於天下諸侯奉王而徳刑賞罰施於國中其理一也若夫上下異致天人殊觀聖學不傳而春秋之義隠矣愚按聖人致中和而天地位萬物育自聖人以下不能體乾之四徳毫釐有差則天壤易位一物不得其所而天變應之宋神宗時王安石言水旱氣數堯湯所不免王珪言天象既如此必至於用兵亦天數也此皆人臣不能諫人君儆省以荅天戒盖不通春秋之義而以為天人異致故也冬宋人取長葛公羊榖梁傳外取邑不書此何以書乆也程子曰宋人之圍長葛歳且周矣其虐民無道之甚而天子弗治方伯弗征鄭視其民之危困而弗能保有赴訴卒喪其邑皆罪也宋之强取不可勝誅矣何氏曰不繋鄭舉伐者因上伐圍取也宋人恃强圍邑乆役大衆取非所有其罪著矣彼此皆列國而伐之以圍其邑是恃强也圍之期年是乆役也環而攻之是用大衆也鄭邑而已取之是取非所有也直書而罪自見在王朝不能施九伐之威周禮大司馬以九伐之法正邦國馮弱犯寡則眚之賊賢害民則伐之暴内陵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令陵政則杜之外内亂鳥獸行則滅之在列國不能修連帥所類反之職王制千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯鄭人土地天子所命先祖所受不能保有而失之是上無天王下無方伯而鄭亦無君也宋人强取以王法言不可勝平聲誅以天理言不善之積著矣初穆公屬章欲反付也託也國於與夷使其子馮皮冰反出居於鄭三年殤公既立忌馮而伐鄭四年不亦逆天理乎春秋序宋主兵以殤公之罪重也明年鄭人伐宋序邾為首以鄭伯之罪輕也至是宋又舉兵伐鄭而圍其邑肆行暴虐不善之積已著而不可解矣其見弑於亂臣豈一朝一夕之故哉凡此類皆直書于䇿按其行事而善惡之應去聲可考而知天理之不誣者也張氏曰宋自去年圍長葛經年不解志在必取鄭莊不求保其土地人民反交結於魯為後日報復之計而委長葛於宋宋殤雖若得志而後日終受鄭莊報復蹙國喪師以及其身愚按或云文定言善惡之應與佛氏所謂果報者相似非也易文言於坤之初六曰積善之家必有餘慶積不善之家必有餘殃於噬嗑之上九曰善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可揜罪大而不可解曽子曰出乎爾反乎爾天道好還無毫髪爽此乃福善禍淫必然之理也若果報之説謂今世為人後世為異物負怨於陽明之界而取償於幽隂之府豈有是理也哉劉氏曰左氏作秋取長葛杜氏云冬告非也史之記事雖據赴告至其月日猶依先後次序假令以二月出師逾時來告猶言二月也豈據告時紀之於夏乎左氏雜采當時諸國史策有用夏正者有用周正者故經云冬傳云秋也乙桓王丑四年七年齊僖十五晉哀二曲沃武公稱元年衛宣三蔡宣三十四鄭莊二十八曹桓四十一陳桓二十九杞武三十五宋殤四秦文五十楚武二十五春王三月叔姬歸于紀程子傳伯姬為紀侯夫人叔姬其娣也待年於家今始歸娣歸不書憫其無終也叔姬伯姬之娣非夫人也伯姬二年歸紀則何以書古者諸侯一娶九女公羊莊十九諸侯娶一國則二國徃媵之各以娣姪從故一聘九女必格之同時者所以定名分扶問反窒亂源也同時而行則妃妾之名不紊其生子也嫡庶之分已定亂何由作今叔姬待年於宗國不與嫡俱行本杜氏注詩江有汜朱子傳媵有待年於父母之國而嫡不與之偕行者則非禮之常所以書也春秋常事不書非禮之常而書之者必有美惡存焉孫氏曰媵書者為莊十二年歸于􅈶起眉山蘇轍以為書叔姬賢之也蘇氏字子由有集傳二十卷若賢不得書必貴而後書則是以位而蔑徳也小國無大夫通㫖小國大夫稱人至於接我則書二年書紀履緰來逆女莊二十七年書莒慶來逆叔姬是位不可以廢事也位不可以廢事而獨可以廢賢乎如叔姬不歸宗國而歸于􅈶音擕以全婦道賢可知矣賢而得書亦春秋之法也何氏曰婦人八歳備數十五從嫡二十承事君子媵賤書者終有賢行能處隠約全竟婦道故重録之髙氏曰娣亦書歸猶堯之二女降於溈汭皆曰嬪張氏曰媵不書此特書者以其終不忘紀之五廟雖紀侯卒而歸于􅈶以奉宗祀殁其身而後已聖人以其賢可以厲婦行將有其末必録其本是以變例而特書之愚按賈逵謂隠公厚於先君之女故盛禮而歸之如歸嫡之禮又云紀貴叔姬故書以刺之聖人豈逆計其他日之賢而書之哉今考春秋諸侯寵嬖妾媵盖多不足煩聖筆之録茍隠公厚先公之女必不以為媵矣夫子作經以垂勸戒則以為嘉其賢者義或近之安可以史官一時之例而議春秋萬世之法乎子朱子作通鑑綱目書唐太宗以武氏為才人所以起偽周之亂書𤣥宗册夀王妃楊氏所以起馬嵬之奔納才人冊諸王妃法不當書而朱子書之亦春秋之意也滕侯卒程子傳不名史闕文也杜氏曰滕國在沛國公丘縣東南張氏曰今徐州滕縣愚按今益都路滕州滕侯書卒何以不葬怠於禮弱其君而不葬者見隠三年滕侯宿男之類是已古者邦交有常制不以國之强弱而有謹慢也國小而慢之是弱其君不以情之踈宻而有厚薄也情踈而薄之是怠於禮春秋之時則異於是晉北國也楚南邦也地非同盟而親徃俟其葬成十年公如晉葬景公襄二十八年公如楚葬康王愚按地非同盟謂非同方岳之盟滕鄰境也滕國在魯西南宿同盟也元年盟宿訃告雖及而魯不之恤豈非以其壤地褊小乎怠於禮而不徃弱其君而不會無其事而闕其文此魯史之舊也聖人無加損焉存其卒闕其葬義自見音現矣通㫖人之所以為人與其所以異於禽獸以其有人道也無人道何以為人如滕於魯以近則鄰國也以親則同姓也又覲東后則同至於方岳之下卒而不葬强凌弱爾卒自外録不卒非外也非責也責不赴告葬自内録不葬非内也責魯不㑹趙氏曰左氏云同盟薨則赴以名於理未安豈有臣子當創巨痛深之日乃忍稱君之名禮篇所録亦云寡君不禄而已諸侯卒不同盟者凡五十二人惟九人不名啖氏曰其不名公羊謂㣲國也滕國文王之子孫雖至㣲弱豈無名乎夏城中丘此書士功之始左傳書不時也公羊傳中丘内之邑也城何以書以重書也穀梁傳凡城之志皆譏程子傳為民立君所以飬之也飬民之道在愛其力民力足則生飬遂生飬遂則教化行而風俗美故為政以民力為重也春秋凡用民必書其所興作不時害義固為罪也雖時且義必書見勞民為重事也後之人君知此義則知慎重於用民力矣然有用民力之大而不書者為教之意深矣僖公修泮宫復閟宫非不用民力也然而不書二者復古興廢之大事為國之先務如是而用民乃所當用也人君知此義則知為政之先後輕重矣凡書城者完舊也書築者創始也城中丘使民不以時非人君之用心也杜氏曰中丘在琅琊臨沂縣東北張氏曰今沂州臨沂縣愚按在今益都路宻州安丘縣程氏曰為去聲民立君所以飬之也飬民之道在愛其力民力足則生飬遂教化行風俗美故為政以民力為重也春秋凡用民必書經書魯力役三十八城二十三築八浚一新一新作二毁一墮二書外城者六其所興作不時害義固為罪矣莊二十九年新延廐三十一年築臺于郎三十二年城小榖僖二十年新作南門文七年城郚哀五年城毗六年城邾瑕皆以春此城中丘九年城郎桓五年城祝丘莊三十一年築臺于薛襄七年城費十五年城成郛定十二年墮郈墮費十三年築蛇淵囿哀三年城啓陽四年城西郛皆以夏莊元年築王姬舘三十一年築臺于秦文十六年毁泉臺成十八年築鹿囿皆以秋是不時也夫不能内脩徳政以為保民之本而勞民於守國之末如桓公懼齊鄭襲紀而城祝丘莊公懼齊桓討納糾之罪而浚洙文公既取須句備邾而城郚患莒人之外偪而城諸鄆宣公欲叛晉而城鄆襄公聽南遺之奸謀假事難而成費因齊靈之叛晉屡來侵伐而比年城成郛城西郛城武城定公從伯令侵鄭懼而城中城復叛晉黨范氏而城莒父及霄哀公亦黨范氏而比年城啓陽城西郛城毗城邾瑕皆非義也况於築臺囿以為游觀之樂新延廐以示牧飬之奢作門觀以僣天子之制毁泉臺以彰先祖之惡築舘以主讐人之婚而忘通喪之禮其罪又可勝誅乎至於㑹晉悼城虎牢以偪鄭㑹晉平城杞而私其母家亦非義也雖時且義亦書桓十六年城向二十九年城諸防文十二年城諸鄆宣八年城平陽成四年城鄆九年城中城襄十三年城防十九年城西郛城武城定六年城中城十四年城莒父及霄十五年城漆皆以冬修城得農隙之時定公墮郈費以弱私家僖公㑹齊桓存三亡國以興滅繼絶仲孫蔑㑹晉定城成周以蕃王室皆合於義而亦書之見音現勞民為重事也啖氏曰凡興作必書重民力也觀其時而是非昭矣人君而知此義則知慎重於用民力矣凡書城者完音丸舊也書築者創始也城中丘使民不以時非人君之心也張氏曰隠公無敵國外患之警盛夏興役事無故之工築妨農害民春秋深譏之臨川吳氏曰君之資於民者資其力也民之報其君者報以力也故無事則資其力而用之於農以足食生財有事則資其力而用之於兵以敵愾禦侮非農非兵而勞民之力必以其時以其禮而不敢妄興不得已而役之亦必節其力而不盡也春秋凡力役必書重民力也通㫖問榖梁凡城之志皆譏啖子曰凡城國之急務但問時與不時不應一切是譏易曰設險以守其國禮曰城池以為固則春秋書城果何意也曰穀梁子之意謂春秋時言之也城不可無而未為國之急易所謂設險非止於築城禮所謂城池亦固國之一事爾春秋凡城必書或志其非時或志其非制或志其非所得其時制又當其所而亦書重民力也文王以民力為臺為沼或與民同其利或與民同其樂則不可以已矣王氏曰詩采薇曰天子命我城彼朔方烝民曰王命仲山甫城彼東方夫玁狁之難甚亟而城築之役乃須天子之命齊遷臨菑而仲山甫以上卿臨之是知諸侯國邑髙卑廣狹皆有王度春秋之城築俱不禀王命故悉書以譏之不止為不時重民力而已也愚按内城二十三春城四夏城七冬城十二左傳於此年并城郎祝丘及新延廐新作南門築鹿囿皆曰不時凡城於冬者皆曰書時或曰周之冬十月十一月乃夏之秋周之春正月二月乃夏之冬而左氏於城向諸防諸鄆平陽中城城防郎囿皆曰書時延廐南門亦曰不時何哉今考左傳言龍見而戒事則夏之九月而周之十一月也水昬正而栽則周之十二月正當役民之時也日至而畢則夏之十一月而周之正月也謂日至而畢則周之春不宜興土功矣經於他事書春夏秋冬而繼書次月則凡書時皆指四時之首月如成十七年書冬㑹伐鄭十一月公至十二月日食是也若城築蒐狩之事乃以時成通歴三月事畢而言之非獨指首月也詳攷經文則可見矣齊侯使其弟年來聘此列國來聘之始左傳結艾之盟也公羊傳母弟稱弟母兄稱兄穀梁傳諸侯之尊弟兄不得以屬通程子傳凡不稱公子而稱弟者或責其失兄弟之義或罪其以弟之愛而寵任之過左氏公羊傳皆曰年齊僖公之母弟先儒母弟之說盖縁禮文有立嫡子同母弟之說其曰同母弟盖謂嫡耳非以同母為加親也若以同母為加親是不知人理近於禽道也天下不明斯義也乆矣僖公愛年其子尚禮秩如嫡卒致簒弑之禍書弟見其以弟之愛而寵任之過也杜氏曰凡聘皆使卿執玉帛以相存問兄弟先公之子不稱公子貶也范氏曰禮非始封之君則臣諸父昆弟匹敵之稱人臣不可以敵君故不得以屬通所以逺别也書盟書帥師而稱兄弟者罪其有寵愛之私書出奔書歸而稱兄弟者責其薄友恭之義攷於事而春秋之情可見矣年者齊僖公母弟也程氏謂先儒說母弟者左宣十七凡稱弟皆母弟也盖縁禮有立嫡子同母弟之文襄三十一穆叔曰太子死有母弟則立之其曰同母盖為嫡耳非以為加親也此義不明乆矣僖公私於同母寵愛異於他弟施以䜴反及其子猶與適音嫡等而襄公絀之遂成簒弑之禍左傳莊八年僖公之母弟曰夷仲年生公孫無知有寵於僖公衣服禮秩如嫡襄公絀之連稱管至父因之以作亂遂弑襄公而立無知劉氏曰齊侯非不愛其弟也迷於其義故以愛為害矣故聖人於年來聘特變文書弟以示貶焉鄭語來盟桓十四黒背帥師成十皆罪其私也書云于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟天惟與我民彛大冺亂康誥蔡傳天顯猶天明尊卑顯然之序也弟不念尊卑之序而不能敬其兄兄亦不念父母鞠飬之勞而大不友其弟是兄弟相賊也則天之與我民彛必大冺滅而紊亂矣陳黄奔楚而稱弟襄二十不念鞠子哀矣盗殺衛縶而稱兄昭二十其亦不念天顯矣秦鍼宋辰昭元秦鍼奔晉定十宋辰奔陳皆責其薄也襄三十天王殺其弟佞夫襄二十七衛侯弟鱄奔晉昭八陳侯弟招殺世子偃師仁人於兄弟絶偏繫之私篤友恭之義人倫正而天理存其春秋以訓天下與來世之意也張氏曰親親之道尊其位重其禄非賢則不及以政齊僖愛其弟聘魯致女交政隣國一一使之愛之之過遂致亂嫡庶之辨以啓無知簒弑之禍聖人以其過於溺愛之私而失親親之義故特書其弟以貶之而著後日之禍始於僖公之不早辨也愚按夫子作經雖不逆計其後日之事然於其寵愛之過特書弟以貶焉使後世之讀是經者考無知簒弑之所由始則亦知戒矣春秋書弟者十一惟公弟叔肸書字盖賢之也諸侯之弟貶則書名不貶則書字故許叔蔡叔蔡季紀季皆賢而稱字且不言弟傳例在莊三年啖氏曰使使致問曰聘主人受之於廟以重禮也孫氏曰大國聘而不朝小國朝而不聘凡書皆惡之張氏曰聘者諸侯遣大夫通好與國見於儀禮之篇詳矣然古者諸侯間於天子之事則有邦交殷聘之禮自隠公即位以來未嘗朝聘於天子以魯推之則諸侯盖可知矣齊僖因艾之盟遽遣使于魯以結好忘君臣之大義植同列之私黨故觀年之聘則凡春秋書聘可以例推矣愚按經書諸侯聘三十一齊聘者五始於弟年而終於慶封書晉聘者十有一宋衛聘者各四陳鄭秦吳聘者各一楚聘者三魯以秉禮之國受同列之朝聘而尊王之禮寥寥罕見故悉書以示譏焉秋公伐邾此伐邾之始程子傳左氏傳為宋討也擅興甲兵為人而伐人非義之甚也奉詞致討曰伐傳例曰聲罪致討曰伐此云奉辭者執言以聲其罪其義一也不稱帥師者君行師從故君將不言帥師按左氏公伐邾為于偽反宋討也宋及鄭平盟于宿杜氏曰公拒宋而與鄭平今鄭復與宋盟故懼而伐邾欲以求宋宋人先取邾田故邾人入其郛魯與儀父則元年盟于昧音蔑矣邾人何罪可聲特託為辭説以伐之爾經之書伐非主兵者皆有言可執見伐者皆有罪可討也傳曰欲加之罪何患無詞僖十晉侯將殺里克克對曰欲加之罪其無辭乎魯為宋討非義甚矣而稱伐邾所謂欲加之罪者也而不知渝昧之盟不待貶而自見矣張氏曰夫和大所以恤小既平宋鄭則邾宋之眦睚亦可和矣親此而虐彼茍欲悦宋而忘蔑之盟子曰小人比而不周此足以見書為宋討邾之㫖矣愚按春秋一經魯君大夫與邾特盟者五與諸侯及大夫同㑹者十九與諸侯及大夫㑹盟者十邾子來朝者六來㑹者一大夫如邾者一公伐邾者六大夫伐邾者七㣲者伐邾者一及他國伐邾者一大夫圍邾者一及邾戰者一公敗邾師者一邾人伐我者三元年盟蔑乃與邾交好之始哀二年盟句繹乃與邾交好之終此年伐邾乃與邾交兵之始哀七年入邾以邾子來乃與邾交兵之終邾之事魯不為不敬而魯之虐邾愈甚比事以觀而罪自著矣冬天王使凡伯來聘此王聘之始程子傳周禮時聘以結諸侯之好諸侯不修臣職而聘之非王體也杜氏曰凡伯周卿士凡國伯爵汲郡共縣東南有凡城張氏曰今濬州黎陽縣之境愚按凡伯周公之𦙍詩板與瞻卬皆其所賦盖世為王臣戎伐凡伯于楚丘以歸此戎患之始公羊傳凡伯天子之大夫也其言伐執之也穀梁傳國而曰伐此一人而曰伐大天子之命也程子傳初戎朝於周發幣于公卿凡伯弗賔王使凡伯來聘還戎伐之于楚丘以歸楚丘衛地伐見其以衆天子之使道由於衛而戎得以衆伐之衛不能衛其罪可知言以歸則非執凡伯有失節之罪杜氏曰楚丘衛地在濟隂城武縣西南愚按今東昌路曹州楚丘縣國而曰伐此一人而曰伐見音現其以徒衆也薛氏曰言伐以兵刼之也董子曰執天子之使與伐國同罪楚丘衛地以歸易去聲詞也于楚丘者罪衛不救王臣之患孫氏曰于楚丘者責衛不能救難蜀杜氏曰凡伯過衛衛不當使及於難况又不救乎以歸者罪凡伯失節不能死於位也孫氏曰録以歸者惡凡伯不死其位耳張氏曰以者言能左右之而為之以者亦聽其左右故凡言以歸者多責其降服而事讐也周之秩官敵國賔至以下並國語闗尹以告周禮司闗凡四方之賔客敂闗則為之告註賔客謂朝聘者候人為導候人若有方治則帥而致于朝及歸送之于境司徒具徒小司徒小賔客令野修道委積註小賔客諸侯之使臣司宼詰姦小司寇大賔客前王而辟註辟除姦人甸人積薪甸師率其徒以薪蒸役内外饔之事火師監燎襄三十一子産曰諸侯賔至甸設庭燎其貴國之賔至則以班加一等益䖍至於王使則皆官正涖事天子之使過諸侯當先在疆埸膳宰致餼司里授舘猶懼不敬今凡伯承王命以為過賔於衛而戎得伐之以歸是蔑先王之官而無君父也故旄丘録於國風見衛不能修方伯之職也詩小序旄丘責衛伯也狄人廹逐黎侯黎侯寓於衛衛不能修方伯連帥之職戎伐凡伯于楚丘以歸見衛不救王臣之患也為狄所滅則有由矣閔二年狄滅衛家氏曰天子之使戎得以邀而伐之天子不命之討方伯連帥復不能為王敵愾春秋書之以見周室微弱夷狄慢上諸侯無王也愚按裔戎朝於天子王臣雖不以禮貌加之不過失象胥之職特小過耳今王臣銜天子之命聘於望國過衛而戎報私怨以兵衆刼之彼獨不念天子之命乎茍不念天子之命如勿朝而已矣戎不足責衛人坐視王臣之俘於戎而不能救患尊君之義安在哉此書戎伐非以其執詞而與之著其率兵徒之衆凌虐王人是横行中國不特無天子而亦無諸夏矣經之書伐本非與其討罪何况戎乎後此定王之世單襄公聘楚而假道于陳則微弱益甚與滕莒小國無以異矣春秋胡傳附録纂疏卷二
