body:
  text: 春秋胡傳附録纂疏卷六元汪克寛撰桓公下庚桓王十辰九年十有一年齊僖三十晉緍四衛宣十八蔡桓十四鄭荘四十三卒曹荘公射姑元年陳厲六杞靖三宋莊九秦岀于三楚武四十春正月齊人衛人鄭人盟于惡曹盟㑹皆君臣之禮故微者之盟㑹不志於春秋凡春秋所志必有君與貴大夫居其間者也鹿上之盟三國皆書人齊之盟清丘同盟四國皆書人翟泉之盟七國皆書人蜀之盟十有一國皆書人澶淵之㑹十有二國皆書人未必皆微者苟皆㣲者則不書于經矣惡曹之盟即三國之君矣既不以道興師為郎之戰又結怨固黨為惡曹之盟故前書其爵而以來戰著罪後書此盟而以奪爵示貶陳氏曰此郎之諸侯也曷為戰稱君盟稱人凡一後而再見者但人之略之也鄭敗王師齊滅后之母家衛亦抗子突以自立其無王甚矣自有參盟莫甚於惡曹故略之也愚按前書齊人伐山戎後書齊侯來獻戎㨗則知伐戎者齊侯也上書㑹楚公子嬰齊于蜀下書及楚人盟於蜀則知盟蜀者楚公子嬰齊也十二月書齊侯衛侯鄭伯戰郎正月書齊人衛人鄭人盟惡曹以比事之法求之則三國之貶稱人可知矣夏五月癸未鄭伯寤生卒荘公也在位四十三年左傳初祭封人仲足有寵於荘公荘公賜為卿為公娶鄧曼生昭公故祭仲立之鄭荘公志殺其弟使餬音胡說文寄食其口於四方自以為保國之計得也然身沒未幾平聲而世嫡出奔庶孽奪正公子五爭兵革不息見詩出其東門小序孔䟽是年忽奔衛突歸于鄭一爭也十五年突出奔蔡忽復歸二爭也十七年忽弑子亹立三爭也十八年齊人殺亹立子儀四爭也荘十四年傳貶殺子儀納厲公五爭也忽儀亹突之際其禍􅉃七感反矣亂之初生也起於一念之不善後世則而象之至於兄弟相殘國内大亂民人思保其室家而不得不亦酷乎有國者所以必循天理而不可以私欲滅之也荘公之事可以為永鍳矣髙氏曰昭公不終於位五世兵革不息自入春秋考荘公之心慮知其積非必有愆殃矣陳氏曰春秋之初罪莫甚於鄭荘宋魯齊衛次之而父子兄弟之禍亦莫甚於此五國者是可為不臣者之戒矣秋七月𦵏鄭荘公髙氏曰鄭忽既立不待五月而𦵏其父是生亂階九月宋人執鄭祭仲祭側界反此書執之始左傳宋雍氏女於鄭荘公曰雍姞生厲公雍氏宗有寵於宋荘公故誘祭仲而執之曰不立突将死亦執厲公而求賂焉祭仲與宋人盟以厲公歸而立之公羊傳祭仲者何鄭相也穀梁傳宋人者宋公也其曰人何也貶之也祭仲死君難臣道也今立惡而黜正惡祭仲也祭仲鄭相去聲也見執於宋使出其君而立不正罪較然矣何以不名命大夫也陸氏曰諸國大夫王賜之畿内邑為號令歸國者皆書族書字同於王大夫鄭祭仲魯單伯陳女叔是也命大夫而稱字非賢之也乃尊王命貴正卿大祭仲之罪以深責之也通㫖祭仲以命大夫而稱字深責之也或以仲為名者誤矣按鄭詩刺荘公不聴祭仲之諫而其詞曰将仲子兮又曰仲可懷也為此詩者豈斥其國相之名乎是知仲之為字無疑矣陳氏曰祭仲以命大夫専廢置君曷為從其恒稱而不名春秋之褒貶名號不足以盡意則見於辭書曰宋人執鄭祭仲突歸於鄭鄭忽出奔衛其為辭也詳矣其意若曰以天子命大夫為諸侯相而執其政柄事權重矣固将下庇其身而上使其君保安富尊榮之位也今乃至於見執廢絀與黜同其君而立其非所立者不亦甚乎任之重者責之深祭仲無所逃其罪矣春秋美惡不嫌同辭突之書名則本非有國由祭仲立之也若忽則以世嫡之正至於見逐不能立乎其位貴賤之分扶問反亡矣凡此類抑揚其詞皆仲尼親筆非國史所能與音預而先儒或以從赴告而書者殊誤矣杜氏曰突不稱公子從告昭公不稱爵鄭人賤之以名赴或曰孔父賢而書名則曰禮之大節也今此則名其君於下而字其臣於上何以異乎曰春秋者輕重之權衡也變而不失其正之謂權常而不過於中之謂正宋殤孔父道其常苟子君子道其常祭仲昭公語其變惟可與權者其知之矣僖十九年𫝊執之是非决於稱人與稱爵孫氏曰宋人宋公也執人權臣廢嫡立庶以亂於鄭故奪其爵啖氏曰公羊以廢君為賢不可為訓劉氏曰公羊謂祭仲知權若果知權宜效死勿聴使宋人知雖殺祭仲猶不得鄭宋誠能以力殺鄭忽則不待執仲而知之如力不能而夸為大言何故聴之又不能是則若强許焉還至其國而背之執突而殺之可也黜君以行權亂臣賊子孰不能為此者乎髙氏曰仲就執而突歸忽出則是仲納突而逐忽矣詩刺祭仲謂之權臣而公羊因以為可與權豈不異哉突歸于鄭穀梁傳曰突賤之也曰歸易辭也程子傳突不稱公子不可以有國也突不稱公子絶之也小白入于齊則曰齊小白突歸于鄭何以不稱鄭突乎以小白繋古詣反之齊者明桓公之宜有齊也不以突繋之鄭者正厲公不當立也突不當立何以書歸於鄭乎春秋書歸有二義一易去聲詞也此年突歸荘二十四年赤歸曹僖二十八年三十年衛鄭歸成十六年曹伯歸昭十三年楚比歸一順詞也僖二十八年曹伯歸襄二十六年衛侯歸昭十三年蔡侯廬陳侯吳歸哀八年邾子益歸其書入亦有二義一難詞也桓十五年許叔荘九年齊小白襄二十五年衛侯昭元年莒去疾二十二年王猛入王城二十六年天王入成周一逆詞也桓十五年鄭伯突荘六年衛侯朔哀六年齊陽生突以庶奪正固為不順矣然内則權臣許之立外則大國為之援于眷反而世子忽之才不能以自固也則其歸無難故榖梁子曰歸易詞也髙郵孫氏曰歸易辭也以歸為善則鄭突楚比果善乎以入為惡則許叔稱字果惡乎劉氏曰突内因强臣之力赤外援戎狄之衆以奪其嫡而禍其宗皆有不仁之心姦桀之材春秋所惡也専治突則祭仲不明専治赤則戎不見故挈其上而易其下其罪一施之所以絶禍本禁首惡也陳氏曰小白陽生稱齊去疾展輿稱莒皆爭國也突弗係之鄭赤弗係之曹則簒辭也通㫖或問祭足立厲公尹氏立子朝經書各不同何也曰祭仲書字見任事之重尹氏書世見得政之乆王與侯其子各不同矣劉氏曰公羊曰其言歸何順祭仲也非也若仲之為者春秋之亂臣也如何順之乎愚按公羊謂歸者出入無惡入者出入惡復歸者出惡歸無惡復入者出無惡入有惡然突歸鄭赤歸曹不可謂無惡許叔入許天王入成周不可謂出入惡鄭忽曹襄出無惡魚石欒盈出入有惡則其説不可通矣難易逆順之説為是鄭忽出奔衛此書奔之始穀梁傳世子忽也其名失國也程子傳忽國氏正也不能有其位故不爵忽以國氏正也出奔而名不能君也張氏曰忽不能有其位而制於權臣其立其奔皆不由已是以不爵也趙氏曰鄭忽曹羈未踰年出奔但書名不書爵不能嗣先君也莒展雖踰年不書爵其罪大也攷於詩有女同車刺無大國之助也山有扶蘇所美非美然也蘀兮君弱臣强不唱而和去聲也狡古夘反童不能與賢臣圖事權臣擅命也並見小序夫以狡童目其君聖人猶録其詩所以見音現忽之失國亦其自取非獨仲之罪矣或曰詩人刺忽之不昏于齊至於見逐欲固其位者必待大國之援夫聲乎曰此獨為去聲鄭忽言也如忽之為人茍無大援則不能立爾劉氏曰使忽近君子逺小人與賢者圖事則固良子矣宋雖無道奚憚祭仲雖强奚恤陳氏曰鄭忽身為冢嗣而廢立自權臣不可以言子矣故書奔昉於此州公如曹紀侯大去其國未可以言奔必若忽而後可以言奔爾若夫志士仁人卓然有以自立者進退之權在我矣鄭自五霸之後益以侵削他日子産相去聲焉馳詞執禮以當晉楚至於壞音怪諸侯之館垣襄三十一年子産相鄭伯如晉晉侯以魯䘮故未之見也子産使盡壞其館之垣而納車馬焉􅁍逆女之公子於野昭元年楚公子圍聘於鄭且娶於公孫叚氏将入館鄭人惡之使行人子羽與之言乃館於外既聘将以衆逆子産患之使子羽辭曰以敝邑􅄶小不足以容從者請墠聴命皆變其常度以晉楚之强卒莫能屈亦待大國之助乎然則仲見脅忽出奔咸其自取焉爾春秋書法如此欲人自强上聲於為善也愚按春秋之初惟鄭最强與齊為黨假王命以伐宋詐戰而取三師入郕入許戰勝攻取雖以天子之尊率諸侯之兵造于城下亦棄甲曵兵不敢與敵而桓王且親集矢於其肩奈何其没末乆而世嫡之重為鄰國之所逐矣亦猶齊桓之霸號令天下幾於改物而柩方在殯四鄰謀動其國家也忽之昏庸狂愎勢孤援寡才不足以君國權不足以馭臣威不足以攝鄰曽何足深責哉陸氏曰公羊謂忽何以名春秋伯子男一也辭無所貶按前後例伯子男皆殊稱非一也又鄭伯爵也若稱子何闗爵乎劉氏曰杜氏云鄭人賤之故名赴夫春秋之褒貶仲尼盖自謂丘有罪焉豈専從赴而已乎柔㑹宋公陳侯蔡叔盟于折折之設反又音舌大夫㑹諸侯盟始於此杜氏曰柔魯大夫未賜族通例蔡叔諸侯之兄弟稱字陳氏曰柔者何以大夫㑹諸侯盟於是始也故貶之至公子結不貶矣永嘉吕氏曰以大夫與諸侯盟此不待貶絶而自見者也故内大夫帥師自無駭始内大夫與諸侯盟自柔始自無駭帥師而後有翬有公子慶父公子友公孫兹公孫敖公子遂公孫歸父之帥師甚則季孫行父臧孫許叔孫僑如公孫嬰齊四卿相帥師矣自柔㑹盟而後有公子結公孫敖季孫行父公子遂臧孫許仲孫蔑仲孫貜仲孫何忌之及諸侯盟甚則叔孫州仇仲孫何忌二卿及邾子盟句繹矣家氏曰以大夫盟諸侯强國行之則為伉弱國行之則為僣末流之敝大夫因是而外交强國以脅制其君此其權輿也愚按翬始帥師㑹伐鄭不稱公子今柔始㑹諸侯盟以穀梁溺㑹伐衛例之亦安知非貶也禮樂征伐自大夫出豈非世變之大者乎公㑹宋公于夫鍾夫音扶鍾公作童杜氏曰夫鍾郕也冬十有二月公㑹宋公于闞闞口暫反杜氏曰闞魯地在東平須昌縣東南愚按今東平路壽張縣有古闞城臣與宋公盟于折君與宋公㑹于夫鍾于闞于虚去魚反于龜皆存而不削何其詞費芳未反也曰盟者春秋所惡焉故反而屢盟以長展兩反亂詩小雅巧言君子屢盟亂世用長㑹者諸侯所不得而數色角反下同㑹以厚疑聖人皆存而不削於以見音現屢盟而卒叛數㑹而卒離其事可謂著明矣是故春秋之志在於天下為公講信修睦不以㑹盟為可恃也家氏曰二年之間兩盟四㑹惟宋之故春秋一經書盟㑹未有若是頻數者也髙氏曰公委宗社人民而六出與宋㑹盖憾鄭忽而欲定突是以不憚屈辱力為鄭請宋亦數與公㑹皆非為國為民其罪均耳辛桓王二已十年十有二年齊僖三十一晉緡五衛宣十九卒蔡桓十五鄭厲公突元年曹荘二陳厲七卒杞靖四宋荘十秦出子四楚武四十一春正月夏六月壬寅公㑹杞侯莒子盟于曲池杞公穀作紀曲池公作敺蛇左傳平紀莒也杜氏曰曲池魯地魯國汶陽縣北有曲水亭愚按今屬東平路汶上縣程子謂杞侯皆當作紀隠二年紀莒盟于宻是時紀謀齊難故魯桓與之盟莒以援之耳秋七月丁亥公㑹宋公燕人盟于榖丘燕音烟後同杜氏曰燕人南燕大夫穀丘宋地張氏曰南燕姞姓國漢屬束郡今滑州胙城縣穀丘在今應天府穀熟縣愚按今屬河南府路歸徳府臨川吳氏曰左氏以為魯欲平宋鄭然此盟必是魯宋燕三國别有他事相要約非為鄭賂之事盟也因是耳盟與宋公相見而為鄭致請焉八月壬辰陳侯躍卒厲公也在位七年子完不嗣弟林是為荘公杜氏曰不書𦵏魯不㑹公㑹宋公于虚虚去魚反公作郯冬十有一月公㑹宋公于龜左傳公欲平宋鄭秋公及宋公盟于句瀆之責宋成未可知也故又㑹于虚冬又㑹于龜杜氏曰虚龜皆宋地張氏曰宋納突於鄭求賂而後使之入及突入國之後不能責其償言遂成釁隙桓公欲平宋之急屈已往来宋地與之為㑹不知人之心不親非屢盟數㑹之所能回也故春秋詳書以譏之髙氏曰用見宋益疎公而公强從之不已祇自辱也愚按桓公屢至宋地强宋公之從而不已固為屈辱然二盟四㑹皆以㑹宋為詞則是宋公有志於㑹盟矣盖宋之所以㑹魯者将以求賂於鄭而魯之所以㑹宋者将以為鄭免其賂是以卒不能降心以相從也魯桓憾忽於郎之戰幸鄭荘之卒欲求好於厲公而以恩結之厲公簒忽特欲反忽之所為而求善於魯以為之援耳丙戌公㑹鄭伯盟于武父左傳宋公辭平故與鄭伯盟于武父杜氏曰武父鄭地陳留濟陽縣東北有武父城愚按今屬濟南路張氏曰公自龜還遽㑹鄭伯而謀伐之與人交之道忠信誠慤本乎中則有不期合而合者非有是心則其相與也不過以利合而一旦爭小利則相視忽如仇敵然桓公之見棄於宋而盟鄭其離合正如是春秋詳書之以見王政不行諸侯放恣魯桓宋荘鄭厲皆以簒國而立交政盟㑹紛紛離合惟利是視煩盟潰信祇以長亂王法之所必誅也襄陵許氏曰王迹既熄霸統未興諸侯自擅無所禀命觀隠十年見兵革之亂也桓十一年十二年見盟㑹之亂也霸統興而諸侯有所懼無復此亂矣是以君子不得已而與桓文永嘉吕氏曰突簒而書爵者其大臣君之其國人君之諸侯亦與之㑹盟春秋從而君之從其實也丙戌衛侯晉卒宣公也在位十九年子朔嗣是為惠公榖梁僖再稱曰决日義也陳氏曰再書日以衛晉之卒也十有二月及鄭師伐宋丁未戰于宋左傳遂帥師而伐宋戰焉宋無信也君子曰苟信不繼盟無益也詩曰君子屢盟亂是用長無信也公羊傳戰不言伐此其言伐何嫌與鄭人戰也何以不言師敗績内不言戰言戰乃敗矣既書伐宋又書戰于宋者責賂于鄭而無厭杜氏曰宋以立厲公多責賂於鄭鄭人不堪屢盟于魯而無信者宋也二國聲其罪以致討故書曰伐夫宋人之罪則固可伐矣然取其賂以立督者魯桓也資其力以簒國者鄭突也王氏箋義桓弑隠馮弑殤突簒忽桓受賂於宋宋責胳於鄭斯惡同而罪均者也無諸已然後可以非諸人春秋之義用賢治不肖不以亂易亂也穀梁昭四春秋之義用貴治賤用賢治不肖不以亂治亂故又書曰戰于宋来戰者罪在彼戰于郎是也徃戰者罪在内戰于宋是也孫氏曰此公及鄭伯伐宋也不言公諱之也地以宋則宋與戰可知不與公及鄭伯伐宋故以魯鄭自戰為文髙氏曰内没公而稱及鄭不爵而稱師均其罪也陳氏曰前稱公後稱及前稱鄭伯後稱師略之也於是欲平宋鄭期嵗之間㑹于折于夫鍾于闞于穀丘于虚于龜而宋辭平遂舎宋而㑹鄭師以伐宋戰焉戰不言伐有不與戰則言伐如僖十八年宋曹衛邾伐齊而宋及齊戰于甗是也未始有不與戰者而亦言伐則甚伐者也曰戰于宋薄宋之罪也張氏曰兵法曰爭恨小故不忍憤怒謂之憤兵兵憤者敗魯桓鄭突此役是也臨川吳氏曰宋荘貪得鄭賂之多而不許魯桓之請鄭突遂忘宋立已之恩與魯結黨為伐戰之舉魯桓棄屢㑹屢盟之好乃與舊怨之鄭興兵以仇舊好之宋交道之翻覆不常在匹夫猶不可况國君乎愚按桓平宋鄭不從而至於伐戰宣平郯莒不肯而至於伐取皆不能反已而求其本也啖氏曰穀梁曰不言與鄭戰恥不和也不知省文之義故云耳按此後魯常與鄭和公羊傳義是也劉氏曰公羊云内不言戰言戰乃敗矣非也若曰内不言敗言戰則敗矣可也壬桓王二午十一年十有三年齊僖三十二晉緡六衛惠公朔元年蔡桓十六鄭厲二曹荘三陳荘公林元年杞靖五宋荘十一秦出子五楚武四十二春二月公㑹紀侯鄭伯己已及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績穀梁傳其言及者由内及之也其曰戰者由外言之也戰稱人敗稱師重衆也其不地於紀也左傳大崩曰敗績杜氏曰師徒撓敗若汨岸崩山䘮其功績左氏以為鄭與宋戰左傳宋多責賂於鄭鄭不堪命故以紀魯及齊與宋衛燕戰公羊以為宋與魯戰公羊傳不地近也近乎圍也何氏曰魯親戰龍門兵攻城池榖梁以為紀與齊戰趙匡攷據經文内兵則以紀為主而先於鄭外兵則以齊為主而先於宋獨取榖梁之説趙氏曰據經文内兵以紀為主外兵以齊為主若實為宋鄭戰何得主齊紀乎盖齊以三國之師伐紀欲滅之公與鄭救之而勝也不然紀懼滅之不暇豈敢主兵而助鄭乎盖齊紀者世讎也公羊荘四齊哀享乎周紀侯譛之於襄公九世矣齊人合三國以攻紀魯鄭援去聲紀而與戰臨川吳氏曰昔鄭荘助齊謀紀者也魯桓數數為鄭㑹宋繼又同鄭伐宋鄭厲徳魯故助魯救紀而反其父之所為戰而不地於紀也不然紀懼滅亡不暇何敢将去聲兵越國助魯鄭以增怨乎齊為無道恃强凌弱此以紀為主何也彼為無道加兵於已必有引咎責躬之事禮義辨喻之文猶不得免焉則亦固其封􅆠效死以守本孟子上訴諸天子下告諸方伯連率與鄰國之諸侯其必有伸之者矣不如是而憤然與戰豈已亂之道乎力同度待洛反徳動則相去聲時左傳隠十一度徳而處之量力而行之相時而動小國讎大國而幸勝焉禍之始也息伐鄭而亡同上息侯伐鄭鄭伯與戰于竟息師大敗而還君子是以知息之将亡也不度徳不量力不親親不徵辭不察有罪犯五不韙而以伐人其䘮師也不亦宜乎鄭勝蔡而懼襄八鄭子國子耳侵蔡獲蔡公子爕鄭人皆喜唯子産不順曰小國無文徳而有武功禍莫大焉蔡大敗必邁反楚而滅定四蔡侯呉子唐侯伐楚戰于柏舉楚師敗績哀元楚子圍蔡蔡人男女以辨使疆于江汝之間今紀人不度徳不量力不徴詞輕與齊戰而為之援者弑君之賊簒國之人也不能保其國自此戰始矣春秋以紀為主省徳相時自治之意也永嘉吕氏日紀以重亡之國而獲戰勝之功此可喜也齊以大國之威而畜必報之憾甚可懼也桓公之所以為紀謀者既無以為保紀之道而徒挾鄭以戰幸而勝齊彼将謂可固紀矣而不知所以促紀之亡者在此役也迨夫紀懼亡之不給然後為黄之盟求以安紀亦晩矣趙氏曰左氏云宋責賂於鄭且責賂小事止當二國自不和無庸諸侯為戰也公羊云曷為後日恃外也得紀侯鄭伯然後能為日也按先㑹而後日成㑹而後戰也恃外有何義乎又曰何以不地近也盖不地者有紀都也無他義劉氏曰左傳云云不書所戰後也若宋鄭相怨為此戰鄭當序紀上宋當序齊上何故反顛倒乎公雖不及其㑹期而及其戰期自當舉戰地何故反没戰地乎公羊云近故不地則郎之戰非為近也而曰郎猶可以地不亦誣乎三月𦵏衛宣公𦵏自内録也既與衛人戰曷為𦵏宣公怨不棄義怒不廢禮左傳僖二十七有齊怨不廢䘮紀禮也臨川吳氏曰二月己巳之戰齊紀為敵怨衛助齊滅紀魯為紀禦齊魯衛非敵怨也故不廢㑹𦵏之禮是知古人以𦵏為重也禮䘮在殯孤無外事穀梁僖九衛宣未𦵏朔乃即戎已為失禮又不稱子是以吉服從金革之事其為惡大矣本徐邈杜氏曰宣公未𦵏惠公稱侯以接鄰國非禮也陳氏曰凡君在䘮恒稱子衛宣未𦵏而稱衛侯不以居䘮之禮出也張氏曰朔與兄伋夀爭國者志於立乎其位忘哀戚之心故未𦵏稱爵凡此類據事直書年月具存而惡自見音現也趙氏曰凡諸侯在䘮而有境外之事以䘮行者稱子以吉行者稱爵志惡之淺深也愚按春秋在䘮而出預㑹盟征伐及遣使鄰國者有十此年衛恵㑹戰紀僖九年宋襄㑹葵丘二十五年衛成㑹洮二十八年陳共㑹温三十三年晉襄敗秦于殽宣十年齊頃使國佐聘成二年宋共衛定伐鄭四年鄭悼伐許定四年陳懷㑹召陵侵楚是也然宋襄衛成陳共懷皆稱子則見其未易吉服其罪猶可末减此年衛恵稱爵㑹戰則以吉服從戎其罪益甚矣然戰紀非朔主兵故直書而惡自見晉襄敗秦則忘恩背惠墨纕絰而以詐取勝衛朔尤甚故不稱爵而以㣲者紀之宋共衛定未𦵏而已越𦵏期齊頃鄭悼雖已𦵏而未踰年但直書而罪惡著矣夏大水張氏曰隂盛之災王氏曰經書水災者九而桓居其二荘居其三是大水之災二公居三之二矣豈桓公積惡不悛荘公釋讎不復怨氣藴結有以致之歟秋七月冬十月癸桓王二未十二年十有四年齊僖三十三卒晉緡七衛惠二蔡桓十七鄭厲三曹荘四陳荘二杞靖六宋荘十二秦出子六楚武四十三春正月公㑹鄭伯于曹左傳㑹于曹曹人致餼禮也杜氏曰以曹地曹與㑹臨川吳氏曰前年魯鄭同救紀而敗齊衛之師盖虞齊衛之報怨也故為㑹以謀之曹素與魯協故魯㑹鄭於其地王氏曰公於鄭突比之至矣十二年屢㑹以平宋鄭而不克則為武父之盟為宋之伐十三年偕紀侯之戰今又㑹于曹同惡相濟明矣無氷公羊傳記異也穀梁傳時燠也按豳風七月周公陳王業之詩也其詞曰二之日鑿氷冲冲三之日納于凌力證反隂四之日其蚤獻羔祭韭朱子傳鑿氷取氷於山也沖沖鑿氷之意納藏也藏氷所以備暑也凌隂氷室也蚤蚤朝也獻羔祭韭而後啟之月令仲春獻羔開氷先薦寢廟是也周官凌人之職頒氷於夏凌人掌氷正嵗十有二月令斬氷夏頒氷掌事其藏之也固隂沍寒於是乎取其出之也賔食䘮祭於是乎用藏之周用之徧左傳昭四申豐曰云云則冬無愆陽夏無伏隂春無凄風秋無苦雨雷出不震無菑霸電癘疾不降民不夭札七月之卒章藏氷之道也亦理隂陽天地之一事也今在仲冬之月燠而無氷何氏曰周之正月夏之十一月法當堅氷無氷者温也張氏曰隂不能成物之災髙氏曰凡不宜無曰無則政治縱弛不明之所致也劉向洪範傳豫恒燠若此政事舒緩紀綱縱弛善惡不明賞罰不行之象周失之舒秦失之急故周衰無寒嵗秦滅無燠年故書于策夫春秋所載皆經邦大訓而書法若此其察於四時寒暑之變詳矣通㫖春秋極謹天變如無氷李梅實六鷁退飛無麥苗鸜鵒来巢之類以今觀之其事若甚小然春秋一一書之則不可謂小事矣永嘉吕氏曰古者藏氷發氷所以節陽氣之盛也夫陽氣在天地間譬猶火之著於物也故常有以解之十二月陽氣藴伏錮而未發其盛在下則納氷於地中至二月四陽作蟄蟲起陽始用事則亦始啟氷而廟薦之及四月陽氣卑達隂氣将絶則氷於是大發食肉之禄老病䘮浴氷無不及是以四時無愆陽伏隂凄風苦雨故夫藏氷發氷者爕調之一事也春秋之書無氷不獮志常燠之異而亦以見備暑之無其備也或謂開氷而書無氷豈有建寅之月遽開氷乎春秋所書螽蝝李梅實隕霜之類皆據目前之災異而志之豈必待開氷而後書無乎或者又援大無麥禾之例謂嵗終㑹計而後書大無麥禾猶開氷而後書無氷也不知大無麥禾與書大有年為一類謂嵗終㑹計而後知也開氷之事亦可與㑹於嵗終者比乎愚按此年正月書無氷成元年二月書無氷襄二十八年書春無氷則知因陽盛氣燠而隨時以紀之苟以發氷而知無氷則當常以二月而不在正月矣若曰或藏氷無氷而書無或發氷無氷而書無抑何紀事之錯亂乎夏五公羊傳夏五者何無閒焉爾穀梁傳孔子曰聴逺音者聞其疾而不聞其舒望逺者察其貌而不察其形立乎定哀以指隠桓隠桓之日逺矣夏五傳疑也杜氏曰不書月闕文夏五傳疑也疑而不益見聖人之慎也故其自言曰吾猶及史之闕文也括蒼趙氏曰史闕文傳記不備不敢參以已意如夏五郭公之類也其語人曰多聞闕疑慎言其餘則寡尤朱子曰疑而不闕則流於謬妄而世或以私意改易古書者有矣東坡蘇氏曰宋咸以私意改周易五經數十去處多見其不知量也盍亦視此為鍳可也然則春秋何以謂之作曰其義則㫁丁亂反自聖心或筆或削明聖人之大用其事則因舊史有可損而不能益也隠二年傳或本據舊史因之而不能益或先儒傳授承誤而不敢增也孫氏曰舊史有闕孔子必刋正之夏五無月此後人傳之脱漏耳鄭伯使其弟語來盟語穀作禦左傳鄭子人来尋盟且修曹之㑹穀梁傳諸侯之尊弟兄不得以屬通其弟云者以其来我舉其責者也来盟前定也前定之盟不日程子傳使来盟盟前定矣與髙子不同來盟稱使則前定之盟也臨川吳氏曰正月魯鄭二君㑹曹而未盟故鄭伯使弟語来魯與公盟也其不稱使如楚屈完齊髙子則權在二子盟不盟特未定也諸侯之弟兄例以字通而書名者罪其有寵愛之私非友于之義也髙氏曰將命者大夫之事不可使弟語為子人氏實違君命其寵任之盖有自来矣来盟于我彼欲之之辭也涖盟於彼我欲之之辭也鄭魯同惡而屢盟可惡之甚也蘇氏曰凡外大夫来盟於魯内大夫涖盟於他國皆盟其君也愚按春秋書来盟者六鄭語衛孫良夫皆前定之盟也髙子屈完宋華孫皆未定之盟也杞子則君自来其盟亦非前定者也大夫因聘而盟則先書聘而後書及盟非聘而特来結盟則但書来盟然皆所以著大夫之敵君也秋八月壬申御廩災公羊傳御廩者粢盛委之所藏也御廪災何以書記災也門觀災而新作則書御廪粢盛音成之所藏杜氏曰御廩公所親耕以奉粢盛之倉臨川吳氏曰君之在車與御者最相親近故君所親近之人謂之御御史御妻之類是也君所親用之物亦謂之御後世所謂御食御書御藥之類及此御廪是也御廪者以貯人君躬耕籍田之米専供宗廟之粢盛而不敢他用者髙氏曰御廪災此皆不得奉其宗廟之祥也君躬耕夫人獻穜稑以供粢盛而災焉咎在君夫人矣宗廟鬼神之怒兆見於此其新必矣何以不書營宫室以宗廟為先曲禮君子将營宫室宗廟為先廐庫為次居室為後重本也御廪災而新則不書常事也據世室新宫亳社皆不書新作以為常事而不書垂教之意深矣知其説者然後知有國之急務為政之先後雖勤於工築而民不怨勞如文王以民力為靈䑓而民歡樂之之類與妄興土木困民力以自奉者異矣妄興土木如秦皇漢武之類愚按宫廟志災者六御廪西宫新宫亳社譏不能戒謹而致災也雉門兩觀桓宫僖宫譏其非禮而宜災也趙氏曰穀梁云御廪之災不志按此乃大故何得不志乙亥嘗公羊傳常事不書譏甞也穀梁傳其志何也以為唯未易災之餘而甞也志不敬也天子親耕以供粢盛王后親􅅙以供祭服國非無良農工女也以為人之所盡事其祖襧不若以已所自親者也嘗祭時事之常則何以書志不時與不敬也春秋紀事用周月而以八月嘗則不時也杜氏曰先其時亦過也御廪災於壬申而嘗以乙亥是不改卜而供未易災之餘則不敬也范氏曰用火災之餘以祭宗廟乃不敬之大者也禮以時為大施於事則不時禮以敬為本𤼵於心則不敬故書孫氏曰嘗秋祭也周八月夏六月也不時而甞與以災之餘而甞不恭甚矣張氏曰有御廪災之變以先格王正厥事之誠心必遇災而懼未可遽有事於祖考况周之八月未當時祭何為汲汲以四日之間遽舉嘗祭乎特書以責其茍簡􅌸裂奉宗廟之不誠且不敬也王氏曰秋甞以物成而薦新為義夏之六月物未西成未可嘗也周官時享前期十日帥執事而卜日誓戒今壬申乙亥相距四日不卜不戒非獨不警天變而褻慢其祖亦其矣聖人明書二日豈無意乎趙氏曰左氏曰書不害也按八月嘗非時也又以災之餘而祭譏不敬也非為不害而書公羊曰不如勿甞而已按有災當警懼修飭而改卜何得便闕先君之祀乎又曰祭統云成王追念周公賜之重祭郊社禘嘗是也按郊禘天子之禮社與嘗諸侯所自有撰禮者見春秋書甞社以為郊禘同遂妄言耳又曰王制云礿則不禘禘則不甞當則不烝烝則不礿此為見春秋經前後祭祀唯有烝甞禘三種所以云耳愚按郊禘諸侯之所不當祭故孔子云魯之郊禘非禮也嘗社諸侯之常祭故春秋一書甞譏以災餘之米供粢盛四書社皆以日食大水鼔用牲之非禮而志之不書祭社以為常事也漢儒因中庸以郊社禘嘗並言又見春秋書郊社禘嘗故傅㑹以為皆僣禮然春秋書烝書嘗豈以嘗獨為重祭而烝非重祭乎嘗而謂之大春秋何以不書大乎纂例辨之當矣冬十有二月丁巳齊侯禄父卒僖公也在位三十三年子諸兒嗣是為襄公宋人以齊人蔡人衛人陳人伐鄭公蔡人在衛人下以一國用諸侯之師於是始左傳宋人以諸侯伐鄭報宋之戰也焚渠門入及大逵伐東郊取牛首以大宫之椽歸為盧門之椽公羊傳以者何行其意也穀梁傳以者不以者也民者君之本也使人以其死非正也程子傳凡諸侯之國甲兵有制皆統乎天子乃敢私用之與私為之用以伐人國大亂之道也他書以某師皆倣此師而曰以者能左右並如字之以行己意也左傳凡師能左右之曰以杜氏曰謂進退在已何氏曰以已從人曰行言四國行宋意也四國本不起兵當分别之故加以也通㫖齊桓晉文戰勝天下威服諸侯固能左右諸侯之師非以弱假强故不言以宋怨鄭突之背蒲昧反己故以四國伐鄭魯怨齊人之侵已故以楚師伐齊僖二十六蔡怨囊瓦之拘已故以吳子伐楚定四蔡弱於吳魯弱於楚宋以蔡衛陳敵而弱於齊永嘉吕氏曰以者非其本意而為人所以之稱四國本無意於伐鄭者宋以之也楚本無意於伐齊者魯以之也吳子本無意於戰楚而戰楚者蔡侯以之也春秋書擅征伐皆惡之而况以人之兵伐人之國哉乃用其師以行已意故特書曰以列國之兵有制皆統乎天子而敢私用之與私為之用以伐人國大亂之道也薛氏曰四國不守王法而甘為宋用其罪同也故榖梁子曰以者不以者也范氏曰本非所得制今得以之也陳氏曰伐未有言以者其言以何用諸侯之師於是始也束遷之後諸侯雖㑹伐非一國之志也則㑹者序爵而已矣雖王兵也而小國序大國之上亦非一國之志也以一國而用諸侯之師於是始上無天子下無方伯有以一國而用諸侯之師此伯之所由興也伯者之令行於天下自是無書以者矣書以者必中國用外域者也張氏曰鄭突頼宋之力得入簒國歸而肯其賂宋人因此與為仇讎魯桓平之宋人不從鄭遂與魯伐宋為丁末之戰宋以突入用其寵而背之且至見伐積其憤怒乞師於齊蔡陳衛盖師雖四國之賦而左右死生惟宋人之為聴比於平日諸侯各帥其師以伐人者不同故書以夫宋不反其黨庶孽狗貨賂之失而擅用列國之兵以泄其私忿四國輕以兵假人而使之逞志其罪皆不可勝誅也劉氏曰書宋人以齊人則足以知宋人者宋公也書晉人及姜戎則足以知晉人者晉侯也宋公殘人之國而毁其宗廟晉侯背父之殯而覆人之師其罪一也王氏曰宋公以私忿而用四國之兵四國合黨而惟宋公之用諸侯之兵聴命於一國昉於此故五國之君皆貶人之王氏箋義入人之國毁人之祖廟不道之甚故皆惡而貶之入而書伐鄭亦有罪致其伐耳永嘉吕氏口齊方有䘮而㑹伐惡之甚者矣愚按或謂言以者用彼師伐戰而已不交鋒盖泥於左傳紀柏舉事皆吳楚自戰故云爾盖蔡師㣲弱故不詳録也夫苟不自交鋒則非能左右之之謂矣况傳稱宋以太宫椽歸為盧門之椽經書魯取穀則非不交鋒之驗也甲桓王二十申三年崩十有五年齊襄公諸兒元年晉緡八衛惠三蔡桓十八鄭厲四曹荘五陳荘三杞靖七宋荘十三秦武公元年楚武四十四春二月天王使家父來求車左傳非禮也諸侯不貢車服天子不私求財公羊傳何以書譏何譏爾王者無求求車非禮也穀梁傳古者諸侯時獻於天子以其國之所有故有辭讓而無徴求求車非禮也求全甚矣遣使需索之謂求説文求索也王畿千里租税所入足以充費芳未反不至於有求四方諸侯各有職貢不至於來求何氏曰王者畿内千里租稅足以供費四方各以其職來貢足以尊榮當以至亷無為率先天下不當求求則諸侯貪大夫鄙士庶盗竊以喪事而求貨財已為不可况車服乎經於求賻隠三求車求金文九皆書曰求垂後戒也愚按賻因䘮事而求且諸侯所當歸也車則非諸侯所當歸矣然猶服御之物也金則直為貪利爾世愈降而失愈甚頃王之周又非桓王之周矣夫上有好去聲者下必有甚焉者矣王者有求下觀而化諸侯必将有求以利其國大夫必将有求以利其家士庶人必将有求以利其身皇皇焉唯恐不足未至於簒弑奪攘則不厭去聲矣本孟子古之君人者必昭儉徳以臨照百官尊卑登降各有度數左傳桓二臧哀伯曰云云示等威明貴賤民志既定之後禮記辨上下定民志皆安其分扶問反而無求兵刑寝矣及侈心一動莫為防制必至於亢苦浪反不衷昭二十二無亢不衷官失徳亷恥道䘮去聲寵賂日章淪於危亡而後止也觀春秋所書則見王室衰亂之由而知興衰撥亂之説矣張氏曰古者諸侯有功則車服以庸盖王之五路自同姓以下其用之皆有等差非諸侯所得而私為况可以天子之尊而下求於列國乎天子畿内租税所入足以待諸侯諸侯九貢亦無有以車供王室之用者上越禮以求之下違法以供之則示貪風於天下開賄道於邦國其失自上非小故也故特書示譏家父為大夫而無所正救奉使侯國自取辱命之罪見矣臨川吳氏曰車重器也天子可以之錫下諸侯不可以之供上也俠當貢之物諸侯不供而天子乏用猶不當遣使以私求况諸侯不當貢之物而可求乎哉家氏曰求之為言下之人冇求於上也不足者求之有餘者也上之於下不以求言也今以萬乗之尊而徵需猥及於不禀命之諸侯始之求賻猶曰諸侯不賻天子求之以愽之也繼而求車繼而求金非所當求而求見成周號令不行於當時而遜辭以有求非特責王深責諸侯之無王也髙氏曰桓無王豈獨桓受其貶天王之惡亦大矣弑逆不誅又數聘之又命大夫有求不王甚矣三月乙未天王崩桓王也在位二十三年世子佗嗣位是為荘王荘三年始書𦵏趙氏曰此後荘王僖王不書崩見王室不告魯之不赴著諸侯之不臣也夏四月已巳𦵏齊僖公王氏曰桓負大惡王非唯不討而八年之間三遣使来聘恩禮厚矣今王崩来赴魯無奔䘮㑹𦵏之事齊僖之存干戈嵗尋卒則㑹𦵏如禮比事以觀不貶而惡自見五月鄭伯突出奔蔡公羊穀梁傳突何以名奪正也程子傳避祭仲而出非國人出之也按左氏祭側界反仲専鄭伯患之使其壻雍糾殺之雍姬知之以告仲仲殺雍糾公出奔蔡是祭仲逐之也沒而不書其義何也陸淳曰微㫖逐君之臣其罪易去聲知也君而見逐其惡甚矣聖人之教在乎端本清源故凡諸侯之奔皆不書所遂之臣而以自奔為名名微㫖作文所以警乎人君其説是也杜氏曰諸侯奔亡為廹逐而茍免非自出也經以自奔為文責其不能自固啖氏曰或曰臣出其君而其罪不彰無乃掩姦乎曰出君之罪史氏知之也春秋舉王綱正君則而治道興矣陳氏曰春秋之法茍其道足以失國雖有權臣亦以自致之文書之是故鄭祭仲殺雍糾而突出衛孫林父殺子蟜子伯子皮而衎出燕大夫殺外嬖而欵出書奔而已矣夫君實有國而出於臣乃其自取焉耳本正而天下之事理矣張氏曰聖人之大寳曰位盖天子至尊而諸侯次之聖賢貴於得位以其足以恢𢎞斯道潤澤斯民是以謂之寳其次中才之主茍能制節謹度用賢愛民自足以守其社稷何至位南面之尊秉一國之權而為臣民之所逐哉故凡為國君而失位出奔皆以自出書之所以罪其自失也書爵不名者辜輕惡淺其位為未絶突以庶孽奪嫡初與權臣比而簒位又與其親戚謀殺之為反覆盗賊之計以自取亡書名絶之也髙氏曰前年蔡從宋伐鄭突曷為奔蔡曰宋人以蔡伐鄭而蔡聴命焉蔡之於突實無憾愚按春秋書君出奔者十有二鄭突衛朔燕欵蔡朱莒展輿邾益皆書名啖氏所謂君奔例書名言其失地非復諸侯也鄭忽曹羈莒展輿不稱爵者忽羈未成君展輿雖踰年而以弑立不可稱爵也衛鄭不名則以叔父稱而位未絶也衛衎位已絶而不名者著衎之立以正非突朔之比而剽之簒實逆非如忽黔牟可以兩君言之也郕朱儒不名小國紀録簡畧耳鄭世子忽復歸于鄭公羊𫝊其稱世子復正也穀梁𫝊反正也程子𫝊稱世子本當立者不能保其位故不爵鄭人謂之狡童又曰狂童恣行其不肖可知忽嘗嗣位君其國歸而獨稱世子杜氏曰忽嘗居君位故今還以復其位之例為文稱世子者父卒而不能自君鄭人亦不君之劉氏曰忽之出無鄭者也而又不得稱子則忽之可以君國者無幾矣春秋别嫌疑明是非以謂忽雖不能君國嘗為君之世子矣世子者必命於天子者也若偏庶因亂得逐而奪之則天下之奸臣縱矣故正其名子之繼世深惡亂臣賊子之意也薛氏曰突書鄭伯已成君也忽書世子明突之不當得位也項氏曰突雖不正而國人君之忽雖正嫡而國人不以為君也陳氏折衷稱世子以正忽之反正以反突之不正則亡其君位明矣其稱復歸者謂既絶而復歸也陸氏曰復歸之正者莫過於鄭忽髙氏曰不曰復歸則無以知其嘗有國復歸者又異於常之歸復入者又難於常之入也然諸侯失國出奔歸而稱復則可愚按復者還反其舊之謂國本其所有不幸失國而去今得復其國而歸也故鄭忽曹襄衛鄭衛衎皆稱復歸衛鄭之再歸與曹負芻之歸不稱復者衛鄭戕本祓而不悛負芻簒冢嫡而幸免其復皆非義也大夫失位出奔歸而稱復則不可古者諸侯世國大夫不世官劉氏曰復歸有君臣之異以其世也故可言復可言復而不得言復者奪其國之意也以其不世也故不可言復不可言復而言復者効其竊取位之意也或曰復厭詞也張氏曰忽自十一年五月庄公卒而立至九月奔衛五年于外乃得復歸不從衛侯朔衎之例稱爵乃稱世子者忽之所以得歸者以其嘗為世子也所以不稱鄭伯者以其不能君也愚按前先書突歸而繼書忽奔者以忽之出由突之入也此先書突奔而繼書忽歸者明忽之歸由突之出也忽與突之强弱見矣突之歸不係國而忽稱世子嫡庶之名分辨矣劉氏曰公羊謂復歸者出惡歸無惡如忽之奔盖有不得已亦何乎惡乎又曰歸者出入無惡突之簒國何故出入無惡許叔入于許穀梁傳許叔許之貴者也莫宜乎許叔其曰入何也其歸之道非所以歸也許大音泰岳之裔杜氏曰大岳神農之後堯四岳也先王建國迫於齊鄭不得奉其社稷隠十一年魯及齊鄭入許許荘公奔衛鄭悉有許之土地而使許荘公之弟許叔居許東偏以奉其祭祀是年鄭亂許叔度鄭之力不能與已爭故自入其國而君之也未聞可滅之罪也則當伸大義以直詞上告諸天王下赴諸方伯求復其國糞除宗廟昭三十一公曰将使歸糞除宗祧愚按糞掃也亦作拚聘禮既拚以俟孰能與之爭今乃因亂竊入則非復國之義故書入於許范氏曰許國之貴莫過許叔叔之宜立又無與二而進無王命退非父授故不書歸入云者難詞也劉氏曰稱入何難也何難焉鄭亂而後入也陸氏曰本無位則稱入陳氏曰許叔稱字以是為宜入也是故未有書字者雖公子也弗謂公子此其曰許叔所以别有罪也髙氏曰叔無罪書名則入簒者無辨家氏曰許叔之入入之善者也衛朔之入鄭突之入入之惡者也公㑹齊侯于艾艾公作鄗榖作蒿左謀定許也張氏曰入許之役鄭荘以壤地相接欲兼并之故糾合齊魯之力而同伐既入之後齊魯讓而不受乃與鄭人今鄭不能有齊魯又為之謀以定許叔之位此許之所以復存也髙氏曰魯嘗為齊絶襄新立復通好自是與文姜有鳥獸之行而彭生之禍兆於此矣故以齊侯為主邾人牟人葛人來朝杜氏曰牟國在泰山牟縣葛國在梁國寧陵縣東北張氏曰牟國今登州牟平縣葛古葛伯國今拱州寧陵縣愚按牟平縣今屬益都路寧海州寧陵縣今屬河南府路歸徳府公羊曰皆何以稱人夷狄之也何氏曰桓行惡而三人俱朝事之三人為衆衆足責故並貶之孫氏曰皆㣲國之君賤其相與朝弑逆之人貶之也朱氏曰朝非微者之禮其狄之何天王崩不奔喪而相率朝弑君之賊也堇子曰為天王崩而相朝故貶劉氏曰滕薛之旅見也與邾牟葛為異滕薛之貶輕而邾牟葛之貶重何也天王崩魯與三國未嘗奔問弔贈修臣子之職而方沛然以朝禮自處其義上僣是所以責之重也陳氏曰朝未有書人者旅見非邦交之舊自參以上甚矣凡朝不勝譏莫甚於自參以上故貶人之張氏曰朝桓多矣春秋獨於滕貶子榖鄧名之邾牟葛人之盖滕子先諸國而朝榖鄧自逺而至邾牟葛以諸侯之貴旅見於惡人之朝以事天子之禮事亂臣賊子故特貶三者以示法其餘從同同蜀杜氏曰聖人不與諸侯之朝桓獨来則損其爵二國則貶而名三國則人而賤之盖三國班見所以人之也杜元凱以為附庸世子安有三國同時遣世子耶劉氏曰世子不當稱君朝凡書世子朝皆貶也不應没其名秋九月鄭伯突入于櫟左傳鄭伯因櫟人殺檀伯而遂居櫟公羊傳櫟者何鄭之邑曷為不言入於鄭末言爾易為不言忽之出奔言忽為君之㣲也程子傳突非正也忽既恣行故國人君之諸侯助之書爵所以成居正者已不能保則人取之矣書入以見義不容也杜氏曰櫟鄭别都在河南陽翟縣張氏曰今屬潁昌府愚按今汴梁路鈞州陽翟縣經于厲公復國削而不書獨書入于櫟何也髙氏曰前曰歸恃宋與仲今曰入宋怒而仲不納亦見其義不容也夫制邑之死虢君左隠元制巖邑也虢叔死焉共城之叛大叔同上太叔将襲鄭子封伐京京叛太叔叚叚入于鄢公伐諸鄢太叔出奔共皆荘公所親戒也今又城櫟而寘子元焉使昭公不立國語櫟人實使鄭子不得其位何謀國之誤也衛有蒲戚而出獻公杜氏曰莆寗殖邑戚孫林父邑左襄十四衛獻公戒孫文子寗惠子食日旰不召二子怒公使子蟜子伯子皮與孫子盟孫子殺之公出奔齊楚有陳蔡不羮音郎而叛棄疾末大必折有國之害也左昭十一楚子城陳蔡不羮使棄疾為蔡公王問于巾無宇對曰鄭荘公城櫟而寘子元焉使昭公不立臣聞五大不在邉鄭京櫟實殺曼伯宋蕭亳實殺子㳺齊渠丘實殺無知衛蒲戚實出獻公由是觀之則害于國末大必折尾大不掉君所知也十三年楚公子棄疾帥陳蔡不羮許葉之師以入楚蔡公使殺太子禄五月癸亥王縊丙辰棄疾即位故夫子行乎季孫曰古者家不藏甲邑無百雉之城遂墮三都以張公室見史記孔子世家於厲公復國削而不書者若曰既入于櫟則其國已復矣薛氏曰櫟者鄭之大都也入于櫟言将逼鄭也鄭忽反矣突因櫟以有鄭忽浸㣲而不見矣春秋因忽浸㣲而不見以著大都之害閔忽之無臣子而不足以有立也張氏曰書櫟所以見大都耦國既入于此則鄭國之命已制於突與入共國都無以異特書入于櫟而畧其入國者所以謹亂之所由生也按傳十七年髙渠彌弑昭公立子亹十八年齊人弑亹祭仲逆鄭子於陳而立之荘十四年傅瑕殺鄭子及其二子而納厲公春秋止書鄭伯突入于櫟而忽亹儀之事皆不書者以見忽亹儀之為君末矣而不足紀也於以明居重馭輕强幹弱枝以身使臂之義為天下與來世之鍳也為國者可不謹於禮乎春秋此義皆小康之事衰世之意也木訥趙氏曰諸侯再入不至於國惟鄭突入櫟衛侯入夷儀而已鄭突名而衛衎不名衎書復歸於衛而突不書歸於鄭此正與不正之辨也衛衎之出國果其國也林父逐之而立剽不正也突之出位固非其位乃簒也突入櫟将迫兄而出之謀再簒也衎自夷儀入春秋書之以明衎之當有衛也突入鄭不書明突不當有鄭也家氏曰鄭有君而突自外竊入亦書鄭伯此因舊史之已書而存之以示戒魯桓與突同惡相濟出師輔簒至於再三故魯史崇突而卑忽以鄭伯書春秋因之以示戒程子所謂以戒居正之不能保也壮二十一年𫝊突歸於鄭之後其出奔蔡入于櫟皆以名書猶繫于爵雖簒而實君雖君而實簒不沒其實也冬十有一月公㑹宋公衛侯陳侯于袲伐鄭宋公上公有齊侯袲昌氏反公作侈杜氏曰袲宋地在沛國相縣西南鄭氏曰亳州愚按今屬河南府路左氏曰将納厲公也弗克而還永嘉吕氏曰或疑宋既責賂於突而伐鄭不當又納突遂謂伐突救忽然魯桓方與突伐宋亦不當㑹宋伐突忽奔於衞而袲之㑹則衛與焉突奔蔡而曹之㑹蔡與焉謂衛不應伐忽以納突則蔡亦不應伐突以救忽春秋諸侯之離合不常可勝辨哉但據經伐鄭二字則突在櫟忽在鄭為伐忽明矣榖梁曰地而後伐疑辭非責也其疑也昭公與突之是非邪正亦明矣劉氏曰春秋亂世以不正討正以不義伐義者衆故非所當納者奪之名所以别白黑然昭公雖正其才不足以君一國之人復歸於鄭日以㣲弱厲公雖簒其智足以結四鄰之援既入於櫟日以盛强諸侯不顧是非而計其强弱始疑於輔正終變而與邪榖梁所謂非其疑者非其疑於為義而果於為不義相與連兵動衆納簒國之公子也張氏曰魯桓宋荘衞朔皆以不正得國其為突謀乃水流濕火就燥獨陳侯疑之爾然寡不勝衆所以疑而遂合也王氏曰突之未出也宋欲有所責故嘗伐之突而既出也宋懼無所得故求納之始宋不和而公以鄭伐宋乃突已奔而公與宋伐鄭向者相戾之深今也相用之固豈無自而然哉盖以正繼正禮之常諸侯無所求以亂易亂國之釁諸侯有所責故利其亂幸其危貪其賄黨其邪自突入櫟公與宋公三㑹諸侯而再伐鄭無他賄故也故詳書其㑹地而後言伐以譏之也杜氏曰先行㑹禮而後伐王氏曰四國㑹於宋之袲則宋主兵矣宋荘與突始恩中讎今又主兵納之是得為以常徳立武者乎陳氏曰㑹伐㑹盟㑹救㑹侵皆前定之辭也未前定則書㑹于某而後伐㑹于某而後盟㑹于某而後救㑹于某而後侵若棐林重丘牡丘召陵是也前定周欲也未前定繼事也愚按此于袲伐鄭榖梁以為非其疑棐林伐鄭榖梁以為著其美盖于袲所以納以孽奪正之人而棐林所以討從楚侵宋之罪故不同爾此書公㑹三國之君修㑹禮於袲然後伐鄭見其先疑而後决也宣元年書四國之君㑹晉師於棐林伐鄭見諸侯皆從晉師以討有罪也文相似而實不同也召陵侵楚雖非疑辭然𫝊稱劉文公合諸侯于召陵謀伐楚則是不協而謀之矣經書㑹于召陵侵楚譏之也若夫襄五年㑹城棣改陳不書㑹城棣十八年㑹魯濟同伐齊不書㑹魯濟二十五年㑹夷儀伐齊不書伐齊盖救陳圍齊美其有恤患討罪之實故皆不書㑹夷儀受賂而縱大惡是以不書伐也乙荘王酉元年十有六年齊襄二晉緡九衛惠四蔡桓十九鄭厲五昭公忽元年曹荘六陳荘四杞靖八宋荘十四秦武二楚武四十五春正月公㑹宋公蔡侯衛侯于曹左𫝊謀伐鄭也孫氏曰未能納突故復㑹張氏曰於此又邀蔡黨益張矣夏四月公㑹宋公衛侯陳侯蔡侯伐鄭程子傳突善結諸侯故皆為之致力屢伐鄭也春正月㑹于曹蔡先於衛夏四月伐鄭衛先於蔡王制諸侯之爵次其後先固有序矣王制王者之制禄爵公侯伯子男凡五等在周官大司馬設儀辨位以等邦國周禮注等猶等差也辨别也别尊卑之位大宗伯以九儀之命正邦國之位猶天建地設不可亂也及春秋時禮制既亡伯者以意之向背為升降公羊昭十二春秋之信史也其序則齊桓晉文諸國以勢之强弱相上下左傳成三衛在晉不得為次國注春秋時以强弱為大小故衛雖侯爵亦為小國通㫖諸侯朝㑹序列以爵之尊卑則名正以國之大小則實亂蔡嘗先衛今序陳下者先儒以為後至也杜氏曰蔡常在衛上今序陳下盖後至以至之先後易其序是以利率人而不要於遥反諸禮也豈所以定民志乎後世有以醲厚也賞前馬援傳明主醲於用賞誘人之趨事赴功如商鞅立二丈之木於國都南門募民能徙至北門者予五十金之類以重罰沮人之奉公守正如趙髙持鹿獻二世曰馬也二世笑曰丞相誤耶問左右或黙或言髙隂中諸言鹿者以法之類意亦如此大亂之所由生也則儀位以為階檃揉易大傳春秋防㣲杜漸尤嚴於名分抉問反考其所書意自見音現矣家氏曰自去冬迄今夏三書公㑹再書伐鄭不間以他事誅宋魯之輔簒而干正也髙氏曰春與曹謀而曹人不從今又與陳同伐盖突善結諸侯故也宋初伐突期於服突而已不期忽之歸也突奔而忽歸則不利於宋故宋又連年伐忽而納突鄭之亂宋實為之故以宋首惡也張氏曰自鄭突入國之後即比魯而仇宋及其出奔乃能使魯與宋自冬及夏志力伐鄭所謂善結也衛朔與母搆兄奸惡之雄因同惡之合陵蔡而居其上王政不行霸者未作小人恃强衆陵寡弱如此及桓文之興而後少抑馬吕氏曰㑹曹蔡先衛伐鄭衛先蔡盖當時諸侯皆以一切强弱目前利害為先後不復用周班也愚按蔡衛皆姬姓侯爵而或先或後者率以私意為進退也故此年㑹曹先衛伐鄭先祭而盟踐土㑹宋㑹召陵侵楚蔡又先衛㑹虢衛又先蔡紛更不一故㑹鄄盟幽侵蔡㑹首止圖新城㑹鹹盟牡丘㑹淮盟新城㑹棐林盟蜀襄五年㑹戚㑹鄬則陳先于衛從王伐鄭宋以四國伐鄭㑹于袲此年伐鄭㑹宋㑹虢㑹召陵則衛先于陳此年伐鄭伐衛納朔次郎㑹北杏盟齊㑹盂圍宋盟翟泉㑹虢則以陳先蔡從王伐鄭宋以四國伐鄭㑹温襄二十四年伐鄭㑹宋㑹申再伐吳㑹召陵敗雞父則又以蔡先陳是皆先後之無常無非霸者以意之向背為升降也又其甚者許以男而先曹伯淮之㑹則又先邢侯莒邾以子而先薛伯杞伯矣齊桓以侯而先宋公則曰主盟也晉霸而後㑹盟亦以侯而先宋公則亦曰主盟也然自晉霸之後齊亦以侯而先宋公矣齊世子光盟雞澤至㑹柤皆序小邾子之下世子未誓以皮帛繼子男是也然伐鄭戍虎牢之役則序滕子薛伯杞柏之上亳城比蕭魚之役則序莒邾之上夫以世子誓于天子而攝其君則下其君之禮一等亦宜序薛伯杞伯之下况齊光未誓於天子乎據傳於戍虎牢之役謂齊太子光先至於師故長於滕亳北之役謂齊太子光宋向戌先至於鄭門于東門則亦以至之先後易其序耳嗟夫春秋之時王政不綱典禮廢壊諸侯放恣惟力是視不復以爵之貴賤計崇卑而専以國之强弱相上下矣是故隠公之時滕薛朝魯而爭長此猶皆侯爵也桓公之時魯以周班後鄭而鄭有郎之戰則已不計爵次矣馴致春秋季世宋虢之魯楚以蠻夷而爭晉先挿春秋之終吳且爭長於黄池而主㑹矣雖然春秋於諸侯爵次之紊亂從主㑹者之所為而不革者所以彰其失也宋虢先晉黄池以兩伯言之所以抑其强也宋虢黄池待貶絶以見罪惡其餘從主㑹者之所為不貶絶以見罪惡秋七月公至自伐鄭此致伐之始左傳以飲至之禮也榖梁傳其致何也危之也程子傳不惟告廟又以見勒勞於鄭突也伐鄭則致罪之也曷為罪之以納突也諸侯失國諸侯納之正也伐鄭以納突非正也故書至以罪桓之上無王法恣為不義而莫之禁也范氏曰桓公再助簒伐正危殆之甚喜得全歸故志之髙郵孫氏曰重其兩伐正而納簒故危之也臨川呉氏曰公至常事書者皆譏也家氏曰自去年十一月㑹伐師未及息今年正月又㑹四月又伐歴三時之乆乃歸暴師一年為是逆理悖常之事桓之惡亦稔矣冬城向向失亮反左傳書時也啖氏曰下有十一月則此乃十月也縱是同月亦今之九月農功未畢不可興役愚按凡書城未有繋月者盖城築之事非可月成也然周之十月十一月皆農收之時盖戒事於此而以春正月畢工則無妨農之病矣杜預以謂閏六月水星可在十一月而正盖為左傳文餙之耳十有一月衛侯朔出奔齊左傳初衛宣公烝於夷姜生急子屬諸右公子為之娶於齊而美公娶之生壽及朔屬夀於左公子夷姜縊宣姜與公子朔搆急子公使諸齊使盗待諸莘将殺之夀子告之使行不可曰棄父之命惡用子矣有無父之國則可也乃行飲以酒夀子載其旌以先盗殺之急子至曰我之求也此何罪又殺之二公子怨惠公立公子黔牟惠公奔齊公羊傳朔何以名得罪於天子也榖梁傳朔之名惡也天子召而不往也陳氏曰衛人立黔牟而後奔則其但書奔何以為自失國也春秋之法茍其道足以失國雖有簒公子亦以自致之文書之也故蔡人立東國而朱出郕人立君而朱儒出皆書奔而已矣張氏曰朔立已五年二公子逐之必因其凌蔑天子周室欲討而後得以行其志所以荘六年王人子突救衛公羊之説必有所傳矣愚按公榖皆云衛朔獲罪於天子今考左傳衛朔之復入放黔牟於周則黔牟之立天子與有力焉不然二公子怨朔奚待五年而逐之哉丙荘王戌二年十有七年齊襄三晉緡十衛惠五黔牟元年蔡桓二十卒鄭厲六昭二曹荘七陳荘五杞靖九宋荘十五秦武三楚武四十六春正月丙辰公㑹齊侯紀侯盟于黄左傳平齊紀且謀衛故也杜氏曰黄齊地張氏曰公十三年㑹紀敗齊以益其怨今乃盟之豈足以釋憾又欲納朔一動而二失也王氏曰黄紀地後屬齊愚按今陽路登州黄縣紀魯之姻國而衛朔在齊故齊欲納朔而魯欲平紀也然二年之後齊遽遷紀三邑六年之後魯卒㑹齊納朔則非紀之削弱盟不足恃而齊魯之强弱亦具見矣二月丙午公㑹邾儀父盟于趡㑹公榖作及趡翠軌反左傳㝷蔑之盟也杜氏曰趡魯地臨川吳氏曰隠元年及邾盟蔑七年而隱公渝盟伐邾桓公八年又伐邾魯邾不通好十有餘年至桓十五年邾同牟葛朝魯既朝之後二國欲尋蔑盟而平其再伐之怨故邾来魯地受盟而公與之盟也髙氏曰趡我地彼来而我及之也與蔑之盟同愚按下書伐邾則趡盟不待貶而惡自見矣隱桓皆盟邾而背盟皆以宋故以國君之重而其心無所適主尚足貴乎夏五月丙午及齊師戰于奚公闕夏字奚榖作郎此齊魯交兵之始左傳齊人侵魯疆疆吏来告公曰疆場之事慎守其一而備其不虞事至而戰又何謁焉穀梁傳内諱敗舉其可道者不言及之者為内諱也杜氏曰奚魯地臨川呉氏曰此齊師来侵魯境而魯與之戰也盟黄未幾而齊来侵境平紀之信豈可恃乎王氏箋義不言及者主名疆吏得公命與戰微者故不書髙氏曰不書敗盖魯敗也愚按或謂此公戰諱不言公竊考明年公㑹齊候于樂則齊魯之怨未深其非公與戰明矣故知戰奚乃内之微者而戰宋戰乾時戰井陘則公及而諱之也亦猶盟宿乃内之微者而盟幽盟齊盟翟泉盟處父則諱公也筆削之㫖當連上下文并前後事跡觀之執一例則拘矣六月丁丑蔡侯封人卒桓侯也在位二十年弟獻舞立是為哀公秋八月蔡季自陳歸于蔡左傳蔡人名蔡季于陳蔡季自陳歸于蔡蔡人嘉之也穀梁傳蔡季蔡之貴者也自陳陳有奉焉爾季字也啖氏曰蔡侯之弟歸而合義故字之愚按諸侯之兄弟例稱字蔡叔許叔蔡季紀季是也許叔懼於鄭紀季廹於齊故以難而書入此則蔡人召之順且易故曰歸然皆無罪是以稱字蔡叔以國君之弟出㑹盟無譏貶故亦稱字衛叔武則以攝君故不稱字而曰衛子歸順詞髙郵孫氏曰是可歸而歸也則歸者善也蔡季之去以道而去者也其歸以禮而歸者也公子不去國季何以去權也既歸何以不有國獻舞立矣何氏曰蔡侯封人無子季次當立封人欲立獻舞而疾季季辟之陳封人卒反歸奔䘮無怨心故賢而字之若季者劉敞所謂智足以與權而不亂力足以得國而不居逺而不携邇而不廹者也是以見貴於春秋劉氏曰蔡季之去其國與秦伯之弟鍼無異鍼以富懼誅季以賢見疑俱不得安其身而季為顯矣永嘉吕氏曰突歸於鄭則名之赤歸於曹則名之以其爭國也蔡季歸於蔡則不名以其非爭國也言其終不為君也張氏曰返國於危疑之際考之書法惟蔡季為善以其潔身而去一無爭心念念宗國聞召即歸能逺禍於未然不悻悻以為髙其去就合宜故春秋貴之家氏曰蔡季之歸與閔元年季子来歸義同皆字而書歸褒也獻舞失國之君蔡季讓國之賢春秋於二人之賢否具見書法而說左氏者乃謂季獻舞為一人愚竊惑焉癸巳塟蔡桓侯啖助曰蔡桓何以稱侯盖蔡季之賢知請諡也周禮職䘮掌諸侯之䘮凡其丧祭詔其號注號謂諡號啖氏曰五等諸侯本國臣子皆稱之曰公𦵏既不請王命因而私諡為公從而書之以見非禮唯蔡桓稱侯盖蔡季告王請諡王之策書則云諡曰某侯故特書之明得禮也陸氏曰按左傳史記世本蔡之諸君皆諡為侯經皆稱公者以其私諡與僣同也惟桓侯請諡王之策書則云諡曰某諸侯史國史因而紀之故春秋特書之髙氏曰春秋因褒見貶舉一是則衆非可知人亦多愛其君者莫能愛君以禮而季能行之此賢者所以異於衆人也劉氏曰諸侯莫有能正死生之禮者桓侯之賢又未有聞於春秋則桓侯非賢而蔡季請之可知矣云云或曰塟未有不稱公者其稱侯傳失之耳杜氏曰稱侯盖謬誤臣子之於君極其尊而稱之禮也徐邈曰塟者臣子之事皆以公配諡此稱侯盖蔡臣之失禮其説誤矣孔子疾子路使門人為臣子曰無臣而為有臣吾誰欺欺天乎朱子注子路之意實尊聖人而不知所以尊也曽子疾革而易簀曰吾得正而斃音幣焉斯已矣檀弓曽子寢疾病樂正子春坐於牀下曽元曽申坐于足童子隅坐而執燭童子曰華而睆大夫之簀與子春曰止曽子聞之瞿然曰呼曰華而睆大夫之簀與曽子曰然斯季孫之賜也我未之能易也元起易簀曽元曰夫子之病革不可以變幸而至於旦請敬易之曽子曰爾之愛我也不如彼君子之愛人也以徳細人之愛人也以姑息吾何求哉吾得正而斃焉斯已矣舉扶而易之反席未安而没故終而必安於正人子不以非所得而加之於父是為孝人臣不以非所得而加之於君是為忠極其尊而稱之不正之大者而可以為禮哉論語生事之以禮死塟之以禮祭之以禮朱子注人之欲孝其親心雖無窮而分則有限得為而不為與不得為而為之均為不孝所謂以禮者為其所得為者而已矣或曰魯君生而稱公亦非禮乎曰生而稱公為虛位禮之文也没而繫音計諡為定名禮之實也春秋諸侯雖伯子男塟皆稱公志其失禮之實為後世戒欲其以正終也其垂訓之義大矣陸氏曰侯伯子男之國稱其君曰公臣子之辭也謚不得云公者諡王所賜也劉氏曰稱其本爵者誄之於天子者也愚按近世仕於時者其親友僕𨽻皆以其未得官爵為稱謂暨其死也銘旌墓誌止稱所得官爵此所謂生而稱者為虛位没而稱者為定名也及宋人衛人伐邾左傳宋志也杜氏曰邾宋爭彊魯從宋志背趡之盟襄陵許氏曰正月與齊為黄之盟而五月戰焉二月與邾為趡之盟而八月伐之張氏曰桓公春與齊邾盟既而戰奚伐邾並見於一年之中反顧前日刑牲詔神棄如敝屣瀆信而不仁甚矣王氏曰隱元年盟蔑七年伐邾春秋已罪其失信今春與邾盟秋又及宋衛稱兵無信尤甚矣况桓非隱之比乎冬十月朔日有食之穀梁傳不言日食既朔也髙氏曰無王十有五年而日再食盖若始而終也趙氏曰左氏云不書日官失之非也史官豈不知朔及每月甲子乎何待日官日御哉丁莊王亥三年十有八年齊襄四晉緡十一衛惠六黔牟二蔡哀侯獻舞元年鄭厲七子亹元年曹莊八陳莊六杞靖十宋莊十六秦武四楚武四十七春王正月是年桓公已終復扶又反下同書王者春秋之時諸侯放恣弑君簒國者已列於㑹則不復致討故魯宣殺惡及視以取國賂齊請㑹而𫝊去聲曰㑹於平州以定公位宣元曹伯負芻殺太子自立成十三見執於晉成十五而曹人請之曰若為有罪則君列諸㑹矣成十六孔子為于偽反此懼作春秋於十八年復書王者明弑君之賊雖身已没而王法不得赦也范氏曰此年書王以王法終治桓之罪又據桓十五年天王崩至是新君嗣立三年之䘮畢矣明弑君之賊雖在前朝而古今之惡一也然則簒弑者不容於天地之間身無存没時無古今皆得討而不赦聖人之法嚴矣已列於㑹而不致討可乎故曰春秋成而亂臣賊子懼髙郵孫氏曰正月有王桓公之終也弑君之賊無可赦之理不見誅於一時當見誅於嵗月不見誅於其生當見誅於其死不見誅於終身當見誅於萬世王氏曰桓公立十八年而傳嗣易世非不久也王朝之討不加三遣使下聘而追錫之命豈唯桓無王而周亦不能自王矣故聖人始終以王法治之愚按此年正月書王誅桓公之終身無王也明年錫命王不稱天譏天王之卒於不王也殺君之賊身無存没時無古今皆得討而不赦故漢之王莽殺平帝魏之司馬昭弑髙貴鄉公唐之韋后弑中宗之類前史皆隱其迹而朱子於通鑑綱目必正其大惡之名使其罪暴白於萬世豈非竊取春秋之義乎公㑹齊侯于濼濼廬篤反又音洛杜氏曰濼水在濟南歴城縣西北入齊愚按今屬濟南路公與夫人姜氏遂如齊公無與字左𫝊公将有行遂與姜氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗公㑹齊侯于濼遂及文姜如齊穀梁傳濼之㑹不言及夫人何也以夫人之伉弗稱數也程子傳人雖不能無欲然當有以制之無以制之而惟欲之從則人道廢而入於禽獸矣與者許可之詞楊氏辨要與之為言許也曰與者罪在公也范氏曰實驕伉而不制故不言及陸氏曰婦人從夫者也何夫人之伉公失為夫之道也劉氏曰不言及而言與猶匹夫匹婦之相與云爾按齊詩惡去聲魯桓微弱不能防閑文姜使至淫亂為二國患蔽笱小序而其詞曰敝笱古口反在梁其魚唯唯齊子歸止其後才周反如水言公於齊姜委曲順從若水從地無所不可笱取魚器齊人以敝笱不能制大魚比桓公不能防閑文姜也故為亂者文姜而春秋罪桓公治其本也易曰夫夫婦婦而家道正家人彖𫝊夫不夫則婦不婦矣永嘉吕氏曰古人制禮尺寸不敢踰毫釐不敢越者夫豈强拂人之情性而以繁文末節為尚哉經國家定禍亂而杜未然也泉水載衛女思歸而不可得載馳許穆夫人欲歸唁其兄而義不可夫人之適其國父母在則有歸寧既終則大夫行聘問而已古人之制禮也嚴矣違此者未有不敗公之與夫人如齊是夫而不能夫也夫者以知帥人者也知不足以帥人而可謂之夫乎乾者夫道也以乘御為才小畜下卦乾九三夫象乾彖傳時乘六龍以御天坤者婦道也以順乘為事坤文言曰妻道也又坤彖傳以順承天易著於乾坤述其理春秋施於桓公見音現其用孫氏曰濼之㑹夫人在是也不言公及夫人㑹夫人之行甚矣不可言及也不可言及公弗能制也王氏曰言遂如齊見夫人由濼而往也薛氏曰不言及而言與何公不能制乎内而遂與之如齊曰與抗也齊侯虎狼也實等鳥獸之行齊魯之間非一日也以禮相見猶不保其無變況親與為非禮而又私狎之也張氏曰濼之㑹不言夫人者夫人不與行㑹禮也如齊不言及而言與者夫人抗也以見夫不夫婦不婦進退制於夫人也凡事之異於常者禍之所從起觀公與夫人如齊之書則見其違男女之常經而禍亂之所從生聖人謹禮於微慮患於早之意不可不察也臨川呉氏曰此行公往㑹齊侯爾夫人欲同往公不能制濼㑹禮畢夫人又欲從齊侯至齊夫婦既同出公不可獨反國故遂與之同如齊也愚按與之為言乃黨與匹敵之義而不相屬之辭也故以尊及卑曰及以此及彼曰及皆及者為主僖公及夫人姜氏㑹齊侯于陽榖以公及夫人夫人不敢専行也傳稱王奪子禽祝跪與詹父田又曰陳公子完與顓孫奔齊曰與則匹敵而無彼此尊卑之别也桓公與夫人姜氏如齊若曰夫人專行而公從之也易曰夫子制義從婦㓙也桓公不能制義而從文姜以往其咎可知矣春秋以文為褒貶豈不信哉趙氏曰公羊曰何以不言及夫人夫人外也夫人外者何内辭也其實夫人外公也按聖人設教不應如此煩碎愚按公羊經脱與字故辭費耳夏四月丙子公薨於齊丁酉公之䘮至自齊左傳公及文姜如齊齊侯通焉公謫之以告齊侯享公使公子彭生乗公公薨於車魯人告於齊曰寡君畏君之威不敢寧居来修舊好禮成而不反無所歸咎惡於諸侯請以彭生除之齊人殺彭生公羊傳夫人譛公齊侯怒與之飯酒於其出使公子彭生送之於其乗焉搚幹而殺之穀梁傳其地於外也薨稱公舉上也魯公弑而薨者則以不地見音現其弑隱公閔公今書桓公薨于齊豈不沒其實乎前書公與夫人姜氏如齊後書夫人孫音遜于齊去上聲其姓氏而莊公不書即位則其實亦明矣趙氏曰在外薨不言有故無故皆當書其地朱子語孔子直書義在其中云公㑹齊侯於某公與夫人姜氏如齊公薨於齊公之䘮至自齊夫人孫于齊此等顯然在目雖無傳亦可曉張氏曰春秋書魯君見弑之例有二在内則不書地以存其實在外則不容不書其地而以上下文之特異者見之此先書公與夫人姜氏如齊而明年書夫人孫于齊則桓公之不得其死昭然矣石氏曰其以䘮致痛之也蜀杜氏曰仁者為國之本三綱五常所由出也禮者人倫之本君臣上下所由正也隱将授桓而弑之非仁也適鄰國而以夫人行非禮也始以不仁而立終以非禮而亡春秋以為甚惡也通㫖問桓公弑逆凡魯國之人皆宜與之絶齊人惡之宜矣春秋何以諱之曰公薨于齊又曰塟我君桓公哉此與名之曰幽厲雖孝子慈孫百世不能改孟子斷桀紂為匹夫之意異矣曰春秋於隱不書塟於桓不書王諸侯来朝而黜其爵冡宰来聘而書其名若此類治桓之罪嚴矣豈特與名為幽厲指為匹夫比乎齊人以私殺桓非以賊討之也其曰塟我君桓公又以見天王方伯魯臣子之罪矣非聖人誰能修之髙氏曰桓弑立不免見殺於人天理亦不僣矣春秋不以討賊書者齊襄殺之非討弑隱之罪不以賊討所以絶无已之亂也濼之㑹不書夫人出以遂如齊見之䘮至不書夫人入以孫於齊見之不與其出不與其入聖人之意微矣秋七月冬十有二月己丑塟我君桓公趙氏曰塟稱我君而後舉諡臣子之敬辭也不然則恐涉他國之君而近于不敬矣公羊曰賊未討何以書塟讎在外也穀梁子曰讎在外者不責踰國而討于是也范氏曰時齊强大非臣子所能討陸氏曰賊在異國故可塟陳氏曰見殺於他邦雖讎不復書塟夫桓公之讎在齊則外也隱公之讎在魯則内也在外者不責其踰國固有任之者矣上有天子下有方伯連帥討賊之責不在於魯也在内者討于是此春秋之法也故十八年書王而桓公書塟惟可與權者其知之矣通㫖桓公薨於齊賊未討而書塟何也桓公弑君之賊其討宜也然齊人自以其私憤殺之非討其弑君之罪又聖人於魯事有君臣之義難以明著其罪也但書其塟而桓之罪顯矣如蔡般弑君父之賊也楚䖍誘討兩皆書名亦此意也家氏曰桓簒國之賊魯臣子不能為隠復讎今死於鄰國受斃豔妻自其身而言固為不幸自天討而言與州吁之死於陳陳佗之死於蔡殆无以異春秋誅姜氏𦵏桓公明桓公之死與隠異也愚按春秋君弑而書𦵏者有九衛桓齊襄陳靈則賊已討者已鄭僖齊悼則經不書弑者也蔡景之𦵏徧刺天下之諸侯也許悼之𦵏不使止為弑父也蔡靈讎在外而亦弑逆之賊與魯桓同楚䖍之殞於比亦猶齊諸兒之殞於無知也蔡昭讎在内賊已討而賊微不書且以蔡昭背楚誑呉應受斃于盗賊也聖人之書法如化工之生物其筆削无不適於天理之當然也或者乃謂桓公之塟魯人但以殺彭生為賊已討夫賊不討而不塟孔子削之也非謂魯人不𦵏也茍謂臣子塟之即書於經則晉欒書塟厲公于翼東門之外齊崔杼塟莊公于士孫之里何以不書塟耶春秋胡傳附録纂疏卷六
