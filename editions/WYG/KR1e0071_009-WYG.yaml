body:
  text: 春秋胡傳附録纂疏卷七元汪克寛撰莊公上公名同桓公之子母文姜夫人哀姜年十四嵗即位在位三十二年戊莊王子四年元年齊襄五年晉緡十二年衛惠七年黔年三年蔡哀二年鄭厲八年子儀元年曹莊九年陳莊七年卒杞靖十一年宋莊十七年秦武五年楚武四十八年春王正月不書即位内無所承上不請命也或曰莊公嫡長展兩反下同其為儲副明矣雖内無所承上不請命獨不可以享國而書即位乎曰諸侯之嫡子必誓於王典命注誓猶命也莊雖嫡長而未誓安得為國儲君副稱世子也夫為世子必誓於王為諸侯可以内無所承上不請命擅有其國即諸侯之位耶春秋絀而不書父子君臣之大倫正矣通㫖問以太子生之禮舉之是内有所承矣不書即位何也曰同雖冢嫡然未嘗命於天子桓公又薨於他國不及有付托之命也其内無所承明矣髙氏曰公上不受於天子而父以弑逆得位又不以其道終無所受之故不書即位不正其始也張氏曰不書即位桓公見戕於齊固不及有立子之命况繼承之初創鉅痛深異於他公不但當請於王即位而父之仇未討亦當告於天王以國事委冢宰而專以討賊為事今泰然居之曽不以父之無臯見殺於鄰國為念故削其即位盖以人子之心處莊公之時當知莊之無志又非隠閔僖之比也啖氏曰左氏謂不稱即位文姜出故也且三月文姜方孫何妨正月即位乎劉氏曰原傳此意當為文姜未有至文故云耳不知夫人行不以正者至皆不書也且莊公不忍即位文姜感之而還則莊公已忘文姜之弑其父矣何以文姜又孫於齊乎王氏曰莊閔僖不書即位公榖以為繼故不忍行即位之禮然莊公主王姬閔公盟落姑僖公㑹檉皆在即位之年非不忍也三月夫人孫于齊孫音遜下同左傳不稱姜氏絶不為親禮也公羊傳内諱奔謂之孫夫人不稱姜氏貶與弑公也穀梁傳孫之為言猶孫也諱奔也不言氏姓貶之也夫人文姜也桓公之弑姜氏與音預下同焉為魯臣子者義不共戴天矣嗣君夫人所出也恩如之何徇私情則害天下之大義舉王法則傷母子之至恩此國論去聲議也之難斷丁亂反者也經書夫人孫于齊而恩義之輕重審矣劉氏曰母子至親而不得不絶者義也春秋為人之不明於義而私其親有不忍也故示之以絶之之文梁人有繼母殺其父者而其子殺之有司欲當以大逆孔季彦孔子十九世孫曰文姜與弑魯桓春秋去上聲其姜氏傳去聲謂絶不為親禮也夫絶不為親即凡人耳方諸古義宜以非司㓂而擅殺當之不得以逆論也人以為允連叢子梁人娶後妻後妻殺夫其子又殺之季彦過梁梁相曰此子當以大逆論禮繼母如母是殺母也季彦曰言如母則與親母不䓁欲以義督之也昔文姜與弑魯桓春秋去其姜氏傳曰不稱姜氏絶不為親禮也絶不為親則凡人耳且夫手殺重於知情知情猶不得為親則此下手之時母名絶矣方之古義是子宜以非司㓂而擅殺當之不得為殺母而論以大逆也梁相從之故通於春秋然後能權天下之事矣孫者順讓之辭使若不為人子所逐以全恩也杜氏曰夫人莊公母魯人責之故出奔内諱奔謂之孫猶孫讓而去臨川吳氏曰魯人以桓公之弑寔由夫人衆怒羣誚夫人内慙不安故出奔齊哀姜去而弗返文姜即歸于魯例以孫書何也與聞弑桓之罪已極有如去而弗返深絶之也范氏曰文姜有殺夫之罪重故去姜氏哀姜有殺子之罪輕故貶曰夫人氏之喪此輕重之差然則恩輕而義重矣河廣之詩其詞何取而聖人録於國風者明宋襄公之重本亦此義也詩朱子傳衛宣姜女為宋桓公夫人生襄公而出歸于衞襄公即位夫人思之而義不可往盖嗣君承父之重與祖為體母出與廟絶不可以私反故作此詩言誰謂宋國逺乎但一跂足而望則可以見矣明非宋逺而不可至乃義不可往耳為襄公者將若之何生則致其孝沒則盡其禮而已其垂訓逺矣通㫖問文姜與弑書曰夫人孫于齊何以不曰姜氏孫于齊乎曰絶於外則去姓絶于内則去氏内外俱絶則姓氏皆去曰夫人孫于齊則知其為文姜矣若曰姜氏安知其非姪娣乎張氏曰文姜之罪上通乎天為魯臣子者原先君見弑之由固難以嗣君夫人所出而以恩掩義故斷以大義而去姜氏以絶之所以尊社稷而重本也古之聖人為禮有等衰制服有輕重三綱之設以夫為妻綱五服之條父在為母期皆所以明天倫之正而使人知本以自別于禽獸也永嘉吕氏曰書夫人孫於齊則夫婦母子之義絶矣夫婦母子之義絶則凡人耳文姜之㑹齊侯其薨其葬皆書夫人聖人之書此也毋乃溷於名實乎曰桓公雖見弑而莊公之於母也一以夫人之禮事之彼且以為夫人也我可以不謂之夫人乎聖人書法亦紀寔而已矣李氏集義下知齊復書姜氏者於一貶罪惡自見矣愚按文姜與弑桓公哀姜與弑二君皆罪大惡極不可復居魯國故皆書孫雖不曰奔使若自知愧耻而去然亦可見其無所容則其絶之也至矣哀姜去而不返齊人討而殺之得討賊之義矣文姜復歸於魯而或㑹或享如齊如莒一書再書而又再書春秋非與其歸魯也所以深惡魯之臣子無憤疾之心而不能仗大義以誅之也先儒謂唐武后廢中宗而移其宗廟張東之等當廢為庶人而賜之死引春秋絶文姜之義以為斷可謂得聖人之意矣春秋於文姜不曰姜氏而書夫人綱目於武后不曰太后而稱武氏盖稱姜氏則疑於妾媵而其罪不彰稱太后則猶為天下之母而非庻人矣况聖人筆削父母國之史而朱子筆削前代之史師其意而不襲其文豈非得𫝊心之要典也乎啖氏曰公羊云夫人固在齊矣其言孫于齊念母也豈有先在齊而今書孫乎盖見無夫人至文故云爾不知夫人隨喪而歸矣穀梁曰接練時録母之變始人之也亦言夫人先在齊至練時始録之亦非也夏單伯逆王姬單音善後同逆左作送公羊傳單伯者何我大夫之命乎天子者也天子嫁女於諸侯必使諸侯同姓者主之諸侯嫁女於大夫必使大夫同姓者主之榖梁傳單伯命大夫故不名也杜氏曰王姬不稱字以王為尊且别於内女也單伯者吾之命大夫也范氏曰單姓伯字禮諸侯嵗貢士於天子天子命之使還其國為大夫者不名陸氏曰諸國大夫王賜之圻内邑為號令歸國如單伯祭仲是也逆王姬使我為之主也杜氏曰天子嫁女於諸侯使同姓諸侯主之不親婚尊卑不敵何氏曰不自為主者行婚姻之禮則傷君臣之義行君臣之禮則廢婚姻之好故必使同姓敵體者主之臨川吳氏曰王將嫁女於齊命魯主之故魯遣單伯往逆王姬於周俾先至於魯而後往歸於齊也其不言如者榖梁子以為義不可受於亰師也躬君弑於齊使之主婚姻與齊為禮其義固不可受也范氏曰魯桓見殺於齊若天子命為主則非禮大矣春秋為尊者諱故不可受之於京師此明忘親釋怨則無以立人之道矣張氏曰左傳作送王姬考之春秋之例非也况築舘在秋如單伯果以天子大夫送王姬必俟舘成之後方至魯豈得預書之當從公榖作逆常事不書而此特書之斬衰而主婚固已非禮况齊乃不可同天之讐奈何與之主婚於此見魯之君臣無復讐之心而國之三綱絶矣孫氏曰天子命莊公主讐婚而公不辭故交譏之髙氏曰王姬下嫁禮雖不傳而以義推之諸侯固當躬至亰師天子置舘命同姓之尊者行賔主之禮然後逆歸本國此亦男下女之義也今齊既不朝王又不親迎而魯之單伯反往逆之莊王不以魯之先君戕於齊命之主婚魯有大喪不因而辭之陷王於不義故不書如亰師而直書逆王姬猶曰魯自逆耳啖氏曰公羊云何以不稱使天子召而使之也按魯自使逆天子何事召之不言使省文爾劉氏曰左傳以單伯為周大夫按十四年經單伯㑹齊侯宋公衛侯鄭伯於鄄稱單伯㑹諸侯則為魯人明也猶曰叔孫豹會晉趙武楚屈建耳若單伯為周大夫應書單伯齊侯㑹于鄄不得属㑹於單伯也愚按惑於成襄昭之經書單子故云耳然周有祭伯祭叔豈可以鄭祭仲亦周大夫乎秋築王姬之舘于外穀梁傳築禮也于外非禮也主王姬者必自公門出于廟則已尊於寝則已卑為之築節矣築之外變之正也仇讐之人非所以接婚姻也衰麻非所以接弁冕也其不言齊侯之來逆不使齊侯得與吾為禮也魯於王室為懿親其主王姬亦舊矣館於國中必有常處去聲孫氏曰魯主王姬不一王姬之館國中當有常處今特築之于外者榖梁子以為仇讐之人非所以接婚姻也衰音崔麻非所以接弁冕也知其不可故特築之于外也臨川吳氏曰時公在諒闇慮齊侯親迎若以嘉服見則於心不安又不敢辭主婚之事故特築舘于外以為王姬之舎而俟齊侯之逆因其變常而書之以譏也築之于外得變之正乎曰不正有三年之喪天王於義不當使之主有不戴天之讎曲禮父之讎弗與共戴天莊公於義不可為之主築之于外之為宜不若辭而弗主之為正也是以君子貴端本焉本陸氏微㫖或曰陳氏折衷天王有命固不可辭使單伯逆于亰師上得尊周之義為去聲之築館于外下未失居喪之禮奚為不可曰以常禮言之可也今莊公有父之讎方居苫詩亷反塊此禮之大變也公羊謂築之禮也于外非禮也是常禮也杜預曰喪制未闋故異其禮是常禮之變也然不知父讐未復而與之主婚寔禮之大變不可以常禮言之也而為之主婚是廢人倫滅天理矣春秋於此事一書逆王姬再書築舘又再書者歸齊其義以復讎為重示天下後世臣子不可忘君親之意故雖築館于外不以為得禮而特書之也髙郵孫氏曰桓公見殺於齊仇讐未復天王遽使魯主王姬之婚莊公當辭期於得請而後已是時非無同姓之諸侯盖莊公未之辭爾辭之不固與不辭同知主婚之非而築舘于外孰與辭之不築也陳氏曰齊襄弑魯桓天子不能正而使魯主王姬以嫁齊則魯豈無辭乎髙氏曰夏逆而秋築舘又見前逆之為太早計矣愚按莊公是時畏齊之强不以殺父為讎方欲結齊好以為安故自主王姬之後今年㑹伐衛明年同狩又明年復㑹伐衛其讐齊之意略無㡬㣲見於舉動則非畏王命而不敢辭主婚之事寔乃畏齊而不肯辭也比事以觀而莊公忘讎之罪不可揜矣趙氏曰左氏云于外禮也與讐主婚縱在城外豈為禮乎冬十月乙亥陳侯林卒莊公也在位八年弟杵臼立是為宣公髙氏曰莊公與桓王同時王名林而公亦名林君臣同名也王使榮叔來錫桓公命此錫命之始公羊傳錫者何賜也命者何加我服世其言桓公追命也榖梁傳禮有受命無來錫命錫命非正也生服之死行之禮也生不服死追錫之不正甚矣杜氏曰榮氏叔字啖助曰不稱天王寵篡弑以瀆三綱也何氏曰禮有九錫一車馬二衣服三樂則四朱戸五納陛六虎賁七弓矢八鈇鉞九秬鬯皆所以勸善死當加善諡不當加錫桓行實惡而追錫之尤悖天道故不稱天王陳氏曰桓簒立周人不以為罪宰渠伯糾来仍叔家父又來終桓之身不能正而追錫命貶必於其重者莫重於追錫命故於是焉貶也通㫖王使聘桓者三死又追命大惡不討而恩禮加焉誰不勸於為惡春秋弑君三十六豈無自而然哉春秋書王必稱天所履者天位也所行者天道也所賞者天命也所刑者天討也今桓公弑君簒國而王不能誅反追命之孫氏曰桓弑逆之人莊王生不能討死又追錫之莊王之為天子可知也無天甚矣陸氏曰言不能法天也桓無王王無天其失非小惡也與𦵏成風引為夫人使妾並嫡無以異故其文一施之劉氏曰王者之義必純法天天道予善奪惡而無私者也今桓公簒君取國終不受命而王不能誅反追命之此無天法甚矣其失非小過小惡也與𦵏成風引之為夫人使妾並后無以異故其文一施之春秋所譏於王多矣獨至於錫桓公命􅈖𦵏成風以無天責之者王者之位至貴也至重也至大也今臣弑君妾僣嫡而王尊禮之則王義廢人倫滅矣不可以不深貶范寗乃以出居于鄭來聘求車三事為證而謂非義之所存誤矣王姬歸于齊杜氏曰不書逆公不與接魯主王姬之嫁舊矣在他公時常事不書此獨書者以歸于齊故也逆于京師築館于外而不書歸于齊則無以見其罪之在也書歸于齊而後忘親釋怨之罪著矣春秋復讐之義明矣孔氏曰成九年伯姬歸于宋宋不使卿逆非禮逆者非卿故不書此云公不與接者以公不與接雖卿亦不書也葢十一年齊侯來逆共姬經不書故也齊師遷紀郱鄑郚郱蒲丁反鄑子斯反郚音吾此書遷之始公羊傳遷者取之也外取邑不書此何以書大之也何大爾自是始滅也杜氏曰郱在東莞臨朐縣東南郚在朱虚縣東南北海都昌縣西有訾城齊欲滅紀故徙其三邑之民而取其地愚按臨朐縣今屬益都路都昌縣即今益都路濰州昌邑縣朱虚今益都路宻州郱鄑郚者紀三邑也邑不言遷遷不言師其以師遷之者見紀民猶足與守而齊人强暴用大衆以迫之為已屬也凡書遷者自是而滅矣愚按經書遷人國邑者三十年宋人遷宿閔二年齊人遷陽皆廹為已属而滅之也春秋興滅國繼絶世則遷國邑者不再貶而罪已見矣不再貶謂直書其事不必更加貶黜即公羊所謂不貶絶以見罪惡者也薛氏曰黄之盟纔二年也今又遷紀三邑强暴之無忌憚甚矣沙随程氏曰土地人民盡有之曰取逐其人有其地曰遷張氏曰廹遷三邑之民不服者取其地實以齊之民永嘉吕氏曰諸侯之國皆受之於天子其封域有定分人民有定居强者不可以力并詐者不可以誕取紀之土地人民受之於天子齊烏得而遷之哉紀之滅始于此聖人所以書師而深疾之也啖氏曰公羊云曷為不言取為襄公諱也按取人邑非善事若為之諱是掩惡也榖梁云紀國也郱鄑郚國也或曰遷紀於郱鄑郚按下有紀侯大去其國明此時未遷故知是紀之三邑劉氏曰齊一師必不能並遷兩國取郜取防猶分別言之况兩國乎已莊王丑五年二年齊襄六晉緡十三衛惠八黔牟四蔡哀三鄭厲九子儀二曹莊十陳宣公杵臼元年杞靖十二宋莊十八卒秦武六楚武四十九春王二月𦵏陳莊公夏公子慶父帥師伐於餘丘公羊榖梁傳於餘丘邾之邑也杜氏曰莊公時年十五則慶父莊公庻兄於餘丘國名愚按今濟南路有章丘縣地接于魯疑即於餘丘故地按二傳於餘丘邾邑也臨川吳氏曰於發語辭猶曰於越國而曰伐此邑爾其曰伐何也誌慶父之得兵權也髙氏曰大其事若一國然莊公㓜年即位首以慶父主兵卒致子般之禍於餘丘法不當書聖人特書以誌亂所由為後戒也魯在春秋見弑者三君其賊未有不得魯國之兵權者公子翬再為主將去聲專㑹諸侯不出隠公之命隠四年㑹伐鄭固請而行十年先㑹齊鄭伐宋仲遂擅兵兩世入杞伐邾㑹師救鄭僖二十七年帥師入杞三十三年帥師伐邾文九年㑹救鄭三軍服其威令之日久矣故翬弑隠公而寪音委氏不能明其罪羽父使賊弑公于寪氏立桓公而討寪氏有死者慶父弑子般而成季不能遏其惡公疾問後季友曰臣以死奉般子般即位次於黨氏共仲使圉人犖賊般于黨氏公子遂殺惡及視而叔仲惠伯不能免其死襄仲欲立宣公叔仲不可仲殺惡及視以君命召惠伯殺而埋之馬矢之中夫豈一朝一夕之故哉春秋所書為戒逺矣張氏曰莊公之立寝苫枕戈莫先於率一國以同仇於不義之齊捨是而命將帥師先有事於無罪之小國兵興無名而慶父以尊属主兵使之得政以制一國之權軍政之本既失而權移於下以成異日子般閔公之禍故詳書以譏之蜀杜氏曰此大夫之専而出公子之文者盖聖人病其不能復齊之讐目之以示義猶曰為公之子而不知其君父之讐也沙随程氏曰書伐國也公榖以為邾邑盖邾附庸王氏曰於餘丘小國也盖其後属邾啖氏曰前後未有邑言伐者愚按無駭入極杜註附庸小國而賈逵以為戎邑宣九年取根牟杜注東夷國而公羊言邾婁邑然經書邑必係國如取鄟取邿取鄫即小國也切以為極於餘丘根牟皆小國耳慶父帥師不害其為得兵權伐國伐邑不必詳辨秋七月齊王姬卒公羊榖梁傳為之主者卒之也内女嫁為諸侯妻則書卒王姬何以書比内女為去聲下同之服也故檀弓曰齊告禮記告作榖王姬之喪魯莊公為之大功或曰由魯嫁故為之服姊妹之服孔氏曰周女命魯為主比之魯女故為之服出嫁姊妹之服范氏曰主其嫁則有兄弟之恩死則服之臨川吳氏曰禮經本無為王姬服之禮莊公因齊之告䘮特為之服以媚齊也夫服稱情而為之節者也莊公於齊王姬厚矣如不共戴天之念何此所謂不能三年之喪而緦小功之察也本孟子特卒王姬以著其罪薛氏曰主婚之為服自莊公始也其以說齊乎沙随程氏曰禮於舅之妻無服外祖父母纔小功耳今以世讐而厚其喪非禮也不然外夫人卒不書張氏曰莊公舎不共戴天之讐而主齊夫人之喪知有齊而不知有父其罪可謂大矣故自逆王姬至此特書屢書辭繁而不殺以正其淟汨大倫誣滅天理之罪所謂婉而成章也愚按周禮為王后齊哀觧之者曰諸侯為之不杖期固未聞主婚之女而為之服也春秋二百四十二年王后崩不見於經則當時諸侯於王后之喪禮略矣而顧為王姬之服其重在齊而不在周也或者以為尊王命過矣冬十有二月夫人姜氏㑹齊侯于禚禚諸若反公作郜左傳書姦也榖梁𫝊婦人不言㑹言㑹非正也饗甚矣杜氏曰禚齊地㑹非夫人之事顯然書之比年出㑹其義皆同夫人行不以禮故還皆不書婦人無外事本何氏注永嘉吕氏曰父母在則歸寜子葛覃稱歸寜父母是也歿則使卿寜楚庚聘于秦為夫人寕是也送迎不出門見兄弟不踰閾左僖二十二䘮大記婦人迎客送客不下堂在家從父既嫁從夫夫死從子見大戴禮本命篇今㑹齊侯于禚是莊公不能防閑其母失子道也詩猗嗟小序莊公有威儀技藝然不能以禮防閑其母失子之道故趙匡曰微㫖姜氏齊侯之惡著矣亦所以病公也曰子可以制母乎夫死從子通乎其下况於國君君者人神之主風敎之本也不能正家如正國何若莊公者哀痛以思父誠敬以事母威刑以督下車馬僕從才用反莫不俟命夫人徒往乎夫人之往也則公威命之不行哀戚之不至爾資中黄氏曰天下後世為人子而使母至於是罪之大者也髙氏曰夫人稱姓氏者貶不再也張氏曰春秋孔子之刑書也觀春秋書法如此則以孔子而當周公之任正文姜之罪必不免於管蔡之誅矣家氏曰姜氏身負弑君未討之誅甫除喪而往㑹其兄齊襄方有王姬伉儷之戚未踰時而出淫其妹此天下之大惡覆載之所不容聖人為是故於春秋聮書之比而誅之也愚按春秋之末公父文伯之母䦱門而與康子言皆不踰闕祭悼子康子與焉胙不受徹俎不宴仲尼聞之以為别於男女之禮夫以季世俗薄而敬姜獨能守禮而不違春秋備書文姜之行雖國惡不容諱其善善惡惡之心亦猶美敬姜之意乎趙氏曰榖梁云婦人既嫁不踰境若然則父母存豈得絶其歸寜乎又未嫁之女孀居之婦豈得踰境乎乙酉宋公馮卒馮皮氷反莊公也在位十八年子㨗嗣是為閔公髙氏曰觀宋莊忮求敗類則穆公之不以國與子有以知之矣庚莊王寅六年三年齊襄七晉緡十四衛惠九黔牟五蔡哀四鄭厲十子儀三曹莊十一陳宣二杞靖十三宋閔公㨗元年秦武七楚武五十春王正月溺㑹齊師伐衛左傳疾之也榖梁子曰此公子溺也其不稱公子何也惡去聲其㑹仇讐伐同姓故貶而名之也范氏曰齊受天子罪人為之興師而魯與同故貶有父之讎而釋怨其罪大矣况與合黨興師伐人國乎髙氏曰衛朔奔齊齊欲納之然天王乃絶朔而立公子黔牟為衛侯魯輒興兵㑹仇讐之人抗天子之命納不義之君其罪大矣薛氏曰大讐不報而又與之出師舎其田而芸人之田莊公之謂矣溺不書帥師所將之兵少也家氏曰或謂衛朔在齊此㑹齊納朔非成父志乎夫納朔者父惡也不能復父之讎而成父之惡滋不孝也資中黄氏曰溺貶而去族非未賜氏之比蜀杜氏曰慶父專兵不待貶而惡自見溺去族明其惡甚於慶父夏四月葬宋莊公五月𦵏桓王左氏曰緩也杜氏曰以桓十五年崩七年乃𦵏天子七月而𦵏同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至左傳隠元王崩至是盖七年矣先儒或言天子不忘𦵏榖梁天子志崩不志𦵏必其時也舉天下而𦵏一人其義不疑也又以為不言𦵏者常也劉氏意林公親㑹之不書𦵏常事也不親㑹之則書𦵏非常也夫事孰有大於𦵏天子者而可以不志乎死生終始之際人道之大變豈以是為常事而不書也髙氏曰平王崩求賻於諸侯然後克𦵏桓崩七年乃克𦵏者盖承諸侯背叛王師傷敗之後力益不足矣夫以天下而𦵏一人安可緩也聖人書之以著天下臣子之罪若曰改𦵏則聖人明書之矣莊王以後王室益弱無有以緩𦵏書者而有速𦵏者抑以禮滋畧歟薛氏曰七年而𦵏閔王室之無臣子也沙随程氏曰周人東遷之初尚有志於歸𦵏已而侵削益甚故於此始𦵏張氏曰魯遣㣲者往㑹故不書公如又不書卿大夫往而止記桓王之𦵏也同軌畢至之禮既不復行于是諸侯惡其害己而去其籍先王之喪禮僅傳於後世惟士喪既夕士虞耳可勝惜哉陳氏曰㑹𦵏不書其人慢也文公使公子遂𦵏晉侯叔孫得臣𦵏襄王是均周晉也昭公使叔公𦵏宋公滕侯叔鞅𦵏景王是均周宋􅅬也均猶可也晉景公卒成公弔喪而定王不𦵏楚康王卒襄公送𦵏而靈王不𦵏不臣於周而詘於晉楚春秋諱之是故春秋不徒志𦵏也劉氏曰公榖以謂改𦵏非也若誠改𦵏應如改卜之類而書改矣世衰禮廢何事不有豈能必桓王前已𦵏哉秋紀季以􅈶入于齊􅈶户圭反左傳紀於是乎始判公羊𫝊紀季紀侯之弟也魯子曰請後五廟以存姑姊妹穀梁傳􅈶紀之邑也入于齊者以􅈶事齊也杜氏曰齊欲滅紀故季以邑入齊為附庸先祀不廢故書字貴之􅈶紀邑在齊國東安平縣鄭氏曰博州愚按今東昌路尃平縣大夫不得用地公子不當去國盗地以下敵棄君以避患見繁露玉英篇非人臣也陸氏微㫖故春秋之義私逃者必書奔若邾庻其莒牟夷有罪者必加貶若陳侯弟招今季不書奔則非竊地也不書名則非貶也諸侯兄弟貶則書名宋辰秦鍼其亷反之類是也不貶則書字蔡季許叔之類是也紀季所以不書奔者有紀侯之命矣董子曰紀季受命於君陸氏曰紀季以君之邑入於他國不書曰叛以有兄之命也所以不書名者天下無道强衆相陵天子不能正方伯不能伐屈已事齊請後五廟其亦不得已而為之者非其罪也所以無貶乎劉氏曰紀季見齊之必將滅紀故請先下齊以退敵兵以安君存國之故折地事讐援存亡繼絶之義使宗廟血食後嗣復見叔姬歸􅈶是也可謂明于權矣入云者難詞也何氏曰入者難詞陳氏曰紀侯在而季以􅈶入齊若以邑叛其稱字紀侯意也齊襄自桓始年挾鄭以圖紀黄之㑹魯為之求成不得免焉遷郱鄑郚紀之不絶也如綫季以􅈶入齊紀於是乎始判是分國以與之也齊人所欲者吾土地茍可以免紀者無不為也是紀侯意也是故稱字不稱字則疑於宋魚石邾庻其張氏曰王政不行伯者未作强大吞并無故肆行小國不能校巽辭下敵以存宗祀以先王之建國而聼命於强暴春秋所以於季無譏焉書入以志其難盖閔之也髙氏曰紀侯自度滅亡歸季姜於亰師而天王終不能正求援於魯而鄰國卒莫能救與其殘民絶祀孰若使季以􅈶為附庸以事齊庻宗祀之不滅也此從權紓禍不得已之甚槩以王法則擅以天子封邑入於齊齊納人之封邑均有罪故書以書入以示義析地以去國降志以事仇非季之心也以宗國為寄矣聖人恕季而重罪齊侯也趙氏曰公羊云何不以名賢也此乃紀侯之命且不得已而然何足為賢哉劉氏曰榖梁云入者内弗受也非也此自往入之入而非歸入之入若可受者遂云歸於齊乎冬公次于滑滑公榖作郎左傳將㑹鄭伯謀紀故也鄭伯辭以難凡師一宿為舎再宿為信過信為次公羊傳刺欲救紀而後不能也杜氏曰滑鄭地在陳留襄邑縣西北愚按襄邑縣今属汴梁路睢州榖梁子曰次止也趙氏曰師駐曰次有畏也欲救紀而不能也臨川吳氏曰紀將亡矣以婚姻之故告急於魯魯莊不能自己故出次於滑將㑹鄭伯為紀謀而祈哀乞憐於齊鄭伯知齊之滅紀不可止也故辭而不㑹張氏曰公欲閔紀之難而度其力終不能救故次師于滑將以鄭之不㑹而辭于紀耳非寔有救紀之心也彼於父之仇尚忘之而不圖豈真有心於存紀哉故書次見出師無名以深譏之春秋紀兵伐而書次以次為善救而書次以次為譏次于滑譏之也髙氏曰但書次若無故而自出者焉薛氏曰書次不能為輕重也魯紀有婚姻之好去聲當恤其患於齊有父之讎不共戴天茍能救紀抑齊一舉而兩善并矣罰杜氏曰莊公惕然出師儻必行之則復仇救弱之義兩存見義不為而有畏也春秋之所惡去聲故書公次于滑以譏之也或言夫子意在刺無王命若譏其怯懦則當褒其勇者春秋乃鼓亂之書見趙氏纂例為此言者誤矣易於謙之六五則曰利用侵伐程子傳五以君位之尊而執謙順以接於下衆所歸也然君道不可專尚謙亦須威武相守然後能服天下故利用侵伐師之六四則曰左次無咎同上四以柔居隂非能進而克㨗者也知不能進而退故左次旡咎見可而進知難而退師之常也可進而退乃為咎也進退勇怯顧義如何耳豈可專以勇為鼓亂而不與乎愚按春秋書兵次者十有三次于滑次于成次而欲救也師次于郎齊宋次于郎齊衛次五氏垂葭渠蒢楚蔡次厥貉次而欲伐也悉以無名紀之皆所以示譏也今考次滑之後紀侯去國即及齊狩禚次成之後齊人降鄣即及齊遇魯濟不能救紀與鄣而無憤恨之心則是莊公佯為救患之虚聲而實無志于救紀鄣也師次郎而卒有圍郕之役齊宋次郎而随有乗丘之敗齊衛三次楚蔡次厥貉而終有伐晉伐麋之舉是其所以次者非有悔禍班師之謀乃稔惡伺便之階也救者不書其救譏其實不能救伐者遂書伐圍者遂書圍戰者遂書敗譏其不克悔過以遷善也若夫齊桓伐楚次陘晉悼伐鄭次鄫則不忍殘民其次為善如次聶北救邢次匡救徐救晉次雍榆雖曰緩於救患然比於欲救不能者亦有間矣辛莊王卯七年四年齊襄八晉緡十五衛惠十黔牟六蔡哀五鄭厲十一子儀四曹莊十二陳宣三杞靖十四宋閔二秦武八楚武五十一春王二月夫人姜氏享齊侯于祝丘享公榖作饗榖梁傳饗甚矣享齊侯所以病齊侯也杜氏曰祝丘魯地享者兩君之禮杜氏曰享食也兩君相見之禮非夫人所用郊特牲注諸侯相享獻酢禮敵所以訓共儉也左傳成十二享以訓恭儉兩君相見享于廟中禮也周禮大行人廟中將幣三享愚按天子享諸侯于廟中則諸侯相享亦當于廟中犧許宜反又息河反象不出門嘉樂不野合左傳定十㑹夾谷齊侯將享公孔丘謂梁丘據曰云云乃不果享非兩君相見又去其國而享諸侯甚矣髙氏曰禮姑姊妹已嫁而反兄弟不與同席而坐况用兩君相見之禮乎盖為名而已矣吕氏曰前此嘗㑹矣而未之享也今享矣又復如齊師矣人之為不善一縦之後如水方至莫知所極臨川吳氏曰古者飲食之禮有三享食燕也燕禮最䡖盖主於飲酒而食物不盛食禮次之食物甚盛而不飲酒享禮最重飲酒如燕禮之多食物如食禮之備雖君大夫亦無行享食燕之禮于野者况婦人乎然此不足責也家氏曰夫人前去其氏今稱姓氏者去氏以誅其逆加氏所以著其滛齊襄出而姜往㑹禽獸之無别也春秋書孫則去其族書㑹書享掲其氏姓盖示之有别亦所以討其亂倫之罪張氏曰假先王之禮為禽獸之行大亂之道也漢人有云滛亂之漸其變為簒文姜之行瀆亂周公之禮魯人習之三十餘年卒至子般閔公荐弑而後止聖人作易以閑有家為家人之始垂訓逺矣愚按周官儀禮有天子諸侯大夫饗燕之禮而春秋於晉侯享齊侯宋公享晉侯楚子享公小邾子郯子來朝公與之宴公享宰周公范宣子享晉六卿于蒲圃寗俞華耦来公與之宴皆不書於策雖鄭伯享王王享晉侯亦不書也而書夫人享齊侯則以其非禮也三月紀伯姬卒榖梁傳外夫人不卒吾女適諸侯則尊同以吾為之變卒之也范氏曰禮諸侯絶旁朞姑姊妹女子子嫁于國君者尊與已同則變不服之例為之服大功孫氏曰伯姬隠二年紀裂繻所逆者内女嫁國君則服大功常事也此卒者為下紀侯去國齊𦵏伯姬起愚按内女為諸侯夫人者七惟紀伯姬宋伯姬志卒志𦵏盖閔紀之亡褒共姬之賢而詳其本末也鄫季姬紀叔姬止書卒志其常也郯伯姬齊子叔姬不書卒被出不復其國非尊同之比也杞伯姬不書卒盖不赴也非夫人者七僖九年伯姬卒文十二年子叔姬卒許嫁稱字比於尊同者也莒慶叔姬宋蕩伯姬及婦齊髙固子叔姬則嫁大夫而不卒也若夫紀叔姬非夫人而書卒書𦵏則以其賢而特録之乃春秋之變例也夏齊侯陳侯鄭伯遇于垂蘇轍曰鄭伯子儀也桓十五年書突出奔蔡忽歸于鄭是年九月突入于櫟十七年髙渠彌弑忽立子亹音尾十八年齊襄公殺子亹鄭人立子儀莊十四年突使傅瑕殺子儀而入則遇于垂者子儀也然則鄭有二君可乎春秋有一國而二君者鄭突與儀衛衎苦旦反與剽是也突衎始終為君子儀君鄭十有四年剽君衛十有一年皆能君者也故春秋因其實而君之然則孰與曰皆不與也突之入以簒衎之出以惡儀剽雖國人所立而突衎在焉非所以為安也故四人者春秋莫適音嫡與也皆不没其實耳君子不幸而處此如子臧季札可也不如是則亂不止為此說者善矣然而鄭伯實厲公也非子儀也詳見二十一年通㫖蘇子由以鄭伯為子儀謂春秋有一國二君其說辯其理通善發春秋之意然而鄭伯實厲公終始能君故不沒其實非與之也惟不没其實故出奔入櫟㑹垂皆書其爵惟非與之也故歸鄭奔蔡入櫟皆書其名春秋於世子忽猶不書爵况子儀之㣲者乎髙氏曰或以此鄭伯為子儀非也忽世子出奔猶不得稱子其復歸猶不得稱爵子儀乗間得立其為君㣲矣豈敢輕去國都而與諸侯㑹乎故知此鄭伯即突也髙渠彌弑忽立子亹齊人殺子亹立子儀春秋皆沒而不書以突為鄭伯故也項氏曰子儀在内徒擁虚器君子以為稱鄭伯者必突也忽親先君之世子嗣位為君其在内也猶以突為鄭伯况子儀乎襄陵許氏曰齊與陳鄭遇垂盖謀取紀是以紀侯見難而去也愚按不期而㑹曰遇春秋諸侯私為之約乃用不期而㑹之禮書之所以譏之也况以三國之君相㑹亦比於不期而遇其為簡慢詭譎益可見矣紀侯大去其國左傳紀侯不能下齊以與紀季紀侯大去其國違齊難也公羊傳大去者何滅也榖梁傳紀侯賢而齊侯滅之不言滅而曰大去其國者不使小人加乎君子凡大閱大雩大蒐而謂之大者譏其僣也大無者志倉廪之竭也大去者土地人民儀章器物悉委置之而不顧也大去者如荀偃云大還婦人見絶於夫家為大歸盖凡可欲之物盡棄不顧往而不返耳或曰以爭國為小而不為以去國為大而為之者也夫守天子之土疆承先祖之祭祀義莫重焉委而去之無貶歟曰有國家者以義言之世守也非身之所能為則當效死而勿去以道言之不以其所以養人者害人亦可去而不守於斯二者顧所擇如何爾然則擬諸大音泰下同王去邠之事其可以無愧矣曰大王去邠從之者如歸市紀侯去國日以㣲滅則何大王之可擬哉劉氏曰大王之事狄也事之以珠玉犬馬皮幣猶不止然後去紀季以􅈶入齊亦紀侯之所以事齊矣猶不止然後去是以紀季無譏於前紀侯見賢於後也故聖人與其不爭而去而不與其去而不存與其不爭而去是以異於失地之君而不名不與其去而不存是故書叔姬歸􅈶而不録紀侯之卒眀其為君之末矣末㣲也通㫖問紀侯大去其國杜氏以為不反之辭榖梁以為不遺一人之辭若謂其賢則未聞其能如大王邑於岐山之下若謂其力不勝而許之去者則乖孟子效死不去之義若謂紀季能附庸於齊祭祀不絶可免紀侯之罪者則鄫世子巫係於叔孫豹而不特序諸侯吳人鄫人㑹戚而鄫降在吴下以此觀之不能自强者聖人之所不取也然則紀侯若何而可大者果其名歟曰伊川先王以大者紀侯之名罪其不能死社稷也吾恐紀侯以爭國為小而不為以去國為大而為之也紀侯為齊所逼雖其夫人在殯而不顧必不以儀章器物自随欲假諸侯之禮以為重也其賢于爭地以戰殺人盈野者逺矣故不去其爵不書其名而曰大去其國大去者猶曰大無麥禾之類有去國之名而無去國之道故聖人詳録叔姬而不志紀侯之卒堯舜禪讓湯武征誅義皆在此學者黙識心通則可耳憲問紀侯不能保其社稷出亡而不復何賢之有書紀侯去其國足矣加大字似非聖人立言之法或以大為紀侯之名書所以罪之又無可據曰大去者土地人民儀章器物悉棄之而不顧也使其弟以邑入齊請後五廟已則委國而去免民于死故不書名非賢之也以其不争而去與敗北出奔者異耳先儒有以大王之事擬之者過矣去邠邑於岐下從之者如歸市而紀侯若是班乎永嘉吕氏曰不以養人者害人委而去之可以為仁鑿池築城與民守之效死勿去可以為義今紀侯未見其有强為善之實又不能效死而弗去方之大王養人之言則不類比之孟子世守之說則有愧聖人之書大去其國非罪之也亦非許之也直傷之而已矣王氏曰紀侯去國不守則是奔也失地不反則宜名也不書其奔而曰大去不書其名而曰紀侯者所以罪齊而閔紀也陳氏曰諸侯去國恒書奔其不言奔不以奔罪加紀侯也其不罪紀侯何罪齊也遷郱鄑郚紀季以􅈶入齊猶不得免焉則有去而已矣失國如紀侯庻幾有辭焉故不以奔罪紀侯也然則何以罪齊書曰紀侯大去其國未知紀之自亡與人之亡之與曰齊侯𦵏紀伯姬則齊亡之也張氏曰自桓之五年書齊鄭如紀以至莊元年三年凡闗紀之存亡者一一備書紀侯圖存不獲困强暴之陵廹委宗廟於其弟而去之故特書大去而不曰出奔所以責强暴閔小弱而寓興滅繼絶之志於言意之表也項氏曰說文去字從大從凵凵音區二音合為去字恐春秋書紀侯去其國或是後人傳誦之訛如禮記覸字分為見間也啖氏曰榖梁云大去者不遺一人之辭言民之從者四年而後畢也若然舉國而行何名去國文義相反矣趙氏曰公羊曰為齊侯諱滅凡不絶其祀例不書滅無他義劉氏曰公羊以謂為襄公諱非也且烹哀公者王也非紀侯也紀侯有罪罪在譛人不在烹人奈何絶紀以為賢哉六月乙丑齊侯𦵏紀伯姬公羊傳外夫人不書𦵏此何以書隠之也其國亡矣徒𦵏於齊爾穀梁傳外夫人不志𦵏吾女也失國故隠而𦵏之𦵏紀伯姬不稱齊人而目其君者見音現齊襄廹逐紀侯使之去國雖其夫人在殯而不及𦵏然後襄公之罪著矣通㫖問滅國者必顯著其惡齊襄滅紀不書何也曰上書齊師遷紀郱鄑郚又書紀季以􅈶入于齊又書齊侯鄭伯遇于垂下書齊侯𦵏紀伯姬滅紀之罪著矣或曰𦵏之禮也而以為著其罪何也弑魯君滅其婚姻之國而𦵏其女是猶加刃於人以手撫之也而可以為禮乎斥言齊侯賤之也書曰齊人則疑齊之㣲者往紀㑹𦵏掲齊侯之爵則知齊襄躬造紀之國都廹逐其君而徒𦵏其夫人以示恩也或曰惡去聲其詐也本孫氏發微如紀似禮存季似義𦵏伯姬似仁惡似而非者惡莠恐其亂苖也啖氏曰内女之𦵏不書書者皆非常也陸氏曰𦵏者臣子之禮非由鄰國也齊侯并人之國而禮𦵏其妻是謂豺狼之行而為婦人之仁也髙氏曰魯實伯姬父母之國既不能救其國之亡則當往恤其喪乃畏不敢前反使齊侯假以為名聖人以此罪魯文見乎此而起義在彼也陳氏曰内女不𦵏必有故也而後書𦵏紀伯姬在殯齊取其國而𦵏伯姬於是特書𦵏不以往㑹也茍宜書𦵏雖不往㑹書之陳哀公在殯楚師滅陳輿嬖袁克𦵏之書曰𦵏陳哀公苟不宜書雖往㑹不書楚𦵏康王襄公及陳侯鄭伯許男送𦵏至於西門之外不書也逹例未足以觀春秋劉氏曰公羊以襄公為賢非也秋七月冬公及齊人狩于禚禚公榖作郜公羊傳公曷為與㣲者狩齊侯也其稱人何諱與讎狩也前此者有事矣後此者有事矣曷為獨於此焉譏擇其重者而譏焉莫重乎與讎狩也讎者無時焉可通通則為大譏不可勝譏故將壹譏而已其餘從同同榖梁子曰齊人者齊侯也其曰人何也卑公之敵所以卑公也何為卑公不復讎而怨不釋刺七賜反釋怨也薛氏曰齊侯書人隠辭也不忍公之與讐㑹獵也謂之齊人似不詳也齊人何以知其為齊之君曰㑹獵遊田之事也遊田微者則君曷為與之㑹㑹之非㣲者也父母之讎不共戴天兄弟之讎不與同國九族之讎不同鄉黨朋友之讎不同市朝見白虎通周禮地官司徒調人凡和難父之讐辟諸海外兄弟之讐辟諸千里之外從父兄弟之讐不同國君之讐視父師長之讐視兄弟主友之讐視從父兄弟今莊公與齊侯不與共戴天則無時焉可通也公羊不可以並立乎天下范氏曰讐者無時而可與通而與之狩是忘親釋怨非人子矣夫狩者馳騁田獵其為樂音洛下主乎已何氏曰狩者上所以共承宗廟下所以敎習兵行義一為乾音干豆之事上主乎宗廟公榖曰乾豆何氏曰一者第一殺也自左膘射之逹於右髃中心死疾鮮絜故乾於豆之中薦於宗廟以為有人心者宜於此焉變矣故齊侯稱人而魯公書及以著其罪王氏曰公及之狩志在公也髙氏曰齊人齊侯貶人也齊侯自元年以来見經者數矣前欲著其宣滛而無忌憚不可云齊人因與公狩始得一貶也狩以奉祭祀與人共之且不可况其親之讐乎不沒公而書及以深罪之臨川吳氏曰於本國而非狩地且譏况越境而與讐人狩於彼國之地乎莊公於是乎無羞惡之心矣愚按公羊記柯之盟將㑹公謂曹子曰寡人之生則不若死矣自傷與齊為讐不能復也然則禚之狩盍亦興念及此以為行止之可否耶壬莊王辰八年五年齊襄九晉緡十六衛惠十一黔牟七蔡哀六鄭厲十二子儀五曹莊十三陳宣四杞靖十五宋閔三秦武九楚文王熊貲元年春王正月夏夫人姜氏如齊師榖梁傳師而曰如衆也師者衆多之地按齊詩載驅刺襄公無禮義盛其車服疾驅於通道大都與文姜滛之詩也據小序其三章曰汶水湯湯失章反行人彭彭必亡反魯道有蕩齊子翺翔彭彭者多貌也朱子傳魯道適魯之道也蕩平易也齊子謂文姜彭彭多貌言行人之多以見其無耻也其四章曰汶水滔滔行人儦儦衣驕反魯道有蕩齊子遊遨儦儦者衆貌也同上儦儦衆貌遊遨猶翺翔言無忌憚羞愧之意曰㑹曰享猶為之名也至是如齊師羞惡去聲之心亡矣夫人之行去聲不可復扶又反制矣春秋書此以戒後世謹禮於㣲廬患於早之意也孫氏曰直曰如齊師不為㑹禮也髙氏曰不言地者師之次止無常也王氏曰齊侯數出㑹滛以其無名乃興師而出託以侵伐之事文姜於是㑹之前此㑹禚享祝丘皆歴日而返故書月至此歴月而返故止書時愚按載驅詩云載驅薄薄簟茀朱鄁四驪濟濟垂轡濔濔言齊襄車馬之盛然敝笱詩云齊子歸止其從如雲如雨如水則文姜從者之衆多又可知矣詩人詠嘆其多且盛而譏刺之意不可掩矣秋郳黎來來朝郳公作倪黎左作犂左傳名未王命也公羊傳其名何㣲國也榖梁傳郳國也黎來㣲國之君未爵命者也杜氏曰附庸國其後數從齊桓以尊周室王命以為小邾子東海昌慮縣東北有郳城鄭氏曰在沂州愚按今益都路沂州有古郳城郳國也黎來名也國何以名外域之附庸也薛氏曰其名何夷也中國附庸例書字邾儀父蕭叔是也外域附庸例書名郳黎來介葛盧是也能脩朝禮故特書曰朝公羊介葛盧不能朝故不言朝其後王命以為小邾子盖於此已能自進於禮矣常山劉氏曰外域附庸例書名黎來能修朝禮故書曰朝盖於此已能自進於禮也髙氏曰子服景伯云蠻夷邾莒則郳又其陋者也而能自進於禮當時齊魯宋衛以列國為天下望而且以敗亂自外於禮盖有愧於黎来矣故書黎来之朝相形於中以示譏焉張氏曰按宋仲幾云􅅬薛郳吾役也則郳盖宋之附庸非外域也而不得與邾儀父同稱字者臨江劉氏以為未成國謂之郳其或然歟王氏曰郳邾之別而以名見者春秋繁露曰附庸字者方三十里名者方二十里郳國小故與介同稱郳猶有禮介又不可以語此故介止言來而郳則兼曰朝冬公㑹齊人宋人陳人蔡人伐衛左傳納惠公也程子傳諸國稱人違抗王命也貶諸侯則魯在其中矣榖梁子曰是齊侯宋公也其曰人何也人諸侯所以人公也其人公何也逆王命也王氏曰不言公則若内之㣲者亦不足以見四國稱人之為君也愚按成二年蜀之盟人諸國之大夫亦所以人公也文九年救鄭人趙盾華孔亦所以人公子遂也桓公十六年衛侯朔出奔齊經書其名者以王命絶之也又黨有罪以納之故貶而書人臨川吳氏曰三年齊師㑹魯伐衛以納朔而不克納故今又㑹四國之兵以納之也陳氏曰不言納者以朔入為重也入不言納是故伐鄭納突伐衛納朔書入而已矣愚按傳稱伐衛逆王命公榖皆云朔得罪于天子其事雖不可考然下書王人救衛而左氏云朔之入也放黔牟于周則為逆王命無疑也趙氏曰公羊云不言納朔避王也據諸侯之心實不避王而經文為之隠避是黨罪人也若以為王諱則王室亂猶不諱豈諱此哉癸莊王已九年六年齊襄十晉緡十七衛惠十二黔牟八蔡哀七鄭厲十三子儀六曹莊十四陳宣五杞靖十六宋閔四秦武十楚文二春王正月正月公榖作三月王人子突救衛書救始此公羊傳王人者何㣲者也子突者何貴也榖梁傳王人卑者也稱名貴之也善救衛也救者善則伐者不正矣程子傳王人㣲者例不書字子突救衛而字之善之也善子突則善王命也王人㣲者杜氏曰王之㣲官也子突其字也以下士之㣲超從大夫之例而書字者隠元𫝊王朝大夫書字下士書人褒救衛也徐乾曰當直稱王人而已今以其奉天子之命救衛而拒諸侯故貴之朔䧟其兄使至於死罪固大矣然其父所立諸侯莫得而治也王治其舊惡而廢之可也又藉諸侯之力抗王命以入國是故四國之君貶而稱人王人之㣲嘉而書字孫氏曰王人㣲者而稱字尊王命也尊王命所以重諸侯之惡也劉氏曰古者字有曰伯仲叔季者有曰某父者有曰子某者唯其所稱而稱之子突討則不能服救則不能定春秋曷為貴之曰天下無道賤奪貴少凌長天子不能禁者凡以紀綱失而賞罰不明也幸而發憤赫然以誅衛為事而諸侯成同類黨同行沮逆天子之命前雖貶之稱人未足以效王所為之是也故復託正於子突子突正則王正矣張氏曰救衛者奉天王之命以存黔牟而拒朔也朔搆兄簒國天討之所當加而子突能奉王命以救之春秋一經王旅之出而合司馬九伐之法者惟此一事所以雖㣲者帥師而書字以褒之也家氏曰諸侯有國雖受之於父而其父若祖實受之於王故諸侯世子之立必誓於王或無嫡嗣以庻子為嗣亦必王命之而後得繼承於其國朔以麀聚之孽譛殺其兄而簒居其位旋為國人所逐二傳謂朔實得罪於王以奔黔牟之立甞請命于王而王許之立矣今五國悖義亂常王所與則伐之王所黜則輔之卒敗王師而納朔于衛放黔牟於周是之謂逆明王在上五國之君皆當誅也春秋人五國而尊王人所以明君臣之分而正五國無王之戮而衛朔之罪亦無所逃於斧鉞之下矣或曰子突王之子弟也用兵大事而委諸子弟使無成功故書人以譏之何氏注王遣貴子突卒不能救遂為天下笑故為王諱使若遣㣲者必若此言是春秋以成敗論去聲事而不計理也使諸侯茍顧逆順之理子突雖㣲自足以申王命矣彼既肆行莫之顧也雖天子親臨將有請從如祝聃者桓五年王以諸侯伐鄭鄭伯禦之王卒大敗祝聃射王中肩王亦能軍祝聃請從之况其下乎子突不勝五國使之得入也其亦不幸焉爾矣幸不幸命也守義循理者法也君子行法以俟命朱子注法者天理之當然君子行之而吉凶禍福有所不計故其褒貶如此愚按春秋書救二十有三此年子突救衛乃王室之救患而討不正也一經之最善者也二十八年救鄭閔元年僖元年救邢六年救許十五年救徐宣元年救陳九年救鄭成六年七年救鄭襄五年救陳皆所以著伯主之救中國而拒僣亂也楚人救衛楚公子貞救鄭則罪中國伯主之凌暴而蠻夷反能救之也師救齊鄭駟𢎞救曹則傷中國無伯而鄰國能相救也叔孫豹救晉則傷伯國之見伐而救在望國也狄救齊吴救陳則傷中國之不能救而救在外域也文九年救鄭書人則譏其不及楚師也衛孔逹救陳書人則譏其背盟也遂救許則美其救患之亟也次聶北次匡則譏其救患之怠也次雍榆與救成至遇則譏其救患之怯也伐楚以救江譏其救患之非道救台遂入鄆譏其專權而遷怒也啖氏曰救者救其患難凡救患皆為美也考其書法之不同則輕重之權衡見矣王人子突救衛為書救之始吳救陳為春秋之終世變又可知矣夏六月衛侯朔入于衛左傳衛侯入放公子黔牟於周放寗跪于秦殺左公子洩右公子職公羊傳朔何以名犯命也其言入何簒辭也穀梁傳入者内弗受也何用弗受也為以王命絶之也朔之名惡也朔入逆則出順矣朔出入名以王命絶之也程子曰朔搆其兄而使至于死其罪大矣然父立之諸侯莫得而治也王治其舊惡而廢之宜也故書名書入秋公至自伐衛穀梁傳惡事不致此其致何也不致則無用見公之惡事之成也入有二義一難詞也一逆詞也朔藉諸侯之力連五國之師距與拒同王官之㣲者以復歸于衛其勢宜無難矣而書入者逆王命也通㫖問五國助朔伐衛王人子突救之是王已絶朔矣何以復書衛侯朔入乎曰書爵以見其父與五國之罪矣下書其名王法已著劉氏曰朔故甞有國矣入而不言復者不與復之意也為諸侯受之君君所不命而自取之雖有鄰國之助大亂之道也為此乃非所以復也陳氏曰歸君未有不言復者衛侯鄭曹伯襄衛侯衎皆稱復歸不言復者未得國也故鄭伯入櫟衛侯入夷儀不言復非末得國也不言復如蔡侯廬陳侯吳則非奔君也朔奔君也其不言復何朔害伋夀而後立衛人為之賦二子乗舟孔子取焉則其罪宜廢又拒天子之師故入而不言復也春秋大義在於天下為公選賢與能而不拘大人世及之禮本禮運雖以正取國未之貴也况殺其兄又逆王命乎故衛朔書名書入以著其惡王人書字書救以著其善外則諸侯書人内則莊公書至而春秋之情見矣張氏曰名之又書入與鄭伯突同簒逆之罪書至盖公至自唐之意王誅若行齊魯宋衛皆當誅故書至以危之也家氏曰出而至必告于廟禮也今公之是行輔朔之簒而納之于衛又敗王師以歸一舉而二罪從之將何辭以告書至自伐衛不與其至也臨川吳氏曰莊之出十有九其至者五譏也不致者十有四常事不書愚按去年冬伐衛今年秋始至師出經年黷武以抗王師考其時而惡自著劉氏曰公羊云得意致㑹不得意致伐詭亂不經非凡例之體左氏云君子以二公子之立黔牟為不度非也王人救衛春秋貴之則是黔牟王所欲立也簒王所立朔則有罪今朔不見貶而黔牟蒙惡豈春秋意哉螟杜氏曰為災冬齊人來歸衛俘俘公榖作寳左傳齊人來歸衛寳文姜請之也榖梁傳以齊首之分惡於齊也使之如下齊而來我然惡戰則殺矣俘者二傳以為寳按商書稱遂伐三朡祖叢反俘厥寳玉見亡書小序三朡國名則俘者正文也寳者釋辭也本齊氏㫖要說文俘軍所獲也孔氏注俘取也王氏注俘者虜其軍實也寳者所得重器也俘當即獻之齊人歴秋冬而後歸知其必寳器也言齊歸衛寳則知四國皆受朔之賂矣朔入而後歸俘則知非得於黔牟者而取之於朔矣春秋特書此事結正諸侯之罪也夫以弟弑兄臣弑君簒居其位上逆天王之命人理所不容矣彼諸侯者豈其弗察而援于眷反之甚力則未有以驗其䘮去聲心失志迷惑之端也及書齊人歸寳然後知其有欲貨之心而後動於惡也世衰道㣲暴行去聲交作徇于貨寳賄賂公行使君臣父子兄弟終去仁義懐利以相與不至於簒弑奪攘則不厭也本孟子春秋書此結正諸侯之罪垂戒明矣通㫖歸衛寳小事也春秋何以存而不削古之君人者以賤貨貴德為先也孫氏曰此衛寳也其言齊人歸之者齊本主兵伐衛故衛寳先入于齊髙氏曰朔之奔齊侯容之其入也齊侯連諸侯納之故以寳賂齊而齊以分於三國焉故主齊言之而曰来歸衛寳則同黨之罪各有所歸而齊為首惡家氏曰桓莊二公皆黨簒逆以要厚賂宋之鼎衛之寳其事之尤著者也啖氏曰公羊云是衛人歸之稱齊人者讓於我也按例無有改其事實而為義者何煩曲說孔氏正義三家經傳有六其五皆言寳按說文保從人省聲古文􅱱不省然則古字通用寳或􅱱字與俘相似故誤作俘耳甲莊王午十年七年齊襄十一晉緡十八衛惠十三蔡哀八鄭厲十四子儀七曹莊十五陳宣六杞靖十七宋閔五秦武十一楚文三春夫人姜氏㑹齊侯于防左傳齊志也榖梁傳婦人不㑹㑹非正也杜氏曰防魯地文姜數與齊侯㑹至齊地則姦發夫人至魯地則齊侯之志夏四月辛夘夜恒星不見夜中星隕如雨辛夘夜榖夜作昔見音現隕于閔反公作霣凡隕字後同左傳恒星不見夜明也公羊傳恒星列星也如雨者非雨也何以書記異也榖梁傳恒星經星也杜氏曰辛卯四月五日月光尚㣲盖時無雲日光不以昏没恒星不見而云夜中者以水漏知之恒星者列星也如雨者言衆也啖氏曰星隕如雨謂奔流者衆如雨之多李陵云謀臣如雨皆言多爾孫氏曰恒星星之常見者常見而不見此異之大者也隕墜也如雨言隕墜者衆也臨川吳氏曰恒星謂有名之經星星謂無名之衆星夜無日光則暗而星見晝有日光則明而星不見恒星不見者夜明如晝故也大星之恒見者不見則小星之無名者亦無也隕謂自天而隕沒於半空而不至地如雨言衆多不可為數也人事感於下則天變動於上前此者五國連衡旅拒王命後此者齊桓晉文更霸中國政歸盟主而王室遂虚其為法度廢絶威信凌遲之象著矣何氏曰列星天之常宿分守度周之四月夏之二月昏參伐狼注之宿當見參伐主斬艾立義狼注主持衡平也皆滅者法度廢絶威信凌遲之象漢成帝永始中亦有星隕之異前永始二年二月星隕如雨長二丈繹繹未至地滅元延元年四月有流星東南行四面如雨而五侯擅權賊莽居攝同上河平二年封王譚為平阿侯商為成都侯立為紅陽侯根為曲陽侯逢時為髙平侯五人同日封故世謂之五侯劉向言五侯驕奢僣盛並作威福撃斷自恣尚書九卿州牧郡守皆出其門平帝元始五年安漢公王莽弑帝太皇太后詔莽居攝踐祚漢法宗支掃蕩幾盡天之示人􅂋矣春秋謹於天象至矣朱氏曰日見於晝星明於夜天道常理今夜有日光常星不見此隂不隂陽不陽君不君臣不臣之應也張氏曰盖王運將終而伯統方作之祥自此堯舜禹湯文武之紀綱法度掃滅殆盡愚按經星沒而不見乃天地常經泯滅之象衆星奔流乃諸侯放恣互相凌駕之證也是時王綱廢弛列國争衡故天變應之經書星變者四此年星變以王人不能勝五國之兵而王命益不行於天下也文十四年星孛以桓文迹熄而宋齊晉之君皆有禍亂也昭十七年星孛以王朝庻孽奪正而兵刃交於王都之内也哀十三年星孛以强呉爭伯而中國諸侯皆為之服役也凡此皆變之大者而王霸衰亂之兆也劉氏曰左氏云與雨偕也非也穀梁以如雨猶言星隕且雨亦非也春秋記星隕為異耳夜中而雨何足記乎又曰著於上見於下謂之雨以言雨螽可也以言雨雪則何著於上之有又曰著於下不見於上謂之隕以言隕石可也以言星隕則何不見於上之有公羊說不修春秋曰雨星不及地尺而復若實尺而復無為不書也秋大水無麥苖公羊傳記災也榖梁傳麥苖同時也杜氏曰周之秋今五月平地出水漂熟麥及五稼之苖何氏曰苖者禾也生曰苖秀曰禾書大水畏天災也無麥苖重民命也前王莽傳民以食為命畏天災重民命見音現王者之心矣忽天災而不懼輕民命而不圗國之亡無日矣春秋所以謹之也張氏曰書大水為異非常也盖文姜宣滛隂盛不制之所感也周之秋今五月麥熟苖將秀因水漂盡故麥與苖俱無民食乏絶有國之大事故書蜀杜氏曰洪範八政食為之先一穀不登禮謂之歉莊公不徳屢致災異此年大水麥苖見害聖人録之以示憂民之教俾後世人君以重民命為心也劉氏曰左氏云不害嘉榖也無麥苖矣猶謂不害嘉榖妄也聖人為記災而書耳言不害嘉榖何益於教乎公羊云曷為先言麥而後言苖一災不書待無麥然後書無苖非也若一災不書豈愛民之謂乎審如待無麥乃書無苖則何不曰無苖麥乎冬夫人姜氏㑹齊侯于榖穀梁傳婦人不㑹㑹非正也杜氏曰榖齊地濟北榖城縣張氏曰今鄆州東阿縣愚按今東平路陽榖縣防魯地也榖齊地也初㑹于禚次享于祝丘又次如齊師又一嵗而再㑹焉其為惡益逺矣明年無知弑諸兒其禍淫之明騐也張氏曰文姜元年以罪孫于齊後復宣淫自二年至今詳書于䇿敝笱載驅録於齊風論其時世與衛之鶉之奔奔墻有茨諸篇皆一時之事魯衛先王之後婦行放逸同播其惡於萬民夫子曰魯衛之政兄弟也盖不特周公康叔之盛而其世衰俗薄末政之凌夷亦相似也其後慶父亂魯齊幾取之與衛滅同時聖人以魯事詳于春秋而齊詩及魯事者不刪夫二南之風后妃不待閑而徳足以化天下後世閑有家之道廢而亡國敗家之禍同一軌轍詩春秋之㫖盖相表裏也愚按齊詩南山載驅刺襄公而皆曰魯道有蕩不一言之深責魯莊不能防閑其母猗嗟稱魯莊威儀技藝之美無所不至若曰獨少此耳聖人於春秋一則曰夫人姜氏㑹齊侯二則曰夫人姜氏㑹齊侯雖國惡有不容諱其垂戒豈不逺哉乙莊王十未一年八年齊襄十二弑晉緡十九衛惠十四蔡哀九鄭厲十五子儀八曹莊十六陳宣七杞靖十八宋閔六秦武十二楚文四春王正月師次于郎以俟陳人蔡人公羊傳次不言俟其言俟何託不得已也穀梁傳次止也俟待也用大衆曰師次止也伐而次者有整兵慎戰之意其次善之也遂伐楚次于陘音刑僖四是也救而次者有緩師畏敵之意其次譏之也次于匡僖十五于聶北僖元于雍于用反榆襄二十三是也聶北于匡緩師而怠于救患雍榆畏敵而怯于救患俟而次者有無名妄動之意次于郎以俟陳人蔡人是也趙氏曰師駐曰次惡興師也無㓂而次是欲自為㓂也陸氏曰非奉王伯之命以討罪救亂則不當興之惡其興師無名故書次張氏曰不由王命妄興師衆乆次于外無名而動㑹期莫應故書師次又書俟以深責之何俟乎陳蔡或曰陳蔡將過我俟而邀之也范氏曰時陳蔡欲伐魯故出師以待之或曰魯將與陳蔡有事於鄰國而陳蔡不至故次于郎以待之也杜氏曰期共伐郕陳蔡不至故駐師於郎以待之若是皆非義矣其曰次曰以俟者深貶之也陳氏曰此吾君將也何以稱師莊之㑹齊皆譏也莫甚於及圍郕是故一貶之師行不言次必久而無功也而後言次吾師嘗乆外矣而莊公特書次以莊之不竸於齊也俟陳蔡不至及齊圍郕郕降於齊師以正月治兵及秋而還斯可以言次矣愚按十二公惟莊公書次者三昭公書次者三莊公忘親釋怨欲救紀與鄣而不能俟陳蔡不至而遂及齊圍郕昭公失國而祈哀乞憐於齊晉卒至客死皆惡之大者故書以示戒是以他公之次皆不書甲午治兵治公作祠公羊傳出曰祠兵入曰振旅皆習戰也何言乎祠兵為久也穀梁傳出曰治兵習戰也入曰振旅習戰也治兵而陳蔡不至矣兵事以嚴終此治兵于郎也俟而不至暴歩木反師露衆役乆不用則有失伍離次逃亡潰散之虞故復扶又反申明軍法以整齊之其志非善之也譏黷武也孫氏曰先書師次于郎以俟陳人蔡人後言甲午治兵惡内不知戰也張氏曰乆次于外而所俟者不至衆心不一故申明約束以訓齊其衆而不知出不以律已失治兵之本矣雖欲治之其將能乎書曰治兵治者不治者也愚按周禮大司馬因秋獮治兵以教戰公穀皆言出而治兵故楚將用師于中國則子文治兵於暌子玉治兵於蒍子庚治兵于汾今莊公不以仲秋田狩而教戰又不治兵於出兵之時而治兵於次郎之後皆非禮也盖莊公之治兵非預備不虞之意實乆役不得已而治之爾大閱治兵皆一經之特筆而桓公有所畏而大閱非其時莊公有所俟而治兵非其地故皆特書以示貶不然常事不書劉氏曰左氏云治兵於廟禮也非也以春治兵非其時何以為禮乎廟中非治兵之地若師之出先謀于廟是則可耳於是焉習號令鐘鼓丁寜旌旗不乃太瀆乎榖梁意謂春秋多之亦非也先出兵而後治治又非其常地故記其非常爾春秋非教戰之書豈貴其善戰而不戰也夏師及齊師圍郕郕降于齊師郕公作成降户江反書及齊師者親仇讎也圍郕者伐同姓也郕降于齊師者見伐國無義而不能服也於是莊公之惡著矣張氏曰書及内之志也魯與郕皆文王之昭盖同姓兄弟之當親者莊公忘親而志于取郕始俟陳蔡而陳蔡不来然後要齊以圍之所以郕不服魯而降于齊春秋直書以見其從讎而貪利資人以虐小二國同役而不同心敵遂得以間之魯師之出大無功也故略公而書師以著其輕用民力之罪臨川吳氏曰郕畏齊而不畏魯故齊魯同圍而郕獨降齊也劉氏曰公羊以謂成者盛也諱滅同姓也不言降吾師辟之也非也實共圍盛改謂之成實滅其國改謂之降實降于魯又獨言齊皆非聖人之文也聖人諱國惡如改白為黒亦不可傳世矣榖梁云不使齊師加威於郕故使若齊無武功而郕自降審如此春秋為縱失齊師之惡也秋師還還音旋後同公羊傳病之也曰師病矣曷為病之非師之罪也書師還譏役久也按左氏仲慶父請伐齊師莊公不可是國君上將去聲下同親與音預圍郕之役也然其次其及其還皆不稱公者重衆也王氏箋義公圍郕而始末稱師者刺之也春秋正例君將不稱帥師則以君為重今此不稱公又以為重衆何也輕舉大衆妄動乆役俟陳蔡而陳蔡不至圍郕而郕不服歴三時而後還則無名黷武非義害人未有如此之甚也至是師為重矣義繋於師故不書公以著勞民毒衆之罪為後戒也孟子民為貴春秋於王道輕重之權衡此類是矣孫氏曰春秋用師多矣未有言師還惡其與强讐伐同姓師踰時方還李氏曰師還何幸之也何幸乎師之還公欲取郕而力不足藉力於齊而齊取之以夏降郕及秋而反公謀撃齊而遂不果故遲遲也莊公忘國之大耻滅同姓親讐敵暴師之乆幾以不忍致殆書之危辭也陳氏曰書次書俟書治兵書還皆特筆也内書師莫詳於此也張氏曰春秋書魯用師未有如是之詳者盖莊公此年之師尤為非義無故次郎可謂無名甲午治兵可謂黷武圍郕而郕降齊可謂無功歴三時而師還可謂害民夫逆天道親仇讐圍同姓勦民力與國不信伐國不服故聖人備書之以見其惡愚按莊公之伐衛納朔與僖公之侵蔡伐鄭圍新城成公之如亰師伐秦定公之㑹召陵侵楚皆歴三時而始返皆不書師還考其時而乆役黷武之罪自見獨此年無名興戎師出無功春秋沒公不書以深貶之茍不書師還則不見其乆役大衆之惡故備書始末結正莊公之罪也况諸公之出師皆逼於伯者之令惟莊公二役貪利務得至于乆煩民而不顧訹於衛寳之賂而幾有降郕之隙所謂于惡之中又有惡焉者莊之謂矣趙氏曰左氏云君子是以善魯莊公勞師㑹讐何善之有且齊强魯弱自當不敢爭也劉氏曰公羊曰善辭也又曰病之也然則理實貶之何言善之乎穀梁曰還者事未畢也遯也云欲避滅同姓之國示不卒事非也郕雖降齊國實未滅向云不使齊師加威於郕獨齊師耳豈可謂魯滅同姓哉冬十有一月癸未齊無知左傳僖公之母弟曰夷仲年生公孫無知有寵于僖公衣服禮秩如適襄公絀之無知曷為不稱公孫而以國氏罪僖公也弑君者無知於僖公何罪乎不以公孫之道待無知使恃寵而當國也按無知者夷仲年之子年者僖公母弟也私其同母異於他弟施以豉反及其子衣服禮秩如嫡此亂本也故於年之来聘特以弟書隠七桓三於無知之弑不稱公孫著其有寵而當國也垂戒之義明矣古者親親與尊賢並行而不相悖中庸仁者人也親親為大義者宜也尊賢為大故堯親九族必先明峻德而後九族睦見堯典周封同姓必庸康叔蔡仲而後王室强周大封同姓然必誅管蔡之亂而用康叔蔡仲之賢也徒知寵愛親屬而不急於尊賢使為儀表以明親親之道必有簒弑之禍矣陳氏曰弑君者連稱管至父而專罪無知者君弑而無知受之則賊不在二子矣張氏曰不書氏與翬州吁同例舉於此後皆稱氏從同同也劉氏曰榖梁曰大夫弑君以國氏者嫌也弑而代之也非也宋萬豈亦弑而代之者乎公子商人豈非弑而代之乎愚按文定謂州吁不氏責衛莊不待以公子之道無知不氏責齊僖不待以公孫之道斯亦一義然督萬亦以國氏盖隠桓莊之春秋凡賊皆名之大義既明於初其後皆以氏稱張氏之言乃程子之意也弑其君諸兒左傅齊侯使連稱管至父戍葵丘請代弗許故二人因無知以作亂齊侯田於貝丘反賊遂弑之而立無知愚按襄公在位十二年明年子小白立是為桓公按左氏齊侯游于姑棼扶云反遂田獵也于貝補盖反丘徒人費音秘遇賊于門先入伏公出而闘死石之紛如死于階下是能死節者也春秋重死節之臣而法有特書據孔父仇牧荀息皆特書其不見音現于經何也如費等所謂便平聲嬖私暱之臣襄二十五晏子曰君為社稷死則死之若為已死非其私暱誰敢任之逢君之惡本孟子田獵畢弋而不修民事使百姓苦之者也詩齊風盧令小序齊語桓公曰吾先君襄公築臺以為髙位田狩畢弋不聼國政注畢掩雉兎之綱弋繳射也與大臣孔父仇牧義形於色不畏强禦以身死其職則異矣公羊孔父可謂義形於色矣仇牧可謂不畏强禦矣當是時管仲隰朋鮑叔皆沉於下寮不見庸也而徒人費石之紛如乃得居左右襄公之所疎逺干願反下同親信者如此故以齊國之强大一也桓公用之則九合諸侯不以兵車由親賢人逺小人所以興也襄公用之不能保其身死於户下由親小人逺賢臣所以亡也蜀諸葛亮傳親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也此二人雖死於難去聲與自經於溝瀆而莫之知者論語猶不逮焉乃致亂之臣死不償責又何取乎愚按徒人費石之紛如孟陽死於襄公之弑賈舉州綽邴師公孫敖封具鐸父襄伊僂堙祝佗父申蒯死於莊公之弑皆不得以死節書盖近暱嬖幸之臣從君於昏而任其禍未可以死節許之也張氏曰齊襄之見弑以禍木言之則無知之亂嫡積漸於僖公之時而襄公之惡積不可揜如抗王伐衛殺魯桓公色荒禽荒暱比小人以至禍發蕭墻身殱賊手考其即位至今所書齊事無非亡國戕身之媒所謂積不善之餘殃也春秋胡傳附録纂疏卷七
