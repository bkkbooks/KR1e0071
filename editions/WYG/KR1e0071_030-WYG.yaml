body:
  text: 春秋胡傳附録纂疏卷二十八元汪克寛撰定公下辛敬王二丑十年十年晋定十二齊景四十八衛靈三十五蔡昭十九鄭聲公勝元年曹陽二陳閔二杞僖六宋景十七秦惠公元年楚昭十六呉闔廬十五春王三月及齊平杜氏曰平前八年再侵齊之怨夏公㑹齊侯景于夾谷公至自夾谷夾公穀作頰左傳公㑹齊侯于祝其實夾谷孔邱相犂彌言於齊侯曰孔邱知禮而無勇若使萊人以兵刼魯侯必得志焉齊侯從之孔邱以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不偪好扵神為不祥扵徳為愆義於人為失禮君必不然齊侯聞之遽辟之将盟齊人加扵載書曰齊師出境而不以甲車三百乗從我者有如此盟孔邱使兹无還對曰而不反我汶陽之田吾以共命者亦如之齊侯将享公孔邱謂梁邱據曰犧象不出門嘉樂不野合饗而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡夫享所以昭徳也不昭不如其已也乃不果享榖梁傳離㑹不致何為致也危之也其危奈何頰谷之㑹孔子相焉兩君就壇兩相相揖齊人鼓譟而起欲以執魯君孔子厯階而上不盡一等而視歸乎齊侯曰兩君合好夷狄之民何為來為命司馬止之齊侯逡巡而謝曰寡人之過也退而屬其二三大夫曰夫人率其君與之行古人之道二三子獨率我而入夷狄之俗何為罷㑹齊人使優施舞扵魯君之幕下孔子曰笑君者罪當死使司馬行法焉首足異門而出齊人來歸鄆讙龜隂之田盖為此也因是以見雖有文事必有武偹孔子于頰谷之㑹見之矣何氏曰致地者頰谷之㑹齊侯作侏儒之樂欲以執定公孔子曰匹夫而熒惑諸侯者誅于是誅侏儒首足異處齊侯大懼曲節從教得意故致也張氏曰夾谷魯地漢東海祝其縣有夾山今海州懐仁縣愚按懷仁縣今属淮安路海寧州夾谷之㑹孔子相息亮反下兩相同犂彌言扵齊侯曰孔邱知禮而無勇若使萊人以兵刼魯侯必得志焉齊侯從之两君就壇两相相揖齊人鼓譟素報反而起欲以執魯君孔子厯階而升不盡一等而視歸乎齊侯曰两君合好呼報反下同而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不偪彼力反好扵神為不祥扵徳為愆義扵人為失禮齊侯遽止之而屬章欲反其臣曰夫人率其君與行古人之道史孔子世家魯以君子之道輔其君二三子獨率我入夷狄之俗使寡人獲罪扵魯侯如之何晏子曰小人之謝過也以文君子之謝過也以質君已知過則謝之以質爾扵是歸鄆讙龜隂之田何氏曰齊侯歸謂晏子曰寡人獲過于魯侯如之何晏子曰君子謝過以質小人謝過以文齊嘗侵魯四邑請皆還之仲尼一言威重扵三軍亦順扵理而已矣故天下莫大扵理而强衆不與音預焉劉氏曰使魯多其車徒衆其兵革稱怨連祸以攻齊為事未必䏻得其故土地也厚其幣帛重其使介繁禮巧辭以請齊為事亦未必能得其故土地也仲尼一言爾威重于三軍利加于萬乗豈有他㦲順扵理故也天下之事常服于順而違于逆故齊雖强以其逆而奪魯雖弱以其順而得得失非强弱也在道而已不動而至不言而信不疾而速此之謂也朱子語問夾谷之㑹孔子数語何以䏻却萊人之兵曰畢竟齊常常欺魯魯常常不䏻與之争却忽然被一箇人來以禮問他他如何不動如藺相如秦王擊缶亦是秦常欺得趙過忽然被一箇人恁地硬棖他如何不動家氏曰犂彌之奸萊夷之劫使非吾聖人相禮動容貌出辭氣有以格齊人之强暴則定公㡬不獲免而魯之危甚矣其致危之也劉氏曰榖梁謂以地致危之也非也两國㑹盟致皆以地此常例爾晉定趙鞅帥師圍衛靈左傳報夷儀也反役晋人討衛之叛故曰由渉佗成何執渉佗以求成于衛衛人不許晋人殺渉佗成何奔燕㐮陵許氏曰使晋有以報齊則衛可無用兵而服也今圍衛而不能服則徒足以堅齊之從而已矣家氏曰書圍不書伐不與其伐也齊景人來歸鄆讙龜隂田田上穀有之字公羊傳齊人曷為來歸鄆誰龜隂田孔子行乎季孫三月不違齊人為是來歸之程子傳齊服義而求歸之故書來歸始失不書觧在哀八年杜氏曰三邑皆汶陽田也泰山博縣北有龜山隂田在其北也任公輔曰桓三年讙杜氏以為魯地濟北蛇丘縣有讙亭而汶水經濟北至東平須昌入濟鄆即昭公時齊取以居公者至是并以還魯二邑與龜隂俱在汶水北張氏曰龜山今泗水東北七十里愚按龜山今屬東昌路博平縣齊人前此甞歸濟子禮反西田矣後此嘗歸讙及闡矣而此獨書來歸何也曰歸者魯請而得之也曰來歸者齊人心服而歸之也杜氏曰齊人服義而歸魯田通㫖言來言歸者彼自來也不言來者請而得之耳愚按自來曰來猶來聘來朝之類齊人感天子之義而歸侵田此綏之斯來之效也定公齊侯㑹于夾谷孔子攝相息亮反事具左右司馬以從才用反至于㑹所以禮相見史孔子世家㑹于夾谷孔子攝相事曰臣聞有文事者必有武備有武事者必有文備古者諸侯出疆必其官以従請具左右司馬以㑹遇之禮相見郤裔俘拒兵車之命而罷享禮之設于野由是齊侯歸三邑以謝過故掦子法言曰仲尼用扵魯齊人章章歸其侵疆寡見篇云云魯不用真儒故也如用真儒無敵于天下桓公以義責楚而楚人求盟僖四來盟召陵夫子以禮責齊而齊人歸地皆書曰來序績也春秋夫子之筆削自序其績可乎聖人㑹人物扵一身萬象異形而同體通古今扵一息百王異世而同神扵土皆安而無所避也於我皆真而無所忘音妄也其曰天之將䘮息浪反下同斯文也後死者不得與音預扵斯文也天之未䘮斯文也匡人其如予何是以天自處矣而亦何嫌之有陳氏曰未有言來歸田者言來歸必自外至如鄭來歸祊及齊來歸衛寳是也鄆讙龜隂田言來歸以是為齊人之願也濟西言取讙闡言取鄆讙龜隂不言取以是為齊人之願則猶齊田也故從外來常文與歸衛寳同齊强于天下伐盟主合諸侯于鄟陵矣于是願歸田則以孔子相夾谷之㑹也謂春秋之諸侯不足用為善者是不即人心之論也故曰如有用我者期月而已可也髙氏曰孔子夾谷之事人可䏻也而使大國失守悔過効順所不可䏻也此修誠之至崇徳之素感于其人之天譬如干羽格有苖非任智者所䏻測也家氏曰取濟西取汶陽書取不言歸以其仗大國而得歸故書曰取歸濟西歸讙及闡歸疆也言歸不言來歸以其請之而後得非彼自以歸地惟鄆讙龜隂之歸書齊人來歸言齊人自以故疆來歸非假兵力智計而得之是之謂自歸視其他歸疆有不得同也聖人道化所感强暴為之革心有莫知其然而然者讀春秋至此可以信聖人之道不為空言儒者之學果非無實用也左氏所載兹無還之對陋矣叔孫州仇仲孫何忌帥師圍郈郈音后又卜遘反左傳初叔孫成子欲立武叔公若藐固諌曰不可成子立之而卒公南使賊射之不䏻殺公南為馬正使公若為郈宰武叔既定使郈馬正侯犯殺公若弗䏻使其圉人殺之侯犯以郈叛武叔懿子圍郈弗克杜氏曰犯以不䏻副武叔之命故叛任公輔曰東平無塩縣東南有郈鄉張氏曰在今鄆州湏城縣東愚按湏城縣今属東平路秋叔孫州仇仲孫何忌帥師圍郈郈公作費左傳二子及齊師復圍郈弗克叔孫謂郈工師駟赤曰郈非唯叔孫氏之憂社稷之患也将若之何駟赤謂侯犯曰居齊魯之際而無事必不可矣子盍求事于齊以臨民不然将叛犯從之齊使至駟赤與郈人為之宣言于郈中曰侯犯将以郈易于齊齊人将遷郈民衆兇懼駟赤謂侯犯曰衆言異矣子不如易于齊與其死也猶是郈也而将紓焉何必此齊人欲以此偪魯必倍與子地盍多施甲于子之門以備不虞犯曰諾乃多舍甲焉而請易于齊齊有司觀郈将至駟赤使周走呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯駟赤将射之侯犯止之曰謀免我犯請行許之駟赤先如宿侯犯殿每出一門郈人閉之及郭門止之曰子以叔孫氏之甲出有司若誅之羣臣懼死駟赤曰叔孫氏之甲有物吾未敢以出犯曰子止而與之數駟赤止而納魯人侯犯奔齊齊人乃致郈郈叔孫氏邑也本杜氏注侯犯以郈叛不書于䇿書圍郈則叛可知矣再書二卿帥師圍郈則强亦可知矣天子失道征伐自諸侯出而後大夫强諸侯失道征伐自大夫出而後家臣强其逆彌甚則其失彌速故自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣論語孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出云云又曰祿之去公室五世矣政建于大夫四世矣故夫三桓之子孫微矣朱子註二章疑皆定公時語三家專魯為日已久至是家臣爭叛亦其理宜矣春秋制法本忠恕施諸已而不願亦勿施諸人故所惡烏故反下同扵上不以使下所惡扵下不以事上二三子知傾公室以自張如字而不知家𨽻之擬其後也凡此類皆據事直書深切著明矣蜀杜氏曰大夫攻叛邑自夏至秋再圍以兵春秋離其文而書之不待貶而貶著也朱子語春秋之初只是諸侯抗衡後來諸侯才不奈何便被大夫專􅁠及大夫稍没奈何又被陪臣擅命如唐之藩鎮其初是節度抗衡後來牙将孔目官虞侯之属皆殺了節度亦來握􅁠夫子說禮樂征伐自天子出一章極分曉愚按魯以諸侯而僣天子三桓以大夫而專魯侯犯以家臣而叛叔孫皆上行而下效也叔孫不知改過遷善退守臣節使家𨽻感化而帥重師以圍其邑又不䏻暴明其罪討而誅之乃使犯之僚属駟赤多方為詐諼之謀誘之出走是教通國之人習為罔上之舉世失政刑矣恢詭欺誑誣偽不誠下執此以叛其上上執此以危其下雖幸勝之其可以保有國家乎宋景樂大心出奔曹陽左傳宋公使樂大心盟于晋且逆樂祁之尸辭偽有疾乃使向巢如晋盟且逆子梁之尸子明謂桐門右師出曰吾猶衰絰而子擊鍾何也左師曰䘮不在此故也既而告人曰已衰絰而生子余何故舍鍾子明闘之怒言于公曰右師将不利戴氏不肯適晋将作亂也不然無疾乃逐桐門右師髙氏曰辭使非大譴而讒言乗之罪累上矣王氏曰宋公信讒而刑罰無章固可罪矣然大心不䏻任家國之難而進退無據且挾詐以避事豈䏻自安乎故經亦直書以志其過宋景公子地出奔陳閔不地公作池後同傳見下王氏曰君雖不君臣可以不臣若地者亦驕伉矣故春秋以自奔為文冬齊侯景衛侯靈鄭聲游速㑹于安甫安甫公作鞌張氏曰安甫齊地今属鄆州平隂縣愚按平隂今属東平路家氏曰前此齊與鄭衛盟鹹盟沙矣今而三國復為此㑹無所于晋矣前此魯受命于晋而以兵加衛今而盟夾谷棄晋不復顧矣然諸侯雖叛晋而齊亦不能因諸侯之從而復霸也叔孫州仇如齊景左傳武叔聘于齊齊侯享之曰子叔孫若使郈在君之他竟寡人何知焉属與敝邑際故敢助君憂之對曰非寡君之望也所以事君封疆社稷是以敢以家𨽻勤君之執事夫不令之臣天下之所惡也君豈以為寡君賜杜氏曰謝致郈也髙氏曰夾谷之㑹歸我鄆讙龜隂田侯犯以郈奔齊齊人又致郈是以叔孫如齊謝焉宋公景之弟辰暨仲佗石彄出奔陳暨字下公穀有宋字彄苦侯反按左氏宋公子地地嬖遽富獵十一分其室而以五與之有白馬四公以與桓魋徒回反地怒抶敕乙反魋奪之魋懼將走公泣之母弟辰曰子分室以與獵也而獨卑魋亦有頗焉子為君禮不過出境君必止子地出奔陳公弗止辰為于偽反之請弗聼辰曰是我迋求狂古况二反欺也吾兄也吾以國人出君誰與處書曰宋公之弟辰暨仲佗石彄出奔陳其弟云者罪宋公以嬖魋故以失二弟無親親之㤙暨云者罪辰以兄故帥其大夫出奔無尊君之義家氏曰辰扵君為同母弟而地則衆公子也景公以嬖臣之故而奔其二弟辰以地故而自絶于君兄又率仲佗石彄與之偕行佗彄身為卿佐有君不事而與辰俱奔兄不友弟不悌臣不忠此一書而並貶也夫暨者不得已之詞公羊隐元又以見音現仲佗石彄見脅􅆄業反扵辰不能自立無大臣之節也孫氏曰佗彄為宋大臣不䏻以道事君為辰强牽而去故曰暨交譏之也若劉氏曰何休云辰言暨者明佗彄强與俱出非也然辰罪為輊何故反序上乎又何為入蕭書及乎公羊云暨猶暨暨也不得已也未知謂已不得已乎謂他人不得已乎以吾觀之則暨使他人不得已是也暨之意强也親也故曰暨暨以暨暨之故人不得已從之此可知矣壬敬王二寅十一年十有一年晋定十三齊景四十九衛靈三十六蔡昭二十鄭聲二曹陽三陳閔三杞僖七宋景十八秦惠二楚昭十七呉闔廬十六春宋公景之弟辰及仲佗石彄公子地自陳閔入于蕭以叛榖梁傳自陳陳有奉焉爾入者内弗受也以者不以者也叛直叛也辰劉氏曰榖梁云辰未失其弟也非也公子不去國而棄親出奔挾黨為亂以謂未失其弟何妄甚也夏四月秋宋樂大心自曺陽入于蕭左傳宋公母弟辰暨仲佗石彄公子地入于蕭以叛樂大心從之大為宋患寵向魋故也杜氏曰蕭宋邑出奔陳則稱暨入于蕭以叛則稱及及非不得已之詞得已而不已者也夫事君者可貧可賤可殺而不可使為亂見表記孔氏疏言事君可使之賤可使之貧可使之死但不可使為亂也亂謂廢事君之禮也今不得已而輕扵去國猶之可也得已不已而果扵叛君則無首從才用反之别筆列反其罪一施之故不稱暨而稱及劉氏曰暨非欲之也有不得已焉不得已非大臣也而况乎得已而不已者乎其出也謂之暨其入也謂之及及非不得已之言也得已而不已之說也事君者可貧可賤可殺而不可使為亂君親無将将而誅焉况據邑以伐其君者乎其罪一施之四卿在蕭以叛而大心自曺從之其叛可知矣故不書叛而曰入于蕭杜氏曰入蕭從叛人叛可知故不書叛入逆詞也書自陳自曺者結鄰國以入叛陳與曺之罪亦著矣范氏曰自陳陳以力助冬及鄭聲平叔還如鄭涖盟還音旋涖公穀作莅左傳始叛晋也杜氏曰平六年侵鄭取匡之怨魯自僖公以來出服于晋至今始叛還叔詣曽孫家氏曰自文公之霸魯常事晋中間雖即楚即齊而不敢顕然與晋絶去年及齊平今又及鄭平既背晋不得不樹黨以自固馬耳臨川呉氏曰及鄭平者我欲之故鄭卿不來盟而我卿往涖盟也陳氏曰書輸平以志諸侯之合書及鄭平以志諸侯之散此春秋之所以始終也㐮陵許氏曰夫晋之為晋自若也定亦未有他惡而諸侯離心者政在多門貨賄讒慝汨昬其間則無以令天下極扵執樂祁犂也癸敬王二夘十二年十有二年晋定十四齊景五十衛靈三十七蔡昭二十一鄭聲三曺陽四陳閔四杞僖八宋景十九秦惠三楚昭十八呉闔廬十七春薛伯定卒㐮公也在位十三年子比嗣夏葬薛㐮公髙氏曰春秋書薛卒者三葬者不日不月史文略也叔孫州仇帥師墮郈堕許規反後同衛公靈孟彄帥師伐曺陽彄苦侯反左傳衛公孟彄伐曺克郊杜氏曰彄孟縶子家氏曰此及十三年再書衛彄伐曺者著中國之無盟主也季孫斯仲孫何忌帥師墮費費音秘下同公羊傳曷為帥師堕郈堕費孔子行乎季孫三月不違曰家不藏甲邑無百雉之城于是帥師堕郈帥師堕費雉者何五板而堵五堵而雉百雉而城何氏曰八尺曰板百雉凡二萬尺周十里三十三歩二尺公侯之制也榖梁傳堕猶取也范氏曰堕非訓取當從訓毁言今但毁其城則郈費永属已若更取邑于他然按左氏仲由為季氏宰將墮三都於是叔孫氏墮郈季氏將墮費公山不狃叔孫輙帥費人襲魯公與三子入季氏之宫登武子之臺費人攻之入及公側仲尼命申句音劬須樂頎音祈下伐之費人北國人迢之敗諸姑蔑二子奔齊遂墮費杜氏曰堕毁也毁壞其城禮曰制國不過千乗䋲證反下同都城不過百雉家富不過百乗以此坊與防同民諸侯猶有叛者見坊記故家不藏甲邑無百雉之城禮所當謹也郈費成者三家之邑政在大夫三卿越禮各固其城公室欲張而不得也三桓既㣲陪臣擅命憑倚其城數色角反有叛者三家亦不能制也常山劉氏曰費也郈也成也三家之邑也政在大夫三家越禮各固其城數有叛者故三家亦不䏻制也至屢圍而不克帥師而後堕成强而不服公圍而不克有天下而不謹于禮末流之患可勝言㦲而問扵仲尼遂墮三都何氏曰郈費叔季所食邑二大夫宰吏數叛患之以問孔子孔子曰陪臣執國命采長数叛者坐邑有城池之固家有甲兵之藏故也季氏說其言而堕之是謂以禮為國可以為之兆也推而行諸魯國而凖則地方五百里凡侵小而得者必有興滅國繼絶世之義諸侯大夫各謹扵禮不以所惡烏故反下同扵上者使其下亦不以所惡扵下者事其上上下交相順而王政行矣故曰苟有用我者期音朞月而可三年有成朱子語堕邑之事孔子因其機而為之若漸漸掃除得去其勢亦自削弱可復正也又曰他合下只說得季桓子透桓子事事信之所以做得後來被公歛處父一説破了桓子便不信之髙氏曰堕邑而至于帥師是邑之力足以抗也王氏曰堕郈以一卿堕費以二卿者費强扵郈故也陳氏曰書叔孫堕郈季孫堕費以是為二家之願也三家專魯出昭公矣于是願堕其都則以孔子之相魯也謂春秋之大夫不足用為善者是不即人心之論也蘇氏曰此孔子之所以聖也孔子以覊旅之臣得政期月而䏻以治世之禮律衰世之臣堕名都出藏甲而三桓不疑其害已此有不言而信不怒而威者矣夫孔子之聖見于行事至此為無疑也張氏曰毁其所恃以為固者所以制陪臣抑私家而復强幹弱枝之勢也仲由之舉此議盖因南蒯侯犯之叛而為三家忠謀使强臣不敢恃强以叛君陪臣不䏻負固以䟦扈而上下皆順然南蒯侯犯皆以叛為季孫叔孫之害故費郈皆堕獨公歛處父方恃强以敗陽虎而孟孫用之故成獨不服雖定公圍之而卒弗克也聖人雖用于魯而季孫受女樂而違孔子孟孫惑于偽不知之說隂與公歛處父比成既方命而聖人去魯豈非天㦲永嘉吕氏曰三家之城其邑者将以自利也而家臣據邑以叛亦豈三家之利㦲南蒯叛侯犯叛公山不狃叛叛者相踵豈惟魯國惡之三家亦惡之矣孔子順天理而言之而適有動乎三家之心故其堕郈堕費者三家之自堕也成邑不堕而至于圍則孟氏之不欲堕爾夫二家聞夫子之言而堕其邑者是其天理之萌也孟氏聞公歛之言而不肯堕者是其人欲之蔽也天理之萌不足以勝其人欲之蔽然後不肯堕也使聖人得志以行乎魯國則将有不得兵革而自堕者如魯之不終用孔子何胡氏以為圍戌之後然後孔子攝相事理或然也由愚按史記家語云孔子言于定公而使季氏宰仲堕三都公羊云孔子行乎季孫告季孫而堕二邑左氏又云仲由為季氏宰将堕三都叔孫自堕後季氏将堕費費人襲魯仲尼命伐之遂堕費竊疑是時定公失政豈䏻命大夫堕邑盖孔子以禮制感化季孫且使子路為之宰而後堕之耳所紀雖不同而以為聖人過化之功則一而已或謂叔季自堕其私邑于聖人無與然昭十三年南蒯以費叛前此十年侯犯以郈叛曷不以此時堕之而必待聖人之用于魯而後堕之邪秋大雩冬十月癸亥公㑹齊侯盟于黄齊公作晋杜氏曰結叛晋也張氏曰黄齊地公羊作晋侯誤愚按隐六年盟于艾齊魯為盟之始也繼而有瓦屋之参盟于幽之同盟而齊霸遂成此盟于黄齊魯為盟之終也固叛晋之交而晋不復䏻霸矣十有一月丙寅朔日有食之公至自黄特相㑹往來稱地十有二月公圍成公至自圍成榖梁傳何以致危之也按左氏將墮成公歛力檢反處父謂孟孫曰墮成齊人必至扵北門且成孟氏之保障無成是無孟氏也子偽不知杜氏曰佯不知我將不墮書公圍成强也髙氏曰天子令行乎天下諸侯令行乎一國故天子未嘗有伐諸侯者諸侯亦未甞有伐其國之邑者以其令之則從也天下無王而諸侯擅命故有王伐鄭之事陪臣擅國而權在私家故有公圍成之事叔季既堕郈費矣将堕成而孟氏之臣不服公親圍之經書三子堕郈費而獨書公圍成著公之弱不䏻堕成也其致危之也何氏曰諸侯不親征叛邑公親圍成不䏻服不䏻以一國為家甚危若從他國來故危録之㐮陵許氏曰竟内不致致圍成者魯與之如列國矣髙氏曰春秋之始天下之亂未甚故隐公雖有㑹盟侵伐未甞致也成㐮之間晋楚争霸諸侯日尋干戈故盟㑹侵伐鮮不致焉此雖伐邑亦致可謂危亂之世矣仲由為季氏宰孔子為魯司冦而不能墮成何也按是冬公圍成不克越明年孔子由大司冦攝相息亮反事然後誅少詩照反正夘與音預聞國政三月而商賈音古信扵市男女别筆列反扵途及齊人饋女樂孔子遂行史孔子世家定公十三年十二月公圍成不克十四年孔子由大司冦行攝相事于是誅魯大夫亂政者少正夘與聞國政三月粥羔豚弗飭賈男女行者别于塗道不拾遺齊人聞而懼于是選女子好者八十人皆衣文衣舞康樂以遺魯君魯君怠于政孔子遂行然則圍成之時仲尼雖用事未能専得魯國之政也而辯言家語言偽而辯亂政如少正夘等必肆疑沮在吕反扵其間矣成雖未墮無與為比毗至反亦不能為患蘇氏曰雖其不從不䏻為患使聖人得志行乎魯國以及朞月則不持兵革而自墮矣陳氏曰初作三軍也三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉三家之强孟氏為猶有君也莫難扵堕郈費成堕易耳而公自将圍成弗克是不足與有為也先師曰叔孫武叔毁聖人者也孟懿子學于聖人者也夫子用于魯而叔孫首堕郈孟氏乃不肯堕成則聖人之道䏻行于其所難者未為喜而不得行于其所易者為可惜耳五峯胡氏曰孔子為魯司冦堕三都及成不堕三家之慮變矣故經文不言三家直書公江隂陸氏曰聖人之化既行成雖未堕于魯何有遲之朞年公歛陽情見勢屈堕之易爾定公何乃狃于速克躬駕以政之輕于一出無功而返此一役也吾知其未訪于仲尼抑季路亦未必在此行也國愚按榖梁云圍成大公也夫屈千乗之尊而親圍中之一邑其小弱甚矣乃反以為大之乎又云何危爾邉乎齊也是時㑹夾谷盟黄齊魯交好不足危也其危之者定公沮辱于陪臣以得返為幸耳甲敬王二辰十三年十有三年晋定十五齊景五十一衛靈三十八蔡昭二十二鄭聲四曺陽五陳閔五杞僖九宋景二十秦恵四楚昭十九吴闔廬十八春齊侯景衞侯靈次于垂葭凝无衞侯字葭公作暇左傳齊侯衞侯次于垂葭使師伐曹将濟河諸大夫皆曰不可邴意兹曰可説師伐河内傳必數日而後及終絳不三月不能出河則我既濟水矣乃伐河内齊侯欲與衞侯乗與之宴而駕乗廣載甲焉使告曰晋師至矣齊侯曰比君之駕也寡人請攝乃介而與之乗驅之或告曰无晋師乃止杜氏曰二君将使師伐晋次垂葭以為援垂葭一名郥氏髙平鉅野縣西南有郥亭張氏曰今属濟州愚按在今濟寕路鉅野縣髙氏曰書次垂葭與九年次五氏同夏築蛇淵囿杜氏曰書不時也愚按昭九年郎囿之築雖當水星昬正農隙之時且書于䇿以示戒况盛夏耘耔農事方殷而役民以興苑囿不待貶絶而罪著矣昔叔孫昭子曰無囿猶可無民可乎于以見魯之無人益甚也襄陵許氏曰魯政不脩而非時勤民築囿奉已而已志不及國也夫圍成不克歸而力此何振之有髙氏曰魯國之囿一而已成築鹿囿昭築郎囿㝎築蛇淵囿何囿之多也大蒐于比蒲比音毗髙氏曰囿所以獲禽獸待畋獵也築囿蛇淵今乃蒐于比蒲則囿何為㦲魯既叛晋而三桓日懼人之圗已故数蒐馬五峰胡氏曰築囿大蒐絶與堕都之意不侔聖人色斯舉矣史遷載孔子言行不淂其真者尤多義又見四年衞靈靈孟彄帥師伐曹陽髙氏曰衞比伐曹曹不叛晋故也靈公志在軍旅之事而不知以禮為國故亟戰如此秋晋定趙鞅入于晉陽以叛榖梁傳以者不以者也叛直叛也張氏曰晋陽唐曰太原府今并州愚按晋陽即太原别名按左氏趙鞅謂邯音寒鄲音丹午曰午鞅同族歸我衞貢五百家吾舍如字置也諸晉陽午許諾歸告其父兄皆不可趙孟怒遂殺午圍邯鄲午子稷及其家臣渉賓以邯郸叛上軍司馬籍秦圍之午荀寅之甥荀寅士吉射食亦反後同之姻也而相與睦遂伐趙氏鞅奔晋陽晋人圍之趙鞅之入拒范中行户郎反也而直書曰叛何也劉氏曰范氏中行氏伐趙氏之宫趙鞅奔晋陽然則鞅不叛也范中行逼之耳經何以言叛春秋原情㝎罪固如此人臣専土與君為市則是篡弑之階堅氷之戒豈無以有已之義乎家語無以有已為人子者无以惡已為人臣者趙氏曰趙鞅之入晋陽拒范中行也而書曰叛人臣不當專土地後世大臣有困於䜛間去聲遷延居外不敢釋兵卒以憂死者唐李光弼傳相州北邙之敗朝恩羞其策謬故深忌光弼切骨而程元振尤疾之二人用事日謀有以中傷者吐蕃㓂京師詔入援光弼畏祸遷延不敢行其在徐州擁兵不朝憂恨成疾而卒亦未明人臣之義故爾故直書入于晉陽以叛入者不順之辭叛者不赦之罪髙氏曰據土背君曰叛鞅入晋陽以拒范中行而不知投䑕忌噐之義故聖人直名曰叛以著其不由君命而専土興兵之罪陳氏曰鞅非始禍曷為皆以叛書之春秋之季家有藏甲都邑皆百雉之城矣鞅必奔晋陽寅吉射必奔朝􅁔則是皆叛也冬晉定荀寅士吉射入于朝歌以叛荀寅下公有及字朝如字杜氏曰朝􅁔属汲郡張氏曰晋地衞州衞縣西有朝􅁔城南有牧野愚按朝歌衞之舊都衛徙椘丘朝􅁔後属晋今衛輝路新鄉縣按左氏知音智文荀躒韓簡起孫不信魏襄子舒孫曼多與荀寅范吉射相惡如字又烏路反將逐荀范范臯夷无寵于范吉射而欲為亂于范氏梁嬰父嬖于知文子文子欲以為卿韓簡子與中行文子相惡魏襄子亦與范昭子相惡故五子謀將逐荀寅而以梁嬰父代之逐范吉射而以范臯夷代之言於晉侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑不均矣請皆逐之遂奉公以伐二子二子敗奔朝歌哀三年趙鞅圍朝􅁔師于其南荀寅伐其郛使其徒自北門入已犯師而出奔邯郸四年趙鞅圍邯鄲邯郸降趙稷奔臨齊弦施逆之遂堕臨國夏伐晋取邢任欒鄗逆時隂人盂壷口㑹鮮虞納荀寅于柏人五年春晋圍柏人寅吉射奔齊晉主夏盟威服天下及大夫專政賄賂公行内外離析示威平丘而齊叛昭十三辭請召陵而蔡叛定四盟于沙鹹而鄭叛定七次于五氏而衞叛㝎九涖于鄭定十一會于夾谷定十歃于黄定十二而魯叛諸侯叛于外大夫叛於内故奔于晉陽而趙鞅叛入于朝􅁔而荀寅與士吉射叛以晉國之大天下莫强焉邦分崩而不能守也春秋於晋事或畧而不序文十五年十七年盟會于扈不序楮侯襄十六年盟俱梁不序大夫或賤而稱人文九年救鄭十四年納提菑十七年伐宋宣元年伐鄭二年侵鄭十年伐鄭十六年滅甲氏成十六年執季孫㐮十六年執邾子十八年執石買十九年執邾子二十六年執寗喜三十年會澶淵昭十三年執意如二十三年執叔孫定元年執仲㡬五年執樂祁哀四年執戎蠻皆貶稱人或書侵以陋之定四年書侵楚八年書侵鄭侵衞責亦備矣至是三卿内叛直書于策見音現下見諸同其效也故臧哀伯曰國家之敗由官邪也官之失徳寵賂章也桓二晋卿始禍縁衛貢也樂祁見執獻楊楯食允反也定六蔡侯從呉荀呉貨也定四眧公弗納范鞅賂也昭二十七而晉室自是不復扶又反能主盟矣故為國以義不以利春秋之大法在焉見諸行事亦可謂深切著明矣王氏曰鞅入晋陽私邑也寅吉射入朝歌公邑也三人之罪若有䓁差俱書曰叛者臣之邑君所賜也據其私邑則專禄以周旋矣趙鞅貪憤專戮其罪宜逐寅吉射以午之故興兵首禍則又為无君故三臣之奔春秋俱以叛書之家氏曰人臣不忌其君未有不終於為亂者也晋大夫不忌其君為日久矣衞孫林父逐君晋大夫從而羽翼之魯季孫意如逐君晋大夫又從而羽翼之羽翼他國之亂臣者皆有欲為亂之心也而其君宴然无所悟一聴其所為及是而三卿俱叛夫豈一朝夕之故㦲晉趙鞅歸于晉定按左氏荀范奔朝歌韓魏以趙氏為請鞅入于綘盟于公宫然則書歸者易以豉反下同詞也韓魏為于偽反之請晉侯許之復而寅與吉射去國出奔則無有難之者故其歸為易矣三子之叛其罪一也鞅以有援於眷反故得復寅吉射以無助故終叛蘓氏曰鞅寅吉射之叛其罪均也鞅以有助故得復寅吉射以無援故終叛鞅之言歸寅吉射既出則无難也春秋書鞅歸于晉非與之也以罪晉侯縱失有罪無政刑耳叛逆人臣之大惡始禍晉國之載書既不能致辟音闢於鞅奉天天討以警亂臣又亢苦浪反不𠂻左昭二十二徇韓魏之請而許之復無政刑矣其能國乎陳氏曰欒盈魚石猶書入至鞅而後書歸則晋无人之辝也叛臣至于書歸則佚賊不足録矣此韓趙魏分晋之本也永嘉吕氏曰亂臣以叛出而其歸也无異於善復以是為晋國之无政刑也家氏曰春秋先書鞅叛継書鞅歸言已叛之人非所淂歸而歸也非謂鞅无罪而歸于晋也先儒或謂言歸者以地正國也公榖鞅取晉陽之甲以逐君側之惡人公羊則其説誤矣以地正國而可是人主可淂而脅肹業反人臣擅興無罪以兵諌者鬻拳事見左傳荘十九真愛其君也使後世賊臣稱兵向闕以誅君側為名而實欲脅君取國者後董卓傳卓将兵詣京師上書曰中常侍張讓䓁竊倖承寵濁亂四海臣聞昔趙鞅興兵陽之甲以逐君側之􅁖今臣輙鳴鍾鼓如雒陽請収讓䓁以倩奸穢則此説啟之也大失春秋之意矣愚按春秋書趙盾弑君而又書趙盾侵陳書趙鞅叛而又書趙鞅歸皆所以貴晋君之不討罪也朱子於通鑑綱目書漢梁冀弑君帝即位益封梁冀萬二千户唐李輔國弑皇后以李輔國為司空兼中書令皆以譏天子之无政刑此得春秋書鞅叛與歸之意矣趙氏曰公羊云以地正國據禮臣无專土藏兵之義今乃欲以私邑之强而正國朝是末大而本小也又云興晋陽之甲以逐君側惡人無君命故書叛若无君命則是君與范中行同心也君與之同心而輒與兵伐之是逆亂也但以君宥而召之故書歸耳榖梁云貴其以地反也豈有身歸而地不歸乎此至鄙近矣髙氏曰二子既出晋侯自謂趙鞅保其邑以違荀范之難實非叛故許之歸先儒以歸為善辝遂謂鞅有叛迹而無叛心春秋先正其罪以勵臣莭此許其歸以廣君恩是不然脱使鞅初入晋陽本拒荀范而非有叛君之心然人臣无君命輙據土興兵此豈可赦乎况衞孫林父亦書歸何善之有薛弑其君比比如字比弑恵公夷立稱國以弑者當國大臣之罪也傳例見昭二十七年孫復以為舉國之衆皆可誅非矣三晉有國半天下若皆可誅刀鋸不亦濫乎頴川常秩曰秩字夷甫宋嘉祐熈寕間人長於春秋孫復之於春秋動輙有罪盖商叛之法耳棄灰於道者有誅歩過六尺者有罰説苑新序孫卿曰衞鞅内刻刀鋸之刑外深鉄鉞之誅歩過六尺者有罰棄灰於道者被刑其不即人心逺矣王囬見荘十一年注以是尚秩此善議復者家氏曰泰山孫氏言舉國之人皆可誅此求經之過也儒者辨理未詳立論失中將如秦漢之用法一人為非流毒一州一道者非獨法家之罪亦學者用意刻深有以濟其為惡不可不謹也乙敬王二已十四年十有四年晋定十六齊景五十二衞靈三十九蔡昭二十三鄭聲五曹陽六陳閔六杞僖十宋景二十一秦惠五楚昭二十吴闔廬十九卒春衞靈公叔戌來奔戌檀弓式樹反衞趙陽出奔宋景作衞趙陽公晋趙陽公叔戌將去起吕反南子之黨夫人愬曰戍將為亂故公叔來奔初衞公叔文子朝而請享靈公退見史鰌而告之史鰌曰子必禍矣子富而君貪罪其及子乎文子曰其若之何鰌曰臣可以免富而䏻臣免免於難戌也驕其亾乎富而不驕者鮮吾唯子之見驕而不亾者未之有也戌必與焉反文子卒衞侯始惡於公叔戌以其富也趙陽趙黶孫北宫結皆戌黨也故亦出奔並據左傳而靈公無道不能正家以䘮息浪反其大臣之罪著矣戌又以富見惡烏故反於衛侯夫富者怨之府也使戌積而能㪚曲禮以財發身大學不為貪人之所怨於以保爵位倘庶㡬㡬乎家氏曰衞靈不君南子不婦比而為􅁖亦既稔矣公叔戌以宗國之老起而正之乃戌之所淂為而非戍之所䏻為也人臣欲正其君者必先自正其身其身既正而後可以格君心之非而措之于善今戍也怙富而驕素無國中之譽乃欲以正君自任其事克而始速禍宜也春秋書三大夫之奔所以著衞亂之所從二月公作三月辛巳楚昭公子結陳閔公孫佗人帥師滅頓以頓子牂歸孫公作子佗徒河反牂子即反公作搶七良反左傳頓子牂欲事晋背楚而絶陳好二月楚滅頓何氏曰不别以歸何國者明楚陳以滅人為重頓于以不死位為重髙氏曰陳佗人專兵以助夷狄滅諸侯之國又執其國君歸縱或歸于楚其罪等耳家氏曰楚為中國患百有餘年至是始戢諸侯无從楚者而陳之從之不替頓本楚之與國甞與夏盟召陵之㑹頓子在焉去夷而即華正也陳以盛德之後當夷楚既衰猶比而従之滅國是亦夷而已矣春秋書楚結陳佗人連兵滅頓誅楚而罪陳也薛氏曰陳不思輔車之勢助强大而滅鄰國不思將自斃也危㦲談氏曰凡書滅又書以歸及名者罪重於奔者也既責其不死位又責其無興復之志也夏衞靈北宫結來奔左傳公叔戌之故也髙氏曰衞靈沈耳于閨以奔其世臣又及其所與是以其國聼之也五月於越勾践敗呉闔廬于檇李呉子光卒敗必邁反下並同檇音醉公作醉杜氏曰呉郡嘉興縣南醉李城張氏曰吴地今秀州治所愚按在今嘉興路嘉興縣之南按左氏呉伐越句古侯反踐禦之陳于檇李患其整也使罪人三行户郎反屬章欲反下同劒于頸而辝曰二臣有治臣奸旗鼓不敏於君之行前不敢逃刑敢歸死遂自剄也呉師屬目因伐之闔閭傷而卒大敗吴師靈姑浮以戈擊闔廬傷将指取一屦還卒于陘去檇李七里書敗者詐戰也定公五年於越入吳至是敗呉于檇李㑹黄池之嵗越又入呉悉書于史以其告也哀之元年吳子敗越棲句踐於㑹古外反稽古兮反之上吳王夫差敗越于夫椒報檇李也遂入越越子以甲楯五千保于㑹稽使大夫種因吴太宰嚭以行成吴子将許之伍貟曰不可臣聞樹徳莫如滋去疾莫如盡句践能親而務施施不失人親不棄勞與我同壤而世為仇讎于是克而弗取将又存之違天而長讎讎後雖悔之不可食已姬之衰也日可侯也介在蠻夷而長仇讎以是求伯必不行矣弗聴退而告人曰越十年生聚十年教訓二十年之外吴其為紹乎越及吳平豈獨不告而史策不書疑仲尼削之也吳子光卒夫音扶下夫椒同差初佳反夫差闔廬嗣子使人立於庭苟出入必謂已曰而㤀越王之殺而父乎則對曰唯以水反不敢㤀三年乃報越然則夫椒之戰復父讎也非報怨也春秋削而不書以為常事也其旨微矣襄陵許氏曰書檇李之敗用見光玩兵滅身以為殘民伐國之戒家氏曰書於越卑之也吳雖用夷禮而太伯之後且有接楚之功春秋於柏舉之戰固當褒之矣越乃襲吳而入之吳不能竟攘楚之功者越議其後也是故始書越至入吳而書於越賤其援楚也或曰柏舉之戰吴固爵矣今其敗而以國書何欤曰勝而驕驕而敗敗而遂亾是故夷之耳公㑹齊侯景衞侯靈于牽牽公作堅又作掔齊魯為㑹止此左傳晋人圍朝歌公㑹齊侯衞侯于脾上梁之間謀救范中行氏折成鮒小王桃甲率狄師以襲晋戰于絳中不克而還士鮒奔周桃甲入于朝歌杜氏曰脾上梁間即牽魏郡黎陽縣東北有牽城愚按今大名路濬州公至自㑹張氏曰齊景公欲求霸誅晋之亂臣以正其國可也當是時孔子已去魯故㑹齊侯合謀救范中行氏三國之君同為㑹而助不𠂻故致公以危之也秋齊侯景宋公景㑹于洮左傳范氏故也杜氏曰洮曹也襄陵許氏曰齊宋魯衞崇奨亂逆謀動干戈大義亡矣家氏曰自齊景圗覇衞鄭魯既與之同盟宋猶未忍絶晋至是始及齊為此㑹盖始從於齊也傳謂牽洮二㑹皆謀救范中行若爾四國相率而預於亂也春秋初年諸侯連兵助亂及桓公之覇明分義以示天下此風頓革今齊景欲復祖業而率三國之君往助叛人彼三國之君𠖇然與之俱而不知黨叛輔遂之為不可世道至是一變春秋降為戰國景公亦有責焉聨書二㑹皆貶也天王敬使石尚來歸脤脤市軫反周魯王之交止此書天止此公羊傳石尚者天子之士也脤者何爼實也腥曰脤熟曰膰榖梁傳脤者何祭肉也生曰脤熟曰膰石尚士也天子之大夫不名杜氏曰石尚天子之士石氏尚名脤祭社之肉盛以脤噐以賜同姓諸侯親兄弟之國與之共福周禮大宗伯以脤膰之禮親足弟之國大行人歸脤以交諸侯之福通旨祭肉曰脤禮諸侯朝天子助祭于宗廟然後受爼實時魯不助祭而歸脤非禮也劉氏曰受脤禮也歸脤非禮也髙氏曰周自王季子來聘之後王命不復加於諸侯矣今敬王有事於社魯未甞有敵愾之功而天王特使石尚忽為此舉雖天子損禮之甚而聖人於周眷眷如此盖曰天子之在唯祭與號而已愚按成肅公受脤于社是助祭而受爼實也襄王使宰孔賜齊侯胙是齊桓有奨王之功而加以殊禮也今定公受國意如即位十有四年既不朝王又不遣使往聘而十里賜宜社之肉非縁助祭于京師曽是以為禮乎春秋之初宰咺歸􅈖於仲子寵妾媵而瀆三綱春秋之終石尚歸脤於定公􅁿宗社而褻五禮盖夫婦為三綱之本祭祀為五禮之首故書以示貶焉然歸􅈖為禮之變故咺以冡宰而稱名歸脤乃禮之常故石尚以天子之土而書名氏直書而義自見也苟以石尚為貶則劉夏以官師而書名氏盖非貶矣禮劉氏曰榖梁云石尚欲書春秋諫曰久矣周之不行於魯也請行脤不知石尚欲書孔子之春秋乎魯國之春秋乎若孔子之春秋是時未作石尚安得書如魯國之春秋王人至則書之何足為榮邪衞靈世子蒯聵出奔宋景五蒯苦怪反瞶怪反左傳衞侯為夫人南子召宋朝㑹于洮太子蒯聵献盂于齊過宋野野人歌之曰既定尔娄猪盍歸吾艾豭大子羞之謂戯陽速曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見太子太子三顧速不進夫人見其色啼而走曰蒯聵将殺余公執其手以登臺太子奔宋太子告人曰戯陽速禍余戯陽速告人曰太子則禍余太子无道使余殺其母余不許将戕於余若殺夫人將以余説余是故許而弗為以紓余死世子國本也以寵南子故不能保世子而使之去國以欲殺南子故不能安其身至於出奔是輕宗廟社稷之所付託而恣行矣春秋兩著其罪故特書世子其義不繫於與蒯聵之世其國也而靈公無道不能正家以危其國本至使父子相殘毁滅天理之所由著矣文集書衞世子奔宋則以罪靈公也書趙鞅納衞世子蒯聵于戚則以罪蒯聵也書齊國夏衞石曼姑帥師圍戚則以罪輒也此劉氏曰左傳叙蒯聵事云云蒯聵雖不善謀豈有事㦲且殺夫人蒯聵獨得全乎彼所羞者以夫人名惡也如殺其母為惡愈大反不知可羞乎盖蒯聵聞野人之歌其心慙焉則以謂夫人夫人惡其斥已之滛則啼而走言太子將殺余以誣之靈公惑於南子所言必聼固不難逐蒯聵矣不當如左氏所記又宋南子家也蒯聵負殺南子之名又走入其家敢乎㦲常山劉氏曰靈公聼南于之譛謂蒯聵欲弑母不為辨明以致其出奔靈公之罪也張氏曰自古䜛婦之誣其子多矣考二劉之言足以知左氏所記乃南子之䜛言而非當時之實録也愚按二劉張氏之説固善然皆泥于書世子之義故疑左氏之説然楚商臣蔡般殺君而書世子豈以與之乎竊考蒯聵㤀父之䘮而致他人使之纔㤀子之親至迫以兵而必奪之位其于人倫天理冺滅㡬盡則其恥南子之滛行而欲殺之固有是事朱子集註于論語二章皆以蒯聵欲殺母淂罪于父則左傳未可盡廢也詳觀經文書趙鞅帥師納衞世子于戚不曰世子復歸而書納則蒯聵有罪明矣何居休乃云于雖見逐无去父之義舍其大而論其細何衞靈公孟彄出奔鄭聲左傳太子奔宋尽逐其黨故公孟彄奔鄭自鄭奔齊髙氏曰比年志公孟帥師此衞國用事之卿靈公疑其為蒯聵之黨而逐之婁書大夫之奔著靈公之无道也宋公景之弟辰自蕭來奔髙氏曰宋公不能容一弟既使為奔亾之臣又使為叛逆之臣奔而入叛叛而復奔三書宋公之弟皆以罪宋公也愚按鄭荘公之弟段出奔共則書鄭伯克叚而不言弟所以責鄭荘志殺其弟无親親之恩也宋辰出奔婁書弟者又以責宋景之寵嬖臣而乖兄弟之義也其不曰宋公逐臣者辰勢窮力屈而卒于奔亾非宋公之能逐之也大蒐于比蒲比音毗書蒐止此張氏曰蒐而邾子來㑹則公親蒐矣而不書公以軍政不属公而專於三家則季叔盂孫氏之所為也髙郵孫氏曰春秋田狩之事公行者必書公公觀魚于棠公狩于郎隐扣之時政由自公出也自昭之蒐紅政在三桓蒐田之禮雖公自行皆曰大蒐而不曰公焉所以見公之不得為政而大夫專國也愚按哀二年三卿並将伐邾兵權仍在三家且不念邾子㑹公來朝奔䘮之勤而取漷沂之田則公不得與兵政可也矣番易萬氏曰大蒐天子之禮也三家始也僣諸侯之禮以為蒐終也僣天子之禮而為大蒐是尚忍言之㦲邾子隠來㑹公杜氏曰㑹公于比蒲來而不用朝禮故曰㑹何氏曰書者非邾子㑹人于都如入人都當修朝禮言公不受于廟髙氏曰比蒲之蒐三家之事故特言㑹公以别之此與荘二十三年蕭叔朝公同盖未嘗期約因來朝而偶與公為㑹爾薛氏曰大蒐天子所以㑹諸侯也僣蒐而諸侯耒㑹毋乃太逼乎愚按文十三年衞侯㑹公于沓鄭伯㑹公于棐皆書地此不書地則知來㑹于比蒲无疑也城莒父及霄父音甫杜氏曰公叛晋助范氏故懼而城二邑家氏曰譏勞民城諸防城諸鄆同例張氏曰皆魯邑子夏甞為莒父宰此年無冬闕文薛氏曰不書冬闕文也冦家氏曰是嵗無冬闕文耳何休云是年孔子以大司攝相事齊人饋女樂令聖人去不書冬者貶也此牽合之説夫聖人豈以去位之故而削冬不紀乎愚按蒐比蒲城莒父及霄其事盖皆在冬但脱冬一字耳敬王二十五年十有五年昭定十七二十四景五十三七靈四十聲六陽閔七僖十一十景二十二元恵六昭二一夫差年春王正月邾子隐來朝左傳春王正月邾隱公來朝奔按邾子以去年冬㑹為未成礼故復來朝未㡬魯之䘮其卑屈亦甚矣鼷䑕食郊牛牛死改卜牛薛氏曰不言其所食漫也張氏曰不敬莫大焉杜氏曰偏食其身災不敬也家氏曰不言所食食非一處以全死髙氏曰常怪鼷䑕食郊牛致死上元二年因避地旅于㑹稽時牛災小䑕噬牛才傷皮膚無有不死者二月辛丑楚子昭滅胡以胡子豹歸按左氏吳之楚定四胡子盡俘楚邑之近胡者者楚旣定又不事楚曰存亾有命事楚何為爲于偽反是楚滅之夫滅人之國其罪大矣然胡子豹乗楚之約盡俘其邑之近胡者所謂國必自滅而後人滅之非滅之者獨有罪也國君造命不可委命者旣以為有命而又貪生忍辱不死于社稷則是不知命矣書以歸罪豹之不能死位而與歸也故楚子書爵而胡子豹名家氏曰召陵之㑹頓胡之君皆在曰以侵楚也是後楚有吴患不能報去年滅頓今年滅胡所以報召陵之怨盖不能報之於中國而吞噬小國以快其宿憾也夏五月辛亥郊公羊傳曷為以五月郊三卜之運也何氏曰運轉也已卜春三正不告復轉卜夏三月周五月淂三吉故五月郊榖梁傳五月郊不時也髙氏曰魯郊當在孟春今以改卜牛在滌三月故至五月乃郊愚按不書卜郊徐彦疏云言郊則知卜吉可知夫正月改卜牛若在滌三月則當以四月郊今郊于五月盖卜以四月郊而不吉又卜五月必亀従而後郊也故但書改卜牛不書卜郊經于卜郊不從則書之以譏瀆卜卜而從則但書郊之過時以譏其慢耳甞考史記云定公十四年魯郊不致膰爼于人夫今春秋不書十四年郊則郊之不見于經者多矣惟因其失禮之中又失禮者則書以示貶而因見魯郊之僣也壬申公薨于髙寝榖梁傳髙寢非正也杜氏曰髙寝宫名不於路寝失其所襄陵許氏曰内卒凡十四年淂正而薨者推荘宣成鄭聲罕達帥師伐宋景傳罕公作軒左鄭罕達敗宋師于老丘杜氏曰老邱宋地宋公子地奔鄭鄭人為之伐宋欲取地以處之事見哀十二年襄陵許氏曰宋大國也至于景公而鄭能困之則桓魋之為也无競維人豈不信㦲王氏曰鄭納宋叛人已可罪矣又伐大國以居叛人此不待貶黜而罪􅁖見齊侯景衞侯靈次于渠蒢渠蒢公作蘧蒢左傳文作蘧挐左傳謀救宋也杜氏曰不果救故書次襄陵許氏曰齊衞新與宋鄭同盟叛晋故為宋出請為鄭次止其不言救為其不誠于救也愚按伐而後次其次為善次而後伐其次為譏救而次亦譏也然書次書救則譏其怠於救患書次不書救則譏其無名妄動非救也齊衞五氏之次傳云伐夷儀垂葭之次傳云伐河内皆遣兵伐晋而二君次止為之援此云救宋而復不成救是則書齊衞之三次皆貶尔楚蔡次厥貉而後有伐麋之事齊衞次五氏垂葭渠蒢而明年有伐晋之事皆謀為不善也比事以觀而義自見矣邾子隠來奔䘮諸侯始奔䘮榖梁傳䘮急故以奔言之公羊傳其言來奔䘮何奔䘮非禮也何氏曰禮天子崩諸侯奔䘮㑹塟通㫖諸侯為天王服斬衰崩則奔䘮而㑹其塟若諸侯或同盟或同位或外姻告終易代弔賻贈襚固不可緩而奔其䘮則非禮也直書于策失自明矣常山劉氏曰當周之衰天子奔塟諸侯皆無奔䘮㑹塟之事而邾滕反行于強大之國非禮明矣秋七月壬申姒氏卒姒榖作弋下同公羊傳姒氏哀公之母也不稱夫人哀未君也榖梁傳妾辝也哀公之母也炎氏曰自成風之後妾母皆僣用夫人禮故不書薨著其非禮也哀公母定姒卒時子未踰年雖行䘮禮不可加于子故書卒子既未成君故不稱夫人也通㫖姒氏不稱夫人為正名孟子不稱夫人為隠惡姒氏㝎公妾也公羊據魯失禮言之尔論春秋之法哀雖已君豈得称夫人乎來􅈖仲子㑹塟戍風深貶天王而名冢宰則知哀雖已君亦不淂稱夫人矣陳氏曰自成風訖于宣㐮子苟為君則其母為夫人書塟定姒則是哀公以夫人塟其母猶宣襄也則何以卒不稱夫人葬不稱小君徒以䘮在殯不及尊其母焉耳劉氏曰左氏云不稱夫人不赴且不祔也非也安安夫人薨而不書夫人者乎凡夫人始卒則史書之書之固云夫人矣不待赴祔而書其夫人也姒氏要為妾母哀未成君故亦未敢謂其母夫人爾愚按成風㪚嬴齊歸尚以妾母稱夫人小君豈以定公正夫人而反不稱夫人小君乎盖僖宣昭即位久遂尊妾母為夫人哀初立未踰年故仍其本號也八月庚辰朔日有食之九月滕子頃來㑹塟杜氏曰諸侯㑹𦵏非禮也范氏曰邾滕魯之與國近則來奔䘮逺則来㑹𦵏自之王者書非禮薛氏曰魯至弱也而二君為非禮之㑹况強大乎氏曰周衰小國以事王者之禮事大國魯君嘗奔齊晋之䘮㑹楚之𦵏春秋不書諱之也邾滕二君來奔䘮㑹葬而皆書者非嘉其來志其禮之僣也丁巳塟我君定公雨不克塟戊午日下昃乃克塟昃榖作稷榖梁傳𦵏既有日不為雨止禮也雨不克塟䘮不以制也通㫖塟速則不懐踰則僣雨經月不止者有矣及期而遇将止以俟之是僣也孫氏曰雨不克塟譏不䏻塟也髙氏曰雨不克塟無偹之甚也𦵏敬嬴言日中而克塟此言日下昃乃克塟日中則裕於日昃矣君子之于親不忍一日離也故塟日虞所以寕親也日下昃則失虞之時矣傳義詳見宣八年趙氏曰榖梁云乃急辝也按凡緩稱乃不淂云急詳經意譏臣子緩慢耳辛巳塟定姒公羊曰有子則廟廟則書塟榖梁隠五禮庶子為君為其母築宫使公子主其祭于子祭于孫止禮記妾母不世祭曾子問並有䘮則如之何子曰𦵏先輕而後重其奠也其虞也先重而後輕禮記曽于問萹注同時有父母或祖父母之䘮𦵏則先母而後父奠則先父而後母塟是奪情之事故先輕奠是奉養之事故先重虞祭亦奠之類也實劉氏曰左氏云不称小君不成䘮也非也若姒氏夫人固當書夫人姒氏薨已而曰塟定姒不稱小君明不成䘮以責臣子可也今曰姒氏卒非夫人也何足以見不成䘮乎欲責不成䘮而不稱夫人適足貶小君之尊而不足見臣子之罪也冬城漆杜氏曰邾庶其邑余氏曰前年冬城莒父及霄此年秋塟定公又塟定姒冬城漆其勞民也甚矣張氏曰城漆謀伐邾也定公之䘮邾于來奔事魯謹矣哀公初立不務善鄰而以土地之故勞民力啟民怨二年取其田七年俘其君卒使吴人乗間以伐其國齊人問罪而取讙闡利未淂而害随之謀國如此其不終也宜㦲魯愚按左氏云書不時告夫他國有事或過時而告於豈有魯國城邑過時而告于廟可以揜其罪乎此非人情也春秋胡傳附録纂疏卷二十八
