body:
  text: 春秋胡傳附錄纂疏卷十八元汪克寛撰宣公下甲定王子十年十有二年晉景三齊頃二衛穆三蔡文十五鄭襄八曹文二十一陳成二把桓四十宋文十四秦桓八楚莊十七春𦵏陳靈公公羊傳討此賊者非臣子也何以書𦵏君子辭也楚已討之矣臣子雖欲討之而無所討也杜氏曰賊討國復二十二月然後得𦵏討賊者非臣子也何以書𦵏據衛桓齊襄本國臣子討賊而書𦵏天下之惡一也莊十二石祁子云云本國臣子或不能討而上有天王下有方伯又其次有四鄰有同盟有方域之諸侯有四夷之君長上聲與凡民皆得而討之據禮臣弑君子弑父凡在官者與在宫者皆得殺之無赦所以明大倫存天理也徵舒雖楚討之陳之臣子亦可以釋怨矣故得書𦵏君子詞也愚按君子之心無私故討賊不間内外葢惡惡者天下之同情也楚子莊圍鄭襄左傳厲之役鄭伯逃歸自是楚未得志焉鄭既受盟于辰陵又徼事于晉春楚子圍鄭三月克之入自皇門至于逵路鄭伯肉袒牽羊以逆曰孤不天不能事君使君懐怒以及敝邑孤之罪也敢不惟命是聽其俘諸江南以實海濱亦唯命其翦以賜諸侯使臣妾之亦唯命若惠顧前好不泯其社稷使改事君君之惠也左右曰得國無赦王曰其君能下人必能信用其民矣退三十里而許之平潘尫入盟子良出質按公羊傳去聲例戰不言伐圍不言戰入不言圍滅不言入書其重者見莊十年楚子縣陳蓋滅之矣而經止書入其於鄭也入自皇門至于逵道左傳作逵路公羊作路衢蓋即其國都矣而經止書圍曷為悉從輕典不著其憑陵諸夏之罪乎上無天王下無方伯天下諸侯有臣弑君子弑父諸夏不能討而荆楚能討之春秋取大節略小過劉氏曰春秋畧小善而優大節雖如楚子憑陵上國近造去聲王都之側猶從末減於以見音現誅􅅍臣討賊子正大倫之為重也愚按據左氏公羊所記鄭襄公屈服於楚禮卑辭巽以求免則楚之凌暴亦甚矣然其能不聽左右之言而退師許平薄于利而不要其土則比于狡焉思啟封疆者猶有改過遷善之美意也髙氏曰封陳侯者非楚本謀也不善而能改也故書入與鄭平者楚本謀也不為利謀所誘故書圍夏六月乙卯晉景荀林父帥師及楚子莊戰于邲晉師敗績邲音弼左傳晉師救鄭荀林父将中軍先縠佐之士㑹将上軍郤克佐之趙朔将下軍欒書佐之趙括趙嬰齊為中軍大夫鞏朔韓穿為上軍大夫荀首趙同為下軍大夫韓厥為司馬及河聞鄭既及楚平桓子欲還曰無及于鄭而𠞰民焉用之隨武子曰善㑹聞用師觀釁而動見可而進知難而退軍之善政也􅇾子曰不可晉所以伯師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失伯不如死以中軍佐濟韓獻子謂桓子曰彘子以偏師陷子罪大矣子為元帥師不用命誰之罪也失屬亾師為罪已重不如進也事之不捷惡有所分與其專罪六人同之不猶愈乎楚子北師次于郔将飲馬于河而歸聞晉師既濟王欲還嬖人伍參欲戰言于王曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者專行不獲聴而無上衆誰適從此行也晉師必敗且君而逃臣若社稷何王病之次于管以待之楚少宰如晉師曰寡君此行也將鄭是訓定豈敢求罪于晉二三子無淹久隨季對曰昔平王命我先君文侯曰與鄭夹輔周室毋廢王命今鄭不率寡君使羣臣問諸鄭豈敢辱候人彘子以為諂使趙括從而更之曰行人失辭寡君使羣臣遷大國之迹于鄭曰無避敵羣臣無所逃命楚子又使求成于晉晉人許之盟有日矣楚許伯御樂伯攝叔為右以致晉師晉魏錡求公族未得而怒欲敗晉師請致師弗許請使許之遂往請戰而還趙㫋求卿未得且怒失楚之致師者請挑戰弗許請召盟許之與魏錡皆命而往晉人懼二子之怒楚師也使以軘車逆之潘黨望其塵使騁而告曰晉師至矣楚人亦懼王之入晉軍也遂出陳孫叔曰進之寧我薄人無人薄我遂疾進師車馳卒奔乗晉軍桓子不知所為鼓于軍中曰先濟者有賞中軍下軍争舟舟中之指可掬也晉師右移上軍未動工尹齊將右拒卒以逐下軍潘黨率㳺闕四十乗從唐侯為左拒以從上軍隨季曰楚師方壯若萃于我吾師必盡不如收而去之分謗生民不亦可乎殿其卒而退不敗楚熊負覊囚知罃知莊子以其族反之㕑武子御下軍之士多從之射連尹襄老獲之載其尸射公子榖臣囚之以二者還及昏楚師軍于邲晉之餘師不能軍宵濟亦終夜有聲楚重至于邲遂次于衡雍祀于河作先君宫告成事而還公羊傳莊王伐鄭勝于皇門放乎路衢鄭伯肉袒左執茅旌右執鸞刀以逆莊王曰寡人無良邊陲之臣以干天禍是以使君王沛焉辱致敝邑君如矜此喪人錫之不毛之地使帥一二耋老而綏焉請唯君王之命莊王曰君之不令臣交易為言是以使寡人得見君之玉面而微至乎此莊王親自守旌左右撝軍退舍七里将軍子重諫曰南郢之與鄭相去數千里諸大夫死者數人厮役扈養死者數百人今君勝鄭而不有無乃失民臣之力乎莊王曰古者杅不穿皮不蠧則不出于四方是以君子篤于禮而薄于利要其人而不要其土告從不赦不祥吾以不祥道民災及吾身何國之有既則晉師之救鄭者至曰請戰莊王許諾将軍子重諫曰晉大國也王師淹病矣君請勿許也莊王曰弱者吾威之強者吾辟之是以使寡人無以立乎天下令之還師而逆晉冦莊王鼓之晉師大敗晉衆之走者舟中之指可掬矣榖梁傳績功也功事也日其事敗也杜氏曰邲鄭地張氏曰地譜鄭州城下管城縣有邲城在縣南愚按管城縣屬今汴梁路鄭州戰而言及主乎是戰者也何氏曰序林父於上罪起其事言及者明晉汲汲欲敗楚爾按左氏晉師救鄭經既不以救鄭書矣愚按不書救者以其緩不及事無救患之實耳或謂不書救鄭是予楚以伯然晉文晉悼之伯書楚人救衛救鄭豈不予晉以伯乎又不言楚晉戰于邲而使晉主之何也陳人弑君晉不討賊而楚能討之楚人圍鄭亦既退師與鄭平矣而又與之戰則非觀釁許靳反之師也故釋楚不貶而使晉主之獨與常詞異乎據楚成救鄭則書宋公及楚人戰于泓楚得臣救衛則書晉侯齊宋秦師及楚人戰于城濮今此晉救鄭當書楚及晉戰按邲之役六卿並在大夫司馬皆具官不欲𠞰子小反民者三帥也違命濟師者先縠也而獨罪林父何也尊無二上定于一也古者仗鉞臨戎專制閫外南史沈慶之𫝊閫外之事将軍所得專制李衛公問對古者出師命将授之以斧曰從此至天將軍制之又授之以鉞曰從此至地將軍制之雖君命有所不受史穰苴傳将在軍雖君令有所不受前周亞夫𫝊上勞軍至細栁不得入曰軍中但聞將軍令不聞天子詔上曰此真將軍矣唐段志𤣥傳與宇文士及勒兵衛章武門太宗夜遣使至志𤣥曰軍門不夜開使者示手詔志𤣥曰夜不能辨帝歎曰周亞夫何以加之况其屬乎欒書救鄭軍帥之欲戰者八人武子遂還音旋衆不敢遏成六救鄭遂侵蔡楚師救蔡禦諸桑隧趙括趙同欲戰請於欒武子武子將許之知莊子范文子韓獻子諫曰不可或謂武子曰子之佐十一人其不欲戰者三人而已武子曰善鈞從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎乃遂還偪甫目反又彼力反陽之舉匄古害反偃二將去聲皆請班師荀罃令曰七日不克必爾乎取之遂下偪陽襄十諸侯之師久於偪陽荀偃士匄言於荀罃曰請班師知伯怒曰云云偃匄帥士卒攻偪陽親受矢石遂滅偪陽林父既知無及於鄭焉音煙用之矣諸帥又皆信然其䇿先縠若獨以中軍佐濟者下令三軍無得􅄭動按軍法而行辟音僻夫豈不可既不能令乃畏失屬亡師之罪而從韓獻子分惡之言朱子語問左傳分謗事曰近世士大夫多是如此只要徇人情如荀林父邲之役先縠違命而濟乃謂與其專罪六人同之是何等見識當時為林父者只合按兵不動召先縠而誅之知難而冒進是棄晉師於誰責乎故後誅先縠不去上聲其官此稱敗績特以林父主之也通㫖邲之戰先縠趙㫋實敗晉師而獨書林父者責元帥也武侯祁山之戰違命于街亭者馬謖也失于箕谷者鄧芝也而武侯深自刻責以為咎皆在已此亦春秋統一之義也任歸于一者責有所歸權分於下者衆無適從吳楚既反漢用條侯以梁王之貴太后之尊交請救援條侯謹守便宜竟破七國唐六道重兵攻圍淮蔡久而无功及裴度視師雖韓𢎞亦輿疾督戰遂擒元濟代宗以九節度之師圍慶緒不立元帥一夕而潰其成敗之績豈不著明也哉張氏曰經以林父及之者言林父之為志乎此戰也蓋晉不能討陳亂已失王綱軍政之本乃欲恃力以爭鄭不知楚莊既討陳亂則師出有名而所以施於鄭者又進退得宜勇怯中節林父上不能輔君討亂以行盟主之大義而此行本為救鄭而鄭已服楚士縠之徒恃強專制故林父雖知楚之不可敵而不能制諸帥之從楚師考公羊則知楚之所以勝考左氏則知晉之所以敗此春秋所以不書救鄭而特以林父主此戰著其敗師之罪也陳氏曰以大夫敵君於是始鞌之戰不惟敵君且盟齊于師矣永嘉吕氏曰自楚執討賊之權于是陳為楚有鄭不堪楚之屢伐而受盟辰陵然曰與其来者可也則猶不純乎從楚也故徼事於晉晉既不能有陳而僅爭鄭則邲之一戰中外勝負之一決也自邲之敗而楚伐宋横行于中國而莫制矣愚按林父身為元帥始既不能禁副屬之違令而專行終又不能躬帥士卒冒矢石而力戰乃鼓於軍中倡為棄甲曵兵之敗則喪師之罪不責林父而諉於誰乎然楚君大夫與中國戰皆貶書人故楚成于泓得臣于城濮囊瓦于栢舉並書人惟此書晉荀林父帥師以敵楚子者尊中國而抑中外故不以林父之有罪而貶之也泓之戰貶楚子此不貶者楚成設詐禽宋公扵乗車之㑹以伐其國又乗勝不悛而敗宋于泓則與楚莊為中國之所不能為者異矣陸氏曰公羊云大夫不敵君此其稱名氏以敵楚子何不與晉而與楚為禮也按此𫝊因得臣與晉侯戰稱人遂穿鑿為此説爾劉氏曰子玉不見名氏林父見名氏皆為不敵君可怪也哉秋七月冬十有二月戊寅楚子莊滅蕭左傳楚子伐蕭宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭蕭潰杜氏曰蕭宋附庸國假於討賊而滅陳春秋以討賊之義重也末減而書入惡去聲其貳已而入鄭春秋以退師之情恕也末減而書圍與人為善之徳宏矣至是肆其強暴滅無罪之國其志已盈雖欲赦之不得也故傳去聲稱蕭潰經以滅書㫁都􅅍反其罪也孟子曰以力假仁者霸霸必有大國楚莊蓋以力假仁不能久假而遽歸者也建萬國親諸侯者先王之政易比卦大象興滅國􅁇絶世者仲尼之法論語今乃滅人社稷而絶其祀亦不仁甚矣蕭既滅亡必無赴者何以得書于魯史楚莊縣陳入鄭大敗晉師于邲莫與校者不知以禮制心至於驕溢克伐怨欲皆得行焉遂以滅蕭告赴諸侯矜其威力以恐中國耳孟子定其功罪以五霸為三王之罪人春秋史外傳心之要典推此類求之斯得矣髙氏曰楚既得陳鄭又敗晉師遂深入中國憑陵諸夏滅人之國書以著其暴也愚按楚莊滅蕭所以逼宋而脅中國諸侯之服已也晉景人宋文人衛穆人曹文人同盟于清丘此大夫同盟之始左傳晉原縠宋華椒衛孔達曹人同盟于清丘曰恤病討貳程子傳晉為楚敗諸侯懼而同盟既而皆渝故書人以貶之杜氏曰清丘衛地在濮陽縣東南張氏曰地譜今濮州臨濮縣東南有清丘愚按今臨清縣也書同盟志同欲也楊士勛曰新城書同傳云同外楚則清丘亦是外楚省文也或以惡去聲其反覆音福而書同盟非也春秋不貴盟誓自隠公始年書儀父盟蔑宋人盟宿已不實言矣七年伐邾渝蔑之盟十年伐宋渝宿之盟奚待清丘然後惡其反覆乎清丘載書恤病討貳口血未乾音干敗必邁反其盟好上聲所謂不待貶而惡見音現者也又奚必人諸國之卿然後知反覆之可罪乎楚既入陳圍鄭大敗晉師伐蕭滅之憑陵中國甚矣為諸侯計者宜信任仁賢修明政事自强上聲於為善則可以保其國耳曾不是圖而刑牲歃血要質鬼神蘄音祈以禦楚謀之不臧孰大於是故國卿貶而稱人譏失職也原縠違命喪去聲師乃晉國罪人而主兹盟約所信任者皆可知矣家氏曰幽之同盟内外大小翕然来同齊伯之方盛也新城之同盟諸侯散者復合晉伯之漸衰也清丘之同盟異者衆而同者鮮晉不復可言伯矣而春秋于四國之為此㑹猶以同盟書嘉其不以勝負為從違捨燎原強盛之楚從喪敗方新之晉是故猶許之以同盟然視于幽之同則不可同日語矣愚按新城之同晉以趙盾主盟清丘之同復以四國之大夫盟齊盟所以一天下之心而晉以大夫尸之又其甚而諸侯之大夫與焉伯業之不振宜矣劉氏曰左氏云卿不書不實其言也夫春秋之世不實其言者衆矣奚獨此耶且華椒不宜被貶宋文師伐陳成衛穆人救陳左傳宋為盟故伐陳衛人救之孔達曰先君有約言焉若大國討我則死之陳有弑君之亂宋不能討而楚能討之雖曰縣陳尋復扶又反封之其徳於楚而不貳未足責也宋人不能内自省徳遽以大衆伐之非義舉矣衛人救陳背音佩盟失信而以救書者見音現下同宋師非義陳未有罪而受兵為可恤也且謀國失圖妄興師旅無休息之期則亂益滋矣其以救書意在責宋也若衛叛盟則不待貶絶而惡自見矣髙氏曰書衛救陳者所以罪宋也然衛方盟于清丘而反救陳救雖義事而有背盟之惡故稱人愚按清丘之載書恤病討貳而宋之討陳衛之救陳皆非春秋所與者不度徳不量力而啓釁於強楚渝盟失信以從簡書名雖是而實則非矣乙定王十丑一年十有三年晉景四齊頃三衛穆四蔡文十六鄭襄九曹文二十二陳成三杞桓四十一宋文十五秦桓九楚莊十八春齊頃師伐莒季佗公作伐衛左傳莒恃晉而不事齊故也臨川吳氏曰齊以彊凌弱而伐莒十一年之伐稱齊人此稱齊師者甚其動大衆而伐小國也愚按公羊作伐衛證之經文前後皆無齊衛交怨之事而於莒則四年平之不肯而魯伐之十一年齊又伐之則此為伐莒無疑矣夏楚子莊伐宋文左傳以其救蕭也楚人滅蕭将以脅宋諸侯懼而同盟為宋人計者恤民固本輕徭薄賦使民效死親其上則可以待敵矣計不出此而急於伐陳攻楚與國非䇿也故楚人有詞于伐而得書爵張氏曰天下無道小役大弱役強宋不知屈伸消長之道而欲以區區之力强中國由此致伐愚按文定責宋特譏其啟致兵之釁失保國之䇿非以楚之凌中國為無罪也蓋不待貶絶而惡自見耳劉氏曰左氏曰清丘之盟唯宋可以免焉然則十二年不當貶華椒自相伐矣秋螽杜氏曰為灾故書冬晉景殺其大夫先縠縠戸木反榖作榖音同左𫝊赤狄伐晉及清先縠召之也晉人討邲之敗與清之師歸罪於先縠而殺之盡滅其族先縠違命大敗晉師元帥不能用鉞已失刑矣今又重去聲有罪焉謂召赤狄晉人治其罪而戮之義也􅂚為稱國以殺而不去上聲下同其官夫兵者安危所係有國之大事也將去聲下同非其人則敗雖得其人使親信間去聲之則敗以剛愎皮逼反不仁者㕘焉而莫肯用命則敗凡此三敗君之過也河曲之戰趙穿獨出而臾駢之謀不用文十二秦伐晉晉人禦之臾駢曰秦不能久請深壘固軍以待之趙穿怒曰裹糧坐甲固敵是求獨以其屬出宣子曰秦獲穿也乃皆出戰濟涇而次欒黶於斬反欲東而荀偃之令不行襄十四諸侯之大夫從晉伐秦濟涇至于棫林荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶曰余馬首欲東乃命大還今林父初將中軍乃以先縠佐之使敵國謀臣知其從政者新未能行令誰之過歟故稱國以殺不去其官罪累去聲上也髙氏曰邲之役三帥皆欲還先縠固請戰遂及于敗至是以為討然釋趙㫋魏錡不討而獨誅先縠為政不平殺者不受治矣又族滅之惡之甚也張氏曰越椒将攻王而楚莊尚思子文之治楚而復克黄之所先縠先軫之孫而滅其族蓋晉之徳刑皆不足以敵楚矣丙定王十寅二年十有四年晉景五齊頃四衛穆五蔡文十七鄭襄十曹文二十三卒陳成四把桓四十二宋文十六秦桓十楚莊十九春衛穆殺其大夫孔達左傳清丘之盟晉以衛之救陳也討焉使人弗去曰罪無所歸将加而師孔達曰苟利社稷請以我説罪我之由縊而死衛人以説于晉而免遂告于諸侯曰寡君有不令之臣達搆我敝邑于大國既伏其罪矣敢告衛人以為成勞復室其子使復其位殺大夫而書名氏義不繫於專殺也孔達棄信以危社稷衛人按其罪而誅之可也通㫖孔達之死謀之不臧者也先君雖有約言若其有罪而大國見討亦可踐言不自省乎而况同盟口血未乾即亢大國之討以危其社稷乃以身死之求説于晉與自經於溝瀆而莫之知者奚逺哉是時陳貳于楚為孔達計者若顧約言告之以不當貳可也何以稱國而不去上聲下同其官用人謀國干犯盟主至於見討誰之過歟稱國以殺不去其官罪累去聲上也春秋端本清源故書法如此蘇氏曰孔達則有罪矣而衛人用其言以干盟主故稱國以殺陳氏曰孔達自殺而稱國以殺其君意也夏五月壬申曹伯夀卒文公也在位二十三年子盧嗣是為宣公晉侯景伐鄭襄左傳晉侯伐鄭為邲故也告于諸侯蒐焉而還中行桓子之謀也曰示之以整使謀而来鄭人懼使子張代子良于楚按左氏傳為並去聲邲音弼故也比毗志反事以觀知其為報怨復讎之兵詞無所貶者直書其事而義自見音現矣張氏曰屈而知伸敗而能改可以興矣晉所以敗由大義不明而争與國也今敗未兩嵗而復興争鄭之師故書晉侯以著其師之為報怨也髙氏曰晉救鄭而敗于邲鄭遂即楚夫鄭背晉即楚討之正也然靈成以来文公之澤寖㣲干戈日尋積而至于蜀之盟而春秋之變極矣豈特失鄭而已乎秋九月楚子莊圍宋文左傳楚子使申舟聘于齊曰無假道于宋及宋宋人止之華元曰過我不假道鄙我也鄙我亡也殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投袂而起屨及於窒皇劍及于寝門之外車及於蒲胥之市楚子圍宋宋人要於遥反結盟誓欲以禦楚已非持國之道輕舉大衆𠞰子小反民妄動又非恤患之兵特書救陳以著其罪明見伐之由也國必自伐然後人伐之凡事其作始也簡其将畢也必巨易於訟卦曰君子以作事謀始大象始而不謀必至於訟訟而不竟必至於師本序卦若宋是矣始謀不臧至于見伐見圍幾亾其國則自取之也春秋端本故責宋為深若蠻荆圍中國則亦明矣臨川吳氏曰宋前以救蕭而見伐今又以殺楚使而受圍楚之薦食上國宋之挑釁強夷俱可罪也愚按楚莊始而滅蕭以逼宋繼而伐宋以聲其救蕭之罪又遣使過宋不假道以激怒於宋而使殺之於是國君親将環其國而攻之然則楚子之志在于凌暴中國以取威争伯其惡甚矣文定作𫝊屢責宋而不責楚者楚人憑陵中夏之罪顯而易見而宋有致兵之由其罪未著也故備論之𦵏曹文公冬公孫歸父㑹齊侯頃于榖夫禮别筆列反嫌明㣲制治於未􅅍自天子出者也列國之君非王事而自相㑹聚是禮自諸侯出矣以國君而降班失列下與外臣㑹以外臣而抗尊出位上與諸侯㑹是禮自大夫出矣愚按大夫㑹諸侯始於單伯㑹齊宋衛鄭之君于鄄而後公孫敖㑹晉侯于戚至叔仲彭生㑹晉郤缺于承筐則大夫自為㑹矣大夫盟諸侯始於柔㑹宋公陳侯蔡叔盟于折而後公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴至公子遂㑹晉趙盾盟于衡雍則大夫自相盟矣然莊僖以下大夫未專政也文宣以下大夫始專政矣君若贅旒公羊襄十六注贅繫屬之辭旒旂旒以旂旒為喻者為下所執持陪臣執命豈一朝一夕之故其所由来漸矣故易於坤之初六曰馴致其道至堅冰也易言其理春秋見音現諸行事若合符節可謂深切著明矣張氏曰魯素事齊而宣公之立公子遂立之故其父子常親于齊而齊亦不復計等列之不班從而與之㑹也非禮甚矣王氏曰遂以不正而立宣公公以不正而任其子歸父此年㑹齊侯明年㑹楚子見公與之深也諸侯失政自宣公始大夫專政自歸父始丁定王十卯三年十有五年晉景六齊頃五衛穆六蔡文十八鄭襄十一曹宣公廬元年陳成五把桓四十三宋文十七秦桓十一楚莊二十春公孫歸父㑹楚子莊于宋文左傳孟獻子言于公曰小國之免于大國也聘而獻物於是有庭實旅百朝而獻功於是有容貌采章嘉淑而有加貨謀其不免也誅而薦賄則無及也今楚在宋君其圖之公説歸父㑹楚子于宋楚子不假道於宋以啟釁端而圍之陵蔑中華甚矣襄陵許氏曰楚圍宋之威振及魯矣諸侯縱不能畏􅂤書攘夷狄存先代之後嚴兵固圉以為聲援去聲猶之可也乃以周公之裔千乗去聲之國謀其不免至於薦賄不亦鄙乎若此類聖人不徒筆之於經也比毗至反事以觀則知中國夷狄盛衰之由春秋經世之略矣陳氏曰吾大夫始特㑹楚也朱子語公孫歸父㑹楚子于宋宋人及楚人平春秋責其叛中國而從僭亂爾罪其貳伯非是春秋豈率天下諸侯以從三王之罪人哉夏五月宋文人及楚莊人平左傳春宋使樂嬰齊告急子晉晉侯欲救之伯宗曰不可天方授楚未可與爭五月楚師将去宋申犀稽首於王之馬前曰毋畏知死而不敢廢王命王棄言焉王不能答申叔時曰築室反耕者宋必聴命從之宋人懼使華元夜入楚師登子反之牀曰寡君使元以病告曰敝邑易子而食析骸而爨雖然城下之盟有以國斃不能從也去我三十里唯命是聴子反懼與之盟而告王退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞公羊傳莊王圍宋軍有七日之糧耳扵是使司馬子反乗堙而窺宋城宋華元亦乗堙而出見之司馬子反曰子之國何如華元曰憊矣易子而食之析骸而炊之子反曰嘻甚矣憊雖然是何子之情也元曰吾聞君子見人之厄則矜之小人見人之厄則幸之吾見子之君子也是以告情于子也子反曰諾勉之矣吾軍亦有七日之糧耳盡此不勝將去而歸耳揖而去之反于莊王王曰何如子反曰憊矣易子而食之析骸而炊之莊王曰嘻甚矣憊雖然吾今取此然後而歸耳子反曰臣已告之軍有七日之糧耳莊王怒子反曰以區區之宋猶有不欺人之臣可以楚而無乎是以告之也莊王曰諾舍而止雖然吾猶取此然後歸耳司馬子反曰然則君請處于此臣請歸耳荘王曰子去我而歸吾孰與處于此吾亦從子而歸耳引師而去之此皆大夫也其稱人何貶曷為貶平者在下也榖梁傳平者成也此華去聲元子反二國之卿其稱人何貶也趙氏曰皆書人兩貶之也春秋賤欺詐惡去聲侵伐二卿不愛其情釋怨解紛使宋無亾國之憂楚無滅國之罪功亦大矣宜在所褒何以貶也善則稱君過則稱已則民作忠見坊記今二卿自以情實私相告語去聲取必於上以成平國之功而其君不預知焉非人臣之義也董子曰子反與華元平是内專政而外擅名也世衰道微暴行去聲交作君有聴於臣父有聴於子夫有聴于婦中國有聴于外域仲尼所為去聲懼春秋所以作也故平以解紛啖氏曰和而不盟曰平雖其所欲而平者在下則大倫紊矣聖人明其道不計其功故褒貶如此然則臣而有安國家利社稷者専之不可乎曰専之而可者謂境外也公羊莊十九出竟有可以安社稷利國家者則専之可也子反在君之側無奏報之難機㑹之失奚急于平而專之若是哉或曰子反攘善則知其罪矣華元救國急難去聲而紓其情實何尤焉夫宋先代之後武王所封以備三恪本作愙敬之如賓客也左傳注武王克商封虞夏商之後横去聲見侵偪非有可滅之罪也若以大義責之曰子為上卿不能恤小助桀為虐陵我郊保圍我城郭欲滅我社稷縱子得之何面目見中華之士乎使子反果忠楚莊果賢必為去聲義動退師止衆結盟而反矣何必輕見音現情實蹈不測之險乎宋氏曰及者汲汲也是宋人汲汲求楚之平也後世羊陸效其所為交歡邊境而議者以為非純臣也知春秋之法矣晉書羊祜與吳陸抗對境使命交通抗遺祜酒祐饋抗藥時謂華元子反復見于今朱子語羊陸相遺問只是敵國相傾之謀陳氏曰凡平不書必關于天下之故也而後書有與楚平者矣文九年陳平不書宣十年鄭平不書至宋始書之僖二十四年宋嘗及楚平矣至莊王始書之必宋從楚必莊王得宋天下将有南北之勢春秋特致意焉永嘉吕氏曰晉與楚争陳楚討少西氏之􅅍而陳在楚宇下矣晉與楚争鄭邲之戰敗而鄭又在楚宇下矣宋伐陳而衛救之則衛又貳於楚歸父㑹于宋而魯又即於楚楚之圍宋軍罷食盡而将去矣宋人告急晉不能出師以援之宋及楚平豈得已哉書曰宋及楚人平以見中國之無伯也以見外域之恣横也以見諸侯之有畏于楚而莫有能救之者也劉氏曰公羊云大其平乎已也非也臣無專美古今之􅁩也子反何不退與其君謀而擅與宋平乎榖梁云平稱衆上下欲之也非也暨齊平何以不曰暨齊人平乎又云外平不道以吾人之存焉道之也非也宋幸得平以告諸侯故魯史有其事耳六月癸卯晉景師滅赤狄潞氏以潞子嬰兒歸左傳晉侯將伐潞諸大夫皆曰不可酆舒有三儁才不如待後之人伯宗曰狄有五罪儁才雖多何𥙷焉荀林父敗赤狄于曲梁滅潞晉侯使趙同獻俘于王杜氏曰潞氏赤狄之别種子爵也張氏曰今潞州潞城縣愚按潞州今屬平陽路其稱日謹之也上卿為主將去聲略而稱師者著其暴也陳氏曰滅國之大夫稱人貶也故荀林父滅潞氏隨㑹滅甲氏皆不書滅而舉號及氏者減見滅之罪著滅者之甚不仁也潞嬰兒不死社稷比于中國而書爵者免嬰兒之責詞也然則攘外域安諸夏非耶徐夷並興東郊不開伯禽征之書費誓玁音險狁孔熾侵鎬合老反及方宣王伐之詩小雅六月楚人侵鄭近在王畿齊侯攘之僖四皆門庭之㓂不可縱而莫禦者也雖禦之亦不極其兵力殄滅之無遺育也書盤庚今赤狄未嘗侵掠晉境非門庭之冦而恃强暴以滅之其不仁甚矣春秋所以責晉而略狄也又有異焉者夫伐國之要討其罪人斯止矣按左氏潞子夫人晉景公之姊也酆舒為政而殺之又傷潞子之目則酆舒者罪之尤也為晉計者執酆舒轘音患諸市立黎侯左傳棄仲章而奪黎氏地安定潞子改紀其政而返則諸狄服疆域安矣今乃利狄之土左傳晉侯治兵于稷以畧狄土滅潞氏以其君歸何義乎春秋所以責晉而略狄也髙氏曰是時楚肆其彊圍宋踰年晉不能救而反滅狄利其土地亦怠于憂中國矣愚按晉景公㑹狄于櫕函而不討陳滅赤狄潞氏而不救宋汲汲於赤狄而􅁯中國不可以言伯矣永嘉吕氏曰外域屢侵中國晉景滅之似也然楚之圍宋歴三時而不解晉不能興兵往救而徒加兵于狄今年書晉師滅赤狄潞氏以潞子嬰兒歸明年書晉人滅赤狄甲氏及留吁觀宋人之告急晉侯欲救之而伯宗方以納汙藏疾自諉及晉侯之欲伐狄諸大夫皆以為不可而伯宗乃曰後之人或者将敬奉徳義若之何待之嗚呼是誠何心哉其為謀不過凌弱畏强耳不得志于楚乃求得志于狄晉侯以是賞桓子又以是賞士伯又獻狄俘于周君臣之間矜然徳色何暇謀及楚哉備書而義自見矣劉氏曰公羊云潞子之為善也躬足以亾耳非也夷狄之君稱子周禮也非為善而亡也蓋迷於有爵耳榖梁云夷狄不日又曰其曰潞子賢也亦非也豈有國滅身虜而得為賢哉秦桓人伐晉景左傳秦桓公伐晉魏顆敗秦師于輔氏獲杜回髙氏曰自二年秦師伐晉晉不報秦今十四年矣此復来伐者乗晉兵畧狄土而闚其虛也故貶而人之王定札子殺召伯毛伯召音邵左傳王孫蘇與召伯毛伯争政使王子捷殺召戴公及毛伯衛杜氏曰王札子王子札也經文倒札字王臣有書字而言子者王季子是也有書子而繫音􅁇名者王子虎是也此稱王札子者榖梁以為當上之詞也何氏曰天子不言子弟故變文王札惡天子不以禮尊之而任以權王氏曰變文先名若王猛然髙氏曰矯王命以殺大臣宜名之以著其罪然書札而不書王子則與内臣柔溺之類無異書王子札則與王子虎無異故變文以别之其為當上之詞者矯王命以殺之也為天下主者天也􅁇天者君也君之所司者命也為人臣而侵其君之命則不臣為人君而假其臣以命則不君君不君臣不臣天下所以傾也並榖梁邢侯專殺雍子於朝叔向上聲以殺人不忌為賊請施邢侯君子以為義見左傳昭十四晉邢侯與雍子爭田叔魚蔽罪邢侯邢侯怒殺叔魚雍子于朝叔向曰殺人不忌為賊邢侯専殺其罪一也乃施邢侯仲尼曰義也夫王札子之罪當服此刑而天王不能施之無政刑矣何以保其國而不替乎通㫖問陸淳以為王子札曰讀經當㸔大㫖有疑處且闕之聖人之意只是罪挟王命專殺耳蜀杜氏曰桓襄之前列國諸侯交相戰伐列國不稟王命也至此而王臣有相殺者内之卿士不奉王命也襄陵許氏曰拓跋魏世髙歡覩張彛之變而生􅅍心梁武在位王侯專殺政法不施遂以􅅍亡無惑乎周之無以令天下也趙氏曰公羊云王札子者長庶之號也此􅄭穿鑿耳劉氏曰榖梁云不言其何也兩下交殺也非也凡殺大夫稱其者皆君也豈可云王札子殺其大夫召伯毛伯乎秋螽人事感於此則物變應去聲下同於彼宣公為國虚内以事外何氏曰虛内務恃外好去上聲實而務華煩于朝㑹聘問賂遺去聲之末而不知務其本者也故戾氣應之六年螽七年旱十年大水十有三年又螽十有五年復扶又反螽府庫匱倉廩竭調去聲度不給而言利尅民之事起矣張氏曰自六年至今三遇蟲灾而加之以水旱此宣公不修徳節用愛人之所感也仲孫蔑㑹齊頃髙固于無婁公作牟婁杜氏曰無婁把邑王氏曰隠四年莒伐把取牟婁即其地禮之始失也諸侯非王事而自相㑹也無以正之不自天子出矣然後諸侯與大夫㑹詳見文元㑹戚注又無以正之然後大夫與大夫㑹詳見文八盟衡雍注禮亦不自諸侯出矣田氏簒齊史齊世家康公十九年陳恒曾孫田和始為諸侯遷康公海濱六卿分晉史晉世家静公二年魏武侯韓哀侯趙敬侯滅晉而三分其地靜公遷為家人三家專魯理固然也不能辨於早後雖欲正之其將能乎髙氏曰齊侯在榖則公孫歸父㑹之齊卿在無婁則仲孫蔑㑹之蓋公主齊久矣幸晉楚之爭而不我及也忽焉而平楚宋俾歸父請于齊侯齊侯則疑我之從楚也蔑於是復㑹以脩舊好焉初稅畝左傳非禮也榖出不遇藉以豐財也公羊傳初者何始也税畝者何履畝而税也何以書譏何譏爾譏始履畝而税也古者什一而藉什一者天下之中正也多乎什一大桀小桀寡乎什一大貉小貉什一行而頌聲作矣榖梁傳初者始也古者什一藉而不稅初税畝非正也古者三百步為里名曰井田井田者九百畝公田居一私田稼不善則非吏公田稼不善則非民初稅畝者非公之去公田而履畝十取一也以公之與民為已悉矣孟子曰耕者助而不稅則天下之農皆悦而願耕於其野矣書初稅畝者譏宣公廢助法而用稅也杜氏曰公田之法十取其一今又履其餘畝復十収其一故哀公曰二吾猶不足遂以為常故曰初孫氏曰古者什一不稅于民宣公奢泰國用不足又取私田以斂其一始什二而稅也殷制公田為助助者藉也朱子曰商人以六百三十畝之地畫為九區區七十畝中為公田其外八家各授一區但借其力以耕公田而不復稅其私田周因其法為徹徹者通也朱子曰周制一夫受田百畝而與同溝共井之人通力合作計畝均収大率民得其九公取其一故謂之徹魯自宣公稅畝又逐畝什取其一則為什而取二矣其實皆什一也古者上下相親上之於下則曰駿𤼵爾私終三十里詩周頌噫嘻篇惟恐民食之不給也下之於上則曰雨去聲我公田遂及我私詩小雅大田篇惟恐公田之不善也故助法行而頌聲作矣世衰道㣲上下交惡民惟私家之利而不竭力以奉公劉向曰是時民患上力役􅈈于公田上惟邦賦之入而不惻怛以利下水旱凶災相􅁇而起公田之入薄矣所以廢助法而稅畝乎初者志變法之始也通㫖什一天下之中正不可寡亦不可多也今宣公擅變先王之仁政而滅其所以為中於其國與民者既借其力以耕公田又理民田而税其私畝書曰初税畝者志亂常之始自是而不復矣其後作丘甲成元用田賦哀十二至于二猶不足則皆宣公啟之也故曰作法于涼薄也其弊猶貪作法于貪弊将若何昭四渾罕云云有國家者必欲克守成法而不變其必先務本乎趙氏曰榖梁云非公之去公田而履畝十取一也蓋公田之外又􅂂步其田十又税其一論語曰二吾猶不足是也愚按三代制田取民雖皆不過什一而其為法至周始詳宻而周盡為人君者苟能謹守其中正之制則可以足國而裕民矣今宣公以簒得國既不能修徳以弭天灾而感水旱螽蝝之變又不能斂奢以節國用而貽飢饉空乏之憂於是一旦紊先王之制増税畝之法作法於貪其害有不可勝言矣易世而成公作丘甲而賦民之力有加于古迄春秋之終而哀公用田賦而民財民力殆無遺餘皆肇于宣公之作俑也又使諸國效尤鄭子産則作丘賦魏文侯則増租賦卒至暴秦開阡陌更賦稅而先王之制窮今不復豈非宣公首禍以致然乎春秋書初者二初獻六羽喜禮之復正也初税畝憂田制之變古也美惡不嫌同詞冬蝝生蝝悅全反公羊傳蝝生何以書上變古易常應是而有天灾其諸則宜于此焉變矣榖梁傳非災也其曰蝝非税畝之災也始生曰蝝既大曰螽本何氏注秋螽未息冬又生子災重去聲及民也而詳志之如此者急民事謹天災仁人之心王者之務也遇天災而不懼忽民事而不修而又為繁政重賦以感之國之危無日矣髙郵孫氏曰蝝者螽之子也春秋之秋夏時之夏春秋之冬夏時之秋也螽為災於夏而蝝生於秋一嵗而再為災故志也王氏曰蝝螽之子爾雅謂蝮蜪説者以為螽之有子不因牝牡腹中陶冶而自生故蝝曰蝮蜪皆蝗類故春秋記為災趙氏曰左氏云幸其不為物害而書之按此類生訖便為災如蠶食葉也為秋中之螽未息冬又生子重重為災故書耳饑春秋饑嵗多矣據隠公再書螟桓公再大水又螽莊公三大水無麥苗大無麥禾僖公不雨螽大旱文公三書歴三時不雨又螽成公大水哀公三書螽皆不書饑書于經者三而宣公獨有其二何也古者三年耕餘一年之畜勅六反九年耕餘三年之食雖有凶旱民無菜色是嵗雖螽蝝而遽至於饑者宣公為國務華去上聲實虚内事外煩於朝㑹聘問賂遺去聲之末而不敦其本府庫竭矣倉廩匱矣水旱螽蝝天降饑饉亦無以振業貧乏矣經所以獨兩書饑以示後世為國之不可不敦本也張氏曰宣兩書饑一在大水之後一在螽蝝之後甚言國無蓄積而民無以生也家氏曰蝝生自一時而言也飢自一嵗而言也戊定王十辰四年十有六年晉景七齊頃六衛穆七蔡文十九鄭襄十二曹宣二陳成六杞桓四十四宋文十八秦桓十二楚莊二十一春王正月晉景人滅赤狄甲氏及留吁左傳晉士㑹帥師滅赤狄甲氏及留吁鐸辰獻狄俘于王以黻冕命士㑹将中軍且為太傅杜氏曰甲氏留吁赤狄之别種晉既滅潞氏今又盡其遺黨按左氏董是役者士㑹也上將去聲主兵其稱人貶詞也甲氏潞之餘種上聲下同留吁其殘邑也髙氏曰書及者所以别二族春秋於外域攘斥之不使亂中夏則止矣伯禽征徐夷東郊既開而止費誓序徐夷並興東郊不開宣王伐玁音險狁至于太原而止詩六月薄伐玁狁至于太原注逐出之而已不窮追也武侯征戎瀘服其渠帥而止蜀志諸葛亮傳亮南征馬謖曰若殄盡遺類非仁者之情也願公服其心而已五月渡瀘至南中斬雍闓聞孟獲為夷漢所服募生致之既得七縱七擒獲曰公天威也南人不復反矣遂平四郡必欲盡殄滅之無遺種盤庚殄滅之無遺育豈仁人之心王者之事乎士㑹所以貶而稱人也家氏曰晉滅潞氏則曰討有罪也既滅之矣而復用師不已是必欲窮極其黨類盡夷滅之而後已夫豈仁人之所忍為故書人以貶之楚人圍宋坐視不救諉曰鞭長不及馬腹今滅潞氏又滅甲氏留吁可已而不已志存乎逐利而不能赴人之急謂諸侯何張氏曰晉自不得志於楚而一意用武於狄兼并其地㑹書人深貶之也薛氏曰櫕函之㑹未幾而三滅狄大無信也夏成周定宣榭火榭公作謝火公榖作灾左傳人火之也凡火人火曰火天火曰灾公羊傳成周者東周也宣謝者宣宫之謝也何以書記灾也成周天子之東都杜氏曰成周洛陽何氏曰天下所名為東周名為成周者本成王所定名宣榭宣王之廟也按吕大臨藍田人字與叔程門髙弟考古圖有􅌏皮變反敦音對者稱王格至也于宣榭呼内史䇿命􅌏􅌏敦之銘曰􅌏拜稽首敢對揚休命用作朕皇考龔伯尊敦􅌏其眉壽萬年無疆是知宣榭者宣王之廟也何氏曰周宣王之廟也至此不毁者有中興之功古者爵有徳禄有功必於太廟示不敢專也書甘誓用命賞于祖榭者射堂之制其堂無室以便射事故凡無室者皆謂之榭爾雅室有東西廂曰廟無東西廂有室曰寢無室曰榭謂屋歇前宣王之廟謂之榭者其廟制如榭也通㫖月令疏但有大殿無室名曰榭宣榭火何以書以宗廟之重書之也愚按書外灾者五皆以國書蓋灾及於宗廟朝市而非一處也獨此書宣榭以天子宗廟之重紀之也以責王室不謹于火備雖人火焚之而弗能救忽慢先祖之罪著矣貴戚擅殺大臣而天子不討王室不復扶又反能中興矣人火之天所以見戒乎董仲舒劉向謂王札子殺召伯毛伯天子不能誅天戒之劉氏曰公羊云外灾不書何以書新周也非也榖梁云周灾不志亦非也宋灾猶志况周灾乎来告則書爾髙郵孫氏曰公榖皆云樂器之所藏榭藏樂器則何獨名宣乎愚按啖氏謂宣王廟當在王城然成周乃王城下都之總名分言之則澗水東􅈆水西為王城都邑在焉􅈆水東下都為成周商民居焉合言之則總曰成周故洛誥多士序言往營成周成周既成是也或謂原廟始於漢東周未應立宣王廟然詩稱于周受命自召祖命書稱王在新邑烝祭文王武王則洛邑岐周鎬京皆有廟矣先王立廟蓋有故也杜氏以為宣王講武屋外傳亦云榭不過講軍實竊疑宣王南征北伐講武于此遂以為廟故其制如榭與宗廟不同張氏亦謂宣王復㑹諸侯于東都因存其廟古者祖有功故不毁是也二傳謂樂器存焉非也周官守祧掌守先王先公之廟祧其遺衣服藏焉未聞藏樂也况榭既無室何以藏樂器乎秋郯伯姬来歸按左氏郯伯姬来歸出也啖氏曰内女見出皆書来歸大其事也范氏曰為夫家所遣髙氏曰不能事舅姑為夫所出見棄而歸也内女出書之䇿者男女居室人之大倫也婚姻之禮廢則夫婦之道苦淫辟音僻之罪多矣見經解復扶又反相棄背音佩喪去聲其配耦見小序氓之詩所以刺衛朱子傳淫婦為人所棄而自叙其事以道其悔恨之意也日以衰薄室家相棄見小序中谷有蓷吐雷反所以閔周朱子傳凶年飢饉室家相棄婦人覽物起興而自述其悲嘆之辭也易叙咸恒為下經首程子傳夫婦人倫之始所以下經首咸􅁇以恒男女交合而成夫婦故咸與恒皆二體合為夫婦之義春秋内女出夫人歸凡男女之際詳書于䇿所以正人倫之本也其㫖微矣趙氏曰為婦而出著其非也吕氏曰婦人既嫁而出人道之大者故書之薛氏曰參譏之也家氏曰女生而願為有家故嫁者謂之歸人道之常也見出而曰来歸著其變也臨川吳氏曰常事不書故歸郯不書愚按春秋書郯伯姬把叔姬来歸所以譏父母之訓育弗至致内女之婦徳有虧而亦責郯把之君失齊家之道而棄其伉儷也然把叔姬書卒書把伯逆其喪歸則叔姬之出必有不當絶者而郯伯姬不書卒不書喪歸則出者與出之者其罪皆著矣冬大有年榖梁傳五榖皆熟為大有年程氏曰大有年記異也旱乾音干水溢饑饉荐臻者災也山崩地震彗孛音佩飛流者異也景星甘露醴泉芝草百穀順成者祥也大有年上瑞矣何以為記異乎凡災異慶祥皆人為所感而天以其類應去聲之者也人事順於下則天氣和於上宣公弑立逆理􅅍倫水旱螽蝝饑饉之變相􅁇而作七年大旱十年大水六年螽十三年又螽十五年螽又蝝生十年飢十五年大飢史不絶書宜也獨於是冬乃大有年所以為異乎髙郵孫氏曰大者非常之辭有者不宜有也春秋書有年皆在桓宣之時聖人之意可知矣張氏曰宣公奪嫡而立王誅不加而天灾飢饉之禍屢降今年大有年亦所以記咎徵常多故曰記異也臨川吳氏曰宣公在位十六年天灾荐臻今忽大有年所以為異也二百四十二年書有年者二豈得謂祥乎夫有年大有年一耳古史書之則為祥仲尼筆之則為異此言外微㫖非聖人莫能修之者也愚按桓公有年之後逺狩于郎犯害民物宣公大有年之先履畝而税重困農民二公得國於不義又不能修徳以撫下􅆷虐國本恬不為憂春秋之書有年既以紀天時之反常又以憫魯國之民而幸其僅有年也不爾則人類滅矣已定王十已五年十有七年晉景八齊頃七衛穆八蔡文二十卒鄭襄十三曹宣三陳成七把桓四十五宋文十九秦桓十三楚莊二十二春王正月庚子許男錫我卒昭公也在位三十年子甯嗣是為靈公丁未蔡侯申卒文公也在位二十年子固嗣是為靈公夏𦵏許昭公𦵏蔡文公日卒書名赴而得禮記之詳也隠三年𫝊謹則書日慢則書時愚按如薛伯定許男新臣許男成卒不書月𦵏而不月其略在内同上備則書日畧則書時愚按如齊桓晉文𦵏皆書日宣公為國務華而無忠信誠慤之心計利而不知禮義邦交之實哀死送終獨厚於齊而利害不切其身者皆闕如也大則薄其君親三年使微者㑹塟匡王次則忽於盟主九年晉成公卒不㑹𦵏又其次若秦若衛若滕雖来告訃怠于禮而不㑹也四年秦伯稻卒九年滕子卒衛侯鄭卒皆不㑹𦵏比毗志反事以觀義自見音現矣張氏曰春秋備書而宣公不謹於事上交鄰之罪見矣六月癸卯日有食之己未公㑹晉侯景衛侯穆曹伯宣邾子定同盟于斷道斷音短左傳春晉侯使郤克徴㑹于齊齊頃公帷婦人使觀之郤子登婦人笑于房獻子怒出而誓曰所不此報無能涉河獻子先歸使欒京廬待命于齊曰不得齊事無復命矣郤子至請伐齊晉侯弗許請以其私屬又弗許齊侯使髙固晏弱蔡朝南郭偃㑹于斂盂髙固逃歸夏㑹于斷道討貳也盟于卷楚辭齊人執晏弱蔡朝南郭偃晏桓子逸穀梁傳同者有同也同外楚也程子傳諸國同心欲伐齊故書同盟杜氏曰㫁道晉地書同盟者志同欲也本公羊大國率之小國畏威而從命非同欲也如宋襄公盟于曹南小國訴之大國勉强上聲而應去聲焉非同欲也如莒人請盟于魯公孫敖如莒涖盟若斷道之盟諸侯同心謀欲伐齊釋其憤怒非有不得已而要平聲之者也愚按魯衛曹邾皆迫于齊故同有伐齊之心而晉又欲討其貳㑹逢其適觀明年晉衛伐齊又二年四國與齊戰鞌則此盟為同謀伐齊可知矣鞌戰邾人不與者國小不能以兵從也或以為㑹同天子之事築宫為壇設方明如方嶽之盟故書同劉氏曰同所以名盟焉耳非同時之謂也以周禮言之殷見曰同同者巡狩殷國也以儀禮言之則設方明主日月而命事者同盟也覲禮諸侯覲于天子為宫方三百步四門壇十有二尋深四尺加方明于其上方明者木也方四尺設六色六玉注方明者上下四方神明之象也㑹同而盟明神監之王巡狩至于方嶽之下諸侯㑹之亦為此宫以見之疑其説之誤矣愚按襄十八年書同圍齊未嘗講㑹禮豈亦行㑹同之禮傳紀楚公子罷戎與鄭人同盟于中分邾人郳人徐人㑹宋公同盟于蟲初無五等諸侯亦豈能用㑹同之制哉秋公至自㑹愚按宣公㑹盟兩書至黑壤之㑹事齊而不事晉危晉之見討而不得釋也斷道之盟背齊而與晉謀伐齊危齊人之見討也宣自即位以来卑屈事齊惟恐獲戾末年遽有伐之之意初乞師于楚尋復求助于晉齊近於魯而逺借援於大國以間朝夕之好岌岌乎其殆哉冬十有一月壬午公弟叔肸卒肸許乙反左傳公母弟也凡太子之母弟公在曰公子不在曰弟凡稱弟皆母弟也榖梁傳其曰公弟叔肸賢之也其賢之何也宣弑而非之也非之則胡為不去也曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食君子以是為通恩也以取貴乎春秋稱弟得弟道也佞夫齊年鄭語宋辰秦鍼陳光招衛黒背鱄稱弟不稱字稱字賢也許叔蔡叔蔡季紀季稱字不稱弟何賢乎叔肸宣弑而非責也之也非之則胡為不去也兄弟無絶道故雖非之而不去也與之財則曰我足矣終身不食宣公之禄君子以是為通恩也論情可以明親親言義可以厲不軌本范氏注所以取貴乎春秋書曰公弟而稱字以表之也通㫖叔􅆄書弟明其得弟道比于衛鱄又足貴焉故特書字以褒之有偏愛之私情則稱弟無親親之公義則稱弟以先公之子而稱公子史䇿常文公子為正大夫而書卒貴也不為大夫而特書卒賢也啖氏曰叔􅆄非卿卒而特書之嘉其行合於義曰公弟明其得弟道也穀梁於鱄言合於春秋此言取貴於春秋既合義又足貴也故書字以褒之孫氏曰不曰公子公孫以見叔􅆄無禄而卒也王氏曰叔􅆄之生不名于䇿書則非卿矣死不目為公子則未仕矣變文曰公弟合名與字卒之者知其賢而得書也或以為叔􅆄寵弟在宣公有私親之愛故生而賜氏俾世其卿與季友仲遂比則其説誤矣誠使叔􅆄有寵生而賜氏則是貴戚用事之卿豈有不見音現下同於經者齊年鄭語在外之見於經者齊年兩来聘鄭語来盟季友仲遂在内之見於經者季友莊公弟二十五年書如陳二十七年書如陳𦵏原仲仲遂僖公弟二十六年書如楚乞師二十七年書帥師入把二十八年書如齊三十年書如京師如晉三十一年書如晉三十三年書帥師伐邾勢必與音預下同聞政事執國命矣况宣公之時煩於聘問㑹朝之禮遂蔑季孫歸父交於鄰國衆矣遂三如齊蔑如京師㑹齊髙固行父再如齊歸父亦再如齊一如晉伐邾取繹㑹齊伐莒㑹齊侯又㑹楚子而獨叔􅆄不與焉其非生而賜氏俾世其卿亦明矣劉氏曰叔􅆄不仕宣公則非大夫非大夫而書于春秋以叔􅆄之義則固可以為大夫矣見公弟之重者所以非宣公之弑也舉叔􅆄之字者所以知其人之賢也􅆄非賢則不得字字而不稱弟則與季友仲遂亂故見其重而後賢之此春秋之舉逸民也逸民七人不同操然而不降其志不辱其身身中清廢中權叔􅆄兼之矣陳氏曰公弟者何非見大夫也非大夫而卒賢之者賢之所以惡宣公也凡先君之子稱公子有謂稱弟是故宋地辰兄弟也一篇之間譏稱宋公之弟辰無譏則從其恒稱為公子地陳公子招一人也譏稱陳侯之弟招無譏則從其恒稱為公子招故不弟稱弟不友稱弟𫝊曰陳侯之弟招殺陳世子偃師罪在招也秦伯之弟鍼出奔晉罪秦伯也叔􅆄稱弟惡宣公也愚按成二年書公孫嬰齊帥師自是終春秋之世世為大夫蓋叔􅆄辭禄不受而宣公以母弟懿親命其子為大夫也庚定王十午六年十有八年晉景九齊頃八衛穆九蔡景公固元年鄭襄十四曹宣四陳成八把桓四十六宋文二十秦桓十四楚莊二十三卒春晉侯景衛穆世子臧伐齊頃左傳晉侯衛太子臧伐齊至于陽榖齊侯㑹晉侯盟于繒以公子疆為質于晉晉師還蔡朝南郭偃逃歸保國以禮為本者也齊頃音傾公不謹於禮謂婦人笑辱自已致冦所謂國必自伐而後人伐之矣本孟子諸侯上卿皆執國命取必於其君以行其克伐怨欲之私故盟于斷道師于陽穀大戰于鞌音安逞其志而後止春秋詳書于䇿見伐與伐者之罪皆可以為鑒矣愚按齊自翟泉以来不與于晉之㑹盟而恃其强大侵暴小國是以晉景欲振奕世之伯業始則君率衛以伐齊􅁇而正卿舉合境之兵偕魯衛曹以戰齊蓋非專以婦人笑客之故也薛氏曰齊不與於諸侯之㑹而伐之也書衛之世子代父掌兵非子道也臨川吳氏曰㑹朝與伐國皆非世子之所宜也公伐把桓髙氏曰把自文十六年来朝而不復至故伐之已不修徳而欲人朝已亦不思之甚矣徐氏曰公伐莒萊邾把凡近魯小國無不被伐公之惡也悉矣陳氏曰自是内不書君將征伐在大夫矣夏四月秋七月邾定人戕鄫子于鄫戕音牆鄫方陵反左傳凡自内虐其君曰弑自外曰戕公羊傳戕者殘賊而殺之也穀梁傳戕猶殘也扼殺也戕者殘賊而殺之也于鄫者刺臣子不能救君難去聲也何氏曰刺鄫無守備范氏曰惡其臣子不能拒難夷貉音麥無城郭宫室百官有司單車使去聲者直造去聲其廬帳虜其酋慈秋反長上聲者則有之矣前漢昭元鳳四年遣平樂監傅介子使樓蘭詐誘其王安歸斬之中國則重平聲門擊柝音託見易大傳亷陛等威本賈誼䇿侍衛守禦之嚴奚至於坐使其君為邾人殘賊殺之而莫禦乎邾人蓋嘗執鄫子用之孫氏曰僖十九邾人執鄫子用之天子不能誅故此肆然復􅆷鄫子于鄫也則不共戴天之世讐也既不能復又使邾人得造其國都而戕殺其君曰于鄫者所以深責鄫之臣于至此極也何氏曰支解節㫁之故變殺言戕杜氏曰弑戕皆殺也弑者積㣲而起所以相測量非一朝一夕戕者卒暴之名薛氏曰戕者殺異國之君也邾力足以加鄫而屡無道於鄫則魯以強大加邾蓋出乎爾者也愚按邾稱人蓋邾子而貶之也使果微者則當書曰盜殺鄫子其今曰邾人則為邾子明矣邾文公用鄫子邾定公戕鄫子皆黜稱人惡其奕世􅇯虐滅人理而悖天常也蔡靈蔡昭見殺則録其名而鄫之二君不名蓋無罪而受禍爾甲戌楚子旅卒旅穀作吕楚始書卒莊王也在位二十三年子共王審嗣公羊傳何以不書𦵏吳楚之君不書𦵏辟其號也楚僭稱王降而稱子者是仲尼筆之也魯史必書楚某王卒聖人革其僭號故曰楚子某卒其不書𦵏者恐民之惑而避其號也是仲尼削之也坊記春秋不稱楚越之王喪恐民之惑也杜氏曰吳楚之𦵏僣而不典故絶而不書同之夷蠻以懲求名之偽若楚若吳若徐皆自王降而稱子史楚世家周夷王之時王室微熊渠甚得江漢間民和熊渠立為王厲王暴虐熊渠畏其伐去王號十一世至熊達伐隨令請王室尊為王王室不聽乃自立為武王吳世家至壽夢始大稱王外紀徐夷作亂穆王分東方諸侯命徐子主之得朱弓朱矢以為天瑞自號偃王陸地而朝三十六國愚按楚至僖二十一年成王㑹盂始書子至莊王始書卒吳至襄十二年夀夢始書子書卒徐至昭四年駒王章禹書子若滕自侯降而稱子隠七年書侯桓二年以後書子若把自伯降而稱子莊二十七年書伯僖二十三年書子四夷雖大皆曰子曲禮注九州之外長雖有侯伯之地本爵亦無過子其降而稱子者狄之也或謂春秋不擅進退諸侯􅅍名實劉氏意林則非矣述天理正人倫此名實所由定也奚名為􅅍哉愚按朱子綱目於七雄稱王皆書曰某君漢以後僣國稱帝者皆書曰某主蓋取法于春秋吳楚書子之義也然吳楚稱子特從天子所封之本爵而黜其僣號也後世僣國非有朝廷封爵而自稱皇帝故但曰某主耳髙氏曰前此不書楚子之卒者外楚人也此書之者以楚入為中國之害甚於前日中國不能自正乃與楚人相為朝聘相與盟誓相通問好故自此詳志其卒也公孫歸父如晉景宣公因齊得國故刻意事之雖易世猶未怠也及頃音傾公不能謹禮怒晉魯上卿穀梁傳季孫行父秃晉郤克眇衛孫良夫跛書公子手僂同時而聘于齊齊使秃者御秃者使眇者御眇者使跛者御跛者使偻者御僂者蕭同姪子處臺上而笑之聞於客客不説而去相與立胥閭而語移日不解齊人有知之者曰齊之患必自此始矣而郤音隙克當國決䇿討之晉方强盛齊少懦矣於是背昔佩下同齊而事晉其於邦交以利為向背無忠信誠慤之心者也按左氏歸父欲去上聲下同三桓以張公室與公謀而聘於晉欲以晉人去之夫輕於背與國易於謀大家而不知其本未有能成而無悔也然則公室不可張乎務引其君當道本孟子正心以正朝廷本董子禮樂刑攻自己出也其庶幾乎必欲倚外援去聲以去之是去疥􅅑音陽而得腹心之疾也庸愈哉吳語越之在吳猶人之有腹心之疾也夫齊魯譬諸疾疥癬也家氏曰歸父為宣公謀去三家以張公室其心雖未可知其事未見非正而謀之不臧乃欲因大國之力鋤而去之豈不思晉之諸卿自趙盾秉權而後怙黨植私漸至不制魯宣欲去强宗夫豈晉卿之所願哉宜其謀之不遂也冬十月壬戌公薨于路寢穀梁傳正寢也愚按桓公弑立則斃于齊宣公亦弑立而獲正終然魯君自是失政而三家强盛不復可制矣歸父還自晉至笙遂奔齊笙公穀作檉左傳季文子言于朝曰使我殺適立庶以失大援者仲也夫臧宣叔怒曰當其時不能治也後之人何罪子欲去之許請去之遂逐東門氏子家還及笙壇帷復命于介既復命袒括髪即位哭三踊而出遂奔齊書曰歸父還自晉善之也公羊傳還者善辭也仲尼稱孟莊子之孝其不改父之臣與父之政是難能也朱子語人固有用父之臣者然稍拂他私意便自容不得又曰三年無改於父之道可謂孝矣尹氏曰三年無改者孝子之心有所不忍故也夫仁人孝子於其父之臣非有大不可如晉悼公於夷羊五之屬成十八悼公即位逐不臣者七人注夷羊五之屬必存始終進退之禮而不遽也歸父以君命出使去聲下同未反而君薨在聘禮有執圭復命于殯之文升自西階子臣皆哭情亦戚矣儀禮聘禮篇君若薨而後歸執圭復命于殯升自西階不升堂子即位不哭辯復命如聘子臣皆哭出袒括髪入門右即位踊今宣公猶未殯而東門氏逐忍乎哉書曰歸父還自晉者已畢事之詞也本陸氏杜氏曰大夫還不書春秋之常也今書歸父還奔善其能以禮退通㫖出使而反或曰復或曰還復者事未畢還者事已畢之詞也歸父受命而聘晉雖已至于晉而反矣然而未復命于殯則不可謂已終事也歸父欲入而復命則必見殺見殺則増君之惡其出奔賢于入也况又壇帷復命于介袒括髪即位哭三踊而出不失禮乎曰還曰至以終事之辭免歸父也至笙遂奔齊者罪成公君臣死君而􅁯父逐之亟也穀梁子曰捐以全反殯而奔其父之使者是亦奔父也范氏曰歸父奉父命未反而已逐之是與親奔父無異得經意矣君薨家遣方寸宜亦亂而造去聲次顛沛不失禮焉非志於仁者弗能也詞繁而不殺所賣反歸父之善自著矣何氏曰善其不以家見逐怨懟成踊哭君終臣子之道起時莫能然也比毗志反事以觀則見當國者有無君之心此春秋所以作不可不察也髙氏曰夫先君未殯而逐其臣是死其君而􅁯其父也歸父既畢使事盡哀而奔是知死亡之不免而能不失度於顛沛造次之時異乎他大夫之奔矣雖然人臣之正受命而出雖君薨猶當致命于殯前若其有罪待命于新君可也今歸父還未及魯境遽即奔齊則有惡于新君矣家氏曰季氏不以君薨為戚肆出悖言追仇既往首逐其腹心用事之臣此時此心犯上作亂何所不為春秋於公薨之後􅁇書歸父奔齊所以著季氏不臣之跡其㫖微矣自兹以往政在强家魯君不復能君禍端􅅍本實肇於此彼簒人之國季氏亦􅀼其國出爾反爾尚復誰尤春秋書之所以致􅅍賊之討垂將来之戒云愚按公孫敖如京師不至而復丙戌奔莒則壅君命而廢使事者也歸父如晉還自晉至笙遂奔齊則能達君命而畢使事者也然楚箴尹克黄使於齊還及宋聞若敖氏既滅其人曰不可以入矣箴尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘于司敗歸父茍能不避斧鉞之誅而歸復命於殯斯為盡人臣之職矣春秋胡傳附錄纂疏卷十八
