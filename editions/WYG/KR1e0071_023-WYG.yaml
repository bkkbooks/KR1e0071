body:
  text: 春秋胡傳附録纂疏卷二十一元汪克寛撰襄公上公名午成公妾定姒之子四嵗即位在位三十一年已簡王十丑四年崩元年晉悼公周元年齊靈十年衛獻五年蔡景二十年鄭成十三年曹成六年陳成二十七年把桓六十五年宋平四年秦景五年楚共十九年吴夀夣十四年春王正月公即位穀梁傳􅁇正即位正也通㫖内無所承上不請命則不書即位在春秋時諸侯皆不請王命矣然承國於先君者則得書即位以别於内􅃨無所承者文成襄昭哀五公是也仲孫蔑㑹晉悼欒黶宋平華元衛獻寗殖曹成人莒犂比人邾宣人滕成人薛人圍宋彭城殖市立反左傳非宋地追書也於是為宋討魚石故稱宋且不登叛人也謂之宋志彭城降晉晉人以宋五大夫在彭城者歸寘諸瓠丘公羊傳宋華元曷為與諸侯圍宋彭城為宋誅也其為宋誅奈何魚石走之楚楚為之伐宋取彭城以封魚石魚石之罪奈何以入是為罪也楚已取之矣曷為繫之宋不與諸侯専封也榖梁傳繫彭城於宋者不與魚石正也按左氏曰非宋地追書也杜氏曰楚取彭城已封魚石故曰非宋地夫子治春秋追書繫之宋然則書圍彭城者魯史舊文也曰圍宋彭城者仲尼親筆也唐陳氏曰史策以常文書苐曰圍彭城而無宋字聖人脩春秋不與魚石之専邑叛君追書而稱宋彭城楚已取彭城封魚石戍之三百乘繩証反矣則曷為繫之宋楚不得取之宋魚石不得受之楚雖専其地君子不登杜氏曰成也叛人所以正疆域固封守謹王度也范氏曰彭城已屬魚石今猶繫宋者崇君抑叛臣也孫氏曰彭城宋邑也魚石宋叛臣也楚取宋邑使宋叛臣守之故雖入於楚孔子還繫之于宋所以抑强夷而黜叛臣也劉氏曰楚為不道奬亂助惡使臣叛其君春秋所惡也雖得其地春秋不與也凡諸侯受封於天子固有常分强者不得獨兼弱者不得獨失有王者作强者將損之弱者將益之故宋雖失彭城猶未為非宋也髙郵孫氏曰蒯聵出奔七年于外矣衛侯元卒而輙已立為君於蒯聵之納也必曰世子蒯聵若曰是乃世子也輙安得為君乎彭城已入于楚而以之居魚石矣於其圍之必曰宋彭城若曰彭城乃宋邑魚石安得受之於楚乎石氏曰齊國夏衛石曼姑圍戚不曰衛戚不與齊衛大夫助子圍父也此圍彭城繫之宋不與夷狄取中國之地以助叛臣也一字之筆削父子君臣之倫夷夏之分咸具焉愚按彭城已奪於楚晉悼討魚石而還之宋使之復王制之正書曰圍宋彭城褒之也十年戍鄭虎牢駐師阨險以逼鄭使鄭人失王制之舊書曰戍鄭虎牢貶之也美惡不嫌同詞皆所以明王制也夏晉悼韓厥帥師伐鄭成仲孫蔑㑹齊靈崔杼曹成人邾宣人把桓人次於鄫厥公作屈鄫公作合左傳晉韓厥荀偃帥諸侯之師伐鄭入其郛敗其徒兵于洧上於是東諸侯之師次于鄫以待晉師晉師自鄭以鄫之師侵楚焦夷及陳晉侯衛侯次于戚以為之援杜氏曰鄫鄭地在陳留襄邑縣東南愚按襄邑縣今屬汴梁路睢州楚人釋君而臣是助昭二十一宋華氏叛如楚乞師楚太宰犯諫曰諸侯惟宋事其君今又争國釋君而臣是助哀二趙簡子云棄君助臣事已悖矣晉於是乎降户江反彭城以魚石等歸遂伐鄭而諸侯次於鄫此皆放甫兩反於義而行者也鄭棄中國而從蠻夷助叛臣以逼其君皆非義也晉悼公既禽五大夫於是伐鄭以討其從楚納魚石之罪然不重勤諸侯而使韓厥以偏師伐之皆合于義者也傳直戀反書楚子辛公子壬夫救鄭而經不書者鄭本為于偽反楚以其君之故親集矢於目是以與楚而不貳也見下鄭伯㫻卒棄中國從蠻荆不能以大義裁之惟私欲之從則鄭無可救之善楚不得有能救之名經所以削之不言救也自鄢陵之戰楚子救鄭楚子重救鄭楚公子申救鄭皆不書義與此同髙氏曰晉以韓厥已足當鄭不欲重勤東諸侯之師故使之次于鄫以震鄭心且偹楚師之出也愚按齊桓伐楚次于陘不欲速戰以勝楚晉悼伐鄭而使諸侯之師次于鄫不欲速圍以虐鄭皆霸者不輕用兵而重民命之意也故文定傳曰伐而書次其次為善然左氏謂韓厥荀偃帥諸侯之師伐鄭入其郛又謂以鄫之師侵楚皆與經不同故啖氏曰時魯㑹不須告命知傳􅄭也秋楚共公子壬夫帥師侵宋平左傳楚子辛救鄭侵宋吕留鄭子然侵宋取大丘愚按楚憤宋之復彭城且欲援鄭而退諸侯之師故復釋憾于宋髙氏曰不敢敵諸侯之師而侵宋者盖攻其所必救也以其無名加兵故書曰侵九月辛酉天王崩簡王也在位十四年子泄心嗣位是為靈王邾子宣來朝冬衛侯獻使公孫剽來聘晉侯悼使荀罃來聘剽匹妙反簡王崩赴告已及藏在諸侯之策矣襄二十名藏在諸侯之䇿則宜以所聞先後而奔喪今邾子方來修朝禮衛侯晉侯方來修聘事於王喪若越人視秦人之肥瘠在亦反本韓文諍臣論曽不與音預焉而左氏以為禮此何禮乎左傳邾子來朝禮也衛子叔晉知武子來聘禮也凡諸侯即位小國朝之大國聘焉禮之大者也愚按杜預范甯皆云王崩赴未至故各得行朝聘之禮今考邾子來朝之時謂赴未至於諸侯猶之可也踰月之後安有赴告未及者然歴秋暨冬衛晉不廢聘好縱彼未聞赴而來魯亦豈可晏然受之乎按禮諸侯已見揖讓入門不得終禮者六天子崩太廟火日食后夫人之喪雨霑服失容則廢春秋􅁇王崩而書朝聘朝者聘者受之者皆有罪也滕定公薨世子定為三年喪父兄百官皆不欲曰吾宗國魯先君莫之行也見孟子喪紀益廢民習于耳目而不察故後世以日易月唐順宗實録遺詔以日易月十三日小祥二十五日大祥二十七日釋服人子安而行之不知春秋之義無君臣之禮豈不惜哉孫氏曰天王崩邾子衛晉之朝聘皆不臣也王氏曰襄公即位則邾子來朝晉衛來聘簡王崩而諸侯無奔喪之事靈王立而諸侯無始見之文當時狃習流俗不復知有京師矣使春秋不作三綱五常之道與蠻夷禽獸奚擇焉髙氏曰凡諸侯嗣立必朝于天子而童子侯不朝者天子不與為禮也童子侯雖不朝而聞天子之喪必奔者明臣子之于君父非有老少也喪事尚質而無周旋之禮但盡悲哀而已矣襄公雖幼不朝而亦不奔天王之喪矧以四嵗即位而小國來朝大國來聘安能以禮相接乎庚靈王寅元年二年晉悼二齊靈十一衛獻八蔡景二十一鄭成十四卒曹成七陳成二十八把桓六十六宋平五秦景八楚共二十吴夀夣十五春王正月塟簡王杜氏曰五月而塟速鄭成師伐宋平左傳鄭師侵宋楚令也髙氏曰楚以彭城故令鄭伐之鄭受制於強楚而為之伐中國不貶人之而書師者非所以伸之盖懲其動衆耳襄陵許氏曰書伐宋者積鄭之疼夏五月庚寅夫人姜氏薨杜氏曰齊姜成公夫人六月庚辰鄭伯㫻卒㫻古囷反左傳鄭成公疾子駟請息肩于晉公曰楚君以鄭故親集矢于其目非異人任寡人也若背之是棄力與言其誰䁥我免寡人惟二三子髙氏曰不書塟者以成公背中國故諸侯不㑹其塟也愚按成公在位十四年子髠頑嗣是為僖公晉悼師宋平師衛獻甯殖侵鄭僖左傳於是子罕當國子駟為政子國為司馬晉師侵鄭諸大夫欲從晉子駟曰官命未改杜氏曰晉伐喪非禮宋雖非卿師重故叙衛上髙郵孫氏曰晉宋稱師將卑師衆也甯殖書名將尊師少也李氏集義上言鄭伯㫻卒下書三國之師侵鄭此不待變文而後為譏其伐喪也蘇氏曰鄭雖有畔中國之罪而伐其喪非禮也張氏曰士匃侵齊聞喪而還春秋與之則兹伐喪之罪不待貶而見矣劉氏曰穀梁云其曰衛甯殖如是而稱于前事也説者曰初衛侯速卒鄭人侵之故舉寗殖之報以明稱其前事皆非也將尊師少書將理然也若人伐已喪已亦伐人喪是以怨報怨春秋豈為是書之哉秋七月仲孫蔑㑹晉悼荀罃宋平華元衛獻孫林父曹成人邾宣人于戚左傳㑹于戚謀鄭故也孟獻子曰請城虎牢以逼鄭知武子曰善鄫之㑹吾子聞崔子之言今不來矣滕薛小邾之不至皆齊故也寡君之憂不惟鄭罃將復于寡君而靖于齊得請而告吾子之功也若不得請事將在齊吾子之請諸侯之福也豈唯寡君穎之王氏曰諸侯之大夫專㑹以謀鄭政在大夫也蜀杜氏曰大夫専恣春秋不加貶削之文而直叙其㑹以志其甚己丑塟我小君齊姜左傳齊侯使諸姜宗婦來送塟杜氏曰齊諡也三月而塟速唐陳氏曰穆姜有美檟頌琴文子取之以塟公羊不知婦先姑薨故疑之也叔孫豹如宋平左傳通嗣君也冬仲孫蔑㑹晉悼荀罃齊靈崔杼宋平華元衛獻孫林父曹成人邾宣人滕成人薛人小邾人于戚遂城虎牢左傳復㑹于戚齊崔武子及滕薛小邾之大夫皆㑹知武子之言故也遂城虎牢鄭人乃成程子傳設險所以守國也有虎牢之險而不能守故不繫于鄭責其不能有也杜氏曰虎牢河南成臯縣張氏曰故東虢之邑鄭滅虢為制邑秦漢為成臯東有汜水今孟州汜水縣有故虎牢城愚按汜水縣屬今汴梁路鄭州虎牢鄭地故稱制邑至漢為成臯今為汜音姒水縣巖險聞于天下鄭莊公曰制巖邑也猶虞之下陽見僖二趙之上黨通鑑赧王五十五年秦攻趙上黨㧞之輿地志河東上黨縣言其地極髙與天為黨有太行羊頭山今屬潞州魏之安邑通鑑烈王七年韓趙伐魏圍安邑按魏本都安邑乃堯舜舊都即鳴條之野今屬解州燕於賢反之榆闗輿地志燕平州之東有榆闗一夫守之可以當百今在平灤路盧龍縣城東一百八十里吳之西陵吴志陸抗曰西陵國之西門若不守則荆州非吾有也西陵即夷陵今峽州蜀之漢樂音洛蜀志建興七年築漢城于沔陽築樂城于成固按沔口晉吴皆以為重鎮控引秦梁路通荆雍今屬漢陽府成固即漢中隋書以謂成都之喉嗌今屬興元路南鄭縣地有所必據城有所必守而不可以棄焉者也通㫖鄭之虎牢三國之祁山西陵濡須皆國之存亡所係者有是險而不能守故不繫於鄭然則據地設險亦所貴乎天險不可升也地險山川丘陵也王公設險以守其國大易之訓也易坎卦彖傳城郭溝池以為固六君子之所謹也禮運鑿斯池築斯城與民同守孟子之所以語魚據反滕君也夫狡交卯反焉思啓封疆成八申公巫臣云云而争地以戰殺人盈野争城以戰殺人盈城者固非春秋之所貴守天子之土􅁇先君之世不能設險守國將至於􅁶潰滅亡亦非聖人之所與故城虎牢而不繫於鄭程氏以為責鄭之不能有也其聖人以待衰世之意小康之事􅁘永嘉吕氏曰楚丘不言衛縁􅁜不言把皆是衛把不能有之而齊桓城之爾然則城虎牢亦鄭不能有而諸侯城之張氏曰虎牢所以不繫鄭者鄭人背盟棄好黨楚以為中國患悼公動天下之諸侯以討之而負固自若故從孟獻子之謀城其巖邑以制之以霸主而討不服從之國地非鄭之所可私有故彭城非宋有也霸主為宋討則繫之宋虎牢鄭地也以中國當討鄭而不繫之鄭皆春秋明王制以示予奪之正也家氏曰虎牢諸夏之藩表得之以興失之以亡内外之限界在焉邑雖屬於鄭險則闗乎中國故城虎牢不繫于鄭明虎牢非鄭之所宜有也鄭之封疆嘗受之天子曷不以繫之鄭乎曰鄭叛盟從楚以天子之侯度甘為夷屬辱天子之封守罪當削書諸侯城虎牢不曰鄭虎牢削之于鄭也削之于鄭歸之于中國所以正王制内外之分故書曰遂城虎牢蓋舊史書城鄭虎牢聖人削之曰城虎牢故曰非聖人莫能修陸氏曰諸侯之大夫取他國之邑相與城之非正也城虎牢可以安中國息征伐故聖人許之而不繫於鄭也吳興沈氏曰不言伐取且不繫之鄭皆所以與晉也愚按自平王東遷鄭武公入為卿士王賜之虎牢以東後失其地鄭厲公納惠王而王復與之焉然齊桓之霸説申侯而與之虎牢則固未嘗以虎牢為中國之輕重也迨悼公之霸則近楚微國若江黄弦庸六蓼羣舒之類吞噬靡遺中國諸侯若陳若蔡若許亦已服役于楚夷于屬縣而鄭以王室懿親畿内大國又屈而從楚茍非阨虎牢之險以制其棄同即異之心則楚將越鄭而東蹂躪中華之境其不薦食幷吞者㡬希矣故虎牢之城不繫于鄭責鄭而與中國也春秋書遂伐楚見諸侯之専也書遂城虎牢見大夫之專也趙氏曰公羊云不書取為中國諱也按夫子増損經文以示義何諱之為若言鄭虎牢則以譏之也劉氏曰榖梁云若言中國焉内鄭也非也鄭不服晉諸侯伐之可謂外之矣反謂内之乎楚共殺其大夫公子申左傳楚公子申為右司馬多受小國之賂以偪子重子辛楚人殺之故書曰楚殺其大夫公子申劉氏曰嬰齊壬夫畏其偪而殺之也髙氏曰晉城虎牢有以勝楚矣楚無所歸咎而殺其用事之臣襄陵許氏曰著楚之所以不競于晉也辛靈王卯二年三年晉悼三齊靈十二衛獻七蔡景二十二鄭僖公髠頑元年曹成八陳成二十九把桓六十七宋平六秦景七楚共二十一吴夀夣十六春楚共公子嬰齊帥師伐吴夀夣呉楚争强自此始左傳楚子重伐呉為簡之師克鳩兹至于衡山使鄧廖帥組甲三百被練三千以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而已既飲至三日吳人伐楚取駕駕良邑也鄧廖亦楚之良也楚人以是咎子重子重病之遇心疾而卒襄陵許氏曰國政失御大臣相殘又外結吳怨而内與晉讐此共王之所以不振也陳氏曰于是楚伐吳呉伐楚取駕則其但書伐吳何春秋于吳楚未嘗無差等也是故楚伐吴悉書之吴伐楚必若遏門于巢卒而后書公如晉左傳始朝也髙氏曰童子侯不朝王盖不可接以成人之禮也豈可反朝同列乎夏四月壬戌公及晉侯悼盟于長樗樗勅居反左傳孟獻子相公稽首知武子曰天子在而君辱稽首寡君懼矣孟獻子曰以敝邑介在東表宻邇仇讐寡君將君是望敢不稽首杜氏曰晉侯出其國都與公盟于外稽首首至地事天子之禮張氏曰孟獻子魯之賢大夫尚不知君臣之義以相其君所謂不知先立乎其大者春秋諸賢之同病也長樗近晉之地蘇氏曰晉侯修禮於諸侯故去其國都與公盟于長樗髙氏曰出國都以與公盟此悼公之敬也愚按魯君朝晉而盟者四文公有三焉晉襄首以陽處父盟公明年又要公盟于國都靈公亦與公盟于其國唯此年晉悼特去國都而與公盟長樗有以見襄靈之倨而悼公之謙宜悼公之能復霸也公至自晉何氏曰上盟不于國都嫌如晉不得入故以晉致六月公㑹單子頃晉侯悼宋公平衛侯獻鄭伯僖莒子黎比邾子宣齊靈世子光己未同盟于雞澤單音善左傳晉為鄭服故且欲修呉好將合諸侯使士匄告于齊曰寡君願與二三兄弟相見以謀其不協請君臨之使匄乞盟齊侯欲勿許而難為不恊乃盟于耏外六月公㑹單頃公及諸侯己未同盟于雞凙晉侯使荀㑹逆吳子于淮上呉子不至榖梁傳同者有同也同外楚也程子傳楚强諸侯皆畏之而脩盟故書同杜氏曰單頃公王卿士雞澤晉地在廣平曲梁縣西南任公輔曰地譜一名雞丘張氏曰今名州雞澤縣愚按縣有水名雞澤今屬廣平路同盟或以為有三例一則王臣預盟而書同二則諸侯同欲而書同三則惡烏故反其反覆音腹而書同夫惡其反覆與諸侯同欲而書同信矣王臣預盟而書同義則未安盟于女音汝栗文十及蘓子也而不書同盟于洮他刀反僖八于翟音狄泉僖二十九㑹王人也而不書同然則此三盟者正所謂諸侯同欲而書同盟也其同欲奈何同病楚也朱子語襄公之世晉悼公出來整頓一番楚始退去㑹于柯陵之嵗成十七尹子單子同盟夏伐鄭楚人師于首止而諸侯還音旋下同冬伐鄭楚人師于汝上而諸侯還雞澤之盟陳袁僑如㑹楚師在繁陽楚地而韓獻子懼左傳楚師為陳叛故猶在繁陽韓獻子患之言于朝曰文王帥殷之叛國以事紂唯知時也今我易之難哉平丘之行楚棄疾立復扶又反封陳蔡而中國恐昭十三劉子同盟榖梁同外楚也是知此三盟者諸侯皆有戒心而修盟故稱同不以尹子單子劉子亦預此盟而譏之也夫王臣將命必惇信明義而後可以表正乎天下諸侯守邦必尊主􅆢法而後可以保其社稷今王臣下與諸侯約誓諸侯亦敢上與王臣要於妙反言斯大亂之道也則亦不待書同盟而罪自見音現矣髙氏曰此因城虎牢之故鄭服而同盟又諸侯同心病楚而王臣亦與焉故書同單子王臣而下與諸侯盟故特書日以間之張氏曰晉悼公始合諸侯尊王室而盟單子與桓公首止葵丘異矣故書公㑹單子諸侯己未同盟于雞澤所以譏其儕王官于諸侯俾下同于㰱血其事不足乎揚故不再言雞澤而例之於新城同盟之書也愚按悼公自京師歸而得國故㑹單頃公假王命以求諸侯也春秋於柯陵先書伐而􅁇書某日同盟平丘先書㑹而亦再書某日同盟此則上書㑹而下書日以同盟皆不再舉諸侯所以著王臣與盟而貶其瀆分之罪也葵丘之盟宰孔不與而再書諸侯則齊桓謹分之美見矣况柯陵平丘之盟書日皆􅁇事之辭也此盟非􅁇事特繫日于齊世子光之下與新城之盟繫日于趙盾之下同文以見紊上下之分不可不書日以謹之也陳侯成使袁僑如㑹僑其驕反左傳楚子辛為令尹侵欲于小國陳成公使袁僑如㑹求成公羊傳其言如㑹何後㑹也榖梁傳如㑹外乎㑹也於㑹受命也髙氏曰陳自辰陵即楚二十有八年晉屢争鄭而不争陳者非不争陳也得鄭則亦得陳者也今聞鄭伯受盟故俾大夫求成于晉本非召㑹來又後時故書如㑹戊寅叔孫豹及諸侯之大夫及陳袁僑盟諸侯在而大夫自為盟始于此左傳晉侯使和組父告于諸侯叔孫豹及諸侯之大夫及陳袁僑盟陳請服也公羊傳曷為殊及陳袁僑為其與袁僑盟也榖梁傳及以及與之也諸侯以為可與則與之不可與則釋之諸侯盟又大夫相與私盟是大夫張也故雞澤之㑹諸侯始失政矣大夫執國權曰袁僑異之也杜氏曰諸侯既盟袁僑乃至故使大夫别與之盟言諸侯之大夫則雞澤之諸侯也殊袁僑者明諸侯之大夫所以盟袁僑也何氏曰俱諸侯之大夫也言之大夫者辟諸侯與大夫皆盟復出陳者喜得陳國不重出地有諸侯在臣係君故因上地孫氏曰諸侯既盟而袁僑至無盟可也諸侯盟大夫又盟諸侯始失政也至溴梁之盟曰大夫而不復言諸侯之大夫則政在大夫矣劉氏曰春秋褒善貶惡不失其實者也諸侯皆在是又稱叔孫豹及諸侯之大夫大夫受君其君之詞也異乎溴梁溴梁者諸侯皆在是而大夫盟其非受命而専之也明矣諸侯之失其政奪於其臣不亦宜乎通㫖陳乆叛中國服役于楚逮不堪其侵欲而後求盟于晉悼公立已四年復修霸業其從之也不已晚乎悼公盍亦増修徳政而謂袁僑曰諸侯之盟事畢矣而吾子始來若再刑牲㰱血要質鬼神是瀆之也且吾子以帝王之胄習於禮義害楚之政背夷即華此諸侯之欲寡君之願也雖微盟約天地鬼神實照臨之其惟同心紏逖王慝厚禮遣之使往報焉足矣奚必汲汲使大夫盟之哉書大夫及袁僑盟罪晉也陳氏曰以大夫盟袁僑晉侯不欲袁僑黜諸侯也雖然有諸侯在而大夫盟于是始悼公為之也諸侯在而大夫自為盟而后大夫専盟矣愚按踐土之盟陳穆公如㑹文公未嘗再要以盟而陳服于晉歴三世而不叛袁僑苟有誠服之心又何必以盟誓結之哉袁僑之盟不足以固陳而徒啓大夫専權之端詳書及以及著諸侯之失權也春秋外主兵及外主盟㑹皆稱㑹唯諸侯之大夫救徐盟袁婁盟宋稱及著大夫之専而有汲汲之意也晉悼雞澤之役雖能仗安攘之義以服陳鄭而上盟單頃公以瀆王臣之分下使大夫盟袁僑以縱諸侯之權此乃復伯初年之大㑹而得失有如此者故晉伯雖復盛于悼公而失政之禍亦由悼公也秋公至自㑹蜀杜氏曰公踰時而返故致之冬晉悼荀罃帥師伐許左傳許靈公事楚不㑹于雞澤知武子帥師伐許張氏曰荀罃悼公之賢大夫也偶見陳人之服不能輔悼公益修政以保陳陳固則許何患其不來今遽帥師以問罪於許規模欲速宜其并陳不能保也壬靈王辰三年四年晉悼四齊靈十三衛獻八蔡景二十三鄭僖二曹成九陳成三十卒把桓六十八宋平七秦景八楚共二十二呉夀夣十七春王三月己酉陳侯午卒左傳陳成公卒楚人將伐陳聞喪乃止陳人不聼命夏楚彭名侵陳愚按成公在位三十年子溺嗣是為哀公午者襄公名也孔子作春秋在哀公之世襄公哀公之皇考也祭法曽祖為皇考廟曷不諱乎古者死而無諡不以名為諱周人以諡易名檀弓公叔文子卒其子戌請諡于君曰請所以易其名者於是乎有諱禮故孟子曰諱名不諱姓姓所同也名所獨也然禮律所載則有不諱者曲禮禮不諱嫌名二名不偏諱詩書不諱臨文不諱夫子兼帝王之道參文質之中而作春秋以法萬世如公薨不地隠公閔公滅國書取取根牟取邿取鄟取鄫出奔稱孫音遜文姜孫齊哀姜孫邾昭公孫齊之類所以放甫兩反其文也莊公名同而書同盟十六年二十七年同盟幽僖公名申而書戊申十六年戊申􅃋定公名宋而書宋人哀四年宋人執小邾子之類閔公名啓方而書城啓陽成公名黒肱而書黒肱來奔所以從其質也後世不明此義則有以諱易人之名者如漢武帝諱徹改蒯徹名通又有以諱易人之姓者如漢明帝諱莊改莊助莊光姓嚴詩書則諱如如月之恒諱作常允㳟克讓諱作遜臨文則諱如一匡諱作一正足徴諱作足證嫌名則諱嫌名謂音聲相近如唐元皇帝名昞諱丙丁之丙憲宗名純諱淳朴之淳二名則偏諱如唐太宗名世民諱世為代諱民為人愚者違禮以為孝諂者獻佞以為忠忌諱繁名實亂而春秋之法不行矣家氏曰晉廢司徒宋廢司空魯廢具敖二山皆臣下以諂為忠非盛世之制也夏叔孫豹如晉悼左傳穆叔如晉報知武子之聘也髙氏曰且為鄫世子故秋七月戊子夫人姒氏薨姒公作弋下定姒同左傳定姒薨不殯于廟無櫬不虞匠慶謂季文子曰子為正卿而小君之喪不成不終君也君長誰受其咎公羊傳定弋者襄公之母也杜氏曰成公妾襄公母姒把姓髙氏曰襄公以夫人之禮卒之啖氏曰若如左氏所言則當不書薨𦵏此文當在定十五年姒氏卒下誤在此耳塟陳成公髙氏曰陳成公既為雞澤之㑹則是國已變于夏矣愚按陳即中國魯㑹其塟故書八月辛亥塟我小君定姒杜氏曰定諡也喪以正夫人禮逾月而塟速髙氏曰死才二十三日爾襄陵許氏曰傳載季文子欲不以夫人之禮塟定姒而不得已於人言卒夫人之觀此塟速禮畧也臨川呉氏曰僖宣襄昭四妾母羣臣皆逢君之意而尊其母及定哀之際君弱臣强嗣君之母先君之嫡夫人也乃敢蔑視其君而卑其母焉甚矣魯道之衰也王氏曰此塟定姒襄公之母也定十五年書塟定姒者哀公之母也自襄至哀涉世未乆不應皆諡曰定其必有誤冬公如晉悼左傳公如晉聼政晉侯享公公請屬鄫晉侯不許孟獻子曰以寡君之宻爾于仇讐而願固事君無失官命鄫無賦于司馬為執事朝夕之命敝邑敝邑􅄶小闕而為罪寡君是以願借助焉晉侯許之髙氏曰公有母喪復如晉朝王氏曰襄公之立至此􅂊七嵗爾幼弱之君奔走道路所謂國君道長豈得已哉陳人圍頓左傳楚人使頓間陳而侵伐之故陳人圍頓髙氏曰僖二十五年楚人圍陳納頓子于頓陳侯畏楚而不敢討頓子事楚而不事陳今陳復從中國而頓為楚間故圍之自雞澤之㑹而書伐許圍頓著晉興而楚詘也癸靈王已四年五年晉悼五齊靈十四衛獻九蔡景二十四鄭僖三曹成十陳哀公溺元年把桓六十九宋平八秦景九楚共二十三呉夀夣十八春公至自晉髙氏曰著公不朝王於廟也且公幼而頻年如晉是危道也襄之出二十四致之者二十一危之也夏鄭伯僖使公子𤼵來聘左傳鄭子國來聘通嗣君也杜氏曰𤼵子産父髙氏曰鄭自雞澤之㑹始棄蠻夷來聘于中國諸侯得以息兵修好也叔孫豹鄫世子巫如晉悼左傳穆叔覿鄫太子于晉以成屬鄫書曰叔孫豹鄫太子巫如晉言比諸魯大夫也公羊傳外相如何以書為叔孫豹率而與之俱也杜氏曰豹與巫俱受命于魯故不書及比之魯大夫劉氏曰鄫不勝莒魯之患求為附庸以自定鄫屬于魯為附庸故相與往來于晉也諸侯死社稷正也不能守其國以卑其宗廟鄫失正矣天子建附庸非天子命而私有之魯失正矣臣不能以矯其君子不能以正其父故曰叔孫豹鄫世子巫如晉猶吾大夫焉交譏之陸氏曰鄫列國也使其世子同于我大夫魯與晉俱失正矣石氏曰不書及内之也鄫有國而私屬于人魯晉之私屬鄫也皆不臣之著也王氏曰凡外相如不書書者必有謂也叔孫率鄫太子如晉故不書㑹與及然鄫雖小亦國也請于晉而屬之比諸魯大夫而覿之是推天子之禮以事霸主也故參譏之髙郵孫氏曰明年莒人滅鄫則是晉失霸主之道而魯大夫之往為無益矣愚按諸侯之世子未誓以皮帛􅁇子男而亞于大夫之列非禮也然春秋時較强弱之勢而無君臣之分以大國之卿當小國之君故鄫國微弱而其世子次于魯大夫也叔孫豹偕鄫世子巫如晉而不言及是旅見于霸國也仲孫蔑衛孫林父受命于晉以㑹呉而不言及是旅見于呉也旅見于晉猶之可也旅見于呉甚矣仲孫蔑衛獻孫林父㑹呉夀夣于善道道公榖作稲杜氏曰魯衛俱受命于晉故不言及吴先在善道二大夫往㑹之故曰㑹呉范氏曰善稻呉地張氏曰悼公初立其風聲所及逺人慕之故吳有志于親中國辭謝雞澤之不㑹而請聼後㑹之期悼公告以㑹戚之期而聼其自來足矣至使魯衛特往㑹之則是以中國大邦而為蠻荆屈此二大夫㑹呉之所以特書也襄陵許氏曰晉楚争衡權之在呉故晉急呉如此秋大雩左傳旱也髙氏曰因旱祭志僣也楚共殺其大夫公子壬夫左傳楚人討陳叛故曰由令尹子辛實侵欲焉乃殺之書曰楚殺其大夫公子壬夫貪也君子謂楚共王於是不刑杜氏曰共王敗于鄢陵後殺子反公子申壬夫八年之中殺三卿王氏曰壬夫之貪有取死之道矣經以國殺大夫為文者陳之叛楚在子辛楚子既不能明法教以律貪人又不能殺貪人以謝小國乃擁其罪人興兵致討而陳恨彌篤方歸罪子辛而殺之故稱國以殺罪累上也公㑹晉侯悼宋公平陳侯哀衛侯獻鄭伯僖曹伯成莒子黎比邾子宣滕子成薛伯齊靈世子光呉夀夣人鄫人于戚左傳盟于戚㑹吳且命戍陳也穆叔以屬鄫為不利使鄫大夫聼命于㑹程子傳吴來㑹非為主也孫氏曰鄫微弱不可先也故吴序鄫上呉何以稱人按左氏呉子使夀越如晉辭不㑹于雞澤之故請聼諸侯之好呼報反晉人將為于偽反之合諸侯使魯衛大夫㑹吳于善道且告㑹期然則戚之事乃吳人來㑹不為主也杜氏曰不復殊呉者吴來㑹于戚來㑹諸侯而不為主則進而稱人諸侯往與之㑹而主呉則貶而稱國聖人之情見音現矣春秋之義明矣石氏曰成九年為蒲之㑹將以㑹呉而呉不至故十五年諸侯之大夫㑹之于鍾離前三年悼公盟雞澤使荀㑹逆吴子而又不至故此年使魯衛先㑹之于善道凡此皆往㑹之也至秋戚之㑹序呉於列而不復殊者因其來㑹也凡序呉者來㑹我也殊吴者往㑹之也王氏曰悼公合十二國之諸侯為㑹而呉且聼命則中國之威亦少振矣吳進而稱人者喜其聼命也愚按經者㑹吳者九惟此書人餘皆稱國至黄池而書子盖以國稱者夷狄之常也此書人者子其慕義之善黄池書子紀其主㑹之伉也陳氏曰於是盟于戚吴初與諸侯盟也不書盟為晉諱也吴晉之盟春秋終諱之故黄池之盟亦不書公至自㑹冬戍陳左傳楚子囊為令尹范宣子曰我喪陳矣楚人討貳而立子囊必改行而疾討陳陳近于楚民朝夕急能無往乎有陳非吾事也無之而後可冬諸侯戍陳公羊傳曷為不言諸侯戍之離至不可得而序故言我也啖氏曰戊者以兵守之也髙氏曰此諸侯同戍非獨公戍之也杜氏曰諸侯在戚皆受命各還國遣戌故獨書魯戍程子曰非王命而勤民逺戍罪也而善於戍陳何哉盖陳附中國而楚争之則戍之者在于助陳而距楚與之可也孫氏曰不言諸侯而言魯戍之者與城楚丘之義同張氏曰自桓文以來所以服陳者未聞以兵守之也士匄知戍陳之非長策是以有喪陳之歎陳氏曰戍不書桓六年戍齊宣十年戍鄭皆不書晉悼公之戍陳鄭特書之悼公之霸業桓文之所不屑為也桓公不戰而屈楚文公戰而屈楚悼公通呉以制楚矣㑹于戚于相于向皆東竟也而又戍陳鄭以守之誠下䇿也愚按悼公之戍陳有恤中國攘夷狄之義惜其以為有陳非吾事人心不恊而不卒戍遂至于失陳也楚共公子貞帥師伐陳哀公㑹晉侯悼宋公平衛侯獻鄭伯僖曹伯成齊靈世子光救陳曹伯下公榖有莒子邾子滕子薛伯左傳子囊伐陳㑹于城棣以救之榖梁傳善救陳也范氏曰能救中國而攘夷狄故善之髙氏曰陳方附中國諸侯既戍之復為楚所伐又相率救之救之義事也家氏曰戌者戍之於無事之時救者救之於被兵之日悼公既以諸侯之師戍之及楚師之來以戍為未足又動大兵往救焉書戍書救以善晉也十有二月公至自救陳范氏曰善之故以救陳致張氏曰書勞也辛未季孫行父卒左傳季文子卒大夫入歛公在位宰庀家器為塟偹無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠于公室也相三君矣而無私積可不謂忠乎髙氏曰自文子卒而魯有城費作三軍事則知文子雖専而猶忠慎僣亂未啓也其子􅀫嗣是為武子季氏之强萌于僖公大于成公熾于襄昭極于定哀甲靈王午五年六年晉悼六齊靈十五衛獻十蔡景二十五鄭僖四曹成十一陳哀二把桓七十卒宋平九秦景十楚共二十四呉夀夣十九春王三月壬午把伯姑容卒桓公也自僖二十七年來朝成九年來逆叔姬之喪此年卒子匄嗣是為孝公夏宋平華弱來奔左傳宋華弱與樂轡少相狎長相優又相謗也子蕩怒以弓梏華弱于朝平公見之曰司武而梏于朝難以勝矣遂逐之髙氏曰不言逐而以自奔為文者朝廷尚敬而弱凟慢如此所以罪弱也秋塟把桓公滕成子來朝左傳始朝公也莒黎比人滅鄫榖梁子曰莒人滅鄫非滅也立異姓以莅祭祀滅亡之道也范氏曰莒是鄫甥立以為後非其族類神不歆于祀故言滅公羊亦云莒女有為鄫夫人者蓋欲立其出也何氏曰莒女嫁為鄫後夫人夫人無男有女還嫁之于莒有外孫鄫子愛後夫人而無子欲立其外孫言滅者以異姓為後非兵滅或曰鄫取莒公子為後罪在鄫子不在莒人春秋應以梁亡之例而書鄫亡不當但責莒人也見陸氏辨疑并劉氏推衡今直罪莒舎音捨鄫何哉曰莒人之以其子為鄫後與黄歇進李園之妹於楚王史春申君傳楚考烈王無子趙人李園求事春申君為舎人進其女弟即幸于春申君知其有身園與女弟説春申君進于楚王王召入幸之遂生子男立為太子是為幽王吕不韋獻邯音寒鄲音丹之姬於秦公子史吕不韋傳秦昭王太子華陽夫人無子太子中男名楚質于趙不韋見之曰此竒貨可居請以竒物玩好求見華陽夫人姊而以獻夫人因言子楚賢夫人承間言于太子以為適嗣不韋取邯鄲姬絶美者與居知有身子楚見而請之不韋佯怒既而獻之期年生子政子楚立是為莊襄王政即始皇帝也其事雖殊其欲滅人之祀而有其國則一也春秋所以釋鄫而罪莒歟以此防民猶有以韓謐音􅁡為世嗣昏亂紀度如郭氏者晉書賈充傳充子黎民早卒無嗣及薨妻郭槐欲以外孫韓謐為世孫曹軫諫曰禮無異姓為後之文槐表陳充遺意帝許之太常議諡博士秦秀曰充悖禮溺情以亂大倫昔鄫養外孫莒公子為後春秋書莒人滅鄫按諡法昏亂紀度曰􅂽請諡荒家氏曰周衰倫教不明有以他姓為繼嗣者滅人之國而人自以為非滅如鄫事者往往有之聖人特於此垂訓焉苟以為莒實滅鄫則是時晉悼主盟豈有莒滅同盟之國而全置不問哉陸氏曰莒實以兵滅鄫立其子守之為附庸而其子又鄫外甥故公榖但傳立鄫孫守祀故書曰滅而不究事實耳劉氏曰左傳云莒人滅鄫鄫恃賂也非也五年秋穆叔以屬鄫為不利使鄫人聼命于㑹故經書吴人鄫人是魯巳絶鄫鄫無賦于魯矣尚何所恃而取滅耶冬叔孫豹如邾宣左傳穆叔如邾聘且修平髙氏曰公初即位邾子來朝四年有狐駘之戰至是往聘修平以無忘舊好也季孫宿如晉悼左傳季武子如晉見且聼命杜氏曰􅀫始代父為卿見大國襄陵許氏曰魯既世卿而大夫無復三年之喪哀典廢于下矣趙氏曰左傳晉人以鄫故來討按前年㑹戚己令鄫聼命于㑹即明不私屬魯今鄫亡自不闗魯事何得來討據事情季孫初嗣位而不往見霸主耳十有二月齊侯靈滅萊左傳二年齊侯伐萊萊人使正輿子賂􅀫沙衛以索馬牛皆百匹齊師還五年四月晏弱城東陽而遂圍萊甲寅堙之環城傅于堞六年三月王湫帥師及正輿子棠人軍齊師齊師大敗之丁未入萊萊共公奔棠晏弱圍棠十一月丙辰滅之遷萊于郳萊恃謀也公羊傳不言萊君出奔國滅君死之正也王氏曰萊姜姓子爵國於東夷齊滅之然春秋之例滅同姓則名故衛文公滅邢經稱名以貶之今齊靈公滅萊獨免於名者盖萊居東夷事在所畧耳張氏曰子産嘗對晉人侵小之問以為武獻以下兼國多矣然則晉盖吞滅之首宜其無以戢諸侯之相滅也乙靈王未六年七年晉悼七齊靈十六衛獻十一蔡景二十六鄭僖五卒曹成十二陳哀三把孝公匄元年宋平十秦景十一楚共二十五呉夀夣二十春郯子來朝左傳始朝公也髙氏曰郯少皥氏之後也前世聖賢之後所封之國皆逼近四夷先王之意非特以蕃王室盖用以化之也後世子孫往往多安僻陋者反漸其習俗然也夏四月三卜郊不從乃免牲左傳孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也榖梁傳夏四月不時也三卜禮也愚按公榖啖氏皆以三卜為合禮朱子亦云四卜五卜失禮然春秋四書卜郊唯此年三卜亦書之者盖三卜雖得禮而卜郊止於三月今書四月而三卜不從則過時不敬以致龜違故書以譏非時而非譏其瀆卜也小邾子穆來朝左傳亦始朝公也城費費音秘杜氏曰琅琊費縣張氏曰今沂州費縣愚按今益都路沂州費縣西北有古費城費季氏邑也杜氏注按左氏南遺為費宰叔仲昭伯為隧音遂正欲善季氏而求媚於南遺謂遺請城費吾多與而役故季氏城費夫文子相息亮反三君無衣於既反帛之妾無食如字音嗣粟之馬無藏金玉無重如字又直龍反器備見左傳行父卒則固忠於公室而不顧其所食之私邑也及行父卒宿之不忠遂専魯國之政羣小媚之無故勞民妄興是役季氏益張其後孔子行乎季孫三月不違公羊定十二至於帥師堕許規反費其越禮不度可知矣然則書城費乃履霜堅冰之戒强私家弱公室之萌據事直書而義自見音現矣用人不惟其賢惟其世豈不殆哉愚按此書城費而昭十三年書圍費定十二年書堕費十五年書成城郛而昭二十六年定十二年書公圍成比事以觀則知大夫之强恃其城郭之固由人君不謹其初之所致也公室卑而大夫専大夫弱而家臣叛夫豈無自而然哉秋季孫宿如衛獻左傳報子叔之聘且辭緩報非貳也愚按比書滕郯小邾來朝而志大夫如晉如衛著邦交之煩而畏大慢小之情見矣八月螽杜氏曰為災故書髙氏曰莊公以前螟猶書之莊公以後螟不復書螽然後書以是知災異之益多矣春秋不勝其書舉重以見輕爾冬十月衛侯獻使孫林父來聘壬戌及孫林父盟左傳衛孫文子來聘且拜武子之言而尋孫桓子之盟公豋亦登成三年傳諸侯有聘無盟聘禮也盟非禮也不繫于國以見遂事之専其言及者公與之盟而不言公見大夫之伉也王氏曰禮升降之儀臣後君一等而孫子之聘公登亦登兹伉之甚楚共公子貞帥師圍陳哀十有二月公㑹晉侯悼宋公平陳侯哀衛侯獻曹伯成莒子黎比邾子宣于鄬鄬榖或作䧦于軌反左傳楚子囊圍陳㑹于鄬以救之杜氏曰䧦鄭地謀救陳陳侯逃歸不成救故不書救也愚按書楚圍陳書㑹于䧦書陳侯逃歸而不言救陳所以著荆楚兵力之强晉悼安攘之怠而陳侯棄楚即華之心不固也自是凡㑹同無陳矣鄭伯髠頑如㑹髠苦門反公榖作髠原未見諸侯丙戌卒于鄵鄵七報反又采南反公榖作操左傳鄭僖公將㑹子鄬子駟相及鄵子駟使賊夜弑僖公而以瘧疾赴于諸侯簡公生五年奉而立之公羊傳操者何鄭之邑也諸侯卒其封内不地此何以地弑也鄭伯將㑹諸侯于鄬其大夫諫曰中國不足歸也則不若與楚鄭伯曰不可其大夫曰以中國為義則伐我喪以中國為强則不若楚於是弑之曷為不言大夫弑之為中國諱也未見諸侯其言如㑹何致其意也榖梁傳未見諸侯其曰如㑹何致其志也禮諸侯不生名此其生名何卒之名也卒之名加之如㑹之上見以如㑹卒也其見以如㑹卒何也鄭伯將㑹中國其臣欲從楚不勝其臣弑而死其不言弑何也不使夷狄之民加乎中國之君也其地於外也杜氏曰鄵鄭地不欲再稱鄭伯故約文上其名於㑹上按鄭僖公三傳秫戀反皆以為弑而春秋書卒者左氏則曰以瘧疾魚畧反赴也公羊則主為中國諱之說榖梁則主不使得加之說信如左氏之言也是君見弑可以偽赴又順其欲而不彰見劉氏權衡則亂臣賊子免於見討而春秋非傳信之書矣張氏曰從其偽赴而隠之是春秋之作乃為亂臣賊子之地而非彰善癉惡之書也然則弑而書卒二傳之説盖所以立萬世臣道之防禠逆賊之魄疑得聖人之意顧習其説者未之察爾夫弑君之賊其惡不待貶絶而自見音現下見其同矣見弑者豈無不善之積以及其身者乎衛桓則以嫡母無寵齊舎以母無寵已無威宋殤則以亟去吏反戰疲民閔公連嵗黷武戱慢大臣無人君之體齊襄則以行下孟反同鳥獸莊公肆意􅁋欲寵嬖下臣鄭夷則以侮慢大臣晉夷臯不君厚歛雕墻拒直諫謀殺大臣蔡固則以􅁋而不父許買不以禮訓太子使䧟于罪陳平國則以殺諌臣而通于夏氏楚虔則以多行無禮莒庶其多行無禮受少黜長宻州虐於國人廢長立少楚頵多愛欲廢長立幼奚齊則以嬖孽而國人不之君齊荼以嬖妾之子國人不之君衛剽以寵弟之子為權臣所立吳僚夷末之子而立非夀夣之意呉餘祭側界反則以輕近刑人齊商人以弑君之賊而狎所怨而晉州蒲欲盡去起吕反羣大夫而立其左右也宋杵臼無道不恤公族虐于國人若夫鄭僖公則異於是矣盟㑹者禮義之所出也背叛者逆賊之所為也僖公欲從諸侯㑹于䧦則是貴禮義得盟㑹之正也諸大夫欲背音佩諸夏與荆楚則是背叛而為逆賊之行也此時即不弑君其罪已無所逭而况敢動于惡則子駟之罪不容于死夫豈僖公有不善之積以及其身者乎聖人至是傷之甚懼之甚故變文而書曰鄭伯髠頑如㑹未見諸侯丙戌卒于鄵未見諸侯其曰如㑹何致其志也襄陵許氏曰辭繁而不殺曰如㑹曰未見諸侯善其志在于見諸侯也諸侯卒于境内不地據吴子光卒于陘楚子軫卒于城父不地鄵鄭邑也其曰卒于鄵見其弑而隠之也劉氏曰諸侯于其封内猶大夫于其家也義不可外其君是以雖卒不地也鄵何以獨書乎然則鄭伯之卒可知矣彼必以合乎中國之故而見外于其臣也故為變文以起其見弑卒鄭伯逃歸陳侯聖人之㫖微而公榖之義精矣存天理抑人欲之意逺矣通㫖問鄭髠頑楚麋齊陽生何以書卒曰此存天理抑人欲之意張氏曰天下之大分中國夷狄君子小人是也春秋為賢者諱盖因其志於中國之善類不幸而無臣以輔佐之至于不得其死聖人為之隐其不幸而成其考終命所以垂世立教廣為善之門也愚按或引吴子遏伐楚門于巢卒謂髠頑書名義與遏同實卒而非弑也今考遏之死三傳皆云巢人之射則鄭僖變文實弑而非卒矣陳侯哀逃歸左傳陳人患楚慶虎慶寅謂楚人曰吾使公子黄往執之楚人從之二慶使告陳侯于㑹曰楚人執公子黄矣君若不來羣臣不忍社稷宗廟權有二圖陳侯逃歸榖梁傳以其去諸侯故逃之也榖梁子曰逃義曰逃莊十七逃者匹夫之事文三杜氏注上二年諸侯戍陳今楚令尹來伐諸侯又救之亦既勤矣為陳侯計者下令國中大申儆備立太子以固守親聼命于諸侯謀禦敵之策當是時晉君方明八卿和睦八年鄭子展云云諸侯聼命必能致力于陳矣不此之顧棄儀衛而逃歸此匹夫之事耳夫義路也禮門也輕棄中國惟蠻荆之懼是不能由是路出入是門故書逃歸以罪之可謂深切著明矣髙氏曰楚人以陳叛故殺公子壬夫而亟討陳晉雖為陳再合諸侯卒不能攘楚以安中國故陳侯内為二慶所逼而逃歸也然為一國之君而不能自立從荆楚則懼為中國所伐從中國則又懼楚若匹夫之逃亦可羞矣愚按春秋于諸侯之逃楚者皆不書惟陳鄭之逃中國則書之所以辨内外而予齊晉也丙靈王申七年八年晉悼八齊靈十七衛獻十二蔡景二十七鄭簡公嘉元年曹成十三陳哀四把孝二宋平十一秦景十二楚共二十六吴夀夣二十一春王正月公如晉左傳公如晉朝且聼朝聘之數愚按襄公嗣位甫及八年而三朝于晉自宣公媚齊之外春秋事霸之禮未有若是其勤也晉悼之立未十年而魯君四朝矣豈有倍于諸侯事天子五年一朝之制乎悼公改命朝聘之數其亦知過矣夏塟鄭僖公公羊傳賊未討何以書塟為中國諱也鄭簡人侵蔡景獲蔡公子燮燮榖作濕後同左傳鄭子國子耳侵蔡獲蔡司馬公子燮鄭人皆喜惟子産不順曰小國無文徳而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寕矣王氏箋義鄭欲從楚故侵蔡以至楚然後告絶于晉而與楚平春秋惡其叛中國故子國稱人以示貶傳見下楚公子貞伐鄭季孫宿㑹晉侯悼鄭伯簡齊靈人宋平人衛獻人邾宣人于邢丘左傳㑹于邢丘以命朝聘之數使諸侯之大夫聼命季孫宿齊髙厚宋向戌衛甯殖邾大夫㑹之鄭伯獻㨗于㑹故親聼命榖梁傳見魯之失正也公在而大夫㑹也任氏曰邢丘故邢國河内平臯縣也張氏曰邢自邢丘遷襄國又遷夷儀愚按衛滅邢晉又取其地今順徳路内丘縣蘇轍曰晉悼公修文襄之業改命朝聘之數所具反使諸侯之大夫聼命于㑹大夫稱人衆辭也朝聘之節儉而有禮衆之所安也杜氏曰晉悼復文襄之業制朝聘之節儉而有禮臣則以為大夫稱人貶之也昔周公戒成王以􅁇自今我其立政立事書立政篇夫不自為政而委于臣下是以國之利器示人而不知寳也朝聘事之大者重煩諸侯而使大夫聼命杜氏曰晉難重煩諸侯故使大夫聼命無乃以姑息檀弓注苟容取安愛人而不由徳乎使政在大夫而諸侯失國又豈所以愛之也後此八年溴古息反梁之㑹悼公初沒諸侯皆在而大夫獨盟君若贅章銳反旒音留公羊十六年夫豈一朝一夕之故哉故邢丘之事魯公在晉而季孫宿㑹見音現魯之失正與政同也孫氏曰邢丘之㑹公在晉也晉侯不與公㑹而與季孫㑹者襄公微弱政在季氏故也晉為盟主棄其君而與臣何以宗諸侯矣諸侯之大夫貶而稱人謹其始也蜀杜氏曰獨出季孫宿者春秋以内魯為文出季孫宿則知四國皆大夫也愚按自齊桓倡霸以來未有以霸主而㑹諸侯之大夫者北杏稱人貶四國之君首稱霸耳翟泉之盟晉雖弛權然魯君在㑹而晉侯不預猶未以霸主㑹大夫也悼公復霸而虚朾同盟首以仲孫蔑齊崔杼厠乎其間􅁇㑹雞澤又以諸侯之大夫盟陳袁僑焉今而㑹邢丘且曰重煩諸侯而使大夫聼命然則諸侯之失政實悼公為之也春秋人諸侯之大夫而不貶季孫宿盖不書季孫則疑于諸國之微者人諸國之大夫所以人宿也張氏曰春秋之法必辨等列以大夫而㑹諸侯必人之者所以嚴君臣之分謹上下之交也啖氏曰左氏云大夫不書尊晉侯也按尊晉侯則季孫亦書不書且魯君與他國大夫㑹例書名何獨尊晉侯乎公至自晉王氏曰公留晉半嵗不與㑹而歸書至所以危之莒黎比人伐我東鄙左傳以疆鄫田髙氏曰鄫田接于魯而疆界不明故興兵伐魯以正之鄫遂屬于莒矣王氏曰見莒子之强魯國之弱而盟主之無威也秋九月大雩左傳旱也冬楚共公子貞帥師伐鄭簡左傳楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晉子駟曰民急矣姑從之以紓吾民晉師至吾又從之敬共幣帛以待來者小國之道也犧牲玉帛待于二境以待强者而庇民焉不亦可乎子展曰小所以事大信也小國無信兵亂日至亡無日矣五㑹之信今將背之雖楚救我將安用之親我無成鄙我是欲不可從也不如待晉晉君方明四軍無闕八卿和睦必不棄鄭楚師遼逺粮食將盡必將速歸何患焉舎之聞之杖莫如信完守以老楚杖信以待晉不亦可乎子駟曰請從楚騑也受其咎乃及楚平使伯駢告于晉知武子使對曰君有楚命亦不使一介行李告于寡君而即安于楚君之所欲也誰敢違君寡君將帥諸侯以見于城下惟君圖之齊宣王問于孟子交隣國有道乎孟子曰有惟夷佳反智者為能以小事大故大音泰王事熏鬻音育句音鈎踐事吴以小事大畏天者也畏天者保其國鄭介間厠也大國之間困强楚之令而欲息肩于晉若能信任仁賢明其刑政經畫財賦以禮法自守而親比毗志反四隣必能保其封境荆楚雖大何畏焉而子耳公孫輙子國公子發加兵于蔡獲公子燮無故怒楚所謂不修文徳而有武功者也子産云云楚人來討不從則力不能敵從之則晉師必至故國人皆喜而子産獨不順焉以晉楚争鄭自茲弗得寕矣是以獲公子燮特書侵蔡以罪之而公子貞來伐鄭及楚平不復扶又反書矣平而不書以見音現鄭之屈服於楚而不信也犧牲玉帛待於境上以待强者而請盟其能國乎髙氏曰觀左氏所載則子駟之弑僖公志在事楚矣愚按自襄元年荆楚之師侵宋伐陳圍陳伐鄭皆書大夫之名氏書帥師而無貶詞者豈與其憑陵中國哉所謂不待貶絶而罪惡見者也晉侯悼使士匄來聘左傳晉范宣子來聘且拜公之辱告將用師于鄭愚按魯之事晉甚謹而成公末年至襄十二年士匄荀罃士魴凡四聘於魯則晉之所以結與國者不亦厚乎宜悼公之得諸侯也丁靈王酉八年九年晉悼九齊靈十八衛獻十三蔡景二十八鄭簡二曹成十四陳哀五杞孝三宋平十二秦景十三楚共二十七吴夀夣二十二春宋平災災公作火左傳樂喜為司城以為政使伯氏司里火所未至徹小屋塗大屋陳㨧挶具綆缶蓄水潦積土塗廵丈城繕守偹表火道使華臣具正徒令隧正納郊保奔火所使華閱討右官官庀其司向戌討左亦如之公羊傳大者曰災小者曰火内不言火者甚之也何以書記災也莊十一年傳外災告則書髙氏曰宋自昭文以來亂敗相屬三書宋災見人事之不修也劉氏曰榖梁云外災不志此其志何也故宋也非也齊大災又豈故齊乎夏季孫宿如晉悼左傳報宣子之聘也髙氏曰公朝晉而晉來聘又使報焉事大國之禮勤矣五月辛酉夫人姜氏薨左傳穆姜薨于東宫杜氏曰成公母秋八月癸未𦵏我小君穆姜公作繆姜杜氏曰四月而塟速髙氏曰别為之諡用文姜之例也冬公㑹晉侯悼宋公平衛侯獻曹伯成莒子黎比邾子宣滕子成薛伯把伯孝小邾子穆齊靈世子光伐鄭簡十有二月己亥同盟于戯戯許宜反左傳八年八月子駟從鄭伯朝于晉晉不禮焉九年六月朝于楚冬十月諸侯伐鄭季武子齊崔杼宋皇鄖從荀罃士匄門于鄟門衛北宫括曹人邾人從荀偃韓起門于師之梁滕人薛人從欒黶士魴門于北門杞人郳人從趙武魏絳斬行栗帥于汜令於諸侯曰脩器備盛糇糧歸老幼居疾于虎牢肆眚圍鄭鄭人恐乃行成中行獻子曰遂圍之以待楚人之救也而與之戰不然無成知武子曰許之盟而還師以敝楚人三分四軍與諸侯之銳以逆來者於我未病楚不能矣猶愈于戰暴骨以逞不可以争諸侯皆不欲戰乃許鄭成同盟于戯鄭服也將盟鄭六卿公子騑公子發公子嘉公孫輙公孫蠆公孫舎之及其大夫門子皆從鄭伯晉士莊子為載書曰自今日既盟之後鄭伯而不唯晉命是聼而或有異志者有如此盟公子騑趨進曰天禍鄭國使介居二大國之間大國不加徳音而亂以要之使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所底告自今日既盟之後鄭國而不唯有禮與彊可以庇民者㫕從而敢有異志者亦如之荀偃曰改載書公孫舎之曰昭大神要言焉若可改也大國亦可叛也知武子謂獻子曰我實不徳而要人以盟豈禮也哉非禮何以主盟姑盟而退修徳息師而來終必獲鄭何必今日我之不徳民將棄我豈惟鄭若能休和逺人將至何恃于鄭乃盟而還榖梁傳不異言鄭善得鄭也不致耻不能據鄭也杜氏曰戯鄭地鄭之見伐於楚子駟欲從楚子展曰小國無信兵亂日至亡無日矣請完守手又反又如字以老楚杖直亮反信以待晉其策未為失也而子駟遂及楚盟於是晉師至矣諸侯伐鄭晉人令于列國修器備兵器戰偹盛音成餱音侯乾食也糧歸老幼示將乆師居疾于虎牢使諸軍疾病息其中肆眚圍鄭肆緩也眚過也鄭人恐乃行成荀偃曰遂圍之以待楚人之救而與之戰不然無成知音智罃曰許之盟而還音旋師以敝疲也楚吾三分四軍與諸侯之銳以逆來者來者楚也於我未病楚不能矣猶愈于戰暴蒲卜反骨以逞不可以争大勞未艾魚廢反息也君子勞心小人勞力先王之制也乃許鄭成同盟于戯夫善為國者不師善師者不陣善陣者不戰榖梁莊八知武子明于善陣之法以佐晉悼公屢與諸侯伐鄭楚輙救之而不與之戰楚師遂屈得善勝之道矣故下書蕭魚之㑹以美之杜氏曰伐鄭而書同盟則鄭受盟可知楊士勛疏伐鄭之文在上即盟戯鄭在可知故不異言鄭永嘉吕氏曰按左氏同盟于戯鄭與焉然柯陵之盟亦書于伐鄭文後則鄭服未可知今以經考之盟柯陵之後諸侯再伐鄭則其未得于鄭可知盟戯之後楚子又伐鄭則為鄭服可知十一年同盟亳城北亦鄭受盟也㑹于蕭魚亦鄭與㑹也皆書于伐鄭之後比事而觀可見矣愚按齊桓之時在于服楚晉文之時在于勝楚晉悼之時在于敝楚盖召陵以前楚人連嵗加兵于鄭及次陘之伐屈完來盟而鄭無楚患矣城濮之前楚滅黄而霸主不能恤敗徐而諸大夫不能救執中國盟主而在㑹者不敢與之争既又戍榖逼齊合兵圍宋戰勝中國威動天下及得臣敗績而楚頵懾服矣迨夫晉師敗邲之後楚復凌駕中華既縣陳入鄭又滅蕭圍宋于蜀之㑹奄然以蠻夷之大夫主盟諸夏而聼命者十有一國卒之保鄭以為已有厲公敗之于鄢陵三假王命以伐鄭而終不服悼公復霸鄭與于五㑹之信而猶叛焉悼公欲直擣方城漢水之境繼齊桓帖荆之績則楚寝强盛未肯服義而昔者處父之伐不足以屈其力也欲與之决勝復文公館榖之捷則暴骨以逞克不可命而先君鄢陵之勝不足以服其心也於是數伐鄭而不與楚戰使楚人疲於奔命而莫能争鄭既有以挫其暴狠之鋒又有以摧其憑陵之志桓文以降于斯為盛故于戯亳北雖書同盟以惡鄭之反覆而㑹于蕭魚特筆以著其美也然悼公四駕伐鄭唯盟戯不致者因子駟之言而未得志于鄭是以不書至榖梁子所謂恥不能據鄭者是也亦猶㑹鄬不陳不成救而不書至㑹耳悼公九合諸侯獨于于鄬于戯不致春秋豈無意哉啖氏曰左氏云冬十月諸侯伐鄭下又云諸侯復伐之十二月癸亥門其三門盖誤重説也古史或用周正或用夏正作傳者承兩國舊史月數不同遂兩載之楚子共伐鄭簡左傳子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯强是從今楚師至晉不我救則楚强矣乃及楚平公子罷戎入盟同盟于中分愚按楚書子者國君自將恃强軋弱憑陵中國之稱也不書鄭及楚平不書盟不與鄭從楚也明年諸侯伐鄭則鄭與楚可知矣戊靈王戌九年十年晉悼十齊靈十九衛獻十四蔡景二十九鄭簡三曹成十五陳哀六把孝四宋平十三秦景十四楚共二十八吴夀夣二十三春公㑹晉侯悼宋公平衛侯獻曹伯成莒子黎比邾子宣滕子成薛伯把伯孝小邾子穆齊靈世子光㑹呉夀夣于柤柤莊加反左傳㑹于柤㑹呉子夀夣也榖梁傳㑹又㑹外之也五年傳諸侯往與之㑹而主呉則貶而稱國杜氏曰吴子在柤晉以諸侯往㑹之故曰㑹呉柤楚地張氏曰後漢彭城國傳陽縣有柤水愚按今在濟寕路濟州沛縣成十五年晉率諸侯之大夫㑹吳于鍾離不敢屈呉而往與之㑹已為過禮今悼公霸業方盛乃合中華十二國之君世子而往主呉以為㑹則是舉天下之諸侯皆宗吴矣雖曰資吳以困楚然楚弱而呉興去疥􅅑而得腹心之疾庸愈乎鄱陽萬氏曰春秋于楚末嘗殊㑹而獨殊㑹呉者盖吴以楚之同姓僣號稱王諸侯宗之以為㑹春秋苟不以殊㑹而外之于中國則是代宗周為天下之共主矣夏五月甲午遂滅偪陽偪音福又彼力反榖作傳左傳晉苟偃士匄請伐偪陽而封宋向戌焉荀罃曰城小而固勝之不武不勝為笑固請圍之弗克諸侯之師乆于偪陽荀偃士匄請于荀罃曰水潦將降懼不能歸請班師知伯怒投之以机出于其間曰女成二事而後告余余恐亂命以不女違女既勤君而興諸侯牽帥老夫以至于此既無武守而又欲易余罪曰是實班師不然克矣余羸老也可重任乎七日不克必爾乎取之荀偃士匄率卒攻偪陽親受矢石滅之書曰遂滅偪陽言自㑹也以與向戌向戌辭乃予宋公以偪陽子歸獻于武宫謂之夷俘榖梁傳遂直遂也其曰遂何也不以中國從夷狄也杜氏曰偪陽妘姓國今彭城傳陽縣張氏曰今徐州沛縣襄陵許氏曰晉之威徳未能服逺躬率諸侯涉楚㑹呉而因道用師滅人之國恃衆剽利無復霸討則中國之禮義盡矣甚之故日而致之也陳氏曰以偪陽子歸不書宥偪陽子也以為非其罪也悼公合十三國之衆而遂滅偪陽於偪陽子何譏焉愚按偪陽國及柤地皆在今沛縣乃吳入中國之要衝則悼公之㑹呉于柤盖謀滅偪陽而通呉也呉既㑹柤必以兵同㓕偪陽而春秋所書若㑹柤之後繼事以滅偪陽而呉不與滅盖不以中國諸侯從蠻荒之主滅弱小之國也榖梁之言是矣齊桓之霸滅譚滅遂降鄣遷陽晉文之霸執曹伯復衛侯悼公之霸滅偪陽皆功不揜過此孟子所以謂五霸者三王之罪人也公至自㑹榖梁傳㑹夷狄不致惡事不致此其致何也存中國也中國有善事則并焉無善事則異之存之也王氏曰此致前事者二事偶舉其可道者也㑹呉猶可因㑹呉而滅人之國其惡甚矣故以㑹致焉楚共公子貞鄭簡公孫輙帥師伐宋平左傳楚子囊鄭子耳伐宋帥于訾母圍宋門于桐門髙氏曰以宋公受偪陽故也鄭背中國即于楚又與楚人同伐中國罪不容誅也陳氏曰凡専將言帥帥苟二國㑹則先序主兵者而不言帥師言帥師是國自為帥也國自為帥自楚公子貞鄭公孫輙始自是雖圍滅亦並稱帥師矣蜀杜氏曰春秋録楚公子貞于鄭公孫輙之上所以懲鄭也晉悼師伐秦左傳九年秦景公使士雃乞師于楚將以伐晉楚子許之師于武城以為秦援秦人侵晉晉饑弗能報也荀罃伐秦報其侵也髙氏曰晉方帥諸侯㑹吴滅偪陽又越千里而伐秦可謂虐用其民矣為晉計者莫若修文公之業求成于秦庶因秦之兵力共攘荆楚可以少安中國不此之圖而反以秦資楚此晉之失也家氏曰諸侯惟宋事晉最謹今宋受兵不速救乃更出師伐秦不書大夫帥師畧之也秋莒黎比人伐我東鄙左傳莒人間諸侯之有事也故伐我東鄙愚按莒婁同晉悼之盟而乘間加兵於魯其無忌憚亦甚矣公㑹晉侯悼宋公平衛侯獻曹伯成莒子黎比邾子宣齊靈世子光滕子成薛伯把伯孝小邾子穆伐鄭簡此三駕之一左傳諸侯伐鄭齊崔杼使太子光先至于師故長于滕己酉師于牛首啖氏曰世子光在諸侯上見非禮王氏箋義世子在諸侯之上孔子仍舊文書之者譏之也永嘉吕氏曰齊世子光序諸侯上主㑹者為之也春秋不改所以示譏言専以强弱事勢為先後也桓十六年傳以至之先後易其序是以利率人而不要諸禮也春秋之時禮制既亡霸者以意之向背為升降諸國以勢之强弱相上下王氏曰齊世子光以期㑹而長四君盖伯主摟諸侯之術也愚按齊世子光同盟雞澤㑹戚救陳盟戱㑹柤皆序小邾子之下唯此年伐鄭序滕薛把小邾之上而傳稱光先至于師明年兩伐鄭又序莒邾之上傳亦云齊太子光宋向戌先至于鄭杜氏皆云為盟主所尊故進之夫諸侯之世子誓于天子而挕其君者下其君之禮一等則侯國世子宜次于伯爵之居之下考之仲子之言但曰光之立也列于諸侯矣則齊光未誓于天子而可序于薛伯把伯之上乎成十五年宋世子戒序齊大夫之上昭四年宋世子佐序小邾子之下以上公世子而次于子爵是則世子未誓于天子以皮幣繼子男之常制也齊光序諸侯之上是晉悼以私意之向背謂莒邾薛杞國弱而卑齊光國大而强故紊周班而進之也况自晉悼之霸莒邾以子爵而常注薛伯杞伯之上則班爵之等又安可以先王舊制論之哉據事直書義自見矣冬盗殺鄭公子騑公子𤼵公孫輙騑公榖作斐書盗始此左傅書曰盗言無大夫焉公羊傳大夫相殺稱人賤者窮諸盗榖梁傳稱盗以殺大夫弗以上下道惡上也程子傳盗殺三卿不稱大夫失卿職也按左氏鄭公子騑子駟當國攝君事也𤼵子國為司馬輙了耳為司空騑與尉止有争及為田洫況域反司氏堵丁古反又音者氏侯氏子師氏皆喪息浪反田故五族尉止司臣侯晉堵女父子師僕聚羣不逞之徒以作亂入西宫公宫殺三卿于朝不稱大夫程氏以為失卿職也卿大夫者國君之陪蒲回反貳昭三十二物生有兩有三有五有陪貳王有公諸侯有卿皆有貳也愚按陪伴也貳副也政之本也本强則精神折衝聞有偃息談笑而卻與却同敵國之兵勝千里之難乃旦反者矣其丄者如孔子相定公㑹夾谷一言而卻萊夷之兵免魯君于難其次如桞下惠使展喜犒齊師稱先王之盟言而齊侯乃還又其次如藺相如從趙王㑹秦王于澠池秦王請趙王鼓瑟相如亦請秦王擊缶左右欲刄相如相如叱之左右皆靡秦終不能有加于趙乃至于身不能保而盗得殺之於朝安在其為陪貳乎故削其大夫為當官失職者之鍳也王氏曰易曰小人而乘君子之器盗思奪之矣上慢下暴盗思伐之矣鄭三卿之禍其近是乎陳氏曰盗賤者也以賤者而一日殺三卿鄭之失政甚矣書盗自此始春秋之季小臣圖柄臣甚者陪臣執國命矣張氏曰鄭之從楚以勞中國皆公子騑之罪也鄭成公卒之初諸大夫欲從晉矣騑以官命未改止之及鄬之役僖公如㑹以從中國而騑弑之及楚子囊伐鄭子展欲堅守以待晉而騑請從楚以任其咎故騑者從夷之人弑君之賊也而發輙惟騑是從惡積而不可掩鄭不能討而盗得殺之此所以不稱殺其大夫也歟戍鄭虎牢楚共公子貞帥師救鄭左傳諸侯之帥城虎牢而戍之晉師城梧及制士魴魏絳戍之書曰戍鄭虎牢非鄭地也言將歸焉鄭及晉平楚子囊救鄭十一月諸侯之師還鄭而南至于陽陵楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣欒黶曰逃楚晉之恥也合諸侯以益恥不如死我將獨進師遂進與楚師夾潁而軍子蟜曰諸侯既有成行必不戰矣從之將退不從亦退退楚必圍我猶將退也不如從楚亦以退之宵涉潁與楚人盟欒黶欲伐鄭師荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還今伐其師楚必救之戰而不克為諸侯笑克不可命不如還也諸侯之師還侵鄭北鄙而歸楚人亦還公羊傳曷為不言諸侯戍鄭虎牢至不可得而序故言我也諸侯已取之矣曷為繫之鄭諸侯莫之上有故反繫之鄭榖梁傳其曰鄭虎牢决鄭乎虎牢也程子傳非欲㫁荆楚之路為鄭蔽也駐師阨後以逼之耳故繫鄭以責諸侯虎牢之地城不繫鄭者責在鄭也戍而繫鄭者罪諸侯也孫氏曰此伐鄭諸侯戍鄭虎牢也曷為責鄭設險所以守國有是險而不能設犧牲玉帛待盟境上使其民人不享土利辛苦墊丁念反隘猶委頓也無所底音㫖告子駟云云然後請成故城不繫鄭者責其不能有也程子曰責鄭不能守故不繫于鄭曷為罪諸侯夫鄭人從楚固云不義然中國所以城之者非欲㫁音短荆楚之路為鄭蔽也駐師阨險以逼之爾至是伐而復扶又反戍焉猶前志也則可謂以義服之乎故戍而繫鄭者若曰鄭國分扶問反地受諸天子非列國所得専所以罪諸侯也張氏曰罪諸侯者責霸主之寡謀前年戍陳不能制楚以保陳矣又踵前轍而勞諸侯以戍守罷敝中國恃力逼小豈霸主服人之道乎故反繫之鄭以罪之愚按陳已服而悼公命諸侯戍之春秋書戍陳著其人心不恊保陳不終遂致陳侯之逃也鄭未服而悼公戍虎牢以逼之春秋書戍鄭虎牢著其據地利以脅鄭而反使楚人得以竊救患之名也是故戍陳雖善而後書陳侯逃歸則戍陳為無功矣戍虎牢雖未為不善而下書楚救鄭則中國為有罪矣故陳氏謂凡戍不書惟晉悼公之戍陳鄭也特書之聖人既以虎牢還繫於鄭又書楚公子貞帥師救鄭諸侯之罪益明矣夫以救書楚所以深罪諸侯不能保鄭肆其陵逼曽荆楚之不若也亦可謂深切著明也哉蜀杜氏曰諸侯伐鄭而戍虎牢聖人於其伐也書其爵而于其戍沒言之是與其伐而不與其戍者今書楚公子之救者所以疾諸侯也愚按楚屢救鄭矣宣元年蒍賈二年闘椒成九年子重十六年楚子十七年子重及公子申之類皆不書其志在于争中國不可許之以救也然聖人之作春秋愛而知其惡憎而知其善晉中國之侯伯也楚僭亂之蠻荒也晉文公懐怨以攻衛過于侵暴則書楚人救衛晉悼公據險以阨鄭肆其陵逼則書楚公子貞救鄭皆所以備責霸者之不仁而見楚人反有救衛之善也既而楚救衛而終不能保衛楚救鄭而終不能争鄭又以著外不勝内之常理耳雖然前書晉悼救陳而陳卒屬於楚此書楚救鄭而鄭遂服于晉得鄭而棄陳悼公盖惑于諸大夫之言以為陳近于楚是以計近功而虧大義急于此而緩于彼也公至自伐鄭襄陵許氏曰書楚救鄭而致公知諸侯之避楚也已靈王亥十年十有一年晉悼十一齊靈二十衛獻十五蔡景三十鄭簡四曹成十六陳哀七把孝五宋平十四秦景十五楚共二十九呉夀夣二十四春王正月作三軍左傳季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍三分公室而各有其一三子各毁其乘季氏使其乘之人以其役邑入者無征不入者倍征孟氏使半為臣若子若弟叔孫氏使盡為臣不然不舎杜氏曰季氏欲専其民人因以改作三子三分國之民衆又各自壊其軍乘以足成三軍季氏使軍乘之人率其邑役入季氏者無公征不入季氏者則使公家倍征之設利病欲驅使入已孟氏取其子弟之半四分其乘之人以三歸公而取其一叔孫氏盡取子弟以其父兄歸公不如是則三家不舎其故而改作也孔氏正義役今之丁也邑賦稅也三軍魯之舊也古者大國三軍次國二軍小國一軍見周禮大司馬魯侯封於曲阜地方數百里明堂位成王以周公為有勲勞於天下封周公于曲阜地方七百里革車千乘天下莫强焉及僖公時能復周公之宇而史克作頌其詩曰公車千乘繩證反下同說者以為大國之賦也毛氏曰大國之賦千乘又曰公徒三萬説者以為大國之軍也鄭氏曰萬二千五百人為軍大國三軍三萬七千五百人三萬率成數也朱子曰車千乘法當用十萬人而為步卒七萬二千人然盡用之是舉國而行故其用三軍而已三軍為車三百七十五乘三萬七千五百人其為步卒不過二萬七千人舉其中以成數言故曰三萬故知三軍魯之舊爾然車而謂之公車則臣下無私乘也徒而謂之公徒則臣下無私民也若有侵伐諸卿更音庚帥以出杜氏曰有事則三卿更帥以征伐事畢則將去聲下同歸於朝車復于甸繩證反甲散於丘卒還於邑將皆公家之臣兵皆公家之衆不相繫也文宣以來政在私門襄公幼弱季氏益張廢公室之三軍而三家各有其一季氏盡征焉而舊法亡矣是以謂之作齊氏曰周公封曲阜地方七百里詩頌僖公復周公之宇云公徒三萬則魯本有三軍後以霸主之令軍多則貢重故減為二軍今復増置中軍耳軍舊屬公有事則三卿更互帥之今三家以公幼弱故分軍征各入已也通㫖問王制大國三軍次國二軍周公之封于魯得用郊褅之禮設兩觀乘大路豈獨受二軍而已哉是知自伯禽以來固已有三軍矣往往自文宣而下軍政隳壞不聞其闕自此年以前國之三軍皆屬于公有事則諸卿分帥以行然當時諸卿私乘必多於公車矣至是季武子欲専主一軍故請於叔孫穆子欲重新整頓作三軍申明約束一也三家各毁其私乘以補足三軍之數二也三子各主一軍専其役邑而公無與焉三也故謂之作三軍乎公無與焉而不疑盖公年十四生于帷墻之中不知君國子民之道殆與晉悼異矣曰是也魯自有三軍而謂作者變其法制耳先儒為舎中軍所誤故以魯本二軍而有復古之説愚按費誓稱魯人三郊三遂説者謂大國三軍故三郊三遂則魯舊有三軍明矣然春秋書作三軍盖是時軍政隳壞而公室之三軍不能備王制之舊是以季氏改借作之名而専兵權也孔氏正義謂僖公復古制作三軍至文公以來霸國以軍多貢重遂自減為二軍至此復作三軍然成二年四卿並將則三軍未嘗廢也特以僖公而後世卿强盛既有三桓又有臧孫氏仲氏叔氏之類是以采邑所取既多而公室之兵軍數廢闕及是三家三分公室又壞已之車乘以復三軍之本制其實欲奪公家之兵為己私爾聖人不以作三軍係之三家者其意曰魯國雖失兵權而聖王之大法則不使兵權不在公室也經凡書作者不宜作也如作丘甲作南門作雉門兩觀皆譏也三軍魯之舊制而亦作書學者習其讀而問其傳則知罪之在矣其明年季孫宿救台遂入鄆又其後享范獻子而公臣不能具三耦二十九年范獻子來聘公享之射者三耦公臣不足取于家臣家臣展瑕展玉父為一耦公臣公巫召伯仲顔莊叔為一耦鄫鼓父黨叔為一耦民不屬公可知矣春秋書其作舎音舎以見音現昭公失國定公無正而兵權不可去公室有天下國家者之所宜鍳也陳氏曰書作三軍志三家之分公室也家氏曰析三軍以為三而三家各有其一為國君者僅擁虚器于上國非其國乾侯之禍權輿于此春秋書城費于前書作三軍於後所以垂人臣負固䟦扈之戒趙氏曰公羊云三卿也按魯卿素已有四五不止二也榖梁又云諸侯一卿按國有小大軍制當異周禮小國一軍據魯初封時最為大國非一軍明矣夏四月四卜郊不從乃不郊榖梁傳夏四月不時也四卜非禮也臨川呉氏曰因四卜之瀆以著魯郊之僣愚按僖三十一年亦四卜郊不從但書免牲不書不郊葢免牲則不郊可知此云不郊則卜免牲不吉而不敢免也髙氏曰魯不當郊郊非禮也今不郊者非知其非禮故也乃卜不從故耳直書不郊則不復免牲矣鄭簡公孫舎之帥師侵宋平左傳三月子蟜相鄭伯以如楚鄭人患晉楚之故諸大夫曰不從晉國㡬亡楚弱于晉晉不吾疾也晉疾楚將辟之何為而使晉師致死于我楚弗敢敵而後可固與也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫説之使疆場之司惡于宋宋向戌侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聼命焉且告于楚楚師至吾又與之盟而重賂晉師乃免矣子展侵宋杜氏曰欲以致諸侯公㑹晉侯悼宋公平衛侯獻曹伯成齊靈世子光莒子黎比邾子宣滕子成薛伯把伯孝小邾子穆伐鄭此三駕之二左傳諸侯伐鄭齊太子光宋向戌先至于鄭門于東門其莫晉荀罃至于西邻東侵舊許衛孫林父侵其北鄙諸侯㑹于北門師于向右還次于瑣圍鄭觀兵于南門西濟于濟隧秋七月己未同盟于亳城北亳蒲洛反公榖作京左傳鄭人懼乃行成同盟于亳范宣子曰不慎必失諸侯諸侯道敝而無成能無貳乎乃盟載書曰凡我同盟毋蕰年毋壅利毋保姦毋留慝救災患恤禍亂同好惡奬王室或間茲命司慎司盟名山名川羣臣羣祀先王先公七姓十二國之祖明神殛之俾失其民隊命亡氏踣其國家程子傳鄭服而同盟也随復從楚伐宋云同見其又覆杜氏曰亳城鄭地任氏曰偃師也故湯都愚按今可南府偃師縣公至自伐鄭榖梁傳不以後致盟後復伐鄭也臨川吴氏曰以前事致者見雖同盟而未得鄭也楚子共鄭伯簡伐宋左傳楚子囊乞旅于秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之伐宋盟于亳城北鄭服而同盟也杜氏曰伐鄭而書同盟鄭與盟可知尋復扶又反從楚伐宋故書同盟見音現其既同而又叛也既同而又叛從子展之謀欲致晉師而後與之也髙氏曰盖用公孫舎之之謀以伐宋自信于楚而數叛晉使楚道敝而固與晉以托國焉故亳之盟其載書曰或間去聲違也兹命明神殛紀力反誅也之俾失其民隊直類反命亡氏踣蒲北反斃也其國家雖渝羊朱反此盟而不顧也噫慢鬼神至於此極而盟猶足恃乎公㑹晉侯悼宋公平衛侯獻曹伯成齊靈世子光莒子黎比邾子宣滕子成薛伯把伯孝小邾子穆伐鄭簡㑹于蕭魚此三駕之三左傳九月諸侯悉師以復伐鄭觀兵于鄭東門鄭人使王子伯駢行成晉趙武入盟鄭伯鄭子展出盟晉侯㑹于蕭魚赦鄭囚皆禮而歸之納斥候禁侵掠晉侯使叔肸告于諸侯鄭人賂晉侯以師悝師觸師鐲廣車軘車淳十五乘甲兵偹凡兵車百乘歌鐘二肆及其鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯魏絳辭曰臣何力之有焉抑臣願君安其樂而思其終也公羊傳此伐鄭也其言㑹于蕭魚何盖鄭與㑹爾程子傳諸侯數月之間再伐鄭鄭之反覆可知鄭又服而請㑹不書鄭㑹謂其不可信也而晉悼公推至誠以待人信之不疑至哉誠之能感人也自此鄭不背晉者二十四年杜氏曰蕭魚鄭地程氏曰㑹于蕭魚鄭又服而請㑹也杜氏曰鄭服而諸侯㑹何氏曰中國以鄭故三年之中五起兵至是乃服其後無干戈之患二十餘年故喜而詳録其㑹孫氏曰言伐言㑹者得鄭之辭也鄭自桓文後晉楚争之乆矣晉悼比嵗大合諸侯今始得之亦能有鄭踰二十年此晉悼之績也陳氏曰有地㑹而後伐者矣未有伐而後地㑹者也地㑹而後伐未集事之辭也伐而後地㑹集事之辭也伐鄭㑹于蕭魚序績也王氏箋義書公㑹伐鄭再書㑹于蕭魚盖美晉侯之功也亦猶楚屈完來盟于師再書盟于召陵之義也愚按㑹于蕭魚與盟于召陵書法正同皆一經之特筆所以序二霸之績然召陵則先書屈完來盟蕭魚不書鄭㑹者夷狄之服義必明著其請盟之跡鄭之服晉雖不著鄭㑹而書㑹于蕭魚公至自㑹楚人執鄭行人良霄于伐鄭之下則得鄭可知矣不書鄭㑹謂其不可信也愚按晉趙武入盟鄭伯鄭子展出盟晉侯經皆畧之謂鄭不可信而小信不足恃也而晉悼公推至誠以待人信鄭不疑禮其囚而歸焉納斥音尺候杜氏曰不相備也許慎曰斥度候望也以望烽燧示兒編謂檢行險阻伺候盗賊禁侵掠遣叔肸許乙反叔向也告于諸侯而鄭自此不復扶又反背音佩晉者二十四年昭四年㑹申鄭始從楚至哉誠之能感人也愚按齊桓霸業至葵丘而盛桓公束牲載書而不㰱血天下諸侯咸喻乎桓公之志晉悼霸業至蕭魚而盛悼公信鄭不疑不復以諸侯同盟而鄭自此不復叛盖要之以信而使之强從不若待之以誠而使人自服也自悼公能謀於魏絳以息民九年冬聼於知音智武子而不與楚戰于戱故三駕三興師而楚不能與之争雖城濮之績不越是矣蘇氏曰自鄭人侵蔡之後晉楚争鄭晉人四以諸侯伐鄭楚輙救之晉用知罃之謀未嘗與楚人戰至是楚不能應遂全師以服鄭鄭乃固與晉楚不能争雖城濮之克不能過也劉氏曰春秋嘉善矜不能悼公之服鄭也有道其信義著于諸侯非一日之積此善之可嘉者也鄭伯之欲從中國也亦非一日之積逼于楚之强而未果此不能之可矜者也然則晉之取鄭鄭之下晉不始于㑹蕭魚之日其信已在前矣至其㑹也諸侯以小息中國以小安是乃有貴乎約信者也其義不言而諭不盟而壹故畧其文以見其實盖春秋成人之美之意也不以戰伐為善不以盟誓為信示以救災患恤禍亂同好惡奬王室而逺人服矣永嘉吕氏曰悼公再霸之烈其最可稱道者蕭魚之㑹以盟則不如屈完之來有以服其心以戰則不如城濮之師有以讋其氣然以荆楚方强子囊為政而凛然有憚晉之心雖或時帥師徒以示不怯而卒不能以陵駕中國者豈無故哉觀子囊之言曰方今吾不能與晉争晉君類能而使之舉不失選官不易方其卿讓于善其大夫不失守其士競于教其庶人力于農穡商工皂𨽻不知遷業君明臣忠上讓下競當是時也晉不可敵事之而後可然則晉悼之所以能服楚者固有道矣朱子語問晉悼公曰甚次第他才大叚髙當時厲公恁地㺯得狼當晉室大叚費力及悼公歸來不知如何便被他做得恁地好恰如乆雨積隂忽遇大晴光景便别赫然為之一新又問勝桓文否曰儘勝但桓公白地做起悼公是見成基址公至自㑹榖梁傳伐而後㑹不以伐鄭致得鄭伯之辭也范氏曰鄭與㑹而服中國喜之故以㑹致程氏傳兵不加鄭故書至自㑹髙氏曰春秋以變文為褒貶屢書盟而不信則以不書盟為誠屢書伐而無功則以不致伐為美也楚共人執鄭行人良霄榖作良宵左傳鄭人使良霄太宰石㚟如楚告將服于晉曰孤以社稷之故不能懐君君若能以玉帛綏晉不然則武震以懾威之孤之願也楚人執之書曰行人言使人也杜氏曰良霄公孫輙子書執殺行人皆以為譏言非其罪也啖氏曰稱行人而執以其事執也不稱行人而執以已執也襄陵許氏曰書楚執良宵見楚之力盡于是矣髙氏曰鄭使良宵告絶于楚楚不能得鄭故執良宵以舒憤懣不平之氣自是不復出師以與晉争鄭于是堅從晉矣愚按悼公之四伐鄭于戯則楚子伐鄭戍虎牢則公子貞救鄭亳北則楚鄭伐宋或伐或救或挟鄭以病中國獨至于蕭魚僅能止鄭之一卿而不能出師盖勢窮力屈知義之不可敵而不致抗也冬秦景人伐晉左傳秦庶長鮑庶長武帥師伐晉以救鄭鮑先入晉地士魴御之少秦師而弗設備武濟自輔氏與鮑交伐晉師戰于櫟晉師敗績易秦故也髙氏曰秦景公妹為楚共王夫人于是為楚伐晉報去年之役家氏曰晉為秦所敗春秋畧敗而不書不與秦人之為楚而救鄭也春秋胡傳附録纂疏巻二十一
