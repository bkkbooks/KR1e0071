body:
  text: 春秋胡傳附録纂疏卷二十七元汪克寛撰定公上公名宋襄公庶子昭公弟左傳史記不見其母之姓氏在位十五年壬敬王十辰一年元年晉定三年齊景三十九年衛靈二十六年蔡昭十年鄭獻五年曹隠公通元年陳恵二十一年杞悼九年宋景八年秦哀二十八年楚昭七年吳闔廬六年春王公羊傳定何以無正月正月者正即位也定無正月者即位後也昭公在外得入不得入未可知也曷為未可知在季氏也定哀多微辭王人習其讀而問其傳則未知己之有罪焉爾穀梁傳不言正月定無正也定之無正何也昭公之終非正終也定之始非正始也昭無正終故定無正始不言即位䘮在外也元年必書正月謹始也穀梁元年雖無事必舉正月謹始也何氏曰本有正月者正諸侯之即位定何以無正月昭公薨於乾侯不得正其終定公制在權臣不得正其始唐陳氏曰春秋諸公即位之歳有書即位者有不書即位者然皆備五始以謹其始唯定公即位第書定元年春王而不書正月劉氏曰其非正始柰何定公者公子宋也昭公之弟也昭薨於乾侯季孫逆其䘮廢太子衍及務人而立公子宋焉䘮至於壊隤公子宋先入以主社稷盖受之季氏也非受之先君者也定無正不言正月微辭也魯於是曠年無君公羊文九春秋欲謹之而不可也季氏廢太子衍及務人公為而立公子宋宋者昭公之弟其主社稷非先君所命而專受之於意如者也故不書正月見音現魯國無君定公無正主人習其讀而問其傳秫戀反則未知己之有罪焉耳何氏曰主人謂定哀讀謂經傳謂訓詁設使定哀習其經而讀之問其傳解詁則不知己之有罪孫氏曰不書正月者定公未立不與季氏承其正朔所以黜强臣而存公室也張氏曰昭公自去年十二月薨於乾侯魯國之政聴命强臣不書正月見一國之無主而正朔之無所承也家氏曰子惡之弑宣公之立襄仲立之也春秋猶書正月今昭薨定立季氏立之而不書正月者正月者天王以頒朔於諸侯諸侯受之而頒之國中者也恶弑宣簒是雖為簒而魯猶有君今昭公之䘮未返公子宋未立魯無君也魯無君而季氏自以為君頒朔於廟如常禮春秋黜之故書王不書正書王眀王法以治季氏也不書正月正朔非季氏所得而頒也前此公雖在外而嵗首必書公在存公也存公是故頒朔今公已卒於外嗣子為賊臣所廢魯國無君是故不書正月見魯國無正王朔在廟非賊臣所得頒也蜀杜氏曰定公元年之正月政無所繫故不書正月然必書王者春秋樹王法不可不書王以端本也且王者所以正天下天下不可無王故不可以不存焉正者所以繫一國今國之政無所稟故不復出正月之文以見魯國無正而不與季氏之專也薛氏曰元年書正以正其始昭公已卒定公未克踐阼是昭公之末世未得為定公之始年也沙隨程氏曰定公未立先書元年春者追書之也愚按秦以前皆踰年即位漢惠以後即位於先君即世之年然猶踰年改元自漢帝禪即位改元于昭烈崩之次月厥後皆一年二君而兩建元矣然朱子綱目必大書先君之年分注嗣君之改元以為君臣父子之教所闗甚大皆取法於春秋踰年改元之意此年雖定公未即位而追書元年春者以昭公已薨則是年實嗣君之年不可不書元年春亦猶晉建武元年愍帝既廢元帝始於三月即晉王位而綱目追書建武元年春正月也三月晉定人執宋景仲幾于京師大夫專執於是始左傳正月晉魏舒合諸侯之大夫于狄泉将以城成周魏子涖政屬役於韓簡子還卒於寗庚寅栽宋仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟曰各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然薛宰曰薛之皇祖奚仲為夏車正仲虺為湯左相若復舊職将承王官何故以役諸侯仲幾曰三代各異物薛焉得有舊為宋役亦其職也士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘之乎士伯怒謂韓簡子曰宋罪大矣且已無辭而抑我以神誣我也必以仲幾為戮乃執仲幾以歸三月歸諸京師城三旬而畢乃歸諸侯之戍公羊傳仲幾之罪何不蓑城也其言于京師何伯討也伯討則其稱人何貶曷為貶不與大夫專執也曷為不與實與而文不與文曷為不與大夫之義不得專執也榖梁傳此大夫其曰人何也微之也何為㣲之不正其執人於尊者之所也不與大夫之伯討也按左氏諸侯㑹城成周宋仲幾不受功何氏曰禮諸侯為天子城各有分丈尺仲幾不治所主曰滕薛郳吾役也杜氏曰欲使三國代宋受功役為于偽反是執之則有罪矣書晉人執仲幾于京師則貶詞也以王事討有罪何貶乎按周官司𨽻掌凡囚執人之事屬於司寇周禮司𨽻乃大司寇刑官之屬凡諸侯之獄訟定以邦典凡卿大夫之獄訟斷丁亂反以邦法則大司冦之職也見大司冦不告諸司寇而執人於天子之側公羊僖二十八故雖以王事討有罪猶貶凡此類皆簒弑之萌履霜之漸執而書其地春秋書執三十有一皆不書地謹之也毎謹於初而禍亂熄矣孫氏曰春秋之義諸侯不得專執况大夫乎宋仲幾㑹城成周韓不信陪臣也非天子命執仲幾于天子之側甚矣故曰晉人執于京師疾之也髙郵孫氏曰諸國之大夫相率而城天子之都義也仲幾不受功不義也以義而討不義當也然而在尊者之側請命而後執可也既不請命則歸于王可也諸侯執人而自治之猶以為不可在尊者之側既不請命又不歸於王其無王甚矣其稱人以為雖執得其罪不與其專也愚按左傳云㑹城成周而執仲幾是執之于成周也不曰成周而曰京師所以尊王室而正晉大夫無王之罪也城成周不稱京師所以見周室下同於列國無自尊之實也執仲幾于成周特稱京師者所以誅晉人視周室比於小國失當尊之分也地非兩地而或曰成周或曰京師聖人之意蓋有在矣啖氏曰前年冬十月城成周左氏云㑹于狄泉此年正月又言合諸侯之大夫于狄泉按此説重也一用夏正一用周正以此誤也臨川吳氏曰左傳有歸于京師四字據經所書但見其執於京師不見其歸于京師也夏六月癸亥公之䘮至自乾侯戊辰公即位左傳叔孫成子逆公之䘮于乾侯季孫曰子家子亟言於我未嘗不中吾志也吾欲與之從政子必止之且聴命焉子家子不見叔孫易幾而哭叔孫請見子家子子家子辭曰羈未得見而從君以出君不命而薨羈不敢見叔孫使告之曰公衍公為實使羣臣不得事君若公子宋主社稷則羣臣之願也凡從君出而可以入者将唯子是聴子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也冦而出者行可也若羈也則君知其出也而未知其入也羈将逃也喪及壊隤公子宋先入從公者皆自壊隤反六月癸亥公之䘮至自乾侯戊辰公即位公羊傳癸亥公之䘮至自乾侯則曷為以戊辰之日然後即位正棺於兩楹之間然後即位子沈子曰定君乎國然後即位即位不日此何以日録乎内也榖梁傳殯然後即位也定無正見無以正也踰年不言即位是有故公也言即位是無故公也即位授受之道也先君無正終則後君無正始也先君有正終則後君有正始也戊辰公即位謹之也定之即位不可不察也即位何以日内之大事日即位君之大事也其不日以年决者不以日决也此其日著之也踰年即位勵也於勵之中又有義焉未殯雖有天子之命猶不敢况未殯而臨諸臣乎范氏曰諸侯五日而殯今以君始死之禮治之故六日而後即位趙氏曰即位皆於朔日故不書日定公待昭公喪至既殯而即位故書日昭公之薨已越葬期猶未得返至于六月癸亥然後喪至愚按桓公薨于齊二十有二日而䘮至昭公薨七月喪始至已踰五月而葬之期故春秋詳書日以誅季氏也而定之即位乃在是月之戊辰蓋遲速進退為意如所制不得專也孫氏曰定公繼奔亡之後制在季氏故昭公之喪至六日而始得即位此制在季氏可知也故書以著其惡程子曰定公至六月方即位以見季氏之制也以周書顧命攷之成王之崩在四月乙丑宰臣太保即於是日命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁音奔百人逆王世子釗音昭于南門之外延入翼室宅憂為天下主吕氏曰成王方崩太保以冢宰命桓毛二臣使齊侯吕伋逆太子釗入自端門延入翼室為憂居之宗示天下不可一日無統也不待崇朝而後定也今昭公喪至在葬期之後公子宋自壊隤徙回反先入猶未得立是知為意如所制不得以時定非謂正棺乎兩楹之間檀弓殷人殯于兩楹之間注兩楹之間南面鄉明人君聼治正坐之處故定之即位不可不察也夫即位大事也宗嗣先定則變故不生蓋代君享國而主其祭宜戚宜懼魏志辛毗女憲英曰太子代君主宗廟社稷者也代君不可以不戚主國不可以不懼宜戚宜懼一失幾㑹或萌窺伺音笥之心至於生變則為不孝矣古人所以貴於早定國家之本也今昭公之薨定公之即位春秋詳書于䇿非為後法乃見音現諸行事為永鑒耳張氏曰意如親逐其君既薨暴露七月而後反國黜適而立不正至於喪歸君立乃欲辨區區之禮文而行之豈非所謂不能三年之喪而緦小功之察乎春秋詳書以見亂臣擅國定公不正三綱淪斁魯之君臣罔不䀌傷心之時大本既失而進退舉措尚何禮之足言哉此所謂為永鑒者也髙氏曰國不可一日無君昭公薨至今統紀之絶若是其久也故曰以謹之季氏既逐其君君薨又不即以國君喪禮迎之今又廢其嫡嗣而專立其弟宋不擇所處汚於偽誘於利昭公喪至五日而殯遂自即位此非受之先君而専受之意如者也既為意如所立故不復討意如之罪家氏曰定公之立不書即位正也今書即位以其簒君之子受位于賊特書即位以正之也定公而能執子臧季札之讓逃而去之夫然後於義為盡今也受位於賊臣曽不曰先君有嫡子在我不當立偃然自以為己之所當得是與簒何逺哉春秋書即位從桓宣之例夫豈與之亦以誅之也愚按定公為逐君者所立受之而不討賊幸於禍而忘其讎訹於利而忘其辱故雖内無所承上不稟命亦如其意而書即位以著其自立之罪比於文成襄昭哀而無貶者美惡不嫌同詞秋七月癸巳葬我君昭公左傳季孫使役如闞公氏将溝焉榮鴐鵝曰生不能事死又離之以自旌也縱子忍之後必或恥之乃止季孫問於榮鴐鵝曰吾欲為君諡使子孫知之對曰生弗能事死又惡之以自信也将焉用之乃止癸已葬昭公於墓道南孔子之為司冦也溝而合諸墓杜氏曰公在外薨八月乃葬高氏曰昭公薨半載餘始以喪歸歸及踰月而遽葬見魯之臣子無恩於先君如此吕氏曰葬必曰我君所以隆君父之恩盡忠愛之義至於此時詳味書法然後有以大警動於其臣下者九月大雩薛氏曰有三年之喪而行大雩之禮見三桓之無上也啖氏曰公穀言月雩正秋冬大雩皆非正也先澤未盡人力未竭未可雩按雩者以祈雨也若待先澤盡人力竭雖雨何救哉蓋傳以日月為例故有此分别立煬宫煬羊讓反左傳昭公出故季平子禱于煬公九月立煬宫公羊傳煬公之宫也立者不宜立也立煬宫非禮也榖梁傳不宜立者也煬公伯禽之子杜氏注其曰立者不宜立也喪事即逺有進而無退見檀弓宫廟即逺有毁而無立注見成六年張氏曰季氏妄禱而踰祀典以立久祧之宫聖人特書必有曽謂煬公不如林放之嘆乎鄱陽萬氏曰煬公考公之弟也魯之以弟繼兄而立蓋始乎此昭公之在魯已立公為為太子及其居鄆又黜公為而立公衍則國固有適嗣矣季孫舍適嗣不立而立定公定公乃昭公之弟季孫恐人之議已於是而立煬宮其意若曰煬公以弟而繼兄魯一生一及之所自始今定公以弟而繼昭公則亦煬公之以弟而繼考公者也則舍公衍公為而立定公者非吾之私意蓋魯國之舊制爾愚按季孫行父立武宫已為非禮矧煬公至昭公已二十世廟毁已久而復立意如得罪於魯之先祖擢髪不足數而猶欲諂事煬宫以徼福吾知煬公之不享其祭也冬十月隕霜殺菽公羊傳此災菽也曷為以異書異大乎災也榖梁子曰菽何氏曰菽大豆舉重也未可以殺而殺舉重范氏曰建酉之月隕霜殺菽非常之災舉殺豆則殺草可知可殺而不殺舉輕其象則刑罰不中陟仲反之應於證反劉氏曰周十月今八月隂氣未至君位而殺誅罰不由君出在臣下之象何氏曰八月微陽用事未可殺菽定公得位不念先君黜逐之恥故天示以當早誅季氏蘇氏曰於其不殺而言草言其廣也於其殺而言菽言其所害也髙氏曰菽草之難殺者也言殺菽則草皆死矣言不殺草則知菽亦不死也愚按或言春秋用夏正引孔氏正義謂耐霜之菽為霜所摧是以為異若十月隕霜不應專殺豆苖不及餘穀今考僖三十三年隕霜不殺草亦但舉易殺者而言非霜殺他苖而不殺草也此年殺菽則舉難殺者而言他苖亦傷可知矣苟禾稼已收則耐霜晩熟之菽為霜所殺又何足以煩聖人之筆乎王莽地皇二年秋隕霜殺菽亦謂其獨殺耐霜之菽可乎癸敬王十已二年二年晉定四齊景四十衛靈二十七蔡昭十一鄭獻六曹隠二陳惠二十二杞悼十宋景九秦哀二十九楚昭八吳闔廬七春王正月夏五月壬辰雉門及兩觀災觀工喚反公羊傳記災也杜氏曰雉門公宫之南門兩觀闕也天火曰災何氏曰天子諸侯臺門天子外闕兩觀諸侯外闕一觀孔氏正義雉門公宫南門之中門觀謂之闕闕在門兩旁中央闕然為道也其上縣法象其状巍然髙大謂之象魏使人觀之謂之觀兩觀也象魏也闕也一物而三名也觀與雉門俱災則兩觀在雉門之兩旁矣崔氏古今注蓋為二臺於門外作樓觀於上兩觀雙植中不為門蜀杜氏曰魯以周公之故立雉門兩觀僭天子也魯之僭禮聖人譏之必因其事而託義焉此雉門兩觀其僭乆矣若不災則不可得而録之今災及而書實譏其僭也劉氏曰公羊云兩觀微也主災者兩觀也非也災有先後據見而書又云曷不言雉門災及兩觀其意以下新作雉門及兩觀為比亦非也新作不可序下灾不可序上亦常理爾穀梁云不言雉門災及兩觀何也災自兩觀始也亦非也愚按何休云雉門兩觀僭天子不可言雖在春秋中猶不書今考延廐南門之新作皆書而郊禘僭禮皆不諱則雉門兩觀之作蓋在春秋之前故不見耳抑豈所謂新作南門者即雉門之類歟秋楚昭人伐吳闔廬左傳桐叛楚吳子使舒鳩氏誘楚人曰以師臨我我伐桐為我使之無忌楚囊瓦伐吳師于豫章吳人見舟于豫章而潛師于巢吳軍楚師于豫章敗之遂圍巢克之獲公子繁襄陵許氏曰楚介在南荒夷蠻相攻不可殫錄自襄三年書楚伐吳七書楚伐僅能一克于朱方他役皆敗無功積其陵暴首兵之咎将至於禍敗失國也陳氏曰此囊瓦也貶人之冬十月新作雉門及兩觀公羊傳其言新作之何修大也修舊不書譏何譏爾不務乎公室也穀梁傳言新有舊也作為也有加其度也何氏曰譏不務如公室之禮微辭也天災之當减損如諸侯制而復修大僣天子之禮故言新作書新作者譏僭王制而不能革也雉門象魏之門杜氏曰象魏門闕哀三季桓子御公立於象魏之外周禮縣治象之法于象魏其外為庫門而臯門在庫門之外其内為應門而路門在應門之内是天子之五門也明堂位庫門天子臯門雉門天子應門注天子五門臯庫雉應路魯有庫雉路庫門制似天子臯門雉門制似天子應門謂制度高大如天子不必事事皆同僖公甞修泮宫復閟宫非不用民力也而春秋不書新作南門則獨書者南非一門也必有不當為者子家駒以設兩觀為僣天子公羊昭二十五是非諸侯之制明矣何氏本㫖御廩桓宫僖宫西宫新宫亳社災太室屋壊皆不言别葺獨雉門兩觀僣王者法度天災示變宜有所革而復大其規模故經云新作以見非正也夫撥亂反正者必本諸身身正者物必正春秋於僭君必書者必正之意也使定公遇災而懼革其僣禮三家陪臣雖欲僣諸侯執國命其敢乎習舊而不知以為非何以禁季氏之脅其主矣故特書新作以譏之也孫氏曰公不知僣之惡也書新作侈而大之也劉氏曰魯用王禮是以其庫門天子臯門雉門天子應門而設兩觀僣君甚矣習舊而不知以為非覩變而不知以為戒無怪於季氏之脅其主矣此春秋之微辭至意也高氏曰莊二十九年新延廐不言作言作者收舊制而増大之也魯僣天子之禮天示變以警之遇災而不知以為戒乃更作而新之反加其度焉是魯之僭終無已也特書新作罪在定公也家氏曰定公受位於賊臣舉國以聴賊臣之所為君不能君者也天示之異災及雉門兩觀諸侯所以臨涖其臣民者一朝化為煨燼變亦駭矣乃又從而新之有加於其舊是謂天變為不足畏也劉氏曰榖梁云其以尊者親之何也雖不正也於美猶可也非也雉門先災不得不曰雉門及兩觀災既災之後魯人修舊理當先門門者出入處也觀者門飾也各順其序而書之耳甲敬王十午三年三年晉定五齊景四十一衛靈二十八蔡昭十二鄭獻七曹隠三陳惠二十三杞悼十一宋景十秦哀三十楚昭九吳闔廬八春王正月公如晉定至河乃復程子傳季孫意如上不請於天子下不告於方伯而立定公故晉怒而公徃朝焉晉辭公而復故明年因㑹而請盟于臯鼬二月辛卯邾子穿卒荘公也在位三十三年子益嗣是為隠公夏四月秋葬邾荘公杜氏曰六月乃葬緩冬仲孫何忌及邾子盟于㧞㧞公作枝左傳盟于郯修邾好也杜氏曰㧞地闕郯即㧞髙氏曰邾子居喪而以吉禮與魯大夫盟其微弱可知薛氏曰魯大夫而盟諸侯邾喪未期而為盟㑹交失之也襄陵許氏曰公至河乃復晉之輕魯也仲孫及邾子盟魯之輕邾也當昭公時祲祥之㑹猶未爾也愚按魯以大夫而盟邾君紊君臣之分也邾隠公父喪才九月而出㑹盟薄父子之親也哀二年取漷沂田州仇何忌並書二卿及邾子盟句繹旣奪其地而二大夫脅勢以盟其君則又甚矣乙敬王十未四年四年晉定六齊景四十二衛靈二十九蔡昭十三鄭獻八曹隠四弑陳恵二十四卒杞悼十二卒宋景十一秦哀三十一楚昭十吳闔廬九春王二月癸巳陳侯吳卒惠公也在位二十四年子栁嗣是為懐公三月公㑹劉子文晉侯定宋公景蔡侯昭衛侯靈陳子懐鄭伯獻許男隠曹伯隠莒子郊頓子胡子滕子項薛伯襄杞伯悼小邾子齊景國夏于召陵侵楚昭召音邵晉楚兵交止此左傳蔡昭侯為兩佩與兩裘以如楚獻一佩一裘於昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公如楚有兩肅爽馬子常欲之弗與亦三年止之唐人竊馬而獻之子常子常歸唐侯蔡人聞之固請而獻佩於子常子常朝見蔡侯之徒命有司曰蔡侯之久也官不共也明日禮不畢將死蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川蔡侯如晉以其子元與其大夫之子為質焉而請伐楚三月劉文公合諸侯于召陵謀伐楚也晉荀寅求貨於蔡侯弗得言於范獻子曰國家方危諸侯方貳將以襲敵不亦難乎水潦方降疾瘧方起中山不服棄盟取怨無損於楚而失中山不如辭蔡侯吾自方城以來楚未可以得志祗取勤焉乃辭蔡侯晉人假羽旄於鄭鄭人與之明日或斾以㑹晉於是失諸侯程子傳楚恃其强侵陵諸侯晉上請于天子大合諸侯以伐之而不能明暴其罪以行天討無功而還故書侵按左氏傳􅐕戀反書伐而經書侵楚者楚為無道慿陵諸夏為于偽反一裘一馬拘唐蔡二君三年而後遣蔡侯旣歸請師於晉晉人請命於周大合諸侯天子之元老在焉杜氏曰劉文公王官伯也若能暴蒲卜反明其罪恭行天討庶幾哉王者之師齊桓晉文之功褊矣據齊桓伐楚晉文戰楚皆未甞請命于周有荀寅者求貨於蔡侯弗得遂辭蔡人晉由是失諸侯無功而還音旋書曰侵楚陋之也杜氏曰入楚境故書侵孫氏曰蔡人病楚使告於晉故晉合諸侯於此此救蔡伐楚也書㑹於召陵侵楚者諸侯不振不能救蔡伐楚也故使救伐之功歸于強吳張氏曰書十八國諸侯之衆所以見其勢之足以有為也而終之以侵楚深以罪其志卑而義不勝終之以無能為也而晉自此㣲矣劉氏曰楚之不義甚矣晉以霸主之勢慿王命之重而不能討顧使吳乘其釁中國不振旅功近而禍逺矣不亦病乎髙氏曰入春秋來蔡人首叛中國至是蔡人不勝楚之陵虐乃請伐楚晉為盟主大合諸侯十八國之衆天子使大夫臨之可謂盛矣乃不能攘僭亂之患而吳以一國之師敗之吳子主黄池之㑹自此始也王氏箋義楚為不道晉率諸侯為蔡伐楚正也反以不得貨而止故經以無名譏之襄陵許氏曰梁丘據説錦幣而昭公不復囊瓦志於佩裘使蔡侯自絶晉士鞅以賂罷扈之盟荀寅求貨沮召陵之謀故正勝於明時而賂流於衰世此晉霸之所以衰而吳所以横行于上國也永嘉吕氏曰召陵之㑹晉可以復霸而失其機也夫蔡陳鄭許頓胡蓋服役於楚者也而皆與於㑹則病楚而歸晉也晉自平丘以來不能㑹諸侯者二十四年矣今而上致劉子下合十七國之君以為此㑹齊桓之師不如是之盛也然齊桓之師書曰伐楚盟于召陵晉定之師書曰㑹于召陵侵楚侵淺事也晉合十七國之君以㑹于召陵徒能侵楚而已是不足與有為也晉自是無復宗諸侯之望矣家氏曰春秋有以書侵書伐見褒貶者兩召陵是也齊桓以八國伐楚而書伐大桓公攘夷之功也晉定以十八國之師伐楚而書侵鄙晉定之無能為也蓋奉辭伐罪仗義必往然後稱其為伐師雖衆義雖直而逗撓因循無以副衆人之望是雖伐而不足言伐故書侵以㣲之蔡侯以吳師入郢成攘夷之大功春秋貴之昭侯乃隠太子之子明於復讎之義故為春秋所與是㑹也序之宋公之次諸侯之上及柏舉之戰書蔡侯以吳子學者知柏舉之為褒則知召陵之為貶也夏四月庚辰蔡昭公孫姓帥師滅沈以沈子嘉歸殺之姓公作歸姓音生後同沈人不㑹於召陵晉人使蔡伐之據左傳項氏曰齊桓先侵蔡而後伐楚故小者懐大者畏今此先侵楚而後滅沈故大者不服而小者不懐書滅沈罪公孫姓也吕氏曰公孫姓不能正其君之失而遂滅沈至以沈子歸殺之其罪極矣書以歸罪沈子嘉也書殺之罪蔡侯也啖氏曰書殺言蔡罪甚也陸氏曰書滅罪蔡也書以歸罪沈子不死于位也言殺之又譏蔡侯也奉詞致討而覆音腹其邦家為敵所執不死于位皆不仁矣所惡烏故反於前無以先去聲後出乎爾者反乎爾者也蔡侯視楚猶沈視蔡也昭公拘於郢三年而後反非以國小而弱乎沈雖不㑹召陵未有大罪惡也而恃强殺之甚矣能無公孫翩之及哉哀四公孫翩射蔡侯卒髙氏曰沈不與於召陵者與楚故也與楚者不受晉令也故晉因使蔡逞其忿焉夫蔡屢為楚所滅今而舍楚不易矣晉定不能恢宏霸業求所以服楚而保蔡一沈不能容而殺之歸惡於蔡是重楚人怒蔡而易晉爾薛氏曰侵楚無功而僅能加誅於沈也家氏曰春秋書滅沈於㑹召陵之後盟臯鼬之前責蔡也亦責晉也晉大合諸侯辭曰伐楚不能損楚之毫毛乃以沈子不㑹命蔡伐之伐之猶可而蔡為不道乗其未及設守襲而滅之慘矣哉故書滅書殺以正其罪宋以曹伯陽歸哀八蔡以沈子嘉歸皆殺之也而或書或不書其不書者賤而略之也愚按沈子嘉微弱近楚其不㑹晉勢使之然非其罪也特貶其不能死位耳故書殺以著蔡昭之罪曹伯陽田弋荒淫自取滅亡故賤而略之不書宋人殺之也五月公及諸侯盟于臯鼬鼬由又反臯鼬公作浩油左傳及臯鼬将長蔡於衛衛侯使祝佗私於萇𢎞曰晉文公為踐土之盟衛成公不在夷叔其母弟也猶先蔡其載書云晉重魯申衛武蔡甲午鄭捷齊潘宋王臣莒期藏在周府可覆視也𢎞説告劉子與范獻子謀之乃長衛侯于盟穀梁傳一事而再㑹公志於後㑹也程子傳公以不獲見於晉故因㑹而求盟焉則此盟公意也故書公及杜氏曰繁昌縣東南有城皋亭鄭氏曰皋鼬鄭地城皋也愚按屬今汴梁路鄭州定公之立上不請於天王下不告於方伯而受國於季孫意如故三年朝晉至河而復今㑹諸侯求為此盟書公及者内為志也宋氏曰及者汲汲也内為志也公新即位汲汲求諸侯盟召陵之㑹必序不序十有八國之諸侯則無以見音現侵楚之陋皋鼬之盟序與不序非義所繫則以凡舉可矣陸氏曰重言諸侯劉子不與盟也陳氏曰書公及諸侯盟非晉主盟也自是諸侯無㑹同有特相盟者矣愚按首止葵丘之盟王世子宰周公不與盟則㑹盟同地而書諸侯柯陵雞澤平丘之盟尹子單子劉子與盟則不書諸侯此言諸侯則劉文公不盟可知矣薄之盟公不與㑹盂而與於盟則書公㑹諸侯盟于薄宋之盟公不與圍宋而與於盟則書公㑹諸侯盟于宋扈之盟公後至則書公㑹諸侯晉大夫盟于扈此年公與於召陵之㑹又與於皋鼬之盟則非後至也㑹與盟公皆與焉而劉子不與則但當書曰諸侯盟于皋鼬如祝柯重丘㑹盟殊地之例而又書公及者所以著定公汲汲於後㑹求為此盟也蜀之盟春秋不與楚主盟故書公及此書公及亦以著晉之不復能主盟也陸氏曰左氏云将長蔡於衛祝佗私於萇𢎞言踐土之盟衛先於蔡按踐土先書蔡盟此傳妄也劉氏曰杜云復稱公者㑹盟異處故非也襄二十五年㑹於夷儀盟于重丘亦㑹盟異處矣何不别書公及耶何休注再言公者昭公數如晉不見荅卒為季氏所逐定公初即位得與諸侯盟故喜録之亦非也春秋諸侯之㑹常事耳非王道之正也春秋何喜哉杞伯成卒于㑹成公作戊悼公也在位十二年世子乞嗣是為隱公七月其弟過弑隠公自立是為僖公高氏曰不言卒于師者以不成乎伐楚也六月葬陳惠公髙氏曰此見陳侯背㑹出㑹也葢君在殯則辭㑹可也雖不得已於晉令而齊亦使國夏來爾許遷于容城張氏曰容城地闕任公輔以為華容縣亦折之近地愚按今許州臨潁縣高氏曰許至是蓋四遷矣王氏曰許四遷皆受楚令經悉以自遷為文蓋違害就利而願遷也然不能修徳固圉而遷徙無常亦何益乎聖人詳書以為後鑒秋七月公至自㑹襄陵許氏曰不致侵楚譏無功也髙氏曰晉以伐楚召諸侯而以㑹致者不成乎伐也張氏曰不致以侵楚者公以得盟為幸意不在侵也劉文卷卒卷音權公羊傳劉卷者何天子之大夫也外大夫不卒此何以卒我主之也榖梁傳此寰内諸侯也非列土諸侯何以卒賢之也杜氏曰即劉蚠趙氏曰畿内諸侯不同列國故不言劉子卷卒亦譏來赴故書之劉氏曰王者之制内諸侯禄外諸侯嗣故生稱爵其禄也卒稱名従正也葬稱公主人之事也髙氏曰召陵㑹罷而卒則知皋鼬之盟以疾不與也莊二十三年傳天子内臣不正其外交故劉卷來赴不書其爵秩劉氏曰榖梁云此不卒而卒者賢也天王崩為諸侯主也所謂天王崩則昭二十二年景王矣為諸侯主則劉子單子以王猛居于皇是矣是王猛本正也榖梁謂其簒何哉愚按諸儒之説謂劉子定内難復辟於周有大功於王室故特書卒葬然單旗不書卒而尹氏專權亦書卒故知其從赴告爾葬杞悼公楚昭人圍蔡昭左傳楚為沈故圍蔡襄陵許氏曰圍蔡不書卿帥師者見其驕暴而不自反溢而必决将敗之徴是以徴之晉定士鞅衛靈孔圉帥師伐鮮虞圍公作圄襄陵許氏曰謀楚而不能討盟蔡而不能救唯中山是伐書卿與師著威勝不行於强暴而行於寡弱也蘇氏曰昭十二年楚滅陳蔡晉人不救而伐鮮虞稱晉以夷之今晉既不為蔡伐楚楚人圍蔡亦弗之救而於其伐鮮虞也稱晉士鞅衛孔圉何也晉雖有棄諸侯之罪而蔡無國滅之禍輕重之異也愚按荀吳首伐鮮虞以其挾詐故狄之此非詐襲故稱将稱師以著其暴耳葬劉文公公羊傳外大夫不書葬此何以書録我主也趙氏曰劉文公天子畿内諸侯列國不當與行交徃之禮今㑹其葬非禮也高氏曰尹氏王子虎皆不書葬此書葬以魯特往㑹之也冬十有一月庚午蔡侯昭以吳子闔廬及楚昭人戰于柏舉楚師敗績楚囊瓦出奔鄭柏舉公作伯莒穀作伯舉吴始書子書戰左傳伍貟為吳行人以謀楚楚之殺郤宛也伯氏之族出伯州犂之孫嚭為吳太宰以謀楚楚自昭王即位無嵗不有吳師蔡侯因之以其子乾與其大夫之子為質於吳蔡侯吳子唐侯伐楚舍舟於淮汭自豫章與楚夾漢左司馬戍謂子常曰子沿漢而與之上下我悉方城外以毁其舟還塞大隧直轅㝠阨子濟漢而伐之我自後擊之必大敗之既謀而行武城黒謂子常曰吳用木也我用革也不可久也不如速戰史皇謂子常楚人惡子而好司馬若司馬毁吳舟于淮塞城口而入是獨克吳也子必速戰不然不免乃濟漢而陳自小别至于大别三戰子常知不可欲奔史皇曰安求其事難而逃之将何所入子必死之初罪必盡説二師陳於柏舉闔廬之弟夫槩王晨請於闔廬曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫槩王曰所謂臣義而行不待命者此之謂也今日我死楚可入也以其屬五千先擊子常之卒子常之卒奔楚師亂吳師大敗之子常奔鄭公羊傳吳何于以稱子夷狄也而憂中國其憂中國柰何蔡昭公朝楚有美裘焉囊瓦欲之昭公不與為是拘于南郢數年然後歸之於其歸焉用事於河曰天下諸侯苟有能伐楚者寡人請為之前列楚人聞之怒為是興師使嚢瓦将而伐蔡蔡請救於吳伍子胥曰蔡非有罪也楚人為無道君如有憂中國之心則若時可矣於是興師而救蔡榖梁傳吳其稱子何也以蔡侯之以之舉其貴者也吳信中國而攘夷狄吳進矣蔡請救于吳子胥曰蔡非有罪楚無道也為是興師而伐楚何以不言救也救大也杜氏曰柏舉楚地吳何以稱子善伐楚解蔡圍也荆楚暴横去聲盟主不能致其討天王不能逹其命長上聲惡不悛音痊復扶又反興師而圍蔡王法所當討而不赦也吳能自卑聴蔡侯之義以逹天子之命興師救蔡戰于柏舉大敗必邁反楚師成霸討之功善矣晉主夏盟中國所仰若嘉穀之望雨也有請於晉如彼其難吳國天下莫強焉非諸侯所能以也有請於吳如此其易以豉反故召陵之㑹大合諸侯而書侵楚柏舉之戰蔡用吳師特書曰以者杜氏曰師能左右之曰以吳為蔡討楚從蔡討謀故書蔡侯以吳子言能左右之也深罪晉人保利棄義難於救蔡也然則何以不言救乎救大矣闔廬子胥宰嚭普鄙反皆懐謀楚之心蔡人往請㑹逢其適適猶偶然也謂適逢其偶然之機㑹也非有救災恤鄰從簡書憂中國之實也聖人道大徳宏樂音洛與人為善故因其從蔡特進而書爵孫氏曰吳稱子大救蔡也自是諸侯大小皆宗于吳王氏曰吳進而書子所以罪中國盟主之不振諸侯之不君也囊瓦貪以敗國又不能死可賤甚矣故記其出奔特貶而稱人杜氏曰囊瓦稱人貪以致敗不能死難罪賤之家氏曰自楚昭繼世舉國事付之嚢瓦黷貨無厭殺人不忌以至内外離畔莫有鬬心由是有入郢之禍國破君逃瓦不能死又不能與君俱行奉頭鼠竄以為偷生之計罪不可勝誅矣春秋繼柏舉之敗書瓦出奔誅大臣之敗國而以身免也春秋之情見音現矣愚按春秋書以師者三桓十四年宋以齊蔡衛陳伐鄭以中國而凌中國也僖二十六年魯以楚師伐齊以蠻荆而虐中國也此年蔡以吳子戰楚以蠻荒攘蠻荒而救中國也三書以唯柏舉為善故蔡侯吳子皆書爵以美之庚辰吳闔廬入郢郢公穀作楚左傳吳從楚師五戰及郢楚子取其妹季􅇗畀我以出吳入郢以班處宫子山處令尹之宫夫槩王欲攻之懼而去之夫槩王入之楚子渉睢濟江入于雲中盗攻之王奔鄖鄖公闘辛與其弟巢以王奔随吳人謂隨人曰周之子孫在漢川者楚實盡之天誘其𠂻致罰於楚而君又竄之周室何罪隨人辭吳吳人乃退初伍員與申包胥友其亡也謂申包胥曰我必復楚國包胥曰勉之子能復之我必能興之及昭王在隨包胥如秦乞師曰吳為封豕長蛇荐食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷徳無厭若鄰於君疆埸之患也逮吳之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而生秦師乃出五年秦子蒲子虎帥車五百乗以救楚子蒲曰吾未知吳道使楚人先與吳戰而自稷㑹之大敗夫槩王于沂吳人獲薳射于柏舉其子帥奔徒以從子西敗吳師于軍祥子期子蒲滅唐吳師居麇子期焚之又戰吳師敗又戰于公壻之谿呉師大敗呉子乃歸公羊傳君舍于君室大夫舍于大夫室葢妻楚王之母也穀梁傳曰入易無楚也壞宗廟徙陳器撻平王之墓君居其君之妻寢而妻其君之妻大夫居其大夫之寢而妻其大夫之葢有欲妻楚王之母者不正其乗敗人之績而深為利愚按郢楚都文王遷郢在今江陵路江陵縣故郢城平王時囊瓦城郢在今江陵路安陸府及楚人戰則稱爵入郢則舉其號何也君舍於其君之室大夫舍於大夫之室大亂也聖人誰毁誰譽平聲救災恤鄰則進而書爵非有心於與之順天命也乗約肆滛則黜而舉號非有心於貶之奉天討也伐國者固将拯民於水火之中而鳩聚也集之耳殺其父兄係其子弟毁其宗廟遷其重器而亂男女之配也如水益深如火益熱則善小而惡大功不足以掩之矣孫氏曰吴子救蔡伐楚善也乘囊瓦之敗長驅入郢夷其宗廟壊其宫室則甚矣故反狄之也聖人心無毁譽如鏡之無妍醜也因事物善惡而施褒貶焉不期公而自公爾明此義然後可以司賞罰之權得春秋之法矣薛氏曰楚不書楚而書郢見楚之大其都猶不能守也陳氏曰入國不言邑入楚也而曰入郢非得國之辭也家氏曰前書吴子褒之也此書吳貶之也夫吳乃太伯之裔不與楚同使其入郢之後止兵休掠命蔡昭子胥之徒分定楚地撫輯其民人請命於周明正楚荘共靈以來慿陵諸夏之罪削而奪之以其地封有功諸侯而吴不自以為有則霸業可成雖以繼齊桓晉文可也而夷狄之人志不在大驕心易生故敗不旋踵良可惜夫趙氏曰楚君尋反國國不絶祀故不言滅穀梁妄為義説不足取也劉氏曰穀梁云何以不言滅欲存楚也非也楚實未滅當言入而已矣凡滅國春秋未嘗不存也豈於楚獨存之耶愚按僖二十八年晉侯侵曹丙午入曹又十五年晉郤缺伐蔡戊申入蔡皆書國而不書地獨此年不書吳入楚而以楚之國都地名書之恐因昭三十一年吳入郢之文而誤也左傳於是後十五年楚滅故亦稱吴之入楚也而不曰入郢當從公穀作入楚於義頗通丙敬王十申五年五年晉定七齊景四十三衛靈三十蔡昭十四鄭獻九曹靖公露元年陳懐公柳元年杞僖公過元年宋景十二秦哀三十二楚昭十一吳闔廬十春王三月辛亥朔日有食之三月公作正月夏歸粟于蔡左傳以周亟矜無資杜氏曰蔡為楚所圍飢乏故歸之粟公羊傳孰歸之諸侯歸之曷為不言諸侯歸之相離至不可得而序故言我也穀梁傳諸侯無粟諸侯歸粟正也孰歸之諸侯也不言歸之者專辭也義邇也范氏曰此邇近之事不足具列諸侯通㫖二傳皆稱諸侯歸蔡粟其畧而不序何也蔡為楚人所困則環視而不能救吳既破楚入郢觧蔡圍矣然後相率而歸之粟非救災恤鄰從簡書之道也故特書魯而不序諸侯見其事之末矣愚按昭二十五年輸王粟不書以諸侯歸粟于王常事也襄三十年㑹澶淵謀更宋之所䘮而歸其財則書曰宋災故以宋災歸財非所當急也此年諸侯歸粟于蔡而不書諸侯以不能救蔡之難徒歸粟于蔡耳故畧言之與城楚丘戍陳同義或以為諸侯歸粟合先王之制而春秋書歸以羙之過矣苟以書歸皆為美辭則歸含且􅈖亦可以為美乎於越允常入吳闔廬左傳吴在楚也公羊傳於越者未能以其名通也越者能以其名通也杜氏曰於發聲也范氏曰於越夷言也春秋即其所以自稱者書之見其不能慕中國故以本俗自通劉氏曰於越者其自稱者也越者中國稱之者也陳氏曰向曰越人今曰於越復稱其舊號也吳楚争而後越入中國昭五年常壽過始見於經而亟稱人後三十年而入吳不復稱人矣高氏曰吳之伐楚有安中國之意焉越乃乘其士卒罷敝掩入其國至十四年又敗吳哀十三年再入吳若為楚復讐者是以君子惡之嗟夫闔廬争入郢之利而於越入吴夫差取盟晉之功而於越又入吴意有所逐而愛有所忘矣王氏曰呉越相攻俱不以中國之號目之葢交譏之愚按汲冢周書王㑹萹有東越於越則於越或當時之所稱歟六月丙申季孫意如卒左傳季平子卒陽虎将以璵璠歛仲梁懐弗與曰改歩改玉陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉既𦵏桓子行東野及費子洩為費宰逆勞於郊桓子敬之勞仲梁懐懐弗敬子洩怒謂陽虎子行之乎陽虎囚季桓子及公父文伯而逐仲梁懐殺公何藐盟桓子于稷門之内大詛逐公父歜及秦遄皆奔齊内大夫有罪見討則不書卒公子翬是也仲遂殺惡及視罪與翬同而書卒者以事之變卒之也因事之變以明卿卒不繹之禮意如何以書卒見音現定公不討逐君之賊以為大夫全始終之禮也定雖受國於季氏苟有叔孫婼之見不賞私勞昭四年竪牛立叔孫昭子五年昭子朝家衆曰竪牛殺適立庶必速殺之牛懼奔齊致辟音僻意如以明君臣之義則三綱可正公室强矣今苟於利而忘其讎三綱滅公室益侵陪臣執命宜矣故意如書卒主人習其讀而問其傳􅐕戀反則未知己之有罪焉爾劉氏曰意如親逐其君而卒之其異於翬何也曰以定公為君則不得不以意如為大夫孰有大夫卒而君不為之變乎夫意如之逐昭公也盟翬遂之弑君也隠而叔仲恵伯之蔽惡也未形春秋固有不待貶絶而罪惡見此之謂也且夫意如之罪固著矣及其卒也而絶之則其著不亦彌信乎而春秋弗為也以謂定不書正月適足以見定之非正而猶未足以見其受國於季氏故於是復明意如為定之大夫也使定公誠能明君臣之義不賞私勞討先君之賊致季氏之誅則意如不免矣今一不然苟於利而忘其辱幸於禍而忘其讐謂意如定之大夫也不亦宜乎家氏曰春秋卒意如不貶之貶乃所以深貶之也蜀杜氏曰於桓公之年書公子翬所以貶桓公也於宣公之年書公子遂所以譏宣公也於此年書季孫意如卒所以疾定公也秋七月壬子叔孫不敢卒婼之子成子也子州仇嗣為大夫是為武叔冬晉定士鞅帥師圍鮮虞左傳三年秋鮮虞人敗晉師于平中獲晉觀虎五年冬士鞅圍鮮虞報觀虎之役也襄陵許氏曰晉以土地之故縱兵横加鮮虞而不能服則又圍之兵益忿義益不勝君子是以惡晉也丁敬王十酉六年六年晉定八齊景四十四衛靈三十一蔡昭十五鄭獻十曹靖二陳懐二杞僖二宋景十三秦哀三十三楚昭十二吳闔廬十一春王正月癸亥鄭獻游速帥師滅許以許男斯歸速公作遬後同左傳鄭滅許因楚敗也髙氏曰許恃楚以固其國至于四遷鄭游速偏師一出滅其國而俘其君楚雖不能保許而鄭之肆暴亦甚矣故謹而日之張氏曰許自隠十一年齊魯鄭之入大抵困於與鄭為鄰至成十五年畏鄭而遷葉昭九年遷夷十八年遷析定四年又自析遷容城以依楚不三年楚困於吳鄭遂滅之然哀元年以後許復見者楚又存之也大岳之後其亡一見害於鄭其存一恃於楚不過百年韓遂滅鄭亦有由矣王氏曰伐國而滅之春秋所惡也況以人臣而專兵滅國乎前此晉荀吳嘗滅陸渾之戎然以安夏而滅戎也則罪猶可恕蔡公孫姓嘗滅沈矣然受晉令而伐沈則事無專命今游速因楚之敗興兵滅許無晉之命非攘外安内之師是弱晉而間楚耳此皆鄭國君臣之罪也若夫以其君歸則游速許男均有罪焉二月公侵鄭獻左傳周儋翩率王子朝之徒因鄭人将以作亂鄭於是乎伐馮滑胥靡負黍狐人闕外六月晉閻沒戍周且城胥靡冬天王處於姑蕕辟亂也公侵鄭取匡為晉討鄭之伐胥靡也往不假道於衛及還陽虎使季孟自南門入出自東門衛侯怒使彌子瑕追之公叔文子曰天将多陽虎之罪以斃之君姑待之乃止愚按定公親帥師以討鄭之黨亂人固有奨王室之義然不䏻聲罪致武僅為潜師以掠境故不書伐而書侵觀季孫獻俘於晉則實廹於霸令而非有奨王之實矣况是時陪臣執國命兵權亦不屬公也陳氏曰自宣之季年凡伐不言公魯無君将者八十年矣至是而書侵鄭則以公山不狃侯犯陽虎之專也公至自侵鄭髙氏曰公内有强臣不䏻討乃為晉討鄭内外結怨危之道也張氏曰陽虎專政欲徼釁於鄰國使衛侯不聼公叔發之言魯師危矣故致之夏季孫斯仲孫何忌如晉定左傳季桓子如晉獻鄭俘也陽虎强使孟懿子往報夫人之幣晉人兼享之孟孫謂范獻子曰陽虎若不䏻居魯而息肩於晉所不以為中軍司馬者有如先君獻子曰寡君有官将使其人鞅何知焉獻子謂簡子曰魯人患陽虎矣孟孫知其釁以為必適晉故强為之請以取入焉劉氏曰陽虎陪臣也而執國命欲蕩覆公室以自封已三世矣事不成故盜寳玉大弓以逃春秋本其禍之所搆自二子之使夫以二子之力專國擅君而陽虎䏻制之進云則進止云則止猶僕𨽻也方復為之請於霸主之國此其無所忌必為亂之效也子惡之卒陽虎之盜皆簒君亡國之禍故録之必自其禍之所起矣髙氏曰一卿将命可兼他事豈可毎事一卿乎故累數之見二卿為陽虎所制也嗚呼天子㣲諸侯僭諸侯㣲大夫凌大夫微陪臣脅理勢然爾秋晉定人執宋景行人樂祁犂杜氏曰稱行人非其罪稱人以執非伯討也公羊僖四祁犂聘于晉左傳樂祁言於景公曰諸侯唯我事晉今使不往晉其憾矣樂祁告其宰陳寅寅曰必使子往子立後而行吾室亦不亡唯君亦以我為知難而行也見溷而行主趙簡子飲於鴆反酒焉獻楊楯食允反干櫓也以楊木為之六十范趙方惡如字又烏路反其宰曰昔吾主范氏今子主趙氏是賈音古禍也范獻子果怒言於晉侯曰以君命越疆未致使疏吏反而私飲酒不敬二君不可不討也乃執樂祁並據左傳執非無名何以非伯討也使范趙方睦皆有獻焉則弗執之矣執異國行人出於列卿私意威福之柄移矣三家分晉而靖公廢為家人周安王二十六年索隠曰家人居家之人無官職也豈一朝一夕之故哉張氏曰諸侯唯宋事晉懼討而遣使善逆以懐之猶懼不来而大夫黷貨賄争權利卒使来者見執叛者得志晉之亂政亟行霸統所由絶也冬城中城杜氏曰公為晉侵鄭故懼而城之穀梁傳城中城者三家張也或曰非外民也髙氏曰三家張公之所有中城而已成九年城之矣此復城者外有齊鄭之怨故懼而城焉愚按是時政在三家公室無民定公豈䏻役衆修城以備外患哉葢陽虎欲去三家故託於懼齊鄭而城中城將挾公以自固耳季孫斯仲孫忌帥師圍鄆杜氏曰鄆貳於齊故圍之何忌不言何闕文髙氏曰鄆自昭二十五年齊侯取之以居昭公三十年鄆潰遂貳於齊至是二卿圍而欲復取之葢陽虎欲傾季氏以謀政也季仲圍而曰陽虎者虎專季氏季氏專魯也仲何為哉家氏曰齊之取鄆固非而二子之圍亦非也為定公者當以善辭告之齊曰我先君失守宗祧君取鄆以居之魯國實受君賜今鄆潰矣寡人欲復舊疆敢以請之執事以景公之賢必将歸之不應遽用師也明年國夏伐西鄙自是連嵗交兵葢始於此役也劉氏曰公羊云仲孫忌譏二名意謂二名難諱也古者君之名臣不諱父之名子不諱至周臣諱君名子諱父名然猶諱其死不諱其生諱其同不諱其嫌二名則不偏諱也仲尼不偏諱二名況其他乎戊敬王十戍七年七年晉定九齊景四十五衛靈三十二蔡昭十六鄭獻十一曹靖三陳懐三杞僖三宋景十四秦哀三十四楚昭十三吴闔廬十二春王正月夏四月秋齊侯景鄭伯獻盟于鹹諸侯始復特盟左傳齊鄭盟于鹹徴㑹于衛杜氏曰鹹衛地襄陵許氏曰齊鄭之盟叛晉也霸道隳諸侯散離盟始復志此葢自是中國無殷㑹矣陳氏曰特相盟自齊桓以来未之有也於是再見諸侯無主盟矣是故石門志諸侯之合也于鹹志諸侯之散也家氏曰于鹹于沙齊景圖霸之始事也是時天王辟儋翩之難出居姑蕕景公不䏻伸勤王之義乃今日求之鄭盟于鹹明日求之衛盟于沙皆强人之從我非心悦而誠服豈䏻小大翕然不期而俱至乎齊景人執衛靈行人北宫結以侵衛左傳衛侯欲叛晉諸大夫不可使北宫結如齊而私於齊侯曰執結以侵我齊侯從之杜氏曰稱行人非使人之罪劉氏曰善為國者親近而逺信之附内而外歸之衛侯欺其羣臣以給晉殘其百姓以奉齊齊之執結也固非霸討矣而衛之無良又甚焉從此觀之孟子曰今之諸侯五霸之罪人也不亦信乎愚按齊侯稱人而又書侵所以重貶之也挾詐恃力夫豈圖霸之道乎書執結以侵衛與楚成執宋公以伐宋書法正同聖人之意見矣劉氏曰穀梁云以重辭也衛人重北宫結非也執其使伐其國文加以乃其理然豈為重乎齊侯景衛侯靈盟于沙公作沙澤左傳乃盟于瑣杜氏曰結叛晉也瑣即沙陽平元城縣東南有沙亭張氏曰元城縣今屬大名府襄陵許氏曰齊衛之盟叛晉也晉定之季鄭獻衛靈叛而從齊齊可以霸而景不足望也臨川吳氏曰執其行人而與其君結盟以叛晉齊衛之罪均也髙氏曰執其使侵其國以求盟焉是刼盟也何有於信哉大雩齊景國夏帥師伐我西鄙左傳齊國夏伐我陽虎御季桓子公斂處父御孟懿子将宵軍齊師齊師聞之堕伏而待之處父曰虎不圗禍而必死苫夷曰虎陷二子於難不待有司余必殺女虎懼乃還不敗高氏曰齊叛晉與鄭盟故為鄭伐我且報二卿之圍鄆襄陵許氏曰東夏諸侯唯魯事晉故齊伐之景公乘晉之衰不思惟徳之務以懐諸侯而欲力征􅀴營以定霸統是知時之或可而不知己之不可者也家氏曰昭公流離顛沛惟齊景是依如是五六年卒不䏻為之出偏師向魯鄙問意如之罪今乃興無名之師而加于魯當為而不為與不必伐而伐失其所以為方伯之道矣春秋繼鹹沙二盟而書國夏伐我皆貶也九月大雩薛氏曰一秋而兩大雩僭瀆之甚也愚按左氏以再雩為旱甚􅀴書雩祭二十有一惟昭二十五年及此年書再雩災之甚而變之大者也昭公不克自省而有陽州之孫定公又不知儆而有寳玉之竊世卿之逆陪臣之横其致一也故比事書之以為後鑒冬十月已敬王十亥八年八年晉定十齊景四十六衛靈三十三蔡昭十七鄭獻十二曹靖四卒陳懐四卒杞僖四宋景十五蔡哀三十五楚昭十四吳闔廬十三春王正月公侵齊景左傳門于陽州杜氏曰報前年伐西鄙高氏曰去年齊伐我西鄙今公復加兵于齊魯政不復在公而三家者實使公欲歸怨於公故也張氏曰陽虎用事無軍政用兵無法故以侵書之公至自侵齊高氏曰侵齊本出於三家而三家欲歸怨於公故未逾月而致之且為下復侵齊起也二月公侵齊左傳攻廩丘之郛杜氏曰未得志故孫氏曰公再侵齊以重其怨甚矣三月公至自侵齊髙氏曰公逾月之間再出侵齊雖三家者之為然乍往乍来不得休息見公之進退益不自專矣故兩書侵至以見之劉氏曰穀梁云往時致月危致也往月致時危往也往月致月惡之也非也文公十三年冬公如晉十四年正月公至自晉是時公一出而三國附最榮矣何以危致宣公十七年六月同盟于斷道秋公至自㑹是時諸侯恊心而同外楚中國為一無有他變何以危往僖公四年正月侵蔡遂伐楚八月公至自伐楚是時齊桓主諸侯穀梁以為大伐楚何以惡之也曹伯露卒靖公也自聲公立五年其弟通弑之代立是為隠公隠公立四年其弟露又弑之代立凡立四年卒子陽嗣夏齊景國夏帥師伐我西鄙左傳齊國夏高張伐我西鄙髙氏曰以公不與鹹沙之盟且報此春之再侵也昭公之孫也齊雖不克納而有意存之矣定公即位未嘗修好於齊故齊比年伐我而我亦再侵齊觀春秋書齊伐公侵則其曲直可見矣襄陵許氏曰春秋書内伐十六宣以後七内侵七宣以後六伐我二十一宣以後十七侵我五宣以後一用兵則侵多而伐少被兵則伐多而侵少葢魯自中世衰矣而欲與齊搆怨以侵易伐其䏻久乎公㑹晉定師于瓦左傳晉士鞅趙鞅荀寅救我公㑹晉師于瓦范獻子執羔趙簡子中行文子皆執鴈杜氏曰將来救魯公逆㑹之救不書齊師已去瓦衛地東郡燕縣東北有瓦亭張氏曰今滑州白馬縣按左氏晉士鞅荀寅救魯則其書公㑹晉師何也春秋大法雖師次于君而與大夫敵至用大衆則君與大夫皆以師為重而不敢輕也莊八年圍郕愛父請伐齊師公曰不可九年戰乾時公䘮戎路則皆公親帥師而􅀴皆上書師不書公故棐林之㑹宣元不言趙盾而言晉師瓦之㑹言晉師而不書士鞅僖二年里克荀息滅下陽書晉師宣十五年荀林父滅潞亦書晉師於以見音現人臣不可取民有衆專主兵權之意陳氏厚施式智反於齊以移其國昭二十六年晏子曰陳氏取之公也薄其施之民也厚後世若少惰則國其國也已在禮家施不及國季孫盡征於魯以奪其民昭五年三分公室季氏盡征之皆王法所禁也春秋之義行則不得為爾矣陳氏曰不曰㑹士鞅曰㑹晉師重師也鞅之戰公㑹晉師于上鄍不書諱之也四卿並将而以禽鄭自師逆公三家之張成于此矣故諱之也於是齊師伐我晉士鞅趙鞅荀寅救我公㑹晉師勿諱可也劉氏曰晉人興師救魯春秋不以救書何哉夫所謂救者仗大義以拯人之急者也魯昭栖遲乾侯之境困亦甚矣晉之諸卿惟賄是徇黨臣而抑君今齊師之来初非危急之㑹而晉三卿亟以兵赴之此與齊争霸而非為魯國宗社計也故春秋不與之以救公至自瓦髙氏曰不以㑹至者公非出㑹也愚按此亦特相㑹往來稱地之例秋七月戊辰陳侯柳卒懐公也在位四年子越嗣是為湣公晉定士鞅帥師侵鄭獻遂侵衛靈士公作趙左傳初晉師将盟衛侯於鄟澤趙簡子曰羣臣誰敢盟衛君者渉佗成何曰我䏻盟之衛人請執牛耳成何曰衛吾温原也焉得視諸侯将歃渉佗捘衛侯之手及捥衛侯怒王孫賈趍進曰盟以信禮也有如衛君其敢不唯禮是事而受此盟也衛侯欲叛晉而患諸大夫王孫賈使次于郊大夫問故公以晉詬語之曰衛叛晉晉五伐我病如何矣皆曰五伐我猶可以䏻戰乃叛晉晉人請改盟弗許晉士鞅㑹成桓公侵鄭圍蟲牢報伊闕也遂侵衛高氏曰鄭伯與齊為鹹之盟衛侯與齊為沙之盟二國皆為齊而叛晉晉以是侵鄭侵衛所以絶齊之與國也晉不聲其罪不䏻取服故兩書侵襄陵許氏曰招擕以禮懐逺以徳鹹沙之盟諸侯已貳晉不思徳禮之是務而欲恃力攘服則失霸何日之有陳氏曰其言遂晉始伐與國也襄之二十三年齊始叛晉取朝歌去年鄭衛迭叛晉於是侵鄭衛又明年及齊平魯亦叛晉矣故悉書之也愚按齊之始伐盟主則書伐衛遂伐晉晉之始討與國則書侵鄭遂侵衛齊書伐而晉書侵於此見晉霸之衰之甚也然成二年楚帥鄭師侵衛不書遂侵我十五年楚子侵鄭不書遂侵衛雖十六年知武子以諸侯之師侵陳遂侵蔡亦不書也必若鄭衛叛晉晉以師兩侵之而後書焉以著諸侯之不復從晉也葬曹靖公九月葬陳懐公杜氏曰三月而葬速季孫斯仲孫何忌帥師侵衛靈左傳師侵衛晉故也高氏曰以其為晉興師故書侵臨川吳氏曰魯於衛無可聲之罪故其師之出為無名愚按成六年蔑僑如侵宋傳云晉命也今斯何忌侵衛傳亦云晉故也二卿並将以虐婚姻之國凌兄弟之邦非出己意而廹於霸國之威故春秋皆書侵以譏之冬衛侯靈鄭伯獻盟于曲濮杜氏曰結叛晉曲濮衛地高氏曰去年公侵鄭今年二卿侵衛皆為晉故而士鞅又自帥師侵之故二君同為此盟以固其謀從祀先公左傳季寤公鉏極公山不狃皆不得志於季氏叔孫輒無寵於叔孫氏叔仲志不得志於魯故五人因陽虎陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏已更孟氏順祀先公而祈焉辛夘禘于僖公公羊傳從祀者何順祀也文公逆祀去者三人定公順祀叛者五人榖梁傳貴復正也杜氏曰從順也先公閔公僖公也将正二公之位次所順非一親盡故通言先公蜀人馮山曰山字允南普州人著春秋通解十二卷昭公至是始得從祀於太廟其說是也季氏逐君而制其生死之命公薨乾侯不得終於正寢既薨七月又不得以時歸葬既葬絶其兆域又不得同於先君杜氏曰溝絶其兆域不使與先君同而在墓道之南至孔子為司冦然後溝而合諸墓左傳定元則其主雖乆未得從昭穆而祔祭宜矣已上並馮氏説及意如已卒陽虎專季氏将殺季孫斯而亂魯國託於正以售承呪反其不正始以昭公之主從祀太廟葢欲著季氏之罪以取媚於國人然其事雖順其情則逆春秋原情制法故不書禘事與日王氏箋義從祀先公大事也不由公命而由陽虎故不書禘又不書日劉氏曰從祀先公正也所以從祀先公則非正矣其非正奈何季氏專魯陽虎専季氏欲去三桓而代之從祀先公以說焉非能正者也從祀為祫邪宜曰大事于太廟為禘邪宜曰禘于太廟為時享耶宜曰有事于某宫所以不正言之者其事可醜出於陽虎故也陽虎将作亂而惡不得民心故於是為小正以售其大不正立小義以遂其大不義從祀先公其事則順矣其情則逆春秋原情情誠善而功惡弗誅也情誠惡而功善弗與也特曰從祀先公於盜竊寳玉大弓之上李氏瑾曰此二事也間無他文同辭而書之見音現事出陽虎而不可詳也其亦深切著明矣薛氏曰從祀者何順祀也魯之祭也躋僖公外昭公從祀之祀始正其禮也髙氏曰從順也不曰順者其事則順其意則非故變其辭曰從也夫魯祀之不順多矣武公煬公在所當祧僖公閔公在所當正昭公則又當祀而不祀者也今但稱先公則盡從典禮不止為一公設也然不舉所祀之名不指所祀之所者非時妄祀其事可醜出於陽虎之矯舉故雖禮之復正者而聖人實書之在盗竊寳玉大弓之上所以誅陽虎之亂也所謂定哀多微辭者意在言外也嗚呼千載之下姦偽之迹禍亂之蠻彼假託以濟其私者豈特一陽虎而已哉愚按三傳皆以從祔為順祀閔僖二公惟馮氏謂祔祭昭公而文定引其説薛氏高氏兩用之今考之經昭公之葬稱諡疑巳祔祭祖廟而從祀不稱昭公與禘于莊公書法不侔則三傳似亦可通或者謂升閔降僖非當時之急務然陽虎雖祔祭昭公而道南之墓猶待孔子為司寇而合乎先君之兆域則又何也劉原父云陽虎惡季氏以臣而凌君猶僖公以子而先父故先正逆祀以微諭其意其説亦佳姑記以俟來哲盜竊寳玉大弓左傳陽虎将享季氏於蒲圃而殺之戒都車成宰公歛處父告孟孫曰季氏戒都車何故孟孫曰吾弗聞處父曰然則亂也必及於子先備諸陽虎前驅林楚御桓子虞人以鈹盾夾之陽越殿将如蒲圃桓子咋謂林楚曰而先皆季氏之良也爾以是繼之對曰臣聞命後陽貨為政魯國服焉違之徴死死無益於主桓子曰而能以我適孟氏乎孟氏選圉人之壯者三百人以為公期築室於門外林楚怒馬及衢而騁陽越射之不中築者闔門有自門間射陽越殺之陽虎刼公與武叔以伐孟氏公歛處父帥成人自上東門入與陽氏戰於南門之内弗勝又戰于棘下陽氏敗陽虎説甲如公宫取寶玉大弓以出舍於五父之衢寝而為食其徒曰追其將至虎曰魯人聞余出喜於徴死何暇追余從者曰嘻速駕公歛陽在公歛陽請追之虎入于讙陽關以叛公羊傳盜者孰謂謂陽虎也陽虎者季氏之宰也季氏之宰則微者也惡乎得國寳而竊之陽虎專季氏季氏專魯國寳者何璋判白弓繡質龜青純穀梁傳寳玉者封圭也大弓者武王之戎弓也周公受賜藏之魯非其所取而取之謂之盜杜氏曰盜謂陽虎也家臣賤名氏不見故曰盜孫氏曰盜微賤之稱寳玉大弓國之重器也國之重器而盜得竊之則定公為國可知也常山劉氏曰寳玉大弓天子所錫先君之分器藏之於國子孫世世保之不可失墜而為盜所竊國慢無政可知矣故書竊以志不恭之大也蘓氏曰陽虎将殺季孫斯不勝而出取寳玉大弓于公宫以行其稱盗陪臣也寳玉大弓魯之分器也是時陽虎以鄆讙龜隂叛奔齊十年侯犯以郈叛及昭十二年南蒯以費叛皆以賤不書其書竊寶玉大弓何也分器重于地也分器重于地者賤貨而貴命也通㫖先王分器不能謹守而盗得竊諸公宫此無政之騐也故失地則諱失寳玉大弓則書失之書得之書重其事也陳氏曰虎陪臣也取周公之分器以出曽莫之禁書曰盗竊寳玉大弓魯無人之辭也是故陪臣皆不書書陽虎為盜是治陪臣也夫子之作春秋治至于陪臣斯極矣傳見明年愚按何休謂季氏逐昭公取寳玉藏于其家陽虎拘季孫奪其寳玉然昭公之經不書失寳玉而此書盜竊則陽虎竊取于公宫而非取之于季氏也庚敬王十子九年九年晉定十一齊景四十七衛靈三十四蔡昭十八鄭獻十三卒曹伯陽元年陳閔公越元年杞僖五宋景十六秦哀三十六卒楚昭十五吳闔廬十四春王正月夏四月戊申鄭伯蠆卒蠆敕邁反公作蠆獻公也在位十三年子勝嗣是為聲公得寳玉大弓左傳陽虎歸寳玉大弓六月伐陽關陽虎使焚萊門師驚犯之而出奔齊請師以伐魯曰三加必取之齊侯将許之鮑文子諌曰夫陽虎有寵于季氏将殺季孫以不利魯國而求容焉魯免其疾而君又収之無乃害乎齊侯執陽虎囚諸西鄙而逃追而得之又逃奔宋遂奔晉適趙氏仲尼曰趙氏其世有亂乎公羊傳何以書國寳也䘮之書得之書榖梁傳寳玉大弓在家則羞不目羞也惡得之得之堤下或曰陽虎以解衆也榖梁曰寳玉封圭大弓武王之戎弓也范氏曰封圭始封之圭戎弓武王征伐之弓周公受賜藏之魯或曰夏后氏之璜音黄封父之繁扶元反弱也據左傳定四年祝鮀云云杜氏曰璜美玉名封父古諸侯繁弱大弓名子孫世守㒺敢失墜以昭先祖之徳存肅敬之心耳古者告終易代𢎞璧琬焚阮反琰以冉反天球夷玉兊之戈和之弓垂之竹矢見書顧命蔡氏曰皆先王所寳器物𢎞璧大璧也琬琰琬名球鳴球也夷常也兊和皆古之巧工垂舜時共工制作精巧中法度故厯代寳傳之莫不陳列非直為美觀也先王所寳傳及其身能全而歸之則可以免矣魯失其政陪臣擅權陪重也大夫為諸侯之臣家臣又為大夫之臣故曰陪臣雖先公分扶問反器猶不能守而盜得竊諸公宫其能國乎故失之書得之書所以譏公與執政之臣見音現不恭之大也陸氏曰國之重器而為家臣所竊所以譏公而罪執政之臣也此義行則有天下國家者各知所守之職不敢忽矣蜀杜氏曰魯不能保守國器以致失今得而復書之不正其得之於盗也直書曰得以明其失而復得也孫氏日不曰盜歸寳玉大弓者盗微者不可再見趙氏曰左氏凡獲器用曰得得用焉曰獲按得者對失也器用皆合言得則宋大鼎何不言得乎榖梁不地羞也按縁未出境而得故但以得為名且書竊猶不羞書地有何羞乎鄱陽萬氏曰寳玉大弓三傳之説不同然聖􅀴之大法不在乎是所以謹其盗竊與得之而已夫先王分寳玉於伯叔之國宜世守勿失而定公見竊于陪臣迨夫陽虎以為無益于近用祗以為名而自歸之魯有四封而詰其盗不得其盗以正國之典刑僅得寳玉大弓政刑之失一至于此豈不重可憐耶噫納莒僕之寳玉曷若不失此分器之寳玉反楚靈之大屈曷若不失此分物之大弓始也貪人之所有今不能保已之所有故春秋譏之愚按杜預謂國之分器得之足以為榮故重而書之按失之固足以為辱然得之于盗不能討其罪未足為榮適足以彰其失之之耻耳六月葬鄭獻公杜氏曰三月而葬速秋齊侯景衛侯靈次於五氏左傳齊侯伐晉夷儀晉車千乘在中牟衛侯将如五氏卜過之龜焦衛侯曰可也衛車當其半寡人當其半敵矣乃過中牟中牟人欲伐之衛禇師圃亡在中牟曰衛雖小其君在焉未可勝也齊師克城而驕其帥又賤遇必敗之不如從齊乃伐齊師敗之齊侯致禚媚杏於衛杜氏曰五氏晉地齊侯在五氏衛侯往助之任氏曰此伐晉也不書伐而書次者晉實大國未敢輕伐始盟于沙中次于五氏又次于垂葭又次于蕖蒢至哀元年而後伐其欲有所逞也久矣愚按杜預云諱伐盟主故不書伐然襄二十三年書齊侯遂伐晉何以不諱乎或謂中國無霸春秋重絶晉故不言伐然文元年書衛人伐晉何以不重絶晉乎秦伯卒哀公也在位三十六年世子早卒孫惠公嗣冬葬秦哀公襄陵許氏曰秦自晉悼以後寖不見於春秋則知秦益退保西戎軍旅禮聘之事不交於中國矣春秋胡傳附録纂疏卷二十七
