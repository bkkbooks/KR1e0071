body:
  text: 春秋胡傳附錄纂疏卷三十元汪克寛撰哀公下甲敬王三寅十三年八年晉定二十五齊悼二衛出六蔡成四鄭聲十四曹陽十五國亡陳閔十五杞僖十九卒宋景三十泰悼五楚恵二呉夫差九春王正月宋公景入曹以曹伯陽歸左傳宋公伐曹将還褚師子肥殿曹人詬之不行師待之公聞之怒命反之遂滅曹執曹伯及司城彊以歸殺之公羊傳曹伯陽何以名絶曷為絶之滅也此滅曹也曷為不言滅滅者亡國之善辭上下之同力也公羊僖五注言滅者臣子與君戮力一心共死之辭也曹伯陽好呼報反田弋鄙人公孫彊獲白鴈獻之且言田弋之說因訪政事大說音恱之有寵使為司城以聴政彊言霸說於曹伯因背音佩晉而奸音干宋宋人伐之晉人不救並據左傳書宋公入曹以曹伯陽歸而削其見滅之實猶虞之亡書晉人執虞公而不言滅也蘇氏曰此滅曹也其不書滅言自滅也猶虞之滅言晉人執虞公而不言滅也春秋輕重之權衡故書法若此有國者妄聴辯言以亂舊政自取滅亡之禍可以鑒矣定四年傳蔡以沈子嘉歸宋以曹伯陽歸皆殺之也而或書或不書其不書者賤而畧之也陳氏曰檜亡東周之始也曹亡春秋之終也夫子之刪詩也繫曹檜於國風之後於檜之卒篇曰思周道也傷天下之無王也於曹之卒篇曰思治也傷天下之無霸也夫子常喟然於此矣於是曹不言滅劉氏曰公羊云不言其滅諱同姓之滅非也當此時魯人自救不暇豈有不救同姓之滅春秋遂責之乎且責魯不救而諱曹之滅縱失宋公之惡苟責無罪之魯甚無理也呉夫差伐我書伐我始此左傳呉為邾故伐我鄫人道之以伐武城克之懿子謂景伯若之何對曰召之而至又何求焉呉師克東陽而進舍于五梧明日舍于蠶室公賓庚公甲叔子與戰于夷獲叔子與析朱鉏獻于王王曰此同車必使能國未可望也明日舍于庚宗遂次于泗上微虎欲宵攻王舍呉子聞之一夕三遷呉人行成将盟景伯曰楚人圍宋易子而食析骸而㸑猶無城下之盟我未及虧而行城下之盟是棄國也呉輕而逺不能久将歸矣請少待之弗從景伯負載造於萊門乃請釋子服何於呉呉人許之以王子姑曹當之而後止呉人盟而還呉為于偽反邾故興師伐魯兵加國都而盟于城下經書伐我不言四鄙及與呉盟者諱之也孫氏曰直曰伐我者兵加于都城也蘇氏曰不言四鄙而直言伐我兵加于國都也於是為城下之盟而還不書諱之也來戰于郎直書不諱桓十盟于城下何諱之深也楚人圍宋易子而食析骸而㸑亦云急矣欲盟城下則曰有以國斃不能從也宣十五晉師從齊齊侯致賂晉人不可國佐對曰子若不許請合如字又音閤餘燼似刃反背音佩城借一敝邑之幸亦云從也遂盟于袁婁而春秋與之成二今魯未及虧不能少待遂有城下之盟是棄國也夫棄國者其能國乎使有華戸化反元國佐之臣則不至此矣故春秋不言四鄙及與呉盟者欲見音現其實而深諱之不言四鄙欲見其實不書盟以深諱之以為後世謀國之士不能以禮義自强偷生惜死至於侵削陵遲而不知恥者之戒也家氏曰呉伐我以救邾而書法無褒辭者春秋之貴救貴義也茅成子之請救于呉也動呉子以利呉子恱於利而動是以率師造于魯之城下不貴魯以存邾遽受盟而返何救之足言其後呉責報於邾者不已執其君而擾亂其國存亡國者顧如是乎愚按哀公即位七年加兵於邾者五而且入其國俘其君自入春秋魯恃强陵弱未有若是之甚也此年書呉伐我比事以觀則魯之受伐葢有由矣前此書侵伐必言四鄙見魯之國都猶足為守也至於是年呉兵直抵魯之城下則魯之四境藩屏蕩然而國不足為國矣哀公之經兩書伐我若曰我能入邾呉能為邾而伐我我能㑹呉伐齊齊能興師而伐我雖據事直書而詳味書法亦有反已自咎之意焉夏齊悼人取讙及闡闡尺善反公作僤後同左傳齊悼公之來也季康子以其妹妻之即位而逆之季魴侯通焉女言其情弗敢與也齊侯怒鮑牧帥師伐我取讙及闡公羊傳外取邑不書此何以書所以賂齊也曷為賂齊為以邾婁子益來也榖梁傳惡内也杜氏曰闡在東平剛縣北張氏曰今宛丘龔蛇縣地愚按在今東昌路丘縣程子曰内失邑不書君辱當諱也不能保其土地民人是不君也已與之彼以非義而受則書取此與濟西田是也魯入邾而以其君來致齊怒呉伐故賂齊以說之孫氏曰邾子益齊甥也故齊取讙闡襄陵許氏曰外取邑不書以即歸我故書之也王氏曰魯以兵召釁固不容無過齊以私憤取非其有故稱人家氏曰公榖以齊為邾故取讙闡左氏則以季姬未歸故齊人來討觀齊之兵端當從二傳非以女故盖齊取二邑要魯以存邾爾唐陳氏曰凡用兵而取先書伐次書取不用兵而取第書取歸邾子隠益于邾左傳齊侯使如呉請師将以伐我乃歸邾子榖梁傳益之名失國也何氏曰書者善魯能悔過歸之張氏曰凡取邑之類少有復歸之者今魯不遂其惡而歸之故以順辭言之也秋七月冬十有二月癸亥杞伯過卒過音戈僖公也在位十九年子維嗣是為閔公齊悼人歸讙及闡左傳秋及齊平臧賓如如齊涖盟齊閭丘明來涖盟且逆季姬以歸十二月齊人歸讙及闡季姬嬖故也程子傳不云我田既歸邾子亦歸其田非以為恵也按左氏邾子益齊出也見十年魯以益來則齊人取讙及闡又如呉請師而怒猶未怠也以此見國君之造在早反惡不悛音銓則四鄰謀取其國家莫能保矣歸邾子益于邾則齊人歸讙及闡又辭師于呉而徳猶未泯也以此見國君去起吕反下同惡而不積則四鄰不侵其封境而自安矣曰以曰取者逆詞也榖梁以者不以者也趙氏曰取者收奪之名曰歸者順詞也去逆效順息爭休兵齊無取地之罪魯無失地之辱以此見遷善之優改過之大而春秋不諱入邾以邾子益來者以明歸益于邾之能掩其前惡而美之也何氏曰書歸讙及闡善魯能悔過歸邾婁子益所喪之邑不求自得愚按不言來者齊本取讙闡脅魯歸邾子今既歸邾子則齊遂所欲故歸讙闡非感於義而心恱誠服故不言來歸乙敬王三夘十四年九年晉定二十六齊悼三衛出七蔡成五鄭聲十五陳閔十六杞閔公維元年宋景三十一秦悼六楚恵三呉夫差十春王二月塟杞僖公杜氏曰三月而塟速宋景皇瑗帥師取鄭聲師于雍丘雍於勇反又於用反左傳鄭武子賸之嬖許瑕求邑無以與之請外取許之故圍宋雍丘宋皇瑗圍鄭師每日遷舍壘合鄭師哭子姚救之大敗宋取鄭師于雍丘使有能者無死以郟張與鄭羅歸公羊傳其言取之何易也其易奈何詐之也榖梁傳取易辭也以師而易取鄭病矣杜氏曰左傳例覆而敗之曰取某師謂威力兼備若羅網所掩覆一軍皆見禽雍丘縣屬陳留張氏曰今屬開封愚按今汴梁路封丘縣隠二年傳悉虜而俘之曰取襄陵許氏曰春秋之季日尋干戈詐力相傾竒變滋起於是始志取人之師甚其謫惡其盡也鄭以不義深入敵境而圍其邑此固喪師之道也夏楚恵人伐陳閔左傳陳即呉故也愚按陳之為國屢滅於楚而僅存者也今而從呉亦以楚之屢伐而求以自託焉耳楚不思所以自反而憤陳之背已攻之薦數而不已今年伐陳明年公子結復伐之十三年公子申又伐之陳之困於楚終春秋之世雖其力弗克自振而楚之暴横不道其罪盖不可勝誅矣秋宋公景伐鄭聲杜氏曰報雍丘愚按鄭雖不義宋覆其師而盡取之亦云憯矣而又君親帥師以伐其國明年偏師再伐十二年向巢又伐十三年鄭人復取宋師然則宋鄭之喪師皆其自取之也冬十月丙敬王三辰十五年十年晉定二十七齊悼四卒衛出八蔡成六鄭聲十六陳閔十七杞閔二宋景三十二秦悼七楚恵四呉夫差十一春王二月邾子隠益來奔左傳邾子無道呉子使太宰子餘討之囚諸樓臺栫之以棘使諸大夫奉太子革以為政邾隠公來奔齊甥也故遂奔齊陳氏曰呉人討邾奉太子為政而後奔則其但書奔何以是為自失國也春秋之法苟其道足以失國雖有敵國猶以自致之文書之髙氏曰先為魯所俘而又來奔其不知恥甚矣公㑹呉夫差伐齊三月戊戌齊侯悼陽生卒左傳九年齊侯使辭師于呉呉子曰昔嵗寡人聞命今又革之不知所從将進受命于君冬呉子使來儆師伐齊十年公㑹呉子邾子郯子伐齊南鄙師于鄎齊人弑悼公赴于師呉子三日哭于軍門之外徐承帥舟師将自海入齊齊人敗之呉師乃還按左氏公㑹呉伐齊孫氏曰齊中國呉蠻也㑹呉伐夏其惡可知齊人弑悼公赴于師史齊世家鮑牧與公有郤因呉伐弑公赴于呉春秋不著齊人弑君之罪而以卒書者亦猶鄭伯髠頑弑而書卒之例也聖人於此其所以誅亂賦而存天理之意微矣魯人入邾以其君來罪也齊侯為于偽反下同是取讙及闡如呉請師討之也魯人悔懼歸益于邾是知其罪而能改也齊侯為是歸讙及闡又辭師于呉是變之正也夫變之正者禮義之所在中國之君也呉人欲遂前言而背音佩違正理亂道也齊之臣子不能将順上及其君此天下大變常理之所無也故没其見弑之禍而以卒書其㫖深矣春秋弑君大惡不待貶絶而自見音現也君而見弑豈無不善之積以及其身乎詳見襄十年若夫悼公變而克正則無不善之積矣故以卒書而没其見弑如鄭伯髠頑之例聖人之所以誅亂賊而存天理之意微矣襄陵許氏曰人事之變冇幸不幸而春秋之義裁成天地見正命焉臨川呉氏曰當時以呉師在齊而公卒遂以為弑爾夏宋景人伐鄭聲襄陵許氏曰既取其師伐而又伐惡其修怨不已也晉定趙鞅帥師侵齊簡左傳趙鞅伐齊取犂及轅毁髙堂之郭侵及賴而還髙氏曰齊率諸侯以貳晉可以討矣然趙鞅加兵於有喪之國聖人弗與也故書侵異乎士匄矣臨川呉氏曰呉猶遭齊喪而去之晉乃乗齊喪而伐之曽呉之不若也五月公至自伐齊師氏曰公㑹呉師以伐强國呉人之心不可信而强國之禍不可測其危可知矣髙氏曰齊魯接境而公㑹呉人伐之既聞其喪則遂班師可也所以久而不歸者公之進退制在吳故也葬齊悼公髙氏曰公雖不廢喪紀徃㑹其葬不足以贖過愚按悼公書葬與鄭僖公同不及五月禮略也衛公孟彄自齊歸于衛出張氏曰孟彄蒯聵之黨挾齊歸衛衛人納之世子歸之自也薛伯夷卒夷公作寅以尼反恵公也在位十二年秋葬薛恵公冬楚恵公子結帥師伐陳閔呉夫呉救陳書救止此左傳楚子期伐陳呉延州來季子救陳謂子期曰二君不務徳而力爭諸侯民何罪焉我請退以為子名務徳而安民乃還春秋惡烏故反首亂善解紛自誅亂臣討賊子之外凡書救者未有不善之也啖氏曰救者救其患難凡救患皆為美也救在王室則罪諸侯子突救衛是也莊六救在逺國則罪四鄰晉陽處父救江是也文三救在外國則罪中國楚公子貞救鄭襄十狄救齊僖十八呉救陳是也呉雖蠻夷之國來㑹于戚則進而書人矣襄五使季札聘則又進而書子矣襄二十九救而果善曷為獨以號舉而不進之也其以號舉而不進之者深著楚罪而傷中國之衰也陳者有虞之後嘗為楚滅而僅存耳宣十一年楚縣陳尋復封之昭八年楚滅陳十三年復封陳今又無故興師肆行侵伐而列國諸侯縱其暴横去聲不能修方伯連帥所類反之職而呉能救之故獨以號舉深著楚罪而傷中國之衰也夫子欲撥亂世而反之正乃既不可得庶幾禮失而求之于野也此其書呉救陳之意乎陳氏曰自魯救晉凡救皆不書書鄭救曹則中國無霸諸侯自相救也中國無霸諸侯自相救春秋憫焉而特書之呉救陳諸夏幾於亡矣春秋之所甚懼也張氏曰春秋幸呉之救而不以人與師書之者宣昭二公之時楚主中國楚猶近於中國也故春秋於楚免其夷狄舉號之稱定哀之時呉主中國呉純於夷狄者也故雖冇小善而猶以號舉兹足以觀世變而知春秋之嚴矣劉氏曰左氏云延州來季子推驗其年季子近百嵗矣似異時事傳附著其說耳丁敬王三已十六年十有一年晉定二十八齊簡公壬元年衛出九蔡成七鄭聲十七陳閔十八杞閔三宋景三十三秦悼八楚恵五呉夫差十二春齊簡國書帥師伐我左傳齊為鄎故國書髙無㔻帥師伐我及清季孫謂其宰冉求曰齊師在清必魯故也若之何求曰一子守二子從公禦諸竟季孫曰不能求曰居封疆之間季孫告二子二子不可求曰若不可則君無出一子帥師背城而戰不属者非魯人也魯之羣室衆於齊之兵車一室敵車優矣子何患焉二子之不欲戰也宜政在季氏當子之身齊人伐魯而不能戰子之恥也大不列於諸侯矣季孫使從於朝武叔呼而問戰焉對曰君子有逺慮小人何知懿子強問之對曰小人慮材而言量力而共者也武叔曰是謂我不成丈夫也退而蒐乗孟孺子帥右師冉求帥左師老幼守宫次於雩門之外師及齊師戰于郊齊師自稷曲師不踰溝樊遲曰請三刻而踰之如之衆從之師入齊軍右師奔齊人從之陳瓘陳荘涉泗孟之側後入以為殿師獲甲首八十齊人不能師宵諜曰齊人遁冉有請從之三季孫弗許公為與其嬖僮汪錡乗皆死冉有用矛於齊師故能入其軍諸侯來伐無有不書四鄙者春秋書伐我二十有一唯哀八年呉伐此年齊伐止書伐我餘皆言四鄙今齊師及清涉泗非有城下之盟可諱之辱亦書伐我何也傅說音恱復答也于髙宗曰惟甲冑起戎惟干戈省厥躬見書說命蔡氏曰干戈所以討有罪必嚴於省躬者戒其有所輕動夫省厥躬者自反之謂也自反而縮則為壯自反而不縮則為老師之老壯在曲直左傳宣十二師直為壯曲為老曲直自我而不繫乎人者也邾子齊之甥魯嘗入邾以其君來齊人為于偽反是取讙及闡請師于呉曲在我也及歸邾益而齊人歸讙及闡又辭呉師直在齊矣魯人何名㑹呉伐之也故春秋之記斯師特曰伐我者欲省致師之由而躬自厚也垂訓之義大矣劉氏曰君子之道不貴其勝人而貴自勝也說命曰干戈省厥躬躬為善而外物横逆者有之矣君子拒而弗受也躬為不善而外物横逆者亦有之矣若子受而弗懟也不言鄙者受之也家氏曰伐我云者我自有以致冦垂後王臨難省躬之戒所以譏哀公也愚按髙郵孫氏謂春秋之始内魯而外諸夏故魯為他國所侵伐必曰某鄙哀公之經再書伐我同魯於諸侯竊以為春秋詳内而略外故外之侵伐止書國而魯書四鄙非尊魯而卑諸侯也此書伐我不言地比於兵加國都之例所以貶之也然傳載老幼守宫次於雩門之外師及齊師戰于郊冉求曰一子帥師背城而戰則齊師逼迫於魯之國都矣杜諤曰直曰伐我見其以國言之也然則國書之伐與他伐異矣夏陳閔轅頗出奔鄭轅公作袁頗破多反左傳初轅頗為司徒賦公田以嫁公女有餘以為已大器國人逐之故出襄陵許氏曰春秋書轅頗之奔所以為人臣附上以刻下託公以營私者之戒也家氏曰聚斂媚上者固當有討然國不能自討致衆怒而逐之是衆為政也而可哉五月公㑹呉夫差伐齊簡齊魯交兵止此左傳十年秋呉子使來復儆師十二年為郊戰故公㑹呉子伐齊五月克博至于嬴薛氏曰戰不書伐今書伐何難乎公之㑹呉與齊戰也㑹伐則戰見矣呉自入郢之後因而久不能見公之六年稍出而伐陳吾叔還㑹之于相公又㑹之于鄫還而入邾呉以邾故伐我而齊取讙闡由是齊魯始睽齊歸二邑則固知罪矣我不之寘因與呉合前年㑹伐齊故冇國書之報卒㑹呉而勝齊呉之威加中夏多魯之力也春秋書公㑹伐而不言㑹戰難言而有以見之也家氏曰兩年之間書公㑹呉伐齊者再責魯深矣當闔廬之世春秋甞進呉書子自夫差之立迨今十有三年皆以號舉為其用兵不戢而外之也外呉則魯罪著矣永嘉吕氏曰晉既不足以宗諸侯而開門延盜以來被髪文身之呉乃在於周公之子孫秉禮之望國㑹之伐齊而使之逞其志於中國聖人望魯之意至是絶矣甲戌齊國書帥師及呉戰于艾陵齊師敗績獲齊國書左傳中軍從王胥門巢将上軍王子姑曹将下軍展如将右軍齊國書将中軍髙無㔻将上軍宗樓将下軍戰于艾陵展如敗髙子國子敗胥門巢王卒助之大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乗甲首三千以獻于公公使太史固歸國子之元杜氏曰艾陵齊地愚按即艾在今益都路寜海州牟平縣通㫖呉伐齊獲國書晉不主盟制在南蠻聖人傷之也劉氏曰呉之無道犯間上國涉數千里之地以伐人之邦固求棄疾於人與之俱靡焉耳國書之用齊也内不能安其君外不能交鄰國而輕與之戰其不愛百姓也不亦甚乎故善戰者服上刑所謂為志乎此戰者也髙氏曰戰不書公者没公乃所以深貶公也且書及呉我師戰于艾陵不可也書及公呉戰于艾陵不可也先言公㑹呉伐齊繼書反呉戰則公與貶可知矣書獲國書與宋華元同然華元生獲而國書死獲故公使太史固歸國子之元也秋七月辛酉滕子虞母卒隠公也在位六年冬十有二月葬滕隠公衛出世叔齊出奔宋景左傳初疾娶于宋子朝其娣嬖子朝出孔文子使疾出其妻而妻之疾使侍人誘其初妻之娣寘諸犂而為之一宫如二妻文子怒欲攻之仲尼止之遂奪其妻或淫于外州外州人奪之軒以獻恥是二者故出杜氏曰疾即齊髙氏曰春秋書内外大夫奔者凡六十盖君之股肱故重而書之然春秋之末何其出奔之多也是時政在大夫各欲自專始則相猜相忌終乃相攻相逐也戊敬王三年十七年十有二年晉定二十九齊簡二衛出十蔡成八鄭聲十八陳閔十九杞閔四宋景三十四秦悼九楚惠六呉夫差十三春用田賦左傳季孫欲以田賦使冉有訪諸仲尼仲尼曰吾不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私於冉有曰君子之行也度於禮施取其厚事與其中歛從其薄如是則以丘亦足矣若不度於禮而貪冐無厭則雖以田賦将又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉弗聴公羊傳何以書譏何譏爾譏始用田賦也榖梁傳古者公田什一用田賦非正也哀公問於有若曰年饑用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也曰百姓足君孰與不足百姓不足君孰與足古者公田什一助而不稅魯自宣公初稅畆朱子注宣公稅畆什而取二後世遂以為常而不復矣至是二猶不足故又以田賦也夫先王制土籍田以力而砥諸氏反其逺邇見國語注制其肥磽之土以為差等籍田稅也以力者三十受田百畆二十者五十畆砥平也賦里以入而量其有無同上注里廛也謂商賈所居之區域朱子語賦其廛者謂收其市地錢今用田賦軍旅之征何氏曰田謂一井之田賦者歛取其財物也言用田賦者若今漢家歛民錢以田為率矣軍賦十井不過一乗哀公外慕强呉空盡國儲故復用田賦陸氏曰以田多少出軍賦也孫氏曰言用田以為財賦之率通典用田賦如科配稅户出弓弩之類鄱陽萬氏曰周制嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之今哀公以計口率泉為不足於用又計田而使之出泉以為賦非矣田以出粟為主而足食賦以出軍為主而足兵前刑法志稅以足食賦以足兵周制宅不毛者有里布無職事者征夫家漆林之稅二十而五見周禮載師注宅不種桑麻者罰之使出一里二十五家之布民無當産者罰之使出一夫百畆之稅一家力役之征出士徒車輦給繇役愚按漆林之稅十分中稅二分半以其地産漆故重其稅若今之稅茶稅竹木也則弛力薄征當以農民為急而増賦竭作不使末業者獨幸而免也今二猶不足而用田賦是重困農民而削其本何以為國書曰用田賦用者不宜用也范氏曰言用者非所宜用近世議弛商賈音古之征達於時政者欲先省所景反國用首寛農民後及商賈宋鑑慶厯中議弛茶鹽之禁及減商稅范仲淹曰不可茶鹽商稅但分減商賈之利今國用未減既不取之商賈復取之農恐害農也知春秋譏田賦之意矣臨川呉氏曰宣公稅畆首壊井田什一之法則賦民之財也非古矣成公作丘甲則賦民之力者非古矣至哀公用田賦而民財民力竭矣永嘉吕氏曰陳君舉謂以丘賦一乗為未足又以田賦之田賦之者家一人以為兵也然九夫為井六十四井為甸甸出革車一乗則是五百七十六夫而出七十五人也凡受田者皆出一人為兵比古七倍恐加兵不至如是之甚賈逵以為周制十六井賦戎馬一匹牛三頭今使一井之田出十六井之賦是多於常賦十六倍於理亦未宜然愚按杜預范甯皆云丘賦之法因其田財通出馬一匹牛三頭今别其田及家財各出此賦然丘甲之法増三之一今别田及家財各為一賦則是比先王之制而加倍不翅矣亦未可信要之計田而歛取民財以充軍賦之用而其數之多寡則不可考爾孔子云丘亦足矣盖以計丘而出兵車乃賦之常法安可計田而又賦其財哉觀哀公年饑用不足及二吾猶不足如之何其徹也之言則為歛財以足用可知矣夏五月甲辰孟子卒左傳昭夫人孟子卒昭公娶于呉故不書姓死不赴故不稱夫人不反哭故不言葬小君公羊傳孟子者昭公之夫人也其稱孟子何諱娶同姓盖呉女也榖梁傳昭公夫人也不言夫人諱取同姓也孟子呉女昭公之夫人其曰孟子云者諱取音娶後同同姓也啖氏曰同姓不可書曰夫人姬氏薨故曰孟子卒朱子曰諱之使若宋女子姓者然禮取妻不取同姓買妾不知其姓則卜之見曲禮厚男女之别筆列反下同也何氏曰為同宗共祖亂人倫與禽獸無别同姓從宗合族屬異姓主名治際㑹名著而男女有别矣四世而緦音思服之窮也五世而袒免音問殺色界反同姓也六世親屬竭矣其庶姓别於上戚單於下戚親也單盡也昏姻可以通乎綴株衛反記作繫音計之以姓而弗别合記作綴之以食音嗣而弗殊雖百世而昏姻不通周道然也記大傳疏同姓父族也從宗從大小宗也合聚族人使昭穆異列同時食故曰合族屬異姓謂他姓之女來為已姓之妻主為母父之名治昬姻交結㑹合之事名著則男女尊卑異等各有分别不相淫亂四世同承髙祖服緦麻五世共承髙祖之父服袒免而無正服減殺同姓也六世共承髙祖之祖不服袒免同姓而已其庶姓别異於上不共髙祖各為氏族四從兄弟親盡於下别自為宗昬姻可以通乎周法雖庶姓别於上而有世繫連繫之以本姓若姬氏姜氏大宗百世不改連合族人以飲食之禮而不殊異雖相去百世而昬姻不得通昭公不謹於禮欲結好呼報反强呉以去上聲三家之權忍取同姓以混男女之别吕氏曰魯之君豈苟為無禮以亂男女之别哉迫於强呉之威而欲自固其國也徇目前之急忘長久之慮不知以禮自防遂至流於無義無别而不辭也不命於天子以弱其配雜記夫人之不命於天子自昭公始也劉氏曰夫人之必命於天子猶諸侯之必命於天子也桓公不受命終身無王孟子亦不受命死不得稱夫人其義一也不見音現於廟不書於䇿以廢其常據不書逆女不書至典禮之大本喪息浪反矣其失國也宜故陳司敗問昭公知禮乎子曰知禮子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君娶於呉為同姓謂之呉孟子君而知禮孰不知禮巫馬期以告子曰丘也幸苟有過人必知之朱子曰孔子不可自謂諱君之惡又不可以娶同姓為知禮故受以為過而不辭或問昭公娶同姓之事若天王舉法則如何斷曰此非昭公故為之當時呉盛强中國無霸昭公藉其勢不得已而然非貪其色也天王舉法則罪固不免亦須原情自有處置况不曰孟姬而曰孟子昭公亦已自知其非矣書孟子卒雖曰為于偽反君隠而實亦不可揜矣髙氏曰國人不以為非而昭公乃知避其名春秋亦因其實而書之曰孟子卒薛氏曰知其非禮而異其名雖欲盖而名彰也何氏曰不言薨不書葬者深諱之范氏曰葬當書姓諱故亦不書葬臨川呉氏曰固是以同姓而不書夫人薨亦以見魯臣不以夫人之禮喪之也昭公君也尚且逐出之而葬不備禮况於夫人乎一書卒而二義具焉王氏曰是時季氏當國孔子與弔而季孫不絻孔子亦放絰而拜是知當時不以小君待之矣愚按或謂舊史固書夫人孟子薨春秋不書夫人而書卒示天下後世娶同姓之必不可也然小君之薨必書夫人某氏當時既鶻突稱呼曰孟子則國史必不可書夫人孟子薨春秋因舊史之文而非禮之實已見矣按傳襄二十三年晉嫁女於呉則同姓之婚非自昭公始春秋於孟子以隠辭書之所以深責秉禮之魯歟公㑹呉夫差于槖皋槖章夜反又音託左傳㑹于槖皋呉子使太宰嚭請尋盟公不欲使子貢對曰盟所以周信也故心以制之玉帛以奉之言以結之明神以要之寡君以為苟有盟焉弗可改也已若猶可改日盟何益今吾子曰必尋盟若可尋也亦可寒也乃不尋盟杜氏曰橐皋在淮南逡遒縣東南張氏曰呉地逡遒故城在廬州慎縣東南愚按今訛為柘皋属廬州路無為州巢縣家氏曰㑹相㑹鄫㑹橐皋呉皆以號舉夷之也闔廬稱子以其功也夫差稱號以其罪也柏舉有攘夷之功艾陵有内侵之罪此春秋所為進退也王氏曰呉欲尋盟非衛賜之言不可却故曰不有君子其能國乎秋公㑹衛侯出宋景皇瑗于鄖鄖音云公作運左傳呉徴㑹于衛衛侯㑹呉于鄖公及衛侯宋皇瑗盟而卒辭呉盟呉人藩衛侯之舍子貢見大宰嚭語及衛故大宰曰寡君願事衛君衛君之來也緩寡君懼故将止之子貢曰衛君之來必謀於其衆其衆或欲或否是以緩來其欲來者子之黨也其不欲來者子之讎也若執衛君是墮黨而崇讎也夫墮子者得其志矣且合諸侯而執衛若誰敢不懼墮黨崇讎而懼諸侯或者難以霸乎大宰說乃舍衛侯杜氏曰鄖發陽也廣陵海陵縣東南有發繇亭盟不書畏呉竊盟張氏曰鄖呉地海陵今泰州城下愚按今揚州路泰州海陵縣王氏曰初衛人殺呉行人且姚故衛侯畏呉而竊盟魯宋呉怒藩衛侯之舍子貢陳墮黨崇讎之說而衛侯歸然則子貢於父母之邦亦有功矣故孟子曰君子居是邦也其君用之則安富尊榮宋景向巢帥師伐鄭左傳宋鄭之間有隙地焉曰彌作頃丘玉暢嵒戈錫子産與宋人為成曰勿有是及宋平元之族自蕭奔鄭鄭人為之城嵒戈錫宋向巢伐鄭取錫殺元公之孫遂圍嵒鄭罕達救嵒圍宋師冬十有二月螽左傳季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司歴過也杜氏曰周十二月今十月是嵗應置閏而失不置雖書十二月實今九月九月之時尚温故得有螽公羊傳何以書記異也何異爾不時也永嘉吕氏曰左氏以為失閏之故然明年九月螽又十二月螽恐不専為失閏家氏曰十二月螽氣燠也宣十五年冬蝝生與此記同左氏所錄宜非聖人之言也已敬王三未十八年十有三年晉定三十齊簡三衛出十一蔡成九鄭聲十九陳閔二十杞閔五宋景三十五秦悼十楚恵七呉夫差十四春鄭聲罕達帥師取宋景師于嵒左傳宋向魋救其師鄭子賸使徇曰得桓魋者有賞魋也逃歸遂取宋師于嵒獲成讙郜延以六邑為虚公羊傳其言取之何易也其易奈何詐反也榖梁傳取易辭也以師而易取宋病矣孫氏曰報雍丘之師也二國覆師以相償報其惡如此家氏曰春秋書取師誅取者之不仁以多殺為功也先書宋取鄭師責宋也今書鄭取宋師亦責鄭也夏許男成卒成公作戍元公也國滅後楚立之公㑹晉侯定及呉子夫差于黄池書㑹止此左傳公㑹單平公晉定公呉夫差于黄池秋七月辛丒盟呉晉爭先呉人曰於周室我為長晉人曰於姬姓我為伯趙鞅呼司馬寅曰日旰矣大事未成二臣之罪也建鼓整列二臣死之長幼必可知也對曰請姑視之反曰肉食者無墨今呉王有墨國勝乎大子死乎且夷徳輕不忍久請少待之乃先晉人公羊傳呉何以稱子呉主㑹也呉主㑹則曷為先言晉侯不與夷狄之主中國也其言及呉子何㑹兩伯之辭也榖梁傳黄池之㑹呉子進乎哉遂子矣呉夷狄之國也祝髪文身欲因魯之禮因晉之權而請冠端而襲其籍于成周以尊天王呉進矣杜氏曰陳留封丘縣南有黄亭近濟水張氏曰地譜東京開封縣有黄池王氏曰黄池或以為在衛或以為在晉或以為在宋在鄭據杜預所釋陳留封丘縣南地近濟水則在鄭衛之境而晉宋甞有之也愚按今在汴梁路封丘縣黄池衛地其言及者㑹兩伯之詞也趙氏曰經文有及字是兩伯之義分明也故左傳云晉為先歃而外傳呉語中即云呉先歃各自䕶其主了然可見春秋内中國而外四裔呉人主㑹其先晉紀常也春秋四夷雖大皆曰子呉僣王矣其稱子正名也以㑹兩伯之詞而言及者先呉則拂逆也經常也而失序列書則泯實而傳疑何氏曰不與呉以主夏盟又事實當見不可醇奪故張兩伯辭先晉言及呉子使若晉王㑹為伯呉亦主㑹為伯特書曰及順天地之經著盟㑹之實又以見音現呉人之強而抑其横去聲下同也定公以來晉失霸業不主夏盟夫差音扶釵暴横勢傾上國自稱周室於已為長展兩反葢太伯之後以族屬言則伯父也而黃池之㑹聖人書法如此者訓後世治中國御四逺之道也明此義則知漢宣帝待單音嬋于位在諸侯王上蕭傅之議非矣注見隠二年唐髙祖稱臣於突厥倚以為助劉文靖之䇿失矣事要厯突厥值隋末喪亂中國人多歸之髙祖初起太原及竇建徳劉武周李軌雖稱尊號皆稱臣事之唐書突厥傳太宗曰太上皇以百姓故奉突厥詭而臣之朕常痛心范氏曰唐世外蕃之害其原起於太宗脅父臣虜豈有脅父臣虜以得天下而可為者乎何况於以父事之如石晉者五代史唐廢帝討石敬塘敬塘求援於契丹與耶律徳光約為父子將欲保國而免其侵暴得乎或曰苟不為此至於亡國則如之何曰存亡者天也得失者人也不可逆者理也以人勝天則事有在我者矣必若顛倒音到冠屨而得天下其能一朝居乎故春秋撥亂反正之書不可以廢焉者也呉語呉王昬秣馬食士夜中令服兵擐甲陳士卒百人以為徹行萬人以為方陳王中陳而立左右軍亦如之為帶三萬以勢攻昧明王乃秉桴親鼓三軍皆譁晉師大駭命董褐請事呉王曰天子有命周室卑約貢獻莫入晉負衆庶不式諸戎狄楚秦将不長弟以力征一二兄弟之國孤欲守先君之班爵進則不敢退則不可孤之事君不得事君在今日董褐還致命告趙鞅曰呉王之色類有大憂将毒不可與戰主其許之先然不可徒許也鞅令褐復命曰君掩王東海以淫名聞天下則何有於周室夫命圭有命固曰呉伯不曰呉王夫諸侯無二君周室無二王君若無卑天子以干其不祥而曰呉公孤敢不順君命長弟呉王許諾乃退就幕而㑹呉公先歃晉侯亞之襄陵許氏曰左氏曰先晉國語曰先呉此二國史籍之異也顧自宋之盟則晉已為楚所先陵遲至於黄池之時豈能復與呉爭國語信也晉人恥呉先之故諱焉耳孫氏曰黄池之㑹其言公㑹晉侯及呉子者主在呉子也不主晉侯而主呉子者晉侯不能主諸侯故也呉自柏舉之戰勢横中國諸侯小大皆宗于呉晉侯不見者二十四年此不能主諸侯可知也故黄池之㑹呉子主焉不言公㑹呉子晉侯者不與呉得主中國也蜀杜氏曰凡諸侯及公㑹呉必曰公㑹某某㑹呉于某地此㑹公往㑹晉侯呉子耳必先以公㑹晉侯言之復言及呉子者殊呉於晉也髙氏曰首止先及而後㑹所以尊王世子也黄池先㑹而後及所以外呉子也呉泰伯之後與周同姓狂僣大號擾亂中國夫天無二日民無二王今呉為黄池之㑹以主盟中國是二王也将置周王於何地耶聖人自十年呉伐齊之後春不書王以見天下之無王此春秋之所以終也項氏曰中國變而為呉楚始於昭公四年楚子㑹諸侯于申而成於黄池此世道之一大變也申之㑹晉與齊魯皆不與則中國猶未全為夷也至黄池之㑹魯以呉敗齊于艾陵夫差主㑹晉魯以伯禮事之春秋為是爵而不狄及而不殊見呉獨為天下主而中國亡也春秋至是雖欲不終得乎陳氏曰黄池之盟不書呉晉之盟春秋終諱之公㑹晉侯及呉子雖兩伯之辭而終不以呉晉同主盟也單平公不書不忍書也趙氏曰榖梁云呉子進矣按此為呉世為㑹主故不人傳不達此理遂妄為義耳公羊又曰呉在是則天下諸侯莫敢不至按此㑹黄池為魯地故魯獨㑹之若更有諸侯不當不列序愚按辰陵于蜀于申楚雖主盟而晉不與故春秋皆先楚以紀實也于宋于虢楚同主盟且先於晉然晉君猶未同盟故春秋但先晉以正名而不書及焉今黄池之㑹呉子主盟而晉定公以奕世之霸魯哀公以秉禮之望皆俯伏聴命於壇坫之上故春秋先晉以存中國之名而書及以著兩伯之實則内外之分不紊而强弱之勢自見矣春秋於戰紀戰鞌書㑹書及者主客之辨也此黄池之㑹書㑹書及者華夷之辨也又按春秋凡三書呉子葢使札來聘慕中國之義戰柏舉救中國之患皆予之也㑹于黄池恃甲兵之威厭晉侯而長弟春秋抑其强大而止書子貶之也榖梁謂嘉其尊王進而書子使夫差果能尊周則當序單平公於呉晉之上如葵丘宰周公之例矣呉語又謂趙鞅使董褐復命責其僣王而夫差降爵稱公夫以齊桓之盛未能責楚僣王之罪豈以晉之衰弱而反能使呉王黜其僣號乎殆不足信也楚惠公子申帥師伐陳閔髙氏曰楚畏呉之强無如之何故乗呉之出㑹而伐陳也於越句踐入呉夫差左傳六月丙子越子伐呉為二隧疇無餘謳陽自南方先及郊呉太子友王子地王孫彌庸壽於姚自泓上觀之彌庸見姑蔑之旗曰吾父之旗也不可以見讎而弗殺也太子曰戰而不克将亡國請待之彌庸不可属徒五千王子地助之乙酉戰彌庸獲疇無餘地獲謳陽越子至王子地守丙戌復戰大敗呉師獲太子友王孫彌庸夀於姚丁亥入呉呉人告敗于王王惡其聞也自剄七人於幕下冬呉及越平呉自柏舉以來慿陵中國黄池之㑹遂及夏盟可謂强矣而春秋繼書於越入呉所謂因事屬章欲反辭垂戒後世而見音現下同深切著明之義也曽子曰戒之戒之出乎爾者反乎爾見孟子老氏曰佳兵不祥之器其事好呼報反還音旋道徳經偃武篇夫佳兵不祥之器物或惡之非君子所尚不得已而用之儉武篇以道佐人主者不以兵强天下其事好還夫以力服人者人亦以力勝之矣呉甞破越哀元呉入越遂有輕楚之心及其破楚定四呉入郢又有驕齊之志既勝齊師哀十一戰艾陵復扶又反與晉人爭長展兩反自謂莫之敵也而越已入其國都矣呉侵中國而越滅之越又不監而楚滅之楚又不監而秦滅之秦又不監而漢滅之並見邵子皇極經世書老氏曽子其言豈欺也哉春秋初書於越入呉在柏舉之後再書於越入呉在黄池之後皆因事屬辭垂戒後世不待貶絶而見深切著明之義也而可廢乎孫氏曰呉子方㑹越乗其無備而入之也薛氏曰呉子不戒爭中國之諸侯而越卒入呉所謂無逺慮有近憂矣呉子忘不共戴天之恥而求諸侯於外此越之所以霸諸侯乎秋公至自㑹髙氏曰吳子主㑹故書至以危之晉定魏曼多帥師侵衛出魏下公無曼字霸國侵伐止此襄陽許氏曰晉以范中行之難伐衛伐鮮虞間齊之難而一侵之又再侵衛而諸侯卒莫之宗師雖數出能侵而已髙氏曰蒯聵在戚十有二年矣晉人不能以此討衛乃以范中行故而數興師故書侵葬許元公九月螽髙氏曰周之九月夏之七月也其為農災又非冬十二月之比也冬十有一月有星孛于東方孛音佩又音勃公羊傳孛者何彗星也其言于東方何見于旦也何以書記異也杜氏曰平旦衆星皆没而孛乃見故不言所在之次孫氏曰光芒四出曰孛不言所在之次者見于旦可知也何氏曰周十一月夏九月日在房心房心天子明堂布政之庭於此旦見與日爭明者諸侯代主治與法滅絶之象愚按星孛東方乃東方悖亂呉爭强而越滅之之徴也昭十七年傳星孛東方不言宿名者不加宿也是時呉人僣亂慿陵上國日敝於兵暴骨如莽其戾氣所感固将壅呉而降之罰也故氛祲所指在於東方假手越人呉國遂滅盜殺陳閔夏區夫區烏侯反公作彄苦侯反髙氏曰區夫徴舒之後徴舒弑逆楚人殺之而陳人猶使世執國政春秋因其為盜所殺而書之與華孫同意盜殺蔡侯申盜殺陳夏區夫當春秋之季世變之甚至於盜興而專殺國君卿大夫則亂已極矣十有二月螽吕氏曰此年九月螽十二月又螽又比年十二月螽隂陽錯亂甚矣襄陵許氏曰春秋書魯人事至用田賦書魯天災至於二年三螽見其重賦害民傷和致異民力已窮天命已去君子之心於魯已矣庚敬王三申十九年十有四年晉定三十一齊簡四衛出十二蔡成十鄭聲二十陳閔二十一杞閔六宋景三十六秦悼十一楚恵八呉夫差十五春西狩獲麟左傳西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之公羊傳孰狩之薪采之㣲者也曷為以狩言之大之也曷為大之為獲麟大之也麟者仁獸也有王者則至無王者則不至有以告者曰有麕而角者孔子曰孰為來哉孰為來哉反袂拭面涕沾袍曰吾道窮矣春秋何以終乎哀十四年曰備矣君子曷為為春秋撥亂世反之正莫近諸春秋制春秋之義以俟後聖以君子之為亦有樂乎此也榖梁傳狩地不地不狩也非狩而曰狩大獲麟故大其適也杜氏曰大野在魯西故言西狩麟者仁獸王者之嘉瑞也孔氏正義麟麕身牛尾狼額馬蹄有五采腹下黄髙丈二一角而戴肉設武備而不為害含仁懐義音中鐘吕行步中規折旋中矩遊必擇土翔必有處不履生蟲不折生草河出圖洛出書而八卦畫程子曰聖人見河圖洛書而畫八卦簫韶作春秋成而鳳麟至孔氏曰簫韶奏而鳳儀春秋作而麟至事應於證反下同雖殊其理一也易曰乾文言大人者先悉薦反下同天而天弗違後胡豆反下同天而奉天時程子傳聖人先於天而天同之後於天而能順天者合於道而已舜孔子先天者也先天而天弗違志壹之動氣也伏羲氏後天者也後天而奉天時氣壹之動志也朱子語文定借孟子之言形容天地感格之意有見乎此者則曰文成而麟至范氏曰先王之道既𢎞麟感化而來應因事備而終篇故絶筆於斯年陳欽曰麟西方毛蟲金精孔子立言西方兊為口故麟來劉歆曰麟生於火而遊於土春秋禮也修火徳而致其子又曰孔子作書麟為之至四靈王者之瑞故有素王之說鄭衆賈逵服䖍穎容曰自衛反魯修經已成麟感而至取麟為水物北方元枵之獸為修毋致子之應徐彦疏孔子以匹夫制王法是以獲麟無見乎此者以為妖妄而近誣杜氏曰先儒以為制作三年文成致麟既已妖妄又引經至仲尼卒亦又近誣周南闗雎之化王者之風而麟之趾闗雎之應也范氏曰闗雎之化王者之風麟之趾闗助之應也然則斯麟之來歸於王徳春秋之文廣大悉備義始於隠公道終於獲麟楊士勛疏詩終麟趾春秋終獲麟召音邵南鵲巢之徳先公之教而騶虞鵲巢之應也王氏箋義詩稱麟趾騶虞為闗雎鵲巢之應故夫子作春秋遂以獲麟終篇明王道之成乃致天瑞之應愚按麟趾騶虞詩人但嘆美公子公族之仁厚與其仁心徳澤之廣且盛者此借以喻麟讀者不以辭害意可也世衰道微暴行下孟反交作臣弑其君者有之子弑其父者有之夫子為于偽反是作春秋明王道正人倫氣志天人交相感勝之際深矣制作文成而麟至宜矣何氏曰人道浹王道備必止於麟者欲見撥亂功成於麟猶堯舜之隆鳳凰來儀故麟於周為異春秋記以為瑞商王恭黙思道帝賚良弼得於傅巖見書說命周公欲以身代其兄植璧秉珪而武王疾愈啟金縢之䇿天乃反風並見書金縢出罪己之言熒惑退舍吕氏春秋宋景公時熒惑在心子韋曰禍當君可移於宰相公曰宰相所與治國家也曰移於民公曰民死寡人将誰為君曰可移於嵗公曰嵗饑民餓必死誰以我為君乎子韋曰君有至徳之言三天必三賞君熒惑果徙三舍至於勇夫志士精誠所格上致日星之應召物産之祥葢有之矣淮南子虞公與夏戰日欲落公以劒指日日還不落魯陽公與韓構難戰酣日暮援戈而撝之日反三舍戰國策專諸刺僚彗星襲月聶政刺韓傀白虹貫日前黄霸為潁川太守嘉禾生於府後張堪為漁陽太守麥秀兩岐晉孟宗至孝母冬嗜笋宗為入林哀泣笋忽生劉殷曽祖母冬思董殷於澤中慟哭便有堇生王祥性孝母嘗欲生魚時天寒冰結祥解衣将剖冰求之忽氷解雙鯉躍出母又思黄雀忽有雀數十飛入其幕祥以供母况聖人之心感物而動見音現下見之同於行事以遺唯季反天下與來世哉簫韶九奏鳳儀于庭魯史成經麟出於野亦常理爾詩以正情書以制事禮以成行樂以養和易以明變荘子詩以道志書以道事禮以道行樂以道和易以道隂陽春秋以道名分文中子書以辨事詩以正性禮以制行樂以和徳春秋以舉往易以知來垂教亦備矣則曷為作春秋子曰我欲載之空言不如見之於行事之深切著明也知我者其惟春秋乎何以約乎魯史子曰我欲觀夏道是故之杞而不足徴知陵反也我欲觀殷道是故之宋而不足徴也我觀周道幽厲傷之舎魯何適矣見禮運何以始乎隠公三綱淪九法斁音妬天下無復扶又反有王也何以絶筆於獲麟其以天道終乎本文中子宋氏曰易始天道而終人事春秋始人事而終天道二百四十三年災異妖怪無日無之獨麟為瑞亂臣賊子無國無之獨孔子為聖人天道否極則泰人事亂極則治春秋書極亂之事以求治至獲麟而絶筆天人之際於斯見矣聖人之於天道命也有性焉君子不謂命也邵子皇極經世書春秋盡性之書也又曰由性命而發也是故春秋天子之事聖人之用撥亂反正之書考諸三王而不繆音謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑本中庸其於格物修身齊家治國施諸天下無所求而不得亦無所處而不當去聲愚按春秋一經自君臣父子夫婦兄弟以至邦交之常兵交之變人道之始終物異之大小逺而日星細而禽蟲與夫宫室之興革城池之築鑿財用之失得土地之予奪無所不紀學是經者辨其理則可以格物而致其知神其用則可以修身而盡其性推而廣之則可以齊家治國而平天下何莫學夫春秋故君子誠有樂音洛乎此也由仲尼至於孟子百有餘嵗若顔曽則見而知之若孟子則聞而知之由孟子而來至於今千有餘嵗矣其書未亡其出於人心者猶在葢有不得已焉耳則亦有不得已焉耳矣張氏曰麒麟之於走獸猶聖人之於人出類㧞萃為人物之法則者也夫子生於周末而麟見於大野以仁聖之君子天錫仁獸之應乃理之當然韓愈氏曰麟為聖人出也聖人必知麟是以西狩之獲必夫子觀之而知為麟也然氣數之不偶固異於堯舜之盛而王霸之道方窮亦非文王麟趾之時是以麟雖為夫子出然獲於鉏商謂為不祥以賜虞人然後取之其與明王不興而天下不能宗夫子何以異哉程子曰始隠周之衰也終麟感之始也世衰道不行有述作之意舊矣但因麟而發耳麟不出春秋亦必作也春秋之作不過因魯國之史而天地四時之無窮所以察其遷變而紀其差忒者無一畧也中國夷狄之廣莫所以錄其交際而别其典禮者無一遺也故曰言天下之至動而不可亂也言天下之至賾而不可惡也夫子之贊易者即其所以修春秋也以區區一魯國之史而兼紀周齊晉宋諸國之事其尊卑小大統属之序秩然無毫髮之不順盡書治忽失得陵僣亂賊之變森然一循乎條理而無一之非法故曰非聖人誰能修之觀西狩之獲而知天瑞之類應聖人先天後天而天且不違而春秋之終不外乎此也家氏曰杜元凱以為春秋感麟而作胡文定謂春秋成而麟至二義皆通宇宙間惟理與氣而已理行氣從固當有自然之應而况聖心之妙貫乎三極致中和而天地可位萬物可育此作彼應固其理也然以當時之事而觀春秋蓋感麟而作以麟而終也夫子嘗曰鳳鳥不至河不出圖吾已矣夫蓋麟鳳龜龍帝王之瑞夫子抱帝王之道将以大拯於斯世今也轍環天下迄無所遇自衛反魯删詩定書繫易正禮将載其道以垂之後世而麟應適至獲而傷焉夫子知道之終不行然後修春秋以明一王之法春秋天子事也春秋成而聖人不復有用世意矣故春秋之修獨後於五經葢感麟而作以麟而終也趙氏曰公羊云孰獲之薪采者榖梁云引取之也不狩也不言狩人之名故有薪采引取之說不知舉獸獲之義是以爾也榖梁文云不言來不外麟於中國據鴝鵒來巢言之又云不言有不使麟不恒於中國也據􅈮之類言之耳夫謂之獲麟則不得言來以言其有為不使恒有有年豈使不恒有也愚按說左氏者以春秋感麟而作作起獲麟而文止於所起學公榖者以為春秋文成致麟竊疑聖人作經絶筆於獲麟之一句則非經成而麟至矣苟曰經成而後麟至則春秋絶筆於哀十三年十二月螽殊無意義特世儒推尊孔子作經之效至於如是之盛故曰文成致麟耳子程子曰春秋感麟而作然麟不出春秋豈得不作蓋麟為王者之祥獲於鉏商聖人感而作經以垂法於萬世若聖人不得用於時而垂世立教儀範百王也前年星孛東方今年西狩獲麟東主生西主殺而戾氣見於東仁獸獲於西世衰之甚而天變之極也是故亂臣賊子接迹於當世孔子懼作春秋哀王道之不行也春秋成而亂臣賊子懼聖人之道雖不行於當時而大行於後世矣為人君而法乎春秋則可以命徳而討罪躋斯世於至治為人臣而學乎春秋則可以善善而惡惡尊主而庇民其義得行則天理流行人欲壅遏孟子論孔子作春秋之功以為一治豈不信哉春秋胡傳附錄纂疏巻三十
