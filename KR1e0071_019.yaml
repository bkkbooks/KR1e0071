body:
  text: 春秋胡傳附録纂疏卷十七明汪克寬撰宣公中已定王未五年七年晉成五齊惠七衛成三十三蔡文十鄭襄三曹文十六陳靈十二杞桓三十五宋文九秦桓三楚莊十二春衛侯成使孫良夫來盟左傳衛孫桓子來盟始通且謀會晉也榖梁傳來盟前定也不言及者以國與之不言其人亦以國與之不日前定之盟不日來盟為前定者嘗有約言矣未足效信而釋疑又相歃血固結之爾是盟衛欲為去聲晉致魯而魯專事齊初未與晉通也必有疑焉而衛侯任其無咎故遣良夫來為此盟而公卒見辱盟非春秋之所貴義自見音現矣愚按他國大夫來盟皆公與之盟但言來而與公敵禮可知外大夫之伉尊魯君之失列不待貶而自著矣惟屈完來盟于師下書盟于召陵則見完之服義而不敢伉也宣公倚齊篡國晉為盟主缺然修好故與衛結盟而不能逭伯者之討蓋於已有歉而欲藉小信以免辱其足恃乎然魯衛兄弟之國解紛救患迭相為援衛成之執僖公為之納賂於王與晉侯而得免黑壤之止疑亦衛成言於晉而以賂得釋耳夏公㑹齊侯惠伐萊左傳不與謀也凡師出與謀曰及不與謀曰㑹杜氏曰萊國東萊黃縣張氏曰今登州黃縣有萊山愚按今平陽路萊州秋公至自伐萊大旱及者內為志㑹者外為主並榖梁平莒及郯四年公所欲也故書及繼以取向舒亮反即所欲者可知矣伐萊齊志也故書㑹繼以伐致即師行之危亦可知矣愚按春秋以來桓致伐鄭莊致伐衛伐戎黨篡攘夷皆非常也僖致伐楚伐鄭圍許則桓文之大征伐也他侵伐皆不致伐齊取榖以荆楚而治中國僅致焉耳今而伐萊萊微國也特書至者竭志從人而不思力之不足聲罪伐人而不察已之有玷兵出踰時煩民毒衆為宣公危之也前此伐莒後此伐把皆不致聖人蓋有深意矣公與齊侯俱不務德合黨連兵恃強凌弱王氏曰萊東夷小國初無召兵之釁公與齊侯伐之不過凌弱暴寡而已是以為此舉也軍旅之後必有凶年前淮南王安傳安上書曰云云言以其愁苦之氣薄隂陽之和感天地之精而灾氣為之生也老子儉武篇大軍之後必有凶年言民以征役怨咨之氣感動天變而旱乾音干作矣其以大旱書者或不雩或雖雩而不雨也杜氏曰書旱不書雩雩無功或不雩不雩則無恤民憂國之心雩而不雨格天之精意闕矣愚按旱之為言悍也上之人持亢陽之節專一於下則旱灾應之宣公逼戎事齊煩於朝聘兵戎之事故先乎伐萊而螽為灾後乎伐萊而旱為虐猶不知警而重取于民蓋不至於稅畝不已也冬公㑹晉侯成宋公文衛侯成鄭伯襄曹伯文于黑壤左傳鄭及晉平公子宋之謀也故相鄭伯以㑹盟于黑壤王叔桓公臨之以謀不睦晉侯之立也公不朝焉又不使大夫聘晉人止公于㑹盟于黃父公不與盟以賂免故黑壤之盟不書諱之也杜氏曰黑壤晉地一名黃父愚按今在平陽路河中府㑹而不得見不以不得見為諱成十六㑹沙隨晉聽叔孫僑如之譛不見公盟而不與音預下同盟不以不與盟為諱昭十三同盟于平丘晉聽邾莒之訴公不得與盟則曲不在公而主㑹盟者之罪耳與於㑹不與於盟而公有歉苦簟反不足也焉非主㑹盟者之過也則書㑹不書盟若黑壤是也杜氏曰慢盟主以取執止之辱故諱之晉侯之立公既不朝又不使大夫聘而每歲適齊是宣公行有不慊口劫反快也足也於心而非晉人之咎矣凡不直者臣為去聲下同君隱子為父隱於以養臣子愛敬之心而不事盟主又以賂免則不直在已矣愚按文公以不朝晉而見討處父之盟書其事而不書公以諸侯之立當朝王而不當朝晉也其罪未可深責也宣公亦以朝晉而見討黑壤之盟書公而不書其事以連歲朝齊則亦當朝晉其罪實不可逭也是文公之辱其責在晉而宣公之辱宜自責也雖然忽盟主而不事缺於朝聘之禮特小過耳宣公篡立得罪於君父兄大惡也晉人略大惡而問小過蓋當時霸者逞其私欲惟利之求故罪其慢已以取賂而已矣使晉成之討如晉厲之執曹成而歸諸京師則淺正之刑復何逃耶春秋為尊者諱冬㑹而春書至知其故而義自見矣家氏曰晉自新城以來君侈而臣專政亂于內威褻于外霸權盡削諸侯離散楚行師中原而不敢問齊倔强東夏而無所忌成公新立合四國之君以為此㑹鄭舍楚而從晉再㑹于扈諸侯皆㑹庶幾中國之猶有伯也杜氏曰晉靈公之㑹同皆不序自黑壤而下復序諸侯何也垂隴之役初以大夫㑹盟自以大夫㑹盟而後不序諸侯不序諸侯猶責伯者也終靈公之篇則諸侯無貶矣以其不勝貶序之可也自隱而下君恆稱君貶人之故諸侯多貶詞焉自文而下大夫恆稱大夫貶人之故大夫多貶詞焉諸侯不勝貶則政在大夫矣大夫不勝貶則陪臣執國命矣庚定王申六年八年晉成六齊惠八衛成三十四蔡文十一鄭襄四曹文十七陳靈十三杞桓三十六宋文十秦桓四楚莊十三春公至自㑹臨川吳氏曰宣公篡立自疑而不敢㑹晉衛欲為晉致魯故去春使孫良夫來盟而後去冬公與黑壤之㑹縱使無左氏所記止公不得與盟之辱亦必懷疑而可危故此書至而自是不敢如晉矣愚按前此㑹平州不至納賂於齊則無危殆之患此特書至以公見止於晉踰年始返也盟㑹常事不致桓文之盟㑹皆不致也牡丘于淮則桓公之衰新城則晉伯在大夫他未有書至者也宣公致黑壤與斷道前則見討於晉後則與晉謀討齊皆危殆之事也夏六月公子遂如齊惠至黃乃復公羊傳其言至黃乃復何有疾也何言乎有疾乃復譏何譏爾大夫以君命出聞喪徐行而不反榖梁傳乃者亡乎人之辭也杜氏曰黃齊地張氏曰齊竟上地至黃乃復壅君命也高氏曰不稱有疾者不可以疾廢君命也張氏曰罪其違君命也與公孫敖不至而復同有疾亦不復可乎大夫以君命出聞喪徐行而不返未致事而死以尸將事何氏曰聞喪者聞父母之喪徐行者不忍疾行又為君當使人追代之以喪喻疾者喪尚不當反况於疾乎不言有疾者有疾猶不得反也儀禮聘禮篇若有私喪則哭于館衰而居不饔食歸使衆介先衰而從之若賔死未將命則既斂于棺造于朝介將命楚伐吳陳侯使公孫貞子往弔及良而卒將以尸入吳人辭焉上介芋于付反尹蓋曰寡君使蓋備使去聲下同弔君之下吏無祿使人逄天之戚大命隕墜絶世于良廢日供積音漬一日遷次今君命逆使人曰無以尸造去聲于門是我寡君之命委于草莽也無乃不可乎吳人不敢辭見左傳哀十五年君子以為知禮杜氏曰傳言芋氏蓋知禮乃者無其上之詞愚按乃者繼事之辭而有專意士丐之乃還專而合於義者也仲遂之乃復專而不合於義者也其曰復事未畢也陸氏曰榖梁公還者事未畢復者事畢文正倒也當為還者事畢復者事未畢師還公還自晉歸父還自晉土丐聞齊侯卒乃還皆不復更往故曰還事畢也公如晉至河乃復公孫敖如京師不至而復仲遂至黃乃復皆事未畢而復也愚按敖言不至則實未嘗如京師遂言至黃而下書卒則知有疾而返是敖之罪視遂尤重也辛已有事于大廟仲遂卒于垂大音泰公羊傳仲遂者何公子遂也不稱公子為弒子赤貶曷為不於其弒焉貶於文則無罪於子則無年榖梁傳為若反命而後卒也是不卒者也其卒者何也以譏乎宣也聞大夫之喪則去樂卒事杜氏曰有事祭也仲遂卒與祭同日略書有事為繹張本垂齊邑非魯境故書地陳氏曰大夫卒竟內不地竟外地有事言時祭王氏曰當是禴祭不書禴者失不在祭也臨川吳氏曰有事者時享之常禮也先儒謂此為時祫秦溪楊氏云四時禴祠蒸嘗祭羣廟禮煩乃於大祖之廟合高曾祖禰之主共祭之今按禮有一犆一祫之說或分享於五廟或合享於太廟合享則書有事於太廟分享則書四時祭名時享常事不書欲知仲遂以祭之日而卒故書此公子遂也曷為書字生而賜氏俾世其官也曷為書卒以事之變卒之也通旨問仲遂卒何以不書公子曰仲遂本不當書卒以事之變而卒之故不復書公子其曰仲遂以見生而賜之氏也古者諸侯立家桓二師服云云大夫卒而賜氏隱八衆仲云云其後尊禮權臣寵遇貴戚而不由其道於是乎有生而賜氏其在魯則季友仲遂是也襄仲殺惡及視援立宣公而宣公深德之故生而賜氏使世大夫以答之也經於其卒書族以志變法之端為後世戒劉氏曰春秋譏世卿自是世仲氏也陳氏曰大夫卒恆稱名其兼字之何自是仲氏世為卿故譏之也張氏曰仲遂得罪於文公以翬不書卒例之不當書卒因事之變卒之也書仲遂其字也蓋宣公德之與季友之於僖公同有輔立之恩故亦生而賜氏俾世其卿也臨川吳氏曰仲者遂之字卒而以字加于名之上者賜之族而以其字為氏豫命其子孫世世為卿如季友之例也劉氏曰榖梁云其曰仲疏之也非也即春秋欲疏之何不書遂卒若無駭與俠乎且欲疏弒君之臣不書其氏反書其字何也壬午猶繹萬入去籥去起呂反傳及注同左傳襄仲卒而繹非禮也公羊傳繹者何祭之明日也萬者何干舞也籥者何籥舞也其言萬入去籥何弆其有聲者廢其無聲者存其心焉耳知其不可而為之也猶者何通可以已也榖梁傳壬午猶繹猶者可以巳之辭也繹者祭之旦日之享賔也萬入去籥以其為之變譏之也繹者祭之明日以賔尸也孫炎曰尋繹復祭也爾雅繹陳也是陳昨日之禮何氏曰禮繼昨日事但不灌地降神天子諸侯曰繹大夫曰賔尸士曰宴尸天子以卿為尸諸侯以大夫為尸卿大夫以下以孫為尸尸屬昨日配先祖食不忍輒忘故因以復祭殷曰肜周曰繹朱子曰賔尸以賔客之禮燕為尸者猶者可已之詞杜氏曰猶者可止之辭朱子語猶繹是不必繹而猶繹也萬舞也據杜氏注孔氏正義王者以萬人服天下故以萬為名以其無聲也故入而遂用籥管也何氏曰籥所吹以節舞也吹籥而舞文樂之長詩左手執籥注文舞也籥如笛而六孔以其有聲也故去而不作呂氏曰萬舞文武二舞之總名籥舞文舞之别名文舞又謂之羽舞蓋文舞吹籥秉翟羽也萬入去籥者文武二舞俱入於二舞中去羽舞吹籥者是謂故知不可存其邪心而不能格也何氏曰明其心猶存於樂知其不可故去其有聲者而為之張氏曰喜怒哀樂發而中節謂之和仲遂殺嫡宣公以其私於已而愛之生賜之氏今出使擅返不正其罪其喜樂既不以正聞喪當哀又復心知其不可故行吉禮春秋謹書始末以見其心不正而施之宗廟朝廷者謬戾如此詳觀書法見聖人格心之道矣禮大夫卒當祭則不告檀弓衛太史柳莊寢疾公曰若疾革雖當祭必告愚按君在祭不當告故衛獻公越常禮以厚其臣然疏謂祭事雖了與尸為禮未畢耳終事而聞則不繹檀弓仲遂卒猶繹仲尼曰非禮也卿卒不繹杜氏曰魯人知卿佐之喪不宜作樂而不知廢繹故納舞去籥林氏曰按曾子問諸侯祭社稷爼豆既陳聞天子崩后之喪廢則卿喪不廢正祭繹是又祭為輕故當廢之不告者盡肅敬之誠於宗廟不繹者全始終之恩於臣子今仲遂國卿也卒而猶繹則失寵遇大臣之禮矣春秋雖隆君抑臣而體貌有加焉則廉陛益尊而臣節礪說文礪本作厲前賈誼傳人主之尊譬如堂羣臣如陛衆庶如地故陛九級上廉逺地則堂高陛亡級廉近地則堂卑君之寵臣雖有過刑戮之罪不加其身所以體貌大臣而礪其節也注廉側隅也後世法家前藝文志有法家者流蓋申商韓非刑名之學專欲隆君而不得其道至以犬馬國人相視本孟子大倫滅矣聖人書法如此存君臣之義也通旨若專於尊君則視臣如犬馬臣亦視君如冦讎上下俱無恩禮則賢者退處所存者阿諛小人將有以天下奉一人之說矣春秋書仲遂猶繹謂君與卿佐為一體股肱或虧豈不隱痛仁宗以富弼母喪在殯罷春宴韓魏公薨神宗發哀過舉數皆得春秋之法或問去樂卒事是否曰凡享祀宗廟當盡禮卿卒於外而去樂卒事是私家强公室弱也君臣上下才過毫釐即失正以此看春秋於人倫上有無窮妙意石氏曰禮有重輕先後之不同以祭視繹則祭為重而繹為輕以繹視卿佐之喪則繹為輕而卿佐之喪為重有國者當圖其稱也孫氏曰仲遂雖卒猶當追正其罪宣公不能正遂之罪則當為之廢繹何者君臣之恩未絶也高郵孫氏曰仲遂弒君之賊茍以弒逆討之則罪無所逃矣宣公恃之得位既任之為大夫則當盡遇臣之禮卒而猶繹萬入去籥所謂知其不可而為之者也戊子夫人嬴氏薨公榖作熊氏敬嬴文公妾也杜氏曰宣公母何以稱夫人自成風聞季友之繇直救反事友而屬章欲反下同其子左傳閔二及僖公得國立以為夫人於是乎嫡妾亂矣春秋於風氏凡始卒四貶之則禘于太廟僖八秦人歸禭音遂文九榮叔含户暗反賵召音邵伯會葬文五去上聲其姓氏不稱夫人王再書而無天是也敬嬴又嬖私事襄仲而屬宣公不待致于太廟援例以立則從同同而無貶矣高氏曰此文公之妾也何以稱夫人薨援成風之例僣也其意若曰以義起禮為可繼茍出於私情而非義後雖欲正可若何啖氏曰成風之後妾母皆僣用夫人禮故亦書薨以著其非家氏曰哀姜淫亂與慶父同弒二君齊桓討而殺之僖於是尊其母成風為夫人以配其父此僣也然非哀姜不終則僖亦未敢遽如此今敬嬴之事則異於是嬴以嬖妾私事襄仲弒子赤立宣公逐嫡母歸齊而已僣夫人之位出姜無罪為賊臣悖妾所逐不得與哀姜同例嬴與其子弒君逐母僣號夫人亦不得與成風偶使遇齊桓則敬嬴襄仲皆當比而誅戮王室不競中國無伯得以肆行無忌孰知天道禍盈至是八年仲使齊死于路後八日嬴隕于魯與哀姜慶父先後即誅其事相類但有天討人刑之異耳愚按春秋既書夫人姜氏薨于夷又書夫人風氏薨則知哀姜為莊公夫人而成風乃妾也既書夫人姜氏歸于齊又書夫人嬴氏薨則知出姜為文公夫人而敬嬴乃妾也直書于䇿讀者比事以考之雖微傳而嫡妾之分明矣趙氏曰公榖並云熊氏又諡為頃據理頃為惡諡不應公母加惡諡當從左氏為敬嬴晉成師白狄伐秦桓白狄始見經左傳白狄及晉平夏㑹晉伐秦杜氏曰白狄狄别種故西河郡有白狄國張氏曰今丹州延州銀夏之地愚按今屬延安路晉主夏盟糾合諸侯禦外侮安諸夏乃其職矣秦人之怨起自侵崇其曲在晉責已可也既不知自反釋怨修睦以𥙷前過已可咎矣乃復扶又反興師動衆㑹戎狄以伐之獨不惡去聲傷其類乎直書于䇿貶自見音現矣高氏曰殽之役書及姜戎此不言及者以𫝊考之白狄為主也經先晉者所以存伯國之體也以伯國而甘為人所帥晉之恥也家氏曰不書及偶晉於狄亦外晉耳張氏曰白狄秦同壤之國晉與秦自侵崇啓釁七年猶未已與白狄為昏結以伐秦自此至成十三年呂相絶秦之詞皆連兵之事楚莊人滅舒蓼公作舒鄝左傳楚為衆舒叛故伐舒蓼滅之楚子疆之及滑汭盟吳楚而還杜氏曰舒蓼二國名張氏曰地譜上義陽之蓼文五年已滅於楚此即如舒鳩舒庸蓋羣舒别種非二國也愚按今安豐路霍丘縣舊名蓼縣按詩閟宮稱戎狄是膺荆舒是懲在周公所懲者其自相攻滅中國何與音預焉然春秋書而不削者是時楚人疆舒蓼及滑汭盟吳越勢益强大將為中國憂而民有𬒳皮寄反髮左祍而審反之患矣經斯世者當以為懼有攘却之謀而不可忽則聖人之意也愚按春秋未有二國連書者雖外域之國尚書甲氏及留吁舒蓼不言及實一國耳秋七月甲子日有食之既通旨先是中華大國齊晉皆亂楚莊始强肆行侵伐觀兵周室鄭伯肉袒北敗晉師流血色水圍宋九月析骸易子此食既之應而五行志以為楚鄭分也冬十月己丑葬我小君敬嬴敬嬴公榖作頃熊成風薨以夫人葬以小君將祔音附于廟而始有二夫人也則四貶之以正其事今敬嬴亦薨以夫人葬以小君使祔于廟無貶以正之從同同可也范氏曰宣公立妾母為夫人君以夫人禮卒葬也故主書者不得不以為夫人義與成風同而於宣公元年即以所逆穆姜婦之何也曰婦有姑之詞見音現敬嬴遂以子貴援例而亟立為夫人也僖公享國八年然後致成風而敬嬴之亟也雖云援例魯君臣之責亦可知矣無貶而書法若此者猶桓宣弒君而書即位爾臨川吳氏曰僖宣襄昭四妾母羣臣皆逢君之意而尊為夫人也趙氏曰二傳作頃熊頃惡諡也宣公必不以惡諡加其母誤也雨不克葬庚寅日中而克葬公羊傳頃熊者何宣公之母也而者何難也乃者何難也曷為或言而或言乃乃難乎而也榖梁傳葬既有日不為雨止禮也雨不克葬喪不以制也而緩辭也足乎日之辭也敬嬴以其子宣公屬章欲反諸襄仲殺太子及其母弟雖假手於仲實敬嬴之謀也經書子赤卒夫人姜氏歸于齊文十八其文無貶而讀者有傷切之意焉則以秉彞不可滅也傳去聲謂哭而過平聲市市人皆哭敬嬴逆天理拂人心之狀慘矣其於終事雨不克葬著咎徴知陵反焉襄陵許氏曰子惡之弒謀自敬嬴故春秋因其雨不克葬著咎徴焉君子於是乎知有天道王氏曰春秋內葬十有九唯敬嬴定公二喪遇雨定公得國於逐君之賊敬嬴殺嫡立庶故於終事皆遭隂譴而謂無天道乎此皆直書以見音現下同人心與天理之不可誣者也夫喪事即逺有進無退浴于中霤力救反見坊記飯扶晚反于牖下小斂力驗反于戶內大斂于阼階殯于客位遷于廟祖于庭祖始行也塴浦鄧反下棺也于墓見檀弓以弔賔則其退有節坊記賔禮每進以讓喪禮每加以逺檀弓君於大夫將葬弔於宮及出命引之三步則止如是者三居退朝亦如之哀次亦如之以虞事則其祭有時檀弓葬日中而虞不為去聲雨止禮也王制庶人縣封葬不為雨止雨不克葬喪不以制也范氏曰禮先遷柩於廟其明昧爽而引既及葬日之晨則祖行遣奠之禮設矣故雖雨猶終事不敢停柩久次或曰卜葬先逺日所以避不懷也左傳孔氏正義凡卜筮日旬之外曰逺某日喪事則先卜下旬避不思念其親諸侯相朝與旅見天子入門而雨霑服失容則廢見曽子問矧送終大事人情所不忍遽者反可冒雨不待成禮而葬乎見劉氏權衡潦車載簑笠見儀禮既夕禮篇潦車作藁車士喪禮也有國家者乃不能為雨備何也范氏曰士喪禮有潦車載簑笠則人君之張設固宜兼備陸氏曰國君不當無雨備且公庭之於墓次其禮意固不同矣不得不可以為恱無財不可以為恱得之為有財古之人皆用焉本孟子朱子注不得謂法制所不當得得之為有財言得之而又為有財也而不能為之備是儉其親也不亦薄乎故榖梁子曰雨不克葬喪不以制也厚葬古人之所戒而墨之治喪也以薄見孟子又君子之所不與故喪事以制春秋之㫖也孫氏曰雨不克葬譏無備也葬既有日不為雨止己丑之日喪既行而遇雨也且雨之遲久不可得而知或浹旬彌月其可停柩路次不行乎高郵孫氏曰孔子葬母雨壞其墓門人修之孔子不樂老聃助葬日食而止既明而後行蓋雨則常有可以前備而日食非常不可預知也春秋書雨不克葬蓋譏之也愚按禮記孔氏正義云在廟未發之時庶人及卿大夫亦得為雨止若其已發在路及葬則不為雨止其人君在廟及在路及葬皆為雨止今考此年上書葬我小君敬嬴而下書雨不克葬則及葬而雨也茍在廟未發則當云庚寅葬而不云己丑葬矣季文子適晉而求遭喪之禮以行宣公曷乃不豫備遇雨之具乎然潦車載蓑笠縣封葬不為雨止皆士庶人之制而非國君之制榖梁譏不克葬而左氏以為得禮近世名儒亦有講於此者有謂雨而無害於力役者雖葬可也其或天變駭異雨甚水至不可以即土汲汲焉葬反為不可追之悔則左氏之說亦未為失然權二者之宜在乎孝子慈孫之誠敬何如耳春秋之書將以垂法於後國君之葬宜無所不備以雨故不克葬明日乃克葬謂之無貶不可也城平陽左傳書時也杜氏曰泰山平陽縣張氏曰今襲慶府鄒縣有南平陽城愚按鄒縣今屬益都路滕州高氏曰懼晉故也方舉大喪又城平陽重困民力也家氏曰左氏言水昏正而栽周正十月乃今之八月水星不應昏正此謂書時非也楚莊師伐陳靈左傳陳及晉平楚師伐陳取成而還高氏曰陳以晉衛見侵復棄楚而從晉故楚以為討然晉不能救陳人遂復即楚愚按書師書伐所以著夷狄之强而傷中國霸者之不振也辛定王酉七年九年晉成七卒齊惠九衛成三十五卒蔡文十二鄭襄五曹文十八陳靈十四杞桓三十七宋文十一秦桓五楚莊十四春王正月公如齊惠范氏曰有母之喪而行朝㑹非禮孫氏曰公有母喪而逺朝彊齊無哀甚矣公至自齊夏仲孫蔑如京師定左傳王使來徴聘夏孟獻子聘于周王以為有禮厚賄之以淺言之屬章欲反辭比毗志反事春秋教也本經解孔氏正義屬合也比近也春秋聚合㑹同之辭是屬辭比次褒貶之事是比事也當歲首月公朝于齊夏使大夫聘于京師此皆比事可考不待貶絶而惡自見音現者也高氏曰傳言王使徴聘信斯言也益見王室之微矣宣公享國九年於周才一往聘其在齊則又再朝矣經於如齊每行必致深罪之也四年至此三如齊皆書至蜀杜氏曰未踰時而書至危之也下逮戰國周衰甚矣齊威王往朝于周而天下皆賢之史烈王六年齊威王來朝是時周室微弱諸侯莫朝而齊獨朝之天下以此益賢威王况春秋時乎而宣公不能也故聘覲之禮廢則君臣之位失諸侯之行去聲惡而倍與背同畔與叛同侵陵之敗起矣經解朝覲之禮所以明君臣之義也聘問之禮所以聽諸侯相尊法也云云此經書君如齊臣如周之意而特書王正月以表之也愚按前此五年如齊止書春後此十年如齊亦止書春惟此年如齊書王正月蓋所以著君朝于鄰國臣聘于京師其所厚者薄而其所薄者厚不知大一統之義亦猶襄二十九年書公在楚係之春王正月而上書天王崩楚子卒下書五月公至自楚所以著其不奔天王之喪而朝于强夷俾俟送葬而後歸其於大一統之義何如也或謂僖公十年十五年如齊襄公八年二十一年如晉皆書春王正月豈有他義乎吁是不然僖襄如齊晉而王室無嘉好喪葬之事則王正月之書乃常例也其與公如齊仲孫蔑如京師天王崩而公在楚者異矣齊侯惠伐萊襄陵許氏曰赤狄比侵齊不敢報萊不伐齊而齊亟伐之可以觀惠公畏彊凌弱矣秋取根牟杜氏曰根牟東夷國也琅邪陽都縣東根牟鄉張氏曰今屬密州安丘縣陳氏曰此年取根牟成六年取鄟襄十三年盿邿皆微國也愚按今益都路寧海州牟平縣根牟蓋小國內諱滅故書取與鄟邿同昭八年搜于紅自根牟至于商衛即所取根牟地劉氏曰根牟附庸國也左氏曰言易也非也根牟雖小不以兵革不能取也不分别國邑取滅之名而茍記其難易豈春秋意哉公羊曰邾婁之邑不繫邾婁諱亟也妄甚矣八月滕子卒昭公也子文公壽嗣高氏曰自隱七年書滕侯卒至此始書滕子九月晉侯成宋公文衛侯成鄭伯襄曹伯文㑹于扈晉荀林父帥師伐陳靈按左氏討不睦也杜氏曰謀齊陳陳侯不會荀林父以諸侯之師伐陳晉侯卒乃還音旋則知經所書者與晉罪陳之詞也㑹于扈以待陳而陳侯不會然後林父以諸侯之師伐之也則幾於自反而有禮矣不書諸侯之師而曰林父帥師者在㑹諸侯皆以師聽命而林父兼將去聲之也則其衆輯矣晉主夏盟又嘗救陳所宜與也而惟楚之即夫豈義乎愚按黑壤之㑹討魯而宣公以賂免扈之會謀齊陳而二國不㑹蓋晉成為弒君者所立不能致討侵陳之役奄然以元惡主兵是以外不足以却荆楚內不足以服諸侯今此謀齊而篡立之魯宣獨事齊而不會無所忌憚故成公世霸僅能兩會諸侯卒無成功春秋於荀林父之討陳書帥師書伐雖曰與晉而不能芘陳其失亦著矣辛酉晉侯黑臀卒于扈成公也在位七年子獳嗣是為景公榖梁傳其地於外也杜氏曰扈鄭地卒於境外故書地襄七年傳諸侯卒于境內不地愚按諸侯卒於師曰師曹伯盧及負芻是也卒于會曰會杞伯成是也于他國則如許男寧蔡侯東國卒于楚吳子遏卒于巢是也于封內則如鄭伯髠頑卒于鄵宋公佐卒于曲棘是也晉成公不言卒于會蓋會禮已畢故不言㑹爾劉氏曰榖梁云其日未逾竟也非也未踰竟猶在國爾何得書其地然則扈者他國之地名非晉地也冬十月癸酉衛侯鄭卒成公也在位三十五年子速嗣是為穆公晉成公何以不葬魯不㑹也衛成公何以不葬亦魯不㑹也衛成事晉甚謹而魯宣公獨深向齊衛欲為去聲晉致魯故謀黑壤之㑹而特使孫良夫來盟以定之也及會于黑壤而晉人止公賂然後免是以扈之會皆前日諸侯而魯獨不往二國繼以喪赴亦皆不會此所謂無其事而闕其文者也或曰二君皆有貶焉故不書葬何氏曰晉成公不書葬篡也衛成公不書葬殺公子瑕也誤矣魯人不會亦無貶乎書卒而以私怨廢禮忘親其罪已見音現春秋文簡而直視人若日月之無私照也曲生意義失之逺矣臨川吳氏曰春秋刑書也事實辭文善惡畢見聖人何容心哉蓋渾渾如天道焉宋文人圍滕左傳因其喪也圍國非將去聲卑師少所能辦也必動大衆而使大夫為主帥去聲明矣然而稱人是貶之也滕既小國又方有喪所宜矜哀弔恤之不暇而用兵革以圍之比毗志反事以觀知見貶之罪在不仁矣蜀杜氏曰諸侯擅兵圍人之國况又因其喪故從書人之貶家氏曰滕子卒曾未數月宋乘其喪而圍之匪惟乘滕之喪亦乘晉之喪晉政不競諸侯擅相侵伐貶宋亦以譏晉也楚莊子伐鄭襄晉郤缺帥師救鄭自是晉楚交伐鄭左傳楚子為厲之役故伐鄭晉郤缺救鄭鄭伯敗楚師于柳棼國人皆喜唯子良憂曰是國之災也吾死無日矣楚兵加鄭數危角反矣或稱人或稱爵何也鄭自晉成公初立舍上聲楚而從中國正也宣三年傳言晉侯伐鄭鄭及晉平士會入盟楚人為去聲是興師而加鄭不義矣故宣公三年書人書侵罪之也次年鄭公子歸生弒其君諸侯未有聲罪致討者而楚師至焉故特書爵與之也然興師動衆賊則不討惟服鄭之為事則非義舉矣故又次年傳稱楚子伐鄭而經書人再貶之也至是稱爵豈與之乎按公羊例君將去聲不言帥師書其重者也至此書爵見音現其凌暴中華以重兵臨鄭矣何以知其非與之乎曰下書晉郤缺帥師救鄭則知其非與之也凡書救未有不善之也救者善則伐者之罪著矣由此觀春秋書法皆欲治亂賊之黨謹中外之辨以一字為褒貶深切著明矣愚按五年晉苟林父救鄭經不書者以是時鄭方有弒君之亂所當討而不當救故不書救今此書郤缺之救據明年傳載鄭討歸生之罪斫其棺而逐其族蓋此時歸生已斃矣故書救以與晉也陳靈殺其大夫泄冶泄息列反公榖作泄冶音也左傳陳靈公與孔寧儀行父通於夏姬皆𠂻其衵服以戲于朝泄冶諌曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣公告二子二子請殺之公弗禁遂殺泄冶孔子曰民之多辟無自立辟其泄冶之謂乎榖梁傳稱國以殺其大夫殺無罪也泄冶之無罪如何陳靈公通于夏徴舒之家公孫寧儀行父亦通于其家或衣其衣或𠂻其襦以相戲於朝泄冶聞之入諌曰使國人聞之則猶可使仁人聞之則不可君愧於泄冶不能用其言而殺之稱國以殺者君與用事大臣同殺之也莊二十六年𫝊稱國以殺者國君大夫與謀其事與謀其事者用事之大夫也見殺者不得於君之大夫也稱其大夫則不失官守而殺之者有專輒之罪矣泄冶無罪而書名何也冶以諫殺身者也殺諫臣者必有亡國弒君之禍故書其名為徴舒弒君楚子滅陳之端以垂後戒此所謂義係於名而書其名者也比干諫而死子曰商有三仁焉史宋世家王子比干紂親戚也見箕子諫不聽曰君有過而不以死爭則百姓何辜乃直言諫紂紂怒殺比干泄冶諫而死何獨無褒詞夫語默死生當去聲其可而止爾泄冶之盡子忍反言無隱不愧乎史魚之直矣論語子曰直哉史魚邦有道如矢家語史魚驟諫靈公進蘧伯玉退彌子瑕公不從既死猶以尸諌方諸比干自靖自獻于先王見微子之命則未可同日而語也通旨比干在紂之時親則王子位則三公故諫而不從繼之以死泄冶於靈公親非貴戚之卿而位不為上大夫也直諫而死傷於勇矣故書名以示貶春秋書殺大夫不特罪諸侯之專殺見殺者與有貶焉君子危邦不入亂邦不居如宋子哀微見宋亂而去聖人取其見幾所以書字自非有撥亂之全才安可蹈危亂之朝輕生易死而不自愛乎家語子曰比干於紂親則諸父官則少師固必以死爭之泄冶之於靈公位在大夫無骨肉之親懷寵不去仕於亂朝以區區之一身欲正一國之淫昏可謂捐矣冶雖效忠其猶在宋子哀魯叔肸之後乎故仕於昏亂之朝若異姓者如子哀潔身而去可也文十四子哀來奔杜氏曰貴其不食汙君之祿其貴戚耶不食其祿如叔肸善矣十七年叔肸卒榖梁曰宣弒而非之終身不食宣公之食杜氏曰國無道危行言孫冶直諫於淫亂之朝以取死故不為春秋所貴陸氏曰泄治之死春秋責其非輔弼之臣居於淫亂之邦不能去位而行强諫乃是取死之道故君子不貴也稱國以殺者以直諫縱邪臣害之纍上之意可知也劉氏曰泄冶信能諫其君然而非大臣之操也所謂大臣者必潔其身於進退之始不可入焉則止矣今陳侯君臣之淫非一歲之積泄冶猶安其朝至不勝其欲而大亂廢男女之節然後言之則其從君於昏多矣夫謂之從則具臣也居大臣之位而為具臣之操過而見殺未為不幸也且陳侯之淫舉國皆惡之不獨泄冶知之然則非能知君淫之為賢以能止君淫之賢也非能言國亂之為智以能去國亂之為智也張氏曰君子見幾而作不俟終日方靈公君臣驅馳株林之時冶知其不可諫潔身而去可矣至於褻慢朝廷𠂻服而戲則立於其朝者雖欲默而不可得矣失於不能知幾而早辨也木訥趙氏曰薦圭璧於泥塗固已疏矣觸虎狼以取死庸得為智乎愚按泄冶之失在於不能早諫以畜止其君之惡然其捐生盡言未可深責茍皆為避禍之計則忠言不入於耳淫虐之君無所不至其禍尤不可勝言矣文定於徴舒弒君之傳曰忠莫顯於身見殺而其言驗其所以許冶者何如哉壬定王戌八年十年晉景公獳元年齊惠十卒衛穆公速元年蔡文十三鄭襄六曹文十九陳靈十五弒杞桓三十八宋文十二秦桓六楚莊十五春公如齊惠公至是四朝齊公至自齊此亦如齊亦致其至而不書月上九年亦如齊亦致其至而書月者為去聲是年夏使仲孫蔑如京師故特於歲首書王正月以著宣公之罪而君臣名分去聲下同之際謹嚴如此也歸田以為私惠比於君臣名分之際則大小不侔矣齊惠人歸我濟西田左傳齊侯以我服故歸濟西之田程子傳齊魯修好故歸魯田田魯有也齊非義取之故云歸我不足為善也宣公於齊順其所欲既以女妻去聲其臣五年高固逆叔姬又以兵會伐萊之舉又每歲往朝于齊廷雖諸侯事天子無是禮也諸侯事天子比年一小聘三年一大聘五年一朝今宣公自四年至十年七年之間五如齊元年及十年皆一年三遣大夫如齊過於事天子之禮矣故惠公恱其能順事已而以所取濟西田歸之也歸歡及闡直書曰歸趙氏曰歸者來致之辭此獨書我者乃相親愛惠遺去聲之意深著齊人助成弒逆之罪也通㫖問傳曰其言我者深著齊人助成弒逆之罪也夫定辭臣之位而取其賂以其服而復歸之固皆罪矣然其歸也不猶愈於取之乎曷為於取不書我而書於歸也曰天理至公無彼此人欲私熾則有我矣逆已而怒順之則喜慢已則怒下之則喜魯宣之於齊惠蓋能順其所為而致恭以下之也故惠公深喜之而以濟西田歸魯其稱我者乃相親愛惠遺之意魯人復得所賂則心益放惡益遂矣故以為深著助成弒逆之罪其取之也以貪人之貨巳其歸之也以恱人之事已而皆不以道也豈以歸賢於取乎永嘉吕氏曰取不言我者宣公以立之不正而欲賂齊以求㑹故不言我以見內無惜之之意也於其歸也則公比年如齊情好以篤外有朝聘之禮內有婚姻之故魯亦欲得而齊以歸之是以言我以見內有欲之之意也或謂濟西魯之本封故書我趙氏纂例則誤矣以柔巽卑屈事人不以其道而得地與恱人之柔巽卑屈事已不以其道而歸其地皆人欲之私而非義矣高氏曰元年書齊人取濟西田蓋魯以濟西之田賂齊而齊人取之也至是而歸者公比年朝齊齊侯感公朝事之勤因以歸之也夫魯之分地先君受之於天子豈可失墜又况負弒逆之罪賂以免討乎齊人取弒逆之賂以縱惡故其取其歸皆謹書之家氏曰天道十年而一周人事十年則一變桓之篡隱歷十年而無討春秋於是歲始書王以正之今宣之篡亦至此十年天王無討方伯不問齊人忽以賂田來歸蓋以十年之久天理必復齊人知罪之所在而自舉本田以復於魯也愚按齊人歸地者三鄆歡龜陰之田孔子以禮化强暴齊景心服而歸之書曰來歸來歸者美辭也歡及闡以哀公悔過遷善歸邾子益于邾故齊悼歸其二邑故書曰歸歸者順辭也惟此濟西之田宣公踰禮以恱齊齊惠喜於媚已而歸其田於魯一出於相與之私故書歸我我者私已之謂也不惟異於聖人之行王道其比哀公之改過亦不可同日語矣趙氏曰公羊云齊已取之矣言我者未絶於我也其實未之齊也按已取之又言未絶何迂誕之甚榖梁云公娶齊齊由以為兄弟反之不言來公如齊受之也哀八年歸歡及闡豈是公受乎但言歸我則知其來也省文耳夏四月丙辰日有食之何氏曰與八年食既應同事重故纍食己巳齊侯元卒惠公也在位十年子無野嗣是為頃公齊崔氏出奔衛公羊傳崔氏齊大夫也其稱氏何譏世卿世卿非禮也榖梁傳氏者舉族而出之之辭也按左氏崔杼有寵於惠公高國畏其逼也公卒而逐之奔衛書曰崔氏以族奔也范氏曰崔杼以世卿專權齊人惡其族今出奔既不欲其身反又不欲立其宗後故逐其族若舉族盡去之爾許翰以謂崔杼出而能反反而能弒者以其宗强於此舉氏辨之早也其說得矣張氏曰特書其氏見崔杼之宗强於齊故勢足以逼高國今日雖逐之而尚能復歸於齊如崔成之徒後日卒自遺滅宗之禍豈非族大勢張而不知制節謹度卒至凶于家禍于國也歟家氏曰是歲至杼殺君蓋五六十年使杼得年七十此時方在弱冠不應權勢已盛為人所畏疑非杼之身或其父但不可考爾所謂譏世卿者非公羊本㫖蓋門弟子因尹氏武氏稱世卿而附益之於此爾經有事同而詞異亦有事異而詞同一視之則泥去聲而不通矣孫氏曰東遷之後天子諸侯大夫皆世書尹氏譏天子大夫書崔氏譏諸侯大夫高郵孫氏曰自隱至昭二百年而尹氏世執周政故卒有子朝之難而專廢立之權自宣至襄五十餘年崔氏世為齊大夫故卒有弒君之禍也春秋之時尊莫如周强莫如齊而世卿之禍如此尹氏崔氏聖人擇其至强而為害之深者以為戒也愚按崔杼之奔蓋如陳文子之出不久而復返也文定從榖梁謂舉族而出之然杼之宗族强盛所以出而能反反而能弒者由其世為大夫故致是耳僖二十八年傳紀崔夭㑹戰城濮則世襲大夫可知矣且崔氏乃丁公之子孫逮今五百年苟非世大夫曷能長有後於齊國乎劉氏曰左氏云書曰崔氏非其罪也且告以族不以名非也齊雖告以族春秋固當正之若曰崔杼無罪則欒盈亦無罪何以不曰欒氏出奔耶公如齊頃左傳公如齊奔喪杜氏曰公親奔喪非禮也公出朝㑹奔喪會葬皆書如不言其事史之常也五月公至自齊公如齊止此文約而事詳者經也春如齊朝惠公夏如齊奔其喪若是雖不致可也而皆致者甚之也王氏曰禮諸侯卒有服者奔喪無服者㑹葬公之於齊非有服也而親奔其喪諂諛甚矣以諂事齊不問禮之當否有取危之道故春夏兩如皆致之天王之喪不奔欲行郊禮而汲汲於奔齊惠公之喪天王之葬不㑹使微者往而公孫歸父㑹齊惠公之葬其不顧君臣上下尊卑之等所謂肆人欲滅天理而無忌憚者也詞繁而不殺所賣反聖人之情見音現矣薛氏曰行不以禮而源源不巳何公之不憚煩也家氏曰天王之喪魯不奔不賻今也懷輔篡之私恩如齊奔喪事之悖也春而書公如齊公至自齊曽未數月又書公如齊公至自齊備書所以貶也愚按魯君親往奔喪送葬者三春秋於此年書齊侯元卒公如齊公至自齊於成十年書晉侯獳卒公如晉明年三月公至自晉襄二十八年書公如楚楚子昭卒明年正月公在楚五月公至自楚雖不言奔喪送葬而其實瞭然矣春秋歷十有二王惟叔孫得臣叔鞅送襄景之葬公孫敖奔襄王喪而不至晉之不知所尊至於此極他何望焉馴至昭公之弔少姜至河乃復以國君之重奔嬖妾之喪却而不納益可傷矣癸巳陳夏徴舒弒其君靈平國徴知陵反左傳陳靈公與孔寧儀行父飲酒於夏氏公謂行父曰徴舒似女對曰亦似君徵舒病之公出自其廏射而殺之二子奔楚陳靈公之無道也而稱大夫之名氏以弒何也禍莫大於拒諌而殺直臣忠莫顯於身見殺而其言驗泄冶所為不憚斧鉞盡子忍反言於其君者正謂靈公君臣通於夏徴舒之家恐其及禍不忍坐觀故昧死言之靈公不能納又從而殺之卒以見弒而亡其國此萬世之大戒也特書徴舒之名氏以見泄冶忠言之驗靈公見弒之由使有國者必以逺去聲色修身包容狂直開納諫諍為心也家氏曰君無道稱國以弒陳靈朋淫殺諫而弒者以氏名書蓋不著徵舒氏名無以見禍亂之所從生討徵舒亦所以治平國也以為罪不及民故稱大夫以弒者杜氏曰惡不加民故稱臣以弒非經意矣張氏曰古人以禮為防間而人君之尊有妃偶嬪御之侍有居處出入之奉有廉恥羞惡之限所以養其尊貴者至矣何至驅馳於株林以為樂哉泄冶之諫夏南之詩皆以其捨人道而躬為禽獸之行也考之外傳前年單子如楚過陳時泄冶未死也單子歸而告王以陳侯帥其卿佐南冠以淫於夏氏陳侯不有大咎國必亡已見之於三年之前矣能無及乎觀春秋所書弒君如陳平國齊光蔡固以千乘之主而自儕於閭巷小人所不為者心術之惑可不戒哉高氏曰靈公弒而子午嗣是為成公成公不討弒君父之賊則知靈公之惡播於國人而徵舒之罪國人所不憝也愚按禮稱諸侯非問疾弔喪而入諸臣之家是謂君臣為謔注者謂陳靈公數如夏氏以取弒焉夫人君之舉動尚謹於嫌疑之際而不可輕也况可紊男女之别恣鳥獸之行其不為朱溫之萬段者幾希矣六月宋文師伐滕左傳滕人恃晉而不事宋宋師伐滕前圍滕稱人刺與諫同七賜反伐喪也此伐滕稱師譏用衆也宋大國爵上公霸主之餘業力非不足也今鄰有弒逆不能聲罪致討王氏曰宋鮑以篡弒得國視陳鄭逆亂恬不為怪乃用大衆以伐所當矜恤之小邦且滕不事已無乃已德猶有所闕僖十九子魚曰云云而滕何尤焉故特稱師以著其罪而汲汲於誅亂臣討賊子之意見音現矣家氏曰宋鮑間晉之多故而用師於滕圍之未服又從而伐之未必無宋襄執嬰齊之心襄且不能有成而况於鮑乎春秋書之所以貶之也公孫歸父如齊頃葬齊惠公歸父仲遂之子杜氏曰歸父襄仲子貴而有寵宣公深德齊侯之能定其位而又以濟西田歸之也故生則傾身以事之而不辭於屈辱沒則親往奔喪而使貴卿㑹其葬亦不顧天王之禮闕然莫之供也比毗志反事考辭義自見音現矣愚按春秋以卿㑹葬惟襄王景王晉之襄平昭公此年齊惠及宋平滕成八見而已天子之喪動天下屬諸侯遣卿送葬夫亦亡於禮者之禮耳晉之諸君猶曰霸國也齊惠之葬乃宣公所以報私恩而宋平則意如所以厚私姻也若滕則其君屢會葬于魯矣當時諸侯慢於至尊而謹於强大莫不皆然靈王之喪鄭簡公在楚印段實往王吏不討子太叔反以為口實積習所致可勝嘆哉晉景人宋文人衛穆人曹文人伐鄭襄按左氏鄭及楚平諸侯伐鄭取成而還襄陵許氏曰自晉靈以來成景相繼力爭陳鄭而無以服楚其稱人貶也鄭居大國之間從於强令豈其罪乎不能以德鎮撫而用力爭之是謂五十步笑百步庸何愈於楚自是責楚益輕罪在晉矣高氏曰是時陳有弒君之亂曾不是圖而從事於鄭張氏曰舍亂臣賊子之大惡而輕動干戈以討於迫於强令無所適從之小國家氏曰人四國所以人晉也夫躬天下之難而後可以責人之從己未聞躬天下之易而責人以強從也桓文所以得諸侯以其內奬王室外攘荆楚救災恤患汲汲焉躬天下之難諸侯有所恃外夷有所畏是以得成霸業自晉襄沒靈成景皆不克負荷而楚莊日以盛强北向而爭諸侯侵陳侵鄭觀兵周疆將逞其所大欲晉人僅出偏師畏縮不敢犯荆楚之鋒惟伺其去釋憾於小國今又討鄭縱能服之豈保楚之不再出乎夫翦篡鋤凶霸政之最先自趙盾為政宋齊魯皆弒其君盾內有所慊置而不問今郤缺為政又不能治侯國之賊其君者乃率三國爭鄭而以討逆遺楚遂使夷國挾仗義之名以風示天下晉霸自是愈衰矣秋天王定使王季子來聘王聘止此左傳劉康公來報聘公羊傳王季子者何天子之大夫也其稱王季子何貴也其貴奈何母弟也榖梁傳其曰王季王子也其曰子尊之也聘問也公羊傳去聲曰王季子者王之母弟也杜氏曰字季子即康公其後食采於劉王有時聘以結諸侯之好去聲周禮大行人禮也宣公享國至是十年不朝于周而比毗志反年朝齊不奔王喪而奔齊侯喪不遣貴卿會匡王葬而使歸父㑹齊侯之葬縱未舉法勿聘焉猶可也而使王季子來王靈益不震矣自是王聘春秋亦不書矣襄陵許氏曰自是王靈益亡王聘益輕春秋不復録矣陳氏曰自頃王而下王室無聘魯者於是再聘而王季子實來則已尊矣愚按宣公簡慢於王知有齊而不知有周所以君臣朝夕奔走於臨淄之境者其心必曰濟西之田未復不可不曲意事之而不思魯封七百里之地秋毫皆君賜也而拔本塞源其罪應誅定王始則徴聘於魯中則厚賄於仲孫終則命貴弟報聘是猶為人父而不責子之狠傲乃三揖於定省之常禮而德色於借耰之微恩也宣公既不知所當尊而王亦不能自尊矣故來求之書止於文公來聘之書止於宣公錫命之書止於成公非削之而不紀蓋王命不足為輕重而王亦不復遣使於諸侯耳寥寥百有餘年而桓尚以歸賑録自是天王之名號不見於經矣公孫歸父帥師伐邾定取繹繹公作蘱杜氏曰繹邾邑魯國鄒縣北有繹山張氏曰詩保有鳬繹邾文公卜遷于繹皆此山之地今在襲慶府鄒縣為邾魯二國之境愚按鄒縣今屬益都路用貴卿為主將去聲舉大衆出征伐不施於亂臣賊子奉天討罪而陵弱侵小近在邦域之中附庸之國是為盜也孟子曰非其有而取之者盜也當此時陳有弒君之亂既來赴告藏在諸侯之䇿矣見左傳文十五襄二十曽不是圖而有事於邾不亦傎音顛乎故四國伐鄭貶而稱人魯人伐邾特書取繹以罪之也高氏曰自文公時邾魯有隙宣公篡立而邾子首朝之自是絶迹魯庭者又十年故歸父伐之家氏曰滕何負於宋而宋伐之邾何負於魯而魯侵之皆由中國無盟主强陵弱衆暴寡而莫之或禁也愚按無瑕者始可以討人宣公篡立惴惴然自保惟恐諸侯之動干戈而問子赤之故也其不能討陳宜矣而猶稱兵於邾以奪其地者蓋以晉伯之不振而强齊為之援故耳不幾碩鼠欺人之不見而竊食於盆盎之間乎下書歸父為邾故如齊則魯之為魯可知矣大水張氏曰隂盛陽微之徵家氏曰宣即位以來六年螽七年大旱今復大水咎徴頻仍未有甚於此時旱而書大水而書大以變常書也宣嘗以臣弒君以子逐母罪大惡極天討未加發而為水旱之灾民受其虐書以示戒也季孫行父如齊冬公孫歸父如齊宣公聘齊止此按左氏行父如齊初聘也歸父如齊邾故也齊侯嗣立宣公親往奔其父喪又使貴卿㑹葬矣若待逾年然後修聘未晚也而季孫亟行歸父繼往則以宣公君臣不知為國以禮而謂妄說音恱取人之可以免於討也曲禮禮不妄說人歸父貪於取繹畏齊而往蓋理曲則氣必餒矣能無畏乎哉春秋備書而不削以著其罪為後世鑒也高氏曰以伐邾故恐齊人以為討遂謀伐莒焉甚矣魯之懼齊也二歲之間而公與大夫五如齊矣愚按自反而縮則可以自立何畏於齊宣公行已有慊故君臣相及於齊而猶懼其獲戾也齊侯頃使國佐來聘左傳國武子來報聘葬之速也惠公三月而葬大音泰不懷也懷思也又未逾年而以君命遣使去聲聘于鄰國則哀戚之情忘矣孟子曰養去聲生不足以當大事惟送死可以當大事滕文公五月居廬未有命戒及至葬顔色之戚哭泣之哀弔者大恱而有願為其氓者蓋禮義人心之所同然也齊頃音傾公嗣位之初舉動如此喪去聲師失地幾見執獲成二年戰鞍敗齊豈特婦人笑客之罪哉見左傳十七年已失守身之本矣高氏曰嗣子踰年即位始稱君未踰年稱子故葵丘之㑹稱宋子蓋齊桓方倡大義以尊中國故宋公雖在喪而來與㑹亦不深責以其不獲已而趨急務爾魯之於齊與國也聘雖後時亦何害耶惠公之葬既速又未踰年而以君命遽遣使來聘焉議伐莒也當凶釁而行吉禮忘哀思而結歡好書曰齊侯著其惡也饑公羊傳何以書以重書也張氏曰王政以民食為重故積貯天下之大命也前此百有節年水旱螽螟之灾多矣不以饑書今大水之後特書饑者著宣公煩於事外國用無節上下用竭故一遇水旱遂致乏食耳楚子莊伐鄭襄左傳楚子伐鄭晉士㑹救鄭逐楚師于潁北諸侯之師戍鄭經有詞同而意異者比毗志反事以觀斯得之矣九年楚子伐鄭稱爵者貶詞也若曰國君自將去聲恃強壓弱憑陵中夏之稱也知然者以下書晉郤缺帥師救鄭則貶楚可知矣此年楚子伐鄭稱爵者直詞也若曰以實屬章欲反辭書其重者公羊君將不言帥師書其重者也而意不以楚為罪也知然者以傳去聲書晉士㑹救鄭逐楚師于潁北杜氏注潁水出河南陽城而經削之則責晉可知矣此類兼以傳為案者也高氏曰晉士㑹救鄭及諸侯戍鄭而春秋削之者責晉雖得鄭而不能有之也家氏曰士會用偏師無益於救鄭是歲鄭即楚故略而不書耳癸定王亥九年十有一年晉景二齊頃公無野元年衛穆二蔡文十四鄭襄七曹文二十陳成公午元年把桓三十九宋文十三秦桓七楚莊十六春王正月夏楚子莊陳侯成鄭伯襄盟于辰陵榖作夷陵左傳春楚子伐鄭及櫟子良曰晉楚不務德而兵爭與其來者可也晉楚無信我焉得有信乃從楚夏楚盟于辰陵陳鄭服也朱子曰宣公之時楚莊盛強主盟中國杜氏曰辰陵陳地潁川長平縣東南有辰亭張氏曰今淮寧府西華縣愚按西華縣在今汴梁路陳州晉楚爭此二國為日久矣今陳鄭背音佩晉從楚盟于辰陵而春秋書之無貶詞者豈與其下喬木入幽谷乎詩伐木出自幽谷遷于喬木愚按孟子以喬木崇高譬中國以幽谷卑下譬南蠻中國不能令則蠻荆進矣薛氏曰陳鄭以中國之不足恃而盟于楚由中國之無伯諸侯之失其恃也經之大法在誅亂臣討賊子有亂臣則無君有賊子則無父無父無君即天理無復少存人類殄為禽獸雖得天下不能一朝居也見孟子今魯與齊方用兵伐莒晉與狄方㑹于攢函而不謀少去聲西氏之逆也而楚人能謀之所謂禮失而求之野前藝文志仲尼有言云云顏師古曰言都邑失禮則於野求之亦將有獲不以其僻處南荒而遂外之也孫氏曰與楚者傷中國無人喪亂陵夷之極也辰陵之盟所以得書於經而詞無貶乎聖人討賊之意可謂深切著明矣張氏曰楚莊於是合二國為盟而欲討陳夏徵舒也春秋以晉齊二大國方且致勤於莒狄而不能討獨楚莊合諸侯以討之所以楚子書爵於陳侯鄭伯之上與之也愚按楚自會盂之後未嘗稱爵與於㑹盟今書子序陳侯鄭伯之上楚初主盟也㑹盂稱爵貶之也不稱爵則疑於楚大夫而執宋公之罪不著也盟辰陵書爵豫之也豫其謀討陳之賊也後此盟于蜀楚公子嬰齊序諸國大夫之上貶而稱人不豫嬰齊之主諸侯也宋虢之盟屈建公子圍先歃而經首晉不與楚之狎主盟也申之㑹楚子為主而不殊淮夷則皆狄也由是知辰陵之盟楚子先序而無貶詞蓋豫之也公孫歸父㑹齊頃人伐莒季他張氏曰莒恃晉而不事齊魯從齊而伐之兵不討亂而挾強凌弱深著齊魯之罪也蜀杜氏曰稱齊人以示貶人齊亦以人魯也必書公孫歸父亦以志大夫之專也愚按伐邾伐莒皆以歸父將重兵而後此會齊侯會楚子皆歸父特會國君以見宣公之德仲遂而寵其子使專權於魯也至笙之逐得非肇端於此歟秋晉侯景會狄于櫕函櫕才端反左傳晉郤成子求成于衆狄衆狄疾赤狄之役遂服于晉會于櫕函衆狄服也榖梁傳不言及外狄也杜氏曰櫕函狄地春秋正法不與外域㑹同分類也書㑹戎㑹狄㑹吳皆外詞也范氏曰所以異之於諸夏薛氏曰諸侯之與外㑹皆在所可罪則盟主可知也內中國故詳外四裔故略今中國有亂天王不能討則方伯之責也又不能討則四鄰諸侯宜有請矣而魯方會齊伐莒晉方求成于狄是失肩背而養其一指不能三年而緦小功之察南軒張氏曰孟子所譬言舍大徇小不亦傎音顛乎凡此直書其事不待貶絶而義自見音現者也趙氏曰當時陳鄭之君並相率而從楚而狄人尚念伯國之餘烈從晉不衰故晉侯親往㑹之夫諸侯恃者晉魯方伐莒晉方會狄而使楚人為伯者之事此反道也陳氏曰楚方倡義於天下而晉孜孜於羣狄至往會焉晉卑甚矣是故楚莊之春秋晉有諸侯之事不悉書也宣三年晉侯伐鄭不書五年荀林父伐陳不書張氏曰晉侯為盟主而往與狄會捨夏徵舒以遺楚討使楚舉大義以加於中國又欲與楚爭鄭楚直晉老所以敗于邲也愚按晉景就狄地為會與僖三十二年衛人及狄盟義同冬十月楚莊人殺陳成夏徵舒丁亥楚子入陳榖梁傳此入而殺也其不言入而殺明楚之討有罪也日入惡入者也程子傳人衆辭大惡衆所欲知也誅其罪義也取其國惡也稱人者衆辭也杜氏曰不言楚子而稱人討賊詞也范氏曰變楚子言人者弒君之賊若曰人人所得殺也陳氏曰楚亟稱子矣自宋萬而下無討賊者雖討之不以其罪且百年於此則楚之討徵舒其不曰楚子何討賊不以內外貴賤恆稱人高郵孫氏曰討賊雖諸侯雖大夫雖國人雖外國必皆曰人大惡人人之所同惡去聲人人之所得討其稱楚人殺徵舒諸夏之罪自見音現矣高氏曰弒君之賊固人人可得而殺之豈有楚人之間哉徵舒弒君今已踰年國人不能討天子方伯不能誅反致南蠻入中國而殺之彼南蠻尚知弒君者之當殺則中國如之何不能殺之耶聖人書此傷中國之不自正也薛氏曰見賊之不討於中國而討於荆蠻也雖然天下之惡一也楚殺徴舒與衛殺州吁蔡殺陳他一例書之所以明亂臣賊子人道共惡人人得誅初不間於中外所以廣忠孝之路而拯三綱於大亂之日也按左氏傳去聲楚子為去聲夏氏亂故謂陳人無動將討於少去聲西氏杜氏曰少西徵舒之祖子夏之名遂入陳殺徵舒轘音患車裂之也諸栗門陳城門而經先書殺後書入者與楚子之能討賊故先之也陳氏曰不書入而後殺豫之以討賊之義也則討賊一事入一事也愚按晉文執曹伯非伯討故先書入曹後書執曹伯楚靈殺齊慶封雖殺有罪而不以討賊殺之故先書伐吳而後書殺慶封亦不係之楚人則知此以討賊豫楚莊也討其賊為義取其國為貪舜跖之石反之相去逺矣其分乃在於善與利耳楚莊以義討賊勇於為善舜之徒也以貪取國急於為利跖之徒矣為善與惡特在一念須臾之間而書法如此故春秋傳心之要典不可以不察者也或曰聖人大改過楚雖縣陳能聽申叔時之說而復扶又反封陳陳侯在晉申叔時使於齊反復命而退王使讓之曰夏徵舒為不道弒其君寡人以諸侯討而戮之諸侯縣公皆慶寡人女獨不慶寡人何故對曰夏徵舒弒其君其罪大矣討而戮之君之義也抑人亦有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉乃復封陳鄉取一人焉以歸謂之夏州可謂能改過矣猶書入陳以貶之何也曰楚莊意在滅陳雖復封之然鄉取一人焉以歸謂之夏州杜氏曰州鄉屬示討夏氏所獲也而又納其亂臣是制人之上下使不得其君臣之道也范氏曰二人與君昏淫當絶之而討強納之執國威柄制其君臣傎倒上下錯亂邪正晉人以幣如鄭問駟乞之立故子産對曰若寡君之二三臣而晉大夫專制其位是晉之縣鄙也何國之為辭客幣而報其使去聲晉人舍如字之昭十九年鄭駟偃卒偃娶於晉大夫生絲弱其父兄立駟乞他日絲以告其舅晉人以幣如鄭問駟乞之立故子産對云云他國非所當與去聲也而必欲納其亂臣存亡興滅其若是乎通㫖南唐季氏既臣于周以進退大臣之事請之而世宗無所可否以他國非所當與也仲尼重傷中國深美其有討賊之功故特從末減左昭十四注末薄也減輕也不稱取陳而書入雖曰與之可矣陸氏曰楚子之討正也故書人入人之國又納淫亂之臣邪也故明書其爵以示不正春秋之義彰善疸惡纖芥無遺稱事原情瑕瑜不掩斯之謂也愚按春秋子楚莊之討徵舒而稱楚人亦猶吳闔廬之救蔡而戰于柏舉稱吳子也楚子入陳目其人而貶之亦猶吳入郢之舉號也辭雖不同意實無異蓋楚莊闔廬實非有討賊救患之誠心故書法豫奪如此也使楚莊真有討賊之心則辰陵之盟執徵舒而誅之一匹夫之力耳奚俟於以重兵造其國都而後戮之哉使其素有討賊之志則四年之伐鄭俘歸生而轘諸桔柣之門而仗義之名著於中國矣奚待於三月之圍失賊不討而受肉袒之降哉由其本無是心而假其事以為功故不足以進於此也文定謂假於討賊以縣陳信矣論者以楚莊居五霸之列亦取其討賊之一節如秦穆之悔過耳抑方諸吳闔廬夫差之暴橫而或者亦以霸許之則秦穆楚莊猶為此善於彼者歟劉氏曰公羊云此楚子也其稱人何貶也非也此譬猶蔡人殺陳陀耳且外討弒君之賊何不得乎榖梁云此入而殺其不先言入何也外徵舒於陳也非也言楚人殺者乃明徵舒有罪爾且先言入後言殺可謂內徵舒於陳乎納公孫寧儀行父于陳成寧公作寧公羊傳此皆大夫也其言納何納公黨與也榖梁傳納者內不受也輔人之不能民而討猶可入人之國制人之上下使不得其君臣之道不可程子傳致亂之臣國所不容也故書納此二臣者從君於昏宣淫於朝誅殺諫臣使其君見弒蓋致亂之臣也肆諸市朝與衆同棄然後快於人心今乃詭辭奔楚託於討賊復讎以自脫其罪而楚莊不能察其反覆音福又使陳人用之是猶人有飲毒而死者幸而復云聲生又强上聲以毒飲去聲之可乎故聖人外此二人於陳賈逵曰二子不繫之陳絶於陳也而特書曰納納者不受而强上聲納之者也為楚莊者宜奈何瀦音諸徵舒之宮檀弓殺其人壞其室汙其宮而瀦焉封泄冶之墓書武成封比干墓尸孔寧儀行父于朝謀於陳衆定其君而去其庶幾乎高氏曰二子之惡乃其君之所由以弒者亦與徵舒何異豈可復居陳大夫之位哉已絶於陳故不繫於陳而書納張氏曰孔寧儀行父必因奔楚誘楚子以利故楚子殺徵舒而縣陳微申叔時之言則陳遂亡矣楚莊懷變詐貪婪之志而尚能以義自克故封陳而不取然見善不明而非有改過不吝之心所以雖封陳而終宥陳之亂臣復納諸國聖人豫善之𢎞待人之公先旌其討賊之義然後著其入陳且納亂臣之罪使楚莊之善惡功罪顯然明白詳味此論非聖人莫能修之也愚按孔寧儀行父不書奔書奔則是寧行父請討於楚也其歸不係陳不使得為陳之臣也經凡書納皆非所宜納書曰楚子入陳納公孫寧儀行父于陳曰入曰納則二臣之罪與楚莊納之之惡皆見矣啖氏曰左氏云書有禮也若以納亂臣為有禮孰為非禮春秋胡傳附録纂疏卷十七
